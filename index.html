<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Свадьба Ильи и Артёма | Сюжетное приключение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a0f0a 0%, #3d2a1f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', 'Georgia', serif;
            padding: 20px;
        }

        .game-wrapper {
            max-width: 700px;
            width: 100%;
            background: #fffaf0;
            border-radius: 48px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.4), 0 0 0 2px #ffd793 inset;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Шапка с именами и прогрессом */
        .header {
            background: linear-gradient(145deg, #c4453e, #9b2e28);
            padding: 20px 24px;
            text-align: center;
            color: #fff3cf;
            border-bottom: 4px solid #ffcd7e;
        }

        .header h1 {
            font-size: 1.9rem;
            letter-spacing: 2px;
            font-family: 'Playfair Display', serif;
        }

        .header h1 span {
            background: #ffeaac;
            color: #9b2e28;
            padding: 0 12px;
            border-radius: 40px;
            display: inline-block;
            margin: 0 5px;
            font-size: 1.7rem;
        }

        .wedding-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255,245,215,0.2);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 6px 16px;
            flex: 1;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Основная сюжетная зона */
        .story-area {
            padding: 28px 26px;
            min-height: 450px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .scene-image {
            text-align: center;
            font-size: 5rem;
            filter: drop-shadow(2px 6px 12px rgba(0,0,0,0.2));
            background: #fceae7;
            border-radius: 60px;
            padding: 20px;
        }

        .scene-text {
            background: #ffffffdb;
            border-radius: 40px;
            padding: 24px;
            font-size: 1.15rem;
            line-height: 1.45;
            color: #3a2418;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            border: 1px solid #ffe1b9;
        }

        .scene-text p {
            margin-bottom: 12px;
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 8px;
        }

        .choice-btn {
            background: #f5e2d0;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            text-align: left;
            cursor: pointer;
            transition: 0.1s;
            color: #4a2a1a;
            border-left: 8px solid #e6a157;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .choice-btn:hover {
            background: #ffefdd;
            transform: translateX(5px);
            border-left-color: #c2571a;
        }

        .choice-btn:active {
            transform: scale(0.99);
        }

        .reset-btn {
            background: #b78664;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-top: 15px;
            font-size: 0.9rem;
            transition: 0.1s;
        }

        .reset-btn:hover {
            background: #9a6848;
        }

        .footer {
            background: #faead9;
            padding: 14px;
            text-align: center;
            font-size: 0.7rem;
            color: #b47c5a;
            border-top: 1px solid #f0cfb3;
        }

        .progress-badge {
            background: #ffdfb3;
            border-radius: 40px;
            padding: 5px 12px;
            display: inline-block;
            font-size: 0.8rem;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(15px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .story-area > * {
            animation: fadeSlide 0.3s ease-out;
        }

        @media (max-width: 550px) {
            .story-area { padding: 20px; }
            .scene-text { font-size: 1rem; padding: 18px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper" id="gameRoot">
    <div class="header">
        <h1>💍 <span>Илья</span> 🤵❤️👰 <span>Артём</span> 💒</h1>
        <div class="wedding-stats">
            <div class="stat-card">💗 Свадебная гармония: <strong id="harmonyValue">50</strong>%</div>
            <div class="stat-card">🎉 Главы: <strong id="chapterName">Знакомство</strong></div>
        </div>
    </div>
    <div class="story-area" id="storyArea">
        <!-- динамический контент -->
    </div>
    <div class="footer">
        ✨ История любви Ильи и Артёма. Каждое решение меняет свадьбу! ✨
    </div>
</div>

<script>
    // ~~~~~~~~~~~~~~~~~~ СВАДЕБНОЕ ПРИКЛЮЧЕНИЕ: ИЛЬЯ + АРТЁМ ~~~~~~~~~~~~~~~~~~
    // Игровое состояние
    let gameState = {
        harmony: 50,        // 0-100% влияет на финал и события
        chapter: "start",   // id текущей сцены
        flags: {
            // особые флаги для разных веток
            ringReady: false,
            parentsBlessing: false,
            dancingMastered: false,
            cakeSaved: false,
            speechEpic: false,
            surpriseDone: false
        },
        inventory: ["💌 открытка-признание"] // стартовый предмет
    };

    // ---- СЮЖЕТНЫЕ СЦЕНЫ (интерактивное повествование) ----
    const scenes = {
        // СЦЕНА 0: начало знакомства / предложение
        start: {
            title: "💕 Как всё начиналось",
            emoji: "🏳️‍🌈💖",
            text: "Илья и Артём встретились в уютном книжном кафе под дождём. Три года свиданий, смеха, путешествий — и вот он, долгожданный день свадьбы! Но прежде чем сказать «ГОРЬКО!», нужно пройти через череду забавных испытаний. Свадебный координатор — непослушный кот Мурзик, а гости приготовили сюрпризы.",
            choices: [
                { text: "💍 Поехать выбирать обручальные кольца", nextScene: "rings", harmonyDelta: 5 },
                { text: "🎭 Устроить костюмированную репетицию танца", nextScene: "dance", harmonyDelta: 3 },
                { text: "🍰 Встретиться с организатором и обсудить меню", nextScene: "catering", harmonyDelta: 2 }
            ]
        },
        // Кольца
        rings: {
            title: "💎 Легендарные кольца",
            emoji: "💍✨",
            text: "В ювелирном салоне Илья хочет классические платиновые кольца, а Артём — с гравировкой «Навеки вместе» и маленьким сюрпризом внутри. Продавщица предлагает уникальную пару с рубинами. Внезапно появляется бывшая подруга невесты (условно) и пытается переубедить.",
            choices: [
                { text: "💖 Выбрать кольца с гравировкой и секретом (+ гармония)", nextScene: "parentMeeting", harmonyDelta: 10, setFlag: "ringReady", flagValue: true },
                { text: "😬 Взять стандартные, чтобы не рисковать", nextScene: "parentMeeting", harmonyDelta: 0, setFlag: "ringReady", flagValue: false },
                { text: "🎭 Импровизировать: сделать кольца своими руками в мастерской", nextScene: "parentMeeting", harmonyDelta: 8, setFlag: "ringReady", flagValue: true }
            ]
        },
        // Танец
        dance: {
            title: "💃 Вальс или тверк?",
            emoji: "🕺💃",
            text: "Хореограф предлагает современный танец — смесь вальса и латины. Илья стесняется, Артём в восторге. Родители ждут классику. А ещё бабушка Артёма хочет исполнить цыганочку!",
            choices: [
                { text: "✨ Разучить элегантный вальс (консервативно)", nextScene: "parentMeeting", harmonyDelta: 5, setFlag: "dancingMastered", flagValue: true },
                { text: "🔥 Устроить зажигательный флешмоб с гостями", nextScene: "parentMeeting", harmonyDelta: 12, setFlag: "dancingMastered", flagValue: true },
                { text: "🎤 Пусть каждый танец, что хочет — будет весело", nextScene: "parentMeeting", harmonyDelta: 2, setFlag: "dancingMastered", flagValue: false }
            ]
        },
        // Кейтеринг
        catering: {
            title: "🍽️ Кулинарная битва",
            emoji: "🍕🍰",
            text: "Организатор предлагает шведский стол с авторскими блюдами. Но внезапно повар-конкурент подсыпал странные специи. Нужно пробовать и спасать ужин! Илья любит мясо, Артём — рыбу. Компромисс?",
            choices: [
                { text: "👨‍🍳 Устроить кулинарное шоу с дегустацией для всех", nextScene: "parentMeeting", harmonyDelta: 8, setFlag: "cakeSaved", flagValue: true },
                { text: "🍝 Заказать пиццу и сделать уютно по-домашнему", nextScene: "parentMeeting", harmonyDelta: 3, setFlag: "cakeSaved", flagValue: false },
                { text: "🍣 Сделать фьюжн-меню (суши + пельмени) + оригинально", nextScene: "parentMeeting", harmonyDelta: 12, setFlag: "cakeSaved", flagValue: true }
            ]
        },
        // Встреча с родителями / благословение
        parentMeeting: {
            title: "👪 Семейный совет",
            emoji: "🏠❤️",
            text: "Родители Ильи и Артёма собираются вместе. Мама Ильи переживает, что свадьба будет слишком современной. Папа Артёма хочет тост с медведем. Нужно получить благословение и всех примирить!",
            choices: [
                { text: "🤝 Душевный разговор и чай с пирогами (благословение получено!)", nextScene: "speech", harmonyDelta: 15, setFlag: "parentsBlessing", flagValue: true },
                { text: "🎸 Устроить семейный концерт с гитарой", nextScene: "speech", harmonyDelta: 10, setFlag: "parentsBlessing", flagValue: true },
                { text: "😅 Сбежать от родительского давления", nextScene: "speech", harmonyDelta: -10, setFlag: "parentsBlessing", flagValue: false }
            ]
        },
        // Клятвы и тосты
        speech: {
            title: "📜 Свадебные клятвы",
            emoji: "📖🔥",
            text: "Церемония почти готова. Осталось написать клятвы. Илья хочет смешную, Артём — трогательную до слёз. Регистратор ждёт текст. Ещё нужно придумать тост, который запомнят все!",
            choices: [
                { text: "❤️‍🔥 Написать искреннюю клятву в стихах (растрогает всех)", nextScene: "surprise", harmonyDelta: 12, setFlag: "speechEpic", flagValue: true },
                { text: "😂 Клятва с мемами и шутками (гости поржут)", nextScene: "surprise", harmonyDelta: 5, setFlag: "speechEpic", flagValue: false },
                { text: "🎤 Импровизация прямо на месте", nextScene: "surprise", harmonyDelta: 8, setFlag: "speechEpic", flagValue: true }
            ]
        },
        // Сюрпризный этап
        surprise: {
            title: "🎁 Секретный сюрприз",
            emoji: "🎆🎁",
            text: "Артём тайно подготовил для Ильи фейерверк и видео с воспоминаниями. Илья же пригласил любимую группу Артёма выступить акустически. Как объединить два сюрприза, чтобы никто не обиделся?",
            choices: [
                { text: "🌟 Устроить совместный сюрприз: фейерверк под живую музыку (магия!)", nextScene: "finale", harmonyDelta: 20, setFlag: "surpriseDone", flagValue: true },
                { text: "🎈 Сначала видео, потом концерт — всё по очереди", nextScene: "finale", harmonyDelta: 10, setFlag: "surpriseDone", flagValue: true },
                { text: "😬 Отменить всё, чтобы избежать стресса", nextScene: "finale", harmonyDelta: -15, setFlag: "surpriseDone", flagValue: false }
            ]
        },
        // ФИНАЛ (различные концовки)
        finale: {
            title: "💒 Долгожданная свадьба!",
            emoji: "🎉💍",
            text: "", // динамический текст
            choices: [] // будет динамика
        }
    };

    // Функция обновления интерфейса и обработки логики
    function updateGameUI() {
        const currentSceneId = gameState.chapter;
        const scene = scenes[currentSceneId];
        if (!scene) {
            // fallback
            renderEnding("Ошибка сюжета, но Илья и Артём всё равно поженились! 🌈");
            return;
        }

        // ФИНАЛЬНАЯ сцена с динамикой в зависимости от гармонии и флагов
        if (currentSceneId === "finale") {
            let finalText = "";
            let finalEmoji = "";
            let finalHarmony = gameState.harmony;
            let extraMessage = "";
            
            if (finalHarmony >= 80) {
                finalEmoji = "🏆💖👑";
                finalText = "✨🌟 ИДЕАЛЬНАЯ СВАДЬБА! 🌟✨ Гости плачут от счастья, родители танцуют, а Илья и Артём обмениваются кольцами под фейерверк любви. Вся жизнь впереди — полная гармонии и смеха. Кот Мурзик принёс подарок — золотую корону молодожёнам! Это лучшая свадьба в истории!";
                if (gameState.flags.speechEpic) extraMessage += " Ваши проникновенные стихи растрогали даже ведущего. ";
                if (gameState.flags.surpriseDone) extraMessage += " Совместный сюрприз стал гвоздём программы! ";
                finalText += extraMessage + " Счастью нет предела! ❤️‍🔥";
            } 
            else if (finalHarmony >= 50) {
                finalEmoji = "🥂💕🎶";
                finalText = "Хорошая, душевная свадьба! Были небольшие накладки (кто-то перепутал бокалы, а тамада уронил торт), но Илья и Артём сияют от радости. Гости говорят, что это был очень тёплый праздник. Любовь победила хаос! 💒";
                if (gameState.flags.parentsBlessing) finalText += " Родители дали благословение и пустили слезу.";
                else finalText += " Родители немного ворчали, но в конце обнялись.";
            } 
            else if (finalHarmony >= 20) {
                finalEmoji = "😅🍰💪";
                finalText = "Свадьба вышла комичной и немного хаотичной: пропали кольца, нашлись в торте, диджей уснул. Но Илья с Артёмом не унывают! Они всё равно поженились и устроили весёлый импровизированный банкет. Главное — они вместе, а остальное — приключение!";
            } 
            else {
                finalEmoji = "🌀😅💔";
                finalText = "Ох… Свадьба прошла с большими скандалами: потеряли кольца, порвали костюмы, приехала бывшая с шариками, и упала люстра. НО! Илья и Артём взялись за руки, рассмеялись и сбежали на крышу, где тайно обменялись обещаниями. И это их личный триумф. Иногда любовь сильнее церемоний. ❤️‍🩹";
            }
            
            finalText += "\n\n✨ Спасибо за игру! История Ильи и Артёма запомнится надолго. ✨";
            
            renderEnding(finalText, finalEmoji);
            return;
        }
        
        // отрисовка обычной сцены
        const storyDiv = document.getElementById("storyArea");
        if (!storyDiv) return;
        
        let choicesHtml = "";
        scene.choices.forEach((choice, idx) => {
            choicesHtml += `<button class="choice-btn" data-choice-index="${idx}">${choice.text}</button>`;
        });
        
        const harmonyPercent = Math.min(100, Math.max(0, Math.floor(gameState.harmony)));
        document.getElementById("harmonyValue").innerText = harmonyPercent;
        document.getElementById("chapterName").innerText = scene.title;
        
        const sceneHtml = `
            <div class="scene-image">${scene.emoji}</div>
            <div class="scene-text">
                <p><strong>📖 ${scene.title}</strong></p>
                <p>${scene.text}</p>
                ${gameState.inventory.length > 0 ? `<div class="progress-badge">🎒 В инвентаре: ${gameState.inventory.join(", ")}</div>` : ""}
            </div>
            <div class="choices">
                ${choicesHtml}
            </div>
            <button class="reset-btn" id="resetGameBtn">🔄 Начать историю заново</button>
        `;
        
        storyDiv.innerHTML = sceneHtml;
        
        // привязываем обработчики к кнопкам выбора
        document.querySelectorAll('.choice-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const index = parseInt(btn.dataset.choiceIndex);
                if (!isNaN(index) && scene.choices[index]) {
                    applyChoice(scene.choices[index]);
                }
            });
        });
        
        const resetBtn = document.getElementById("resetGameBtn");
        if (resetBtn) resetBtn.addEventListener("click", resetGame);
    }
    
    function applyChoice(choice) {
        // меняем гармонию
        let delta = choice.harmonyDelta || 0;
        let newHarmony = gameState.harmony + delta;
        gameState.harmony = Math.min(100, Math.max(0, newHarmony));
        
        // устанавливаем флаги если нужно
        if (choice.setFlag) {
            gameState.flags[choice.setFlag] = choice.flagValue;
        }
        
        // добавим предметы в инвентарь для веселья
        if (choice.nextScene === "rings" && choice.text.includes("гравировкой")) {
            if (!gameState.inventory.includes("💍 кольца с гравировкой")) gameState.inventory.push("💍 кольца с гравировкой");
        }
        if (choice.nextScene === "surprise" && choice.text.includes("искреннюю")) {
            if (!gameState.inventory.includes("📜 стихи-клятва")) gameState.inventory.push("📜 стихи-клятва");
        }
        if (choice.nextScene === "finale" && choice.harmonyDelta >= 15) {
            gameState.inventory.push("🎁 магия любви");
        }
        
        // переход на следующую сцену
        gameState.chapter = choice.nextScene;
        
        // если гармония упала ниже 0 или особые эффекты — не блокируем, но можно добавить событие
        updateGameUI();
        // автосохраняем в localStorage
        saveGameProgress();
    }
    
    // Финальный рендер без выборов (только перезапуск)
    function renderEnding(text, emoji = "💒🎉") {
        const storyDiv = document.getElementById("storyArea");
        if (!storyDiv) return;
        const harmonyVal = Math.min(100, Math.max(0, Math.floor(gameState.harmony)));
        document.getElementById("harmonyValue").innerText = harmonyVal;
        document.getElementById("chapterName").innerText = "Финал 💖";
        
        const endingHtml = `
            <div class="scene-image">${emoji || "💍🎊"}</div>
            <div class="scene-text">
                <p style="font-size:1.2rem; font-weight:bold;">✨ ${text.split("\n")[0]} ✨</p>
                <p>${text.replace(/\n/g, '<br>')}</p>
                <p style="margin-top: 15px;">🏆 Итоговая гармония: ${harmonyVal}% 🏆</p>
                <button class="reset-btn" id="resetGameBtnEnd">🌟 Прожить свадебную историю заново 🌟</button>
            </div>
        `;
        storyDiv.innerHTML = endingHtml;
        const resetEnd = document.getElementById("resetGameBtnEnd");
        if (resetEnd) resetEnd.addEventListener("click", resetGame);
    }
    
    // Сохранение и загрузка прогресса
    function saveGameProgress() {
        const save = {
            harmony: gameState.harmony,
            chapter: gameState.chapter,
            flags: gameState.flags,
            inventory: gameState.inventory
        };
        localStorage.setItem("ilyaArtemWeddingStory", JSON.stringify(save));
    }
    
    function loadGameProgress() {
        const saved = localStorage.getItem("ilyaArtemWeddingStory");
        if (!saved) return false;
        try {
            const data = JSON.parse(saved);
            gameState.harmony = data.harmony ?? 50;
            gameState.chapter = data.chapter ?? "start";
            gameState.flags = data.flags || { ringReady: false, parentsBlessing: false, dancingMastered: false, cakeSaved: false, speechEpic: false, surpriseDone: false };
            gameState.inventory = data.inventory || ["💌 открытка-признание"];
            // валидация: если глава finale или не существует, корректируем
            if (!scenes[gameState.chapter] && gameState.chapter !== "finale") gameState.chapter = "start";
            if (gameState.harmony < 0) gameState.harmony = 50;
            return true;
        } catch(e) { return false; }
    }
    
    function resetGame() {
        // сброс до стандартных параметров
        gameState = {
            harmony: 50,
            chapter: "start",
            flags: {
                ringReady: false,
                parentsBlessing: false,
                dancingMastered: false,
                cakeSaved: false,
                speechEpic: false,
                surpriseDone: false
            },
            inventory: ["💌 открытка-признание"]
        };
        localStorage.removeItem("ilyaArtemWeddingStory");
        updateGameUI();
        // дополнительно обновляем отображение
        document.getElementById("harmonyValue").innerText = "50";
        document.getElementById("chapterName").innerText = "Знакомство";
    }
    
    // инициализация игры
    function initStoryGame() {
        const loaded = loadGameProgress();
        if (!loaded) {
            // установка начальных значений
            gameState.chapter = "start";
            gameState.harmony = 50;
            gameState.flags = { ringReady: false, parentsBlessing: false, dancingMastered: false, cakeSaved: false, speechEpic: false, surpriseDone: false };
            gameState.inventory = ["💌 открытка-признание"];
        }
        updateGameUI();
    }
    
    initStoryGame();
</script>
</body>
