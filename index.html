<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Chugur — Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #eee;
        }

        .app {
            max-width: 550px;
            width: 100%;
            background: #151515;
            border: 1px solid #2a2a2a;
        }

        .header {
            padding: 20px 24px 8px 24px;
            border-bottom: 1px solid #222;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .header p {
            font-size: 0.7rem;
            color: #888;
            margin-top: 6px;
        }

        /* плеер */
        .player-panel {
            padding: 20px;
            background: #111;
            border-bottom: 1px solid #222;
        }

        .current-label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .current-track {
            font-size: 1rem;
            font-weight: 500;
            margin: 8px 0 16px;
            word-break: break-word;
        }

        audio {
            width: 100%;
            height: 44px;
        }

        /* панель добавления */
        .add-panel {
            padding: 16px 20px;
            background: #0c0c0c;
            border-bottom: 1px solid #222;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .add-file-btn {
            background: #2a2a2a;
            border: 1px solid #4a4a4a;
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #ddd;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .add-file-btn:hover {
            background: #3a3a3a;
        }

        /* библиотека */
        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 18px 24px 8px 24px;
        }

        .library-header h3 {
            font-size: 0.8rem;
            font-weight: 500;
            color: #aaa;
            letter-spacing: 0.5px;
        }

        .clear-btn {
            background: none;
            border: 1px solid #3a2a28;
            padding: 4px 12px;
            font-size: 0.7rem;
            color: #b88a7a;
            cursor: pointer;
        }

        .songs-list {
            padding: 16px 20px 24px 20px;
            max-height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .song-item {
            background: #121212;
            border: 1px solid #252525;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .song-item:hover {
            background: #1a1a1a;
        }

        .song-info {
            flex: 1;
        }

        .song-title {
            font-size: 0.85rem;
            font-weight: 500;
            word-break: break-word;
        }

        .song-date {
            font-size: 0.6rem;
            color: #6a6a6a;
            margin-top: 4px;
        }

        .song-actions {
            display: flex;
            gap: 6px;
        }

        .play-song-btn, .delete-song-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            padding: 5px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            color: #ccc;
        }

        .play-song-btn:hover {
            background: #3a4a3a;
        }

        .delete-song-btn:hover {
            background: #4a2a2a;
            border-color: #aa5a42;
        }

        .empty-message {
            text-align: center;
            color: #5a5a5a;
            padding: 40px;
            font-size: 0.8rem;
            border: 1px dashed #2a2a2a;
        }

        .footer {
            padding: 12px 20px;
            border-top: 1px solid #1f1f1f;
            font-size: 0.6rem;
            color: #6f6f6f;
            text-align: center;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
        }

        /* скрытый input для выбора файлов */
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>Chugur</h1>
        <p>Добавляй MP3 через кнопку — слушай что хочешь</p>
    </div>

    <div class="player-panel">
        <div class="current-label">Сейчас играет</div>
        <div class="current-track" id="currentTrackName">—</div>
        <audio id="audioPlayer" controls preload="metadata"></audio>
    </div>

    <div class="add-panel">
        <button id="addFileBtn" class="add-file-btn">📁 Добавить MP3 файл</button>
    </div>

    <div class="library-header">
        <h3>Мои треки</h3>
        <button id="clearAllBtn" class="clear-btn">Очистить всё</button>
    </div>

    <div id="songsList" class="songs-list">
        <div class="empty-message">Нет треков. Нажмите «Добавить MP3 файл» и выберите музыку из памяти телефона.</div>
    </div>

    <div class="footer">
        🎵 Файлы сохраняются в браузере. Ничего не исчезнет после перезагрузки.
    </div>
</div>

<input type="file" id="fileInput" accept=".mp3,.m4a,.aac,.ogg,.wav">

<script>
    // =============== CHUGUR — МУЗЫКАЛЬНЫЙ ПЛЕЕР С ЗАГРУЗКОЙ ФАЙЛОВ ===============
    let songs = [];  // { id, name, blob, date, url }
    let currentSongId = null;
    let nextId = 1;

    const audio = document.getElementById('audioPlayer');
    const currentTrackSpan = document.getElementById('currentTrackName');
    const songsListDiv = document.getElementById('songsList');
    const addFileBtn = document.getElementById('addFileBtn');
    const fileInput = document.getElementById('fileInput');
    const clearAllBtn = document.getElementById('clearAllBtn');

    // Загрузка из localStorage (только метаданные, blob-ы хранятся отдельно)
    function loadFromStorage() {
        const saved = localStorage.getItem('chugur_songs_meta');
        if (saved) {
            try {
                const meta = JSON.parse(saved);
                songs = [];
                nextId = 1;
                for (let item of meta) {
                    // восстанавливаем blob из сохранённого base64
                    if (item.blobData) {
                        const byteCharacters = atob(item.blobData);
                        const byteNumbers = new Array(byteCharacters.length);
                        for (let i = 0; i < byteCharacters.length; i++) {
                            byteNumbers[i] = byteCharacters.charCodeAt(i);
                        }
                        const byteArray = new Uint8Array(byteNumbers);
                        const blob = new Blob([byteArray], { type: 'audio/mpeg' });
                        songs.push({
                            id: item.id,
                            name: item.name,
                            date: item.date,
                            blob: blob,
                            url: URL.createObjectURL(blob)
                        });
                        if (item.id >= nextId) nextId = item.id + 1;
                    }
                }
                renderSongsList();
            } catch(e) { console.warn(e); }
        }
    }

    function saveToStorage() {
        const meta = songs.map(song => ({
            id: song.id,
            name: song.name,
            date: song.date,
            blobData: blobToBase64(song.blob)
        }));
        localStorage.setItem('chugur_songs_meta', JSON.stringify(meta));
    }

    function blobToBase64(blob) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(blob);
        });
    }

    // Сохранение с асинхронным преобразованием
    async function syncStorage() {
        const meta = [];
        for (let song of songs) {
            const base64 = await blobToBase64(song.blob);
            meta.push({
                id: song.id,
                name: song.name,
                date: song.date,
                blobData: base64
            });
        }
        localStorage.setItem('chugur_songs_meta', JSON.stringify(meta));
    }

    // Добавление файла
    function addSongFromFile(file) {
        if (!file.type.includes('audio') && !file.name.endsWith('.mp3')) {
            alert('Пожалуйста, выберите аудиофайл (MP3, M4A, AAC, OGG, WAV)');
            return;
        }

        const blob = file.slice(0, file.size, file.type);
        const url = URL.createObjectURL(blob);
        
        const newSong = {
            id: nextId++,
            name: file.name.replace(/\.(mp3|m4a|aac|ogg|wav)$/i, ''),
            date: new Date().toLocaleString(),
            blob: blob,
            url: url
        };
        
        songs.unshift(newSong);
        renderSongsList();
        syncStorage();
        
        // маленькое уведомление
        const msg = document.createElement('div');
        msg.textContent = `✓ Добавлено: ${newSong.name}`;
        msg.style.position = 'fixed';
        msg.style.bottom = '20px';
        msg.style.left = '50%';
        msg.style.transform = 'translateX(-50%)';
        msg.style.backgroundColor = '#2a4a2a';
        msg.style.color = 'white';
        msg.style.padding = '8px 20px';
        msg.style.fontSize = '12px';
        msg.style.zIndex = '999';
        msg.style.borderRadius = '0';
        msg.style.border = '1px solid #5a8a5a';
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 2000);
    }

    function renderSongsList() {
        if (!songsListDiv) return;
        
        if (songs.length === 0) {
            songsListDiv.innerHTML = '<div class="empty-message">Нет треков. Нажмите «Добавить MP3 файл» и выберите музыку из памяти телефона.</div>';
            return;
        }
        
        songsListDiv.innerHTML = '';
        songs.forEach(song => {
            const div = document.createElement('div');
            div.className = 'song-item';
            div.innerHTML = `
                <div class="song-info">
                    <div class="song-title">${escapeHtml(song.name)}</div>
                    <div class="song-date">${song.date}</div>
                </div>
                <div class="song-actions">
                    <button class="play-song-btn" data-id="${song.id}">▶</button>
                    <button class="delete-song-btn" data-id="${song.id}">🗑</button>
                </div>
            `;
            
            const playBtn = div.querySelector('.play-song-btn');
            const delBtn = div.querySelector('.delete-song-btn');
            
            playBtn.addEventListener('click', () => playSongById(song.id));
            delBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                if (confirm(`Удалить "${song.name}"?`)) {
                    // очищаем URL
                    if (song.url) URL.revokeObjectURL(song.url);
                    songs = songs.filter(s => s.id !== song.id);
                    if (currentSongId === song.id) {
                        audio.pause();
                        audio.src = '';
                        currentTrackSpan.textContent = '—';
                        currentSongId = null;
                    }
                    renderSongsList();
                    await syncStorage();
                }
            });
            
            songsListDiv.appendChild(div);
        });
    }

    function playSongById(id) {
        const song = songs.find(s => s.id === id);
        if (song && song.url) {
            audio.src = song.url;
            audio.load();
            audio.play().catch(e => {
                console.log('автоплей заблокирован');
            });
            currentTrackSpan.textContent = song.name;
            currentSongId = song.id;
        } else {
            alert('Не удалось воспроизвести файл');
        }
    }

    function clearAllSongs() {
        if (songs.length === 0) return;
        if (confirm('Удалить ВСЕ песни из библиотеки?')) {
            // очищаем все URL объекты
            songs.forEach(song => {
                if (song.url) URL.revokeObjectURL(song.url);
            });
            songs = [];
            audio.pause();
            audio.src = '';
            currentTrackSpan.textContent = '—';
            currentSongId = null;
            renderSongsList();
            localStorage.removeItem('chugur_songs_meta');
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Обработчики
    addFileBtn.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            addSongFromFile(e.target.files[0]);
            fileInput.value = ''; // чтобы можно было выбрать тот же файл снова
        }
    });

    clearAllBtn.addEventListener('click', clearAllSongs);

    // Загрузка при старте
    loadFromStorage();
</script>
</body>
</html>и
