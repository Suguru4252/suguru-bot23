<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>President Simulator 2D - Градостроительный симулятор</title>
    <style>
        :root {
            --bg: #0a0a14;
            --panel: #1a1a2e;
            --accent: #f0c040;
            --gold: #e8c547;
            --text: #e8e8e8;
            --border: #2e2e4e;
            --hover: #2a2a50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #060610;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            position: fixed;
        }

        #splash {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: radial-gradient(ellipse at 50% 30%, #1a1040 0%, #060610 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        #splash.hidden {
            display: none;
        }
        .splash-stars {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .splash-title {
            font-size: clamp(2em, 5vw, 3.2em);
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(180deg, #ffe08a, #c8943e, #8b5e14);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            filter: drop-shadow(0 4px 20px rgba(200,150,50,0.4));
            animation: titleGlow 2s ease-in-out infinite;
        }
        @keyframes titleGlow {
            0%,
            100% {
                filter: drop-shadow(0 4px 20px rgba(200,150,50,0.4));
            }
            50% {
                filter: drop-shadow(0 4px 35px rgba(240,200,80,0.7));
            }
        }
        .splash-subtitle {
            color: #b0a0c0;
            font-size: clamp(0.9em, 2vw, 1.1em);
            letter-spacing: 2px;
        }
        .splash-form {
            background: rgba(20,18,40,0.9);
            border: 1px solid #3a3050;
            border-radius: 20px;
            padding: clamp(20px, 4vw, 32px) clamp(24px, 5vw, 40px);
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: min(440px, 90vw);
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }
        .splash-form label {
            font-weight: 700;
            color: #d4b060;
            font-size: 0.95em;
            letter-spacing: 1px;
        }
        .splash-form input {
            background: #121025;
            border: 2px solid #3a3050;
            color: #fff;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 1.1em;
            transition: 0.3s;
            outline: none;
        }
        .splash-form input:focus {
            border-color: #e8c547;
            box-shadow: 0 0 25px rgba(232,197,71,0.25);
        }
        .btn-create {
            background: linear-gradient(180deg, #f0c040, #b8781a);
            border: none;
            color: #1a1020;
            font-weight: 800;
            font-size: 1.2em;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 1.5px;
            transition: 0.3s;
            margin-top: 8px;
            text-transform: uppercase;
        }
        .btn-create:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(240,192,64,0.45);
        }
        .splash-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-load {
            background: rgba(40,35,70,0.8);
            border: 1px solid #3a3050;
            color: #ccc;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: 0.9em;
        }
        .btn-load:hover {
            background: #3a3050;
            border-color: #c8943e;
        }

        #game-screen {
            display: none;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            position: relative;
            flex-direction: column;
        }
        #game-screen.active {
            display: flex;
        }

        #top-bar {
            z-index: 100;
            background: linear-gradient(180deg, rgba(18,15,35,0.97), rgba(14,12,28,0.95));
            backdrop-filter: blur(15px);
            border-bottom: 1px solid #2e2e4e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            min-height: 50px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .country-name-display {
            font-weight: 800;
            font-size: clamp(0.9em, 2.5vw, 1.25em);
            background: linear-gradient(180deg, #ffe08a, #c8943e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .resources {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .resource {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 700;
            font-size: clamp(0.7em, 1.8vw, 0.95em);
            white-space: nowrap;
        }
        .res-icon {
            font-size: 1.2em;
        }
        .res-money {
            color: #f0d060;
        }
        .res-pop {
            color: #6dc8e8;
        }
        .res-happy {
            color: #6ce89c;
        }
        .top-buttons {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-top {
            background: rgba(40,35,70,0.8);
            border: 1px solid #3a3050;
            color: #ccc;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: clamp(0.7em, 1.5vw, 0.85em);
            white-space: nowrap;
        }
        .btn-top:hover {
            background: #3a3050;
            border-color: #c8943e;
        }
        .version-badge {
            font-size: 0.7em;
            padding: 3px 8px;
            border-radius: 12px;
            background: #2a2050;
            color: #aab;
            font-weight: 600;
        }

        #game-canvas {
            flex: 1;
            cursor: grab;
            display: block;
            touch-action: none;
            min-height: 0;
        }
        #game-canvas.building {
            cursor: crosshair;
        }
        #game-canvas.grabbing {
            cursor: grabbing;
        }

        #bottom-panel {
            z-index: 100;
            background: rgba(16,14,30,0.96);
            backdrop-filter: blur(15px);
            border-top: 1px solid #2e2e4e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 10px;
            min-height: 55px;
            flex-wrap: wrap;
        }
        .bottom-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 8px 14px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.25s;
            border: 2px solid transparent;
            background: rgba(30,25,55,0.7);
            font-weight: 700;
            font-size: 0.75em;
            color: #ddd;
            min-width: 55px;
            text-align: center;
        }
        .bottom-btn:active {
            transform: scale(0.95);
        }
        .bottom-btn.active {
            border-color: #f0d060 !important;
            background: rgba(200,160,50,0.25) !important;
            box-shadow: 0 0 20px rgba(240,208,96,0.3);
        }
        .bottom-btn.danger {
            border-color: #802020;
            color: #f08888;
        }
        .bottom-btn.danger.active {
            border-color: #f04444 !important;
            background: rgba(180,40,40,0.4) !important;
        }
        .bottom-btn-icon {
            font-size: 1.6em;
            line-height: 1;
        }
        .bottom-btn-label {
            font-size: 0.7em;
            letter-spacing: 0.5px;
        }

        #build-modal {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #build-modal.open {
            display: flex;
        }
        .modal-content {
            background: #1a1830;
            border: 1px solid #3a3050;
            border-radius: 20px;
            padding: 20px;
            max-width: 650px;
            width: 95vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
        }
        .modal-title {
            font-weight: 800;
            font-size: 1.2em;
            color: #f0d060;
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 8px;
        }
        .modal-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 10px 6px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.15s;
            border: 2px solid transparent;
            background: rgba(30,25,55,0.6);
            text-align: center;
            will-change: transform;
        }
        .modal-item:active {
            transform: scale(0.95);
        }
        .modal-item.selected {
            border-color: #f0d060 !important;
            background: rgba(200,160,50,0.25) !important;
            box-shadow: 0 0 20px rgba(240,208,96,0.3);
        }
        .modal-item-emoji {
            font-size: 2em;
        }
        .modal-item-name {
            font-size: 0.75em;
            font-weight: 600;
            color: #ddd;
            line-height: 1.2;
        }
        .modal-item-cost {
            font-size: 0.7em;
            color: #f0d060;
            font-weight: 700;
        }
        .modal-close {
            display: block;
            margin: 16px auto 0;
            background: #3a3050;
            border: none;
            color: #fff;
            padding: 10px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9em;
            transition: 0.3s;
        }
        .modal-close:hover {
            background: #5a4070;
        }

        .size-selector {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        .size-btn {
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #3a3050;
            background: rgba(30,25,55,0.6);
            color: #ccc;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.78em;
            transition: 0.15s;
            white-space: nowrap;
            will-change: transform;
        }
        .size-btn:active {
            transform: scale(0.95);
        }
        .size-btn.selected {
            border-color: #f0d060 !important;
            background: rgba(200,160,50,0.3) !important;
            color: #f0d060;
        }
        .size-label {
            text-align: center;
            color: #aaa;
            font-size: 0.85em;
            margin-top: 4px;
            font-weight: 600;
        }
        .rotate-info {
            text-align: center;
            color: #8af;
            font-size: 0.75em;
            margin-top: 4px;
            font-weight: 600;
        }

        #info-popup {
            position: absolute;
            pointer-events: none;
            z-index: 150;
            background: rgba(15,12,35,0.97);
            border: 2px solid #5a5080;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 0.9em;
            display: none;
            white-space: nowrap;
            box-shadow: 0 10px 35px rgba(0,0,0,0.8);
            line-height: 1.7;
            color: #f0f0f0;
        }
        #info-popup .pop-title {
            font-weight: 800;
            color: #ffd700;
            font-size: 1.1em;
            display: block;
            margin-bottom: 4px;
        }
        #info-popup .pop-stat {
            color: #d0d0d0;
        }
        #info-popup .pop-income {
            color: #f0d060;
            font-weight: 700;
        }
        #info-popup .pop-happy {
            color: #6ce89c;
            font-weight: 700;
        }
        #info-popup .pop-population {
            color: #6dc8e8;
            font-weight: 700;
        }

        #message-log {
            position: absolute;
            top: 60px;
            right: 10px;
            z-index: 110;
            display: flex;
            flex-direction: column;
            gap: 4px;
            pointer-events: none;
            max-width: 280px;
        }
        .log-msg {
            background: rgba(0,0,0,0.9);
            border-left: 3px solid #f0c040;
            padding: 7px 12px;
            border-radius: 6px;
            font-size: 0.8em;
            animation: fadeInOut 3.5s forwards;
            font-weight: 500;
            word-break: break-word;
            color: #e0e0e0;
        }
        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translateX(20px);
            }
            12% {
                opacity: 1;
                transform: translateX(0);
            }
            75% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateX(20px);
            }
        }

        @media (max-width: 768px) {
            #top-bar {
                padding: 4px 6px;
                min-height: 40px;
                gap: 3px;
            }
            .resources {
                gap: 5px;
            }
            .resource {
                font-size: 0.6em;
                gap: 2px;
            }
            .btn-top {
                padding: 4px 6px;
                font-size: 0.6em;
            }
            #bottom-panel {
                gap: 4px;
                padding: 5px 6px;
                min-height: 48px;
            }
            .bottom-btn {
                padding: 5px 8px;
                min-width: 42px;
                font-size: 0.65em;
            }
            #message-log {
                top: 45px;
                right: 4px;
                max-width: 180px;
            }
            #info-popup {
                font-size: 0.7em;
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>

    <div id="splash">
        <canvas class="splash-stars" id="splash-stars"></canvas>
        <div class="splash-title">🏛️ PRESIDENT<br>SIMULATOR</div>
        <div class="splash-subtitle">Постройте страну своей мечты</div>
        <div class="splash-form">
            <label for="country-name">📜 Название государства</label>
            <input type="text" id="country-name" placeholder="Введите название..." maxlength="28" value="Великоречье">
            <button class="btn-create" onclick="startGame()">🌟 ОСНОВАТЬ ГОСУДАРСТВО</button>
            <div class="splash-buttons">
                <button class="btn-load" onclick="loadGame()">💾 Загрузить сохранение</button>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <div id="top-bar">
            <div class="country-name-display" id="display-country-name">🏛️ Великоречье</div>
            <div class="resources">
                <div class="resource"><span class="res-icon">💰</span> <span class="res-money" id="money-val">50000</span></div>
                <div class="resource"><span class="res-icon">👥</span> <span class="res-pop" id="pop-val">100</span></div>
                <div class="resource"><span class="res-icon">😊</span> <span class="res-happy" id="happy-val">75</span>%</div>
            </div>
            <div class="top-buttons">
                <span class="version-badge" id="version-badge">🖥️ ПК</span>
                <button class="btn-top" id="btn-version" onclick="toggleVersion()">📱</button>
                <button class="btn-top" onclick="saveGame()" title="Сохранить">💾</button>
                <button class="btn-top" onclick="showHelp()">❓</button>
            </div>
        </div>

        <canvas id="game-canvas"></canvas>

        <div id="info-popup"></div>
        <div id="message-log"></div>

        <div id="bottom-panel">
            <button class="bottom-btn" id="btn-build" onclick="openBuildModal()">
                <span class="bottom-btn-icon">🏗️</span>
                <span class="bottom-btn-label">Построить</span>
            </button>
            <button class="bottom-btn" id="btn-rotate" onclick="rotateBuilding()">
                <span class="bottom-btn-icon">🔄</span>
                <span class="bottom-btn-label">Поворот</span>
            </button>
            <button class="bottom-btn danger" id="btn-delete" onclick="toggleDeleteMode()">
                <span class="bottom-btn-icon">🗑️</span>
                <span class="bottom-btn-label">Снести</span>
            </button>
            <button class="bottom-btn" id="btn-select" onclick="toggleSelectMode()">
                <span class="bottom-btn-icon">🔍</span>
                <span class="bottom-btn-label">Инфо</span>
            </button>
        </div>

        <div id="build-modal">
            <div class="modal-content">
                <div class="modal-title">🏗️ Выберите что построить</div>
                <div class="modal-grid" id="modal-grid"></div>
                <div class="size-label">📏 Размер постройки:</div>
                <div class="size-selector" id="size-selector">
                    <button class="size-btn selected" data-scale="1">🔹 1x</button>
                    <button class="size-btn" data-scale="1.5">🔸 1.5x</button>
                    <button class="size-btn" data-scale="2">🔶 2x</button>
                    <button class="size-btn" data-scale="3">💎 3x</button>
                </div>
                <div class="rotate-info">🔄 Клавиша R или кнопка Поворот — вращать перед постройкой</div>
                <button class="modal-close" onclick="closeBuildModal()">✖ Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== СОСТОЯНИЕ ====================
        const S = {
            countryName: '',
            money: 50000,
            population: 100,
            happiness: 75,
            borderSize: 400,
            borderExpandCost: 50000,
            buildings: [],
            roads: [],
            rails: [],
            waterBodies: [],
            people: [],
            cars: [],
            boats: [],
            particles: [],
            selectedType: null,
            buildScale: 1,
            buildRotation: 0,
            deleteMode: false,
            selectMode: false,
            isMobile: false,
            canvas: null,
            ctx: null,
            camX: 0,
            camY: 0,
            zoom: 1,
            gridSize: 48,
            dragging: false,
            dragSX: 0,
            dragSY: 0,
            dragDist: 0,
            mx: 0,
            my: 0,
            hovered: null,
            time: 0,
            incomeTimer: 0,
            touchesDist: 0,
            lastPinchZoom: 1,
            touchStartTime: 0,
            saveInterval: null,
            gameHour: 17,
            gameMinute: 26,
            weather: 'sunny',
            weatherTimer: 0,
            weatherDuration: 500,
            raindrops: [],
            snowflakes: [],
        };

        const BT = {
            road: { emoji:'🛣️', name:'Дорога', cost:50, pop:0, happy:2, income:5, w:48, h:48, isRoad:true, category:'Дороги' },
            road_curve: { emoji:'↪️', name:'Поворот', cost:80, pop:0, happy:1, income:8, w:48, h:48, isRoadCurve:true, category:'Дороги' },
            rail: { emoji:'🚂', name:'Ж/Д путь', cost:200, pop:0, happy:3, income:20, w:48, h:48, isRail:true, category:'Дороги' },
            house: { emoji:'🏠', name:'Дом', cost:500, pop:8, happy:3, income:15, w:44, h:44, category:'Жильё', capacity:8, spawnNPC:5 },
            apartment: { emoji:'🏢', name:'Жилой комплекс', cost:2000, pop:40, happy:-2, income:60, w:50, h:56, category:'Жильё', capacity:40, spawnNPC:10 },
            mansion: { emoji:'🏰', name:'Особняк', cost:8000, pop:15, happy:10, income:100, w:54, h:54, category:'Жильё', capacity:15, spawnNPC:8 },
            shop: { emoji:'🏪', name:'Магазин', cost:800, pop:3, happy:6, income:80, w:42, h:42, category:'Бизнес', capacity:5 },
            factory: { emoji:'🏭', name:'Завод', cost:3000, pop:20, happy:-6, income:300, w:52, h:52, category:'Бизнес', capacity:20, spawnNPC:10 },
            office: { emoji:'🏬', name:'Бизнес-центр', cost:5000, pop:12, happy:4, income:500, w:48, h:60, category:'Бизнес', capacity:15 },
            park: { emoji:'🌳', name:'Парк', cost:300, pop:0, happy:15, income:0, w:46, h:46, category:'Инфраструктура' },
            school: { emoji:'🏫', name:'Школа', cost:4000, pop:5, happy:8, income:-30, w:50, h:48, category:'Инфраструктура', capacity:30 },
            hospital: { emoji:'🏥', name:'Больница', cost:6000, pop:8, happy:12, income:-60, w:52, h:50, category:'Инфраструктура', capacity:20 },
            stadium: { emoji:'🏟️', name:'Стадион', cost:15000, pop:25, happy:20, income:200, w:64, h:56, category:'Инфраструктура', capacity:50 },
            carshop: { emoji:'🚗', name:'Автосалон', cost:10000, pop:2, happy:5, income:150, w:48, h:48, category:'Бизнес' },
            shipyard: { emoji:'🚢', name:'Судостроительный', cost:20000, pop:10, happy:3, income:400, w:56, h:56, category:'Бизнес', needsWater:true },
        };

        // ==================== ЗВЁЗДЫ ====================
        function initSplashStars() {
            const c = document.getElementById('splash-stars');
            c.width = window.innerWidth;
            c.height = window.innerHeight;
            const ctx = c.getContext('2d');
            const stars = Array.from({length:200}, () => ({
                x: Math.random()*c.width, y: Math.random()*c.height,
                r: Math.random()*1.8+0.5, twinkle: Math.random()*Math.PI*2, speed: Math.random()*0.02+0.005,
            }));
            function draw() {
                ctx.clearRect(0,0,c.width,c.height);
                stars.forEach(s=>{ s.twinkle+=s.speed; const a=0.4+Math.sin(s.twinkle)*0.4;
                    ctx.fillStyle=`rgba(255,255,240,${a})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); });
                requestAnimationFrame(draw);
            }
            draw();
        }
        initSplashStars();

        // ==================== ГЕНЕРАЦИЯ ВОДОЁМОВ ====================
        function generateWaterBodies() {
            S.waterBodies = [];
            const count = 10 + Math.floor(Math.random() * 10);
            for (let i = 0; i < count; i++) {
                const centerX = (Math.random() - 0.5) * S.borderSize * 2;
                const centerY = (Math.random() - 0.5) * S.borderSize * 2;
                const baseRadius = 30 + Math.random() * 150;
                const points = [];
                const numPoints = 8 + Math.floor(Math.random() * 14);
                for (let j = 0; j < numPoints; j++) {
                    const angle = (j / numPoints) * Math.PI * 2;
                    const radius = baseRadius * (0.4 + Math.random() * 0.8);
                    points.push({
                        x: centerX + Math.cos(angle) * radius,
                        y: centerY + Math.sin(angle) * radius,
                    });
                }
                const nameList = ['Великий Океан','Северное Море','Южный Залив','Тихое Озеро','Голубая Лагуна','Штормовой Пролив','Солнечная Бухта','Глубокое Водохранилище','Река Извилистая','Озеро Надежды','Море Спокойствия','Залив Приключений'];
                S.waterBodies.push({
                    points: points,
                    name: nameList[Math.floor(Math.random() * nameList.length)],
                    baseRadius: baseRadius,
                });
            }
        }

        function isPointInWater(worldX, worldY) {
            for (let w = 0; w < S.waterBodies.length; w++) {
                const water = S.waterBodies[w];
                let inside = false;
                const points = water.points;
                for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
                    const xi = points[i].x;
                    const yi = points[i].y;
                    const xj = points[j].x;
                    const yj = points[j].y;
                    if ((yi > worldY) !== (yj > worldY)) {
                        const intersectX = (xj - xi) * (worldY - yi) / (yj - yi) + xi;
                        if (worldX < intersectX) {
                            inside = !inside;
                        }
                    }
                }
                if (inside) {
                    return true;
                }
            }
            return false;
        }

        // ==================== МОДАЛЬНОЕ ОКНО ====================
        let modalBuilt = false;
        function buildModalGrid() {
            const grid = document.getElementById('modal-grid');
            if (!modalBuilt) {
                grid.innerHTML = '';
                Object.entries(BT).forEach(([key, info]) => {
                    const div = document.createElement('div');
                    div.className = 'modal-item';
                    div.dataset.type = key;
                    div.innerHTML = `
                        <span class="modal-item-emoji">${info.emoji}</span>
                        <span class="modal-item-name">${info.name}</span>
                        <span class="modal-item-cost"></span>
                        <span style="font-size:0.6em;color:#aaa;" class="modal-item-size"></span>

                    div.addEventListener('click', () => selectModalItem(key));
                    grid.appendChild(div);
                });
                modalBuilt = true;

            const scale = S.buildScale || 1;
            grid.querySelectorAll('.modal-item').forEach(div => {
                const key = div.dataset.type;
                const info = BT[key];
                const cost = getBuildCost(key, scale);
                const size = getBuildSize(key, scale);
                div.querySelector('.modal-item-cost').textContent = `💰${cost.toLocaleString()}`;
                div.querySelector('.modal-item-size').textContent = `${size.w}x${size.h}`;

        function selectModalItem(key) {

        function getBuildCost(type, scale) {
            const info = BT[type];
            if (!info) return 0;
            return Math.floor(info.cost * scale * scale);
        }

        function getBuildSize(type, scale) {
            const info = BT[type];
            if (!info) return {w:48, h:48};
            let w = Math.round(info.w * scale);
            let h = Math.round(info.h * scale);
            if (S.buildRotation === 90 || S.buildRotation === 270) {
                [w, h] = [h, w];
            }
            return {w, h};
        }

        function rotateBuilding() {
            S.buildRotation = (S.buildRotation + 90) % 360;
            const rotNames = {0:'0°', 90:'90°', 180:'180°', 270:'270°'};
            addLog(`🔄 Поворот: ${rotNames[S.buildRotation]}`);

        // ==================== СТРОИТЕЛЬСТВО ====================
        function buildAt(wx, wy) {
            if (!S.selectedType || S.deleteMode || S.selectMode) return false;
            const t = S.selectedType;
            const info = BT[t];
            const scale = S.buildScale || 1;
            const cost = getBuildCost(t, scale);
            const size = getBuildSize(t, scale);
            if (S.money < cost) { addLog('❌ Недостаточно средств! Нужно: 💰'+cost.toLocaleString());
                shakeEl('money-val'); return false; }
            if (Math.abs(wx) > S.borderSize || Math.abs(wy) > S.borderSize) { addLog('⚠️ За границей страны!'); return false; }
            if (info.needsWater && !isPointInWater(wx, wy)) { addLog('⚠️ Судостроительный завод нужно строить на воде!'); return false; }
            if (!info.needsWater && !info.isRoad && !info.isRail && !info.isRoadCurve && isPointInWater(wx, wy)) { addLog('⚠️ Нельзя строить на воде!'); return false; }
            const nb = {
                type: t, x: wx-size.w/2, y: wy-size.h/2, w: size.w, h: size.h,
                scale: scale, rotation: S.buildRotation, placedAt: S.time,
            };
            const allC = [...S.buildings, ...S.roads, ...S.rails];
            const overlap = allC.some(b => rectsOverlap(nb, b, 2));
            if (overlap) { addLog('⚠️ Нельзя строить на другом здании!'); return false; }
            S.money -= cost;
            if (info.isRoad || info.isRoadCurve) S.roads.push(nb);
            else if (info.isRail) S.rails.push(nb);
            else { S.buildings.push(nb);
                S.population += Math.floor(info.pop*scale);
                S.happiness = Math.max(0,Math.min(100,S.happiness+Math.floor(info.happy*scale)));
                if (info.spawnNPC) { spawnNPCsAt(wx, wy, info.spawnNPC); addLog(`👥 +${info.spawnNPC} новых жителей!`); }
            }
            updateUI();
            addLog(`✅ Построено: ${info.emoji} ${info.name} (${size.w}x${size.h}, поворот ${S.buildRotation}°)`);
            spawnParticles(wx, wy, '#f0d060');
            S.buildRotation = 0;
            return true;
        }

        function deleteAt(wx, wy) {
            if (!S.deleteMode) return false;
            const all = [...S.buildings, ...S.roads, ...S.rails];
            const found = all.find(b => wx>=b.x && wx<=b.x+b.w && wy>=b.y && wy<=b.y+b.h);
            if (!found) return false;
            const info = BT[found.type];
            const scale = found.scale||1;
            const refund = Math.floor(getBuildCost(found.type, scale)*0.5);
            S.money += refund;
            if (info?.isRoad || info?.isRoadCurve) S.roads = S.roads.filter(b=>b!==found);
            else if (info?.isRail) S.rails = S.rails.filter(b=>b!==found);
            else { S.buildings = S.buildings.filter(b=>b!==found);
                S.population = Math.max(0,S.population-Math.floor((info?.pop||0)*scale));
                S.happiness = Math.max(0,Math.min(100,S.happiness-Math.floor((info?.happy||0)*scale))); }
            S.cars = S.cars.filter(c=>c.homeRef!==found);
            S.boats = S.boats.filter(b=>b.homeRef!==found);
            updateUI();
            addLog(`🗑️ Снесено: ${info?.emoji||'?'} (возврат +💰${refund.toLocaleString()})`);
            spawnParticles(found.x+found.w/2, found.y+found.h/2, '#f08888');
            return true;
        }

        function rectsOverlap(a, b, margin) {
            return !(a.x+a.w-margin < b.x || a.x > b.x+b.w-margin || a.y+a.h-margin < b.y || a.y > b.y+b.h-margin);
        }

        // ==================== КООРДИНАТЫ ====================
        function worldToScreen(wx, wy) {
            const cx = S.camX - S.canvas.width/2/S.zoom;
            const cy = S.camY - S.canvas.height/2/S.zoom;
            return { x: (wx-cx)*S.zoom, y: (wy-cy)*S.zoom };
        }

        function screenToWorld(sx, sy) {
            const cx = S.camX - S.canvas.width/2/S.zoom;
            const cy = S.camY - S.canvas.height/2/S.zoom;
            return { x: sx/S.zoom+cx, y: sy/S.zoom+cy };
        }

        function getCanvasCoords(e) {
            const rect = S.canvas.getBoundingClientRect();
            return { sx: e.clientX-rect.left, sy: e.clientY-rect.top };
        }

        function getWorldFromEvent(e) {
            const c = getCanvasCoords(e);
            const w = screenToWorld(c.sx, c.sy);
            return { ...c, wx: w.x, wy: w.y };
        }

        function findAt(wx, wy) {
            const all = [...S.buildings, ...S.roads, ...S.rails];
            for (let i=all.length-1; i>=0; i--) {
                const b = all[i];
                if (wx>=b.x && wx<=b.x+b.w && wy>=b.y && wy<=b.y+b.h) return b;
            }
            return null;
        }

        // ==================== ОТРИСОВКА ====================
        function getDayNightAlpha() {
            const h = S.gameHour + S.gameMinute / 60;
            if (h >= 6 && h < 8) return 0.3 - (h - 6) * 0.15;
            if (h >= 8 && h < 17) return 0;
            if (h >= 17 && h < 19) return (h - 17) * 0.2;
            if (h >= 19 && h < 21) return 0.4 + (h - 19) * 0.2;
            if (h >= 21 || h < 5) return 0.7;
            if (h >= 5 && h < 6) return 0.7 - (h - 5) * 0.4;
            return 0;
        }

        function drawGround(ctx) {
            const w=S.canvas.width, h=S.canvas.height;
            const alpha = getDayNightAlpha();
            const grad=ctx.createRadialGradient(w/2,h/2,100,w/2,h/2,Math.max(w,h));
            const r = Math.floor(61 * (1 - alpha));
            const g = Math.floor(90 * (1 - alpha));
            const b = Math.floor(46 * (1 - alpha));
            grad.addColorStop(0,`rgb(${r},${g},${b})`);
            grad.addColorStop(0.6,`rgb(${Math.floor(r*0.7)},${Math.floor(g*0.7)},${Math.floor(b*0.7)})`);
            grad.addColorStop(1,`rgb(${Math.floor(r*0.4)},${Math.floor(g*0.4)},${Math.floor(b*0.4)})`);
            ctx.fillStyle=grad;
            ctx.fillRect(0,0,w,h);
            const gs=S.gridSize, cx=S.camX-w/2/S.zoom, cy=S.camY-h/2/S.zoom;
            const sx=-((cx%gs)+gs)%gs, sy=-((cy%gs)+gs)%gs;
            for (let x=sx; x<w/S.zoom+gs; x+=gs)
                for (let y=sy; y<h/S.zoom+gs; y+=gs) {
                    const worldGX = Math.floor((x+cx)/gs);
                    const worldGY = Math.floor((y+cy)/gs);
                    const seed=Math.sin(worldGX*1000+worldGY)*0.06;
                    ctx.fillStyle=`rgba(255,255,255,${0.02+seed})`;
                    ctx.fillRect(x*S.zoom,y*S.zoom,gs*S.zoom,gs*S.zoom);
                    const flowerSeed = Math.sin(worldGX*500+worldGY*300)*0.5+0.5;
                    if (flowerSeed > 0.85 && !isPointInWater(x+cx+gs/2, y+cy+gs/2)) {
                        ctx.fillStyle = 'rgba(255,255,100,0.3)';
                        ctx.beginPath();
                        ctx.arc(x*S.zoom+gs*S.zoom*0.7, y*S.zoom+gs*S.zoom*0.3, 2*S.zoom, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
            if (alpha > 0) {
                ctx.fillStyle = `rgba(0,0,20,${alpha})`;
                ctx.fillRect(0,0,w,h);
            }
            if (alpha > 0.5) {
                for (let i=0; i<50; i++) {
                    const sx2 = ((i*7919+12345)%w);
                    const sy2 = ((i*6271+12345)%h);
                    const twinkle = Math.sin(S.time*0.003+i)*0.5+0.5;
                    ctx.fillStyle = `rgba(255,255,255,${twinkle*(alpha-0.5)*1.5})`;
                    ctx.beginPath();
                    ctx.arc(sx2, sy2, 1.5, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }

        function drawWater(ctx) {
            for (let w = 0; w < S.waterBodies.length; w++) {
                const water = S.waterBodies[w];
                const points = water.points;
                const alpha = getDayNightAlpha();
                if (points.length < 3) continue;
                ctx.beginPath();
                const firstPoint = worldToScreen(points[0].x, points[0].y);
                ctx.moveTo(firstPoint.x, firstPoint.y);
                for (let i = 1; i < points.length; i++) {
                    const screenPoint = worldToScreen(points[i].x, points[i].y);
                    ctx.lineTo(screenPoint.x, screenPoint.y);
                }
                ctx.closePath();
                let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
                for (let i=0; i<points.length; i++) {
                    if (points[i].x<minX) minX=points[i].x;
                    if (points[i].y<minY) minY=points[i].y;
                    if (points[i].x>maxX) maxX=points[i].x;
                    if (points[i].y>maxY) maxY=points[i].y;
                }
                const centerScreen = worldToScreen((minX+maxX)/2, (minY+maxY)/2);
                const waterGrad = ctx.createRadialGradient(centerScreen.x, centerScreen.y, 0, centerScreen.x, centerScreen.y, water.baseRadius*S.zoom);
                waterGrad.addColorStop(0, `rgba(30,100,180,${0.8-alpha*0.3})`);
                waterGrad.addColorStop(0.5, `rgba(20,80,160,${0.75-alpha*0.3})`);
                waterGrad.addColorStop(1, `rgba(10,50,130,${0.8-alpha*0.3})`);
                ctx.fillStyle = waterGrad;
                ctx.fill();
                const waveTime = S.time * 0.02;
                for (let i = 0; i < points.length; i++) {
                    const p1 = points[i];
                    const p2 = points[(i+1)%points.length];
                    const midX = (p1.x+p2.x)/2;
                    const midY = (p1.y+p2.y)/2;
                    const screenMid = worldToScreen(midX, midY);
                    const waveOffset = Math.sin(waveTime+i*0.5)*5*S.zoom;
                    ctx.fillStyle = 'rgba(100,180,240,0.3)';
                    ctx.beginPath();
                    ctx.arc(screenMid.x+waveOffset, screenMid.y, 4*S.zoom, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.strokeStyle = 'rgba(150,210,255,0.5)';
                ctx.lineWidth = 2*S.zoom;
                ctx.stroke();
                if (water.name && water.baseRadius > 50) {
                    const nameScreen = worldToScreen((minX+maxX)/2, (minY+maxY)/2);
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.font = `${Math.min(16,12*S.zoom)}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(water.name, nameScreen.x, nameScreen.y);
                }
            }
        }

        function drawBorder(ctx) {
            const bs = S.borderSize;
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = Math.max(2,3*S.zoom);
            ctx.setLineDash([10*S.zoom,6*S.zoom]);
            ctx.beginPath();
            const segments = 32;
            for (let i=0; i<=segments; i++) {
                const angle = (i/segments)*Math.PI*2;
                const wobble = Math.sin(angle*5+S.time*0.001)*15 + Math.cos(angle*3)*10;
                const r = bs + wobble;
                const wx = Math.cos(angle)*r;
                const wy = Math.sin(angle)*r;
                const p = worldToScreen(wx, wy);
                if (i===0) ctx.moveTo(p.x,p.y);
                else ctx.lineTo(p.x,p.y);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.setLineDash([]);
            const flags = ['🚩','🚩','🚩','🚩'];
            for (let i=0; i<4; i++) {
                const angle = i*Math.PI/2-Math.PI/4;
                const p = worldToScreen(Math.cos(angle)*bs, Math.sin(angle)*bs);
                ctx.font = `${16*S.zoom}px serif`;
                ctx.textAlign = 'center';
                ctx.fillText(flags[i], p.x, p.y-10*S.zoom);
            }
            const pTable = worldToScreen(bs+30, 0);
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(pTable.x-40*S.zoom, pTable.y-20*S.zoom, 80*S.zoom, 35*S.zoom);
            ctx.fillStyle = '#f0d060';
            ctx.font = `${12*S.zoom}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('📏 Расширить', pTable.x, pTable.y-5*S.zoom);
            ctx.fillText(`💰${S.borderExpandCost.toLocaleString()}`, pTable.x, pTable.y+15*S.zoom);
        }

        function expandBorder() {
            const cost = S.borderExpandCost;
            if (S.money < cost) { addLog('❌ Недостаточно средств!'); return; }
            S.money -= cost;
            S.borderSize += 200;
            S.borderExpandCost = Math.floor(S.borderExpandCost * 2);
            addLog('📏 Граница расширена! Теперь: '+S.borderSize+'м');
            updateUI();
        }

        function drawGrid(ctx) {
            const w=S.canvas.width, h=S.canvas.height, gs=S.gridSize;
            const cx=S.camX-w/2/S.zoom, cy=S.camY-h/2/S.zoom;
            const sx=-((cx%gs)+gs)%gs, sy=-((cy%gs)+gs)%gs;
            ctx.strokeStyle='rgba(255,255,255,0.06)';
            ctx.lineWidth=1;
            ctx.beginPath();
            for (let x=sx; x<w/S.zoom+gs; x+=gs) { ctx.moveTo(x*S.zoom,0);
                ctx.lineTo(x*S.zoom,h); }
            for (let y=sy; y<h/S.zoom+gs; y+=gs) { ctx.moveTo(0,y*S.zoom);
                ctx.lineTo(w,y*S.zoom); }
            ctx.stroke();
        }

        function drawRoad(ctx, r, info) {
            const p=worldToScreen(r.x, r.y), w=r.w*S.zoom, h=r.h*S.zoom;
            ctx.save();
            const cx=p.x+w/2, cy=p.y+h/2;
            ctx.translate(cx, cy);
            if (r.rotation) ctx.rotate(r.rotation*Math.PI/180);
            ctx.translate(-cx, -cy);
            if (info.isRoadCurve) {
                ctx.fillStyle='#444444';
                ctx.fillRect(p.x,p.y,w,h);
                ctx.strokeStyle='#ffff88';
                ctx.lineWidth=Math.max(1,2*S.zoom);
                ctx.setLineDash([8*S.zoom,10*S.zoom]);
                ctx.beginPath();
                ctx.arc(p.x+w,p.y,w*0.7,0,Math.PI/2);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle='#666666';
                const bw=Math.max(2,3*S.zoom);
                ctx.fillRect(p.x,p.y,w,bw);
                ctx.fillRect(p.x,p.y+h-bw,w,bw);
                ctx.fillRect(p.x,p.y,bw,h);
                ctx.fillRect(p.x+w-bw,p.y,bw,h);
            } else if (info.isRoad) {
                ctx.fillStyle='#444444';
                ctx.fillRect(p.x,p.y,w,h);
                ctx.fillStyle='#666666';
                const bw=Math.max(2,3*S.zoom);
                ctx.fillRect(p.x,p.y,w,bw);
                ctx.fillRect(p.x,p.y+h-bw,w,bw);
                ctx.fillRect(p.x,p.y,bw,h);
                ctx.fillRect(p.x+w-bw,p.y,bw,h);
                ctx.strokeStyle='#ffff88';
                ctx.lineWidth=Math.max(1,2*S.zoom);
                ctx.setLineDash([10*S.zoom,14*S.zoom]);
                ctx.beginPath();
                ctx.moveTo(p.x+w/2,p.y);
                ctx.lineTo(p.x+w/2,p.y+h);
                ctx.stroke();
                ctx.setLineDash([]);
            } else {
                ctx.fillStyle='#8B7355';
                ctx.fillRect(p.x,p.y,w,h);
                ctx.fillStyle='#5c4030';
                const sh=Math.max(3,4*S.zoom), sg=Math.max(5,8*S.zoom);
                for (let i=0; i<h; i+=sg) ctx.fillRect(p.x+2*S.zoom,p.y+i,w-4*S.zoom,sh);
                ctx.strokeStyle='#cccccc';
                ctx.lineWidth=Math.max(1.5,2.5*S.zoom);
                ctx.beginPath();
                const rx=p.x+Math.max(6,8*S.zoom), rx2=p.x+w-Math.max(6,8*S.zoom);
                ctx.moveTo(rx,p.y);
                ctx.lineTo(rx,p.y+h);
                ctx.moveTo(rx2,p.y);
                ctx.lineTo(rx2,p.y+h);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawBuildingShape(ctx, b, info) {
            const p=worldToScreen(b.x, b.y), w=b.w*S.zoom, h=b.h*S.zoom, t=b.type;
            ctx.save();
            const cx=p.x+w/2, cy=p.y+h/2;
            ctx.translate(cx, cy);
            if (b.rotation) ctx.rotate(b.rotation*Math.PI/180);
            ctx.translate(-cx, -cy);
            ctx.fillStyle='rgba(0,0,0,0.4)';
            ctx.fillRect(p.x+3*S.zoom,p.y+3*S.zoom,w,h);
            if (t==='house') {
                ctx.fillStyle='#f5deb3';
                ctx.fillRect(p.x,p.y,w,h-12*S.zoom);
                ctx.fillStyle='#c0392b';
                ctx.beginPath();
                ctx.moveTo(p.x-4*S.zoom,p.y);
                ctx.lineTo(p.x+w/2,p.y-16*S.zoom);
                ctx.lineTo(p.x+w+4*S.zoom,p.y);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle='#87ceeb';
                ctx.fillRect(p.x+7*S.zoom,p.y+8*S.zoom,10*S.zoom,10*S.zoom);
                ctx.fillRect(p.x+w-17*S.zoom,p.y+8*S.zoom,10*S.zoom,10*S.zoom);
                ctx.fillStyle='#8B4513';
                ctx.fillRect(p.x+w/2-6*S.zoom,p.y+h-18*S.zoom,12*S.zoom,18*S.zoom);
            } else if (t==='apartment') {
                const floors=Math.max(4,Math.floor(8*(b.scale||1))), fh=h/floors;
                for (let i=0; i<floors; i++) {
                    ctx.fillStyle=i%2===0?'#d0dce8':'#bcc8d8';
                    ctx.fillRect(p.x,p.y+i*fh,w,fh);
                    ctx.fillStyle='#87ceeb';
                    const ww=Math.max(3,8*S.zoom), wh=Math.max(3,fh-6*S.zoom);
                    const cols=Math.min(3,Math.floor(w/(ww+7*S.zoom)));
                    for (let j=0; j<cols; j++) ctx.fillRect(p.x+5*S.zoom+j*(ww+7*S.zoom),p.y+i*fh+3*S.zoom,ww,wh);
                }
            } else if (t==='mansion') {
                ctx.fillStyle='#f0e6d3';
                ctx.fillRect(p.x,p.y+10*S.zoom,w,h-10*S.zoom);
                ctx.fillStyle='#d4af37';
                ctx.fillRect(p.x+8*S.zoom,p.y,w-16*S.zoom,24*S.zoom);
                ctx.fillStyle='#c9972e';
                ctx.beginPath();
                ctx.arc(p.x+w/2,p.y,14*S.zoom,Math.PI,0);
                ctx.fill();
                ctx.fillStyle='#e8dcc8';
                ctx.fillRect(p.x+4*S.zoom,p.y+24*S.zoom,6*S.zoom,h-14*S.zoom);
                ctx.fillRect(p.x+w-10*S.zoom,p.y+24*S.zoom,6*S.zoom,h-14*S.zoom);
            } else if (t==='factory') {
                ctx.fillStyle='#778899';
                ctx.fillRect(p.x,p.y+12*S.zoom,w,h-12*S.zoom);
                ctx.fillStyle='#555';
                const chm=Math.min(3,Math.floor((b.scale||1)*2));
                for (let i=0; i<chm; i++) ctx.fillRect(p.x+8*S.zoom+i*(w/chm),p.y-16*S.zoom,8*S.zoom,28*S.zoom);
                const so=Math.sin(S.time*0.05+b.x)*3*S.zoom;
                for (let i=0; i<chm; i++) {
                    ctx.fillStyle='rgba(180,180,180,0.5)';
                    ctx.beginPath();
                    ctx.arc(p.x+12*S.zoom+i*(w/chm)+so,p.y-20*S.zoom-i*4*S.zoom,(6+i*2)*S.zoom,0,Math.PI*2);
                    ctx.fill();
                }
            } else if (t==='office') {
                const floors=Math.max(6,Math.floor(12*(b.scale||1))), fh=h/floors;
                for (let i=0; i<floors; i++) {
                    ctx.fillStyle=i%2===0?'#a8d4f0':'#8ab8d8';
                    ctx.fillRect(p.x,p.y+i*fh,w,fh);
                    ctx.fillStyle='#ffffff';
                    const ww=Math.max(3,7*S.zoom), wh=Math.max(2,fh-4*S.zoom);
                    const cols=Math.min(4,Math.floor(w/(ww+4*S.zoom)));
                    for (let j=0; j<cols; j++) ctx.fillRect(p.x+3*S.zoom+j*(ww+4*S.zoom),p.y+i*fh+2*S.zoom,ww,wh);
                }
            } else if (t==='shop') {
                ctx.fillStyle='#ffe4b5';
                ctx.fillRect(p.x,p.y,w,h);
                ctx.fillStyle='#ff6347';
                ctx.fillRect(p.x+2*S.zoom,p.y,w-4*S.zoom,10*S.zoom);
                ctx.fillStyle='#ffffff';
                ctx.fillRect(p.x+4*S.zoom,p.y+14*S.zoom,w-8*S.zoom,h-28*S.zoom);
                ctx.fillStyle='#8B4513';
                ctx.fillRect(p.x+w/2-7*S.zoom,p.y+h-12*S.zoom,14*S.zoom,10*S.zoom);
            } else if (t==='park') {
                ctx.fillStyle='#5a8a5a';
                ctx.fillRect(p.x,p.y,w,h);
                [
                    [0.2,0.25],
                    [0.5,0.2],
                    [0.8,0.3],
                    [0.3,0.6],
                    [0.7,0.65],
                    [0.5,0.75]
                ].forEach(([tx,ty])=>{
                    const tx2=p.x+tx*w, ty2=p.y+ty*h;
                    ctx.fillStyle='#3d2b1f';
                    ctx.fillRect(tx2-2*S.zoom,ty2,4*S.zoom,12*S.zoom);
                    ctx.fillStyle='#2d6e2d';
                    ctx.beginPath();
                    ctx.arc(tx2,ty2-2*S.zoom,8*S.zoom,0,Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle='#3d8e3d';
                    ctx.beginPath();
                    ctx.arc(tx2,ty2-6*S.zoom,7*S.zoom,0,Math.PI*2);
                    ctx.fill();
                });
                ctx.fillStyle='#4a90c8';
                ctx.beginPath();
                ctx.ellipse(p.x+w*0.5,p.y+h*0.45,14*S.zoom,8*S.zoom,0,0,Math.PI*2);
                ctx.fill();
            } else if (t==='school') {
                ctx.fillStyle='#d4a574';
                ctx.fillRect(p.x,p.y+6*S.zoom,w,h-6*S.zoom);
                ctx.fillStyle='#c0392b';
                ctx.fillRect(p.x-2*S.zoom,p.y,w+4*S.zoom,12*S.zoom);
                ctx.fillStyle='#87ceeb';
                for (let i=0; i<4; i++) ctx.fillRect(p.x+5*S.zoom+i*11*S.zoom,p.y+18*S.zoom,7*S.zoom,8*S.zoom);
                ctx.fillStyle='#8B4513';
                ctx.fillRect(p.x+w/2-5*S.zoom,p.y+h-14*S.zoom,10*S.zoom,14*S.zoom);
            } else if (t==='hospital') {
                ctx.fillStyle='#f8f8f8';
                ctx.fillRect(p.x,p.y,w,h);
                ctx.fillStyle='#e74c3c';
                ctx.fillRect(p.x+w/2-10*S.zoom,p.y,20*S.zoom,14*S.zoom);
                ctx.fillStyle='#ffffff';
                ctx.fillRect(p.x+w/2-3*S.zoom,p.y+2*S.zoom,6*S.zoom,10*S.zoom);
                ctx.fillRect(p.x+w/2-8*S.zoom,p.y+6*S.zoom,16*S.zoom,3*S.zoom);
                ctx.fillStyle='#87ceeb';
                for (let i=0; i<3; i++) for (let j=0; j<3; j++) ctx.fillRect(p.x+5*S.zoom+j*16*S.zoom,p.y+18*S.zoom+i*12*S.zoom,10*S.zoom,8*S.zoom);
            } else if (t==='stadium') {
                ctx.fillStyle='#d0d0d0';
                ctx.fillRect(p.x,p.y,w,h);
                ctx.fillStyle='#3a8a3a';
                ctx.beginPath();
                ctx.ellipse(p.x+w/2,p.y+h/2,w/2-4*S.zoom,h/2-4*S.zoom,0,0,Math.PI*2);
                ctx.fill();
                ctx.strokeStyle='#ffffff';
                ctx.lineWidth=1;
                ctx.stroke();
                ctx.strokeStyle='#555';
                ctx.lineWidth=2*S.zoom;
                ctx.beginPath();
                ctx.arc(p.x+w/2,p.y+h/2,10*S.zoom,0,Math.PI*2);
                ctx.stroke();
            } else if (t==='carshop') {
                ctx.fillStyle='#e0e0e0';
                ctx.fillRect(p.x,p.y,w,h);
                ctx.fillStyle='#ff4444';
                ctx.fillRect(p.x+2*S.zoom,p.y,w-4*S.zoom,6*S.zoom);
                ctx.fillStyle='#ffffff';
                ctx.fillRect(p.x+4*S.zoom,p.y+10*S.zoom,w-8*S.zoom,h-22*S.zoom);
                ctx.fillStyle='#333333';
                ctx.font=`${14*S.zoom}px serif`;
                ctx.textAlign='center';
                ctx.fillText('🚗',p.x+w*0.3,p.y+h*0.6);
                ctx.fillText('🚙',p.x+w*0.7,p.y+h*0.6);
            } else if (t==='shipyard') {
                ctx.fillStyle='#708090';
                ctx.fillRect(p.x,p.y,w,h);
                ctx.fillStyle='#4682B4';
                ctx.fillRect(p.x,p.y,w,8*S.zoom);
                ctx.fillStyle='#ffffff';
                ctx.fillRect(p.x+4*S.zoom,p.y+12*S.zoom,w-8*S.zoom,h-20*S.zoom);
                ctx.fillStyle='#333333';
                ctx.font=`${16*S.zoom}px serif`;
                ctx.textAlign='center';
                ctx.fillText('🚢',p.x+w*0.5,p.y+h*0.55);
                ctx.fillStyle='#ffd700';
                ctx.fillRect(p.x+2*S.zoom,p.y+h-6*S.zoom,w-4*S.zoom,4*S.zoom);
            }
            if (S.hovered===b) {
                ctx.strokeStyle='#ffd700';
                ctx.lineWidth=3*S.zoom;
                ctx.strokeRect(p.x-2*S.zoom,p.y-2*S.zoom,w+4*S.zoom,h+4*S.zoom);
                ctx.strokeStyle='rgba(255,215,0,0.3)';
                ctx.lineWidth=7*S.zoom;
                ctx.strokeRect(p.x-5*S.zoom,p.y-5*S.zoom,w+10*S.zoom,h+10*S.zoom);
            }
            ctx.restore();
        }

        function drawPeople(ctx) {
            S.people.forEach(p=>{
                if (p.hasCar && p.carRef) return;
                if (p.hasBoat && p.boatRef) return;
                const wp=worldToScreen(p.x,p.y);
                if (wp.x<-30||wp.x>S.canvas.width+30||wp.y<-30||wp.y>S.canvas.height+30) return;
                const sz=p.size*S.zoom;
                ctx.fillStyle='rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(wp.x,wp.y+sz*0.8,sz*0.8,sz*0.3,0,0,Math.PI*2);
                ctx.fill();
                ctx.fillStyle=p.color;
                ctx.beginPath();
                ctx.arc(wp.x,wp.y-sz*0.5,sz*0.6,0,Math.PI*2);
                ctx.fill();
                ctx.fillStyle=`hsl(${(parseInt(p.color.match(/\d+/)?.[0]||0)+30)%360},50%,55%)`;
                ctx.fillRect(wp.x-sz*0.4,wp.y-sz*0.2,sz*0.8,sz*0.9);
                ctx.fillStyle='#fff';
                ctx.beginPath();
                ctx.arc(wp.x-sz*0.2,wp.y-sz*0.6,sz*0.18,0,Math.PI*2);
                ctx.arc(wp.x+sz*0.2,wp.y-sz*0.6,sz*0.18,0,Math.PI*2);
                ctx.fill();
                ctx.fillStyle='#000';
                ctx.beginPath();
                ctx.arc(wp.x-sz*0.15,wp.y-sz*0.6,sz*0.08,0,Math.PI*2);
                ctx.arc(wp.x+sz*0.25,wp.y-sz*0.6,sz*0.08,0,Math.PI*2);
                ctx.fill();
            });
        }

        function drawCars(ctx) {
            S.cars.forEach(car=>{
                const p=worldToScreen(car.x,car.y);
                if (p.x<-30||p.x>S.canvas.width+30||p.y<-30||p.y>S.canvas.height+30) return;
                const sz=7*S.zoom;
                ctx.fillStyle=car.color;
                ctx.fillRect(p.x-sz,p.y-sz/2,sz*2,sz);
                ctx.fillStyle='#333';
                ctx.fillRect(p.x-sz+1.5*S.zoom,p.y-sz/2-1.5*S.zoom,sz*0.5,sz+3*S.zoom);
                ctx.fillStyle='#111';
                [
                    [-sz*0.6,-sz/2],
                    [sz*0.6,-sz/2],
                    [-sz*0.6,sz/2],
                    [sz*0.6,sz/2]
                ].forEach(([dx,dy])=>{
                    ctx.beginPath();
                    ctx.arc(p.x+dx,p.y+dy,2.5*S.zoom,0,Math.PI*2);
                    ctx.fill();
                });
                ctx.fillStyle='#ffff88';
                ctx.beginPath();
                ctx.arc(p.x+sz,p.y,1.5*S.zoom,0,Math.PI*2);
                ctx.fill();
            });
        }

        function drawBoats(ctx) {
            S.boats.forEach(boat=>{
                const p=worldToScreen(boat.x,boat.y);
                if (p.x<-30||p.x>S.canvas.width+30||p.y<-30||p.y>S.canvas.height+30) return;
                const sz=8*S.zoom;
                ctx.fillStyle=boat.color;
                ctx.beginPath();
                ctx.ellipse(p.x,p.y,sz,sz*0.4,0,0,Math.PI*2);
                ctx.fill();
                ctx.fillStyle='#fff';
                ctx.fillRect(p.x-sz*0.3,p.y-sz*0.6,sz*0.6,sz*0.5);
                ctx.strokeStyle='#333';
                ctx.lineWidth=1;
                ctx.strokeRect(p.x-sz*0.3,p.y-sz*0.6,sz*0.6,sz*0.5);
            });
        }

        function drawWeather(ctx) {
            const alpha = getDayNightAlpha();
            if (S.weather==='rainy'||S.weather==='stormy') {
                S.raindrops.forEach(d=>{
                    const p=worldToScreen(d.x,d.y);
                    ctx.strokeStyle=`rgba(100,150,255,${0.6-alpha*0.3})`;
                    ctx.lineWidth=1;
                    ctx.beginPath();
                    ctx.moveTo(p.x,p.y);
                    ctx.lineTo(p.x-d.vx*2,p.y+8*S.zoom);
                    ctx.stroke();
                });
            }
            if (S.weather==='snowy') {
                S.snowflakes.forEach(sf=>{
                    const p=worldToScreen(sf.x,sf.y);
                    ctx.fillStyle=`rgba(255,255,255,${0.8-alpha*0.2})`;
                    ctx.beginPath();
                    ctx.arc(p.x,p.y,sf.size*S.zoom,0,Math.PI*2);
                    ctx.fill();
                });
            }
        }

        function drawParticles(ctx) {
            S.particles=S.particles.filter(p=>p.life>0);
            S.particles.forEach(p=>{
                const wp=worldToScreen(p.x,p.y);
                ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${p.life})`;
                ctx.beginPath();
                ctx.arc(wp.x,wp.y,p.size*S.zoom,0,Math.PI*2);
                ctx.fill();
            });
        }

        function gameLoop(ts) {
            S.time=ts;
            const ctx=S.ctx, cv=S.canvas;
            if (!cv||!ctx) { requestAnimationFrame(gameLoop); return; }
            ctx.clearRect(0,0,cv.width,cv.height);

            S.gameMinute += 0.05;
            if (S.gameMinute>=60) { S.gameMinute=0;
                S.gameHour++; if (S.gameHour>=24) S.gameHour=0; }
            S.weatherTimer++;
            if (S.weatherTimer>=S.weatherDuration) {
                S.weatherTimer=0;
                S.weatherDuration=500+Math.random()*1500;
                const weathers=['sunny','sunny','cloudy','cloudy','rainy','rainy','stormy','snowy'];
                S.weather=weathers[Math.floor(Math.random()*weathers.length)];
            }
            if (S.weather==='rainy'||S.weather==='stormy') {
                if (S.raindrops.length<60) S.raindrops.push({x:(Math.random()-0.5)*S.borderSize*2,y:(Math.random()-0.5)*S.borderSize*2,vx:2,vy:8});
                S.raindrops.forEach(d=>{d.x+=d.vx;
                    d.y+=d.vy; if (d.y>S.borderSize) d.y=-S.borderSize;});
            } else S.raindrops=[];
            if (S.weather==='snowy') {
                if (S.snowflakes.length<40) S.snowflakes.push({x:(Math.random()-0.5)*S.borderSize*2,y:(Math.random()-0.5)*S.borderSize*2,vx:(Math.random()-0.5)*0.5,vy:1+Math.random()*2,size:1+Math.random()*3});
                S.snowflakes.forEach(sf=>{sf.x+=sf.vx;
                    sf.y+=sf.vy; if (sf.y>S.borderSize) sf.y=-S.borderSize;});
            } else S.snowflakes=[];

            drawGround(ctx);
            drawWater(ctx);
            drawGrid(ctx);
            drawBorder(ctx);
            S.roads.forEach(r=>drawRoad(ctx,r,BT[r.type]||BT.road));
            S.rails.forEach(r=>drawRoad(ctx,r,BT.rail));
            S.buildings.forEach(b=>{ const info=BT[b.type]; if (info) drawBuildingShape(ctx,b,info); });
            updateNPCs();
            drawPeople(ctx);
            drawCars(ctx);
            drawBoats(ctx);
            drawWeather(ctx);
            drawParticles(ctx);

            if (S.selectedType && !S.dragging && !S.deleteMode && !S.selectMode) {
                const info=BT[S.selectedType];
                const size=getBuildSize(S.selectedType, S.buildScale||1);
                const sw=screenToWorld(S.mx,S.my);
                const sx2=sw.x-size.w/2, sy2=sw.y-size.h/2;
                const pp=worldToScreen(sx2,sy2);
                ctx.fillStyle='rgba(255,255,255,0.25)';
                ctx.fillRect(pp.x,pp.y,size.w*S.zoom,size.h*S.zoom);
                ctx.strokeStyle='rgba(255,255,255,0.8)';
                ctx.setLineDash([5*S.zoom,5*S.zoom]);
                ctx.lineWidth=2*S.zoom;
                ctx.strokeRect(pp.x,pp.y,size.w*S.zoom,size.h*S.zoom);
                ctx.setLineDash([]);
                const fs=Math.max(14,20*S.zoom);
                ctx.font=`${fs}px serif`;
                ctx.textAlign='center';
                ctx.textBaseline='middle';
                ctx.save();
                const cx2=pp.x+size.w*S.zoom/2, cy2=pp.y+size.h*S.zoom/2;
                ctx.translate(cx2,cy2);
                if (S.buildRotation) ctx.rotate(S.buildRotation*Math.PI/180);
                ctx.fillText(info.emoji,0,0);
                ctx.restore();
            }

            S.incomeTimer+=16;
            if (S.incomeTimer>=3000) {
                S.incomeTimer=0;
                let total=0;
                S.buildings.forEach(b=>{ total+=Math.floor((BT[b.type]?.income||0)*(b.scale||1)); });
                S.roads.forEach(()=>{ total+=5; });
                S.rails.forEach(()=>{ total+=20; });
                S.cars.forEach(()=>{ total+=10; });
                S.boats.forEach(()=>{ total+=30; });
                S.money+=total;
                if (S.buildings.length>0) { S.happiness+=(Math.random()-0.47)*0.4;
                    S.happiness=Math.max(0,Math.min(100,S.happiness)); }
                const totalCapacity=S.buildings.reduce((sum,b)=>sum+Math.floor((BT[b.type]?.capacity||0)*(b.scale||1)),0);
                if (S.population<totalCapacity&&S.happiness>40&&S.people.length<80) {
                    S.people.push({x:(Math.random()-0.5)*S.borderSize,y:(Math.random()-0.5)*S.borderSize,vx:(Math.random()-0.5)*1.2,vy:(Math.random()-0.5)*1.2,color:`hsl(${Math.random()*360},40%,65%)`,size:4+Math.random()*3,target:null,state:'walking',stateTimer:Math.random()*200,hasCar:false,carRef:null,hasBoat:false,boatRef:null});
                    S.population++;
                }
                updateUI();
            }
            requestAnimationFrame(gameLoop);
        }

        // ==================== ОБНОВЛЕНИЕ NPC ====================
        function updateNPCs() {
            S.people.forEach(p=>{
                if (p.hasCar&&p.carRef) { p.x=p.carRef.x;
                    p.y=p.carRef.y; return; }
                if (p.hasBoat&&p.boatRef) { p.x=p.boatRef.x;
                    p.y=p.boatRef.y; return; }
                p.stateTimer--;
                if (p.stateTimer<=0) {
                    p.stateTimer=80+Math.random()*300;
                    const targets=S.buildings.filter(b=>BT[b.type]&&!BT[b.type].isRoad&&!BT[b.type].isRail&&!BT[b.type].isRoadCurve);
                    if (targets.length>0&&Math.random()<0.7) { p.target=targets[Math.floor(Math.random()*targets.length)];
                        p.state='visiting'; }
                    else { p.target=null;
                        p.state='walking';
                        p.vx=(Math.random()-0.5)*1.5;
                        p.vy=(Math.random()-0.5)*1.5; }
                }
                if (p.state==='visiting'&&p.target) {
                    const dx=(p.target.x+p.target.w/2)-p.x, dy=(p.target.y+p.target.h/2)-p.y;
                    const dist=Math.sqrt(dx*dx+dy*dy);
                    if (dist<12) { p.state='inside';
                        p.stateTimer=100+Math.random()*300; }
                    else { const sp=1.5;
                        p.vx=dx/dist*sp;
                        p.vy=dy/dist*sp; }
                } else if (p.state==='inside') { p.vx=0;
                    p.vy=0; }
                p.x+=p.vx;
                p.y+=p.vy; if (Math.abs(p.x)>S.borderSize) p.vx*=-1; if (Math.abs(p.y)>S.borderSize) p.vy*=-1;
            });
            S.cars.forEach(car=>{ if (car.parked) return;
                car.x+=car.vx;
                car.y+=car.vy; let onRoad=false; for (let i=0;i<S.roads.length;i++) { const r=S.roads[i]; if (car.x>=r.x&&car.x<=r.x+r.w&&car.y>=r.y&&car.y<=r.y+r.h) { onRoad=true; break; } } if (!onRoad) { let bestRoad=null,
                        bestDist=99999; for (let i=0;i<S.roads.length;i++) { const r=S.roads[i]; const rx=r.x+r.w/2,
                            ry=r.y+r.h/2; const d=Math.hypot(car.x-rx,car.y-ry); if (d<bestDist) { bestDist=d;
                            bestRoad=r; } } if (bestRoad) { const rx=bestRoad.x+bestRoad.w/2,
                            ry=bestRoad.y+bestRoad.h/2; const dx=rx-car.x, dy=ry-car.y; const d=Math.sqrt(dx*dx+dy*dy); if (d>0) { car.vx=dx/d*2;
                            car.vy=dy/d*2; } } } if (Math.abs(car.x)>S.borderSize||Math.abs(car.y)>S.borderSize) { car.vx*=-1;
                    car.vy=(Math.random()-0.5)*2; } if (Math.random()<0.005) { const person=S.people.find(p=>p.carRef===car); if (person&&Math.random()<0.3) { person.hasCar=false;
                        person.carRef=null;
                        person.x=car.x;
                        person.y=car.y;
                        car.parked=true;
                        setTimeout(()=>{car.parked=false; if (Math.random()<0.5) { const np=S.people.find(p=>!p.hasCar&&!p.hasBoat); if (np) { np.hasCar=true;
                                    np.carRef=car; } } },2000+Math.random()*3000); } } });
            S.boats.forEach(boat=>{ if (boat.parked) return;
                boat.x+=boat.vx;
                boat.y+=boat.vy; let onWater=isPointInWater(boat.x,boat.y); if (!onWater) { let bestW=null,
                        bestDist=99999; for (let i=0;i<S.waterBodies.length;i++) { const w=S.waterBodies[i]; let minX=Infinity,
                            minY=Infinity, maxX=-Infinity, maxY=-Infinity; for (let j=0;j<w.points.length;j++) { if (w.points[j].x<minX) minX=w.points[j].x; if (w.points[j].y<minY) minY=w.points[j].y; if (w.points[j].x>maxX) maxX=w.points[j].x; if (w.points[j].y>maxY) maxY=w.points[j].y; } const wx=(minX+maxX)/2,
                            wy=(minY+maxY)/2; const d=Math.hypot(boat.x-wx,boat.y-wy); if (d<bestDist) { bestDist=d;
                            bestW=w; } } if (bestW) { let minX=Infinity,
                            minY=Infinity, maxX=-Infinity, maxY=-Infinity; for (let j=0;j<bestW.points.length;j++) { if (bestW.points[j].x<minX) minX=bestW.points[j].x; if (bestW.points[j].y<minY) minY=bestW.points[j].y; if (bestW.points[j].x>maxX) maxX=bestW.points[j].x; if (bestW.points[j].y>maxY) maxY=bestW.points[j].y; } const wx=(minX+maxX)/2,
                            wy=(minY+maxY)/2; const dx=wx-boat.x, dy=wy-boat.y; const d=Math.sqrt(dx*dx+dy*dy); if (d>0) { boat.vx=dx/d*2;
                            boat.vy=dy/d*2; } } } if (Math.random()<0.01) { boat.vx=(Math.random()-0.5)*2;
                    boat.vy=(Math.random()-0.5)*2; } if (Math.random()<0.003) { const person=S.people.find(p=>p.boatRef===boat); if (person&&Math.random()<0.2) { person.hasBoat=false;
                        person.boatRef=null;
                        person.x=boat.x;
                        person.y=boat.y;
                        boat.parked=true;
                        setTimeout(()=>{boat.parked=false; if (Math.random()<0.5) { const np=S.people.find(p=>!p.hasCar&&!p.hasBoat); if (np) { np.hasBoat=true;
                                    np.boatRef=boat; } } },3000+Math.random()*5000); } } });
            if (S.buildings.some(b=>b.type==='carshop')&&S.roads.length>0&&S.cars.length<12&&Math.random()<0.005) { const shop=S.buildings.find(b=>b.type==='carshop'); if (shop) { const car={x:shop.x+shop.w/2,y:shop.y+shop.h/2,vx:2,vy:0,color:`hsl(${Math.random()*360},70%,55%)`,parked:false,homeRef:shop};
                S.cars.push(car); const person=S.people.find(p=>!p.hasCar&&!p.hasBoat); if (person) { person.hasCar=true;
                    person.carRef=car; } } }
            if (S.buildings.some(b=>b.type==='shipyard')&&S.waterBodies.length>0&&S.boats.length<6&&Math.random()<0.003) { const yard=S.buildings.find(b=>b.type==='shipyard'); if (yard) { let nearestWater=null; for (let i=0;i<S.waterBodies.length;i++) { const w=S.waterBodies[i]; let minX=Infinity,
                        minY=Infinity, maxX=-Infinity, maxY=-Infinity; for (let j=0;j<w.points.length;j++) { if (w.points[j].x<minX) minX=w.points[j].x; if (w.points[j].y<minY) minY=w.points[j].y; if (w.points[j].x>maxX) maxX=w.points[j].x; if (w.points[j].y>maxY) maxY=w.points[j].y; } if (yard.x>=minX&&yard.x<=maxX&&yard.y>=minY&&yard.y<=maxY) { nearestWater=w; break; } } if (nearestWater) { let minX=Infinity,
                        minY=Infinity, maxX=-Infinity, maxY=-Infinity; for (let j=0;j<nearestWater.points.length;j++) { if (nearestWater.points[j].x<minX) minX=nearestWater.points[j].x; if (nearestWater.points[j].y<minY) minY=nearestWater.points[j].y; if (nearestWater.points[j].x>maxX) maxX=nearestWater.points[j].x; if (nearestWater.points[j].y>maxY) maxY=nearestWater.points[j].y; } const boat={x:(minX+maxX)/2,y:(minY+maxY)/2,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,color:`hsl(${Math.random()*360},50%,50%)`,parked:false,homeRef:yard};
                S.boats.push(boat); const person=S.people.find(p=>!p.hasBoat&&!p.hasCar); if (person) { person.hasBoat=true;
                    person.boatRef=boat; } } } }
        }

        function spawnParticles(wx,wy,colorHex) {
            const hex=colorHex||'#f0d060';
            const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
            for (let i=0; i<25; i++) S.particles.push({ x:wx,y:wy, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5-4, life:1,
                size:Math.random()*5+2, r,g,b });
        }

        // ==================== СОБЫТИЯ ====================
        document.addEventListener('mousemove', e=>{
            if (!S.canvas||!S.countryName) return;
            const c=getCanvasCoords(e);
            S.mx=c.sx;
            S.my=c.sy;
            if (S.dragging) { S.camX-=(e.clientX-S.dragSX)/S.zoom;
                S.camY-=(e.clientY-S.dragSY)/S.zoom;
                S.dragSX=e.clientX;
                S.dragSY=e.clientY;
                S.dragDist+=Math.abs(e.clientX-S.dragSX)+Math.abs(e.clientY-S.dragSY); }
            const w=screenToWorld(c.sx,c.sy);
            S.hovered=findAt(w.x,w.y);
            updateInfoPopup(c.sx,c.sy);
        });

        document.addEventListener('mousedown', e=>{
            if (!S.canvas||!S.countryName) return;
            if (e.target.closest('#bottom-panel')||e.target.closest('#top-bar')||e.target.closest('#build-modal')) return;
            if (e.button===0) {
                const w=getWorldFromEvent(e);
                S.mx=w.sx;
                S.my=w.sy;
                if (S.deleteMode) { if (deleteAt(w.wx,w.wy)) return; }
                if (S.selectedType && !S.selectMode && !S.deleteMode) { if (buildAt(w.wx,w.wy)) return; }
                S.dragging=true;
                S.dragSX=e.clientX;
                S.dragSY=e.clientY;
                S.dragDist=0;
                updateUI();
            }
            if (e.button===2) { e.preventDefault();
                clearAllModes(); }
        });

        document.addEventListener('mouseup', e=>{
            if (!S.canvas||!S.countryName) return;
            if (S.dragging && S.dragDist<3) {
                const w=getWorldFromEvent(e);
                if (S.deleteMode) deleteAt(w.wx,w.wy);
                else if (S.selectedType && !S.selectMode) buildAt(w.wx,w.wy);
            }
            S.dragging=false;
            S.dragDist=0;
            updateUI();
        });

        document.addEventListener('contextmenu', e=>{ if (e.target.closest('#game-canvas')) e.preventDefault(); });
        document.addEventListener('wheel', e=>{
            if (!S.canvas||!S.countryName||e.target.closest('#build-modal')) return;
            e.preventDefault();
            const rect=S.canvas.getBoundingClientRect();
            const mx=e.clientX-rect.left, my=e.clientY-rect.top;
            const w1=screenToWorld(mx,my);
            const zf=1.07;
            if (e.deltaY<0) S.zoom=Math.min(3,S.zoom*zf);
            else S.zoom=Math.max(0.25,S.zoom/zf);
            S.gridSize=Math.round(48*S.zoom);
            const w2=screenToWorld(mx,my);
            S.camX+=w1.x-w2.x;
            S.camY+=w1.y-w2.y;
        }, { passive:false });

        document.addEventListener('touchstart', e=>{
            if (!S.canvas||!S.countryName) return;
            if (e.target.closest('#bottom-panel')||e.target.closest('#top-bar')||e.target.closest('#build-modal')) return;
            if (e.touches.length===2) { S.dragging=false;
                S.touchesDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
                S.lastPinchZoom=S.zoom; return; }
            if (e.touches.length===1) {
                const t=e.touches[0], rect=S.canvas.getBoundingClientRect();
                S.mx=t.clientX-rect.left;
                S.my=t.clientY-rect.top;
                S.dragSX=t.clientX;
                S.dragSY=t.clientY;
                S.dragDist=0;
                S.dragging=true;
                S.touchStartTime=Date.now();
                updateUI();
            }
        }, { passive:false });

        document.addEventListener('touchmove', e=>{
            if (!S.canvas||!S.countryName) return;
            if (e.touches.length===2) { e.preventDefault(); const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
                S.zoom=Math.max(0.25,Math.min(3,S.lastPinchZoom*(dist/S.touchesDist)));
                S.gridSize=Math.round(48*S.zoom); }
            else if (e.touches.length===1&&S.dragging) { S.camX-=(e.touches[0].clientX-S.dragSX)/S.zoom;
                S.camY-=(e.touches[0].clientY-S.dragSY)/S.zoom;
                S.dragSX=e.touches[0].clientX;
                S.dragSY=e.touches[0].clientY;
                S.dragDist+=Math.abs(e.touches[0].clientX-S.dragSX)+Math.abs(e.touches[0].clientY-S.dragSY); const rect=S.canvas.getBoundingClientRect();
                S.mx=e.touches[0].clientX-rect.left;
                S.my=e.touches[0].clientY-rect.top; }
        }, { passive:false });

        document.addEventListener('touchend', e=>{
            if (!S.canvas||!S.countryName) return;
            const wasTap=S.dragDist<8&&Date.now()-S.touchStartTime<300;
            if (wasTap&&e.changedTouches.length===1) { const w=getWorldFromEvent(e.changedTouches[0]); if (S.deleteMode) deleteAt(w.wx,w.wy); else if (S.selectedType&&!S.selectMode) buildAt(w.wx,w.wy); }
            S.dragging=false;
            S.dragDist=0;
            updateUI();
        });

        document.addEventListener('keydown', e=>{
            if (!S.countryName) return;
            if (e.key==='Escape') { clearAllModes();
                closeBuildModal(); }
            if (e.key==='Delete'||e.key==='Backspace') { e.preventDefault();
                toggleDeleteMode(); }
            if (e.key==='b'||e.key==='B') openBuildModal();
            if (e.key==='i'||e.key==='I') toggleSelectMode();
            if (e.key==='r'||e.key==='R'||e.key==='к'||e.key==='К') { e.preventDefault();
                rotateBuilding(); }
        });

        document.getElementById('build-modal').addEventListener('click', function(e){ if (e.target===this) closeBuildModal(); });

        }
