<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>НОЧНАЯ СМЕНА • 3D HORROR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'VT323', monospace;
            touch-action: none;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        canvas {
            display: block;
        }
        
        .ui-overlay {
            position: absolute;
            pointer-events: none;
            color: #ff3333;
            text-shadow: 0 0 8px #ff0000;
        }
        
        #top-bar {
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 1.4rem;
        }
        
        #health {
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border: 2px solid #ff3333;
        }
        
        #status {
            top: 70px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border: 2px solid #ffff00;
            font-size: 1.3rem;
        }
        
        #log {
            bottom: 20px;
            left: 10px;
            right: 10px;
            height: 120px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #ff3333;
            padding: 10px;
            overflow-y: auto;
            font-size: 1.1rem;
            pointer-events: auto;
        }
        
        .action-btn {
            position: absolute;
            bottom: 180px;
            background: #330000;
            color: #ff6666;
            border: 3px solid #ff3333;
            padding: 15px 25px;
            font-size: 1.5rem;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s;
        }
        
        .action-btn:active {
            background: #660000;
            transform: scale(0.95);
        }
        
        #hide-btn { left: 20px; }
        #repair-btn { right: 20px; }
        
        .scanlines {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                transparent 0px,
                transparent 3px,
                rgba(255, 0, 0, 0.08) 3px,
                rgba(255, 0, 0, 0.08) 6px
            );
            pointer-events: none;
            z-index: 100;
            animation: flicker 0.2s infinite alternate;
        }
        
        @keyframes flicker {
            0% { opacity: 0.75; }
            100% { opacity: 1; }
        }
        
        .vignette {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            box-shadow: inset 0 0 120px rgba(0,0,0,0.95);
            pointer-events: none;
            z-index: 99;
        }
        
        .jump-scare {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #300000;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            z-index: 200;
            animation: scare 1.2s;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas"></canvas>
        
        <!-- UI -->
        <div class="ui-overlay" id="top-bar">
            <div id="health">❤️ ЗДОРОВЬЕ: <span id="hp">100</span>%</div>
            <div>НОЧНАЯ СМЕНА • 03:14</div>
        </div>
        
        <div class="ui-overlay" id="status">МОНИТОРИНГ ОБЪЕКТОВ • ВСЁ НОРМА</div>
        
        <div class="ui-overlay" id="log"></div>
        
        <button onclick="hidePlayer()" id="hide-btn" class="action-btn">ПРЯТАТЬСЯ В ШКАФ</button>
        <button onclick="repairItem()" id="repair-btn" class="action-btn">ЧИНИТЬ</button>
        
        <div class="scanlines"></div>
        <div class="vignette"></div>
        
        <!-- Джамп-скейр -->
        <div id="jumpscare" class="jump-scare">
            <div style="color:#ff0000; text-align:center; text-shadow: 0 0 30px #ff0000;">
                ОНО ЗДЕСЬ<br>
                <span style="font-size:2rem;">БЕГИ</span>
            </div>
        </div>
    </div>

    <audio id="ambient" loop preload="auto">
        <source src="https://freesound.org/data/previews/202/202499_3720018-lq.mp3" type="audio/mpeg">
    </audio>
    <audio id="alert" preload="auto">
        <source src="https://freesound.org/data/previews/276/276951_5123853-lq.mp3" type="audio/mpeg">
    </audio>
    <audio id="repair-sound" preload="auto">
        <source src="https://freesound.org/data/previews/387/387186_7258993-lq.mp3" type="audio/mpeg">
    </audio>
    <audio id="scream" preload="auto">
        <source src="https://freesound.org/data/previews/342/342759_5123853-lq.mp3" type="audio/mpeg">
    </audio>

    <script>
        // === THREE.JS 3D СЦЕНА ===
        let scene, camera, renderer;
        let playerAngle = 0;
        let isHiding = false;
        let health = 100;
        let gameOver = false;
        let currentAnomaly = null;
        
        const anomalies = [
            {id:1, name:"Камера 1", broken: false, pos: {x: -4, z: -3}},
            {id:2, name:"Дверь", broken: false, pos: {x: 5, z: -6}},
            {id:3, name:"Свет в коридоре", broken: false, pos: {x: -2, z: 4}}
        ];
        
        function init3D() {
            const container = document.getElementById('game-container');
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 8, 35);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 8);
            
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('canvas'), 
                antialias: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x0a0000);
            
            // Освещение (очень тёмное)
            const ambientLight = new THREE.AmbientLight(0x220000, 0.3);
            scene.add(ambientLight);
            
            const pointLight = new THREE.PointLight(0xff2222, 0.8, 30);
            pointLight.position.set(0, 5, 0);
            scene.add(pointLight);
            
            // Пол
            const floorGeo = new THREE.PlaneGeometry(30, 30);
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);
            
            // Стены
            createWall(0, 3, -12, 30, 6, 1);   // задняя
            createWall(0, 3, 12, 30, 6, 1);    // передняя
            createWall(-15, 3, 0, 1, 6, 30);   // левая
            createWall(15, 3, 0, 1, 6, 30);    // правая
            
            // Мебель (простые коробки)
            createBox(-6, 1, -5, 3, 2, 3, 0x330000);   // шкаф
            createBox(8, 1.5, -8, 2, 3, 2, 0x222222);  // стол
            createBox(-3, 1, 6, 4, 2, 2, 0x222222);    // ящик
            
            // Аномальные объекты
            window.anomalyMeshes = [];
            anomalies.forEach(a => {
                const mesh = createBox(a.pos.x, 1, a.pos.z, 1.5, 1.5, 1.5, 0x880000);
                mesh.userData = a;
                window.anomalyMeshes.push(mesh);
            });
            
            // Управление поворотом (мышь + тач)
            let isDragging = false;
            let previousX = 0;
            
            container.addEventListener('mousedown', (e) => { isDragging = true; previousX = e.clientX; });
            container.addEventListener('mousemove', onMouseMove);
            container.addEventListener('mouseup', () => isDragging = false);
            container.addEventListener('touchstart', (e) => {
                isDragging = true;
                previousX = e.touches[0].clientX;
            });
            container.addEventListener('touchmove', onTouchMove);
            container.addEventListener('touchend', () => isDragging = false);
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            animate();
        }
        
        function createWall(x, y, z, w, h, d) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshLambertMaterial({ color: 0x1a0000 });
            const wall = new THREE.Mesh(geo, mat);
            wall.position.set(x, y, z);
            scene.add(wall);
        }
        
        function createBox(x, y, z, w, h, d, color) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshLambertMaterial({ color: color });
            const box = new THREE.Mesh(geo, mat);
            box.position.set(x, y, z);
            scene.add(box);
            return box;
        }
        
        function onMouseMove(e) {
            if (!isDragging || gameOver) return;
            const delta = (e.clientX - previousX) * 0.003;
            playerAngle += delta;
            previousX = e.clientX;
            updateCamera();
        }
        
        function onTouchMove(e) {
            if (!isDragging || gameOver) return;
            const delta = (e.touches[0].clientX - previousX) * 0.005;
            playerAngle += delta;
            previousX = e.touches[0].clientX;
            updateCamera();
        }
        
        function updateCamera() {
            const radius = 8;
            camera.position.x = Math.sin(playerAngle) * radius;
            camera.position.z = Math.cos(playerAngle) * radius;
            camera.lookAt(0, 1.5, 0);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            if (!gameOver) {
                // Лёгкое дрожание камеры
                camera.position.y = 1.6 + Math.sin(Date.now() / 800) * 0.03;
            }
            renderer.render(scene, camera);
        }
        
        function log(text) {
            const logEl = document.getElementById('log');
            const time = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
            logEl.innerHTML += `<div>[${time}] ${text}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        function updateHealth() {
            document.getElementById('hp').textContent = Math.floor(health);
            if (health <= 30) document.getElementById('health').style.color = '#ff0000';
            if (health <= 0) endGame();
        }
        
        function triggerAnomaly() {
            if (gameOver || isHiding) return;
            
            const anomaly = anomalies[Math.floor(Math.random() * anomalies.length)];
            currentAnomaly = anomaly;
            
            document.getElementById('status').innerHTML = `⚠️ АНОМАЛИЯ: ${anomaly.name} ⚠️`;
            document.getElementById('status').style.color = '#ffff00';
            
            log(`<span style="color:#ff0">АНОМАЛИЯ В ${anomaly.name.toUpperCase()}!</span>`);
            
            // Красный свет
            scene.fog.color = new THREE.Color(0x440000);
            
            const alert = document.getElementById('alert');
            alert.volume = 0.7;
            alert.play().catch(() => {});
            
            // Через 8 секунд — урон если не исправлено
            setTimeout(() => {
                if (currentAnomaly && !isHiding) {
                    health -= 35;
                    updateHealth();
                    log("Существо приближается...");
                    if (Math.random() > 0.5) showJumpScare();
                }
            }, 8000);
        }
        
        function repairItem() {
            if (!currentAnomaly || isHiding) {
                log("Нечего чинить...");
                return;
            }
            
            const repair = document.getElementById('repair-sound');
            repair.volume = 0.6;
            repair.play().catch(() => {});
            
            log(`ЧИНИМ ${currentAnomaly.name}...`);
            
            setTimeout(() => {
                currentAnomaly.broken = false;
                document.getElementById('status').innerHTML = "МОНИТОРИНГ • ВСЁ НОРМА";
                document.getElementById('status').style.color = '#33ff33';
                currentAnomaly = null;
                scene.fog.color = new THREE.Color(0x000000);
                log("Объект восстановлен.");
            }, 1400);
        }
        
        function hidePlayer() {
            if (isHiding) return;
            isHiding = true;
            log("ТЫ СПРЯТАЛСЯ В ШКАФУ...");
            
            const hideTime = 6500;
            setTimeout(() => {
                isHiding = false;
                log("Ты вышел из укрытия...");
                if (currentAnomaly) {
                    health -= 22;
                    updateHealth();
                }
            }, hideTime);
        }
        
        function showJumpScare() {
            const js = document.getElementById('jumpscare');
            js.style.display = 'flex';
            const scream = document.getElementById('scream');
            scream.volume = 0.9;
            scream.play().catch(() => {});
            
            setTimeout(() => {
                js.style.display = 'none';
                health -= 45;
                updateHealth();
            }, 1100);
        }
        
        function endGame() {
            gameOver = true;
            document.getElementById('status').innerHTML = "💀 ТЫ МЁРТВ 💀";
            log("<span style='color:#f00'>ИГРА ОКОНЧЕНА. СУЩЕСТВО ЗАБРАЛО ТЕБЯ...</span>");
        }
        
        // Запуск
        window.onload = () => {
            init3D();
            updateCamera();
            
            // Фоновая музыка
            setTimeout(() => {
                const ambient = document.getElementById('ambient');
                ambient.volume = 0.45;
                ambient.play().catch(() => {});
            }, 800);
            
            log("Добро пожаловать на ночную смену...");
            log("Следи за объектами. При аномалии — чини или прячься.");
            
            // Случайные аномалии
            setInterval(() => {
                if (!gameOver && Math.random() > 0.55) {
                    triggerAnomaly();
                }
            }, 11000);
            
            // Постепенный урон от страха
            setInterval(() => {
                if (!gameOver && !isHiding) {
                    health -= 1.5;
                    updateHealth();
                }
            }, 7000);
            
            // Авто-поворот для демо
            setInterval(() => {
                if (!isDragging && !gameOver) {
                    playerAngle += 0.008;
                    updateCamera();
                }
            }, 50);
        };
    </script>
</body>
    </html>
