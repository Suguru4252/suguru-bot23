<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NetErrror - BIG Бибеджон: 500 уровней</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a2f2a, #051a15);
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        .game-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #1e3a2f;
            display: flex;
            flex-direction: column;
        }
        canvas {
            display: block;
            width: 100%;
            flex: 1;
            background: #2a6b55;
            touch-action: none;
        }
        .ui-panel {
            background: rgba(12, 26, 22, 0.95);
            backdrop-filter: blur(12px);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            border-top: 2px solid #c4a86a;
        }
        .stat {
            background: #1f2c1a;
            padding: 4px 12px;
            border-radius: 30px;
            color: #f7e05e;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .lives { color: #ff7777; background: #1f2c1a; padding: 4px 10px; border-radius: 30px; }
        .combo { background: #3a1f2f; color: #ffaa88; padding: 4px 10px; border-radius: 30px; }
        .level-badge { background: #4a2e6e; color: #eebbff; padding: 4px 12px; border-radius: 30px; }
        .rage-bar { width: 80px; height: 8px; background: #2a1a1a; border-radius: 10px; overflow: hidden; }
        .rage-fill { width: 0%; height: 100%; background: #ff4444; }
        .power-bar { width: 70px; height: 6px; background: #2a2a2a; border-radius: 8px; overflow: hidden; }
        .power-fill { width: 0%; height: 100%; background: #ffaa44; }
        
        /* МЕНЮ */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            text-align: center;
            padding: 20px;
        }
        .menu-btn {
            background: #ffaa44;
            color: #1a2a1a;
            font-size: 1.6rem;
            padding: 14px 40px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            margin: 12px;
            border: none;
            width: 80%;
            max-width: 280px;
        }
        .menu-btn:active { transform: scale(0.96); background: #ffcc66; }
        .menu-title {
            font-size: 2rem;
            color: #ffdd88;
            text-shadow: 0 0 15px #ff6600;
            margin-bottom: 30px;
        }
        
        /* Меню уровней */
        .levels-container {
            background: rgba(30, 40, 30, 0.95);
            border-radius: 40px;
            padding: 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
        .level-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }
        .level-nav-btn {
            background: #6e4a2e;
            color: white;
            font-size: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
        }
        .level-nav-btn:active { background: #9e6e4e; transform: scale(0.95); }
        .level-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffdd88;
            background: #1a2a1a;
            padding: 10px 25px;
            border-radius: 50px;
        }
        .level-select-btn {
            background: #88aa44;
            color: #1a2a1a;
            font-size: 1.3rem;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
        .back-btn {
            background: #6a4a2e;
            margin-top: 15px;
            font-size: 1rem;
            padding: 8px 20px;
        }
        .level-list {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 15px 0;
        }
        .level-item {
            background: #2a3a2a;
            color: #aaffaa;
            padding: 8px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .level-item:active { background: #4a6e4a; }
        
        /* Попап победы/поражения */
        .result-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a2a;
            border: 3px solid #ffaa44;
            border-radius: 40px;
            padding: 25px;
            text-align: center;
            z-index: 200;
            min-width: 280px;
            backdrop-filter: blur(20px);
        }
        .result-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
        }
        .win { color: #88ff88; }
        .lose { color: #ff8888; }
        .result-btn {
            background: #ffaa44;
            padding: 10px 20px;
            border-radius: 40px;
            margin: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        @media (max-width: 600px) {
            .menu-btn { font-size: 1.2rem; padding: 12px 25px; }
            .menu-title { font-size: 1.5rem; }
            .level-number { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="game-fullscreen">
    <canvas id="gameCanvas"></canvas>
    <div class="ui-panel">
        <div class="stat">🐒 <span id="scoreSpan">0</span></div>
        <div class="lives" id="livesSpan">❤️❤️❤️</div>
        <div class="combo">⚡ x<span id="comboSpan">1</span></div>
        <div class="level-badge">📊 УР <span id="levelSpan">1</span></div>
        <div class="rage-bar"><div class="rage-fill" id="rageFill"></div></div>
        <div class="power-bar"><div class="power-fill" id="powerFill"></div></div>
    </div>
</div>

<!-- ГЛАВНОЕ МЕНЮ -->
<div id="mainMenu" class="menu-overlay">
    <div class="menu-title">🐒 BIG БИБЕДЖОН 🥥</div>
    <button class="menu-btn" id="startGameBtn">▶ НАЧАТЬ ИГРУ</button>
    <button class="menu-btn" id="levelsMenuBtn">📜 УРОВНИ (1-500)</button>
</div>

<!-- МЕНЮ ВЫБОРА УРОВНЯ -->
<div id="levelsMenu" class="menu-overlay" style="display:none;">
    <div class="levels-container">
        <div class="menu-title" style="font-size:1.5rem;">📜 ВЫБОР УРОВНЯ</div>
        <div class="level-nav">
            <div class="level-nav-btn" id="levelPrevBtn">◀</div>
            <div class="level-number" id="selectedLevelNum">1</div>
            <div class="level-nav-btn" id="levelNextBtn">▶</div>
        </div>
        <div class="level-list" id="levelList">
            <!-- сгенерируется JS -->
        </div>
        <button class="level-select-btn" id="confirmLevelBtn">🎮 ИГРАТЬ УРОВЕНЬ</button>
        <button class="back-btn menu-btn" id="backToMainFromLevels" style="font-size:1rem; padding:8px 20px;">🏠 ГЛАВНОЕ МЕНЮ</button>
    </div>
</div>

<!-- ПОПАП ПОБЕДЫ -->
<div id="winPopup" style="display:none;" class="result-popup">
    <div class="result-title win">🏆 ВЫ ВЫИГРАЛИ! 🏆</div>
    <button class="result-btn" id="nextLevelBtn">➡ СЛЕДУЮЩИЙ УРОВЕНЬ</button>
    <button class="result-btn" id="winToMainBtn">🏠 ГЛАВНОЕ МЕНЮ</button>
</div>

<!-- ПОПАП ПОРАЖЕНИЯ -->
<div id="losePopup" style="display:none;" class="result-popup">
    <div class="result-title lose">💀 ВЫ ПРОИГРАЛИ 💀</div>
    <button class="result-btn" id="loseToMainBtn">🏠 ГЛАВНОЕ МЕНЮ</button>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // МЕНЮ
        const mainMenu = document.getElementById('mainMenu');
        const levelsMenu = document.getElementById('levelsMenu');
        const startGameBtn = document.getElementById('startGameBtn');
        const levelsMenuBtn = document.getElementById('levelsMenuBtn');
        const backToMainFromLevels = document.getElementById('backToMainFromLevels');
        const confirmLevelBtn = document.getElementById('confirmLevelBtn');
        const levelPrevBtn = document.getElementById('levelPrevBtn');
        const levelNextBtn = document.getElementById('levelNextBtn');
        const selectedLevelNumSpan = document.getElementById('selectedLevelNum');
        const levelListDiv = document.getElementById('levelList');
        const winPopup = document.getElementById('winPopup');
        const losePopup = document.getElementById('losePopup');
        const nextLevelBtn = document.getElementById('nextLevelBtn');
        const winToMainBtn = document.getElementById('winToMainBtn');
        const loseToMainBtn = document.getElementById('loseToMainBtn');
        
        let canvasW = window.innerWidth;
        let canvasH = window.innerHeight - 70;
        canvas.width = canvasW;
        canvas.height = canvasH;
        
        window.addEventListener('resize', () => {
            canvasW = window.innerWidth;
            canvasH = window.innerHeight - 70;
            canvas.width = canvasW;
            canvas.height = canvasH;
        });
        
        // ========== ИГРОВЫЕ ПЕРЕМЕННЫЕ ==========
        let currentLevel = 1;
        let selectedLevel = 1;
        let gameActive = false;
        let score = 0;
        let lives = 3;
        let combo = 1;
        let comboCounter = 0;
        let lastHitFrame = 0;
        let rage = 0;
        let maxRage = 100;
        let doubleSpeed = { active: false, endTime: 0 };
        let shotgunMode = { active: false, endTime: 0 };
        
        let projectiles = [];
        let enemies = [];
        let bonuses = [];
        let grenade = null;
        let boss = null;
        let particles = [];
        let screenShake = 0;
        
        let bibedjon = { x: canvasW/2, y: canvasH - 70, width: 70, height: 80 };
        
        let aiming = false;
        let aimStartX, aimStartY, aimCurrentX, aimCurrentY;
        let powerCharge = 0;
        let charging = false;
        let chargeInterval = null;
        
        let frame = 0;
        let enemiesInLevel = 0;
        let enemiesKilledInLevel = 0;
        let isBossLevel = false;
        
        // UI элементы
        const scoreSpan = document.getElementById('scoreSpan');
        const livesSpan = document.getElementById('livesSpan');
        const comboSpan = document.getElementById('comboSpan');
        const levelSpan = document.getElementById('levelSpan');
        const rageFill = document.getElementById('rageFill');
        const powerFillDiv = document.getElementById('powerFill');
        
        function updateUI() {
            scoreSpan.innerText = score;
            let hearts = "";
            for(let i=0; i<lives; i++) hearts += "❤️";
            for(let i=lives; i<3; i++) hearts += "🖤";
            livesSpan.innerText = hearts;
            comboSpan.innerText = combo;
            levelSpan.innerText = currentLevel;
            rageFill.style.width = (rage / maxRage * 100) + "%";
        }
        function updatePowerBar() { powerFillDiv.style.width = powerCharge + "%"; }
        
        // Звуки
        let audioCtx = null;
        function playSound(freq, vol=0.12, duration=0.2) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                gain.gain.value = vol;
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }
        
        // Типы врагов
        const enemyTypes = [
            { name: "пехотинец", color1: "#6a8eb0", color2: "#4a6e90", hp: 1, speed: 0.8, width: 44, height: 48, score: 10, icon: "🤖", eyes: "#fff" },
            { name: "щитовик", color1: "#5a9e6a", color2: "#3a7e4a", hp: 2, speed: 0.6, width: 48, height: 52, score: 20, icon: "🛡️", eyes: "#ffa" },
            { name: "ниндзя", color1: "#cc6666", color2: "#aa4444", hp: 1, speed: 1.4, width: 42, height: 46, score: 15, icon: "⚡", eyes: "#f66" },
            { name: "летающий", color1: "#eebb55", color2: "#cc9933", hp: 1, speed: 1.0, width: 46, height: 40, score: 12, icon: "🕊️", flying: true, eyes: "#fea" }
        ];
        
        function spawnEnemy() {
            if (!gameActive) return;
            let type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
            let x = 40 + Math.random() * (canvasW - 80);
            let y = type.flying ? 60 + Math.random() * 100 : 40;
            enemies.push({
                x, y, type, hp: type.hp, maxHp: type.hp,
                width: type.width, height: type.height, speed: type.speed + (currentLevel * 0.02),
                flying: type.flying || false, wobble: 0
            });
        }
        
        function generateLevel() {
            isBossLevel = (currentLevel % 10 === 0);
            enemiesKilledInLevel = 0;
            enemies = [];
            bonuses = [];
            grenade = null;
            boss = null;
            
            if (isBossLevel) {
                enemiesInLevel = 0;
                boss = {
                    x: canvasW/2 - 60, y: 60, width: 130, height: 110, hp: 5 + Math.floor(currentLevel/10), maxHp: 5 + Math.floor(currentLevel/10),
                    speed: 0.35, direction: 1, shootTimer: 0
                };
                playSound(300, 0.3, 0.5);
            } else {
                enemiesInLevel = 3 + Math.floor(currentLevel / 3);
                for(let i=0; i<Math.min(enemiesInLevel, 6); i++) spawnEnemy();
            }
            updateUI();
        }
        
        function checkLevelComplete() {
            if (isBossLevel && boss && boss.hp <= 0) {
                gameActive = false;
                winPopup.style.display = 'flex';
                return true;
            }
            if (!isBossLevel && enemiesKilledInLevel >= enemiesInLevel) {
                gameActive = false;
                winPopup.style.display = 'flex';
                return true;
            }
            return false;
        }
        
        function updateBoss(delta) {
            if (!boss || !gameActive) return;
            boss.x += boss.direction * boss.speed * delta * 60;
            if (boss.x <= 30) boss.direction = 1;
            if (boss.x >= canvasW - boss.width - 30) boss.direction = -1;
            boss.shootTimer += delta;
            if (boss.shootTimer > 1.2) {
                boss.shootTimer = 0;
                projectiles.push({
                    x: boss.x + boss.width/2, y: boss.y + boss.height-10,
                    vx: (Math.random() - 0.5) * 1.5, vy: 3, radius: 10, isBomb: true
                });
                playSound(440, 0.15);
            }
        }
        
        function spawnCoconutGrenade(x, y) { if (grenade) return; grenade = { x, y, radius: 20 }; }
        function explodeGrenade() {
            if (!grenade || !gameActive) return;
            let ex = grenade.x, ey = grenade.y;
            for(let i=0; i<enemies.length; i++) {
                let e = enemies[i];
                if (Math.hypot(ex - (e.x+e.width/2), ey - (e.y+e.height/2)) < 150) {
                    score += e.type.score * combo;
                    rage = Math.min(rage + 10, maxRage);
                    addCombo();
                    enemiesKilledInLevel++;
                    enemies.splice(i,1); i--;
                    for(let k=0;k<8;k++) particles.push({ x: ex, y: ey, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, life: 0.5, color: "#ffaa44" });
                }
            }
            if (boss && Math.hypot(ex - (boss.x+boss.width/2), ey - (boss.y+boss.height/2)) < 150) {
                boss.hp -= 2;
                playSound(600, 0.25);
                for(let k=0;k<15;k++) particles.push({ x: ex, y: ey, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 0.6, color: "#ff8844" });
                if (boss.hp <= 0) checkLevelComplete();
            }
            screenShake = 12;
            playSound(200, 0.35, 0.5);
            grenade = null;
        }
        
        function spawnBonus(x, y) {
            if (!gameActive) return;
            if (Math.random() < 0.3) { spawnCoconutGrenade(x, y); return; }
            const bonusTypes = [
                { name: "medkit", color: "#ff7777", effect: "medkit", icon: "💊" },
                { name: "speed", color: "#88ffaa", effect: "doubleSpeed", duration: 6000, icon: "⚡" },
                { name: "shotgun", color: "#ffaa66", effect: "shotgun", duration: 5000, icon: "🔫" }
            ];
            let type = bonusTypes[Math.floor(Math.random() * bonusTypes.length)];
            bonuses.push({ x, y, type, radius: 14 });
        }
        
        function applyBonus(bonus) {
            switch(bonus.type.effect) {
                case "medkit": lives = Math.min(lives+1,5); updateUI(); playSound(880,0.15); break;
                case "doubleSpeed": doubleSpeed.active=true; doubleSpeed.endTime=Date.now()+6000; playSound(550,0.15); break;
                case "shotgun": shotgunMode.active=true; shotgunMode.endTime=Date.now()+5000; playSound(770,0.15); break;
            }
        }
        
        function fireRage() {
            if (!gameActive || rage<maxRage) return;
            rage=0; updateUI(); playSound(300,0.35,0.6); screenShake=12;
            projectiles.push({ x: bibedjon.x, y: bibedjon.y-40, vx: 0, vy: -9, radius: 22, isFireball: true });
            for(let i=0;i<20;i++) particles.push({ x: bibedjon.x, y: bibedjon.y-30, vx: (Math.random()-0.5)*6, vy: -Math.random()*5, life: 0.6, color: "#ff8844" });
        }
        
        function shootProjectile(fromX, fromY, toX, toY, chargePower) {
            if (!gameActive) return;
            let dx=toX-fromX, dy=toY-fromY, len=Math.hypot(dx,dy);
            if(len<0.1) return;
            let normX=dx/len, normY=dy/len, speed=7+(chargePower/10);
            if(shotgunMode.active){
                for(let i=-1;i<=1;i++){ let a=Math.atan2(normY,normX)+i*0.25; projectiles.push({ x:fromX, y:fromY, vx:Math.cos(a)*speed, vy:Math.sin(a)*speed, radius:10 }); }
            } else { projectiles.push({ x:fromX, y:fromY, vx:normX*speed, vy:normY*speed, radius:12 }); }
            playSound(480,0.1);
        }
        
        function addCombo() { comboCounter++; if(comboCounter>=3){ combo=Math.min(combo+1,8); comboCounter=0; } lastHitFrame=frame; }
        function resetCombo() { if(frame-lastHitFrame>60){ combo=1; comboCounter=0; } }
        
        function startGameFromLevel(level) {
            currentLevel = level;
            gameActive = true;
            score = 0;
            lives = 3;
            combo = 1;
            rage = 0;
            projectiles = [];
            enemies = [];
            bonuses = [];
            grenade = null;
            particles = [];
            doubleSpeed.active = false;
            shotgunMode.active = false;
            aiming = false;
            if(chargeInterval) clearInterval(chargeInterval);
            powerCharge = 0;
            updatePowerBar();
            generateLevel();
            updateUI();
            mainMenu.style.display = 'none';
            levelsMenu.style.display = 'none';
            winPopup.style.display = 'none';
            losePopup.style.display = 'none';
        }
        
        function updateGame(delta) {
            if (!gameActive) return;
            if(doubleSpeed.active && Date.now()>doubleSpeed.endTime) doubleSpeed.active=false;
            if(shotgunMode.active && Date.now()>shotgunMode.endTime) shotgunMode.active=false;
            if(boss) updateBoss(delta);
            
            // движение врагов
            for(let i=0;i<enemies.length;i++){
                let e=enemies[i];
                let spd=e.speed*(doubleSpeed.active?1.5:1)*delta*60;
                if(e.flying){ e.wobble=(e.wobble+delta*8)%(Math.PI*2); e.x+=Math.sin(e.wobble)*0.8; e.y+=spd; }
                else{ e.y+=spd; }
                if(e.y+e.height>bibedjon.y+15){
                    enemies.splice(i,1); i--; lives--; updateUI(); playSound(220,0.25); screenShake=8;
                    if(lives<=0){ gameActive=false; losePopup.style.display='flex'; }
                }
            }
            
            // снаряды
            for(let i=0;i<projectiles.length;i++){
                let p=projectiles[i];
                p.x+=p.vx*delta*60; p.y+=p.vy*delta*60;
                if(p.x<-100||p.x>canvasW+100||p.y<-100||p.y>canvasH+150){ projectiles.splice(i,1); i--; continue; }
                let hit=false;
                for(let j=0;j<enemies.length;j++){
                    let e=enemies[j];
                    if(p.x+p.radius>e.x && p.x-p.radius<e.x+e.width && p.y+p.radius>e.y && p.y-p.radius<e.y+e.height){
                        e.hp--; hit=true;
                        if(e.hp<=0){
                            score+=e.type.score*combo; rage=Math.min(rage+10,maxRage); addCombo(); enemiesKilledInLevel++;
                            spawnBonus(e.x+e.width/2, e.y+e.height/2);
                            enemies.splice(j,1);
                            playSound(680,0.12); screenShake=3;
                            for(let k=0;k<8;k++) particles.push({ x:p.x, y:p.y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, life:0.5, color:"#ffaa66" });
                            checkLevelComplete();
                        } else { playSound(540,0.08); }
                        break;
                    }
                }
                if(!hit && boss && p.x+p.radius>boss.x && p.x-p.radius<boss.x+boss.width && p.y+p.radius>boss.y && p.y-p.radius<boss.y+boss.height){
                    boss.hp--; hit=true;
                    rage=Math.min(rage+15,maxRage); addCombo(); playSound(800,0.18); screenShake=6;
                    for(let k=0;k<12;k++) particles.push({ x:p.x, y:p.y, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, life:0.5, color:"#ff8844" });
                    if(boss.hp<=0) checkLevelComplete();
                }
                if(hit){ projectiles.splice(i,1); i--; }
            }
            resetCombo(); updateUI();
            for(let i=0;i<particles.length;i++){ let p=particles[i]; p.x+=p.vx*delta*60; p.y+=p.vy*delta*60; p.life-=delta*2; if(p.life<=0) particles.splice(i,1), i--; }
            if(screenShake>0) screenShake-=delta*50;
        }
        
        // Управление
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvasW / rect.width;
            const scaleY = canvasH / rect.height;
            let clientX, clientY;
            if(e.touches){ clientX=e.touches[0].clientX; clientY=e.touches[0].clientY; e.preventDefault(); }
            else{ clientX=e.clientX; clientY=e.clientY; }
            return { x: (clientX-rect.left)*scaleX, y: (clientY-rect.top)*scaleY };
        }
        
        function handlePointerDown(e) {
            e.preventDefault();
            if(!gameActive) return;
            let {x:cx, y:cy} = getCanvasCoords(e);
            if(grenade && Math.hypot(cx-grenade.x, cy-grenade.y)<grenade.radius){ explodeGrenade(); return; }
            for(let i=0;i<bonuses.length;i++){ let b=bonuses[i]; if(Math.hypot(cx-b.x, cy-b.y)<b.radius){ applyBonus(b); bonuses.splice(i,1); return; } }
            aiming=true;
            aimStartX=bibedjon.x; aimStartY=bibedjon.y-40;
            aimCurrentX=cx; aimCurrentY=cy;
            charging=true; powerCharge=0;
            if(chargeInterval) clearInterval(chargeInterval);
            chargeInterval=setInterval(()=>{ if(charging && gameActive){ powerCharge=Math.min(powerCharge+3,100); updatePowerBar(); } },30);
        }
        function handlePointerMove(e){ if(!aiming||!gameActive) return; e.preventDefault(); let {x:cx,y:cy}=getCanvasCoords(e); aimCurrentX=cx; aimCurrentY=cy; }
        function handlePointerUp(e){ e.preventDefault(); if(!aiming){ charging=false; if(chargeInterval) clearInterval(chargeInterval); return; } aiming=false; charging=false; if(chargeInterval) clearInterval(chargeInterval); if(gameActive) shootProjectile(aimStartX, aimStartY, aimCurrentX, aimCurrentY, powerCharge); powerCharge=0; updatePowerBar(); }
        
        canvas.addEventListener('touchstart', handlePointerDown, {passive:false});
        canvas.addEventListener('touchmove', handlePointerMove, {passive:false});
        canvas.addEventListener('touchend', handlePointerUp);
        canvas.addEventListener('mousedown', handlePointerDown);
        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);
        window.addEventListener('keydown', (e)=>{ if(e.code==='Space'||e.code==='KeyR'){ e.preventDefault(); fireRage(); } });
        
        // МЕНЮ ЛОГИКА
        startGameBtn.addEventListener('click', ()=>{ startGameFromLevel(1); });
        levelsMenuBtn.addEventListener('click', ()=>{ mainMenu.style.display='none'; levelsMenu.style.display='flex'; generateLevelList(); });
        backToMainFromLevels.addEventListener('click', ()=>{ levelsMenu.style.display='none'; mainMenu.style.display='flex'; });
        
        function generateLevelList() {
            levelListDiv.innerHTML = '';
            let start = Math.max(1, selectedLevel-5);
            let end = Math.min(500, selectedLevel+5);
            for(let i=start; i<=end; i++) {
                let div = document.createElement('div');
                div.className = 'level-item';
                div.innerText = `УР ${i}`;
                div.onclick = () => { selectedLevel=i; selectedLevelNumSpan.innerText=selectedLevel; generateLevelList(); };
                levelListDiv.appendChild(div);
            }
        }
        
        levelPrevBtn.addEventListener('click', ()=>{ if(selectedLevel>1){ selectedLevel--; selectedLevelNumSpan.innerText=selectedLevel; generateLevelList(); } });
        levelNextBtn.addEventListener('click', ()=>{ if(selectedLevel<500){ selectedLevel++; selectedLevelNumSpan.innerText=selectedLevel; generateLevelList(); } });
        confirmLevelBtn.addEventListener('click', ()=>{ startGameFromLevel(selectedLevel); });
        
        nextLevelBtn.addEventListener('click', ()=>{
            let next = currentLevel+1;
            if(next<=500) startGameFromLevel(next);
            else { winPopup.style.display='none'; mainMenu.style.display='flex'; }
        });
        winToMainBtn.addEventListener('click', ()=>{ winPopup.style.display='none'; mainMenu.style.display='flex'; });
        loseToMainBtn.addEventListener('click', ()=>{ losePopup.style.display='none'; mainMenu.style.display='flex'; });
        
        // РЕНДЕР
        function drawBackground(){
            ctx.fillStyle="#2a6b55"; ctx.fillRect(0,0,canvasW,canvasH);
            ctx.fillStyle="#b87a4a"; ctx.fillRect(0,canvasH-90,canvasW,90);
            ctx.fillStyle="#9e5e3a"; ctx.fillRect(0,canvasH-90,canvasW,12);
            for(let i=0;i<12;i++) ctx.fillRect(40+i*80, canvasH-100, 12, 30);
        }
        function drawBibedjon(){
            let x=bibedjon.x-35, y=bibedjon.y-80;
            ctx.fillStyle="#8b5a2b"; ctx.fillRect(x+15,y+20,40,50);
            ctx.fillStyle="#c49a6c"; ctx.beginPath(); ctx.ellipse(x+35,y+15,25,30,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="#2c2c2c"; ctx.fillRect(x+20,y+8,8,8); ctx.fillRect(x+42,y+8,8,8);
            ctx.fillStyle="#ffcc44"; ctx.fillRect(x+22,y-8,26,12);
            for(let i=0;i<3;i++) ctx.fillRect(x+24+i*10,y-14,4,10);
            ctx.fillStyle="#f0e68c"; ctx.font="bold 18px monospace"; ctx.fillText("BIG",x+15,y-18);
        }
        function drawEnemies(){
            for(let e of enemies){
                let grad=ctx.createLinearGradient(e.x,e.y,e.x,e.y+e.height);
                grad.addColorStop(0,e.type.color1); grad.addColorStop(1,e.type.color2);
                ctx.fillStyle=grad; ctx.fillRect(e.x,e.y,e.width,e.height);
                ctx.fillStyle="#222"; ctx.fillRect(e.x+8,e.y+8,8,8); ctx.fillRect(e.x+e.width-16,e.y+8,8,8);
                ctx.fillStyle=e.type.eyes; ctx.fillRect(e.x+10,e.y+10,4,4); ctx.fillRect(e.x+e.width-14,e.y+10,4,4);
                ctx.fillStyle="#ff6666"; ctx.fillRect(e.x+e.width/2-5,e.y+e.height-12,10,6);
                ctx.fillStyle="#fff"; ctx.font="18px monospace"; ctx.fillText(e.type.icon,e.x+12,e.y+32);
                if(e.hp>1){ ctx.fillStyle="#ffaa66"; ctx.fillRect(e.x,e.y-8,(e.hp/e.maxHp)*e.width,5); }
            }
        }
        function drawBoss(){
            if(!boss) return;
            let grad=ctx.createLinearGradient(boss.x,boss.y,boss.x,boss.y+boss.height);
            grad.addColorStop(0,"#cc5555"); grad.addColorStop(1,"#882222");
            ctx.fillStyle=grad; ctx.fillRect(boss.x,boss.y,boss.width,boss.height);
            ctx.fillStyle="#ffcc88"; ctx.fillRect(boss.x+15,boss.y+15,30,20); ctx.fillRect(boss.x+boss.width-45,boss.y+15,30,20);
            ctx.fillStyle="#ff4444"; ctx.fillRect(boss.x+20,boss.y+18,8,8); ctx.fillRect(boss.x+boss.width-38,boss.y+18,8,8);
            ctx.fillStyle="#ffffaa"; ctx.font="bold 16px monospace"; ctx.fillText("☠️ BOSS ☠️",boss.x+25,boss.y-5);
            ctx.fillStyle="#ffaa66"; ctx.fillRect(boss.x,boss.y-12,(boss.hp/boss.maxHp)*boss.width,8);
        }
        function drawBonuses(){
            for(let b of bonuses){ ctx.fillStyle=b.type.color; ctx.beginPath(); ctx.arc(b.x,b.y,b.radius,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#000"; ctx.font="22px monospace"; ctx.fillText(b.type.icon,b.x-11,b.y+9); }
            if(grenade){ ctx.fillStyle="#aa8844"; ctx.beginPath(); ctx.arc(grenade.x,grenade.y,grenade.radius,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#664422"; ctx.beginPath(); ctx.arc(grenade.x-4,grenade.y-4,7,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#ffcc66"; ctx.font="24px monospace"; ctx.fillText("🥥",grenade.x-12,grenade.y+9); ctx.fillStyle="#ffaa44"; ctx.font="bold 10px monospace"; ctx.fillText("ВЗРЫВ",grenade.x-18,grenade.y-10); }
        }
        function drawProjectiles(){
            for(let p of projectiles){
                if(p.isFireball){ ctx.fillStyle="#ff6600"; ctx.beginPath(); ctx.arc(p.x,p.y,18,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#ffaa44"; ctx.beginPath(); ctx.arc(p.x-3,p.y-3,6,0,Math.PI*2); ctx.fill(); }
                else if(p.isBomb){ ctx.fillStyle="#884444"; ctx.beginPath(); ctx.arc(p.x,p.y,8,0,Math.PI*2); ctx.fill(); }
                else{ ctx.fillStyle="#ffcc55"; ctx.beginPath(); ctx.arc(p.x,p.y,p.radius-2,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#aa8833"; ctx.beginPath(); ctx.arc(p.x-3,p.y-3,4,0,Math.PI*2); ctx.fill(); }
            }
            for(let p of particles){ ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fill(); }
        }
        function drawAim(){
            if(!aiming) return;
            ctx.beginPath(); ctx.moveTo(aimStartX,aimStartY); ctx.lineTo(aimCurrentX,aimCurrentY);
            ctx.strokeStyle="#ffaa66"; ctx.lineWidth=4; ctx.setLineDash([8,10]); ctx.stroke(); ctx.setLineDash([]);
            let rad=15+powerCharge/4;
            ctx.beginPath(); ctx.arc(aimCurrentX,aimCurrentY,rad,0,Math.PI*2);
            ctx.strokeStyle="#ff8844"; ctx.lineWidth=3; ctx.stroke();
            ctx.fillStyle=`rgba(255,140,50,${powerCharge/150})`; ctx.fill();
        }
        function drawUItext(){
            ctx.fillStyle="#ffffcc"; ctx.font="bold 12px monospace";
            if(doubleSpeed.active) ctx.fillText("⚡ УСКОРЕНИЕ",15,75);
            if(shotgunMode.active) ctx.fillText("🔫 ДРОБОВИК",15,100);
        }
        
        let lastTime=0;
        function gameLoop(now){
            let delta=Math.min(0.033,(now-lastTime)/1000);
            if(delta>0.01) updateGame(delta);
            lastTime=now; frame++;
            let shakeX=0,shakeY=0;
            if(screenShake>0){ shakeX=(Math.random()-0.5)*screenShake; shakeY=(Math.random()-0.5)*screenShake; ctx.save(); ctx.translate(shakeX,shakeY); }
            drawBackground(); drawEnemies(); drawBoss(); drawBonuses(); drawProjectiles(); drawBibedjon(); drawAim(); drawUItext();
            if(screenShake>0) ctx.restore();
            requestAnimationFrame(gameLoop);
        }
        
        generateLevelList();
        gameLoop();
    })();
</script>
</body>
</html>
