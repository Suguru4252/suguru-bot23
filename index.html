<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chugur Studio — Генератор договоров</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .app-container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, #1e1e2f, #2a2a3d);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.8rem;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .chugur-badge {
            display: inline-block;
            background: #ffd966;
            color: #1e1e2f;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .chat-area {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 1px solid #eee;
        }
        .chat-label {
            font-weight: 600;
            color: #333;
        }
        textarea {
            width: 100%;
            height: 90px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            resize: vertical;
            transition: border 0.2s;
            line-height: 1.5;
        }
        textarea:focus {
            outline: none;
            border-color: #ffd966;
        }
        .example-hint {
            font-size: 0.8rem;
            color: #999;
            margin-top: -8px;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #1e1e2f;
            color: white;
            flex: 1;
            justify-content: center;
        }
        .btn-primary:hover {
            background: #33334d;
        }
        .btn-outline {
            background: white;
            border: 2px solid #1e1e2f;
            color: #1e1e2f;
        }
        .btn-outline:hover {
            background: #f0f0f5;
        }
        .btn-copy {
            background: #ffd966;
            color: #1e1e2f;
        }
        .contract-output {
            padding: 25px;
            background: #fafafa;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .contract-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 25px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #2c2c2c;
            max-height: 500px;
            overflow-y: auto;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .footer-note {
            text-align: center;
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 5px;
        }
        .error-msg {
            color: #d32f2f;
            font-weight: 500;
        }
        @media (max-width: 500px) {
            .app-container {
                border-radius: 12px;
            }
            .header h1 {
                font-size: 1.4rem;
            }
            textarea {
                height: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>📄 Генератор договоров</h1>
            <span class="chugur-badge">Chugur Studio</span>
        </div>

        <div class="chat-area">
            <label class="chat-label">Опишите ситуацию, как в чате:</label>
            <textarea id="userInput" placeholder="Например: Мне нужен договор на Ивана Иванова, что я с человеком Петром Петровым договорились взять в долг 50 000 ₽"></textarea>
            <div class="example-hint">Можно писать «долг», «продажа», «услуги» — система попробует понять</div>
            <div class="btn-row">
                <button class="btn-primary" id="generateBtn">✨ Сгенерировать договор</button>
                <button class="btn-outline" id="clearBtn">🗑️ Очистить</button>
            </div>
            <div id="parseError" class="error-msg"></div>
        </div>

        <div class="contract-output" id="outputSection" style="display: none;">
            <div class="contract-box" id="contractText"></div>
            <div class="action-buttons">
                <button class="btn-copy" id="copyBtn">📋 Копировать</button>
                <button class="btn-outline" id="downloadBtn">⬇️ Скачать .txt</button>
                <button class="btn-outline" id="printBtn">🖨️ Печать</button>
            </div>
            <div class="footer-note">
                Документ создан с помощью <strong>Chugur Studio</strong> • Не является официальным юридическим документом
            </div>
        </div>
    </div>

    <script>
        (function() {
            // DOM элементы
            const userInput = document.getElementById('userInput');
            const generateBtn = document.getElementById('generateBtn');
            const clearBtn = document.getElementById('clearBtn');
            const outputSection = document.getElementById('outputSection');
            const contractTextDiv = document.getElementById('contractText');
            const copyBtn = document.getElementById('copyBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const printBtn = document.getElementById('printBtn');
            const parseError = document.getElementById('parseError');

            // ---------- Утилиты ----------
            function showError(msg) {
                parseError.textContent = msg;
                outputSection.style.display = 'none';
            }

            function clearError() {
                parseError.textContent = '';
            }

            // Функция для извлечения параметров из текста
            function parseUserInput(text) {
                // Удаляем лишние пробелы, переводим в нижний регистр для поиска ключевых слов,
                // но сохраняем оригинал для извлечения имён.
                const lower = text.toLowerCase();
                
                // 1. Поиск типа договора
                let contractType = null;
                const typePatterns = [
                    { keywords: ['долг', 'займ', 'занять', 'одолжить', 'ссуда', 'кредит'], type: 'loan' },
                    { keywords: ['продаж', 'купить', 'продать', 'купля', 'покупка', 'приобрести'], type: 'sale' },
                    { keywords: ['услуг', 'оказание', 'выполнить', 'сделать', 'сервис'], type: 'service' },
                    { keywords: ['дар', 'подарить', 'безвозмезд'], type: 'gift' },
                    { keywords: ['аренд', 'снять', 'найм'], type: 'rent' }
                ];
                for (let p of typePatterns) {
                    if (p.keywords.some(kw => lower.includes(kw))) {
                        contractType = p.type;
                        break;
                    }
                }

                // 2. Извлечение имён: ищем конструкции "на [Имя Фамилия]" и "с человеком [Имя Фамилия]"
                // или просто два слова с большой буквы подряд.
                let party1 = ''; // тот, на кого оформляют (Заимодавец, Продавец и т.д.)
                let party2 = ''; // второй участник

                // Регулярки для русского имени/фамилии (упрощённо)
                const nameRegex = /[А-ЯЁ][а-яё]+\s[А-ЯЁ][а-яё]+/g;
                const names = text.match(nameRegex) || [];

                // Попробуем понять по предлогам
                const naMatch = lower.match(/на\s+([а-яё]+\s[а-яё]+)/i);
                const sPersonMatch = lower.match(/с\s+(человеком\s+)?([а-яё]+\s[а-яё]+)/i);
                const iPersonMatch = lower.match(/я\s+([а-яё]+\s[а-яё]+)/i); // "я Иван Петров"

                if (naMatch) party1 = capitalize(naMatch[1].trim());
                if (sPersonMatch) party2 = capitalize(sPersonMatch[2].trim());
                if (!party2 && iPersonMatch) party2 = capitalize(iPersonMatch[1].trim());

                // Если нашли два разных имени через регулярку
                if (!party1 && names.length >= 2) {
                    party1 = names[0];
                    party2 = names[1];
                } else if (!party1 && names.length === 1) {
                    party1 = names[0];
                } else if (!party2 && names.length === 1 && party1 !== names[0]) {
                    party2 = names[0];
                }

                // 3. Извлечение суммы
                let amount = '';
                // Ищем числа, возможно с пробелами, с валютой
                const amountRegex = /(\d[\d\s]*)\s*(₽|руб|рублей|р\.|RUB)/i;
                const amMatch = text.match(amountRegex);
                if (amMatch) {
                    amount = amMatch[1].replace(/\s/g, '') + ' ₽';
                } else {
                    // просто крупное число
                    const numMatch = text.match(/(\d[\d\s]{2,})/);
                    if (numMatch) amount = numMatch[1].replace(/\s/g, '') + ' ₽';
                }

                return {
                    contractType: contractType || 'loan', // по умолчанию займ
                    party1,
                    party2,
                    amount: amount || 'не указана'
                };
            }

            function capitalize(str) {
                return str.replace(/(^|\s)\S/g, l => l.toUpperCase());
            }

            // Генерация текста договора на основе шаблона
            function generateContractText(params) {
                const today = new Date().toLocaleDateString('ru-RU');
                const { contractType, party1, party2, amount } = params;
                let contractTitle = '';
                let roles = {};
                let subject = '';

                switch (contractType) {
                    case 'loan':
                        contractTitle = 'ДОГОВОР ЗАЙМА';
                        roles = { first: 'Заимодавец', second: 'Заемщик' };
                        subject = `Передача денежных средств в размере ${amount} на условиях возврата.`;
                        break;
                    case 'sale':
                        contractTitle = 'ДОГОВОР КУПЛИ-ПРОДАЖИ';
                        roles = { first: 'Продавец', second: 'Покупатель' };
                        subject = `Продажа товара/имущества стоимостью ${amount}.`;
                        break;
                    case 'service':
                        contractTitle = 'ДОГОВОР ОКАЗАНИЯ УСЛУГ';
                        roles = { first: 'Заказчик', second: 'Исполнитель' };
                        subject = `Оказание услуг, стоимость которых оценивается в ${amount}.`;
                        break;
                    case 'gift':
                        contractTitle = 'ДОГОВОР ДАРЕНИЯ';
                        roles = { first: 'Даритель', second: 'Одаряемый' };
                        subject = `Безвозмездная передача имущества/денежных средств в размере ${amount}.`;
                        break;
                    case 'rent':
                        contractTitle = 'ДОГОВОР АРЕНДЫ';
                        roles = { first: 'Арендодатель', second: 'Арендатор' };
                        subject = `Аренда имущества с ежемесячной платой ${amount}.`;
                        break;
                    default:
                        contractTitle = 'ДОГОВОР';
                        roles = { first: 'Сторона 1', second: 'Сторона 2' };
                        subject = `Соглашение на сумму ${amount}.`;
                }

                return `
        ${contractTitle}
        г. ______________                               «${today}»

        Мы, нижеподписавшиеся:
        ${roles.first}: ${party1 || '__________________________'},
        ${roles.second}: ${party2 || '__________________________'},
        заключили настоящий договор о нижеследующем:

        1. ПРЕДМЕТ ДОГОВОРА
        1.1. ${subject}

        2. УСЛОВИЯ И ОБЯЗАТЕЛЬСТВА
        2.1. Стороны обязуются выполнять условия настоящего договора добросовестно.
        2.2. Все споры решаются путём переговоров.

        3. СРОК ДЕЙСТВИЯ
        3.1. Договор вступает в силу с момента подписания и действует до полного исполнения обязательств.

        4. ПОДПИСИ СТОРОН
        ${roles.first}: _______________ (${party1 || '__________'})
        ${roles.second}: _______________ (${party2 || '__________'})

        ---
        Документ сгенерирован сервисом Chugur Studio (chugur.studio)
        `.trim();
            }

            // Основная функция генерации
            function generateContract() {
                clearError();
                const rawText = userInput.value.trim();
                if (!rawText) {
                    showError('Пожалуйста, введите описание ситуации.');
                    return;
                }

                const params = parseUserInput(rawText);
                
                // Проверка: хотя бы одно имя должно быть
                if (!params.party1 && !params.party2) {
                    showError('Не удалось определить имена участников. Напишите, например: "на Ивана Иванова, я Петр Петров".');
                    return;
                }

                const contractText = generateContractText(params);
                contractTextDiv.textContent = contractText;
                outputSection.style.display = 'flex';
            }

            // Копирование
            copyBtn.addEventListener('click', async () => {
                const text = contractTextDiv.textContent;
                try {
                    await navigator.clipboard.writeText(text);
                    alert('Текст договора скопирован в буфер обмена!');
                } catch (err) {
                    alert('Не удалось скопировать. Попробуйте выделить и скопировать вручную.');
                }
            });

            // Скачивание как .txt
            downloadBtn.addEventListener('click', () => {
                const text = contractTextDiv.textContent;
                const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'dogovor_chugur.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });

            // Печать
            printBtn.addEventListener('click', () => {
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                        <head><title>Договор — Chugur Studio</title></head>
                        <body style="font-family: monospace; white-space: pre-wrap; padding: 30px;">
                            ${contractTextDiv.textContent.replace(/\n/g, '<br>')}
                        </body>
                    </html>
                `);
                printWindow.document.close();
                printWindow.print();
            });

            // Очистка
            clearBtn.addEventListener('click', () => {
                userInput.value = '';
                outputSection.style.display = 'none';
                clearError();
            });

            // Запуск по кнопке
            generateBtn.addEventListener('click', generateContract);

            // Дополнительно: по Ctrl+Enter
            userInput.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    generateContract();
                }
            });

            // Начальное скрытие секции вывода
            outputSection.style.display = 'none';
        })();
    </script>
</body>
</html>
