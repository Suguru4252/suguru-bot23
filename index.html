<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>MAX AAA FULL GAME</title>

<style>
body{margin:0;overflow:hidden;font-family:Arial;}

#ui{
position:absolute;top:10px;left:10px;
background:rgba(0,0,0,0.5);
color:white;padding:10px;border-radius:10px;
font-size:14px;
}

#joy{
position:absolute;bottom:30px;left:30px;
width:130px;height:130px;border-radius:50%;
background:rgba(255,255,255,0.1);
}

#stick{
width:50px;height:50px;background:white;
border-radius:50%;
position:absolute;top:40px;left:40px;
}

button{
position:absolute;right:10px;
width:140px;height:45px;border:none;
border-radius:10px;font-weight:bold;
}

#shop{bottom:160px;}
#pet{bottom:100px;}
#boss{bottom:40px;}
</style>
</head>

<body>

<div id="ui"></div>

<div id="joy"><div id="stick"></div></div>

<button id="shop">🏪 SHOP</button>
<button id="pet">🐾 PET</button>
<button id="boss">🐉 BOSS</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

// ================= WORLD =================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0b0f2a, 10, 200);

// CAMERA
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight,0.1,1000);
camera.position.set(0,8,12);

// RENDER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,0.5));

const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(10,20,10);
scene.add(sun);

// FLOOR
const floor = new THREE.Mesh(
new THREE.PlaneGeometry(500,500),
new THREE.MeshStandardMaterial({color:0x222244})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ================= PLAYER =================
const player = new THREE.Mesh(
new THREE.SphereGeometry(1,32,32),
new THREE.MeshStandardMaterial({color:"lime"})
);
player.position.y = 1;
scene.add(player);

// ================= DATA =================
let pets=[];
let enemies=[];
let boss=null;

let coins=0;
let level=1;
let xp=0;

// ================= ENEMY =================
function spawnEnemy(){
const e=new THREE.Mesh(
new THREE.BoxGeometry(2,2,2),
new THREE.MeshStandardMaterial({color:"red"})
);

e.hp=20+level*5;
e.position.set((Math.random()-0.5)*80,1,(Math.random()-0.5)*80);

scene.add(e);
enemies.push(e);
}

for(let i=0;i<8;i++) spawnEnemy();

// ================= PET =================
function spawnPet(power=2,color=0x00ffff){
const p=new THREE.Mesh(
new THREE.SphereGeometry(0.6,32,32),
new THREE.MeshStandardMaterial({
color,
emissive:color,
emissiveIntensity:0.5
})
);

p.power=power;
p.angle=Math.random()*Math.PI*2;

scene.add(p);
pets.push(p);
}

// ================= BOSS =================
function spawnBoss(){
if(boss) return;

boss=new THREE.Mesh(
new THREE.TorusKnotGeometry(3,1,100,16),
new THREE.MeshStandardMaterial({
color:"purple",
emissive:0x5500ff,
emissiveIntensity:1
})
);

boss.hp=300;
boss.phase=1;
boss.position.set(0,5,-20);

scene.add(boss);
}

// ================= SAVE =================
function save(){
localStorage.setItem("game",JSON.stringify({
coins,level,xp,pets:pets.length
}));
}

function load(){
let d=localStorage.getItem("game");
if(!d) return;
d=JSON.parse(d);

coins=d.coins;
level=d.level;
xp=d.xp;

for(let i=0;i<d.pets;i++) spawnPet();
}

load();

// ================= DAMAGE =================
function hit(target,dmg){
target.hp-=dmg;

if(target.hp<=0){
scene.remove(target);

if(enemies.includes(target)){
enemies.splice(enemies.indexOf(target),1);
coins+=5;
xp++;
spawnEnemy();
}

if(target===boss){
boss=null;
coins+=100;
spawnPet(5,0xff00ff);
}
}
}

// ================= PET LOGIC =================
function petLogic(){
pets.forEach(p=>{
p.angle+=0.03;

p.position.x=player.position.x+Math.cos(p.angle)*2.5;
p.position.z=player.position.z+Math.sin(p.angle)*2.5;

// attack enemies
enemies.forEach(e=>{
if(p.position.distanceTo(e.position)<5){
hit(e,p.power);
}
});

// boss
if(boss && p.position.distanceTo(boss.position)<8){
hit(boss,p.power*0.2);
}
});
}

// ================= PLAYER MOVE =================
let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// JOYSTICK
let jx=0,jy=0;
const joy=document.getElementById("joy");
const stick=document.getElementById("stick");

joy.addEventListener("touchmove",(e)=>{
let t=e.touches[0];
let r=joy.getBoundingClientRect();

let dx=t.clientX-r.left-65;
let dy=t.clientY-r.top-65;

let max=50;
jx=Math.max(-1,Math.min(1,dx/max));
jy=Math.max(-1,Math.min(1,dy/max));

stick.style.transform=`translate(${dx}px,${dy}px)`;
});

joy.addEventListener("touchend",()=>{
jx=jy=0;
stick.style.transform="translate(0px,0px)";
});

// ================= CAMERA =================
let angle=0;
document.addEventListener("mousemove",(e)=>{
angle+=e.movementX*0.003;
});

// ================= UI BUTTONS =================
document.getElementById("shop").onclick=()=>{
if(coins>=10){
coins-=10;
spawnPet();
}
};

document.getElementById("pet").onclick=()=>spawnPet();

document.getElementById("boss").onclick=()=>spawnBoss();

// ================= LEVEL =================
function levelUp(){
if(xp>=level*5){
level++;
xp=0;
spawnPet();
}
}

// ================= UPDATE =================
function update(){

// move
player.position.x += (keys["a"]?-0.3:0)+(keys["d"]?0.3:0)+jx*0.3;
player.position.z += (keys["w"]?-0.3:0)+(keys["s"]?0.3:0)+jy*0.3;

// pets
petLogic();

// level
levelUp();
}

// ================= CAMERA FOLLOW =================
function cam(){
let dist=12;

let x=player.position.x+Math.cos(angle)*dist;
let z=player.position.z+Math.sin(angle)*dist;

camera.position.x+=(x-camera.position.x)*0.08;
camera.position.z+=(z-camera.position.z)*0.08;
camera.position.y=8;

camera.lookAt(player.position);
}

// ================= UI =================
function ui(){
document.getElementById("ui").innerHTML=`
💰 Coins: ${coins}<br>
⭐ Level: ${level}<br>
⚡ XP: ${xp}/${level*5}<br>
🐾 Pets: ${pets.length}<br>
👹 Boss: ${boss?"YES":"NO"}
`;
}

// ================= LOOP =================
function loop(){
update();
cam();
ui();
renderer.render(scene,camera);
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
