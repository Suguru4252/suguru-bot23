<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sandbox</title>

<style>
body { margin:0; overflow:hidden; background: linear-gradient(#87CEEB, #e0f7ff); }

#joystick {
    position: absolute;
    bottom: 80px;
    left: 40px;
    width: 120px;
    height: 120px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
}

#stick {
    width: 60px;
    height: 60px;
    background: white;
    border-radius: 50%;
    position: relative;
    top: 30px;
    left: 30px;
}

button {
    position: absolute;
    right: 20px;
    padding: 10px;
}

#place { bottom: 200px; }
#view { bottom: 140px; }
</style>
</head>

<body>

<div id="joystick"><div id="stick"></div></div>
<button id="place">Блок</button>
<button id="view">Вид</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// СЦЕНА
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // НЕБО

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// СВЕТ
let sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(10,20,10);
scene.add(sun);

let ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

// ПОЛ
let plane = new THREE.Mesh(
    new THREE.PlaneGeometry(100,100),
    new THREE.MeshStandardMaterial({color:0x55aa55})
);
plane.rotation.x = -Math.PI/2;
scene.add(plane);

// ИГРОК
let player = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color:0x0000ff})
);
player.position.y = 1;
scene.add(player);

// КАМЕРА СТАРТ
camera.position.set(0,5,5);

// БЛОКИ
let blocks = [];

// ================= ДЖОЙСТИК =================
let joystick = document.getElementById("joystick");
let stick = document.getElementById("stick");

let moveX = 0, moveZ = 0;

joystick.addEventListener("touchmove", e => {
    let t = e.touches[0];
    let rect = joystick.getBoundingClientRect();

    let x = t.clientX - rect.left - 60;
    let y = t.clientY - rect.top - 60;

    moveX = x / 40;
    moveZ = y / 40;

    stick.style.transform = `translate(${x}px,${y}px)`;
});

joystick.addEventListener("touchend", () => {
    moveX = 0;
    moveZ = 0;
    stick.style.transform = `translate(0px,0px)`;
});

// ================= ВРАЩЕНИЕ КАМЕРЫ =================
let lastX = null;

window.addEventListener("touchmove", e => {
    if(e.touches.length === 1){
        let x = e.touches[0].clientX;

        if(lastX !== null){
            rotY += (x - lastX) * 0.005;
        }

        lastX = x;
    }
});

window.addEventListener("touchend", () => {
    lastX = null;
});

// ================= КАМЕРА =================
let rotY = 0;
let thirdPerson = true;

function updateCamera(){
    if(thirdPerson){
        camera.position.x = player.position.x + Math.sin(rotY) * 5;
        camera.position.z = player.position.z + Math.cos(rotY) * 5;
        camera.position.y = player.position.y + 3;

        camera.lookAt(player.position);
    } else {
        camera.position.copy(player.position);
        camera.position.y += 1.5;

        camera.rotation.y = rotY;
    }
}

// ================= ДВИЖЕНИЕ =================
function updatePlayer(){
    player.position.x -= moveX * 0.1;
    player.position.z += moveZ * 0.1;
}

// ================= ПОСТАВИТЬ БЛОК =================
document.getElementById("place").onclick = () => {
    let block = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        new THREE.MeshStandardMaterial({color:0xaaaaaa})
    );

    block.position.set(
        Math.round(player.position.x),
        0.5,
        Math.round(player.position.z - 2)
    );

    scene.add(block);
    blocks.push(block);
};

// ================= СМЕНА ВИДА =================
document.getElementById("view").onclick = () => {
    thirdPerson = !thirdPerson;
};

// ================= РЕНДЕР =================
function animate(){
    requestAnimationFrame(animate);

    updatePlayer();
    updateCamera();

    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
