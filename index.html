<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pet World 3D</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; }
#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:10px;
}
button{
  position:absolute;
  right:10px;
  width:100px;
  height:50px;
}
#egg{ bottom:120px; }
#food{ bottom:60px; }
</style>
</head>
<body>

<div id="ui"></div>
<button id="egg">🥚 Egg</button>
<button id="food">🍖 Food</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ================= ENGINE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTS
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,10,10);
scene.add(light);

// FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x3cb371})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ================= PLAYER =================
const player = new THREE.Group();
scene.add(player);

// TEMP MODEL (потом заменим на GLB)
const playerMesh = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.5,1,4,8),
  new THREE.MeshStandardMaterial({color:"lime"})
);
player.add(playerMesh);

// ================= PETS =================
let pets = [];

function createPet(color){
  const pet = new THREE.Mesh(
    new THREE.SphereGeometry(0.3,16,16),
    new THREE.MeshStandardMaterial({color})
  );
  scene.add(pet);
  pets.push({mesh:pet, angle:Math.random()*Math.PI*2, height:0});
}

// ================= COINS =================
let coins = [];

function spawnCoin(){
  const c = new THREE.Mesh(
    new THREE.TorusGeometry(0.3,0.1,8,16),
    new THREE.MeshStandardMaterial({color:"gold"})
  );
  c.position.set((Math.random()-0.5)*60,0.5,(Math.random()-0.5)*60);
  scene.add(c);
  coins.push(c);
}
for(let i=0;i<30;i++) spawnCoin();

// ================= GAME DATA =================
let speed = 0.15;
let coinsCount = 0;
let level = 1;
let exp = 0;

// ================= INPUT =================
let keys = {};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// ================= BUTTONS =================
document.getElementById("egg").onclick=()=>{
  if(Math.random()>0.4){
    createPet("cyan");
  }else{
    createPet("yellow");
  }
};

document.getElementById("food").onclick=()=>{
  speed+=0.1;
  setTimeout(()=>speed-=0.1,4000);
};

// ================= UPDATE =================
function update(){

  // MOVE
  if(keys["w"]) player.position.z -= speed;
  if(keys["s"]) player.position.z += speed;
  if(keys["a"]) player.position.x -= speed;
  if(keys["d"]) player.position.x += speed;

  // LIMIT
  player.position.x = Math.max(-40,Math.min(40,player.position.x));
  player.position.z = Math.max(-40,Math.min(40,player.position.z));

  // COINS
  coins.forEach((c,i)=>{
    c.rotation.y += 0.05;

    if(player.position.distanceTo(c.position)<1){
      scene.remove(c);
      coins.splice(i,1);
      coinsCount++;
      exp++;

      spawnCoin();

      if(exp>=level*5){
        level++;
        exp=0;
      }
    }
  });

  // PET ANIMATION (ВОТ ТУТ АНИМАЦИЯ)
  pets.forEach(p=>{
    p.angle += 0.02;

    p.mesh.position.x = player.position.x + Math.cos(p.angle)*2;
    p.mesh.position.z = player.position.z + Math.sin(p.angle)*2;
    p.mesh.position.y = 0.5 + Math.sin(p.angle*3)*0.2; // bounce animation
  });
}

// ================= CAMERA =================
function cameraFollow(){
  camera.position.x += (player.position.x - camera.position.x)*0.1;
  camera.position.z += (player.position.z + 5 - camera.position.z)*0.1;
  camera.position.y = 5;
  camera.lookAt(player.position);
}

// ================= UI =================
function ui(){
document.getElementById("ui").innerHTML=
`
Coins: ${coinsCount}<br>
Level: ${level}<br>
XP: ${exp}/${level*5}<br>
Pets: ${pets.length}
`;
}

// ================= LOOP =================
function animate(){
update();
ui();
cameraFollow();
renderer.render(scene,camera);
requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
