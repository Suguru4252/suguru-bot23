<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Солнечная система 3D | Полная модель</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 12px 25px;
      border-radius: 50px;
      pointer-events: none;
      backdrop-filter: blur(10px);
      font-weight: 500;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    #current-planet {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 15px 30px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.3);
      display: none;
      pointer-events: none;
    }
    .instruction {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      background: rgba(0,0,0,0.55);
      padding: 8px 25px;
      border-radius: 25px;
      backdrop-filter: blur(8px);
      white-space: nowrap;
      pointer-events: none;
      letter-spacing: 0.5px;
    }
    @media (max-width: 750px) {
      .instruction {
        font-size: 11px;
        white-space: normal;
        text-align: center;
        width: 85%;
        bottom: 20px;
      }
      #current-planet {
        font-size: 16px;
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>
  <div id="info">🌌 СОЛНЕЧНАЯ СИСТЕМА</div>
  <div id="current-planet"></div>
  <div class="instruction">🖱️ Вращайте камеру | 📜 Зум | ✨ Кликните по объекту для фокуса | ↩️ Пробел — общий вид</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // --- Сцена ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    
    // Звёзды
    const starsGeo1 = new THREE.BufferGeometry();
    const starsPos1 = new Float32Array(3000 * 3);
    for (let i = 0; i < 3000 * 3; i += 3) {
      starsPos1[i] = (Math.random() - 0.5) * 1200;
      starsPos1[i+1] = (Math.random() - 0.5) * 700;
      starsPos1[i+2] = (Math.random() - 0.5) * 900;
    }
    starsGeo1.setAttribute('position', new THREE.BufferAttribute(starsPos1, 3));
    const stars1 = new THREE.Points(starsGeo1, new THREE.PointsMaterial({color: 0xffffff, size: 0.25}));
    scene.add(stars1);
    
    const starsGeo2 = new THREE.BufferGeometry();
    const starsPos2 = new Float32Array(2000 * 3);
    for (let i = 0; i < 2000 * 3; i += 3) {
      starsPos2[i] = (Math.random() - 0.5) * 1600;
      starsPos2[i+1] = (Math.random() - 0.5) * 900;
      starsPos2[i+2] = (Math.random() - 0.5) * 1100;
    }
    starsGeo2.setAttribute('position', new THREE.BufferAttribute(starsPos2, 3));
    const stars2 = new THREE.Points(starsGeo2, new THREE.PointsMaterial({color: 0xaaccff, size: 0.3}));
    scene.add(stars2);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 2000);
    camera.position.set(0, 40, 80);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.rotateSpeed = 0.7;
    controls.zoomSpeed = 1.8;
    controls.target.set(0, 0, 0);
    controls.maxDistance = 600;
    controls.minDistance = 2;
    controls.update();

    // --- Освещение ---
    const sunLight = new THREE.PointLight(0xfff5e6, 3, 0, 0);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);
    scene.add(new THREE.AmbientLight(0x111133));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.25);
    dirLight.position.set(10, 20, 5);
    scene.add(dirLight);

    // --- Функция создания текстур ---
    function createPlanetTexture(baseColor, type) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      
      ctx.fillStyle = baseColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      if (type === 'sun') {
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#ffaa00');
        gradient.addColorStop(0.3, '#ff7700');
        gradient.addColorStop(0.6, '#ffaa00');
        gradient.addColorStop(1, '#ff5500');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffcc00';
        for(let i = 0; i < 25; i++) {
          ctx.beginPath();
          ctx.arc(Math.random()*256, Math.random()*128, Math.random()*12+4, 0, Math.PI*2);
          ctx.fill();
        }
      } else if (type === 'jupiter') {
        ctx.strokeStyle = '#b08060';
        ctx.lineWidth = 7;
        for(let y = 10; y < 128; y += 16) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(256, y + Math.sin(y)*4);
          ctx.stroke();
        }
      } else if (type === 'saturn') {
        ctx.strokeStyle = '#d4b896';
        ctx.lineWidth = 5;
        for(let y = 12; y < 128; y += 14) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(256, y);
          ctx.stroke();
        }
      } else if (type === 'earth') {
        ctx.fillStyle = '#2288ff';
        ctx.fillRect(0,0,256,128);
        ctx.fillStyle = '#44aa44';
        ctx.beginPath(); ctx.arc(100,50,40,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(180,70,35,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffffff';
        for(let i=0;i<12;i++){ ctx.beginPath(); ctx.arc(Math.random()*256,Math.random()*128,Math.random()*7+1.5,0,Math.PI*2); ctx.fill(); }
      } else if (type === 'mars') {
        ctx.fillStyle = '#8b2500';
        for(let i=0;i<15;i++){ ctx.beginPath(); ctx.arc(Math.random()*256,Math.random()*128,Math.random()*10+3,0,Math.PI*2); ctx.fill(); }
      } else if (type === 'mercury') {
        ctx.fillStyle = '#666666';
        for(let i=0;i<20;i++){ ctx.beginPath(); ctx.arc(Math.random()*256,Math.random()*128,Math.random()*6+2,0,Math.PI*2); ctx.fill(); }
      }
      
      return new THREE.CanvasTexture(canvas);
    }

    // --- Планеты (увеличенные расстояния) ---
    const planetsData = [
      { name: 'Солнце', key: 'sun', color: 0xffaa00, size: 2.5, distance: 0, speed: 0, emissive: 0xff5500 },
      { name: 'Меркурий', key: 'mercury', color: 0xaaaaaa, size: 0.4, distance: 6, speed: 0.035 },
      { name: 'Венера', key: 'venus', color: 0xffcc88, size: 0.7, distance: 9, speed: 0.022 },
      { name: 'Земля', key: 'earth', color: 0x2299ff, size: 0.75, distance: 12, speed: 0.018 },
      { name: 'Марс', key: 'mars', color: 0xc1440e, size: 0.55, distance: 16, speed: 0.015 },
      // Пояс астероидов между Марсом и Юпитером (расстояния 18-24)
      { name: 'Церера', key: 'ceres', color: 0x999999, size: 0.3, distance: 20, speed: 0.012, dwarf: true },
      { name: 'Юпитер', key: 'jupiter', color: 0xd8a27a, size: 1.8, distance: 28, speed: 0.009 },
      { name: 'Сатурн', key: 'saturn', color: 0xf0d8b0, size: 1.5, distance: 36, speed: 0.007, hasRings: true },
      { name: 'Уран', key: 'uranus', color: 0x6fd4d4, size: 1.2, distance: 45, speed: 0.005 },
      { name: 'Нептун', key: 'neptune', color: 0x4169e1, size: 1.15, distance: 54, speed: 0.004 },
      // Пояс Койпера
      { name: 'Плутон', key: 'pluto', color: 0xccbb99, size: 0.35, distance: 65, speed: 0.003, dwarf: true },
      { name: 'Эрида', key: 'eris', color: 0xddccbb, size: 0.32, distance: 78, speed: 0.0025, dwarf: true }
    ];

    const planets = [];
    const allClickableObjects = [];

    // Орбиты
    planetsData.forEach(p => {
      if (p.distance > 0) {
        const orbitGeo = new THREE.RingGeometry(p.distance - 0.03, p.distance + 0.03, 128);
        const opacity = p.dwarf ? 0.08 : 0.15;
        const orbit = new THREE.Mesh(orbitGeo, new THREE.MeshBasicMaterial({ 
          color: 0x334466, side: THREE.DoubleSide, transparent: true, opacity 
        }));
        orbit.rotation.x = Math.PI / 2;
        scene.add(orbit);
      }
    });

    // Создание планет
    planetsData.forEach(data => {
      const geo = new THREE.SphereGeometry(data.size, data.key === 'sun' ? 64 : 40, 40);
      const texture = createPlanetTexture(`#${data.color.toString(16).padStart(6, '0')}`, data.key);
      const mat = new THREE.MeshStandardMaterial({
        map: texture,
        roughness: data.key === 'sun' ? 0.4 : 0.75,
        metalness: 0.1,
        emissive: data.emissive ? new THREE.Color(data.emissive) : new THREE.Color(0x000000),
        emissiveIntensity: data.key === 'sun' ? 1 : 0
      });
      
      const planet = new THREE.Mesh(geo, mat);
      planet.castShadow = true;
      planet.receiveShadow = true;
      
      const angle = Math.random() * Math.PI * 2;
      planet.position.x = data.distance * Math.cos(angle);
      planet.position.z = data.distance * Math.sin(angle);
      
      planet.userData = {
        name: data.name,
        key: data.key,
        distance: data.distance,
        speed: data.speed,
        angle: angle,
        size: data.size,
        hasRings: data.hasRings || false,
        dwarf: data.dwarf || false
      };
      
      scene.add(planet);
      allClickableObjects.push(planet);
      
      // Кольца Сатурна
      if (data.hasRings) {
        const ringGeo1 = new THREE.RingGeometry(data.size * 1.3, data.size * 2.0, 64);
        const ring1 = new THREE.Mesh(ringGeo1, new THREE.MeshStandardMaterial({
          color: 0xd4c090, side: THREE.DoubleSide, transparent: true, opacity: 0.55, roughness: 0.5
        }));
        ring1.rotation.x = Math.PI / 2 + 0.05;
        ring1.userData = { isRing: true, parentKey: data.key };
        planet.add(ring1);
        allClickableObjects.push(ring1);
        
        const ringGeo2 = new THREE.RingGeometry(data.size * 2.05, data.size * 2.35, 64);
        const ring2 = new THREE.Mesh(ringGeo2, new THREE.MeshStandardMaterial({
          color: 0xb8a878, side: THREE.DoubleSide, transparent: true, opacity: 0.4, roughness: 0.5
        }));
        ring2.rotation.x = Math.PI / 2 - 0.03;
        ring2.userData = { isRing: true, parentKey: data.key };
        planet.add(ring2);
        allClickableObjects.push(ring2);
      }
      
      // Подпись
      const labelDiv = document.createElement('div');
      labelDiv.textContent = data.name;
      labelDiv.style.color = 'white';
      labelDiv.style.fontSize = data.dwarf ? '12px' : '15px';
      labelDiv.style.fontWeight = 'bold';
      labelDiv.style.textShadow = '1px 1px 3px black';
      labelDiv.style.background = 'rgba(0,0,0,0.65)';
      labelDiv.style.padding = '2px 12px';
      labelDiv.style.borderRadius = '20px';
      const label = new CSS2DObject(labelDiv);
      label.position.set(0, data.size + 0.5, 0);
      planet.add(label);
      
      planets.push(planet);
    });

    // --- Пояс астероидов (между Марсом и Юпитером) ---
    const asteroidCount = 800;
    const asteroidGeo = new THREE.SphereGeometry(0.08, 3, 3);
    const asteroidMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
    
    for (let i = 0; i < asteroidCount; i++) {
      const asteroid = new THREE.Mesh(asteroidGeo, asteroidMat);
      const distance = 17 + Math.random() * 7; // 17-24
      const angle = Math.random() * Math.PI * 2;
      const yOffset = (Math.random() - 0.5) * 1.2;
      
      asteroid.position.x = distance * Math.cos(angle);
      asteroid.position.y = yOffset;
      asteroid.position.z = distance * Math.sin(angle);
      
      const scale = 0.5 + Math.random() * 1.5;
      asteroid.scale.set(scale, scale * (0.5 + Math.random()), scale);
      asteroid.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
      
      asteroid.userData = {
        name: 'Астероид',
        key: 'asteroid',
        distance: distance,
        speed: 0.008 + Math.random() * 0.01,
        angle: angle,
        yOffset: yOffset,
        isAsteroid: true
      };
      
      scene.add(asteroid);
      allClickableObjects.push(asteroid);
    }

    // --- Пояс Койпера (за Нептуном) ---
    const kuiperCount = 1200;
    const kuiperGeo = new THREE.SphereGeometry(0.06, 3, 3);
    const kuiperMat = new THREE.MeshStandardMaterial({ color: 0x998877, roughness: 0.9, emissive: 0x111111, emissiveIntensity: 0.3 });
    
    const kuiperObjects = [];
    for (let i = 0; i < kuiperCount; i++) {
      const kuiperObj = new THREE.Mesh(kuiperGeo, kuiperMat);
      const distance = 58 + Math.random() * 30; // 58-88
      const angle = Math.random() * Math.PI * 2;
      const yOffset = (Math.random() - 0.5) * 5;
      
      kuiperObj.position.x = distance * Math.cos(angle);
      kuiperObj.position.y = yOffset;
      kuiperObj.position.z = distance * Math.sin(angle);
      
      const scale = 0.4 + Math.random() * 1.2;
      kuiperObj.scale.setScalar(scale);
      kuiperObj.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
      
      kuiperObj.userData = {
        name: 'Объект Койпера',
        key: 'kuiper',
        distance: distance,
        speed: 0.0015 + Math.random() * 0.003,
        angle: angle,
        yOffset: yOffset,
        isKuiper: true
      };
      
      scene.add(kuiperObj);
      kuiperObjects.push(kuiperObj);
      allClickableObjects.push(kuiperObj);
    }

    // --- Навигация ---
    let currentTarget = 'all';
    const planetNameDiv = document.getElementById('current-planet');
    
    function focusOnPlanet(planetKey) {
      planetNameDiv.style.display = 'none';
      
      if (planetKey === 'all') {
        controls.target.set(0, 0, 0);
        camera.position.set(0, 40, 80);
        controls.update();
        return;
      }
      
      let targetObj = null;
      
      // Ищем среди планет
      const planet = planets.find(p => p.userData.key === planetKey);
      if (planet) {
        targetObj = planet;
        planetNameDiv.textContent = planet.userData.name;
      }
      
      if (targetObj) {
        const pos = targetObj.position.clone();
        controls.target.copy(pos);
        const dist = targetObj.userData.size * 6 + 3;
        camera.position.copy(pos.clone().add(new THREE.Vector3(dist * 0.7, dist * 0.5, dist * 0.7)));
        controls.update();
        planetNameDiv.style.display = 'block';
      }
    }
    
    // Клик по объектам
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    
    window.addEventListener('click', (event) => {
      if (event.target.tagName === 'BUTTON') return;
      
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(allClickableObjects);
      
      if (intersects.length > 0) {
        let obj = intersects[0].object;
        
        // Если кольцо — берём родителя
        if (obj.userData.isRing) {
          obj = obj.parent;
        }
        
        // Если астероид или объект Койпера — не фокусируемся (слишком много)
        if (obj.userData.isAsteroid || obj.userData.isKuiper) {
          // Можно показать подсказку, но не фокусируем
          return;
        }
        
        const key = obj.userData.key;
        if (key && key !== 'asteroid' && key !== 'kuiper') {
          currentTarget = key;
          focusOnPlanet(key);
        }
      }
    });
    
    // Пробел — общий вид
    window.addEventListener('keydown', (event) => {
      if (event.code === 'Space') {
        event.preventDefault();
        currentTarget = 'all';
        focusOnPlanet('all');
      }
    });

    // --- Анимация ---
    function animate() {
      requestAnimationFrame(animate);
      
      stars1.rotation.y += 0.00008;
      stars2.rotation.y -= 0.00004;
      
      // Планеты
      planets.forEach(planet => {
        const data = planet.userData;
        if (data.distance > 0) {
          data.angle += data.speed * 0.25;
          planet.position.x = data.distance * Math.cos(data.angle);
          planet.position.z = data.distance * Math.sin(data.angle);
        }
        planet.rotation.y += 0.008;
      });
      
      // Астероиды
      allClickableObjects.forEach(obj => {
        if (obj.userData.isAsteroid) {
          obj.userData.angle += obj.userData.speed * 0.25;
          obj.position.x = obj.userData.distance * Math.cos(obj.userData.angle);
          obj.position.z = obj.userData.distance * Math.sin(obj.userData.angle);
        }
      });
      
      // Объекты Койпера
      kuiperObjects.forEach(obj => {
        obj.userData.angle += obj.userData.speed * 0.25;
        obj.position.x = obj.userData.distance * Math.cos(obj.userData.angle);
        obj.position.z = obj.userData.distance * Math.sin(obj.userData.angle);
      });
      
      // Слежение за целью
      if (currentTarget !== 'all') {
        const targetPlanet = planets.find(p => p.userData.key === currentTarget);
        if (targetPlanet) {
          controls.target.copy(targetPlanet.position);
        }
      }
      
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    console.log('🌠 Полная Солнечная система готова!');
    console.log('   ☀️ Солнце');
    console.log('   🪨 Планеты земной группы: Меркурий, Венера, Земля, Марс');
    console.log('   💫 Пояс астероидов + Церера');
    console.log('   🪐 Газовые гиганты: Юпитер, Сатурн');
    console.log('   🔵 Ледяные гиганты: Уран, Нептун');
    console.log('   ❄️ Пояс Койпера: Плутон, Эрида');
    console.log('   Кликайте по планетам для фокуса, Пробел — общий вид');
  </script>
</body>
</html>
