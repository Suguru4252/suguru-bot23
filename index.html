<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChugurAI — Нейросеть</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #111; color: #eee;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        .chat-container {
            width: 100%; max-width: 700px; height: 90vh;
            background: #1a1a1a; border-radius: 20px;
            display: flex; flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        .chat-header {
            background: #222; padding: 16px 20px;
            border-bottom: 1px solid #333;
            display: flex; align-items: center; gap: 12px;
        }
        .chat-header .logo {
            font-weight: 700; font-size: 1.2rem;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .chat-header .badge {
            font-size: 0.7rem; background: #333; color: #aaa;
            padding: 3px 10px; border-radius: 12px;
        }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .message {
            display: flex; gap: 10px; max-width: 90%;
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.ai { align-self: flex-start; }
        .avatar {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .user .avatar { background: #333; }
        .ai .avatar { background: #1f1f1f; border: 1px solid #444; }
        .bubble {
            padding: 12px 16px; border-radius: 18px;
            line-height: 1.5; font-size: 14px;
        }
        .user .bubble { background: #2563eb; color: white; border-bottom-right-radius: 6px; }
        .ai .bubble { background: #262626; color: #ddd; border-bottom-left-radius: 6px; }
        .chat-input-area {
            padding: 14px 20px; border-top: 1px solid #333;
            display: flex; gap: 10px;
        }
        .chat-input-area textarea {
            flex: 1; background: #222; border: 1px solid #444;
            border-radius: 14px; padding: 12px 16px; color: #eee;
            font-size: 14px; resize: none; outline: none;
            font-family: inherit;
        }
        .chat-input-area textarea:focus { border-color: #a78bfa; }
        .chat-input-area button {
            background: #a78bfa; color: #111; border: none;
            border-radius: 14px; padding: 12px 18px; font-weight: 600;
            cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        .chat-input-area button:hover { background: #c4b5fd; }
        .typing { display: flex; align-items: center; gap: 6px; padding: 10px 16px; }
        .typing span {
            width: 8px; height: 8px; background: #555; border-radius: 50%;
            animation: type 1.4s infinite ease-in-out;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes type { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }
        .error { color: #f87171; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <span class="logo">ChugurAI</span>
            <span class="badge">by Chugur Studio</span>
        </div>
        <div class="chat-messages" id="messages">
            <div class="message ai">
                <div class="avatar">🧠</div>
                <div class="bubble">Привет! Я ChugurAI. Работаю через ProxyAPI.</div>
            </div>
        </div>
        <div class="chat-input-area">
            <textarea id="userInput" rows="1" placeholder="Напиши сообщение..."></textarea>
            <button id="sendBtn">→</button>
        </div>
    </div>
    <script>
        const PROXY_API_KEY = 'sk-tmKXt9W2ygVWbFJVl9y4Yg97SycvqIPJ';

        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, role) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + role;
            msgDiv.innerHTML = `
                <div class="avatar">${role === 'user' ? '👤' : '🧠'}</div>
                <div class="bubble">${text}</div>
            `;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.innerHTML = `
                <div class="avatar">🧠</div>
                <div class="bubble typing"><span></span><span></span><span></span></div>
            `;
            typingDiv.id = 'typingIndicator';
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById('typingIndicator');
            if (t) t.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            userInput.value = '';
            addTyping();
            try {
                const res = await fetch('https://api.proxyapi.ru/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${PROXY_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [{ role: 'user', content: text }],
                        temperature: 0.8
                    })
                });
                const data = await res.json();
                removeTyping();
                if (data.choices && data.choices.length) {
                    addMessage(data.choices[0].message.content.trim(), 'ai');
                } else {
                    addMessage('⚠️ Ошибка ответа от ProxyAPI.', 'ai');
                }
            } catch (e) {
                removeTyping();
                addMessage('⚠️ Ошибка соединения: ' + e.message, 'ai');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
