<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🥚 СУСЛОВ: Продажа Жира</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a3a2e 0%, #2d5a4a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            padding: 16px;
        }
        .game-container {
            max-width: 500px;
            width: 100%;
            background: #efe6d5;
            background-image: radial-gradient(circle at 20% 30%, #fff6e8, #e7d8be);
            border-radius: 64px 64px 48px 48px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5), inset 0 1px 8px rgba(255,255,240,0.8);
            padding: 28px 24px 36px;
            border: 4px solid #b49a7b;
            text-align: center;
            transition: 0.2s;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #3d2a1b;
            text-shadow: 4px 4px 0 #c9aa7b, 6px 6px 0 rgba(0,0,0,0.1);
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        h1 span {
            font-size: 2.2rem;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 5px;
        }
        .prestige-badge {
            background: #6a4e2e;
            color: #ffd966;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.3rem;
            display: inline-block;
            border: 2px solid #eebb55;
            box-shadow: inset 0 1px 5px #3d2e1c, 0 4px 0 #3a281a;
        }
        .spent-badge {
            background: #4a3a2a;
            color: #c9b896;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            border: 2px solid #9e8b72;
        }
        .suslov-area {
            background: #b18b62;
            background: linear-gradient(135deg, #ccb094, #a5835e);
            border-radius: 120px 120px 60px 60px;
            padding: 25px 10px 15px;
            margin: 10px 0 20px;
            border: 6px solid #5e3e28;
            box-shadow: inset 0 -10px 0 #3f2c1c, inset 0 8px 10px #fbe9c3, 0 12px 0 #3f2c1c;
        }
        .suslov-emoji {
            font-size: 140px;
            line-height: 1;
            filter: drop-shadow(8px 16px 6px rgba(0,0,0,0.2));
            transition: transform 0.1s ease;
            margin-bottom: 5px;
            cursor: pointer;
        }
        .belly-bar-container {
            background: #2c1e12;
            padding: 8px 12px;
            border-radius: 60px;
            border: 3px solid #b49a7b;
            box-shadow: inset 0 4px 6px #0f0a06, 0 6px 0 #3f2c1c;
            margin: 10px 5px 5px;
        }
        .belly-label {
            display: flex;
            justify-content: space-between;
            color: #ffecb3;
            font-weight: bold;
            text-shadow: 2px 2px 0 #1f140c;
            padding: 0 8px 4px;
            font-size: 1.1rem;
        }
        .belly-bar-bg {
            height: 30px;
            background: #1e130c;
            border-radius: 40px;
            border: 2px solid #6b4f37;
            overflow: hidden;
            box-shadow: inset 0 3px 6px black;
        }
        .belly-fill {
            width: 0%;
            height: 100%;
            background: #f5ac78;
            background: linear-gradient(90deg, #fcb045, #fd7e14, #ff512f);
            box-shadow: 0 0 12px #ffb347;
            border-radius: 40px;
            transition: width 0.25s cubic-bezier(.2,.9,.4,1);
            border-right: 2px solid #ffd6a0;
        }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: #251e16d9;
            backdrop-filter: blur(3px);
            padding: 16px 20px;
            border-radius: 60px;
            margin: 18px 0 22px;
            color: #f7e7cf;
            border: 2px solid #ab8e6f;
            box-shadow: inset 0 0 0 2px #51412e, 0 8px 0 #2b1e13;
            font-weight: bold;
        }
        .money-block, .food-block {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            background: #0c0907;
            padding: 6px 22px;
            border-radius: 50px;
            box-shadow: inset 0 2px 5px black, 0 3px 0 #4d3926;
            color: #ffd966;
        }
        .money-block span, .food-block span {
            font-size: 1rem;
            color: #c0a175;
            margin-right: 4px;
        }
        .shop {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 8px;
        }
        .food-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #dccdb6;
            padding: 8px 18px 8px 25px;
            border-radius: 100px;
            border: 3px solid #6e543c;
            box-shadow: inset 0 1px 6px #fff3df, 0 6px 0 #5a4530;
            font-weight: bold;
        }
        .food-info {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 1.5rem;
        }
        .food-desc {
            font-size: 1.2rem;
            color: #302010;
        }
        .food-desc small {
            font-size: 0.9rem;
            color: #5b3f28;
            font-weight: normal;
        }
        button {
            background: #f3d37c;
            border: none;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 5px 0 #a05f2c, 0 2px 10px rgba(0,0,0,0.2);
            border: 2px solid #ffeab0;
            color: #2c1c0c;
            cursor: pointer;
            transition: all 0.04s linear;
            letter-spacing: 0.5px;
            min-width: 120px;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #7b451b, 0 2px 8px black;
        }
        button:disabled {
            opacity: 0.5;
            filter: grayscale(0.5);
            transform: none;
            box-shadow: 0 5px 0 #7b451b;
            pointer-events: none;
        }
        .sell-area {
            margin-top: 20px;
        }
        #sellFatBtn {
            background: #c9a87c;
            box-shadow: 0 5px 0 #7a5d3e, 0 2px 8px black;
            border-color: #ebd5b0;
            color: #1f140a;
            font-size: 1.8rem;
            padding: 16px 30px;
            width: 100%;
        }
        #sellFatBtn:disabled {
            opacity: 0.4;
        }
        .gameover-message {
            margin: 15px 0 5px;
            font-size: 1.6rem;
            font-weight: 900;
            color: #ad1f1f;
            text-shadow: 2px 2px 0 #ffc857;
            letter-spacing: 2px;
        }
        .footer-note {
            color: #594d3c;
            margin-top: 16px;
            font-style: italic;
            font-weight: 500;
        }
        .pop-effect {
            animation: shake 0.3s ease-in-out;
        }
        @keyframes shake {
            0%,100%{ transform: rotate(0deg); }
            25%{ transform: rotate(4deg) scale(1.02); }
            75%{ transform: rotate(-4deg) scale(0.98); }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <h1>
        <span>🐹</span> СУСЛОВ <span>🐹</span>
    </h1>
    
    <div class="stats-row">
        <div class="prestige-badge" id="prestigeDisplay">
            ⭐ Престиж: <span id="prestigeLevel">0</span> (+<span id="prestigeBonus">0</span>%)
        </div>
        <div class="spent-badge" id="spentDisplay">
            💸 Потрачено: <span id="totalSpent">0</span>🪙
        </div>
    </div>

    <!-- Зона Суслова -->
    <div class="suslov-area">
        <div class="suslov-emoji" id="suslovEmoji">🐭</div>
        <div class="belly-bar-container">
            <div class="belly-label">
                <span>🍖 СЫТОСТЬ</span>
                <span id="bellyPercent">0%</span>
            </div>
            <div class="belly-bar-bg">
                <div class="belly-fill" id="bellyFill" style="width:0%"></div>
            </div>
        </div>
    </div>

    <!-- Статистика -->
    <div class="stats-panel">
        <div class="money-block">
            <span>🪙</span> <span id="moneyValue">30</span>
        </div>
        <div class="food-block">
            <span>🍱</span> <span id="foodCount">0</span>
        </div>
    </div>

    <!-- Магазин еды -->
    <div class="shop">
        <div class="food-row">
            <div class="food-info">
                <span>🥕</span>
                <span class="food-desc">Морковка <small>+6%</small></span>
            </div>
            <button id="buyCarrot">5🪙</button>
        </div>
        <div class="food-row">
            <div class="food-info">
                <span>🍔</span>
                <span class="food-desc">Бургер <small>+18%</small></span>
            </div>
            <button id="buyBurger">14🪙</button>
        </div>
        <div class="food-row">
            <div class="food-info">
                <span>🎂</span>
                <span class="food-desc">Торт <small>+35%</small></span>
            </div>
            <button id="buyCake">30🪙</button>
        </div>
    </div>

    <!-- Кнопка КОРМИТЬ -->
    <button id="feedBtn" style="background:#f5b342; font-size:2rem; padding:16px; margin: 10px 0 0;">🍽️ КОРМИТЬ</button>

    <!-- Сообщение о финале -->
    <div id="gameOverMessage" class="gameover-message"></div>
    
    <!-- КНОПКА ПРОДАТЬ ЖИР (вместо ЗАНОВО) -->
    <div class="sell-area">
        <button id="sellFatBtn">💰 ПРОДАТЬ ЖИР (+5% от потраченного)</button>
    </div>
    
    <div class="footer-note">купи еду → корми → лопни → продай жир → +5% возврат</div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- СОСТОЯНИЕ ----------
        let money = 30;                
        let foodItems = 0;            
        let belly = 0;               
        let gameFinished = false;     
        
        // Престиж и потраченные деньги
        let prestigeLevel = 0;               
        let prestigeBonusPercent = 0;        
        let totalSpentMoney = 0;             // сколько всего монет потрачено за ВСЕ забеги
        
        // Базовый прирост за 1 еду
        const BASE_FOOD_GAIN = 14;
        
        // DOM элементы
        const moneySpan = document.getElementById('moneyValue');
        const foodSpan = document.getElementById('foodCount');
        const bellyFill = document.getElementById('bellyFill');
        const bellyPercent = document.getElementById('bellyPercent');
        const suslovEmoji = document.getElementById('suslovEmoji');
        const gameOverMsg = document.getElementById('gameOverMessage');
        const feedBtn = document.getElementById('feedBtn');
        const buyCarrot = document.getElementById('buyCarrot');
        const buyBurger = document.getElementById('buyBurger');
        const buyCake = document.getElementById('buyCake');
        const sellFatBtn = document.getElementById('sellFatBtn');
        const container = document.getElementById('gameContainer');
        
        // Престиж и потрачено
        const prestigeLevelSpan = document.getElementById('prestigeLevel');
        const prestigeBonusSpan = document.getElementById('prestigeBonus');
        const totalSpentSpan = document.getElementById('totalSpent');

        // Еда: { цена, прирост сытости (%) }
        const FOOD_DATA = {
            carrot: { price: 5,  gain: 6 },
            burger: { price: 14, gain: 18 },
            cake:   { price: 30, gain: 35 }
        };

        // ---------- ВЫЧИСЛЕНИЕ ПРИРОСТА С УЧЁТОМ ПРЕСТИЖА ----------
        function getCurrentFoodGain() {
            let bonusMultiplier = 1 + (prestigeBonusPercent / 100);
            return Math.floor(BASE_FOOD_GAIN * bonusMultiplier);
        }

        // ---------- ОБНОВЛЕНИЕ UI ----------
        function updateUI() {
            moneySpan.textContent = money;
            foodSpan.textContent = foodItems;

            const bellyValue = Math.min(belly, 100);
            const percent = Math.floor(bellyValue);
            bellyFill.style.width = percent + '%';
            bellyPercent.textContent = percent + '%';

            // Престиж и потрачено
            prestigeLevelSpan.textContent = prestigeLevel;
            prestigeBonusSpan.textContent = prestigeBonusPercent;
            totalSpentSpan.textContent = totalSpentMoney;

            // Эмодзи
            if (gameFinished) {
                suslovEmoji.textContent = '💥🐽';
            } else {
                if (belly >= 95) suslovEmoji.textContent = '🐡';
                else if (belly >= 70) suslovEmoji.textContent = '🐹🤰';
                else if (belly >= 35) suslovEmoji.textContent = '🐭🍔';
                else suslovEmoji.textContent = '🐭';
            }

            // Блокировка кнопок магазина и кормления если игра окончена
            const btns = [feedBtn, buyCarrot, buyBurger, buyCake];
            btns.forEach(btn => { btn.disabled = gameFinished; });
            
            // Кнопка "Продать жир" активна ТОЛЬКО когда игра окончена (живот лопнул)
            sellFatBtn.disabled = !gameFinished;

            if (gameFinished) {
                gameOverMsg.innerHTML = `💥 ЖИВОТ ЛОПНУЛ! ПРЕСТИЖ ${prestigeLevel} 💥`;
            } else {
                gameOverMsg.innerHTML = '';
            }
            
            feedBtn.innerHTML = `🍽️ КОРМИТЬ (+${getCurrentFoodGain()}%)`;
        }

        // Проверка на предел (лопание)
        function checkBellyLimit() {
            if (belly >= 100 && !gameFinished) {
                gameFinished = true;
                belly = 100;
                
                // При лопании НЕ увеличиваем престиж автоматически!
                // Престиж растёт только при продаже жира (см. sellFat)
                
                container.classList.add('pop-effect');
                setTimeout(() => container.classList.remove('pop-effect'), 400);
                
                updateUI();
                suslovEmoji.textContent = '💥🐽';
                gameOverMsg.innerHTML = `💥 ЖИВОТ ЛОПНУЛ! ЖМИ "ПРОДАТЬ ЖИР" 💥`;
            } else {
                updateUI();
            }
        }

        // ПОКУПКА ЕДЫ
        function buyFood(type) {
            if (gameFinished) return false;
            const data = FOOD_DATA[type];
            if (!data) return false;
            if (money < data.price) {
                moneySpan.style.transition = '0.1s';
                moneySpan.style.color = '#ff8989';
                setTimeout(() => moneySpan.style.color = '#ffd966', 150);
                return false;
            }

            money -= data.price;
            totalSpentMoney += data.price;    // УЧИТЫВАЕМ ПОТРАЧЕННОЕ
            foodItems += 1;
            updateUI();
            return true;
        }

        // КОРМЛЕНИЕ
        function feedSuslov() {
            if (gameFinished) return;
            if (foodItems <= 0) {
                foodSpan.style.color = '#ffa098';
                setTimeout(() => foodSpan.style.color = '#ffd966', 200);
                return;
            }
            if (belly >= 100) {
                checkBellyLimit();
                return;
            }

            const gain = getCurrentFoodGain();
            
            foodItems -= 1;
            belly = Math.min(belly + gain, 100);
            
            suslovEmoji.style.transform = 'scale(1.1)';
            setTimeout(() => suslovEmoji.style.transform = 'scale(1)', 100);

            updateUI();
            checkBellyLimit();
        }

        // ПРОДАТЬ ЖИР — основная фишка!
        function sellFat() {
            if (!gameFinished) return;   // продать можно только когда лопнул
            
            // 1. Возврат 5% от ВСЕХ потраченных денег
            const refund = Math.floor(totalSpentMoney * 0.05);
            money += refund;
            
            // 2. Увеличиваем престиж и бонус
            prestigeLevel += 1;
            prestigeBonusPercent += 5;
            
            // 3. Сбрасываем текущий забег, но totalSpentMoney НЕ сбрасываем (копим вечно)
            foodItems = 0;
            belly = 0;
            gameFinished = false;
            
            // Немного стартового капитала (база + престиж)
            money = Math.max(money, 25 + prestigeLevel * 3);  // чтобы не уйти в минус
            
            gameOverMsg.innerHTML = '';
            container.classList.remove('pop-effect');
            
            updateUI();
            suslovEmoji.style.transform = 'scale(1)';
            
            // Эффект радости
            suslovEmoji.textContent = '🤑🐹';
            setTimeout(() => updateUI(), 300);
        }

        // ---------- ОБРАБОТЧИКИ ----------
        buyCarrot.addEventListener('click', () => buyFood('carrot'));
        buyBurger.addEventListener('click', () => buyFood('burger'));
        buyCake.addEventListener('click', () => buyFood('cake'));

        feedBtn.addEventListener('click', feedSuslov);
        suslovEmoji.addEventListener('click', feedSuslov);

        sellFatBtn.addEventListener('click', sellFat);

        // Двойной клик по монетке (секрет)
        const moneyBlock = document.querySelector('.money-block');
        moneyBlock.addEventListener('dblclick', () => {
            if (!gameFinished) {
                money += 8;
                updateUI();
            }
        });
        
        // Инициализация
        updateUI();
    })();
</script>
</body>
    </html>
