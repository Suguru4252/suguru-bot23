                        person.stateTimer = 100 + Math.floor(Math.random() * 300);
                    } else {
                        const speed = 1.5;
                        person.vx = (dx / distance) * speed;
                        person.vy = (dy / distance) * speed;
                    }
                } else if (person.state === 'inside') {
                    person.vx = 0;
                    person.vy = 0;
                }

                person.x = person.x + person.vx;
                person.y = person.y + person.vy;

                if (Math.abs(person.x) > gameState.borderSize) {
                    person.vx = person.vx * -1;
                }
                if (Math.abs(person.y) > gameState.borderSize) {
                    person.vy = person.vy * -1;
                }
            }

            // Обновление машин (едут только по дорогам)
            for (let i = 0; i < gameState.cars.length; i++) {
                const car = gameState.cars[i];

                if (car.parked) {
                    continue;
                }

                car.x = car.x + car.vx;
                car.y = car.y + car.vy;

                let onRoad = false;
                for (let j = 0; j < gameState.roads.length; j++) {
                    const road = gameState.roads[j];
                    if (car.x >= road.x && car.x <= road.x + road.w && car.y >= road.y && car.y <= road.y + road.h) {
                        onRoad = true;
                        break;
                    }
                }

                if (!onRoad) {
                    let bestRoad = null;
                    let bestDistance = 99999;

                    for (let j = 0; j < gameState.roads.length; j++) {
                        const road = gameState.roads[j];
                        const roadCenterX = road.x + road.w / 2;
                        const roadCenterY = road.y + road.h / 2;
                        const dx = car.x - roadCenterX;
                        const dy = car.y - roadCenterY;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < bestDistance) {
                            bestDistance = distance;
                            bestRoad = road;
                        }
                    }

                    if (bestRoad) {
                        const roadCenterX = bestRoad.x + bestRoad.w / 2;
                        const roadCenterY = bestRoad.y + bestRoad.h / 2;
                        const dx = roadCenterX - car.x;
                        const dy = roadCenterY - car.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance > 0) {
                            car.vx = (dx / distance) * 2;
                            car.vy = (dy / distance) * 2;
                        }
                    }
                }

                if (Math.abs(car.x) > gameState.borderSize || Math.abs(car.y) > gameState.borderSize) {
                    car.vx = car.vx * -1;
                    car.vy = (Math.random() - 0.5) * 2;
                }

                // Иногда NPC выходит из машины
                if (Math.random() < 0.005) {
                    for (let j = 0; j < gameState.people.length; j++) {
                        const person = gameState.people[j];
                        if (person.carRef === car && Math.random() < 0.3) {
                            person.hasCar = false;
                            person.carRef = null;
                            person.x = car.x;
                            person.y = car.y;
                            car.parked = true;

                            setTimeout(function() {
                                car.parked = false;
                                if (Math.random() < 0.5) {
                                    for (let k = 0; k < gameState.people.length; k++) {
                                        const newPerson = gameState.people[k];
                                        if (!newPerson.hasCar && !newPerson.hasBoat) {
                                            newPerson.hasCar = true;
                                            newPerson.carRef = car;
                                            break;
                                        }
                                    }
                                }
                            }, 2000 + Math.random() * 3000);

                            break;
                        }
                    }
                }
            }

            // Обновление лодок (только по воде)
            for (let i = 0; i < gameState.boats.length; i++) {
                const boat = gameState.boats[i];

                if (boat.parked) {
                    continue;
                }

                boat.x = boat.x + boat.vx;
                boat.y = boat.y + boat.vy;

                let onWater = isPointInWater(boat.x, boat.y);

                if (!onWater) {
                    let bestWater = null;
                    let bestDistance = 99999;

                    for (let j = 0; j < gameState.waterBodies.length; j++) {
                        const water = gameState.waterBodies[j];
                        const bounds = getWaterBounds(water);
                        const waterCenterX = (bounds.minX + bounds.maxX) / 2;
                        const waterCenterY = (bounds.minY + bounds.maxY) / 2;
                        const dx = boat.x - waterCenterX;
                        const dy = boat.y - waterCenterY;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < bestDistance) {
                            bestDistance = distance;
                            bestWater = water;
                        }
                    }

                    if (bestWater) {
                        const bounds = getWaterBounds(bestWater);
                        const waterCenterX = (bounds.minX + bounds.maxX) / 2;
                        const waterCenterY = (bounds.minY + bounds.maxY) / 2;
                        const dx = waterCenterX - boat.x;
                        const dy = waterCenterY - boat.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance > 0) {
                            boat.vx = (dx / distance) * 2;
                            boat.vy = (dy / distance) * 2;
                        }
                    }
                }

                if (Math.random() < 0.01) {
                    boat.vx = (Math.random() - 0.5) * 2;
                    boat.vy = (Math.random() - 0.5) * 2;
                }

                // Иногда NPC выходит из лодки
                if (Math.random() < 0.003) {
                    for (let j = 0; j < gameState.people.length; j++) {
                        const person = gameState.people[j];
                        if (person.boatRef === boat && Math.random() < 0.2) {
                            person.hasBoat = false;
                            person.boatRef = null;
                            person.x = boat.x;
                            person.y = boat.y;
                            boat.parked = true;

                            setTimeout(function() {
                                boat.parked = false;
                                if (Math.random() < 0.5) {
                                    for (let k = 0; k < gameState.people.length; k++) {
                                        const newPerson = gameState.people[k];
                                        if (!newPerson.hasCar && !newPerson.hasBoat) {
                                            newPerson.hasBoat = true;
                                            newPerson.boatRef = boat;
                                            break;
                                        }
                                    }
                                }
                            }, 3000 + Math.random() * 5000);

                            break;
                        }
                    }
                }
            }

            // Спавн новых машин из автосалона
            let hasCarshop = false;
            let carshopBuilding = null;
            for (let i = 0; i < gameState.buildings.length; i++) {
                if (gameState.buildings[i].type === 'carshop') {
                    hasCarshop = true;
                    carshopBuilding = gameState.buildings[i];
                    break;
                }
            }

            if (hasCarshop && gameState.roads.length > 0 && gameState.cars.length < 12 && Math.random() < 0.005) {
                const newCar = {
                    x: carshopBuilding.x + carshopBuilding.w / 2,
                    y: carshopBuilding.y + carshopBuilding.h / 2,
                    vx: 2,
                    vy: 0,
                    color: 'hsl(' + Math.floor(Math.random() * 360) + ', 70%, 55%)',
                    parked: false,
                    homeRef: carshopBuilding,
                };
                gameState.cars.push(newCar);

                for (let i = 0; i < gameState.people.length; i++) {
                    const person = gameState.people[i];
                    if (!person.hasCar && !person.hasBoat) {
                        person.hasCar = true;
                        person.carRef = newCar;
                        break;
                    }
                }
            }

            // Спавн новых лодок из судостроительного завода
            let hasShipyard = false;
            let shipyardBuilding = null;
            for (let i = 0; i < gameState.buildings.length; i++) {
                if (gameState.buildings[i].type === 'shipyard') {
                    hasShipyard = true;
                    shipyardBuilding = gameState.buildings[i];
                    break;
                }
            }

            if (hasShipyard && gameState.waterBodies.length > 0 && gameState.boats.length < 6 && Math.random() < 0.003) {
                let nearestWater = null;
                for (let i = 0; i < gameState.waterBodies.length; i++) {
                    const water = gameState.waterBodies[i];
                    const bounds = getWaterBounds(water);
                    if (shipyardBuilding.x >= bounds.minX && shipyardBuilding.x <= bounds.maxX &&
                        shipyardBuilding.y >= bounds.minY && shipyardBuilding.y <= bounds.maxY) {
                        nearestWater = water;
                        break;
                    }
                }

                if (nearestWater) {
                    const bounds = getWaterBounds(nearestWater);
                    const newBoat = {
                        x: (bounds.minX + bounds.maxX) / 2,
                        y: (bounds.minY + bounds.maxY) / 2,
                        vx: (Math.random() - 0.5) * 2,
                        vy: (Math.random() - 0.5) * 2,
                        color: 'hsl(' + Math.floor(Math.random() * 360) + ', 50%, 50%)',
                        parked: false,
                        homeRef: shipyardBuilding,
                    };
                    gameState.boats.push(newBoat);

                    for (let i = 0; i < gameState.people.length; i++) {
                        const person = gameState.people[i];
                        if (!person.hasBoat && !person.hasCar) {
                            person.hasBoat = true;
                            person.boatRef = newBoat;
                            break;
                        }
                    }
                }
            }
        }

        function spawnParticles(worldX, worldY, colorHex) {
            const hex = colorHex || '#f0d060';
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);

            for (let i = 0; i < 25; i++) {
                gameState.particles.push({
                    x: worldX,
                    y: worldY,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5 - 4,
                    life: 1,
                    size: Math.random() * 5 + 2,
                    r: r,
                    g: g,
                    b: b,
                });
            }
        }        // ==================== СОБЫТИЯ МЫШИ ====================
        document.addEventListener('mousemove', function(event) {
            if (!gameState.canvas || !gameState.countryName) {
                return;
            }

            const coords = getCanvasCoords(event);
            gameState.mouseX = coords.sx;
            gameState.mouseY = coords.sy;

            if (gameState.dragging) {
                const deltaX = event.clientX - gameState.dragStartX;
                const deltaY = event.clientY - gameState.dragStartY;

                gameState.cameraX = gameState.cameraX - deltaX / gameState.zoom;
                gameState.cameraY = gameState.cameraY - deltaY / gameState.zoom;

                gameState.dragStartX = event.clientX;
                gameState.dragStartY = event.clientY;
                gameState.dragDistance = gameState.dragDistance + Math.abs(deltaX) + Math.abs(deltaY);
            }

            const worldPos = screenToWorld(coords.sx, coords.sy);
            gameState.hoveredBuilding = findBuildingAt(worldPos.x, worldPos.y);
            updateInfoPopup(coords.sx, coords.sy);
        });

        document.addEventListener('mousedown', function(event) {
            if (!gameState.canvas || !gameState.countryName) {
                return;
            }

            if (event.target.closest('#bottom-panel') || event.target.closest('#top-bar') || event.target.closest('#build-modal')) {
                return;
            }

            if (event.button === 0) {
                const worldPos = getWorldFromEvent(event);
                gameState.mouseX = worldPos.sx;
                gameState.mouseY = worldPos.sy;

                if (gameState.deleteMode) {
                    if (deleteAt(worldPos.wx, worldPos.wy)) {
                        return;
                    }
                }

                if (gameState.selectedType && !gameState.selectMode && !gameState.deleteMode) {
                    if (buildAt(worldPos.wx, worldPos.wy)) {
                        return;
                    }
                }

                gameState.dragging = true;
                gameState.dragStartX = event.clientX;
                gameState.dragStartY = event.clientY;
                gameState.dragDistance = 0;
                updateUI();
            }
        });

        document.addEventListener('mouseup', function(event) {
            if (!gameState.canvas || !gameState.countryName) {
                return;
            }

            if (gameState.dragging && gameState.dragDistance < 3) {
                const worldPos = getWorldFromEvent(event);

                if (gameState.deleteMode) {
                    deleteAt(worldPos.wx, worldPos.wy);
                } else if (gameState.selectedType && !gameState.selectMode) {
                    buildAt(worldPos.wx, worldPos.wy);
                }
            }

            gameState.dragging = false;
            gameState.dragDistance = 0;
            updateUI();
        });

        document.addEventListener('contextmenu', function(event) {
            if (event.target.closest('#game-canvas')) {
                event.preventDefault();
            }
        });

        document.addEventListener('wheel', function(event) {
            if (!gameState.canvas || !gameState.countryName || event.target.closest('#build-modal')) {
                return;
            }

            event.preventDefault();

            const rect = gameState.canvas.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;

            const worldBeforeZoom = screenToWorld(mouseX, mouseY);

            const zoomFactor = 1.07;
            if (event.deltaY < 0) {
                gameState.zoom = Math.min(3, gameState.zoom * zoomFactor);
            } else {
                gameState.zoom = Math.max(0.25, gameState.zoom / zoomFactor);
            }

            gameState.gridSize = Math.round(48 * gameState.zoom);

            const worldAfterZoom = screenToWorld(mouseX, mouseY);

            gameState.cameraX = gameState.cameraX + worldBeforeZoom.x - worldAfterZoom.x;
            gameState.cameraY = gameState.cameraY + worldBeforeZoom.y - worldAfterZoom.y;
        }, { passive: false });

        // ==================== ТАЧ-СОБЫТИЯ ====================
        document.addEventListener('touchstart', function(event) {
            if (!gameState.canvas || !gameState.countryName) {
                return;
            }

            if (event.target.closest('#bottom-panel') || event.target.closest('#top-bar') || event.target.closest('#build-modal')) {
                return;
            }

            if (event.touches.length === 2) {
                gameState.dragging = false;
                const dx = event.touches[0].clientX - event.touches[1].clientX;
                const dy = event.touches[0].clientY - event.touches[1].clientY;
                gameState.touchDistance = Math.sqrt(dx * dx + dy * dy);
                gameState.lastPinchZoom = gameState.zoom;
                return;
            }

            if (event.touches.length === 1) {
                const touch = event.touches[0];
                const rect = gameState.canvas.getBoundingClientRect();

                gameState.mouseX = touch.clientX - rect.left;
                gameState.mouseY = touch.clientY - rect.top;
                gameState.dragStartX = touch.clientX;
                gameState.dragStartY = touch.clientY;
                gameState.dragDistance = 0;
                gameState.dragging = true;
                gameState.touchStartTime = Date.now();
                updateUI();
            }
        }, { passive: false });

        document.addEventListener('touchmove', function(event) {
            if (!gameState.canvas || !gameState.countryName) {
                return;
            }

            if (event.touches.length === 2) {
                event.preventDefault();

                const dx = event.touches[0].clientX - event.touches[1].clientX;
                const dy = event.touches[0].clientY - event.touches[1].clientY;
                const currentDistance = Math.sqrt(dx * dx + dy * dy);
                const scale = currentDistance / gameState.touchDistance;

                gameState.zoom = Math.max(0.25, Math.min(3, gameState.lastPinchZoom * scale));
                gameState.gridSize = Math.round(48 * gameState.zoom);
            } else if (event.touches.length === 1 && gameState.dragging) {
                const deltaX = event.touches[0].clientX - gameState.dragStartX;
                const deltaY = event.touches[0].clientY - gameState.dragStartY;

                gameState.cameraX = gameState.cameraX - deltaX / gameState.zoom;
                gameState.cameraY = gameState.cameraY - deltaY / gameState.zoom;

                gameState.dragStartX = event.touches[0].clientX;
                gameState.dragStartY = event.touches[0].clientY;
                gameState.dragDistance = gameState.dragDistance + Math.abs(deltaX) + Math.abs(deltaY);

                const rect = gameState.canvas.getBoundingClientRect();
                gameState.mouseX = event.touches[0].clientX - rect.left;
                gameState.mouseY = event.touches[0].clientY - rect.top;
            }
        }, { passive: false });

        document.addEventListener('touchend', function(event) {
            if (!gameState.canvas || !gameState.countryName) {
                return;
            }

            const wasTap = gameState.dragDistance < 8 && (Date.now() - gameState.touchStartTime) < 300;

            if (wasTap && event.changedTouches.length === 1) {
                const worldPos = getWorldFromEvent(event.changedTouches[0]);

                if (gameState.deleteMode) {
                    deleteAt(worldPos.wx, worldPos.wy);
                } else if (gameState.selectedType && !gameState.selectMode) {
                    buildAt(worldPos.wx, worldPos.wy);
                }
            }

            gameState.dragging = false;
            gameState.dragDistance = 0;
            updateUI();
        });

        // ==================== КЛАВИШИ ====================
        document.addEventListener('keydown', function(event) {
            if (!gameState.countryName) {
                return;
            }

            if (event.key === 'Escape') {
                gameState.selectedType = null;
                gameState.deleteMode = false;
                gameState.selectMode = false;
                closeBuildModal();
                updateUI();
            }

            if (event.key === 'Delete' || event.key === 'Backspace') {
                event.preventDefault();
                toggleDeleteMode();
            }

            if (event.key === 'b' || event.key === 'B') {
                openBuildModal();
            }

            if (event.key === 'i' || event.key === 'I') {
                toggleSelectMode();
            }

            if (event.key === 'r' || event.key === 'R' || event.key === 'к' || event.key === 'К') {
                event.preventDefault();
                rotateBuilding();
            }
        });

        // ==================== МОДАЛЬНОЕ ОКНО ====================
        document.getElementById('build-modal').addEventListener('click', function(event) {
            if (event.target === this) {
                closeBuildModal();
            }
        });

        document.getElementById('size-selector').addEventListener('click', function(event) {
            if (event.target.classList.contains('size-btn')) {
                gameState.buildScale = parseFloat(event.target.dataset.scale);
                buildModalGrid();
            }
        });

        // ==================== ИНФО-ОКНО ====================
        function updateInfoPopup(screenX, screenY) {
            const popup = document.getElementById('info-popup');

            if (gameState.hoveredBuilding && !gameState.dragging && (gameState.selectMode || (!gameState.selectedType && !gameState.deleteMode))) {
                const building = gameState.hoveredBuilding;
                const info = buildingTypes[building.type];
                const scale = building.scale || 1;
                const cost = getBuildCost(building.type, scale);
                const income = Math.floor((info ? info.income : 0) * scale);
                const populationBonus = Math.floor((info ? info.populationBonus : 0) * scale);
                const happinessBonus = Math.floor((info ? info.happinessBonus : 0) * scale);

                popup.style.display = 'block';
                popup.style.left = Math.min(screenX + 22, window.innerWidth - 280) + 'px';
                popup.style.top = Math.max(10, screenY - 30) + 'px';

                let popupHTML = '<span class="pop-title">' + (info ? info.emoji : '?') + ' ' + (info ? info.name : 'Объект') + '</span>';
                popupHTML = popupHTML + '📏 Размер: ' + building.w + 'x' + building.h + ' (x' + scale + ') 🔄' + (building.rotation || 0) + '°<br>';
                popupHTML = popupHTML + '💰 Стоимость: ' + cost.toLocaleString() + '<br>';
                popupHTML = popupHTML + '<span class="pop-income">📈 Доход/мес: 💰' + income.toLocaleString() + '</span><br>';

                if (!info.isRoad && !info.isRail && !info.isRoadCurve) {
                    const capacity = Math.floor((info.capacity || 0) * scale);
                    popupHTML = popupHTML + '<span class="pop-population">👥 Вместимость: ' + capacity + '</span><br>';
                }

                const happySign = happinessBonus >= 0 ? '+' : '';
                popupHTML = popupHTML + '<span class="pop-happy">😊 Счастье: ' + happySign + happinessBonus + '</span>';

                popup.innerHTML = popupHTML;
            } else {
                popup.style.display = 'none';
            }
        }

        // ==================== УТИЛИТЫ ====================
        function addLogMessage(message) {
            const logContainer = document.getElementById('message-log');
            const messageElement = document.createElement('div');
            messageElement.className = 'log-msg';
            messageElement.textContent = message;
            logContainer.appendChild(messageElement);

            setTimeout(function() {
                messageElement.remove();
            }, 3500);

            if (logContainer.children.length > 6) {
                logContainer.firstChild.remove();
            }
        }

        function shakeElement(elementId) {
            const element = document.getElementById(elementId);
            if (!element) {
                return;
            }
            element.style.animation = 'shake 0.4s ease';
            setTimeout(function() {
                element.style.animation = '';
            }, 400);
        }
