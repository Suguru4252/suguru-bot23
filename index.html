<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TERRITORY WARS | Захват территорий</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0c12 0%, #0e111a 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 20px;
            color: #eee;
        }

        .game-wrapper {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Верхняя панель */
        .top-bar {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gang-info {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }

        .gang-name-box {
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 40px;
            border-left: 4px solid;
        }

        .gang-name-text {
            font-size: 24px;
            font-weight: bold;
        }

        .stat-box {
            display: flex;
            gap: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.7;
        }

        .btn {
            background: linear-gradient(135deg, #2a2f3f, #1a1f2f);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-danger {
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
        }

        .btn-success {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f57c00, #ef6c00);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        /* Основной лэйаут */
        .main-layout {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .map-container {
            flex: 3;
            min-width: 500px;
            background: #00000055;
            border-radius: 24px;
            padding: 10px;
        }

        canvas {
            width: 100%;
            height: auto;
            background: #1a1f2a;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .right-panel {
            flex: 1;
            min-width: 260px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .tile-detail {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }

        .tile-owner {
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
        }

        .capture-btn {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
        }

        .event-log {
            background: rgba(0,0,0,0.6);
            border-radius: 16px;
            padding: 12px;
            height: 250px;
            overflow-y: auto;
            font-size: 12px;
            font-family: monospace;
        }

        .event-entry {
            border-left: 3px solid #ff4444;
            padding-left: 8px;
            margin: 6px 0;
            color: #ccc;
        }

        .create-gang-panel {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }

        .create-gang-panel input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #2a2f3f;
            border: 1px solid #555;
            border-radius: 40px;
            color: white;
            font-family: inherit;
        }

        .create-gang-panel input[type="color"] {
            height: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- Верхняя панель -->
    <div class="top-bar" id="topBar">
        <div class="gang-info" id="gangInfo">
            <div class="gang-name-box" id="gangNameBox" style="border-left-color: #888;">
                <div class="gang-name-text" id="gangNameDisplay">⚡ НЕТ БАНДЫ</div>
            </div>
            <div class="stat-box" id="statBox" style="display: none;">
                <div class="stat"><div class="stat-value" id="territoryCount">0</div><div class="stat-label">ТЕРРИТОРИЙ</div></div>
                <div class="stat"><div class="stat-value" id="gangPower">0</div><div class="stat-label">СИЛА</div></div>
            </div>
        </div>
        <div>
            <button class="btn" id="leaveGangBtn" style="display: none; background: #7f8c8d;">🏃‍♂️ ПОКИНУТЬ БАНДУ</button>
        </div>
    </div>

    <div class="main-layout">
        <!-- КАРТА -->
        <div class="map-container">
            <canvas id="gameCanvas" width="700" height="700"></canvas>
            <div style="margin-top: 10px; font-size: 12px; text-align: center; opacity: 0.7;">
                🎯 Клик по клетке — выбрать | ⚔️ Нажми "ЗАХВАТИТЬ" чтобы атаковать
            </div>
        </div>

        <!-- ПРАВАЯ ПАНЕЛЬ -->
        <div class="right-panel">
            <!-- Панель создания банды -->
            <div class="create-gang-panel" id="createGangPanel">
                <h3>🔥 СОЗДАТЬ БАНДУ</h3>
                <input type="text" id="gangNameInput" placeholder="Название банды" value="ГЕТТО КРЫСЫ">
                <input type="color" id="gangColorInput" value="#FF4444">
                <button class="btn btn-success" id="createGangBtn" style="width: 100%;">СОЗДАТЬ БАНДУ</button>
            </div>

            <!-- Информация о выбранной клетке -->
            <div class="tile-detail" id="tileDetail">
                <div style="opacity: 0.6;">👆 Выбери клетку на карте</div>
                <div class="tile-owner" id="tileOwner">—</div>
                <button class="btn btn-danger capture-btn" id="captureBtn" style="display: none;">⚔️ ЗАХВАТИТЬ</button>
            </div>

            <!-- Лог событий -->
            <div class="event-log" id="eventLog">
                <div class="event-entry">🔥 Добро пожаловать в Territory Wars</div>
                <div class="event-entry">💀 Создай банду и захватывай территории</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    const MAP_SIZE = 25;        // 25x25 = 625 клеток
    const CELL_SIZE = 700 / MAP_SIZE;
    
    // ========== ГЛОБАЛЬНЫЕ ДАННЫЕ ==========
    let mapData = [];           // 2D массив [y][x] = gangId или null
    let gangs = [];             // [{ id, name, color }]
    let currentGangId = null;   // ID банды игрока
    let selectedTile = null;     // { x, y }
    
    // Canvas
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function saveToLocalStorage() {
        localStorage.setItem('turfwars_data', JSON.stringify({
            gangs: gangs,
            mapData: mapData,
            currentGangId: currentGangId
        }));
    }
    
    function loadFromLocalStorage() {
        const saved = localStorage.getItem('turfwars_data');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                gangs = data.gangs;
                mapData = data.mapData;
                currentGangId = data.currentGangId;
                return true;
            } catch(e) { console.warn(e); }
        }
        return false;
    }
    
    // Инициализация пустой карты (все клетки null)
    function initEmptyMap() {
        mapData = Array(MAP_SIZE).fill().map(() => Array(MAP_SIZE).fill(null));
    }
    
    // Подсчет территорий банды
    function countTerritory(gangId) {
        let count = 0;
        for(let y = 0; y < MAP_SIZE; y++) {
            for(let x = 0; x < MAP_SIZE; x++) {
                if(mapData[y][x] === gangId) count++;
            }
        }
        return count;
    }
    
    // Сила банды (просто количество территорий)
    function getGangPower(gangId) {
        return countTerritory(gangId);
    }
    
    // Обновить интерфейс
    function updateUI() {
        const gang = gangs.find(g => g.id === currentGangId);
        
        if (gang) {
            document.getElementById('gangNameDisplay').innerHTML = gang.name;
            document.getElementById('gangNameBox').style.borderLeftColor = gang.color;
            document.getElementById('gangNameDisplay').style.color = gang.color;
            document.getElementById('statBox').style.display = 'flex';
            document.getElementById('leaveGangBtn').style.display = 'block';
            document.getElementById('createGangPanel').style.display = 'none';
            
            const territories = countTerritory(currentGangId);
            document.getElementById('territoryCount').innerText = territories;
            document.getElementById('gangPower').innerText = territories;
        } else {
            document.getElementById('gangNameDisplay').innerHTML = '⚡ НЕТ БАНДЫ';
            document.getElementById('gangNameBox').style.borderLeftColor = '#888';
            document.getElementById('gangNameDisplay').style.color = '#eee';
            document.getElementById('statBox').style.display = 'none';
            document.getElementById('leaveGangBtn').style.display = 'none';
            document.getElementById('createGangPanel').style.display = 'block';
        }
        
        // Обновляем детали выбранной клетки
        updateTileDetail();
    }
    
    // Обновить информацию о выбранной клетке
    function updateTileDetail() {
        if (selectedTile === null) {
            document.getElementById('tileDetail').innerHTML = `
                <div style="opacity: 0.6;">👆 Выбери клетку на карте</div>
                <div class="tile-owner">—</div>
                <button class="btn btn-danger capture-btn" id="captureBtn" style="display: none;">⚔️ ЗАХВАТИТЬ</button>
            `;
            return;
        }
        
        const { x, y } = selectedTile;
        const ownerId = mapData[y][x];
        const owner = ownerId ? gangs.find(g => g.id === ownerId) : null;
        const ownerName = owner ? owner.name : "Нейтральная территория";
        const ownerColor = owner ? owner.color : "#888";
        
        const isOwnTerritory = (ownerId === currentGangId);
        const canCapture = (currentGangId !== null && !isOwnTerritory);
        
        document.getElementById('tileDetail').innerHTML = `
            <div style="opacity: 0.6;">📍 Клетка (${x}, ${y})</div>
            <div class="tile-owner" style="color: ${ownerColor};">${ownerName}</div>
            <button class="btn btn-danger capture-btn" id="captureBtn" style="display: ${canCapture ? 'block' : 'none'};">⚔️ ЗАХВАТИТЬ</button>
        `;
        
        // Перепривязываем событие
        const captureBtn = document.getElementById('captureBtn');
        if (captureBtn && canCapture) {
            captureBtn.onclick = () => captureTile();
        }
    }
    
    // ========== ЗАХВАТ ТЕРРИТОРИИ (ЛЮБУЮ, НЕЗАВИСИМО ОТ РАСПОЛОЖЕНИЯ) ==========
    function captureTile() {
        if (currentGangId === null) {
            addLog("❌ Сначала создай банду!", true);
            return;
        }
        
        if (selectedTile === null) {
            addLog("❌ Выбери клетку для захвата!", true);
            return;
        }
        
        const { x, y } = selectedTile;
        const currentOwnerId = mapData[y][x];
        
        // Если уже своя
        if (currentOwnerId === currentGangId) {
            addLog("🏠 Это уже твоя территория!", true);
            return;
        }
        
        const attacker = gangs.find(g => g.id === currentGangId);
        const defender = currentOwnerId ? gangs.find(g => g.id === currentOwnerId) : null;
        
        // Сила атакующего = количество его территорий + рандом
        const attackerPower = countTerritory(currentGangId) + Math.random() * 30;
        
        // Сила защитника
        let defenderPower = 20 + Math.random() * 30; // базовая защита нейтралов
        let defenderName = "Нейтралы";
        
        if (defender) {
            defenderPower = countTerritory(currentOwnerId) + Math.random() * 30;
            defenderName = defender.name;
        }
        
        addLog(`⚔️ ${attacker.name} (${Math.floor(attackerPower)}) атакует ${defenderName} (${Math.floor(defenderPower)})`);
        
        if (attackerPower > defenderPower) {
            // Захват
            mapData[y][x] = currentGangId;
            addLog(`✅ ${attacker.name} ЗАХВАТИЛ территорию (${x},${y})!`);
            
            // Если у защитника не осталось территорий — банда исчезает
            if (defender && countTerritory(currentOwnerId) === 0) {
                addLog(`💀 БАНДА ${defender.name} УНИЧТОЖЕНА!`);
                gangs = gangs.filter(g => g.id !== currentOwnerId);
            }
            
            renderMap();
            updateUI();
            saveToLocalStorage();
        } else {
            addLog(`😭 Поражение! ${defenderName} отбил атаку`, true);
        }
    }
    
    // ========== СОЗДАНИЕ БАНДЫ ==========
    function createGang() {
        let name = document.getElementById('gangNameInput').value.trim();
        if (!name) name = "ГЕТТО КРЫСЫ";
        
        let color = document.getElementById('gangColorInput').value;
        
        const newId = Date.now();
        const newGang = {
            id: newId,
            name: name,
            color: color
        };
        
        gangs.push(newGang);
        currentGangId = newId;
        
        // Даём стартовую территорию (первую свободную)
        let placed = false;
        for(let y = 0; y < MAP_SIZE && !placed; y++) {
            for(let x = 0; x < MAP_SIZE && !placed; x++) {
                if(mapData[y][x] === null) {
                    mapData[y][x] = newId;
                    placed = true;
                    addLog(`🎉 Банда "${name}" создана! Стартовая клетка (${x},${y})`);
                }
            }
        }
        
        if (!placed) {
            addLog("⚠️ Карта переполнена! Не удалось разместить базу.", true);
        }
        
        renderMap();
        updateUI();
        saveToLocalStorage();
    }
    
    // ========== ПОКИНУТЬ БАНДУ ==========
    function leaveGang() {
        if (currentGangId === null) return;
        
        const gang = gangs.find(g => g.id === currentGangId);
        if (gang) {
            addLog(`👋 Вы покинули банду "${gang.name}"`);
            
            // Если у банды есть другие территории? Они остаются, но без игрока
            // Просто убираем игрока из банды
            currentGangId = null;
            
            renderMap();
            updateUI();
            saveToLocalStorage();
        }
    }
    
    // ========== ОТРИСОВКА КАРТЫ ==========
    function renderMap() {
        for(let y = 0; y < MAP_SIZE; y++) {
            for(let x = 0; x < MAP_SIZE; x++) {
                const ownerId = mapData[y][x];
                let color = "#3a3f4a"; // серый цвет нейтральной клетки
                
                if (ownerId !== null) {
                    const gang = gangs.find(g => g.id === ownerId);
                    if (gang) color = gang.color;
                    else color = "#5a5f6a";
                }
                
                ctx.fillStyle = color;
                ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                
                // Подсветка выбранной клетки
                if (selectedTile && selectedTile.x === x && selectedTile.y === y) {
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x * CELL_SIZE + 2, y * CELL_SIZE + 2, CELL_SIZE - 5, CELL_SIZE - 5);
                }
                
                // Рамка клетки
                ctx.strokeStyle = "rgba(0,0,0,0.3)";
                ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            }
        }
    }
    
    // ========== ВЫБОР КЛЕТКИ ==========
    function selectTile(x, y) {
        selectedTile = { x, y };
        updateTileDetail();
        renderMap();
    }
    
    // ========== ОБРАБОТКА КЛИКА ПО КАНВАСУ ==========
    function handleCanvasClick(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        let mouseX = (e.clientX - rect.left) * scaleX;
        let mouseY = (e.clientY - rect.top) * scaleY;
        
        let cellX = Math.floor(mouseX / CELL_SIZE);
        let cellY = Math.floor(mouseY / CELL_SIZE);
        
        if (cellX >= 0 && cellX < MAP_SIZE && cellY >= 0 && cellY < MAP_SIZE) {
            selectTile(cellX, cellY);
        }
    }
    
    // ========== ДОБАВЛЕНИЕ В ЛОГ ==========
    function addLog(msg, isError = false) {
        const logDiv = document.getElementById('eventLog');
        const entry = document.createElement('div');
        entry.className = 'event-entry';
        entry.style.borderLeftColor = isError ? '#ff8888' : '#ff4444';
        entry.innerHTML = `[${new Date().toLocaleTimeString().slice(0,5)}] ${msg}`;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        if (logDiv.children.length > 30) logDiv.removeChild(logDiv.children[0]);
    }
    
    // ========== СБРОС МИРА (только если нужно) ==========
    // Убрал кнопку, но функция осталась на случай если понадобится через консоль
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        if (!loadFromLocalStorage()) {
            initEmptyMap();
            gangs = [];
            currentGangId = null;
        }
        
        renderMap();
        updateUI();
        
        canvas.addEventListener('click', handleCanvasClick);
        document.getElementById('createGangBtn').onclick = () => createGang();
        document.getElementById('leaveGangBtn').onclick = () => leaveGang();
        
        addLog("🔥 Игра запущена! Создай банду и захватывай любые клетки.");
    }
    
    init();
</script>
</body>
</html>
