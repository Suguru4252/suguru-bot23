<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🥩 СИСЯ ДИМЫ ДАУНА · ПИТОМЕЦ ДАВИД</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #2b1b0e 0%, #4a2e1a 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Comic Sans MS', 'Impact', sans-serif;
      padding: 12px;
    }

    .game-container {
      max-width: 550px;
      width: 100%;
      background: #fbe9c3;
      background-image: radial-gradient(circle at 20% 30%, #fff3d6, #f0d5a8);
      border-radius: 60px 60px 30px 30px;
      box-shadow: 0 20px 0 #6b3e1f, 0 30px 30px rgba(0,0,0,0.4);
      padding: 24px 18px 30px;
      border: 4px solid #ac6f3c;
      text-align: center;
      transition: 0.2s;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #3d1f09;
      text-shadow: 5px 5px 0 #e7b87b, 2px 2px 0 #a6531e;
      word-break: break-word;
      transform: rotate(-1deg);
    }

    .dima-zone {
      background: #b38b60;
      padding: 20px 10px 25px;
      border-radius: 80px 80px 40px 40px;
      box-shadow: inset 0 -6px 0 #5d3a22, 0 12px 0 #4d2f19, 0 8px 15px black;
      margin-bottom: 18px;
      border: 3px solid #eeb574;
    }

    .sisi-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .sisya {
      font-size: 7rem;
      line-height: 1;
      filter: drop-shadow(6px 10px 0 rgba(0,0,0,0.3));
      cursor: pointer;
      transition: 0.1s ease;
      transform: scale(1);
      background: #fad6b3;
      padding: 0 10px 10px 10px;
      border-radius: 999px;
      display: inline-block;
    }

    .sisya:active {
      transform: scale(0.88);
      filter: drop-shadow(2px 4px 0 #251608);
    }

    .sisi-stats {
      background: #2c1a0b;
      padding: 14px 10px;
      border-radius: 50px;
      box-shadow: inset 0 2px 6px black, 0 6px 0 #1a0f06;
      color: #ffdead;
      font-weight: bold;
      font-size: 1.5rem;
      margin: 15px 0 5px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      border: 2px solid #bc8f4b;
    }

    .sisi-size {
      background: #51321b;
      padding: 8px 18px;
      border-radius: 40px;
      box-shadow: inset 0 2px 5px black;
      color: #ffd78a;
      text-shadow: 2px 2px 0 #1f0f03;
    }

    .crit-meter {
      background: #241407;
      border-radius: 30px;
      padding: 6px 14px;
      color: #ffb882;
      font-size: 1.2rem;
    }

    .pet-david {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #6e4d2e;
      margin: 20px 0 16px;
      padding: 12px 18px;
      border-radius: 100px 40px 100px 40px;
      box-shadow: inset 0 1px 6px #eebb77, 0 8px 0 #3a281a, 0 5px 10px black;
      border: 2px solid #efc48c;
      color: #fff3db;
      font-weight: bold;
    }

    .pet-avatar {
      font-size: 3.5rem;
      background: #2d1c0b;
      padding: 5px 18px;
      border-radius: 60px;
      box-shadow: inset 0 0 0 3px #b47b44;
      line-height: 1.2;
    }

    .pet-status {
      text-align: right;
    }

    .pet-status div {
      font-size: 1.3rem;
      background: #1f1309;
      padding: 6px 14px;
      border-radius: 30px;
      margin: 4px 0;
      border: 1px solid #c89a5b;
    }

    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 8px 0 10px;
    }

    .btn {
      background: #d68f3c;
      border: none;
      font-weight: bold;
      font-size: 1.4rem;
      padding: 12px 22px;
      border-radius: 60px;
      box-shadow: 0 7px 0 #7a451b, 0 4px 8px black;
      color: #1f0f02;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.07s;
      border: 2px solid #feda9b;
      flex: 1 0 140px;
      letter-spacing: 2px;
      transform: rotate(-0.5deg);
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #7a451b, 0 4px 8px black;
    }

    .btn:disabled {
      opacity: 0.5;
      filter: grayscale(0.5);
      transform: none;
      box-shadow: 0 5px 0 #5f371a;
      pointer-events: none;
    }

    .crit-log {
      background: #0c0702d0;
      backdrop-filter: blur(2px);
      padding: 10px 14px;
      border-radius: 40px;
      margin-top: 18px;
      color: #ffe3ae;
      font-size: 1.2rem;
      font-weight: bold;
      min-height: 70px;
      border: 2px dashed #f3b35e;
      box-shadow: inset 0 0 10px #37200b;
      transition: 0.2s;
    }

    .glow-crit {
      text-shadow: 0 0 15px rgb(255, 200, 0), 0 0 30px rgb(255, 80, 0);
      animation: shake 0.3s;
    }

    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      25%{ transform: translateX(-6px); }
      75%{ transform: translateX(6px); }
    }

    .reset-area {
      margin-top: 10px;
      opacity: 0.9;
    }

    .small-btn {
      background: #684527;
      box-shadow: 0 4px 0 #3f2818;
      font-size: 1rem;
      padding: 8px 18px;
    }

    .counter-highlight {
      color: #ffd966;
      font-size: 2rem;
    }

    .flex-row {
      display: flex;
      gap: 6px;
      align-items: baseline;
    }
  </style>
</head>
<body>
<div class="game-container">
  <h1>🥩ДИМА ДАУН🥩</h1>
  <div class="dima-zone">
    <div class="sisi-container">
      <span class="sisya" id="sisiEmoji">🥩</span>
      <span style="font-size:3.5rem; filter:drop-shadow(2px 2px 0 #3e281a);">🤜💥</span>
    </div>
    <div class="sisi-stats">
      <span class="sisi-size">🍖 РАЗМЕР: <span id="sizeValue">1.0</span> см</span>
      <span class="crit-meter">⚡КРИТ: <span id="critChanceDisplay">25</span>%</span>
    </div>
  </div>

  <!-- ПИТОМЕЦ ДАВИД -->
  <div class="pet-david">
    <span class="pet-avatar">🐕‍🦺 ДАВИД</span>
    <div class="pet-status">
      <div>❤️ <span id="petLove">50</span>% любви</div>
      <div>🦴 сытость <span id="petHunger">100</span>%</div>
    </div>
  </div>

  <!-- кнопки ударов -->
  <div class="action-buttons">
    <button class="btn" id="hitBtn">🤜 БИТЬ СИСЮ</button>
    <button class="btn" id="feedDavidBtn">🍖 КОРМИТЬ ДАВИДА</button>
  </div>
  <div class="action-buttons">
    <button class="btn" id="specialCritBtn" style="background:#b5642a;">💦 КРИТ-ГЛОТОК</button>
    <button class="btn" id="playDavidBtn" style="background:#7a5a3a;">🎾 ИГРАТЬ С ДАВИДОМ</button>
  </div>

  <!-- лог критов/событий -->
  <div class="crit-log" id="logBox">
    💬 ЖМИ НА СИСЮ ИЛИ БИТЬ...
  </div>

  <!-- сброс и инфо -->
  <div class="reset-area">
    <button class="btn small-btn" id="resetBtn">🔄 НАЧАТЬ ЗАНОВО</button>
    <div style="margin-top: 8px; color:#3f280e;">👅 ДИМА КОНЧАЕТ НА СОСКИ · ГЛОТАЕТ</div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- СОСТОЯНИЕ ----------
    let sisiSize = 1.0;            // размер сиси (см)
    let critChance = 0.25;         // 25% базовый шанс крита

    // Питомец Давид
    let petLove = 50;              // 0-100
    let petHunger = 100;           // 0-100, уменьшается со временем

    // для анимаций и текста
    const logBox = document.getElementById('logBox');
    const sizeSpan = document.getElementById('sizeValue');
    const critChanceSpan = document.getElementById('critChanceDisplay');
    const petLoveSpan = document.getElementById('petLove');
    const petHungerSpan = document.getElementById('petHunger');
    const sisiEmoji = document.getElementById('sisiEmoji');

    // флаг спец-крита
    let canSpecialCrit = true;      // перезарядка после использования

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function updateUI() {
      sizeSpan.textContent = sisiSize.toFixed(2);
      critChanceSpan.textContent = Math.round(critChance * 100);
      
      // эмодзи сиси в зависимости от размера
      if (sisiSize >= 8.0) sisiEmoji.textContent = '🍖🍖';
      else if (sisiSize >= 5.0) sisiEmoji.textContent = '🥩🥩';
      else if (sisiSize >= 2.5) sisiEmoji.textContent = '🥩';
      else sisiEmoji.textContent = '🥓';
      
      // Давид
      petLove = Math.min(100, Math.max(0, petLove));
      petHunger = Math.min(100, Math.max(0, petHunger));
      petLoveSpan.textContent = Math.floor(petLove);
      petHungerSpan.textContent = Math.floor(petHunger);
      
      // если сытость низкая или любовь низкая — Давид грустит, влияет на крит?
      // просто визуал
    }

    // лог с подсветкой крита
    function setLog(message, isCrit = false, isSpecial = false) {
      logBox.innerHTML = message;
      if (isCrit || isSpecial) {
        logBox.classList.add('glow-crit');
        setTimeout(() => logBox.classList.remove('glow-crit'), 400);
      }
    }

    // пассивное снижение сытости Давида (вызывается при действиях)
    function decayHunger(amount = 2) {
      petHunger = Math.max(0, petHunger - amount);
      if (petHunger < 15) {
        petLove = Math.max(0, petLove - 0.5);
      }
      updateUI();
    }

    // уменьшение любви если голодный
    function hungerPenalty() {
      if (petHunger < 20) {
        petLove = Math.max(0, petLove - 1.5);
        setLog('💔 ДАВИД ГОЛОДЕН! любовь тает...');
      } else if (petHunger < 40 && Math.random()<0.3) {
        petLove = Math.max(0, petLove - 0.7);
      }
    }

    // прирост любви
    function addLove(amount) {
      petLove = Math.min(100, petLove + amount);
    }

    // основной удар по сисе (обычный)
    function hitSisya() {
      decayHunger(3); // каждый удар утомляет питомца
      
      // базовый прирост размера
      let gain = 0.15 + (Math.random() * 0.2);
      
      // модификатор любви Давида (если любовь >70, чуть больше)
      if (petLove > 70) gain *= 1.25;
      else if (petLove < 25) gain *= 0.8;
      
      // проверка на крит (включая возможное влияние)
      const rand = Math.random();
      const effectiveCrit = critChance + (petLove > 85 ? 0.07 : 0); // бонус от любви
      const isCrit = rand < effectiveCrit;
      
      let message = '';
      let critExtra = 1.0;
      
      if (isCrit) {
        critExtra = 2.2 + (Math.random() * 0.8);
        gain *= critExtra;
        // ✨ КРИТ УДАР — ДИМА КОНЧАЕТ НА СОСКИ (текст как в описании)
        message = `💥💦 КРИТ-УДАР! ДИМА БЬЁТ СЕБЯ ПО СИСЕ И КОНЧАЕТ НА СОСКИ! +${gain.toFixed(2)}см!`;
        // Давид реагирует
        if (petHunger > 30) {
          petLove = Math.min(100, petLove + 4);
        }
        // особый шанс что он глотает (уже в отдельной кнопке, но тут доп иммерсия)
        if (Math.random() < 0.4) {
          message += ' 👅 ОН СЛИЗЫВАЕТ СПЕРМУ С СОСКОВ!';
        }
      } else {
        message = `👊 ДИМА БЬЁТ ПО СИСЕ. +${gain.toFixed(2)}см.`;
        // небольшой шанс поднять любовь
        if (Math.random()<0.2) addLove(1.5);
      }
      
      sisiSize += gain;
      
      // небольшой прирост критшанса от размера (каждая единица +0.5%, максимум 45%)
      critChance = Math.min(0.45, 0.25 + (sisiSize * 0.005));
      
      // голод наказывает
      hungerPenalty();
      updateUI();
      
      // если размер огромный, даём Давиду эмоцию
      if (sisiSize > 7 && petLove < 80 && Math.random()<0.3) {
        petLove = Math.min(100, petLove + 2);
        message += ' 🐕 Давид виляет хвостом!';
      }
      
      setLog(message, isCrit);
      
      // вибро-эффект сиси
      sisiEmoji.style.transform = 'scale(1.2)';
      setTimeout(()=> sisiEmoji.style.transform = '', 120);
    }

    // СПЕЦИАЛЬНЫЙ КРИТ-ГЛОТОК (та самая механика)
    function performSpecialCrit() {
      if (!canSpecialCrit) {
        setLog('⏳ ДИМА УСТАЛ... ПОДОЖДИ НЕМНОГО (покорми Давида или ударь)');
        return;
      }
      
      decayHunger(8);
      
      // шанс спецкрита зависит от любви Давида и размера
      const loveBonus = petLove / 200;  // до 0.5
      const sizeBonus = Math.min(0.3, sisiSize * 0.02);
      const success = Math.random() < (0.35 + loveBonus + sizeBonus);
      
      if (success) {
        // МОЩНЫЙ КРИТ УДАР: бьёт себя по сисе, кончает на соски и ГЛОТАЕТ
        const hugeGain = 1.2 + (sisiSize * 0.18) + (Math.random() * 1.5);
        sisiSize += hugeGain;
        
        // ДИМА ГЛОТАЕТ СПЕРМУ — повышает крит шанс + любовь давида
        critChance = Math.min(0.55, critChance + 0.04);
        petLove = Math.min(100, petLove + 8);
        petHunger = Math.min(100, petHunger + 10); // насытился? ну такое )
        
        const specialMsg = `💦💦💦 СПЕЦ-КРИТ УДАР!!! ДИМА БЬЁТ СЕБЯ ПО СИСЕ, КОНЧАЕТ НА СОСКИ И 👅 ГЛОТАЕТ ВСЮ СПЕРМУ! +${hugeGain.toFixed(2)}см! ДАВИД В ВОСТОРГЕ!`;
        setLog(specialMsg, true, true);
        
        // визуал
        sisiEmoji.style.animation = 'shake 0.4s';
        setTimeout(()=> sisiEmoji.style.animation = '', 400);
        
        canSpecialCrit = false;
        // перезарядка через 3 обычных удара или покормить
        setTimeout(() => { canSpecialCrit = true; }, 6000);
      } else {
        // провал, но всё равно что-то
        sisiSize += 0.25;
        setLog('😩 ДИМА ПОПЫТАЛСЯ, НО ТОЛЬКО НЕМНОГО ПОДРОС... попробуй поднять любовь Давида!', false);
        petLove = Math.max(0, petLove - 2);
      }
      
      hungerPenalty();
      updateUI();
    }

    // кормить Давида — тратим размер сиси на сытость и любовь
    function feedDavid() {
      if (sisiSize < 0.6) {
        setLog('🥓 СИСЯ СЛИШКОМ МАЛА, ЧТОБЫ КОРМИТЬ! БЕЙ ЕЩЁ!');
        return;
      }
      
      const cost = 0.4 + (Math.random() * 0.3);
      sisiSize = Math.max(0.3, sisiSize - cost);
      
      petHunger = Math.min(100, petHunger + 25 + Math.floor(petLove/7));
      petLove = Math.min(100, petLove + 6);
      
      // если сильно накормили, разблокируем спецкрит
      if (!canSpecialCrit && petHunger > 70) {
        canSpecialCrit = true;
      }
      
      setLog(`🍖 ДИМА ДАЛ КУСОК СИСИ ДАВИДУ! сытость +, любовь +. Размер -${cost.toFixed(2)}см`);
      decayHunger(-5); // уменьшаем голод но не через decay
      updateUI();
    }

    // играть с Давидом — повышает любовь, немного тратит сытость
    function playWithDavid() {
      if (petHunger < 10) {
        setLog('🐕 Давид слишком голоден чтобы играть! ПОКОРМИ.');
        return;
      }
      decayHunger(7);
      const loveGain = 5 + Math.floor(Math.random() * 8);
      petLove = Math.min(100, petLove + loveGain);
      
      // игра иногда увеличивает шанс крита
      if (Math.random() < 0.4) {
        critChance = Math.min(0.5, critChance + 0.01);
      }
      
      setLog(`🎾 ДИМА И ДАВИД ИГРАЮТ! любовь +${loveGain}. Давид счастлив!`);
      
      if (!canSpecialCrit && petLove > 65) {
        canSpecialCrit = true;
        setLog('✨ СПЕЦ-КРИТ СНОВА ДОСТУПЕН!');
      }
      updateUI();
    }

    // сброс
    function resetGame() {
      sisiSize = 1.0;
      critChance = 0.25;
      petLove = 50;
      petHunger = 100;
      canSpecialCrit = true;
      updateUI();
      setLog('💬 НОВАЯ ИГРА! РАСТИ СИСЮ ДИМЫ ДАУНА. ДАВИД РЯДОМ.');
      sisiEmoji.style.animation = '';
    }

    // клик по эмодзи сиси — тоже удар
    function handleSisiClick() {
      hitSisya();
    }

    // инициализация
    function init() {
      updateUI();
      setLog('🥩 БЕЙ СИСЮ, КОРМИ ДАВИДА. НАКОПИ КРИТ! ДИМА КОНЧАЕТ И ГЛОТАЕТ!');
      
      document.getElementById('hitBtn').addEventListener('click', hitSisya);
      document.getElementById('specialCritBtn').addEventListener('click', performSpecialCrit);
      document.getElementById('feedDavidBtn').addEventListener('click', feedDavid);
      document.getElementById('playDavidBtn').addEventListener('click', playWithDavid);
      document.getElementById('resetBtn').addEventListener('click', resetGame);
      sisiEmoji.addEventListener('click', handleSisiClick);
      
      // пассивное снижение сытости раз в 12 сек
      setInterval(() => {
        if (petHunger > 0) {
          petHunger = Math.max(0, petHunger - 1.2);
          if (petHunger < 15) petLove = Math.max(0, petLove - 0.8);
          updateUI();
        }
        // авто-разблокировка спецкрита если долго ждали
        if (!canSpecialCrit && petLove > 50 && petHunger > 40 && Math.random()<0.2) {
          canSpecialCrit = true;
        }
      }, 12000);
    }

    init();
  })();
</script>
</body>
    </html>
