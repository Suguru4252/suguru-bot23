<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>НЕ НАЖИМАЙ, ВАДИМ!</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
    }
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #111;
        font-family: 'Segoe UI', 'Arial', sans-serif;
        overflow: hidden;
        transition: background 0.3s;
    }
    #box {
        text-align: center;
        color: white;
        padding: 20px;
    }
    button {
        font-size: 38px;
        padding: 20px 45px;
        border: none;
        border-radius: 60px;
        background: red;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.1s, background 0.2s;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    button:active {
        transform: scale(0.97);
    }
    #text {
        margin-top: 30px;
        font-size: 32px;
        font-weight: bold;
        text-shadow: 0 0 5px black;
    }
    .shake {
        animation: shake 0.12s infinite;
    }
    @keyframes shake {
        0% { transform: translate(4px, 2px); }
        25% { transform: translate(-4px, -2px); }
        50% { transform: translate(4px, -3px); }
        75% { transform: translate(-3px, 3px); }
        100% { transform: translate(3px, -2px); }
    }
</style>
</head>
<body>
<div id="box">
    <button onclick="press()">НЕ НАЖИМАЙ</button>
    <div id="text"></div>
</div>
<script>
let clicks = 0;
function press() {
    clicks++;
    let text = document.getElementById("text");
    if (clicks == 1) {
        text.innerHTML = "Серьёзно?";
    }
    else if (clicks == 2) {
        text.innerHTML = "Я же сказал не нажимать.";
    }
    else if (clicks == 3) {
        text.innerHTML = "Вадим... ты реально продолжаешь?";
        document.body.style.background = "#4a0000";
    }
    else if (clicks == 4) {
        text.innerHTML = "Последнее предупреждение.";
        document.body.classList.add("shake");
    }
    else if (clicks == 5) {
        text.innerHTML = "Ну всё...";
    }
    else if (clicks >= 6) {
        document.body.classList.remove("shake");
        document.body.innerHTML = `
        <div style="background:white; width:100%; height:100vh; display:flex; justify-content:center; align-items:center; flex-direction:column; text-align:center; padding:20px; box-sizing:border-box;">
            <div style="font-size:36px; font-weight:bold; color:black;">
                Ну я же просил не листать.<br>Теперь смотри.
                <div style="color:red; font-size:100px; margin-top:15px; transform:rotate(35deg);">↖</div>
            </div>
            <div style="margin-top:25px;">
                <a href="https://videy.co/v/?id=BzBZU6sS1" target="_blank" style="background:#ff0000; color:white; font-size:28px; padding:15px 30px; border-radius:60px; text-decoration:none; font-weight:bold; display:inline-block;">▶ НАЖМИ, ЧТОБЫ ЗАПУСТИТЬ ВИДЕО</a>
            </div>
            <p style="color:#555; margin-top:20px; font-size:16px;">(откроется в новой вкладке)</p>
        </div>
        `;
    }
}
</script>
</body>
</html>
