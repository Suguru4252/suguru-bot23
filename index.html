<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Квантовый Калькулятор | Умный & Без рамок</title>
    <style>
        /* RESET & GLOBAL — полный экран, без отступов, без рамок */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Убираем выделение текста для кнопок */
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', 'Inter', 'Poppins', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Убираем любые скроллы и рамки */
            margin: 0;
            padding: 0;
            border: none;
        }

        /* Главный контейнер — занимает ВЕСЬ экран без отступов */
        .calculator {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(8, 12, 25, 0.65);
            backdrop-filter: blur(2px);
            box-shadow: none;
            border: none;
            border-radius: 0;
            overflow: hidden;
        }

        /* Дисплей — занимает верхнюю умную зону */
        .display-area {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 2rem 1.8rem 1.5rem 1.8rem;
            background: linear-gradient(145deg, rgba(0, 0, 0, 0.4), rgba(5, 8, 18, 0.6));
            border-bottom: 1px solid rgba(72, 187, 255, 0.2);
        }

        .expression {
            text-align: right;
            font-size: 2rem;
            font-weight: 400;
            color: #b9e2ff;
            letter-spacing: 1px;
            word-wrap: break-word;
            word-break: break-word;
            min-height: 3rem;
            opacity: 0.85;
            font-family: 'JetBrains Mono', monospace;
        }

        .result {
            text-align: right;
            font-size: 4.5rem;
            font-weight: 700;
            color: #f0f9ff;
            text-shadow: 0 0 6px rgba(0, 255, 255, 0.3);
            margin-top: 0.5rem;
            letter-spacing: 2px;
            word-wrap: break-word;
            word-break: break-word;
            line-height: 1.2;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Умная панель с функциями */
        .smart-panel {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 1.8rem;
            background: rgba(0, 0, 0, 0.3);
            gap: 1rem;
            border-bottom: 1px solid rgba(72, 187, 255, 0.15);
            flex-wrap: wrap;
        }

        .smart-btn {
            background: rgba(20, 30, 55, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.25);
            color: #9ef0ff;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        .smart-btn:hover {
            background: rgba(0, 180, 216, 0.25);
            border-color: #0ff;
            color: white;
            transform: scale(1.02);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
        }

        /* Сетка кнопок — гибкая, без рамок, на весь остаток */
        .buttons-grid {
            flex: 2;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.4rem;
            padding: 1rem 1.2rem 1.5rem 1.2rem;
            background: rgba(0, 0, 0, 0.2);
        }

        /* Стиль для всех кнопок — футуристичный */
        .btn {
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(72, 187, 255, 0.3);
            border-radius: 24px;
            font-size: 1.6rem;
            font-weight: 500;
            color: #eaf6ff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.12s linear;
            font-family: 'Segoe UI', 'Inter', monospace;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: scale(0.96);
            background: rgba(0, 160, 209, 0.5);
            border-color: cyan;
        }

        /* Спец кнопки */
        .operator {
            background: rgba(0, 100, 120, 0.6);
            border-color: #1fa2cf;
            color: #bdf2ff;
            font-weight: 700;
            font-size: 1.9rem;
        }

        .equals {
            background: linear-gradient(135deg, #0c5f7a, #0b3b4f);
            border-color: #0ff;
            color: white;
            font-weight: 800;
            font-size: 2rem;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .clear {
            background: rgba(130, 40, 60, 0.7);
            border-color: #ff7780;
            color: #ffc9ce;
        }

        .function {
            background: rgba(40, 50, 80, 0.8);
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Адаптация под мобильные устройства */
        @media (max-width: 600px) {
            .buttons-grid {
                gap: 0.3rem;
                padding: 0.8rem;
            }
            .btn {
                font-size: 1.3rem;
                border-radius: 20px;
            }
            .result {
                font-size: 2.8rem;
            }
            .expression {
                font-size: 1.3rem;
            }
            .smart-btn {
                font-size: 0.7rem;
                padding: 0.3rem 0.9rem;
            }
            .function {
                font-size: 0.9rem;
            }
            .operator {
                font-size: 1.6rem;
            }
        }

        /* Убираем скроллы, делаем полный экран без границ */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
<div class="calculator">
    <!-- Дисплей с умной историей выражений -->
    <div class="display-area">
        <div class="expression" id="expressionDisplay"></div>
        <div class="result" id="resultDisplay">0</div>
    </div>

    <!-- Панель "умных" функций (математические продвинутые операции) -->
    <div class="smart-panel">
        <div class="smart-btn" data-smart="sqrt">√x</div>
        <div class="smart-btn" data-smart="pow2">x²</div>
        <div class="smart-btn" data-smart="pow3">x³</div>
        <div class="smart-btn" data-smart="log">log₁₀</div>
        <div class="smart-btn" data-smart="ln">ln</div>
        <div class="smart-btn" data-smart="fact">n!</div>
        <div class="smart-btn" data-smart="percent">%</div>
        <div class="smart-btn" data-smart="reciprocal">1/x</div>
    </div>

    <!-- Основная клавиатура (5x5 + особые) -->
    <div class="buttons-grid">
        <!-- Ряд 1 -->
        <div class="btn function" data-action="clear">AC</div>
        <div class="btn function" data-action="delete">⌫</div>
        <div class="btn function" data-opener="(">(</div>
        <div class="btn function" data-closer=")">)</div>
        <div class="btn operator" data-op="/">÷</div>

        <!-- Ряд 2 -->
        <div class="btn" data-num="7">7</div>
        <div class="btn" data-num="8">8</div>
        <div class="btn" data-num="9">9</div>
        <div class="btn operator" data-op="*">×</div>
        <div class="btn operator" data-op="-">−</div>

        <!-- Ряд 3 -->
        <div class="btn" data-num="4">4</div>
        <div class="btn" data-num="5">5</div>
        <div class="btn" data-num="6">6</div>
        <div class="btn operator" data-op="+">+</div>
        <div class="btn" data-point=".">.</div>

        <!-- Ряд 4 -->
        <div class="btn" data-num="1">1</div>
        <div class="btn" data-num="2">2</div>
        <div class="btn" data-num="3">3</div>
        <div class="btn equals" data-equals="=">=</div>
        <div class="btn" data-num="0">0</div>

        <!-- Ряд 5 - дополнительные научные и константы -->
        <div class="btn function" data-const="pi">π</div>
        <div class="btn function" data-const="e">e</div>
        <div class="btn function" data-func="sin">sin</div>
        <div class="btn function" data-func="cos">cos</div>
        <div class="btn function" data-func="tan">tan</div>
    </div>
</div>

<script>
    // ====================== СУПЕР УМНЫЙ КАЛЬКУЛЯТОР ======================
    // Поддерживает: базовую арифметику, скобки, тригонометрию (радианы),
    // логарифмы, факториал, возведение в степень, константы π, e, 
    // обработку ошибок, умное форматирование результата.
    
    let currentExpression = "";   // текущее математическое выражение (для отображения и вычисления)
    let lastResult = null;        // для памяти (если надо продолжить)

    // DOM элементы
    const expressionDiv = document.getElementById("expressionDisplay");
    const resultDiv = document.getElementById("resultDisplay");

    // Обновление дисплея
    function updateDisplay() {
        // Показываем выражение, если пусто — то пустую строку
        if (currentExpression === "") {
            expressionDiv.innerText = " ";
        } else {
            expressionDiv.innerText = currentExpression;
        }
        // Показываем результат (либо вычисленный либо 0)
        // Результат обновляется отдельно после вычислений, но сохраним синхронизацию
    }

    // Вычисление выражения с поддержкой всех умных фич
    function computeExpression(expr) {
        if (expr.trim() === "") return "0";
        
        // Подготовка: заменяем визуальные операторы на js-совместимые
        let prepared = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
        
        // Заменяем константы π и e на числа
        prepared = prepared.replace(/π/g, 'Math.PI').replace(/e(?!xp|\))/g, 'Math.E');
        
        // Обрабатываем степень: x² => pow(x,2), x³ => pow(x,3) но у нас уже есть отдельные кнопки,
        // но вдруг пользователь вручную напишет ^2 — добавим поддержку **
        prepared = prepared.replace(/\^/g, '**');
        
        // Функции: sin( cos( tan( sqrt( log( ln( fact( 
        // Заменяем на вызовы с проверкой. Для факториала используем кастомную функцию.
        // Сначала обработаем факториал отдельно (очень умная фишка)
        // Формат: fact(число) или 5! (дополнительно поддержим !)
        // Но для безопасности: найдём паттерн типа "число!" и заменим на fact(число)
        prepared = prepared.replace(/(\d+(?:\.\d+)?)!/g, (match, num) => `fact(${num})`);
        
        // Заменим стандартные мат. функции
        prepared = prepared.replace(/sin\(/g, 'Math.sin(');
        prepared = prepared.replace(/cos\(/g, 'Math.cos(');
        prepared = prepared.replace(/tan\(/g, 'Math.tan(');
        prepared = prepared.replace(/sqrt\(/g, 'Math.sqrt(');
        prepared = prepared.replace(/log\(/g, 'log10(');   // log10 пользовательский
        prepared = prepared.replace(/ln\(/g, 'Math.log(');
        
        // Добавим поддержку функции pow2, pow3 через замену x² => Math.pow(x,2)
        // Но наша кнопка smart вставляет выражение "квадрат(число)" или аналогично? У нас через smart панель отдельно, 
        // однако для ручного ввода через клавиатуру? Плюс при нажатии на smart-кнопки будем сразу добавлять с преобразованием.
        // Дополнительно: обработаем пользовательскую функцию log10
        // Создадим обёртку для безопасного вычисления с факториалом, log10.
        
        // Напишем функцию вычисления с пользовательскими функциями:
        // Используем Function constructor, но с кастомными функциями.
        // Безопасно: создадим скоуп с math и нашими доп.функциями
        
        const customFunctions = {
            fact: (n) => {
                let num = Number(n);
                if (isNaN(num) || !Number.isInteger(num) || num < 0) return NaN;
                if (num === 0 || num === 1) return 1;
                let result = 1;
                for (let i = 2; i <= num; i++) result *= i;
                return result;
            },
            log10: (x) => {
                if (x <= 0) return NaN;
                return Math.log10(x);
            },
            // степень квадрат и куб могут вызываться через x² и x³ (smart панель)
            square: (x) => x * x,
            cube: (x) => x * x * x,
            reciprocal: (x) => 1 / x
        };
        
        // Дополнительная проверка для % (проценты: обработаем на уровне парсинга)
        // Поскольку у нас есть кнопка % - она будет вставлять /100 от предыдущего числа, но для вычисления
        // добавим поддержку паттерна "число%" -> число/100
        prepared = prepared.replace(/(\d+(?:\.\d+)?)%/g, (match, num) => `(${num}/100)`);
        
        // Рекурсивно вычислим итоговое выражение
        let finalExpr = prepared;
        // Заменим пользовательские вызовы
        finalExpr = finalExpr.replace(/fact\(([^)]+)\)/g, (match, inner) => `customFunctions.fact(${inner})`);
        finalExpr = finalExpr.replace(/log10\(([^)]+)\)/g, (match, inner) => `customFunctions.log10(${inner})`);
        finalExpr = finalExpr.replace(/square\(([^)]+)\)/g, (match, inner) => `customFunctions.square(${inner})`);
        finalExpr = finalExpr.replace(/cube\(([^)]+)\)/g, (match, inner) => `customFunctions.cube(${inner})`);
        finalExpr = finalExpr.replace(/reciprocal\(([^)]+)\)/g, (match, inner) => `customFunctions.reciprocal(${inner})`);
        
        try {
            // Вычисляем с помощью конструктора Function, чтобы получить доступ к Math и customFunctions
            const evaluate = new Function('Math', 'customFunctions', 'return (' + finalExpr + ')');
            let rawResult = evaluate(Math, customFunctions);
            // Обработка NaN, Infinity
            if (isNaN(rawResult) || !isFinite(rawResult)) {
                return "Ошибка";
            }
            // Умное округление: до 10 знаков после запятой, удаляем лишние нули
            let rounded = parseFloat(rawResult.toFixed(10));
            // Если целое число, показать без .0
            if (Math.abs(rounded - Math.floor(rounded)) < 1e-10) {
                return Math.floor(rounded).toString();
            }
            return rounded.toString();
        } catch (err) {
            console.warn(err);
            return "Ошибка";
        }
    }
    
    // Вычислить и обновить результат на дисплее (но не менять выражение)
    function evaluateAndShow() {
        if (currentExpression === "") {
            resultDiv.innerText = "0";
            return;
        }
        let result = computeExpression(currentExpression);
        resultDiv.innerText = result;
        if (result !== "Ошибка") {
            lastResult = result;
        } else {
            lastResult = null;
        }
    }
    
    // Добавить в выражение значение (текст)
    function addToExpression(value) {
        // Если последний результат был ошибкой, очистим перед новым вводом
        if (resultDiv.innerText === "Ошибка") {
            currentExpression = "";
            resultDiv.innerText = "0";
        }
        currentExpression += value;
        updateDisplay();
        evaluateAndShow(); // умное авто-вычисление по мере ввода
    }
    
    // Очистка всего
    function clearAll() {
        currentExpression = "";
        resultDiv.innerText = "0";
        expressionDiv.innerText = " ";
        lastResult = null;
        updateDisplay();
    }
    
    // Удалить последний символ
    function deleteLast() {
        if (resultDiv.innerText === "Ошибка") {
            clearAll();
            return;
        }
        currentExpression = currentExpression.slice(0, -1);
        updateDisplay();
        if (currentExpression === "") {
            resultDiv.innerText = "0";
        } else {
            evaluateAndShow();
        }
    }
    
    // Обработка умных функций (sqrt, x², x³, log, ln, факториал, процент, обратное число)
    function applySmartFunction(funcType) {
        // Получаем текущий результат как число, если ошибка — то игнор
        let currentVal = resultDiv.innerText;
        if (currentVal === "Ошибка" || currentVal === "") {
            // Если ошибка, то очистим
            clearAll();
            currentVal = "0";
        }
        let num = parseFloat(currentVal);
        if (isNaN(num)) {
            clearAll();
            num = 0;
        }
        
        let newValue = null;
        let expressionAddition = "";
        
        switch (funcType) {
            case "sqrt":
                if (num < 0) { resultDiv.innerText = "Ошибка"; return; }
                newValue = Math.sqrt(num);
                expressionAddition = `sqrt(${currentVal})`;
                break;
            case "pow2":
                newValue = num * num;
                expressionAddition = `square(${currentVal})`;
                break;
            case "pow3":
                newValue = num * num * num;
                expressionAddition = `cube(${currentVal})`;
                break;
            case "log":
                if (num <= 0) { resultDiv.innerText = "Ошибка"; return; }
                newValue = Math.log10(num);
                expressionAddition = `log(${currentVal})`;
                break;
            case "ln":
                if (num <= 0) { resultDiv.innerText = "Ошибка"; return; }
                newValue = Math.log(num);
                expressionAddition = `ln(${currentVal})`;
                break;
            case "fact":
                if (!Number.isInteger(num) || num < 0 || num > 170) {
                    resultDiv.innerText = "Ошибка";
                    return;
                }
                let factRes = 1;
                for (let i = 2; i <= num; i++) factRes *= i;
                newValue = factRes;
                expressionAddition = `fact(${currentVal})`;
                break;
            case "percent":
                newValue = num / 100;
                expressionAddition = `(${currentVal}%)`;
                break;
            case "reciprocal":
                if (num === 0) { resultDiv.innerText = "Ошибка"; return; }
                newValue = 1 / num;
                expressionAddition = `reciprocal(${currentVal})`;
                break;
            default: return;
        }
        
        if (newValue !== null && !isNaN(newValue) && isFinite(newValue)) {
            // Сохраним как новое выражение: либо результат заменяет текущее выражение (для удобства)
            // Умное поведение: заменяем всё выражение на результат функции от предыдущего результата
            // Но также покажем исторически в expression: чтобы было круто, обновим строку
            if (currentExpression !== "") {
                // Если есть выражение, то разумно заменить его результатом функции от последнего результата
                currentExpression = expressionAddition;
            } else {
                currentExpression = expressionAddition;
            }
            updateDisplay();
            // Запишем результат
            let formatted = parseFloat(newValue.toFixed(10));
            if (Math.abs(formatted - Math.floor(formatted)) < 1e-10) formatted = Math.floor(formatted);
            resultDiv.innerText = formatted.toString();
            // После применения функции заменим currentExpression на число? Но лучше, чтобы оставалась запись функции
            // Но пользователи хотят продолжить расчет — установим текущее выражение в новое значение (результат)
            // Для комфорта: сделаем так, чтобы результат был в буфере, и можно было дальше оперировать
            // Однако если нажать цифру, то должно начаться новое выражение или продолжить? Сделаем логику: при вводе цифры после вычисления смарт-функции — начинаем новое выражение?
            // но умный калькулятор: если нажать цифру, продолжим от текущего результата
            // Но наш addToExpression просто добавляет символы. Сделаем изящно: установим currentExpression = result, если результат вычислен не как часть длинной строки?
            // Мы уже заменили currentExpression на expressionAddition (типа sqrt(9)). Но чтобы после этого можно было плюс 2, пользователь захочет.
            // Для удобства оставим как есть. Если нажмут оператор, то выражение станет "sqrt(9)+" — корректно
            // ОК!
        } else {
            resultDiv.innerText = "Ошибка";
        }
    }
    
    // Обработка констант π, e
    function applyConstant(constType) {
        let constValue = constType === "pi" ? Math.PI : Math.E;
        let constStr = constType === "pi" ? "π" : "e";
        if (resultDiv.innerText === "Ошибка") clearAll();
        addToExpression(constStr);
    }
    
    // Обработка тригонометрических функций (sin, cos, tan) — работают от текущего результата в радианах
    function applyTrigFunction(funcName) {
        let currentVal = resultDiv.innerText;
        if (currentVal === "Ошибка") {
            clearAll();
            currentVal = "0";
        }
        let num = parseFloat(currentVal);
        if (isNaN(num)) num = 0;
        let newVal = null;
        let trigExpr = "";
        switch(funcName) {
            case "sin":
                newVal = Math.sin(num);
                trigExpr = `sin(${currentVal})`;
                break;
            case "cos":
                newVal = Math.cos(num);
                trigExpr = `cos(${currentVal})`;
                break;
            case "tan":
                newVal = Math.tan(num);
                trigExpr = `tan(${currentVal})`;
                break;
        }
        if (newVal !== null && isFinite(newVal)) {
            currentExpression = trigExpr;
            updateDisplay();
            let formatted = parseFloat(newVal.toFixed(10));
            if (Math.abs(formatted - Math.floor(formatted)) < 1e-10) formatted = Math.floor(formatted);
            resultDiv.innerText = formatted.toString();
        } else {
            resultDiv.innerText = "Ошибка";
        }
    }
    
    // Инициализация обработчиков событий
    function init() {
        updateDisplay();
        resultDiv.innerText = "0";
        
        // Обработка цифр и базовых операторов
        document.querySelectorAll("[data-num]").forEach(btn => {
            btn.addEventListener("click", () => addToExpression(btn.getAttribute("data-num")));
        });
        document.querySelectorAll("[data-op]").forEach(btn => {
            btn.addEventListener("click", () => addToExpression(btn.getAttribute("data-op")));
        });
        document.querySelector("[data-point]")?.addEventListener("click", () => addToExpression("."));
        document.querySelector("[data-opener]")?.addEventListener("click", () => addToExpression("("));
        document.querySelector("[data-closer]")?.addEventListener("click", () => addToExpression(")"));
        document.querySelector("[data-equals]")?.addEventListener("click", () => {
            if (currentExpression !== "") {
                let res = computeExpression(currentExpression);
                resultDiv.innerText = res;
                if (res !== "Ошибка") {
                    // после равно можно начать новое выражение на основе результата
                    currentExpression = res;
                    updateDisplay();
                }
            }
        });
        
        document.querySelector("[data-action='clear']")?.addEventListener("click", clearAll);
        document.querySelector("[data-action='delete']")?.addEventListener("click", deleteLast);
        
        // Smart панель
        document.querySelectorAll("[data-smart]").forEach(btn => {
            btn.addEventListener("click", () => {
                let type = btn.getAttribute("data-smart");
                applySmartFunction(type);
            });
        });
        
        // Константы
        document.querySelectorAll("[data-const]").forEach(btn => {
            btn.addEventListener("click", () => {
                let constType = btn.getAttribute("data-const");
                applyConstant(constType);
            });
        });
        
        // Тригонометрические
        document.querySelectorAll("[data-func]").forEach(btn => {
            btn.addEventListener("click", () => {
                let func = btn.getAttribute("data-func");
                applyTrigFunction(func);
            });
        });
    }
    
    init();
</script>
</body>
</html>
