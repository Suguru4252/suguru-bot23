<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Notes · простые заметки с кодом</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .app {
      max-width: 1100px;
      width: 100%;
      display: flex;
      gap: 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      padding: 24px;
    }
    /* Левая панель */
    .sidebar {
      width: 260px;
      border-right: 1px solid #e2e8f0;
      padding-right: 16px;
    }
    .sidebar h3 {
      font-size: 18px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1e293b;
    }
    .repo-list {
      list-style: none;
      padding: 0;
      margin: 0 0 16px 0;
    }
    .repo-item {
      padding: 10px 12px;
      margin-bottom: 4px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #334155;
      transition: background 0.15s;
    }
    .repo-item:hover {
      background: #f1f5f9;
    }
    .repo-item.active {
      background: #e0f2fe;
      color: #0369a1;
      font-weight: 500;
    }
    .repo-item i {
      opacity: 0.6;
      font-size: 16px;
    }
    .btn-new {
      width: 100%;
      padding: 10px;
      background: #0f172a;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-new:hover {
      background: #1e293b;
    }
    /* Правая панель */
    .main {
      flex: 1;
    }
    .editor-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .repo-title-input {
      flex: 1;
      padding: 10px 14px;
      font-size: 18px;
      font-weight: 500;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #fafafa;
    }
    .repo-title-input:focus {
      outline: 2px solid #0ea5e9;
      background: white;
    }
    textarea {
      width: 100%;
      height: 380px;
      padding: 16px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      background: #fafafa;
      resize: vertical;
      tab-size: 4;
    }
    textarea:focus {
      outline: 2px solid #0ea5e9;
      background: white;
    }
    .action-bar {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      justify-content: flex-end;
    }
    .btn {
      padding: 10px 18px;
      border-radius: 30px;
      border: none;
      font-weight: 500;
      cursor: pointer;
      background: #e2e8f0;
      color: #1e293b;
      transition: all 0.15s;
    }
    .btn-primary {
      background: #0f172a;
      color: white;
    }
    .btn-primary:hover {
      background: #1e293b;
    }
    .btn-danger {
      background: #fee2e2;
      color: #b91c1c;
    }
    .btn-danger:hover {
      background: #fecaca;
    }
    .btn-copy {
      background: #dbeafe;
      color: #1e40af;
    }
    .btn-copy:hover {
      background: #bfdbfe;
    }
    .empty-message {
      color: #64748b;
      text-align: center;
      padding: 40px 20px;
    }
    .footer-note {
      margin-top: 12px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
  <!-- Font Awesome для иконок -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="app">
  <!-- Левая колонка: список репозиториев -->
  <div class="sidebar">
    <h3><i class="far fa-folder-open"></i> Мои заметки</h3>
    <ul class="repo-list" id="repoList"></ul>
    <button class="btn-new" id="newRepoBtn"><i class="fas fa-plus-circle"></i> Новая заметка</button>
    <div class="footer-note">
      <i class="far fa-save"></i> Автосохранение
    </div>
  </div>

  <!-- Правая колонка: редактор -->
  <div class="main" id="editorPanel">
    <div class="empty-message">
      <i class="far fa-hand-pointer" style="font-size: 32px; opacity: 0.5;"></i>
      <p>Выберите заметку слева или создайте новую</p>
    </div>
  </div>
</div>

<script>
  (function(){
    // ---------- Модель данных ----------
    const STORAGE_KEY = 'simple_code_notes';
    let notes = []; // массив { id, title, code }

    // Загрузка из localStorage
    function loadNotes() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try { notes = JSON.parse(stored); } catch(e){ notes = []; }
      }
      // Если пусто, добавим демо-заметку
      if (!notes.length) {
        notes.push({
          id: 'demo1',
          title: 'Пример: debounce',
          code: `function debounce(fn, delay) {\n  let timer;\n  return (...args) => {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn(...args), delay);\n  };\n}`
        });
        notes.push({
          id: 'demo2',
          title: 'Python: чтение файла',
          code: `with open('file.txt', 'r') as f:\n    content = f.read()\n    print(content)`
        });
      }
    }

    function saveNotes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    // Генерация id
    function generateId() {
      return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    // ---------- DOM элементы ----------
    const repoListEl = document.getElementById('repoList');
    const editorPanel = document.getElementById('editorPanel');
    const newRepoBtn = document.getElementById('newRepoBtn');

    let activeNoteId = null;

    // ---------- Рендер списка слева ----------
    function renderSidebar() {
      if (!notes.length) {
        repoListEl.innerHTML = `<li style="padding:12px; color:#64748b; list-style:none;"><i class="far fa-folder"></i> Нет заметок</li>`;
        return;
      }
      const itemsHtml = notes.map(note => `
        <li class="repo-item ${activeNoteId === note.id ? 'active' : ''}" data-id="${note.id}">
          <i class="far fa-file-code"></i>
          <span>${escapeHtml(note.title) || 'Без названия'}</span>
        </li>
      `).join('');
      repoListEl.innerHTML = itemsHtml;
    }

    // Простой escape
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ---------- Рендер правой панели (редактор) ----------
    function renderEditor() {
      if (!activeNoteId) {
        editorPanel.innerHTML = `
          <div class="empty-message">
            <i class="far fa-hand-pointer" style="font-size: 32px; opacity: 0.5;"></i>
            <p>Выберите заметку слева или создайте новую</p>
          </div>
        `;
        return;
      }

      const note = notes.find(n => n.id === activeNoteId);
      if (!note) {
        activeNoteId = null;
        renderSidebar();
        renderEditor();
        return;
      }

      editorPanel.innerHTML = `
        <div class="editor-header">
          <input type="text" id="noteTitleInput" class="repo-title-input" value="${escapeHtml(note.title)}" placeholder="Название заметки">
        </div>
        <textarea id="codeEditor" placeholder="// Вставьте или напишите код...">${escapeHtml(note.code)}</textarea>
        <div class="action-bar">
          <button class="btn btn-copy" id="copyCodeBtn"><i class="far fa-copy"></i> Копировать</button>
          <button class="btn btn-primary" id="saveNoteBtn"><i class="far fa-save"></i> Сохранить</button>
          <button class="btn btn-danger" id="deleteNoteBtn"><i class="far fa-trash-alt"></i> Удалить</button>
        </div>
      `;

      // Привязка событий
      const titleInput = document.getElementById('noteTitleInput');
      const codeEditor = document.getElementById('codeEditor');
      
      // Автосохранение при изменении? По кнопке сохранить, но можно и авто при потере фокуса.
      document.getElementById('saveNoteBtn').addEventListener('click', () => {
        if (!activeNoteId) return;
        const note = notes.find(n => n.id === activeNoteId);
        if (note) {
          note.title = titleInput.value.trim() || 'Без названия';
          note.code = codeEditor.value;
          saveNotes();
          renderSidebar(); // обновить название в списке
          // показать краткое уведомление (можно просто подсветить)
          titleInput.style.background = '#e6f7e6';
          setTimeout(() => titleInput.style.background = '', 300);
        }
      });

      document.getElementById('copyCodeBtn').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(codeEditor.value);
          // Визуальная обратная связь
          const btn = document.getElementById('copyCodeBtn');
          btn.innerHTML = '<i class="fas fa-check"></i> Скопировано!';
          setTimeout(() => {
            btn.innerHTML = '<i class="far fa-copy"></i> Копировать';
          }, 1500);
        } catch (err) {
          alert('Не удалось скопировать: ' + err);
        }
      });

      document.getElementById('deleteNoteBtn').addEventListener('click', () => {
        if (!activeNoteId) return;
        if (!confirm('Удалить эту заметку навсегда?')) return;
        notes = notes.filter(n => n.id !== activeNoteId);
        activeNoteId = null;
        saveNotes();
        renderSidebar();
        renderEditor();
      });

      // Можно также сохранять по Ctrl+S
      codeEditor.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
          document.getElementById('saveNoteBtn').click();
        }
      });
    }

    // ---------- Обработчики событий ----------
    function handleRepoClick(e) {
      const item = e.target.closest('[data-id]');
      if (!item) return;
      const id = item.dataset.id;
      if (activeNoteId !== id) {
        activeNoteId = id;
        renderSidebar();
        renderEditor();
      }
    }

    function createNewNote() {
      const newNote = {
        id: generateId(),
        title: 'Новая заметка',
        code: '// ваш код'
      };
      notes.push(newNote);
      activeNoteId = newNote.id;
      saveNotes();
      renderSidebar();
      renderEditor();
    }

    // ---------- Инициализация ----------
    loadNotes();
    renderSidebar();
    renderEditor();

    // Привязка событий
    repoListEl.addEventListener('click', handleRepoClick);
    newRepoBtn.addEventListener('click', createNewNote);

    // Автосохранение при уходе со страницы не нужно — всё и так в localStorage
  })();
</script>
</body>
</html>
