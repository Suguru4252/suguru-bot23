<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STONE MOVIE</title>

<style>
body{
margin:0;
background:#050505;
color:#d0d0d0;
font-family:monospace;
overflow:hidden;
}

#screen{
white-space:pre;
font-size:12px;
line-height:12px;
padding:12px;
height:100vh;
box-sizing:border-box;
}

.fade{
animation:fade 1s linear;
}

@keyframes fade{
0%{opacity:0}
100%{opacity:1}
}
</style>
</head>
<body>

<pre id="screen"></pre>

<script>

const screen=document.getElementById("screen");

const scenes=[

`
STONE STORY : THE LOST LIGHT


             *
            /#\\
           /###\\
          /#####\\


              O
             /|\\\\
             / \\\\


      Тёмный мир из символов.

`,

`
Ночь...

~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

      O
     /|\\\\
     / \\\\


Путник идёт через лес.

  /\\      /\\        /\\
 /##\\    /##\\      /##\\
/####\\  /####\\    /####\\

`,

`
Вдали появляется башня.


               /\\
              /##\\
             /####\\
            /######\\
           |########|
           |########|

                 O
                /|\\\\
                / \\\\

`,

`
??? : Кто идёт сюда...


        .----.
      _/_____|_
        (x_x)


           O
          /|\\\\
          / \\\\

Путник молчит.

`,

`
Земля начинает дрожать...


^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^

          MONSTER

        __/###\\\\__
       |##########|
        \\########/

             O
            /|\\\\
            / \\\\

`,

`
БИТВА

          O      __/##\\\\__
         /|\\\\    |######|
         / \\\\     \\####/

   * slash *
   * spark *
   * dust  *

`,

`
Монстр побеждён.

        ...пепел...


          O
         /|\\\\
         / \\\\

На земле лежит светящийся камень.

            <>

`,

`
ФИНАЛ

            ☆

         \\  |  /
          \\ | /
       ---- * ----
          / | \\
         /  |  \\


              O
             /|\\\\
             / \\\\

Путник нашёл свет.

THE END
`

];

let i=0;

function play(){

screen.className="fade";
screen.textContent=scenes[i];

i++;

if(i>=scenes.length){
i=0;
}

setTimeout(play,4000);

}

play();

</script>
</body>
</html>
