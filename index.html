<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<title>Space Survivor</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #000010, #000);
  color: white;
  overflow: hidden;
}#game { text-align: center; padding-top: 40px; }

.stat { margin: 10px; font-size: 18px; }

button { padding: 10px 20px; margin: 5px; border: none; border-radius: 10px; background: #1e90ff; color: white; cursor: pointer; transition: 0.3s; }

button:hover { transform: scale(1.1); background: #00bfff; }

#log { height: 120px; overflow-y: auto; border-top: 1px solid #444; margin-top: 20px; padding: 10px; font-size: 14px; }

.star { position: absolute; width: 2px; height: 2px; background: white; animation: moveStars linear infinite; }

@keyframes moveStars { from { transform: translateY(0); } to { transform: translateY(100vh); } } </style>

</head>
<body><div id="game">
  <h1>🚀 Space Survivor</h1>  <div class="stat">🔋 Энергия: <span id="energy">100</span></div>
  <div class="stat">🫁 Кислород: <span id="oxygen">100</span></div>
  <div class="stat">🍖 Еда: <span id="food">100</span></div><button onclick="repair()">⚙️ Чинить корабль</button> <button onclick="search()">📡 Искать сигнал</button> <button onclick="rest()">😴 Отдохнуть</button>

  <div id="log"></div>
</div><script>
let energy = 100;
let oxygen = 100;
let food = 100;
let progress = 0;

function update() {
  document.getElementById("energy").innerText = energy;
  document.getElementById("oxygen").innerText = oxygen;
  document.getElementById("food").innerText = food;
}

function log(text) {
  const logDiv = document.getElementById("log");
  logDiv.innerHTML = text + "<br>" + logDiv.innerHTML;
}

function repair() {
  if (energy < 10) return log("❌ Не хватает энергии");

  energy -= 10;
  progress += Math.random() * 10;

  log("🔧 Ты чинишь корабль...");

  if (progress >= 100) {
    log("🎉 Ты починил корабль и спасся!");
    alert("ПОБЕДА");
    location.reload();
  }
}

function search() {
  if (energy < 5) return log("❌ Нет энергии");

  energy -= 5;

  let event = Math.random();

  if (event < 0.3) {
    log("📡 Ты нашел слабый сигнал...");
    progress += 5;
  } else if (event < 0.6) {
    log("☄️ Метеорит повредил корабль!");
    energy -= 10;
  } else {
    log("👽 Ты заметил странный объект...");
    oxygen -= 5;
  }
}

function rest() {
  log("😴 Ты отдыхаешь...");
  energy += 10;
  food -= 5;
}

setInterval(() => {
  oxygen -= 1;
  food -= 1;

  if (oxygen <= 0 || food <= 0 || energy <= 0) {
    alert("💀 Ты погиб...");
    location.reload();
  }

  update();
}, 1000);

// звезды
for (let i = 0; i < 100; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.left = Math.random() * 100 + "vw";
  star.style.animationDuration = (2 + Math.random() * 5) + "s";
  document.body.appendChild(star);
}

update();
</script></body>
</html>
