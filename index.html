<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chugur - Игроки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: white;
            padding-bottom: 70px;
        }
        .header {
            background: #0f0f15;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a35;
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .content {
            padding: 20px;
        }
        .search-card {
            background: #15151f;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #2a2a35;
        }
        .search-title {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
        }
        .search-desc {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-bottom: 15px;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        .search-box input {
            flex: 1;
            background: #1e1e2a;
            border: 1px solid #3a3a4a;
            padding: 12px 16px;
            border-radius: 40px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .search-box button {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 0 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .result-box {
            margin-top: 15px;
        }
        .player-card {
            background: #1e1e2a;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            border: 1px solid #2a2a35;
        }
        .player-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #ff6b6b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .player-info {
            flex: 1;
        }
        .player-name {
            font-weight: bold;
            font-size: 16px;
        }
        .player-username {
            font-size: 12px;
            color: #888;
            font-family: monospace;
        }
        .write-btn {
            background: rgba(255,107,107,0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: #ff6b6b;
            font-weight: bold;
            cursor: pointer;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0 12px 0;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .chat-container {
            height: calc(100vh - 130px);
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #2a2a35;
            background: #0f0f15;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 20px;
            word-break: break-word;
        }
        .message.sent {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        .message.received {
            background: #1e1e2a;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        .chat-input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #2a2a35;
            background: #0f0f15;
        }
        .chat-input {
            flex: 1;
            background: #1e1e2a;
            border: 1px solid #3a3a4a;
            padding: 12px;
            border-radius: 30px;
            color: white;
            outline: none;
        }
        .chat-send {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 0 20px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f0f15;
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 1px solid #2a2a35;
        }
        .nav-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            color: #666;
        }
        .nav-btn.active {
            color: #ff6b6b;
        }
        .badge {
            background: #ff6b6b;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            position: absolute;
            margin-top: -5px;
            margin-left: 5px;
        }
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .auth-card {
            background: #15151f;
            padding: 30px;
            border-radius: 32px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        .auth-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #1e1e2a;
            border: 1px solid #3a3a4a;
            border-radius: 30px;
            color: white;
            font-size: 15px;
        }
        .auth-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 14px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        .switch {
            margin-top: 15px;
            color: #ff6b6b;
            cursor: pointer;
        }
        .profile-header {
            text-align: center;
            padding: 30px;
            background: #15151f;
            border-radius: 28px;
            margin-bottom: 20px;
        }
        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #ff6b6b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 15px;
        }
        .profile-name {
            font-size: 24px;
            font-weight: bold;
        }
        .profile-username {
            color: #888;
            margin: 5px 0;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ========== ДАННЫЕ ==========
        let currentUser = null;
        let users = [];
        let messages = [];
        let currentChat = null;
        let currentTab = 'search';
        let updateTimer = null;

        // Сохранение
        function saveAll() {
            localStorage.setItem('chugur_users', JSON.stringify(users));
            localStorage.setItem('chugur_messages', JSON.stringify(messages));
        }

        function loadData() {
            const savedUsers = localStorage.getItem('chugur_users');
            const savedMessages = localStorage.getItem('chugur_messages');
            
            if (savedUsers) {
                users = JSON.parse(savedUsers);
            } else {
                users = [];
                saveAll();
            }
            
            if (savedMessages) {
                messages = JSON.parse(savedMessages);
            } else {
                messages = [];
            }
        }

        // Генерация username
        function generateUsername() {
            let num = Math.floor(Math.random() * 9000) + 1000;
            let username = `player${num}`;
            while (users.some(u => u.username === username)) {
                num = Math.floor(Math.random() * 9000) + 1000;
                username = `player${num}`;
            }
            return username;
        }

        // ========== АУТЕНТИФИКАЦИЯ ==========
        function renderAuth() {
            document.getElementById('app').innerHTML = `
                <div class="auth-container">
                    <div class="auth-card">
                        <h2 style="margin-bottom:15px;">🎮 Chugur</h2>
                        <input type="text" id="loginUsername" class="auth-input" placeholder="Username">
                        <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль">
                        <button class="auth-btn" onclick="login()">Войти</button>
                        <div class="switch" onclick="showRegister()">✨ Создать аккаунт</div>
                    </div>
                </div>
            `;
        }

        function showRegister() {
            document.getElementById('app').innerHTML = `
                <div class="auth-container">
                    <div class="auth-card">
                        <h2 style="margin-bottom:15px;">📝 Регистрация</h2>
                        <input type="password" id="regPassword" class="auth-input" placeholder="Пароль (мин 3)">
                        <input type="text" id="regName" class="auth-input" placeholder="Ваше имя">
                        <button class="auth-btn" onclick="register()">Зарегистрироваться</button>
                        <div class="switch" onclick="renderAuth()">← Назад</div>
                    </div>
                </div>
            `;
        }

        function register() {
            const password = document.getElementById('regPassword').value;
            const name = document.getElementById('regName').value.trim();
            
            if (!password || password.length < 3) {
                alert('Пароль минимум 3 символа');
                return;
            }
            
            const username = generateUsername();
            const newUser = {
                id: Date.now().toString(),
                username: username,
                password: password,
                name: name || username,
                avatar: '',
                bio: 'Новый игрок'
            };
            
            users.push(newUser);
            saveAll();
            currentUser = newUser;
            localStorage.setItem('chugur_current', JSON.stringify(currentUser));
            startApp();
            alert(`✅ Готово!\n\nТвой username: ${username}\nПароль: ${password}\n\nЗапомни их!`);
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;
            
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                currentUser = user;
                localStorage.setItem('chugur_current', JSON.stringify(currentUser));
                startApp();
            } else {
                alert('Неверный username или пароль');
            }
        }

        function logout() {
            if (updateTimer) clearInterval(updateTimer);
            currentUser = null;
            localStorage.removeItem('chugur_current');
            renderAuth();
        }

        // ========== ПОЛУЧЕНИЕ СПИСКОВ ==========
        // Все игроки кроме себя
        function getAllPlayers() {
            return users.filter(u => u.id !== currentUser?.id);
        }
        
        // Игроки с которыми нет диалога (новые)
        function getNewPlayers() {
            const dialogIds = new Set();
            messages.forEach(msg => {
                if (msg.fromId === currentUser.id) dialogIds.add(msg.toId);
                if (msg.toId === currentUser.id) dialogIds.add(msg.fromId);
            });
            return users.filter(u => u.id !== currentUser?.id && !dialogIds.has(u.id));
        }
        
        // Игроки с которыми есть диалог
        function getDialogPlayers() {
            const dialogIds = new Set();
            messages.forEach(msg => {
                if (msg.fromId === currentUser.id) dialogIds.add(msg.toId);
                if (msg.toId === currentUser.id) dialogIds.add(msg.fromId);
            });
            return users.filter(u => u.id !== currentUser?.id && dialogIds.has(u.id));
        }

        // ========== ОТРИСОВКА ПОИСКА ==========
        function showSearch() {
            currentTab = 'search';
            currentChat = null;
            
            const newPlayers = getNewPlayers();
            
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <div class="logo">Chugur</div>
                    <div></div>
                </div>
                <div class="content">
                    <div class="search-card">
                        <div class="search-title">🔎 Найти игрока</div>
                        <div class="search-desc">Введи username или имя</div>
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="Например: player1234">
                            <button onclick="findPlayer()">Найти</button>
                        </div>
                        <div id="searchResult" class="result-box"></div>
                    </div>
                    
                    <div class="section-title">👥 Новые игроки (ещё не писали)</div>
                    <div id="newPlayersList">
                        ${newPlayers.length === 0 ? '<div class="empty">✨ Новых игроков пока нет</div>' : ''}
                    </div>
                </div>
                <div class="bottom-nav">
                    <button class="nav-btn ${currentTab === 'search' ? 'active' : ''}" onclick="showSearch()">🔍</button>
                    <button class="nav-btn ${currentTab === 'messages' ? 'active' : ''}" onclick="showMessages()">💬</button>
                    <button class="nav-btn ${currentTab === 'profile' ? 'active' : ''}" onclick="showProfile()">👤</button>
                </div>
            `;
            
            // Рендер списка новых игроков
            const container = document.getElementById('newPlayersList');
            if (container && newPlayers.length > 0) {
                container.innerHTML = newPlayers.map(u => renderPlayerItem(u)).join('');
            }
        }
        
        function renderPlayerItem(user) {
            const firstLetter = user.name ? user.name[0].toUpperCase() : '?';
            return `
                <div class="player-card" onclick="openChat('${user.id}')">
                    <div class="player-avatar">${firstLetter}</div>
                    <div class="player-info">
                        <div class="player-name">${escapeHtml(user.name)}</div>
                        <div class="player-username">@${escapeHtml(user.username)}</div>
                    </div>
                    <button class="write-btn" onclick="event.stopPropagation(); openChat('${user.id}')">💬</button>
                </div>
            `;
        }
        
        function findPlayer() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultDiv = document.getElementById('searchResult');
            
            if (!query) {
                resultDiv.innerHTML = '<div class="empty">Введите username или имя</div>';
                return;
            }
            
            const allPlayers = getAllPlayers();
            const found = allPlayers.find(u => 
                u.username.toLowerCase() === query || 
                u.name.toLowerCase() === query || 
                u.name.toLowerCase().includes(query)
            );
            
            if (found) {
                const firstLetter = found.name ? found.name[0].toUpperCase() : '?';
                resultDiv.innerHTML = `
                    <div class="player-card" style="border-color:#ff6b6b">
                        <div class="player-avatar">${firstLetter}</div>
                        <div class="player-info">
                            <div class="player-name">${escapeHtml(found.name)}</div>
                            <div class="player-username">@${escapeHtml(found.username)}</div>
                            <div style="font-size:12px; color:#aaa; margin-top:4px;">${escapeHtml(found.bio || '')}</div>
                        </div>
                        <button class="write-btn" onclick="openChat('${found.id}')">💬</button>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `<div class="empty">❌ Игрок "${escapeHtml(query)}" не найден</div>`;
            }
        }
        
        // ========== СООБЩЕНИЯ ==========
        function openChat(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) return;
            currentChat = user;
            renderChat();
        }
        
        function getChatMessages() {
            if (!currentChat) return [];
            return messages.filter(m => 
                (m.fromId === currentUser.id && m.toId === currentChat.id) ||
                (m.fromId === currentChat.id && m.toId === currentUser.id)
            ).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        }
        
        function sendMessage() {
            const input = document.getElementById('chatInput');
            if (!input) return;
            const text = input.value.trim();
            if (!text) return;
            
            const newMsg = {
                id: Date.now().toString(),
                fromId: currentUser.id,
                toId: currentChat.id,
                fromName: currentUser.name,
                toName: currentChat.name,
                text: text,
                timestamp: new Date().toISOString(),
                read: false
            };
            
            messages.push(newMsg);
            saveAll();
            
            input.value = '';
            renderChat();
            updateBadge();
        }
        
        function markAsRead() {
            let updated = false;
            messages.forEach(m => {
                if (m.toId === currentUser.id && m.fromId === currentChat.id && !m.read) {
                    m.read = true;
                    updated = true;
                }
            });
            if (updated) {
                saveAll();
                updateBadge();
            }
        }
        
        function renderChat() {
            const msgs = getChatMessages();
            markAsRead();
            
            const firstLetter = currentChat.name ? currentChat.name[0].toUpperCase() : '?';
            
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <button class="back-btn" onclick="showMessages()">←</button>
                    <div class="logo">${escapeHtml(currentChat.name)}</div>
                    <div></div>
                </div>
                <div class="chat-container">
                    <div class="chat-header">
                        <div class="player-avatar" style="width:50px;height:50px;font-size:24px;margin:0 auto 8px;">${firstLetter}</div>
                        <div><strong>${escapeHtml(currentChat.name)}</strong></div>
                        <div style="font-size:11px;color:#888;">@${escapeHtml(currentChat.username)}</div>
                    </div>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" class="chat-input" placeholder="Сообщение..." autocomplete="off">
                        <button class="chat-send" onclick="sendMessage()">➤</button>
                    </div>
                </div>
                <div class="bottom-nav">
                    <button class="nav-btn" onclick="showSearch()">🔍</button>
                    <button class="nav-btn active" onclick="showMessages()">💬</button>
                    <button class="nav-btn" onclick="showProfile()">👤</button>
                </div>
            `;
            
            const container = document.getElementById('chatMessages');
            msgs.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.fromId === currentUser.id ? 'sent' : 'received'}`;
                div.innerHTML = `
                    <div>${escapeHtml(msg.text)}</div>
                    <div style="font-size:10px;opacity:0.6;margin-top:4px;">${new Date(msg.timestamp).toLocaleTimeString().slice(0,5)}</div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
            
            const input = document.getElementById('chatInput');
            if (input) {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') sendMessage();
                });
                input.focus();
            }
        }
        
        function showMessages() {
            currentTab = 'messages';
            currentChat = null;
            
            const dialogs = getDialogPlayers();
            const dialogsWithLastMsg = dialogs.map(user => {
                const userMsgs = messages.filter(m => 
                    (m.fromId === currentUser.id && m.toId === user.id) ||
                    (m.fromId === user.id && m.toId === currentUser.id)
                ).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                const unread = messages.filter(m => m.fromId === user.id && m.toId === currentUser.id && !m.read).length;
                return { user, lastMsg: userMsgs[0], unread };
            }).sort((a,b) => new Date(b.lastMsg.timestamp) - new Date(a.lastMsg.timestamp));
            
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <div class="logo">Chugur</div>
                    <div></div>
                </div>
                <div class="content">
                    <div class="section-title">💬 Мои сообщения</div>
                    <div id="dialogsList">
                        ${dialogsWithLastMsg.length === 0 ? '<div class="empty">💬 Нет сообщений. Найди игрока через 🔍</div>' : ''}
                    </div>
                </div>
                <div class="bottom-nav">
                    <button class="nav-btn" onclick="showSearch()">🔍</button>
                    <button class="nav-btn active" onclick="showMessages()">💬</button>
                    <button class="nav-btn" onclick="showProfile()">👤</button>
                </div>
            `;
            
            const container = document.getElementById('dialogsList');
            if (container && dialogsWithLastMsg.length > 0) {
                container.innerHTML = dialogsWithLastMsg.map(d => {
                    const firstLetter = d.user.name ? d.user.name[0].toUpperCase() : '?';
                    const lastText = d.lastMsg.text ? (d.lastMsg.text.length > 30 ? d.lastMsg.text.slice(0,30)+'...' : d.lastMsg.text) : '';
                    return `
                        <div class="player-card" onclick="openChat('${d.user.id}')">
                            <div class="player-avatar">${firstLetter}</div>
                            <div class="player-info">
                                <div class="player-name">${escapeHtml(d.user.name)} ${d.unread > 0 ? `<span style="background:#ff6b6b; padding:2px 8px; border-radius:12px; font-size:11px;">${d.unread}</span>` : ''}</div>
                                <div class="player-username">@${escapeHtml(d.user.username)}</div>
                                <div style="font-size:12px; color:#888;">${escapeHtml(lastText)}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            updateBadge();
        }
        
        function showProfile() {
            currentTab = 'profile';
            currentChat = null;
            
            const firstLetter = currentUser.name ? currentUser.name[0].toUpperCase() : '?';
            
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <div class="logo">Chugur</div>
                    <div></div>
                </div>
                <div class="content">
                    <div class="profile-header">
                        <div class="profile-avatar">${firstLetter}</div>
                        <div class="profile-name">${escapeHtml(currentUser.name)}</div>
                        <div class="profile-username">@${escapeHtml(currentUser.username)}</div>
                        <div style="margin:10px 0;">${escapeHtml(currentUser.bio)}</div>
                        <button class="auth-btn" style="width:auto; padding:10px 25px; display:inline-block;" onclick="editProfile()">✏️ Редактировать</button>
                        <button class="auth-btn" style="width:auto; padding:10px 25px; display:inline-block; margin-left:10px; background:#333;" onclick="logout()">🚪 Выйти</button>
                    </div>
                    <div class="section-title">📊 Твой username для других:</div>
                    <div style="background:#15151f; padding:15px; border-radius:20px; text-align:center; font-family:monospace; font-size:18px;">
                        ${escapeHtml(currentUser.username)}
                    </div>
                </div>
                <div class="bottom-nav">
                    <button class="nav-btn" onclick="showSearch()">🔍</button>
                    <button class="nav-btn" onclick="showMessages()">💬</button>
                    <button class="nav-btn active" onclick="showProfile()">👤</button>
                </div>
            `;
        }
        
        function editProfile() {
            const newName = prompt('Новое имя:', currentUser.name);
            const newBio = prompt('О себе:', currentUser.bio);
            if (newName) currentUser.name = newName;
            if (newBio) currentUser.bio = newBio;
            const idx = users.findIndex(u => u.id === currentUser.id);
            if (idx !== -1) users[idx] = currentUser;
            saveAll();
            localStorage.setItem('chugur_current', JSON.stringify(currentUser));
            showProfile();
        }
        
        function updateBadge() {
            const unread = messages.filter(m => m.toId === currentUser?.id && !m.read).length;
            // просто для инфы, можно вывести куда-то
            if (unread > 0) {
                console.log(`Непрочитанных: ${unread}`);
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function startApp() {
            loadData();
            showSearch();
            if (updateTimer) clearInterval(updateTimer);
            updateTimer = setInterval(() => {
                loadData();
                if (currentChat) {
                    renderChat();
                }
                if (currentTab === 'search') {
                    const newPlayers = getNewPlayers();
                    const container = document.getElementById('newPlayersList');
                    if (container) {
                        if (newPlayers.length === 0) {
                            container.innerHTML = '<div class="empty">✨ Новых игроков пока нет</div>';
                        } else {
                            container.innerHTML = newPlayers.map(u => renderPlayerItem(u)).join('');
                        }
                    }
                }
                if (currentTab === 'messages' && !currentChat) {
                    showMessages();
                }
                updateBadge();
            }, 30000);
        }
        
        // ========== ЗАПУСК ==========
        loadData();
        const savedUser = localStorage.getItem('chugur_current');
        if (savedUser) {
            const parsed = JSON.parse(savedUser);
            currentUser = users.find(u => u.id === parsed.id);
            if (currentUser) {
                startApp();
            } else {
                renderAuth();
            }
        } else {
            renderAuth();
        }
    </script>
</body>
</html>
