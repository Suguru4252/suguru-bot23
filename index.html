<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: manipulation">
  <title>Вселенная 3D | 500 световых лет</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      background: #000;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 12px 25px;
      border-radius: 50px;
      pointer-events: none;
      backdrop-filter: blur(10px);
      font-weight: 500;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 10;
      font-size: 14px;
    }
    #mode-btn {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 12px 30px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.4);
      cursor: pointer;
      transition: all 0.3s;
      z-index: 20;
    }
    #mode-btn:hover {
      background: rgba(255,140,0,0.8);
      border-color: #ffaa00;
      box-shadow: 0 0 25px rgba(255,140,0,0.6);
    }
    #mode-btn.fly-mode {
      background: rgba(255,140,0,0.9);
      border-color: #ffaa00;
      box-shadow: 0 0 30px rgba(255,140,0,0.8);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255,140,0,0.6); }
      50% { box-shadow: 0 0 40px rgba(255,140,0,0.9); }
    }
    #search-container {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 30;
      display: flex;
      gap: 8px;
    }
    #search-input {
      background: rgba(10,10,20,0.85);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 10px 18px;
      border-radius: 30px;
      font-size: 14px;
      width: 200px;
      outline: none;
      transition: all 0.3s;
    }
    #search-input:focus {
      border-color: #ffaa00;
      box-shadow: 0 0 20px rgba(255,140,0,0.4);
    }
    #search-input::placeholder {
      color: rgba(255,255,255,0.5);
    }
    #search-results {
      position: absolute;
      top: 55px;
      right: 0;
      background: rgba(10,10,20,0.9);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 15px;
      max-height: 300px;
      overflow-y: auto;
      width: 220px;
      display: none;
      z-index: 35;
    }
    .search-result-item {
      padding: 10px 18px;
      cursor: pointer;
      color: #ccc;
      font-size: 13px;
      transition: all 0.2s;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .search-result-item:hover {
      background: rgba(255,140,0,0.3);
      color: white;
    }
    #settings-panel {
      position: absolute;
      top: 80px;
      right: 20px;
      background: rgba(10,10,20,0.85);
      backdrop-filter: blur(15px);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 8px 30px rgba(0,0,0,0.7);
      z-index: 25;
      min-width: 260px;
      color: white;
    }
    #settings-panel h3 {
      margin: 0 0 15px 0;
      font-size: 18px;
      text-align: center;
      letter-spacing: 1px;
      color: #ffaa00;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 10px;
    }
    .setting-row label {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
    }
    .setting-row input[type="range"] {
      flex: 1;
      accent-color: #ffaa00;
      height: 6px;
    }
    .value-display {
      font-size: 13px;
      font-weight: bold;
      color: #ffaa00;
      min-width: 55px;
      text-align: right;
    }
    #settings-panel button {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    #settings-panel button:hover {
      background: rgba(255,140,0,0.5);
    }
    .instruction {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      background: rgba(0,0,0,0.55);
      padding: 8px 25px;
      border-radius: 25px;
      backdrop-filter: blur(8px);
      white-space: nowrap;
      pointer-events: none;
      letter-spacing: 0.5px;
      z-index: 15;
    }
    #joystick-container {
      position: absolute;
      bottom: 40px;
      left: 40px;
      width: 140px;
      height: 140px;
      display: none;
      z-index: 30;
    }
    #joystick-base {
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      position: relative;
      backdrop-filter: blur(5px);
    }
    #joystick-thumb {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255,255,255,0.6);
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }
    #look-area {
      position: absolute;
      top: 0;
      right: 0;
      width: 50%;
      height: 100%;
      z-index: 25;
      display: none;
    }
    @media (max-width: 768px) {
      #joystick-container { display: block; }
      #look-area { display: block; }
      #mode-btn { font-size: 14px; padding: 10px 20px; top: 70px; }
      #search-container { top: 20px; right: 10px; }
      #search-input { width: 130px; font-size: 12px; }
      #settings-panel { top: 120px; right: 10px; padding: 15px; min-width: 200px; }
      .instruction { font-size: 10px; bottom: 20px; white-space: normal; width: 80%; text-align: center; }
      #info { font-size: 12px; padding: 8px 15px; }
    }
  </style>
</head>
<body>
  <div id="info">🌌 ВСЕЛЕННАЯ • 500 св. лет</div>
  <button id="mode-btn">🎮 ОБЗОР (мышь)</button>

  <div id="search-container">
    <input type="text" id="search-input" placeholder="🔍 Поиск объектов...">
    <div id="search-results"></div>
  </div>

  <div id="settings-panel">
    <h3>⚙️ НАСТРОЙКИ</h3>
    <div class="setting-row">
      <label>⏱️ Время:</label>
      <span class="value-display" id="time-speed-display">1x</span>
    </div>
    <div class="setting-row">
      <input type="range" id="time-speed-slider" min="1" max="5000" value="1" step="1">
    </div>
    <div class="setting-row">
      <label>🖱️ Чувств.:</label>
      <span class="value-display" id="sensitivity-display">0.5</span>
    </div>
    <div class="setting-row">
      <input type="range" id="sensitivity-slider" min="0.1" max="1.5" value="0.5" step="0.1">
    </div>
    <div class="setting-row">
      <label>🚀 Скорость:</label>
      <span class="value-display" id="fly-speed-display">1x</span>
    </div>
    <div class="setting-row">
      <input type="range" id="fly-speed-slider" min="0.1" max="20" value="1" step="0.1">
    </div>
    <div class="setting-row" style="justify-content: center; margin-top: 5px;">
      <button id="pause-btn">⏯️ ПАУЗА</button>
    </div>
  </div>

  <div class="instruction">🖱️ Обзор: вращение/зум | 🚀 Полёт: WASD | ПРОБЕЛ — режим | 🔍 Поиск | ⚙️ Настройки</div>

  <div id="joystick-container">
    <div id="joystick-base"><div id="joystick-thumb"></div></div>
  </div>
  <div id="look-area"></div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ==================== СЦЕНА ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    
    // Оптимизированные звёзды (минимум точек, маленький размер)
    const starsGeo1 = new THREE.BufferGeometry();
    const starsPos1 = new Float32Array(1500 * 3);
    for (let i = 0; i < 1500 * 3; i += 3) {
      starsPos1[i] = (Math.random() - 0.5) * 8000;
      starsPos1[i+1] = (Math.random() - 0.5) * 5000;
      starsPos1[i+2] = (Math.random() - 0.5) * 6000;
    }
    starsGeo1.setAttribute('position', new THREE.BufferAttribute(starsPos1, 3));
    const stars1 = new THREE.Points(starsGeo1, new THREE.PointsMaterial({color: 0xffffff, size: 0.1, depthWrite: false}));
    scene.add(stars1);
    
    const starsGeo2 = new THREE.BufferGeometry();
    const starsPos2 = new Float32Array(1000 * 3);
    for (let i = 0; i < 1000 * 3; i += 3) {
      starsPos2[i] = (Math.random() - 0.5) * 10000;
      starsPos2[i+1] = (Math.random() - 0.5) * 6000;
      starsPos2[i+2] = (Math.random() - 0.5) * 8000;
    }
    starsGeo2.setAttribute('position', new THREE.BufferAttribute(starsPos2, 3));
    const stars2 = new THREE.Points(starsGeo2, new THREE.PointsMaterial({color: 0xaaccff, size: 0.15, depthWrite: false}));
    scene.add(stars2);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 50000);
    camera.position.set(0, 80, 200);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.rotateSpeed = 0.5;
    controls.zoomSpeed = 2.5;
    controls.target.set(0, 0, 0);
    controls.maxDistance = 20000;
    controls.minDistance = 1;
    controls.update();

    // ==================== НАСТРОЙКИ ====================
    let timeSpeed = 1, isPaused = false, cameraSensitivity = 0.5, baseFlySpeed = 0.7;
    
    document.getElementById('time-speed-slider').addEventListener('input', function() {
      const v = parseInt(this.value);
      timeSpeed = v <= 10 ? v : v <= 100 ? Math.round(v/10)*10 : v <= 1000 ? Math.round(v/50)*50 : Math.round(v/250)*250;
      document.getElementById('time-speed-display').textContent = timeSpeed + 'x';
    });
    document.getElementById('sensitivity-slider').addEventListener('input', function() {
      cameraSensitivity = parseFloat(this.value);
      document.getElementById('sensitivity-display').textContent = cameraSensitivity.toFixed(1);
      controls.rotateSpeed = cameraSensitivity;
    });
    document.getElementById('fly-speed-slider').addEventListener('input', function() {
      baseFlySpeed = parseFloat(this.value);
      document.getElementById('fly-speed-display').textContent = baseFlySpeed.toFixed(1) + 'x';
    });
    document.getElementById('pause-btn').addEventListener('click', function() {
      isPaused = !isPaused;
      this.textContent = isPaused ? '▶️ ИГРАТЬ' : '⏯️ ПАУЗА';
      this.style.background = isPaused ? 'rgba(255,140,0,0.5)' : 'rgba(255,255,255,0.15)';
    });

    // ==================== РЕЖИМЫ ====================
    let flyMode = false;
    const keys = { w: false, a: false, s: false, d: false, q: false, e: false, shift: false };
    let yaw = 0, pitch = 0, mouseDown = false, lastMX = 0, lastMY = 0;
    
    document.getElementById('mode-btn').addEventListener('click', () => {
      flyMode = !flyMode;
      const btn = document.getElementById('mode-btn');
      if (flyMode) {
        btn.textContent = '🚀 ПОЛЁТ (WASD)'; btn.classList.add('fly-mode');
        controls.enabled = false; renderer.domElement.style.cursor = 'crosshair';
      } else {
        btn.textContent = '🎮 ОБЗОР (мышь)'; btn.classList.remove('fly-mode');
        controls.enabled = true; renderer.domElement.style.cursor = 'default';
        Object.keys(keys).forEach(k => keys[k] = false);
      }
    });
    
    window.addEventListener('keydown', e => {
      if (e.code === 'Space' && document.activeElement?.id !== 'search-input') { e.preventDefault(); document.getElementById('mode-btn').click(); return; }
      if (!flyMode) return;
      if (e.code === 'KeyW') keys.w = true;
      if (e.code === 'KeyA') keys.a = true;
      if (e.code === 'KeyS') keys.s = true;
      if (e.code === 'KeyD') keys.d = true;
      if (e.code === 'KeyQ') keys.q = true;
      if (e.code === 'KeyE') keys.e = true;
      if (e.code.startsWith('Shift')) keys.shift = true;
    });
    window.addEventListener('keyup', e => {
      if (!flyMode) return;
      if (e.code === 'KeyW') keys.w = false;
      if (e.code === 'KeyA') keys.a = false;
      if (e.code === 'KeyS') keys.s = false;
      if (e.code === 'KeyD') keys.d = false;
      if (e.code === 'KeyQ') keys.q = false;
      if (e.code === 'KeyE') keys.e = false;
      if (e.code.startsWith('Shift')) keys.shift = false;
    });
    renderer.domElement.addEventListener('mousedown', e => { if (flyMode) { mouseDown = true; lastMX = e.clientX; lastMY = e.clientY; } });
    window.addEventListener('mouseup', () => { mouseDown = false; });
    window.addEventListener('mousemove', e => {
      if (!flyMode || !mouseDown) return;
      yaw -= (e.clientX - lastMX) * 0.004 * cameraSensitivity;
      pitch -= (e.clientY - lastMY) * 0.004 * cameraSensitivity;
      pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
      lastMX = e.clientX; lastMY = e.clientY;
    });

    // ==================== ДЖОЙСТИК ====================
    let jsActive = false, jsX = 0, jsY = 0, jsSX = 0, jsSY = 0;
    const jsBase = document.getElementById('joystick-base');
    const jsThumb = document.getElementById('joystick-thumb');
    const lookArea = document.getElementById('look-area');
    let tlActive = false, tlLX = 0, tlLY = 0;
    
    function isMobile() { return /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || window.innerWidth <= 768; }
    if (isMobile()) {
      document.getElementById('joystick-container').style.display = 'block';
      lookArea.style.display = 'block';
    }
    
    jsBase.addEventListener('touchstart', e => {
      e.preventDefault(); jsActive = true;
      const r = jsBase.getBoundingClientRect();
      jsSX = r.left + r.width/2; jsSY = r.top + r.height/2;
      jsX = e.touches[0].clientX - jsSX; jsY = e.touches[0].clientY - jsSY;
      updateJS();
    });
    jsBase.addEventListener('touchmove', e => {
      e.preventDefault(); if (!jsActive) return;
      jsX = e.touches[0].clientX - jsSX; jsY = e.touches[0].clientY - jsSY;
      const d = Math.sqrt(jsX**2 + jsY**2);
      if (d > 50) { jsX = (jsX/d)*50; jsY = (jsY/d)*50; }
      updateJS();
    });
    jsBase.addEventListener('touchend', () => { jsActive = false; jsX = 0; jsY = 0; updateJS(); });
    function updateJS() { jsThumb.style.transform = `translate(calc(-50% + ${jsX}px), calc(-50% + ${jsY}px))`; }
    
    lookArea.addEventListener('touchstart', e => { e.preventDefault(); tlActive = true; tlLX = e.touches[0].clientX; tlLY = e.touches[0].clientY; });
    lookArea.addEventListener('touchmove', e => {
      e.preventDefault(); if (!tlActive) return;
      const dx = e.touches[0].clientX - tlLX, dy = e.touches[0].clientY - tlLY;
      if (flyMode) { yaw -= dx*0.004*cameraSensitivity; pitch -= dy*0.004*cameraSensitivity; pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch)); }
      else {
        const off = camera.position.clone().sub(controls.target);
        const sph = new THREE.Spherical().setFromVector3(off);
        sph.theta -= dx*0.003*cameraSensitivity; sph.phi -= dy*0.003*cameraSensitivity;
        sph.phi = Math.max(0.1, Math.min(Math.PI-0.1, sph.phi));
        off.setFromSpherical(sph); camera.position.copy(controls.target.clone().add(off)); camera.lookAt(controls.target);
      }
      tlLX = e.touches[0].clientX; tlLY = e.touches[0].clientY;
    });
    lookArea.addEventListener('touchend', () => { tlActive = false; });

    // ==================== ОСВЕЩЕНИЕ ====================
    scene.add(new THREE.PointLight(0xfff5e6, 4, 0, 0.5));
    scene.add(new THREE.AmbientLight(0x111122, 0.5));

    // ==================== СОЛНЕЧНАЯ СИСТЕМА (НЕ ТРОГАЮ) ====================
    const sunGeo = new THREE.SphereGeometry(2.5, 64, 64);
    const sunMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.4, emissive: new THREE.Color('#ff6600'), emissiveIntensity: 1 });
    const sun = new THREE.Mesh(sunGeo, sunMat);
    sun.userData = { key: 'sun' };
    scene.add(sun);

    const planetsData = [
      { color: 0xaaaaaa, size: 0.4, dist: 6, speed: 0.035 },
      { color: 0xffcc88, size: 0.7, dist: 9, speed: 0.022 },
      { color: 0x2299ff, size: 0.75, dist: 12, speed: 0.018 },
      { color: 0xc1440e, size: 0.55, dist: 16, speed: 0.015 },
      { color: 0x999999, size: 0.3, dist: 20, speed: 0.012 },
      { color: 0xd8a27a, size: 1.8, dist: 28, speed: 0.009 },
      { color: 0xf0d8b0, size: 1.5, dist: 36, speed: 0.007, rings: true },
      { color: 0x6fd4d4, size: 1.2, dist: 45, speed: 0.005 },
      { color: 0x4169e1, size: 1.15, dist: 54, speed: 0.004 },
      { color: 0xccbb99, size: 0.35, dist: 65, speed: 0.003 },
      { color: 0xddccbb, size: 0.32, dist: 78, speed: 0.0025 }
    ];

    const solPlanets = [];
    planetsData.forEach((data, index) => {
      const geo = new THREE.SphereGeometry(data.size, 48, 48);
      const mat = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.75 });
      const planet = new THREE.Mesh(geo, mat);
      const angle = Math.random() * Math.PI * 2;
      planet.position.set(data.dist * Math.cos(angle), 0, data.dist * Math.sin(angle));
      planet.userData = { dist: data.dist, speed: data.speed, angle, key: 'planet_' + index };
      if (data.rings) {
        const ringGeo = new THREE.RingGeometry(data.size * 1.4, data.size * 2.2, 64);
        const ring = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({ color: 0xc2b280, side: THREE.DoubleSide, transparent: true, opacity: 0.5 }));
        ring.rotation.x = Math.PI / 2 + 0.1;
        planet.add(ring);
      }
      scene.add(planet);
      solPlanets.push(planet);
    });

    // Астероиды
    for (let i = 0; i < 300; i++) {
      const d = 17 + Math.random() * 7, a = Math.random() * Math.PI * 2;
      const ast = new THREE.Mesh(new THREE.SphereGeometry(0.05, 3, 3), new THREE.MeshStandardMaterial({ color: 0x888888 }));
      ast.position.set(d * Math.cos(a), (Math.random()-0.5)*1.2, d * Math.sin(a));
      ast.userData = { dist: d, speed: 0.008 + Math.random()*0.01, angle: a };
      scene.add(ast);
    }
    // Койпер
    for (let i = 0; i < 500; i++) {
      const d = 58 + Math.random() * 30, a = Math.random() * Math.PI * 2;
      const obj = new THREE.Mesh(new THREE.SphereGeometry(0.04, 3, 3), new THREE.MeshStandardMaterial({ color: 0x998877 }));
      obj.position.set(d * Math.cos(a), (Math.random()-0.5)*5, d * Math.sin(a));
      obj.userData = { dist: d, speed: 0.0015 + Math.random()*0.003, angle: a };
      scene.add(obj);
    }

    // ==================== ЗВЁЗДЫ ДО 500 СВ. ЛЕТ С ПЛАНЕТАМИ ====================
    const LY = 100; // 1 световой год = 100 единиц
    
    const starSystems = [
      // Ближайшие
      { color: '#ff5533', size: 3.5, dist: 4.24, angle: 2.1, planets: [{color: '#6688aa', size: 1.8, dist: 5, speed: 0.04}] },
      { color: '#ffdd88', size: 4.0, dist: 4.37, angle: 2.3, planets: [] },
      { color: '#ffaa44', size: 3.2, dist: 4.37, angle: 2.35, planets: [] },
      { color: '#ff4422', size: 3.0, dist: 5.96, angle: 4.5, planets: [{color: '#887766', size: 1.5, dist: 5.5, speed: 0.035}] },
      
      // 5-15 св. лет
      { color: '#ff3311', size: 2.8, dist: 7.86, angle: 0.9, planets: [{color: '#998877', size: 1.2, dist: 4, speed: 0.04}] },
      { color: '#ff4422', size: 3.0, dist: 8.29, angle: 2.0, planets: [{color: '#887766', size: 1.4, dist: 4.5, speed: 0.035}] },
      { color: '#ffffff', size: 5.0, dist: 8.60, angle: 3.1, planets: [] },
      { color: '#ccccff', size: 1.5, dist: 8.60, angle: 3.12, planets: [] },
      { color: '#ff4422', size: 2.5, dist: 8.73, angle: 2.8, planets: [] },
      { color: '#ff3311', size: 2.5, dist: 9.68, angle: 4.0, planets: [] },
      { color: '#ff4422', size: 2.5, dist: 10.32, angle: 5.2, planets: [] },

      { color: '#ffffdd', size: 4.5, dist: 11.46, angle: 5.8, planets: [] },

      { color: '#ff4422', size: 2.5, dist: 12.35, angle: 3.2, planets: [] },

      { color: '#ff3311', size: 2.3, dist: 13.82, angle: 4.9, planets: [] },
      { color: '#ffdd88', size: 3.8, dist: 14.81, angle: 2.7, planets: [{color: '#aa8866', size: 1.5, dist: 5.5, speed: 0.03}] },

      { color: '#ddeeff', size: 6.0, dist: 25.04, angle: 3.5, planets: [] },
      { color: '#ffcc88', size: 3.8, dist: 27.30, angle: 2.2, planets: [{color: '#998877', size: 1.4, dist: 5, speed: 0.035}] },
      { color: '#ff4422', size: 2.8, dist: 28.45, angle: 4.7, planets: [] },
      { color: '#ffffff', size: 5.0, dist: 29.81, angle: 1.9, planets: [{color: '#8899aa', size: 1.5, dist: 5.5, speed: 0.03}] },
      
      // 30-50 св. лет
      { color: '#ffaa44', size: 7.0, dist: 36.72, angle: 1.8, planets: [{color: '#cc9966', size: 2.0, dist: 7, speed: 0.02}] },
      { color: '#ffff88', size: 6.5, dist: 42.80, angle: 4.2, planets: [] },
      { color: '#ffffff', size: 5.5, dist: 51.55, angle: 3.0, planets: [] },
      { color: '#ffaa44', size: 6.0, dist: 33.79, angle: 0.5, planets: [{color: '#cc9966', size: 2.0, dist: 7.5, speed: 0.02}] },
      { color: '#ddeeff', size: 7.5, dist: 43.71, angle: 5.0, planets: [] },
      
      // 50-100 св. лет
      { color: '#ffffff', size: 5.5, dist: 65.11, angle: 2.3, planets: [{color: '#8899aa', size: 1.6, dist: 6, speed: 0.025}] },

      { color: '#ffdd88', size: 4.5, dist: 83.20, angle: 3.9, planets: [{color: '#998877', size: 1.5, dist: 5.5, speed: 0.03}] },
      { color: '#ff4422', size: 3.0, dist: 91.50, angle: 0.4, planets: [] },
      { color: '#ffffff', size: 5.0, dist: 97.00, angle: 4.8, planets: [{color: '#aabbcc', size: 1.7, dist: 6.5, speed: 0.028}] },
      
      // 100-200 св. лет
      { color: '#ffcc88', size: 4.5, dist: 120.5, angle: 2.1, planets: [{color: '#887766', size: 1.8, dist: 6, speed: 0.025}] },
      { color: '#ffffff', size: 6.0, dist: 145.3, angle: 5.2, planets: [{color: '#8899aa', size: 1.9, dist: 7, speed: 0.022}] },
      { color: '#ffdd88', size: 5.0, dist: 168.7, angle: 1.5, planets: [] },
      { color: '#ddeeff', size: 6.5, dist: 182.4, angle: 3.8, planets: [{color: '#998877', size: 1.6, dist: 5.5, speed: 0.028}] },
      { color: '#ffaa44', size: 5.5, dist: 195.9, angle: 0.7, planets: [] },
      
      // 200-350 св. лет
      { color: '#ffffff', size: 6.5, dist: 220.1, angle: 4.3, planets: [{color: '#aabbcc', size: 2.0, dist: 7, speed: 0.02}] },
      { color: '#ffcc88', size: 5.0, dist: 250.6, angle: 1.9, planets: [{color: '#887766', size: 1.7, dist: 6, speed: 0.025}] },
      { color: '#ffff88', size: 7.0, dist: 280.3, angle: 5.5, planets: [{color: '#8899aa', size: 2.0, dist: 7.5, speed: 0.02}] },
      { color: '#ddeeff', size: 7.5, dist: 310.8, angle: 2.7, planets: [] },
      { color: '#ffdd88', size: 5.5, dist: 340.2, angle: 0.3, planets: [{color: '#998877', size: 1.8, dist: 6.5, speed: 0.022}] },
      
      // 350-500 св. лет
      { color: '#ffffff', size: 7.0, dist: 370.5, angle: 3.1, planets: [{color: '#aabbcc', size: 2.1, dist: 7, speed: 0.018}] },
      { color: '#ffaa44', size: 6.5, dist: 400.8, angle: 1.2, planets: [{color: '#cc9966', size: 2.2, dist: 7.5, speed: 0.018}] },
      { color: '#ffcc88', size: 5.5, dist: 425.3, angle: 4.9, planets: [{color: '#887766', size: 1.9, dist: 6.5, speed: 0.02}] },
      { color: '#ddeeff', size: 8.0, dist: 450.1, angle: 2.5, planets: [{color: '#8899aa', size: 2.3, dist: 8, speed: 0.016}] },
      { color: '#ffffff', size: 7.5, dist: 475.6, angle: 0.9, planets: [{color: '#998877', size: 2.0, dist: 7, speed: 0.018}] },
      { color: '#ffdd88', size: 6.0, dist: 490.2, angle: 3.6, planets: [] }
    ];

    const allExoplanets = [];
    
    starSystems.forEach(sd => {
      const x = sd.dist * LY * Math.cos(sd.angle);
      const z = sd.dist * LY * Math.sin(sd.angle);
      const starGroup = new THREE.Group();
      starGroup.position.set(x, (Math.random() - 0.5) * 80, z);
      
      // Звезда
      const sGeo = new THREE.SphereGeometry(sd.size, 48, 48);
      const sMat = new THREE.MeshBasicMaterial({ color: sd.color });
      const star = new THREE.Mesh(sGeo, sMat);
      star.userData = { key: 'star_' + sd.dist + '_' + sd.angle };
      starGroup.add(star);
      
      // Свечение
      const glowGeo = new THREE.SphereGeometry(sd.size * 3, 40, 40);
      const glowMat = new THREE.ShaderMaterial({
        uniforms: { uColor: { value: new THREE.Color(sd.color) } },
        vertexShader: `varying vec3 vNormal; varying vec3 vPos; void main() { vec4 wp = modelMatrix * vec4(position, 1.0); vNormal = normalize(mat3(modelMatrix) * normal); vPos = wp.xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `varying vec3 vNormal; varying vec3 vPos; uniform vec3 uColor; void main() { vec3 vd = normalize(cameraPosition - vPos); float f = 1.0 - abs(dot(vd, vNormal)); f = pow(f, 4.0); gl_FragColor = vec4(uColor, f * 0.5); }`,
        transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
      });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      glow.renderOrder = 1;
      starGroup.add(glow);
      
      scene.add(starGroup);
      
      // Планеты
      if (sd.planets) {
        sd.planets.forEach(pd => {
          const pGeo = new THREE.SphereGeometry(pd.size, 36, 36);
          const pMat = new THREE.MeshStandardMaterial({ color: pd.color, roughness: 0.65 });
          const planet = new THREE.Mesh(pGeo, pMat);
          const pa = Math.random() * Math.PI * 2;
          planet.position.set(pd.dist * Math.cos(pa), 0, pd.dist * Math.sin(pa));
          planet.userData = { dist: pd.dist, speed: pd.speed, angle: pa, key: 'exoplanet_' + Math.random() };
          starGroup.add(planet);
          allExoplanets.push(planet);
        });
      }
    });

    // ==================== ЧЁРНЫЕ ДЫРЫ ====================
    const blackHoles = [
      { dist: 480, angle: 0.8, size: 5.0, color: '#4400ff' },
      { dist: 700, angle: 1.5, size: 4.5, color: '#4400ff' },
      { dist: 2200, angle: 2.2, size: 6.5, color: '#6600ff' },
      { dist: 1000, angle: 3.7, size: 5.0, color: '#4400ff' },
      { dist: 2500, angle: 5.5, size: 3.5, color: '#5500ff' },
      { dist: 3000, angle: 0.3, size: 4.0, color: '#4400ff' },
      { dist: 5000, angle: 4.1, size: 7.0, color: '#7700ff' },
      { dist: 8000, angle: 2.9, size: 8.0, color: '#8800ff' },
      { dist: 12000, angle: 1.3, size: 9.0, color: '#9900ff' },
      { dist: 15000, angle: 3.5, size: 6.0, color: '#6600ff' },
      { dist: 20000, angle: 0.7, size: 10.0, color: '#aa00ff' }
    ];

    const bhObjects = [];
    blackHoles.forEach(bh => {
      const x = bh.dist * Math.cos(bh.angle);
      const z = bh.dist * Math.sin(bh.angle);
      const bhGroup = new THREE.Group();
      bhGroup.position.set(x, (Math.random() - 0.5) * 60, z);
      
      // Диски
      for (let i = 0; i < 3; i++) {
        const dGeo = new THREE.RingGeometry(bh.size * (1.1 + i*0.6), bh.size * (2.0 + i*0.7), 96);
        const dMat = new THREE.MeshBasicMaterial({ 
          color: [0x8844ff, 0x6622cc, 0x4400aa][i], 
          side: THREE.DoubleSide, transparent: true, opacity: 0.5 - i*0.12 
        });
        const disk = new THREE.Mesh(dGeo, dMat);
        disk.rotation.x = Math.PI/2 + 0.3 + i*0.05;
        disk.rotation.z = i * 0.3;
        bhGroup.add(disk);
      }
      
      // Горизонт
      const hGeo = new THREE.SphereGeometry(bh.size, 48, 48);
      bhGroup.add(new THREE.Mesh(hGeo, new THREE.MeshBasicMaterial({ color: 0x000000 })));
      
      // Фотонное кольцо
      const pGeo = new THREE.RingGeometry(bh.size * 0.95, bh.size * 1.05, 96);
      const pMat = new THREE.MeshBasicMaterial({ color: 0xff44ff, side: THREE.DoubleSide, transparent: true, opacity: 0.85 });
      const photonRing = new THREE.Mesh(pGeo, pMat);
      photonRing.rotation.x = Math.PI/2;
      bhGroup.add(photonRing);
      
      // Свечение
      const glGeo = new THREE.SphereGeometry(bh.size * 4, 40, 40);
      const glMat = new THREE.ShaderMaterial({
        uniforms: { uColor: { value: new THREE.Color(bh.color) }, uTime: { value: 0 } },
        vertexShader: `varying vec3 vNormal; varying vec3 vPos; void main() { vec4 wp = modelMatrix * vec4(position, 1.0); vNormal = normalize(mat3(modelMatrix) * normal); vPos = wp.xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `varying vec3 vNormal; varying vec3 vPos; uniform vec3 uColor; uniform float uTime; void main() { vec3 vd = normalize(cameraPosition - vPos); float f = 1.0 - abs(dot(vd, vNormal)); f = pow(f, 5.0); float pulse = 1.0 + sin(uTime * 2.0) * 0.15; gl_FragColor = vec4(uColor, f * 0.35 * pulse); }`,
        transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
      });
      const glowMesh = new THREE.Mesh(glGeo, glMat);
      glowMesh.renderOrder = -1;
      bhGroup.add(glowMesh);
      
      bhGroup.userData = { key: 'bh_' + bh.dist, glMat, photonRing };
      scene.add(bhGroup);
      bhObjects.push(bhGroup);
    });

    // ==================== ПОИСК ====================
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    
    const searchableObjects = [
      { name: 'Солнце', key: 'sun', type: 'star' },
      { name: 'Меркурий', key: 'planet_0', type: 'planet' },
      { name: 'Венера', key: 'planet_1', type: 'planet' },
      { name: 'Земля', key: 'planet_2', type: 'planet' },
      { name: 'Марс', key: 'planet_3', type: 'planet' },
      { name: 'Церера', key: 'planet_4', type: 'dwarf_planet' },
      { name: 'Юпитер', key: 'planet_5', type: 'planet' },
      { name: 'Сатурн', key: 'planet_6', type: 'planet' },
      { name: 'Уран', key: 'planet_7', type: 'planet' },
      { name: 'Нептун', key: 'planet_8', type: 'planet' },
      { name: 'Плутон', key: 'planet_9', type: 'dwarf_planet' },
      { name: 'Эрида', key: 'planet_10', type: 'dwarf_planet' }
    ];
    
    starSystems.forEach((sd, i) => {
      searchableObjects.push({ name: 'Звезда ' + (i + 1), key: 'star_' + sd.dist + '_' + sd.angle, type: 'star' });
    });
    
    blackHoles.forEach((bh, i) => {
      searchableObjects.push({ name: 'Чёрная дыра ' + (i + 1), key: 'bh_' + bh.dist, type: 'black_hole' });
    });
    
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.toLowerCase().trim();
      if (query.length < 1) { searchResults.style.display = 'none'; return; }
      
      const results = searchableObjects.filter(obj => obj.name.toLowerCase().includes(query));
      
      if (results.length === 0) {
        searchResults.innerHTML = '<div class="search-result-item" style="color:#888;">Ничего не найдено</div>';
      } else {
        const typeIcons = { star: '⭐', planet: '🪐', dwarf_planet: '🔮', black_hole: '🕳️' };
        searchResults.innerHTML = results.slice(0, 15).map(obj => {
          const icon = typeIcons[obj.type] || '📍';
          return `<div class="search-result-item" data-key="${obj.key}">${icon} <strong>${obj.name}</strong></div>`;
        }).join('');
      }
      
      searchResults.style.display = 'block';
    });
    
    searchResults.addEventListener('click', (e) => {
      const item = e.target.closest('.search-result-item');
      if (!item || !item.dataset.key) return;
      focusOnObject(item.dataset.key);
      searchResults.style.display = 'none';
      searchInput.value = '';
      searchInput.blur();
    });
    
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#search-container')) searchResults.style.display = 'none';
    });

    // ==================== НАВИГАЦИЯ ====================
    let currentTarget = null;
    
    function getWorldPos(obj) {
      const worldPos = new THREE.Vector3();
      obj.getWorldPosition(worldPos);
      return worldPos;
    }
    
    function findObjectByKey(key) {
      if (key === 'sun') return sun;
      const planetIndex = parseInt(key.replace('planet_', ''));
      if (!isNaN(planetIndex) && solPlanets[planetIndex]) return solPlanets[planetIndex];
      
      // Ищем среди групп звёзд
      const allGroups = scene.children.filter(c => c.type === 'Group' && c.userData.key === key);
      if (allGroups.length > 0) return allGroups[0];
      
      // Ищем среди чёрных дыр
      const allBHs = scene.children.filter(c => c.type === 'Group' && c.userData.key === key);
      if (allBHs.length > 0) return allBHs[0];
      
      return null;
    }
    
    function focusOnObject(key) {
      const obj = findObjectByKey(key);
      if (!obj) return;
      
      const worldPos = getWorldPos(obj);
      const objSize = 2;
      const camDistance = objSize * 10 + 5;
      const newCamPos = worldPos.clone().add(new THREE.Vector3(camDistance * 0.6, camDistance * 0.4, camDistance * 0.7));
      
      if (isNaN(newCamPos.x)) return;
      
      const startTarget = controls.target.clone();
      const startCamera = camera.position.clone();
      const startTime = Date.now();
      const duration = 800;
      
      function animateFocus() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        controls.target.lerpVectors(startTarget, worldPos, ease);
        camera.position.lerpVectors(startCamera, newCamPos, ease);
        controls.update();
        if (progress < 1) requestAnimationFrame(animateFocus);
      }
      
      animateFocus();
      currentTarget = key;
    }
    
    // Клик
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    window.addEventListener('click', e => {
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
      if (e.target.closest('#settings-panel') || e.target.closest('#search-container')) return;
      if (e.target.closest('#joystick-container') || e.target.closest('#look-area')) return;
      
      mouse.set((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
      raycaster.setFromCamera(mouse, camera);
      
      const clickableObjects = [];
      scene.children.forEach(c => {
        if (c.type === 'Group' || c === sun) clickableObjects.push(c);
        if (c.type === 'Mesh' && c !== sun) clickableObjects.push(c);
      });
      
      const hits = raycaster.intersectObjects(clickableObjects, true);
      if (hits.length > 0) {
        let obj = hits[0].object;
        while (obj) {
          if (obj.userData && obj.userData.key) {
            focusOnObject(obj.userData.key);
            return;
          }
          obj = obj.parent;
        }
      }
    });

    // ==================== АНИМАЦИЯ ====================
    function updateFlyMovement() {
      if (!flyMode) return;
      const speed = baseFlySpeed * (keys.shift ? 3 : 1) * 0.7;
      const forward = new THREE.Vector3();
      const right = new THREE.Vector3();
      camera.getWorldDirection(forward);
      right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();
      
      let moveX = 0, moveY = 0;
      if (jsActive) { moveX = jsX / 50; moveY = jsY / 50; }
      
      if (keys.w || moveY < -0.2) camera.position.addScaledVector(forward, speed);
      if (keys.s || moveY > 0.2) camera.position.addScaledVector(forward, -speed);
      if (keys.a || moveX < -0.2) camera.position.addScaledVector(right, -speed);
      if (keys.d || moveX > 0.2) camera.position.addScaledVector(right, speed);
      if (keys.q) camera.position.y -= speed * 0.7;
      if (keys.e) camera.position.y += speed * 0.7;
      
      camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
    }
    
    function animate() {
      requestAnimationFrame(animate);
      
      const sp = isPaused ? 0 : timeSpeed;
      const time = performance.now() * 0.001;
      
      stars1.rotation.y += 0.00004 * sp;
      stars2.rotation.y -= 0.00002 * sp;
      
      // Солнце
      sun.rotation.y += 0.002 * sp;
      
      // Планеты Солнечной системы
      solPlanets.forEach(planet => {
        if (planet.userData.dist > 0) {
          planet.userData.angle += planet.userData.speed * 0.25 * sp;
          planet.position.x = planet.userData.dist * Math.cos(planet.userData.angle);
          planet.position.z = planet.userData.dist * Math.sin(planet.userData.angle);
        }
        planet.rotation.y += 0.008 * sp;
      });
      
      // Астероиды и Койпер
      scene.children.forEach(child => {
        if (child.userData && (child.userData.speed !== undefined && !child.userData.key)) {
          child.userData.angle += child.userData.speed * 0.25 * sp;
          child.position.x = child.userData.dist * Math.cos(child.userData.angle);
          child.position.z = child.userData.dist * Math.sin(child.userData.angle);
        }
      });
      
      // Экзопланеты
      allExoplanets.forEach(planet => {
        planet.userData.angle += planet.userData.speed * 0.25 * sp;
        planet.position.x = planet.userData.dist * Math.cos(planet.userData.angle);
        planet.position.z = planet.userData.dist * Math.sin(planet.userData.angle);
        planet.rotation.y += 0.015 * sp;
      });
      
      // Чёрные дыры
      bhObjects.forEach(bh => {
        bh.children.forEach((child, i) => {
          if (child.geometry && child.geometry.type === 'RingGeometry') {
            child.rotation.z += (0.005 + i * 0.003) * sp;
          }
          if (child.material && child.material.uniforms && child.material.uniforms.uTime) {
            child.material.uniforms.uTime.value = time;
          }
        });
      });
      
      updateFlyMovement();
      if (!flyMode) controls.update();
      
      renderer.render(scene, camera);
    }
    
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      
      if (isMobile()) {
        document.getElementById('joystick-container').style.display = 'block';
        lookArea.style.display = 'block';
      } else {
        document.getElementById('joystick-container').style.display = 'none';
        lookArea.style.display = 'none';
      }
    });
  </script>
