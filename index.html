<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏹 Лесная охота — Охотник и дичь</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #16213e;
            --gold: #f0a500;
            --accent: #e94560;
            --green: #2ecc71;
            --wood: #5c3a21;
            --text: #eee;
            --dark-text: #222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(46, 204, 113, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(233, 68, 96, 0.08) 0%, transparent 50%);
        }

        .game-container {
            background: var(--panel);
            border-radius: 24px;
            padding: 30px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 3px rgba(240, 165, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            max-width: 750px;
            width: 100%;
            border: 2px solid rgba(240, 165, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: var(--gold);
            font-size: 2.4em;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(240, 165, 0, 0.4);
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 25px;
            font-style: italic;
            letter-spacing: 1px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 15px 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2em;
            font-weight: 700;
            color: var(--text);
        }

        .stat-icon {
            font-size: 1.5em;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        }

        .gold-text {
            color: var(--gold);
            text-shadow: 0 0 15px rgba(240, 165, 0, 0.5);
        }

        .weapon-display {
            background: var(--wood);
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Охотничья сцена */
        .hunting-ground {
            position: relative;
            background: linear-gradient(180deg,
                    #3a7d44 0%, #2d6a3b 15%, #4a8c3f 30%,
                    #5c4a2e 30%, #4a3820 35%, #6b8c5c 35%,
                    #3d6b3d 50%, #2a5c2a 60%, #1a3d1a 70%,
                    #5c8a4a 80%, #3a6b3a 100%);
            border-radius: 20px;
            height: 320px;
            margin-bottom: 20px;
            overflow: hidden;
            cursor: crosshair;
            border: 3px solid rgba(139, 90, 43, 0.6);
            box-shadow:
                inset 0 0 80px rgba(0, 0, 0, 0.4),
                0 8px 30px rgba(0, 0, 0, 0.4);
            transition: all 0.3s;
        }

        .hunting-ground:hover {
            border-color: rgba(240, 165, 0, 0.6);
            box-shadow:
                inset 0 0 80px rgba(0, 0, 0, 0.4),
                0 8px 40px rgba(240, 165, 0, 0.2);
        }

        /* Деревья */
        .tree {
            position: absolute;
            bottom: 40%;
            width: 0;
            height: 0;
            pointer-events: none;
        }
        .tree-trunk {
            position: absolute;
            bottom: 0;
            background: #5c3a21;
            border-radius: 4px;
            pointer-events: none;
        }
        .tree-crown {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        /* Животные */
        .animal {
            position: absolute;
            font-size: 50px;
            cursor: pointer;
            transition: transform 0.15s, filter 0.15s;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
            animation: animalIdle 2s ease-in-out infinite;
            user-select: none;
            z-index: 10;
        }
        .animal:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 6px 15px rgba(255, 200, 0, 0.7)) brightness(1.2);
        }
        .animal:active {
            transform: scale(0.8);
            filter: brightness(0.6) drop-shadow(0 0 20px red);
        }

        @keyframes animalIdle {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        @keyframes animalRun {
            0% {
                transform: translateX(0) translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateX(var(--run-x, 200px)) translateY(var(--run-y, -100px));
                opacity: 0;
            }
        }
        @keyframes hitFlash {
            0% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(3) drop-shadow(0 0 30px red);
            }
            100% {
                filter: brightness(1);
            }
        }

        /* Прицел */
        .crosshair {
            position: absolute;
            pointer-events: none;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 0, 0, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            display: none;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 0, 0, 0.9);
        }
        .crosshair::before {
            width: 2px;
            height: 20px;
            left: 50%;
            top: -10px;
            transform: translateX(-50%);
        }
        .crosshair::after {
            width: 20px;
            height: 2px;
            top: 50%;
            left: -10px;
            transform: translateY(-50%);
        }

        /* Кнопки */
        .buttons-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 14px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 0.5px;
            font-family: inherit;
            flex: 1;
            min-width: 100px;
            text-align: center;
        }

        .btn-hunt {
            background: linear-gradient(135deg, #e94560, #c0392b);
            color: #fff;
            box-shadow: 0 6px 20px rgba(233, 68, 96, 0.4);
        }
        .btn-hunt:hover {
            box-shadow: 0 8px 28px rgba(233, 68, 96, 0.7);
            transform: translateY(-2px);
        }

        .btn-shop {
            background: linear-gradient(135deg, #f0a500, #d68910);
            color: #1a1a2e;
            box-shadow: 0 6px 20px rgba(240, 165, 0, 0.4);
        }
        .btn-shop:hover {
            box-shadow: 0 8px 28px rgba(240, 165, 0, 0.7);
            transform: translateY(-2px);
        }

        .btn-sell {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #fff;
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }
        .btn-sell:hover {
            box-shadow: 0 8px 28px rgba(46, 204, 113, 0.7);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Магазин */
        .shop-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            display: none;
            border: 2px solid rgba(240, 165, 0, 0.3);
            animation: fadeIn 0.3s;
        }
        .shop-panel.open {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .shop-title {
            color: var(--gold);
            font-size: 1.3em;
            margin-bottom: 12px;
            text-align: center;
            letter-spacing: 1px;
        }
        .shop-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }
        .shop-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            border: 2px solid transparent;
            color: var(--text);
        }
        .shop-item:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        .shop-item.equipped {
            border-color: var(--green) !important;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }
        .shop-item .item-icon {
            font-size: 2.5em;
        }
        .shop-item .item-name {
            font-weight: 700;
            margin: 4px 0;
        }
        .shop-item .item-dmg {
            font-size: 0.85em;
            color: #e94560;
            font-weight: 600;
        }
        .shop-item .item-price {
            color: var(--gold);
            font-weight: 700;
        }
        .shop-item .item-ammo {
            font-size: 0.8em;
            color: #aaa;
        }

        /* Инвентарь */
        .inventory {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .inv-label {
            font-weight: 700;
            color: #aaa;
            letter-spacing: 0.5px;
        }
        .inv-animals {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .inv-animal {
            background: rgba(46, 204, 113, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.9em;
            border: 1px solid rgba(46, 204, 113, 0.4);
            cursor: pointer;
            transition: all 0.2s;
        }
        .inv-animal:hover {
            background: rgba(46, 204, 113, 0.4);
        }

        /* Сообщения */
        .message {
            text-align: center;
            color: #ccc;
            min-height: 24px;
            font-style: italic;
            font-size: 0.95em;
            padding: 6px;
            transition: all 0.3s;
        }
        .message.flash {
            color: var(--gold);
            text-shadow: 0 0 15px rgba(240, 165, 0, 0.6);
        }

        @media (max-width: 500px) {
            .game-container {
                padding: 15px;
            }
            h1 {
                font-size: 1.6em;
            }
            .hunting-ground {
                height: 250px;
            }
            .animal {
                font-size: 35px;
            }
            .btn {
                padding: 10px 14px;
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🏹 Лесная охота</h1>
        <p class="subtitle">Выследи добычу • Продай трофеи • Купи оружие</p>

        <!-- Статистика -->
        <div class="stats-bar">
            <div class="stat">
                <span class="stat-icon">🪙</span>
                <span>Монеты: <span class="gold-text" id="coins">100</span></span>
            </div>
            <div class="stat">
                <span class="stat-icon">🔫</span>
                <span class="weapon-display" id="weaponDisplay">🏹 Лук (15)</span>
            </div>
            <div class="stat">
                <span class="stat-icon">🔫</span>
                <span>Патроны: <span id="ammo">∞</span></span>
            </div>
        </div>

        <!-- Охотничья сцена -->
        <div class="hunting-ground" id="huntingGround">
            <div class="crosshair" id="crosshair"></div>
        </div>

        <!-- Кнопки -->
        <div class="buttons-row">
            <button class="btn btn-hunt" id="btnHunt" title="Выйти на охоту и найти зверей">🔍 Искать зверей</button>
            <button class="btn btn-shop" id="btnShop" title="Открыть магазин оружия">🏪 Магазин</button>
            <button class="btn btn-sell" id="btnSell" title="Продать всех пойманных животных">💰 Продать трофеи</button>
        </div>

        <!-- Магазин -->
        <div class="shop-panel" id="shopPanel">
            <div class="shop-title">🏪 Магазин оружия и патронов</div>
            <div class="shop-items" id="shopItems"></div>
        </div>

        <!-- Инвентарь -->
        <div class="inventory">
            <span class="inv-label">🎒 Трофеи:</span>
            <span class="inv-animals" id="invAnimals">Пока пусто...</span>
        </div>

        <!-- Сообщение -->
        <div class="message" id="message">Нажми «Искать зверей», чтобы начать охоту!</div>
    </div>

    <script>
        // ==================== СОСТОЯНИЕ ИГРЫ ====================
        const state = {
            coins: 100,
            weapons: [
                { id: 'bow', name: '🏹 Лук', damage: 15, price: 0, ammo: Infinity, ammoType: '∞', owned: true },
                { id: 'crossbow', name: '🏹 Арбалет', damage: 30, price: 200, ammo: Infinity, ammoType: '∞', owned: false },
                { id: 'rifle', name: '🔫 Винтовка', damage: 55, price: 500, ammo: 10, ammoType: '10', owned: false },
                { id: 'shotgun', name: '💥 Дробовик', damage: 80, price: 1000, ammo: 6, ammoType: '6', owned: false },
                { id: 'sniper', name: '🔭 Снайперка', damage: 150, price: 2000, ammo: 4, ammoType: '4', owned: false },
            ],
            equippedWeaponId: 'bow',
            ammo: Infinity, // для лука/арбалета бесконечно
            inventory: [], // массив строк-эмодзи животных
            animalsOnField: [],
            isHunting: false,
        };

        // Животные с эмодзи, названиями и ценой
        const animalTypes = [
            { emoji: '🐰', name: 'Заяц', price: 20, hp: 1 },
            { emoji: '🦊', name: 'Лиса', price: 45, hp: 2 },
            { emoji: '🦌', name: 'Олень', price: 100, hp: 3 },
            { emoji: '🐗', name: 'Кабан', price: 160, hp: 5 },
            { emoji: '🐻', name: 'Медведь', price: 350, hp: 8 },
            { emoji: '🦅', name: 'Орёл', price: 90, hp: 2, flying: true },
            { emoji: '🐺', name: 'Волк', price: 130, hp: 4 },
        ];

        // ==================== DOM ЭЛЕМЕНТЫ ====================
        const huntingGround = document.getElementById('huntingGround');
        const crosshair = document.getElementById('crosshair');
        const coinsEl = document.getElementById('coins');
        const weaponDisplay = document.getElementById('weaponDisplay');
        const ammoEl = document.getElementById('ammo');
        const invAnimals = document.getElementById('invAnimals');
        const messageEl = document.getElementById('message');
        const shopPanel = document.getElementById('shopPanel');
        const shopItems = document.getElementById('shopItems');
        const btnHunt = document.getElementById('btnHunt');
        const btnShop = document.getElementById('btnShop');
        const btnSell = document.getElementById('btnSell');

        // ==================== ФУНКЦИИ ====================
        function getEquippedWeapon() {
            return state.weapons.find(w => w.id === state.equippedWeaponId);
        }

        function updateUI() {
            coinsEl.textContent = state.coins;
            const weapon = getEquippedWeapon();
            weaponDisplay.textContent = `${weapon.name} (${weapon.damage} урон)`;
            ammoEl.textContent = state.ammo === Infinity ? '∞' : state.ammo;

            // Инвентарь
            if (state.inventory.length === 0) {
                invAnimals.textContent = 'Пока пусто...';
            } else {
                invAnimals.innerHTML = state.inventory
                    .map((a, i) =>
                        `<span class="inv-animal" title="Нажми чтобы продать одного" onclick="sellOne(${i})">${a}</span>`
                    )
                    .join('');
            }

            renderShop();
        }

        function showMessage(text, flash = false) {
            messageEl.textContent = text;
            if (flash) {
                messageEl.classList.add('flash');
                setTimeout(() => messageEl.classList.remove('flash'), 800);
            }
        }

        // ==================== ОХОТА: ПОЯВЛЕНИЕ ЖИВОТНЫХ ====================
        function clearAnimals() {
            state.animalsOnField.forEach(a => a.el.remove());
            state.animalsOnField = [];
        }

        function spawnAnimals() {
            clearAnimals();
            state.isHunting = true;
            const count = Math.floor(Math.random() * 4) + 2; // 2–5 животных
            const usedPositions = [];

            for (let i = 0; i < count; i++) {
                const type = animalTypes[Math.floor(Math.random() * animalTypes.length)];
                const el = document.createElement('span');
                el.className = 'animal';
                el.textContent = type.emoji;
                el.title = `${type.name} | Цена: ${type.price}🪙 | HP: ${type.hp}`;
                el.dataset.name = type.name;
                el.dataset.price = type.price;
                el.dataset.hp = type.hp;
                el.dataset.maxHp = type.hp;
                el.dataset.flying = type.flying || false;

                // Позиция (избегаем наложений)
                let x, y;
                let attempts = 0;
                do {
                    x = Math.random() * 75 + 5; // 5%–80%
                    y = type.flying ?
                        Math.random() * 30 + 8 // выше — птицы
                        :
                        Math.random() * 40 + 35; // ниже — наземные
                    attempts++;
                } while (
                    attempts < 20 &&
                    usedPositions.some(p => Math.abs(p.x - x) < 15 && Math.abs(p.y - y) < 15)
                );
                usedPositions.push({ x, y });

                el.style.left = x + '%';
                el.style.top = y + '%';

                // Обработчик клика по животному
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (!state.isHunting) return;
                    shootAnimal(el, type);
                });

                huntingGround.appendChild(el);
                state.animalsOnField.push({ el, type, hp: type.hp });
            }

            showMessage(`🔍 Найдено ${count} зверей! Стреляй по ним!`, true);
            btnHunt.textContent = '🔄 Обновить зверей';
        }

        function shootAnimal(el, type) {
            const weapon = getEquippedWeapon();

            // Проверка патронов
            if (state.ammo !== Infinity && state.ammo <= 0) {
                showMessage('❌ Нет патронов! Купи в магазине.', true);
                return;
            }

            // Расход патронов
            if (state.ammo !== Infinity) {
                state.ammo--;
            }

            // Урон
            const currentHp = parseInt(el.dataset.hp) - weapon.damage;
            el.dataset.hp = currentHp;

            // Анимация попадания
            el.style.animation = 'none';
            el.offsetHeight;
            el.style.animation = 'hitFlash 0.4s ease-out';

            if (currentHp <= 0) {
                // Убит!
                el.style.animation = `animalRun 0.5s ease-out forwards`;
                el.style.setProperty('--run-x', (Math.random() * 150 - 75) + 'px');
                el.style.setProperty('--run-y', '-120px');
                el.style.pointerEvents = 'none';

                const price = parseInt(el.dataset.price);
                state.inventory.push(type.emoji);
                showMessage(`🎯 ${type.name} убит! Трофей в инвентаре. (+${price}🪙 при продаже)`, true);

                // Удалить со сцены после анимации
                setTimeout(() => {
                    el.remove();
                    state.animalsOnField = state.animalsOnField.filter(a => a.el !== el);
                    // Если все убиты
                    if (state.animalsOnField.length === 0) {
                        showMessage('🏆 Все звери добыты! Можно искать новых или продать трофеи.');
                        state.isHunting = false;
                        btnHunt.textContent = '🔍 Искать зверей';
                    }
                }, 500);
            } else {
                showMessage(`💥 Попадание! ${type.name}: осталось ${currentHp} HP`);
                // Испуг — небольшое смещение
                const currentLeft = parseFloat(el.style.left);
                const newLeft = Math.max(3, Math.min(82, currentLeft + (Math.random() * 20 - 10)));
                el.style.left = newLeft + '%';
            }

            updateUI();
        }

        // Прицел
        huntingGround.addEventListener('mousemove', (e) => {
            if (!state.isHunting) {
                crosshair.style.display = 'none';
                return;
            }
            crosshair.style.display = 'block';
            const rect = huntingGround.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            crosshair.style.left = x + 'px';
            crosshair.style.top = y + 'px';
        });

        huntingGround.addEventListener('mouseleave', () => {
            crosshair.style.display = 'none';
        });

        // ==================== МАГАЗИН ====================
        function renderShop() {
            shopItems.innerHTML = state.weapons
                .map(w => {
                    const isEquipped = state.equippedWeaponId === w.id;
                    const canBuy = state.coins >= w.price && !w.owned;
                    const cls = isEquipped ? 'equipped' : '';
                    const actionText = w.owned ?
                        (isEquipped ? '✅ Экипировано' : '🎯 Экипировать') :
                        (canBuy ? `💰 Купить за ${w.price}🪙` : `🔒 ${w.price}🪙 (не хватает)`);

                    return `
                <div class="shop-item ${cls}" onclick="handleShopAction('${w.id}')" 
                     style="${!w.owned && state.coins < w.price ? 'opacity:0.5;' : ''}">
                  <div class="item-icon">${w.name.split(' ')[0]}</div>
                  <div class="item-name">${w.name.split(' ').slice(1).join(' ')}</div>
                  <div class="item-dmg">💥 Урон: ${w.damage}</div>
                  <div class="item-ammo">🔫 Патроны: ${w.ammoType}</div>
                  <div class="item-price">${actionText}</div>
                </div>
              `;
                })
                .join('');
        }

        function handleShopAction(weaponId) {
            const weapon = state.weapons.find(w => w.id === weaponId);

            if (weapon.owned) {
                // Экипировать
                state.equippedWeaponId = weaponId;
                state.ammo = weapon.ammo;
                showMessage(`🎯 Экипировано: ${weapon.name}!`, true);
            } else if (state.coins >= weapon.price) {
                // Купить
                state.coins -= weapon.price;
                weapon.owned = true;
                state.equippedWeaponId = weaponId;
                state.ammo = weapon.ammo;
                showMessage(`🛒 Куплено: ${weapon.name}!`, true);
            } else {
                showMessage('❌ Недостаточно монет! Продайте трофеи.', true);
            }

            updateUI();
        }

        function toggleShop() {
            shopPanel.classList.toggle('open');
            if (shopPanel.classList.contains('open')) {
                btnShop.textContent = '❌ Закрыть магазин';
            } else {
                btnShop.textContent = '🏪 Магазин';
            }
            renderShop();
        }

        // ==================== ПРОДАЖА ТРОФЕЕВ ====================
        function sellAllTrophies() {
            if (state.inventory.length === 0) {
                showMessage('😕 Нет трофеев для продажи. Убейте зверей!');
                return;
            }

            let totalEarned = 0;
            state.inventory.forEach(emoji => {
                const animalType = animalTypes.find(a => a.emoji === emoji);
                if (animalType) totalEarned += animalType.price;
            });

            state.coins += totalEarned;
            const count = state.inventory.length;
            state.inventory = [];
            showMessage(`💰 Продано ${count} трофеев! Получено ${totalEarned} 🪙`, true);
            updateUI();
        }

        function sellOne(index) {
            if (index < 0 || index >= state.inventory.length) return;
            const emoji = state.inventory[index];
            const animalType = animalTypes.find(a => a.emoji === emoji);
            const price = animalType ? animalType.price : 10;
            state.coins += price;
            state.inventory.splice(index, 1);
            showMessage(`💰 Продан ${animalType?.name || 'трофей'} за ${price}🪙`, true);
            updateUI();
        }

        // ==================== ДЕРЕВЬЯ (декор) ====================
        function createTrees() {
            const treePositions = [
                { left: 8, bottom: 38, height: 70 },
                { left: 25, bottom: 36, height: 85 },
                { left: 55, bottom: 37, height: 60 },
                { left: 75, bottom: 39, height: 75 },
                { left: 90, bottom: 35, height: 55 },
            ];

            treePositions.forEach(pos => {
                const tree = document.createElement('div');
                tree.className = 'tree';
                tree.style.left = pos.left + '%';
                tree.style.bottom = pos.bottom + '%';

                const trunk = document.createElement('div');
                trunk.className = 'tree-trunk';
                trunk.style.width = '14px';
                trunk.style.height = pos.height + 'px';
                trunk.style.left = '-7px';
                trunk.style.bottom = '0';
                trunk.style.background =
                    'linear-gradient(180deg, #6b3a1f, #4a2512)';

                const crown = document.createElement('div');
                crown.className = 'tree-crown';
                const crownSize = pos.height * 0.7;
                crown.style.width = crownSize + 'px';
                crown.style.height = crownSize + 'px';
                crown.style.left = -(crownSize / 2 - 7) + 'px';
                crown.style.bottom = (pos.height * 0.55) + 'px';
                crown.style.background =
                    'radial-gradient(ellipse, #3d7a3d 0%, #2d5a2d 40%, #1a3d1a 100%)';
                crown.style.boxShadow = 'inset 0 -8px 20px rgba(0,0,0,0.3)';

                tree.appendChild(trunk);
                tree.appendChild(crown);
                huntingGround.appendChild(tree);
            });

            // Трава и кусты (декор)
            for (let i = 0; i < 12; i++) {
                const bush = document.createElement('div');
                bush.style.cssText = `
              position: absolute;
              bottom: ${32 + Math.random() * 4}%;
              left: ${Math.random() * 90 + 2}%;
              width: ${20 + Math.random() * 30}px;
              height: ${12 + Math.random() * 16}px;
              background: radial-gradient(ellipse, #4a8c3f, #2d5a2d);
              border-radius: 50%;
              pointer-events: none;
              opacity: 0.7;
              z-index: 1;
            `;
                huntingGround.appendChild(bush);
            }
        }

        // ==================== СОБЫТИЯ КНОПОК ====================
        btnHunt.addEventListener('click', () => {
            if (state.isHunting && state.animalsOnField.length > 0) {
                // Обновить зверей
                clearAnimals();
                spawnAnimals();
            } else if (!state.isHunting || state.animalsOnField.length === 0) {
                spawnAnimals();
            } else {
                clearAnimals();
                spawnAnimals();
            }
        });

        btnShop.addEventListener('click', toggleShop);
        btnSell.addEventListener('click', sellAllTrophies);

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        function init() {
            createTrees();
            updateUI();
            renderShop();
        }

        init();
        console.log('🏹 Лесная охота готова! Ищи зверей, убивай, продавай трофеи и покупай оружие!');
    </script>
</body>
</html>
