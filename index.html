<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Adult Doll - Mobile Control</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            touch-action: none;
        }
        #controls-panel {
            position: absolute;
            bottom: 20px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 12px;
            z-index: 20;
            color: white;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            pointer-events: auto;
            border: 1px solid rgba(255,100,150,0.5);
            font-size: 12px;
        }
        .control-btn {
            background: rgba(255,80,120,0.8);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.1s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            min-width: 70px;
        }
        .control-btn:active {
            transform: scale(0.95);
            background: rgba(255,50,80,1);
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 30px;
        }
        input[type="range"] {
            width: 120px;
            height: 4px;
            -webkit-appearance: none;
            background: #ff88aa;
            border-radius: 2px;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ff3366;
            cursor: pointer;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 20;
            pointer-events: none;
        }
        @media (max-width: 700px) {
            .control-btn { padding: 6px 12px; font-size: 11px; min-width: 55px; }
            .slider-container { padding: 2px 8px; }
            input[type="range"] { width: 80px; }
        }
    </style>
</head>
<body>
    <div id="info">🔞 ADULT DOLL | Тащите для вращения | Кнопки — движение частей тела</div>
    <div id="controls-panel">
        <button class="control-btn" id="resetBtn">⟳ Сброс</button>
        <div class="slider-container">🦵 Левая нога <input type="range" id="leftLeg" min="-60" max="60" step="1" value="0"></div>
        <div class="slider-container">🦵 Правая нога <input type="range" id="rightLeg" min="-60" max="60" step="1" value="0"></div>
        <div class="slider-container">🦿 Левая рука <input type="range" id="leftArm" min="-90" max="90" step="1" value="0"></div>
        <div class="slider-container">🦿 Правая рука <input type="range" id="rightArm" min="-90" max="90" step="1" value="0"></div>
        <div class="slider-container">🧠 Голова <input type="range" id="headRot" min="-45" max="45" step="1" value="0"></div>
        <div class="slider-container">💋 Грудь <input type="range" id="breast" min="0" max="30" step="1" value="15"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // --- Оптимизация: снижаем качество теней для телефонов ---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // --- Сцена, камера, рендер (с оптимизацией) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.015);
        
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 50);
        camera.position.set(3, 1.8, 4);
        
        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = !isMobile; // на телефонах тени отключаем для FPS
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);
        
        // --- Управление пальцем ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.07;
        controls.rotateSpeed = 1.2;
        controls.zoomSpeed = 1.0;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.target.set(0, 1.2, 0);
        
        // --- Освещение (оптимизированное) ---
        const ambientLight = new THREE.AmbientLight(0x40406a);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffccaa, 1.0);
        mainLight.position.set(4, 6, 3);
        if (!isMobile) {
            mainLight.castShadow = true;
            mainLight.receiveShadow = false;
            mainLight.shadow.mapSize.width = 512;
            mainLight.shadow.mapSize.height = 512;
        }
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0xff88aa, 0.5);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0x6688ff, 0.3);
        backLight.position.set(-1, 1.5, -2);
        scene.add(backLight);
        
        // --- Пол с зеркальным эффектом ---
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a0a2a, roughness: 0.4, metalness: 0.6 });
        const ground = new THREE.Mesh(new THREE.CircleGeometry(4.5, 24), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.6;
        ground.receiveShadow = false;
        scene.add(ground);
        
        // Декоративный подиум
        const podiumMat = new THREE.MeshStandardMaterial({ color: 0x331144, roughness: 0.3, metalness: 0.4 });
        const podium = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.8, 0.2, 8), podiumMat);
        podium.position.y = -0.5;
        podium.receiveShadow = false;
        scene.add(podium);
        
        // --- СОЗДАНИЕ ПОЛНОСТЬЮ АНИМИРУЕМОЙ МОДЕЛИ (скелетная эмуляция через группы) ---
        const dollGroup = new THREE.Group();
        scene.add(dollGroup);
        
        // Материалы
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.25, metalness: 0.05 });
        const skinMatDark = new THREE.MeshStandardMaterial({ color: 0xffbb99, roughness: 0.2 });
        const clothMat = new THREE.MeshStandardMaterial({ color: 0xdd44aa, roughness: 0.5, emissive: 0x330022 });
        const leatherMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.7 });
        
        // --- Таз/корпус (основа) ---
        const pelvis = new THREE.Mesh(new THREE.CylinderGeometry(0.48, 0.52, 0.55, 16), skinMat);
        pelvis.position.y = 0.3;
        pelvis.castShadow = true;
        dollGroup.add(pelvis);
        
        // --- Грудь (отдельная группа для анимации) ---
        const breastGroup = new THREE.Group();
        breastGroup.position.y = 0.85;
        dollGroup.add(breastGroup);
        
        const leftBreast = new THREE.Mesh(new THREE.SphereGeometry(0.32, 32, 32), skinMatDark);
        leftBreast.position.set(-0.42, 0, 0.45);
        leftBreast.castShadow = true;
        const rightBreast = new THREE.Mesh(new THREE.SphereGeometry(0.32, 32, 32), skinMatDark);
        rightBreast.position.set(0.42, 0, 0.45);
        rightBreast.castShadow = true;
        breastGroup.add(leftBreast, rightBreast);
        
        // Соски (детали)
        const nippleMat = new THREE.MeshStandardMaterial({ color: 0xcc6688 });
        const leftNipple = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), nippleMat);
        leftNipple.position.set(-0.42, 0.05, 0.73);
        const rightNipple = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), nippleMat);
        rightNipple.position.set(0.42, 0.05, 0.73);
        breastGroup.add(leftNipple, rightNipple);
        
        // --- Голова с шеей ---
        const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.24, 0.2, 8), skinMat);
        neck.position.set(0, 1.1, 0);
        dollGroup.add(neck);
        
        const headGroup = new THREE.Group();
        headGroup.position.set(0, 1.35, 0);
        dollGroup.add(headGroup);
        
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.38, 48, 48), skinMat);
        head.castShadow = true;
        headGroup.add(head);
        
        // Волосы
        const hairMat = new THREE.MeshStandardMaterial({ color: 0x442200 });
        const hair = new THREE.Mesh(new THREE.CylinderGeometry(0.44, 0.52, 0.28, 16), hairMat);
        hair.position.y = 0.12;
        headGroup.add(hair);
        
        // Глаза
        const eyeWhite = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.09, 24, 24), eyeWhite);
        leftEye.position.set(-0.14, 0.12, 0.42);
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.09, 24, 24), eyeWhite);
        rightEye.position.set(0.14, 0.12, 0.42);
        const eyeBlack = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.05, 24, 24), eyeBlack);
        leftPupil.position.set(-0.14, 0.11, 0.52);
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.05, 24, 24), eyeBlack);
        rightPupil.position.set(0.14, 0.11, 0.52);
        headGroup.add(leftEye, rightEye, leftPupil, rightPupil);
        
        // Губы
        const lipMatObj = new THREE.MeshStandardMaterial({ color: 0xdd5577 });
        const lips = new THREE.Mesh(new THREE.TorusGeometry(0.13, 0.04, 16, 32), lipMatObj);
        lips.position.set(0, -0.05, 0.44);
        lips.rotation.x = 0.2;
        headGroup.add(lips);
        
        // --- КОНЕЧНОСТИ (вращаемые) ---
        // Левая нога
        const leftLegGroup = new THREE.Group();
        leftLegGroup.position.set(-0.28, 0.15, 0);
        dollGroup.add(leftLegGroup);
        const leftThigh = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.18, 0.55, 12), skinMat);
        leftThigh.position.y = -0.28;
        leftThigh.castShadow = true;
        leftLegGroup.add(leftThigh);
        const leftCalf = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.14, 0.5, 12), skinMat);
        leftCalf.position.y = -0.65;
        leftCalf.castShadow = true;
        leftLegGroup.add(leftCalf);
        
        // Правая нога
        const rightLegGroup = new THREE.Group();
        rightLegGroup.position.set(0.28, 0.15, 0);
        dollGroup.add(rightLegGroup);
        const rightThigh = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.18, 0.55, 12), skinMat);
        rightThigh.position.y = -0.28;
        rightThigh.castShadow = true;
        rightLegGroup.add(rightThigh);
        const rightCalf = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.14, 0.5, 12), skinMat);
        rightCalf.position.y = -0.65;
        rightCalf.castShadow = true;
        rightLegGroup.add(rightCalf);
        
        // Левая рука
        const leftArmGroup = new THREE.Group();
        leftArmGroup.position.set(-0.52, 0.85, 0);
        dollGroup.add(leftArmGroup);
        const leftUpperArm = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.12, 0.55, 10), skinMat);
        leftUpperArm.position.y = -0.28;
        leftUpperArm.castShadow = true;
        leftArmGroup.add(leftUpperArm);
        const leftForearm = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.09, 0.45, 10), skinMat);
        leftForearm.position.y = -0.65;
        leftForearm.castShadow = true;
        leftArmGroup.add(leftForearm);
        
        // Правая рука
        const rightArmGroup = new THREE.Group();
        rightArmGroup.position.set(0.52, 0.85, 0);
        dollGroup.add(rightArmGroup);
        const rightUpperArm = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.12, 0.55, 10), skinMat);
        rightUpperArm.position.y = -0.28;
        rightUpperArm.castShadow = true;
        rightArmGroup.add(rightUpperArm);
        const rightForearm = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.09, 0.45, 10), skinMat);
        rightForearm.position.y = -0.65;
        rightForearm.castShadow = true;
        rightArmGroup.add(rightForearm);
        
        // Ягодицы (деталь)
        const buttMat = new THREE.MeshStandardMaterial({ color: 0xffaa99 });
        const leftButt = new THREE.Mesh(new THREE.SphereGeometry(0.3, 24, 24), buttMat);
        leftButt.position.set(-0.45, 0.1, -0.52);
        const rightButt = new THREE.Mesh(new THREE.SphereGeometry(0.3, 24, 24), buttMat);
        rightButt.position.set(0.45, 0.1, -0.52);
        dollGroup.add(leftButt, rightButt);
        
        // Трусики (стринги)
        const pantyMat = new THREE.MeshStandardMaterial({ color: 0xff44aa });
        const panty = new THREE.Mesh(new THREE.TorusGeometry(0.48, 0.05, 16, 32), pantyMat);
        panty.position.y = 0.2;
        panty.rotation.x = Math.PI / 2;
        dollGroup.add(panty);
        
        // --- Управление слайдерами ---
        const leftLegSlider = document.getElementById('leftLeg');
        const rightLegSlider = document.getElementById('rightLeg');
        const leftArmSlider = document.getElementById('leftArm');
        const rightArmSlider = document.getElementById('rightArm');
        const headSlider = document.getElementById('headRot');
        const breastSlider = document.getElementById('breast');
        const resetBtn = document.getElementById('resetBtn');
        
        function updatePose() {
            leftLegGroup.rotation.x = (leftLegSlider.value * Math.PI) / 180;
            rightLegGroup.rotation.x = (rightLegSlider.value * Math.PI) / 180;
            leftArmGroup.rotation.z = (leftArmSlider.value * Math.PI) / 180;
            rightArmGroup.rotation.z = (rightArmSlider.value * Math.PI) / 180;
            headGroup.rotation.y = (headSlider.value * Math.PI) / 180;
            const breastScale = 1 + (breastSlider.value / 50);
            leftBreast.scale.set(breastScale, breastScale, breastScale);
            rightBreast.scale.set(breastScale, breastScale, breastScale);
        }
        
        leftLegSlider.addEventListener('input', updatePose);
        rightLegSlider.addEventListener('input', updatePose);
        leftArmSlider.addEventListener('input', updatePose);
        rightArmSlider.addEventListener('input', updatePose);
        headSlider.addEventListener('input', updatePose);
        breastSlider.addEventListener('input', updatePose);
        
        resetBtn.addEventListener('click', () => {
            leftLegSlider.value = '0';
            rightLegSlider.value = '0';
            leftArmSlider.value = '0';
            rightArmSlider.value = '0';
            headSlider.value = '0';
            breastSlider.value = '15';
            updatePose();
            controls.target.set(0, 1.2, 0);
            camera.position.set(3, 1.8, 4);
            controls.update();
        });
        
        // --- Частицы для атмосферы (легкие) ---
        const particleCount = 150;
        const particlesGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 8;
            positions[i*3+1] = Math.random() * 3;
            positions[i*3+2] = (Math.random() - 0.5) * 6 - 1;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMatSimple = new THREE.PointsMaterial({ color: 0xff88aa, size: 0.04, transparent: true, opacity: 0.4 });
        const particles = new THREE.Points(particlesGeo, particleMatSimple);
        scene.add(particles);
        
        // --- Анимация дыхания (FPS оптимизация) ---
        let lastTimestamp = 0;
        let breathTime = 0;
        
        function animate(currentTime = 0) {
            requestAnimationFrame(animate);
            const delta = Math.min(1/30, (currentTime - lastTimestamp) / 1000);
            lastTimestamp = currentTime;
            
            breathTime += delta * 3;
            const breath = Math.sin(breathTime) * 0.008;
            breastGroup.position.y = 0.85 + breath * 0.5;
            leftBreast.scale.z = 1 + breath * 0.3;
            rightBreast.scale.z = 1 + breath * 0.3;
            
            particles.rotation.y += 0.002;
            
            controls.update(); // обновление OrbitControls
            renderer.render(scene, camera);
        }
        
        updatePose();
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Блокировка контекстного меню
        window.addEventListener('contextmenu', (e) => e.preventDefault());
        
        console.log('3D Adult Doll готова — полный контроль конечностей');
    </script>
</body>
</html>
