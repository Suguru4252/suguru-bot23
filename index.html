<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ГАЗАН СИКС СЕВЕЕН | 67 RUSH</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a1f1e 0%, #0c2a2a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Press Start 2P', 'Monaco', monospace;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border-radius: 48px;
            background: rgba(0,0,0,0.2);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 0 0 6px #ffd966, 0 0 0 12px #b97f44, 0 20px 30px rgba(0,0,0,0.4);
            cursor: pointer;
            background-color: #2b2b2b;
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 35px;
            pointer-events: none;
            z-index: 10;
        }

        .score-board, .best-board {
            background: #000000aa;
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.7rem;
            color: #f9f3c1;
            text-shadow: 0 0 5px #ff9900, 2px 2px 0 #6b2e00;
            letter-spacing: 2px;
            font-family: monospace;
            border: 1px solid #ffcd7e;
        }

        .best-board {
            background: #1e2a1faa;
        }

        .controls-mobile {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            pointer-events: none;
            z-index: 15;
        }

        .ctrl-btn {
            pointer-events: auto;
            background: #000000bb;
            backdrop-filter: blur(12px);
            border: 2px solid #ffb347;
            color: #ffdd99;
            font-size: 2.8rem;
            font-weight: bold;
            width: 85px;
            height: 85px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: monospace;
            transition: 0.07s linear;
            box-shadow: 0 8px 0 #7a3e0e;
            user-select: none;
            touch-action: manipulation;
        }

        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #7a3e0e;
        }

        .restart-area {
            position: absolute;
            bottom: 120px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 12;
        }

        .restart-btn {
            pointer-events: auto;
            background: #e25822dd;
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 10px 30px;
            border-radius: 60px;
            color: white;
            font-family: monospace;
            backdrop-filter: blur(4px);
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 5px 0 #7a2a0a;
        }

        .restart-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        .status-text {
            position: absolute;
            top: 40%;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffefb9;
            text-shadow: 3px 3px 0 #b43b00;
            background: #00000099;
            width: fit-content;
            margin: auto;
            padding: 12px 28px;
            border-radius: 60px;
            backdrop-filter: blur(10px);
            white-space: nowrap;
            pointer-events: none;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        @media (max-width: 700px) {
            .ctrl-btn { width: 70px; height: 70px; font-size: 2.2rem; }
            .score-board, .best-board { font-size: 1.2rem; padding: 4px 12px; }
            .status-text { font-size: 1.2rem; white-space: nowrap; top: 35%;}
        }

        @media (max-width: 550px) {
            .ctrl-btn { width: 60px; height: 60px; font-size: 1.8rem; }
            .controls-mobile { gap: 20px; bottom: 12px; }
        }

        footer {
            position: absolute;
            bottom: 8px;
            font-size: 11px;
            color: #ffd58c;
            background: #00000077;
            border-radius: 40px;
            padding: 2px 12px;
            font-family: monospace;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="600" height="500"></canvas>
    <div class="ui-panel">
        <div class="score-board">🏆 СЧЁТ: <span id="scoreValue">0</span></div>
        <div class="best-board">⭐ РЕКОРД: <span id="bestValue">0</span></div>
    </div>
    <div class="controls-mobile">
        <div class="ctrl-btn" id="leftBtn">◀ ЛЕВО</div>
        <div class="ctrl-btn" id="rightBtn">ПРАВО ▶</div>
    </div>
    <div class="restart-area">
        <button class="restart-btn" id="restartBtn">🚀 ГАЗАН, ПОГНАЛИ!</button>
    </div>
    <div id="statusMessage" class="status-text" style="display: none;">💥 ГАЗАН РАЗБИЛСЯ 💥</div>
</div>
<footer>⚡ ГАЗАН СИКС СЕВЕЕН | 67 | СВАЙП/КЛИК → УВОРАЧИВАЙСЯ ОТ ПОЕЗДОВ!</footer>

<script>
    (function(){
        // ---------- КАНВАС ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Размеры дорожек
        const LANE_COUNT = 3;
        const LANE_WIDTH = canvas.width / LANE_COUNT;
        const GROUND_Y = canvas.height - 70;
        
        // Газан
        const GAZAN_SIZE = 48;
        let lane = 1;
        let playerY = GROUND_Y - GAZAN_SIZE + 6;
        
        // Препятствия
        let obstacles = [];
        const OBSTACLE_WIDTH = 54;
        const OBSTACLE_HEIGHT = 62;
        let frameCounter = 0;
        let spawnGap = 55;
        let gameSpeed = 5;
        let score = 0;
        let bestScore = localStorage.getItem('gazanBest') ? parseInt(localStorage.getItem('gazanBest')) : 0;
        let gameRunning = true;
        
        // --- СИСТЕМА СМЕНЫ МИРА (рандомные счёта) ---
        let currentWorldTheme = 0;      // 0,1,2,3 разные цветовые схемы
        let nextThemeScore = 0;          // при каком счёте сменится мир
        let worldChangeFlag = false;
        
        // Определяем цветовые палитры для миров
        const WORLDS = [
            {   // МИР 0: КЛАССИЧЕСКИЙ САБВЕЙ (ночь/город)
                skyTop: "#0f2027",
                skyBottom: "#2c5364",
                railColor: "#8b5a2b",
                trackColor: "#5d3a1a",
                obstacleMain: "#b87333",
                obstacleDetail: "#e09d32",
                textGlow: "#ffbc6e",
                platformColor: "#4a3b28"
            },
            {   // МИР 1: КИСЛОТНЫЙ / НЕОН (киберпанк)
                skyTop: "#1a0033",
                skyBottom: "#4a1d6d",
                railColor: "#ff44cc",
                trackColor: "#aa22aa",
                obstacleMain: "#ff2266",
                obstacleDetail: "#ffaa44",
                textGlow: "#ff66ff",
                platformColor: "#331155"
            },
            {   // МИР 2: ПУСТЫНЯ / ЗАКАТ (жаркий)
                skyTop: "#c94b1f",
                skyBottom: "#ffb347",
                railColor: "#b87c4f",
                trackColor: "#9c5e2c",
                obstacleMain: "#cd7a32",
                obstacleDetail: "#e6a865",
                textGlow: "#ffe6b3",
                platformColor: "#bc6f3a"
            },
            {   // МИР 3: ЛЕДЯНОЙ / АРКТИКА
                skyTop: "#b3e5fc",
                skyBottom: "#e1f5fe",
                railColor: "#4fc3f7",
                trackColor: "#0288d1",
                obstacleMain: "#81d4fa",
                obstacleDetail: "#ffffff",
                textGlow: "#e0f7fa",
                platformColor: "#a6c9e0"
            }
        ];
        
        // Функция смены мира (вызывается при достижении порога)
        function changeWorldRandomly() {
            let newTheme = currentWorldTheme;
            while(newTheme === currentWorldTheme && WORLDS.length > 1) {
                newTheme = Math.floor(Math.random() * WORLDS.length);
            }
            currentWorldTheme = newTheme;
            // Устанавливаем следующий порог смены мира (рандомный счёт + от 450 до 1100 очков)
            let increment = 450 + Math.floor(Math.random() * 700);
            nextThemeScore = Math.floor(score) + increment;
            worldChangeFlag = true;
        }
        
        // Проверка смены мира каждый кадр
        function checkWorldTransition() {
            if(gameRunning && Math.floor(score) >= nextThemeScore && nextThemeScore > 0) {
                changeWorldRandomly();
            }
        }
        
        // Получить текущую палитру
        function getCurrentPalette() {
            return WORLDS[currentWorldTheme];
        }
        
        // --- Вспомогательные функции ---
        function updateScoreUI(){
            scoreSpan.innerText = Math.floor(score);
            if(score > bestScore){
                bestScore = Math.floor(score);
                bestSpan.innerText = bestScore;
                localStorage.setItem('gazanBest', bestScore);
            }
        }
        
        // Спавн поезда с цифрой 67
        function spawnObstacle(){
            let laneIdx = Math.floor(Math.random() * LANE_COUNT);
            let lastInLane = obstacles.find(obs => obs.lane === laneIdx && obs.y > canvas.height - 150);
            if(lastInLane) return;
            obstacles.push({
                x: laneIdx * LANE_WIDTH + (LANE_WIDTH/2 - OBSTACLE_WIDTH/2),
                lane: laneIdx,
                y: -OBSTACLE_HEIGHT,
                width: OBSTACLE_WIDTH,
                height: OBSTACLE_HEIGHT,
                numberEffect: Math.random() > 0.3   // для вариативности отрисовки 67
            });
        }
        
        function updateGame(){
            if(!gameRunning) return;
            
            // Движение препятствий
            for(let i=0; i<obstacles.length; i++){
                obstacles[i].y += gameSpeed;
            }
            obstacles = obstacles.filter(obs => obs.y < canvas.height + 120);
            
            // Спавн
            let dynamicSpawn = Math.max(28, spawnGap - Math.floor(score / 380));
            if(frameCounter >= dynamicSpawn){
                spawnObstacle();
                frameCounter = 0;
            } else {
                frameCounter++;
            }
            
            // Скорость
            gameSpeed = Math.min(5 + Math.floor(score / 650), 13.5);
            
            // Коллизия
            const playerRect = {
                x: lane * LANE_WIDTH + (LANE_WIDTH/2 - GAZAN_SIZE/2),
                y: playerY,
                w: GAZAN_SIZE,
                h: GAZAN_SIZE
            };
            
            for(let obs of obstacles){
                const obsRect = {
                    x: obs.x,
                    y: obs.y,
                    w: OBSTACLE_WIDTH,
                    h: OBSTACLE_HEIGHT
                };
                if(playerRect.x < obsRect.x + obsRect.w &&
                    playerRect.x + playerRect.w > obsRect.x &&
                    playerRect.y < obsRect.y + obsRect.h &&
                    playerRect.y + playerRect.h > obsRect.y){
                    gameRunning = false;
                    statusMsgDiv.style.display = "block";
                    restartBtn.classList.remove("hidden");   // показываем кнопку при смерти
                    break;
                }
            }
            
            if(gameRunning){
                score += 0.28;
                updateScoreUI();
                checkWorldTransition();  // проверяем, не пора ли сменить мир
            }
        }
        
        // ---------- ОТРИСОВКА МИРА С ТЕКУЩЕЙ ПАЛИТРОЙ ----------
        function drawBackground() {
            const pal = getCurrentPalette();
            const gradSky = ctx.createLinearGradient(0, 0, 0, GROUND_Y-40);
            gradSky.addColorStop(0, pal.skyTop);
            gradSky.addColorStop(0.7, pal.skyBottom);
            ctx.fillStyle = gradSky;
            ctx.fillRect(0, 0, canvas.width, GROUND_Y-30);
            
            // Декоративные облака/граффити в стиле мира
            ctx.fillStyle = pal.textGlow + "aa";
            ctx.font = "bold 26monospace";
            ctx.fillText("🚇 67 RUSH", 30, 70);
            ctx.fillStyle = pal.textGlow + "cc";
            ctx.fillText("GAZAN 6IX 9EVEN", canvas.width-200, 110);
            
            // Платформа и рельсы
            ctx.fillStyle = pal.platformColor;
            ctx.fillRect(0, GROUND_Y-10, canvas.width, 12);
            ctx.fillStyle = pal.railColor;
            for(let i=0;i<LANE_COUNT+1;i++){
                ctx.fillRect(i*LANE_WIDTH-4, GROUND_Y-15, 8, 28);
            }
            ctx.fillStyle = pal.trackColor;
            for(let i=0;i<15;i++){
                ctx.fillRect(i*70, GROUND_Y-5, 40, 10);
            }
            ctx.fillStyle = "#ddccaa";
            for(let r=0;r<LANE_COUNT;r++){
                ctx.fillRect(r*LANE_WIDTH+10, GROUND_Y-3, LANE_WIDTH-20, 6);
            }
        }
        
        function drawObstacles() {
            const pal = getCurrentPalette();
            for(let obs of obstacles){
                // Рисуем стилизованный вагон с цифрой 67
                ctx.fillStyle = pal.obstacleMain;
                ctx.shadowBlur = 4;
                ctx.fillRect(obs.x, obs.y, OBSTACLE_WIDTH, OBSTACLE_HEIGHT);
                ctx.fillStyle = pal.obstacleDetail;
                ctx.fillRect(obs.x+6, obs.y+10, OBSTACLE_WIDTH-12, 14);
                ctx.fillStyle = "#2c2c2c";
                ctx.fillRect(obs.x+8, obs.y+32, 12, 16);
                ctx.fillRect(obs.x+OBSTACLE_WIDTH-20, obs.y+32, 12, 16);
                
                // ГЛАВНОЕ: цифра 67 с характерным стилем
                ctx.font = `bold ${Math.floor(OBSTACLE_WIDTH * 0.55)}px "Courier New", monospace`;
                ctx.fillStyle = "#fff6b0";
                ctx.shadowBlur = 3;
                ctx.shadowColor = "#ff7700";
                ctx.fillText("67", obs.x + 10, obs.y + 52);
                ctx.font = "bold 18px monospace";
                ctx.fillStyle = "#ffeb99";
                ctx.fillText("⚡", obs.x + OBSTACLE_WIDTH-16, obs.y + 28);
                // дополнительные детали
                ctx.fillStyle = "#ffcc44";
                ctx.beginPath();
                for(let s=0;s<3;s++) ctx.rect(obs.x+6+s*12, obs.y+OBSTACLE_HEIGHT-8, 5, 7);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }
        
        function drawGazans() {
            const playerX = lane * LANE_WIDTH + (LANE_WIDTH/2 - GAZAN_SIZE/2);
            ctx.shadowBlur = 8;
            ctx.shadowColor = "black";
            // тело
            ctx.fillStyle = "#f5a623";
            ctx.beginPath();
            ctx.roundRect(playerX, playerY, GAZAN_SIZE, GAZAN_SIZE, 12);
            ctx.fill();
            // лицо
            ctx.fillStyle = "#3b2a1f";
            ctx.beginPath();
            ctx.arc(playerX+GAZAN_SIZE*0.7, playerY+GAZAN_SIZE*0.35, 8, 0, Math.PI*2);
            ctx.arc(playerX+GAZAN_SIZE*0.3, playerY+GAZAN_SIZE*0.35, 8, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(playerX+GAZAN_SIZE*0.65, playerY+GAZAN_SIZE*0.32, 3, 0, Math.PI*2);
            ctx.arc(playerX+GAZAN_SIZE*0.25, playerY+GAZAN_SIZE*0.32, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#000";
            ctx.fillRect(playerX+GAZAN_SIZE*0.5, playerY+GAZAN_SIZE*0.2, 12, 4);
            ctx.fillRect(playerX+GAZAN_SIZE*0.2, playerY+GAZAN_SIZE*0.2, 12, 4);
            ctx.fillStyle = "#ffd966";
            ctx.fillRect(playerX+15, playerY+42, 22, 6);
            ctx.fillStyle = "#dc143c";
            ctx.fillRect(playerX+8, playerY-10, 38, 14);
            ctx.fillStyle = "#ff0000aa";
            ctx.fillRect(playerX+18, playerY-6, 18, 8);
            ctx.font = "bold 12px monospace";
            ctx.fillStyle = "black";
            ctx.fillText("GAZAN", playerX+8, playerY+GAZAN_SIZE-8);
            ctx.fillStyle = "#333";
            ctx.fillRect(playerX+8, playerY+GAZAN_SIZE-8, 14, 8);
            ctx.fillRect(playerX+28, playerY+GAZAN_SIZE-8, 14, 8);
            ctx.shadowBlur = 0;
            // эффект скорости
            for(let s=0; s<5; s++){
                ctx.beginPath();
                ctx.moveTo(playerX-10-s*2, playerY+GAZAN_SIZE/2);
                ctx.lineTo(playerX-22-s*3, playerY+GAZAN_SIZE/2 + (s%2===0? -6:6));
                ctx.lineWidth = 3;
                ctx.strokeStyle = `rgba(255,200,100,${0.7-s*0.1})`;
                ctx.stroke();
            }
        }
        
        function drawUIandEffects() {
            const pal = getCurrentPalette();
            ctx.font = "bold 18px monospace";
            ctx.fillStyle = "#FFF5cf";
            ctx.fillText(`🚄 SPEED: ${Math.floor(gameSpeed*2)}`, canvas.width-130, 45);
            ctx.fillStyle = pal.textGlow;
            ctx.fillText(`🏁 ЛЕВО/ПРАВО`, canvas.width-150, 85);
            
            // Индикатор смены мира (красивый эффект)
            if(worldChangeFlag) {
                ctx.font = "bold 14px monospace";
                ctx.fillStyle = "#ffdd88";
                ctx.shadowBlur = 6;
                ctx.fillText("✨ МИР СМЕНИЛСЯ! ✨", canvas.width/2-85, GROUND_Y-45);
                worldChangeFlag = false;
                setTimeout(()=>{ worldChangeFlag = false; }, 500);
            }
            
            if(!gameRunning){
                ctx.font = "bold 32px monospace";
                ctx.fillStyle = "#ffddbb";
                ctx.shadowBlur = 8;
                ctx.fillText("❌ GAME OVER ❌", canvas.width/2-130, canvas.height/2-40);
                ctx.font = "16px monospace";
                ctx.fillStyle = "yellow";
                ctx.fillText("НАЖМИ 'ГАЗАН, ПОГНАЛИ!'", canvas.width/2-125, canvas.height/2+25);
            }
            
            if(gameRunning && frameCounter % 45 < 20){
                ctx.fillStyle = "#fff9c4cc";
                ctx.font = "bold 14px monospace";
                ctx.fillText("👆 СВАЙП / КНОПКИ 👆", canvas.width-180, GROUND_Y-18);
            }
        }
        
        function draw() {
            drawBackground();
            drawObstacles();
            drawGazans();
            drawUIandEffects();
        }
        
        // --- Управление ---
        function moveLeft(){
            if(!gameRunning) return;
            if(lane > 0) lane--;
        }
        
        function moveRight(){
            if(!gameRunning) return;
            if(lane < LANE_COUNT-1) lane++;
        }
        
        function restartGame(){
            gameRunning = true;
            score = 0;
            gameSpeed = 5;
            obstacles = [];
            lane = 1;
            frameCounter = 0;
            updateScoreUI();
            statusMsgDiv.style.display = "none";
            restartBtn.classList.add("hidden");   // прячем кнопку при живом геймплее
            
            // Сброс миров: первый мир случайный, но классический приятный
            currentWorldTheme = Math.floor(Math.random() * WORLDS.length);
            // Устанавливаем первый порог смены мира (чтобы не сразу, а через 500-1000 очков)
            nextThemeScore = 500 + Math.floor(Math.random() * 700);
            worldChangeFlag = false;
        }
        
        // --- Обработчики ---
        function handleKey(e){
            const key = e.key;
            if(key === 'ArrowLeft' || key === 'Left' || key === 'a' || key === 'A'){
                e.preventDefault();
                moveLeft();
            } else if(key === 'ArrowRight' || key === 'Right' || key === 'd' || key === 'D'){
                e.preventDefault();
                moveRight();
            }
            if((key === ' ' || key === 'Space' || key === 'r' || key === 'R') && !gameRunning){
                e.preventDefault();
                restartGame();
            }
        }
        
        let touchStartX = 0;
        function handleTouchStart(e){
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            touchStartX = touch.clientX - rect.left;
        }
        
        function handleTouchMove(e){
            if(!gameRunning) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            let currentX = touch.clientX - rect.left;
            let diff = currentX - touchStartX;
            if(Math.abs(diff) > 25){
                if(diff > 0) moveRight();
                else moveLeft();
                touchStartX = currentX;
            }
        }
        
        let mouseDownX = 0;
        let isDragging = false;
        function handleMouseDown(e){
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            mouseDownX = e.clientX - rect.left;
            isDragging = true;
        }
        
        function handleMouseMove(e){
            if(!isDragging || !gameRunning) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            let currentX = e.clientX - rect.left;
            let diff = currentX - mouseDownX;
            if(Math.abs(diff) > 25){
                if(diff > 0) moveRight();
                else moveLeft();
                mouseDownX = currentX;
            }
        }
        
        function handleMouseUp(e){
            isDragging = false;
        }
        
        // --- UI элементы и старт---
        const scoreSpan = document.getElementById('scoreValue');
        const bestSpan = document.getElementById('bestValue');
        const statusMsgDiv = document.getElementById('statusMessage');
        const restartBtn = document.getElementById('restartBtn');
        
        bestSpan.innerText = bestScore;
        
        window.addEventListener('load', ()=>{
            document.getElementById('leftBtn').addEventListener('click', (e)=>{
                e.preventDefault();
                moveLeft();
            });
            document.getElementById('rightBtn').addEventListener('click', (e)=>{
                e.preventDefault();
                moveRight();
            });
            restartBtn.addEventListener('click', ()=>{
                if(!gameRunning) restartGame();
            });
            
            window.addEventListener('keydown', handleKey);
            canvas.addEventListener('touchstart', handleTouchStart, {passive: false});
            canvas.addEventListener('touchmove', handleTouchMove, {passive: false});
            canvas.addEventListener('touchend', (e)=> e.preventDefault());
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseup', handleMouseUp);
            canvas.addEventListener('contextmenu', (e)=> e.preventDefault());
            
            // ИНИЦИАЛИЗАЦИЯ: при первом запуске игра активна, кнопка рестарта спрятана
            gameRunning = true;
            score = 0;
            gameSpeed = 5;
            obstacles = [];
            lane = 1;
            frameCounter = 0;
            currentWorldTheme = Math.floor(Math.random() * WORLDS.length);
            nextThemeScore = 500 + Math.floor(Math.random() * 700);
            updateScoreUI();
            statusMsgDiv.style.display = "none";
            restartBtn.classList.add("hidden");   // прячем кнопку при старте
            
            function gameLoop(){
                updateGame();
                draw();
                requestAnimationFrame(gameLoop);
            }
            gameLoop();
        });
        
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
    })();
</script>
