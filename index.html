<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scam Line — Только один победит</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #0a0f1e 0%, #03060c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Monaco', monospace;
            padding: 20px;
        }

        /* Атмосферный контейнер */
        .game-container {
            max-width: 750px;
            width: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            border: 1px solid rgba(255, 80, 40, 0.4);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 80, 40, 0.1) inset;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* Шапка — старый телефон */
        .phone-header {
            background: #1e1a17;
            padding: 20px 24px 12px;
            text-align: center;
            border-bottom: 3px solid #ff5028;
            background-image: repeating-linear-gradient(45deg, #2a241f 0px, #2a241f 2px, #1e1a17 2px, #1e1a17 8px);
        }

        .phone-header h1 {
            font-size: 2.2rem;
            letter-spacing: 4px;
            color: #ffbba0;
            text-shadow: 0 0 5px #ff5028;
            font-weight: 800;
            word-break: keep-all;
        }

        .phone-header p {
            color: #aa8e7a;
            font-size: 0.75rem;
            font-family: monospace;
        }

        /* Статус: игроки / очки */
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #000000aa;
            padding: 12px 24px;
            border-bottom: 1px solid #ff502855;
            font-weight: bold;
            color: #fcd5b5;
        }

        .score-board {
            background: #0e0b09;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .round-badge {
            background: #ff5028;
            color: #1e1a17;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* Игровая зона */
        .game-area {
            padding: 28px 24px 32px;
            min-height: 460px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .challenge-card {
            background: #13100ee0;
            border-left: 8px solid #ff5028;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.4);
        }

        .challenge-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffb085;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .challenge-desc {
            color: #cfc2b5;
            margin-bottom: 20px;
            line-height: 1.4;
            font-size: 0.95rem;
        }

        /* Кнопки и варианты */
        .options-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin: 15px 0 8px;
        }

        .action-btn {
            background: #27211d;
            border: 1px solid #ff784e;
            color: #ffe2cf;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-family: monospace;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.1s linear;
            flex: 1 0 auto;
            text-align: center;
        }

        .action-btn:hover {
            background: #ff5028;
            color: black;
            border-color: white;
            transform: scale(0.97);
            box-shadow: 0 0 12px #ff5028;
        }

        .action-btn.danger {
            border-color: #b00030;
            color: #ff8a7a;
        }

        .action-btn.danger:hover {
            background: #b00030;
            color: white;
        }

        /* Лог событий */
        .event-log {
            background: #03060cd9;
            border-radius: 28px;
            padding: 16px;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 210px;
            overflow-y: auto;
            border: 1px solid #ff502855;
        }

        .log-entry {
            border-bottom: 1px solid #ff784e30;
            padding: 8px 5px;
            color: #ddd0c0;
        }

        .log-entry.win {
            color: #ffb347;
            text-shadow: 0 0 2px #ff5028;
            font-weight: bold;
        }

        .reset-area {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .reset-btn {
            background: #2f241f;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            color: #ffb790;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.1s;
            width: 80%;
        }

        .reset-btn:hover {
            background: #ff5028;
            color: #0a0a0a;
            box-shadow: 0 0 12px #ff5028;
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            padding: 16px;
            color: #6f5e53;
            border-top: 1px solid #2f241f;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot">
    <div class="phone-header">
        <h1>📞 SCAM LINE</h1>
        <p>// только один выживет // голос искажён //</p>
    </div>
    <div class="status-bar">
        <span>⚡ Игрок: <span id="playerName">Манипулятор</span></span>
        <span class="score-board">🏆 ОЧКИ: <span id="scoreValue">0</span></span>
        <span class="round-badge" id="roundCounter">Раунд 1 / 3</span>
    </div>
    <div class="game-area" id="gameArea">
        <!-- Динамический контент будет загружаться сюда -->
        <div class="challenge-card">
            <div class="challenge-title">📟 ЗАГРУЗКА...</div>
            <div class="challenge-desc">Подключение к тайной комнате...</div>
        </div>
    </div>
    <div class="reset-area">
        <button class="reset-btn" id="resetGameBtn">🔄 НОВАЯ ИГРА / СБРОС</button>
    </div>
    <footer>🎭 Социальная дедукция | Блеф, союзы или предательство | Только один победит</footer>
</div>

<script>
    // ---------- КОНФИГ ИГРЫ (полная копия механик Scam Line) ----------
    // три классических испытания из реальной игры: 
    // 1) Узнай номера соседей
    // 2) Кто одет иначе?
    // 3) Дилемма заключенного [citation:1][citation:3][citation:5]
    
    const CHALLENGES = [
        {
            id: "room_numbers",
            title: "🔢 УЗНАЙ НОМЕРА СОСЕДЕЙ",
            description: "Все игроки разобщены. Ты можешь позвонить на старую трубку и спросить номер комнаты соседа. Но врут все! Твоя цель — вычислить реальные цифры быстрее остальных. У тебя есть 2 попытки переговоров.",
            mechanic: "choice",
            options: [
                { text: "📞 Честно спросить номер у 'соседа'", type: "trust", points: 2, message: "Сосед ответил честно! Ты узнал, что его комната #7. Сыщик внутри тебя ликует. +2 очка доверия." },
                { text: "🤥 Назвать ложный номер и шантажировать", type: "lie", points: 4, message: "Ты обманул соперника и вынудил его раскрыть настоящую информацию! Манипуляция удалась. +4 очка (обман окупается)." },
                { text: "🤝 Создать тайный союз", type: "alliance", points: 3, message: "Вы с соседом обменялись номерами и решили не нападать друг на друга. Союз приносит +3 очка стабильности." }
            ]
        },
        {
            id: "dressed_diff",
            title: "👕 КТО ОДЕТ ИНАЧЕ?",
            description: "Среди 6 игроков один одет в строгий костюм, остальные — в повседневное. Голоса искажены. Твоя задача — вычислить 'чужака', задавая вопросы через телефон. Кого выберешь?",
            mechanic: "choice",
            options: [
                { text: "🎯 Указать на случайного игрока", type: "random", points: -1, message: "Ты ошибся! Чужаком оказался другой участник. Теряешь 1 очко репутации." },
                { text: "🕵️ Проанализировать интонацию и логику", type: "smart", points: 5, message: "Ты заметил, что игрок #3 слишком агрессивно отрицал детали. Чужак разоблачён! +5 очков." },
                { text: "🗣️ Убедить всех голосовать за невиновного", type: "manip", points: 3, message: "Ты использовал харизму, команда исключила не того, но ты сохранил влияние. +3 очка." }
            ]
        },
        {
            id: "prisoner_dilemma",
            title: "⚖️ ДИЛЕММА ЗАКЛЮЧЁННОГО",
            description: "Ты и оппонент пойманы на мошенничестве. У каждого выбор: Молчать (сотрудничество) или Предать. Твой ход решит исход игры.",
            mechanic: "choice",
            options: [
                { text: "🤐 Молчать (сотрудничать)", type: "coop", points: 2, message: "Партнёр тоже промолчал — оба получаете минимальный срок. Доверие +2 очка." },
                { text: "🗡️ Предать (сдать партнёра)", type: "betray", points: 6, message: "Ты предал союзника! Он сел в тюрьму, а ты получил свободу и бонусные очки! +6 очков (но совесть не чиста)." },
                { text: "🤝 Предложить ничью, но манипулировать", type: "doublecross", points: 4, message: "Ты сделал вид, что сотрудничаешь, но тайно слил информацию. Грязная игра приносит +4 очка." }
            ]
        }
    ];

    // Состояние игры
    let currentRound = 0;          // 0,1,2
    let totalScore = 0;
    let gameActive = true;
    let eventLogs = [];

    // DOM элементы
    const gameArea = document.getElementById('gameArea');
    const scoreSpan = document.getElementById('scoreValue');
    const roundSpan = document.getElementById('roundCounter');
    const resetBtn = document.getElementById('resetGameBtn');

    // Вспомогательные функции
    function addLogMessage(text, isWin = false) {
        eventLogs.unshift({ text, isWin, timestamp: new Date().toLocaleTimeString() });
        if (eventLogs.length > 12) eventLogs.pop();
        renderLog();
    }

    function renderLog() {
        let logContainer = document.getElementById('logContainer');
        if (!logContainer) return;
        logContainer.innerHTML = eventLogs.map(log => 
            `<div class="log-entry ${log.isWin ? 'win' : ''}">📟 ${log.timestamp} — ${log.text}</div>`
        ).join('');
    }

    // Сохранить игру в localStorage для GitHub Pages persistence (опция)
    function saveGameState() {
        localStorage.setItem('scamline_save', JSON.stringify({
            currentRound: currentRound,
            totalScore: totalScore,
            eventLogs: eventLogs.slice(0, 10),
            gameActive: gameActive
        }));
    }

    function loadGameState() {
        const saved = localStorage.getItem('scamline_save');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (data.currentRound !== undefined && data.currentRound < CHALLENGES.length) {
                    currentRound = data.currentRound;
                    totalScore = data.totalScore;
                    if (data.eventLogs) eventLogs = data.eventLogs;
                    gameActive = data.gameActive;
                    updateUIStats();
                    addLogMessage("🔁 Загрузка сохранения из прошлого сеанса...", false);
                } else {
                    resetGame();
                }
            } catch(e) { resetGame(); }
        } else {
            resetGame();
        }
        renderCurrentChallenge();
    }

    function updateUIStats() {
        scoreSpan.innerText = totalScore;
        roundSpan.innerText = `Раунд ${currentRound+1} / ${CHALLENGES.length}`;
        saveGameState();
    }

    // Завершение игры (победа / итог)
    function endGame(forceFinish = false) {
        if (!forceFinish && currentRound < CHALLENGES.length) return;
        gameActive = false;
        const finalMessage = totalScore >= 12 ? "🔥 ТЫ ПОБЕДИЛ! Только один выжил — ЭТО ТЫ. Манипулятор года!" : "💀 Ты проиграл. Слишком много ошибок, доверия или предательств... Хочешь реванш?";
        addLogMessage(finalMessage, true);
        gameArea.innerHTML = `
            <div class="challenge-card" style="border-left-color: #ffaa44; text-align:center;">
                <div class="challenge-title">🏁 ИГРА ЗАВЕРШЕНА</div>
                <div class="challenge-desc" style="font-size:1.2rem;">💰 Финальный счёт: ${totalScore} очков<br>${finalMessage}<br><br>✨ Нажми «НОВАЯ ИГРА», чтобы сыграть снова ✨</div>
            </div>
        `;
        saveGameState();
    }

    // Выбор действия игрока
    function makeChoice(option, challengeIndex) {
        if (!gameActive) {
            addLogMessage("Игра окончена. Нажми сброс для новой партии.", false);
            return;
        }
        if (challengeIndex !== currentRound) return;
        
        // начисляем очки и пишем лог
        totalScore += option.points;
        addLogMessage(`${option.text}: ${option.message} (${option.points >= 0 ? '+' : ''}${option.points} очков)`);
        updateUIStats();
        
        // переход к следующему раунду
        currentRound++;
        if (currentRound < CHALLENGES.length) {
            renderCurrentChallenge();
        } else {
            // игра завершена, все три испытания пройдены
            endGame(true);
        }
        saveGameState();
    }

    function renderCurrentChallenge() {
        if (!gameActive && currentRound >= CHALLENGES.length) {
            endGame(true);
            return;
        }
        if (currentRound >= CHALLENGES.length) {
            endGame(true);
            return;
        }
        
        const challenge = CHALLENGES[currentRound];
        // отрисовка карточки с вариантами
        let optionsHtml = `<div class="options-group">`;
        challenge.options.forEach((opt, idx) => {
            optionsHtml += `<button class="action-btn" data-opt-index="${idx}">${opt.text}</button>`;
        });
        optionsHtml += `</div>`;
        
        const fullHtml = `
            <div class="challenge-card">
                <div class="challenge-title">📟 ${challenge.title}</div>
                <div class="challenge-desc">${challenge.description}</div>
                ${optionsHtml}
            </div>
            <div class="event-log" id="logContainer">
                ${eventLogs.map(log => `<div class="log-entry ${log.isWin ? 'win' : ''}">📞 ${log.timestamp} — ${log.text}</div>`).join('')}
                ${eventLogs.length === 0 ? '<div class="log-entry">⚡ Звонок установлен. Жди развития событий...</div>' : ''}
            </div>
        `;
        gameArea.innerHTML = fullHtml;
        
        // привязываем события к кнопкам
        const btns = document.querySelectorAll('.action-btn');
        btns.forEach((btn, i) => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                if (i < challenge.options.length) {
                    makeChoice(challenge.options[i], currentRound);
                }
            });
        });
    }
    
    // Полный сброс (новая игра)
    function resetGame() {
        currentRound = 0;
        totalScore = 0;
        gameActive = true;
        eventLogs = [];
        addLogMessage("📀 Новая игра Scam Line запущена. Тебя ждут 3 испытания. Блефуй, объединяйся, побеждай.");
        addLogMessage("☎️ Телефон пищит... противники не видят твоего лица. Действуй.");
        updateUIStats();
        renderCurrentChallenge();
        saveGameState();
    }
    
    // Обработчик кнопки сброса
    resetBtn.addEventListener('click', () => {
        resetGame();
    });
    
    // Инициализация: пробуем загрузить сохранённую игру, либо начинаем новую
    function init() {
        const saved = localStorage.getItem('scamline_save');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (data.currentRound !== undefined && data.currentRound <= CHALLENGES.length && data.totalScore !== undefined) {
                    currentRound = data.currentRound;
                    totalScore = data.totalScore;
                    gameActive = data.gameActive;
                    eventLogs = data.eventLogs || [];
                    updateUIStats();
                    if (gameActive && currentRound < CHALLENGES.length) {
                        renderCurrentChallenge();
                    } else if (currentRound >= CHALLENGES.length || !gameActive) {
                        endGame(true);
                    } else {
                        renderCurrentChallenge();
                    }
                } else {
                    resetGame();
                }
            } catch (er) {
                resetGame();
            }
        } else {
            resetGame();
        }
    }
    
    init();
</script>
</body>
</html>
