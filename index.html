<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NetErrror - Трасса Суслова</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a1f0e, #0c2b12);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        .game-container {
            background: #1e2a1a;
            border-radius: 48px;
            padding: 16px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6);
            border: 1px solid #6a8e5e;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            cursor: pointer;
        }
        .ui-panel {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            background: #0f160ecc;
            padding: 8px 20px;
            border-radius: 60px;
        }
        .stat {
            color: #d4ffb0;
            background: #1f2c1a;
            padding: 5px 15px;
            border-radius: 30px;
        }
        button {
            background: #3c5e2e;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 32px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="500"></canvas>
        <div class="ui-panel">
            <div class="stat">🚗 Суслов: <span id="suslovRep">0</span></div>
            <div class="stat">🍆 Минеты: <span id="bjCount">0</span></div>
            <button id="resetBtn">⚡ Сброс</button>
        </div>
    </div>
</div>

<script>
    // ========== ЧАСТЬ 1/3 ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let suslov = {
        x: 150, y: 320, dir: 1, speed: 1.2,
        w: 48, h: 52, walkCycle: 0
    };
    let minigame = {
        active: false,
        pleasure: 0,
        intensity: 0,
        mouthOpen: 0,
        headBob: 0
    };
    let suslovRep = 0, totalBj = 0;
    let roadOffset = 0;
    
    const suslovSpan = document.getElementById('suslovRep');
    const bjSpan = document.getElementById('bjCount');
    const resetBtn = document.getElementById('resetBtn');
    
    function updateUI() {
        suslovSpan.innerText = suslovRep;
        bjSpan.innerText = totalBj;
    }
    
    // Продолжение во 2-й части...    // ========== ЧАСТЬ 2/3 ==========
    function startMinigame() {
        if (minigame.active) return;
        minigame.active = true;
        minigame.pleasure = 0;
        minigame.intensity = 0;
        minigame.mouthOpen = 0;
        minigame.headBob = 0;
    }
    
    function completeMinigame() {
        if (!minigame.active) return;
        minigame.active = false;
        totalBj++;
        suslovRep++;
        updateUI();
    }
    
    function addPleasure(amount) {
        if (!minigame.active) return;
        let gain = amount * (1 + minigame.intensity * 0.15);
        minigame.pleasure = Math.min(minigame.pleasure + gain, 100);
        minigame.intensity = Math.min(minigame.intensity + 3, 50);
        minigame.mouthOpen = 18;
        if (minigame.pleasure >= 100) completeMinigame();
    }
    
    function isPointInSuslov(x, y) {
        return (x >= suslov.x && x <= suslov.x + suslov.w &&
                y >= suslov.y - 5 && y <= suslov.y + suslov.h);
    }
    
    function handleCanvasClick(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            e.preventDefault();
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        let canvasX = (clientX - rect.left) * scaleX;
        let canvasY = (clientY - rect.top) * scaleY;
        
        if (minigame.active) {
            addPleasure(12);
        } else if (isPointInSuslov(canvasX, canvasY)) {
            startMinigame();
        }
    }
    
    function updateSuslov(delta) {
        if (minigame.active) return;
        let step = suslov.speed * delta * 60;
        suslov.x += suslov.dir * step;
        if (suslov.x <= 30) { suslov.x = 30; suslov.dir = 1; }
        if (suslov.x >= canvas.width - suslov.w - 30) { suslov.x = canvas.width - suslov.w - 30; suslov.dir = -1; }
        suslov.walkCycle = (suslov.walkCycle + delta * 12) % (Math.PI * 2);
    }
    
    function updateMinigame(delta) {
        if (!minigame.active) return;
        minigame.intensity = Math.max(0, minigame.intensity - delta * 12);
        minigame.mouthOpen = Math.max(0, minigame.mouthOpen - delta * 25);
        minigame.headBob = (minigame.headBob + delta * 18) % (Math.PI * 2);
    }
    
    canvas.addEventListener('click', handleCanvasClick);
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        handleCanvasClick({ clientX: touch.clientX, clientY: touch.clientY });
    });
    
    resetBtn.addEventListener('click', () => {
        minigame.active = false;
        suslov = { x: 150, y: 320, dir: 1, speed: 1.2, w: 48, h: 52, walkCycle: 0 };
        suslovRep = 0;
        totalBj = 0;
        updateUI();
    });
    
    // Продолжение в 3-й части (рендер и анимация минета)...    // ========== ЧАСТЬ 3/3 ==========
    function drawRoad() {
        ctx.fillStyle = "#2a3524";
        ctx.fillRect(0, 280, canvas.width, 150);
        ctx.fillStyle = "#1e281a";
        for(let i = 0; i < 12; i++) {
            let dashX = (roadOffset + i * 70) % (canvas.width + 50) - 50;
            ctx.fillRect(dashX, 348, 35, 6);
        }
        ctx.fillStyle = "#bd9e6b";
        ctx.fillRect(0, 420, canvas.width, 12);
        ctx.fillStyle = "#396e2a";
        ctx.fillRect(0, 260, canvas.width, 22);
        roadOffset = (roadOffset + 1.5) % 40;
    }

    function drawCar() {
        ctx.fillStyle = "#4c6a8e";
        ctx.fillRect(80, 335, 70, 45);
        ctx.fillStyle = "#2e3f55";
        ctx.fillRect(90, 327, 20, 10);
        ctx.fillStyle = "#111";
        ctx.beginPath();
        ctx.arc(95, 370, 8, 0, Math.PI*2);
        ctx.arc(135, 370, 8, 0, Math.PI*2);
        ctx.fill();
    }

    function drawSuslov() {
        if (minigame.active) {
            // === ПОЛНАЯ АНИМАЦИЯ МИНЕТА ===
            let bodyX = suslov.x + suslov.w/2;
            let bodyY = suslov.y + 28;
            
            // Наклон тела вперёд с ритмичным покачиванием
            let tilt = -0.5 + Math.sin(minigame.headBob) * 0.15;
            ctx.save();
            ctx.translate(bodyX, bodyY - 10);
            ctx.rotate(tilt);
            
            // Тело
            ctx.fillStyle = "#e0b07f";
            ctx.beginPath();
            ctx.ellipse(0, 0, 18, 26, 0, 0, Math.PI*2);
            ctx.fill();
            
            // Штаны (колени)
            ctx.fillStyle = "#4a5a3a";
            ctx.fillRect(-16, 12, 32, 18);
            
            // Голова с активным открытием рта
            ctx.fillStyle = "#f3c9a0";
            ctx.beginPath();
            ctx.arc(0, -18, 17, 0, Math.PI*2);
            ctx.fill();
            
            // Рот (динамически открывается в такт)
            let currentMouth = 8;
            if (minigame.mouthOpen > 0) {
                currentMouth = minigame.mouthOpen;
            } else {
                currentMouth = 6 + Math.sin(Date.now() * 0.025) * 4;
            }
            ctx.fillStyle = "#5a1a1a";
            ctx.fillRect(-8, -14, 16, currentMouth);
            
            // Язык (при высокой интенсивности)
            if (minigame.intensity > 20) {
                ctx.fillStyle = "#cc5577";
                ctx.fillRect(-4, -10, 8, 6);
            }
            
            // Глаза (зажмурены от удовольствия)
            ctx.fillStyle = "#2c2c2c";
            ctx.fillRect(-12, -24, 5, 4);
            ctx.fillRect(7, -24, 5, 4);
            
            // Капельки пота/слюны
            if (minigame.intensity > 30) {
                ctx.fillStyle = "#88ccff";
                for(let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.arc(-15 + i*10, -10, 2, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            ctx.restore();
            
            // Полоска удовольствия над персонажем
            ctx.fillStyle = "#ffaa66";
            ctx.fillRect(suslov.x - 10, suslov.y - 20, (minigame.pleasure / 100) * 68, 8);
            ctx.fillStyle = "white";
            ctx.font = "bold 12px monospace";
            ctx.fillText(`${Math.floor(minigame.pleasure)}%`, suslov.x + 15, suslov.y - 22);
            
        } else {
            // Обычная ходьба
            ctx.fillStyle = "#dcab7a";
            ctx.fillRect(suslov.x + 8, suslov.y + 20, 32, 32);
            ctx.fillStyle = "#ffdd99";
            ctx.beginPath();
            ctx.arc(suslov.x + suslov.w/2, suslov.y + 15, 18, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#2c2c2c";
            ctx.fillRect(suslov.x + suslov.w/2 - 10, suslov.y + 9, 5, 5);
            ctx.fillRect(suslov.x + suslov.w/2 + 5, suslov.y + 9, 5, 5);
            
            let legOffset = Math.sin(suslov.walkCycle * 3) * 6;
            ctx.fillStyle = "#5f7a4a";
            ctx.fillRect(suslov.x + 10, suslov.y + 48, 8, 8 + legOffset);
            ctx.fillRect(suslov.x + 30, suslov.y + 48, 8, 8 - legOffset);
            
            // Реплика
            ctx.fillStyle = "#fff9cf";
            ctx.font = "12px monospace";
            ctx.fillText("сын бляди... подвези!", suslov.x + 5, suslov.y - 8);
        }
    }

    function drawMinigameOverlay() {
        if (!minigame.active) return;
        ctx.fillStyle = "#000000aa";
        ctx.fillRect(0, 0, canvas.width, 45);
        ctx.fillStyle = "#ffcc88";
        ctx.font = "bold 14px monospace";
        ctx.fillText("🍆 ДЕЛАЙ МИНЕТ - КЛИКАЙ ПО ЭКРАНУ 🍆", canvas.width/2 - 180, 28);
    }

    let lastTime = 0;
    function gameLoop(now) {
        let delta = Math.min(0.033, (now - lastTime) / 1000);
        if (delta > 0.01) {
            updateSuslov(delta);
            updateMinigame(delta);
        }
        lastTime = now;
        
        drawRoad();
        drawCar();
        drawSuslov();
        drawMinigameOverlay();
        
        requestAnimationFrame(gameLoop);
    }
    
    updateUI();
    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
