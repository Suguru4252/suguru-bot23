        // ==================== СТРОИТЕЛЬСТВО ====================
        function placeZone(worldX, worldY) {
            if (!gameState.currentTool || !gameState.currentTool.startsWith('zone_')) return false;
            const zoneType = gameState.currentTool.replace('zone_', '');
            if (Math.abs(worldX) > gameState.borderSize || Math.abs(worldY) > gameState.borderSize) {
                addLog('⚠️ За границей страны!');
                return false;
            }
            if (isPointInWater(worldX, worldY)) {
                addLog('⚠️ Нельзя зонировать воду!');
                return false;
            }
            const snap = gameState.gridSize;
            const sx = Math.round(worldX / snap) * snap;
            const sy = Math.round(worldY / snap) * snap;
            const newZone = { type: zoneType, x: sx, y: sy, w: snap, h: snap, placedAt: gameState.gameTime };
            const allObjects = gameState.buildings.concat(gameState.roads).concat(gameState.rails).concat(gameState.zones);
            let hasOverlap = false;
            for (let i = 0; i < allObjects.length; i++) {
                if (rectanglesOverlap(newZone, allObjects[i], 2)) {
                    hasOverlap = true;
                    break;
                }
            }
            if (hasOverlap) { addLog('⚠️ Место занято!'); return false; }
            gameState.zones.push(newZone);
            addLog('🏘️ Зона размечена: ' + (zoneType === 'residential' ? 'Жилая' : zoneType === 'commercial' ? 'Коммерческая' : 'Индустриальная'));
            updateUI();
            return true;
        }

        function buildAt(worldX, worldY) {
            if (!gameState.selectedType || gameState.deleteMode || gameState.selectMode || gameState.currentTool) return false;
            const type = gameState.selectedType;
            const info = buildingTypes[type];
            const scale = gameState.buildScale || 1;
            const cost = getBuildCost(type, scale);
            const size = getBuildSize(type, scale);
            if (gameState.money < cost) { addLog('❌ Недостаточно средств! 💰' + cost.toLocaleString());
                shakeEl('money-val'); return false; }
            if (Math.abs(worldX) > gameState.borderSize || Math.abs(worldY) > gameState.borderSize) {
                addLog('⚠️ За границей!');
                return false;
            }
            if (info.needsWater && !isPointInWater(worldX, worldY)) {
                addLog('⚠️ Судостроительный завод только на воде!');
                return false;
            }
            if (!info.needsWater && !info.isRoad && !info.isRail && !info.isRoadCurve && isPointInWater(worldX, worldY)) {
                addLog('⚠️ Нельзя строить на воде!');
                return false;
            }
            const newBuilding = {
                type: type,
                x: worldX - size.w / 2,
                y: worldY - size.h / 2,
                w: size.w,
                h: size.h,
                scale: scale,
                rotation: gameState.buildRotation,
                placedAt: gameState.gameTime,
            };
            const allCollidables = gameState.buildings.concat(gameState.roads).concat(gameState.rails);
            let hasOverlap = false;
            for (let i = 0; i < allCollidables.length; i++) {
                if (rectanglesOverlap(newBuilding, allCollidables[i], 2)) {
                    hasOverlap = true;
                    break;
                }
            }
            if (hasOverlap) { addLog('⚠️ Место занято!'); return false; }
            gameState.money -= cost;
            if (info.isRoad || info.isRoadCurve) {
                gameState.roads.push(newBuilding);
            } else if (info.isRail) {
                gameState.rails.push(newBuilding);
            } else {
                gameState.buildings.push(newBuilding);
                if (info.happinessBonus) {
                    gameState.happiness = Math.max(0, Math.min(100, gameState.happiness + Math.floor(info.happinessBonus * scale)));
                }
                if (info.tourismBonus) {
                    gameState.population += Math.floor(info.tourismBonus * scale);
                }
            }
            updateUI();
            addLog('✅ ' + info.emoji + ' ' + info.name + ' (' + size.w + 'x' + size.h + ')');
            spawnParticles(worldX, worldY, '#f0d060');
            gameState.buildRotation = 0;
            return true;
        }

        function deleteAt(worldX, worldY) {
            if (!gameState.deleteMode) return false;
            const allObjects = gameState.buildings.concat(gameState.roads).concat(gameState.rails).concat(gameState.zones);
            let foundObject = null;
            for (let i = 0; i < allObjects.length; i++) {
                const obj = allObjects[i];
                if (worldX >= obj.x && worldX <= obj.x + obj.w && worldY >= obj.y && worldY <= obj.y + obj.h) {
                    foundObject = obj;
                    break;
                }
            }
            if (!foundObject) return false;
            if (foundObject.type && (foundObject.type === 'residential' || foundObject.type === 'commercial' || foundObject.type === 'industrial')) {
                gameState.zones = gameState.zones.filter(function(z) { return z !== foundObject; });
                updateUI();
                addLog('🗑️ Зона убрана');
                return true;
            }
            const info = buildingTypes[foundObject.type];
            const scale = foundObject.scale || 1;
            const refund = Math.floor(getBuildCost(foundObject.type, scale) * 0.5);
            gameState.money += refund;
            if (info.isRoad || info.isRoadCurve) {
                gameState.roads = gameState.roads.filter(function(b) { return b !== foundObject; });
            } else if (info.isRail) {
                gameState.rails = gameState.rails.filter(function(b) { return b !== foundObject; });
            } else {
                gameState.buildings = gameState.buildings.filter(function(b) { return b !== foundObject; });
                if (info.happinessBonus) {
                    gameState.happiness = Math.max(0, Math.min(100, gameState.happiness - Math.floor((info.happinessBonus || 0) * scale)));
                }
            }
            gameState.cars = gameState.cars.filter(function(c) { return c.homeRef !== foundObject; });
            gameState.boats = gameState.boats.filter(function(b) { return b.homeRef !== foundObject; });
            gameState.buses = gameState.buses.filter(function(b) { return b.homeRef !== foundObject; });
            updateUI();
            addLog('🗑️ Снесено (+💰' + refund.toLocaleString() + ')');
            spawnParticles(foundObject.x + foundObject.w / 2, foundObject.y + foundObject.h / 2, '#f08888');
            return true;
        }

        function rectanglesOverlap(a, b, margin) {
            if (a.x + a.w - margin < b.x) return false;
            if (a.x > b.x + b.w - margin) return false;
            if (a.y + a.h - margin < b.y) return false;
            if (a.y > b.y + b.h - margin) return false;
            return true;
        }

        // ==================== КООРДИНАТЫ ====================
        function worldToScreen(worldX, worldY) {
            const cx = gameState.cameraX - gameState.canvas.width / 2 / gameState.zoom;
            const cy = gameState.cameraY - gameState.canvas.height / 2 / gameState.zoom;
            return { x: (worldX - cx) * gameState.zoom, y: (worldY - cy) * gameState.zoom };
        }

        function screenToWorld(screenX, screenY) {
            const cx = gameState.cameraX - gameState.canvas.width / 2 / gameState.zoom;
            const cy = gameState.cameraY - gameState.canvas.height / 2 / gameState.zoom;
            return { x: screenX / gameState.zoom + cx, y: screenY / gameState.zoom + cy };
        }

        function getCanvasCoords(event) {
            const rect = gameState.canvas.getBoundingClientRect();
            return { sx: event.clientX - rect.left, sy: event.clientY - rect.top };
        }

        function getWorldFromEvent(event) {
            const coords = getCanvasCoords(event);
            const world = screenToWorld(coords.sx, coords.sy);
            return { sx: coords.sx, sy: coords.sy, wx: world.x, wy: world.y };
        }

        function findBuildingAt(worldX, worldY) {
            const allObjects = gameState.buildings.concat(gameState.roads).concat(gameState.rails);
            for (let i = allObjects.length - 1; i >= 0; i--) {
                const obj = allObjects[i];
                if (worldX >= obj.x && worldX <= obj.x + obj.w && worldY >= obj.y && worldY <= obj.y + obj.h) {
                    return obj;
                }
            }
            return null;
        }

        // ==================== ОТРИСОВКА ====================
        function getDayNightAlpha() {
            const hour = gameState.gameHour + gameState.gameMinute / 60;
            if (hour >= 6 && hour < 8) return 0.3 - (hour - 6) * 0.15;
            if (hour >= 8 && hour < 17) return 0;
            if (hour >= 17 && hour < 19) return (hour - 17) * 0.2;
            if (hour >= 19 && hour < 21) return 0.4 + (hour - 19) * 0.2;
            if (hour >= 21 || hour < 5) return 0.7;
            if (hour >= 5 && hour < 6) return 0.7 - (hour - 5) * 0.4;
            return 0;
        }

        function drawGround(ctx) {
            const w = gameState.canvas.width;
            const h = gameState.canvas.height;
            const alpha = getDayNightAlpha();
            const grad = ctx.createRadialGradient(w / 2, h / 2, 100, w / 2, h / 2, Math.max(w, h));
            const r = Math.floor(61 * (1 - alpha));
            const g = Math.floor(90 * (1 - alpha));
            const b = Math.floor(46 * (1 - alpha));
            grad.addColorStop(0, 'rgb(' + r + ',' + g + ',' + b + ')');
            grad.addColorStop(0.6, 'rgb(' + Math.floor(r * 0.7) + ',' + Math.floor(g * 0.7) + ',' + Math.floor(b * 0.7) + ')');
            grad.addColorStop(1, 'rgb(' + Math.floor(r * 0.4) + ',' + Math.floor(g * 0.4) + ',' + Math.floor(b * 0.4) + ')');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            const gs = gameState.gridSize;
            const cx = gameState.cameraX - w / 2 / gameState.zoom;
            const cy = gameState.cameraY - h / 2 / gameState.zoom;
            const sx = -(((cx % gs) + gs) % gs);
            const sy = -(((cy % gs) + gs) % gs);
            for (let x = sx; x < w / gameState.zoom + gs; x += gs) {
                for (let y = sy; y < h / gameState.zoom + gs; y += gs) {
                    const worldGX = Math.floor((x + cx) / gs);
                    const worldGY = Math.floor((y + cy) / gs);
                    const seed = Math.sin(worldGX * 1000 + worldGY) * 0.06;
                    ctx.fillStyle = 'rgba(255,255,255,' + (0.02 + seed) + ')';
                    ctx.fillRect(x * gameState.zoom, y * gameState.zoom, gs * gameState.zoom, gs * gameState.zoom);
                    const flowerSeed = Math.sin(worldGX * 500 + worldGY * 300) * 0.5 + 0.5;
                    if (flowerSeed > 0.85 && !isPointInWater(x + cx + gs / 2, y + cy + gs / 2)) {
                        ctx.fillStyle = 'rgba(255,255,100,0.3)';
                        ctx.beginPath();
                        ctx.arc(x * gameState.zoom + gs * gameState.zoom * 0.7, y * gameState.zoom + gs * gameState.zoom * 0.3, 2 * gameState.zoom, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            if (alpha > 0) {
                ctx.fillStyle = 'rgba(0,0,20,' + alpha + ')';
                ctx.fillRect(0, 0, w, h);
            }
            if (alpha > 0.5) {
                for (let i = 0; i < 50; i++) {
                    const starX = ((i * 7919 + 12345) % w);
                    const starY = ((i * 6271 + 12345) % h);
                    const twinkle = Math.sin(gameState.gameTime * 0.003 + i) * 0.5 + 0.5;
                    ctx.fillStyle = 'rgba(255,255,255,' + (twinkle * (alpha - 0.5) * 1.5) + ')';
                    ctx.beginPath();
                    ctx.arc(starX, starY, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawWater(ctx) {
            for (let w = 0; w < gameState.waterBodies.length; w++) {
                const water = gameState.waterBodies[w];
                const points = water.points;
                const alpha = getDayNightAlpha();
                if (points.length < 3) continue;
                ctx.beginPath();
                const firstPoint = worldToScreen(points[0].x, points[0].y);
                ctx.moveTo(firstPoint.x, firstPoint.y);
                for (let i = 1; i < points.length; i++) {
                    const sp = worldToScreen(points[i].x, points[i].y);
                    ctx.lineTo(sp.x, sp.y);
                }
                ctx.closePath();
                let minX = Infinity,
                    minY = Infinity,
                    maxX = -Infinity,
                    maxY = -Infinity;
                for (let i = 0; i < points.length; i++) {
                    if (points[i].x < minX) minX = points[i].x;
                    if (points[i].y < minY) minY = points[i].y;
                    if (points[i].x > maxX) maxX = points[i].x;
                    if (points[i].y > maxY) maxY = points[i].y;
                }
                const centerScreen = worldToScreen((minX + maxX) / 2, (minY + maxY) / 2);
                const waterGrad = ctx.createRadialGradient(centerScreen.x, centerScreen.y, 0, centerScreen.x, centerScreen.y, water.baseRadius * gameState.zoom);
                waterGrad.addColorStop(0, 'rgba(30,100,180,' + (0.8 - alpha * 0.3) + ')');
                waterGrad.addColorStop(0.5, 'rgba(20,80,160,' + (0.75 - alpha * 0.3) + ')');
                waterGrad.addColorStop(1, 'rgba(10,50,130,' + (0.8 - alpha * 0.3) + ')');
                ctx.fillStyle = waterGrad;
                ctx.fill();
                const waveTime = gameState.gameTime * 0.02;
                for (let i = 0; i < points.length; i++) {
                    const p1 = points[i];
                    const p2 = points[(i + 1) % points.length];
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const screenMid = worldToScreen(midX, midY);
                    const waveOffset = Math.sin(waveTime + i * 0.5) * 5 * gameState.zoom;
                    ctx.fillStyle = 'rgba(100,180,240,0.3)';
                    ctx.beginPath();
                    ctx.arc(screenMid.x + waveOffset, screenMid.y, 4 * gameState.zoom, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.strokeStyle = 'rgba(150,210,255,0.5)';
                ctx.lineWidth = 2 * gameState.zoom;
                ctx.stroke();
                if (water.name && water.baseRadius > 50) {
                    const nameScreen = worldToScreen((minX + maxX) / 2, (minY + maxY) / 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.font = Math.min(16, 12 * gameState.zoom) + 'px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(water.name, nameScreen.x, nameScreen.y);
                }
            }
        }

        function drawBorder(ctx) {
            const bs = gameState.borderSize;
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = Math.max(2, 3 * gameState.zoom);
            ctx.setLineDash([10 * gameState.zoom, 6 * gameState.zoom]);
            ctx.beginPath();
            const segments = 32;
            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                const wobble = Math.sin(angle * 5 + gameState.gameTime * 0.001) * 15 + Math.cos(angle * 3) * 10;
                const r = bs + wobble;
                const wx = Math.cos(angle) * r;
                const wy = Math.sin(angle) * r;
                const p = worldToScreen(wx, wy);
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.setLineDash([]);
            const flags = ['🚩', '🚩', '🚩', '🚩'];
            for (let i = 0; i < 4; i++) {
                const angle = i * Math.PI / 2 - Math.PI / 4;
                const p = worldToScreen(Math.cos(angle) * bs, Math.sin(angle) * bs);
                ctx.font = Math.floor(16 * gameState.zoom) + 'px serif';
                ctx.textAlign = 'center';
                ctx.fillText(flags[i], p.x, p.y - 10 * gameState.zoom);
            }
            const pTable = worldToScreen(bs + 30, 0);
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(pTable.x - 40 * gameState.zoom, pTable.y - 20 * gameState.zoom, 80 * gameState.zoom, 35 * gameState.zoom);
            ctx.fillStyle = '#f0d060';
            ctx.font = Math.floor(12 * gameState.zoom) + 'px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('📏 Расширить', pTable.x, pTable.y - 5 * gameState.zoom);
            ctx.fillText('💰' + gameState.borderExpandCost.toLocaleString(), pTable.x, pTable.y + 15 * gameState.zoom);
        }

        function drawGrid(ctx) {
            const w = gameState.canvas.width;
            const h = gameState.canvas.height;
            const gs = gameState.gridSize;
            const cx = gameState.cameraX - w / 2 / gameState.zoom;
            const cy = gameState.cameraY - h / 2 / gameState.zoom;
            const sx = -(((cx % gs) + gs) % gs);
            const sy = -(((cy % gs) + gs) % gs);
            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = sx; x < w / gameState.zoom + gs; x += gs) {
                ctx.moveTo(x * gameState.zoom, 0);
                ctx.lineTo(x * gameState.zoom, h);
            }
            for (let y = sy; y < h / gameState.zoom + gs; y += gs) {
                ctx.moveTo(0, y * gameState.zoom);
                ctx.lineTo(w, y * gameState.zoom);
            }
            ctx.stroke();
        }

        function drawZones(ctx) {
            for (let i = 0; i < gameState.zones.length; i++) {
                const zone = gameState.zones[i];
                const p = worldToScreen(zone.x, zone.y);
                const w = zone.w * gameState.zoom;
                const h = zone.h * gameState.zoom;
                let color = 'rgba(76,175,80,0.3)';
                if (zone.type === 'commercial') color = 'rgba(33,150,243,0.3)';
                if (zone.type === 'industrial') color = 'rgba(255,152,0,0.3)';
                ctx.fillStyle = color;
                ctx.fillRect(p.x, p.y, w, h);
                ctx.strokeStyle = color.replace('0.3', '0.6');
                ctx.lineWidth = 1;
                ctx.setLineDash([4 * gameState.zoom, 4 * gameState.zoom]);
                ctx.strokeRect(p.x, p.y, w, h);
                ctx.setLineDash([]);
            }
        }

        function drawRoad(ctx, road, info) {
            const p = worldToScreen(road.x, road.y);
            const w = road.w * gameState.zoom;
            const h = road.h * gameState.zoom;
            ctx.save();
            const cx = p.x + w / 2;
            const cy = p.y + h / 2;
            ctx.translate(cx, cy);
            if (road.rotation) ctx.rotate(road.rotation * Math.PI / 180);
            ctx.translate(-cx, -cy);
            if (info.isRoadCurve) {
                ctx.fillStyle = '#444444';
                ctx.fillRect(p.x, p.y, w, h);
                ctx.strokeStyle = '#ffff88';
                ctx.lineWidth = Math.max(1, 2 * gameState.zoom);
                ctx.setLineDash([8 * gameState.zoom, 10 * gameState.zoom]);
                ctx.beginPath();
                ctx.arc(p.x + w, p.y, w * 0.7, 0, Math.PI / 2);
                ctx.stroke();
                ctx.setLineDash([]);
                const bw = Math.max(2, 3 * gameState.zoom);
                ctx.fillStyle = '#666666';
                ctx.fillRect(p.x, p.y, w, bw);
                ctx.fillRect(p.x, p.y + h - bw, w, bw);
                ctx.fillRect(p.x, p.y, bw, h);
                ctx.fillRect(p.x + w - bw, p.y, bw, h);
            } else if (info.isRoad) {
                ctx.fillStyle = '#444444';
                ctx.fillRect(p.x, p.y, w, h);
                const bw = Math.max(2, 3 * gameState.zoom);
                ctx.fillStyle = '#666666';
                ctx.fillRect(p.x, p.y, w, bw);
                ctx.fillRect(p.x, p.y + h - bw, w, bw);
                ctx.fillRect(p.x, p.y, bw, h);
                ctx.fillRect(p.x + w - bw, p.y, bw, h);
                ctx.strokeStyle = '#ffff88';
                ctx.lineWidth = Math.max(1, 2 * gameState.zoom);
                ctx.setLineDash([10 * gameState.zoom, 14 * gameState.zoom]);
                ctx.beginPath();
                ctx.moveTo(p.x + w / 2, p.y);
                ctx.lineTo(p.x + w / 2, p.y + h);
                ctx.stroke();
                ctx.setLineDash([]);
            } else {
                ctx.fillStyle = '#8B7355';
                ctx.fillRect(p.x, p.y, w, h);
                ctx.fillStyle = '#5c4030';
                const sh = Math.max(3, 4 * gameState.zoom);
                const sg = Math.max(5, 8 * gameState.zoom);
                for (let i = 0; i < h; i += sg) {
                    ctx.fillRect(p.x + 2 * gameState.zoom, p.y + i, w - 4 * gameState.zoom, sh);
                }
                ctx.strokeStyle = '#cccccc';
                ctx.lineWidth = Math.max(1.5, 2.5 * gameState.zoom);
                ctx.beginPath();
                const rx = p.x + Math.max(6, 8 * gameState.zoom);
                const rx2 = p.x + w - Math.max(6, 8 * gameState.zoom);
                ctx.moveTo(rx, p.y);
                ctx.lineTo(rx, p.y + h);
                ctx.moveTo(rx2, p.y);
                ctx.lineTo(rx2, p.y + h);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawBuildingShape(ctx, building, info) {
            const p = worldToScreen(building.x, building.y);
            const w = building.w * gameState.zoom;
            const h = building.h * gameState.zoom;
            const type = building.type;
            ctx.save();
            const cx = p.x + w / 2;
            const cy = p.y + h / 2;
            ctx.translate(cx, cy);
            if (building.rotation) ctx.rotate(building.rotation * Math.PI / 180);
            ctx.translate(-cx, -cy);
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(p.x + 2 * gameState.zoom, p.y + 2 * gameState.zoom, w, h);
            if (type === 'police_station') {
                ctx.fillStyle = '#3a5a8a';
                ctx.fillRect(p.x, p.y, w, h);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(p.x + 4 * gameState.zoom, p.y + 4 * gameState.zoom, w - 8 * gameState.zoom, h - 8 * gameState.zoom);
                ctx.fillStyle = '#1a3a6a';
                ctx.fillRect(p.x + 2 * gameState.zoom, p.y, w - 4 * gameState.zoom, 8 * gameState.zoom);
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(p.x + w / 2, p.y + h / 2, 10 * gameState.zoom, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1a3a6a';
                ctx.beginPath();
                ctx.arc(p.x + w / 2, p.y + h / 2, 6 * gameState.zoom, 0, Math.PI * 2);
                ctx.fill();
            } else if (type === 'fire_station') {
                ctx.fillStyle = '#c0392b';
                ctx.fillRect(p.x, p.y, w, h);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(p.x + 4 * gameState.zoom, p.y + 4 * gameState.zoom, w - 8 * gameState.zoom, h - 8 * gameState.zoom);
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(p.x + 2 * gameState.zoom, p.y, w - 4 * gameState.zoom, 8 * gameState.zoom);
            } else if (type === 'hospital') {
                ctx.fillStyle = '#f8f8f8';
                ctx.fillRect(p.x, p.y, w, h);
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(p.x + w / 2 - 8 * gameState.zoom, p.y, 16 * gameState.zoom, 12 * gameState.zoom);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(p.x + w / 2 - 2 * gameState.zoom, p.y + 2 * gameState.zoom, 4 * gameState.zoom, 8 * gameState.zoom);
                ctx.fillRect(p.x + w / 2 - 6 * gameState.zoom, p.y + 5 * gameState.zoom, 12 * gameState.zoom, 3 * gameState.zoom);
            } else if (type === 'school') {
                ctx.fillStyle = '#d4a574';
                ctx.fillRect(p.x, p.y + 4 * gameState.zoom, w, h - 4 * gameState.zoom);
                ctx.fillStyle = '#c0392b';
                ctx.fillRect(p.x - 2 * gameState.zoom, p.y, w + 4 * gameState.zoom, 10 * gameState.zoom);
                ctx.fillStyle = '#87ceeb';
                for (let i = 0; i < 4; i++) {
                    ctx.fillRect(p.x + 5 * gameState.zoom + i * 11 * gameState.zoom, p.y + 16 * gameState.zoom, 7 * gameState.zoom, 8 * gameState.zoom);
                }
            } else if (type === 'park') {
                ctx.fillStyle = '#5a8a5a';
                ctx.fillRect(p.x, p.y, w, h);
                const trees = [
                    [0.2, 0.25],
                    [0.5, 0.2],
                    [0.8, 0.3],
                    [0.3, 0.6],
                    [0.7, 0.65],
                    [0.5, 0.75]
                ];
                for (let i = 0; i < trees.length; i++) {
                    const tx = p.x + trees[i][0] * w;
                    const ty = p.y + trees[i][1] * h;
                    ctx.fillStyle = '#3d2b1f';
                    ctx.fillRect(tx - 1.5 * gameState.zoom, ty, 3 * gameState.zoom, 10 * gameState.zoom);
                    ctx.fillStyle = '#2d6e2d';
                    ctx.beginPath();
                    ctx.arc(tx, ty - 2 * gameState.zoom, 7 * gameState.zoom, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#3d8e3d';
                    ctx.beginPath();
                    ctx.arc(tx, ty - 5 * gameState.zoom, 6 * gameState.zoom, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = '#4a90c8';
                ctx.beginPath();
                ctx.ellipse(p.x + w * 0.5, p.y + h * 0.45, 12 * gameState.zoom, 7 * gameState.zoom, 0, 0, Math.PI * 2);
                ctx.fill();
            } else if (type === 'playground') {
                ctx.fillStyle = '#e8d5b7';
                ctx.fillRect(p.x, p.y, w, h);
                ctx.fillStyle = '#ff9800';
                ctx.fillRect(p.x + 4 * gameState.zoom, p.y + h - 12 * gameState.zoom, w - 8 * gameState.zoom, 4 * gameState.zoom);
                ctx.fillStyle = '#4CAF50';
                ctx.beginPath();
                ctx.arc(p.x + w / 2, p.y + h / 3, 8 * gameState.zoom, 0, Math.PI * 2);
                ctx.fill();
            } else if (type === 'fountain') {
                ctx.fillStyle = '#b0b0b0';
                ctx.fillRect(p.x, p.y, w, h);
                ctx.fillStyle = '#4a90c8';
                ctx.beginPath();
                ctx.arc(p.x + w / 2, p.y + h / 2, 10 * gameState.zoom, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#87ceeb';
                ctx.beginPath();
                ctx.arc(p.x + w / 2, p.y + h / 2, 5 * gameState.zoom, 0, Math.PI * 2);
                ctx.fill();
            } else if (type === 'statue_of_liberty') {
                ctx.fillStyle = '#4a8a5a';
                ctx.fillRect(p.x, p.y, w, h);
                ctx.fillStyle = '#7ec8a0';
                ctx.fillRect(p.x + w / 2 - 6 * gameState.zoom, p.y + 8 * gameState.zoom, 12 * gameState.zoom, h - 8 * gameState.zoom);
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(p.x + w / 2, p.y + 4 * gameState.zoom, 8 * gameState.zoom, 0, Math.PI * 2);
                ctx.fill();
            } else if (type === 'eiffel_tower') {
                ctx.fillStyle = '#4a8a5a';
                ctx.fillRect(p.x, p.y, w, h);
                ctx.fillStyle = '#888888';
                ctx.beginPath();
                ctx.moveTo(p.x + w / 2, p.y);
                ctx.lineTo(p.x + 4 * gameState.zoom, p.y + h);
                ctx.lineTo(p.x + w - 4 * gameState.zoom, p.y + h);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#aaaaaa';
                ctx.fillRect(p.x + w / 2 - 2 * gameState.zoom, p.y, 4 * gameState.zoom, h * 0.6);
            } else if (type === 'kremlin') {
                ctx.fillStyle = '#c0392b';
                ctx.fillRect(p.x, p.y + 10 * gameState.zoom, w, h - 10 * gameState.zoom);
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(p.x + 4 * gameState.zoom, p.y, w - 8 * gameState.zoom, 18 * gameState.zoom);
                for (let i = 0; i < 3; i++) {
                    ctx.fillStyle = '#f0d060';
                    ctx.beginPath();
                    ctx.arc(p.x + w * (0.25 + i * 0.25), p.y, 6 * gameState.zoom, Math.PI, 0);
                    ctx.fill();
                }
            } else if (type === 'stadium') {
                ctx.fillStyle = '#d0d0d0';
                ctx.fillRect(p.x, p.y, w, h);
                ctx.fillStyle = '#3a8a3a';
                ctx.beginPath();
                ctx.ellipse(p.x + w / 2, p.y + h / 2, w / 2 - 4 * gameState.zoom, h / 2 - 4 * gameState.zoom, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1;
                ctx.stroke();
            } else if (type === 'bus_stop') {
                ctx.fillStyle = '#888888';
                ctx.fillRect(p.x, p.y, w, h);
                ctx.fillStyle = '#4a90c8';
                ctx.fillRect(p.x + 2 * gameState.zoom, p.y + 2 * gameState.zoom, w - 4 * gameState.zoom, h - 8 * gameState.zoom);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(p.x + 4 * gameState.zoom, p.y + h - 6 * gameState.zoom, w - 8 * gameState.zoom, 4 * gameState.zoom);
            } else if (type === 'bus_depot') {
                ctx.fillStyle = '#708090';
                ctx.fillRect(p.x, p.y, w, h);
                ctx.fillStyle = '#4682B4';
                ctx.fillRect(p.x, p.y, w, 8 * gameState.zoom);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(p.x + 4 * gameState.zoom, p.y + 12 * gameState.zoom, w - 8 * gameState.zoom, h - 20 * gameState.zoom);
            } else if (type === 'carshop') {
                ctx.fillStyle = '#e0e0e0';
                ctx.fillRect(p.x, p.y, w, h);
                ctx.fillStyle = '#ff4444';
                ctx.fillRect(p.x + 2 * gameState.zoom, p.y, w - 4 * gameState.zoom, 6 * gameState.zoom);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(p.x + 4 * gameState.zoom, p.y + 10 * gameState.zoom, w - 8 * gameState.zoom, h - 22 * gameState.zoom);
            } else if (type === 'shipyard') {
                ctx.fillStyle = '#708090';
                ctx.fillRect(p.x, p.y, w, h);
                ctx.fillStyle = '#4682B4';
                ctx.fillRect(p.x, p.y, w, 8 * gameState.zoom);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(p.x + 4 * gameState.zoom, p.y + 12 * gameState.zoom, w - 8 * gameState.zoom, h - 20 * gameState.zoom);
                ctx.fillStyle = '#333333';
                ctx.font = Math.floor(16 * gameState.zoom) + 'px serif';
                ctx.textAlign = 'center';
                ctx.fillText('🚢', p.x + w * 0.5, p.y + h * 0.55);
            }
            ctx.restore();
        }

        function drawCars(ctx) {
            for (let i = 0; i < gameState.cars.length; i++) {
                const car = gameState.cars[i];
                const p = worldToScreen(car.x, car.y);
                if (p.x < -30 || p.x > gameState.canvas.width + 30 || p.y < -30 || p.y > gameState.canvas.height + 30) continue;
                const sz = 7 * gameState.zoom;
                ctx.fillStyle = car.color;
                ctx.fillRect(p.x - sz, p.y - sz / 2, sz * 2, sz);
                ctx.fillStyle = '#333333';
                ctx.fillRect(p.x - sz + 1.5 * gameState.zoom, p.y - sz / 2 - 1.5 * gameState.zoom, sz * 0.5, sz + 3 * gameState.zoom);
                ctx.fillStyle = '#111111';
                const wheels = [
                    [-sz * 0.6, -sz / 2],
                    [sz * 0.6, -sz / 2],
                    [-sz * 0.6, sz / 2],
                    [sz * 0.6, sz / 2]
                ];
                for (let w = 0; w < wheels.length; w++) {
                    ctx.beginPath();
                    ctx.arc(p.x + wheels[w][0], p.y + wheels[w][1], 2.5 * gameState.zoom, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = '#ffff88';
                ctx.beginPath();
                ctx.arc(p.x + sz, p.y, 1.5 * gameState.zoom, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawBoats(ctx) {
            for (let i = 0; i < gameState.boats.length; i++) {
                const boat = gameState.boats[i];
                const p = worldToScreen(boat.x, boat.y);
                if (p.x < -30 || p.x > gameState.canvas.width + 30 || p.y < -30 || p.y > gameState.canvas.height + 30) continue;
                const sz = 8 * gameState.zoom;
                ctx.fillStyle = boat.color;
                ctx.beginPath();
                ctx.ellipse(p.x, p.y, sz, sz * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(p.x - sz * 0.3, p.y - sz * 0.6, sz * 0.6, sz * 0.5);
                ctx.strokeStyle = '#333333';
                ctx.lineWidth = 1;
                ctx.strokeRect(p.x - sz * 0.3, p.y - sz * 0.6, sz * 0.6, sz * 0.5);
            }
        }

        function drawBuses(ctx) {
            for (let i = 0; i < gameState.buses.length; i++) {
                const bus = gameState.buses[i];
                const p = worldToScreen(bus.x, bus.y);
                if (p.x < -30 || p.x > gameState.canvas.width + 30 || p.y < -30 || p.y > gameState.canvas.height + 30) continue;
                const sz = 10 * gameState.zoom;
                ctx.fillStyle = bus.color;
                ctx.fillRect(p.x - sz * 1.5, p.y - sz / 2, sz * 3, sz);
                ctx.fillStyle = '#87ceeb';
                for (let j = 0; j < 4; j++) {
                    ctx.fillRect(p.x - sz * 1.2 + j * sz * 0.7, p.y - sz / 2 + 2 * gameState.zoom, sz * 0.5, sz - 4 * gameState.zoom);
                }
                ctx.fillStyle = '#111111';
                const wheels = [
                    [-sz * 1.2, -sz / 2],
                    [sz * 1.2, -sz / 2],
                    [-sz * 1.2, sz / 2],
                    [sz * 1.2, sz / 2]
                ];
                for (let w = 0; w < wheels.length; w++) {
                    ctx.beginPath();
                    ctx.arc(p.x + wheels[w][0], p.y + wheels[w][1], 3 * gameState.zoom, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawPeople(ctx) {
            for (let i = 0; i < gameState.people.length; i++) {
                const person = gameState.people[i];
                if (person.hasCar && person.carRef) continue;
                if (person.hasBoat && person.boatRef) continue;
                const wp = worldToScreen(person.x, person.y);
                if (wp.x < -20 || wp.x > gameState.canvas.width + 20 || wp.y < -20 || wp.y > gameState.canvas.height + 20) continue;
                const sz = person.size * gameState.zoom;
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(wp.x, wp.y + sz * 0.8, sz * 0.8, sz * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = person.color;
                ctx.beginPath();
                ctx.arc(wp.x, wp.y - sz * 0.5, sz * 0.6, 0, Math.PI * 2);
                ctx.fill();
                const hueMatch = person.color.match(/\d+/);
                const baseHue = hueMatch ? parseInt(hueMatch[0]) : 0;
                ctx.fillStyle = 'hsl(' + ((baseHue + 30) % 360) + ', 50%, 55%)';
                ctx.fillRect(wp.x - sz * 0.4, wp.y - sz * 0.2, sz * 0.8, sz * 0.9);
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(wp.x - sz * 0.2, wp.y - sz * 0.6, sz * 0.18, 0, Math.PI * 2);
                ctx.arc(wp.x + sz * 0.2, wp.y - sz * 0.6, sz * 0.18, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(wp.x - sz * 0.15, wp.y - sz * 0.6, sz * 0.08, 0, Math.PI * 2);
                ctx.arc(wp.x + sz * 0.25, wp.y - sz * 0.6, sz * 0.08, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawWeather(ctx) {
            const alpha = getDayNightAlpha();
            if (gameState.weather === 'rainy' || gameState.weather === 'stormy') {
                for (let i = 0; i < gameState.raindrops.length; i++) {
                    const drop = gameState.raindrops[i];
                    const p = worldToScreen(drop.x, drop.y);
                    ctx.strokeStyle = 'rgba(100,150,255,' + (0.6 - alpha * 0.3) + ')';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - drop.vx * 2, p.y + 8 * gameState.zoom);
                    ctx.stroke();
                }
            }
            if (gameState.weather === 'snowy') {
                for (let i = 0; i < gameState.snowflakes.length; i++) {
                    const flake = gameState.snowflakes[i];
                    const p = worldToScreen(flake.x, flake.y);
                    ctx.fillStyle = 'rgba(255,255,255,' + (0.8 - alpha * 0.2) + ')';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, flake.size * gameState.zoom, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawParticles(ctx) {
            gameState.particles = gameState.particles.filter(function(p) { return p.life > 0; });
            for (let i = 0; i < gameState.particles.length; i++) {
                const particle = gameState.particles[i];
                const wp = worldToScreen(particle.x, particle.y);
                ctx.fillStyle = 'rgba(' + particle.r + ',' + particle.g + ',' + particle.b + ',' + particle.life + ')';
                ctx.beginPath();
                ctx.arc(wp.x, wp.y, particle.size * gameState.zoom, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ==================== ИГРОВОЙ ЦИКЛ ====================
        function gameLoop(timestamp) {
            gameState.gameTime = timestamp;
            const ctx = gameState.ctx;
            const canvas = gameState.canvas;
            if (!canvas || !ctx) { requestAnimationFrame(gameLoop); return; }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            gameState.gameMinute += 0.05;
            if (gameState.gameMinute >= 60) { gameState.gameMinute = 0;
                gameState.gameHour++; if (gameState.gameHour >= 24) gameState.gameHour = 0; }
            gameState.weatherTimer++;
            if (gameState.weatherTimer >= gameState.weatherDuration) {
                gameState.weatherTimer = 0;
                gameState.weatherDuration = 500 + Math.random() * 1500;
                const weathers = ['sunny', 'sunny', 'cloudy', 'cloudy', 'rainy', 'rainy', 'stormy', 'snowy'];
                gameState.weather = weathers[Math.floor(Math.random() * weathers.length)];
            }
            if (gameState.weather === 'rainy' || gameState.weather === 'stormy') {
                if (gameState.raindrops.length < 60) gameState.raindrops.push({ x: (Math.random() - 0.5) * gameState.borderSize * 2, y: (Math.random() - 0.5) * gameState.borderSize * 2, vx: 2, vy: 8 });
                for (let i = 0; i < gameState.raindrops.length; i++) {
                    const drop = gameState.raindrops[i];
                    drop.x += drop.vx;
                    drop.y += drop.vy; if (drop.y > gameState.borderSize) drop.y = -gameState.borderSize;
                }
            } else gameState.raindrops = [];
            if (gameState.weather === 'snowy') {
                if (gameState.snowflakes.length < 40) gameState.snowflakes.push({ x: (Math.random() - 0.5) * gameState.borderSize * 2, y: (Math.random() - 0.5) * gameState.borderSize * 2, vx: (Math.random() - 0.5) * 0.5, vy: 1 + Math.random() * 2, size: 1 + Math.random() * 3 });
                for (let i = 0; i < gameState.snowflakes.length; i++) {
                    const flake = gameState.snowflakes[i];
                    flake.x += flake.vx;
                    flake.y += flake.vy; if (flake.y > gameState.borderSize) flake.y = -gameState.borderSize;
                }
            } else gameState.snowflakes = [];

            drawGround(ctx);
            drawWater(ctx);
            drawGrid(ctx);
            drawZones(ctx);
            drawBorder(ctx);
            for (let i = 0; i < gameState.roads.length; i++) {
                const road = gameState.roads[i];
                const info = buildingTypes[road.type] || buildingTypes.road;
                drawRoad(ctx, road, info);
            }
            for (let i = 0; i < gameState.rails.length; i++) {
                const rail = gameState.rails[i];
                drawRoad(ctx, rail, buildingTypes.rail);
            }
            for (let i = 0; i < gameState.buildings.length; i++) {
                const building = gameState.buildings[i];
                const info = buildingTypes[building.type];
                if (info) drawBuildingShape(ctx, building, info);
            }
            updateNPCs();
            drawPeople(ctx);
            drawCars(ctx);
            drawBoats(ctx);
            drawBuses(ctx);
            drawWeather(ctx);
            drawParticles(ctx);

            if ((gameState.selectedType || gameState.currentTool) && !gameState.dragging && !gameState.deleteMode && !gameState.selectMode) {
                if (gameState.currentTool && gameState.currentTool.startsWith('zone_')) {
                    const worldPos = screenToWorld(gameState.mouseX, gameState.mouseY);
                    const snap = gameState.gridSize;
                    const sx = Math.round(worldPos.x / snap) * snap;
                    const sy = Math.round(worldPos.y / snap) * snap;
                    const pp = worldToScreen(sx, sy);
                    const gs = gameState.gridSize * gameState.zoom;
                    let color = 'rgba(76,175,80,0.3)';
                    if (gameState.currentTool === 'zone_commercial') color = 'rgba(33,150,243,0.3)';
                    if (gameState.currentTool === 'zone_industrial') color = 'rgba(255,152,0,0.3)';
                    ctx.fillStyle = color;
                    ctx.fillRect(pp.x, pp.y, gs, gs);
                    ctx.strokeStyle = color.replace('0.3', '0.7');
                    ctx.lineWidth = 2 * gameState.zoom;
                    ctx.setLineDash([4 * gameState.zoom, 4 * gameState.zoom]);
                    ctx.strokeRect(pp.x, pp.y, gs, gs);
                    ctx.setLineDash([]);
                } else if (gameState.selectedType) {
                    const info = buildingTypes[gameState.selectedType];
                    const size = getBuildSize(gameState.selectedType, gameState.buildScale || 1);
                    const worldPos = screenToWorld(gameState.mouseX, gameState.mouseY);
                    const buildX = worldPos.x - size.w / 2;
                    const buildY = worldPos.y - size.h / 2;
                    const pp = worldToScreen(buildX, buildY);
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(pp.x, pp.y, size.w * gameState.zoom, size.h * gameState.zoom);
                    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                    ctx.setLineDash([5 * gameState.zoom, 5 * gameState.zoom]);
                    ctx.lineWidth = 2 * gameState.zoom;
                    ctx.strokeRect(pp.x, pp.y, size.w * gameState.zoom, size.h * gameState.zoom);
                    ctx.setLineDash([]);
                    ctx.save();
                    const ghostCX = pp.x + size.w * gameState.zoom / 2;
                    const ghostCY = pp.y + size.h * gameState.zoom / 2;
                    ctx.translate(ghostCX, ghostCY);
                    if (gameState.buildRotation) ctx.rotate(gameState.buildRotation * Math.PI / 180);
                    ctx.font = Math.floor(20 * gameState.zoom) + 'px serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(info.emoji, 0, 0);
                    ctx.restore();
                }
            }

            gameState.incomeTimer += 16;
            if (gameState.incomeTimer >= 3000) {
                gameState.incomeTimer = 0;
                let totalIncome = 0;
                for (let i = 0; i < gameState.buildings.length; i++) {
                    const building = gameState.buildings[i];
                    const info = buildingTypes[building.type];
                    const scale = building.scale || 1;
                    totalIncome += Math.floor((info ? info.income : 0) * scale);
                }
                totalIncome += gameState.roads.length * 5;
                totalIncome += gameState.rails.length * 20;
                totalIncome += gameState.cars.length * 10;
                totalIncome += gameState.boats.length * 30;
                totalIncome += gameState.buses.length * 50;
                gameState.money += totalIncome;
                gameState.happiness += (Math.random() - 0.47) * 0.4;
                gameState.happiness = Math.max(0, Math.min(100, gameState.happiness));
                updateUI();
            }

            gameState.zoneTimer += 16;
            if (gameState.zoneTimer >= 5000 && gameState.zones.length > 0) {
                gameState.zoneTimer = 0;
                for (let i = 0; i < gameState.zones.length; i++) {
                    const zone = gameState.zones[i];
                    if (Math.random() < 0.1) {
                        const services = checkServices(zone.x + zone.w / 2, zone.y + zone.h / 2);
                        if (gameState.residentialDemand > 0 && zone.type === 'residential' && services.police && services.fire && services.health) {
                            const house = { type: 'house', x: zone.x, y: zone.y, w: 44, h: 44, scale: 1, rotation: 0, placedAt: gameState.gameTime };
                            const allC = gameState.buildings.concat(gameState.roads).concat(gameState.rails);
                            let overlap = false;
                            for (let j = 0; j < allC.length; j++) { if (rectanglesOverlap(house, allC[j], 2)) { overlap = true; break; } }
                            if (!overlap && !isPointInWater(zone.x + 22, zone.y + 22)) {
                                gameState.buildings.push(house);
                                gameState.population += 8;
                                gameState.residentialDemand = Math.max(0, gameState.residentialDemand - 5);
                            }
                        }
                        if (gameState.commercialDemand > 0 && zone.type === 'commercial') {
                            const shop = { type: 'shop', x: zone.x, y: zone.y, w: 42, h: 42, scale: 1, rotation: 0, placedAt: gameState.gameTime };
                            const allC = gameState.buildings.concat(gameState.roads).concat(gameState.rails);
                            let overlap = false;
                            for (let j = 0; j < allC.length; j++) { if (rectanglesOverlap(shop, allC[j], 2)) { overlap = true; break; } }
                            if (!overlap && !isPointInWater(zone.x + 21, zone.y + 21)) {
                                gameState.buildings.push(shop);
                                gameState.population += 3;
                                gameState.commercialDemand = Math.max(0, gameState.commercialDemand - 5);
                            }
                        }
                        if (gameState.industrialDemand > 0 && zone.type === 'industrial') {
                            const factory = { type: 'factory', x: zone.x, y: zone.y, w: 52, h: 52, scale: 1, rotation: 0, placedAt: gameState.gameTime };
                            const allC = gameState.buildings.concat(gameState.roads).concat(gameState.rails);
                            let overlap = false;
                            for (let j = 0; j < allC.length; j++) { if (rectanglesOverlap(factory, allC[j], 2)) { overlap = true; break; } }
                            if (!overlap && !isPointInWater(zone.x + 26, zone.y + 26)) {
                                gameState.buildings.push(factory);
                                gameState.population += 20;
                                gameState.industrialDemand = Math.max(0, gameState.industrialDemand - 5);
                            }
                        }
                    }
                }
                gameState.residentialDemand += Math.random() * 2;
                gameState.commercialDemand += Math.random() * 1.5;
                gameState.industrialDemand += Math.random() * 1;
                updateUI();
            }

            gameState.demandTimer += 16;
            if (gameState.demandTimer >= 8000) {
                gameState.demandTimer = 0;
                gameState.residentialDemand = Math.min(100, gameState.residentialDemand + Math.random() * 5);
                gameState.commercialDemand = Math.min(100, gameState.commercialDemand + Math.random() * 4);
                gameState.industrialDemand = Math.min(100, gameState.industrialDemand + Math.random() * 3);
                updateUI();
            }

            requestAnimationFrame(gameLoop);
        }

        function checkServices(worldX, worldY) {
            const result = { police: false, fire: false, health: false, education: false };
            for (let i = 0; i < gameState.buildings.length; i++) {
                const b = gameState.buildings[i];
                const info = buildingTypes[b.type];
                if (!info || !info.serviceType) continue;
                const dist = Math.hypot(worldX - (b.x + b.w / 2), worldY - (b.y + b.h / 2));
                if (dist <= info.serviceRadius) {
                    result[info.serviceType] = true;
                }
            }
            return result;
        }

        // ==================== ОБНОВЛЕНИЕ NPC ====================
        function updateNPCs() {
            for (let i = 0; i < gameState.people.length; i++) {
                const person = gameState.people[i];
                if (person.hasCar && person.carRef) { person.x = person.carRef.x;
                    person.y = person.carRef.y; continue; }
                if (person.hasBoat && person.boatRef) { person.x = person.boatRef.x;
                    person.y = person.boatRef.y; continue; }
                person.stateTimer--;
                if (person.stateTimer <= 0) {
                    person.stateTimer = 80 + Math.random() * 300;
                    const targets = gameState.buildings.filter(function(b) { return buildingTypes[b.type] && !buildingTypes[b.type].isRoad && !buildingTypes[b.type].isRail && !buildingTypes[b.type].isRoadCurve; });
                    if (targets.length > 0 && Math.random() < 0.7) { person.target = targets[Math.floor(Math.random() * targets.length)];
                        person.state = 'visiting'; } else { person.target = null;
                        person.state = 'walking';
                        person.vx = (Math.random() - 0.5) * 1.5;
                        person.vy = (Math.random() - 0.5) * 1.5; }
                }
                if (person.state === 'visiting' && person.target) {
                    const dx = (person.target.x + person.target.w / 2) - person.x;
                    const dy = (person.target.y + person.target.h / 2) - person.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 12) { person.state = 'inside';
                        person.stateTimer = 100 + Math.random() * 300; } else { const sp = 1.5;
                        person.vx = dx / dist * sp;
                        person.vy = dy / dist * sp; }
                } else if (person.state === 'inside') { person.vx = 0;
                    person.vy = 0; }
                person.x += person.vx;
                person.y += person.vy; if (Math.abs(person.x) > gameState.borderSize) person.vx *= -1; if (Math.abs(person.y) > gameState.borderSize) person.vy *= -1;
            }
            for (let i = 0; i < gameState.cars.length; i++) {
                const car = gameState.cars[i]; if (car.parked) continue;
                car.x += car.vx;
                car.y += car.vy;
                let onRoad = false;
                for (let j = 0; j < gameState.roads.length; j++) { const r = gameState.roads[j]; if (car.x >= r.x && car.x <= r.x + r.w && car.y >= r.y && car.y <= r.y + r.h) { onRoad = true; break; } }
                if (!onRoad) {
                    let bestRoad = null,
                        bestDist = 99999;
                    for (let j = 0; j < gameState.roads.length; j++) { const r = gameState.roads[j]; const rx = r.x + r.w / 2,
                            ry = r.y + r.h / 2; const d = Math.hypot(car.x - rx, car.y - ry); if (d < bestDist) { bestDist = d;
                            bestRoad = r; } }
                    if (bestRoad) { const rx = bestRoad.x + bestRoad.w / 2,
                            ry = bestRoad.y + bestRoad.h / 2; const dx = rx - car.x,
                            dy = ry - car.y; const d = Math.sqrt(dx * dx + dy * dy); if (d > 0) { car.vx = dx / d * 2;
                            car.vy = dy / d * 2; } }
                }
                if (Math.abs(car.x) > gameState.borderSize || Math.abs(car.y) > gameState.borderSize) { car.vx *= -1;
                    car.vy = (Math.random() - 0.5) * 2; }
                if (Math.random() < 0.005) { const person = gameState.people.find(function(p) { return p.carRef === car; }); if (person && Math.random() < 0.3) { person.hasCar = false;
                        person.carRef = null;
                        person.x = car.x;
                        person.y = car.y;
                        car.parked = true;
                        setTimeout(function() { car.parked = false; if (Math.random() < 0.5) { const np = gameState.people.find(function(p) { return !p.hasCar && !p.hasBoat; }); if (np) { np.hasCar = true;
                                    np.carRef = car; } } }, 2000 + Math.random() * 3000); } }
            }
            for (let i = 0; i < gameState.boats.length; i++) {
                const boat = gameState.boats[i]; if (boat.parked) continue;
                boat.x += boat.vx;
                boat.y += boat.vy;
                let onWater = isPointInWater(boat.x, boat.y);
                if (!onWater) {
                    let bestW = null,
                        bestDist = 99999;
                    for (let j = 0; j < gameState.waterBodies.length; j++) { const w = gameState.waterBodies[j]; let minX = Infinity,
                            minY = Infinity,
                            maxX = -Infinity,
                            maxY = -Infinity; for (let k = 0; k < w.points.length; k++) { if (w.points[k].x < minX) minX = w.points[k].x; if (w.points[k].y < minY) minY = w.points[k].y; if (w.points[k].x > maxX) maxX = w.points[k].x; if (w.points[k].y > maxY) maxY = w.points[k].y; } const wx = (minX + maxX) / 2,
                            wy = (minY + maxY) / 2; const d = Math.hypot(boat.x - wx, boat.y - wy); if (d < bestDist) { bestDist = d;
                            bestW = w; } }
                    if (bestW) { let minX = Infinity,
                            minY = Infinity,
                            maxX = -Infinity,
                            maxY = -Infinity; for (let k = 0; k < bestW.points.length; k++) { if (bestW.points[k].x < minX) minX = bestW.points[k].x; if (bestW.points[k].y < minY) minY = bestW.points[k].y; if (bestW.points[k].x > maxX) maxX = bestW.points[k].x; if (bestW.points[k].y > maxY) maxY = bestW.points[k].y; } const wx = (minX + maxX) / 2,
                            wy = (minY + maxY) / 2; const dx = wx - boat.x,
                            dy = wy - boat.y; const d = Math.sqrt(dx * dx + dy * dy); if (d > 0) { boat.vx = dx / d * 2;
                            boat.vy = dy / d * 2; } }
                }
                if (Math.random() < 0.01) { boat.vx = (Math.random() - 0.5) * 2;
                    boat.vy = (Math.random() - 0.5) * 2; }
            }
            for (let i = 0; i < gameState.buses.length; i++) {
                const bus = gameState.buses[i]; if (bus.parked) continue;
                bus.x += bus.vx;
                bus.y += bus.vy;
                let onRoad = false;
                for (let j = 0; j < gameState.roads.length; j++) { const r = gameState.roads[j]; if (bus.x >= r.x && bus.x <= r.x + r.w && bus.y >= r.y && bus.y <= r.y + r.h) { onRoad = true; break; } }
                if (!onRoad) {
                    let bestRoad = null,
                        bestDist = 99999;
                    for (let j = 0; j < gameState.roads.length; j++) { const r = gameState.roads[j]; const rx = r.x + r.w / 2,
                            ry = r.y + r.h / 2; const d = Math.hypot(bus.x - rx, bus.y - ry); if (d < bestDist) { bestDist = d;
                            bestRoad = r; } }
                    if (bestRoad) { const rx = bestRoad.x + bestRoad.w / 2,
                            ry = bestRoad.y + bestRoad.h / 2; const dx = rx - bus.x,
                            dy = ry - bus.y; const d = Math.sqrt(dx * dx + dy * dy); if (d > 0) { bus.vx = dx / d * 1.5;
                            bus.vy = dy / d * 1.5; } }
                }
                if (Math.abs(bus.x) > gameState.borderSize || Math.abs(bus.y) > gameState.borderSize) { bus.vx *= -1;
                    bus.vy = (Math.random() - 0.5) * 1.5; }
            }
            if (gameState.buildings.some(function(b) { return b.type === 'carshop'; }) && gameState.roads.length > 0 && gameState.cars.length < 15 && Math.random() < 0.005) {
                const shop = gameState.buildings.find(function(b) { return b.type === 'carshop'; });
                if (shop) {
                    const car = { x: shop.x + shop.w / 2, y: shop.y + shop.h / 2, vx: 2, vy: 0, color: 'hsl(' + Math.floor(Math.random() * 360) + ',70%,55%)', parked: false, homeRef: shop };
                    gameState.cars.push(car);
                    const person = gameState.people.find(function(p) { return !p.hasCar && !p.hasBoat; });
                    if (person) { person.hasCar = true;
                        person.carRef = car; }
                }
            }
            if (gameState.buildings.some(function(b) { return b.type === 'shipyard'; }) && gameState.waterBodies.length > 0 && gameState.boats.length < 8 && Math.random() < 0.003) {
                const yard = gameState.buildings.find(function(b) { return b.type === 'shipyard'; });
                if (yard) {
                    let nearestWater = null;
                    for (let i = 0; i < gameState.waterBodies.length; i++) { const w = gameState.waterBodies[i]; let minX = Infinity,
                            minY = Infinity,
                            maxX = -Infinity,
                            maxY = -Infinity; for (let j = 0; j < w.points.length; j++) { if (w.points[j].x < minX) minX = w.points[j].x; if (w.points[j].y < minY) minY = w.points[j].y; if (w.points[j].x > maxX) maxX = w.points[j].x; if (w.points[j].y > maxY) maxY = w.points[j].y; } if (yard.x >= minX && yard.x <= maxX && yard.y >= minY && yard.y <= maxY) { nearestWater = w; break; } }
                    if (nearestWater) { let minX = Infinity,
                            minY = Infinity,
                            maxX = -Infinity,
                            maxY = -Infinity; for (let j = 0; j < nearestWater.points.length; j++) { if (nearestWater.points[j].x < minX) minX = nearestWater.points[j].x; if (nearestWater.points[j].y < minY) minY = nearestWater.points[j].y; if (nearestWater.points[j].x > maxX) maxX = nearestWater.points[j].x; if (nearestWater.points[j].y > maxY) maxY = nearestWater.points[j].y; } const boat = { x: (minX + maxX) / 2, y: (minY + maxY) / 2, vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2, color: 'hsl(' + Math.floor(Math.random() * 360) + ',50%,50%)', parked: false, homeRef: yard };
                        gameState.boats.push(boat);
                        const person = gameState.people.find(function(p) { return !p.hasBoat && !p.hasCar; }); if (person) { person.hasBoat = true;
                            person.boatRef = boat; } }
                }
            }
            if (gameState.buildings.some(function(b) { return b.type === 'bus_depot'; }) && gameState.buildings.some(function(b) { return b.type === 'bus_stop'; }) && gameState.roads.length > 0 && gameState.buses.length < 5 && Math.random() < 0.003) {
                const depot = gameState.buildings.find(function(b) { return b.type === 'bus_depot'; });
                if (depot) {
                    const bus = { x: depot.x + depot.w / 2, y: depot.y + depot.h / 2, vx: 1.5, vy: 0, color: '#4a90c8', parked: false, homeRef: depot };
                    gameState.buses.push(bus);
                }
            }
        }

        function spawnParticles(worldX, worldY, colorHex) {
            const hex = colorHex || '#f0d060';
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            for (let i = 0; i < 25; i++) {
                gameState.particles.push({
                    x: worldX,
                    y: worldY,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5 - 4,
                    life: 1,
                    size: Math.random() * 5 + 2,
                    r: r,
                    g: g,
                    b: b,
                });
            }
        }

        // ==================== СОБЫТИЯ ====================
        document.addEventListener('mousemove', function(event) {
            if (!gameState.canvas || !gameState.countryName) return;
            const coords = getCanvasCoords(event);
            gameState.mouseX = coords.sx;
            gameState.mouseY = coords.sy;
            if (gameState.dragging) {
                const dx = event.clientX - gameState.dragStartX;
                const dy = event.clientY - gameState.dragStartY;
                gameState.cameraX -= dx / gameState.zoom;
                gameState.cameraY -= dy / gameState.zoom;
                gameState.dragStartX = event.clientX;
                gameState.dragStartY = event.clientY;
                gameState.dragDistance += Math.abs(dx) + Math.abs(dy);
            }
            const worldPos = screenToWorld(coords.sx, coords.sy);
            gameState.hoveredBuilding = findBuildingAt(worldPos.x, worldPos.y);
            updateInfoPopup(coords.sx, coords.sy);
        });

        document.addEventListener('mousedown', function(event) {
            if (!gameState.canvas || !gameState.countryName) return;
            if (event.target.closest('#bottom-panel') || event.target.closest('#top-bar') || event.target.closest('#build-modal')) return;
            if (event.button === 0) {
                const worldPos = getWorldFromEvent(event);
                gameState.mouseX = worldPos.sx;
                gameState.mouseY = worldPos.sy;
                if (gameState.deleteMode) { if (deleteAt(worldPos.wx, worldPos.wy)) return; }
                if (gameState.currentTool && gameState.currentTool.startsWith('zone_')) { if (placeZone(worldPos.wx, worldPos.wy)) return; }
                if (gameState.selectedType && !gameState.selectMode) { if (buildAt(worldPos.wx, worldPos.wy)) return; }
                gameState.dragging = true;
                gameState.dragStartX = event.clientX;
                gameState.dragStartY = event.clientY;
                gameState.dragDistance = 0;
                updateUI();
            }
        });

        document.addEventListener('mouseup', function(event) {
            if (!gameState.canvas || !gameState.countryName) return;
            if (gameState.dragging && gameState.dragDistance < 3) {
                const worldPos = getWorldFromEvent(event);
                if (gameState.deleteMode) deleteAt(worldPos.wx, worldPos.wy);
                else if (gameState.currentTool && gameState.currentTool.startsWith('zone_')) placeZone(worldPos.wx, worldPos.wy);
                else if (gameState.selectedType && !gameState.selectMode) buildAt(worldPos.wx, worldPos.wy);
            }
            gameState.dragging = false;
            gameState.dragDistance = 0;
            updateUI();
        });

        document.addEventListener('contextmenu', function(event) { if (event.target.closest('#game-canvas')) event.preventDefault(); });

        document.addEventListener('wheel', function(event) {
            if (!gameState.canvas || !gameState.countryName || event.target.closest('#build-modal')) return;
            event.preventDefault();
            const rect = gameState.canvas.getBoundingClientRect();
            const mx = event.clientX - rect.left;
            const my = event.clientY - rect.top;
            const worldBefore = screenToWorld(mx, my);
            const zf = 1.07;
            if (event.deltaY < 0) gameState.zoom = Math.min(3, gameState.zoom * zf);
            else gameState.zoom = Math.max(0.25, gameState.zoom / zf);
            gameState.gridSize = Math.round(48 * gameState.zoom);
            const worldAfter = screenToWorld(mx, my);
            gameState.cameraX += worldBefore.x - worldAfter.x;
            gameState.cameraY += worldBefore.y - worldAfter.y;
        }, { passive: false });

        document.addEventListener('touchstart', function(event) {
            if (!gameState.canvas || !gameState.countryName) return;
            if (event.target.closest('#bottom-panel') || event.target.closest('#top-bar') || event.target.closest('#build-modal')) return;
            if (event.touches.length === 2) {
                gameState.dragging = false;
                gameState.touchDistance = Math.hypot(event.touches[0].clientX - event.touches[1].clientX, event.touches[0].clientY - event.touches[1].clientY);
                gameState.lastPinchZoom = gameState.zoom;
                return;
            }
            if (event.touches.length === 1) {
                const touch = event.touches[0];
                const rect = gameState.canvas.getBoundingClientRect();
                gameState.mouseX = touch.clientX - rect.left;
                gameState.mouseY = touch.clientY - rect.top;
                gameState.dragStartX = touch.clientX;
                gameState.dragStartY = touch.clientY;
                gameState.dragDistance = 0;
                gameState.dragging = true;
                gameState.touchStartTime = Date.now();
                updateUI();
            }
        }, { passive: false });

        document.addEventListener('touchmove', function(event) {
            if (!gameState.canvas || !gameState.countryName) return;
            if (event.touches.length === 2) {
                event.preventDefault();
                const dist = Math.hypot(event.touches[0].clientX - event.touches[1].clientX, event.touches[0].clientY - event.touches[1].clientY);
                gameState.zoom = Math.max(0.25, Math.min(3, gameState.lastPinchZoom * (dist / gameState.touchDistance)));
                gameState.gridSize = Math.round(48 * gameState.zoom);
            } else if (event.touches.length === 1 && gameState.dragging) {
                const dx = event.touches[0].clientX - gameState.dragStartX;
                const dy = event.touches[0].clientY - gameState.dragStartY;
                gameState.cameraX -= dx / gameState.zoom;
                gameState.cameraY -= dy / gameState.zoom;
                gameState.dragStartX = event.touches[0].clientX;
                gameState.dragStartY = event.touches[0].clientY;
                gameState.dragDistance += Math.abs(dx) + Math.abs(dy);
                const rect = gameState.canvas.getBoundingClientRect();
                gameState.mouseX = event.touches[0].clientX - rect.left;
                gameState.mouseY = event.touches[0].clientY - rect.top;
            }
        }, { passive: false });

        document.addEventListener('touchend', function(event) {
            if (!gameState.canvas || !gameState.countryName) return;
            const wasTap = gameState.dragDistance < 8 && (Date.now() - gameState.touchStartTime) < 300;
            if (wasTap && event.changedTouches.length === 1) {
                const worldPos = getWorldFromEvent(event.changedTouches[0]);
                if (gameState.deleteMode) deleteAt(worldPos.wx, worldPos.wy);
                else if (gameState.currentTool && gameState.currentTool.startsWith('zone_')) placeZone(worldPos.wx, worldPos.wy);
                else if (gameState.selectedType && !gameState.selectMode) buildAt(worldPos.wx, worldPos.wy);
            }
            gameState.dragging = false;
            gameState.dragDistance = 0;
            updateUI();
        });

        document.addEventListener('keydown', function(event) {
            if (!gameState.countryName) return;
            if (event.key === 'Escape') { gameState.selectedType = null;
                gameState.currentTool = null;
                gameState.deleteMode = false;
                gameState.selectMode = false;
                closeBuildModal();
                updateUI(); }
            if (event.key === 'Delete' || event.key === 'Backspace') { event.preventDefault();
                toggleDeleteMode(); }
            if (event.key === 'b' || event.key === 'B') openBuildModal();
            if (event.key === 'i' || event.key === 'I') toggleSelectMode();
            if (event.key === 'r' || event.key === 'R' || event.key === 'к' || event.key === 'К') { event.preventDefault();
                rotateBuilding(); }
            if (event.key === '1') setTool('zone_residential');
            if (event.key === '2') setTool('zone_commercial');
            if (event.key === '3') setTool('zone_industrial');
        });

        document.getElementById('build-modal').addEventListener('click', function(event) { if (event.target === this) closeBuildModal(); });

        document.getElementById('modal-tabs').addEventListener('click', function(event) {
            if (event.target.classList.contains('modal-tab')) {
                document.querySelectorAll('#modal-tabs .modal-tab').forEach(function(tab) { tab.classList.remove('active'); });
                event.target.classList.add('active');
                currentModalTab = event.target.dataset.tab;
                modalBuilt = false;
                buildModalGrid();
            }
        });

        document.getElementById('size-selector').addEventListener('click', function(event) {
            if (event.target.classList.contains('size-btn')) {
                gameState.buildScale = parseFloat(event.target.dataset.scale);
                buildModalGrid();
            }
        });

        function updateInfoPopup(screenX, screenY) {
            const popup = document.getElementById('info-popup');
            if (gameState.hoveredBuilding && !gameState.dragging && (gameState.selectMode || (!gameState.selectedType && !gameState.deleteMode && !gameState.currentTool))) {
                const building = gameState.hoveredBuilding;
                const info = buildingTypes[building.type];
                if (!info) { popup.style.display = 'none'; return; }
                const scale = building.scale || 1;
                const cost = getBuildCost(building.type, scale);
                const income = Math.floor((info.income || 0) * scale);
                popup.style.display = 'block';
                popup.style.left = Math.min(screenX + 22, window.innerWidth - 280) + 'px';
                popup.style.top = Math.max(10, screenY - 30) + 'px';
                let html = '<span class="pop-title">' + (info.emoji || '?') + ' ' + (info.name || 'Объект') + '</span>';
                html += '📏 ' + building.w + 'x' + building.h + ' (x' + scale + ') 🔄' + (building.rotation || 0) + '°<br>';
                html += '💰 Цена: ' + cost.toLocaleString() + '<br>';
                html += '📈 Доход: 💰' + income.toLocaleString() + '/мес<br>';
                if (info.serviceType) html += '🔔 Тип: ' + info.serviceType + '<br>';
                if (info.happinessBonus) html += '😊 Счастье: +' + Math.floor((info.happinessBonus || 0) * scale) + '<br>';
                popup.innerHTML = html;
            } else {
                popup.style.display = 'none';
            }
        }

        function addLog(message) {
            const logContainer = document.getElementById('message-log');
            const messageElement = document.createElement('div');
            messageElement.className = 'log-msg';
            messageElement.textContent = message;
            logContainer.appendChild(messageElement);
            setTimeout(function() { messageElement.remove(); }, 3500);
            if (logContainer.children.length > 6) logContainer.firstChild.remove();
        }

        function shakeEl(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.style.animation = 'shake 0.4s ease';
            setTimeout(function() { el.style.animation = ''; }, 400);
        }

        function showHelp() {
            alert('🎮 PRESIDENT SIMULATOR - THEOTOWN EDITION\n\n' +
                '🏘️ ЗОНИРОВАНИЕ:\n' +
                '• Кнопки Жилая/Коммерция/Индустрия\n' +
                '• Или клавиши 1, 2, 3\n' +
                '• Выделите зону — здания вырастут сами!\n\n' +
                '🏗️ СПЕЦПОСТРОЙКИ:\n' +
                '• Дороги, службы, парки, достопримечательности\n' +
                '• Транспорт (автобусы, автосалон)\n\n' +
                '🚒 СЛУЖБЫ:\n' +
                '• Полиция, пожарные, больницы, школы\n' +
                '• Необходимы для роста зон\n\n' +
                '📈 СПРОС:\n' +
                '• R — жилой, C — коммерческий, I — индустриальный\n' +
                '• Растёт со временем\n\n' +
                '⌨️ КЛАВИШИ:\n' +
                '• 1/2/3 — зоны\n' +
                '• B — спецпостройки\n' +
                '• R — поворот\n' +
                '• Delete — снос\n' +
                '• I — информация\n\n' +
                '🌊 Водоёмы генерируются случайно\n' +
                '🌤️ Погода и день/ночь\n' +
                '💾 Автосохранение каждые 30 сек');
        }

        const shakeCSS = document.createElement('style');
        shakeCSS.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-3px)}}';
        document.head.appendChild(shakeCSS);

        console.log('🏛️ President Simulator - TheoTown Edition ГОТОВ!');
        console.log('✅ Зонирование (жилое, коммерческое, индустриальное)');
        console.log('✅ Городские службы (полиция, пожарные, больницы, школы)');
        console.log('✅ Парки и достопримечательности');
        console.log('✅ Транспорт (автобусы, автосалон, судостроительный)');
        console.log('✅ Система спроса');
        console.log('✅ Кривые водоёмы');
        console.log('✅ День/ночь и погода');
        console.log('✅ NPC, машины, лодки, автобусы');
        console.log('✅ Сохранения');
    </script>
