<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>President Simulator 2D - Полная версия</title>
    <style>
        :root {
            --bg: #0a0a14;
            --panel: #1a1a2e;
            --accent: #f0c040;
            --gold: #e8c547;
            --text: #e8e8e8;
            --border: #2e2e4e;
            --hover: #2a2a50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #060610;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            position: fixed;
        }

        #splash {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: radial-gradient(ellipse at 50% 30%, #1a1040 0%, #060610 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        #splash.hidden {
            display: none;
        }

        .splash-stars {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .splash-title {
            font-size: clamp(2em, 5vw, 3.2em);
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(180deg, #ffe08a, #c8943e, #8b5e14);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            filter: drop-shadow(0 4px 20px rgba(200, 150, 50, 0.4));
            animation: titleGlow 2s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% {
                filter: drop-shadow(0 4px 20px rgba(200, 150, 50, 0.4));
            }
            50% {
                filter: drop-shadow(0 4px 35px rgba(240, 200, 80, 0.7));
            }
        }

        .splash-subtitle {
            color: #b0a0c0;
            font-size: clamp(0.9em, 2vw, 1.1em);
            letter-spacing: 2px;
        }

        .splash-form {
            background: rgba(20, 18, 40, 0.9);
            border: 1px solid #3a3050;
            border-radius: 20px;
            padding: clamp(20px, 4vw, 32px) clamp(24px, 5vw, 40px);
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: min(440px, 90vw);
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }

        .splash-form label {
            font-weight: 700;
            color: #d4b060;
            font-size: 0.95em;
        }

        .splash-form input {
            background: #121025;
            border: 2px solid #3a3050;
            color: #fff;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 1.1em;
            transition: 0.3s;
            outline: none;
        }

        .splash-form input:focus {
            border-color: #e8c547;
            box-shadow: 0 0 25px rgba(232, 197, 71, 0.25);
        }

        .btn-create {
            background: linear-gradient(180deg, #f0c040, #b8781a);
            border: none;
            color: #1a1020;
            font-weight: 800;
            font-size: 1.2em;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 1.5px;
            transition: 0.3s;
            margin-top: 8px;
            text-transform: uppercase;
        }

        .btn-create:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(240, 192, 64, 0.45);
        }

        .splash-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-load {
            background: rgba(40, 35, 70, 0.8);
            border: 1px solid #3a3050;
            color: #ccc;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: 0.9em;
        }

        .btn-load:hover {
            background: #3a3050;
            border-color: #c8943e;
        }

        #game-screen {
            display: none;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            position: relative;
            flex-direction: column;
        }

        #game-screen.active {
            display: flex;
        }

        #top-bar {
            z-index: 100;
            background: linear-gradient(180deg, rgba(18, 15, 35, 0.97), rgba(14, 12, 28, 0.95));
            backdrop-filter: blur(15px);
            border-bottom: 1px solid #2e2e4e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            min-height: 50px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .country-name-display {
            font-weight: 800;
            font-size: clamp(0.9em, 2.5vw, 1.25em);
            background: linear-gradient(180deg, #ffe08a, #c8943e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .resources {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .resource {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 700;
            font-size: clamp(0.7em, 1.8vw, 0.95em);
        }

        .res-icon {
            font-size: 1.2em;
        }

        .res-money {
            color: #f0d060;
        }

        .res-pop {
            color: #6dc8e8;
        }

        .res-happy {
            color: #6ce89c;
        }

        .top-buttons {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-top {
            background: rgba(40, 35, 70, 0.8);
            border: 1px solid #3a3050;
            color: #ccc;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: clamp(0.7em, 1.5vw, 0.85em);
        }

        .btn-top:hover {
            background: #3a3050;
            border-color: #c8943e;
        }

        .time-weather {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8em;
            color: #ccc;
        }

        .time-display {
            color: #f0d060;
            font-weight: 700;
        }

        .weather-display {
            font-size: 1.2em;
        }

        #game-canvas {
            flex: 1;
            cursor: grab;
            display: block;
            touch-action: none;
            min-height: 0;
        }

        #game-canvas.building {
            cursor: crosshair;
        }

        #game-canvas.grabbing {
            cursor: grabbing;
        }

        #bottom-panel {
            z-index: 100;
            background: rgba(16, 14, 30, 0.96);
            backdrop-filter: blur(15px);
            border-top: 1px solid #2e2e4e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 10px;
            min-height: 55px;
            flex-wrap: wrap;
        }

        .bottom-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 8px 14px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            background: rgba(30, 25, 55, 0.7);
            font-weight: 700;
            font-size: 0.75em;
            color: #ddd;
            min-width: 55px;
            text-align: center;
        }

        .bottom-btn:active {
            transform: scale(0.95);
        }

        .bottom-btn.active {
            border-color: #f0d060 !important;
            background: rgba(200, 160, 50, 0.25) !important;
        }

        .bottom-btn.danger {
            border-color: #802020;
            color: #f08888;
        }

        .bottom-btn.danger.active {
            border-color: #f04444 !important;
            background: rgba(180, 40, 40, 0.4) !important;
        }

        .bottom-btn-icon {
            font-size: 1.6em;
            line-height: 1;
        }

        .bottom-btn-label {
            font-size: 0.7em;
        }

        #build-modal {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #build-modal.open {
            display: flex;
        }

        .modal-content {
            background: #1a1830;
            border: 1px solid #3a3050;
            border-radius: 20px;
            padding: 20px;
            max-width: 650px;
            width: 95vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
        }

        .modal-title {
            font-weight: 800;
            font-size: 1.2em;
            color: #f0d060;
            text-align: center;
            margin-bottom: 16px;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 8px;
        }

        .modal-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 10px 6px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.15s;
            border: 2px solid transparent;
            background: rgba(30, 25, 55, 0.6);
            text-align: center;
        }

        .modal-item.selected {
            border-color: #f0d060 !important;
            background: rgba(200, 160, 50, 0.25) !important;
        }

        .modal-item-emoji {
            font-size: 2em;
        }

        .modal-item-name {
            font-size: 0.75em;
            font-weight: 600;
            color: #ddd;
        }

        .modal-item-cost {
            font-size: 0.7em;
            color: #f0d060;
            font-weight: 700;
        }

        .modal-close {
            display: block;
            margin: 16px auto 0;
            background: #3a3050;
            border: none;
            color: #fff;
            padding: 10px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
        }

        .modal-close:hover {
            background: #5a4070;
        }

        .size-selector {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .size-btn {
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #3a3050;
            background: rgba(30, 25, 55, 0.6);
            color: #ccc;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.78em;
            transition: 0.15s;
        }

        .size-btn.selected {
            border-color: #f0d060 !important;
            background: rgba(200, 160, 50, 0.3) !important;
            color: #f0d060;
        }

        .rotate-info {
            text-align: center;
            color: #8af;
            font-size: 0.75em;
            margin-top: 4px;
        }

        #info-popup {
            position: absolute;
            pointer-events: none;
            z-index: 150;
            background: rgba(15, 12, 35, 0.97);
            border: 2px solid #5a5080;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 0.9em;
            display: none;
            white-space: nowrap;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.8);
            line-height: 1.7;
            color: #f0f0f0;
        }

        #info-popup .pop-title {
            font-weight: 800;
            color: #ffd700;
            font-size: 1.1em;
            display: block;
            margin-bottom: 4px;
        }

        #message-log {
            position: absolute;
            top: 60px;
            right: 10px;
            z-index: 110;
            display: flex;
            flex-direction: column;
            gap: 4px;
            pointer-events: none;
            max-width: 280px;
        }

        .log-msg {
            background: rgba(0, 0, 0, 0.9);
            border-left: 3px solid #f0c040;
            padding: 7px 12px;
            border-radius: 6px;
            font-size: 0.8em;
            animation: fadeInOut 3.5s forwards;
            font-weight: 500;
            color: #e0e0e0;
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translateX(20px);
            }
            12% {
                opacity: 1;
                transform: translateX(0);
            }
            75% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateX(20px);
            }
        }

        @media (max-width: 768px) {
            #top-bar {
                padding: 4px 6px;
                min-height: 40px;
            }
            .resources {
                gap: 5px;
            }
            .resource {
                font-size: 0.6em;
            }
            .btn-top {
                padding: 4px 6px;
                font-size: 0.6em;
            }
            #bottom-panel {
                gap: 4px;
                padding: 5px 6px;
                min-height: 48px;
            }
            .bottom-btn {
                padding: 5px 8px;
                min-width: 42px;
                font-size: 0.65em;
            }
        }
    </style>
</head>
<body>
    <div id="splash">
        <canvas class="splash-stars" id="splash-stars"></canvas>
        <div class="splash-title">🏛️ PRESIDENT<br>SIMULATOR</div>
        <div class="splash-subtitle">Постройте страну своей мечты</div>
        <div class="splash-form">
            <label for="country-name">📜 Название государства</label>
            <input type="text" id="country-name" placeholder="Введите название..." maxlength="28" value="Великоречье">
            <button class="btn-create" onclick="startGame()">🌟 ОСНОВАТЬ ГОСУДАРСТВО</button>
            <div class="splash-buttons">
                <button class="btn-load" onclick="loadGame()">💾 Загрузить</button>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <div id="top-bar">
            <div class="country-name-display" id="display-country-name">🏛️ Великоречье</div>
            <div class="resources">
                <div class="resource"><span class="res-icon">💰</span> <span class="res-money" id="money-val">50000</span></div>
                <div class="resource"><span class="res-icon">👥</span> <span class="res-pop" id="pop-val">100</span></div>
                <div class="resource"><span class="res-icon">😊</span> <span class="res-happy" id="happy-val">75</span>%</div>
            </div>
            <div class="top-buttons">
                <div class="time-weather">
                    <span class="weather-display" id="weather-icon">☀️</span>
                    <span class="time-display" id="time-display">17:26</span>
                </div>
                <button class="btn-top" onclick="expandBorder()">📏 Граница</button>
                <button class="btn-top" onclick="saveGame()">💾</button>
                <button class="btn-top" onclick="showHelp()">❓</button>
            </div>
        </div>

        <canvas id="game-canvas"></canvas>

        <div id="info-popup"></div>
        <div id="message-log"></div>

        <div id="bottom-panel">
            <button class="bottom-btn" id="btn-build" onclick="openBuildModal()">
                <span class="bottom-btn-icon">🏗️</span><span class="bottom-btn-label">Построить</span>
            </button>
            <button class="bottom-btn" id="btn-rotate" onclick="rotateBuilding()">
                <span class="bottom-btn-icon">🔄</span><span class="bottom-btn-label">Поворот</span>
            </button>
            <button class="bottom-btn danger" id="btn-delete" onclick="toggleDeleteMode()">
                <span class="bottom-btn-icon">🗑️</span><span class="bottom-btn-label">Снести</span>
            </button>
            <button class="bottom-btn" id="btn-select" onclick="toggleSelectMode()">
                <span class="bottom-btn-icon">🔍</span><span class="bottom-btn-label">Инфо</span>
            </button>
        </div>

        <div id="build-modal">
            <div class="modal-content">
                <div class="modal-title">🏗️ Выберите что построить</div>
                <div class="modal-grid" id="modal-grid"></div>
                <div style="text-align:center;color:#aaa;margin-top:12px;">📏 Размер:</div>
                <div class="size-selector" id="size-selector">
                    <button class="size-btn selected" data-scale="1">🔹 1x</button>
                    <button class="size-btn" data-scale="1.5">🔸 1.5x</button>
                    <button class="size-btn" data-scale="2">🔶 2x</button>
                    <button class="size-btn" data-scale="3">💎 3x</button>
                </div>
                <div class="rotate-info">🔄 R — поворот (сейчас: <span id="rot-display">0°</span>)</div>
                <button class="modal-close" onclick="closeBuildModal()">✖ Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== СОСТОЯНИЕ ИГРЫ ====================

        // ==================== ДАЛЬШЕ ПРОДОЛЖЕНИЕ СКРИПТА ====================
                // ==================== ЗВЁЗДЫ НА ЗАСТАВКЕ ====================
        function initSplashStars() {
            const canvas = document.getElementById('splash-stars');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ctx = canvas.getContext('2d');
            const stars = [];

            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.8 + 0.5,
                    twinkle: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.02 + 0.005,
                });
            }

            function drawStars() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < stars.length; i++) {
                    const star = stars[i];
                    star.twinkle = star.twinkle + star.speed;
                    const alpha = 0.4 + Math.sin(star.twinkle) * 0.4;
                    ctx.fillStyle = 'rgba(255, 255, 240, ' + alpha + ')';
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                requestAnimationFrame(drawStars);
            }

            drawStars();
        }

        initSplashStars();

        // ==================== ГЕНЕРАЦИЯ КРИВЫХ ВОДОЁМОВ ====================
        function generateWaterBodies() {
            gameState.waterBodies = [];
            const count = 10 + Math.floor(Math.random() * 10);

            for (let i = 0; i < count; i++) {
                const centerX = (Math.random() - 0.5) * gameState.borderSize * 2;
                const centerY = (Math.random() - 0.5) * gameState.borderSize * 2;
                const baseRadius = 30 + Math.random() * 150;
                const points = [];
                const numPoints = 8 + Math.floor(Math.random() * 14);

                for (let j = 0; j < numPoints; j++) {
                    const angle = (j / numPoints) * Math.PI * 2;
                    const radius = baseRadius * (0.4 + Math.random() * 0.8);
                    points.push({
                        x: centerX + Math.cos(angle) * radius,
                        y: centerY + Math.sin(angle) * radius,
                    });
                }

                const nameList = [
                    'Великий Океан',
                    'Северное Море',
                    'Южный Залив',
                    'Тихое Озеро',
                    'Голубая Лагуна',
                    'Штормовой Пролив',
                    'Солнечная Бухта',
                    'Глубокое Водохранилище',
                    'Река Извилистая',
                    'Озеро Надежды',
                    'Море Спокойствия',
                    'Залив Приключений',
                ];

                gameState.waterBodies.push({
                    points: points,
                    name: nameList[Math.floor(Math.random() * nameList.length)],
                    baseRadius: baseRadius,
                });
            }
        }

        function isPointInWater(worldX, worldY) {
            for (let w = 0; w < gameState.waterBodies.length; w++) {
                const water = gameState.waterBodies[w];
                let inside = false;
                const points = water.points;

                for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
                    const xi = points[i].x;
                    const yi = points[i].y;
                    const xj = points[j].x;
                    const yj = points[j].y;

                    if ((yi > worldY) !== (yj > worldY)) {
                        const intersectX = (xj - xi) * (worldY - yi) / (yj - yi) + xi;
                        if (worldX < intersectX) {
                            inside = !inside;
                        }
                    }
                }

                if (inside) {
                    return true;
                }
            }
            return false;
        }

        function getBuildCost(type, scale) {
            const info = buildingTypes[type];
            if (!info) {

            return Math.floor(info.cost * scale * scale);

        function getBuildSize(type, scale) {
            const info = buildingTypes[type];
            if (!info) {
                return { w: 48, h: 48 };
            }

            let w = Math.round(info.width * scale);
            let h = Math.round(info.height * scale);

            if (gameState.buildRotation === 90 || gameState.buildRotation === 270) {
                const temp = w;
                w = h;
                h = temp;
            }

            return { w: w, h: h };
        }

        // ==================== СТРОИТЕЛЬСТВО И УДАЛЕНИЕ ====================
        function buildAt(worldX, worldY) {
            if (!gameState.selectedType || gameState.deleteMode || gameState.selectMode) {
                return false;
            }

            const type = gameState.selectedType;
            const info = buildingTypes[type];
            const scale = gameState.buildScale || 1;
            const cost = getBuildCost(type, scale);
            const size = getBuildSize(type, scale);

            if (gameState.money < cost) {
                addLogMessage('❌ Недостаточно средств! Нужно: 💰' + cost.toLocaleString());
                shakeElement('money-val');
                return false;
            }

            if (Math.abs(worldX) > gameState.borderSize || Math.abs(worldY) > gameState.borderSize) {
                addLogMessage('⚠️ За границей страны! Расширьте границу.');
                return false;
            }

            if (info.needsWater && !isPointInWater(worldX, worldY)) {
                addLogMessage('⚠️ Судостроительный завод нужно строить на воде!');
                return false;
            }

            if (!info.needsWater && !info.isRoad && !info.isRail && !info.isRoadCurve && isPointInWater(worldX, worldY)) {
                addLogMessage('⚠️ Нельзя строить на воде!');
                return false;
            }

            const newBuilding = {
                type: type,
                x: worldX - size.w / 2,
                y: worldY - size.h / 2,
                w: size.w,
                h: size.h,
                scale: scale,
                rotation: gameState.buildRotation,
                placedAt: gameState.gameTime,
            };

            const allCollidables = gameState.buildings.concat(gameState.roads).concat(gameState.rails);
            let hasOverlap = false;
            for (let i = 0; i < allCollidables.length; i++) {
                if (rectanglesOverlap(newBuilding, allCollidables[i], 2)) {
                    hasOverlap = true;
                    break;
                }
            }

            if (hasOverlap) {
                addLogMessage('⚠️ Место занято другим зданием!');
                return false;
            }

            gameState.money -= cost;

            if (info.isRoad || info.isRoadCurve) {
                gameState.roads.push(newBuilding);
            } else if (info.isRail) {
                gameState.rails.push(newBuilding);
            } else {
                gameState.buildings.push(newBuilding);
                gameState.population += Math.floor(info.populationBonus * scale);
                gameState.happiness = Math.max(0, Math.min(100, gameState.happiness + Math.floor(info.happinessBonus * scale)));

                if (info.spawnNPC) {
                    spawnNPCsAt(worldX, worldY, info.spawnNPC);
                    addLogMessage('👥 +' + info.spawnNPC + ' новых жителей!');
                }
            }

            updateUI();
            addLogMessage('✅ Построено: ' + info.emoji + ' ' + info.name + ' (' + size.w + 'x' + size.h + ')');
            spawnParticles(worldX, worldY, '#f0d060');
            gameState.buildRotation = 0;
            return true;
        }

        function deleteAt(worldX, worldY) {
            if (!gameState.deleteMode) {
                return false;
            }

            const allObjects = gameState.buildings.concat(gameState.roads).concat(gameState.rails);
            let foundBuilding = null;

            for (let i = 0; i < allObjects.length; i++) {
                const b = allObjects[i];
                if (worldX >= b.x && worldX <= b.x + b.w && worldY >= b.y && worldY <= b.y + b.h) {
                    foundBuilding = b;
                    break;
                }
            }

            if (!foundBuilding) {
                return false;
            }

            const info = buildingTypes[foundBuilding.type];
            const scale = foundBuilding.scale || 1;
            const refund = Math.floor(getBuildCost(foundBuilding.type, scale) * 0.5);

            gameState.money += refund;

            if (info.isRoad || info.isRoadCurve) {
                gameState.roads = gameState.roads.filter(function(b) { return b !== foundBuilding; });
            } else if (info.isRail) {
                gameState.rails = gameState.rails.filter(function(b) { return b !== foundBuilding; });
            } else {
                gameState.buildings = gameState.buildings.filter(function(b) { return b !== foundBuilding; });
                gameState.population = Math.max(0, gameState.population - Math.floor((info.populationBonus || 0) * scale));
                gameState.happiness = Math.max(0, Math.min(100, gameState.happiness - Math.floor((info.happinessBonus || 0) * scale)));
            }

            gameState.cars = gameState.cars.filter(function(c) { return c.homeRef !== foundBuilding; });
            gameState.boats = gameState.boats.filter(function(b) { return b.homeRef !== foundBuilding; });

            updateUI();
            addLogMessage('🗑️ Снесено: ' + (info.emoji || '?') + ' (возврат +💰' + refund.toLocaleString() + ')');
            spawnParticles(foundBuilding.x + foundBuilding.w / 2, foundBuilding.y + foundBuilding.h / 2, '#f08888');
            return true;
        }

        function rectanglesOverlap(a, b, margin) {
            if (a.x + a.w - margin < b.x) return false;
            if (a.x > b.x + b.w - margin) return false;
            if (a.y + a.h - margin < b.y) return false;
            if (a.y > b.y + b.h - margin) return false;
            return true;
        }

        // ==================== КООРДИНАТЫ ====================
        function worldToScreen(worldX, worldY) {
            const centerX = gameState.cameraX - gameState.canvas.width / 2 / gameState.zoom;
            const centerY = gameState.cameraY - gameState.canvas.height / 2 / gameState.zoom;
            return {
                x: (worldX - centerX) * gameState.zoom,
                y: (worldY - centerY) * gameState.zoom,
            };
        }

        function screenToWorld(screenX, screenY) {
            const centerX = gameState.cameraX - gameState.canvas.width / 2 / gameState.zoom;
            const centerY = gameState.cameraY - gameState.canvas.height / 2 / gameState.zoom;
            return {
                x: screenX / gameState.zoom + centerX,
                y: screenY / gameState.zoom + centerY,
            };
        }

        function getCanvasCoords(event) {
            const rect = gameState.canvas.getBoundingClientRect();
            return {
                sx: event.clientX - rect.left,
                sy: event.clientY - rect.top,
            };
        }

        function getWorldFromEvent(event) {
            const coords = getCanvasCoords(event);
            const world = screenToWorld(coords.sx, coords.sy);
            return {
                sx: coords.sx,
                sy: coords.sy,
                wx: world.x,
                wy: world.y,
            };
        }

        function findBuildingAt(worldX, worldY) {
            const allObjects = gameState.buildings.concat(gameState.roads).concat(gameState.rails);

            for (let i = allObjects.length - 1; i >= 0; i--) {
                const b = allObjects[i];
                if (worldX >= b.x && worldX <= b.x + b.w && worldY >= b.y && worldY <= b.y + b.h) {
                    return b;
                }
            }
            return null;
        }        // ==================== ОТРИСОВКА ====================
        function getDayNightAlpha() {
            const hour = gameState.gameHour + gameState.gameMinute / 60;

            if (hour >= 6 && hour < 8) {
                return 0.3 - (hour - 6) * 0.15;
            }
            if (hour >= 8 && hour < 17) {
                return 0;
            }
            if (hour >= 17 && hour < 19) {
                return (hour - 17) * 0.2;
            }
            if (hour >= 19 && hour < 21) {
                return 0.4 + (hour - 19) * 0.2;
            }
            if (hour >= 21 || hour < 5) {
                return 0.7;
            }
            if (hour >= 5 && hour < 6) {
                return 0.7 - (hour - 5) * 0.4;
            }
            return 0;
        }

        function drawGround(ctx) {
            const canvasWidth = gameState.canvas.width;
            const canvasHeight = gameState.canvas.height;
            const nightAlpha = getDayNightAlpha();

            const gradient = ctx.createRadialGradient(canvasWidth / 2, canvasHeight / 2, 100, canvasWidth / 2, canvasHeight / 2, Math.max(canvasWidth, canvasHeight));

            const redBase = Math.floor(61 * (1 - nightAlpha));
            const greenBase = Math.floor(90 * (1 - nightAlpha));
            const blueBase = Math.floor(46 * (1 - nightAlpha));

            gradient.addColorStop(0, 'rgb(' + redBase + ', ' + greenBase + ', ' + blueBase + ')');
            gradient.addColorStop(0.6, 'rgb(' + Math.floor(redBase * 0.7) + ', ' + Math.floor(greenBase * 0.7) + ', ' + Math.floor(blueBase * 0.7) + ')');
            gradient.addColorStop(1, 'rgb(' + Math.floor(redBase * 0.4) + ', ' + Math.floor(greenBase * 0.4) + ', ' + Math.floor(blueBase * 0.4) + ')');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);

            // Текстура травы
            const gridSize = gameState.gridSize;
            const centerX = gameState.cameraX - canvasWidth / 2 / gameState.zoom;
            const centerY = gameState.cameraY - canvasHeight / 2 / gameState.zoom;
            const startX = -(((centerX % gridSize) + gridSize) % gridSize);
            const startY = -(((centerY % gridSize) + gridSize) % gridSize);

            for (let x = startX; x < canvasWidth / gameState.zoom + gridSize; x += gridSize) {
                for (let y = startY; y < canvasHeight / gameState.zoom + gridSize; y += gridSize) {
                    const worldGridX = Math.floor((x + centerX) / gridSize);
                    const worldGridY = Math.floor((y + centerY) / gridSize);
                    const seed = Math.sin(worldGridX * 1000 + worldGridY) * 0.06;
                    const screenX = x * gameState.zoom;
                    const screenY = y * gameState.zoom;
                    const screenSize = gridSize * gameState.zoom;

                    ctx.fillStyle = 'rgba(255, 255, 255, ' + (0.02 + seed) + ')';
                    ctx.fillRect(screenX, screenY, screenSize, screenSize);

                    // Случайные цветочки и камушки
                    const flowerSeed = Math.sin(worldGridX * 500 + worldGridY * 300) * 0.5 + 0.5;
                    if (flowerSeed > 0.8 && !isPointInWater(x + centerX + gridSize / 2, y + centerY + gridSize / 2)) {
                        ctx.fillStyle = 'rgba(255, 255, 100, 0.3)';
                        ctx.beginPath();
                        ctx.arc(screenX + screenSize * 0.7, screenY + screenSize * 0.3, 2 * gameState.zoom, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            // Ночное затемнение
            if (nightAlpha > 0) {
                ctx.fillStyle = 'rgba(0, 0, 20, ' + nightAlpha + ')';
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            }

            // Звёзды ночью
            if (nightAlpha > 0.5) {
                for (let i = 0; i < 50; i++) {
                    const starX = ((i * 7919 + 12345) % canvasWidth);
                    const starY = ((i * 6271 + 12345) % canvasHeight);
                    const twinkle = Math.sin(gameState.gameTime * 0.003 + i) * 0.5 + 0.5;
                    const starAlpha = twinkle * (nightAlpha - 0.5) * 1.5;
                    ctx.fillStyle = 'rgba(255, 255, 255, ' + starAlpha + ')';
                    ctx.beginPath();
                    ctx.arc(starX, starY, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawWater(ctx) {
            for (let w = 0; w < gameState.waterBodies.length; w++) {
                const water = gameState.waterBodies[w];
                const points = water.points;
                const nightAlpha = getDayNightAlpha();

                if (points.length < 3) {
                    continue;
                }

                // Рисуем полигон воды
                ctx.beginPath();
                const firstPoint = worldToScreen(points[0].x, points[0].y);
                ctx.moveTo(firstPoint.x, firstPoint.y);

                for (let i = 1; i < points.length; i++) {
                    const screenPoint = worldToScreen(points[i].x, points[i].y);
                    ctx.lineTo(screenPoint.x, screenPoint.y);
                }
                ctx.closePath();

                // Градиент воды
                const bounds = getWaterBounds(water);
                const centerScreen = worldToScreen(
                    (bounds.minX + bounds.maxX) / 2,
                    (bounds.minY + bounds.maxY) / 2
                );
                const waterGradient = ctx.createRadialGradient(
                    centerScreen.x, centerScreen.y, 0,
                    centerScreen.x, centerScreen.y, water.baseRadius * gameState.zoom
                );
                waterGradient.addColorStop(0, 'rgba(30, 100, 180, ' + (0.8 - nightAlpha * 0.3) + ')');
                waterGradient.addColorStop(0.5, 'rgba(20, 80, 160, ' + (0.75 - nightAlpha * 0.3) + ')');
                waterGradient.addColorStop(1, 'rgba(10, 50, 130, ' + (0.8 - nightAlpha * 0.3) + ')');

                ctx.fillStyle = waterGradient;
                ctx.fill();

                // Волны на воде
                const waveTime = gameState.gameTime * 0.02;
                for (let i = 0; i < points.length; i++) {
                    const p1 = points[i];
                    const p2 = points[(i + 1) % points.length];
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const screenMid = worldToScreen(midX, midY);
                    const waveOffset = Math.sin(waveTime + i * 0.5) * 5 * gameState.zoom;

                    ctx.fillStyle = 'rgba(100, 180, 240, 0.3)';
                    ctx.beginPath();
                    ctx.arc(screenMid.x + waveOffset, screenMid.y, 4 * gameState.zoom, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Береговая линия
                ctx.strokeStyle = 'rgba(150, 210, 255, 0.5)';
                ctx.lineWidth = 2 * gameState.zoom;
                ctx.stroke();

                // Название водоёма
                if (water.name && water.baseRadius > 50) {
                    const boundsCenter = worldToScreen(
                        (bounds.minX + bounds.maxX) / 2,
                        (bounds.minY + bounds.maxY) / 2
                    );
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.font = Math.min(16, 12 * gameState.zoom) + 'px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(water.name, boundsCenter.x, boundsCenter.y);
                }
            }
        }

        function getWaterBounds(water) {
            let minX = Infinity;
            let minY = Infinity;
            let maxX = -Infinity;
            let maxY = -Infinity;

            for (let i = 0; i < water.points.length; i++) {
                const p = water.points[i];
                if (p.x < minX) minX = p.x;
                if (p.y < minY) minY = p.y;
                if (p.x > maxX) maxX = p.x;
                if (p.y > maxY) maxY = p.y;
            }

            return { minX: minX, minY: minY, maxX: maxX, maxY: maxY };
        }

        function drawBorder(ctx) {
            const borderSize = gameState.borderSize;

            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = Math.max(2, 3 * gameState.zoom);
            ctx.setLineDash([10 * gameState.zoom, 6 * gameState.zoom]);
            ctx.beginPath();

            const segments = 32;
            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                const wobble = Math.sin(angle * 5 + gameState.gameTime * 0.001) * 15 + Math.cos(angle * 3) * 10;
                const radius = borderSize + wobble;
                const worldX = Math.cos(angle) * radius;
                const worldY = Math.sin(angle) * radius;
                const screenPoint = worldToScreen(worldX, worldY);

                if (i === 0) {
                    ctx.moveTo(screenPoint.x, screenPoint.y);
                } else {
                    ctx.lineTo(screenPoint.x, screenPoint.y);
                }
            }

            ctx.closePath();
            ctx.stroke();
            ctx.setLineDash([]);

            // Флаги по углам
            const flags = ['🚩', '🚩', '🚩', '🚩'];
            for (let i = 0; i < 4; i++) {
                const angle = i * Math.PI / 2 - Math.PI / 4;
                const screenPoint = worldToScreen(Math.cos(angle) * borderSize, Math.sin(angle) * borderSize);
                ctx.font = Math.floor(16 * gameState.zoom) + 'px serif';
                ctx.textAlign = 'center';
                ctx.fillText(flags[i], screenPoint.x, screenPoint.y - 10 * gameState.zoom);
            }

            // Табличка с ценой расширения
            const tableScreen = worldToScreen(borderSize + 30, 0);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(
                tableScreen.x - 40 * gameState.zoom,
                tableScreen.y - 20 * gameState.zoom,
                80 * gameState.zoom,
                35 * gameState.zoom
            );
            ctx.fillStyle = '#f0d060';
            ctx.font = Math.floor(12 * gameState.zoom) + 'px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('📏 Расширить', tableScreen.x, tableScreen.y - 5 * gameState.zoom);
            ctx.fillText('💰' + gameState.borderExpandCost.toLocaleString(), tableScreen.x, tableScreen.y + 15 * gameState.zoom);
        }

        function drawGrid(ctx) {
            const canvasWidth = gameState.canvas.width;
            const canvasHeight = gameState.canvas.height;
            const gridSize = gameState.gridSize;
            const centerX = gameState.cameraX - canvasWidth / 2 / gameState.zoom;
            const centerY = gameState.cameraY - canvasHeight / 2 / gameState.zoom;
            const startX = -(((centerX % gridSize) + gridSize) % gridSize);
            const startY = -(((centerY % gridSize) + gridSize) % gridSize);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
            ctx.lineWidth = 1;
            ctx.beginPath();

            for (let x = startX; x < canvasWidth / gameState.zoom + gridSize; x += gridSize) {
                ctx.moveTo(x * gameState.zoom, 0);
                ctx.lineTo(x * gameState.zoom, canvasHeight);
            }
            for (let y = startY; y < canvasHeight / gameState.zoom + gridSize; y += gridSize) {
                ctx.moveTo(0, y * gameState.zoom);
                ctx.lineTo(canvasWidth, y * gameState.zoom);
            }

            ctx.stroke();
        }

        function drawRoad(ctx, road, info) {
            const screenPos = worldToScreen(road.x, road.y);
            const width = road.w * gameState.zoom;
            const height = road.h * gameState.zoom;

            ctx.save();
            const centerX = screenPos.x + width / 2;
            const centerY = screenPos.y + height / 2;
            ctx.translate(centerX, centerY);
            if (road.rotation) {
                ctx.rotate(road.rotation * Math.PI / 180);
            }
            ctx.translate(-centerX, -centerY);

            if (info.isRoadCurve) {
                ctx.fillStyle = '#444444';
                ctx.fillRect(screenPos.x, screenPos.y, width, height);

                ctx.strokeStyle = '#ffff88';
                ctx.lineWidth = Math.max(1, 2 * gameState.zoom);
                ctx.setLineDash([8 * gameState.zoom, 10 * gameState.zoom]);
                ctx.beginPath();
                ctx.arc(screenPos.x + width, screenPos.y, width * 0.7, 0, Math.PI / 2);
                ctx.stroke();
                ctx.setLineDash([]);

                const borderWidth = Math.max(2, 3 * gameState.zoom);
                ctx.fillStyle = '#666666';
                ctx.fillRect(screenPos.x, screenPos.y, width, borderWidth);
                ctx.fillRect(screenPos.x, screenPos.y + height - borderWidth, width, borderWidth);
                ctx.fillRect(screenPos.x, screenPos.y, borderWidth, height);
                ctx.fillRect(screenPos.x + width - borderWidth, screenPos.y, borderWidth, height);
            } else if (info.isRoad) {
                ctx.fillStyle = '#444444';
                ctx.fillRect(screenPos.x, screenPos.y, width, height);

                const borderWidth = Math.max(2, 3 * gameState.zoom);
                ctx.fillStyle = '#666666';
                ctx.fillRect(screenPos.x, screenPos.y, width, borderWidth);
                ctx.fillRect(screenPos.x, screenPos.y + height - borderWidth, width, borderWidth);
                ctx.fillRect(screenPos.x, screenPos.y, borderWidth, height);
                ctx.fillRect(screenPos.x + width - borderWidth, screenPos.y, borderWidth, height);

                ctx.strokeStyle = '#ffff88';
                ctx.lineWidth = Math.max(1, 2 * gameState.zoom);
                ctx.setLineDash([10 * gameState.zoom, 14 * gameState.zoom]);
                ctx.beginPath();
                ctx.moveTo(screenPos.x + width / 2, screenPos.y);
                ctx.lineTo(screenPos.x + width / 2, screenPos.y + height);
                ctx.stroke();
                ctx.setLineDash([]);
            } else {
                ctx.fillStyle = '#8B7355';
                ctx.fillRect(screenPos.x, screenPos.y, width, height);

                ctx.fillStyle = '#5c4030';
                const sleeperHeight = Math.max(3, 4 * gameState.zoom);
                const sleeperGap = Math.max(5, 8 * gameState.zoom);
                for (let i = 0; i < height; i += sleeperGap) {
                    ctx.fillRect(screenPos.x + 2 * gameState.zoom, screenPos.y + i, width - 4 * gameState.zoom, sleeperHeight);
                }

                ctx.strokeStyle = '#cccccc';
                ctx.lineWidth = Math.max(1.5, 2.5 * gameState.zoom);
                ctx.beginPath();
                const railX1 = screenPos.x + Math.max(6, 8 * gameState.zoom);
                const railX2 = screenPos.x + width - Math.max(6, 8 * gameState.zoom);
                ctx.moveTo(railX1, screenPos.y);
                ctx.lineTo(railX1, screenPos.y + height);
                ctx.moveTo(railX2, screenPos.y);
                ctx.lineTo(railX2, screenPos.y + height);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawBuildingShape(ctx, building, info) {
            const screenPos = worldToScreen(building.x, building.y);
            const width = building.w * gameState.zoom;
            const height = building.h * gameState.zoom;
            const type = building.type;

            ctx.save();
            const centerX = screenPos.x + width / 2;
            const centerY = screenPos.y + height / 2;
            ctx.translate(centerX, centerY);
            if (building.rotation) {
                ctx.rotate(building.rotation * Math.PI / 180);
            }
            ctx.translate(-centerX, -centerY);

            // Тень
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(screenPos.x + 2 * gameState.zoom, screenPos.y + 2 * gameState.zoom, width, height);

            // Отрисовка здания в зависимости от типа
            if (type === 'house') {
                ctx.fillStyle = '#e8d5b7';
                ctx.fillRect(screenPos.x, screenPos.y, width, height - 12 * gameState.zoom);
                ctx.fillStyle = '#c0392b';
                ctx.beginPath();
                ctx.moveTo(screenPos.x - 3 * gameState.zoom, screenPos.y);
                ctx.lineTo(screenPos.x + width / 2, screenPos.y - 14 * gameState.zoom);
                ctx.lineTo(screenPos.x + width + 3 * gameState.zoom, screenPos.y);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(screenPos.x + 6 * gameState.zoom, screenPos.y + 6 * gameState.zoom, 8 * gameState.zoom, 8 * gameState.zoom);
                ctx.fillRect(screenPos.x + width - 14 * gameState.zoom, screenPos.y + 6 * gameState.zoom, 8 * gameState.zoom, 8 * gameState.zoom);
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 1;
                ctx.strokeRect(screenPos.x + 6 * gameState.zoom, screenPos.y + 6 * gameState.zoom, 8 * gameState.zoom, 8 * gameState.zoom);
                ctx.strokeRect(screenPos.x + width - 14 * gameState.zoom, screenPos.y + 6 * gameState.zoom, 8 * gameState.zoom, 8 * gameState.zoom);
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(screenPos.x + width / 2 - 5 * gameState.zoom, screenPos.y + height - 16 * gameState.zoom, 10 * gameState.zoom, 16 * gameState.zoom);
            } else if (type === 'apartment') {
                const floors = Math.max(4, Math.floor(8 * (building.scale || 1)));
                const floorHeight = height / floors;
                for (let i = 0; i < floors; i++) {
                    ctx.fillStyle = i % 2 === 0 ? '#d0dce8' : '#bcc8d8';
                    ctx.fillRect(screenPos.x, screenPos.y + i * floorHeight, width, floorHeight);
                    ctx.fillStyle = '#87ceeb';
                    const windowWidth = Math.max(3, 8 * gameState.zoom);
                    const windowHeight = Math.max(3, floorHeight - 6 * gameState.zoom);
                    const cols = Math.min(3, Math.floor(width / (windowWidth + 7 * gameState.zoom)));
                    for (let j = 0; j < cols; j++) {
                        ctx.fillRect(screenPos.x + 5 * gameState.zoom + j * (windowWidth + 7 * gameState.zoom), screenPos.y + i * floorHeight + 3 * gameState.zoom, windowWidth, windowHeight);
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 0.5;
                        ctx.strokeRect(screenPos.x + 5 * gameState.zoom + j * (windowWidth + 7 * gameState.zoom), screenPos.y + i * floorHeight + 3 * gameState.zoom, windowWidth, windowHeight);
                    }
                }
                ctx.fillStyle = '#555555';
                ctx.fillRect(screenPos.x + width / 2 - 6 * gameState.zoom, screenPos.y + height - 10 * gameState.zoom, 12 * gameState.zoom, 10 * gameState.zoom);
            } else if (type === 'mansion') {
                ctx.fillStyle = '#f5e6d3';
                ctx.fillRect(screenPos.x, screenPos.y + 8 * gameState.zoom, width, height - 8 * gameState.zoom);
                ctx.fillStyle = '#d4af37';
                ctx.fillRect(screenPos.x + 6 * gameState.zoom, screenPos.y, width - 12 * gameState.zoom, 20 * gameState.zoom);
                ctx.fillStyle = '#c9972e';
                ctx.beginPath();
                ctx.arc(screenPos.x + width / 2, screenPos.y, 12 * gameState.zoom, Math.PI, 0);
                ctx.fill();
                ctx.fillStyle = '#e8dcc8';
                const colWidth = 4 * gameState.zoom;
                ctx.fillRect(screenPos.x + 4 * gameState.zoom, screenPos.y + 20 * gameState.zoom, colWidth, height - 12 * gameState.zoom);
                ctx.fillRect(screenPos.x + width - 4 * gameState.zoom - colWidth, screenPos.y + 20 * gameState.zoom, colWidth, height - 12 * gameState.zoom);
                ctx.fillStyle = '#ffffff';
                for (let i = 0; i < 3; i++) {
                    ctx.fillRect(screenPos.x + 12 * gameState.zoom + i * 14 * gameState.zoom, screenPos.y + 28 * gameState.zoom, 8 * gameState.zoom, 10 * gameState.zoom);
                    ctx.strokeStyle = '#8B4513';
                    ctx.strokeRect(screenPos.x + 12 * gameState.zoom + i * 14 * gameState.zoom, screenPos.y + 28 * gameState.zoom, 8 * gameState.zoom, 10 * gameState.zoom);
                }
            } else if (type === 'factory') {
                ctx.fillStyle = '#8899aa';
                ctx.fillRect(screenPos.x, screenPos.y + 10 * gameState.zoom, width, height - 10 * gameState.zoom);
                ctx.fillStyle = '#667788';
                ctx.fillRect(screenPos.x, screenPos.y + 10 * gameState.zoom, width, 4 * gameState.zoom);
                ctx.fillStyle = '#555555';
                const chimneys = Math.min(3, Math.floor((building.scale || 1) * 2));
                for (let i = 0; i < chimneys; i++) {
                    ctx.fillRect(screenPos.x + 8 * gameState.zoom + i * (width / chimneys), screenPos.y - 14 * gameState.zoom, 8 * gameState.zoom, 24 * gameState.zoom);
                }
                const smokeOffset = Math.sin(gameState.gameTime * 0.05 + building.x) * 3 * gameState.zoom;
                for (let i = 0; i < chimneys; i++) {
                    ctx.fillStyle = 'rgba(180, 180, 180, 0.4)';
                    ctx.beginPath();
                    ctx.arc(screenPos.x + 12 * gameState.zoom + i * (width / chimneys) + smokeOffset, screenPos.y - 18 * gameState.zoom - i * 3 * gameState.zoom, (5 + i * 1.5) * gameState.zoom, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(screenPos.x + 4 * gameState.zoom, screenPos.y + height - 8 * gameState.zoom, width - 8 * gameState.zoom, 6 * gameState.zoom);
            } else if (type === 'office') {
                const floors = Math.max(6, Math.floor(12 * (building.scale || 1)));
                const floorHeight = height / floors;
                for (let i = 0; i < floors; i++) {
                    ctx.fillStyle = i % 2 === 0 ? '#a8d4f0' : '#8ab8d8';
                    ctx.fillRect(screenPos.x, screenPos.y + i * floorHeight, width, floorHeight);
                    ctx.fillStyle = '#ffffff';
                    const windowWidth = Math.max(3, 7 * gameState.zoom);
                    const windowHeight = Math.max(2, floorHeight - 4 * gameState.zoom);
                    const cols = Math.min(4, Math.floor(width / (windowWidth + 4 * gameState.zoom)));
                    for (let j = 0; j < cols; j++) {
                        ctx.fillRect(screenPos.x + 3 * gameState.zoom + j * (windowWidth + 4 * gameState.zoom), screenPos.y + i * floorHeight + 2 * gameState.zoom, windowWidth, windowHeight);
                    }
                }
                ctx.fillStyle = '#333333';
                ctx.fillRect(screenPos.x + width / 2 - 8 * gameState.zoom, screenPos.y + height - 12 * gameState.zoom, 16 * gameState.zoom, 12 * gameState.zoom);
                ctx.fillStyle = '#ffffff';
                ctx.font = Math.floor(8 * gameState.zoom) + 'px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('B', screenPos.x + width / 2, screenPos.y + height - 3 * gameState.zoom);
            } else if (type === 'shop') {
                ctx.fillStyle = '#ffe4b5';
                ctx.fillRect(screenPos.x, screenPos.y, width, height);
                ctx.fillStyle = '#ff6347';
                ctx.fillRect(screenPos.x + 2 * gameState.zoom, screenPos.y, width - 4 * gameState.zoom, 8 * gameState.zoom);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(screenPos.x + 3 * gameState.zoom, screenPos.y + 12 * gameState.zoom, width - 6 * gameState.zoom, height - 24 * gameState.zoom);
                ctx.strokeStyle = '#dddddd';
                ctx.lineWidth = 1;
                ctx.strokeRect(screenPos.x + 3 * gameState.zoom, screenPos.y + 12 * gameState.zoom, width - 6 * gameState.zoom, height - 24 * gameState.zoom);
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(screenPos.x + width / 2 - 6 * gameState.zoom, screenPos.y + height - 10 * gameState.zoom, 12 * gameState.zoom, 10 * gameState.zoom);
            } else if (type === 'park') {
                ctx.fillStyle = '#5a8a5a';
                ctx.fillRect(screenPos.x, screenPos.y, width, height);
                const treePositions = [
                    [0.2, 0.25],
                    [0.5, 0.2],
                    [0.8, 0.3],
                    [0.3, 0.6],
                    [0.7, 0.65],
                    [0.5, 0.75]
                ];
                for (let i = 0; i < treePositions.length; i++) {
                    const tx = screenPos.x + treePositions[i][0] * width;
                    const ty = screenPos.y + treePositions[i][1] * height;
                    ctx.fillStyle = '#3d2b1f';
                    ctx.fillRect(tx - 1.5 * gameState.zoom, ty, 3 * gameState.zoom, 10 * gameState.zoom);
                    ctx.fillStyle = '#2d6e2d';
                    ctx.beginPath();
                    ctx.arc(tx, ty - 2 * gameState.zoom, 7 * gameState.zoom, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#3d8e3d';
                    ctx.beginPath();
                    ctx.arc(tx, ty - 5 * gameState.zoom, 6 * gameState.zoom, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = '#4a90c8';
                ctx.beginPath();
                ctx.ellipse(screenPos.x + width * 0.5, screenPos.y + height * 0.45, 12 * gameState.zoom, 7 * gameState.zoom, 0, 0, Math.PI * 2);
                ctx.fill();
            } else if (type === 'school') {
                ctx.fillStyle = '#d4a574';
                ctx.fillRect(screenPos.x, screenPos.y + 4 * gameState.zoom, width, height - 4 * gameState.zoom);
                ctx.fillStyle = '#c0392b';
                ctx.fillRect(screenPos.x - 2 * gameState.zoom, screenPos.y, width + 4 * gameState.zoom, 10 * gameState.zoom);
                ctx.fillStyle = '#87ceeb';
                for (let i = 0; i < 4; i++) {
                    ctx.fillRect(screenPos.x + 5 * gameState.zoom + i * 11 * gameState.zoom, screenPos.y + 16 * gameState.zoom, 7 * gameState.zoom, 8 * gameState.zoom);
                    ctx.strokeStyle = '#ffffff';
                    ctx.strokeRect(screenPos.x + 5 * gameState.zoom + i * 11 * gameState.zoom, screenPos.y + 16 * gameState.zoom, 7 * gameState.zoom, 8 * gameState.zoom);
                }
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(screenPos.x + width / 2 - 5 * gameState.zoom, screenPos.y + height - 12 * gameState.zoom, 10 * gameState.zoom, 12 * gameState.zoom);
            } else if (type === 'hospital') {
                ctx.fillStyle = '#f8f8f8';
                ctx.fillRect(screenPos.x, screenPos.y, width, height);
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(screenPos.x + width / 2 - 8 * gameState.zoom, screenPos.y, 16 * gameState.zoom, 12 * gameState.zoom);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(screenPos.x + width / 2 - 2 * gameState.zoom, screenPos.y + 2 * gameState.zoom, 4 * gameState.zoom, 8 * gameState.zoom);
                ctx.fillRect(screenPos.x + width / 2 - 6 * gameState.zoom, screenPos.y + 5 * gameState.zoom, 12 * gameState.zoom, 3 * gameState.zoom);
                ctx.fillStyle = '#87ceeb';
                for (let i = 0; i < 3; i++) {
                    for (let j = 0; j < 3; j++) {
                        ctx.fillRect(screenPos.x + 5 * gameState.zoom + j * 16 * gameState.zoom, screenPos.y + 16 * gameState.zoom + i * 11 * gameState.zoom, 9 * gameState.zoom, 7 * gameState.zoom);
                    }
                }
            } else if (type === 'stadium') {
                ctx.fillStyle = '#d0d0d0';
                ctx.fillRect(screenPos.x, screenPos.y, width, height);
                ctx.fillStyle = '#3a8a3a';
                ctx.beginPath();
                ctx.ellipse(screenPos.x + width / 2, screenPos.y + height / 2, width / 2 - 4 * gameState.zoom, height / 2 - 4 * gameState.zoom, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.strokeStyle = '#555555';
                ctx.lineWidth = 2 * gameState.zoom;
                ctx.beginPath();
                ctx.arc(screenPos.x + width / 2, screenPos.y + height / 2, 8 * gameState.zoom, 0, Math.PI * 2);
                ctx.stroke();
            } else if (type === 'carshop') {
                ctx.fillStyle = '#e0e0e0';
                ctx.fillRect(screenPos.x, screenPos.y, width, height);
                ctx.fillStyle = '#ff4444';
                ctx.fillRect(screenPos.x + 2 * gameState.zoom, screenPos.y, width - 4 * gameState.zoom, 6 * gameState.zoom);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(screenPos.x + 4 * gameState.zoom, screenPos.y + 10 * gameState.zoom, width - 8 * gameState.zoom, height - 22 * gameState.zoom);
                ctx.fillStyle = '#333333';
                ctx.font = Math.floor(14 * gameState.zoom) + 'px serif';
                ctx.textAlign = 'center';
                ctx.fillText('🚗', screenPos.x + width * 0.3, screenPos.y + height * 0.6);
                ctx.fillText('🚙', screenPos.x + width * 0.7, screenPos.y + height * 0.6);
            } else if (type === 'shipyard') {
                ctx.fillStyle = '#708090';
                ctx.fillRect(screenPos.x, screenPos.y, width, height);
                ctx.fillStyle = '#4682B4';
                ctx.fillRect(screenPos.x, screenPos.y, width, 8 * gameState.zoom);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(screenPos.x + 4 * gameState.zoom, screenPos.y + 12 * gameState.zoom, width - 8 * gameState.zoom, height - 20 * gameState.zoom);
                ctx.fillStyle = '#333333';
                ctx.font = Math.floor(16 * gameState.zoom) + 'px serif';
                ctx.textAlign = 'center';
                ctx.fillText('🚢', screenPos.x + width * 0.5, screenPos.y + height * 0.55);
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(screenPos.x + 2 * gameState.zoom, screenPos.y + height - 6 * gameState.zoom, width - 4 * gameState.zoom, 4 * gameState.zoom);
            }

            // НИКАКИХ ЖЁЛТЫХ ИЛИ КРАСНЫХ КРУГОВ ПРИ НАВЕДЕНИИ!

            ctx.restore();
        }

        function drawCars(ctx) {
            for (let i = 0; i < gameState.cars.length; i++) {
                const car = gameState.cars[i];
                const screenPos = worldToScreen(car.x, car.y);

                if (screenPos.x < -30 || screenPos.x > gameState.canvas.width + 30 || screenPos.y < -30 || screenPos.y > gameState.canvas.height + 30) {
                    continue;
                }

                const carSize = 7 * gameState.zoom;

                ctx.fillStyle = car.color;
                ctx.fillRect(screenPos.x - carSize, screenPos.y - carSize / 2, carSize * 2, carSize);

                ctx.fillStyle = '#333333';
                ctx.fillRect(screenPos.x - carSize + 1.5 * gameState.zoom, screenPos.y - carSize / 2 - 1.5 * gameState.zoom, carSize * 0.5, carSize + 3 * gameState.zoom);

                ctx.fillStyle = '#111111';
                const wheelPositions = [
                    [-carSize * 0.6, -carSize / 2],
                    [carSize * 0.6, -carSize / 2],
                    [-carSize * 0.6, carSize / 2],
                    [carSize * 0.6, carSize / 2]
                ];
                for (let w = 0; w < wheelPositions.length; w++) {
                    ctx.beginPath();
                    ctx.arc(screenPos.x + wheelPositions[w][0], screenPos.y + wheelPositions[w][1], 2.5 * gameState.zoom, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.fillStyle = '#ffff88';
                ctx.beginPath();
                ctx.arc(screenPos.x + carSize, screenPos.y, 1.5 * gameState.zoom, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawBoats(ctx) {
            for (let i = 0; i < gameState.boats.length; i++) {
                const boat = gameState.boats[i];
                const screenPos = worldToScreen(boat.x, boat.y);

                if (screenPos.x < -30 || screenPos.x > gameState.canvas.width + 30 || screenPos.y < -30 || screenPos.y > gameState.canvas.height + 30) {
                    continue;
                }

                const boatSize = 8 * gameState.zoom;

                ctx.fillStyle = boat.color;
                ctx.beginPath();
                ctx.ellipse(screenPos.x, screenPos.y, boatSize, boatSize * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(screenPos.x - boatSize * 0.3, screenPos.y - boatSize * 0.6, boatSize * 0.6, boatSize * 0.5);

                ctx.strokeStyle = '#333333';
                ctx.lineWidth = 1;
                ctx.strokeRect(screenPos.x - boatSize * 0.3, screenPos.y - boatSize * 0.6, boatSize * 0.6, boatSize * 0.5);
            }
        }

        function drawPeople(ctx) {
            for (let i = 0; i < gameState.people.length; i++) {
                const person = gameState.people[i];

                if (person.hasCar && person.carRef) {
                    continue;
                }
                if (person.hasBoat && person.boatRef) {
                    continue;
                }

                const screenPos = worldToScreen(person.x, person.y);

                if (screenPos.x < -20 || screenPos.x > gameState.canvas.width + 20 || screenPos.y < -20 || screenPos.y > gameState.canvas.height + 20) {
                    continue;
                }

                const personSize = person.size * gameState.zoom;

                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(screenPos.x, screenPos.y + personSize * 0.8, personSize * 0.8, personSize * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = person.color;
                ctx.beginPath();
                ctx.arc(screenPos.x, screenPos.y - personSize * 0.5, personSize * 0.6, 0, Math.PI * 2);
                ctx.fill();

                const hueMatch = person.color.match(/\d+/);
                const baseHue = hueMatch ? parseInt(hueMatch[0]) : 0;
                ctx.fillStyle = 'hsl(' + ((baseHue + 30) % 360) + ', 50%, 55%)';
                ctx.fillRect(screenPos.x - personSize * 0.4, screenPos.y - personSize * 0.2, personSize * 0.8, personSize * 0.9);

                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(screenPos.x - personSize * 0.2, screenPos.y - personSize * 0.6, personSize * 0.18, 0, Math.PI * 2);
                ctx.arc(screenPos.x + personSize * 0.2, screenPos.y - personSize * 0.6, personSize * 0.18, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(screenPos.x - personSize * 0.15, screenPos.y - personSize * 0.6, personSize * 0.08, 0, Math.PI * 2);
                ctx.arc(screenPos.x + personSize * 0.25, screenPos.y - personSize * 0.6, personSize * 0.08, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawWeather(ctx) {
            const nightAlpha = getDayNightAlpha();

            if (gameState.weather === 'rainy' || gameState.weather === 'stormy') {
                for (let i = 0; i < gameState.raindrops.length; i++) {
                    const drop = gameState.raindrops[i];
                    const screenPos = worldToScreen(drop.x, drop.y);
                    ctx.strokeStyle = 'rgba(100, 150, 255, ' + (0.6 - nightAlpha * 0.3) + ')';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(screenPos.x, screenPos.y);
                    ctx.lineTo(screenPos.x - drop.vx * 2, screenPos.y + 8 * gameState.zoom);
                    ctx.stroke();
                }
            }

            if (gameState.weather === 'snowy') {
                for (let i = 0; i < gameState.snowflakes.length; i++) {
                    const flake = gameState.snowflakes[i];
                    const screenPos = worldToScreen(flake.x, flake.y);
                    ctx.fillStyle = 'rgba(255, 255, 255, ' + (0.8 - nightAlpha * 0.2) + ')';
                    ctx.beginPath();
                    ctx.arc(screenPos.x, screenPos.y, flake.size * gameState.zoom, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawParticles(ctx) {
            gameState.particles = gameState.particles.filter(function(p) {
                return p.life > 0;
            });

            for (let i = 0; i < gameState.particles.length; i++) {
                const particle = gameState.particles[i];
                const screenPos = worldToScreen(particle.x, particle.y);
                ctx.fillStyle = 'rgba(' + particle.r + ', ' + particle.g + ', ' + particle.b + ', ' + particle.life + ')';
                ctx.beginPath();
                ctx.arc(screenPos.x, screenPos.y, particle.size * gameState.zoom, 0, Math.PI * 2);
                ctx.fill();
            }
        }        // ==================== ИГРОВОЙ ЦИКЛ ====================
        function gameLoop(timestamp) {
            gameState.gameTime = timestamp;

            const ctx = gameState.ctx;
            const canvas = gameState.canvas;

            if (!canvas || !ctx) {
                requestAnimationFrame(gameLoop);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Обновление времени
            gameState.gameMinute = gameState.gameMinute + 0.05;
            if (gameState.gameMinute >= 60) {
                gameState.gameMinute = 0;
                gameState.gameHour = gameState.gameHour + 1;
                if (gameState.gameHour >= 24) {
                    gameState.gameHour = 0;
                }
            }

            // Обновление погоды
            gameState.weatherTimer = gameState.weatherTimer + 1;
            if (gameState.weatherTimer >= gameState.weatherDuration) {
                gameState.weatherTimer = 0;
                gameState.weatherDuration = 500 + Math.floor(Math.random() * 1500);

                const weatherOptions = ['sunny', 'sunny', 'cloudy', 'cloudy', 'rainy', 'rainy', 'stormy', 'snowy'];
                gameState.weather = weatherOptions[Math.floor(Math.random() * weatherOptions.length)];
            }

            // Обновление дождя
            if (gameState.weather === 'rainy' || gameState.weather === 'stormy') {
                if (gameState.raindrops.length < 60) {
                    gameState.raindrops.push({
                        x: (Math.random() - 0.5) * gameState.borderSize * 2,
                        y: (Math.random() - 0.5) * gameState.borderSize * 2,
                        vx: 2,
                        vy: 8,
                    });
                }
                for (let i = 0; i < gameState.raindrops.length; i++) {
                    const drop = gameState.raindrops[i];
                    drop.x = drop.x + drop.vx;
                    drop.y = drop.y + drop.vy;
                    if (drop.y > gameState.borderSize) {
                        drop.y = -gameState.borderSize;
                    }
                }
            } else {
                gameState.raindrops = [];
            }

            // Обновление снега
            if (gameState.weather === 'snowy') {
                if (gameState.snowflakes.length < 40) {
                    gameState.snowflakes.push({
                        x: (Math.random() - 0.5) * gameState.borderSize * 2,
                        y: (Math.random() - 0.5) * gameState.borderSize * 2,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: 1 + Math.random() * 2,
                        size: 1 + Math.random() * 3,
                    });
                }
                for (let i = 0; i < gameState.snowflakes.length; i++) {
                    const flake = gameState.snowflakes[i];
                    flake.x = flake.x + flake.vx;
                    flake.y = flake.y + flake.vy;
                    if (flake.y > gameState.borderSize) {
                        flake.y = -gameState.borderSize;
                    }
                }
            } else {
                gameState.snowflakes = [];
            }

            // Отрисовка всех слоёв
            drawGround(ctx);
            drawWater(ctx);
            drawGrid(ctx);
            drawBorder(ctx);

            // Отрисовка дорог
            for (let i = 0; i < gameState.roads.length; i++) {
                const road = gameState.roads[i];
                const info = buildingTypes[road.type] || buildingTypes.road;
                drawRoad(ctx, road, info);
            }

            // Отрисовка рельсов
            for (let i = 0; i < gameState.rails.length; i++) {
                const rail = gameState.rails[i];
                drawRoad(ctx, rail, buildingTypes.rail);
            }

            // Отрисовка зданий
            for (let i = 0; i < gameState.buildings.length; i++) {
                const building = gameState.buildings[i];
                const info = buildingTypes[building.type];
                if (info) {
                    drawBuildingShape(ctx, building, info);
                }
            }

            // Обновление и отрисовка NPC
            updateNPCs();
            drawPeople(ctx);
            drawCars(ctx);
            drawBoats(ctx);
            drawWeather(ctx);
            drawParticles(ctx);

            // Призрак постройки
            if (gameState.selectedType && !gameState.dragging && !gameState.deleteMode && !gameState.selectMode) {
                const info = buildingTypes[gameState.selectedType];
                const size = getBuildSize(gameState.selectedType, gameState.buildScale || 1);
                const worldPos = screenToWorld(gameState.mouseX, gameState.mouseY);
                const buildX = worldPos.x - size.w / 2;
                const buildY = worldPos.y - size.h / 2;
                const screenBuild = worldToScreen(buildX, buildY);

                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillRect(screenBuild.x, screenBuild.y, size.w * gameState.zoom, size.h * gameState.zoom);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.setLineDash([5 * gameState.zoom, 5 * gameState.zoom]);
                ctx.lineWidth = 2 * gameState.zoom;
                ctx.strokeRect(screenBuild.x, screenBuild.y, size.w * gameState.zoom, size.h * gameState.zoom);
                ctx.setLineDash([]);

                ctx.save();
                const ghostCenterX = screenBuild.x + size.w * gameState.zoom / 2;
                const ghostCenterY = screenBuild.y + size.h * gameState.zoom / 2;
                ctx.translate(ghostCenterX, ghostCenterY);
                if (gameState.buildRotation) {
                    ctx.rotate(gameState.buildRotation * Math.PI / 180);
                }
                ctx.font = Math.floor(20 * gameState.zoom) + 'px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(info.emoji, 0, 0);
                ctx.restore();
            }

            // Доход
            gameState.incomeTimer = gameState.incomeTimer + 16;
            if (gameState.incomeTimer >= 3000) {
                gameState.incomeTimer = 0;

                let totalIncome = 0;
                for (let i = 0; i < gameState.buildings.length; i++) {
                    const building = gameState.buildings[i];
                    const info = buildingTypes[building.type];
                    const scale = building.scale || 1;
                    totalIncome = totalIncome + Math.floor((info ? info.income : 0) * scale);
                }

                totalIncome = totalIncome + gameState.roads.length * 5;
                totalIncome = totalIncome + gameState.rails.length * 20;
                totalIncome = totalIncome + gameState.cars.length * 10;
                totalIncome = totalIncome + gameState.boats.length * 30;

                gameState.money = gameState.money + totalIncome;

                if (gameState.buildings.length > 0) {
                    gameState.happiness = gameState.happiness + (Math.random() - 0.47) * 0.4;
                    gameState.happiness = Math.max(0, Math.min(100, gameState.happiness));
                }

                // Спавн новых жителей
                let totalCapacity = 0;
                for (let i = 0; i < gameState.buildings.length; i++) {
                    const building = gameState.buildings[i];
                    const info = buildingTypes[building.type];
                    const scale = building.scale || 1;
                    if (info && info.capacity) {
                        totalCapacity = totalCapacity + Math.floor(info.capacity * scale);
                    }
                }

                if (gameState.population < totalCapacity && gameState.happiness > 40 && gameState.people.length < 80) {
                    gameState.people.push({
                        x: (Math.random() - 0.5) * gameState.borderSize,
                        y: (Math.random() - 0.5) * gameState.borderSize,
                        vx: (Math.random() - 0.5) * 1.2,
                        vy: (Math.random() - 0.5) * 1.2,
                        color: 'hsl(' + Math.floor(Math.random() * 360) + ', 40%, 65%)',
                        size: 4 + Math.random() * 3,
                        target: null,
                        state: 'walking',
                        stateTimer: Math.random() * 200,
                        hasCar: false,
                        carRef: null,
                        hasBoat: false,
                        boatRef: null,
                    });
                    gameState.population = gameState.population + 1;
                }

                updateUI();
            }

            requestAnimationFrame(gameLoop);
        }

        // ==================== ОБНОВЛЕНИЕ NPC ====================
        function updateNPCs() {
            // Обновление пешеходов
            for (let i = 0; i < gameState.people.length; i++) {
                const person = gameState.people[i];

                if (person.hasCar && person.carRef) {
                    person.x = person.carRef.x;
                    person.y = person.carRef.y;
                    continue;
                }

                if (person.hasBoat && person.boatRef) {
                    person.x = person.boatRef.x;
                    person.y = person.boatRef.y;
                    continue;
                }

                person.stateTimer = person.stateTimer - 1;

                if (person.stateTimer <= 0) {
                    person.stateTimer = 80 + Math.floor(Math.random() * 300);

                    const availableTargets = [];
                    for (let j = 0; j < gameState.buildings.length; j++) {
                        const b = gameState.buildings[j];
                        const info = buildingTypes[b.type];
                        if (info && !info.isRoad && !info.isRail && !info.isRoadCurve) {
                            availableTargets.push(b);
                        }
                    }

                    if (availableTargets.length > 0 && Math.random() < 0.7) {
                        person.target = availableTargets[Math.floor(Math.random() * availableTargets.length)];
                        person.state = 'visiting';
                    } else {
                        person.target = null;
                        person.state = 'walking';
                        person.vx = (Math.random() - 0.5) * 1.5;
                        person.vy = (Math.random() - 0.5) * 1.5;
                    }
                }

                if (person.state === 'visiting' && person.target) {
                    const targetCenterX = person.target.x + person.target.w / 2;
                    const targetCenterY = person.target.y + person.target.h / 2;
                    const dx = targetCenterX - person.x;
                    const dy = targetCenterY - person.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 12) {
                        person.state = 'inside';
