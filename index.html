<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chugur Studio — Генератор договоров</title>
    <style>
        :root {
            --loan: #2e7d32; --loan-bg: #e8f5e9;
            --sale: #1565c0; --sale-bg: #e3f2fd;
            --service: #6a1b9a; --service-bg: #f3e5f5;
            --gift: #c62828; --gift-bg: #ffebee;
            --rent: #e65100; --rent-bg: #fff3e0;
            --default-border: #ccc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body {
            background: #f0f2f5;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .app-container {
            max-width: 950px; width: 100%; background: white;
            border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            color: white; padding: 24px 30px; text-align: center;
        }
        .header h1 { font-size: 2rem; font-weight: 600; letter-spacing: 0.5px; }
        .chugur-badge {
            display: inline-block; background: #ffd966; color: #1e1e2f;
            padding: 6px 16px; border-radius: 30px; font-weight: 700;
            font-size: 0.9rem; margin-top: 8px;
        }
        .step { padding: 25px 30px; border-bottom: 1px solid #eee; transition: all 0.3s; }
        .step-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; color: #333; }
        textarea, input, select {
            width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0;
            border-radius: 14px; font-size: 15px; transition: border 0.2s;
            line-height: 1.5; background: white;
        }
        textarea:focus, input:focus, select:focus { outline: none; border-color: #ffd966; }
        .example-hint { font-size: 0.8rem; color: #999; margin-top: -6px; margin-bottom: 12px; }
        .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 15px; }
        .btn {
            padding: 14px 24px; border-radius: 30px; border: none;
            font-weight: 600; font-size: 0.95rem; cursor: pointer;
            transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
            background: #1e1e2f; color: white; min-height: 48px;
        }
        .btn:hover { background: #33334d; }
        .btn-outline {
            background: white; border: 2px solid #1e1e2f; color: #1e1e2f;
        }
        .btn-outline:hover { background: #f5f5fa; }
        .btn-copy { background: #ffd966; color: #1e1e2f; border: none; }
        .btn-copy:hover { background: #ffeb9f; }
        .details-form {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 16px; margin-top: 10px;
        }
        .details-form label { font-weight: 600; font-size: 0.9rem; color: #444; display: block; }
        .details-form input, .details-form select { margin-top: 4px; }
        .full-width { grid-column: span 2; }
        .contract-output {
            padding: 25px 30px; background: #fafafa;
            display: flex; flex-direction: column; gap: 15px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .contract-box {
            background: white; border: 1px solid #ddd; border-radius: 14px;
            padding: 25px; white-space: pre-wrap;
            font-family: 'Courier New', monospace; font-size: 14px; line-height: 1.7;
            color: #2c2c2c; max-height: 600px; overflow-y: auto;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
            transition: border-color 0.3s;
        }
        .action-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .footer-note { text-align: center; font-size: 0.8rem; color: #aaa; margin-top: 8px; }
        .error-msg { color: #d32f2f; font-weight: 500; font-size: 0.9rem; margin-top: 8px; }
        .hidden { display: none !important; }
        .history-panel {
            position: fixed; top: 0; right: 0; width: 320px; height: 100vh;
            background: white; box-shadow: -5px 0 20px rgba(0,0,0,0.15);
            transform: translateX(100%); transition: transform 0.3s ease;
            padding: 20px; overflow-y: auto; z-index: 1000;
        }
        .history-panel.open { transform: translateX(0); }
        .history-item {
            padding: 12px; border: 1px solid #eee; border-radius: 10px;
            margin-bottom: 10px; cursor: pointer; transition: background 0.2s;
        }
        .history-item:hover { background: #f9f9f9; }
        .history-item-date { font-size: 0.7rem; color: #999; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 999; display: none; }
        .overlay.open { display: block; }
        @media (max-width: 600px) {
            .details-form { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .header h1 { font-size: 1.5rem; }
            .app-container { border-radius: 12px; }
            .btn { width: 100%; justify-content: center; }
        }
        .pulse { animation: pulse 0.6s ease; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>📄 Генератор договоров</h1>
            <span class="chugur-badge">Chugur Studio</span>
        </div>

        <!-- Шаг 1: описание -->
        <div class="step" id="step1">
            <div class="step-title">Опишите ситуацию в свободной форме</div>
            <textarea id="userInput" placeholder="Например: я должен Васе Пупкину 5000 ₽, вернуть через месяц"></textarea>
            <div class="example-hint">Чем больше деталей: имена, сумма, срок, проценты, предмет.</div>
            <div class="btn-row">
                <button class="btn" id="analyzeBtn">🔍 Анализировать и уточнить</button>
                <button class="btn-outline" id="historyToggleBtn">📚 История</button>
            </div>
            <div id="parseError" class="error-msg"></div>
        </div>

        <!-- Шаг 2: уточнение -->
        <div class="step hidden" id="step2">
            <div class="step-title">Уточните детали договора</div>
            <div class="details-form">
                <div>
                    <label>Тип договора</label>
                    <select id="typeSelect">
                        <option value="loan">💰 Заём</option>
                        <option value="sale">📦 Купля-продажа</option>
                        <option value="service">🛠 Оказание услуг</option>
                        <option value="gift">🎁 Дарение</option>
                        <option value="rent">🏠 Аренда</option>
                        <option value="other">📄 Другое</option>
                    </select>
                </div>
                <div>
                    <label>Сторона 1 (кто даёт / продаёт)</label>
                    <input type="text" id="party1Input" placeholder="Иван Иванов">
                </div>
                <div>
                    <label>Сторона 2 (кто берёт / покупает)</label>
                    <input type="text" id="party2Input" placeholder="Петр Петров">
                </div>
                <div>
                    <label>Сумма</label>
                    <input type="text" id="amountInput" placeholder="50 000 ₽">
                </div>
                <div>
                    <label>Срок</label>
                    <input type="text" id="termInput" placeholder="6 месяцев / до 01.01.2025">
                </div>
                <div>
                    <label>Проценты / ставка</label>
                    <input type="text" id="percentInput" placeholder="5% годовых">
                </div>
                <div class="full-width">
                    <label>Предмет договора</label>
                    <input type="text" id="subjectInput" placeholder="Денежные средства, автомобиль...">
                </div>
                <div class="full-width">
                    <label>Дополнительные условия (неустойка, залог и пр.)</label>
                    <input type="text" id="extraInput" placeholder="Например: залог — ноутбук, неустойка 0,1% за день">
                </div>
            </div>
            <div class="btn-row">
                <button class="btn" id="generateBtn">✨ Сгенерировать договор</button>
                <button class="btn-outline" id="backBtn">← Назад</button>
            </div>
        </div>

        <!-- Результат -->
        <div class="contract-output hidden" id="outputSection">
            <div class="contract-box" id="contractText"></div>
            <div class="action-buttons">
                <button class="btn-copy" id="copyBtn">📋 Копировать</button>
                <button class="btn-outline" id="downloadBtn">⬇️ Скачать .txt</button>
                <button class="btn-outline" id="printBtn">🖨️ Печать</button>
            </div>
            <div class="footer-note">Документ сгенерирован <strong>Chugur Studio</strong> • Не официальный документ</div>
        </div>
    </div>

    <!-- Панель истории -->
    <div class="overlay" id="overlay"></div>
    <div class="history-panel" id="historyPanel">
        <h3 style="margin-bottom:15px;">📜 История договоров</h3>
        <div id="historyList"></div>
        <button class="btn-outline" id="closeHistoryBtn" style="width:100%; margin-top:15px;">Закрыть</button>
    </div>

    <script>
        (() => {
            // DOM элементы
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            const userInput = document.getElementById('userInput');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const parseError = document.getElementById('parseError');
            const typeSelect = document.getElementById('typeSelect');
            const party1Input = document.getElementById('party1Input');
            const party2Input = document.getElementById('party2Input');
            const amountInput = document.getElementById('amountInput');
            const termInput = document.getElementById('termInput');
            const percentInput = document.getElementById('percentInput');
            const subjectInput = document.getElementById('subjectInput');
            const extraInput = document.getElementById('extraInput');
            const generateBtn = document.getElementById('generateBtn');
            const backBtn = document.getElementById('backBtn');
            const outputSection = document.getElementById('outputSection');
            const contractTextDiv = document.getElementById('contractText');
            const copyBtn = document.getElementById('copyBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const printBtn = document.getElementById('printBtn');
            const historyToggleBtn = document.getElementById('historyToggleBtn');
            const historyPanel = document.getElementById('historyPanel');
            const overlay = document.getElementById('overlay');
            const historyList = document.getElementById('historyList');
            const closeHistoryBtn = document.getElementById('closeHistoryBtn');

            // Хранилище истории
            const HISTORY_KEY = 'chugur_contracts_history';
            const MAX_HISTORY = 10;

            // ========== Утилиты ==========
            const capitalize = s => s.replace(/(^|\s)\S/g, l => l.toUpperCase());

            function getHistory() {
                try {
                    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
                } catch { return []; }
            }
            function saveHistory(contractText, type) {
                const history = getHistory();
                const now = new Date().toLocaleString('ru-RU');
                history.unshift({ text: contractText, type, date: now });
                if (history.length > MAX_HISTORY) history.length = MAX_HISTORY;
                localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            }
            function renderHistory() {
                const history = getHistory();
                historyList.innerHTML = history.map((item, idx) => `
                    <div class="history-item" data-index="${idx}">
                        <div class="history-item-date">${item.date}</div>
                        <div>${item.text.substring(0, 50)}...</div>
                    </div>
                `).join('');
                // обработчики кликов
                document.querySelectorAll('.history-item').forEach(el => {
                    el.addEventListener('click', (e) => {
                        const index = el.dataset.index;
                        const item = getHistory()[index];
                        if (item) {
                            contractTextDiv.textContent = item.text;
                            outputSection.classList.remove('hidden');
                            step1.classList.add('hidden');
                            step2.classList.add('hidden');
                            closeHistory();
                        }
                    });
                });
            }

            function openHistory() {
                renderHistory();
                historyPanel.classList.add('open');
                overlay.classList.add('open');
            }
            function closeHistory() {
                historyPanel.classList.remove('open');
                overlay.classList.remove('open');
            }

            // ========== Парсинг текста ==========
            function parseText(text) {
                const lower = text.toLowerCase();
                let data = { type: null, party1: '', party2: '', amount: '', term: '', percent: '', subject: '', extra: '' };

                // Приоритетное определение типа
                if (/(долг|займ|занять|одолжить|ссуд|вернуть долг|кредит)/i.test(text)) data.type = 'loan';
                else if (/(продаж|купить|продать|купл|покупк|приобрести)/i.test(text)) data.type = 'sale';
                else if (/(услуг|оказани|выполнить|сервис|сделать работу)/i.test(text)) data.type = 'service';
                else if (/(дар|подарить|безвозмезд)/i.test(text)) data.type = 'gift';
                else if (/(аренд|снять|найм)/i.test(text)) data.type = 'rent';
                else data.type = 'loan'; // по умолчанию

                // Имена: расширенные паттерны
                const namePatterns = [
                    /(?:я|мне|меня)\s+(?:должен|должна|обязан|обязана)\s+([А-ЯЁ][а-яё]+(?:\s[А-ЯЁ][а-яё]+)?)/i,
                    /должен\s+(?:я\s+)?([А-ЯЁ][а-яё]+(?:\s[А-ЯЁ][а-яё]+)?)/i,
                    /передать\s+([А-ЯЁ][а-яё]+(?:\s[А-ЯЁ][а-яё]+)?)/i,
                    /вернуть\s+([А-ЯЁ][а-яё]+(?:\s[А-ЯЁ][а-яё]+)?)/i,
                    /на\s+([А-ЯЁ][а-яё]+(?:\s[А-ЯЁ][а-яё]+)?)/,
                    /с\s+(?:человеком\s+)?([А-ЯЁ][а-яё]+(?:\s[А-ЯЁ][а-яё]+)?)/i,
                    /я\s+([А-ЯЁ][а-яё]+(?:\s[А-ЯЁ][а-яё]+)?)/i,
                ];
                const allNames = [];
                for (let p of namePatterns) {
                    const m = text.match(p);
                    if (m && m[1]) allNames.push(capitalize(m[1].trim()));
                }
                // Убираем дубликаты, сохраняем первые два
                const unique = [...new Set(allNames)];
                if (unique.length >= 2) { data.party1 = unique[0]; data.party2 = unique[1]; }
                else if (unique.length === 1) data.party1 = unique[0];

                // Сумма: рубли, доллары, евро
                const amountRegex = /(\d[\d\s]*)\s*(₽|\$|€|руб|рублей|р\.|доллар|евро|usd|eur|rub)/i;
                const am = text.match(amountRegex);
                if (am) {
                    let val = am[1].replace(/\s/g, '');
                    let curr = am[2];
                    if (curr === '₽' || /руб/i.test(curr) || /р\./i.test(curr) || /rub/i.test(curr)) curr = '₽';
                    else if (/\$|доллар|usd/i.test(curr)) curr = '$';
                    else if (/€|евро|eur/i.test(curr)) curr = '€';
                    data.amount = val + ' ' + curr;
                } else {
                    const num = text.match(/(\d[\d\s]{2,})/);
                    if (num) data.amount = num[1].replace(/\s/g, '') + ' ₽';
                }

                // Срок
                const termMatch = text.match(/(?:на|сроком?|в течение)\s+([^.]+?(?:месяц|год|день|недел|до\s+\d{2}\.\d{2}\.\d{4}|до\s+\d{1,2}\s+(?:января|февраля|марта|апреля|мая|июня|июля|августа|сентября|октября|ноября|декабря)\s+\d{4}))/i);
                if (termMatch) data.term = termMatch[1].trim();

                // Проценты
                const perc = text.match(/(?:под|процент[а-я]*|ставк[а-я]*)\s+(\d{1,3}(?:[.,]\d+)?\s*%)/i);
                if (perc) data.percent = perc[1].replace(/\s/g, ' ').trim();
                else {
                    const p2 = text.match(/(\d{1,3}(?:[.,]\d+)?\s*%\s*(?:годовых|в месяц)?)/i);
                    if (p2) data.percent = p2[1].trim();
                }

                // Предмет
                const subj = text.match(/(?:предмет|за|на)\s+(автомобиль|машину|квартиру|дом|ноутбук|телефон|мебель|участок|гараж|драгоценности|денежные средства|вещь|товар|услуги)\s*/i);
                if (subj) data.subject = capitalize(subj[1]);
                else if (data.type === 'loan') data.subject = 'Денежные средства';

                return data;
            }

            // ========== Генерация договора ==========
            function buildContract(type, p1, p2, amount, term, percent, subject, extra) {
                const today = new Date().toLocaleDateString('ru-RU');
                let title = '', role1 = '', role2 = '';
                const borderColor = {
                    loan: 'var(--loan)', sale: 'var(--sale)', service: 'var(--service)',
                    gift: 'var(--gift)', rent: 'var(--rent)', other: 'var(--default-border)'
                };
                switch (type) {
                    case 'loan': title = 'ДОГОВОР ЗАЙМА'; role1 = 'Заимодавец'; role2 = 'Заемщик'; break;
                    case 'sale': title = 'ДОГОВОР КУПЛИ-ПРОДАЖИ'; role1 = 'Продавец'; role2 = 'Покупатель'; break;
                    case 'service': title = 'ДОГОВОР ОКАЗАНИЯ УСЛУГ'; role1 = 'Заказчик'; role2 = 'Исполнитель'; break;
                    case 'gift': title = 'ДОГОВОР ДАРЕНИЯ'; role1 = 'Даритель'; role2 = 'Одаряемый'; break;
                    case 'rent': title = 'ДОГОВОР АРЕНДЫ'; role1 = 'Арендодатель'; role2 = 'Арендатор'; break;
                    default: title = 'ДОГОВОР'; role1 = 'Сторона 1'; role2 = 'Сторона 2';
                }
                const percentBlock = percent && percent !== 'не указаны' ? 
                    `\n        2.2. Процентная ставка: ${percent}.` : 
                    '\n        2.2. Договор является беспроцентным.';
                const extraBlock = extra ? `\n        8. ДОПОЛНИТЕЛЬНЫЕ УСЛОВИЯ\n        ${extra}\n` : '';

                const contract = `
        ${title}
        г. ______________                           «${today}»

        Мы, нижеподписавшиеся:
        ${role1}: ${p1}, паспорт: серия _____ № ________, выдан ________________________,
        ${role2}: ${p2}, паспорт: серия _____ № ________, выдан ________________________,
        совместно именуемые «Стороны», заключили настоящий договор о нижеследующем:

        1. ПРЕДМЕТ ДОГОВОРА
        1.1. ${role1} передаёт, а ${role2} принимает: ${subject}.
        1.2. Стоимость / сумма договора: ${amount}.

        2. УСЛОВИЯ И ПОРЯДОК РАСЧЁТОВ
        2.1. Срок исполнения обязательств: ${term}.${percentBlock}
        2.3. Порядок расчётов: ___________________________________________________.

        3. ПРАВА И ОБЯЗАННОСТИ СТОРОН
        3.1. ${role1} обязуется передать предмет договора в срок.
        3.2. ${role2} обязуется принять и оплатить/возвратить согласно условиям.

        4. ОТВЕТСТВЕННОСТЬ
        4.1. За просрочку исполнения виновная сторона уплачивает неустойку в размере 0,1% от суммы за каждый день просрочки.

        5. ФОРС-МАЖОР
        5.1. Стороны освобождаются от ответственности при обстоятельствах непреодолимой силы.

        6. РАЗРЕШЕНИЕ СПОРОВ
        6.1. Споры решаются путём переговоров, при недостижении согласия – в суде.

        7. СРОК ДЕЙСТВИЯ
        7.1. Договор вступает в силу с момента подписания и действует до полного исполнения.${extraBlock}
        РЕКВИЗИТЫ И ПОДПИСИ СТОРОН
        ${role1}: ___________________ (${p1})
        ${role2}: ___________________ (${p2})

        ---
        Документ создан Chugur Studio (chugur.studio)
                `.trim();
                return contract;
            }

            // ========== Обработчики ==========
            analyzeBtn.addEventListener('click', () => {
                const raw = userInput.value.trim();
                if (!raw) {
                    parseError.textContent = 'Введите описание ситуации.';
                    return;
                }
                parseError.textContent = '';
                const d = parseText(raw);
                typeSelect.value = d.type;
                party1Input.value = d.party1;
                party2Input.value = d.party2;
                amountInput.value = d.amount;
                termInput.value = d.term;
                percentInput.value = d.percent;
                subjectInput.value = d.subject;
                extraInput.value = '';
                step1.classList.add('hidden');
                step2.classList.remove('hidden');
                outputSection.classList.add('hidden');
            });

            backBtn.addEventListener('click', () => {
                step2.classList.add('hidden');
                step1.classList.remove('hidden');
                outputSection.classList.add('hidden');
            });

            generateBtn.addEventListener('click', () => {
                const type = typeSelect.value;
                const p1 = party1Input.value.trim() || '______________________';
                const p2 = party2Input.value.trim() || '______________________';
                const amount = amountInput.value.trim() || 'не указана';
                const term = termInput.value.trim() || 'не указан';
                const percent = percentInput.value.trim() || 'не указаны';
                const subject = subjectInput.value.trim() || 'не определён';
                const extra = extraInput.value.trim();

                const contract = buildContract(type, p1, p2, amount, term, percent, subject, extra);
                contractTextDiv.textContent = contract;
                outputSection.classList.remove('hidden');
                // Цветовая индикация рамки
                const colors = { loan: 'var(--loan)', sale: 'var(--sale)', service: 'var(--service)', gift: 'var(--gift)', rent: 'var(--rent)', other: 'var(--default-border)' };
                contractTextDiv.style.borderColor = colors[type] || 'var(--default-border)';
                // Анимация
                contractTextDiv.classList.add('pulse');
                setTimeout(() => contractTextDiv.classList.remove('pulse'), 600);
                // Сохраняем в историю
                saveHistory(contract, type);
            });

            // Копировать
            copyBtn.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(contractTextDiv.textContent);
                    alert('Текст скопирован!');
                } catch { alert('Не удалось скопировать. Скопируйте вручную.'); }
            });
            // Скачать
            downloadBtn.addEventListener('click', () => {
                const blob = new Blob([contractTextDiv.textContent], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'dogovor_chugur.txt';
                document.body.appendChild(a); a.click();
                document.body.removeChild(a); URL.revokeObjectURL(url);
            });
            // Печать
            printBtn.addEventListener('click', () => {
                const w = window.open('', '_blank');
                w.document.write(`<html><head><title>Договор — Chugur</title></head><body style="font-family:monospace;white-space:pre-wrap;padding:30px;">${contractTextDiv.textContent.replace(/\n/g,'<br>')}</body></html>`);
                w.document.close(); w.print();
            });

            // История
            historyToggleBtn.addEventListener('click', openHistory);
            closeHistoryBtn.addEventListener('click', closeHistory);
            overlay.addEventListener('click', closeHistory);
            window.addEventListener('keydown', e => { if (e.key === 'Escape') closeHistory(); });

            // Ctrl+Enter на шаге 1
            userInput.addEventListener('keydown', e => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyzeBtn.click();
            });
        })();
    </script>
</body>
</html>
