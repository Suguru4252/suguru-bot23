<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Case Opening</title>
<style>
    body {
        margin: 0;
        background: #0f172a;
        color: white;
        font-family: Arial;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
    }

    #case {
        margin: 40px auto;
        width: 600px;
        height: 120px;
        overflow: hidden;
        border: 3px solid #fff;
        position: relative;
    }

    #items {
        display: flex;
        position: absolute;
        left: 0;
        transition: 4s cubic-bezier(0.1, 0.7, 0.1, 1);
    }

    .item {
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        font-size: 12px;
        border-right: 1px solid #000;
    }

    .common { background: gray; }
    .rare { background: blue; }
    .epic { background: purple; }
    .legendary { background: orange; }
    .mythic { background: red; }

    #pointer {
        position: absolute;
        top: 0;
        left: 50%;
        width: 4px;
        height: 120px;
        background: yellow;
        transform: translateX(-50%);
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        cursor: pointer;
        background: #22c55e;
        border: none;
        border-radius: 10px;
    }
</style>
</head>
<body>

<h1>🎁 Открытие кейса</h1>

<div id="case">
    <div id="items"></div>
    <div id="pointer"></div>
</div>

<button onclick="openCase()">ОТКРЫТЬ КЕЙС</button>

<audio id="spinSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>

const itemsData = [
    {name: "Lada Vesta", rarity: "common", chance: 40},
    {name: "BMW M5", rarity: "rare", chance: 25},
    {name: "Mercedes G63", rarity: "epic", chance: 15},
    {name: "Lamborghini", rarity: "legendary", chance: 5},
    {name: "Bugatti", rarity: "mythic", chance: 1}
];

function getRandomItem() {
    let total = itemsData.reduce((sum, i) => sum + i.chance, 0);
    let rand = Math.random() * total;

    for (let item of itemsData) {
        if (rand < item.chance) return item;
        rand -= item.chance;
    }
}

function createRoll() {
    const container = document.getElementById("items");
    container.innerHTML = "";

    for (let i = 0; i < 50; i++) {
        let item = itemsData[Math.floor(Math.random() * itemsData.length)];

        let div = document.createElement("div");
        div.className = "item " + item.rarity;
        div.innerHTML = `<b>${item.name}</b><br>${item.rarity}`;

        container.appendChild(div);
    }
}

function openCase() {
    const container = document.getElementById("items");
    const sound = document.getElementById("spinSound");

    createRoll();

    let winItem = getRandomItem();

    let winIndex = Math.floor(Math.random() * 10) + 30;

    let offset = winIndex * 120 - 300;

    container.style.transition = "none";
    container.style.left = "0px";

    setTimeout(() => {
        container.style.transition = "4s cubic-bezier(0.1, 0.7, 0.1, 1)";
        container.style.left = `-${offset}px`;
        sound.play();
    }, 50);

    setTimeout(() => {
        alert("Тебе выпало: " + winItem.name + " (" + winItem.rarity + ")");
    }, 4200);
}

</script>

</body>
</html>
