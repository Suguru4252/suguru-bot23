<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Продвинутый калькулятор | Дроби · Степени · Функции</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0f1724 0%, #1a1f2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', 'Inter', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Glassmorphism стиль */
        .calculator {
            background: rgba(18, 22, 35, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 550px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.2s ease;
        }

        /* Дисплей */
        .display {
            background: rgba(0, 0, 0, 0.55);
            border-radius: 38px;
            padding: 20px 24px;
            margin-bottom: 25px;
            text-align: right;
            word-wrap: break-word;
            word-break: break-word;
            min-height: 120px;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.4), 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .expression {
            font-size: 1.45rem;
            color: #b9c7d9;
            letter-spacing: 0.3px;
            min-height: 42px;
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            overflow-x: auto;
            white-space: pre-wrap;
        }

        .result {
            font-size: 2.8rem;
            font-weight: 600;
            color: #eef5ff;
            margin-top: 10px;
            font-family: 'Fira Code', monospace;
            word-break: break-word;
            line-height: 1.2;
        }

        /* Сетка кнопок */
        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        button {
            background: rgba(28, 33, 48, 0.8);
            border: none;
            border-radius: 28px;
            padding: 16px 0;
            font-size: 1.3rem;
            font-weight: 500;
            color: #f0f3fa;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            backdrop-filter: blur(4px);
            font-family: 'Segoe UI', 'Fira Code', monospace;
        }

        button:active {
            transform: scale(0.95);
            background: rgba(45, 55, 80, 0.9);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.4);
        }

        .func-btn {
            background: rgba(52, 85, 125, 0.7);
            color: #d9efff;
            font-size: 1.1rem;
        }

        .op-btn {
            background: rgba(217, 119, 6, 0.75);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .eq-btn {
            background: #10b981;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
        }

        .clear-btn {
            background: rgba(220, 53, 69, 0.75);
            color: white;
        }

        .special-btn {
            background: rgba(100, 116, 139, 0.7);
            font-size: 1.2rem;
        }

        @media (max-width: 500px) {
            .buttons {
                gap: 8px;
            }
            button {
                padding: 12px 0;
                font-size: 1rem;
            }
            .result {
                font-size: 2rem;
            }
            .expression {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="calculator">
    <div class="display">
        <div class="expression" id="expression">0</div>
        <div class="result" id="result">= 0</div>
    </div>
    <div class="buttons">
        <!-- 1-й ряд -->
        <button class="clear-btn" data-action="clear">C</button>
        <button class="special-btn" data-action="backspace">⌫</button>
        <button class="func-btn" data-func="sqrt">√</button>
        <button class="func-btn" data-func="pow">xʸ</button>
        <button class="func-btn" data-func="frac">⅟ₓ</button>

        <!-- 2-й ряд -->
        <button data-digit="7">7</button>
        <button data-digit="8">8</button>
        <button data-digit="9">9</button>
        <button class="op-btn" data-op="/">÷</button>
        <button class="func-btn" data-func="sin">sin</button>

        <!-- 3-й ряд -->
        <button data-digit="4">4</button>
        <button data-digit="5">5</button>
        <button data-digit="6">6</button>
        <button class="op-btn" data-op="*">×</button>
        <button class="func-btn" data-func="cos">cos</button>

        <!-- 4-й ряд -->
        <button data-digit="1">1</button>
        <button data-digit="2">2</button>
        <button data-digit="3">3</button>
        <button class="op-btn" data-op="-">−</button>
        <button class="func-btn" data-func="tan">tan</button>

        <!-- 5-й ряд -->
        <button data-digit="0">0</button>
        <button data-digit=".">.</button>
        <button class="func-btn" data-func="(">(</button>
        <button class="func-btn" data-func=")">)</button>
        <button class="eq-btn" data-action="equals">=</button>

        <!-- 6-й ряд (доп. функции) -->
        <button class="func-btn" data-func="pi">π</button>
        <button class="func-btn" data-func="e">e</button>
        <button class="func-btn" data-func="abs">|x|</button>
        <button class="func-btn" data-func="ln">ln</button>
        <button class="func-btn" data-func="log">log₁₀</button>
    </div>
</div>

<script>
    // ---------- Продвинутый парсер выражений (с поддержкой дробей, степеней, функций) ----------
    // Используем Function + подстановку, но с безопасной проверкой и расширенными математическими функциями
    
    let currentExpression = "0";   // то, что видит пользователь
    let lastResult = null;
    let waitingForOperand = false;
    
    const expressionDiv = document.getElementById("expression");
    const resultDiv = document.getElementById("result");
    
    function updateDisplay() {
        // Показываем выражение, но если пусто — ставим 0
        let dispExpr = currentExpression === "" ? "0" : currentExpression;
        expressionDiv.innerText = dispExpr;
        if (waitingForOperand && lastResult !== null) {
            resultDiv.innerText = `= ${formatResult(lastResult)}`;
        } else {
            // пробуем вычислить на лету (опционально)
            try {
                let computed = evaluateExpression(currentExpression);
                if (isFinite(computed) && !isNaN(computed) && currentExpression.trim() !== "") {
                    resultDiv.innerText = `≈ ${formatResult(computed)}`;
                } else {
                    resultDiv.innerText = `= ?`;
                }
            } catch(e) {
                resultDiv.innerText = `= ?`;
            }
        }
    }
    
    function formatResult(num) {
        if (num === null || isNaN(num) || !isFinite(num)) return "Ошибка";
        // округление до 10 знаков, убираем лишние нули
        let rounded = parseFloat(num.toFixed(10));
        let str = rounded.toString();
        if (str.length > 20) return num.toExponential(8);
        return str;
    }
    
    // БЕЗОПАСНЫЙ математический evaluator
    function evaluateExpression(expr) {
        if (!expr || expr.trim() === "") return 0;
        // подготовка строки: заменяем символы ×, ÷, ^
        let prepared = expr
            .replace(/×/g, '*')
            .replace(/÷/g, '/')
            .replace(/\^/g, '**')
            .replace(/π/g, 'Math.PI')
            .replace(/e(?![a-z])/g, 'Math.E')   // e как число Эйлера, но не внутри exp
            .replace(/ln\(/g, 'Math.log(')
            .replace(/log\(/g, 'Math.log10(')
            .replace(/sqrt\(/g, 'Math.sqrt(')
            .replace(/sin\(/g, 'Math.sin(')
            .replace(/cos\(/g, 'Math.cos(')
            .replace(/tan\(/g, 'Math.tan(')
            .replace(/abs\(/g, 'Math.abs(');
        
        // добавим поддержку факториала (пользовательский) – просто для продвинутости
        // факториал вида 5! (только целые неотрицательные)
        // реализуем через замену перед вычислением
        let factorialReplaced = prepared.replace(/(\d+)!/g, (_, num) => {
            let n = parseInt(num);
            if (isNaN(n) || n < 0) return 'NaN';
            let fact = 1;
            for (let i = 2; i <= n; i++) fact *= i;
            return fact;
        });
        
        // дополнительно разрешим символ % (проценты) простые - но для калькулятора ок
        // преобразуем x% -> x/100
        let percentReplaced = factorialReplaced.replace(/(\d+(?:\.\d+)?)%/g, (_, p) => `(${p}/100)`);
        
        // проверка на недопустимые символы (только цифры, операторы, функции, точки, скобки, **, Math.xxx)
        // но безопаснее просто использовать new Function с контекстом window.Math
        // ВАЖНО: не передаём доступ к опасным объектам
        const mathContext = {
            Math: Math,
            pow: Math.pow,
            abs: Math.abs,
            sin: Math.sin,
            cos: Math.cos,
            tan: Math.tan,
            log: Math.log,
            log10: Math.log10,
            sqrt: Math.sqrt,
            PI: Math.PI,
            E: Math.E
        };
        
        // составим финальное выражение: добавим поддержку ** и функций
        let finalExpr = percentReplaced;
        // добавим неявное умножение? (2(3+4) -> 2*(3+4)) — для удобства
        finalExpr = finalExpr.replace(/(\d+|\))(\()/g, '$1*$2');
        finalExpr = finalExpr.replace(/(\d+)([a-zA-Z])/g, '$1*$2'); // 2sin -> 2*sin
        
        // ВАЖНО: функция power дополнительная — xʸ в интерфейсе вызывает возведение, но в самой строке уже ^ обработано в **
        // также поддержим корень sqrt
        
        let computed;
        try {
            // Используем Function для вычисления, но изолируем доступ к глобальным объектам
            const evaluator = new Function('Math', 'return (' + finalExpr + ')');
            computed = evaluator(mathContext.Math);
            if (isNaN(computed) || !isFinite(computed)) throw new Error("Math error");
            return computed;
        } catch (err) {
            console.warn("Evaluation error: ", err);
            // дополнительная попытка если что-то пошло не так с форматированием
            throw new Error("Invalid expression");
        }
    }
    
    // Добавление в выражение
    function appendToExpression(value, type = 'digit') {
        if (waitingForOperand && lastResult !== null) {
            // Если только что нажали равно и хотим продолжить — стартуем новое выражение с результатом
            if (type === 'digit' || value === '.' || (type === 'func' && ['+','-','*','/','^'].includes(value) === false)) {
                currentExpression = lastResult.toString();
                waitingForOperand = false;
            } else if (type === 'op') {
                currentExpression = lastResult.toString();
                waitingForOperand = false;
                currentExpression += value;
                updateDisplay();
                return;
            } else if (type === 'func' && ['+','-','*','/'].includes(value)){
                currentExpression = lastResult.toString();
                waitingForOperand = false;
                currentExpression += value;
                updateDisplay();
                return;
            }
        }
        
        if (currentExpression === "0" && type === 'digit' && value !== '.' && !(value === '0' && currentExpression === "0")) {
            currentExpression = value;
        } 
        else if (type === 'digit' || value === '.') {
            // избегаем двух точек подряд
            if (value === '.' && currentExpression.split(/[\+\-\*\/\^\(\)]/).pop().includes('.')) return;
            currentExpression += value;
        }
        else if (type === 'op') {
            // замена последнего оператора, если подряд
            if (currentExpression.match(/[\+\-\*\/\^]$/)) {
                currentExpression = currentExpression.slice(0, -1) + value;
            } else {
                currentExpression += value;
            }
        }
        else if (type === 'func') {
            // добавляем функции (sin, cos, sqrt, ln, pi и т.д.)
            currentExpression += value;
        }
        
        // чистка слишком длинного
        if (currentExpression.length > 70) currentExpression = currentExpression.slice(0, 70);
        updateDisplay();
    }
    
    function clearAll() {
        currentExpression = "0";
        lastResult = null;
        waitingForOperand = false;
        updateDisplay();
    }
    
    function backspace() {
        if (waitingForOperand && lastResult !== null) {
            // если ждём операнд после равно — стираем результат
            clearAll();
            return;
        }
        if (currentExpression.length === 1 || (currentExpression === "0")) {
            currentExpression = "0";
        } else {
            currentExpression = currentExpression.slice(0, -1);
            if (currentExpression === "") currentExpression = "0";
        }
        updateDisplay();
    }
    
    function calculateResult() {
        if (currentExpression === "" || currentExpression === "0") {
            lastResult = 0;
            resultDiv.innerText = "= 0";
            waitingForOperand = true;
            return;
        }
        try {
            let evaluated = evaluateExpression(currentExpression);
            if (isNaN(evaluated) || !isFinite(evaluated)) {
                resultDiv.innerText = "= Ошибка";
                lastResult = null;
                waitingForOperand = false;
                return;
            }
            lastResult = evaluated;
            resultDiv.innerText = `= ${formatResult(evaluated)}`;
            waitingForOperand = true;
            // НЕ обновляем выражение, оставляем его видимым, но после следующего ввода начнём новое
        } catch (err) {
            resultDiv.innerText = "= Ошибка";
            lastResult = null;
            waitingForOperand = false;
        }
    }
    
    // Обработка специальных команд и кнопок
    function handleButton(btn) {
        // Цифры и десятичная точка
        if (btn.hasAttribute('data-digit')) {
            let digit = btn.getAttribute('data-digit');
            appendToExpression(digit, 'digit');
            return;
        }
        if (btn.hasAttribute('data-op')) {
            let op = btn.getAttribute('data-op');
            let mapped = op;
            if (op === '/') mapped = '÷';
            if (op === '*') mapped = '×';
            appendToExpression(mapped, 'op');
            return;
        }
        if (btn.hasAttribute('data-func')) {
            let func = btn.getAttribute('data-func');
            switch (func) {
                case 'sqrt':
                    appendToExpression('sqrt(', 'func');
                    break;
                case 'pow':
                    appendToExpression('^(', 'func');
                    break;
                case 'frac':
                    appendToExpression('(1/', 'func');
                    break;
                case 'sin':
                    appendToExpression('sin(', 'func');
                    break;
                case 'cos':
                    appendToExpression('cos(', 'func');
                    break;
                case 'tan':
                    appendToExpression('tan(', 'func');
                    break;
                case 'pi':
                    appendToExpression('π', 'func');
                    break;
                case 'e':
                    appendToExpression('e', 'func');
                    break;
                case 'abs':
                    appendToExpression('abs(', 'func');
                    break;
                case 'ln':
                    appendToExpression('ln(', 'func');
                    break;
                case 'log':
                    appendToExpression('log(', 'func');
                    break;
                case '(':
                    appendToExpression('(', 'func');
                    break;
                case ')':
                    appendToExpression(')', 'func');
                    break;
                default: break;
            }
            return;
        }
        if (btn.hasAttribute('data-action')) {
            let action = btn.getAttribute('data-action');
            if (action === 'clear') clearAll();
            if (action === 'backspace') backspace();
            if (action === 'equals') calculateResult();
            return;
        }
    }
    
    // Навесить обработчики на все кнопки
    const buttons = document.querySelectorAll('button');
    buttons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            handleButton(btn);
        });
    });
    
    // начальная инициализация
    updateDisplay();
</script>
</body>
</html>
