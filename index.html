<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Караоке у Артема | Ритм-игра</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', system-ui, -apple-system, 'Inter', sans-serif;
            padding: 20px;
        }

        /* Главный контейнер */
        .game-container {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            border-radius: 64px;
            padding: 20px 25px 30px 25px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 36px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 200, 50, 0.4);
            cursor: pointer;
            background-color: #0b0f1a;
        }

        /* Панель управления */
        .info-panel {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background: rgba(20, 25, 40, 0.7);
            backdrop-filter: blur(4px);
            padding: 12px 25px;
            border-radius: 60px;
            border: 1px solid rgba(255, 210, 90, 0.5);
        }

        .score-box {
            background: #000000aa;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.7rem;
            letter-spacing: 2px;
            color: #FFE484;
            text-shadow: 0 0 5px #ffb347;
            font-family: monospace;
        }

        .score-box span {
            font-size: 1rem;
            color: #ddd;
            margin-right: 8px;
        }

        .combo-box {
            background: #2a1e3caa;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.4rem;
            color: #D9A7FF;
            text-shadow: 0 0 3px #a855f7;
        }

        .status-badge {
            background: #1e2a3a;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            color: #ffdf8c;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button {
            background: radial-gradient(circle at 30% 10%, #f5b042, #d97a0c);
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 26px;
            border-radius: 60px;
            color: #1e1a0c;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #7a3e05;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #7a3e05;
        }

        .controls-hint {
            display: flex;
            gap: 12px;
            background: #00000066;
            padding: 5px 15px;
            border-radius: 48px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #ccc;
        }

        .key {
            background: #2f2f3f;
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-weight: bold;
            color: #ffcd7e;
            box-shadow: inset 0 -1px 0 #fff2, 0 1px 2px #000;
        }

        @media (max-width: 700px) {
            .game-container {
                padding: 12px 18px 20px;
            }
            .score-box { font-size: 1.3rem; padding: 4px 14px;}
            .combo-box { font-size: 1.1rem; }
            button { font-size: 1rem; padding: 6px 18px;}
            .controls-hint { font-size: 0.7rem; gap: 6px;}
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="karaokeCanvas" width="800" height="500" style="width:100%; height:auto; max-width:800px; aspect-ratio:800/500"></canvas>

        <div class="info-panel">
            <div class="score-box"><span>🎤 ОЧКИ</span> <span id="scoreValue">0</span></div>
            <div class="combo-box">✨ КОМБО ✨ <span id="comboValue">0</span></div>
            <div class="status-badge" id="gameStatusText">▶ В ИГРЕ</div>
            <button id="resetGameBtn">🎙 НОВАЯ ПЕСНЯ</button>
        </div>
        <div class="controls-hint">
            <span>🎹 ХИТЬ ПО КЛАВИШАМ:</span>
            <span class="key">⬅️ A / ←</span>
            <span class="key">⬆️ S / ↑</span>
            <span class="key">⬇️ D / ↓</span>
            <span class="key">➡️ F / →</span>
            <span>🎤 (или мышь/тап по дорожкам)</span>
        </div>
    </div>
</div>

<script>
    (function() {
        // ------------------- НАСТРОЙКИ КАРАОКЕ-РИТМА -------------------
        const canvas = document.getElementById('karaokeCanvas');
        const ctx = canvas.getContext('2d');
        
        // Размеры канваса (фикс для логики)
        const CANVAS_W = 800;
        const CANVAS_H = 500;
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;
        
        // Дорожки: 4 штуки (влево, вверх, вниз, вправо)
        const LANES = 4;
        const LANE_NAMES = ['← ЛЕВО', '↑ ВВЕРХ', '↓ ВНИЗ', '→ ПРАВО'];
        const KEY_MAP = {
            'ArrowLeft': 0, 'a': 0, 'A': 0,
            'ArrowUp': 1, 'w': 1, 'W': 1,   // также W для удобства
            'ArrowDown': 2, 's': 2, 'S': 2,
            'ArrowRight': 3, 'd': 3, 'D': 3
        };
        
        // Зона попадания (Y координата линии ритма)
        const HIT_LINE_Y = CANVAS_H - 110;
        // Зона идеального попадания (в пикселях от линии)
        const PERFECT_WINDOW = 18;   // px
        const GOOD_WINDOW = 38;       // px
        const MISS_WINDOW = 65;
        
        // Параметры нот
        let notes = [];
        let score = 0;
        let combo = 0;
        let gameActive = true;
        let animationId = null;
        
        // Эффекты обратной связи
        let feedbackText = { text: '', alpha: 0, x: 0, y: 0 };
        let laneFlash = [false, false, false, false];
        let particles = [];
        
        // Визуальные параметры
        let lastTimestamp = 0;
        let scrollSpeed = 3.8;    // пикселей за кадр (60fps -> ~228px/сек)
        let beatInterval = 85;      // интервал между нотами (в кадрах, ~1.4 сек при 60fps) - сделаем динамическую генерацию
        let frameCounter = 0;
        let generationGap = 38;      // кадры между генерацией нот (примерно 0.63 сек при 60fps)
        let genCounter = 0;
        
        // Музыкальное сопровождение (имитация караоке - звуки метронома и эффекты через Web Audio)
        let audioCtx = null;
        let allowAudio = false;
        
        // Инициализация аудио по первому взаимодействию
        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                // просто создаём контекст, но не стартуем до первого нажатия/старта
            } catch(e) { console.warn("Web Audio не поддерживается"); }
        }
        
        function playHitSound(isPerfect, lane) {
            if (!audioCtx || !allowAudio) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            let freq = 440 + lane * 55;
            if (isPerfect) freq = 660 + lane * 40;
            else freq = 330 + lane * 45;
            osc.frequency.value = freq;
            gain.gain.value = 0.25;
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
            osc.start();
            osc.stop(now + 0.35);
        }
        
        function playMissSound() {
            if (!audioCtx || !allowAudio) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 180;
            gain.gain.value = 0.18;
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
            osc.start();
            osc.stop(now + 0.3);
        }
        
        function playMetroTick() {
            if (!audioCtx || !allowAudio) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.08;
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
            osc.start();
            osc.stop(now + 0.12);
        }
        
        // Генерация новой ноты (рандомная дорожка)
        function generateNote() {
            if (!gameActive) return;
            const lane = Math.floor(Math.random() * LANES);
            notes.push({
                lane: lane,
                y: -30,               // старт с верхней части
                hit: false,
                missMark: false
            });
        }
        
        // Обновление позиций нот и проверка на пропуск (мимо линии)
        function updateNotes() {
            if (!gameActive) return;
            for (let i = 0; i < notes.length; i++) {
                const n = notes[i];
                n.y += scrollSpeed;
                // Если нота ушла за линию + мисс зона
                if (!n.hit && n.y > HIT_LINE_Y + MISS_WINDOW) {
                    // ПРОПУСК (мисс)
                    n.hit = true;
                    n.missMark = true;
                    combo = 0;
                    updateComboUI();
                    playMissSound();
                    addFeedback("МИСС!", CANVAS_W/2, HIT_LINE_Y - 20, "#ff8866");
                    // создаем эффект частиц
                    addMissParticles(n.lane);
                    // снимаем очки?
                    // не отнимаем очки, просто сброс комбо и звук
                }
            }
            // удаляем ушедшие далеко ноты (за пределы)
            notes = notes.filter(n => n.y < CANVAS_H + 100);
        }
        
        // Обработка попадания по ноте
        function hitNote(lane) {
            if (!gameActive) return false;
            // ищем ближайшую ноту на этой дорожке, которая ещё не обработана и находится в зоне попадания
            let closest = null;
            let minDist = Infinity;
            for (let i = 0; i < notes.length; i++) {
                const n = notes[i];
                if (n.hit) continue;
                if (n.lane === lane) {
                    const distY = Math.abs(n.y - HIT_LINE_Y);
                    if (distY < MISS_WINDOW && distY < minDist) {
                        minDist = distY;
                        closest = n;
                    }
                }
            }
            if (!closest) {
                // ложное нажатие — сброс комбо (штраф)
                if (gameActive) {
                    combo = 0;
                    updateComboUI();
                    addFeedback("ПРОМАХ!", laneToX(lane) + 20, HIT_LINE_Y - 15, "#ccaa77");
                    playMissSound();
                    laneFlash[lane] = true;
                    setTimeout(() => { laneFlash[lane] = false; }, 120);
                }
                return false;
            }
            
            // попадание!
            const dist = Math.abs(closest.y - HIT_LINE_Y);
            let isPerfect = false;
            let pointsGain = 0;
            if (dist <= PERFECT_WINDOW) {
                pointsGain = 100;
                isPerfect = true;
                addFeedback("ПЕРФЕКТ!", laneToX(lane) + 20, HIT_LINE_Y - 20, "#ffd966");
                combo++;
            } else if (dist <= GOOD_WINDOW) {
                pointsGain = 60;
                addFeedback("ХОРОШО!", laneToX(lane) + 20, HIT_LINE_Y - 18, "#b9f6ca");
                combo++;
            } else {
                pointsGain = 30;
                addFeedback("ПОПАЛ!", laneToX(lane) + 20, HIT_LINE_Y - 18, "#aaccff");
                combo++;
            }
            
            // бонус комбо: множитель (каждые 5 комбо +5% очков)
            let comboBonus = 1 + Math.floor(combo / 10) * 0.05;
            let finalPoints = Math.floor(pointsGain * comboBonus);
            score += finalPoints;
            updateScoreUI();
            updateComboUI();
            
            // отметить ноту как сыгранную
            closest.hit = true;
            // визуальный флеш
            laneFlash[lane] = true;
            setTimeout(() => { laneFlash[lane] = false; }, 100);
            playHitSound(isPerfect, lane);
            addHitParticles(lane, HIT_LINE_Y, isPerfect);
            return true;
        }
        
        // Вспомогательные функции для частиц и обратной связи
        function addFeedback(msg, x, y, color) {
            feedbackText = { text: msg, alpha: 1.0, x: x, y: y, color: color };
        }
        
        function addHitParticles(lane, yPos, perfect) {
            const xBase = laneToX(lane) + 30;
            for (let i = 0; i < 5 + (perfect ? 3 : 0); i++) {
                particles.push({
                    x: xBase + (Math.random() - 0.5) * 20,
                    y: yPos + (Math.random() - 0.5) * 12,
                    vx: (Math.random() - 0.5) * 3,
                    vy: (Math.random() - 1.5) * 2.5 - 1,
                    life: 0.8,
                    color: perfect ? "#FFD966" : "#F4C542"
                });
            }
        }
        
        function addMissParticles(lane) {
            const xBase = laneToX(lane) + 30;
            for (let i = 0; i < 6; i++) {
                particles.push({
                    x: xBase + (Math.random() - 0.5) * 28,
                    y: HIT_LINE_Y + (Math.random() - 0.5) * 20,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 1) * 3,
                    life: 0.6,
                    color: "#CC8866"
                });
            }
        }
        
        function updateParticles() {
            for (let i=0; i<particles.length; i++) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life -= 0.025;
                particles[i].vy += 0.15;
            }
            particles = particles.filter(p => p.life > 0);
            if (feedbackText.alpha > 0) {
                feedbackText.alpha -= 0.025;
                feedbackText.y -= 1.2;
            }
        }
        
        // Обновление UI
        function updateScoreUI() {
            document.getElementById('scoreValue').innerText = Math.floor(score);
        }
        function updateComboUI() {
            document.getElementById('comboValue').innerText = combo;
        }
        
        // Преобразование lane в X координату (центр дорожки)
        function laneToX(lane) {
            const laneWidth = CANVAS_W / LANES;
            return lane * laneWidth + laneWidth / 2 - 25; // для отрисовки смещение
        }
        
        // Отрисовка всей сцены
        function draw() {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            
            // Фоновый градиент "караоке-сцена"
            const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
            grad.addColorStop(0, '#101624');
            grad.addColorStop(1, '#1b1f32');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            
            // Отрисовка дорожек
            const laneW = CANVAS_W / LANES;
            for (let i = 0; i < LANES; i++) {
                ctx.beginPath();
                ctx.strokeStyle = "rgba(255,210,100,0.35)";
                ctx.lineWidth = 2;
                ctx.strokeRect(i*laneW+5, 20, laneW-10, CANVAS_H-40);
                ctx.fillStyle = "rgba(255,240,180,0.1)";
                ctx.fillRect(i*laneW+5, 20, laneW-10, CANVAS_H-40);
                // подписи
                ctx.font = "bold 16px 'Segoe UI'";
                ctx.fillStyle = "#FFDD99";
                ctx.shadowBlur = 0;
                ctx.fillText(LANE_NAMES[i], i*laneW + laneW/2 - 30, 55);
                // вспышка при нажатии
                if (laneFlash[i]) {
                    ctx.fillStyle = "rgba(255,200,80,0.5)";
                    ctx.fillRect(i*laneW+5, 20, laneW-10, CANVAS_H-40);
                }
            }
            ctx.shadowBlur = 0;
            
            // линия ритма
            ctx.beginPath();
            ctx.moveTo(0, HIT_LINE_Y);
            ctx.lineTo(CANVAS_W, HIT_LINE_Y);
            ctx.strokeStyle = "#FFB347";
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = "#FFD966aa";
            ctx.font = "bold 14px monospace";
            ctx.fillText("🎤 ПОПАДАЙ СЮДА 🎤", CANVAS_W/2-100, HIT_LINE_Y-8);
            
            // отрисовка нот (круглые нотки)
            for (let n of notes) {
                if (n.hit) continue;
                const laneX = n.lane * laneW + laneW/2;
                const radius = 18;
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#ffbb44";
                ctx.beginPath();
                ctx.arc(laneX, n.y, radius, 0, Math.PI*2);
                ctx.fillStyle = "#FAC05E";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(laneX, n.y, radius-3, 0, Math.PI*2);
                ctx.fillStyle = "#F57C00";
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = "bold 18px monospace";
                ctx.fillText("♪", laneX-9, n.y+7);
                ctx.shadowBlur = 0;
            }
            
            // частицы
            for (let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            
            // фидбек текст
            if (feedbackText.alpha > 0) {
                ctx.font = "bold 32px 'Segoe UI'";
                ctx.shadowBlur = 6;
                ctx.fillStyle = feedbackText.color || "#FFE484";
                ctx.globalAlpha = feedbackText.alpha;
                ctx.fillText(feedbackText.text, feedbackText.x-30, feedbackText.y);
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
            
            // Декоративная надпись "КАРАОКЕ У АРТЕМА"
            ctx.font = "800 28px 'Montserrat'";
            ctx.fillStyle = "#E7C458";
            ctx.shadowBlur = 0;
            ctx.fillText("🎙 КАРАОКЕ У АРТЕМА 🎙", 30, 45);
            ctx.font = "italic 12px monospace";
            ctx.fillStyle = "#bbaaff";
            ctx.fillText("жми в ритм, становись звездой", CANVAS_W-170, 90);
        }
        
        // Генерация ритмических нот (караоке-поток)
        let generationInterval = null;
        function startSongGeneration() {
            if (generationInterval) clearInterval(generationInterval);
            // генерим ноты каждые 620-750 мс (как ритм песни)
            generationInterval = setInterval(() => {
                if (gameActive) {
                    generateNote();
                    // небольшой звуковой метроном для атмосферы (мягкий)
                    if (allowAudio && audioCtx) playMetroTick();
                }
            }, 720);
        }
        
        function resetGame() {
            gameActive = true;
            notes = [];
            score = 0;
            combo = 0;
            particles = [];
            updateScoreUI();
            updateComboUI();
            document.getElementById('gameStatusText').innerText = "🎤 В ИГРЕ";
            // чистим интервалы и перезапускаем
            if (generationInterval) clearInterval(generationInterval);
            startSongGeneration();
            addFeedback("НОВЫЙ ТРЭК!", CANVAS_W/2-50, HIT_LINE_Y-50, "#ffc285");
        }
        
        function endGame() {
            gameActive = false;
            if (generationInterval) clearInterval(generationInterval);
            document.getElementById('gameStatusText').innerText = "🏆 ЗАВЕРШЕНО";
            addFeedback("КОНЕЦ ПЕСНИ! НАЧНИ ЗАНОВО", CANVAS_W/2-150, HIT_LINE_Y-40, "#ffaa88");
        }
        
        // События ввода (клавиатура и мышь/тач)
        function handleHit(laneIndex) {
            if (!gameActive) return;
            hitNote(laneIndex);
        }
        
        function onKeyDown(e) {
            const key = e.key;
            if (KEY_MAP.hasOwnProperty(key)) {
                e.preventDefault();
                const lane = KEY_MAP[key];
                handleHit(lane);
            }
            // дополнительно пробел для рестарта? нет, но кнопка есть
        }
        
        function onCanvasTap(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            let clientX;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                e.preventDefault();
            } else {
                clientX = e.clientX;
            }
            const canvasX = (clientX - rect.left) * scaleX;
            if (canvasX >= 0 && canvasX <= CANVAS_W) {
                const laneWidth = CANVAS_W / LANES;
                const laneIndex = Math.floor(canvasX / laneWidth);
                if (laneIndex >= 0 && laneIndex < LANES) {
                    handleHit(laneIndex);
                }
            }
        }
        
        // Анимационный цикл
        function gameLoop() {
            if (!gameActive) {
                draw();
                requestAnimationFrame(gameLoop);
                return;
            }
            updateNotes();
            updateParticles();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // Активация звука при первом клике
        function enableAudioAndStart() {
            if (!allowAudio) {
                initAudio();
                if (audioCtx) {
                    audioCtx.resume().then(() => {
                        allowAudio = true;
                        playMetroTick(); // приветственный
                    }).catch(e=>console.log);
                } else {
                    allowAudio = true;
                }
            }
        }
        
        // Инициализация событий
        window.addEventListener('load', () => {
            resetGame();
            gameLoop();
            window.addEventListener('keydown', onKeyDown);
            canvas.addEventListener('click', (e) => { enableAudioAndStart(); onCanvasTap(e); });
            canvas.addEventListener('touchstart', (e) => { enableAudioAndStart(); onCanvasTap(e); e.preventDefault(); });
            document.getElementById('resetGameBtn').addEventListener('click', () => {
                enableAudioAndStart();
                resetGame();
            });
            // первое касание/клик запускает звук
            document.body.addEventListener('click', () => enableAudioAndStart(), { once: false });
        });
    })();
</script>
</body>
    </html>
