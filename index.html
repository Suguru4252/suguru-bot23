<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Глобальная эпидемия · Создай свой вирус и зарази мир</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #021017 0%, #020c12 100%);
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* главный контейнер игры */
        .game-container {
            background: rgba(0, 10, 20, 0.65);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 16px 20px 20px 20px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        /* карта мира + панель управления */
        .world-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            align-items: flex-start;
        }

        /* SVG карта мира (стилизованная) */
        .map-holder {
            background: radial-gradient(circle at 30% 20%, #0a2a36, #021016);
            border-radius: 32px;
            padding: 12px;
            box-shadow: 0 12px 28px black;
            border: 1px solid #1f6e7e;
        }

        svg {
            display: block;
            width: 760px;
            height: auto;
            background: #00141e;
            border-radius: 24px;
            cursor: pointer;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }

        /* стили регионов — динамика через js */
        .country {
            transition: filter 0.2s ease;
            cursor: pointer;
        }
        .country:hover {
            filter: brightness(1.2) drop-shadow(0 0 4px cyan);
        }

        /* правая панель */
        .virus-lab {
            background: rgba(0, 20, 30, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 18px 20px;
            width: 300px;
            border: 1px solid #2fa0b0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            color: #b9f3ff;
        }

        .virus-name-area {
            text-align: center;
            margin-bottom: 20px;
        }

        .virus-name-area input {
            background: #021e28;
            border: 1px solid #2cc0d0;
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            color: #d4fcff;
            width: 100%;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .stat-bar {
            margin: 12px 0;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bar-bg {
            background: #0f2e36;
            border-radius: 20px;
            height: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff3c6f, #ff1e4d);
            border-radius: 20px;
            transition: width 0.25s;
        }

        .infectivity .bar-fill { background: linear-gradient(90deg, #f0a23b, #ff5e00); }
        .lethality .bar-fill { background: linear-gradient(90deg, #c038ff, #7c0aff); }
        .resist .bar-fill { background: linear-gradient(90deg, #3dc2ff, #0088cc); }

        .upgrade-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        button {
            background: #0e2f3a;
            border: none;
            border-radius: 60px;
            padding: 10px 12px;
            font-weight: bold;
            font-family: monospace;
            font-size: 0.85rem;
            color: #c7f0ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.1s linear;
            border: 1px solid #2f9eb0;
        }
        button:active { transform: scale(0.97); }
        button:hover {
            background: #1e5568;
            box-shadow: 0 0 8px cyan;
            border-color: cyan;
        }
        .cost {
            background: #02121a;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .danger-btn {
            background: #4a151f;
            border-color: #ff5a6e;
        }
        .danger-btn:hover {
            background: #a02030;
        }
        .reset-btn {
            background: #1a2b2f;
            margin-top: 10px;
        }

        .global-info {
            background: #02131b;
            border-radius: 24px;
            padding: 14px;
            text-align: center;
            margin-top: 15px;
            border: 1px solid #2aa0b0;
        }
        .infection-rate {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffd966;
        }
        .small-text {
            font-size: 0.7rem;
            opacity: 0.8;
        }
        .win-marker {
            font-size: 1rem;
            background: #451e2c;
            border-radius: 40px;
            padding: 6px;
            margin-top: 12px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
        }
        footer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 12px;
            opacity: 0.7;
        }
        @media (max-width: 1100px) {
            svg { width: 560px; }
            .virus-lab { width: 260px; }
        }
        @media (max-width: 860px) {
            .world-panel { flex-direction: column; align-items: center; }
            svg { width: 90vw; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="world-panel">
        <div class="map-holder">
            <!-- стилизованная SVG-карта мира с "клетками"-странами -->
            <svg viewBox="0 0 1000 550" xmlns="http://www.w3.org/2000/svg">
                <!-- Глобус / Океан -->
                <rect width="1000" height="550" fill="#001f2b" rx="20" ry="20"/>
                <defs>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                <!-- Материки в виде геометрических групп (регионы) -->
                <!-- Северная Америка -->
                <path id="NA" class="country" data-name="Северная Америка" d="M120,100 L200,80 L280,110 L290,160 L250,210 L200,230 L150,220 L110,180 L90,140 Z" fill="#2c5a6b" stroke="#3bd0e0" stroke-width="1.5"/>
                <!-- Южная Америка -->
                <path id="SA" class="country" data-name="Южная Америка" d="M250,260 L290,250 L330,280 L340,340 L300,400 L260,410 L230,370 L220,310 Z" fill="#2c5a6b" stroke="#3bd0e0" stroke-width="1.5"/>
                <!-- Европа -->
                <path id="EU" class="country" data-name="Европа" d="M460,100 L520,85 L570,110 L580,150 L540,180 L490,180 L450,160 L440,125 Z" fill="#2c5a6b" stroke="#3bd0e0" stroke-width="1.5"/>
                <!-- Африка -->
                <path id="AF" class="country" data-name="Африка" d="M500,200 L560,190 L610,220 L620,290 L580,340 L520,350 L490,310 L480,250 Z" fill="#2c5a6b" stroke="#3bd0e0" stroke-width="1.5"/>
                <!-- Азия -->
                <path id="AS" class="country" data-name="Азия" d="M600,80 L720,70 L810,90 L840,130 L820,180 L760,200 L700,180 L650,170 L600,150 L590,110 Z" fill="#2c5a6b" stroke="#3bd0e0" stroke-width="1.5"/>
                <!-- Австралия (Океания) -->
                <path id="OC" class="country" data-name="Океания" d="M780,370 L840,360 L880,390 L860,430 L810,440 L780,410 Z" fill="#2c5a6b" stroke="#3bd0e0" stroke-width="1.5"/>
                <!-- Антарктида (символ) -->
                <path id="AN" class="country" data-name="Антарктида" d="M200,500 L400,490 L600,500 L700,510 L550,530 L300,525 Z" fill="#2c5a6b" stroke="#3bd0e0" stroke-width="1.5" opacity="0.7"/>
                <!-- дополнительные точки: Гренландия -->
                <path id="GL" class="country" data-name="Гренландия" d="M350,50 L390,45 L410,70 L380,90 L340,80 Z" fill="#2c5a6b" stroke="#3bd0e0" stroke-width="1.5"/>
                <!-- Индия / Ближний Восток - улучшаем детали -->
                <path id="IN" class="country" data-name="Индия" d="M560,150 L600,140 L630,170 L610,200 L570,190 Z" fill="#2c5a6b" stroke="#3bd0e0" stroke-width="1.5"/>

                <!-- маленькие острова для атмосферы -->
                <circle cx="880" cy="230" r="12" fill="#2c5a6b" stroke="#3bd0e0" stroke-width="1" class="country" data-name="Япония"/>
                <circle cx="800" cy="280" r="9" fill="#2c5a6b" stroke="#3bd0e0" stroke-width="1" class="country" data-name="Индонезия"/>
            </svg>
        </div>

        <div class="virus-lab">
            <div class="virus-name-area">
                <input type="text" id="virusNameInput" placeholder="НАЗВАНИЕ ВИРУСА" maxlength="24" value="NECRO-X">
                <div class="small-text" style="margin-top: 4px;">★ Твой штамм ★</div>
            </div>

            <div class="stat-bar infectivity">
                <div class="stat-label"><span>🧬 ЗАРАЗНОСТЬ</span><span id="infectVal">20</span></div>
                <div class="bar-bg"><div class="bar-fill" id="infectFill" style="width:20%"></div></div>
            </div>
            <div class="stat-bar lethality">
                <div class="stat-label"><span>💀 ЛЕТАЛЬНОСТЬ</span><span id="lethalVal">10</span></div>
                <div class="bar-bg"><div class="bar-fill" id="lethalFill" style="width:10%"></div></div>
            </div>
            <div class="stat-bar resist">
                <div class="stat-label"><span>🛡️ УСТОЙЧИВОСТЬ</span><span id="resistVal">5</span></div>
                <div class="bar-bg"><div class="bar-fill" id="resistFill" style="width:5%"></div></div>
            </div>

            <div class="upgrade-buttons">
                <button id="upgInfect">📈 Усилить заразность <span class="cost">⚡10</span></button>
                <button id="upgLethal">☠️ Летальность + <span class="cost">⚡15</span></button>
                <button id="upgResist">🧫 Устойчивость + <span class="cost">⚡20</span></button>
                <button id="globalAction" class="danger-btn">🌍 ГЛОБАЛЬНАЯ МУТАЦИЯ <span class="cost">⚡50</span></button>
            </div>

            <div class="global-info">
                <div>🧪 ОЧКИ ЭВОЛЮЦИИ <span style="font-size: 1.8rem; font-weight: bold;" id="points">100</span> ⚡</div>
                <div style="margin-top: 10px;">🌡️ ЗАРАЖЕНИЕ МИРА</div>
                <div class="infection-rate"><span id="globalInfPct">0</span>%</div>
                <div class="small-text">стран под контролем вируса</div>
                <div id="winMessage" class="win-marker">💀 Активируй заразу 💀</div>
            </div>
            <button id="resetGame" class="reset-btn">🔄 СБРОСИТЬ ПАНДЕМИЮ</button>
            <footer>⚡ кликай на страны, чтобы заражать! улучшай вирус, поглоти планету</footer>
        </div>
    </div>
</div>

<script>
    // ------ ИГРОВАЯ МЕХАНИКА: ЗАРАЖЕНИЕ СТРАН И РАЗВИТИЕ ВИРУСА ------
    // Список стран (ID и названия, соответствующие svg элементам)
    const COUNTRIES = [
        { id: "NA", name: "Северная Америка", infected: false },
        { id: "SA", name: "Южная Америка", infected: false },
        { id: "EU", name: "Европа", infected: false },
        { id: "AF", name: "Африка", infected: false },
        { id: "AS", name: "Азия", infected: false },
        { id: "OC", name: "Океания", infected: false },
        { id: "AN", name: "Антарктида", infected: false },
        { id: "GL", name: "Гренландия", infected: false },
        { id: "IN", name: "Индия", infected: false },
        { id: "JP", name: "Япония", infected: false },
        { id: "ID", name: "Индонезия", infected: false }
    ];

    // Игровые параметры
    let evolutionPoints = 100;    // очки улучшений
    let infectivity = 20;         // заразность (влияет на шанс заражения при клике)
    let lethality = 10;           // летальность (штраф к очкам? но для механики: влияние на сложность? сделаем эстетику + потеря очков при мутациях)
    let resistance = 5;           // устойчивость (снижает стоимость улучшений? но упростим: влияет на скорость эпидемии? но для драйва: чем выше, тем больше шанс авто-распространения)
    // Интересная механика: каждые несколько секунд — попытка автоматического заражения соседних стран?
    // Но для простоты и понятности: игрок кликает по странам для заражения, но успех зависит от заразности.
    // Также пассивное распространение от заражённых стран к незаражённым с шансом (по таймеру)
    
    let infectedCountries = []; // массив id зараженных
    let virusName = "NECRO-X";
    
    // Функции обновления UI карты
    function updateMapColors() {
        for (let c of COUNTRIES) {
            const element = document.getElementById(c.id);
            if (element) {
                if (c.infected) {
                    element.setAttribute("fill", "#bb2f5e");
                    element.setAttribute("stroke", "#ff6699");
                    element.setAttribute("filter", "url(#glow)");
                } else {
                    element.setAttribute("fill", "#2c5a6b");
                    element.setAttribute("stroke", "#3bd0e0");
                    element.setAttribute("filter", "");
                }
            }
        }
    }
    
    function updateInfectionPercent() {
        const infectedCount = COUNTRIES.filter(c => c.infected).length;
        const percent = Math.floor((infectedCount / COUNTRIES.length) * 100);
        document.getElementById("globalInfPct").innerText = percent;
        return percent;
    }
    
    function checkWin() {
        const allInfected = COUNTRIES.every(c => c.infected);
        const winDiv = document.getElementById("winMessage");
        if (allInfected) {
            winDiv.innerHTML = "🏆 МИР ПОГЛОЩЁН! ВИРУС ДОМИНИРУЕТ 🏆";
            winDiv.style.background = "#8b1e3f";
            winDiv.style.boxShadow = "0 0 12px crimson";
            return true;
        } else {
            winDiv.innerHTML = "🧬 ЗАРАЗА РАСПРОСТРАНЯЕТСЯ... УЛУЧШАЙ ВИРУС! 🧬";
            winDiv.style.background = "#451e2c";
            return false;
        }
    }
    
    // Обновить статистику в панели
    function refreshStatsUI() {
        document.getElementById("infectVal").innerText = infectivity;
        document.getElementById("lethalVal").innerText = lethality;
        document.getElementById("resistVal").innerText = resistance;
        document.getElementById("infectFill").style.width = Math.min(100, infectivity) + "%";
        document.getElementById("lethalFill").style.width = Math.min(100, lethality) + "%";
        document.getElementById("resistFill").style.width = Math.min(100, resistance) + "%";
        document.getElementById("points").innerText = Math.floor(evolutionPoints);
        updateInfectionPercent();
        checkWin();
    }
    
    // Попытка заразить конкретную страну через клик (или механику)
    function tryInfectCountry(countryObj) {
        if (countryObj.infected) return false; // уже заражена
        
        // шанс на заражение: база 20% + заразность * 0.8 (макс 90%)
        let chance = 20 + (infectivity * 0.7);
        if (chance > 90) chance = 90;
        const roll = Math.random() * 100;
        if (roll <= chance) {
            // успех!
            countryObj.infected = true;
            // награда за новое заражение: очки эволюции (стимул)
            let reward = 8 + Math.floor(resistance / 5);
            evolutionPoints += reward;
            updateMapColors();
            refreshStatsUI();
            // дополнительный эффект: если летальность высокая, за каждое заражение возможна потеря 1-2 очков? но лучше - позитив
            if (lethality > 60 && Math.random() < 0.2) {
                evolutionPoints = Math.max(0, evolutionPoints - 2);
                refreshStatsUI();
            }
            return true;
        } else {
            // неудача, но кое-что за попытку: если устойчивость высокая, то даём небольшие очки за исследования?
            if (resistance > 30) {
                evolutionPoints = Math.max(0, evolutionPoints + 1);
                refreshStatsUI();
            }
            return false;
        }
    }
    
    // Пассивное распространение (каждые 3 секунды от заражённых стран)
    let autoSpreadInterval;
    function startAutoSpread() {
        if (autoSpreadInterval) clearInterval(autoSpreadInterval);
        autoSpreadInterval = setInterval(() => {
            // проверяем есть ли заражённые и незаражённые
            const infectedList = COUNTRIES.filter(c => c.infected);
            const healthyList = COUNTRIES.filter(c => !c.infected);
            if (infectedList.length === 0 || healthyList.length === 0) return;
            
            // шанс распространения за тик: зависит от заразности и количества заражённых
            let spreadChanceBase = 5 + (infectivity * 0.4);
            if (spreadChanceBase > 45) spreadChanceBase = 45;
            if (Math.random() * 100 < spreadChanceBase) {
                // выбираем случайную здоровую страну
                const target = healthyList[Math.floor(Math.random() * healthyList.length)];
                if (!target.infected) {
                    const successRoll = Math.random() * 100;
                    const autoInfectChance = 35 + (infectivity * 0.5);
                    if (successRoll < autoInfectChance) {
                        target.infected = true;
                        evolutionPoints += 5;
                        refreshStatsUI();
                        updateMapColors();
                    }
                }
            }
            
            // также учитываем устойчивость: чем выше, тем сложнее? но сделаем обратную связь: устойчивость замедляет распространение? нет,
            // устойчивость вируса - это способность выживать, пусть помогает авто-распространению слабо, но добавим прирост очков пассивно
            if (resistance > 25 && infectedList.length > 2) {
                if (Math.random() < 0.1) {
                    evolutionPoints += 1;
                    refreshStatsUI();
                }
            }
            refreshStatsUI();
        }, 2800);
    }
    
    // Обработка кликов по странам (делегирование SVG)
    function initMapClick() {
        const countriesElements = document.querySelectorAll(".country");
        countriesElements.forEach(el => {
            el.addEventListener("click", (e) => {
                e.stopPropagation();
                const countryId = el.id;
                const countryData = COUNTRIES.find(c => c.id === countryId);
                if (countryData) {
                    if (!countryData.infected) {
                        tryInfectCountry(countryData);
                        refreshStatsUI();
                        updateMapColors();
                    } else {
                        // уже заражена, можно мутировать, получить немного очков
                        evolutionPoints += 2;
                        refreshStatsUI();
                        // визуальный фидбек
                        const msg = document.getElementById("winMessage");
                        msg.style.opacity = "0.7";
                        setTimeout(()=> msg.style.opacity = "1", 200);
                    }
                } else {
                    // fallback
                }
            });
        });
    }
    
    // Улучшения
    function upgrade(stat, cost, amount) {
        if (evolutionPoints >= cost) {
            evolutionPoints -= cost;
            if (stat === 'infectivity') {
                infectivity = Math.min(95, infectivity + amount);
            } else if (stat === 'lethality') {
                lethality = Math.min(85, lethality + amount);
            } else if (stat === 'resistance') {
                resistance = Math.min(90, resistance + amount);
            }
            refreshStatsUI();
            return true;
        } else {
            // показать недостаток очков
            const msgDiv = document.getElementById("winMessage");
            const original = msgDiv.innerText;
            msgDiv.innerText = "❌ НЕ ХВАТАЕТ ОЧКОВ ЭВОЛЮЦИИ ❌";
            setTimeout(() => {
                if (!COUNTRIES.every(c=>c.infected)) msgDiv.innerText = "🧬 ЗАРАЗА РАСПРОСТРАНЯЕТСЯ... УЛУЧШАЙ ВИРУС! 🧬";
                else msgDiv.innerText = "🏆 МИР ПОГЛОЩЁН! 🏆";
            }, 1000);
            return false;
        }
    }
    
    // Глобальная мутация - дорогое улучшение, даёт бонус ко всем статам и небольшое авто-заражение
    function globalMutation() {
        if (evolutionPoints >= 50) {
            evolutionPoints -= 50;
            infectivity = Math.min(95, infectivity + 12);
            lethality = Math.min(85, lethality + 8);
            resistance = Math.min(90, resistance + 10);
            // дополнительно: мгновенно заражаем одну случайную здоровую страну
            const healthy = COUNTRIES.filter(c => !c.infected);
            if (healthy.length > 0) {
                const randomTarget = healthy[Math.floor(Math.random() * healthy.length)];
                randomTarget.infected = true;
                evolutionPoints += 10;
            }
            refreshStatsUI();
            updateMapColors();
        } else {
            const msgDiv = document.getElementById("winMessage");
            msgDiv.innerText = "💀 МУТАЦИЯ ТРЕБУЕТ 50 ОЧКОВ 💀";
            setTimeout(()=> { if(!COUNTRIES.every(c=>c.infected)) msgDiv.innerText = "🧬 ЗАРАЗА РАСПРОСТРАНЯЕТСЯ... УЛУЧШАЙ ВИРУС! 🧬"; else msgDiv.innerText = "🏆 МИР ПОГЛОЩЁН! 🏆";}, 1000);
        }
    }
    
    // Сброс игры
    function resetGame() {
        for (let c of COUNTRIES) {
            c.infected = false;
        }
        evolutionPoints = 100;
        infectivity = 20;
        lethality = 10;
        resistance = 5;
        // имя вируса (из поля)
        const nameInput = document.getElementById("virusNameInput");
        virusName = nameInput.value.trim() || "NECRO-X";
        refreshStatsUI();
        updateMapColors();
        const winDiv = document.getElementById("winMessage");
        winDiv.innerHTML = "🧬 ВСЁ НАЧАЛОСЬ ЗАНОВО. СОЗДАЙ СВОЙ ВИРУС! 🧬";
        winDiv.style.background = "#451e2c";
    }
    
    // обработчики кнопок
    function bindButtons() {
        document.getElementById("upgInfect").onclick = () => upgrade('infectivity', 10, 8);
        document.getElementById("upgLethal").onclick = () => upgrade('lethality', 15, 6);
        document.getElementById("upgResist").onclick = () => upgrade('resistance', 20, 7);
        document.getElementById("globalAction").onclick = () => globalMutation();
        document.getElementById("resetGame").onclick = () => resetGame();
        document.getElementById("virusNameInput").addEventListener("change", (e) => {
            virusName = e.target.value.trim() || "МУТАНТ";
        });
    }
    
    // дополнительный эффект: при заражении всех стран - поздравительное сообщение и остановка авто-распространения не требуется
    function monitorWin() {
        let winFlag = false;
        setInterval(() => {
            const allInf = COUNTRIES.every(c=>c.infected);
            if (allInf && !winFlag) {
                winFlag = true;
                const winDiv = document.getElementById("winMessage");
                winDiv.innerHTML = "🔥 ВИРУС ПОГЛОТИЛ ВСЁ ЖИВОЕ. ПОЗДРАВЛЯЮ! МИР ТВОЙ 🔥";
                winDiv.style.background = "#7a1f3a";
            } else if (!allInf) {
                winFlag = false;
            }
        }, 500);
    }
    
    // инициализация
    function initGame() {
        startAutoSpread();
        bindButtons();
        initMapClick();
        refreshStatsUI();
        updateMapColors();
        monitorWin();
        // добавить стартовый бонус: если хотим подсказку
        console.log("Игра запущена. Создай вирус, кликай на страны!");
    }
    
    initGame();
</script>
</body>
</html>
