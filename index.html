<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тупой Тимофей — Школьные хроники H₂O</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #2b3b2a 0%, #1e2a1c 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Neue', 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fef7e0;
            border-radius: 64px 64px 48px 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), inset 0 1px 4px rgba(255,255,200,0.8);
            overflow: hidden;
            border: 3px solid #ffcd7e;
        }

        .header {
            background: #4a2e1e;
            padding: 20px;
            text-align: center;
            color: #ffecb3;
            border-bottom: 6px solid #ffb347;
        }

        .header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .h2o-badge {
            background: #3399ff;
            border-radius: 60px;
            padding: 5px 18px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
            box-shadow: inset 0 -2px 0 #0055aa;
        }

        .school-map {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            padding: 28px;
            background: #ffe3b5;
            justify-content: center;
        }

        .location {
            background: #fff2df;
            border-radius: 40px;
            padding: 18px 12px;
            width: 160px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #b97f44;
            border: 1px solid #ffcf9a;
        }

        .location:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 0 #b97f44;
            background: #fff5e8;
        }

        .location-icon {
            font-size: 3rem;
        }

        .location-name {
            font-weight: bold;
            margin: 8px 0 4px;
            font-size: 1.2rem;
        }

        .action-log {
            background: #1e2a1a;
            color: #b3ffa7;
            font-family: monospace;
            padding: 18px;
            margin: 10px 28px 28px 28px;
            border-radius: 32px;
            height: 220px;
            overflow-y: auto;
            font-size: 0.9rem;
            border: 2px solid #ffcd7e;
        }

        .log-entry {
            padding: 6px 8px;
            border-bottom: 1px solid #446633;
            display: flex;
            gap: 12px;
        }

        .timestamp {
            color: #ffee99;
            min-width: 70px;
        }

        .chemistry-lab {
            background: #ddbb88;
            border-radius: 48px;
            margin: 0 28px 28px 28px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            border: 3px dashed #aa6f3c;
        }

        .chem-info {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #5e3a1f;
            padding: 8px 24px;
            border-radius: 60px;
            color: white;
        }

        .chem-info span {
            font-size: 2rem;
        }

        button {
            background: #f0a445;
            border: none;
            font-family: monospace;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #7a4316;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #7a4316;
        }

        .reset-btn {
            background: #ac4e2b;
            color: white;
            box-shadow: 0 4px 0 #57200e;
        }

        .note {
            background: #ffffb0;
            padding: 12px;
            border-radius: 24px;
            font-size: 0.9rem;
            display: inline-block;
            max-width: 260px;
        }

        .timofey-walk {
            font-size: 1.3rem;
            background: #e0c894;
            padding: 5px 12px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }

        .shake-effect {
            animation: shake 0.2s ease-in-out 0s 2;
        }

        footer {
            background: #4a2e1e;
            text-align: center;
            padding: 14px;
            color: #d4bc8a;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <h1>
            🧠 Тупой Тимофей
            <span class="h2o-badge">H₂O мания</span>
        </h1>
        <div class="timofey-walk" id="timofeyStatus">🚶‍♂️ Тимофей сейчас: где-то в школе</div>
    </div>

    <div class="school-map" id="locationsContainer">
        <!-- локации будут добавлены через JS но можно и вручную -->
    </div>

    <div class="chemistry-lab">
        <div class="chem-info">
            <span>🧪👩‍🔬</span>
            <span><strong>Химичка Марья Ивановна</strong><br>📌 выдает только H₂O по запискам</span>
        </div>
        <div class="note" id="currentNoteSlot">
            📜 Записка: <span id="noteText">нет записки</span>
        </div>
        <button id="askForWaterBtn">💧 Подойти за H₂O</button>
        <button id="resetGameBtn" class="reset-btn">🔄 Перезапустить день Тимофея</button>
    </div>

    <div class="action-log" id="logPanel">
        <div class="log-entry"><span class="timestamp">⏰</span> 📢 Журнал действий Тимофея...</div>
    </div>
    <footer>⚗️ "Аш два о, пожалуйста!" — Тимофей, 100500-й раз за урок</footer>
</div>

<script>
    // Локации школы
    const locations = [
        { id: "corridor", name: "Коридор", icon: "🚪", chanceNote: 0.7, notes: ["кусок парты", "сломанная ручка", "клочок тетради"] },
        { id: "cafeteria", name: "Столовая", icon: "🍎", chanceNote: 0.8, notes: ["меню на салфетке", "жирный чек", "объявление про компот"] },
        { id: "math_class", name: "Математичка", icon: "📐", chanceNote: 0.6, notes: ["формула площади круга", "график функции на бумажке"] },
        { id: "library", name: "Библиотека", icon: "📚", chanceNote: 0.9, notes: ["забытый формуляр", "стикер с цитатой", "закладка"] },
        { id: "director_office", name: "Кабинет директора", icon: "👔", chanceNote: 0.5, notes: ["приказ о дежурстве", "листок с печатью"] },
        { id: "gym", name: "Спортзал", icon: "🏀", chanceNote: 0.65, notes: ["протокол соревнований", "мокрая записка от физрука"] }
    ];

    // Состояние игры
    let currentLocationId = "corridor";
    let hasNote = false;
    let currentNoteContent = "";
    let waterCounter = 0;          // сколько раз получил H₂O сегодня
    let actionHistory = [];

    // DOM элементы
    const locationsContainer = document.getElementById("locationsContainer");
    const logPanel = document.getElementById("logPanel");
    const noteTextSpan = document.getElementById("noteText");
    const askBtn = document.getElementById("askForWaterBtn");
    const resetBtn = document.getElementById("resetGameBtn");
    const timofeyStatusSpan = document.getElementById("timofeyStatus");

    // функция добавления лога
    function addLog(message, emoji = "📝") {
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
        const logDiv = document.createElement("div");
        logDiv.className = "log-entry";
        logDiv.innerHTML = `<span class="timestamp">${timeStr}</span> ${emoji} ${message}`;
        logPanel.appendChild(logDiv);
        logPanel.scrollTop = logPanel.scrollHeight;
        actionHistory.push(message);
        // обновляем статусное поле (краткое)
        timofeyStatusSpan.innerHTML = `🚶‍♂️ Тимофей сейчас: ${getLocationName(currentLocationId)} ${hasNote ? "📜 (с запиской)" : "🙅‍♂️ без записки"}`;
    }

    function getLocationName(locId) {
        const found = locations.find(l => l.id === locId);
        return found ? found.name : "школа";
    }

    // обновить отображение записки в UI
    function updateNoteUI() {
        if (hasNote && currentNoteContent) {
            noteTextSpan.innerText = currentNoteContent.length > 28 ? currentNoteContent.slice(0,25)+"..." : currentNoteContent;
            noteTextSpan.style.fontWeight = "bold";
            noteTextSpan.style.color = "#4a2e1e";
        } else {
            noteTextSpan.innerText = "нет записки";
            noteTextSpan.style.color = "#9b6a42";
        }
    }

    // попытка найти записку в локации (только если нет записки)
    function tryFindNoteInLocation(location) {
        if (hasNote) {
            addLog(`📌 Тимофей уже имеет записку: "${currentNoteContent}". Не ищет новую.`, "📜");
            return false;
        }
        const random = Math.random();
        if (random < location.chanceNote) {
            const randomNoteArray = location.notes;
            const randomNote = randomNoteArray[Math.floor(Math.random() * randomNoteArray.length)];
            const fullNote = `"${randomNote}" от ${location.name}`;
            hasNote = true;
            currentNoteContent = fullNote;
            addLog(`🍀 Тимофей нашёл записку: ${fullNote} в ${location.name}! Теперь можно идти к химичке.`, "📜✨");
            updateNoteUI();
            return true;
        } else {
            addLog(`😭 Тимофей обыскал ${location.name}, но записки не нашёл. (шепотом: "где аш два о?")`, "🧹");
            return false;
        }
    }

    // сходить за H₂O к химичке
    function askChemistryTeacher() {
        if (!hasNote) {
            addLog(`🧪 Тимофей подходит к химичке и тупо говорит: "Дайте H₂O, пожалуйста!" Химичка: "ГДЕ ЗАПИСКА, ТИМОФЕЙ?!" и выгоняет его.`, "💢");
            // добавляем эффект встряски для кнопки
            const btn = document.getElementById("askForWaterBtn");
            btn.classList.add("shake-effect");
            setTimeout(() => btn.classList.remove("shake-effect"), 400);
            return;
        }

        // Есть записка!
        waterCounter++;
        addLog(`💧💧💧 Тимофей протягивает записку "${currentNoteContent}" и получает стакан H₂O! (раз №${waterCounter} за сегодня)`, "💧");
        addLog(`🧪 Химичка: "Тимофей, это уже ${waterCounter}-й раз за урок! Забирай свою воду и иди!"`, "😤");
        
        // после получения воды записка тратится
        hasNote = false;
        currentNoteContent = "";
        updateNoteUI();

        // если Тимофей получил воду 5+ раз — специальный лог
        if (waterCounter >= 5) {
            addLog(`🤯 Химичка в ярости: "Тимофей, прекрати! Я знаю, ты пьёшь H₂O каждые 5 минут! Вон из класса!"`, "⚠️⚠️");
        }
        if (waterCounter === 10) {
            addLog(`🏆 ДОСТИЖЕНИЕ: Тимофей выпил 10 стаканов H₂O за один день. Учителя в шоке, туалетная бумага закончилась.`, "🚽💀");
        }
    }

    // переход в новую локацию (клик по карте)
    function moveToLocation(locationId) {
        const oldLoc = currentLocationId;
        if (oldLoc === locationId) {
            addLog(`🤦 Тимофей топчется на месте в ${getLocationName(locationId)} и не понимает, почему ничего не меняется.`, "🌀");
            return;
        }
        currentLocationId = locationId;
        const locationObj = locations.find(l => l.id === locationId);
        addLog(`🚶‍♂️ Тимофей переместился в ${locationObj.name} ${locationObj.icon}.`, "🚸");
        
        // когда приходит в новую локацию — пытается найти записку (если нет записки)
        if (!hasNote) {
            tryFindNoteInLocation(locationObj);
        } else {
            addLog(`📜 У Тимофея уже есть записка, он просто бродит по ${locationObj.name} в поисках химички...`, "🧐");
        }
        updateLocationUI();
    }

    // рендер карты
    function renderLocations() {
        locationsContainer.innerHTML = "";
        locations.forEach(loc => {
            const card = document.createElement("div");
            card.className = "location";
            card.setAttribute("data-id", loc.id);
            card.innerHTML = `
                <div class="location-icon">${loc.icon}</div>
                <div class="location-name">${loc.name}</div>
                <div style="font-size:0.7rem;">🔎 ${Math.round(loc.chanceNote*100)}% найти записку</div>
            `;
            card.addEventListener("click", () => moveToLocation(loc.id));
            locationsContainer.appendChild(card);
        });
    }

    function updateLocationUI() {
        // просто подсветка активной локации (можно стилем)
        document.querySelectorAll(".location").forEach(el => {
            const locId = el.getAttribute("data-id");
            if (locId === currentLocationId) {
                el.style.border = "3px solid #f5a623";
                el.style.background = "#fff0cc";
            } else {
                el.style.border = "1px solid #ffcf9a";
                el.style.background = "#fff2df";
            }
        });
        timofeyStatusSpan.innerHTML = `🚶‍♂️ Тимофей сейчас: ${getLocationName(currentLocationId)} ${hasNote ? "📜 (с запиской)" : "🙅‍♂️ без записки"}`;
    }

    // полный сброс игры
    function resetGame() {
        currentLocationId = "corridor";
        hasNote = false;
        currentNoteContent = "";
        waterCounter = 0;
        // очищаем лог, но оставляем приветствие
        logPanel.innerHTML = "";
        addLog("🔄 ТУПОЙ ТИМОФЕЙ НАЧАЛ НОВЫЙ ШКОЛЬНЫЙ ДЕНЬ.", "🎒");
        addLog("🧪 Химичка ждёт с колбой H₂O. Тимофей снова будет ходить и искать записки...", "📋");
        // пробуем найти записку на стартовой локации (коридор)
        const startLoc = locations.find(l => l.id === "corridor");
        if (startLoc && !hasNote) {
            tryFindNoteInLocation(startLoc);
        }
        updateNoteUI();
        updateLocationUI();
    }

    // Инициализация игры
    function initGame() {
        renderLocations();
        resetGame();  // начальное состояние со стартовым поиском
        askBtn.addEventListener("click", askChemistryTeacher);
        resetBtn.addEventListener("click", resetGame);
    }

    initGame();
</script>
</body>
</html>
