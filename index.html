<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Солнечная система 3D | Изучение планет</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 12px 25px;
      border-radius: 50px;
      pointer-events: none;
      backdrop-filter: blur(10px);
      font-weight: 500;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    #controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      background: rgba(10, 10, 20, 0.75);
      backdrop-filter: blur(15px);
      padding: 15px 25px;
      border-radius: 60px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.25);
      z-index: 10;
    }
    .planet-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #ccc;
      padding: 10px 18px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      backdrop-filter: blur(5px);
      border: 1px solid transparent;
    }
    .planet-btn:hover {
      background: rgba(255,255,255,0.25);
      color: white;
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }
    .planet-btn.active {
      background: #ffaa00;
      color: #000;
      border-color: #ffcc80;
      box-shadow: 0 0 25px #ff9900aa;
      font-weight: bold;
    }
    #reset-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      margin-left: 15px;
      font-weight: bold;
    }
    .instruction {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 5px 20px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
      white-space: nowrap;
    }
    @media (max-width: 750px) {
      #controls {
        gap: 5px;
        padding: 10px 15px;
      }
      .planet-btn {
        padding: 8px 12px;
        font-size: 13px;
      }
      .instruction {
        bottom: 100px;
        font-size: 11px;
        white-space: normal;
        text-align: center;
        width: 90%;
      }
    }
  </style>
</head>
<body>
  <div id="info">🪐 СОЛНЕЧНАЯ СИСТЕМА</div>
  <div class="instruction">🖱️ Вращайте камеру | 📜 Прокрутка для зума | ✨ Нажмите на планету для фокуса</div>
  
  <div id="controls">
    <button class="planet-btn active" data-planet="all">🌌 ВСЕ</button>
    <button class="planet-btn" data-planet="sun">☀️ Солнце</button>
    <button class="planet-btn" data-planet="mercury">☿ Меркурий</button>
    <button class="planet-btn" data-planet="venus">♀ Венера</button>
    <button class="planet-btn" data-planet="earth">🌍 Земля</button>
    <button class="planet-btn" data-planet="mars">♂ Марс</button>
    <button class="planet-btn" data-planet="jupiter">♃ Юпитер</button>
    <button class="planet-btn" data-planet="saturn">♄ Сатурн</button>
    <button class="planet-btn" data-planet="uranus">⛢ Уран</button>
    <button class="planet-btn" data-planet="neptune">♆ Нептун</button>
    <button id="reset-btn" title="Сбросить вид">↺</button>
  </div>

  <!-- Импорт Three.js и дополнений -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // --- Инициализация сцены, камеры, рендереров ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    
    // Звездное поле (частицы)
    const starsGeometry = new THREE.BufferGeometry();
    const starsCount = 3000;
    const starsPositions = new Float32Array(starsCount * 3);
    for (let i = 0; i < starsCount * 3; i += 3) {
      starsPositions[i] = (Math.random() - 0.5) * 800;
      starsPositions[i+1] = (Math.random() - 0.5) * 500;
      starsPositions[i+2] = (Math.random() - 0.5) * 600;
    }
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
    const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.25});
    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);
    
    // Дополнительные далекие звезды
    const starsGeometry2 = new THREE.BufferGeometry();
    const starsPositions2 = new Float32Array(1500 * 3);
    for (let i = 0; i < 1500 * 3; i += 3) {
      starsPositions2[i] = (Math.random() - 0.5) * 1200;
      starsPositions2[i+1] = (Math.random() - 0.5) * 800;
      starsPositions2[i+2] = (Math.random() - 0.5) * 900;
    }
    starsGeometry2.setAttribute('position', new THREE.BufferAttribute(starsPositions2, 3));
    const starsMaterial2 = new THREE.PointsMaterial({color: 0xaaccff, size: 0.35});
    const stars2 = new THREE.Points(starsGeometry2, starsMaterial2);
    scene.add(stars2);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 1000);
    camera.position.set(0, 25, 45);
    camera.lookAt(0, 0, 0);

    // WebGL рендерер
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // CSS2 рендерер для подписей
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none'; // чтобы не мешало кликам
    document.body.appendChild(labelRenderer.domElement);

    // OrbitControls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.8;
    controls.zoomSpeed = 1.5;
    controls.panSpeed = 0.7;
    controls.target.set(0, 0, 0);
    controls.maxDistance = 200;
    controls.minDistance = 3;
    controls.update();

    // --- Освещение ---
    // Точечный свет от Солнца
    const sunLight = new THREE.PointLight(0xfff5e6, 2, 0, 0);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);
    // Второй свет для подсветки
    const ambientLight = new THREE.AmbientLight(0x111122);
    scene.add(ambientLight);
    
    // Дополнительный направленный свет для теней
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.3);
    dirLight.position.set(10, 20, 5);
    scene.add(dirLight);

    // --- Данные планет (название, цвет, размер, расстояние, скорость) ---
    const planetsData = [
      { name: 'Солнце', key: 'sun', color: 0xffaa00, size: 2.2, distance: 0, speed: 0, emissive: 0xff5500 },
      { name: 'Меркурий', key: 'mercury', color: 0xaaaaaa, size: 0.4, distance: 4.5, speed: 0.04 },
      { name: 'Венера', key: 'venus', color: 0xffcc88, size: 0.7, distance: 6.5, speed: 0.025 },
      { name: 'Земля', key: 'earth', color: 0x2299ff, size: 0.75, distance: 8.5, speed: 0.02 },
      { name: 'Марс', key: 'mars', color: 0xc1440e, size: 0.55, distance: 10.8, speed: 0.017 },
      { name: 'Юпитер', key: 'jupiter', color: 0xd8a27a, size: 1.6, distance: 14.5, speed: 0.011 },
      { name: 'Сатурн', key: 'saturn', color: 0xf0d8b0, size: 1.35, distance: 18.5, speed: 0.008, hasRings: true },
      { name: 'Уран', key: 'uranus', color: 0x6fd4d4, size: 1.1, distance: 22.5, speed: 0.006 },
      { name: 'Нептун', key: 'neptune', color: 0x4169e1, size: 1.05, distance: 26.5, speed: 0.005 }
    ];

    // Хранилище объектов
    const planets = [];
    const orbits = [];
    
    // Создание орбит (колец)
    planetsData.forEach(p => {
      if (p.distance > 0) {
        const orbitGeometry = new THREE.RingGeometry(p.distance - 0.02, p.distance + 0.02, 128);
        const orbitMaterial = new THREE.MeshBasicMaterial({ 
          color: 0xffffff, 
          side: THREE.DoubleSide, 
          transparent: true, 
          opacity: 0.15 
        });
        const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
        orbit.rotation.x = Math.PI / 2;
        scene.add(orbit);
        orbits.push(orbit);
      }
    });

    // Функция создания текстуры с узором (для имитации деталей)
    function createPlanetTexture(baseColor, type) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      
      // Базовый цвет
      ctx.fillStyle = baseColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Добавляем полосы / пятна в зависимости от планеты
      if (type === 'sun') {
        // Солнечная текстура
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#ffaa00');
        gradient.addColorStop(0.4, '#ff6600');
        gradient.addColorStop(0.6, '#ffaa00');
        gradient.addColorStop(1, '#ff5500');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        // Пятна
        ctx.fillStyle = '#ffcc00';
        for(let i = 0; i < 20; i++) {
          ctx.beginPath();
          ctx.arc(Math.random()*256, Math.random()*128, Math.random()*15+5, 0, Math.PI*2);
          ctx.fill();
        }
      } else if (type === 'jupiter') {
        ctx.strokeStyle = '#b08060';
        ctx.lineWidth = 8;
        for(let y = 10; y < 128; y += 18) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(256, y + Math.sin(y)*5);
          ctx.stroke();
        }
      } else if (type === 'saturn') {
        ctx.strokeStyle = '#d4b896';
        ctx.lineWidth = 6;
        for(let y = 15; y < 128; y += 15) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(256, y);
          ctx.stroke();
        }
      } else if (type === 'earth') {
        ctx.fillStyle = '#2288ff';
        ctx.fillRect(0,0,256,128);
        ctx.fillStyle = '#44aa44';
        ctx.beginPath(); ctx.arc(100,50,40,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(180,70,35,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffffff';
        for(let i=0;i<15;i++){ ctx.beginPath(); ctx.arc(Math.random()*256,Math.random()*128,Math.random()*8+2,0,Math.PI*2); ctx.fill(); }
      }
      
      return new THREE.CanvasTexture(canvas);
    }

    // Создание планет
    planetsData.forEach((data) => {
      let geometry;
      if (data.key === 'sun') {
        geometry = new THREE.SphereGeometry(data.size, 64, 64);
      } else {
        geometry = new THREE.SphereGeometry(data.size, 48, 48);
      }
      
      const texture = createPlanetTexture(`#${data.color.toString(16).padStart(6, '0')}`, data.key);
      const material = new THREE.MeshStandardMaterial({
        map: texture,
        roughness: 0.7,
        metalness: 0.1,
      });
      
      if (data.key === 'sun') {
        material.emissive = new THREE.Color(data.emissive || data.color);
        material.emissiveIntensity = 0.9;
        material.roughness = 0.4;
      }
      
      const planet = new THREE.Mesh(geometry, material);
      planet.castShadow = true;
      planet.receiveShadow = true;
      
      // Начальная позиция на орбите
      const angle = Math.random() * Math.PI * 2;
      planet.position.x = data.distance * Math.cos(angle);
      planet.position.z = data.distance * Math.sin(angle);
      
      // Сохраняем данные
      planet.userData = {
        name: data.name,
        key: data.key,
        distance: data.distance,
        speed: data.speed,
        angle: angle,
        size: data.size,
        hasRings: data.hasRings || false
      };
      
      scene.add(planet);
      
      // Кольца Сатурна
      if (data.hasRings) {
        const ringGeometry = new THREE.RingGeometry(data.size * 1.4, data.size * 2.2, 64);
        const ringMaterial = new THREE.MeshStandardMaterial({
          color: 0xc2b280,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.5,
          roughness: 0.4
        });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.rotation.x = Math.PI / 2 + 0.1;
        ring.userData = { isRing: true };
        planet.add(ring);
      }
      
      // Добавляем подпись (CSS2D)
      const labelDiv = document.createElement('div');
      labelDiv.textContent = data.name;
      labelDiv.style.color = 'white';
      labelDiv.style.fontSize = '16px';
      labelDiv.style.fontWeight = 'bold';
      labelDiv.style.textShadow = '1px 1px 3px black';
      labelDiv.style.background = 'rgba(0,0,0,0.7)';
      labelDiv.style.padding = '2px 12px';
      labelDiv.style.borderRadius = '20px';
      const label = new CSS2DObject(labelDiv);
      label.position.set(0, data.size + 0.5, 0);
      planet.add(label);
      
      planets.push(planet);
    });

    // --- Интерактивность: переключение планет ---
    let currentTarget = 'all';
    const buttons = document.querySelectorAll('.planet-btn');
    
    function focusOnPlanet(planetKey) {
      if (planetKey === 'all') {
        controls.target.set(0, 0, 0);
        camera.position.set(0, 25, 45);
        controls.update();
        return;
      }
      
      const planet = planets.find(p => p.userData.key === planetKey);
      if (planet) {
        const pos = planet.position.clone();
        controls.target.copy(pos);
        const distance = planet.userData.size * 5 + 2;
        camera.position.copy(pos.clone().add(new THREE.Vector3(distance * 0.7, distance * 0.6, distance)));
        controls.update();
      }
    }
    
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const planetKey = btn.dataset.planet;
        currentTarget = planetKey;
        focusOnPlanet(planetKey);
      });
    });
    
    document.getElementById('reset-btn').addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      document.querySelector('[data-planet="all"]').classList.add('active');
      currentTarget = 'all';
      focusOnPlanet('all');
    });

    // Возможность клика по планете на сцене (raycaster)
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    
    window.addEventListener('click', (event) => {
      // Игнорируем клики по кнопкам
      if (event.target.tagName === 'BUTTON') return;
      
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(planets);
      
      if (intersects.length > 0) {
        let obj = intersects[0].object;
        // Если кликнули по кольцу, берём родителя
        if (obj.userData.isRing) obj = obj.parent;
        const key = obj.userData.key;
        if (key) {
          buttons.forEach(b => b.classList.remove('active'));
          const activeBtn = document.querySelector(`[data-planet="${key}"]`);
          if (activeBtn) activeBtn.classList.add('active');
          currentTarget = key;
          focusOnPlanet(key);
        }
      }
    });

    // --- Анимация и вращение планет ---
    function animate() {
      requestAnimationFrame(animate);
      
      // Вращение звезд для эффекта
      stars.rotation.y += 0.0001;
      stars2.rotation.y -= 0.00005;
      
      // Движение планет по орбитам
      planets.forEach(planet => {
        const data = planet.userData;
        if (data.distance > 0) {
          data.angle += data.speed * 0.3;
          planet.position.x = data.distance * Math.cos(data.angle);
          planet.position.z = data.distance * Math.sin(data.angle);
        }
        // Вращение вокруг своей оси
        planet.rotation.y += 0.01;
      });
      
      // Если выбрана конкретная планета, обновляем цель controls на её позицию
      if (currentTarget !== 'all') {
        const targetPlanet = planets.find(p => p.userData.key === currentTarget);
        if (targetPlanet) {
          controls.target.copy(targetPlanet.position);
        }
      }
      
      controls.update();
      
      // Рендеринг
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    
    animate();

    // Обработка ресайза
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    console.log('🌠 Солнечная система готова! Используйте кнопки или кликайте по планетам.');
  </script>
</body>
</html>
