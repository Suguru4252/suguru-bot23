<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>President Simulator - TheoTown Edition</title>
    <style>
        :root {
            --bg: #0a0a14;
            --panel: #1a1a2e;
            --accent: #f0c040;
            --gold: #e8c547;
            --text: #e8e8e8;
            --green: #5cdb7c;
            --red: #f05555;
            --blue: #5ba0e0;
            --border: #2e2e4e;
            --hover: #2a2a50;
            --zone-residential: #4CAF50;
            --zone-commercial: #2196F3;
            --zone-industrial: #FF9800;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #060610;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            position: fixed;
        }

        #splash {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: radial-gradient(ellipse at 50% 30%, #1a1040 0%, #060610 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        #splash.hidden {
            display: none;
        }
        .splash-stars {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .splash-title {
            font-size: clamp(2em, 5vw, 3.2em);
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(180deg, #ffe08a, #c8943e, #8b5e14);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            filter: drop-shadow(0 4px 20px rgba(200, 150, 50, 0.4));
            animation: titleGlow 2s ease-in-out infinite;
        }
        @keyframes titleGlow {
            0%,
            100% {
                filter: drop-shadow(0 4px 20px rgba(200, 150, 50, 0.4));
            }
            50% {
                filter: drop-shadow(0 4px 35px rgba(240, 200, 80, 0.7));
            }
        }
        .splash-subtitle {
            color: #b0a0c0;
            font-size: clamp(0.9em, 2vw, 1.1em);
            letter-spacing: 2px;
        }
        .splash-form {
            background: rgba(20, 18, 40, 0.9);
            border: 1px solid #3a3050;
            border-radius: 20px;
            padding: clamp(20px, 4vw, 32px) clamp(24px, 5vw, 40px);
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: min(440px, 90vw);
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }
        .splash-form label {
            font-weight: 700;
            color: #d4b060;
            font-size: 0.95em;
            letter-spacing: 1px;
        }
        .splash-form input {
            background: #121025;
            border: 2px solid #3a3050;
            color: #fff;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 1.1em;
            transition: 0.3s;
            outline: none;
        }
        .splash-form input:focus {
            border-color: #e8c547;
            box-shadow: 0 0 25px rgba(232, 197, 71, 0.25);
        }
        .btn-create {
            background: linear-gradient(180deg, #f0c040, #b8781a);
            border: none;
            color: #1a1020;
            font-weight: 800;
            font-size: 1.2em;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 1.5px;
            transition: 0.3s;
            margin-top: 8px;
            text-transform: uppercase;
        }
        .btn-create:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(240, 192, 64, 0.45);
        }
        .splash-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-load {
            background: rgba(40, 35, 70, 0.8);
            border: 1px solid #3a3050;
            color: #ccc;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: 0.9em;
        }
        .btn-load:hover {
            background: #3a3050;
            border-color: #c8943e;
        }

        #game-screen {
            display: none;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            position: relative;
            flex-direction: column;
        }
        #game-screen.active {
            display: flex;
        }

        #top-bar {
            z-index: 100;
            background: linear-gradient(180deg, rgba(18, 15, 35, 0.97), rgba(14, 12, 28, 0.95));
            backdrop-filter: blur(15px);
            border-bottom: 1px solid #2e2e4e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            min-height: 50px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .country-name-display {
            font-weight: 800;
            font-size: clamp(0.9em, 2.5vw, 1.25em);
            background: linear-gradient(180deg, #ffe08a, #c8943e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .stats-panel {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 700;
            font-size: clamp(0.7em, 1.8vw, 0.95em);
            white-space: nowrap;
        }
        .stat-icon {
            font-size: 1.2em;
        }
        .stat-money {
            color: #f0d060;
        }
        .stat-pop {
            color: #6dc8e8;
        }
        .stat-happy {
            color: #6ce89c;
        }
        .stat-demand {
            color: #ff9800;
        }
        .top-buttons {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-top {
            background: rgba(40, 35, 70, 0.8);
            border: 1px solid #3a3050;
            color: #ccc;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: clamp(0.7em, 1.5vw, 0.85em);
            white-space: nowrap;
        }
        .btn-top:hover,
        .btn-top.active {
            background: #3a3050;
            border-color: #c8943e;
        }
        .btn-top.active {
            color: #f0d060;
            border-color: #f0d060;
        }
        .time-weather {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8em;
            color: #ccc;
        }
        .time-display {
            color: #f0d060;
            font-weight: 700;
        }
        .weather-display {
            font-size: 1.2em;
        }

        #game-canvas {
            flex: 1;
            cursor: grab;
            display: block;
            touch-action: none;
            min-height: 0;
        }
        #game-canvas.building {
            cursor: crosshair;
        }
        #game-canvas.grabbing {
            cursor: grabbing;
        }

        #bottom-panel {
            z-index: 100;
            background: rgba(16, 14, 30, 0.96);
            backdrop-filter: blur(15px);
            border-top: 1px solid #2e2e4e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 10px;
            min-height: 55px;
            flex-wrap: wrap;
            overflow-x: auto;
        }
        .tool-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            background: rgba(30, 25, 55, 0.7);
            font-weight: 700;
            font-size: 0.7em;
            color: #ddd;
            min-width: 48px;
            text-align: center;
        }
        .tool-btn:active {
            transform: scale(0.95);
        }
        .tool-btn.active {
            border-color: #f0d060 !important;
            background: rgba(200, 160, 50, 0.25) !important;
        }
        .tool-btn.danger {
            border-color: #802020;
            color: #f08888;
        }
        .tool-btn-icon {
            font-size: 1.4em;
            line-height: 1;
        }
        .tool-btn-label {
            font-size: 0.65em;
            letter-spacing: 0.5px;
        }

        #build-modal {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #build-modal.open {
            display: flex;
        }
        .modal-content {
            background: #1a1830;
            border: 1px solid #3a3050;
            border-radius: 20px;
            padding: 20px;
            max-width: 700px;
            width: 95vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
        }
        .modal-title {
            font-weight: 800;
            font-size: 1.2em;
            color: #f0d060;
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .modal-tabs {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .modal-tab {
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(30, 25, 55, 0.6);
            border: 1px solid #3a3050;
            color: #ccc;
            font-size: 0.75em;
            font-weight: 600;
            transition: 0.2s;
        }
        .modal-tab:hover {
            background: rgba(50, 40, 80, 0.8);
        }
        .modal-tab.active {
            background: rgba(200, 160, 50, 0.3);
            border-color: #f0d060;
            color: #f0d060;
        }
        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 6px;
        }
        .modal-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 8px 4px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.15s;
            border: 2px solid transparent;
            background: rgba(30, 25, 55, 0.6);
            text-align: center;
        }
        .modal-item:hover {
            background: rgba(50, 40, 80, 0.8);
            border-color: #c8943e;
        }
        .modal-item.selected {
            border-color: #f0d060 !important;
            background: rgba(200, 160, 50, 0.25) !important;
        }
        .modal-item-emoji {
            font-size: 1.8em;
        }
        .modal-item-name {
            font-size: 0.7em;
            font-weight: 600;
            color: #ddd;
            line-height: 1.2;
        }
        .modal-item-cost {
            font-size: 0.65em;
            color: #f0d060;
            font-weight: 700;
        }
        .modal-close {
            display: block;
            margin: 16px auto 0;
            background: #3a3050;
            border: none;
            color: #fff;
            padding: 10px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9em;
            transition: 0.3s;
        }
        .modal-close:hover {
            background: #5a4070;
        }

        #info-popup {
            position: absolute;
            pointer-events: none;
            z-index: 150;
            background: rgba(15, 12, 35, 0.97);
            border: 2px solid #5a5080;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 0.85em;
            display: none;
            white-space: nowrap;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.8);
            line-height: 1.7;
            color: #f0f0f0;
        }
        #info-popup .pop-title {
            font-weight: 800;
            color: #ffd700;
            font-size: 1.1em;
            display: block;
            margin-bottom: 4px;
        }

        #message-log {
            position: absolute;
            top: 60px;
            right: 10px;
            z-index: 110;
            display: flex;
            flex-direction: column;
            gap: 4px;
            pointer-events: none;
            max-width: 280px;
        }
        .log-msg {
            background: rgba(0, 0, 0, 0.9);
            border-left: 3px solid #f0c040;
            padding: 7px 12px;
            border-radius: 6px;
            font-size: 0.8em;
            animation: fadeInOut 3.5s forwards;
            font-weight: 500;
            word-break: break-word;
            color: #e0e0e0;
        }
        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translateX(20px);
            }
            12% {
                opacity: 1;
                transform: translateX(0);
            }
            75% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateX(20px);
            }
        }

        @media (max-width: 768px) {
            #top-bar {
                padding: 4px 6px;
                min-height: 40px;
                gap: 3px;
            }
            .stats-panel {
                gap: 5px;
            }
            .stat-item {
                font-size: 0.6em;
                gap: 2px;
            }
            .btn-top {
                padding: 4px 6px;
                font-size: 0.6em;
            }
            #bottom-panel {
                gap: 3px;
                padding: 5px 4px;
                min-height: 44px;
            }
            .tool-btn {
                padding: 4px 6px;
                min-width: 38px;
                font-size: 0.6em;
            }
            .tool-btn-icon {
                font-size: 1.1em;
            }
            #message-log {
                top: 45px;
                right: 4px;
                max-width: 180px;
            }
            #info-popup {
                font-size: 0.7em;
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>

    <div id="splash">
        <canvas class="splash-stars" id="splash-stars"></canvas>
        <div class="splash-title">🏛️ PRESIDENT<br>SIMULATOR</div>
        <div class="splash-subtitle">TheoTown Edition — Постройте мегаполис мечты</div>
        <div class="splash-form">
            <label for="country-name">📜 Название государства</label>
            <input type="text" id="country-name" placeholder="Введите название..." maxlength="28" value="Великоречье">
            <button class="btn-create" onclick="startGame()">🌟 ОСНОВАТЬ ГОСУДАРСТВО</button>
            <div class="splash-buttons">
                <button class="btn-load" onclick="loadGame()">💾 Загрузить сохранение</button>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <div id="top-bar">
            <div class="country-name-display" id="display-country-name">🏛️ Великоречье</div>
            <div class="stats-panel">
                <div class="stat-item"><span class="stat-icon">💰</span> <span class="stat-money" id="money-val">50000</span></div>
                <div class="stat-item"><span class="stat-icon">👥</span> <span class="stat-pop" id="pop-val">100</span></div>
                <div class="stat-item"><span class="stat-icon">😊</span> <span class="stat-happy" id="happy-val">75</span>%</div>
                <div class="stat-item"><span class="stat-icon">📈</span> <span class="stat-demand" id="demand-val">R:50 C:30 I:20</span></div>
            </div>
            <div class="top-buttons">
                <div class="time-weather">
                    <span class="weather-display" id="weather-icon">☀️</span>
                    <span class="time-display" id="time-display">17:26</span>
                </div>
                <button class="btn-top" onclick="saveGame()" title="Сохранить">💾</button>
                <button class="btn-top" onclick="showHelp()">❓</button>
            </div>
        </div>

        <canvas id="game-canvas"></canvas>

        <div id="info-popup"></div>
        <div id="message-log"></div>

        <div id="bottom-panel">
            <button class="tool-btn" id="btn-zone-res" onclick="setTool('zone_residential')">
                <span class="tool-btn-icon">🏘️</span><span class="tool-btn-label">Жилая зона</span>
            </button>
            <button class="tool-btn" id="btn-zone-com" onclick="setTool('zone_commercial')">
                <span class="tool-btn-icon">🏪</span><span class="tool-btn-label">Коммерция</span>
            </button>
            <button class="tool-btn" id="btn-zone-ind" onclick="setTool('zone_industrial')">
                <span class="tool-btn-icon">🏭</span><span class="tool-btn-label">Индустрия</span>
            </button>
            <button class="tool-btn" id="btn-build" onclick="openBuildModal()">
                <span class="tool-btn-icon">🏗️</span><span class="tool-btn-label">Спец.</span>
            </button>
            <button class="tool-btn" id="btn-rotate" onclick="rotateBuilding()">
                <span class="tool-btn-icon">🔄</span><span class="tool-btn-label">Поворот</span>
            </button>
            <button class="tool-btn danger" id="btn-delete" onclick="toggleDeleteMode()">
                <span class="tool-btn-icon">🗑️</span><span class="tool-btn-label">Снос</span>
            </button>
            <button class="tool-btn" id="btn-info" onclick="toggleSelectMode()">
                <span class="tool-btn-icon">🔍</span><span class="tool-btn-label">Инфо</span>
            </button>
        </div>

        <div id="build-modal">
            <div class="modal-content">
                <div class="modal-title">🏗️ Специальные постройки</div>
                <div class="modal-tabs" id="modal-tabs">
                    <button class="modal-tab active" data-tab="roads">🛣️ Дороги</button>
                    <button class="modal-tab" data-tab="services">🚒 Службы</button>
                    <button class="modal-tab" data-tab="parks">🌳 Парки</button>
                    <button class="modal-tab" data-tab="landmarks">🏛️ Достоприм.</button>
                    <button class="modal-tab" data-tab="transport">🚌 Транспорт</button>
                </div>
                <div class="modal-grid" id="modal-grid"></div>
                <div class="size-label" style="text-align:center;color:#aaa;margin-top:8px;">📏 Размер:</div>
                <div class="size-selector" id="size-selector" style="display:flex;gap:6px;justify-content:center;margin:8px 0;flex-wrap:wrap;">
                    <button class="size-btn selected" data-scale="1" style="padding:6px 10px;border-radius:8px;border:2px solid #3a3050;background:rgba(30,25,55,0.6);color:#ccc;cursor:pointer;font-weight:700;font-size:0.75em;">🔹 1x</button>
                    <button class="size-btn" data-scale="1.5" style="padding:6px 10px;border-radius:8px;border:2px solid #3a3050;background:rgba(30,25,55,0.6);color:#ccc;cursor:pointer;font-weight:700;font-size:0.75em;">🔸 1.5x</button>
                    <button class="size-btn" data-scale="2" style="padding:6px 10px;border-radius:8px;border:2px solid #3a3050;background:rgba(30,25,55,0.6);color:#ccc;cursor:pointer;font-weight:700;font-size:0.75em;">🔶 2x</button>
                    <button class="size-btn" data-scale="3" style="padding:6px 10px;border-radius:8px;border:2px solid #3a3050;background:rgba(30,25,55,0.6);color:#ccc;cursor:pointer;font-weight:700;font-size:0.75em;">💎 3x</button>
                </div>
                <div class="rotate-info" style="text-align:center;color:#8af;font-size:0.75em;margin-top:4px;">🔄 R — поворот (сейчас: <span id="rot-display">0°</span>)</div>
                <button class="modal-close" onclick="closeBuildModal()">✖ Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== СОСТОЯНИЕ ИГРЫ ====================
        const gameState = {
            countryName: '',
            money: 50000,
            population: 100,
            happiness: 75,
            borderSize: 500,
            borderExpandCost: 50000,
            buildings: [],
            roads: [],
            rails: [],
            zones: [],
            waterBodies: [],
            people: [],
            cars: [],
            boats: [],
            buses: [],
            particles: [],
            selectedType: null,
            buildScale: 1,
            buildRotation: 0,
            currentTool: null,
            deleteMode: false,
            selectMode: false,
            activeTab: 'roads',
            canvas: null,
            ctx: null,
            cameraX: 0,
            cameraY: 0,
            zoom: 1,
            gridSize: 48,
            dragging: false,
            dragStartX: 0,
            dragStartY: 0,
            dragDistance: 0,
            mouseX: 0,
            mouseY: 0,
            hoveredBuilding: null,
            gameTime: 0,
            incomeTimer: 0,
            demandTimer: 0,
            saveInterval: null,
            gameHour: 17,
            gameMinute: 26,
            weather: 'sunny',
            weatherTimer: 0,
            weatherDuration: 500,
            raindrops: [],
            snowflakes: [],
            residentialDemand: 50,
            commercialDemand: 30,
            industrialDemand: 20,
            touchStartTime: 0,
            touchDistance: 0,
            lastPinchZoom: 1,
        };

        // ==================== ТИПЫ ЗДАНИЙ ====================
        const buildingTypes = {
            // Дороги
            road: { emoji: '🛣️', name: 'Асфальтовая дорога', cost: 50, income: 5, width: 48, height: 48, isRoad: true, category: 'roads', tab: 'roads' },
            road_curve: { emoji: '↪️', name: 'Поворот дороги', cost: 80, income: 8, width: 48, height: 48, isRoadCurve: true, category: 'roads', tab: 'roads' },
            rail: { emoji: '🚂', name: 'Железная дорога', cost: 200, income: 20, width: 48, height: 48, isRail: true, category: 'roads', tab: 'roads' },
            highway: { emoji: '🛤️', name: 'Автомагистраль', cost: 300, income: 40, width: 48, height: 48, isRoad: true, category: 'roads', tab: 'roads' },

            // Городские службы
            police_station: { emoji: '🚔', name: 'Полицейский участок', cost: 5000, income: -100, width: 48, height: 48, category: 'services', tab: 'services', capacity: 50, serviceType: 'police', serviceRadius: 200 },

        function initSplashStars() {
            const canvas = document.getElementById('splash-stars');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ctx = canvas.getContext('2d');
            const stars = Array.from({ length: 200 }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.8 + 0.5,
                twinkle: Math.random() * Math.PI * 2,
                speed: Math.random() * 0.02 + 0.005,
            }));

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(star => {
                    star.twinkle += star.speed;
                    const alpha = 0.4 + Math.sin(star.twinkle) * 0.4;
                    ctx.fillStyle = `rgba(255,255,240,${alpha})`;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        }
        initSplashStars();
