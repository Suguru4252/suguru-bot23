<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ТИМОФЕЙ: АШ 2.0 · ПОЛНЫЙ РАНДОМ</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #1a2f1a 0%, #2d4a2d 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
      padding: 12px;
    }

    .game-wrapper {
      max-width: 1000px;
      width: 100%;
      background: #d4c3a3;
      background-image: linear-gradient(145deg, #e8d8b7, #c8b48c);
      border-radius: 40px 40px 30px 30px;
      box-shadow: 0 18px 0 #6b4f32, 0 25px 30px rgba(0,0,0,0.4);
      padding: 20px 20px 28px;
      border: 5px solid #b39264;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2.5rem;
      font-weight: 900;
      text-align: center;
      color: #2a1f0e;
      text-shadow: 4px 4px 0 #e0b87b;
      letter-spacing: 3px;
      filter: drop-shadow(0 6px 2px #5a422a);
    }

    .school-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #5f7a5a;
      margin: 8px 0 16px;
      padding: 10px 20px;
      border-radius: 50px;
      border: 4px solid #3a552f;
      box-shadow: inset 0 2px 6px #b1c6a4, 0 6px 0 #2f4423;
      color: #f9f1d2;
      font-weight: bold;
      font-size: 1.3rem;
    }

    .notes-counter {
      background: #2d2616;
      padding: 8px 24px;
      border-radius: 30px;
      box-shadow: inset 0 2px 5px #6e5e3e, 0 3px 0 #1a150a;
      color: #ffecb3;
      font-size: 1.7rem;
    }

    .map-container {
      background: #4a6741;
      padding: 20px 16px;
      border-radius: 30px;
      border: 6px solid #2f4a2a;
      box-shadow: inset 0 0 0 4px #72956a, 0 12px 0 #1f331a;
      margin-bottom: 18px;
    }

    .school-map {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }

    .room {
      aspect-ratio: 1 / 1.2;
      background: #c9af8b;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      box-shadow: inset 0 -6px 0 #7b623e, 0 7px 0 #5a4028, 0 3px 8px black;
      border: 3px solid #a58357;
      font-weight: bold;
      font-size: 1rem;
      text-align: center;
      color: #1f1a0e;
      transition: all 0.1s;
      cursor: pointer;
      position: relative;
    }

    .room.timofey {
      background: #f5cd7a;
      box-shadow: inset 0 -6px 0 #b38b40, 0 7px 0 #6f4f1f, 0 0 15px #ffd966;
      border-color: #f3b33d;
      transform: scale(1.02);
      z-index: 2;
    }

    .room.galina {
      background: #b58a6c;
      box-shadow: inset 0 -6px 0 #825e48, 0 7px 0 #543e2e, 0 3px 8px black;
      border-color: #e0925b;
    }

    .room.visited {
      opacity: 0.95;
    }

    .room-emoji {
      font-size: 2.5rem;
      line-height: 1.2;
      filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.2));
    }

    .room-name {
      font-size: 0.75rem;
      background: #352d1cc9;
      padding: 4px 8px;
      border-radius: 20px;
      color: #f3eaca;
      margin-top: 4px;
      max-width: 90%;
    }

    .question-mark {
      position: absolute;
      top: 5px;
      right: 5px;
      font-size: 1.5rem;
      opacity: 0.7;
    }

    .action-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 20px 0 12px;
      justify-content: center;
    }

    .btn {
      background: #fbeba8;
      border: 4px solid #b67936;
      color: #2b1d0a;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 14px 18px;
      border-radius: 40px;
      box-shadow: 0 7px 0 #7b4f24, 0 4px 8px black;
      cursor: pointer;
      text-align: center;
      transition: all 0.05s;
      font-family: inherit;
      text-transform: uppercase;
      flex: 1 0 140px;
      transform: translateY(-2px);
    }

    .btn:active {
      box-shadow: 0 3px 0 #7b4f24, 0 2px 6px black;
      transform: translateY(4px);
    }

    .btn.special {
      background: #f7b05e;
      border-color: #b85f1a;
      box-shadow: 0 7px 0 #9e4a1b, 0 4px 8px black;
    }

    .btn.danger {
      background: #dd7a6b;
      border-color: #992b1c;
      box-shadow: 0 7px 0 #701f13;
      color: #faf0d7;
    }

    .log-box {
      background: #1e2a1acc;
      backdrop-filter: blur(4px);
      color: #f0eac1;
      padding: 16px 20px;
      border-radius: 30px;
      font-size: 1.2rem;
      font-weight: bold;
      min-height: 75px;
      border: 3px solid #b3924b;
      box-shadow: inset 0 0 12px #00000077, 0 6px 0 #5f4a26;
      margin: 18px 0 8px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      color: #2a1f0e;
      font-weight: bold;
    }

    .reset-btn {
      background: #5d6e52;
      border-color: #2f4028;
      box-shadow: 0 6px 0 #2b3a22;
      color: #f5efd7;
    }

    .hint-text {
      font-size: 0.9rem;
      background: #fffaec;
      padding: 6px 14px;
      border-radius: 20px;
      display: inline-block;
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <h1>🏫 ТИМОФЕЙ: АШ 2.0</h1>
  <div class="school-header">
    <span>🤪 ГЛУПЫЙ ТИМОФЕЙ</span>
    <span class="notes-counter">📋 <span id="noteCountDisplay">0</span>/5</span>
    <span>👩‍🏫 ГАЛИНА В.</span>
  </div>

  <!-- Карта школы 5x4 = 20 кабинетов -->
  <div class="map-container">
    <div class="school-map" id="schoolMap"></div>
  </div>

  <!-- Кнопки действий -->
  <div class="action-panel">
    <button class="btn" id="searchBtn">🔍 ИСКАТЬ ЗАПИСКУ</button>
    <button class="btn special" id="galinaBtn">👩‍🏫 К ГАЛИНЕ В.</button>
    <button class="btn danger" id="randomTeleportBtn">🌀 СЛУЧАЙНЫЙ КАБИНЕТ</button>
  </div>

  <!-- Лог событий -->
  <div class="log-box" id="logDisplay">
    🏫 Тимофей в школе! Ищи 5 записок (они спрятаны). Галина ждёт в одном из кабинетов...
  </div>

  <div class="info-row">
    <span class="hint-text">👆 Кликай на кабинеты чтобы ходить</span>
    <span class="hint-text">❓ Записки НЕ видны — надо искать!</span>
  </div>

  <!-- Сброс -->
  <div style="display: flex; justify-content: center; margin-top: 16px;">
    <button class="btn reset-btn" id="resetBtn">🔄 НОВАЯ ИГРА (ПОЛНЫЙ РАНДОМ)</button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- КОНФИГУРАЦИЯ ----------
    const GRID_COLS = 5;
    const GRID_ROWS = 4;
    const TOTAL_ROOMS = GRID_COLS * GRID_ROWS; // 20 кабинетов
    
    const NOTES_REQUIRED = 5; // нужно 5 записок
    
    // Базы названий и эмодзи для генерации
    const ROOM_TYPES = [
      { name: 'Физика', emoji: '⚛️' },
      { name: 'Химия', emoji: '🧪' },
      { name: 'Биология', emoji: '🧬' },
      { name: 'Математика', emoji: '📐' },
      { name: 'Литература', emoji: '📖' },
      { name: 'История', emoji: '🏛️' },
      { name: 'География', emoji: '🌍' },
      { name: 'Информатика', emoji: '💻' },
      { name: 'Физкультура', emoji: '🏀' },
      { name: 'Столовая', emoji: '🍕' },
      { name: 'Библиотека', emoji: '📚' },
      { name: 'Актовый зал', emoji: '🎭' },
      { name: 'Медпункт', emoji: '🏥' },
      { name: 'Учительская', emoji: '🚪' },
      { name: 'Директор', emoji: '👔' },
      { name: 'Рекреация', emoji: '🪑' },
      { name: 'Туалет', emoji: '🚻' },
      { name: 'Лаборантская', emoji: '🔬' },
      { name: 'Музыка', emoji: '🎵' },
      { name: 'ИЗО', emoji: '🎨' },
      { name: 'ОБЖ', emoji: '🛡️' },
      { name: 'Английский', emoji: '🇬🇧' },
      { name: 'Немецкий', emoji: '🇩🇪' },
      { name: 'Подвал', emoji: '🕳️' },
      { name: 'Чердак', emoji: '🏚️' }
    ];

    // Состояние игры
    let rooms = [];                     // массив объектов комнат
    let timofeyPos = 0;                // индекс текущей комнаты (0..19)
    let collectedNotes = 0;            
    let notesFound = new Array(TOTAL_ROOMS).fill(false);  // true если записка уже взята
    let notesPositions = [];            // индексы комнат где изначально записки
    let galinaPosition = 7;            // позиция Галины (будет случайной)
    let gameCompleted = false;
    let visitedRooms = new Array(TOTAL_ROOMS).fill(false); // для статистики
    
    // DOM
    const mapEl = document.getElementById('schoolMap');
    const noteSpan = document.getElementById('noteCountDisplay');
    const logEl = document.getElementById('logDisplay');

    // ---------- ГЕНЕРАЦИЯ СЛУЧАЙНОЙ ШКОЛЫ ----------
    function generateRandomRooms() {
      const shuffled = [...ROOM_TYPES].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, TOTAL_ROOMS).map((type, idx) => ({
        id: idx,
        name: type.name,
        emoji: type.emoji,
        hasNote: false, // будет установлено позже
      }));
    }

    // Выбор случайных позиций для записок (5 уникальных индексов)
    function selectRandomNotePositions() {
      const positions = [];
      while (positions.length < NOTES_REQUIRED) {
        const rand = Math.floor(Math.random() * TOTAL_ROOMS);
        if (!positions.includes(rand)) {
          positions.push(rand);
        }
      }
      return positions;
    }

    // Сброс/инициализация новой игры
    function initNewGame() {
      // Генерируем комнаты
      rooms = generateRandomRooms();
      
      // Выбираем позиции записок
      notesPositions = selectRandomNotePositions();
      notesFound = new Array(TOTAL_ROOMS).fill(false);
      
      // Устанавливаем hasNote для комнат
      rooms.forEach((room, idx) => {
        room.hasNote = notesPositions.includes(idx);
      });
      
      // Выбираем случайную позицию Галины (не совпадающую с позицией Тимофея)
      do {
        galinaPosition = Math.floor(Math.random() * TOTAL_ROOMS);
      } while (galinaPosition === 0); // Тимофей стартует в 0, Галина не там же
      
      timofeyPos = 0;
      collectedNotes = 0;
      gameCompleted = false;
      visitedRooms = new Array(TOTAL_ROOMS).fill(false);
      visitedRooms[0] = true;
      
      updateNoteCounter();
      addLog('🔄 Новая школа! Записки спрятаны, Галина где-то ждёт. Ищи!');
      renderMap();
    }

    // ---------- ОТРИСОВКА КАРТЫ ----------
    function renderMap() {
      mapEl.innerHTML = '';
      
      rooms.forEach((room, idx) => {
        const roomDiv = document.createElement('div');
        roomDiv.className = 'room';
        
        if (idx === timofeyPos) roomDiv.classList.add('timofey');
        if (idx === galinaPosition) roomDiv.classList.add('galina');
        if (visitedRooms[idx]) roomDiv.classList.add('visited');
        
        // Записка НЕ показывается! Игрок не знает где она.
        // Показываем только если игра завершена (для наглядности)
        let noteIndicator = '';
        if (gameCompleted && room.hasNote && !notesFound[idx]) {
          noteIndicator = '📋';
        }
        
        // Если комната не посещена — показываем "?", но не для текущей позиции
        const notVisitedMystery = (!visitedRooms[idx] && idx !== timofeyPos) ? '<div class="question-mark">❓</div>' : '';
        
        roomDiv.innerHTML = `
          <div class="room-emoji">${room.emoji}${noteIndicator}</div>
          <div class="room-name">${room.name}</div>
          ${notVisitedMystery}
        `;
        
        // Клик для перемещения
        roomDiv.addEventListener('click', () => {
          if (gameCompleted) {
            addLog('🎉 Игра завершена! Начни новую.');
            return;
          }
          
          const targetIdx = idx;
          if (targetIdx === timofeyPos) {
            addLog(`🤨 Тимофей уже в ${room.name}.`);
            return;
          }
          
          // Перемещение
          timofeyPos = targetIdx;
          visitedRooms[targetIdx] = true;
          
          let moveMsg = `🚶 Тимофей зашёл в ${room.name}.`;
          
          // Проверка на Галину
          if (targetIdx === galinaPosition) {
            moveMsg += ` 👩‍🏫 Тут Галина Владимировна!`;
            if (collectedNotes === NOTES_REQUIRED) {
              moveMsg += ` У тебя все записки! Жми "К ГАЛИНЕ В."`;
            } else {
              moveMsg += ` Нужно ещё ${NOTES_REQUIRED - collectedNotes} записок.`;
            }
          }
          
          addLog(moveMsg);
          renderMap();
        });
        
        mapEl.appendChild(roomDiv);
      });
    }

    // Обновление счётчика
    function updateNoteCounter() {
      noteSpan.textContent = `${collectedNotes}/${NOTES_REQUIRED}`;
    }

    // Лог
    function addLog(msg) {
      logEl.textContent = msg;
    }

    // ---------- ДЕЙСТВИЯ ----------
    
    // Искать записку в текущей комнате
    function searchNote() {
      if (gameCompleted) {
        addLog('⛔ Игра окончена. Сбрось.');
        return;
      }
      
      const currentRoom = rooms[timofeyPos];
      
      if (!currentRoom.hasNote) {
        addLog(`❌ В ${currentRoom.name} нет записки. Продолжай поиски!`);
        return;
      }
      
      if (notesFound[timofeyPos]) {
        addLog(`📋 Записка из ${currentRoom.name} уже взята.`);
        return;
      }
      
      // Нашли записку!
      notesFound[timofeyPos] = true;
      collectedNotes++;
      updateNoteCounter();
      
      addLog(`✅ ТИМОФЕЙ НАШЁЛ ЗАПИСКУ в ${currentRoom.name}! (${collectedNotes}/${NOTES_REQUIRED})`);
      
      if (collectedNotes === NOTES_REQUIRED) {
        addLog(`🎉 ВСЕ 5 ЗАПИСОК НАЙДЕНЫ! Теперь найди Галину Владимировну и сдай их!`);
      }
      
      renderMap();
    }
    
    // Сдать записки Галине
    function submitToGalina() {
      if (gameCompleted) {
        addLog('🏆 Тимофей уже получил АШ 2.0!');
        return;
      }
      
      // Проверка: Тимофей в одной комнате с Галиной?
      if (timofeyPos !== galinaPosition) {
        addLog(`🚫 Галина Владимировна не здесь! Ищи её по школе.`);
        return;
      }
      
      if (collectedNotes < NOTES_REQUIRED) {
        addLog(`👩‍🏫 Галина: "Тимофей, у тебя только ${collectedNotes}/${NOTES_REQUIRED} записок. Приноси все 5!"`);
        return;
      }
      
      // ПОБЕДА!
      gameCompleted = true;
      
      // Показываем все записки для наглядности
      addLog(`🏆👑 ГАЛИНА ВЛАДИМИРОВНА ПРИНЯЛА 5 ЗАПИСОК! ТИМОФЕЙ ПОЛУЧАЕТ "АШ 2.0" !!! МИССИЯ ВЫПОЛНЕНА! 🎓🤡`);
      
      renderMap();
      updateNoteCounter();
    }
    
    // Телепорт в случайный кабинет (для веселья)
    function randomTeleport() {
      if (gameCompleted) {
        addLog('Игра завершена.');
        return;
      }
      
      let newPos;
      do {
        newPos = Math.floor(Math.random() * TOTAL_ROOMS);
      } while (newPos === timofeyPos);
      
      timofeyPos = newPos;
      visitedRooms[newPos] = true;
      
      const room = rooms[newPos];
      let msg = `🌀 Тимофей телепортировался в ${room.name}.`;
      
      if (newPos === galinaPosition) {
        msg += ` 👩‍🏫 О! Тут Галина!`;
        if (collectedNotes === NOTES_REQUIRED) msg += ` Можно сдавать!`;
      }
      
      addLog(msg);
      renderMap();
    }

    // Сброс
    function resetGame() {
      initNewGame();
    }

    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    function bindEvents() {
      document.getElementById('searchBtn').addEventListener('click', searchNote);
      document.getElementById('galinaBtn').addEventListener('click', submitToGalina);
      document.getElementById('randomTeleportBtn').addEventListener('click', randomTeleport);
      document.getElementById('resetBtn').addEventListener('click', resetGame);
    }

    // Старт
    function startGame() {
      initNewGame();
      bindEvents();
    }

    startGame();
  })();
</script>
</body>
</html>
