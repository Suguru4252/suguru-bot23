<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NetErrror - BIG Бибеджон: Кокосовый замес</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a2f2a, #051a15);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'MS Gothic', monospace;
            overflow: hidden;
            touch-action: manipulation;
        }
        .game-container {
            background: #1e3a2f;
            border-radius: 48px;
            padding: 16px;
            box-shadow: 0 20px 40px black;
            border: 2px solid #d4b87a;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 4px #2b4a3a, 0 10px 30px black;
            cursor: crosshair;
        }
        .ui-panel {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            background: #0c1a16cc;
            backdrop-filter: blur(8px);
            padding: 8px 24px;
            border-radius: 60px;
            border: 1px solid #c4a86a;
        }
        .stat {
            background: #1f2c1a;
            padding: 6px 20px;
            border-radius: 40px;
            color: #f7e05e;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .lives {
            color: #ff7777;
            font-size: 1.4rem;
            letter-spacing: 4px;
        }
        button {
            background: #6e4a2e;
            border: none;
            color: #ffefb0;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:active {
            transform: scale(0.94);
        }
        .power-bar {
            width: 120px;
            height: 12px;
            background: #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
        }
        .power-fill {
            width: 0%;
            height: 100%;
            background: #ffaa44;
            transition: width 0.02s linear;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="550"></canvas>
        <div class="ui-panel">
            <div class="stat">🐒 БИБЕДЖОН: <span id="scoreSpan">0</span></div>
            <div class="lives" id="livesSpan">❤️❤️❤️</div>
            <div class="power-bar"><div class="power-fill" id="powerFill"></div></div>
            <button id="resetBtn">💥 НОВАЯ ИГРА</button>
        </div>
    </div>
</div>

<script>
    // ========== BIG БИБЕДЖОН - ЗАЩИТА БАЛКОНА ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // ---- ИГРОК (БИБЕДЖОН) ----
    let bibedjon = {
        x: canvas.width/2,
        y: canvas.height - 70,
        width: 70,
        height: 80
    };
    
    // ---- СНАРЯДЫ (кокосы/бананы) ----
    let projectiles = [];
    
    // ---- ВРАГИ (роботы-полицейские) ----
    let enemies = [];
    
    // ---- СИСТЕМА ПРИЦЕЛА И СИЛЫ БРОСКА ----
    let aiming = false;
    let aimStartX = 0, aimStartY = 0;
    let aimCurrentX = 0, aimCurrentY = 0;
    let power = 0;
    let powerCharge = 0; // 0-100
    let charging = false;
    let chargeInterval = null;
    
    // ---- СТАТИСТИКА ----
    let score = 0;
    let lives = 3;
    let gameActive = true;
    let gameOverFlag = false;
    
    // ---- ЭФФЕКТЫ ----
    let particles = [];
    let screenShake = 0;
    let lastEnemySpawn = 0;
    
    // UI элементы
    const scoreSpan = document.getElementById('scoreSpan');
    const livesSpan = document.getElementById('livesSpan');
    const powerFillDiv = document.getElementById('powerFill');
    const resetBtn = document.getElementById('resetBtn');
    
    function updateUI() {
        scoreSpan.innerText = score;
        let hearts = "";
        for(let i=0; i<lives; i++) hearts += "❤️ ";
        for(let i=lives; i<3; i++) hearts += "🖤 ";
        livesSpan.innerText = hearts;
    }
    
    function updatePowerBar() {
        powerFillDiv.style.width = powerCharge + "%";
    }
    
    function spawnEnemy() {
        if (!gameActive) return;
        let x = 50 + Math.random() * (canvas.width - 100);
        enemies.push({
            x: x,
            y: 50,
            width: 48,
            height: 52,
            speed: 0.8 + Math.random() * 0.9,
            hp: 1
        });
    }
    
    function addParticles(x, y, color, count) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6 - 2,
                life: 0.8,
                color: color
            });
        }
    }
    
    // Создание снаряда с заданной силой и направлением
    function shootProjectile(fromX, fromY, toX, toY, chargePower) {
        let dx = toX - fromX;
        let dy = toY - fromY;
        let len = Math.sqrt(dx*dx + dy*dy);
        if (len < 0.1) return;
        let normX = dx / len;
        let normY = dy / len;
        let speed = 5 + (chargePower / 15); // макс ~11.6
        projectiles.push({
            x: fromX, y: fromY,
            vx: normX * speed,
            vy: normY * speed,
            radius: 12,
            life: true
        });
        // звук броска
        playThrowSound();
    }
    
    // Звуки через Web Audio
    let audioCtx = null;
    function playThrowSound() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 380;
        gain.gain.value = 0.15;
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
    }
    
    function playHitSound() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 680;
        gain.gain.value = 0.2;
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }
    
    function playLoseLifeSound() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 220;
        gain.gain.value = 0.3;
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.35);
    }
    
    // ОБРАБОТКА МЫШИ/ТАЧА ДЛЯ ПРИЦЕЛА
    function handlePointerDown(e) {
        if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            e.preventDefault();
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        let canvasX = (clientX - rect.left) * scaleX;
        let canvasY = (clientY - rect.top) * scaleY;
        
        // начало прицеливания от позиции Бибеджона
        aiming = true;
        aimStartX = bibedjon.x + bibedjon.width/2;
        aimStartY = bibedjon.y - 20;
        aimCurrentX = canvasX;
        aimCurrentY = canvasY;
        
        charging = true;
        powerCharge = 0;
        if (chargeInterval) clearInterval(chargeInterval);
        chargeInterval = setInterval(() => {
            if (charging && gameActive) {
                powerCharge = Math.min(powerCharge + 3, 100);
                updatePowerBar();
            }
        }, 30);
    }
    
    function handlePointerMove(e) {
        if (!aiming || !gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            e.preventDefault();
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        let canvasX = (clientX - rect.left) * scaleX;
        let canvasY = (clientY - rect.top) * scaleY;
        aimCurrentX = canvasX;
        aimCurrentY = canvasY;
    }
    
    function handlePointerUp(e) {
        if (!aiming || !gameActive) {
            aiming = false;
            charging = false;
            if (chargeInterval) clearInterval(chargeInterval);
            updatePowerBar();
            return;
        }
        aiming = false;
        charging = false;
        if (chargeInterval) clearInterval(chargeInterval);
        
        // бросок с текущей силой
        shootProjectile(aimStartX, aimStartY, aimCurrentX, aimCurrentY, powerCharge);
        powerCharge = 0;
        updatePowerBar();
    }
    
    canvas.addEventListener('mousedown', handlePointerDown);
    window.addEventListener('mousemove', handlePointerMove);
    window.addEventListener('mouseup', handlePointerUp);
    canvas.addEventListener('touchstart', handlePointerDown);
    window.addEventListener('touchmove', handlePointerMove);
    window.addEventListener('touchend', handlePointerUp);
    
    resetBtn.addEventListener('click', () => {
        gameActive = true;
        gameOverFlag = false;
        score = 0;
        lives = 3;
        projectiles = [];
        enemies = [];
        particles = [];
        aiming = false;
        charging = false;
        if (chargeInterval) clearInterval(chargeInterval);
        powerCharge = 0;
        updatePowerBar();
        updateUI();
        lastEnemySpawn = Date.now();
    });
    
    // ЛОГИКА ИГРЫ
    function updateGame(delta) {
        if (!gameActive) return;
        
        // спавн врагов
        let now = Date.now();
        if (now - lastEnemySpawn > 1100 - Math.min(500, score/5)) {
            spawnEnemy();
            lastEnemySpawn = now;
        }
        
        // движение врагов
        for(let i=0; i<enemies.length; i++) {
            let e = enemies[i];
            e.y += e.speed * delta * 60;
            if (e.y + e.height > bibedjon.y + 20) {
                // враг добрался до Бибеджона
                enemies.splice(i,1);
                i--;
                lives--;
                updateUI();
                playLoseLifeSound();
                screenShake = 12;
                if (lives <= 0) {
                    gameActive = false;
                    gameOverFlag = true;
                }
                continue;
            }
        }
        
        // движение снарядов и столкновения
        for(let i=0; i<projectiles.length; i++) {
            let p = projectiles[i];
            p.x += p.vx * delta * 60;
            p.y += p.vy * delta * 60;
            if (p.x < -50 || p.x > canvas.width+50 || p.y < -50 || p.y > canvas.height+100) {
                projectiles.splice(i,1);
                i--;
                continue;
            }
            let hit = false;
            for(let j=0; j<enemies.length; j++) {
                let e = enemies[j];
                if (p.x + p.radius > e.x && p.x - p.radius < e.x + e.width &&
                    p.y + p.radius > e.y && p.y - p.radius < e.y + e.height) {
                    // попадание
                    enemies.splice(j,1);
                    hit = true;
                    score++;
                    updateUI();
                    addParticles(p.x, p.y, "#ffaa66", 8);
                    playHitSound();
                    screenShake = 5;
                    break;
                }
            }
            if (hit) {
                projectiles.splice(i,1);
                i--;
            }
        }
        
        // обновление частиц
        for(let i=0; i<particles.length; i++) {
            let p = particles[i];
            p.x += p.vx * delta * 60;
            p.y += p.vy * delta * 60;
            p.life -= delta * 2;
            if (p.life <= 0) {
                particles.splice(i,1);
                i--;
            }
        }
        
        if (screenShake > 0) screenShake -= delta * 50;
    }
    
    // РЕНДЕР
    function drawBackground() {
        ctx.fillStyle = "#2a6b55";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        // балкон
        ctx.fillStyle = "#b87a4a";
        ctx.fillRect(0, canvas.height-90, canvas.width, 90);
        ctx.fillStyle = "#9e5e3a";
        ctx.fillRect(0, canvas.height-90, canvas.width, 12);
        // перила
        ctx.fillStyle = "#c4966a";
        for(let i=0; i<12; i++) {
            ctx.fillRect(40 + i*80, canvas.height-100, 12, 30);
        }
    }
    
    function drawBibedjon() {
        let x = bibedjon.x - bibedjon.width/2;
        let y = bibedjon.y - bibedjon.height;
        ctx.fillStyle = "#8b5a2b";
        ctx.fillRect(x+15, y+20, 40, 50);
        ctx.fillStyle = "#c49a6c";
        ctx.beginPath();
        ctx.ellipse(x+bibedjon.width/2, y+15, 25, 30, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "#2c2c2c";
        ctx.fillRect(x+20, y+8, 8, 8);
        ctx.fillRect(x+42, y+8, 8, 8);
        ctx.fillStyle = "#aa6644";
        ctx.fillRect(x+30, y+25, 12, 8);
        // корона
        ctx.fillStyle = "#ffcc44";
        ctx.fillRect(x+22, y-8, 26, 12);
        for(let i=0;i<3;i++) ctx.fillRect(x+24+i*10, y-14, 4, 10);
        ctx.fillStyle = "#f0e68c";
        ctx.font = "bold 20px monospace";
        ctx.fillText("BIG", x+15, y-18);
    }
    
    function drawEnemies() {
        for(let e of enemies) {
            ctx.fillStyle = "#6a8eb0";
            ctx.fillRect(e.x, e.y, e.width, e.height);
            ctx.fillStyle = "#3a5a7a";
            ctx.fillRect(e.x+8, e.y+8, 8, 8);
            ctx.fillRect(e.x+e.width-16, e.y+8, 8, 8);
            ctx.fillStyle = "#cc4444";
            ctx.fillRect(e.x+15, e.y+30, 18, 8);
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 10px monospace";
            ctx.fillText("РОБОПОЛ", e.x+5, e.y+48);
        }
    }
    
    function drawProjectiles() {
        for(let p of projectiles) {
            ctx.fillStyle = "#ffcc55";
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius-2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#aa8833";
            ctx.beginPath();
            ctx.arc(p.x-2, p.y-2, 4, 0, Math.PI*2);
            ctx.fill();
        }
    }
    
    function drawAimLine() {
        if (!aiming) return;
        ctx.beginPath();
        ctx.moveTo(aimStartX, aimStartY);
        ctx.lineTo(aimCurrentX, aimCurrentY);
        ctx.strokeStyle = "#ffaa66";
        ctx.lineWidth = 3;
        ctx.setLineDash([6, 8]);
        ctx.stroke();
        ctx.setLineDash([]);
        // кружок силы
        let radius = 15 + (powerCharge / 3);
        ctx.beginPath();
        ctx.arc(aimCurrentX, aimCurrentY, radius, 0, Math.PI*2);
        ctx.strokeStyle = "#ff8844";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = `rgba(255, 140, 50, ${powerCharge/150})`;
        ctx.fill();
    }
    
    function drawParticles() {
        for(let p of particles) {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
            ctx.fill();
        }
    }
    
    function drawGameOver() {
        if (gameOverFlag && !gameActive) {
            ctx.fillStyle = "#000000aa";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ffcc88";
            ctx.font = "bold 42px monospace";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 40);
            ctx.font = "24px monospace";
            ctx.fillStyle = "#ffaa66";
            ctx.fillText("Нажми НОВАЯ ИГРА", canvas.width/2, canvas.height/2 + 40);
            ctx.textAlign = "left";
        }
    }
    
    function drawUIHints() {
        ctx.fillStyle = "#ffffcc";
        ctx.font = "bold 14px monospace";
        ctx.fillText("ЗАЖМИ ЛКМ → ПРИЦЕЛ → ОТПУСТИ (сила броска)", 20, 40);
    }
    
    let lastTime = 0;
    function gameLoop(now) {
        let delta = Math.min(0.033, (now - lastTime) / 1000);
        if (delta > 0.01) {
            updateGame(delta);
        }
        lastTime = now;
        
        // тряска экрана
        let shakeX = 0, shakeY = 0;
        if (screenShake > 0) {
            shakeX = (Math.random() - 0.5) * screenShake;
            shakeY = (Math.random() - 0.5) * screenShake;
            ctx.save();
            ctx.translate(shakeX, shakeY);
        }
        
        drawBackground();
        drawEnemies();
        drawProjectiles();
        drawBibedjon();
        drawAimLine();
        drawParticles();
        drawGameOver();
        drawUIHints();
        
        if (screenShake > 0) ctx.restore();
        
        requestAnimationFrame(gameLoop);
    }
    
    updateUI();
    updatePowerBar();
    requestAnimationFrame(gameLoop);
    lastEnemySpawn = Date.now();
</script>
</body>
</html>
