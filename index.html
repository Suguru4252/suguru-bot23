<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Code Notes · Мобильная версия</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #f5f7fa;
      padding: 0;
      margin: 0;
      min-height: 100vh;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: white;
      position: relative;
    }
    /* Верхняя панель */
    .top-bar {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .menu-btn {
      background: none;
      border: none;
      font-size: 24px;
      color: #1e293b;
      padding: 8px;
      margin-right: 12px;
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .menu-btn:active {
      background: #f1f5f9;
    }
    .current-repo-name {
      flex: 1;
      font-size: 18px;
      font-weight: 600;
      color: #1e293b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .new-repo-btn {
      background: #0f172a;
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .new-repo-btn:active {
      background: #1e293b;
    }
    /* Боковое меню (скрыто по умолчанию) */
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 20;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }
    .sidebar-overlay.open {
      opacity: 1;
      visibility: visible;
    }
    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100vh;
      background: white;
      z-index: 21;
      padding: 16px;
      overflow-y: auto;
      transition: left 0.3s ease;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
    }
    .sidebar.open {
      left: 0;
    }
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .sidebar h3 {
      font-size: 18px;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .close-sidebar-btn {
      background: none;
      border: none;
      font-size: 24px;
      color: #64748b;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    }
    .close-sidebar-btn:active {
      background: #f1f5f9;
    }
    .repo-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .repo-item {
      padding: 14px 12px;
      margin-bottom: 4px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #334155;
      transition: background 0.15s;
      font-size: 16px;
    }
    .repo-item:active {
      background: #f1f5f9;
    }
    .repo-item.active {
      background: #e0f2fe;
      color: #0369a1;
      font-weight: 500;
    }
    .repo-item i {
      opacity: 0.6;
      font-size: 18px;
    }
    .footer-note {
      margin-top: 20px;
      padding: 12px;
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
    }
    /* Основной контент */
    .main-content {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }
    .editor-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .repo-title-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 18px;
      font-weight: 500;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      background: #fafafa;
      margin-bottom: 16px;
    }
    .repo-title-input:focus {
      outline: 2px solid #0ea5e9;
      background: white;
    }
    textarea {
      width: 100%;
      flex: 1;
      min-height: 400px;
      padding: 16px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      background: #fafafa;
      resize: none;
      tab-size: 4;
    }
    textarea:focus {
      outline: 2px solid #0ea5e9;
      background: white;
    }
    /* Кнопки действий */
    .action-bar {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-bottom: 8px;
      flex-wrap: wrap;
    }
    .btn {
      flex: 1;
      min-width: 80px;
      padding: 14px 12px;
      border-radius: 12px;
      border: none;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      background: #e2e8f0;
      color: #1e293b;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-primary {
      background: #0f172a;
      color: white;
    }
    .btn-primary:active {
      background: #1e293b;
    }
    .btn-danger {
      background: #fee2e2;
      color: #b91c1c;
    }
    .btn-danger:active {
      background: #fecaca;
    }
    .btn-copy {
      background: #dbeafe;
      color: #1e40af;
    }
    .btn-copy:active {
      background: #bfdbfe;
    }
    .btn-download {
      background: #dcfce7;
      color: #166534;
    }
    .btn-download:active {
      background: #bbf7d0;
    }
    .empty-message {
      color: #64748b;
      text-align: center;
      padding: 60px 20px;
    }
    .empty-message i {
      font-size: 48px;
      opacity: 0.3;
      margin-bottom: 16px;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="app">
  <!-- Боковое меню -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3><i class="far fa-folder-open"></i> Мои заметки</h3>
      <button class="close-sidebar-btn" id="closeSidebarBtn"><i class="fas fa-times"></i></button>
    </div>
    <ul class="repo-list" id="repoList"></ul>
    <div class="footer-note">
      <i class="far fa-save"></i> Автосохранение
    </div>
  </div>

  <!-- Верхняя панель -->
  <div class="top-bar">
    <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
    <span class="current-repo-name" id="currentRepoName">Выберите заметку</span>
    <button class="new-repo-btn" id="newRepoBtn"><i class="fas fa-plus"></i></button>
  </div>

  <!-- Основной контент -->
  <div class="main-content" id="editorPanel">
    <div class="empty-message">
      <i class="far fa-hand-pointer"></i>
      <p>Нажмите ☰ чтобы выбрать заметку<br>или + чтобы создать новую</p>
    </div>
  </div>
</div>

<script>
  (function(){
    const STORAGE_KEY = 'simple_code_notes_mobile';
    let notes = [];

    function loadNotes() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try { notes = JSON.parse(stored); } catch(e){ notes = []; }
      }
      if (!notes.length) {
        notes.push({
          id: 'demo1',
          title: 'debounce.js',
          code: `function debounce(fn, delay) {\n  let timer;\n  return (...args) => {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn(...args), delay);\n  };\n}`
        });
        notes.push({
          id: 'demo2',
          title: 'read_file.py',
          code: `with open('file.txt', 'r') as f:\n    content = f.read()\n    print(content)`
        });
        notes.push({
          id: 'demo3',
          title: 'hello.html',
          code: `<!DOCTYPE html>\n<html>\n<head>\n  <style>\n    body { font-family: system-ui; padding: 20px; }\n    h1 { color: #0f172a; }\n  </style>\n</head>\n<body>\n  <h1>Привет, мир!</h1>\n  <p>Это моя HTML заметка</p>\n</body>\n</html>`
        });
      }
    }

    function saveNotes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function generateId() {
      return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    const repoListEl = document.getElementById('repoList');
    const editorPanel = document.getElementById('editorPanel');
    const newRepoBtn = document.getElementById('newRepoBtn');
    const menuBtn = document.getElementById('menuBtn');
    const closeSidebarBtn = document.getElementById('closeSidebarBtn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const currentRepoName = document.getElementById('currentRepoName');

    let activeNoteId = null;

    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    }

    function openSidebar() {
      sidebar.classList.add('open');
      sidebarOverlay.classList.add('open');
    }

    function renderSidebar() {
      if (!notes.length) {
        repoListEl.innerHTML = `<li style="padding:12px; color:#64748b; list-style:none;"><i class="far fa-folder"></i> Нет заметок</li>`;
        return;
      }
      const itemsHtml = notes.map(note => `
        <li class="repo-item ${activeNoteId === note.id ? 'active' : ''}" data-id="${note.id}">
          <i class="far fa-file-code"></i>
          <span>${escapeHtml(note.title) || 'Без названия'}</span>
        </li>
      `).join('');
      repoListEl.innerHTML = itemsHtml;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function downloadFile(filename, content) {
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function getFileNameWithExtension(title) {
      let filename = title.trim();
      if (!filename) filename = 'code';
      
      const commonExtensions = ['.js', '.py', '.html', '.css', '.java', '.cpp', '.c', '.go', '.rs', '.ts', '.txt', '.md', '.json', '.xml', '.sh', '.php'];
      const hasExtension = commonExtensions.some(ext => filename.toLowerCase().endsWith(ext));
      
      if (hasExtension) return filename;
      
      const code = getCurrentCode();
      const firstLine = code.trim().split('\n')[0].toLowerCase();
      
      if (firstLine.includes('<!doctype html') || code.includes('<html>')) return filename + '.html';
      if (firstLine.includes('import java') || firstLine.includes('public class')) return filename + '.java';
      if (firstLine.includes('#!/usr/bin/python') || (firstLine.includes('import ') && (code.includes('def ') || code.includes('print(')))) return filename + '.py';
      if (code.includes('function ') || code.includes('const ') || code.includes('let ')) return filename + '.js';
      
      return filename + '.txt';
    }

    function getCurrentCode() {
      const codeEditor = document.getElementById('codeEditor');
      return codeEditor ? codeEditor.value : '';
    }

    function updateCurrentRepoTitle() {
      if (!activeNoteId) {
        currentRepoName.textContent = 'Выберите заметку';
        return;
      }
      const note = notes.find(n => n.id === activeNoteId);
      if (note) {
        currentRepoName.textContent = note.title || 'Без названия';
      }
    }

    function renderEditor() {
      if (!activeNoteId) {
        editorPanel.innerHTML = `
          <div class="empty-message">
            <i class="far fa-hand-pointer"></i>
            <p>Нажмите ☰ чтобы выбрать заметку<br>или + чтобы создать новую</p>
          </div>
        `;
        updateCurrentRepoTitle();
        return;
      }

      const note = notes.find(n => n.id === activeNoteId);
      if (!note) {
        activeNoteId = null;
        renderSidebar();
        renderEditor();
        return;
      }

      updateCurrentRepoTitle();

      editorPanel.innerHTML = `
        <div class="editor-container">
          <input type="text" id="noteTitleInput" class="repo-title-input" value="${escapeHtml(note.title)}" placeholder="Название заметки">
          <textarea id="codeEditor" placeholder="// Вставьте или напишите код...">${escapeHtml(note.code)}</textarea>
          <div class="action-bar">
            <button class="btn btn-copy" id="copyCodeBtn"><i class="far fa-copy"></i> <span>Копировать</span></button>
            <button class="btn btn-download" id="downloadFileBtn"><i class="fas fa-download"></i> <span>Скачать</span></button>
            <button class="btn btn-primary" id="saveNoteBtn"><i class="far fa-save"></i> <span>Сохранить</span></button>
            <button class="btn btn-danger" id="deleteNoteBtn"><i class="far fa-trash-alt"></i> <span>Удалить</span></button>
          </div>
        </div>
      `;

      const titleInput = document.getElementById('noteTitleInput');
      const codeEditor = document.getElementById('codeEditor');
      
      document.getElementById('saveNoteBtn').addEventListener('click', () => {
        if (!activeNoteId) return;
        const note = notes.find(n => n.id === activeNoteId);
        if (note) {
          note.title = titleInput.value.trim() || 'Без названия';
          note.code = codeEditor.value;
          saveNotes();
          renderSidebar();
          updateCurrentRepoTitle();
          titleInput.style.background = '#e6f7e6';
          setTimeout(() => titleInput.style.background = '', 300);
        }
      });

      document.getElementById('copyCodeBtn').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(codeEditor.value);
          const btn = document.getElementById('copyCodeBtn');
          btn.innerHTML = '<i class="fas fa-check"></i> <span>Готово</span>';
          setTimeout(() => {
            btn.innerHTML = '<i class="far fa-copy"></i> <span>Копировать</span>';
          }, 1500);
        } catch (err) {
          alert('Не удалось скопировать');
        }
      });

      document.getElementById('downloadFileBtn').addEventListener('click', () => {
        const filename = getFileNameWithExtension(titleInput.value);
        const content = codeEditor.value;
        downloadFile(filename, content);
        
        const btn = document.getElementById('downloadFileBtn');
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> <span>Скачан</span>';
        setTimeout(() => {
          btn.innerHTML = originalHtml;
        }, 1500);
      });

      document.getElementById('deleteNoteBtn').addEventListener('click', () => {
        if (!activeNoteId) return;
        if (!confirm('Удалить эту заметку?')) return;
        notes = notes.filter(n => n.id !== activeNoteId);
        activeNoteId = null;
        saveNotes();
        renderSidebar();
        renderEditor();
      });

      // Автосохранение при вводе
      codeEditor.addEventListener('input', () => {
        const note = notes.find(n => n.id === activeNoteId);
        if (note) {
          note.code = codeEditor.value;
          saveNotes();
        }
      });
      
      titleInput.addEventListener('input', () => {
        const note = notes.find(n => n.id === activeNoteId);
        if (note) {
          note.title = titleInput.value.trim() || 'Без названия';
          saveNotes();
          updateCurrentRepoTitle();
        }
      });
    }

    function handleRepoClick(e) {
      const item = e.target.closest('[data-id]');
      if (!item) return;
      const id = item.dataset.id;
      if (activeNoteId !== id) {
        activeNoteId = id;
        renderSidebar();
        renderEditor();
        closeSidebar();
      }
    }

    function createNewNote() {
      const newNote = {
        id: generateId(),
        title: 'Новая заметка',
        code: '// ваш код'
      };
      notes.push(newNote);
      activeNoteId = newNote.id;
      saveNotes();
      renderSidebar();
      renderEditor();
      closeSidebar();
    }

    loadNotes();
    renderSidebar();
    renderEditor();

    repoListEl.addEventListener('click', handleRepoClick);
    newRepoBtn.addEventListener('click', createNewNote);
    menuBtn.addEventListener('click', openSidebar);
    closeSidebarBtn.addEventListener('click', closeSidebar);
    sidebarOverlay.addEventListener('click', closeSidebar);
    
    // Закрытие по свайпу вправо (упрощённо)
    let touchStartX = 0;
    sidebar.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    });
    sidebar.addEventListener('touchmove', (e) => {
      const touchX = e.touches[0].clientX;
      const diff = touchStartX - touchX;
      if (diff > 50) {
        closeSidebar();
      }
    });
  })();
</script>
</body>
</html>
