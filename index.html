
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chugur | Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: white;
        }

        .header {
            background: rgba(10, 10, 15, 0.95);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            font-size: 20px;
            padding: 8px 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .content {
            padding: 20px;
            padding-bottom: 80px;
        }

        .search-block {
            background: rgba(255,107,107,0.1);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .search-title {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
        }

        .search-input-group {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 5px;
        }

        .search-input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            color: white;
            outline: none;
        }

        .search-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 0 28px;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            cursor: pointer;
        }

        .result-card {
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #ff6b6b;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .result-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            background: #333;
        }

        .result-name {
            font-size: 20px;
            font-weight: 700;
        }

        .result-username {
            font-size: 14px;
            opacity: 0.7;
            font-family: monospace;
        }

        .message-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        .not-found {
            background: rgba(255,80,80,0.2);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }

        .player-item {
            background: rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
        }

        .player-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
        }

        .player-name {
            font-weight: 600;
        }

        .player-username {
            font-size: 12px;
            opacity: 0.6;
        }

        .player-write {
            background: rgba(255,107,107,0.3);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
        }

        .chat-header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 20px;
        }

        .message.sent {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            align-self: flex-end;
        }

        .message.received {
            background: rgba(255,255,255,0.12);
            align-self: flex-start;
        }

        .chat-input-area {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 12px 18px;
            color: white;
            outline: none;
        }

        .chat-send {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-card {
            background: rgba(255,255,255,0.1);
            padding: 32px;
            border-radius: 32px;
            max-width: 380px;
            margin: 50px auto;
        }

        .auth-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            color: white;
        }

        .auth-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 14px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .switch-auth {
            text-align: center;
            margin-top: 15px;
            color: #ff6b6b;
            cursor: pointer;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            color: rgba(255,255,255,0.6);
        }

        .nav-item.active {
            color: #ff6b6b;
        }

        .badge {
            position: absolute;
            background: #ff6b6b;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.6;
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header" id="header">
            <div class="logo" id="logo">Chugur</div>
            <div id="headerRight"></div>
        </div>
        <div id="mainContent"></div>
        <div class="bottom-nav" id="bottomNav" style="display: none;">
            <button class="nav-item" id="navSearch">🔍</button>
            <button class="nav-item" id="navMessages">💬</button>
            <button class="nav-item" id="navProfile">👤</button>
        </div>
    </div>

    <script>
        // ДАННЫЕ
        let currentUser = null;
        let users = [];
        let messages = [];

        // ДЕМО ПОЛЬЗОВАТЕЛИ
        const DEMO_USERS = [
            { id: '1', username: 'alex', password: '123', name: 'Алексей', bio: 'Люблю игры', avatar: '' },
            { id: '2', username: 'misha', password: '123', name: 'Миша', bio: 'Привет всем!', avatar: '' },
            { id: '3', username: 'katya', password: '123', name: 'Катя', bio: 'Художник', avatar: '' }
        ];

        // ЗАГРУЗКА ДАННЫХ
        function loadData() {
            const savedUsers = localStorage.getItem('chugur_users');
            const savedMessages = localStorage.getItem('chugur_messages');
            
            if (savedUsers) {
                users = JSON.parse(savedUsers);
            } else {
                users = [...DEMO_USERS];
                saveUsers();
            }
            
            if (savedMessages) {
                messages = JSON.parse(savedMessages);
            } else {
                messages = [];
            }
        }

        function saveUsers() {
            localStorage.setItem('chugur_users', JSON.stringify(users));
        }

        function saveMessages() {
            localStorage.setItem('chugur_messages', JSON.stringify(messages));
        }

        // РЕГИСТРАЦИЯ
        function showRegister() {
            document.getElementById('mainContent').innerHTML = `
                <div style="padding:20px">
                    <div class="auth-card">
                        <h2 style="text-align:center">📝 Регистрация</h2>
                        <input type="text" id="regName" class="auth-input" placeholder="Ваше имя">
                        <input type="password" id="regPassword" class="auth-input" placeholder="Пароль (мин 3)">
                        <button class="auth-btn" onclick="register()">Зарегистрироваться</button>
                        <div class="switch-auth" onclick="showLogin()">← Уже есть аккаунт? Войти</div>
                    </div>
                </div>
            `;
        }

        function register() {
            const name = document.getElementById('regName').value.trim();
            const password = document.getElementById('regPassword').value;
            
            if (!name || password.length < 3) {
                alert('Введите имя и пароль (мин 3 символа)');
                return;
            }
            
            const username = 'player' + Math.floor(Math.random() * 10000);
            const newUser = {
                id: Date.now().toString(),
                username: username,
                password: password,
                name: name,
                bio: 'Новый игрок',
                avatar: ''
            };
            
            users.push(newUser);
            saveUsers();
            currentUser = newUser;
            localStorage.setItem('chugur_current', JSON.stringify(currentUser));
            startApp();
        }

        function showLogin() {
            document.getElementById('mainContent').innerHTML = `
                <div style="padding:20px">
                    <div class="auth-card">
                        <h2 style="text-align:center">🎮 Chugur</h2>
                        <input type="text" id="loginUsername" class="auth-input" placeholder="Username">
                        <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль">
                        <button class="auth-btn" onclick="login()">Войти</button>
                        <div class="switch-auth" onclick="showRegister()">✨ Создать аккаунт</div>
                        <hr style="margin:15px 0; opacity:0.2">
                        <div style="font-size:12px; text-align:center; opacity:0.6;">Демо: alex/123, misha/123, katya/123</div>
                    </div>
                </div>
            `;
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;
            
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                currentUser = user;
                localStorage.setItem('chugur_current', JSON.stringify(currentUser));
                startApp();
            } else {
                alert('Неверный username или пароль');
            }
        }

        // ПОИСК ИГРОКОВ
        function getAllPlayers() {
            return users.filter(u => u.id !== currentUser.id);
        }

        function showSearch() {
            document.getElementById('headerRight').innerHTML = '';
            const oldBack = document.querySelector('.back-btn');
            if (oldBack) oldBack.remove();
            
            document.getElementById('mainContent').innerHTML = `
                <div class="content">
                    <div class="search-block">
                        <div class="search-title">🔎 Найти игрока</div>
                        <div class="search-input-group">
                            <input type="text" id="searchInput" placeholder="Имя или username" autocomplete="off">
                            <button class="search-btn" onclick="findPlayer()">Найти</button>
                        </div>
                        <div id="searchResult"></div>
                    </div>
                    <div class="section-title">👥 Все игроки</div>
                    <div id="playersList"></div>
                </div>
            `;
            
            renderAllPlayers();
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById('navSearch').classList.add('active');
        }

        function renderAllPlayers() {
            const container = document.getElementById('playersList');
            if (!container) return;
            
            const players = getAllPlayers();
            
            if (players.length === 0) {
                container.innerHTML = '<div class="empty-state">Нет других игроков</div>';
                return;
            }
            
            container.innerHTML = players.map(p => `
                <div class="player-item" onclick="openChat('${p.id}')">
                    <div class="player-avatar" style="background:#ff6b6b; display:flex; align-items:center; justify-content:center; font-size:24px;">${p.name.charAt(0)}</div>
                    <div style="flex:1">
                        <div class="player-name">${escapeHtml(p.name)}</div>
                        <div class="player-username">@${escapeHtml(p.username)}</div>
                    </div>
                    <button class="player-write" onclick="event.stopPropagation(); openChat('${p.id}')">💬</button>
                </div>
            `).join('');
        }

        function findPlayer() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultDiv = document.getElementById('searchResult');
            
            if (!query) {
                resultDiv.innerHTML = '<div class="not-found">❌ Введите имя или username</div>';
                return;
            }
            
            const found = getAllPlayers().find(p => 
                p.name.toLowerCase().includes(query) || 
                p.username.toLowerCase().includes(query)
            );
            
            if (found) {
                resultDiv.innerHTML = `
                    <div class="result-card">
                        <div class="result-header">
                            <div class="result-avatar" style="background:#ff6b6b; display:flex; align-items:center; justify-content:center; font-size:32px;">${found.name.charAt(0)}</div>
                            <div class="result-info">
                                <div class="result-name">${escapeHtml(found.name)}</div>
                                <div class="result-username">@${escapeHtml(found.username)}</div>
                                <div style="font-size:13px; opacity:0.7; margin-top:5px;">${escapeHtml(found.bio)}</div>
                            </div>
                        </div>
                        <button class="message-btn" onclick="openChat('${found.id}')">💬 Написать сообщение</button>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `<div class="not-found">❌ Игрок "${escapeHtml(query)}" не найден</div>`;
            }
        }

        // ЧАТ
        let currentChatUser = null;

        function openChat(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) return;
            currentChatUser = user;
            renderChat();
        }

        function getChatMessages() {
            return messages.filter(m => 
                (m.fromId === currentUser.id && m.toId === currentChatUser.id) ||
                (m.fromId === currentChatUser.id && m.toId === currentUser.id)
            ).sort((a, b) => new Date(a.time) - new Date(b.time));
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            
            const msg = {
                id: Date.now().toString(),
                fromId: currentUser.id,
                toId: currentChatUser.id,
                text: text,
                time: new Date().toISOString(),
                read: false
            };
            
            messages.push(msg);
            saveMessages();
            input.value = '';
            updateChatDisplay();
        }

        function updateChatDisplay() {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            
            const msgs = getChatMessages();
            container.innerHTML = msgs.map(m => `
                <div class="message ${m.fromId === currentUser.id ? 'sent' : 'received'}">
                    ${escapeHtml(m.text)}
                    <div style="font-size:10px; opacity:0.5; margin-top:5px;">${new Date(m.time).toLocaleTimeString().slice(0,5)}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function renderChat() {
            // Добавляем кнопку назад
            const oldBack = document.querySelector('.back-btn');
            if (oldBack) oldBack.remove();
            
            const header = document.getElementById('header');
            const backBtn = document.createElement('button');
            backBtn.className = 'back-btn';
            backBtn.innerHTML = '←';
            backBtn.onclick = () => {
                currentChatUser = null;
                showMessages();
            };
            header.insertBefore(backBtn, header.firstChild);
            
            document.getElementById('mainContent').innerHTML = `
                <div class="chat-container">
                    <div class="chat-header">
                        <strong>${escapeHtml(currentChatUser.name)}</strong>
                        <div style="font-size:12px; opacity:0.6;">@${escapeHtml(currentChatUser.username)}</div>
                    </div>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" class="chat-input" placeholder="Сообщение..." autocomplete="off">
                        <button class="chat-send" onclick="sendMessage()">➤</button>
                    </div>
                </div>
            `;
            
            updateChatDisplay();
            
            const input = document.getElementById('chatInput');
            input?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        }

        // СООБЩЕНИЯ (диалоги)
        function showMessages() {
            const oldBack = document.querySelector('.back-btn');
            if (oldBack) oldBack.remove();
            
            // Собираем диалоги
            const dialogsMap = new Map();
            messages.forEach(msg => {
                const otherId = msg.fromId === currentUser.id ? msg.toId : msg.fromId;
                if (!dialogsMap.has(otherId)) {
                    const otherUser = users.find(u => u.id === otherId);
                    if (otherUser) {
                        const lastMsg = messages.filter(m => 
                            (m.fromId === currentUser.id && m.toId === otherId) ||
                            (m.fromId === otherId && m.toId === currentUser.id)
                        ).sort((a,b) => new Date(b.time) - new Date(a.time))[0];
                        
                        dialogsMap.set(otherId, { user: otherUser, lastMsg: lastMsg });
                    }
                }
            });
            
            const dialogs = Array.from(dialogsMap.values()).sort((a,b) => 
                new Date(b.lastMsg.time) - new Date(a.lastMsg.time)
            );
            
            document.getElementById('mainContent').innerHTML = `
                <div class="content">
                    <h3 style="margin-bottom:20px;">💬 Диалоги</h3>
                    <div id="dialogsList">
                        ${dialogs.length === 0 ? '<div class="empty-state">Нет сообщений. Найдите игрока через 🔍</div>' : ''}
                        ${dialogs.map(d => `
                            <div class="player-item" onclick="openChat('${d.user.id}')">
                                <div class="player-avatar" style="background:#ff6b6b; display:flex; align-items:center; justify-content:center; font-size:20px;">${d.user.name.charAt(0)}</div>
                                <div style="flex:1">
                                    <div class="player-name">${escapeHtml(d.user.name)}</div>
                                    <div style="font-size:12px; opacity:0.6;">${escapeHtml(d.lastMsg.text.substring(0, 40))}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById('navMessages').classList.add('active');
        }

        // ПРОФИЛЬ
        function showProfile() {
            const oldBack = document.querySelector('.back-btn');
            if (oldBack) oldBack.remove();
            
            document.getElementById('mainContent').innerHTML = `
                <div class="content">
                    <div style="text-align:center; padding:30px; background:rgba(255,107,107,0.1); border-radius:30px;">
                        <div style="width:90px; height:90px; background:#ff6b6b; border-radius:50%; margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:40px;">${currentUser.name.charAt(0)}</div>
                        <div style="font-size:22px; font-weight:700; margin-top:15px;">${escapeHtml(currentUser.name)}</div>
                        <div style="opacity:0.6;">@${escapeHtml(currentUser.username)}</div>
                        <div style="margin:15px 0;">${escapeHtml(currentUser.bio)}</div>
                        <button class="auth-btn" onclick="logout()" style="background:rgba(255,80,80,0.5); margin-top:20px;">🚪 Выйти</button>
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById('navProfile').classList.add('active');
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('chugur_current');
            showLogin();
            document.getElementById('bottomNav').style.display = 'none';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function startApp() {
            document.getElementById('bottomNav').style.display = 'flex';
            showSearch();
            
            // Навигация
            document.getElementById('navSearch').onclick = () => showSearch();
            document.getElementById('navMessages').onclick = () => showMessages();
            document.getElementById('navProfile').onclick = () => showProfile();
            document.getElementById('logo').onclick = () => showSearch();
        }

        // ЗАПУСК
        loadData();
        const savedCurrent = localStorage.getItem('chugur_current');
        if (savedCurrent) {
            const parsed = JSON.parse(savedCurrent);
            currentUser = users.find(u => u.id === parsed.id);
            if (currentUser) {
                startApp();
            } else {
                showLogin();
            }
        } else {
            showLogin();
        }
    </script>
</body>
</html>
```
