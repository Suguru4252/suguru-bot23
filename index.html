<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Notes · Простой менеджер кода</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }
    .app {
      max-width: 1400px;
      width: 100%;
      display: flex;
      gap: 20px;
      background: #161b22;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      padding: 20px;
      border: 1px solid #30363d;
    }
    /* Левая панель */
    .sidebar {
      width: 280px;
      border-right: 1px solid #30363d;
      padding-right: 16px;
    }
    .sidebar h3 {
      font-size: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #c9d1d9;
      font-weight: 600;
    }
    .repo-list {
      list-style: none;
      padding: 0;
      margin: 0 0 16px 0;
      max-height: calc(100vh - 200px);
      overflow-y: auto;
    }
    .repo-item {
      padding: 10px 12px;
      margin-bottom: 4px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #c9d1d9;
      transition: background 0.15s;
      font-size: 14px;
    }
    .repo-item:hover {
      background: #21262d;
    }
    .repo-item.active {
      background: #1f6feb;
      color: white;
    }
    .repo-item i {
      opacity: 0.7;
      font-size: 14px;
    }
    .btn-new {
      width: 100%;
      padding: 8px 12px;
      background: #238636;
      color: white;
      border: 1px solid #2ea043;
      border-radius: 6px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-new:hover {
      background: #2ea043;
    }
    .footer-note {
      margin-top: 12px;
      font-size: 11px;
      color: #8b949e;
    }
    /* Правая панель */
    .main {
      flex: 1;
      min-width: 0;
    }
    .editor-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .repo-title-input {
      flex: 1;
      padding: 8px 12px;
      font-size: 16px;
      font-weight: 500;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #0d1117;
      color: #c9d1d9;
    }
    .repo-title-input:focus {
      outline: 2px solid #1f6feb;
      background: #161b22;
    }
    /* Переключатель */
    .mode-tabs {
      display: flex;
      gap: 4px;
      background: #21262d;
      padding: 3px;
      border-radius: 6px;
    }
    .mode-tab {
      padding: 6px 12px;
      border: none;
      background: transparent;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: #8b949e;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .mode-tab.active {
      background: #30363d;
      color: #c9d1d9;
    }
    /* Текстовое поле */
    textarea {
      width: 100%;
      height: 450px;
      padding: 16px;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #0d1117;
      color: #c9d1d9;
      resize: vertical;
      tab-size: 4;
    }
    textarea:focus {
      outline: 2px solid #1f6feb;
    }
    /* Превью */
    .preview-panel {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 12px;
    }
    .preview-header {
      padding: 8px 12px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-size: 12px;
      color: #8b949e;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .preview-frame {
      width: 100%;
      height: 450px;
      border: none;
      background: white;
    }
    /* Сп лит */
    .split-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .split-container textarea {
      height: 450px;
    }
    .split-container .preview-panel {
      margin-top: 0;
      height: 450px;
      display: flex;
      flex-direction: column;
    }
    .split-container .preview-frame {
      height: 100%;
    }
    .hidden {
      display: none !important;
    }
    /* Кнопки действий */
    .action-bar {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      justify-content: flex-end;
      flex-wrap: wrap;
      border-top: 1px solid #30363d;
      padding-top: 16px;
    }
    .btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #30363d;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      background: #21262d;
      color: #c9d1d9;
      transition: all 0.15s;
    }
    .btn:hover {
      background: #30363d;
      border-color: #8b949e;
    }
    .btn-primary {
      background: #238636;
      color: white;
      border-color: #2ea043;
    }
    .btn-primary:hover {
      background: #2ea043;
    }
    .btn-danger {
      background: #da3633;
      color: white;
      border-color: #f85149;
    }
    .btn-danger:hover {
      background: #b62324;
    }
    .btn-copy {
      background: #1f6feb;
      color: white;
      border-color: #388bfd;
    }
    .btn-copy:hover {
      background: #388bfd;
    }
    .empty-message {
      color: #8b949e;
      text-align: center;
      padding: 60px 20px;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="app">
  <div class="sidebar">
    <h3><i class="fab fa-github"></i> Мои репозитории</h3>
    <ul class="repo-list" id="repoList"></ul>
    <button class="btn-new" id="newRepoBtn"><i class="fas fa-plus"></i> Новый репозиторий</button>
    <div class="footer-note">
      <i class="far fa-hdd"></i> Локальное хранилище
    </div>
  </div>

  <div class="main" id="editorPanel">
    <div class="empty-message">
      <i class="far fa-folder-open" style="font-size: 40px; opacity: 0.3;"></i>
      <p style="margin-top: 16px;">Выберите репозиторий или создайте новый</p>
    </div>
  </div>
</div>

<script>
  (function(){
    const STORAGE_KEY = 'github_style_notes';
    let repos = [];

    // Загрузка
    function loadRepos() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try { repos = JSON.parse(stored); } catch(e){ repos = []; }
      }
      if (!repos.length) {
        repos.push({
          id: 'demo1',
          name: 'javascript-utils',
          code: `// Полезные функции JavaScript\n\nfunction debounce(fn, delay) {\n  let timer;\n  return (...args) => {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn(...args), delay);\n  };\n}\n\nfunction throttle(fn, limit) {\n  let inThrottle;\n  return (...args) => {\n    if (!inThrottle) {\n      fn(...args);\n      inThrottle = true;\n      setTimeout(() => inThrottle = false, limit);\n    }\n  };\n}`
        });
        repos.push({
          id: 'demo2',
          name: 'python-snippets',
          code: `# Примеры Python\n\ndef read_file_lines(filename):\n    """Чтение файла построчно"""\n    with open(filename, 'r', encoding='utf-8') as f:\n        return [line.strip() for line in f]\n\ndef fibonacci(n):\n    """Генератор чисел Фибоначчи"""\n    a, b = 0, 1\n    for _ in range(n):\n        yield a\n        a, b = b, a + b`
        });
        repos.push({
          id: 'demo3',
          name: 'landing-page',
          code: `<!DOCTYPE html>\n<html>\n<head>\n  <style>\n    body { \n      font-family: system-ui; \n      padding: 40px; \n      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n      color: white;\n      min-height: 100vh;\n    }\n    h1 { font-size: 48px; margin-bottom: 20px; }\n    p { font-size: 20px; opacity: 0.9; }\n  </style>\n</head>\n<body>\n  <h1>🚀 Привет, мир!</h1>\n  <p>Это предпросмотр твоего кода</p>\n</body>\n</html>`
        });
      }
    }

    function saveRepos() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(repos));
    }

    function generateId() {
      return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    const repoListEl = document.getElementById('repoList');
    const editorPanel = document.getElementById('editorPanel');
    const newRepoBtn = document.getElementById('newRepoBtn');

    let activeRepoId = null;
    let currentMode = 'code';
    let previewTimer = null;

    function renderSidebar() {
      if (!repos.length) {
        repoListEl.innerHTML = `<li style="padding:12px; color:#8b949e; list-style:none;">Нет репозиториев</li>`;
        return;
      }
      const itemsHtml = repos.map(repo => `
        <li class="repo-item ${activeRepoId === repo.id ? 'active' : ''}" data-id="${repo.id}">
          <i class="far fa-folder"></i>
          <span>${escapeHtml(repo.name)}</span>
        </li>
      `).join('');
      repoListEl.innerHTML = itemsHtml;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function downloadFile(filename, content) {
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function getFileName(name) {
      let filename = name.trim();
      if (!filename) filename = 'code';
      
      const exts = ['.js', '.py', '.html', '.css', '.java', '.cpp', '.c', '.go', '.rs', '.ts', '.txt'];
      const hasExt = exts.some(ext => filename.toLowerCase().endsWith(ext));
      
      if (hasExt) return filename;
      
      const code = getCurrentCode();
      if (code.includes('<!DOCTYPE') || code.includes('<html>')) return filename + '.html';
      if (code.includes('def ') || code.includes('import ')) return filename + '.py';
      if (code.includes('function ') || code.includes('const ')) return filename + '.js';
      
      return filename + '.txt';
    }

    function getCurrentCode() {
      const codeEditor = document.getElementById('codeEditor');
      return codeEditor ? codeEditor.value : '';
    }

    function updatePreview() {
      const codeEditor = document.getElementById('codeEditor');
      const previewFrame = document.getElementById('previewFrame');
      if (!codeEditor || !previewFrame) return;
      
      const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
      doc.open();
      doc.write(codeEditor.value);
      doc.close();
    }

    function debouncedUpdatePreview() {
      if (previewTimer) clearTimeout(previewTimer);
      previewTimer = setTimeout(() => updatePreview(), 300);
    }

    function renderEditor() {
      if (!activeRepoId) {
        editorPanel.innerHTML = `<div class="empty-message"><i class="far fa-folder-open" style="font-size: 40px; opacity: 0.3;"></i><p style="margin-top: 16px;">Выберите репозиторий или создайте новый</p></div>`;
        return;
      }

      const repo = repos.find(r => r.id === activeRepoId);
      if (!repo) {
        activeRepoId = null;
        renderSidebar();
        renderEditor();
        return;
      }

      let html = `
        <div class="editor-header">
          <input type="text" id="repoNameInput" class="repo-title-input" value="${escapeHtml(repo.name)}" placeholder="Название">
          <div class="mode-tabs">
            <button class="mode-tab ${currentMode === 'code' ? 'active' : ''}" data-mode="code"><i class="fas fa-code"></i> Код</button>
            <button class="mode-tab ${currentMode === 'split' ? 'active' : ''}" data-mode="split"><i class="fas fa-columns"></i> Сп лит</button>
            <button class="mode-tab ${currentMode === 'preview' ? 'active' : ''}" data-mode="preview"><i class="fas fa-eye"></i> Превью</button>
          </div>
        </div>
      `;

      if (currentMode === 'split') {
        html += `
          <div class="split-container">
            <div><textarea id="codeEditor" placeholder="// Ваш код...">${escapeHtml(repo.code)}</textarea></div>
            <div class="preview-panel">
              <div class="preview-header"><i class="fas fa-play"></i> Предпросмотр</div>
              <iframe id="previewFrame" class="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
            </div>
          </div>
        `;
      } else if (currentMode === 'preview') {
        html += `
          <div class="preview-panel" style="margin-top:0;">
            <div class="preview-header"><i class="fas fa-play"></i> Предпросмотр</div>
            <iframe id="previewFrame" style="height:500px;" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
          </div>
          <textarea id="codeEditor" class="hidden">${escapeHtml(repo.code)}</textarea>
        `;
      } else {
        html += `
          <textarea id="codeEditor" placeholder="// Ваш код...">${escapeHtml(repo.code)}</textarea>
          <div class="preview-panel hidden"><iframe id="previewFrame"></iframe></div>
        `;
      }

      html += `
        <div class="action-bar">
          <button class="btn btn-copy" id="copyBtn"><i class="far fa-copy"></i> Копировать</button>
          <button class="btn" id="downloadBtn"><i class="fas fa-download"></i> Скачать</button>
          <button class="btn btn-primary" id="saveBtn"><i class="far fa-save"></i> Сохранить</button>
          <button class="btn btn-danger" id="deleteBtn"><i class="far fa-trash-alt"></i> Удалить</button>
        </div>
      `;

      editorPanel.innerHTML = html;

      const nameInput = document.getElementById('repoNameInput');
      const codeEditor = document.getElementById('codeEditor');
      const previewFrame = document.getElementById('previewFrame');

      if (previewFrame) setTimeout(() => updatePreview(), 50);

      document.querySelectorAll('.mode-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          currentMode = tab.dataset.mode;
          renderEditor();
        });
      });

      if (codeEditor) {
        codeEditor.addEventListener('input', () => {
          if (previewFrame) debouncedUpdatePreview();
          repo.code = codeEditor.value;
          saveRepos();
        });
      }

      document.getElementById('saveBtn').addEventListener('click', () => {
        repo.name = nameInput.value.trim() || 'без названия';
        if (codeEditor) repo.code = codeEditor.value;
        saveRepos();
        renderSidebar();
        nameInput.style.background = '#1a3a2a';
        setTimeout(() => nameInput.style.background = '', 300);
      });

      document.getElementById('copyBtn').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(codeEditor ? codeEditor.value : repo.code);
          const btn = document.getElementById('copyBtn');
          btn.innerHTML = '<i class="fas fa-check"></i> Готово';
          setTimeout(() => btn.innerHTML = '<i class="far fa-copy"></i> Копировать', 1500);
        } catch (err) {
          alert('Ошибка копирования');
        }
      });

      document.getElementById('downloadBtn').addEventListener('click', () => {
        const filename = getFileName(nameInput.value);
        const content = codeEditor ? codeEditor.value : repo.code;
        downloadFile(filename, content);
        const btn = document.getElementById('downloadBtn');
        btn.innerHTML = '<i class="fas fa-check"></i> Скачан';
        setTimeout(() => btn.innerHTML = '<i class="fas fa-download"></i> Скачать', 1500);
      });

      document.getElementById('deleteBtn').addEventListener('click', () => {
        if (!confirm('Удалить репозиторий?')) return;
        repos = repos.filter(r => r.id !== activeRepoId);
        activeRepoId = null;
        currentMode = 'code';
        saveRepos();
        renderSidebar();
        renderEditor();
      });

      nameInput.addEventListener('blur', () => {
        repo.name = nameInput.value.trim() || 'без названия';
        saveRepos();
        renderSidebar();
      });
    }

    function handleRepoClick(e) {
      const item = e.target.closest('[data-id]');
      if (!item) return;
      const id = item.dataset.id;
      if (activeRepoId !== id) {
        activeRepoId = id;
        currentMode = 'code';
        renderSidebar();
        renderEditor();
      }
    }

    function createNewRepo() {
      const newRepo = {
        id: generateId(),
        name: 'новый-репозиторий',
        code: '// Ваш код'
      };
      repos.push(newRepo);
      activeRepoId = newRepo.id;
      currentMode = 'code';
      saveRepos();
      renderSidebar();
      renderEditor();
    }

    loadRepos();
    renderSidebar();
    renderEditor();

    repoListEl.addEventListener('click', handleRepoClick);
    newRepoBtn.addEventListener('click', createNewRepo);
  })();
</script>
</body>
</html>
