<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>President Simulator 2D - Градостроительный симулятор</title>
    <style>
        :root {
            --bg: #0a0a14;
            --panel: #1a1a2e;
            --accent: #f0c040;
            --gold: #e8c547;
            --text: #e8e8e8;
            --green: #5cdb7c;
            --red: #f05555;
            --blue: #5ba0e0;
            --border: #2e2e4e;
            --hover: #2a2a50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #060610;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            position: fixed;
        }

        #splash {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: radial-gradient(ellipse at 50% 30%, #1a1040 0%, #060610 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        #splash.hidden {
            display: none;
        }
        .splash-stars {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .splash-title {
            font-size: clamp(2em, 5vw, 3.2em);
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(180deg, #ffe08a, #c8943e, #8b5e14);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            filter: drop-shadow(0 4px 20px rgba(200,150,50,0.4));
            animation: titleGlow 2s ease-in-out infinite;
        }
        @keyframes titleGlow {
            0%,
            100% {
                filter: drop-shadow(0 4px 20px rgba(200,150,50,0.4));
            }
            50% {
                filter: drop-shadow(0 4px 35px rgba(240,200,80,0.7));
            }
        }
        .splash-subtitle {
            color: #b0a0c0;
            font-size: clamp(0.9em, 2vw, 1.1em);
            letter-spacing: 2px;
        }
        .splash-form {
            background: rgba(20,18,40,0.9);
            border: 1px solid #3a3050;
            border-radius: 20px;
            padding: clamp(20px, 4vw, 32px) clamp(24px, 5vw, 40px);
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: min(440px, 90vw);
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }
        .splash-form label {
            font-weight: 700;
            color: #d4b060;
            font-size: 0.95em;
            letter-spacing: 1px;
        }
        .splash-form input {
            background: #121025;
            border: 2px solid #3a3050;
            color: #fff;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 1.1em;
            transition: 0.3s;
            outline: none;
        }
        .splash-form input:focus {
            border-color: #e8c547;
            box-shadow: 0 0 25px rgba(232,197,71,0.25);
        }
        .btn-create {
            background: linear-gradient(180deg, #f0c040, #b8781a);
            border: none;
            color: #1a1020;
            font-weight: 800;
            font-size: 1.2em;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 1.5px;
            transition: 0.3s;
            margin-top: 8px;
            text-transform: uppercase;
        }
        .btn-create:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(240,192,64,0.45);
        }
        .splash-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-load {
            background: rgba(40,35,70,0.8);
            border: 1px solid #3a3050;
            color: #ccc;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: 0.9em;
        }
        .btn-load:hover {
            background: #3a3050;
            border-color: #c8943e;
        }

        #game-screen {
            display: none;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            position: relative;
            flex-direction: column;
        }
        #game-screen.active {
            display: flex;
        }

        #top-bar {
            z-index: 100;
            background: linear-gradient(180deg, rgba(18,15,35,0.97), rgba(14,12,28,0.95));
            backdrop-filter: blur(15px);
            border-bottom: 1px solid #2e2e4e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            min-height: 50px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .country-name-display {
            font-weight: 800;
            font-size: clamp(0.9em, 2.5vw, 1.25em);
            background: linear-gradient(180deg, #ffe08a, #c8943e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .resources {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .resource {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 700;
            font-size: clamp(0.7em, 1.8vw, 0.95em);
            white-space: nowrap;
        }
        .res-icon {
            font-size: 1.2em;
        }
        .res-money {
            color: #f0d060;
        }
        .res-pop {
            color: #6dc8e8;
        }
        .res-happy {
            color: #6ce89c;
        }
        .top-buttons {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .btn-top {
            background: rgba(40,35,70,0.8);
            border: 1px solid #3a3050;
            color: #ccc;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: clamp(0.7em, 1.5vw, 0.85em);
            white-space: nowrap;
        }
        .btn-top:hover,
        .btn-top.active {
            background: #3a3050;
            border-color: #c8943e;
        }
        .btn-top.active {
            color: #f0d060;
            border-color: #f0d060;
        }
        .version-badge {
            font-size: 0.7em;
            padding: 3px 8px;
            border-radius: 12px;
            background: #2a2050;
            color: #aab;
            font-weight: 600;
        }

        #game-canvas {
            flex: 1;
            cursor: grab;
            display: block;
            touch-action: none;
            min-height: 0;
        }
        #game-canvas.building {
            cursor: crosshair;
        }
        #game-canvas.grabbing {
            cursor: grabbing;
        }

        #bottom-panel {
            z-index: 100;
            background: rgba(16,14,30,0.96);
            backdrop-filter: blur(15px);
            border-top: 1px solid #2e2e4e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 10px;
            min-height: 55px;
            flex-wrap: wrap;
        }
        .bottom-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 8px 14px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.25s;
            border: 2px solid transparent;
            background: rgba(30,25,55,0.7);
            font-weight: 700;
            font-size: 0.75em;
            color: #ddd;
            min-width: 55px;
            text-align: center;
        }
        .bottom-btn:hover {
            background: rgba(50,40,80,0.9);
            border-color: #c8943e;
        }
        .bottom-btn.active {
            border-color: #f0d060 !important;
            background: rgba(200,160,50,0.25) !important;
            box-shadow: 0 0 20px rgba(240,208,96,0.3);
        }
        .bottom-btn.danger {
            border-color: #802020;
            color: #f08888;
        }
        .bottom-btn.danger:hover {
            background: rgba(120,30,30,0.5);
            border-color: #f04444;
        }
        .bottom-btn.danger.active {
            border-color: #f04444 !important;
            background: rgba(180,40,40,0.4) !important;
        }
        .bottom-btn-icon {
            font-size: 1.6em;
            line-height: 1;
        }
        .bottom-btn-label {
            font-size: 0.7em;
            letter-spacing: 0.5px;
        }

        #build-modal {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #build-modal.open {
            display: flex;
        }
        .modal-content {
            background: #1a1830;
            border: 1px solid #3a3050;
            border-radius: 20px;
            padding: 20px;
            max-width: 650px;
            width: 95vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
        }
        .modal-title {
            font-weight: 800;
            font-size: 1.2em;
            color: #f0d060;
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 8px;
        }
        .modal-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 10px 6px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            background: rgba(30,25,55,0.6);
            text-align: center;
        }
        .modal-item:hover {
            background: rgba(50,40,80,0.8);
            border-color: #c8943e;
            transform: translateY(-2px);
        }
        .modal-item.selected {
            border-color: #f0d060 !important;
            background: rgba(200,160,50,0.25) !important;
            box-shadow: 0 0 20px rgba(240,208,96,0.3);
        }
        .modal-item-emoji {
            font-size: 2em;
        }
        .modal-item-name {
            font-size: 0.75em;
            font-weight: 600;
            color: #ddd;
            line-height: 1.2;
        }
        .modal-item-cost {
            font-size: 0.7em;
            color: #f0d060;
            font-weight: 700;
        }
        .modal-close {
            display: block;
            margin: 16px auto 0;
            background: #3a3050;
            border: none;
            color: #fff;
            padding: 10px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9em;
            transition: 0.3s;
        }
        .modal-close:hover {
            background: #5a4070;
        }

        .size-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        .size-btn {
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #3a3050;
            background: rgba(30,25,55,0.6);
            color: #ccc;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.78em;
            transition: 0.2s;
            white-space: nowrap;
        }
        .size-btn:hover {
            border-color: #c8943e;
            background: rgba(50,40,80,0.8);
        }
        .size-btn.selected {
            border-color: #f0d060 !important;
            background: rgba(200,160,50,0.3) !important;
            color: #f0d060;
        }
        .size-label {
            text-align: center;
            color: #aaa;
            font-size: 0.85em;
            margin-top: 4px;
            font-weight: 600;
        }

        #info-popup {
            position: absolute;
            pointer-events: none;
            z-index: 150;
            background: rgba(15,12,35,0.97);
            border: 2px solid #5a5080;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 0.9em;
            display: none;
            white-space: nowrap;
            box-shadow: 0 10px 35px rgba(0,0,0,0.8);
            line-height: 1.7;
            color: #f0f0f0;
        }
        #info-popup .pop-title {
            font-weight: 800;
            color: #ffd700;
            font-size: 1.1em;
            display: block;
            margin-bottom: 4px;
        }
        #info-popup .pop-stat {
            color: #d0d0d0;
        }
        #info-popup .pop-income {
            color: #f0d060;
            font-weight: 700;
        }
        #info-popup .pop-happy {
            color: #6ce89c;
            font-weight: 700;
        }
        #info-popup .pop-population {
            color: #6dc8e8;
            font-weight: 700;
        }

        #message-log {
            position: absolute;
            top: 60px;
            right: 10px;
            z-index: 110;
            display: flex;
            flex-direction: column;
            gap: 4px;
            pointer-events: none;
            max-width: 280px;
        }
        .log-msg {
            background: rgba(0,0,0,0.9);
            border-left: 3px solid #f0c040;
            padding: 7px 12px;
            border-radius: 6px;
            font-size: 0.8em;
            animation: fadeInOut 3.5s forwards;
            font-weight: 500;
            word-break: break-word;
            color: #e0e0e0;
        }
        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translateX(20px);
            }
            12% {
                opacity: 1;
                transform: translateX(0);
            }
            75% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateX(20px);
            }
        }

        @media (max-width: 768px) {
            #top-bar {
                padding: 4px 6px;
                min-height: 40px;
                gap: 3px;
            }
            .resources {
                gap: 5px;
            }
            .resource {
                font-size: 0.6em;
                gap: 2px;
            }
            .res-icon {
                font-size: 1em;
            }
            .btn-top {
                padding: 4px 6px;
                font-size: 0.6em;
            }
            #bottom-panel {
                gap: 4px;
                padding: 5px 6px;
                min-height: 48px;
            }
            .bottom-btn {
                padding: 5px 8px;
                min-width: 42px;
                font-size: 0.65em;
            }
            .bottom-btn-icon {
                font-size: 1.3em;
            }
            .bottom-btn-label {
                font-size: 0.6em;
            }
            #message-log {
                top: 45px;
                right: 4px;
                max-width: 180px;
            }
            .log-msg {
                font-size: 0.65em;
                padding: 4px 7px;
            }
            #info-popup {
                font-size: 0.7em;
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>

    <div id="splash">
        <canvas class="splash-stars" id="splash-stars"></canvas>
        <div class="splash-title">🏛️ PRESIDENT<br>SIMULATOR</div>
        <div class="splash-subtitle">Постройте страну своей мечты</div>
        <div class="splash-form">
            <label for="country-name">📜 Название государства</label>
            <input type="text" id="country-name" placeholder="Введите название..." maxlength="28" value="Великоречье">
            <button class="btn-create" onclick="startGame()">🌟 ОСНОВАТЬ ГОСУДАРСТВО</button>
            <div class="splash-buttons">
                <button class="btn-load" onclick="loadGame()">💾 Загрузить сохранение</button>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <div id="top-bar">
            <div class="country-name-display" id="display-country-name">🏛️ Великоречье</div>
            <div class="resources">
                <div class="resource"><span class="res-icon">💰</span> <span class="res-money"
