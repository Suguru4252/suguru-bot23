<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💪 СИМУЛЯТОР КАЧКА · ЭПИЧНАЯ ВЕРСИЯ</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #0a0f1a 0%, #1a1f2e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      padding: 16px;
    }

    .game-wrapper {
      max-width: 900px;
      width: 100%;
    }

    .game-panel {
      background: linear-gradient(135deg, #1e2433 0%, #151a26 100%);
      border-radius: 32px;
      padding: 24px;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.7), inset 0 0 0 2px rgba(255, 215, 100, 0.15);
      border-bottom: 6px solid #ffaa00;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 24px;
      background: radial-gradient(circle at 30% 20%, #2a3a4a, #0e1620);
      box-shadow: inset 0 8px 16px rgba(0,0,0,0.7), 0 12px 24px rgba(0,0,0,0.5);
      border: 2px solid #4a6070;
      cursor: pointer;
      transition: filter 0.1s;
    }
    canvas:active {
      filter: brightness(1.1);
    }

    /* СТАТИСТИКА */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin: 18px 0 14px;
    }

    .stat-card {
      background: #10161f;
      border-radius: 20px;
      padding: 14px 10px;
      box-shadow: inset 0 3px 6px #000000, 0 6px 0 #0a0e14;
      border-bottom: 2px solid #c9a227;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-label {
      color: #9bb7d4;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 38px;
      font-weight: 900;
      color: #ffd966;
      text-shadow: 0 4px 0 #7a5c00;
      line-height: 1;
    }

    /* ПРОГРЕСС БАР */
    .progress-section {
      background: #0d141f;
      border-radius: 30px;
      padding: 12px 18px;
      margin: 8px 0;
    }

    .level-row {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .level-badge {
      background: #d4af37;
      color: #0a0f1a;
      font-weight: 900;
      font-size: 20px;
      padding: 6px 18px;
      border-radius: 40px;
      box-shadow: 0 4px 0 #7a5f1a;
    }

    .xp-bar-container {
      flex: 1;
      height: 22px;
      background: #1b2533;
      border-radius: 30px;
      box-shadow: inset 0 3px 6px black;
      overflow: hidden;
    }

    .xp-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6fcf97, #3acf7a);
      box-shadow: 0 0 10px #3acf7a;
      border-radius: 30px;
      transition: width 0.15s;
    }

    .xp-text {
      min-width: 70px;
      color: #b1e6e0;
      font-weight: bold;
      font-size: 18px;
    }

    /* МАГАЗИН И КНОПКИ */
    .shop-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
      align-items: center;
      justify-content: space-between;
    }

    .powerups {
      display: flex;
      gap: 8px;
    }

    .btn {
      background: #2a3345;
      border: none;
      color: white;
      font-weight: bold;
      padding: 12px 20px;
      border-radius: 40px;
      box-shadow: 0 6px 0 #151e28, 0 2px 8px black;
      cursor: pointer;
      transition: 0.06s;
      font-size: 16px;
      border-bottom: 2px solid #b88a2e;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-gold {
      background: #c9a227;
      color: #0f1a1f;
      box-shadow: 0 6px 0 #7a5f1a;
      border-bottom: 2px solid #ffdd88;
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #151e28, 0 2px 8px black;
    }

    .btn:disabled {
      opacity: 0.5;
      transform: none;
      box-shadow: 0 4px 0 #151e28;
      pointer-events: none;
    }

    .reset-btn {
      background: #4e3535;
      box-shadow: 0 6px 0 #2e2020;
    }

    .coins-display {
      background: #1e2a1e;
      padding: 8px 18px;
      border-radius: 30px;
      color: #ffd966;
      font-weight: bold;
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="game-panel">
    <!-- ХОЛСТ -->
    <canvas id="gameCanvas" width="800" height="550"></canvas>

    <!-- СТАТЫ -->
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-label">💪 СИЛА</span>
        <span class="stat-value" id="strengthDisplay">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">🏋️ ВЕС</span>
        <span class="stat-value" id="weightDisplay">5.0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">💰 МОНЕТЫ</span>
        <span class="stat-value" id="coinsDisplay">0</span>
      </div>
    </div>

    <!-- УРОВЕНЬ + XP -->
    <div class="progress-section">
      <div class="level-row">
        <div class="level-badge" id="levelDisplay">УР. 1</div>
        <div class="xp-bar-container">
          <div class="xp-bar-fill" id="xpBarFill" style="width:0%"></div>
        </div>
        <div class="xp-text" id="xpText">0/100 XP</div>
      </div>
    </div>

    <!-- МАГАЗИН И УПРАВЛЕНИЕ -->
    <div class="shop-panel">
      <div class="powerups">
        <button class="btn" id="buyAutoClicker" title="Авто-кач: +1 сила/сек">🤖 АВТО-КАЧ (50💰)</button>
        <button class="btn btn-gold" id="buyMultiplier" title="x2 силы за клик">✨ x2 КЛИК (150💰)</button>
      </div>
      <div style="display: flex; gap: 8px;">
        <div class="coins-display">
          <span>🪙</span> <span id="coinBalance">0</span>
        </div>
        <button class="btn reset-btn" id="resetButton">🔄 СБРОС</button>
      </div>
    </div>
    <div style="color:#aabacb; margin-top: 12px; text-align: center; font-weight: 500;">
      ⚡ ЖМИ НА ГАНТЕЛИ · КАЧАЙСЯ · ПОКУПАЙ УЛУЧШЕНИЯ ⚡
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // UI элементы
    const strengthDisplay = document.getElementById('strengthDisplay');
    const weightDisplay = document.getElementById('weightDisplay');
    const coinsDisplay = document.getElementById('coinsDisplay');
    const coinBalance = document.getElementById('coinBalance');
    const levelDisplay = document.getElementById('levelDisplay');
    const xpBarFill = document.getElementById('xpBarFill');
    const xpText = document.getElementById('xpText');

    // Кнопки
    const resetBtn = document.getElementById('resetButton');
    const buyAutoClicker = document.getElementById('buyAutoClicker');
    const buyMultiplier = document.getElementById('buyMultiplier');

    // ---------- СОСТОЯНИЕ ИГРЫ ----------
    let strength = 0;               // сила
    let coins = 0;                 // монеты
    let level = 1;                 // уровень
    let currentXP = 0;             // опыт
    let xpToNextLevel = 100;       // нужно опыта
    
    // Множители и улучшения
    let clickMultiplier = 1;        // множитель клика
    let autoClickerActive = false;
    let autoClickerInterval = null;
    
    // Визуальные эффекты
    let clickEffect = 0;
    let lastClickTime = 0;
    let floatingTexts = [];         // всплывающий урон/сила
    
    // ----- ВЫЧИСЛЕНИЕ ВЕСА ГАНТЕЛИ -----
    function calculateWeight() {
      return 5 + Math.floor(strength / 6) + (strength * 0.2);
    }

    function getDumbbellWeight() {
      return Math.round((5 + Math.floor(strength / 6) + strength * 0.2) * 10) / 10;
    }

    // ----- СИСТЕМА УРОВНЕЙ -----
    function addXP(amount) {
      currentXP += amount;
      while (currentXP >= xpToNextLevel) {
        currentXP -= xpToNextLevel;
        level++;
        xpToNextLevel = Math.floor(xpToNextLevel * 1.5);
        // бонус за уровень
        coins += 25 * level;
        strength += 2;
      }
      updateLevelUI();
    }

    function updateLevelUI() {
      levelDisplay.textContent = `УР. ${level}`;
      const percent = (currentXP / xpToNextLevel) * 100;
      xpBarFill.style.width = percent + '%';
      xpText.textContent = `${currentXP}/${xpToNextLevel} XP`;
    }

    // ----- ОБНОВЛЕНИЕ UI -----
    function refreshUI() {
      strengthDisplay.textContent = Math.floor(strength);
      const w = getDumbbellWeight();
      weightDisplay.textContent = w.toFixed(1);
      coinsDisplay.textContent = coins;
      coinBalance.textContent = coins;
      
      // блокировка кнопок если не хватает денег
      buyAutoClicker.disabled = (coins < 50 || autoClickerActive);
      buyMultiplier.disabled = (coins < 150 || clickMultiplier >= 2);
    }

    // ----- ДОБАВЛЕНИЕ СИЛЫ (ОСНОВНОЕ) -----
    function addStrength(baseAmount) {
      const totalGain = baseAmount * clickMultiplier;
      strength += totalGain;
      
      // опыт = сила
      addXP(totalGain);
      
      // монеты (1 сила = 1 монета базово + бонус)
      coins += Math.floor(totalGain * 1.2) + 1;
      
      // всплывающий текст
      floatingTexts.push({
        x: 350 + (Math.random()-0.5)*100,
        y: 270,
        value: `+${totalGain.toFixed(1)}💪`,
        life: 1.0
      });
      
      refreshUI();
      drawCanvas();
    }

    // ----- ОБРАБОТКА КЛИКА -----
    function handleClick(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const mouseX = (e.clientX - rect.left) * scaleX;
      const mouseY = (e.clientY - rect.top) * scaleY;
      
      // анимация
      clickEffect = 1.0;
      lastClickTime = performance.now();
      
      addStrength(1);  // база 1 * множитель
      
      // вибрация при клике (если поддерживается)
      if (navigator.vibrate) navigator.vibrate(10);
      
      e.preventDefault();
    }

    // ----- АВТОКЛИКЕР -----
    function startAutoClicker() {
      if (autoClickerActive) return;
      autoClickerActive = true;
      autoClickerInterval = setInterval(() => {
        addStrength(1);
        clickEffect = 0.5;
        lastClickTime = performance.now();
      }, 1000);
      refreshUI();
    }

    // ----- ПОКУПКИ -----
    function purchaseAutoClicker() {
      if (coins < 50 || autoClickerActive) return;
      coins -= 50;
      startAutoClicker();
      refreshUI();
    }

    function purchaseMultiplier() {
      if (coins < 150 || clickMultiplier >= 2) return;
      coins -= 150;
      clickMultiplier = 2;
      refreshUI();
    }

    // ----- СБРОС -----
    function fullReset() {
      strength = 0;
      coins = 0;
      level = 1;
      currentXP = 0;
      xpToNextLevel = 100;
      clickMultiplier = 1;
      
      if (autoClickerInterval) {
        clearInterval(autoClickerInterval);
        autoClickerInterval = null;
      }
      autoClickerActive = false;
      
      floatingTexts = [];
      refreshUI();
      updateLevelUI();
      drawCanvas();
    }

    // ----- ОТРИСОВКА (УЛУЧШЕННАЯ ГРАФИКА) -----
    function drawCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // ---- ПАРАМЕТРЫ ПЕРСОНАЖА (ГИГАНТСКИЙ РОСТ) ----
      const scale = 1 + strength * 0.04;
      const bodyW = 70 * scale;
      const bodyH = 95 * scale;
      const headSize = 48 * (1 + strength * 0.018);
      
      const centerX = 400;
      const groundY = 460;
      const bodyY = groundY - bodyH * 0.55;
      
      // ---- ФОН (ТРЕНАЖЁРНЫЙ ЗАЛ 2.0) ----
      // Градиентное небо/стена
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, '#182430');
      grad.addColorStop(1, '#0a111a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Пол с текстурой
      ctx.fillStyle = '#3b2e24';
      ctx.beginPath();
      ctx.rect(0, groundY-10, canvas.width, 120);
      ctx.fill();
      for (let i=0; i<canvas.width; i+=40) {
        ctx.fillStyle = '#5e4a38';
        ctx.fillRect(i+5, groundY-2, 20, 10);
      }
      
      // Стойки с блинами
      ctx.fillStyle = '#5a5f6e';
      ctx.shadowColor = '#00000070';
      ctx.shadowBlur = 12;
      ctx.fillRect(60, groundY-90, 30, 90);
      ctx.fillRect(710, groundY-90, 30, 90);
      ctx.fillStyle = '#3d4452';
      for (let i=0;i<5;i++) {
        ctx.beginPath();
        ctx.ellipse(75, groundY-70 + i*15, 20, 8, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(725, groundY-70 + i*15, 20, 8, 0, 0, Math.PI*2);
        ctx.fill();
      }
      
      // Постеры
      ctx.shadowBlur = 0;
      ctx.font = 'bold 28px "Segoe UI"';
      ctx.fillStyle = '#eab308';
      ctx.fillText('💀 IRON LEGACY', 240, 70);
      
      // ---- АНИМАЦИЯ ПОДЪЕМА ----
      let liftOffset = 0;
      if (clickEffect > 0) {
        const elapsed = performance.now() - lastClickTime;
        clickEffect = Math.max(0, 1 - elapsed / 220);
        liftOffset = -18 * Math.sin(clickEffect * Math.PI);
      }
      
      // ---- ПЕРСОНАЖ (МОНСТР) ----
      // Тень
      ctx.fillStyle = '#151010cc';
      ctx.beginPath();
      ctx.ellipse(centerX, groundY+8, bodyW*0.8, 18, 0, 0, Math.PI*2);
      ctx.fill();
      
      // Ноги
      ctx.fillStyle = '#1e3a5f';
      ctx.shadowBlur = 10;
      ctx.fillRect(centerX - bodyW*0.35, bodyY+bodyH*0.55, bodyW*0.28, bodyH*0.55);
      ctx.fillRect(centerX + bodyW*0.1, bodyY+bodyH*0.55, bodyW*0.28, bodyH*0.55);
      ctx.fillStyle = '#2f1e14';
      ctx.fillRect(centerX - bodyW*0.38, groundY-8, bodyW*0.34, 16);
      ctx.fillRect(centerX + bodyW*0.07, groundY-8, bodyW*0.34, 16);
      
      // Торс (градиент)
      const torsoGrad = ctx.createRadialGradient(centerX-10, bodyY+20, 10, centerX, bodyY+40, bodyW);
      torsoGrad.addColorStop(0, '#d64040');
      torsoGrad.addColorStop(1, '#8b1a1a');
      ctx.fillStyle = torsoGrad;
      ctx.beginPath();
      ctx.ellipse(centerX, bodyY+bodyH/2.5, bodyW/1.8, bodyH/2.1, 0, 0, Math.PI*2);
      ctx.fill();
      
      // Мышцы
      ctx.fillStyle = '#e0a87c';
      ctx.shadowBlur = 8;
      for (let i=0;i<4;i++) {
        ctx.fillRect(centerX-22, bodyY+25 + i*16, 44, 9);
      }
      
      // Голова
      ctx.fillStyle = '#f0cfb0';
      ctx.beginPath();
      ctx.ellipse(centerX, bodyY-headSize*0.25, headSize/1.5, headSize/1.7, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#b07040';
      ctx.beginPath();
      ctx.ellipse(centerX, bodyY-headSize*0.45, headSize/1.9, headSize/3.5, 0, 0, Math.PI*2);
      ctx.fill();
      
      // Очки/выражение
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(centerX-14, bodyY-headSize*0.2, 5, 0, 2*Math.PI);
      ctx.arc(centerX+14, bodyY-headSize*0.2, 5, 0, 2*Math.PI);
      ctx.fill();
      ctx.fillStyle = '#f5f9ff';
      ctx.beginPath();
      ctx.arc(centerX-16, bodyY-headSize*0.23, 2.5, 0, 2*Math.PI);
      ctx.arc(centerX+12, bodyY-headSize*0.23, 2.5, 0, 2*Math.PI);
      ctx.fill();
      
      // Руки + гантели
      const leftShoulder = {x: centerX - bodyW*0.5, y: bodyY + bodyH*0.25};
      const rightShoulder = {x: centerX + bodyW*0.5, y: bodyY + bodyH*0.25};
      const armLen = 45 + strength * 0.7;
      const armAngle = 0.5 + liftOffset * 0.02;
      
      // Левая
      ctx.save();
      ctx.translate(leftShoulder.x, leftShoulder.y);
      ctx.rotate(-armAngle);
      ctx.fillStyle = '#f0cfb0';
      ctx.fillRect(-8, -8, armLen, 20);
      ctx.restore();
      
      ctx.save();
      ctx.translate(rightShoulder.x, rightShoulder.y);
      ctx.rotate(armAngle);
      ctx.fillStyle = '#f0cfb0';
      ctx.fillRect(-8, -8, armLen, 20);
      ctx.restore();
      
      const dbWeight = getDumbbellWeight();
      const dbSize = 22 + dbWeight * 1.1;
      
      // Гантели
      ctx.shadowBlur = 15;
      [[leftShoulder, -armAngle], [rightShoulder, armAngle]].forEach(([sh, ang]) => {
        const gripX = sh.x + Math.cos(ang) * (armLen+8);
        const gripY = sh.y + Math.sin(ang) * (armLen+8);
        ctx.fillStyle = '#3a4755';
        ctx.beginPath();
        ctx.ellipse(gripX, gripY, dbSize, dbSize*0.9, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#6f8a9e';
        ctx.beginPath();
        ctx.ellipse(gripX-2, gripY-3, dbSize*0.65, dbSize*0.6, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#ffd966';
        ctx.font = 'bold 16px "Segoe UI"';
        ctx.fillText(dbWeight.toFixed(1)+'kg', gripX-30, gripY-30);
      });
      
      // Всплывающий текст
      ctx.shadowBlur = 0;
      floatingTexts = floatingTexts.filter(t => {
        t.life -= 0.02;
        t.y -= 1.2;
        ctx.font = 'bold 22px "Segoe UI"';
        ctx.fillStyle = `rgba(255, 215, 0, ${t.life})`;
        ctx.fillText(t.value, t.x, t.y);
        return t.life > 0;
      });
      
      // Аура при высоком уровне
      if (strength > 70) {
        ctx.beginPath();
        ctx.arc(centerX, bodyY, bodyW*1.2, 0, Math.PI*2);
        ctx.fillStyle = '#f5e56b30';
        ctx.fill();
      }
      
      requestAnimationFrame(() => { if (clickEffect > 0 || floatingTexts.length) drawCanvas(); });
    }

    // ----- ПРИВЯЗКА СОБЫТИЙ -----
    canvas.addEventListener('click', handleClick);
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleClick(e.touches[0]);
    }, {passive: false});
    
    resetBtn.addEventListener('click', fullReset);
    buyAutoClicker.addEventListener('click', purchaseAutoClicker);
    buyMultiplier.addEventListener('click', purchaseMultiplier);
    
    // Инициализация
    refreshUI();
    updateLevelUI();
    drawCanvas();
  })();
</script>
</body>
  </html>
