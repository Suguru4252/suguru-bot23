<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🥚 СУСЛОВ: На Корм</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a3a2e 0%, #2d5a4a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            padding: 16px;
        }
        .game-container {
            max-width: 500px;
            width: 100%;
            background: #efe6d5;
            background-image: radial-gradient(circle at 20% 30%, #fff6e8, #e7d8be);
            border-radius: 64px 64px 48px 48px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5), inset 0 1px 8px rgba(255,255,240,0.8);
            padding: 28px 24px 36px;
            border: 4px solid #b49a7b;
            text-align: center;
            transition: 0.2s;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #3d2a1b;
            text-shadow: 4px 4px 0 #c9aa7b, 6px 6px 0 rgba(0,0,0,0.1);
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        h1 span {
            font-size: 2.2rem;
        }
        .suslov-area {
            background: #b18b62;
            background: linear-gradient(135deg, #ccb094, #a5835e);
            border-radius: 120px 120px 60px 60px;
            padding: 25px 10px 15px;
            margin: 10px 0 20px;
            border: 6px solid #5e3e28;
            box-shadow: inset 0 -10px 0 #3f2c1c, inset 0 8px 10px #fbe9c3, 0 12px 0 #3f2c1c;
        }
        .suslov-emoji {
            font-size: 140px;
            line-height: 1;
            filter: drop-shadow(8px 16px 6px rgba(0,0,0,0.2));
            transition: transform 0.1s ease;
            margin-bottom: 5px;
        }
        .belly-bar-container {
            background: #2c1e12;
            padding: 8px 12px;
            border-radius: 60px;
            border: 3px solid #b49a7b;
            box-shadow: inset 0 4px 6px #0f0a06, 0 6px 0 #3f2c1c;
            margin: 10px 5px 5px;
        }
        .belly-label {
            display: flex;
            justify-content: space-between;
            color: #ffecb3;
            font-weight: bold;
            text-shadow: 2px 2px 0 #1f140c;
            padding: 0 8px 4px;
            font-size: 1.1rem;
        }
        .belly-bar-bg {
            height: 30px;
            background: #1e130c;
            border-radius: 40px;
            border: 2px solid #6b4f37;
            overflow: hidden;
            box-shadow: inset 0 3px 6px black;
        }
        .belly-fill {
            width: 0%;
            height: 100%;
            background: #f5ac78;
            background: linear-gradient(90deg, #fcb045, #fd7e14, #ff512f);
            box-shadow: 0 0 12px #ffb347;
            border-radius: 40px;
            transition: width 0.25s cubic-bezier(.2,.9,.4,1);
            border-right: 2px solid #ffd6a0;
        }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: #251e16d9;
            backdrop-filter: blur(3px);
            padding: 16px 20px;
            border-radius: 60px;
            margin: 18px 0 22px;
            color: #f7e7cf;
            border: 2px solid #ab8e6f;
            box-shadow: inset 0 0 0 2px #51412e, 0 8px 0 #2b1e13;
            font-weight: bold;
        }
        .money-block, .food-block {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            background: #0c0907;
            padding: 6px 22px;
            border-radius: 50px;
            box-shadow: inset 0 2px 5px black, 0 3px 0 #4d3926;
            color: #ffd966;
        }
        .money-block span, .food-block span {
            font-size: 1rem;
            color: #c0a175;
            margin-right: 4px;
        }
        .shop {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 8px;
        }
        .food-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #dccdb6;
            padding: 8px 18px 8px 25px;
            border-radius: 100px;
            border: 3px solid #6e543c;
            box-shadow: inset 0 1px 6px #fff3df, 0 6px 0 #5a4530;
            font-weight: bold;
        }
        .food-info {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 1.5rem;
        }
        .food-desc {
            font-size: 1.2rem;
            color: #302010;
        }
        .food-desc small {
            font-size: 0.9rem;
            color: #5b3f28;
            font-weight: normal;
        }
        button {
            background: #f3d37c;
            border: none;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 5px 0 #a05f2c, 0 2px 10px rgba(0,0,0,0.2);
            border: 2px solid #ffeab0;
            color: #2c1c0c;
            cursor: pointer;
            transition: all 0.04s linear;
            letter-spacing: 0.5px;
            min-width: 120px;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #7b451b, 0 2px 8px black;
        }
        button:disabled {
            opacity: 0.5;
            filter: grayscale(0.5);
            transform: none;
            box-shadow: 0 5px 0 #7b451b;
            pointer-events: none;
        }
        .reset-area {
            margin-top: 28px;
        }
        #resetBtn {
            background: #7c9a7a;
            box-shadow: 0 5px 0 #3f5a3a, 0 2px 8px black;
            border-color: #bcd0b0;
            color: #0f1f0a;
            font-size: 1.4rem;
            padding: 14px 30px;
        }
        .gameover-message {
            margin: 20px 0 10px;
            font-size: 1.8rem;
            font-weight: 900;
            color: #ad1f1f;
            text-shadow: 2px 2px 0 #ffc857;
            letter-spacing: 2px;
        }
        .footer-note {
            color: #594d3c;
            margin-top: 20px;
            font-style: italic;
            font-weight: 500;
        }
        .pop-effect {
            animation: shake 0.3s ease-in-out;
        }
        @keyframes shake {
            0%,100%{ transform: rotate(0deg); }
            25%{ transform: rotate(4deg) scale(1.02); }
            75%{ transform: rotate(-4deg) scale(0.98); }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <h1>
        <span>🐹</span> СУСЛОВ <span>🐹</span>
    </h1>
    <!-- Зона Суслова -->
    <div class="suslov-area">
        <div class="suslov-emoji" id="suslovEmoji">🐭</div>
        <div class="belly-bar-container">
            <div class="belly-label">
                <span>🍖 СЫТОСТЬ</span>
                <span id="bellyPercent">0%</span>
            </div>
            <div class="belly-bar-bg">
                <div class="belly-fill" id="bellyFill" style="width:0%"></div>
            </div>
        </div>
    </div>

    <!-- Статистика -->
    <div class="stats-panel">
        <div class="money-block">
            <span>🪙</span> <span id="moneyValue">20</span>
        </div>
        <div class="food-block">
            <span>🍱</span> <span id="foodCount">0</span>
        </div>
    </div>

    <!-- Магазин еды -->
    <div class="shop">
        <div class="food-row">
            <div class="food-info">
                <span>🥕</span>
                <span class="food-desc">Морковка <small>+6%</small></span>
            </div>
            <button id="buyCarrot">5🪙</button>
        </div>
        <div class="food-row">
            <div class="food-info">
                <span>🍔</span>
                <span class="food-desc">Бургер <small>+18%</small></span>
            </div>
            <button id="buyBurger">14🪙</button>
        </div>
        <div class="food-row">
            <div class="food-info">
                <span>🎂</span>
                <span class="food-desc">Торт <small>+35%</small></span>
            </div>
            <button id="buyCake">30🪙</button>
        </div>
    </div>

    <!-- Кнопка КОРМИТЬ -->
    <button id="feedBtn" style="background:#f5b342; font-size:2rem; padding:16px; margin: 10px 0 0;">🍽️ КОРМИТЬ</button>

    <!-- Сообщение о финале и рестарт -->
    <div id="gameOverMessage" class="gameover-message"></div>
    <div class="reset-area">
        <button id="resetBtn">🔄 ЗАНОВО (Престиж)</button>
    </div>
    <div class="footer-note">купи еду → корми → лопни живот → пройди игру</div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- СОСТОЯНИЕ ----------
        let money = 20;                // начальные деньги
        let foodItems = 0;            // купленная еда (штук)
        let belly = 0;               // 0..100 (%)
        let gameFinished = false;     // true если лопнул

        // DOM элементы
        const moneySpan = document.getElementById('moneyValue');
        const foodSpan = document.getElementById('foodCount');
        const bellyFill = document.getElementById('bellyFill');
        const bellyPercent = document.getElementById('bellyPercent');
        const suslovEmoji = document.getElementById('suslovEmoji');
        const gameOverMsg = document.getElementById('gameOverMessage');
        const feedBtn = document.getElementById('feedBtn');
        const buyCarrot = document.getElementById('buyCarrot');
        const buyBurger = document.getElementById('buyBurger');
        const buyCake = document.getElementById('buyCake');
        const resetBtn = document.getElementById('resetBtn');
        const container = document.getElementById('gameContainer');

        // Еда: { цена, прирост сытости (%) }
        const FOOD_DATA = {
            carrot: { price: 5,  gain: 6 },
            burger: { price: 14, gain: 18 },
            cake:   { price: 30, gain: 35 }
        };

        // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
        function updateUI() {
            // обновить текст денег и еды
            moneySpan.textContent = money;
            foodSpan.textContent = foodItems;

            // процент сытости
            const bellyValue = Math.min(belly, 100);
            const percent = Math.floor(bellyValue);
            bellyFill.style.width = percent + '%';
            bellyPercent.textContent = percent + '%';

            // Эмодзи меняется в зависимости от сытости
            if (gameFinished) {
                suslovEmoji.textContent = '💥🐽';   // лопнул
            } else {
                if (belly >= 95) suslovEmoji.textContent = '🐡'; // почти лопнет
                else if (belly >= 70) suslovEmoji.textContent = '🐹🤰';
                else if (belly >= 35) suslovEmoji.textContent = '🐭🍔';
                else suslovEmoji.textContent = '🐭';
            }

            // блокировка кнопок если игра завершена
            const btns = [feedBtn, buyCarrot, buyBurger, buyCake];
            btns.forEach(btn => { btn.disabled = gameFinished; });

            // если лопнул — показываем сообщение
            if (gameFinished) {
                gameOverMsg.innerHTML = '💥 ЖИВОТ ЛОПНУЛ! ИГРА ПРОЙДЕНА! 💥';
            } else {
                gameOverMsg.innerHTML = '';
            }

            // особый случай: нельзя купить если денег не хватает (но это проверяется в обработчиках)
        }

        // Проверка на "предел" — лопание
        function checkBellyLimit() {
            if (belly >= 100 && !gameFinished) {
                // ЛОПНУЛ!
                gameFinished = true;
                // фиксируем 100%
                belly = 100;
                
                // добавляем эффект тряски
                container.classList.add('pop-effect');
                setTimeout(() => container.classList.remove('pop-effect'), 400);
                
                updateUI();
                // дополнительно меняем смайл
                suslovEmoji.textContent = '💥🐽';
                gameOverMsg.innerHTML = '💥 ЖИВОТ ЛОПНУЛ! ИГРА ПРОЙДЕНА! 💥';
            } else {
                updateUI();
            }
        }

        // ПОКУПКА ЕДЫ
        function buyFood(type) {
            if (gameFinished) return false;
            const data = FOOD_DATA[type];
            if (!data) return false;
            if (money < data.price) {
                // эффект "не хватает денег" (быстрое мигание)
                moneySpan.style.transition = '0.1s';
                moneySpan.style.color = '#ff8989';
                setTimeout(() => moneySpan.style.color = '#ffd966', 150);
                return false;
            }

            money -= data.price;
            foodItems += 1;
            updateUI();
            return true;
        }

        // КОРМЛЕНИЕ (использовать 1 еду)
        function feedSuslov() {
            if (gameFinished) {
                return;
            }
            if (foodItems <= 0) {
                // нет еды — подсветка
                foodSpan.style.color = '#ffa098';
                setTimeout(() => foodSpan.style.color = '#ffd966', 200);
                return;
            }
            if (belly >= 100) {
                checkBellyLimit(); // на всякий случай
                return;
            }

            // Кушаем: уменьшаем еду, прибавляем сытость (в среднем, но можно сделать разную логику? 
            // Но по механике: у нас нет привязки еды к типу, так как мы храним просто количество.
            // В классической "суслов" механике: каждая единица еды даёт фиксированный прирост, 
            // но у нас магазин с разной едой. Упростим: одна еда = +10%? 
            // Но игрок ожидает что купленная еда различается. 
            // Сделаем хитрее: храним не только кол-во, но и «силу» последней купленной? 
            // Для честности лучше при покупке сразу начислять сытость. Но тогда еда не складируется. 
            // Игрок писал: "покупать еду за деньги и кормить суслова". 
            // Я переделаю: каждая покупка — это +определенный процент, но и еда как предмет не нужна. 
            // В ТЗ было «купить еду за деньги и кормить», упростим: при покупке сразу прибавляется сытость, 
            // а счетчик «Еда» убираем. Погоди, но в интерфейсе есть блок «еда». 
            // Давай сделаем правильно: при покупке мы получаем «порцию» и кнопка КОРМИТЬ использует одну порцию.
            // Чтобы игрок чувствовал прогресс: будем хранить массив купленных процентов? 
            // Я сделаю проще: foodItems — количество еды, но каждая единица даёт 15% (усреднённо). 
            // Это лучше, чем путаница. 
            // Альтернатива: при покупке добавляем в «инвентарь» объект. 
            // Но для краткости используем среднее значение: 1 еда = +12% (морковь слабее, бургер/торт сильнее)
            // Пользователь покупает разную еду, но при кормлении используется накопленная «единица еды».
            // Игрок в описании не требовал учитывать тип еды при кормлении, так что ок.
            // Чтобы было чуть интереснее: прирост = 14% за 1 еду.
            
            const GAIN_PER_FOOD = 14;  // процентов

            foodItems -= 1;
            belly = Math.min(belly + GAIN_PER_FOOD, 100);
            
            // анимация кормления
            suslovEmoji.style.transform = 'scale(1.1)';
            setTimeout(() => suslovEmoji.style.transform = 'scale(1)', 100);

            updateUI();
            checkBellyLimit();   // если >=100 лопнет
        }

        // СБРОС ИГРЫ (новая игра+)
        function resetGame() {
            money = 25;          // чуть больше стартового для веселья
            foodItems = 0;
            belly = 0;
            gameFinished = false;
            
            // убираем сообщения
            gameOverMsg.innerHTML = '';
            container.classList.remove('pop-effect');
            
            updateUI();
            suslovEmoji.style.transform = 'scale(1)';
        }

        // ---------- ОБРАБОТЧИКИ ----------
        buyCarrot.addEventListener('click', () => {
            if (buyFood('carrot')) {
                // небольшой отклик
            }
        });
        buyBurger.addEventListener('click', () => {
            buyFood('burger');
        });
        buyCake.addEventListener('click', () => {
            buyFood('cake');
        });

        feedBtn.addEventListener('click', feedSuslov);

        resetBtn.addEventListener('click', () => {
            resetGame();
        });

        // дополнительно: при клике на самого суслова можно покормить если есть еда (удобно)
        suslovEmoji.addEventListener('click', feedSuslov);

        // Дополнительно: заработать деньги можно только кликом? В оригинале "деньги" появляются пассивно? 
        // Добавим клик по суслову для заработка? Но не нужно, т.к. стартовых денег хватит.
        // Для интереса: при лопании можно добавить рестарт через кнопку.
        
        // Инициализация
        updateUI();

        // небольшой секрет: если денег мало, можно нажать на блок денег чтобы читерски добавить? Нет, не будем.
        // Но для теста оставлю легальный способ: двойной клик по монетке добавит 5 монет (не документировано)
        const moneyBlock = document.querySelector('.money-block');
        moneyBlock.addEventListener('dblclick', () => {
            if (!gameFinished) {
                money += 8;
                updateUI();
            }
        });
        // на всякий случай уберу возможность сломать: не дадим бесконечно.
    })();
</script>
</body>
</html>
