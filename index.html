<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Земля и Марс — цветные и яркие</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: black;
      font-family: 'Segoe UI', sans-serif;
    }
    #planet-selector {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      background: rgba(10, 20, 30, 0.7);
      padding: 12px 24px;
      border-radius: 60px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 180, 255, 0.3);
      z-index: 100;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    .planet-btn {
      padding: 12px 32px;
      border-radius: 40px;
      border: none;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(30, 40, 60, 0.8);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.1);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .planet-btn.active {
      background: #2a9df4;
      color: white;
      box-shadow: 0 0 20px #2a9df4;
      border-color: #8ec8ff;
    }
    #planet-btn-mars.active {
      background: #c1440e;
      box-shadow: 0 0 20px #ff6633;
    }
    .planet-btn:active {
      transform: scale(0.95);
    }
    @media (max-width: 500px) {
      .planet-btn {
        padding: 10px 24px;
        font-size: 16px;
      }
      #planet-selector {
        bottom: 20px;
        padding: 10px 16px;
        gap: 12px;
      }
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="planet-selector">
    <button class="planet-btn active" id="planet-btn-earth">🌍 Земля</button>
    <button class="planet-btn" id="planet-btn-mars">🔴 Марс</button>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    
    // --- Сцена ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 8);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.3;
    document.body.appendChild(renderer.domElement);
    
    // --- Постобработка ---
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.1;
    bloomPass.strength = 0.6;
    bloomPass.radius = 0.8;
    
    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);
    
    // --- Управление ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.0;
    controls.enableZoom = true;
    controls.zoomSpeed = 1.2;
    controls.enablePan = false;
    controls.minDistance = 3.0;
    controls.maxDistance = 14.0;
    controls.target.set(0, 0, 0);
    
    // --- Освещение (яркое) ---
    const sunLight = new THREE.DirectionalLight(0xfff5e6, 2.5);
    sunLight.position.set(5, 3, 5);
    scene.add(sunLight);
    
    const fillLight = new THREE.DirectionalLight(0xccddff, 0.8);
    fillLight.position.set(-5, 1, -3);
    scene.add(fillLight);
    
    const ambientLight = new THREE.AmbientLight(0x404060, 0.35);
    scene.add(ambientLight);
    
    const backLight = new THREE.PointLight(0x88aaff, 0.5);
    backLight.position.set(-2, 1, -5);
    scene.add(backLight);
    
    // --- Текстуры ---
    const loader = new THREE.TextureLoader();
    
    // Земля: яркая, цветная (та же, что была в лучшей версии)
    const earthMap = loader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
    const earthSpecular = loader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
    const earthNormal = loader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
    const earthClouds = loader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
    
    // Марс: ЯРКАЯ ЦВЕТНАЯ КАРТА (используем офиц. текстуру из примеров Three.js, она 100% цветная)
    const marsMap = loader.load('https://threejs.org/examples/textures/planets/mars.jpg');
    // Для рельефа используем ту же карту как bump
    const marsBump = loader.load('https://threejs.org/examples/textures/planets/mars.jpg');
    
    // --- Группы планет ---
    const earthGroup = new THREE.Group();
    const marsGroup = new THREE.Group();
    
    // ---- ЗЕМЛЯ (оставляем как было, идеально) ----
    const earthGeo = new THREE.SphereGeometry(2.0, 128, 128);
    const earthMat = new THREE.MeshPhongMaterial({
      map: earthMap,
      specularMap: earthSpecular,
      specular: new THREE.Color(0x333333),
      shininess: 10,
      normalMap: earthNormal,
      normalScale: new THREE.Vector2(1.2, 1.2)
    });
    const earthMesh = new THREE.Mesh(earthGeo, earthMat);
    earthGroup.add(earthMesh);
    
    // Облака
    const cloudGeo = new THREE.SphereGeometry(2.008, 128, 128);
    const cloudMat = new THREE.MeshPhongMaterial({
      map: earthClouds,
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide
    });
    const clouds = new THREE.Mesh(cloudGeo, cloudMat);
    earthGroup.add(clouds);
    
    // Атмосфера
    const atmosGeo = new THREE.SphereGeometry(2.18, 64, 64);
    const atmosMat = new THREE.MeshPhongMaterial({
      color: 0x4488ff,
      transparent: true,
      opacity: 0.15,
      side: THREE.BackSide,
      emissive: new THREE.Color(0x2266cc),
      emissiveIntensity: 0.6
    });
    const atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
    earthGroup.add(atmosphere);
    
    // ---- МАРС (ИСПРАВЛЕНО: цветной, яркий) ----
    const marsGeo = new THREE.SphereGeometry(1.8, 128, 128);
    const marsMat = new THREE.MeshPhongMaterial({
      map: marsMap,
      bumpMap: marsBump,
      bumpScale: 0.08,
      shininess: 8,
      specular: new THREE.Color(0x222222),
      emissive: new THREE.Color(0x331100),
      emissiveIntensity: 0.15
    });
    const marsMesh = new THREE.Mesh(marsGeo, marsMat);
    marsGroup.add(marsMesh);
    
    // Атмосфера Марса (красноватая, тонкая)
    const marsAtmosGeo = new THREE.SphereGeometry(1.95, 64, 64);
    const marsAtmosMat = new THREE.MeshPhongMaterial({
      color: 0xcc9966,
      transparent: true,
      opacity: 0.12,
      side: THREE.BackSide,
      emissive: new THREE.Color(0x883322),
      emissiveIntensity: 0.4
    });
    const marsAtmosphere = new THREE.Mesh(marsAtmosGeo, marsAtmosMat);
    marsGroup.add(marsAtmosphere);
    
    // Добавляем Землю по умолчанию
    scene.add(earthGroup);
    let currentPlanet = 'earth';
    
    // --- Звёзды ---
    function createStars(radius, count, size) {
      const geom = new THREE.BufferGeometry();
      const pos = new Float32Array(count * 3);
      const col = new Float32Array(count * 3);
      
      for (let i = 0; i < count * 3; i += 3) {
        const r = radius + Math.random() * 150;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        
        pos[i] = Math.sin(phi) * Math.cos(theta) * r;
        pos[i+1] = Math.sin(phi) * Math.sin(theta) * r;
        pos[i+2] = Math.cos(phi) * r;
        
        const bright = 0.7 + Math.random() * 0.5;
        if (Math.random() < 0.7) {
          col[i] = bright;
          col[i+1] = bright * 0.95;
          col[i+2] = 1.0;
        } else {
          col[i] = 1.0;
          col[i+1] = bright * 0.8;
          col[i+2] = bright * 0.7;
        }
      }
      
      geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      geom.setAttribute('color', new THREE.BufferAttribute(col, 3));
      
      const mat = new THREE.PointsMaterial({ size, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
      return new THREE.Points(geom, mat);
    }
    
    const stars1 = createStars(200, 6000, 0.35);
    const stars2 = createStars(350, 4000, 0.18);
    scene.add(stars1);
    scene.add(stars2);
    
    scene.fog = new THREE.FogExp2(0x050510, 0.0012);
    
    // --- Переключение планет ---
    const btnEarth = document.getElementById('planet-btn-earth');
    const btnMars = document.getElementById('planet-btn-mars');
    
    btnEarth.addEventListener('click', () => {
      if (currentPlanet === 'earth') return;
      scene.remove(marsGroup);
      scene.add(earthGroup);
      currentPlanet = 'earth';
      btnEarth.classList.add('active');
      btnMars.classList.remove('active');
      camera.position.set(0, 1.5, 8);
      controls.target.set(0, 0, 0);
    });
    
    btnMars.addEventListener('click', () => {
      if (currentPlanet === 'mars') return;
      scene.remove(earthGroup);
      scene.add(marsGroup);
      currentPlanet = 'mars';
      btnMars.classList.add('active');
      btnEarth.classList.remove('active');
      camera.position.set(0, 1.5, 8);
      controls.target.set(0, 0, 0);
    });
    
    // Touch поддержка
    btnEarth.addEventListener('touchstart', (e) => { e.preventDefault(); btnEarth.click(); });
    btnMars.addEventListener('touchstart', (e) => { e.preventDefault(); btnMars.click(); });
    
    // --- Анимация ---
    function animate() {
      requestAnimationFrame(animate);
      if (currentPlanet === 'earth') clouds.rotation.y += 0.0007;
      stars1.rotation.y += 0.000015;
      stars2.rotation.x += 0.00001;
      controls.update();
      composer.render();
    }
    animate();
    
    // --- Ресайз ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
