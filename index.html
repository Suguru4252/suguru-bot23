<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>President Simulator - Демо</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #16213e;
            --accent: #e2b04a;
            --gold: #d4a574;
            --text: #e0e0e0;
            --green: #4caf84;
            --red: #e05555;
            --blue: #5b9bd5;
            --border: #2a2a4a;
            --hover: #2a2a5a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #0d0d1a;
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ЭКРАН СОЗДАНИЯ СТРАНЫ */
        #country-creation {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a18 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
        }

        #country-creation.hidden {
            display: none;
        }

        .creation-title {
            font-size: 2.8em;
            font-weight: 700;
            background: linear-gradient(180deg, #f0d78c, #c8943e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            letter-spacing: 2px;
            text-align: center;
        }

        .creation-subtitle {
            color: #aaa;
            font-size: 1.1em;
            margin-top: -15px;
            letter-spacing: 1px;
        }

        .creation-form {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px 35px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .creation-form label {
            font-weight: 600;
            color: var(--gold);
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }

        .creation-form input {
            background: #1a1a30;
            border: 2px solid var(--border);
            color: #fff;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 1.05em;
            transition: all 0.3s;
            outline: none;
        }

        .creation-form input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(226,176,74,0.2);
        }

        .btn-create {
            background: linear-gradient(180deg, #e2b04a, #b8861e);
            border: none;
            color: #1a1a2e;
            font-weight: 700;
            font-size: 1.2em;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(226,176,74,0.4);
        }

        /* ИГРОВОЙ ИНТЕРФЕЙС */
        #game-screen {
            display: none;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        #game-screen.active {
            display: flex;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: rgba(22,33,62,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            height: 60px;
        }

        .resources {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .resource {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1em;
        }

        .resource-icon {
            font-size: 1.5em;
        }
        .resource.money .value { color: #f0d78c; }
        .resource.population .value { color: #7ec8e3; }
        .resource.happiness .value { color: #8ce08c; }

        .country-name-display {
            font-weight: 700;
            font-size: 1.3em;
            background: linear-gradient(180deg, #f0d78c, #c8943e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .btn-small {
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.9em;
        }
        .btn-small:hover {
            background: var(--hover);
            border-color: var(--accent);
        }

        /* ИГРОВОЕ ПОЛЕ */
        #game-canvas {
            flex: 1;
            cursor: crosshair;
            display: block;
            background: #1a2a1a;
        }

        /* НИЖНЯЯ ПАНЕЛЬ ПОСТРОЕК */
        #build-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            background: rgba(22,33,62,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            gap: 8px;
            padding: 12px 18px;
            align-items: center;
        }

        .build-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 10px 16px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            background: rgba(30,30,60,0.6);
            min-width: 75px;
            position: relative;
        }

        .build-item:hover {
            background: var(--hover);
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .build-item.selected {
            border-color: #f0d78c !important;
            background: rgba(226,176,74,0.2) !important;
            box-shadow: 0 0 25px rgba(226,176,74,0.3);
        }

        .build-emoji {
            font-size: 2em;
        }
        .build-name {
            font-size: 0.75em;
            font-weight: 600;
            text-align: center;
            line-height: 1.2;
        }
        .build-cost {
            font-size: 0.7em;
            color: #f0d78c;
            font-weight: 700;
        }

        /* ИНФО-ОКНО */
        #info-popup {
            position: absolute;
            pointer-events: none;
            z-index: 60;
            background: rgba(10,10,30,0.95);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.9em;
            display: none;
            white-space: nowrap;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        #message-log {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 55;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        .log-msg {
            background: rgba(0,0,0,0.8);
            border-left: 3px solid var(--accent);
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.85em;
            animation: fadeInOut 3s forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(20px); }
            15% { opacity: 1; transform: translateX(0); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateX(20px); }
        }
    </style>
</head>
<body>

    <!-- ЭКРАН СОЗДАНИЯ СТРАНЫ -->
    <div id="country-creation">
        <div class="creation-title">🏛️ PRESIDENT SIMULATOR</div>
        <div class="creation-subtitle">Создайте свою страну</div>
        <div class="creation-form">
            <label for="country-name">📜 Название страны</label>
            <input type="text" id="country-name" placeholder="Введите название..." maxlength="25" value="Великоречье">
            <button class="btn-create" onclick="startGame()">🌟 ОСНОВАТЬ СТРАНУ</button>
        </div>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="game-screen">
        <!-- Верхняя панель -->
        <div id="top-bar">
            <div class="country-name-display" id="display-country-name">Великоречье</div>
            <div class="resources">
                <div class="resource money">
                    <span class="resource-icon">💰</span>
                    <span>Казна:</span>
                    <span class="value" id="money-value">50000</span>
                </div>
                <div class="resource population">
                    <span class="resource-icon">👥</span>
                    <span>Население:</span>
                    <span class="value" id="pop-value">100</span>
                </div>
                <div class="resource happiness">
                    <span class="resource-icon">😊</span>
                    <span>Счастье:</span>
                    <span class="value" id="happiness-value">75</span>%
                </div>
            </div>
            <button class="btn-small" onclick="showHelp()">❓ Справка</button>
        </div>

        <!-- Канвас игры -->
        <canvas id="game-canvas"></canvas>

        <!-- Инфо-окно -->
        <div id="info-popup"></div>

        <!-- Сообщения -->
        <div id="message-log"></div>

        <!-- Панель строительства -->
        <div id="build-panel">
            <div class="build-item" data-type="house" onclick="selectBuilding('house')">
                <span class="build-emoji">🏠</span>
                <span class="build-name">Жилой дом</span>
                <span class="build-cost">💰500</span>
            </div>
            <div class="build-item" data-type="apartment" onclick="selectBuilding('apartment')">
                <span class="build-emoji">🏢</span>
                <span class="build-name">Многоквартирный</span>
                <span class="build-cost">💰2000</span>
            </div>
            <div class="build-item" data-type="shop" onclick="selectBuilding('shop')">
                <span class="build-emoji">🏪</span>
                <span class="build-name">Магазин</span>
                <span class="build-cost">💰800</span>
            </div>
            <div class="build-item" data-type="factory" onclick="selectBuilding('factory')">
                <span class="build-emoji">🏭</span>
                <span class="build-name">Завод</span>
                <span class="build-cost">💰3000</span>
            </div>
            <div class="build-item" data-type="office" onclick="selectBuilding('office')">
                <span class="build-emoji">🏬</span>
                <span class="build-name">Бизнес-центр</span>
                <span class="build-cost">💰5000</span>
            </div>
            <div class="build-item" data-type="park" onclick="selectBuilding('park')">
                <span class="build-emoji">🌳</span>
                <span class="build-name">Парк</span>
                <span class="build-cost">💰300</span>
            </div>
            <button class="btn-small" style="margin-left:8px; height: 50px;" onclick="clearSelection()">✖ Отмена</button>
        </div>
    </div>

    <script>
        // ==================== СОСТОЯНИЕ ИГРЫ ====================
        const state = {
            countryName: '',
            money: 50000,
            population: 100,
            happiness: 75,
            buildings: [],
            selectedBuildingType: null,
            canvas: null,
            ctx: null,
            gridSize: 50,
            cameraX: 0,
            cameraY: 0,
            isDragging: false,
            dragStartX: 0,
            dragStartY: 0,
            hoveredBuilding: null,
            mouseX: 0,
            mouseY: 0,
        };

        // Данные о типах строений
        const buildingTypes = {
            house: {
                emoji: '🏠',
                name: 'Жилой дом',
                cost: 500,
                color: '#e8c897',
                populationBonus: 5,
                happinessBonus: 2,
                incomeBonus: 10,
                width: 40,
                height: 40,
            },
            apartment: {
                emoji: '🏢',
                name: 'Многоквартирный дом',
                cost: 2000,
                color: '#b0c4de',
                populationBonus: 30,
                happinessBonus: -1,
                incomeBonus: 40,
                width: 48,
                height: 48,
            },
            shop: {
                emoji: '🏪',
                name: 'Магазин',
                cost: 800,
                color: '#f5deb3',
                populationBonus: 2,
                happinessBonus: 5,
                incomeBonus: 60,
                width: 42,
                height: 42,
            },
            factory: {
                emoji: '🏭',
                name: 'Завод',
                cost: 3000,
                color: '#8899aa',
                populationBonus: 15,
                happinessBonus: -5,
                incomeBonus: 200,
                width: 50,
                height: 50,
            },
            office: {
                emoji: '🏬',
                name: 'Бизнес-центр',
                cost: 5000,
                color: '#87ceeb',
                populationBonus: 10,
                happinessBonus: 3,
                incomeBonus: 350,
                width: 46,
                height: 46,
            },
            park: {
                emoji: '🌳',
                name: 'Парк',
                cost: 300,
                color: '#8fbc8f',
                populationBonus: 0,
                happinessBonus: 12,
                incomeBonus: 0,
                width: 44,
                height: 44,
            },
        };

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        function initCanvas() {
            state.canvas = document.getElementById('game-canvas');
            state.ctx = state.canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        }

        function resizeCanvas() {
            state.canvas.width = window.innerWidth;
            state.canvas.height = window.innerHeight;
            state.cameraX = state.canvas.width / 2;
            state.cameraY = state.canvas.height / 2;
        }

        // ==================== СТАРТ ИГРЫ ====================
        function startGame() {
            const nameInput = document.getElementById('country-name');
            const name = nameInput.value.trim();
            if (!name) {
                nameInput.style.borderColor = '#e05555';
                nameInput.focus();
                setTimeout(() => { nameInput.style.borderColor = 'var(--border)'; }, 1500);
                return;
            }
            state.countryName = name;
            state.buildings = [];
            state.money = 50000;
            state.population = 100;
            state.happiness = 75;
            state.selectedBuildingType = null;

            document.getElementById('country-creation').classList.add('hidden');
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('display-country-name').textContent = '🏛️ ' + state.countryName;

            initCanvas();
            updateUI();
            addLogMessage(`🇷🇺 Добро пожаловать в страну "${state.countryName}"! Начните строительство.`);
            gameLoop();
        }

        function updateUI() {
            document.getElementById('money-value').textContent = state.money.toLocaleString();
            document.getElementById('pop-value').textContent = state.population;
            document.getElementById('happiness-value').textContent = Math.round(state.happiness);

            // Обновляем выделение в панели
            document.querySelectorAll('.build-item').forEach(el => {
                el.classList.toggle('selected', el.dataset.type === state.selectedBuildingType);
            });
        }

        // ==================== СТРОИТЕЛЬСТВО ====================
        function selectBuilding(type) {
            state.selectedBuildingType = state.selectedBuildingType === type ? null : type;
            updateUI();
            if (state.selectedBuildingType) {
                const info = buildingTypes[type];
                addLogMessage(`🔨 Выбран: ${info.emoji} ${info.name} (💰${info.cost.toLocaleString()})`);
            }
        }

        function clearSelection() {
            state.selectedBuildingType = null;
            updateUI();
        }

        function buildAt(worldX, worldY) {
            if (!state.selectedBuildingType) return;
            const type = state.selectedBuildingType;
            const info = buildingTypes[type];

            if (state.money < info.cost) {
                addLogMessage('❌ Недостаточно средств в казне!');
                shakeElement(document.getElementById('money-value').parentElement);
                return;
            }

            // Проверка наложения
            const newBuilding = {
                type: type,
                x: worldX - info.width / 2,
                y: worldY - info.height / 2,
                width: info.width,
                height: info.height,
                placedAt: Date.now(),
            };

            const overlap = state.buildings.some(b => rectsOverlap(newBuilding, b));
            if (overlap) {
                addLogMessage('⚠️ Нельзя строить поверх другого здания!');
                return;
            }

            state.money -= info.cost;
            state.buildings.push(newBuilding);
            state.population += info.populationBonus;
            state.happiness = Math.max(0, Math.min(100, state.happiness + info.happinessBonus));

            updateUI();
            addLogMessage(`✅ Построено: ${info.emoji} ${info.name} (-💰${info.cost.toLocaleString()})`);

            // Эффект частиц при постройке
            spawnBuildParticles(worldX, worldY);
        }

        function rectsOverlap(a, b) {
            const margin = 4;
            return !(
                a.x + a.width - margin < b.x ||
                a.x > b.x + b.width - margin ||
                a.y + a.height - margin < b.y ||
                a.y > b.y + b.height - margin
            );
        }

        // ==================== ОТРИСОВКА ====================
        function drawGrid(ctx, camX, camY, w, h) {
            const gs = state.gridSize;
            const startX = -((camX % gs) + gs) % gs;
            const startY = -((camY % gs) + gs) % gs;

            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = startX; x < w + gs; x += gs) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, h);
            }
            for (let y = startY; y < h + gs; y += gs) {
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
            }
            ctx.stroke();
        }

        function drawBuilding(ctx, b, camX, camY) {
            const info = buildingTypes[b.type];
            const screenX = b.x - camX;
            const screenY = b.y - camY;
            const w = b.width;
            const h = b.height;

            // Тень
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(screenX + 2, screenY + 2, w, h);

            // Основание
            ctx.fillStyle = info.color;
            ctx.fillRect(screenX, screenY, w, h);

            // Граница
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 2;
            ctx.strokeRect(screenX, screenY, w, h);

            // Эмодзи
            ctx.font = `${w * 0.55}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(info.emoji, screenX + w / 2, screenY + h / 2);

            // Подсветка при наведении
            if (state.hoveredBuilding === b) {
                ctx.strokeStyle = '#f0d78c';
                ctx.lineWidth = 3;
                ctx.strokeRect(screenX - 2, screenY - 2, w + 4, h + 4);
                ctx.strokeStyle = 'rgba(240,215,140,0.4)';
                ctx.lineWidth = 6;
                ctx.strokeRect(screenX - 5, screenY - 5, w + 10, h + 10);
            }
        }

        function gameLoop() {
            const ctx = state.ctx;
            const canvas = state.canvas;
            const w = canvas.width;
            const h = canvas.height;
            const camX = state.cameraX - w / 2;
            const camY = state.cameraY - h / 2;

            // Фон
            const grad = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, w);
            grad.addColorStop(0, '#2d3a2d');
            grad.addColorStop(1, '#1a2a1a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Сетка
            drawGrid(ctx, camX, camY, w, h);

            // Здания
            state.buildings.forEach(b => drawBuilding(ctx, b, camX, camY));

            // Призрак размещения
            if (state.selectedBuildingType && !state.isDragging) {
                const info = buildingTypes[state.selectedBuildingType];
                const mx = state.mouseX + camX;
                const my = state.mouseY + camY;
                const sx = mx - info.width / 2 - camX;
                const sy = my - info.height / 2 - camY;

                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.fillRect(sx, sy, info.width, info.height);
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.setLineDash([6, 4]);
                ctx.lineWidth = 2;
                ctx.strokeRect(sx, sy, info.width, info.height);
                ctx.setLineDash([]);
                ctx.font = `${info.width * 0.5}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(info.emoji, sx + info.width / 2, sy + info.height / 2);
            }

            requestAnimationFrame(gameLoop);
        }

        // ==================== ЧАСТИЦЫ ====================
        function spawnBuildParticles(wx, wy) {
            const canvas = state.canvas;
            const ctx = state.ctx;
            const particles = [];
            const count = 20;
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: wx - state.cameraX + canvas.width / 2,
                    y: wy - state.cameraY + canvas.height / 2,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6 - 3,
                    life: 1,
                    size: Math.random() * 6 + 2,
                    color: `hsl(${Math.random() * 60 + 30}, 80%, 60%)`,
                });
            }
            function animParticles() {
                particles.forEach((p, i) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.15;
                    p.life -= 0.03;
                    if (p.life <= 0) particles.splice(i, 1);
                });
                if (particles.length === 0) return;
                requestAnimationFrame(animParticles);
            }
            // Частицы рисуются в gameLoop временно — упростим: просто вспышка
            const flash = document.createElement('div');
            flash.style.cssText = `
                position: fixed; pointer-events: none; z-index: 999;
                left: ${state.mouseX}px; top: ${state.mouseY}px;
                width: 40px; height: 40px; border-radius: 50%;
                background: radial-gradient(circle, rgba(255,215,0,0.8), transparent);
                transform: translate(-50%, -50%);
                animation: flashAnim 0.6s forwards;
            `;
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 600);
        }

        // Добавляем стиль для вспышки
        const flashStyle = document.createElement('style');
        flashStyle.textContent = `
            @keyframes flashAnim {
                0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
                100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
            }
        `;
        document.head.appendChild(flashStyle);

        // ==================== СОБЫТИЯ МЫШИ ====================
        function getWorldCoords(e) {
            const rect = state.canvas.getBoundingClientRect();
            return {
                screenX: e.clientX - rect.left,
                screenY: e.clientY - rect.top,
                worldX: e.clientX - rect.left + state.cameraX - state.canvas.width / 2,
                worldY: e.clientY - rect.top + state.cameraY - state.canvas.height / 2,
            };
        }

        function findBuildingAt(wx, wy) {
            return state.buildings.find(b =>
                wx >= b.x && wx <= b.x + b.width &&
                wy >= b.y && wy <= b.y + b.height
            ) || null;
        }

        state.canvas = document.getElementById('game-canvas');

        document.addEventListener('mousemove', (e) => {
            if (!state.canvas) return;
            const coords = getWorldCoords(e);
            state.mouseX = coords.screenX;
            state.mouseY = coords.screenY;

            if (state.isDragging) {
                state.cameraX -= e.clientX - state.dragStartX;
                state.cameraY -= e.clientY - state.dragStartY;
                state.dragStartX = e.clientX;
                state.dragStartY = e.clientY;
            }

            state.hoveredBuilding = findBuildingAt(coords.worldX, coords.worldY);

            // Инфо-окно
            const popup = document.getElementById('info-popup');
            if (state.hoveredBuilding && !state.isDragging && !state.selectedBuildingType) {
                const b = state.hoveredBuilding;
                const info = buildingTypes[b.type];
                popup.style.display = 'block';
                popup.style.left = (coords.screenX + 20) + 'px';
                popup.style.top = (coords.screenY - 20) + 'px';
                popup.innerHTML = `
                    <strong>${info.emoji} ${info.name}</strong><br>
                    <span style="color:#aaa;">Население:</span> +${info.populationBonus}<br>
                    <span style="color:#aaa;">Доход/мес:</span> 💰${info.incomeBonus}<br>
                    <span style="color:#aaa;">Счастье:</span> ${info.happinessBonus >= 0 ? '+' : ''}${info.happinessBonus}
                `;
            } else {
                popup.style.display = 'none';
            }
        });

        document.addEventListener('mousedown', (e) => {
            if (!state.canvas || e.target.closest('#build-panel') || e.target.closest('#top-bar')) return;
            if (e.button === 1 || e.button === 0) { // Левая или средняя
                if (state.selectedBuildingType && e.button === 0) {
                    const coords = getWorldCoords(e);
                    buildAt(coords.worldX, coords.worldY);
                } else if (e.button === 1 || (e.button === 0 && !state.selectedBuildingType)) {
                    state.isDragging = true;
                    state.dragStartX = e.clientX;
                    state.dragStartY = e.clientY;
                    state.canvas.style.cursor = 'grabbing';
                }
            }
        });

        document.addEventListener('mouseup', (e) => {
            state.isDragging = false;
            if (state.canvas) state.canvas.style.cursor = state.selectedBuildingType ? 'crosshair' : 'grab';
        });

        document.addEventListener('wheel', (e) => {
            if (!state.canvas) return;
            e.preventDefault();
            const zoomFactor = 1.08;
            const rect = state.canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const worldX = mx + state.cameraX - state.canvas.width / 2;
            const worldY = my + state.cameraY - state.canvas.height / 2;

            if (e.deltaY < 0) {
                state.gridSize = Math.min(120, state.gridSize * zoomFactor);
            } else {
                state.gridSize = Math.max(20, state.gridSize / zoomFactor);
            }

            state.cameraX = worldX - mx + state.canvas.width / 2;
            state.cameraY = worldY - my + state.canvas.height / 2;
        }, { passive: false });

        document.addEventListener('contextmenu', (e) => {
            if (e.target.closest('#game-canvas') || e.target.id === 'game-canvas') {
                e.preventDefault();
                clearSelection();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') clearSelection();
            if (e.key === '1') selectBuilding('house');
            if (e.key === '2') selectBuilding('apartment');
            if (e.key === '3') selectBuilding('shop');
            if (e.key === '4') selectBuilding('factory');
            if (e.key === '5') selectBuilding('office');
            if (e.key === '6') selectBuilding('park');
        });

        // ==================== ПАССИВНЫЙ ДОХОД ====================
        setInterval(() => {
            if (!state.countryName) return;
            let totalIncome = 0;
            state.buildings.forEach(b => {
                totalIncome += buildingTypes[b.type].incomeBonus;
            });
            state.money += totalIncome;
            // Небольшое изменение счастья со временем
            if (state.buildings.length > 0) {
                state.happiness += (Math.random() - 0.48) * 0.5;
                state.happiness = Math.max(0, Math.min(100, state.happiness));
            }
            updateUI();
        }, 3000);

        // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
        function addLogMessage(msg) {
            const log = document.getElementById('message-log');
            const div = document.createElement('div');
            div.className = 'log-msg';
            div.textContent = msg;
            log.appendChild(div);
            setTimeout(() => div.remove(), 3000);
            if (log.children.length > 5) log.firstChild.remove();
        }

        function shakeElement(el) {
            el.style.animation = 'shake 0.4s ease';
            setTimeout(() => { el.style.animation = ''; }, 400);
        }

        function showHelp() {
            const helpText = [
                '🎮 УПРАВЛЕНИЕ:',
                '🖱️ ЛКМ — построить выбранное здание',
                '🖱️ Зажать ЛКМ — перемещать карту',
                '🖱️ Колесико — приближение',
                '⌨️ Клавиши 1-6 — выбор здания',
                '⌨️ Esc / ПКМ — отмена выбора',
                '',
                '🏠 Стройте дома, заводы, бизнесы!',
                '💰 Каждый месяц здания приносят доход.',
                '😊 Следите за счастьем населения!',
            ].join('\n');
            alert(helpText);
        }

        // Стиль для shake
        const shakeStyle = document.createElement('style');
        shakeStyle.textContent = `
            @keyframes shake {
                0%,100% { transform: translateX(0); }
                25% { transform: translateX(-8px); }
                50% { transform: translateX(8px); }
                75% { transform: translateX(-4px); }
            }
        `;
        document.head.appendChild(shakeStyle);

        // Инициализация канваса при загрузке страницы (для предпросмотра)
        window.addEventListener('load', () => {
            // Показываем красивый фон на канвасе до старта
        });

        console.log('🏛️ President Simulator Demo готов!');
        console.log('Создайте страну и начните строить!');
    </script>
</body>
</html>
