<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🥚 СУСЛОВ: Ультра Эдишн</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a3a2e 0%, #2d5a4a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 8px;
        }
        .game-container {
            max-width: 550px;
            width: 100%;
            background: #efe6d5;
            background-image: radial-gradient(circle at 20% 30%, #fff6e8, #e7d8be);
            border-radius: 40px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
            padding: 16px 14px 20px;
            border: 4px solid #b49a7b;
        }
        h1 { font-size: 2rem; margin: 0 0 8px; color: #3d2a1b; text-shadow: 2px 2px 0 #c9aa7b; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .top-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-bottom: 8px;
        }
        .badge {
            background: #6a4e2e;
            color: #ffd966;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid #eebb55;
            text-align: center;
        }
        .suslov-area {
            background: linear-gradient(135deg, #ccb094, #a5835e);
            border-radius: 80px 80px 40px 40px;
            padding: 12px;
            border: 4px solid #5e3e28;
            box-shadow: inset 0 -6px 0 #3f2c1c, 0 8px 0 #3f2c1c;
            margin-bottom: 12px;
            position: relative;
        }
        .suslov-emoji {
            font-size: 100px;
            line-height: 1;
            cursor: pointer;
            transition: 0.1s;
        }
        .floating-text {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 0 #000;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        .belly-bar-container {
            background: #2c1e12;
            padding: 4px 8px;
            border-radius: 30px;
            border: 2px solid #b49a7b;
            margin-top: 8px;
        }
        .belly-bar-bg {
            height: 22px;
            background: #1e130c;
            border-radius: 20px;
            overflow: hidden;
        }
        .belly-fill {
            height: 100%;
            background: linear-gradient(90deg, #fcb045, #ff512f);
            border-radius: 20px;
            transition: width 0.2s;
            width: 0%;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            gap: 8px;
        }
        .money-block, .food-block {
            background: #0c0907;
            padding: 6px 16px;
            border-radius: 25px;
            color: #ffd966;
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
        }
        .shop {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin: 8px 0;
        }
        .food-btn {
            background: #dccdb6;
            border: 2px solid #6e543c;
            border-radius: 30px;
            padding: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #5a4530;
            cursor: pointer;
        }
        .food-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #5a4530; }
        .golden-food {
            background: linear-gradient(45deg, #ffd700, #ffec8b);
            border-color: #daa520;
            box-shadow: 0 3px 0 #b8860b;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 3px 0 #b8860b, 0 0 10px gold; }
            50% { box-shadow: 0 3px 0 #b8860b, 0 0 20px orange; }
        }
        .action-buttons {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 6px;
            margin: 8px 0;
        }
        button {
            background: #f3d37c;
            border: none;
            font-weight: bold;
            padding: 10px;
            border-radius: 30px;
            box-shadow: 0 3px 0 #a05f2c;
            border: 1px solid #ffeab0;
            cursor: pointer;
            font-size: 0.9rem;
        }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #a05f2c; }
        .tabs {
            display: flex;
            gap: 4px;
            margin: 8px 0;
        }
        .tab-btn {
            background: #8b7355;
            color: white;
            flex: 1;
            padding: 6px;
            font-size: 0.8rem;
        }
        .tab-btn.active {
            background: #c9a87c;
            color: #1f140a;
        }
        .tab-content {
            background: #d4c4ae;
            border-radius: 20px;
            padding: 8px;
            margin: 5px 0;
            border: 2px solid #8b7355;
        }
        .quest-item {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            background: #efe0cd;
            margin: 3px 0;
            border-radius: 15px;
        }
        .booster-active {
            background: #ffd700;
            color: #1a1a1a;
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 0.7rem;
            display: inline-block;
        }
        .skin-selector {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .skin-btn {
            font-size: 2rem;
            padding: 5px 10px;
            background: #a5835e;
            border-radius: 15px;
            cursor: pointer;
            opacity: 0.5;
        }
        .skin-btn.unlocked { opacity: 1; }
        .skin-btn.selected { border: 3px solid gold; }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <h1>
        <span id="currentSkinEmoji">🐹</span> СУСЛОВ
        <button onclick="openTab('skins')" style="font-size:1rem; padding:5px; width:auto;">👤</button>
    </h1>
    
    <div class="top-panel">
        <div class="badge">⭐ Престиж <span id="prestigeLevel">0</span> (+<span id="prestigeBonus">0</span>%)</div>
        <div class="badge">💸 Потрачено <span id="totalSpent">0</span>🪙</div>
        <div class="badge">🔥 Комбо x<span id="comboCount">0</span></div>
        <div class="badge">📊 Рекорд <span id="recordBelly">0</span>%</div>
    </div>

    <div class="suslov-area" id="suslovArea">
        <div class="suslov-emoji" id="suslovEmoji">🐭</div>
        <div class="belly-bar-container">
            <div class="belly-bar-bg">
                <div class="belly-fill" id="bellyFill"></div>
            </div>
            <div style="display:flex; justify-content:space-between; color:#ffecb3; font-size:0.8rem;">
                <span>🍖 <span id="bellyPercent">0</span>%</span>
                <span id="boosterIndicator"></span>
            </div>
        </div>
    </div>

    <div class="stats-row">
        <div class="money-block">🪙 <span id="moneyValue">50</span></div>
        <div class="food-block">🍱 <span id="foodCount">0</span></div>
    </div>
    
    <div style="display:flex; gap:5px; font-size:0.7rem; color:#594d3c;">
        <span>🥕<span id="carrotCount">0</span></span>
        <span>🍔<span id="burgerCount">0</span></span>
        <span>🎂<span id="cakeCount">0</span></span>
        <span>👑<span id="goldenCount">0</span></span>
    </div>

    <!-- Вкладки -->
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('shop')">🛒 Магазин</button>
        <button class="tab-btn" onclick="openTab('quests')">🎯 Задания</button>
        <button class="tab-btn" onclick="openTab('casino')">🎰 Рулетка</button>
        <button class="tab-btn" onclick="openTab('stats')">📊 Статы</button>
    </div>

    <!-- Контент вкладок -->
    <div id="tabShop" class="tab-content">
        <div class="shop" id="shopContainer"></div>
        <div id="marketInfo" style="font-size:0.7rem; margin-top:5px;"></div>
    </div>
    
    <div id="tabQuests" class="tab-content" style="display:none;">
        <div id="questsList"></div>
        <button onclick="claimDailyBonus()" style="width:100%; margin-top:8px;">🎁 Ежедневный бонус</button>
    </div>
    
    <div id="tabCasino" class="tab-content" style="display:none;">
        <h3>🎰 Рулетка удачи</h3>
        <div id="rouletteResult" style="font-size:1.5rem; min-height:40px;">🎲</div>
        <button onclick="spinRoulette()" id="rouletteBtn">Крутить (30🪙)</button>
        <div id="rouletteTimer" style="font-size:0.7rem;"></div>
    </div>
    
    <div id="tabStats" class="tab-content" style="display:none;">
        <div id="statsDisplay"></div>
    </div>
    
    <div id="tabSkins" class="tab-content" style="display:none;">
        <h3>👤 Скины Суслова</h3>
        <div class="skin-selector" id="skinSelector"></div>
        <button onclick="openTab('shop')">← Назад</button>
    </div>

    <div class="action-buttons">
        <button id="feedBtn">🍽️ КОРМИТЬ</button>
        <button id="autoFeedBtn">🤖 АВТО</button>
    </div>
    
    <button id="sellFatBtn" style="width:100%; background:#c9a87c; margin-top:5px;">💰 ПРОДАТЬ ЖИР (+5%)</button>
    
    <div id="messageArea" style="min-height:20px; font-weight:bold; color:#ad1f1f; font-size:0.8rem;"></div>
</div>

<script>
(function(){
    "use strict";

    // ---------- ОСНОВНОЕ СОСТОЯНИЕ ----------
    let money = 50;
    let belly = 0;
    let recordBelly = 0;
    let foodInventory = { carrot: 0, burger: 0, cake: 0, golden: 0 };
    let prestigeLevel = 0;
    let prestigeBonusPercent = 0;
    let totalSpentMoney = 0;
    let feedCombo = 0;
    
    // Статистика
    let stats = { clicks: 0, foodEaten: 0, moneyEarned: 0, spins: 0 };
    
    // Бустеры
    let boosters = { moneyMulti: 1, foodMulti: 1, activeUntil: 0 };
    
    // Рынок
    let marketPrices = { carrot: 5, burger: 12, cake: 22 };
    let goldenFoodActive = false;
    let goldenFoodPrice = 35;
    
    // Автокорм
    let autoFeedActive = false;
    let autoFeedInterval = null;
    
    // Рулетка
    let rouletteCooldown = 0;
    let lastDailyBonus = null;
    
    // Задания
    let quests = [
        { id: 1, desc: 'Купить 3 еды', target: 3, progress: 0, reward: 20, completed: false },
        { id: 2, desc: 'Достичь 50% сытости', target: 50, progress: 0, reward: 30, completed: false },
        { id: 3, desc: 'Сделать 10 кормёжек', target: 10, progress: 0, reward: 25, completed: false }
    ];
    
    // Скины
    let skins = [
        { emoji: '🐭', name: 'Обычный', unlocked: true },
        { emoji: '🐹', name: 'Хомяк', unlocked: false },
        { emoji: '🐷', name: 'Свин', unlocked: false },
        { emoji: '🦛', name: 'Бегемот', unlocked: false },
        { emoji: '🐳', name: 'Кит', unlocked: false }
    ];
    let currentSkin = 0;
    
    const FOOD_DATA = {
        carrot: { gain: 3 },
        burger: { gain: 8 },
        cake: { gain: 15 },
        golden: { gain: 40 }
    };

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function getTotalFood() {
        return foodInventory.carrot + foodInventory.burger + foodInventory.cake + foodInventory.golden;
    }
    
    function showFloatingText(text, color = '#ffd700') {
        const area = document.getElementById('suslovArea');
        const div = document.createElement('div');
        div.className = 'floating-text';
        div.textContent = text;
        div.style.color = color;
        div.style.left = Math.random() * 150 + 50 + 'px';
        div.style.top = '50px';
        area.appendChild(div);
        setTimeout(() => div.remove(), 1000);
    }
    
    function updateUI() {
        document.getElementById('moneyValue').textContent = money;
        document.getElementById('foodCount').textContent = getTotalFood();
        document.getElementById('carrotCount').textContent = foodInventory.carrot;
        document.getElementById('burgerCount').textContent = foodInventory.burger;
        document.getElementById('cakeCount').textContent = foodInventory.cake;
        document.getElementById('goldenCount').textContent = foodInventory.golden;
        
        const percent = Math.min(belly, 100);
        document.getElementById('bellyFill').style.width = percent + '%';
        document.getElementById('bellyPercent').textContent = percent;
        if (belly > recordBelly) recordBelly = belly;
        document.getElementById('recordBelly').textContent = recordBelly;
        
        document.getElementById('prestigeLevel').textContent = prestigeLevel;
        document.getElementById('prestigeBonus').textContent = prestigeBonusPercent;
        document.getElementById('totalSpent').textContent = totalSpentMoney;
        document.getElementById('comboCount').textContent = feedCombo;
        
        // Эмодзи
        const emoji = document.getElementById('suslovEmoji');
        const skinEmoji = document.getElementById('currentSkinEmoji');
        if (belly >= 100) {
            emoji.textContent = '💥'; skinEmoji.textContent = '💥';
        } else if (belly >= 80) {
            emoji.textContent = skins[currentSkin].emoji === '🐭' ? '🐡' : skins[currentSkin].emoji;
            skinEmoji.textContent = emoji.textContent;
        } else {
            emoji.textContent = skins[currentSkin].emoji;
            skinEmoji.textContent = skins[currentSkin].emoji;
        }
        
        // Бустеры
        const now = Date.now();
        if (boosters.activeUntil > now) {
            document.getElementById('boosterIndicator').textContent = 
                `⚡ ${boosters.moneyMulti > 1 ? 'x2💰' : ''} ${boosters.foodMulti > 1 ? 'x2🍖' : ''}`;
        } else {
            document.getElementById('boosterIndicator').textContent = '';
            boosters.moneyMulti = 1;
            boosters.foodMulti = 1;
        }
        
        // Обновление кнопки автокорма
        document.getElementById('autoFeedBtn').textContent = autoFeedActive ? '⏹️' : '🤖';
        
        // Рынок
        updateShop();
        updateQuests();
        updateStats();
        checkAchievements();
    }
    
    function updateShop() {
        const container = document.getElementById('shopContainer');
        const marketInfo = document.getElementById('marketInfo');
        
        // Случайное изменение цен
        if (Math.random() < 0.3) {
            marketPrices.carrot = Math.max(3, 5 + Math.floor(Math.random() * 6 - 3));
            marketPrices.burger = Math.max(8, 12 + Math.floor(Math.random() * 8 - 4));
            marketPrices.cake = Math.max(15, 22 + Math.floor(Math.random() * 12 - 6));
        }
        
        // Шанс золотой еды
        if (!goldenFoodActive && Math.random() < 0.05) {
            goldenFoodActive = true;
            goldenFoodPrice = 30 + Math.floor(Math.random() * 20);
            showFloatingText('🌟 ЗОЛОТАЯ ЕДА!', '#ffd700');
        }
        
        let html = `
            <button class="food-btn" onclick="buyFood('carrot')">🥕 ${marketPrices.carrot}🪙 (+3%)</button>
            <button class="food-btn" onclick="buyFood('burger')">🍔 ${marketPrices.burger}🪙 (+8%)</button>
            <button class="food-btn" onclick="buyFood('cake')">🎂 ${marketPrices.cake}🪙 (+15%)</button>
        `;
        
        if (goldenFoodActive) {
            html += `<button class="food-btn golden-food" onclick="buyFood('golden')">👑 ${goldenFoodPrice}🪙 (+40%)</button>`;
        }
        
        container.innerHTML = html;
        marketInfo.innerHTML = `📈 Цены меняются! | ${goldenFoodActive ? '🌟 ЗОЛОТАЯ ЕДА!' : ''}`;
    }
    
    function updateQuests() {
        const container = document.getElementById('questsList');
        let html = '';
        quests.forEach(q => {
            if (!q.completed) {
                html += `<div class="quest-item">
                    <span>${q.desc} (${q.progress}/${q.target})</span>
                    <span>${q.reward}🪙</span>
                </div>`;
            }
        });
        if (html === '') html = '🎉 Все задания выполнены!';
        container.innerHTML = html;
    }
    
    function updateStats() {
        document.getElementById('statsDisplay').innerHTML = `
            🖱️ Кликов: ${stats.clicks}<br>
            🍽️ Съедено: ${stats.foodEaten}<br>
            💰 Заработано: ${stats.moneyEarned}<br>
            🎰 Круток: ${stats.spins}<br>
            🏆 Престижей: ${prestigeLevel}
        `;
    }
    
    function checkAchievements() {
        // Разблокировка скинов
        if (!skins[1].unlocked && recordBelly >= 50) {
            skins[1].unlocked = true;
            showFloatingText('🔓 Скин ХОМЯК!', '#ff69b4');
        }
        if (!skins[2].unlocked && totalSpentMoney >= 200) {
            skins[2].unlocked = true;
            showFloatingText('🔓 Скин СВИН!', '#ff69b4');
        }
        if (!skins[3].unlocked && prestigeLevel >= 3) {
            skins[3].unlocked = true;
            showFloatingText('🔓 Скин БЕГЕМОТ!', '#ff69b4');
        }
        if (!skins[4].unlocked && stats.foodEaten >= 50) {
            skins[4].unlocked = true;
            showFloatingText('🔓 Скин КИТ!', '#ff69b4');
        }
    }

    // ---------- ИГРОВЫЕ ФУНКЦИИ ----------
    window.buyFood = function(type) {
        let price = type === 'golden' ? goldenFoodPrice : marketPrices[type];
        
        if (money < price) {
            showFloatingText('❌ Мало денег!', '#ff6b6b');
            return;
        }
        
        money -= price;
        totalSpentMoney += price;
        foodInventory[type] += 1;
        stats.clicks++;
        
        // Квест: покупка еды
        quests[0].progress++;
        if (quests[0].progress >= quests[0].target && !quests[0].completed) {
            completeQuest(0);
        }
        
        if (type === 'golden') {
            goldenFoodActive = false;
            showFloatingText('🌟 +1 ЗОЛОТАЯ ЕДА!', '#ffd700');
        } else {
            showFloatingText(`+1 ${type === 'carrot' ? '🥕' : type === 'burger' ? '🍔' : '🎂'}`, '#90ee90');
        }
        
        updateUI();
    };
    
    window.feed = function() {
        const types = ['golden', 'cake', 'burger', 'carrot'];
        let fedType = null;
        
        for (let type of types) {
            if (foodInventory[type] > 0) {
                fedType = type;
                break;
            }
        }
        
        if (!fedType) {
            showFloatingText('😢 Нет еды!', '#ff6b6b');
            return;
        }
        
        foodInventory[fedType] -= 1;
        let gain = FOOD_DATA[fedType].gain;
        
        // Бустеры и престиж
        gain = Math.floor(gain * (1 + prestigeBonusPercent / 100) * boosters.foodMulti);
        
        // Комбо бонус
        if (feedCombo >= 5) gain += Math.floor(feedCombo / 5);
        
        // Крит
        if (Math.random() < 0.15) {
            gain *= 2;
            showFloatingText(`💥 КРИТ! +${gain}%`, '#ffd700');
        } else {
            showFloatingText(`+${gain}%`, '#ffa500');
        }
        
        belly = Math.min(belly + gain, 100);
        feedCombo++;
        stats.foodEaten++;
        
        // Квест: кормёжка
        quests[2].progress++;
        if (quests[2].progress >= quests[2].target && !quests[2].completed) {
            completeQuest(2);
        }
        
        // Квест: сытость 50%
        if (belly >= 50 && !quests[1].completed) {
            completeQuest(1);
        }
        
        // Комбо таймер
        clearTimeout(window.comboTimer);
        window.comboTimer = setTimeout(() => {
            if (feedCombo > 0) {
                document.getElementById('messageArea').textContent = '😢 Комбо сброшено!';
                feedCombo = 0;
                updateUI();
            }
        }, 5000);
        
        if (belly >= 100) {
            document.getElementById('messageArea').innerHTML = '💥 ЖИВОТ ЛОПНУЛ! ЖМИ ПРОДАТЬ ЖИР 💥';
        }
        
        updateUI();
    };
    
    function completeQuest(index) {
        quests[index].completed = true;
        money += quests[index].reward;
        stats.moneyEarned += quests[index].reward;
        showFloatingText(`✅ Задание +${quests[index].reward}🪙!`, '#90ee90');
        updateUI();
    }
    
    window.sellFat = function() {
        const refund = Math.floor(totalSpentMoney * 0.05);
        money += refund;
        stats.moneyEarned += refund;
        
        if (totalSpentMoney > 0 || belly > 0) {
            prestigeLevel++;
            prestigeBonusPercent += 5;
        }
        
        // Сброс
        foodInventory = { carrot: 0, burger: 0, cake: 0, golden: 0 };
        belly = 0;
        feedCombo = 0;
        goldenFoodActive = false;
        
        // Сброс квестов
        quests = quests.map(q => ({ ...q, progress: 0, completed: false }));
        
        if (autoFeedActive) {
            clearInterval(autoFeedInterval);
            autoFeedActive = false;
        }
        
        money = Math.max(money, 40 + prestigeLevel * 5);
        showFloatingText(`💰 +${refund}🪙 кэшбек! Престиж ${prestigeLevel}!`, '#ffd700');
        updateUI();
    };
    
    window.toggleAutoFeed = function() {
        if (autoFeedActive) {
            clearInterval(autoFeedInterval);
            autoFeedActive = false;
        } else {
            if (money < 50) {
                showFloatingText('❌ Нужно 50🪙!', '#ff6b6b');
                return;
            }
            money -= 50;
            totalSpentMoney += 50;
            autoFeedActive = true;
            autoFeedInterval = setInterval(() => {
                if (getTotalFood() > 0) {
                    window.feed();
                } else {
                    clearInterval(autoFeedInterval);
                    autoFeedActive = false;
                    updateUI();
                }
            }, 2000);
        }
        updateUI();
    };
    
    window.spinRoulette = function() {
        if (rouletteCooldown > Date.now()) {
            showFloatingText('⏳ Подожди!', '#ff6b6b');
            return;
        }
        if (money < 30) {
            showFloatingText('❌ Нужно 30🪙!', '#ff6b6b');
            return;
        }
        
        money -= 30;
        totalSpentMoney += 30;
        stats.spins++;
        rouletteCooldown = Date.now() + 30000;
        
        const rewards = [
            { text: '🎉 50🪙', action: () => { money += 50; stats.moneyEarned += 50; } },
            { text: '🥕 3 морковки', action: () => { foodInventory.carrot += 3; } },
            { text: '🍔 2 бургера', action: () => { foodInventory.burger += 2; } },
            { text: '🎂 1 торт', action: () => { foodInventory.cake += 1; } },
            { text: '⚡ x2 сытость 30с', action: () => { boosters.foodMulti = 2; boosters.activeUntil = Date.now() + 30000; } },
            { text: '💸 x2 монеты 30с', action: () => { boosters.moneyMulti = 2; boosters.activeUntil = Date.now() + 30000; } },
            { text: '👑 Золотая еда', action: () => { goldenFoodActive = true; } },
            { text: '💥 Джекпот 200🪙', action: () => { money += 200; stats.moneyEarned += 200; } }
        ];
        
        const reward = rewards[Math.floor(Math.random() * rewards.length)];
        document.getElementById('rouletteResult').textContent = reward.text;
        reward.action();
        showFloatingText(reward.text, '#ffd700');
        updateUI();
    };
    
    window.claimDailyBonus = function() {
        const today = new Date().toDateString();
        if (lastDailyBonus === today) {
            showFloatingText('⏳ Уже получено!', '#ff6b6b');
            return;
        }
        lastDailyBonus = today;
        const bonus = 50 + prestigeLevel * 10;
        money += bonus;
        stats.moneyEarned += bonus;
        showFloatingText(`🎁 +${bonus}🪙!`, '#ffd700');
        updateUI();
    };
    
    window.openTab = function(tabName) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById('tab' + tabName.charAt(0).toUpperCase() + tabName.slice(1)).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        if (tabName === 'skins') {
            renderSkins();
        }
    };
    
    function renderSkins() {
        const container = document.getElementById('skinSelector');
        let html = '';
        skins.forEach((skin, i) => {
            html += `<div class="skin-btn ${skin.unlocked ? 'unlocked' : ''} ${i === currentSkin ? 'selected' : ''}" 
                onclick="selectSkin(${i})">${skin.emoji}</div>`;
        });
        container.innerHTML = html;
    }
    
    window.selectSkin = function(index) {
        if (!skins[index].unlocked) {
            showFloatingText('🔒 Скин заблокирован!', '#ff6b6b');
            return;
        }
        currentSkin = index;
        updateUI();
        renderSkins();
        openTab('shop');
    };
    
    // Пассивный доход
    setInterval(() => {
        if (prestigeLevel > 0) {
            const income = Math.floor(prestigeLevel * 0.5) + 1;
            money += income;
            stats.moneyEarned += income;
            updateUI();
        }
    }, 5000);
    
    // Таймер рулетки
    setInterval(() => {
        if (rouletteCooldown > Date.now()) {
            const sec = Math.ceil((rouletteCooldown - Date.now()) / 1000);
            document.getElementById('rouletteTimer').textContent = `⏳ ${sec}с`;
        } else {
            document.getElementById('rouletteTimer').textContent = '✅ Готово!';
        }
    }, 1000);
    
    // Привязка событий
    document.getElementById('feedBtn').addEventListener('click', () => window.feed());
    document.getElementById('suslovEmoji').addEventListener('click', () => window.feed());
    document.getElementById('autoFeedBtn').addEventListener('click', window.toggleAutoFeed);
    document.getElementById('sellFatBtn').addEventListener('click', window.sellFat);
    
    updateUI();
    updateShop();
    
    // Экспорт функций в глобальную область
    window.buyFood = buyFood;
    window.feed = feed;
    window.sellFat = sellFat;
    window.toggleAutoFeed = toggleAutoFeed;
    window.spinRoulette = spinRoulette;
    window.claimDailyBonus = claimDailyBonus;
    window.openTab = openTab;
    window.selectSkin = selectSkin;
})();
</script>
</body>
</html>
