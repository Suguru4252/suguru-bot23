<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Rucoy Online - Админ панель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0c12;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            background: #1a2a1a;
        }
        
        .corner-buttons {
            position: fixed;
            z-index: 100;
            pointer-events: auto;
        }
        .top-left { top: 12px; left: 12px; display: flex; gap: 8px; }
        .top-right { top: 12px; right: 12px; display: flex; gap: 8px; }
        .bottom-left { bottom: 12px; left: 12px; display: flex; gap: 8px; }
        .bottom-right { bottom: 12px; right: 12px; display: flex; gap: 8px; }
        
        .mini-btn {
            background: rgba(44, 47, 74, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa55;
            color: #ffcc88;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            touch-action: manipulation;
            cursor: pointer;
            font-family: monospace;
            transition: 0.05s linear;
            text-align: center;
            min-width: 60px;
        }
        .mini-btn:active { transform: translateY(2px); background: rgba(64, 67, 94, 0.95); }
        .fight-mini { background: rgba(200, 80, 60, 0.95); border-color: #ff8866; color: white; }
        .skill-mini { background: rgba(106, 78, 158, 0.95); border-color: #c88eff; }
        .class-mini { background: rgba(60, 100, 80, 0.95); border-color: #88ffaa; }
        .super-mini { background: rgba(200, 100, 50, 0.95); border-color: #ffaa66; }
        .admin-btn {
            background: rgba(200, 50, 50, 0.95);
            border-color: #ff6666;
            color: #ffaa88;
            font-weight: bold;
        }
        
        .nickname-display {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 6px 16px;
            border-radius: 30px;
            color: #ffcc88;
            font-size: 13px;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            font-weight: bold;
            backdrop-filter: blur(4px);
            border: 1px solid #ffaa55;
        }
        .portal-progress {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 6px 16px;
            border-radius: 30px;
            color: #88ffaa;
            font-size: 11px;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            border: 1px solid #88ffaa;
        }
        
        .achievement-btn {
            position: fixed;
            bottom: 80px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #ffaa55;
            color: #ffcc88;
            font-size: 10px;
            padding: 5px 8px;
            border-radius: 20px;
            z-index: 100;
            cursor: pointer;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }
        
        @media (max-width: 700px) {
            .mini-btn { font-size: 10px; padding: 5px 8px; min-width: 48px; }
            .nickname-display { font-size: 10px; top: 8px; }
            .portal-progress { font-size: 9px; bottom: 8px; white-space: nowrap; }
            .achievement-btn { font-size: 8px; padding: 4px 6px; bottom: 70px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="corner-buttons top-left">
    </div>
    
    <div class="corner-buttons top-right">
        <button class="mini-btn" id="statsBtn">📊 СТАТ</button>
        <button class="mini-btn" id="invBtn">🎒 ИНВ</button>
        <button class="mini-btn" id="mapBtn">🗺️ КАРТА</button>
    </div>
    
    <div class="corner-buttons bottom-left">
        <button class="mini-btn" id="hpBtn">❤️ HP</button>
        <button class="mini-btn" id="mpBtn">💙 MP</button>
    </div>
    
    <div class="corner-buttons bottom-right">
        <button class="mini-btn fight-mini" id="attackBtn">⚔️ АТАКА</button>
        <button class="mini-btn skill-mini" id="skillBtn">✨ СКИЛЛ</button>
        <button class="mini-btn super-mini" id="superBtn">🌟 СУПЕР</button>
    </div>
    
    <div class="corner-buttons" style="bottom: 12px; right: 100px; display: flex; gap: 6px;">
        <button class="mini-btn class-mini" id="classWarriorBtn">⚔️ МЕЧ</button>
        <button class="mini-btn class-mini" id="classArcherBtn">🏹 ЛУК</button>
        <button class="mini-btn class-mini" id="classMageBtn">🔮 МАГ</button>
    </div>
    
    <button class="achievement-btn" id="achievBtn">🏆 АЧИВКИ</button>
    <button class="achievement-btn admin-btn" id="adminBtn" style="bottom: 120px; display: none;">👑 АДМИН</button>
    
    <div class="nickname-display" id="nicknameDisplay"></div>
    <div class="portal-progress" id="portalProgress"></div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ========== АДМИН ПАНЕЛЬ ==========
        let isAdmin = false;
        let showAdminPanel = false;
        let adminPassword = "SuguruK52";
        let adminNickname = "Suguru";
        
        function checkAdmin(nickname) {
            return nickname === adminNickname;
        }
        
        function showAdminLoginModal() {
            return new Promise((resolve) => {
                const modal = document.createElement('div');
                modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:300;display:flex;align-items:center;justify-content:center;';
                modal.innerHTML = `
                    <div style="background:linear-gradient(135deg, #2a1a1a, #1a0a0a);padding:30px;border-radius:20px;text-align:center;border:2px solid #ff5555;max-width:90%;width:320px;">
                        <h2 style="color:#ff8888;margin-bottom:20px;">👑 АДМИН ПАНЕЛЬ 👑</h2>
                        <p style="color:#aa8866;margin-bottom:15px;">Введите пароль администратора</p>
                        <input type="password" id="adminPassInput" placeholder="Пароль" style="width:100%;padding:12px;font-size:16px;background:#1a0e0e;border:2px solid #ff5555;color:#ff8888;border-radius:10px;margin-bottom:20px;font-family:monospace;text-align:center;outline:none;">
                        <button id="adminLoginBtn" style="background:#ff5555;color:#1a0a0a;border:none;padding:10px 20px;font-size:16px;font-weight:bold;border-radius:10px;cursor:pointer;font-family:monospace;">ВОЙТИ</button>
                        <button id="adminCancelBtn" style="background:#333;color:#aaa;border:none;padding:10px 20px;font-size:16px;margin-left:10px;border-radius:10px;cursor:pointer;">ОТМЕНА</button>
                    </div>
                `;
                document.body.appendChild(modal);
                const input = modal.querySelector('#adminPassInput');
                const loginBtn = modal.querySelector('#adminLoginBtn');
                const cancelBtn = modal.querySelector('#adminCancelBtn');
                
                loginBtn.onclick = () => {
                    let pass = input.value.trim();
                    if(pass === adminPassword) {
                        isAdmin = true;
                        document.getElementById('adminBtn').style.display = 'block';
                        addMsg(`👑 АДМИН РЕЖИМ АКТИВИРОВАН! 👑`);
                        modal.remove();
                        resolve(true);
                    } else {
                        addMsg(`❌ Неверный пароль!`, true);
                        modal.remove();
                        resolve(false);
                    }
                };
                cancelBtn.onclick = () => {
                    modal.remove();
                    resolve(false);
                };
                input.onkeypress = (e) => { if(e.key === 'Enter') loginBtn.onclick(); };
                input.focus();
            });
        }
        
        function drawAdminPanel() {
            let w = Math.min(480, canvasWidth - 40);
            let h = Math.min(550, canvasHeight - 40);
            let x = canvasWidth/2 - w/2, y = canvasHeight/2 - h/2;
            
            ctx.fillStyle = "#1a0a0aee";
            ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = "#ff5555";
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, w, h);
            
            ctx.fillStyle = "#ff8888";
            ctx.font = "bold 20px monospace";
            ctx.fillText("👑 АДМИН ПАНЕЛЬ", x+20, y+35);
            
            ctx.fillStyle = "#ff5555";
            ctx.fillRect(x+w-40, y+15, 30, 30);
            ctx.fillStyle = "#ffcc88";
            ctx.font = "24px monospace";
            ctx.fillText("✕", x+w-32, y+40);
            
            ctx.fillStyle = "#ff8888";
            ctx.font = "bold 14px monospace";
            ctx.fillText(`👤 Админ: ${playerNickname}`, x+20, y+70);
            
            ctx.fillStyle = "#ffaa66";
            ctx.fillRect(x+15, y+85, w-30, 2);
            
            let fields = [
                { label: "💰 Золото:", value: player.gold, min: 0, max: 9999999, step: 1000, id: "gold" },
                { label: "⭐ Уровень:", value: player.level, min: 1, max: 500, step: 1, id: "level" },
                { label: "✨ Опыт:", value: player.exp, min: 0, max: 9999999, step: 1000, id: "exp" },
                { label: "❤️ HP:", value: player.hp, min: 1, max: player.maxHp, step: 100, id: "hp" },
                { label: "💙 MP:", value: player.mp, min: 1, max: player.maxMp, step: 100, id: "mp" },
                { label: "👾 Убито мобов:", value: stats.mobsKilled, min: 0, max: 999999, step: 10, id: "kills" },
                { label: "⚔️ Нанесено урона:", value: stats.totalDamage, min: 0, max: 9999999, step: 1000, id: "damage" },
                { label: "🛡️ Получено урона:", value: stats.totalDamageTaken, min: 0, max: 9999999, step: 1000, id: "damageTaken" },
                { label: "💰 Всего золота:", value: stats.totalGold, min: 0, max: 9999999, step: 1000, id: "totalGold" },
                { label: "🌍 Прогресс портала:", value: mobsKilledInWorld, min: 0, max: MOBS_NEEDED_FOR_PORTAL, step: 10, id: "portal" },
                { label: "👑 Убито боссов:", value: bossKillCount, min: 0, max: 9999, step: 1, id: "bossKills" }
            ];
            
            ctx.save();
            ctx.beginPath();
            ctx.rect(x+10, y+100, w-20, h-140);
            ctx.clip();
            
            let startY = y + 110;
            let lineH = 42;
            let col1X = x + 20;
            let col2X = x + w - 140;
            
            for(let i = 0; i < fields.length; i++) {
                let f = fields[i];
                let itemY = startY + i * lineH;
                if(itemY > y + h - 50) break;
                
                ctx.fillStyle = "#ffaa88";
                ctx.font = "11px monospace";
                ctx.fillText(f.label, col1X, itemY + 12);
                
                ctx.fillStyle = "#88ffaa";
                ctx.font = "bold 12px monospace";
                ctx.fillText(f.value, col1X + 100, itemY + 12);
                
                // Кнопки + и -
                ctx.fillStyle = "#ff5555";
                ctx.fillRect(col2X, itemY, 35, 25);
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 16px monospace";
                ctx.fillText("-", col2X + 12, itemY + 18);
                
                ctx.fillStyle = "#55ff55";
                ctx.fillRect(col2X + 45, itemY, 35, 25);
                ctx.fillStyle = "#ffffff";
                ctx.fillText("+", col2X + 57, itemY + 18);
                
                // Поле ввода значения
                ctx.fillStyle = "#2a2a2a";
                ctx.fillRect(col2X + 90, itemY, 70, 25);
                ctx.fillStyle = "#ffcc88";
                ctx.font = "10px monospace";
                ctx.fillText("ввести", col2X + 105, itemY + 17);
                
                // Сохраняем координаты для кликов
                fields[i].bounds = {
                    minus: { x: col2X, y: itemY, w: 35, h: 25 },
                    plus: { x: col2X + 45, y: itemY, w: 35, h: 25 },
                    input: { x: col2X + 90, y: itemY, w: 70, h: 25 }
                };
            }
            ctx.restore();
            
            // Кнопки быстрого действия
            let btnY = y + h - 70;
            let btnW = 100;
            let btnH = 35;
            
            ctx.fillStyle = "#ffaa44";
            ctx.fillRect(x+20, btnY, btnW, btnH);
            ctx.fillStyle = "#1a1a1a";
            ctx.font = "bold 10px monospace";
            ctx.fillText("ВСЕ 100 УР", x+35, btnY+22);
            
            ctx.fillStyle = "#44ffaa";
            ctx.fillRect(x+130, btnY, btnW, btnH);
            ctx.fillText("ВСЕ МАКС", x+145, btnY+22);
            
            ctx.fillStyle = "#ffaa44";
            ctx.fillRect(x+240, btnY, btnW, btnH);
            ctx.fillText("СБРОСИТЬ", x+260, btnY+22);
            
            ctx.fillStyle = "#aa88ff";
            ctx.fillRect(x+350, btnY, btnW, btnH);
            ctx.fillText("СОХРАНИТЬ", x+365, btnY+22);
            
            // Сохраняем кнопки
            window.adminButtons = {
                all100: { x: x+20, y: btnY, w: btnW, h: btnH },
                allMax: { x: x+130, y: btnY, w: btnW, h: btnH },
                reset: { x: x+240, y: btnY, w: btnW, h: btnH },
                save: { x: x+350, y: btnY, w: btnW, h: btnH }
            };
            
            ctx.fillStyle = "#ff8888";
            ctx.font = "9px monospace";
            ctx.fillText("⚠️ ВНИМАНИЕ: Изменения применяются сразу!", x+20, y+h-20);
        }
        
        function handleAdminPanelClick(mx, my) {
            let w = Math.min(480, canvasWidth - 40);
            let h = Math.min(550, canvasHeight - 40);
            let x = canvasWidth/2 - w/2, y = canvasHeight/2 - h/2;
            
            // Закрытие
            if(mx > x+w-40 && mx < x+w-10 && my > y+15 && my < y+45) {
                showAdminPanel = false;
                return true;
            }
            
            let fields = [
                { id: "gold", setter: (v) => { player.gold = Math.min(9999999, Math.max(0, v)); stats.totalGold = Math.max(stats.totalGold, player.gold); } },
                { id: "level", setter: (v) => { 
                    player.level = Math.min(500, Math.max(1, v));
                    updateStatsFromLevel();
                    player.hp = player.maxHp;
                    player.mp = player.maxMp;
                    checkAchievements();
                } },
                { id: "exp", setter: (v) => { player.exp = Math.min(9999999, Math.max(0, v)); checkLevelUp(); } },
                { id: "hp", setter: (v) => { player.hp = Math.min(player.maxHp, Math.max(1, v)); } },
                { id: "mp", setter: (v) => { player.mp = Math.min(player.maxMp, Math.max(1, v)); } },
                { id: "kills", setter: (v) => { stats.mobsKilled = Math.min(999999, Math.max(0, v)); checkAchievements(); } },
                { id: "damage", setter: (v) => { stats.totalDamage = Math.min(9999999, Math.max(0, v)); } },
                { id: "damageTaken", setter: (v) => { stats.totalDamageTaken = Math.min(9999999, Math.max(0, v)); } },
                { id: "totalGold", setter: (v) => { stats.totalGold = Math.min(9999999, Math.max(0, v)); player.gold = Math.min(player.gold, stats.totalGold); } },
                { id: "portal", setter: (v) => { mobsKilledInWorld = Math.min(MOBS_NEEDED_FOR_PORTAL, Math.max(0, v)); updatePortalStatus(); } },
                { id: "bossKills", setter: (v) => { bossKillCount = Math.min(9999, Math.max(0, v)); checkAchievements(); } }
            ];
            
            let startY = y + 110;
            let lineH = 42;
            let col2X = x + w - 140;
            
            for(let i = 0; i < fields.length; i++) {
                let f = fields[i];
                let itemY = startY + i * lineH;
                if(itemY > y + h - 50) break;
                
                let minusBounds = { x: col2X, y: itemY, w: 35, h: 25 };
                let plusBounds = { x: col2X + 45, y: itemY, w: 35, h: 25 };
                let inputBounds = { x: col2X + 90, y: itemY, w: 70, h: 25 };
                
                if(mx > minusBounds.x && mx < minusBounds.x + minusBounds.w && my > minusBounds.y && my < minusBounds.y + minusBounds.h) {
                    let currentVal = getFieldValue(f.id);
                    let step = getFieldStep(f.id);
                    f.setter(currentVal - step);
                    addMsg(`🔧 Изменено: ${f.id} -> ${getFieldValue(f.id)}`);
                    saveGame();
                    return true;
                }
                if(mx > plusBounds.x && mx < plusBounds.x + plusBounds.w && my > plusBounds.y && my < plusBounds.y + plusBounds.h) {
                    let currentVal = getFieldValue(f.id);
                    let step = getFieldStep(f.id);
                    f.setter(currentVal + step);
                    addMsg(`🔧 Изменено: ${f.id} -> ${getFieldValue(f.id)}`);
                    saveGame();
                    return true;
                }
                if(mx > inputBounds.x && mx < inputBounds.x + inputBounds.w && my > inputBounds.y && my < inputBounds.y + inputBounds.h) {
                    showValueInput(f.id, f.setter);
                    return true;
                }
            }
            
            // Кнопки быстрого действия
            if(window.adminButtons) {
                if(mx > window.adminButtons.all100.x && mx < window.adminButtons.all100.x + window.adminButtons.all100.w &&
                   my > window.adminButtons.all100.y && my < window.adminButtons.all100.y + window.adminButtons.all100.h) {
                    // Всё на 100 уровень
                    player.level = 100;
                    updateStatsFromLevel();
                    player.hp = player.maxHp;
                    player.mp = player.maxMp;
                    player.exp = 0;
                    player.gold = 50000;
                    stats.mobsKilled = 500;
                    stats.totalGold = 50000;
                    stats.totalDamage = 100000;
                    bossKillCount = 10;
                    mobsKilledInWorld = MOBS_NEEDED_FOR_PORTAL - 50;
                    checkAchievements();
                    updatePortalStatus();
                    addMsg(`👑 Установлен уровень 100 и всё соответствующее!`);
                    saveGame();
                    return true;
                }
                if(mx > window.adminButtons.allMax.x && mx < window.adminButtons.allMax.x + window.adminButtons.allMax.w &&
                   my > window.adminButtons.allMax.y && my < window.adminButtons.allMax.y + window.adminButtons.allMax.h) {
                    // Всё максимум
                    player.level = 500;
                    updateStatsFromLevel();
                    player.hp = player.maxHp;
                    player.mp = player.maxMp;
                    player.exp = 0;
                    player.gold = 9999999;
                    stats.mobsKilled = 999999;
                    stats.totalGold = 9999999;
                    stats.totalDamage = 9999999;
                    bossKillCount = 9999;
                    mobsKilledInWorld = MOBS_NEEDED_FOR_PORTAL;
                    checkAchievements();
                    updatePortalStatus();
                    addMsg(`👑 Установлены максимальные значения!`);
                    saveGame();
                    return true;
                }
                if(mx > window.adminButtons.reset.x && mx < window.adminButtons.reset.x + window.adminButtons.reset.w &&
                   my > window.adminButtons.reset.y && my < window.adminButtons.reset.y + window.adminButtons.reset.h) {
                    // Сброс (кроме ника)
                    player.level = 1;
                    player.exp = 0;
                    player.hp = 380;
                    player.mp = 90;
                    player.gold = 450;
                    stats.mobsKilled = 0;
                    stats.totalGold = 0;
                    stats.totalDamage = 0;
                    stats.totalDamageTaken = 0;
                    bossKillCount = 0;
                    mobsKilledInWorld = 0;
                    updateStatsFromLevel();
                    updatePortalStatus();
                    checkAchievements();
                    addMsg(`🔄 Все значения сброшены до начальных!`);
                    saveGame();
                    return true;
                }
                if(mx > window.adminButtons.save.x && mx < window.adminButtons.save.x + window.adminButtons.save.w &&
                   my > window.adminButtons.save.y && my < window.adminButtons.save.y + window.adminButtons.save.h) {
                    saveGame();
                    addMsg(`💾 Игра сохранена!`);
                    return true;
                }
            }
            return false;
        }
        
        function getFieldValue(id) {
            switch(id) {
                case "gold": return player.gold;
                case "level": return player.level;
                case "exp": return player.exp;
                case "hp": return player.hp;
                case "mp": return player.mp;
                case "kills": return stats.mobsKilled;
                case "damage": return stats.totalDamage;
                case "damageTaken": return stats.totalDamageTaken;
                case "totalGold": return stats.totalGold;
                case "portal": return mobsKilledInWorld;
                case "bossKills": return bossKillCount;
                default: return 0;
            }
        }
        
        function getFieldStep(id) {
            switch(id) {
                case "gold": return 1000;
                case "level": return 1;
                case "exp": return 1000;
                case "hp": return 100;
                case "mp": return 100;
                case "kills": return 10;
                case "damage": return 1000;
                case "damageTaken": return 1000;
                case "totalGold": return 1000;
                case "portal": return 10;
                case "bossKills": return 1;
                default: return 1;
            }
        }
        
        function showValueInput(fieldId, setter) {
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:400;display:flex;align-items:center;justify-content:center;';
            modal.innerHTML = `
                <div style="background:#2a1a1a;padding:25px;border-radius:15px;text-align:center;border:2px solid #ff5555;width:280px;">
                    <h3 style="color:#ff8888;margin-bottom:15px;">Введите значение</h3>
                    <input type="number" id="valueInput" style="width:100%;padding:10px;font-size:16px;background:#1a0e0e;border:2px solid #ff5555;color:#ff8888;border-radius:8px;margin-bottom:15px;font-family:monospace;text-align:center;">
                    <button id="confirmBtn" style="background:#ff5555;color:white;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;">Установить</button>
                    <button id="cancelBtn" style="background:#333;color:#aaa;border:none;padding:8px 20px;margin-left:10px;border-radius:8px;cursor:pointer;">Отмена</button>
                </div>
            `;
            document.body.appendChild(modal);
            const input = modal.querySelector('#valueInput');
            const confirmBtn = modal.querySelector('#confirmBtn');
            const cancelBtn = modal.querySelector('#cancelBtn');

                if(dist<230 && !isInSafeZone(player.x,player.y)) {
                    let ang=Math.atan2(dy,dx), step=Math.min(m.speed,dist-48);
                    if(step>0) { let nx=m.x+Math.cos(ang)*step, ny=m.y+Math.sin(ang)*step; if(isWalkable(nx,ny,26) && !isInSafeZone(nx,ny)) { m.x=nx; m.y=ny; } }
                    if(dist < m.attackRange + 15) {
                        if(m.attackTimer <= 0) {
                            let dmg=Math.max(3, m.dmg - Math.floor(player.defense/4));
                            player.hp -= dmg; stats.totalDamageTaken += dmg; m.attackTimer = 45;
                            addMsg(`💀 ${m.name} нанес ${dmg} урона!`, true); showDamage(m.x, m.y, dmg, true);
                            if(player.hp <= 0) {
                                player.hp = player.maxHp; player.mp = player.maxMp;
                                player.x = safeZone.x + safeZone.width/2; player.y = safeZone.y + safeZone.height/2;
                                player.targetX = null; player.targetY = null;
                                addMsg(`💀 ВОСКРЕШЕНИЕ!`, true); saveGame();

            if(e.type==="slash"){ctx.beginPath();ctx.moveTo(x-15,y-10);ctx.lineTo(x,y-25);ctx.lineTo(x+15,y-10);ctx.lineTo(x,y+5);ctx.fillStyle=`rgba(255,200,100,${0.5*life})`;ctx.fill();
            ctx.beginPath();ctx.moveTo(x-10,y-5);ctx.lineTo(x,y-18);ctx.lineTo(x+10,y-5);ctx.fillStyle=`rgba(255,255,150,${0.7*life})`;ctx.fill();}
            else if(e.type==="arrow"){ctx.beginPath();ctx.moveTo(x-20,y);ctx.lineTo(x,y-12);ctx.lineTo(x+5,y);ctx.lineTo(x,y+12);ctx.fillStyle=`rgba(200,200,100,${0.6*life})`;ctx.fill();}
            else if(e.type==="magic"){ctx.beginPath();ctx.arc(x,y,15*(1-life),0,Math.PI*2);ctx.fillStyle=`rgba(100,100,255,${0.5*life})`;ctx.fill();}
            else if(e.type==="skill"){for(let a=0;a<3;a++){let angle=(Date.now()/100+a)*Math.PI*2;ctx.beginPath();ctx.arc(x+Math.cos(angle)*12,y+Math.sin(angle)*12,6,0,Math.PI*2);ctx.fillStyle=`rgba(255,100,100,${0.6*life})`;ctx.fill();}}
            else if(e.type==="explosion"){ctx.beginPath();ctx.arc(x,y,25*(1-life),0,Math.PI*2);ctx.fillStyle=`rgba(255,100,50,${0.5*life})`;ctx.fill();}
            e.life--;if(e.life<=0)attackEffects.splice(i,1),i--;}
        }
        
        function drawWorld(){
            let w=WORLDS[currentWorld];
            for(let i=0;i<WORLD_WIDTH/52+10;i++)for(let j=0;j<WORLD_HEIGHT/52+10;j++){let x=i*52-cameraX,y=j*52-cameraY;
            if(x>-60&&x<canvasWidth+60&&y>-60&&y<canvasHeight+60){let grad=ctx.createLinearGradient(x,y,x+52,y+52);grad.addColorStop(0,((i+j)%2===0)?w.bgColor1:w.bgColor2);grad.addColorStop(1,((i+j)%2===0)?w.bgColor2:w.bgColor1);ctx.fillStyle=grad;ctx.fillRect(x,y,51,51);}}
            for(let o of obstacles){let x=o.x-cameraX,y=o.y-cameraY;
            if(x>-120&&x<canvasWidth+120&&y>-120&&y<canvasHeight+120){
                if(o.type==='tree'){ctx.fillStyle="#3c9e3c";ctx.fillRect(x-18,y-32,36,58);ctx.fillStyle="#8b5a2b";ctx.fillRect(x-10,y-8,20,32);ctx.fillStyle="#5aac3a";ctx.beginPath();ctx.ellipse(x,y-42,26,30,0,0,Math.PI*2);ctx.fill();}
                else if(o.type==='mountain'){ctx.fillStyle="#6e6e7a";ctx.beginPath();ctx.moveTo(x,y-45);ctx.lineTo(x-40,y+15);ctx.lineTo(x+40,y+15);ctx.fill();}
                else if(o.type==='rock'){ctx.fillStyle="#7a6a5a";ctx.beginPath();ctx.ellipse(x,y,18,14,0,0,Math.PI*2);ctx.fill();}
                else if(o.type==='fence'){ctx.fillStyle="#c99e6f";ctx.fillRect(x-10,y-14,20,32);for(let i=0;i<3;i++)ctx.fillRect(x-6+i*6,y-22,3,14);}
            }}
            let szX=safeZone.x-cameraX,szY=safeZone.y-cameraY;ctx.fillStyle="#88aa66aa";ctx.fillRect(szX,szY,safeZone.width,safeZone.height);
            if(portalActive&&currentWorld==="forest"){let px=portalX-cameraX,py=portalY-cameraY;ctx.fillStyle="#aa44ffaa";ctx.beginPath();ctx.arc(px,py,28,0,Math.PI*2);ctx.fill();ctx.fillStyle="#ff88ff";ctx.beginPath();ctx.arc(px,py,20,0,Math.PI*2);ctx.fill();ctx.font="18px monospace";ctx.fillStyle="#ffffff";ctx.fillText("🌀",px-10,py+6);}
            let npcX=shopNPC.x-cameraX,npcY=shopNPC.y-cameraY;ctx.fillStyle="#c99e6f";ctx.fillRect(npcX-16,npcY-22,32,40);ctx.fillStyle="#e8c28a";ctx.fillRect(npcX-10,npcY-12,20,26);ctx.fillStyle="#000";ctx.fillRect(npcX-7,npcY-8,4,4);ctx.fillRect(npcX+3,npcY-8,4,4);ctx.font="20px monospace";ctx.fillStyle="#ffdd99";ctx.fillText("🏪",npcX-12,npcY+2);
            for(let g of gates){let gx=g.x-cameraX,gy=g.y-cameraY;ctx.fillStyle="#c9a87a";ctx.fillRect(gx,gy,g.width,g.height);}
        }
        
        function drawMob(m){let x=m.x-cameraX,y=m.y-cameraY;if(x<-80||x>canvasWidth+80)return;ctx.shadowBlur=3;m.drawFunc(x,y);ctx.shadowBlur=0;
        let percent=m.hp/m.maxHp;ctx.fillStyle="#a33";ctx.fillRect(x-20,y-28,40,5);ctx.fillStyle=percent>0.6?"#4f6":(percent>0.3?"#fa4":"#f44");ctx.fillRect(x-20,y-28,40*percent,5);
        ctx.font="8px monospace";ctx.fillStyle="#ffffaa";ctx.fillText(m.name,x-18,y-35);}
        
        function drawUI(){
            let c=CLASSES[player.classType],fs=Math.max(10,Math.min(14,canvasWidth/70));
            ctx.fillStyle="#000000aa";ctx.fillRect(8,8,200,70);
            ctx.fillStyle="#c55";ctx.fillRect(14,14,180,15);ctx.fillStyle="#f75";ctx.fillRect(14,14,180*(player.hp/player.maxHp),15);
            ctx.fillStyle="#58f";ctx.fillRect(14,35,180*(player.mp/player.maxMp),13);
            ctx.fillStyle="#fff";ctx.font=`bold ${fs}px monospace`;ctx.fillText(`❤️ ${Math.floor(player.hp)}/${player.maxHp}`,18,28);ctx.fillText(`💙 ${Math.floor(player.mp)}/${player.maxMp}`,18,47);
            ctx.fillStyle="#fd9";ctx.font=`bold ${fs}px monospace`;ctx.fillText(`${c.icon} ${c.name} Lv.${player.level}`,18,78);
            ctx.fillStyle="#000000aa";ctx.fillRect(8,85,200,12);ctx.fillStyle="#8af";ctx.fillRect(8,85,200*(player.exp/player.expToNext),12);
            ctx.fillStyle="#000000aa";ctx.fillRect(canvasWidth-140,8,130,55);ctx.fillStyle="#fc8";ctx.font=`bold ${fs}px monospace`;ctx.fillText(`💰 ${player.gold}`,canvasWidth-130,28);
            ctx.font=`${fs-2}px monospace`;ctx.fillText(`❤️ ${player.potionHp}  💙 ${player.potionMp}`,canvasWidth-130,48);
            for(let i=0;i<Math.min(3,messages.length);i++){let m=messages[i];ctx.fillStyle=m.isErr?"#f86c":"#edbc";ctx.font=`${fs-2}px monospace`;ctx.fillText(m.text.substring(0,32),12,canvasHeight-35-i*18);}
            if(selectedMob&&selectedMob.hp>0){let x=selectedMob.x-cameraX,y=selectedMob.y-cameraY;ctx.strokeStyle="#fa4";ctx.lineWidth=3;ctx.strokeRect(x-22,y-34,58,58);}
            if(player.targetX!==null&&player.targetY!==null){let tx=player.targetX-cameraX,ty=player.targetY-cameraY;ctx.fillStyle="#fc4a";ctx.beginPath();ctx.arc(tx,ty,12,0,Math.PI*2);ctx.fill();}
            for(let i=0;i<damageFloats.length;i++){let d=damageFloats[i],x=d.x-cameraX,y=d.y-cameraY;
            if(d.isExplosion){ctx.font="bold 26px monospace";ctx.fillStyle="#ff8844";ctx.fillText("💥",x-12,y-18);}
            else{ctx.font=`bold ${d.isPlayer?16:20}px monospace`;ctx.fillStyle=d.isPlayer?"#fa6":"#f84";ctx.fillText(`-${d.dmg}`,x-10,y-24);}d.life--;if(d.life<=0)damageFloats.splice(i,1),i--;}
            if(player.superCooldown>0){let p=player.superCooldown/180;ctx.fillStyle="#000000aa";ctx.fillRect(10,canvasHeight-55,65,12);ctx.fillStyle="#ffaa44";ctx.fillRect(10,canvasHeight-55,65*(1-p),12);ctx.fillStyle="#ffaa88";ctx.font="8px monospace";ctx.fillText(`🌟 ${Math.ceil(player.superCooldown/10)}с`,15,canvasHeight-43);}
            if(showMap)drawFullMap();
            if(shopOpen)drawShop();
            if(showInventory)drawInventory();
            if(showStatsWindow)drawStatsWindow();
            if(showAchievements)drawAchievementsWindow();
            if(isAdmin && showAdminPanel)drawAdminPanel();
            drawAchievementPopup();
            drawAttackEffects();
        }
        
        function handleWheel(e){
            if(shopOpen){let items=shopTab==="potions"?[1,2,3,4]:shopTab==="armor"?ALL_ARMOR.filter(a=>a.level<=player.level+10):ALL_WEAPONS.filter(w=>w.level<=player.level+10);
            let maxScroll=Math.max(0,items.length-shopItemsPerPage);shopScroll=Math.min(maxScroll,Math.max(0,shopScroll+(e.deltaY>0?1:-1)));e.preventDefault();}
            else if(showInventory){let avA=ALL_ARMOR.filter(a=>a.level<=player.level),avW=ALL_WEAPONS.filter(w=>w.level<=player.level);
            let maxScroll=Math.max(0,avA.length+avW.length-invItemsPerPage);invScroll=Math.min(maxScroll,Math.max(0,invScroll+(e.deltaY>0?1:-1)));e.preventDefault();}
            else if(showStatsWindow){let maxScroll=Math.max(0,9-statsItemsPerPage);statsScroll=Math.min(maxScroll,Math.max(0,statsScroll+(e.deltaY>0?1:-1)));e.preventDefault();}
        }
        
        canvas.addEventListener('wheel',handleWheel,{passive:false});
        
        function update(){
            updateMove();updateMobs();updateCamera();
            if(player.attackTimer>0)player.attackTimer--;
            if(player.superCooldown>0)player.superCooldown--;
            if(spawnTimer<=0){if(mobs.length<MAX_MOBS)for(let i=0;i<2;i++)spawnMob();spawnTimer=14;}else spawnTimer--;
            if(bossSpawnTimer<=0&&bosses.length===0&&player.level>=5){bossSpawnTimer=300+Math.random()*120;spawnBoss();}else bossSpawnTimer--;
            for(let i=0;i<messages.length;i++)if(messages[i].life)messages[i].life--;
            messages=messages.filter(m=>!m.life||m.life>0);
        }
        
        function getWorldClick(cx,cy){let rect=canvas.getBoundingClientRect(),sx=canvasWidth/rect.width,sy=canvasHeight/rect.height;return{x:(cx-rect.left)*sx+cameraX,y:(cy-rect.top)*sy+cameraY};}
        
        canvas.addEventListener('click',(e)=>{let w=getWorldClick(e.clientX,e.clientY);
            if(shopOpen){if(handleShopClick(e.clientX,e.clientY))return;}
            else if(showInventory){if(handleInventoryClick(e.clientX,e.clientY))return;}
            else if(showStatsWindow){if(handleStatsClick(e.clientX,e.clientY))return;}
            else if(showAchievements){if(handleAchievementsClick(e.clientX,e.clientY))return;}
            else if(isAdmin&&showAdminPanel){if(handleAdminPanelClick(e.clientX,e.clientY))return;}
            handleClick(w.x,w.y);
        });
        
        canvas.addEventListener('touchstart',(e)=>{e.preventDefault();let t=e.touches[0],w=getWorldClick(t.clientX,t.clientY);
            if(shopOpen){if(handleShopClick(t.clientX,t.clientY))return;}
            else if(showInventory){if(handleInventoryClick(t.clientX,t.clientY))return;}
            else if(showStatsWindow){if(handleStatsClick(t.clientX,t.clientY))return;}
            else if(showAchievements){if(handleAchievementsClick(t.clientX,t.clientY))return;}
            else if(isAdmin&&showAdminPanel){if(handleAdminPanelClick(t.clientX,t.clientY))return;}
            handleClick(w.x,w.y);
        });
        
        setInterval(()=>{if(selectedMob&&selectedMob.hp>0&&Math.hypot(player.x-selectedMob.x,player.y-selectedMob.y)<=player.attackRange+15)playerAttack();},1200);
        setInterval(()=>{if(playerNickname)saveGame();},30000);
        window.addEventListener('beforeunload',()=>{if(playerNickname)saveGame();});
        
        document.getElementById('attackBtn').onclick=()=>{if(selectedMob&&selectedMob.hp>0)playerAttack();else addMsg("🎯 Выберите цель",true);};
        document.getElementById('skillBtn').onclick=()=>useSkill();
        document.getElementById('superBtn').onclick=()=>useSuper();
        document.getElementById('hpBtn').onclick=()=>useHp();
        document.getElementById('mpBtn').onclick=()=>useMp();
        document.getElementById('statsBtn').onclick=()=>{showStatsWindow=!showStatsWindow;showInventory=false;showMap=false;showAchievements=false;if(isAdmin)showAdminPanel=false;statsScroll=0;};
        document.getElementById('invBtn').onclick=()=>{showInventory=!showInventory;showStatsWindow=false;showMap=false;showAchievements=false;if(isAdmin)showAdminPanel=false;invScroll=0;};
        document.getElementById('mapBtn').onclick=()=>{showMap=!showMap;showStatsWindow=false;showInventory=false;showAchievements=false;if(isAdmin)showAdminPanel=false;};
        document.getElementById('achievBtn').onclick=()=>{showAchievements=!showAchievements;showStatsWindow=false;showInventory=false;showMap=false;if(isAdmin)showAdminPanel=false;};
        document.getElementById('adminBtn').onclick=()=>{if(isAdmin)showAdminPanel=!showAdminPanel;else addMsg(`👑 Нет доступа!`,true);};
        document.getElementById('classWarriorBtn').onclick=()=>switchClass('warrior');
        document.getElementById('classArcherBtn').onclick=()=>switchClass('archer');
        document.getElementById('classMageBtn').onclick=()=>switchClass('mage');
        
        window.addEventListener('keydown',(e)=>{
            if(e.key==='1')useSuper();
            if(e.key==='2')useHp();
            if(e.key==='3')useMp();
            if(e.key==='s')useSkill();
            if(e.key==='r'||e.key==='R')switchClass();
            if(e.key==='7'||e.key==='m'||e.key==='M'){showMap=!showMap;showStatsWindow=false;showInventory=false;showAchievements=false;if(isAdmin)showAdminPanel=false;}
            if(e.key==='Escape'){showMap=false;showStatsWindow=false;showInventory=false;shopOpen=false;showAchievements=false;if(isAdmin)showAdminPanel=false;}
        });
        
        async function startGame(){
            await (async()=>{
                const lastNick=localStorage.getItem('rucoy_last_nickname');
                if(lastNick&&localStorage.getItem('rucoy_save_'+lastNick)){
                    playerNickname=lastNick;
                    loadGame(lastNick);
                    document.getElementById('nicknameDisplay').innerHTML=`👤 ${lastNick}`;
                    if(checkAdmin(lastNick)){
                        isAdmin=true;
                        document.getElementById('adminBtn').style.display='block';
                        addMsg(`👑 Добро пожаловать, Администратор ${lastNick}! 👑`);
                    }
                    return;
                }
                playerNickname=await showNicknameModal();
                document.getElementById('nicknameDisplay').innerHTML=`👤 ${playerNickname}`;
                if(!loadGame(playerNickname)){addMsg(`✨ Добро пожаловать, ${playerNickname}!`);}
                if(checkAdmin(playerNickname)){
                    isAdmin=true;
                    document.getElementById('adminBtn').style.display='block';
                    addMsg(`👑 Добро пожаловать, Администратор ${playerNickname}! 👑`);
                    const loginResult=await showAdminLoginModal();
                    if(!loginResult)isAdmin=false;
                }
            })();
            generateWorld();
            updateStatsFromLevel();
            if(player.hp<=0){player.hp=player.maxHp;player.mp=player.maxMp;}
            for(let i=0;i<12;i++)spawnMob();
            updatePortalStatus();
            addMsg("✨ Добро пожаловать в Rucoy Online!");
            addMsg("🏆 Достижения дают бонусы!");
            addMsg("👑 Боссы появляются каждые 3-5 минут!");
            addMsg("⚔️ R - смена класса | 1 - СУПЕР | 2 - HP | 3 - MP | S - СКИЛЛ");
            if(isAdmin)addMsg("👑 Админ панель: кнопка 👑 АДМИН внизу слева");
        }
        
        startGame();
        
        function render(){drawWorld();for(let m of mobs)drawMob(m);for(let b of bosses)drawBoss(b);drawRealisticPlayer(player.x-cameraX,player.y-cameraY,player.isMoving);drawUI();}
        function loop(){update();render();requestAnimationFrame(loop);}
        loop();
    })();
</script>
</body>
</html>
