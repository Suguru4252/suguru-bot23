<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Space Game Optimized</title>
<style>
  body { margin:0; overflow:hidden; background:#000; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;// ===== PERFORMANCE SETTINGS ===== const STAR_COUNT = 80; const MAX_PARTICLES = 40;

// ===== STARS (pre-generated) ===== const stars = Array.from({length: STAR_COUNT}, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 2, s: 0.2 + Math.random() * 0.8 }));

// ===== PLAYER ===== const player = { x: canvas.width / 2, y: canvas.height - 100, size: 20, speed: 6 };

// ===== BULLETS ===== const bullets = [];

// ===== ENEMIES ===== const enemies = []; let boss = null; let score = 0;

// ===== PARTICLES (pool system) ===== const particles = [];

function spawnParticle(x, y) { if (particles.length > MAX_PARTICLES) return; particles.push({ x, y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4, life: 30 }); }

// ===== INPUT ===== let touchX = player.x; canvas.addEventListener("touchmove", e => { touchX = e.touches[0].clientX; });

canvas.addEventListener("touchstart", e => { bullets.push({ x: player.x, y: player.y, vy: -8 }); });

// ===== GAME LOOP ===== function update() { // move player player.x += (touchX - player.x) * 0.15;

// bullets bullets.forEach(b => b.y += b.vy);

// enemies spawn if (Math.random() < 0.02) { enemies.push({ x: Math.random() * canvas.width, y: -20, size: 20, vy: 2 + Math.random() * 2, hp: 1 }); }

// boss spawn if (score > 150 && !boss) { boss = { x: canvas.width/2, y: 100, hp: 50, dir: 1 }; }

// update enemies enemies.forEach(e => e.y += e.vy);

// boss movement if (boss) { boss.x += boss.dir * 3; if (boss.x < 50 || boss.x > canvas.width - 50) boss.dir *= -1; }

// collisions bullets.forEach((b, bi) => { enemies.forEach((e, ei) => { if (Math.hypot(b.x - e.x, b.y - e.y) < 20) { spawnParticle(e.x, e.y); enemies.splice(ei, 1); bullets.splice(bi, 1); score += 10; } });

if (boss && Math.hypot(b.x - boss.x, b.y - boss.y) < 40) {
  boss.hp--;
  spawnParticle(boss.x, boss.y);
  bullets.splice(bi, 1);
  if (boss.hp <= 0) {
    boss = null;
    score += 100;
  }
}

});

// particles particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life--; if (p.life <= 0) particles.splice(i, 1); }); }

function draw() { ctx.clearRect(0,0,canvas.width,canvas.height);

// stars (cheap render) ctx.fillStyle = "white"; stars.forEach(s => { ctx.globalAlpha = 0.5 + Math.random() * 0.5; ctx.fillRect(s.x, s.y, s.r, s.r); }); ctx.globalAlpha = 1;

// player ctx.fillStyle = "cyan"; ctx.fillRect(player.x-10, player.y-10, 20, 20);

// bullets ctx.fillStyle = "yellow"; bullets.forEach(b => ctx.fillRect(b.x, b.y, 3, 8));

// enemies ctx.fillStyle = "red"; enemies.forEach(e => ctx.fillRect(e.x, e.y, e.size, e.size));

// boss if (boss) { ctx.fillStyle = "purple"; ctx.fillRect(boss.x-40, boss.y-40, 80, 80); }

// particles ctx.fillStyle = "orange"; particles.forEach(p => ctx.fillRect(p.x, p.y, 2, 2));

// score ctx.fillStyle = "white"; ctx.fillText("Score: " + score, 20, 30); }

function loop() { update(); draw(); requestAnimationFrame(loop); }

loop(); </script>

</body>
</html>
