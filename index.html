<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Солнечная система 3D | Изучение планет</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #000;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 12px 25px;
      border-radius: 50px;
      pointer-events: none;
      backdrop-filter: blur(10px);
      font-weight: 500;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2);
    }
    #controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      background: rgba(10, 10, 20, 0.75);
      backdrop-filter: blur(15px);
      padding: 15px 25px;
      border-radius: 60px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.25);
      z-index: 10;
    }
    .planet-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #ccc;
      padding: 10px 18px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      backdrop-filter: blur(5px);
      border: 1px solid transparent;
    }
    .planet-btn:hover {
      background: rgba(255,255,255,0.25);
      color: white;
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }
    .planet-btn.active {
      background: #ffaa00;
      color: #000;
      border-color: #ffcc80;
      box-shadow: 0 0 25px #ff9900aa;
      font-weight: bold;
    }
    #reset-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      margin-left: 15px;
      font-weight: bold;
    }
    .instruction {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 5px 20px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
      white-space: nowrap;
      pointer-events: none;
    }
    @media (max-width: 750px) {
      #controls {
        gap: 5px;
        padding: 10px 15px;
      }
      .planet-btn {
        padding: 8px 12px;
        font-size: 13px;
      }
      .instruction {
        bottom: 100px;
        font-size: 11px;
        white-space: normal;
        text-align: center;
        width: 90%;
      }
    }
  </style>
</head>
<body>
  <div id="info">🪐 СОЛНЕЧНАЯ СИСТЕМА</div>
  <div class="instruction">🖱️ Вращайте камеру | 📜 Прокрутка для зума | ✨ Нажмите на планету для фокуса</div>
  
  <div id="controls">
    <button class="planet-btn active" data-planet="all">🌌 ВСЕ</button>
    <button class="planet-btn" data-planet="sun">☀️ Солнце</button>
    <button class="planet-btn" data-planet="mercury">☿ Меркурий</button>
    <button class="planet-btn" data-planet="venus">♀ Венера</button>
    <button class="planet-btn" data-planet="earth">🌍 Земля</button>
    <button class="planet-btn" data-planet="mars">♂ Марс</button>
    <button class="planet-btn" data-planet="jupiter">♃ Юпитер</button>
    <button class="planet-btn" data-planet="saturn">♄ Сатурн</button>
    <button class="planet-btn" data-planet="uranus">⛢ Уран</button>
    <button class="planet-btn" data-planet="neptune">♆ Нептун</button>
    <button id="reset-btn" title="Сбросить вид">↺</button>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // --- Сцена ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    
    // Звёзды (два слоя)
    const starsGeo1 = new THREE.BufferGeometry();
    const starsPos1 = new Float32Array(2000 * 3);
    for (let i = 0; i < 2000 * 3; i += 3) {
      starsPos1[i] = (Math.random() - 0.5) * 600;
      starsPos1[i+1] = (Math.random() - 0.5) * 400;
      starsPos1[i+2] = (Math.random() - 0.5) * 500;
    }
    starsGeo1.setAttribute('position', new THREE.BufferAttribute(starsPos1, 3));
    const stars1 = new THREE.Points(starsGeo1, new THREE.PointsMaterial({color: 0xffffff, size: 0.25}));
    scene.add(stars1);
    
    const starsGeo2 = new THREE.BufferGeometry();
    const starsPos2 = new Float32Array(1000 * 3);
    for (let i = 0; i < 1000 * 3; i += 3) {
      starsPos2[i] = (Math.random() - 0.5) * 800;
      starsPos2[i+1] = (Math.random() - 0.5) * 500;
      starsPos2[i+2] = (Math.random() - 0.5) * 700;
    }
    starsGeo2.setAttribute('position', new THREE.BufferAttribute(starsPos2, 3));
    const stars2 = new THREE.Points(starsGeo2, new THREE.PointsMaterial({color: 0xaaccff, size: 0.3}));
    scene.add(stars2);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 1000);
    camera.position.set(0, 25, 45);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.8;
    controls.zoomSpeed = 1.5;
    controls.target.set(0, 0, 0);
    controls.maxDistance = 200;
    controls.minDistance = 3;
    controls.update();

    // --- Освещение ---
    const sunLight = new THREE.PointLight(0xfff5e6, 2, 0, 0);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);
    scene.add(new THREE.AmbientLight(0x111122));

    // --- Функция создания детальной текстуры (оптимизированная) ---
    function createPlanetTexture(type, baseColor) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      
      // Базовый градиент
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, baseColor);
      grad.addColorStop(0.5, baseColor);
      grad.addColorStop(1, baseColor);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Шум
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d = imageData.data;
      
      for (let y = 0; y < canvas.height; y++) {
        for (let x = 0; x < canvas.width; x++) {
          const i = (y * canvas.width + x) * 4;
          let noise = (Math.random() - 0.5) * 20;
          
          if (type === 'sun') {
            noise = (Math.random() - 0.5) * 40;
            if (Math.random() < 0.005) noise -= 60;
            if (Math.random() < 0.03) noise += 40;
          } else if (type === 'mercury') {
            if (Math.random() < 0.015) noise -= 40;
          } else if (type === 'venus') {
            if (Math.random() < 0.08) noise += 30;
          } else if (type === 'earth') {
            // Континенты
            if (y > 40 && y < 70 && x > 60 && x < 160) noise += 30;
            if (y > 80 && y < 130 && x > 180 && x < 220) noise += 25;
            if (Math.random() < 0.05) { d[i] += 60; d[i+1] += 60; d[i+2] += 60; }
          } else if (type === 'mars') {
            if (Math.random() < 0.008) noise -= 45;
            if (y > 100 && y < 115 && x > 40 && x < 200) noise -= 30;
          } else if (type === 'jupiter') {
            const band = y % 14;
            if (band < 6) noise -= 20;
            else noise += 10;
            // Красное пятно
            const dx = x - 150, dy = y - 60;
            if (dx*dx + dy*dy < 400) { d[i] += 50; d[i+1] += 15; }
          } else if (type === 'saturn') {
            const band = y % 12;
            if (band < 5) noise -= 10;
          }
          
          d[i] = Math.max(0, Math.min(255, d[i] + noise));
          d[i+1] = Math.max(0, Math.min(255, d[i+1] + noise));
          d[i+2] = Math.max(0, Math.min(255, d[i+2] + noise));
        }
      }
      ctx.putImageData(imageData, 0, 0);
      return new THREE.CanvasTexture(canvas);
    }

    // --- Данные планет ---
    const planetsData = [
      { name: 'Солнце', key: 'sun', color: '#ffaa00', size: 2.2, distance: 0, speed: 0, type: 'sun', emissive: '#ff6600' },
      { name: 'Меркурий', key: 'mercury', color: '#b0b0b0', size: 0.4, distance: 4.5, speed: 0.04, type: 'mercury' },
      { name: 'Венера', key: 'venus', color: '#e8cda0', size: 0.7, distance: 6.5, speed: 0.025, type: 'venus' },
      { name: 'Земля', key: 'earth', color: '#3366cc', size: 0.75, distance: 8.5, speed: 0.02, type: 'earth' },
      { name: 'Марс', key: 'mars', color: '#c1440e', size: 0.55, distance: 10.8, speed: 0.017, type: 'mars' },
      { name: 'Юпитер', key: 'jupiter', color: '#d4b896', size: 1.6, distance: 14.5, speed: 0.011, type: 'jupiter' },
      { name: 'Сатурн', key: 'saturn', color: '#ead8b8', size: 1.35, distance: 18.5, speed: 0.008, type: 'saturn', hasRings: true },
      { name: 'Уран', key: 'uranus', color: '#7ec8c8', size: 1.1, distance: 22.5, speed: 0.006, type: 'uranus' },
      { name: 'Нептун', key: 'neptune', color: '#4466cc', size: 1.05, distance: 26.5, speed: 0.005, type: 'neptune' }
    ];

    const planets = [];

    // Орбиты
    planetsData.forEach(p => {
      if (p.distance > 0) {
        const orbitGeo = new THREE.RingGeometry(p.distance - 0.02, p.distance + 0.02, 96);
        const orbit = new THREE.Mesh(orbitGeo, new THREE.MeshBasicMaterial({ 
          color: 0x334466, side: THREE.DoubleSide, transparent: true, opacity: 0.2 
        }));
        orbit.rotation.x = Math.PI / 2;
        scene.add(orbit);
      }
    });

    // Создание планет
    planetsData.forEach(data => {
      const texture = createPlanetTexture(data.type, data.color);
      const geometry = new THREE.SphereGeometry(data.size, 48, 48);
      
      const material = new THREE.MeshStandardMaterial({
        map: texture,
        roughness: data.key === 'sun' ? 0.5 : 0.75,
        metalness: 0.1,
        emissive: data.emissive ? new THREE.Color(data.emissive) : new THREE.Color(0x000000),
        emissiveIntensity: data.key === 'sun' ? 0.9 : 0
      });
      
      const planet = new THREE.Mesh(geometry, material);
      planet.castShadow = true;
      planet.receiveShadow = true;
      
      const angle = Math.random() * Math.PI * 2;
      planet.position.x = data.distance * Math.cos(angle);
      planet.position.z = data.distance * Math.sin(angle);
      
      planet.userData = {
        name: data.name,
        key: data.key,
        distance: data.distance,
        speed: data.speed,
        angle: angle,
        size: data.size,
        hasRings: data.hasRings || false
      };
      
      scene.add(planet);
      
      // Кольца Сатурна (два слоя)
      if (data.hasRings) {
        const ringGeo1 = new THREE.RingGeometry(data.size * 1.3, data.size * 2.0, 64);
        const ring1 = new THREE.Mesh(ringGeo1, new THREE.MeshStandardMaterial({
          color: 0xd4c090, side: THREE.DoubleSide, transparent: true, opacity: 0.6, roughness: 0.5
        }));
        ring1.rotation.x = Math.PI / 2 + 0.05;
        ring1.userData = { isRing: true };
        planet.add(ring1);
        
        const ringGeo2 = new THREE.RingGeometry(data.size * 2.1, data.size * 2.4, 64);
        const ring2 = new THREE.Mesh(ringGeo2, new THREE.MeshStandardMaterial({
          color: 0xc0b080, side: THREE.DoubleSide, transparent: true, opacity: 0.4, roughness: 0.5
        }));
        ring2.rotation.x = Math.PI / 2 - 0.03;
        ring2.userData = { isRing: true };
        planet.add(ring2);
      }
      
      // Подпись
      const labelDiv = document.createElement('div');
      labelDiv.textContent = data.name;
      labelDiv.style.color = 'white';
      labelDiv.style.fontSize = '15px';
      labelDiv.style.fontWeight = 'bold';
      labelDiv.style.textShadow = '1px 1px 3px black';
      labelDiv.style.background = 'rgba(0,0,0,0.65)';
      labelDiv.style.padding = '2px 12px';
      labelDiv.style.borderRadius = '20px';
      const label = new CSS2DObject(labelDiv);
      label.position.set(0, data.size + 0.5, 0);
      planet.add(label);
      
      planets.push(planet);
    });

    // --- Управление ---
    let currentTarget = 'all';
    const buttons = document.querySelectorAll('.planet-btn');
    
    function focusOnPlanet(planetKey) {
      if (planetKey === 'all') {
        controls.target.set(0, 0, 0);
        camera.position.set(0, 25, 45);
        controls.update();
        return;
      }
      const planet = planets.find(p => p.userData.key === planetKey);
      if (planet) {
        const pos = planet.position.clone();
        controls.target.copy(pos);
        const dist = planet.userData.size * 5 + 2;
        camera.position.copy(pos.clone().add(new THREE.Vector3(dist * 0.7, dist * 0.6, dist)));
        controls.update();
      }
    }
    
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTarget = btn.dataset.planet;
        focusOnPlanet(currentTarget);
      });
    });
    
    document.getElementById('reset-btn').addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      document.querySelector('[data-planet="all"]').classList.add('active');
      currentTarget = 'all';
      focusOnPlanet('all');
    });

    // Клик по планете
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    
    window.addEventListener('click', (event) => {
      if (event.target.tagName === 'BUTTON') return;
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(planets, true);
      if (intersects.length > 0) {
        let obj = intersects[0].object;
        if (obj.userData.isRing) obj = obj.parent;
        const key = obj.userData.key;
        if (key) {
          buttons.forEach(b => b.classList.remove('active'));
          const btn = document.querySelector(`[data-planet="${key}"]`);
          if (btn) btn.classList.add('active');
          currentTarget = key;
          focusOnPlanet(key);
        }
      }
    });

    // --- Анимация ---
    function animate() {
      requestAnimationFrame(animate);
      
      stars1.rotation.y += 0.0001;
      stars2.rotation.y -= 0.00005;
      
      planets.forEach(planet => {
        const data = planet.userData;
        if (data.distance > 0) {
          data.angle += data.speed * 0.3;
          planet.position.x = data.distance * Math.cos(data.angle);
          planet.position.z = data.distance * Math.sin(data.angle);
        }
        planet.rotation.y += 0.008;
      });
      
      if (currentTarget !== 'all') {
        const targetPlanet = planets.find(p => p.userData.key === currentTarget);
        if (targetPlanet) controls.target.copy(targetPlanet.position);
      }
      
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    console.log('🌌 Уютная Солнечная система готова!');
  </script>
</body>
</html>
