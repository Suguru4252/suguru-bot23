<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, shrink-to-fit=yes, viewport-fit=cover">
  <title>Haunted Dorm · Комната 404</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      font-family: 'Segoe UI', 'Arial', sans-serif;
    }
    body {
      background: #0b0b0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 10px;
    }
    .game-container {
      background: linear-gradient(145deg, #1a1a2e 0%, #0d0d1a 100%);
      border-radius: 32px;
      padding: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 0, 100, 0.3);
      max-width: 500px;
      width: 100%;
      border: 1px solid #ff2a6d;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ffb3c6;
      font-weight: bold;
      margin-bottom: 12px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 20px;
      padding: 10px 16px;
      backdrop-filter: blur(10px);
      border: 1px solid #ff4d7a;
    }
    .energy-display {
      font-size: 1.4rem;
      background: #000;
      padding: 5px 14px;
      border-radius: 20px;
      color: #ffdf00;
      text-shadow: 0 0 8px #ffaa00;
      box-shadow: inset 0 0 6px black;
    }
    .door-hp {
      font-size: 1.2rem;
      background: #3a0a1a;
      padding: 5px 16px;
      border-radius: 20px;
      color: #ff6b6b;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      background: #12121c;
      padding: 10px;
      border-radius: 20px;
      margin-bottom: 12px;
      border: 2px solid #3d2b3f;
      box-shadow: inset 0 0 15px black;
    }
    .cell {
      aspect-ratio: 1 / 1;
      background: #25253a;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: white;
      background: radial-gradient(circle at 30% 30%, #3c3c5c, #1b1b2a);
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.6), 0 4px 6px black;
      transition: 0.1s;
      position: relative;
      cursor: pointer;
    }
    .cell.occupied {
      background: radial-gradient(circle at 30% 30%, #5a3a6a, #2a1a3a);
      color: #f0e68c;
      font-weight: bold;
      box-shadow: 0 0 12px #b983ff;
    }
    .cell.door {
      background: radial-gradient(circle at 30% 30%, #8b0000, #4a0000);
      font-size: 2rem;
      box-shadow: 0 0 15px #ff4444;
    }
    .cell.selected {
      outline: 3px solid #ffe484;
      outline-offset: -2px;
      filter: brightness(1.3);
      transform: scale(0.96);
    }
    .action-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 15px;
      background: #1e1e30;
      border-radius: 24px;
      padding: 12px;
      justify-content: center;
    }
    button {
      background: #2c2c44;
      border: none;
      color: #ddd;
      font-weight: bold;
      padding: 10px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 0 #0b0b15, 0 6px 10px black;
      transition: all 0.07s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 1;
      min-width: 60px;
      background: #383854;
      color: white;
    }
    button:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #0b0b15, 0 4px 6px black;
      filter: brightness(1.3);
    }
    button:disabled {
      opacity: 0.5;
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0b0b15;
      pointer-events: none;
    }
    .turret-btn { background: #5e3a6c; color: #ffddf4; }
    .gen-btn { background: #2f5a4a; color: #c5ffc5; }
    .door-btn { background: #8b3a3a; color: #ffc0c0; }
    .boss-area {
      text-align: center;
      margin-top: 5px;
      font-size: 1.1rem;
      color: #ffaaaa;
      background: #1a0e0e;
      border-radius: 30px;
      padding: 8px;
      border: 1px solid #ff4d4d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-left: 20px;
      padding-right: 20px;
    }
    .boss-hp-bar {
      width: 120px;
      height: 12px;
      background: #3a1a1a;
      border-radius: 10px;
      overflow: hidden;
    }
    .boss-hp-fill {
      width: 100%;
      height: 100%;
      background: #ff3a3a;
      box-shadow: 0 0 15px red;
    }
    .log {
      color: #aaa;
      font-size: 0.75rem;
      margin-top: 8px;
      text-align: center;
      min-height: 20px;
    }
    @media (max-width: 400px) {
      button {
        font-size: 0.7rem;
        padding: 8px 6px;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <span>⚡ <span id="energyValue">120</span></span>
    <span class="door-hp">🚪 <span id="doorHP">100</span>%</span>
    <span>👻BOSS <span id="waveText">1</span></span>
  </div>

  <div class="grid" id="gridContainer"></div>

  <div class="action-panel">
    <button class="gen-btn" id="btnGenerator">
      <span>🔋</span> Генератор<br><small>35⚡</small>
    </button>
    <button class="turret-btn" id="btnTurret">
      <span>🔫</span> Пушка<br><small>60⚡</small>
    </button>
    <button class="door-btn" id="btnRepair">
      <span>🛡️</span> Чинить<br><small>30⚡</small>
    </button>
    <button id="btnSell" style="background:#4a4a5a;">
      <span>💰</span> Продать<br><small>+50%</small>
    </button>
  </div>

  <div class="boss-area">
    <span>👾 Босс</span>
    <div class="boss-hp-bar">
      <div id="bossHpFill" class="boss-hp-fill" style="width: 100%;"></div>
    </div>
    <span id="bossHpText">200/200</span>
  </div>
  <div class="log" id="logMessage">Выбери клетку для постройки</div>
</div>

<script>
  (function() {
    // ---------- НАСТРОЙКИ КОМНАТЫ ----------
    const ROWS = 5;
    const COLS = 5;
    // Дверь находится в фиксированной клетке (индекс 2,2) - центр
    const DOOR_ROW = 2;
    const DOOR_COL = 2;

    // ---------- СОСТОЯНИЕ ИГРЫ ----------
    let energy = 180;
    let doorHP = 100;
    let bossHP = 200;
    let wave = 1;
    let bossMaxHP = 200;

    // Ячейки: храним что построено: null, 'generator', 'turret'
    let gridState = Array(ROWS).fill().map(() => Array(COLS).fill(null));

    // Таймеры
    let generatorInterval = null;
    let bossAttackInterval = null;
    let turretAttackInterval = null;

    // Выбранная ячейка (для продажи/подсветки)
    let selectedRow = -1;
    let selectedCol = -1;

    // ---------- DOM элементы ----------
    const gridEl = document.getElementById('gridContainer');
    const energyEl = document.getElementById('energyValue');
    const doorHPEl = document.getElementById('doorHP');
    const bossHpFill = document.getElementById('bossHpFill');
    const bossHpText = document.getElementById('bossHpText');
    const waveTextEl = document.getElementById('waveText');
    const logEl = document.getElementById('logMessage');

    const btnGenerator = document.getElementById('btnGenerator');
    const btnTurret = document.getElementById('btnTurret');
    const btnRepair = document.getElementById('btnRepair');
    const btnSell = document.getElementById('btnSell');

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function updateUI() {
      energyEl.textContent = energy;
      doorHPEl.textContent = doorHP;
      let percent = Math.max(0, (bossHP / bossMaxHP) * 100);
      bossHpFill.style.width = `${percent}%`;
      bossHpText.textContent = `${Math.max(0, bossHP)}/${bossMaxHP}`;
      waveTextEl.textContent = wave;
      
      // Блокировка кнопок по энергии
      btnGenerator.disabled = energy < 35;
      btnTurret.disabled = energy < 60;
      btnRepair.disabled = energy < 30 || doorHP >= 100;
    }

    function log(msg) {
      logEl.textContent = msg;
    }

    // Проверка: свободна ли клетка и не дверь
    function isCellEmpty(row, col) {
      if (row === DOOR_ROW && col === DOOR_COL) return false; // дверь
      return gridState[row][col] === null;
    }

    // Стоимость построек
    function getBuildCost(type) {
      if (type === 'generator') return 35;
      if (type === 'turret') return 60;
      return 0;
    }

    // Продажа постройки (возврат 50%)
    function sellBuilding(row, col) {
      const building = gridState[row][col];
      if (!building) return false;
      let refund = 0;
      if (building === 'generator') refund = Math.floor(35 * 0.5);
      else if (building === 'turret') refund = Math.floor(60 * 0.5);
      
      gridState[row][col] = null;
      energy += refund;
      log(`Продано. +${refund}⚡`);
      renderGrid();
      updateUI();
      return true;
    }

    // Постройка
    function build(row, col, type) {
      if (!isCellEmpty(row, col)) {
        log("Клетка занята!");
        return false;
      }
      const cost = getBuildCost(type);
      if (energy < cost) {
        log("Недостаточно энергии!");
        return false;
      }
      energy -= cost;
      gridState[row][col] = type;
      log(`Построено: ${type === 'generator' ? 'Генератор' : 'Пушка'}`);
      renderGrid();
      updateUI();
      return true;
    }

    // Ремонт двери
    function repairDoor() {
      if (energy < 30) {
        log("Мало энергии для ремонта!");
        return;
      }
      if (doorHP >= 100) {
        log("Дверь цела!");
        return;
      }
      energy -= 30;
      doorHP = Math.min(100, doorHP + 40);
      log("Дверь укреплена +40 ❤️");
      updateUI();
      renderGrid();
    }

    // Атака босса по двери
    function bossAttack() {
      if (doorHP <= 0) {
        gameOver();
        return;
      }
      let damage = 5 + wave * 3; // с каждой волной сильнее
      doorHP = Math.max(0, doorHP - damage);
      log(`👻 Босс бьёт дверь на ${damage} урона!`);
      if (doorHP <= 0) {
        gameOver();
      }
      updateUI();
      renderGrid();
    }

    // Атака турелей по боссу
    function turretsAttack() {
      let totalDamage = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (gridState[r][c] === 'turret') {
            totalDamage += 7; // каждая пушка наносит 7 урона
          }
        }
      }
      if (totalDamage > 0 && bossHP > 0) {
        bossHP = Math.max(0, bossHP - totalDamage);
        log(`🔫 Пушки наносят ${totalDamage} урона!`);
        if (bossHP <= 0) {
          winWave();
        }
      }
      updateUI();
    }

    // Генерация энергии от генераторов
    function generateEnergy() {
      let generators = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (gridState[r][c] === 'generator') generators++;
        }
      }
      if (generators > 0) {
        energy += generators * 4; // каждый генератор +4 энергии
        updateUI();
      }
    }

    function winWave() {
      clearInterval(bossAttackInterval);
      clearInterval(turretAttackInterval);
      log(`✅ Босс волны ${wave} повержен!`);
      wave++;
      bossMaxHP = Math.floor(bossMaxHP * 1.4);
      bossHP = bossMaxHP;
      // Бонус за победу
      energy += 60;
      updateUI();
      renderGrid();
      // Перезапускаем атаки для новой волны
      startBossAttackCycle();
      startTurretCycle();
    }

    function gameOver() {
      clearInterval(bossAttackInterval);
      clearInterval(turretAttackInterval);
      clearInterval(generatorInterval);
      log("💀 ДВЕРЬ РАЗРУШЕНА... ИГРА ОКОНЧЕНА");
      // Делаем кнопки неактивными
      btnGenerator.disabled = true;
      btnTurret.disabled = true;
      btnRepair.disabled = true;
      btnSell.disabled = true;
      // Можно добавить перезагрузку через 3 сек
      setTimeout(() => {
        if (confirm("Игра окончена. Начать заново?")) {
          resetGame();
        }
      }, 500);
    }

    function resetGame() {
      // Сброс всех параметров
      clearInterval(bossAttackInterval);
      clearInterval(turretAttackInterval);
      clearInterval(generatorInterval);
      
      energy = 180;
      doorHP = 100;
      wave = 1;
      bossMaxHP = 200;
      bossHP = 200;
      gridState = Array(ROWS).fill().map(() => Array(COLS).fill(null));
      selectedRow = -1;
      selectedCol = -1;
      
      renderGrid();
      updateUI();
      log("Новая игра! Защити комнату.");
      
      // Включаем кнопки
      btnGenerator.disabled = false;
      btnTurret.disabled = false;
      btnRepair.disabled = false;
      btnSell.disabled = false;
      
      startIntervals();
    }

    function startIntervals() {
      if (generatorInterval) clearInterval(generatorInterval);
      generatorInterval = setInterval(generateEnergy, 2000);
      startBossAttackCycle();
      startTurretCycle();
    }

    function startBossAttackCycle() {
      if (bossAttackInterval) clearInterval(bossAttackInterval);
      bossAttackInterval = setInterval(bossAttack, 3200);
    }

    function startTurretCycle() {
      if (turretAttackInterval) clearInterval(turretAttackInterval);
      turretAttackInterval = setInterval(turretsAttack, 2500);
    }

    // ---------- ОТРИСОВКА СЕТКИ ----------
    function renderGrid() {
      gridEl.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          
          // Проверка: дверь
          if (r === DOOR_ROW && c === DOOR_COL) {
            cell.classList.add('door');
            cell.textContent = '🚪';
            cell.addEventListener('click', (e) => {
              e.stopPropagation();
              log("Это дверь — её нельзя строить, только чинить кнопкой.");
            });
          } else {
            const building = gridState[r][c];
            if (building === 'generator') {
              cell.classList.add('occupied');
              cell.textContent = '🔋';
            } else if (building === 'turret') {
              cell.classList.add('occupied');
              cell.textContent = '🔫';
            } else {
              cell.textContent = '';
            }
            
            // Выделение выбранной клетки
            if (selectedRow === r && selectedCol === c) {
              cell.classList.add('selected');
            }
            
            cell.addEventListener('click', (e) => {
              e.stopPropagation();
              handleCellClick(r, c);
            });
          }
          
          gridEl.appendChild(cell);
        }
      }
      // Обновляем состояние кнопки продажи (активна если есть выбранная постройка)
      if (selectedRow !== -1 && selectedCol !== -1 && gridState[selectedRow]?.[selectedCol]) {
        btnSell.disabled = false;
      } else {
        btnSell.disabled = true;
      }
      updateUI();
    }

    function handleCellClick(row, col) {
      // Если уже выбрана эта же клетка — снимаем выделение
      if (selectedRow === row && selectedCol === col) {
        selectedRow = -1;
        selectedCol = -1;
        renderGrid();
        log("Выделение снято");
        return;
      }
      
      // Иначе выделяем новую
      selectedRow = row;
      selectedCol = col;
      renderGrid();
      
      if (gridState[row][col]) {
        log(`Выбрана клетка с ${gridState[row][col] === 'generator' ? 'генератором' : 'пушкой'}. Можно продать.`);
      } else {
        log("Пустая клетка. Выберите постройку.");
      }
    }

    // ---------- ОБРАБОТЧИКИ КНОПОК ----------
    btnGenerator.addEventListener('click', () => {
      if (selectedRow === -1 || selectedCol === -1) {
        log("Сначала выберите пустую клетку!");
        return;
      }
      build(selectedRow, selectedCol, 'generator');
    });

    btnTurret.addEventListener('click', () => {
      if (selectedRow === -1 || selectedCol === -1) {
        log("Сначала выберите клетку!");
        return;
      }
      build(selectedRow, selectedCol, 'turret');
    });

    btnRepair.addEventListener('click', () => {
      repairDoor();
    });

    btnSell.addEventListener('click', () => {
      if (selectedRow !== -1 && selectedCol !== -1 && gridState[selectedRow]?.[selectedCol]) {
        sellBuilding(selectedRow, selectedCol);
        selectedRow = -1;
        selectedCol = -1;
        renderGrid();
      } else {
        log("Нечего продавать на выделенной клетке.");
      }
    });

    // Сброс выделения при клике вне клеток (на контейнер сетки не вешаем, но можно на body)
    document.body.addEventListener('click', function(e) {
      if (!e.target.closest('.cell') && !e.target.closest('button')) {
        if (selectedRow !== -1 || selectedCol !== -1) {
          selectedRow = -1;
          selectedCol = -1;
          renderGrid();
        }
      }
    });

    // ---------- СТАРТ ----------
    function initialGame() {
      resetGame(); // устанавливает всё и запускает интервалы
    }

    initialGame();

    // Очистка интервалов при уходе (не обязательно, но хорошо)
    window.addEventListener('beforeunload', () => {
      clearInterval(generatorInterval);
      clearInterval(bossAttackInterval);
      clearInterval(turretAttackInterval);
    });

  })();
</script>
</body>
</html>
