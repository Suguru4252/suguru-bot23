<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: manipulation">
  <title>Вселенная 3D | 5 световых лет</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      background: #000;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 12px 25px;
      border-radius: 50px;
      pointer-events: none;
      backdrop-filter: blur(10px);
      font-weight: 500;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 10;
      font-size: 14px;
    }
    #current-planet {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0,0,0,0.75);
      padding: 12px 25px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 2px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.3);
      display: none;
      pointer-events: none;
      z-index: 15;
      text-align: center;
    }
    #distance-display {
      position: absolute;
      top: 130px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffaa00;
      background: rgba(0,0,0,0.6);
      padding: 6px 20px;
      border-radius: 30px;
      backdrop-filter: blur(8px);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      display: none;
      pointer-events: none;
      z-index: 15;
    }
    #mode-btn {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 12px 30px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.4);
      cursor: pointer;
      transition: all 0.3s;
      z-index: 20;
    }
    #mode-btn:hover {
      background: rgba(255,140,0,0.8);
      border-color: #ffaa00;
      box-shadow: 0 0 25px rgba(255,140,0,0.6);
    }
    #mode-btn.fly-mode {
      background: rgba(255,140,0,0.9);
      border-color: #ffaa00;
      box-shadow: 0 0 30px rgba(255,140,0,0.8);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255,140,0,0.6); }
      50% { box-shadow: 0 0 40px rgba(255,140,0,0.9); }
    }
    #search-container {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 30;
      display: flex;
      gap: 8px;
    }
    #search-input {
      background: rgba(10, 10, 20, 0.85);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 10px 18px;
      border-radius: 30px;
      font-size: 14px;
      width: 200px;
      outline: none;
      transition: all 0.3s;
    }
    #search-input:focus {
      border-color: #ffaa00;
      box-shadow: 0 0 20px rgba(255,140,0,0.4);
    }
    #search-input::placeholder {
      color: rgba(255,255,255,0.5);
    }
    #search-results {
      position: absolute;
      top: 55px;
      right: 0;
      background: rgba(10, 10, 20, 0.9);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 15px;
      max-height: 300px;
      overflow-y: auto;
      width: 220px;
      display: none;
      z-index: 35;
    }
    .search-result-item {
      padding: 10px 18px;
      cursor: pointer;
      color: #ccc;
      font-size: 13px;
      transition: all 0.2s;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .search-result-item:hover {
      background: rgba(255,140,0,0.3);
      color: white;
    }
    .search-result-item .type-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
      background: rgba(255,255,255,0.15);
    }
    #settings-panel {
      position: absolute;
      top: 80px;
      right: 20px;
      background: rgba(10, 10, 20, 0.85);
      backdrop-filter: blur(15px);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 8px 30px rgba(0,0,0,0.7);
      z-index: 25;
      min-width: 260px;
      color: white;
    }
    #settings-panel h3 {
      margin: 0 0 15px 0;
      font-size: 18px;
      text-align: center;
      letter-spacing: 1px;
      color: #ffaa00;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 10px;
    }
    .setting-row label {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
    }
    .setting-row input[type="range"] {
      flex: 1;
      accent-color: #ffaa00;
      height: 6px;
    }
    .value-display {
      font-size: 13px;
      font-weight: bold;
      color: #ffaa00;
      min-width: 55px;
      text-align: right;
    }
    #settings-panel button {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    #settings-panel button:hover {
      background: rgba(255,140,0,0.5);
    }
    .instruction {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      background: rgba(0,0,0,0.55);
      padding: 8px 25px;
      border-radius: 25px;
      backdrop-filter: blur(8px);
      white-space: nowrap;
      pointer-events: none;
      letter-spacing: 0.5px;
      z-index: 15;
    }
    #joystick-container {
      position: absolute;
      bottom: 40px;
      left: 40px;
      width: 140px;
      height: 140px;
      display: none;
      z-index: 30;
    }
    #joystick-base {
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      position: relative;
      backdrop-filter: blur(5px);
    }
    #joystick-thumb {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255,255,255,0.6);
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }
    #look-area {
      position: absolute;
      top: 0;
      right: 0;
      width: 50%;
      height: 100%;
      z-index: 25;
      display: none;
    }
    @media (max-width: 768px) {
      #joystick-container { display: block; }
      #look-area { display: block; }
      #mode-btn { font-size: 14px; padding: 10px 20px; top: 70px; }
      #search-container { top: 20px; right: 10px; }
      #search-input { width: 130px; font-size: 12px; }
      #settings-panel {
        top: 120px;
        right: 10px;
        padding: 15px;
        min-width: 200px;
      }
      .instruction {
        font-size: 10px;
        bottom: 20px;
        white-space: normal;
        width: 80%;
        text-align: center;
      }
      #info { font-size: 12px; padding: 8px 15px; }
    }
  </style>
</head>
<body>
  <div id="info">🌌 ВСЕЛЕННАЯ • 5 св. лет</div>
  <div id="current-planet"></div>
  <div id="distance-display"></div>
  <button id="mode-btn">🎮 ОБЗОР (мышь)</button>
  
  <div id="search-container">
    <input type="text" id="search-input" placeholder="🔍 Поиск объектов...">
    <div id="search-results"></div>
  </div>
  
  <div id="settings-panel">
    <h3>⚙️ НАСТРОЙКИ</h3>
    <div class="setting-row">
      <label>⏱️ Время:</label>
      <span class="value-display" id="time-speed-display">1x</span>
    </div>
    <div class="setting-row">
      <input type="range" id="time-speed-slider" min="1" max="5000" value="1" step="1">
    </div>
    <div class="setting-row">
      <label>🖱️ Чувств.:</label>
      <span class="value-display" id="sensitivity-display">0.5</span>
    </div>
    <div class="setting-row">
      <input type="range" id="sensitivity-slider" min="0.1" max="1.5" value="0.5" step="0.1">
    </div>
    <div class="setting-row">
      <label>🚀 Скорость:</label>
      <span class="value-display" id="fly-speed-display">1x</span>
    </div>
    <div class="setting-row">
      <input type="range" id="fly-speed-slider" min="0.1" max="10" value="1" step="0.1">
    </div>
    <div class="setting-row" style="justify-content: center; margin-top: 5px;">
      <button id="pause-btn">⏯️ ПАУЗА</button>
    </div>
  </div>
  
  <div class="instruction">🖱️ Обзор: вращение/зум | 🚀 Полёт: WASD | ПРОБЕЛ — режим | 🔍 Поиск справа | ⚙️ Настройки</div>
  
  <div id="joystick-container">
    <div id="joystick-base"><div id="joystick-thumb"></div></div>
  </div>
  <div id="look-area"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ============ КОНСТАНТЫ ============
    const LABEL_SHOW_DISTANCE = 4999;
    const LABEL_HIDE_DISTANCE = 1000;
    const SCALE_FACTOR = 0.01; // Масштаб: 1 единица = 100 км (примерно)
    
    // ============ СЦЕНА ============
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020208);
    scene.fog = new THREE.FogExp2(0x020208, 0.0000005);
    
    // Глубокое звёздное небо
    const starsGeo1 = new THREE.BufferGeometry();
    const starsPos1 = new Float32Array(6000 * 3);
    for (let i = 0; i < 6000 * 3; i += 3) {
      starsPos1[i] = (Math.random() - 0.5) * 3000;
      starsPos1[i+1] = (Math.random() - 0.5) * 2000;
      starsPos1[i+2] = (Math.random() - 0.5) * 2500;
    }
    starsGeo1.setAttribute('position', new THREE.BufferAttribute(starsPos1, 3));
    const stars1 = new THREE.Points(starsGeo1, new THREE.PointsMaterial({color: 0xffffff, size: 0.25}));
    scene.add(stars1);
    
    const starsGeo2 = new THREE.BufferGeometry();
    const starsPos2 = new Float32Array(4000 * 3);
    for (let i = 0; i < 4000 * 3; i += 3) {
      starsPos2[i] = (Math.random() - 0.5) * 4000;
      starsPos2[i+1] = (Math.random() - 0.5) * 2500;
      starsPos2[i+2] = (Math.random() - 0.5) * 3000;
    }
    starsGeo2.setAttribute('position', new THREE.BufferAttribute(starsPos2, 3));
    const stars2 = new THREE.Points(starsGeo2, new THREE.PointsMaterial({color: 0xaaccff, size: 0.3}));
    scene.add(stars2);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 10000);
    camera.position.set(0, 50, 120);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.rotateSpeed = 0.5;
    controls.zoomSpeed = 1.8;
    controls.target.set(0, 0, 0);
    controls.maxDistance = 3000;
    controls.minDistance = 1;
    controls.update();

    // ============ НАСТРОЙКИ ============
    const timeSpeedSlider = document.getElementById('time-speed-slider');
    const timeSpeedDisplay = document.getElementById('time-speed-display');
    const sensitivitySlider = document.getElementById('sensitivity-slider');
    const sensitivityDisplay = document.getElementById('sensitivity-display');
    const flySpeedSlider = document.getElementById('fly-speed-slider');
    const flySpeedDisplay = document.getElementById('fly-speed-display');
    const pauseBtn = document.getElementById('pause-btn');
    
    let timeSpeed = 1;
    let isPaused = false;
    let cameraSensitivity = 0.5;
    let baseFlySpeed = 0.7;
    
    timeSpeedSlider.addEventListener('input', () => {
      const val = parseInt(timeSpeedSlider.value);
      if (val <= 10) timeSpeed = val;
      else if (val <= 100) timeSpeed = Math.round(val / 10) * 10;
      else if (val <= 1000) timeSpeed = Math.round(val / 50) * 50;
      else timeSpeed = Math.round(val / 250) * 250;
      timeSpeedDisplay.textContent = timeSpeed + 'x';
    });
    
    sensitivitySlider.addEventListener('input', () => {
      cameraSensitivity = parseFloat(sensitivitySlider.value);
      sensitivityDisplay.textContent = cameraSensitivity.toFixed(1);
      controls.rotateSpeed = cameraSensitivity;
      flyRotateSpeed = 0.01 * cameraSensitivity;
    });
    
    flySpeedSlider.addEventListener('input', () => {
      baseFlySpeed = parseFloat(flySpeedSlider.value);
      flySpeedDisplay.textContent = baseFlySpeed.toFixed(1) + 'x';
    });
    
    pauseBtn.addEventListener('click', () => {
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? '▶️ ИГРАТЬ' : '⏯️ ПАУЗА';
      pauseBtn.style.background = isPaused ? 'rgba(255,140,0,0.5)' : 'rgba(255,255,255,0.15)';
    });

    // ============ РЕЖИМЫ УПРАВЛЕНИЯ ============
    let flyMode = false;
    const modeBtn = document.getElementById('mode-btn');
    const instruction = document.querySelector('.instruction');
    
    const keys = { w: false, a: false, s: false, d: false, q: false, e: false, shift: false };
    let flyRotateSpeed = 0.005;
    let yaw = 0, pitch = 0;
    let mouseDown = false;
    let lastMouseX = 0, lastMouseY = 0;
    
    function toggleFlyMode() {
      flyMode = !flyMode;
      if (flyMode) {
        modeBtn.textContent = '🚀 ПОЛЁТ (WASD)';
        modeBtn.classList.add('fly-mode');
        instruction.textContent = 'WASD — движение | Q/E — вверх/вниз | Shift — уск. | Мышь — поворот | ПРОБЕЛ — обзор';
        controls.enabled = false;
        const direction = new THREE.Vector3();
        camera.getWorldDirection(direction);
        yaw = Math.atan2(direction.x, direction.z);
        pitch = Math.asin(direction.y);
        renderer.domElement.style.cursor = 'crosshair';
      } else {
        modeBtn.textContent = '🎮 ОБЗОР (мышь)';
        modeBtn.classList.remove('fly-mode');
        instruction.textContent = '🖱️ Обзор: вращение/зум | ПРОБЕЛ — полёт | 🔍 Поиск | ⚙️ Настройки';
        controls.enabled = true;
        controls.target.copy(camera.position.clone().add(camera.getWorldDirection(new THREE.Vector3()).multiplyScalar(10)));
        controls.update();
        renderer.domElement.style.cursor = 'default';
        Object.keys(keys).forEach(k => keys[k] = false);
      }
    }
    
    modeBtn.addEventListener('click', toggleFlyMode);
    
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && document.activeElement !== document.getElementById('search-input')) {
        e.preventDefault();
        toggleFlyMode();
        return;
      }
      if (!flyMode) return;
      
      switch(e.code) {
        case 'KeyW': keys.w = true; e.preventDefault(); break;
        case 'KeyA': keys.a = true; e.preventDefault(); break;
        case 'KeyS': keys.s = true; e.preventDefault(); break;
        case 'KeyD': keys.d = true; e.preventDefault(); break;
        case 'KeyQ': keys.q = true; e.preventDefault(); break;
        case 'KeyE': keys.e = true; e.preventDefault(); break;
        case 'ShiftLeft':
        case 'ShiftRight': keys.shift = true; e.preventDefault(); break;
      }
    });
    
    window.addEventListener('keyup', (e) => {
      if (!flyMode) return;
      switch(e.code) {
        case 'KeyW': keys.w = false; break;
        case 'KeyA': keys.a = false; break;
        case 'KeyS': keys.s = false; break;
        case 'KeyD': keys.d = false; break;
        case 'KeyQ': keys.q = false; break;
        case 'KeyE': keys.e = false; break;
        case 'ShiftLeft':
        case 'ShiftRight': keys.shift = false; break;
      }
    });
    
    renderer.domElement.addEventListener('mousedown', (e) => {
      if (!flyMode) return;
      mouseDown = true;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
    });
    
    window.addEventListener('mouseup', () => { mouseDown = false; });
    
    window.addEventListener('mousemove', (e) => {
      if (!flyMode || !mouseDown) return;
      const deltaX = e.clientX - lastMouseX;
      const deltaY = e.clientY - lastMouseY;
      yaw -= deltaX * flyRotateSpeed;
      pitch -= deltaY * flyRotateSpeed;
      pitch = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitch));
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
    });

    // ============ ДЖОЙСТИК ============
    const joystickContainer = document.getElementById('joystick-container');
    const joystickBase = document.getElementById('joystick-base');
    const joystickThumb = document.getElementById('joystick-thumb');
    const lookArea = document.getElementById('look-area');
    
    let joystickActive = false;
    let joystickStartX = 0, joystickStartY = 0;
    let joystickMoveX = 0, joystickMoveY = 0;
    let touchLookActive = false;
    let touchLookLastX = 0, touchLookLastY = 0;
    
    function isMobile() {
      return /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || window.innerWidth <= 768;
    }
    
    if (isMobile()) {
      joystickContainer.style.display = 'block';
      lookArea.style.display = 'block';
    }
    
    joystickBase.addEventListener('touchstart', (e) => {
      e.preventDefault();
      joystickActive = true;
      const touch = e.touches[0];
      const rect = joystickBase.getBoundingClientRect();
      joystickStartX = rect.left + rect.width / 2;
      joystickStartY = rect.top + rect.height / 2;
      joystickMoveX = touch.clientX - joystickStartX;
      joystickMoveY = touch.clientY - joystickStartY;
      updateJoystickPosition();
    });
    
    joystickBase.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!joystickActive) return;
      const touch = e.touches[0];
      joystickMoveX = touch.clientX - joystickStartX;
      joystickMoveY = touch.clientY - joystickStartY;
      const maxDist = 50;
      const dist = Math.sqrt(joystickMoveX ** 2 + joystickMoveY ** 2);
      if (dist > maxDist) {
        joystickMoveX = (joystickMoveX / dist) * maxDist;
        joystickMoveY = (joystickMoveY / dist) * maxDist;
      }
      updateJoystickPosition();
    });
    
    joystickBase.addEventListener('touchend', () => {
      joystickActive = false;
      joystickMoveX = 0;
      joystickMoveY = 0;
      updateJoystickPosition();
    });
    
    function updateJoystickPosition() {
      joystickThumb.style.transform = `translate(calc(-50% + ${joystickMoveX}px), calc(-50% + ${joystickMoveY}px))`;
    }
    
    lookArea.addEventListener('touchstart', (e) => {
      e.preventDefault();
      touchLookActive = true;
      touchLookLastX = e.touches[0].clientX;
      touchLookLastY = e.touches[0].clientY;
    });
    
    lookArea.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!touchLookActive) return;
      const deltaX = e.touches[0].clientX - touchLookLastX;
      const deltaY = e.touches[0].clientY - touchLookLastY;
      const sensitivity = cameraSensitivity * 0.8;
      
      if (flyMode) {
        yaw -= deltaX * flyRotateSpeed * 0.8;
        pitch -= deltaY * flyRotateSpeed * 0.8;
        pitch = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitch));
      } else {
        const target = controls.target;
        const offset = camera.position.clone().sub(target);
        const spherical = new THREE.Spherical().setFromVector3(offset);
        spherical.theta -= deltaX * 0.003 * sensitivity;
        spherical.phi -= deltaY * 0.003 * sensitivity;
        spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));
        offset.setFromSpherical(spherical);
        camera.position.copy(target.clone().add(offset));
        camera.lookAt(target);
      }
      
      touchLookLastX = e.touches[0].clientX;
      touchLookLastY = e.touches[0].clientY;
    });
    
    lookArea.addEventListener('touchend', () => { touchLookActive = false; });

    // ============ ОСВЕЩЕНИЕ ============
    const sunLight = new THREE.PointLight(0xfff5e6, 3, 0, 0);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);
    scene.add(new THREE.AmbientLight(0x111133));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.25);
    dirLight.position.set(10, 20, 5);
    scene.add(dirLight);

    // ============ ФУНКЦИИ ============
    function createTexture(baseColor, type) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = baseColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      if (type === 'star') {
        const gradient = ctx.createRadialGradient(128, 64, 0, 128, 64, 128);
        gradient.addColorStop(0, '#ffffff');
        gradient.addColorStop(0.3, baseColor);
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 256, 128);
      } else if (type === 'sun') {
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#ffaa00');
        gradient.addColorStop(0.3, '#ff7700');
        gradient.addColorStop(0.6, '#ffaa00');
        gradient.addColorStop(1, '#ff5500');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffcc00';
        for(let i = 0; i < 25; i++) {
          ctx.beginPath();
          ctx.arc(Math.random()*256, Math.random()*128, Math.random()*12+4, 0, Math.PI*2);
          ctx.fill();
        }
      } else if (type === 'jupiter') {
        ctx.strokeStyle = '#b08060';
        ctx.lineWidth = 7;
        for(let y = 10; y < 128; y += 16) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(256, y + Math.sin(y)*4);
          ctx.stroke();
        }
      } else if (type === 'saturn') {
        ctx.strokeStyle = '#d4b896';
        ctx.lineWidth = 5;
        for(let y = 12; y < 128; y += 14) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(256, y);
          ctx.stroke();
        }
      } else if (type === 'earth') {
        ctx.fillStyle = '#2288ff';
        ctx.fillRect(0,0,256,128);
        ctx.fillStyle = '#44aa44';
        ctx.beginPath(); ctx.arc(100,50,40,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(180,70,35,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffffff';
        for(let i=0;i<12;i++){ ctx.beginPath(); ctx.arc(Math.random()*256,Math.random()*128,Math.random()*7+1.5,0,Math.PI*2); ctx.fill(); }
      } else if (type === 'mars') {
        ctx.fillStyle = '#8b2500';
        for(let i=0;i<15;i++){ ctx.beginPath(); ctx.arc(Math.random()*256,Math.random()*128,Math.random()*10+3,0,Math.PI*2); ctx.fill(); }
      }
      return new THREE.CanvasTexture(canvas);
    }

    // ============ ВСЕ ОБЪЕКТЫ В ПРЕДЕЛАХ 5 СВЕТОВЫХ ЛЕТ ============

      const label = createLabel(data.name, data.type === 'dwarf_planet' ? '12px' : '15px');

    // --- ПОЯС АСТЕРОИДОВ (Солнечная система) ---
    const asteroids = [];
    for (let i = 0; i < 800; i++) {
      const geo = new THREE.SphereGeometry(0.08, 3, 3);

    // --- ОБЛАКО ООРТА ---

    const oortPositions = new Float32Array(2000 * 3);
    for (let i = 0; i < 2000 * 3; i += 3) {
      const radius = 100 + Math.random() * 60;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      oortPositions[i] = radius * Math.sin(phi) * Math.cos(theta);
      oortPositions[i+1] = radius * Math.sin(phi) * Math.sin(theta) * 0.6;
      oortPositions[i+2] = radius * Math.cos(phi);
    }
    oortGeo.setAttribute('position', new THREE.BufferAttribute(oortPositions, 3));
    const oortCloud = new THREE.Points(oortGeo, new THREE.PointsMaterial({
      color: 0x445566, size: 0.2, transparent: true, opacity: 0.4,

        searchResults.innerHTML = '<div class="search-result-item" style="color:#888;">Ничего не найдено</div>';

          const typeNames = {
            'star': '⭐ Звезда',

            'dwarf_planet': '🔮 Карлик',

          return `<div class="search-result-item" data-key="${obj.userData.key}">
            ${typeName} <strong>${obj.userData.name}</strong>
            ${obj.userData.starType ? `<span class="type-badge">${obj.userData.starType}</span>` : ''}
          </div>`;
        }).join('');
      }
      
      searchResults.style.display = 'block';
    });
    
    searchResults.addEventListener('click', (e) => {
      const item = e.target.closest('.search-result-item');
      if (!item || !item.dataset.key) return;
      
      const key = item.dataset.key;
      focusOnObject(key);
      searchResults.style.display = 'none';
      searchInput.value = '';
    });
    
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#search-container')) {
        searchResults.style.display = 'none';
      }
    });

    // ============ НАВИГАЦИЯ ============
    let currentTarget = 'all';
    const planetNameDiv = document.getElementById('current-planet');
    const distanceDisplay = document.getElementById('distance-display');
    
    function focusOnObject(objectKey) {
      planetNameDiv.style.display = 'none';
      distanceDisplay.style.display = 'none';
      
      if (objectKey === 'all') {
        if (!flyMode) {
          controls.target.set(0, 0, 0);
          camera.position.set(0, 50, 120);
          controls.update();
        } else {
          camera.position.set(0, 50, 120);
          camera.lookAt(0, 0, 0);
        }
        return;
      }
      
      const obj = allSpatialObjects.find(o => o.userData.key === objectKey);
      if (!obj) return;
      
      const pos = obj.position.clone();
      if (obj.userData.parentStar) pos.add(obj.userData.parentStar.position);
      if (obj.userData.parentPlanet) pos.add(obj.userData.parentPlanet.position);
      
      planetNameDiv.textContent = obj.userData.name;
      if (obj.userData.type) {
        const types = {
          'star': '⭐ Звезда',
          'planet': '🪐 Планета',
          'dwarf_planet': '🔮 Карликовая планета',
          'moon': '🌙 Спутник',
          'star_system': '✨ Звёздная система',
          'exoplanet': '🌍 Экзопланета',
          'brown_dwarf': '🟤 Коричневый карлик',
          'black_hole': '🕳️ Чёрная дыра'
        };
        planetNameDiv.textContent = (types[obj.userData.type] || '') + ' ' + obj.userData.name;
      }
      planetNameDiv.style.display = 'block';
      
      const dist = obj.userData.size * 8 + 3;
      
      if (!flyMode) {
        controls.target.copy(pos);
        camera.position.copy(pos.clone().add(new THREE.Vector3(dist * 0.7, dist * 0.5, dist * 0.7)));
        controls.update();
      } else {
        camera.position.copy(pos.clone().add(new THREE.Vector3(dist * 0.7, dist * 0.5, dist * 0.7)));
        camera.lookAt(pos);
      }
      
      currentTarget = objectKey;
    }
    
    // Клик по объектам
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    
    window.addEventListener('click', (event) => {
      if (event.target.tagName === 'BUTTON' || event.target.tagName === 'INPUT') return;
      if (event.target.closest('#settings-panel') || event.target.closest('#search-container')) return;
      if (event.target.closest('#joystick-container') || event.target.closest('#look-area')) return;
      
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      
      raycaster.setFromCamera(mouse, camera);
      const clickableObjects = allSpatialObjects.filter(o => 
        !o.userData.isAsteroid && !o.userData.isKuiper && o.userData.type !== 'asteroid' && o.userData.type !== 'kuiper'
      );
      
      const intersects = raycaster.intersectObjects(clickableObjects, true);
      
      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj) {
          if (obj.userData && obj.userData.key && obj.userData.key !== 'asteroid' && obj.userData.key !== 'kuiper') {
            focusOnObject(obj.userData.key);
            return;
          }
          obj = obj.parent;
        }
      }
    });

    // ============ ОБНОВЛЕНИЕ НАЗВАНИЙ ПО РАССТОЯНИЮ ============
    function updateLabels() {
      const camPos = camera.position;
      
      allLabels.forEach(labelData => {
        const obj = labelData.obj;
        let worldPos = new THREE.Vector3();
        obj.getWorldPosition(worldPos);
        
        const distance = camPos.distanceTo(worldPos);
        
        if (distance > LABEL_SHOW_DISTANCE) {
          labelData.label.element.style.display = 'none';
        } else if (distance < LABEL_HIDE_DISTANCE) {
          labelData.label.element.style.display = 'none';
        } else {
          labelData.label.element.style.display = 'block';
          // Плавное появление/исчезновение
          const fadeRange = 300;
          if (distance > LABEL_SHOW_DISTANCE - fadeRange) {
            const opacity = (LABEL_SHOW_DISTANCE - distance) / fadeRange;
            labelData.label.element.style.opacity = Math.max(0, Math.min(1, opacity));
          } else if (distance < LABEL_HIDE_DISTANCE + fadeRange) {
            const opacity = (distance - LABEL_HIDE_DISTANCE) / fadeRange;
            labelData.label.element.style.opacity = Math.max(0, Math.min(1, opacity));
          } else {
            labelData.label.element.style.opacity = '1';
          }
        }
      });
      
      // Обновление информации о расстоянии для текущей цели
      if (currentTarget !== 'all') {
        const targetObj = allSpatialObjects.find(o => o.userData.key === currentTarget);
        if (targetObj) {
          const worldPos = new THREE.Vector3();
          targetObj.getWorldPosition(worldPos);
          const distance = camPos.distanceTo(worldPos);
          distanceDisplay.textContent = `📏 Расстояние: ${Math.round(distance)} ед.`;
          distanceDisplay.style.display = 'block';
        }
      }
    }

    // ============ АНИМАЦИЯ ============
    function updateFlyMovement() {
      if (!flyMode) return;
      
      const speed = baseFlySpeed * (keys.shift ? 3 : 1) * 0.7;
      const forward = new THREE.Vector3();
      const right = new THREE.Vector3();
      const up = new THREE.Vector3(0, 1, 0);
      
      camera.getWorldDirection(forward);
      right.crossVectors(forward, up).normalize();
      
      let moveX = 0, moveY = 0;
      if (joystickActive) { moveX = joystickMoveX / 50; moveY = joystickMoveY / 50; }
      
      if (keys.w || moveY < -0.2) camera.position.addScaledVector(forward, speed);
      if (keys.s || moveY > 0.2) camera.position.addScaledVector(forward, -speed);
      if (keys.a || moveX < -0.2) camera.position.addScaledVector(right, -speed);
      if (keys.d || moveX > 0.2) camera.position.addScaledVector(right, speed);
      if (keys.q) camera.position.y -= speed * 0.7;
      if (keys.e) camera.position.y += speed * 0.7;
      
      const quaternion = new THREE.Quaternion();
      const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
      quaternion.setFromEuler(euler);
      camera.quaternion.copy(quaternion);
    }
    
    function animate() {
      requestAnimationFrame(animate);
      
      const speedMultiplier = isPaused ? 0 : timeSpeed;
      
      stars1.rotation.y += 0.00008 * speedMultiplier;
      stars2.rotation.y -= 0.00004 * speedMultiplier;
      oortCloud.rotation.y += 0.00002 * speedMultiplier;
      
      // Планеты Солнечной системы
      planets.forEach(planet => {
        const data = planet.userData;
        if (data.distance > 0) {
          data.angle += data.speed * 0.25 * speedMultiplier;
          planet.position.x = data.distance * Math.cos(data.angle);
          planet.position.z = data.distance * Math.sin(data.angle);
        }
        planet.rotation.y += 0.008 * speedMultiplier;
      });
      
      // Спутники
      allMoons.forEach(moon => {
        const data = moon.userData;
        data.angle += data.speed * 0.25 * speedMultiplier;
        moon.position.x = data.distance * Math.cos(data.angle);
        moon.position.z = data.distance * Math.sin(data.angle);
        moon.rotation.y += 0.02 * speedMultiplier;
      });
      
      // Экзопланеты
      allExoplanets.forEach(planet => {
        const data = planet.userData;
        data.angle += data.speed * 0.25 * speedMultiplier;
        planet.position.x = data.distance * Math.cos(data.angle);
        planet.position.z = data.distance * Math.sin(data.angle);
      });
      
      // Астероиды
      asteroids.forEach(obj => {
        obj.userData.angle += obj.userData.speed * 0.25 * speedMultiplier;
        obj.position.x = obj.userData.distance * Math.cos(obj.userData.angle);
        obj.position.z = obj.userData.distance * Math.sin(obj.userData.angle);
      });
      
      // Койпер
      kuiperObjects.forEach(obj => {
        obj.userData.angle += obj.userData.speed * 0.25 * speedMultiplier;
        obj.position.x = obj.userData.distance * Math.cos(obj.userData.angle);
        obj.position.z = obj.userData.distance * Math.sin(obj.userData.angle);
      });
      
      // Чёрные дыры (вращение дисков)
      blackHoleObjects.forEach(bh => {
        bh.children[0].rotation.z += 0.01 * speedMultiplier;
      });
      
      updateFlyMovement();
      updateLabels();
      
      if (!flyMode && currentTarget !== 'all') {
        const targetObj = allSpatialObjects.find(o => o.userData.key === currentTarget);
        if (targetObj) {
          const worldPos = new THREE.Vector3();
          targetObj.getWorldPosition(worldPos);
          controls.target.copy(worldPos);
        }
      }
      
      if (!flyMode) controls.update();
      
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
      
      if (isMobile()) {
        joystickContainer.style.display = 'block';
        lookArea.style.display = 'block';
      } else {
        joystickContainer.style.display = 'none';
        lookArea.style.display = 'none';
      }
    });

    console.log('🌌 ВСЕЛЕННАЯ В ПРЕДЕЛАХ 5 СВЕТОВЫХ ЛЕТ ГОТОВА!');
    console.log('☀️ Солнечная система: все планеты + спутники + пояса');
    console.log('⭐ Ближайшие звёзды: Проксима Центавра, Альфа Центавра A/B, Звезда Барнарда');
    console.log('🟤 Коричневые карлики: WISE 0855, Луман 16A/B, WISE 1506');
    console.log('🕳️ Чёрные дыры: Gaia BH1, A0620-00, V616 Mon');
    console.log('🌍 Экзопланеты: Проксима b, Барнард b');
    console.log('🔍 Поиск объектов в правом верхнем углу');
    console.log('📏 Названия исчезают при отдалении > 4999 ед. и приближении < 1000 ед.');
  </script>
</body>
