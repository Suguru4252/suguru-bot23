<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>President Simulator 2D - Градостроительный симулятор</title>
    <style>
        :root {
            --bg: #0a0a14;
            --panel: #1a1a2e;
            --accent: #f0c040;
            --gold: #e8c547;
            --text: #e8e8e8;
            --green: #5cdb7c;
            --red: #f05555;
            --blue: #5ba0e0;
            --border: #2e2e4e;
            --hover: #2a2a50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #060610;
            overflow: hidden;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Экран создания */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: radial-gradient(ellipse at 50% 30%, #1a1040 0%, #060610 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }
        #splash.hidden {
            display: none;
        }
        .splash-stars {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .splash-title {
            font-size: 3.2em;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(180deg, #ffe08a, #c8943e, #8b5e14);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            filter: drop-shadow(0 4px 20px rgba(200,150,50,0.4));
            animation: titleGlow 2s ease-in-out infinite;
        }
        @keyframes titleGlow {
            0%,
            100% {
                filter: drop-shadow(0 4px 20px rgba(200,150,50,0.4));
            }
            50% {
                filter: drop-shadow(0 4px 35px rgba(240,200,80,0.7));
            }
        }
        .splash-subtitle {
            color: #b0a0c0;
            font-size: 1.1em;
            letter-spacing: 2px;
        }
        .splash-form {
            background: rgba(20,18,40,0.9);
            border: 1px solid #3a3050;
            border-radius: 20px;
            padding: 32px 40px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 440px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }
        .splash-form label {
            font-weight: 700;
            color: #d4b060;
            font-size: 0.95em;
            letter-spacing: 1px;
        }
        .splash-form input {
            background: #121025;
            border: 2px solid #3a3050;
            color: #fff;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 1.1em;
            transition: 0.3s;
            outline: none;
            letter-spacing: 0.5px;
        }
        .splash-form input:focus {
            border-color: #e8c547;
            box-shadow: 0 0 25px rgba(232,197,71,0.25);
        }
        .btn-create {
            background: linear-gradient(180deg, #f0c040, #b8781a);
            border: none;
            color: #1a1020;
            font-weight: 800;
            font-size: 1.2em;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 1.5px;
            transition: 0.3s;
            margin-top: 8px;
            text-transform: uppercase;
        }
        .btn-create:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(240,192,64,0.45);
        }

        /* Игровой экран */
        #game-screen {
            display: none;
            height: 100vh;
            width: 100vw;
            position: relative;
        }
        #game-screen.active {
            display: flex;
        }

        /* Верхняя панель */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(180deg, rgba(18,15,35,0.97), rgba(14,12,28,0.95));
            backdrop-filter: blur(15px);
            border-bottom: 1px solid #2e2e4e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 20px;
            height: 56px;
        }
        .country-name-display {
            font-weight: 800;
            font-size: 1.25em;
            background: linear-gradient(180deg, #ffe08a, #c8943e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .resources {
            display: flex;
            gap: 22px;
            align-items: center;
        }
        .resource {
            display: flex;
            align-items: center;
            gap: 7px;
            font-weight: 700;
            font-size: 0.95em;
        }
        .res-icon {
            font-size: 1.4em;
        }
        .res-money {
            color: #f0d060;
        }
        .res-pop {
            color: #6dc8e8;
        }
        .res-happy {
            color: #6ce89c;
        }
        .btn-top {
            background: rgba(40,35,70,0.8);
            border: 1px solid #3a3050;
            color: #ccc;
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: 0.85em;
        }
        .btn-top:hover {
            background: #3a3050;
            border-color: #c8943e;
        }

        /* Canvas */
        #game-canvas {
            flex: 1;
            cursor: grab;
            display: block;
        }
        #game-canvas.building {
            cursor: crosshair;
        }
        #game-canvas.grabbing {
            cursor: grabbing;
        }

        /* Панель строительства */
        #build-panel {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(16,14,30,0.96);
            backdrop-filter: blur(15px);
            border: 1px solid #2e2e4e;
            border-radius: 22px;
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95vw;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
        }
        .build-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 8px 11px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.25s;
            border: 2px solid transparent;
            background: rgba(30,25,55,0.6);
            min-width: 68px;
            position: relative;
        }
        .build-item:hover {
            background: rgba(50,40,80,0.8);
            border-color: #c8943e;
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .build-item.selected {
            border-color: #f0d060 !important;
            background: rgba(200,160,50,0.2) !important;
            box-shadow: 0 0 30px rgba(240,208,96,0.3);
        }
        .build-emoji {
            font-size: 1.8em;
            line-height: 1;
        }
        .build-name {
            font-size: 0.7em;
            font-weight: 700;
            text-align: center;
            line-height: 1.2;
            color: #ddd;
        }
        .build-cost {
            font-size: 0.65em;
            color: #f0d060;
            font-weight: 700;
        }

        /* Категории */
        .build-category-label {
            font-size: 0.65em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            padding: 0 4px;
            font-weight: 700;
        }

        /* Инфо-окно */
        #info-popup {
            position: absolute;
            pointer-events: none;
            z-index: 150;
            background: rgba(8,6,20,0.95);
            border: 1px solid #3a3050;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 0.85em;
            display: none;
            white-space: nowrap;
            box-shadow: 0 10px 35px rgba(0,0,0,0.7);
            line-height: 1.5;
        }
        #info-popup .pop-title {
            font-weight: 700;
            color: #f0d060;
            font-size: 1em;
        }

        /* Лог */
        #message-log {
            position: absolute;
            top: 70px;
            right: 20px;
            z-index: 110;
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: none;
        }
        .log-msg {
            background: rgba(0,0,0,0.85);
            border-left: 3px solid #f0c040;
            padding: 7px 12px;
            border-radius: 6px;
            font-size: 0.8em;
            animation: fadeInOut 3.5s forwards;
            font-weight: 500;
        }
        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translateX(25px);
            }
            12% {
                opacity: 1;
                transform: translateX(0);
            }
            75% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateX(25px);
            }
        }
    </style>
</head>
<body>

    <!-- ЭКРАН СОЗДАНИЯ СТРАНЫ -->
    <div id="splash">
        <canvas class="splash-stars" id="splash-stars"></canvas>
        <div class="splash-title">🏛️ PRESIDENT<br>SIMULATOR</div>
        <div class="splash-subtitle">Постройте страну своей мечты</div>
        <div class="splash-form">
            <label for="country-name">📜 Название государства</label>
            <input type="text" id="country-name" placeholder="Введите название..." maxlength="28" value="Великоречье">
            <button class="btn-create" onclick="startGame()">🌟 ОСНОВАТЬ ГОСУДАРСТВО</button>
        </div>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="game-screen">
        <div id="top-bar">
            <div class="country-name-display" id="display-country-name">🏛️ Великоречье</div>
            <div class="resources">
                <div class="resource"><span class="res-icon">💰</span> Казна: <span class="res-money" id="money-val">50000</span></div>
                <div class="resource"><span class="res-icon">👥</span> Население: <span class="res-pop" id="pop-val">100</span></div>
                <div class="resource"><span class="res-icon">😊</span> Счастье: <span class="res-happy" id="happy-val">75</span>%</div>
            </div>
            <button class="btn-top" onclick="showHelp()">❓ Справка</button>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="info-popup"></div>
        <div id="message-log"></div>
        <div id="build-panel">
            <span class="build-category-label">ДОРОГИ</span>
            <div class="build-item" data-type="road" onclick="selectBuild('road')">
                <span class="build-emoji">🛣️</span><span class="build-name">Асфальт</span><span class="build-cost">💰50</span></div>
            <div class="build-item" data-type="rail" onclick="selectBuild('rail')">
                <span class="build-emoji">🚂</span><span class="build-name">Ж/Д путь</span><span class="build-cost">💰200</span></div>
            <span class="build-category-label">ЖИЛЬЁ</span>
            <div class="build-item" data-type="house" onclick="selectBuild('house')">
                <span class="build-emoji">🏠</span><span class="build-name">Дом</span><span class="build-cost">💰500</span></div>
            <div class="build-item" data-type="apartment" onclick="selectBuild('apartment')">
                <span class="build-emoji">🏢</span><span class="build-name">ЖК</span><span class="build-cost">💰2000</span></div>
            <div class="build-item" data-type="mansion" onclick="selectBuild('mansion')">
                <span class="build-emoji">🏰</span><span class="build-name">Особняк</span><span class="build-cost">💰8000</span></div>
            <span class="build-category-label">БИЗНЕС</span>
            <div class="build-item" data-type="shop" onclick="selectBuild('shop')">
                <span class="build-emoji">🏪</span><span class="build-name">Магазин</span><span class="build-cost">💰800</span></div>
            <div class="build-item" data-type="factory" onclick="selectBuild('factory')">
                <span class="build-emoji">🏭</span><span class="build-name">Завод</span><span class="build-cost">💰3000</span></div>
            <div class="build-item" data-type="office" onclick="selectBuild('office')">
                <span class="build-emoji">🏬</span><span class="build-name">Бизнес-центр</span><span class="build-cost">💰5000</span></div>
            <span class="build-category-label">ИНФРА</span>
            <div class="build-item" data-type="park" onclick="selectBuild('park')">
                <span class="build-emoji">🌳</span><span class="build-name">Парк</span><span class="build-cost">💰300</span></div>
            <div class="build-item" data-type="school" onclick="selectBuild('school')">
                <span class="build-emoji">🏫</span><span class="build-name">Школа</span><span class="build-cost">💰4000</span></div>
            <div class="build-item" data-type="hospital" onclick="selectBuild('hospital')">
                <span class="build-emoji">🏥</span><span class="build-name">Больница</span><span class="build-cost">💰6000</span></div>
            <div class="build-item" data-type="stadium" onclick="selectBuild('stadium')">
                <span class="build-emoji">🏟️</span><span class="build-name">Стадион</span><span class="build-cost">💰15000</span></div>
            <button class="btn-top" style="margin-left:6px;height:44px;" onclick="clearSelection()">✖</button>
        </div>
    </div>

    <script>
        // ==================== СОСТОЯНИЕ ====================
        const S = {
            countryName: '',
            money: 50000,
            population: 100,
            happiness: 75,
            buildings: [],
            roads: [],
            rails: [],
            people: [],
            particles: [],
            selectedType: null,
            canvas: null,
            ctx: null,
            camX: 0,
            camY: 0,
            gridSize: 48,
            dragging: false,
            dragSX: 0,
            dragSY: 0,
            mx: 0,
            my: 0,
            hovered: null,
            time: 0,
            incomeTimer: 0,
        };

        // Типы строений
        const BT = {
            road: { emoji:'🛣️', name:'Асфальтовая дорога', cost:50, color:'#555555', pop:0, happy:2, income:0, w:48, h:48, isRoad:true, roadColor:'#444444', lineColor:'#ffff88' },
            rail: { emoji:'🚂', name:'Железная дорога', cost:200, color:'#8B7355', pop:0, happy:3, income:15, w:48, h:48, isRail:true, railColor:'#6b5040' },
            house: { emoji:'🏠', name:'Жилой дом', cost:500, color:'#e8c897', pop:8, happy:3, income:12, w:44, h:44, roofColor:'#c0392b', wallColor:'#f5deb3' },
            apartment: { emoji:'🏢', name:'Жилой комплекс', cost:2000, color:'#b0c4de', pop:40, happy:-2, income:50, w:50, h:56, floors:8 },
            mansion: { emoji:'🏰', name:'Особняк', cost:8000, color:'#d4af37', pop:15, happy:10, income:80, w:54, h:54 },
            shop: { emoji:'🏪', name:'Магазин', cost:800, color:'#f5deb3', pop:3, happy:6, income:70, w:42, h:42 },
            factory: { emoji:'🏭', name:'Завод', cost:3000, color:'#8899aa', pop:20, happy:-6, income:250, w:52, h:52, chimneys:3 },
            office: { emoji:'🏬', name:'Бизнес-центр', cost:5000, color:'#87ceeb', pop:12, happy:4, income:400, w:48, h:60, floors:12 },
            park: { emoji:'🌳', name:'Парк', cost:300, color:'#6b8e6b', pop:0, happy:15, income:0, w:46, h:46 },
            school: { emoji:'🏫', name:'Школа', cost:4000, color:'#d4a574', pop:5, happy:8, income:-20, w:50, h:48 },
            hospital: { emoji:'🏥', name:'Больница', cost:6000, color:'#f8f8f8', pop:8, happy:12, income:-50, w:52, h:50 },
            stadium: { emoji:'🏟️', name:'Стадион', cost:15000, color:'#c0c0c0', pop:25, happy:20, income:150, w:64, h:56 },
        };

        // ==================== ЗВЁЗДЫ НА СПЛЭШЕ ====================
        function initSplashStars() {
            const c = document.getElementById('splash-stars');
            c.width = window.innerWidth;
            c.height = window.innerHeight;
            const ctx = c.getContext('2d');
            const stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * c.width,
                    y: Math.random() * c.height,
                    r: Math.random() * 1.8 + 0.5,
                    twinkle: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.02 + 0.005,
                });
            }

            function draw() {
                ctx.clearRect(0, 0, c.width, c.height);
                stars.forEach(s => {
                    s.twinkle += s.speed;
                    const alpha = 0.4 + Math.sin(s.twinkle) * 0.4;
                    ctx.fillStyle = `rgba(255,255,240,${alpha})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        }
        initSplashStars();

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        function initCanvas() {
            S.canvas = document.getElementById('game-canvas');
            S.ctx = S.canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        }

        function resizeCanvas() {
            S.canvas.width = window.innerWidth;
            S.canvas.height = window.innerHeight;
            S.camX = S.canvas.width / 2;
            S.camY = S.canvas.height / 2;
        }

        // ==================== СТАРТ ====================
        function startGame() {
            const inp = document.getElementById('country-name');
            const name = inp.value.trim();
            if (!name) { inp.style.borderColor = '#f05555';
                inp.focus(); setTimeout(() => inp.style.borderColor = '#3a3050', 1500); return; }
            S.countryName = name;
            S.buildings = [];
            S.roads = [];
            S.rails = [];
            S.people = [];
            S.particles = [];
            S.money = 50000;
            S.population = 100;
            S.happiness = 75;
            S.selectedType = null;
            S.time = 0;
            S.incomeTimer = 0;

            document.getElementById('splash').classList.add('hidden');
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('display-country-name').textContent = '🏛️ ' + S.countryName;

            initCanvas();
            updateUI();
            addLog('🌟 Добро пожаловать, господин Президент! Стройте страну.');
            spawnInitialPeople();
            gameLoop();
        }

        function spawnInitialPeople() {
            for (let i = 0; i < 30; i++) {
                S.people.push({
                    x: (Math.random() - 0.5) * 400,
                    y: (Math.random() - 0.5) * 400,
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: (Math.random() - 0.5) * 1.5,
                    color: `hsl(${Math.random()*360},40%,65%)`,
                    size: 4 + Math.random() * 3,
                    walkTimer: Math.random() * 100,
                });
            }
        }

        function updateUI() {
            document.getElementById('money-val').textContent = Math.floor(S.money).toLocaleString();
            document.getElementById('pop-val').textContent = S.population;
            document.getElementById('happy-val').textContent = Math.round(S.happiness);
            document.querySelectorAll('.build-item').forEach(el => {
                el.classList.toggle('selected', el.dataset.type === S.selectedType);
            });
            const cv = S.canvas;
            if (cv) {
                cv.classList.toggle('building', !!S.selectedType);
                cv.classList.toggle('grabbing', S.dragging);
            }
        }

        function selectBuild(type) {
            S.selectedType = S.selectedType === type ? null : type;
            updateUI();
            if (S.selectedType) addLog(`🔨 Выбрано: ${BT[S.selectedType].emoji} ${BT[S.selectedType].name}`);
        }

        function clearSelection() { S.selectedType = null;
            updateUI(); }

        // ==================== СТРОИТЕЛЬСТВО ====================
        function buildAt(wx, wy) {
            if (!S.selectedType) return;
            const t = S.selectedType;
            const info = BT[t];
            if (S.money < info.cost) { addLog('❌ Недостаточно средств!');
                shakeEl('money-val'); return; }

            const snap = S.gridSize;
            const sx = Math.round(wx / snap) * snap;
            const sy = Math.round(wy / snap) * snap;
            const nb = {
                type: t,
                x: sx - info.w / 2,
                y: sy - info.h / 2,
                w: info.w,
                h: info.h,
                placedAt: S.time,
            };

            // Проверка наложения
            const allCollidables = [...S.buildings, ...S.roads, ...S.rails];
            if (info.isRoad) {
                const overlap = allCollidables.some(b => rectsOverlap(nb, b, 2));
                if (overlap && !info.isRoad && !info.isRail) { addLog('⚠️ Место занято!'); return; }
                if (info.isRoad) S.roads.push(nb);
                else if (info.isRail) S.rails.push(nb);
            } else {
                const overlap = allCollidables.some(b => rectsOverlap(nb, b, 4));
                if (overlap) { addLog('⚠️ Место занято!'); return; }
                S.buildings.push(nb);
            }

            S.money -= info.cost;
            if (!info.isRoad && !info.isRail) {
                S.population += info.pop;
                S.happiness = Math.max(0, Math.min(100, S.happiness + info.happy));
            }
            updateUI();
            addLog(`✅ Построено: ${info.emoji} ${info.name} (-💰${info.cost.toLocaleString()})`);
            spawnParticles(sx, sy, info.color || '#f0d060');
        }

        function rectsOverlap(a, b, margin) {
            return !(a.x + a.w - margin < b.x || a.x > b.x + b.w - margin ||
                a.y + a.h - margin < b.y || a.y > b.y + b.h - margin);
        }

        // ==================== ОТРИСОВКА ====================
        function drawGround(ctx, camX, camY, w, h) {
            // Трава с текстурой
            const grad = ctx.createRadialGradient(w / 2, h / 2, 100, w / 2, h / 2, w);
            grad.addColorStop(0, '#3d5a2e');
            grad.addColorStop(0.6, '#2d4a1e');
            grad.addColorStop(1, '#1a3010');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Текстурные пятна травы
            const gs = S.gridSize;
            const sx = -((camX % gs) + gs) % gs;
            const sy = -((camY % gs) + gs) % gs;
            for (let x = sx; x < w + gs; x += gs) {
                for (let y = sy; y < h + gs; y += gs) {
                    const seed = (Math.floor((x + camX) / gs) * 1000 + Math.floor((y + camY) / gs)) * 0.01;
                    const shade = Math.sin(seed) * 0.06;
                    ctx.fillStyle = `rgba(255,255,255,${0.02 + shade})`;
                    ctx.fillRect(x, y, gs, gs);
                }
            }
        }

        function drawGrid(ctx, camX, camY, w, h) {
            const gs = S.gridSize;
            const sx = -((camX % gs) + gs) % gs;
            const sy = -((camY % gs) + gs) % gs;
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = sx; x < w + gs; x += gs) { ctx.moveTo(x, 0);
                ctx.lineTo(x, h); }
            for (let y = sy; y < h + gs; y += gs) { ctx.moveTo(0, y);
                ctx.lineTo(w, y); }
            ctx.stroke();
        }

        function drawRoad(ctx, r, camX, camY, info) {
            const sx = r.x - camX;
            const sy = r.y - camY;
            const w = r.w;
            const h = r.h;
            if (info.isRoad) {
                // Асфальт
                ctx.fillStyle = '#3a3a3a';
                ctx.fillRect(sx, sy, w, h);
                // Бордюры
                ctx.fillStyle = '#888888';
                ctx.fillRect(sx, sy, w, 3);
                ctx.fillRect(sx, sy + h - 3, w, 3);
                ctx.fillRect(sx, sy, 3, h);
                ctx.fillRect(sx + w - 3, sy, 3, h);
                // Разметка
                ctx.strokeStyle = '#ffff66';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([8, 12]);
                ctx.beginPath();
                ctx.moveTo(sx + w / 2, sy);
                ctx.lineTo(sx + w / 2, sy + h);
                ctx.stroke();
                ctx.setLineDash([]);
            } else if (info.isRail) {
                // Ж/Д полотно
                ctx.fillStyle = '#8B7355';
                ctx.fillRect(sx, sy, w, h);
                // Шпалы
                ctx.fillStyle = '#5c4030';
                for (let i = 0; i < h; i += 8) {
                    ctx.fillRect(sx + 2, sy + i, w - 4, 4);
                }
                // Рельсы
                ctx.strokeStyle = '#c0c0c0';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(sx + 8, sy);
                ctx.lineTo(sx + 8, sy + h);
                ctx.moveTo(sx + w - 8, sy);
                ctx.lineTo(sx + w - 8, sy + h);
                ctx.stroke();
            }
        }

        function drawBuilding(ctx, b, camX, camY, info) {
            const sx = b.x - camX;
            const sy = b.y - camY;
            const w = b.w;
            const h = b.h;
            const t = b.type;

            ctx.save();
            // Тень
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.fillRect(sx + 3, sy + 3, w, h);

            if (t === 'house') {
                // Стены
                ctx.fillStyle = '#f5deb3';
                ctx.fillRect(sx, sy, w, h - 12);
                // Крыша
                ctx.fillStyle = '#c0392b';
                ctx.beginPath();
                ctx.moveTo(sx - 4, sy);
                ctx.lineTo(sx + w / 2, sy - 16);
                ctx.lineTo(sx + w + 4, sy);
                ctx.closePath();
                ctx.fill();
                // Окна
                ctx.fillStyle = '#87ceeb';
                ctx.fillRect(sx + 7, sy + 8, 10, 10);
                ctx.fillRect(sx + w - 17, sy + 8, 10, 10);
                // Дверь
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(sx + w / 2 - 6, sy + h - 18, 12, 18);
            } else if (t === 'apartment') {
                const floors = 8;
                const fh = h / floors;
                ctx.fillStyle = '#c8d8e8';
                ctx.fillRect(sx, sy, w, h);
                for (let i = 0; i < floors; i++) {
                    ctx.fillStyle = i % 2 === 0 ? '#d0dce8' : '#bcc8d8';
                    ctx.fillRect(sx, sy + i * fh, w, fh);
                    // Окна
                    ctx.fillStyle = '#87ceeb';
                    for (let j = 0; j < 3; j++) {
                        ctx.fillRect(sx + 5 + j * 15, sy + i * fh + 3, 8, fh - 6);
                    }
                }
            } else if (t === 'mansion') {
                ctx.fillStyle = '#f0e6d3';
                ctx.fillRect(sx, sy + 10, w, h - 10);
                ctx.fillStyle = '#d4af37';
                ctx.fillRect(sx + 8, sy, w - 16, 24);
                // Купол
                ctx.fillStyle = '#c9972e';
                ctx.beginPath();
                ctx.arc(sx + w / 2, sy, 14, Math.PI, 0);
                ctx.fill();
                // Колонны
                ctx.fillStyle = '#e8dcc8';
                ctx.fillRect(sx + 4, sy + 24, 6, h - 14);
                ctx.fillRect(sx + w - 10, sy + 24, 6, h - 14);
            } else if (t === 'factory') {
                ctx.fillStyle = '#778899';
                ctx.fillRect(sx, sy + 12, w, h - 12);
                // Трубы
                ctx.fillStyle = '#555';
                for (let i = 0; i < 3; i++) {
                    ctx.fillRect(sx + 8 + i * 16, sy - 16, 8, 28);
                }
                // Дым (анимированный)
                const smokeOff = Math.sin(S.time * 0.05 + b.x) * 3;
                for (let i = 0; i < 3; i++) {
                    ctx.fillStyle = 'rgba(180,180,180,0.5)';
                    ctx.beginPath();
                    ctx.arc(sx + 12 + i * 16 + smokeOff, sy - 20 - i * 4, 6 + i * 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (t === 'office') {
                const floors = 12;
                const fh = h / floors;
                ctx.fillStyle = '#9ac8e8';
                ctx.fillRect(sx, sy, w, h);
                for (let i = 0; i < floors; i++) {
                    ctx.fillStyle = i % 2 === 0 ? '#a8d4f0' : '#8ab8d8';
                    ctx.fillRect(sx, sy + i * fh, w, fh);
                    ctx.fillStyle = '#ffffff';
                    for (let j = 0; j < 4; j++) {
                        ctx.fillRect(sx + 3 + j * 11, sy + i * fh + 2, 7, fh - 4);
                    }
                }
            } else if (t === 'shop') {
                ctx.fillStyle = '#ffe4b5';
                ctx.fillRect(sx, sy, w, h);
                ctx.fillStyle = '#ff6347';
                ctx.fillRect(sx + 2, sy, w - 4, 10);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(sx + 4, sy + 14, w - 8, h - 28);
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(sx + w / 2 - 7, sy + h - 12, 14, 10);
            } else if (t === 'park') {
                ctx.fillStyle = '#5a8a5a';
                ctx.fillRect(sx, sy, w, h);
                // Деревья
                const treePositions = [
                    [0.2, 0.25],
                    [0.5, 0.2],
                    [0.8, 0.3],
                    [0.3, 0.6],
                    [0.7, 0.65],
                    [0.5, 0.75]
                ];
                treePositions.forEach(([tx, ty]) => {
                    const tx2 = sx + tx * w;
                    const ty2 = sy + ty * h;
                    ctx.fillStyle = '#3d2b1f';
                    ctx.fillRect(tx2 - 2, ty2, 4, 12);
                    ctx.fillStyle = '#2d6e2d';
                    ctx.beginPath();
                    ctx.arc(tx2, ty2 - 2, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#3d8e3d';
                    ctx.beginPath();
                    ctx.arc(tx2, ty2 - 6, 7, 0, Math.PI * 2);
                    ctx.fill();
                });
                // Пруд
                ctx.fillStyle = '#4a90c8';
                ctx.beginPath();
                ctx.ellipse(sx + w * 0.5, sy + h * 0.45, 14, 8, 0, 0, Math.PI * 2);
                ctx.fill();
            } else if (t === 'school') {
                ctx.fillStyle = '#d4a574';
                ctx.fillRect(sx, sy + 6, w, h - 6);
                ctx.fillStyle = '#c0392b';
                ctx.fillRect(sx - 2, sy, w + 4, 12);
                ctx.fillStyle = '#87ceeb';
                for (let i = 0; i < 4; i++) {
                    ctx.fillRect(sx + 5 + i * 11, sy + 18, 7, 8);
                }
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(sx + w / 2 - 5, sy + h - 14, 10, 14);
            } else if (t === 'hospital') {
                ctx.fillStyle = '#f8f8f8';
                ctx.fillRect(sx, sy, w, h);
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(sx + w / 2 - 10, sy, 20, 14);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(sx + w / 2 - 3, sy + 2, 6, 10);
                ctx.fillRect(sx + w / 2 - 8, sy + 6, 16, 3);
                ctx.fillStyle = '#87ceeb';
                for (let i = 0; i < 3; i++) {
                    for (let j = 0; j < 3; j++) {
                        ctx.fillRect(sx + 5 + j * 16, sy + 18 + i * 12, 10, 8);
                    }
                }
            } else if (t === 'stadium') {
                ctx.fillStyle = '#d0d0d0';
                ctx.fillRect(sx, sy, w, h);
                ctx.fillStyle = '#3a8a3a';
                ctx.beginPath();
                ctx.ellipse(sx + w / 2, sy + h / 2, w / 2 - 4, h / 2 - 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(sx + w / 2, sy + h / 2, 10, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Подсветка при наведении
            if (S.hovered === b) {
                ctx.strokeStyle = '#f0d060';
                ctx.lineWidth = 3;
                ctx.strokeRect(sx - 2, sy - 2, w + 4, h + 4);
                ctx.strokeStyle = 'rgba(240,208,96,0.35)';
                ctx.lineWidth = 7;
                ctx.strokeRect(sx - 5, sy - 5, w + 10, h + 10);
            }

            ctx.restore();
        }

        function drawPeople(ctx, camX, camY) {
            S.people.forEach(p => {
                const sx = p.x - camX;
                const sy = p.y - camY;
                if (sx < -30 || sx > S.canvas.width + 30 || sy < -30 || sy > S.canvas.height + 30) return;
                // Тень
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(sx, sy + p.size * 0.8, p.size * 0.8, p.size * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();
                // Тело
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(sx, sy - p.size * 0.5, p.size * 0.6, 0, Math.PI * 2);
                ctx.fill();
                // Одежда
                ctx.fillStyle = `hsl(${parseInt(p.color.match(/\d+/)?.[0]||0)+30},50%,55%)`;
                ctx.fillRect(sx - p.size * 0.4, sy - p.size * 0.2, p.size * 0.8, p.size * 0.9);
                // Глаза
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(sx - p.size * 0.2, sy - p.size * 0.6, p.size * 0.18, 0, Math.PI * 2);
                ctx.arc(sx + p.size * 0.2, sy - p.size * 0.6, p.size * 0.18, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(sx - p.size * 0.15, sy - p.size * 0.6, p.size * 0.08, 0, Math.PI * 2);
                ctx.arc(sx + p.size * 0.25, sy - p.size * 0.6, p.size * 0.08, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawParticles(ctx, camX, camY) {
            S.particles = S.particles.filter(p => p.life > 0);
            S.particles.forEach(p => {
                const sx = p.x - camX;
                const sy = p.y - camY;
                ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.life})`;
                ctx.beginPath();
                ctx.arc(sx, sy, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function gameLoop(ts) {
            S.time = ts;
            const ctx = S.ctx;
            const cv = S.canvas;
            if (!cv || !ctx) { requestAnimationFrame(gameLoop); return; }
            const w = cv.width;
            const h = cv.height;
            const camX = S.camX - w / 2;
            const camY = S.camY - h / 2;

            // Фон
            drawGround(ctx, camX, camY, w, h);
            drawGrid(ctx, camX, camY, w, h);

            // Дороги
            S.roads.forEach(r => drawRoad(ctx, r, camX, camY, BT.road));
            S.rails.forEach(r => drawRoad(ctx, r, camX, camY, BT.rail));

            // Здания
            S.buildings.forEach(b => {
                const info = BT[b.type];
                if (info) drawBuilding(ctx, b, camX, camY, info);
            });

            // Люди
            updatePeople();
            drawPeople(ctx, camX, camY);

            // Частицы
            updateParticles();
            drawParticles(ctx, camX, camY);

            // Призрак строительства
            if (S.selectedType && !S.dragging) {
                const info = BT[S.selectedType];
                const snap = S.gridSize;
                const wx = S.mx + camX;
                const wy = S.my + camY;
                const sx2 = Math.round(wx / snap) * snap - info.w / 2;
                const sy2 = Math.round(wy / snap) * snap - info.h / 2;
                const sx = sx2 - camX;
                const sy = sy2 - camY;
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(sx, sy, info.w, info.h);
                ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                ctx.setLineDash([5, 5]);
                ctx.lineWidth = 2;
                ctx.strokeRect(sx, sy, info.w, info.h);
                ctx.setLineDash([]);
                ctx.font = '20px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(info.emoji, sx + info.w / 2, sy + info.h / 2);
            }

            // Доход
            S.incomeTimer += 16;
            if (S.incomeTimer >= 3000) {
                S.incomeTimer = 0;
                let totalInc = 0;
                S.buildings.forEach(b => { totalInc += (BT[b.type]?.income || 0); });
                S.rails.forEach(() => { totalInc += 15; });
                S.money += totalInc;
                S.happiness += (Math.random() - 0.47) * 0.4;
                S.happiness = Math.max(0, Math.min(100, S.happiness));
                updateUI();
            }

            requestAnimationFrame(gameLoop);
        }

        // ==================== ОБНОВЛЕНИЕ ЛЮДЕЙ ====================
        function updatePeople() {
            S.people.forEach(p => {
                p.walkTimer += 0.05;
                if (Math.random() < 0.02) {
                    p.vx += (Math.random() - 0.5) * 0.6;
                    p.vy += (Math.random() - 0.5) * 0.6;
                    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                    if (speed > 2) { p.vx *= 1.5 / speed;
                        p.vy *= 1.5 / speed; }
                }
                p.x += p.vx;
                p.y += p.vy;
                // Гравитация к центру
                const dist = Math.sqrt(p.x * p.x + p.y * p.y);
                if (dist > 500) {
                    p.vx -= p.x / dist * 0.03;
                    p.vy -= p.y / dist * 0.03;
                }
            });
        }

        function updateParticles() {
            S.particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life -= 0.025;
                p.size *= 0.995;
            });
        }

        function spawnParticles(wx, wy, colorHex) {
            const hex = colorHex || '#f0d060';
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            for (let i = 0; i < 25; i++) {
                S.particles.push({
                    x: wx,
                    y: wy,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5 - 4,
                    life: 1,
                    size: Math.random() * 5 + 2,
                    r,
                    g,
                    b,
                });
            }
        }

        // ==================== СОБЫТИЯ ====================
        function getWorldCoords(e) {
            const rect = S.canvas.getBoundingClientRect();
            return {
                sx: e.clientX - rect.left,
                sy: e.clientY - rect.top,
                wx: e.clientX - rect.left + S.camX - S.canvas.width / 2,
                wy: e.clientY - rect.top + S.camY - S.canvas.height / 2,
            };
        }

        function findAt(wx, wy) {
            const all = [...S.buildings, ...S.roads, ...S.rails];
            return all.find(b => wx >= b.x && wx <= b.x + b.w && wy >= b.y && wy <= b.y + b.h) || null;
        }

        document.addEventListener('mousemove', e => {
            if (!S.canvas) return;
            const c = getWorldCoords(e);
            S.mx = c.sx;
            S.my = c.sy;
            if (S.dragging) {
                S.camX -= e.clientX - S.dragSX;
                S.camY -= e.clientY - S.dragSY;
                S.dragSX = e.clientX;
                S.dragSY = e.clientY;
            }
            S.hovered = findAt(c.wx, c.wy);
            const popup = document.getElementById('info-popup');
            if (S.hovered && !S.dragging && !S.selectedType) {
                const b = S.hovered;
                const info = BT[b.type];
                popup.style.display = 'block';
                popup.style.left = (c.sx + 22) + 'px';
                popup.style.top = (c.sy - 15) + 'px';
                popup.innerHTML = `<span class="pop-title">${info?.emoji||''} ${info?.name||''}</span><br>
              <span style="color:#aaa;">Размер:</span> ${b.w}x${b.h}<br>
              ${info&&!info.isRoad&&!info.isRail?`<span style="color:#aaa;">Население:</span> +${info.pop}<br>`:''}
              <span style="color:#aaa;">Доход/мес:</span> 💰${info?.income||0}<br>
              <span style="color:#aaa;">Счастье:</span> ${(info?.happy||0)>=0?'+':''}${info?.happy||0}`;
            } else { popup.style.display = 'none'; }
        });

        document.addEventListener('mousedown', e => {
            if (!S.canvas || e.target.closest('#build-panel') || e.target.closest('#top-bar')) return;
            if (e.button === 0 && S.selectedType) {
                const c = getWorldCoords(e);
                buildAt(c.wx, c.wy);
            } else if (e.button === 0 && !S.selectedType) {
                S.dragging = true;
                S.dragSX = e.clientX;
                S.dragSY = e.clientY;
                updateUI();
            }
            if (e.button === 2) { e.preventDefault();
                clearSelection(); }
        });

        document.addEventListener('mouseup', () => { S.dragging = false;
            updateUI(); });
        document.addEventListener('contextmenu', e => { if (e.target.closest('#game-canvas')) e.preventDefault(); });
        document.addEventListener('wheel', e => {
            if (!S.canvas) return;
            e.preventDefault();
            const rect = S.canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const wx = mx + S.camX - S.canvas.width / 2;
            const wy = my + S.camY - S.canvas.height / 2;
            const zf = 1.07;
            if (e.deltaY < 0) S.gridSize = Math.min(100, S.gridSize * zf);
            else S.gridSize = Math.max(18, S.gridSize / zf);
            S.camX = wx - mx + S.canvas.width / 2;
            S.camY = wy - my + S.canvas.height / 2;
        }, { passive: false });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') clearSelection();
            const keys = { '1': 'road', '2': 'rail', '3': 'house', '4': 'apartment', '5': 'mansion', '6': 'shop', '7': 'factory',
                '8': 'office', '9': 'park', '0': 'school', '-': 'hospital', '=': 'stadium' };
            if (keys[e.key]) selectBuild(keys[e.key]);
        });

        // ==================== УТИЛИТЫ ====================
        function addLog(msg) {
            const log = document.getElementById('message-log');
            const d = document.createElement('div');
            d.className = 'log-msg';
            d.textContent = msg;
            log.appendChild(d);
            setTimeout(() => d.remove(), 3500);
            if (log.children.length > 6) log.firstChild.remove();
        }

        function shakeEl(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.style.animation = 'shake 0.4s ease';
            setTimeout(() => el.style.animation = '', 400);
        }

        function showHelp() {
            alert('🎮 УПРАВЛЕНИЕ:\n\n' +
                '🖱️ ЛКМ — строить / перетаскивать карту\n' +
                '🖱️ Колёсико — масштаб\n' +
                '⌨️ Клавиши 1-9,0,-,= — выбор инструментов\n' +
                '⌨️ Esc / ПКМ — отмена\n\n' +
                '🏗️ СТРОИТЕЛЬСТВО:\n' +
                '🛣️ Дороги и ж/д пути\n' +
                '🏠 Жилые дома, ЖК, особняки\n' +
                '🏪 Магазины, заводы, бизнес-центры\n' +
                '🌳 Парки, школы, больницы, стадионы\n\n' +
                '💰 Здания приносят ежемесячный доход!\n' +
                '👥 Следите за населением и счастьем.');
        }

        const shakeCSS = document.createElement('style');
        shakeCSS.textContent =
            '@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-3px)}}';
        document.head.appendChild(shakeCSS);

        console.log('🏛️ President Simulator 2D готов!');
        console.log('Стройте дороги, дома, заводы, парки и управляйте страной!');
    </script>
</body>
