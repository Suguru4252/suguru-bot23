<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Фронт: Тактическая оборона</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }

    /* Стили для спойлера */
    .spoiler-container {
      width: 800px;
      max-width: 95vw;
      margin-bottom: 10px;
    }
    .spoiler-btn {
      background: #3d3d3d;
      color: #ccc;
      border: 1px solid #555;
      padding: 10px 15px;
      width: 100%;
      text-align: left;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      transition: background 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .spoiler-btn:hover {
      background: #4a4a4a;
    }
    .spoiler-btn .arrow {
      transition: transform 0.3s;
      font-size: 12px;
    }
    .spoiler-btn.open .arrow {
      transform: rotate(90deg);
    }
    .spoiler-content {
      background: #262626;
      border: 1px solid #555;
      border-top: none;
      padding: 0 15px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.4s ease;
      color: #aaa;
      font-size: 13px;
      line-height: 1.5;
    }
    .spoiler-content.open {
      max-height: 200px;
      padding: 15px;
    }
    .spoiler-content p {
      margin: 5px 0;
    }
    .spoiler-content strong {
      color: #ffaa00;
    }

    /* Основной контейнер игры */
    .game-container {
      background: #2d2d2d;
      border: 2px solid #555;
      border-radius: 8px;
      padding: 20px;
      width: 800px;
      max-width: 95vw;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    canvas {
      display: block;
      margin: 0 auto;
      background: #3a4a3a;
      border: 2px solid #666;
      border-radius: 4px;
      width: 100%;
      height: auto;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      color: #ccc;
      font-size: 14px;
      gap: 15px;
      flex-wrap: wrap;
    }
    .hud > div {
      background: #1f1f1f;
      padding: 8px 12px;
      border-radius: 4px;
      border: 1px solid #444;
    }
    .resources span {
      color: #ffcc00;
      font-weight: bold;
    }
    .unit-btn {
      background: #4a4a4a;
      color: #ddd;
      border: 1px solid #666;
      padding: 8px 14px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      border-radius: 4px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .unit-btn:hover {
      background: #5a5a5a;
    }
    .unit-btn:active {
      background: #3a3a3a;
      transform: scale(0.96);
    }
    .unit-btn.selected {
      background: #556b2f;
      border-color: #8fbc8f;
      box-shadow: 0 0 8px #8fbc8f;
    }
    .restart-btn {
      background: #5c3a3a;
      border-color: #8b3a3a;
    }
    .restart-btn:hover {
      background: #6b4444;
    }
    .message {
      color: #ff6666;
      margin-top: 8px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
    }
    @media (max-width: 600px) {
      .hud {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>

  <!-- СПОЙЛЕР -->
  <div class="spoiler-container">
    <button class="spoiler-btn" id="spoilerBtn">
      ⚠️ ПРЕДУПРЕЖДЕНИЕ <span class="arrow">▶</span>
    </button>
    <div class="spoiler-content" id="spoilerContent">
      <p><strong>Внимание:</strong> данная игра представляет собой абстрактный тактический симулятор обороны.</p>
      <p>Все события, юниты и локации являются вымышленными и не привязаны к реальным конфликтам.</p>
      <p>Игра создана исключительно в развлекательных целях.</p>
    </div>
  </div>

  <!-- ИГРА -->
  <div class="game-container">
    <canvas id="gameCanvas" width="700" height="400"></canvas>
    <div class="hud">
      <div class="resources">🔧 Ресурсы: <span id="resDisplay">100</span></div>
      <button class="unit-btn" id="btnTurret">🛡️ Башня (30)</button>
      <button class="unit-btn" id="btnSoldier">👤 Пехотинец (15)</button>
      <button class="unit-btn" id="btnMine">💣 Мина (10)</button>
      <button class="unit-btn restart-btn" id="btnRestart">🔄 Сброс</button>
    </div>
    <div class="message" id="messageText"></div>
  </div>

  <script>
    (function() {
      // --- СПОЙЛЕР ---
      const spoilerBtn = document.getElementById('spoilerBtn');
      const spoilerContent = document.getElementById('spoilerContent');
      spoilerBtn.addEventListener('click', () => {
        spoilerBtn.classList.toggle('open');
        spoilerContent.classList.toggle('open');
      });

      // --- ИГРОВАЯ ЛОГИКА ---
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');

      // Элементы HUD
      const resDisplay = document.getElementById('resDisplay');
      const messageText = document.getElementById('messageText');
      const btnTurret = document.getElementById('btnTurret');
      const btnSoldier = document.getElementById('btnSoldier');
      const btnMine = document.getElementById('btnMine');
      const btnRestart = document.getElementById('btnRestart');

      // Размеры игрового поля
      const W = canvas.width;
      const H = canvas.height;

      // Линия обороны (база) — левый край
      const BASE_X = 50;

      // Состояние игры
      let resources = 100;
      let selectedUnit = null; // 'turret', 'soldier', 'mine'
      let units = [];
      let enemies = [];
      let bullets = [];
      let gameOver = false;
      let victory = false;
      let wave = 1;
      let enemiesSpawnedThisWave = 0;
      let enemiesPerWave = 5;
      let spawnTimer = 0;
      let gameLoopId = null;

      // Класс юнита игрока
      class Unit {
        constructor(x, y, type) {
          this.x = x;
          this.y = y;
          this.type = type; // 'turret', 'soldier', 'mine'
          this.health = type === 'turret' ? 80 : 30;
          this.maxHealth = this.health;
          this.attackCooldown = 0;
          this.attackRange = type === 'turret' ? 150 : 90;
          this.damage = type === 'turret' ? 25 : 10;
          this.attackSpeed = type === 'turret' ? 40 : 25; // кадров между атаками
        }
      }

      // Класс врага
      class Enemy {
        constructor(y) {
          this.x = W - 30;
          this.y = y || Math.random() * (H - 40) + 20;
          this.health = 40 + wave * 10;
          this.maxHealth = this.health;
          this.speed = 0.6 + wave * 0.1;
          this.damage = 5 + wave * 2;
          this.attackCooldown = 0;
        }
      }

      // Класс пули
      class Bullet {
        constructor(x, y, targetX, targetY, damage, isEnemy = false) {
          this.x = x;
          this.y = y;
          this.damage = damage;
          this.isEnemy = isEnemy;
          const angle = Math.atan2(targetY - y, targetX - x);
          this.vx = Math.cos(angle) * 8;
          this.vy = Math.sin(angle) * 8;
          this.lifetime = 0;
          this.maxLifetime = 100;
        }
      }

      function addResources(amount) {
        resources += amount;
        updateDisplay();
      }

      function spendResources(amount) {
        if (resources >= amount) {
          resources -= amount;
          updateDisplay();
          return true;
        }
        return false;
      }

      function updateDisplay() {
        resDisplay.textContent = resources;
      }

      function showMessage(msg, isGood = false) {
        messageText.textContent = msg;
        messageText.style.color = isGood ? '#88ff88' : '#ff6666';
      }

      function clearMessage() {
        messageText.textContent = '';
      }

      // Размещение юнита
      function placeUnit(x, y, type) {
        let cost = 0;
        if (type === 'turret') cost = 30;
        else if (type === 'soldier') cost = 15;
        else if (type === 'mine') cost = 10;

        if (!spendResources(cost)) {
          showMessage('Недостаточно ресурсов!');
          return false;
        }

        // Нельзя ставить слишком близко к базе или за ней
        if (x < BASE_X + 15 || x > W - 20 || y < 10 || y > H - 10) {
          resources += cost; // возврат
          updateDisplay();
          showMessage('Нельзя разместить здесь!');
          return false;
        }

        // Мины невидимы для врагов, но мы их храним
        units.push(new Unit(x, y, type));
        clearMessage();
        return true;
      }

      // Спавн врага
      function spawnEnemy() {
        const y = Math.random() * (H - 60) + 30;
        enemies.push(new Enemy(y));
        enemiesSpawnedThisWave++;
      }

      // Игровой цикл
      function update() {
        if (gameOver || victory) return;

        // Спавн врагов волнами
        if (enemiesSpawnedThisWave < enemiesPerWave) {
          spawnTimer++;
          if (spawnTimer > 90) { // примерно 1.5 сек при 60 fps
            spawnEnemy();
            spawnTimer = 0;
          }
        }

        // Проверка: все враги волны уничтожены и все заспавнены
        if (enemiesSpawnedThisWave >= enemiesPerWave && enemies.length === 0) {
          wave++;
          enemiesPerWave = 5 + wave * 2;
          enemiesSpawnedThisWave = 0;
          spawnTimer = 0;
          addResources(30 + wave * 5);
          showMessage(`Волна ${wave-1} отбита! +${30 + (wave-1)*5} ресурсов`, true);
        }

        // Обновление юнитов игрока
        for (let u of units) {
          if (u.attackCooldown > 0) u.attackCooldown--;

          if (u.type === 'turret' || u.type === 'soldier') {
            // Поиск ближайшего врага в радиусе атаки
            if (u.attackCooldown <= 0) {
              let closestEnemy = null;
              let closestDist = Infinity;
              for (let e of enemies) {
                const dx = e.x - u.x;
                const dy = e.y - u.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < u.attackRange && dist < closestDist) {
                  closestDist = dist;
                  closestEnemy = e;
                }
              }
              if (closestEnemy) {
                // Стрельба
                bullets.push(new Bullet(u.x, u.y, closestEnemy.x, closestEnemy.y, u.damage));
                u.attackCooldown = u.attackSpeed;
              }
            }
          }

          // Мины взрываются при контакте с врагом
          if (u.type === 'mine') {
            for (let i = enemies.length - 1; i >= 0; i--) {
              const e = enemies[i];
              const dx = e.x - u.x;
              const dy = e.y - u.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 25) {
                // Взрыв мины
                e.health -= 40;
                // Урон по области
                for (let j = enemies.length - 1; j >= 0; j--) {
                  if (j === i) continue;
                  const ej = enemies[j];
                  const dx2 = ej.x - u.x;
                  const dy2 = ej.y - u.y;
                  const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
                  if (dist2 < 60) {
                    ej.health -= 15;
                  }
                }
                // Удаляем мину
                units = units.filter(unit => unit !== u);
                break;
              }
            }
          }
        }

        // Движение врагов
        for (let e of enemies) {
          // Если враг дошел до базы
          if (e.x <= BASE_X + 10) {
            gameOver = true;
            showMessage('Враг прорвал оборону! Игра окончена.');
            break;
          }

          // Атакует ли враг юнитов на пути?
          let blockingUnit = null;
          for (let u of units) {
            if (u.type === 'turret' || u.type === 'soldier') {
              const dx = e.x - u.x;
              const dy = e.y - u.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 30 && e.x > u.x) {
                blockingUnit = u;
                break;
              }
            }
          }

          if (blockingUnit && e.attackCooldown <= 0) {
            blockingUnit.health -= e.damage;
            e.attackCooldown = 40;
            if (blockingUnit.health <= 0) {
              units = units.filter(u => u !== blockingUnit);
            }
          }

          if (e.attackCooldown > 0) e.attackCooldown--;

          // Движение к базе (если не атакует)
          if (!blockingUnit || e.x > blockingUnit.x + 30) {
            e.x -= e.speed;
          }
        }

        // Удаление мертвых врагов
        enemies = enemies.filter(e => {
          if (e.health <= 0) {
            addResources(5);
            return false;
          }
          return true;
        });

        // Обновление пуль
        for (let b of bullets) {
          b.x += b.vx;
          b.y += b.vy;
          b.lifetime++;

          // Попадание во врага (пули игрока)
          if (!b.isEnemy) {
            for (let e of enemies) {
              const dx = e.x - b.x;
              const dy = e.y - b.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 15) {
                e.health -= b.damage;
                b.lifetime = 999; // пометить на удаление
                break;
              }
            }
          }
        }
        bullets = bullets.filter(b => b.lifetime < b.maxLifetime && b.x > 0 && b.x < W && b.y > 0 && b.y < H);

        // Проверка победы (условно после 5 волн)
        if (wave > 5 && enemies.length === 0 && enemiesSpawnedThisWave >= enemiesPerWave) {
          victory = true;
          showMessage('Победа! Вы удержали оборону!', true);
        }
      }

      // Отрисовка
      function draw() {
        ctx.clearRect(0, 0, W, H);

        // Фон
        ctx.fillStyle = '#3a4a3a';
        ctx.fillRect(0, 0, W, H);

        // Сетка
        ctx.strokeStyle = '#4a5a4a';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < W; i += 40) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, H);
          ctx.stroke();
        }
        for (let i = 0; i < H; i += 40) {
          ctx.beginPath();
          ctx.moveTo(0, i);
          ctx.lineTo(W, i);
          ctx.stroke();
        }

        // База
        ctx.fillStyle = '#4a6fa5';
        ctx.fillRect(0, 0, BASE_X, H);
        ctx.fillStyle = '#5a7fb5';
        ctx.fillRect(10, H/2-30, 30, 60);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px "Courier New"';
        ctx.fillText('БАЗА', 5, H/2-10);

        // Юниты игрока
        for (let u of units) {
          if (u.type === 'turret') {
            ctx.fillStyle = '#4a6b4a';
            ctx.fillRect(u.x-15, u.y-15, 30, 30);
            ctx.fillStyle = '#6b8b6b';
            ctx.fillRect(u.x-10, u.y-10, 20, 20);
            ctx.fillStyle = '#222';
            ctx.fillRect(u.x-3, u.y-18, 6, 10);
            // Полоска здоровья
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(u.x-15, u.y-22, 30, 4);
            ctx.fillStyle = '#44ff44';
            ctx.fillRect(u.x-15, u.y-22, 30 * (u.health/u.maxHealth), 4);
          } else if (u.type === 'soldier') {
            ctx.fillStyle = '#5a5a3a';
            ctx.beginPath();
            ctx.arc(u.x, u.y, 12, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#8a8a5a';
            ctx.beginPath();
            ctx.arc(u.x, u.y, 8, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(u.x-12, u.y-20, 24, 4);
            ctx.fillStyle = '#44ff44';
            ctx.fillRect(u.x-12, u.y-20, 24 * (u.health/u.maxHealth), 4);
          } else if (u.type === 'mine') {
            ctx.fillStyle = '#888';
            ctx.beginPath();
            ctx.arc(u.x, u.y, 8, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(u.x, u.y, 4, 0, Math.PI*2);
            ctx.fill();
          }
        }

        // Враги
        for (let e of enemies) {
          ctx.fillStyle = '#aa4444';
          ctx.beginPath();
          ctx.arc(e.x, e.y, 13, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = '#cc6666';
          ctx.beginPath();
          ctx.arc(e.x, e.y, 9, 0, Math.PI*2);
          ctx.fill();
          // Глаза
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(e.x-4, e.y-4, 3, 0, Math.PI*2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(e.x+4, e.y-4, 3, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = '#000';
          ctx.beginPath();
          ctx.arc(e.x-3, e.y-5, 1.5, 0, Math.PI*2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(e.x+5, e.y-5, 1.5, 0, Math.PI*2);
          ctx.fill();
          // Полоска здоровья
          ctx.fillStyle = '#ff4444';
          ctx.fillRect(e.x-14, e.y-22, 28, 4);
          ctx.fillStyle = '#44ff44';
          ctx.fillRect(e.x-14, e.y-22, 28 * (e.health/e.maxHealth), 4);
        }

        // Пули
        for (let b of bullets) {
          ctx.fillStyle = b.isEnemy ? '#ff6666' : '#ffff66';
          ctx.beginPath();
          ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
          ctx.fill();
        }

        // Сообщения
        ctx.fillStyle = '#fff';
        ctx.font = '14px "Courier New"';
        ctx.fillText(`Волна: ${wave}`, W-100, 25);
        ctx.fillText(`Врагов: ${enemies.length}/${enemiesPerWave}`, W-150, 45);

        if (gameOver) {
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = '#ff4444';
          ctx.font = 'bold 36px "Courier New"';
          ctx.fillText('ПОРАЖЕНИЕ', W/2-130, H/2);
        } else if (victory) {
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = '#ffcc00';
          ctx.font = 'bold 36px "Courier New"';
          ctx.fillText('ПОБЕДА!', W/2-100, H/2);
        }
      }

      function gameLoop() {
        update();
        draw();
        gameLoopId = requestAnimationFrame(gameLoop);
      }

      // Сброс игры
      function restartGame() {
        resources = 100;
        units = [];
        enemies = [];
        bullets = [];
        gameOver = false;
        victory = false;
        wave = 1;
        enemiesSpawnedThisWave = 0;
        enemiesPerWave = 5;
        spawnTimer = 0;
        selectedUnit = null;
        updateDisplay();
        clearMessage();
        document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('selected'));
      }

      // Обработка кликов по канвасу
      canvas.addEventListener('click', (e) => {
        if (gameOver || victory) return;
        if (!selectedUnit) {
          showMessage('Выберите тип юнита для размещения!');
          return;
        }

        const rect = canvas.getBoundingClientRect();
        const scaleX = W / rect.width;   // масштаб по X
        const scaleY = H / rect.height;  // масштаб по Y
        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;

        placeUnit(mouseX, mouseY, selectedUnit);
      });

      // Кнопки выбора юнитов
      btnTurret.addEventListener('click', () => {
        if (gameOver || victory) return;
        selectedUnit = 'turret';
        document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('selected'));
        btnTurret.classList.add('selected');
        showMessage('Выбрана башня (30 ресурсов). Кликните на карту для размещения.');
      });

      btnSoldier.addEventListener('click', () => {
        if (gameOver || victory) return;
        selectedUnit = 'soldier';
        document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('selected'));
        btnSoldier.classList.add('selected');
        showMessage('Выбран пехотинец (15 ресурсов). Кликните на карту для размещения.');
      });

      btnMine.addEventListener('click', () => {
        if (gameOver || victory) return;
        selectedUnit = 'mine';
        document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('selected'));
        btnMine.classList.add('selected');
        showMessage('Выбрана мина (10 ресурсов). Кликните на карту для размещения.');
      });

      btnRestart.addEventListener('click', restartGame);

      // Запуск
      gameLoop();
    })();
  </script>
</body>
</html>
