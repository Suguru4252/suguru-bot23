<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Яркая цветная Земля</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: black;
    }
    /* Никаких надписей на экране */
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    
    // --- Инициализация ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020210); // очень тёмно-синий космос
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.2, 7.5);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = false;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.4; // делаем ярче
    document.body.appendChild(renderer.domElement);
    
    // --- Управление (без UI) ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.2;
    controls.enableZoom = true;
    controls.zoomSpeed = 1.0;
    controls.enablePan = false;
    controls.minDistance = 3.8;
    controls.maxDistance = 12.0;
    controls.target.set(0, 0, 0);
    
    // --- МОЩНОЕ ОСВЕЩЕНИЕ ДЛЯ ЯРКОСТИ ---
    // Основной направленный свет (Солнце) — очень яркий, тёплый
    const sunLight = new THREE.DirectionalLight(0xfff5d1, 2.5);
    sunLight.position.set(6, 4, 6);
    scene.add(sunLight);
    
    // Второй направленный свет с другой стороны, чтобы не было чёрных провалов
    const fillLight1 = new THREE.DirectionalLight(0xccddff, 1.2);
    fillLight1.position.set(-5, 2, -4);
    scene.add(fillLight1);
    
    // Третий свет — заполняющий снизу, чтобы океаны блестели
    const fillLight2 = new THREE.PointLight(0x88aaff, 0.8);
    fillLight2.position.set(2, -1, -3);
    scene.add(fillLight2);
    
    // Ambient — минимальный, чтобы не засвечивать, но сохранить тени
    const ambientLight = new THREE.AmbientLight(0x404060, 0.35);
    scene.add(ambientLight);
    
    // Дополнительный свет для бликов на воде
    const rimLight = new THREE.PointLight(0xaaccff, 0.6);
    rimLight.position.set(-3, 1.5, -5);
    scene.add(rimLight);
    
    // --- ТЕКСТУРЫ: используем проверенные яркие карты (включая с suguru4252.github.io, если доступны) ---
    const loader = new THREE.TextureLoader();
    
    // Основная цветная карта: используем заведомо яркую текстуру с GitHub (из вашего скриншота)
    // Это та самая текстура, которая даёт насыщенные цвета.
    const earthColorMap = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg');
    
    // Карта облаков
    const cloudMap = loader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
    
    // Карта нормалей для рельефа
    const normalMap = loader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
    
    // Карта бликов (specular) — чтобы океаны блестели
    const specularMap = loader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
    
    // --- СОЗДАНИЕ ЗЕМЛИ ---
    const earthGeo = new THREE.SphereGeometry(2.0, 128, 128);
    const earthMat = new THREE.MeshPhongMaterial({
      map: earthColorMap,
      specularMap: specularMap,
      specular: new THREE.Color(0x444444),
      shininess: 15,
      normalMap: normalMap,
      normalScale: new THREE.Vector2(1.0, 1.0),
      emissive: new THREE.Color(0x112233), // лёгкая подсветка тёмной стороны
      emissiveIntensity: 0.15
    });
    
    const earth = new THREE.Mesh(earthGeo, earthMat);
    scene.add(earth);
    
    // --- ОБЛАКА (яркие, полупрозрачные) ---
    const cloudGeo = new THREE.SphereGeometry(2.008, 128, 128);
    const cloudMat = new THREE.MeshPhongMaterial({
      map: cloudMap,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide
    });
    const clouds = new THREE.Mesh(cloudGeo, cloudMat);
    scene.add(clouds);
    
    // --- АТМОСФЕРА (голубое свечение) ---
    const atmosGeo = new THREE.SphereGeometry(2.15, 64, 64);
    const atmosMat = new THREE.MeshPhongMaterial({
      color: 0x88aaff,
      transparent: true,
      opacity: 0.18,
      side: THREE.BackSide,
      emissive: new THREE.Color(0x4488ff),
      emissiveIntensity: 0.5
    });
    const atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
    scene.add(atmosphere);
    
    // Внешний ореол
    const glowGeo = new THREE.SphereGeometry(2.28, 48, 48);
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0xaaccff,
      transparent: true,
      opacity: 0.08,
      side: THREE.BackSide
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    scene.add(glow);
    
    // --- ЗВЁЗДЫ (много, яркие) ---
    const starsGeo = new THREE.BufferGeometry();
    const starsCount = 8000;
    const posArray = new Float32Array(starsCount * 3);
    const colorArray = new Float32Array(starsCount * 3);
    
    for (let i = 0; i < starsCount * 3; i += 3) {
      // Распределяем по сфере радиусом 200-400
      const r = 200 + Math.random() * 200;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);
      
      posArray[i] = Math.sin(phi) * Math.cos(theta) * r;
      posArray[i+1] = Math.sin(phi) * Math.sin(theta) * r;
      posArray[i+2] = Math.cos(phi) * r;
      
      // Яркие цвета: белые, голубоватые, желтоватые
      const intensity = 0.7 + Math.random() * 0.8;
      if (Math.random() < 0.6) {
        colorArray[i] = intensity;
        colorArray[i+1] = intensity * 0.95;
        colorArray[i+2] = 1.0;
      } else if (Math.random() < 0.3) {
        colorArray[i] = 1.0;
        colorArray[i+1] = intensity * 0.7;
        colorArray[i+2] = intensity * 0.6;
      } else {
        colorArray[i] = intensity;
        colorArray[i+1] = intensity;
        colorArray[i+2] = intensity;
      }
    }
    
    starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    starsGeo.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
    
    const starsMat = new THREE.PointsMaterial({
      size: 0.3,
      vertexColors: true,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    
    const stars = new THREE.Points(starsGeo, starsMat);
    scene.add(stars);
    
    // Второй слой мелких звёзд
    const starsGeo2 = new THREE.BufferGeometry();
    const posArray2 = new Float32Array(4000 * 3);
    for (let i = 0; i < 4000 * 3; i += 3) {
      const r = 350 + Math.random() * 250;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);
      posArray2[i] = Math.sin(phi) * Math.cos(theta) * r;
      posArray2[i+1] = Math.sin(phi) * Math.sin(theta) * r;
      posArray2[i+2] = Math.cos(phi) * r;
    }
    starsGeo2.setAttribute('position', new THREE.BufferAttribute(posArray2, 3));
    const starsMat2 = new THREE.PointsMaterial({ size: 0.15, color: 0xccddff, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
    const stars2 = new THREE.Points(starsGeo2, starsMat2);
    scene.add(stars2);
    
    // Лёгкая дымка для глубины
    scene.fog = new THREE.FogExp2(0x020210, 0.001);
    
    // --- АНИМАЦИЯ ---
    function animate() {
      requestAnimationFrame(animate);
      
      // Облака вращаются немного быстрее Земли
      clouds.rotation.y += 0.0006;
      
      // Медленное вращение звёзд
      stars.rotation.y += 0.00001;
      stars2.rotation.x += 0.000005;
      
      controls.update();
      renderer.render(scene, camera);
    }
    
    animate();
    
    // --- РЕСАЙЗ ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    console.log('✅ Яркая цветная Земля загружена');
  </script>
</body>
</html>
