<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Object Grab - NetErrror</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #status {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }
        #instruction {
            position: absolute;
            bottom: 100px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: #ccc;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            #status { font-size: 14px; bottom: 15px; }
            #instruction { bottom: 70px; }
        }
    </style>
</head>
<body>
    <div id="status">✨ Нажми на объект, чтобы взять ✨</div>
    <div id="instruction">👆 Тап по объекту = взять/отпустить</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Сцена
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.02);

        // Камера
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 3);
        
        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Управление камерой (пальцем)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.0;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.target.set(0, 0.5, 0);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(2, 3, 2);
        scene.add(mainLight);
        
        const backLight = new THREE.PointLight(0xff66cc, 0.5);
        backLight.position.set(-1, 1, -2);
        scene.add(backLight);
        
        const fillLight = new THREE.PointLight(0x44aaff, 0.4);
        fillLight.position.set(1, 0.5, 1);
        scene.add(fillLight);
        
        // Пол
        const gridHelper = new THREE.GridHelper(8, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.8;
        scene.add(gridHelper);
        
        // Прозрачная платформа
        const platformMat = new THREE.MeshStandardMaterial({ color: 0x1a2a4a, roughness: 0.5, metalness: 0.3, transparent: true, opacity: 0.5 });
        const platform = new THREE.Mesh(new THREE.PlaneGeometry(4, 4), platformMat);
        platform.rotation.x = -Math.PI / 2;
        platform.position.y = -0.75;
        platform.receiveShadow = true;
        scene.add(platform);
        
        // --- СОЗДАНИЕ ОБЪЕКТА (формы) ---
        const objectGroup = new THREE.Group();
        
        // Основное тело - вытянутая форма
        const bodyGeo = new THREE.CylinderGeometry(0.3, 0.35, 0.95, 32);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xdd55ff, emissive: 0x331133, roughness: 0.2, metalness: 0.7 });
        const mainBody = new THREE.Mesh(bodyGeo, bodyMat);
        mainBody.castShadow = true;
        mainBody.position.y = 0;
        objectGroup.add(mainBody);
        
        // Верхняя часть (головка)
        const tipGeo = new THREE.SphereGeometry(0.34, 32, 32);
        const tipMat = new THREE.MeshStandardMaterial({ color: 0xff88ff, emissive: 0x441144, roughness: 0.1 });
        const tip = new THREE.Mesh(tipGeo, tipMat);
        tip.position.y = 0.55;
        tip.castShadow = true;
        objectGroup.add(tip);
        
        // Декоративные кольца
        const ringGeo = new THREE.TorusGeometry(0.32, 0.06, 32, 64);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0x442200 });
        const ring1 = new THREE.Mesh(ringGeo, ringMat);
        ring1.rotation.x = Math.PI / 2;
        ring1.position.y = 0.15;
        objectGroup.add(ring1);
        
        const ring2 = new THREE.Mesh(ringGeo, ringMat);
        ring2.rotation.x = Math.PI / 2;
        ring2.position.y = -0.2;
        objectGroup.add(ring2);
        
        // Основание
        const baseGeo = new THREE.CylinderGeometry(0.4, 0.45, 0.12, 8);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0xaa66ff, metalness: 0.5 });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.y = -0.48;
        objectGroup.add(base);
        
        objectGroup.position.set(0, 0.2, 0);
        scene.add(objectGroup);
        
        // Светящиеся частицы
        const particleCount = 300;
        const particlesGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 3;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 2 + 0.2;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 2.5;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xff88cc, size: 0.02, transparent: true });
        const particles = new THREE.Points(particlesGeo, particleMat);
        scene.add(particles);
        
        // Звёзды
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = [];
        for (let i = 0; i < 1000; i++) {
            starsPos.push((Math.random() - 0.5) * 200);
            starsPos.push((Math.random() - 0.5) * 100);
            starsPos.push((Math.random() - 0.5) * 80 - 40);
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starsPos), 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);
        
        // --- Логика захвата ---
        let isGrabbed = false;
        const statusDiv = document.getElementById('status');
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        let controlsEnabled = true;
        
        function setControlsEnabled(enabled) {
            controls.enabled = enabled;
            controlsEnabled = enabled;
        }
        
        function onTap(event) {
            // Получаем координаты касания/клика
            const rect = renderer.domElement.getBoundingClientRect();
            let clientX, clientY;
            if (event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
                event.preventDefault();
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            
            mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(objectGroup, true);
            
            if (intersects.length > 0) {
                if (!isGrabbed) {
                    // Взять
                    isGrabbed = true;
                    statusDiv.innerHTML = "🔴 СХВАЧЕНО! Объект следует за тобой 🔴";
                    statusDiv.style.color = "#ffaaaa";
                    setControlsEnabled(false);
                    
                    // Эффект
                    mainBody.material.emissiveIntensity = 0.6;
                    tip.material.emissiveIntensity = 0.7;
                    
                    // Размещаем объект перед камерой
                    const camDir = new THREE.Vector3();
                    camera.getWorldDirection(camDir);
                    const grabPos = camera.position.clone().add(camDir.multiplyScalar(1.3));
                    grabPos.y -= 0.15;
                    objectGroup.position.copy(grabPos);
                    
                    if (navigator.vibrate) navigator.vibrate(50);
                } else {
                    // Отпустить
                    isGrabbed = false;
                    statusDiv.innerHTML = "✨ Объект свободен | Нажми на него, чтобы взять ✨";
                    statusDiv.style.color = "white";
                    setControlsEnabled(true);
                    controls.target.copy(objectGroup.position);
                    
                    mainBody.material.emissiveIntensity = 0.2;
                    tip.material.emissiveIntensity = 0.2;
                    
                    if (navigator.vibrate) navigator.vibrate(50);
                }
            }
        }
        
        renderer.domElement.addEventListener('mousedown', onTap);
        renderer.domElement.addEventListener('touchstart', onTap, { passive: false });
        
        // Анимация
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            if (isGrabbed) {
                // Следование за камерой
                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                const desiredPos = camera.position.clone().add(camDir.multiplyScalar(1.3));
                desiredPos.y -= 0.15;
                objectGroup.position.lerp(desiredPos, 0.4);
                objectGroup.rotation.y = Math.sin(time * 10) * 0.2;
                objectGroup.rotation.x = Math.sin(time * 8) * 0.1;
            } else {
                // Свободное вращение
                objectGroup.rotation.y += 0.01;
                objectGroup.rotation.x = Math.sin(time * 0.7) * 0.15;
                objectGroup.position.y = 0.2 + Math.sin(time * 1.2) * 0.04;
                particles.rotation.y += 0.003;
            }
            
            if (controlsEnabled) {
                controls.update();
            }
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('NetErrror: 3D игра загружена');
    </script>
</body>
</html>
