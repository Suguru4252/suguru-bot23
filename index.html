<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandbox</title>

<style>
body { margin:0; overflow:hidden; background:#87CEEB; }

#joystick {
    position:absolute;
    bottom:80px;
    left:40px;
    width:120px;
    height:120px;
    background:rgba(255,255,255,0.2);
    border-radius:50%;
}

#stick {
    width:60px;
    height:60px;
    background:white;
    border-radius:50%;
    position:relative;
    top:30px;
    left:30px;
}

#blockUI {
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
}

button {
    padding:10px;
    margin:5px;
}
</style>
</head>

<body>

<div id="joystick"><div id="stick"></div></div>

<div id="blockUI">
<button onclick="selectBlock(0)">⬜</button>
<button onclick="selectBlock(1)">🟫</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// === СЦЕНА ===
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// СВЕТ
scene.add(new THREE.AmbientLight(0xffffff, 0.7));

let sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(10,20,10);
scene.add(sun);

// ПОЛ
let plane = new THREE.Mesh(
    new THREE.PlaneGeometry(100,100),
    new THREE.MeshStandardMaterial({color:0x55aa55})
);
plane.rotation.x = -Math.PI/2;
scene.add(plane);

// ИГРОК
let player = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color:0x0000ff})
);
player.position.y = 1;
scene.add(player);

// КАМЕРА
let rotY = 0;
let rotX = 0;

function updateCamera(){
    let dist = 5;

    let x = player.position.x + Math.sin(rotY) * dist * Math.cos(rotX);
    let z = player.position.z + Math.cos(rotY) * dist * Math.cos(rotX);
    let y = player.position.y + Math.sin(rotX) * dist + 2;

    camera.position.set(x,y,z);
    camera.lookAt(player.position);
}

// === ДЖОЙСТИК ===
let joystick = document.getElementById("joystick");
let stick = document.getElementById("stick");

let moveX = 0, moveZ = 0;

joystick.addEventListener("touchmove", e=>{
    let t = e.touches[0];
    let rect = joystick.getBoundingClientRect();

    let x = t.clientX - rect.left - 60;
    let y = t.clientY - rect.top - 60;

    moveX = x / 40;
    moveZ = y / 40;

    stick.style.transform = `translate(${x}px,${y}px)`;
});

joystick.addEventListener("touchend", ()=>{
    moveX = moveZ = 0;
    stick.style.transform = `translate(0px,0px)`;
});

// === ДВИЖЕНИЕ ===
function updatePlayer(){
    player.position.x -= moveX * 0.1;
    player.position.z += moveZ * 0.1;
}

// === КАМЕРА УПРАВЛЕНИЕ ===
let lastTouch = null;

renderer.domElement.addEventListener("touchmove", e=>{
    if(e.touches.length === 1){
        let t = e.touches[0];

        if(lastTouch){
            let dx = t.clientX - lastTouch.x;
            let dy = t.clientY - lastTouch.y;

            rotY -= dx * 0.005;
            rotX -= dy * 0.005;

            rotX = Math.max(-1.2, Math.min(1.2, rotX));
        }

        lastTouch = {x:t.clientX,y:t.clientY};
    }
});

renderer.domElement.addEventListener("touchend", ()=>{
    lastTouch = null;
});

// === БЛОКИ ===
let blocks = [];
let selectedBlock = 0;

function selectBlock(id){
    selectedBlock = id;
}

function createBlock(x,y,z){
    let color = selectedBlock === 0 ? 0xffffff : 0x8B4513;

    let block = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        new THREE.MeshStandardMaterial({color})
    );

    block.position.set(x,y,z);
    scene.add(block);
    blocks.push(block);
}

// === РЕЙКАСТ ===
let raycaster = new THREE.Raycaster();
let touchStartTime = 0;

renderer.domElement.addEventListener("touchstart", e=>{
    touchStartTime = Date.now();
});

renderer.domElement.addEventListener("touchend", e=>{
    let touchTime = Date.now() - touchStartTime;

    let touch = e.changedTouches[0];

    let mouse = new THREE.Vector2(
        (touch.clientX / innerWidth) * 2 - 1,
        -(touch.clientY / innerHeight) * 2 + 1
    );

    raycaster.setFromCamera(mouse, camera);

    let intersects = raycaster.intersectObjects(blocks);

    if(touchTime > 4000){
        if(intersects.length > 0){
            scene.remove(intersects[0].object);
            blocks = blocks.filter(b=>b !== intersects[0].object);
        }
    } else {
        let hit = raycaster.intersectObject(plane);

        if(hit.length > 0){
            let p = hit[0].point;

            createBlock(
                Math.round(p.x),
                0.5,
                Math.round(p.z)
            );
        }
    }
});

// === РЕНДЕР ===
function animate(){
    requestAnimationFrame(animate);

    updatePlayer();
    updateCamera();

    renderer.render(scene, camera);
}
animate();
</script>

</body>
    </html>
