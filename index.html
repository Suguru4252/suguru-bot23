<!DOCTYPE html>
<html>
<head>
    <title>Монополия P2P</title>
    <script src="https://cdn.jsdelivr.net/npm/trystero@latest/build/trystero-torrent.min.js"></script>
    <style>
        body { background: #0a3a0a; color: white; font-family: Arial; }
        button { padding: 20px; font-size: 2rem; margin: 10px; }
        #board { 
            display: grid; 
            grid-template-columns: repeat(11, 1fr); 
            gap: 2px; 
            width: 600px; 
            height: 600px; 
            background: #b4804b; 
        }
        .cell { background: #fbefdb; border: 1px solid black; }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <h1>🎲 МОНОПОЛИЯ P2P 🎲</h1>
        <div>
            <button onclick="createRoom()">СОЗДАТЬ КОМНАТУ</button>
            <input id="roomIdInput" placeholder="ID комнаты">
            <button onclick="joinRoom()">ПРИСОЕДИНИТЬСЯ</button>
        </div>
        <div id="roomDisplay"></div>
        <div id="board"></div>
        <button id="rollBtn" style="display:none;" onclick="rollDice()">🎲 БРОСИТЬ</button>
    </div>

    <script>
        const { joinRoom, selfId } = Trystero;
        let room, gameState = { players: {} };
        
        function createRoom() {
            const roomId = 'monopoly_' + Math.random().toString(36).substr(2, 6);
            room = joinRoom({ appId: 'my-monopoly' }, roomId);
            document.getElementById('roomDisplay').innerHTML = 'ID комнаты: ' + roomId;
            setupGame();
        }
        
        function joinRoom() {
            const roomId = document.getElementById('roomIdInput').value;
            room = joinRoom({ appId: 'my-monopoly' }, roomId);
            setupGame();
        }
        
        function setupGame() {
            document.getElementById('rollBtn').style.display = 'block';
            
            // Создаем доску
            const board = document.getElementById('board');
            for(let i = 0; i < 40; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = 'cell_' + i;
                board.appendChild(cell);
            }
            
            // Слушаем ходы
            const [sendMove, getMove] = room.makeAction('move');
            
            getMove((data, peerId) => {
                updatePlayerPosition(peerId, data.position);
            });
            
            window.rollDice = function() {
                const dice = Math.floor(Math.random() * 6) + 1;
                const newPos = (gameState.players[selfId]?.position || 0) + dice;
                if(newPos >= 40) newPos = newPos - 40; // Проход старта
                
                gameState.players[selfId] = { position: newPos };
                sendMove({ position: newPos });
                updatePlayerPosition(selfId, newPos);
            };
        }
        
        function updatePlayerPosition(playerId, pos) {
            // Очищаем старую позицию
            document.querySelectorAll('.player').forEach(p => p.remove());
            
            // Ставим на новую
            let cell = document.getElementById('cell_' + pos);
            let marker = document.createElement('div');
            marker.className = 'player';
            marker.style.width = '10px';
            marker.style.height = '10px';
            marker.style.background = playerId === selfId ? 'red' : 'blue';
            marker.style.borderRadius = '50%';
            marker.style.display = 'inline-block';
            cell.appendChild(marker);
        }
    </script>
</body>
</html>
