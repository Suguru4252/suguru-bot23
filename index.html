<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Chugur — Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #eee;
        }

        .app {
            max-width: 550px;
            width: 100%;
            background: #151515;
            border: 1px solid #2a2a2a;
        }

        .header {
            padding: 20px 24px 8px 24px;
            border-bottom: 1px solid #222;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .header p {
            font-size: 0.7rem;
            color: #888;
            margin-top: 6px;
        }

        .player-panel {
            padding: 20px;
            background: #111;
            border-bottom: 1px solid #222;
        }

        .current-label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .current-track {
            font-size: 1rem;
            font-weight: 500;
            margin: 8px 0 16px;
            word-break: break-word;
        }

        audio {
            width: 100%;
            height: 44px;
        }

        .add-panel {
            padding: 16px 20px;
            background: #0c0c0c;
            border-bottom: 1px solid #222;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .add-file-btn {
            background: #2a2a2a;
            border: 1px solid #4a4a4a;
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #ddd;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .add-file-btn:hover {
            background: #3a3a3a;
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 18px 24px 8px 24px;
        }

        .library-header h3 {
            font-size: 0.8rem;
            font-weight: 500;
            color: #aaa;
            letter-spacing: 0.5px;
        }

        .clear-btn {
            background: none;
            border: 1px solid #3a2a28;
            padding: 4px 12px;
            font-size: 0.7rem;
            color: #b88a7a;
            cursor: pointer;
        }

        .songs-list {
            padding: 16px 20px 24px 20px;
            max-height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .song-item {
            background: #121212;
            border: 1px solid #252525;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .song-item:hover {
            background: #1a1a1a;
        }

        .song-info {
            flex: 1;
        }

        .song-title {
            font-size: 0.85rem;
            font-weight: 500;
            word-break: break-word;
        }

        .song-date {
            font-size: 0.6rem;
            color: #6a6a6a;
            margin-top: 4px;
        }

        .song-actions {
            display: flex;
            gap: 6px;
        }

        .play-song-btn, .delete-song-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            padding: 5px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            color: #ccc;
        }

        .play-song-btn:hover {
            background: #3a4a3a;
        }

        .delete-song-btn:hover {
            background: #4a2a2a;
            border-color: #aa5a42;
        }

        .empty-message {
            text-align: center;
            color: #5a5a5a;
            padding: 40px;
            font-size: 0.8rem;
            border: 1px dashed #2a2a2a;
        }

        .footer {
            padding: 12px 20px;
            border-top: 1px solid #1f1f1f;
            font-size: 0.6rem;
            color: #6f6f6f;
            text-align: center;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
        }

        #fileInput {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a4a2a;
            color: white;
            padding: 8px 20px;
            font-size: 12px;
            z-index: 999;
            border: 1px solid #5a8a5a;
            animation: fadeOut 2s ease-in-out forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>Chugur</h1>
        <p>Добавляй MP3 — сохраняются навсегда (без ограничений)</p>
    </div>

    <div class="player-panel">
        <div class="current-label">Сейчас играет</div>
        <div class="current-track" id="currentTrackName">—</div>
        <audio id="audioPlayer" controls preload="metadata"></audio>
    </div>

    <div class="add-panel">
        <button id="addFileBtn" class="add-file-btn">📁 Добавить MP3 файл</button>
    </div>

    <div class="library-header">
        <h3>Мои треки (сохраняются в IndexedDB — безлимит)</h3>
        <button id="clearAllBtn" class="clear-btn">Очистить всё</button>
    </div>

    <div id="songsList" class="songs-list">
        <div class="empty-message">Нет треков. Нажмите «Добавить MP3 файл».</div>
    </div>

    <div class="footer">
        🎵 IndexedDB — можно хранить гигабайты музыки. Закрывайте браузер — ничего не пропадёт.
    </div>
</div>

<input type="file" id="fileInput" accept=".mp3,.m4a,.aac,.ogg,.wav">

<script>
    // =============== CHUGUR — ПЛЕЕР НА INDEXEDDB (БЕЗЛИМИТНЫЙ) ===============
    let songs = [];
    let currentSongId = null;
    let db = null;
    const DB_NAME = 'ChugurDB';
    const STORE_NAME = 'songs';

    const audio = document.getElementById('audioPlayer');
    const currentTrackSpan = document.getElementById('currentTrackName');
    const songsListDiv = document.getElementById('songsList');
    const addFileBtn = document.getElementById('addFileBtn');
    const fileInput = document.getElementById('fileInput');
    const clearAllBtn = document.getElementById('clearAllBtn');

    // ============ ИНИЦИАЛИЗАЦИЯ INDEXEDDB ============
    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            
            request.onerror = () => reject(request.error);
            
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            
            request.onupgradeneeded = (event) => {
                const dbRef = event.target.result;
                if (!dbRef.objectStoreNames.contains(STORE_NAME)) {
                    const store = dbRef.createObjectStore(STORE_NAME, { 
                        keyPath: 'id', 
                        autoIncrement: true 
                    });
                    store.createIndex('name', 'name', { unique: false });
                }
            };
        });
    }

    // ============ СОХРАНЕНИЕ ПЕСНИ В INDEXEDDB ============
    function saveSongToDB(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const blob = e.target.result;
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                
                const songData = {
                    name: file.name.replace(/\.(mp3|m4a|aac|ogg|wav)$/i, ''),
                    date: new Date().toLocaleString(),
                    blob: blob,
                    mimeType: file.type || 'audio/mpeg'
                };
                
                const request = store.add(songData);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            };
            reader.onerror = () => reject(reader.error);
            reader.readAsArrayBuffer(file);
        });
    }

    // ============ ЗАГРУЗКА ВСЕХ ПЕСЕН ИЗ INDEXEDDB ============
    function loadAllSongsFromDB() {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.getAll();
            
            request.onsuccess = () => {
                const results = request.result;
                songs = [];
                for (let item of results) {
                    const blob = new Blob([item.blob], { type: item.mimeType || 'audio/mpeg' });
                    const url = URL.createObjectURL(blob);
                    songs.push({
                        id: item.id,
                        name: item.name,
                        date: item.date,
                        blob: blob,
                        url: url
                    });
                }
                resolve(songs);
            };
            request.onerror = () => reject(request.error);
        });
    }

    // ============ УДАЛЕНИЕ ПЕСНИ ИЗ INDEXEDDB ============
    function deleteSongFromDB(id) {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.delete(id);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    // ============ ОЧИСТКА ВСЕХ ПЕСЕН ИЗ INDEXEDDB ============
    function clearAllSongsFromDB() {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.clear();
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    // ============ ДОБАВЛЕНИЕ ПЕСНИ (через интерфейс) ============
    async function addSongFromFile(file) {
        if (!file.type.includes('audio') && !file.name.match(/\.(mp3|m4a|aac|ogg|wav)$/i)) {
            alert('Пожалуйста, выберите аудиофайл (MP3, M4A, AAC, OGG, WAV)');
            return;
        }

        try {
            const id = await saveSongToDB(file);
            await loadAllSongsFromDB();
            renderSongsList();
            showToast(`✓ Добавлено: ${file.name.replace(/\.(mp3|m4a|aac|ogg|wav)$/i, '')}`);
        } catch (e) {
            console.error('Ошибка сохранения:', e);
            alert('Не удалось сохранить песню. Возможно, закончилось место.');
        }
    }

    // ============ ОТРИСОВКА ПЛЕЙЛИСТА ============
    function renderSongsList() {
        if (!songsListDiv) return;
        
        if (songs.length === 0) {
            songsListDiv.innerHTML = '<div class="empty-message">🎵 Нет треков. Нажмите «Добавить MP3 файл».</div>';
            return;
        }
        
        songsListDiv.innerHTML = '';
        songs.forEach(song => {
            const div = document.createElement('div');
            div.className = 'song-item';
            div.innerHTML = `
                <div class="song-info">
                    <div class="song-title">${escapeHtml(song.name)}</div>
                    <div class="song-date">${song.date}</div>
                </div>
                <div class="song-actions">
                    <button class="play-song-btn" data-id="${song.id}">▶</button>
                    <button class="delete-song-btn" data-id="${song.id}">🗑</button>
                </div>
            `;
            
            const playBtn = div.querySelector('.play-song-btn');
            const delBtn = div.querySelector('.delete-song-btn');
            
            playBtn.addEventListener('click', () => playSongById(song.id));
            delBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                if (confirm(`Удалить "${song.name}"?`)) {
                    try {
                        await deleteSongFromDB(song.id);
                        if (song.url) URL.revokeObjectURL(song.url);
                        if (currentSongId === song.id) {
                            audio.pause();
                            audio.src = '';
                            currentTrackSpan.textContent = '—';
                            currentSongId = null;
                        }
                        await loadAllSongsFromDB();
                        renderSongsList();
                        showToast(`🗑 Удалено: ${song.name}`);
                    } catch (e) {
                        console.error('Ошибка удаления:', e);
                    }
                }
            });
            
            songsListDiv.appendChild(div);
        });
    }

    // ============ ВОСПРОИЗВЕДЕНИЕ ============
    function playSongById(id) {
        const song = songs.find(s => s.id === id);
        if (song && song.url) {
            audio.src = song.url;
            audio.load();
            audio.play().catch(e => console.log('автоплей заблокирован'));
            currentTrackSpan.textContent = song.name;
            currentSongId = song.id;
        }
    }

    // ============ ОЧИСТКА ВСЕГО ============
    async function clearAllSongs() {
        if (songs.length === 0) return;
        if (confirm('Удалить ВСЕ песни из библиотеки?')) {
            try {
                await clearAllSongsFromDB();
                songs.forEach(song => {
                    if (song.url) URL.revokeObjectURL(song.url);
                });
                songs = [];
                audio.pause();
                audio.src = '';
                currentTrackSpan.textContent = '—';
                currentSongId = null;
                renderSongsList();
                showToast('🗑 Все песни удалены');
            } catch (e) {
                console.error('Ошибка очистки:', e);
            }
        }
    }

    // ============ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ============
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ============ ОБРАБОТЧИКИ ============
    addFileBtn.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            addSongFromFile(e.target.files[0]);
            fileInput.value = '';
        }
    });

    clearAllBtn.addEventListener('click', clearAllSongs);

    // ============ ЗАПУСК ============
    async function init() {
        try {
            await initDB();
            await loadAllSongsFromDB();
            renderSongsList();
            console.log('✅ Chugur готов, песен загружено:', songs.length);
        } catch (e) {
            console.error('Ошибка инициализации:', e);
        }
    }

    init();
</script>
</body>
</html>
