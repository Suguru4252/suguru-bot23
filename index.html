<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🥚 СУСЛОВ: Полный Фарш</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a3a2e 0%, #2d5a4a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            padding: 12px;
        }
        .game-container {
            max-width: 520px;
            width: 100%;
            background: #efe6d5;
            background-image: radial-gradient(circle at 20% 30%, #fff6e8, #e7d8be);
            border-radius: 48px 48px 40px 40px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5), inset 0 1px 8px rgba(255,255,240,0.8);
            padding: 20px 18px 28px;
            border: 4px solid #b49a7b;
            text-align: center;
        }
        h1 {
            margin: 0 0 4px;
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: #3d2a1b;
            text-shadow: 3px 3px 0 #c9aa7b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0 5px;
            flex-wrap: wrap;
            gap: 5px;
        }
        .prestige-badge, .spent-badge, .combo-badge {
            background: #6a4e2e;
            color: #ffd966;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            border: 2px solid #eebb55;
            box-shadow: inset 0 1px 3px #3d2e1c, 0 3px 0 #3a281a;
        }
        .combo-badge {
            background: #7a3e2e;
            border-color: #ff9966;
            color: #ffe0b3;
        }
        .suslov-area {
            background: #b18b62;
            background: linear-gradient(135deg, #ccb094, #a5835e);
            border-radius: 100px 100px 50px 50px;
            padding: 15px 8px 10px;
            margin: 8px 0 15px;
            border: 5px solid #5e3e28;
            box-shadow: inset 0 -8px 0 #3f2c1c, inset 0 5px 8px #fbe9c3, 0 10px 0 #3f2c1c;
        }
        .suslov-emoji {
            font-size: 120px;
            line-height: 1;
            filter: drop-shadow(6px 12px 4px rgba(0,0,0,0.2));
            transition: transform 0.1s ease;
            cursor: pointer;
        }
        .belly-bar-container {
            background: #2c1e12;
            padding: 6px 10px;
            border-radius: 40px;
            border: 3px solid #b49a7b;
            box-shadow: inset 0 3px 5px #0f0a06, 0 5px 0 #3f2c1c;
            margin: 8px 4px 4px;
        }
        .belly-label {
            display: flex;
            justify-content: space-between;
            color: #ffecb3;
            font-weight: bold;
            text-shadow: 2px 2px 0 #1f140c;
            padding: 0 6px 3px;
            font-size: 0.95rem;
        }
        .belly-bar-bg {
            height: 26px;
            background: #1e130c;
            border-radius: 30px;
            border: 2px solid #6b4f37;
            overflow: hidden;
        }
        .belly-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #fcb045, #fd7e14, #ff512f);
            box-shadow: 0 0 10px #ffb347;
            border-radius: 30px;
            transition: width 0.2s ease;
        }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: #251e16d9;
            padding: 10px 15px;
            border-radius: 40px;
            margin: 12px 0 16px;
            color: #f7e7cf;
            border: 2px solid #ab8e6f;
            box-shadow: inset 0 0 0 2px #51412e, 0 6px 0 #2b1e13;
            font-weight: bold;
        }
        .money-block, .food-block {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1.5rem;
            background: #0c0907;
            padding: 4px 18px;
            border-radius: 30px;
            box-shadow: inset 0 2px 4px black, 0 3px 0 #4d3926;
            color: #ffd966;
        }
        .shop {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 8px;
        }
        .food-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #dccdb6;
            padding: 6px 14px 6px 18px;
            border-radius: 60px;
            border: 3px solid #6e543c;
            box-shadow: inset 0 1px 5px #fff3df, 0 5px 0 #5a4530;
            font-weight: bold;
        }
        .food-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
        }
        .food-desc {
            font-size: 1rem;
            color: #302010;
        }
        button {
            background: #f3d37c;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 10px 18px;
            border-radius: 40px;
            box-shadow: 0 4px 0 #a05f2c, 0 2px 8px rgba(0,0,0,0.2);
            border: 2px solid #ffeab0;
            color: #2c1c0c;
            cursor: pointer;
            transition: all 0.04s linear;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #7b451b, 0 2px 6px black;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin: 12px 0;
        }
        #feedBtn {
            background: #f5b342;
            font-size: 1.6rem;
            padding: 12px;
            flex: 2;
        }
        #autoFeedBtn {
            background: #6a8e7c;
            box-shadow: 0 4px 0 #3a5a4a;
            border-color: #a0c0b0;
            color: #0f1f0a;
            font-size: 1rem;
            flex: 1;
        }
        #autoFeedBtn.active {
            background: #8bc34a;
            box-shadow: 0 2px 0 #558b2f;
            transform: translateY(2px);
        }
        .sell-area {
            margin-top: 15px;
        }
        #sellFatBtn {
            background: #c9a87c;
            box-shadow: 0 4px 0 #7a5d3e;
            border-color: #ebd5b0;
            color: #1f140a;
            font-size: 1.3rem;
            padding: 14px 20px;
            width: 100%;
        }
        .achievement-popup {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: gold;
            color: #2c1c0c;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 8px 0 #b8860b, 0 10px 20px black;
            z-index: 1000;
            animation: slideDown 0.4s ease;
        }
        @keyframes slideDown {
            from { top: -60px; opacity: 0; }
            to { top: 20px; opacity: 1; }
        }
        .crit-effect {
            color: #ffd700 !important;
            text-shadow: 0 0 10px #ffaa00;
        }
        .footer-note {
            color: #594d3c;
            margin-top: 12px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <h1>
        <span>🐹</span> СУСЛОВ <span>🐹</span>
    </h1>
    
    <div class="stats-row">
        <div class="prestige-badge">
            ⭐ <span id="prestigeLevel">0</span> (+<span id="prestigeBonus">0</span>%)
        </div>
        <div class="spent-badge">
            💸 <span id="totalSpent">0</span>🪙
        </div>
        <div class="combo-badge" id="comboDisplay" style="display:none;">
            🔥 x<span id="comboCount">0</span>
        </div>
    </div>

    <div class="suslov-area">
        <div class="suslov-emoji" id="suslovEmoji">🐭</div>
        <div class="belly-bar-container">
            <div class="belly-label">
                <span>🍖 СЫТОСТЬ</span>
                <span id="bellyPercent">0%</span>
            </div>
            <div class="belly-bar-bg">
                <div class="belly-fill" id="bellyFill" style="width:0%"></div>
            </div>
        </div>
    </div>

    <div class="stats-panel">
        <div class="money-block">
            <span>🪙</span> <span id="moneyValue">40</span>
        </div>
        <div class="food-block">
            <span>🍱</span> <span id="foodCount">0</span>
        </div>
    </div>

    <div class="shop">
        <div class="food-row">
            <div class="food-info">
                <span>🥕</span>
                <span class="food-desc">Морковка <small>+3%</small></span>
            </div>
            <button id="buyCarrot">5🪙</button>
        </div>
        <div class="food-row">
            <div class="food-info">
                <span>🍔</span>
                <span class="food-desc">Бургер <small>+8%</small></span>
            </div>
            <button id="buyBurger">12🪙</button>
        </div>
        <div class="food-row">
            <div class="food-info">
                <span>🎂</span>
                <span class="food-desc">Торт <small>+15%</small></span>
            </div>
            <button id="buyCake">22🪙</button>
        </div>
    </div>

    <div class="action-buttons">
        <button id="feedBtn">🍽️ КОРМИТЬ</button>
        <button id="autoFeedBtn">🤖 АВТОКОРМ (50🪙)</button>
    </div>

    <div id="gameOverMessage" style="min-height: 24px; font-weight: bold; color: #ad1f1f;"></div>
    
    <div class="sell-area">
        <button id="sellFatBtn">💰 ПРОДАТЬ ЖИР (+5% кэшбек + престиж)</button>
    </div>
    
    <div class="footer-note">🥕+3% 🍔+8% 🎂+15% | Крит x2 | Комбо x5 | Автокорм</div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- СОСТОЯНИЕ ----------
        let money = 40;                
        let foodItems = 0;            
        let belly = 0;               
        
        let prestigeLevel = 0;               
        let prestigeBonusPercent = 0;        
        let totalSpentMoney = 0;
        
        // Комбо и крит
        let feedCombo = 0;
        const CRIT_CHANCE = 0.15;  // 15%
        const COMBO_BONUS = 1;      // +1% за каждые 5 комбо
        
        // Автокорм
        let autoFeedActive = false;
        let autoFeedInterval = null;
        const AUTO_FEED_COST = 50;
        
        // Достижения (простые флаги)
        let achievements = {
            firstLop: false,
            richBoy: false,
            comboKing: false
        };
        
        // DOM элементы
        const moneySpan = document.getElementById('moneyValue');
        const foodSpan = document.getElementById('foodCount');
        const bellyFill = document.getElementById('bellyFill');
        const bellyPercent = document.getElementById('bellyPercent');
        const suslovEmoji = document.getElementById('suslovEmoji');
        const gameOverMsg = document.getElementById('gameOverMessage');
        const feedBtn = document.getElementById('feedBtn');
        const buyCarrot = document.getElementById('buyCarrot');
        const buyBurger = document.getElementById('buyBurger');
        const buyCake = document.getElementById('buyCake');
        const sellFatBtn = document.getElementById('sellFatBtn');
        const autoFeedBtn = document.getElementById('autoFeedBtn');
        const comboDisplay = document.getElementById('comboDisplay');
        const comboCountSpan = document.getElementById('comboCount');
        
        const prestigeLevelSpan = document.getElementById('prestigeLevel');
        const prestigeBonusSpan = document.getElementById('prestigeBonus');
        const totalSpentSpan = document.getElementById('totalSpent');

        // Еда: цена, свой % сытости
        const FOOD_DATA = {
            carrot: { price: 5,  gain: 3 },
            burger: { price: 12, gain: 8 },
            cake:   { price: 22, gain: 15 }
        };
        
        let currentFoodGain = 0; // будет пересчитываться

        // ---------- УВЕДОМЛЕНИЯ ----------
        function showAchievement(text) {
            const pop = document.createElement('div');
            pop.className = 'achievement-popup';
            pop.innerHTML = `🏆 ${text} 🏆`;
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 2500);
        }

        // ---------- РАСЧЁТ ПРИРОСТА ----------
        function calcFoodGain(baseGain) {
            let bonus = 1 + (prestigeBonusPercent / 100);
            let gain = Math.floor(baseGain * bonus);
            
            // Комбо бонус: +1% за каждые 5 комбо
            if (feedCombo >= 5) {
                gain += Math.floor(feedCombo / 5) * COMBO_BONUS;
            }
            
            // Крит
            const isCrit = Math.random() < CRIT_CHANCE;
            if (isCrit) {
                gain *= 2;
                // Визуал крита
                suslovEmoji.style.filter = 'drop-shadow(0 0 20px gold)';
                setTimeout(() => suslovEmoji.style.filter = '', 200);
            }
            
            return { gain, isCrit };
        }

        // ---------- ОБНОВЛЕНИЕ UI ----------
        function updateUI() {
            moneySpan.textContent = money;
            foodSpan.textContent = foodItems;

            const percent = Math.min(belly, 100);
            bellyFill.style.width = percent + '%';
            bellyPercent.textContent = percent + '%';

            prestigeLevelSpan.textContent = prestigeLevel;
            prestigeBonusSpan.textContent = prestigeBonusPercent;
            totalSpentSpan.textContent = totalSpentMoney;
            
            // Комбо отображение
            if (feedCombo > 0) {
                comboDisplay.style.display = 'inline-block';
                comboCountSpan.textContent = feedCombo;
            } else {
                comboDisplay.style.display = 'none';
            }

            // Эмодзи
            if (belly >= 100) {
                suslovEmoji.textContent = '💥🐽';
                gameOverMsg.innerHTML = '💥 ЛОПНУЛ! ЖМИ ПРОДАТЬ ЖИР 💥';
                if (!achievements.firstLop) {
                    achievements.firstLop = true;
                    showAchievement('ПЕРВЫЙ ЛОП! +10🪙');
                    money += 10;
                }
            } else if (belly >= 80) {
                suslovEmoji.textContent = '🐡';
                gameOverMsg.innerHTML = '';
            } else if (belly >= 50) {
                suslovEmoji.textContent = '🐹🤰';
                gameOverMsg.innerHTML = '';
            } else if (belly >= 20) {
                suslovEmoji.textContent = '🐭🍔';
                gameOverMsg.innerHTML = '';
            } else {
                suslovEmoji.textContent = '🐭';
                gameOverMsg.innerHTML = '';
            }
            
            // Кнопка автокорма
            autoFeedBtn.textContent = autoFeedActive ? '⏹️ СТОП' : `🤖 АВТОКОРМ (${AUTO_FEED_COST}🪙)`;
            
            // Проверка достижений
            if (!achievements.richBoy && totalSpentMoney >= 200) {
                achievements.richBoy = true;
                showAchievement('ТРАНЖИРА! +25🪙');
                money += 25;
            }
            if (!achievements.comboKing && feedCombo >= 20) {
                achievements.comboKing = true;
                showAchievement('КОМБО-КОРОЛЬ! +30🪙');
                money += 30;
            }
        }

        // ---------- КОРМЛЕНИЕ (одно) ----------
        function feedOnce() {
            if (foodItems <= 0) {
                foodSpan.style.color = '#ffa098';
                setTimeout(() => foodSpan.style.color = '#ffd966', 200);
                return false;
            }
            
            foodItems -= 1;
            
            // Прирост = зависит от типа еды? Упростим: средний прирост 8% + престиж + комбо + крит
            // Используем базовый прирост 8% для универсальности
            const { gain, isCrit } = calcFoodGain(8);
            
            belly = Math.min(belly + gain, 100);
            feedCombo += 1;
            
            // Анимация
            suslovEmoji.style.transform = 'scale(1.15)';
            setTimeout(() => suslovEmoji.style.transform = 'scale(1)', 100);
            
            if (isCrit) {
                gameOverMsg.innerHTML = '💥 КРИТИЧЕСКИЙ КОРМ! x2 💥';
                setTimeout(() => updateUI(), 300);
            }
            
            updateUI();
            return true;
        }

        // Сброс комбо
        function resetCombo() {
            feedCombo = 0;
            updateUI();
        }

        // ---------- ПОКУПКА ----------
        function buyFood(type) {
            const data = FOOD_DATA[type];
            if (money < data.price) {
                moneySpan.style.color = '#ff8989';
                setTimeout(() => moneySpan.style.color = '#ffd966', 150);
                return;
            }
            money -= data.price;
            totalSpentMoney += data.price;
            foodItems += 1;
            updateUI();
        }

        // ---------- АВТОКОРМ ----------
        function toggleAutoFeed() {
            if (autoFeedActive) {
                clearInterval(autoFeedInterval);
                autoFeedActive = false;
                autoFeedBtn.classList.remove('active');
            } else {
                if (money < AUTO_FEED_COST) {
                    moneySpan.style.color = '#ff8989';
                    setTimeout(() => moneySpan.style.color = '#ffd966', 150);
                    return;
                }
                money -= AUTO_FEED_COST;
                totalSpentMoney += AUTO_FEED_COST;
                autoFeedActive = true;
                autoFeedBtn.classList.add('active');
                autoFeedInterval = setInterval(() => {
                    if (!feedOnce()) {
                        // если еда кончилась — автостоп
                        clearInterval(autoFeedInterval);
                        autoFeedActive = false;
                        autoFeedBtn.classList.remove('active');
                        updateUI();
                    }
                }, 2000);
                updateUI();
            }
        }

        // ---------- ПРОДАТЬ ЖИР ----------
        function sellFat() {
            const refund = Math.floor(totalSpentMoney * 0.05);
            money += refund;
            
            if (totalSpentMoney > 0 || belly > 0) {
                prestigeLevel += 1;
                prestigeBonusPercent += 5;
            }
            
            foodItems = 0;
            belly = 0;
            feedCombo = 0;
            
            // Остановка автокорма
            if (autoFeedActive) {
                clearInterval(autoFeedInterval);
                autoFeedActive = false;
                autoFeedBtn.classList.remove('active');
            }
            
            money = Math.max(money, 35 + prestigeLevel * 4);
            
            updateUI();
            suslovEmoji.textContent = '🤑🐹';
            setTimeout(() => updateUI(), 300);
        }

        // ---------- ОБРАБОТЧИКИ ----------
        buyCarrot.addEventListener('click', () => buyFood('carrot'));
        buyBurger.addEventListener('click', () => buyFood('burger'));
        buyCake.addEventListener('click', () => buyFood('cake'));
        
        feedBtn.addEventListener('click', () => feedOnce());
        suslovEmoji.addEventListener('click', () => feedOnce());
        
        autoFeedBtn.addEventListener('click', toggleAutoFeed);
        sellFatBtn.addEventListener('click', sellFat);
        
        // Сброс комбо если долго не кормили (5 сек)
        let comboTimer;
        function resetComboTimer() {
            clearTimeout(comboTimer);
            comboTimer = setTimeout(() => {
                if (feedCombo > 0) {
                    feedCombo = 0;
                    updateUI();
                }
            }, 5000);
        }
        
        const originalFeed = feedOnce;
        feedOnce = function() {
            const result = originalFeed.apply(this, arguments);
            if (result) resetComboTimer();
            return result;
        };
        
        // Двойной клик по монетке
        document.querySelector('.money-block').addEventListener('dblclick', () => {
            money += 10;
            updateUI();
        });
        
        updateUI();
    })();
</script>
</body>
  </html>
