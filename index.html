<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: manipulation">
  <title>Вселенная 3D | Реальные объекты • 5 световых лет</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      background: #000;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 12px 25px;
      border-radius: 50px;
      pointer-events: none;
      backdrop-filter: blur(10px);
      font-weight: 500;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 10;
      font-size: 14px;
    }
    #current-planet {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0,0,0,0.75);
      padding: 12px 25px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 2px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.3);
      display: none;
      pointer-events: none;
      z-index: 15;
      text-align: center;
    }
    #distance-display {
      position: absolute;
      top: 130px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffaa00;
      background: rgba(0,0,0,0.6);
      padding: 6px 20px;
      border-radius: 30px;
      backdrop-filter: blur(8px);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      display: none;
      pointer-events: none;
      z-index: 15;
    }
    #mode-btn {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 12px 30px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.4);
      cursor: pointer;
      transition: all 0.3s;
      z-index: 20;
    }
    #mode-btn:hover { background: rgba(255,140,0,0.8); border-color: #ffaa00; box-shadow: 0 0 25px rgba(255,140,0,0.6); }
    #mode-btn.fly-mode { background: rgba(255,140,0,0.9); border-color: #ffaa00; box-shadow: 0 0 30px rgba(255,140,0,0.8); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(255,140,0,0.6); } 50% { box-shadow: 0 0 40px rgba(255,140,0,0.9); } }
    #search-container { position: absolute; top: 20px; right: 20px; z-index: 30; display: flex; gap: 8px; }
    #search-input { background: rgba(10,10,20,0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px 18px; border-radius: 30px; font-size: 14px; width: 200px; outline: none; transition: all 0.3s; }
    #search-input:focus { border-color: #ffaa00; box-shadow: 0 0 20px rgba(255,140,0,0.4); }
    #search-input::placeholder { color: rgba(255,255,255,0.5); }
    #search-results { position: absolute; top: 55px; right: 0; background: rgba(10,10,20,0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.25); border-radius: 15px; max-height: 300px; overflow-y: auto; width: 220px; display: none; z-index: 35; }
    .search-result-item { padding: 10px 18px; cursor: pointer; color: #ccc; font-size: 13px; transition: all 0.2s; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .search-result-item:hover { background: rgba(255,140,0,0.3); color: white; }
    #settings-panel { position: absolute; top: 80px; right: 20px; background: rgba(10,10,20,0.85); backdrop-filter: blur(15px); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.25); box-shadow: 0 8px 30px rgba(0,0,0,0.7); z-index: 25; min-width: 260px; color: white; }
    #settings-panel h3 { margin: 0 0 15px 0; font-size: 18px; text-align: center; letter-spacing: 1px; color: #ffaa00; }
    .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
    .setting-row label { font-size: 13px; font-weight: 500; white-space: nowrap; }
    .setting-row input[type="range"] { flex: 1; accent-color: #ffaa00; height: 6px; }
    .value-display { font-size: 13px; font-weight: bold; color: #ffaa00; min-width: 55px; text-align: right; }
    #settings-panel button { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
    #settings-panel button:hover { background: rgba(255,140,0,0.5); }
    .instruction { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font-size: 13px; background: rgba(0,0,0,0.55); padding: 8px 25px; border-radius: 25px; backdrop-filter: blur(8px); white-space: nowrap; pointer-events: none; letter-spacing: 0.5px; z-index: 15; }
    #joystick-container { position: absolute; bottom: 40px; left: 40px; width: 140px; height: 140px; display: none; z-index: 30; }
    #joystick-base { width: 100%; height: 100%; background: rgba(255,255,255,0.15); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); position: relative; backdrop-filter: blur(5px); }
    #joystick-thumb { width: 60px; height: 60px; background: rgba(255,255,255,0.4); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid rgba(255,255,255,0.6); box-shadow: 0 0 20px rgba(255,255,255,0.3); }
    #look-area { position: absolute; top: 0; right: 0; width: 50%; height: 100%; z-index: 25; display: none; }
    @media (max-width: 768px) {
      #joystick-container { display: block; } #look-area { display: block; }
      #mode-btn { font-size: 14px; padding: 10px 20px; top: 70px; }
      #search-container { top: 20px; right: 10px; } #search-input { width: 130px; font-size: 12px; }
      #settings-panel { top: 120px; right: 10px; padding: 15px; min-width: 200px; }
      .instruction { font-size: 10px; bottom: 20px; white-space: normal; width: 80%; text-align: center; }
      #info { font-size: 12px; padding: 8px 15px; }
    }
  </style>
</head>
<body>
  <div id="info">🌌 ВСЕЛЕННАЯ • 5 св. лет</div>
  <div id="current-planet"></div>
  <div id="distance-display"></div>
  <button id="mode-btn">🎮 ОБЗОР (мышь)</button>
  <div id="search-container"><input type="text" id="search-input" placeholder="🔍 Поиск объектов..."><div id="search-results"></div></div>
  <div id="settings-panel">
    <h3>⚙️ НАСТРОЙКИ</h3>
    <div class="setting-row"><label>⏱️ Время:</label><span class="value-display" id="time-speed-display">1x</span></div>
    <div class="setting-row"><input type="range" id="time-speed-slider" min="1" max="5000" value="1" step="1"></div>
    <div class="setting-row"><label>🖱️ Чувств.:</label><span class="value-display" id="sensitivity-display">0.5</span></div>
    <div class="setting-row"><input type="range" id="sensitivity-slider" min="0.1" max="1.5" value="0.5" step="0.1"></div>
    <div class="setting-row"><label>🚀 Скорость:</label><span class="value-display" id="fly-speed-display">1x</span></div>
    <div class="setting-row"><input type="range" id="fly-speed-slider" min="0.1" max="10" value="1" step="0.1"></div>
    <div class="setting-row" style="justify-content:center;margin-top:5px;"><button id="pause-btn">⏯️ ПАУЗА</button></div>
  </div>
  <div class="instruction">🖱️ Обзор: вращение/зум | 🚀 Полёт: WASD | ПРОБЕЛ — режим | 🔍 Поиск | ⚙️ Настройки</div>
  <div id="joystick-container"><div id="joystick-base"><div id="joystick-thumb"></div></div></div>
  <div id="look-area"></div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ============ КОНСТАНТЫ ============
    const LABEL_SHOW = 4999, LABEL_HIDE = 1000, LY = 200;
    
    // ============ СЦЕНА ============
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020210);
    scene.fog = new THREE.FogExp2(0x020210, 0.0000004);
    
    // Звёздное небо
    for (let layer = 0; layer < 3; layer++) {
      const count = [5000, 3500, 2000][layer];
      const spread = [2500, 3500, 4500][layer];
      const size = [0.2, 0.28, 0.35][layer];
      const col = [0xffffff, 0xaaccff, 0xccddff][layer];
      const geo = new THREE.BufferGeometry();
      const pos = new Float32Array(count * 3);
      for (let i = 0; i < count * 3; i += 3) {
        pos[i] = (Math.random() - 0.5) * spread;
        pos[i+1] = (Math.random() - 0.5) * spread * 0.7;
        pos[i+2] = (Math.random() - 0.5) * spread;
      }
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color: col, size, blending: THREE.AdditiveBlending, depthWrite: false }));
      pts.userData = { rotSpeed: (Math.random() - 0.5) * 0.0001 };
      scene.add(pts);
    }

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 12000);
    camera.position.set(0, 50, 120);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.rotateSpeed = 0.5;
    controls.zoomSpeed = 1.8;
    controls.target.set(0, 0, 0);
    controls.maxDistance = 4000;
    controls.minDistance = 0.5;
    controls.update();

    // ============ ОСВЕЩЕНИЕ ============
    const sunLight = new THREE.PointLight(0xfff5e6, 4, 0, 0.5);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);
    scene.add(new THREE.AmbientLight(0x111122, 0.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.3);
    dirLight.position.set(20, 30, 10);
    scene.add(dirLight);

    // ============ НАСТРОЙКИ ============
    let timeSpeed = 1, isPaused = false, cameraSensitivity = 0.5, baseFlySpeed = 0.7;
    document.getElementById('time-speed-slider').addEventListener('input', function() {
      const v = parseInt(this.value);
      timeSpeed = v <= 10 ? v : v <= 100 ? Math.round(v/10)*10 : v <= 1000 ? Math.round(v/50)*50 : Math.round(v/250)*250;
      document.getElementById('time-speed-display').textContent = timeSpeed + 'x';
    });
    document.getElementById('sensitivity-slider').addEventListener('input', function() {
      cameraSensitivity = parseFloat(this.value);
      document.getElementById('sensitivity-display').textContent = cameraSensitivity.toFixed(1);
      controls.rotateSpeed = cameraSensitivity;
    });
    document.getElementById('fly-speed-slider').addEventListener('input', function() {
      baseFlySpeed = parseFloat(this.value);
      document.getElementById('fly-speed-display').textContent = baseFlySpeed.toFixed(1) + 'x';
    });
    document.getElementById('pause-btn').addEventListener('click', function() {
      isPaused = !isPaused;
      this.textContent = isPaused ? '▶️ ИГРАТЬ' : '⏯️ ПАУЗА';
      this.style.background = isPaused ? 'rgba(255,140,0,0.5)' : 'rgba(255,255,255,0.15)';
    });

    // ============ РЕЖИМЫ ============
    let flyMode = false;
    const keys = { w: false, a: false, s: false, d: false, q: false, e: false, shift: false };
    let yaw = 0, pitch = 0, mouseDown = false, lastMX = 0, lastMY = 0;
    
    document.getElementById('mode-btn').addEventListener('click', () => {
      flyMode = !flyMode;
      const btn = document.getElementById('mode-btn');
      if (flyMode) {
        btn.textContent = '🚀 ПОЛЁТ (WASD)'; btn.classList.add('fly-mode');
        controls.enabled = false; renderer.domElement.style.cursor = 'crosshair';
      } else {
        btn.textContent = '🎮 ОБЗОР (мышь)'; btn.classList.remove('fly-mode');
        controls.enabled = true; renderer.domElement.style.cursor = 'default';
        Object.keys(keys).forEach(k => keys[k] = false);
      }
    });
    
    window.addEventListener('keydown', e => {
      if (e.code === 'Space' && document.activeElement?.id !== 'search-input') { e.preventDefault(); document.getElementById('mode-btn').click(); return; }
      if (!flyMode) return;
      if (e.code === 'KeyW') keys.w = true;
      if (e.code === 'KeyA') keys.a = true;
      if (e.code === 'KeyS') keys.s = true;
      if (e.code === 'KeyD') keys.d = true;
      if (e.code === 'KeyQ') keys.q = true;
      if (e.code === 'KeyE') keys.e = true;
      if (e.code.startsWith('Shift')) keys.shift = true;
    });
    window.addEventListener('keyup', e => {
      if (!flyMode) return;
      if (e.code === 'KeyW') keys.w = false;
      if (e.code === 'KeyA') keys.a = false;
      if (e.code === 'KeyS') keys.s = false;
      if (e.code === 'KeyD') keys.d = false;
      if (e.code === 'KeyQ') keys.q = false;
      if (e.code === 'KeyE') keys.e = false;
      if (e.code.startsWith('Shift')) keys.shift = false;
    });
    renderer.domElement.addEventListener('mousedown', e => { if (flyMode) { mouseDown = true; lastMX = e.clientX; lastMY = e.clientY; } });
    window.addEventListener('mouseup', () => { mouseDown = false; });
    window.addEventListener('mousemove', e => {
      if (!flyMode || !mouseDown) return;
      yaw -= (e.clientX - lastMX) * 0.004 * cameraSensitivity;
      pitch -= (e.clientY - lastMY) * 0.004 * cameraSensitivity;
      pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
      lastMX = e.clientX; lastMY = e.clientY;
    });

    // ============ ДЖОЙСТИК (мобилки) ============
    let jsActive = false, jsX = 0, jsY = 0, jsSX = 0, jsSY = 0;
    const jsBase = document.getElementById('joystick-base');
    const jsThumb = document.getElementById('joystick-thumb');
    const lookArea = document.getElementById('look-area');
    let tlActive = false, tlLX = 0, tlLY = 0;
    
    if (/Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || window.innerWidth <= 768) {
      document.getElementById('joystick-container').style.display = 'block';
      lookArea.style.display = 'block';
    }
    
    jsBase.addEventListener('touchstart', e => {
      e.preventDefault(); jsActive = true;
      const r = jsBase.getBoundingClientRect();
      jsSX = r.left + r.width/2; jsSY = r.top + r.height/2;
      jsX = e.touches[0].clientX - jsSX; jsY = e.touches[0].clientY - jsSY;
      updateJS();
    });
    jsBase.addEventListener('touchmove', e => {
      e.preventDefault(); if (!jsActive) return;
      jsX = e.touches[0].clientX - jsSX; jsY = e.touches[0].clientY - jsSY;
      const d = Math.sqrt(jsX**2 + jsY**2);
      if (d > 50) { jsX = (jsX/d)*50; jsY = (jsY/d)*50; }
      updateJS();
    });
    jsBase.addEventListener('touchend', () => { jsActive = false; jsX = 0; jsY = 0; updateJS(); });
    function updateJS() { jsThumb.style.transform = `translate(calc(-50% + ${jsX}px), calc(-50% + ${jsY}px))`; }
    
    lookArea.addEventListener('touchstart', e => { e.preventDefault(); tlActive = true; tlLX = e.touches[0].clientX; tlLY = e.touches[0].clientY; });
    lookArea.addEventListener('touchmove', e => {
      e.preventDefault(); if (!tlActive) return;
      const dx = e.touches[0].clientX - tlLX, dy = e.touches[0].clientY - tlLY;
      if (flyMode) { yaw -= dx*0.004*cameraSensitivity; pitch -= dy*0.004*cameraSensitivity; pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch)); }
      else {
        const off = camera.position.clone().sub(controls.target);
        const sph = new THREE.Spherical().setFromVector3(off);
        sph.theta -= dx*0.003*cameraSensitivity; sph.phi -= dy*0.003*cameraSensitivity;
        sph.phi = Math.max(0.1, Math.min(Math.PI-0.1, sph.phi));
        off.setFromSpherical(sph); camera.position.copy(controls.target.clone().add(off)); camera.lookAt(controls.target);
      }
      tlLX = e.touches[0].clientX; tlLY = e.touches[0].clientY;
    });
    lookArea.addEventListener('touchend', () => { tlActive = false; });

    // ============ ФУНКЦИИ СОЗДАНИЯ ОБЪЕКТОВ ============
    function createProceduralTexture(baseColor, type, secondaryColor) {
      const c = document.createElement('canvas');
      c.width = 512; c.height = 256;
      const ctx = c.getContext('2d');
      
      // Базовый градиент
      const grad = ctx.createLinearGradient(0, 0, 0, c.height);
      grad.addColorStop(0, baseColor);
      grad.addColorStop(0.5, secondaryColor || baseColor);
      grad.addColorStop(1, baseColor);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, c.width, c.height);
      
      const imgData = ctx.getImageData(0, 0, c.width, c.height);
      const d = imgData.data;
      
      for (let y = 0; y < c.height; y++) {
        for (let x = 0; x < c.width; x++) {
          const i = (y * c.width + x) * 4;
          let noise = (Math.random() - 0.5) * 25;
          
          if (type === 'star_surface') {
            noise = (Math.random() - 0.5) * 60;
            if (Math.random() < 0.003) noise -= 80;
            if (Math.random() < 0.02) noise += 70;
          } else if (type === 'gas_giant') {
            const band = y % 14;
            if (band < 6) noise -= 20; else noise += 15;
            if (Math.random() < 0.005) noise += 40;
          } else if (type === 'ice_giant') {
            if (Math.random() < 0.06) { d[i] += 30; d[i+1] += 40; d[i+2] += 50; }
          } else if (type === 'rocky') {
            if (Math.random() < 0.015) noise -= 45;
            if (Math.random() < 0.04) noise += 20;
          } else if (type === 'ocean') {
            if (y > 40 && y < 70 && x > 60 && x < 180) noise += 25;
            if (y > 90 && y < 130 && x > 200 && x < 350) noise += 20;
            if (Math.random() < 0.06) { d[i] += 70; d[i+1] += 70; d[i+2] += 70; }
          }
          
          d[i] = Math.max(0, Math.min(255, d[i] + noise));
          d[i+1] = Math.max(0, Math.min(255, d[i+1] + noise));
          d[i+2] = Math.max(0, Math.min(255, d[i+2] + noise));
        }
      }
      ctx.putImageData(imgData, 0, 0);
      return new THREE.CanvasTexture(c);
    }

    function createLabel(name, fontSize = '14px', color = 'white') {
      const div = document.createElement('div');
      div.textContent = name;
      Object.assign(div.style, { color, fontSize, fontWeight: 'bold', textShadow: '1px 1px 3px black', background: 'rgba(0,0,0,0.6)', padding: '3px 14px', borderRadius: '20px', pointerEvents: 'none' });
      return new CSS2DObject(div);
    }

    function addStarGlow(parent, color, size, opacity = 0.25) {
      const glowGeo = new THREE.SphereGeometry(size * 2.8, 48, 48);
      const glowMat = new THREE.ShaderMaterial({
        uniforms: { uColor: { value: new THREE.Color(color) } },
        vertexShader: `varying vec3 vNormal; varying vec3 vPos; void main() { vec4 wp = modelMatrix * vec4(position,1.0); vNormal = normalize(mat3(modelMatrix)*normal); vPos = wp.xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
        fragmentShader: `varying vec3 vNormal; varying vec3 vPos; uniform vec3 uColor; void main() { vec3 vd = normalize(cameraPosition - vPos); float f = 1.0 - abs(dot(vd, vNormal)); f = pow(f, 4.0); gl_FragColor = vec4(uColor, f * 0.7); }`,
        transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
      });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      glow.renderOrder = 1;
      parent.add(glow);
      return glow;
    }

    function addAtmosphere(parent, color, size) {
      const atmoGeo = new THREE.SphereGeometry(size * 1.15, 48, 48);
      const atmoMat = new THREE.ShaderMaterial({
        uniforms: { uColor: { value: new THREE.Color(color) } },
        vertexShader: `varying vec3 vNormal; varying vec3 vPos; void main() { vec4 wp = modelMatrix * vec4(position,1.0); vNormal = normalize(mat3(modelMatrix)*normal); vPos = wp.xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
        fragmentShader: `varying vec3 vNormal; varying vec3 vPos; uniform vec3 uColor; void main() { vec3 vd = normalize(cameraPosition - vPos); float f = 1.0 - abs(dot(vd, vNormal)); f = pow(f, 3.0); gl_FragColor = vec4(uColor, f * 0.4); }`,
        transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
      });
      const atmo = new THREE.Mesh(atmoGeo, atmoMat);
      atmo.renderOrder = 2;
      parent.add(atmo);
      return atmo;
    }

    // ============ ВСЕ ОБЪЕКТЫ ============
    const allSpatialObjects = [];
    const allLabels = [];
    const allAnimatedObjects = [];

    // --- СОЛНЦЕ ---
    const sunGeo = new THREE.SphereGeometry(2.5, 72, 72);
    const sunTex = createProceduralTexture('#ffaa00', 'star_surface', '#ff7700');

    // --- СПУТНИКИ (создаём через привязку к родительским планетам) ---
    const moonDefs = [

    // ============ ЗВЁЗДЫ ЗА ПРЕДЕЛАМИ СОЛНЕЧНОЙ СИСТЕМЫ ============
    const exoStars = [
      { name: 'Проксима Центавра', key: 'proxima', color: '#ff5533', size: 1.0, dist: 4.24 * LY, angle: 2.1, starType: 'M5.5Ve',

    exoStars.forEach(sd => {
      const x = sd.dist * Math.cos(sd.angle), z = sd.dist * Math.sin(sd.angle);

        fragmentShader: `varying vec3 vNormal; varying vec3 vPos; uniform vec3 uColor; uniform float uTime; void main() { vec3 vd = normalize(cameraPosition - vPos); float f = 1.0 - abs(dot(vd, vNormal)); f = pow(f, 6.0); float flicker = 1.0 + sin(uTime*3.0 + vPos.x*10.0)*0.1; gl_FragColor = vec4(uColor, f * 0.25 * flicker); }`,

    });

    // ============ ЧЁРНЫЕ ДЫРЫ (проработанные) ============
    const blackHoles = [
      { name: 'Gaia BH1', key: 'gaia_bh1', dist: 480, angle: 0.8, mass: '10 M☉', size: 1.8 },
      { name: 'Gaia BH2', key: 'gaia_bh2', dist: 700, angle: 1.5, mass: '8.9 M☉', size: 1.6 }
    ];

    blackHoles.forEach(bh => {
      const x = bh.dist * Math.cos(bh.angle), z = bh.dist * Math.sin(bh.angle);
      const bhGroup = new THREE.Group();
      bhGroup.position.set(x, (Math.random() - 0.5) * 20, z);
      
      // Аккреционный диск (несколько слоёв)
      for (let i = 0; i < 3; i++) {
        const dGeo = new THREE.RingGeometry(bh.size * (1.1 + i*0.5), bh.size * (1.8 + i*0.6), 96);
        const dMat = new THREE.MeshBasicMaterial({ 
          color: [0x8844ff, 0x6622cc, 0x4400aa][i],

        });
        const disk = new THREE.Mesh(dGeo, dMat);

      // Горизонт событий (чёрная сфера)

      const horizon = new THREE.Mesh(hGeo, hMat);

      // Фотонное кольцо
      const pGeo = new THREE.RingGeometry(bh.size * 0.95, bh.size * 1.05, 96);
      const pMat = new THREE.MeshBasicMaterial({ color: 0xff44ff, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
      const photonRing = new THREE.Mesh(pGeo, pMat);
      photonRing.rotation.x = Math.PI/2;
      bhGroup.add(photonRing);
      
      // Свечение
      const glGeo = new THREE.SphereGeometry(bh.size * 3.5, 48, 48);
      const glMat = new THREE.ShaderMaterial({
        uniforms: { uColor: { value: new THREE.Color('#4400ff') }, uTime: { value: 0 } },
        vertexShader: `varying vec3 vNormal; varying vec3 vPos; void main() { vec4 wp = modelMatrix * vec4(position,1.0); vNormal = normalize(mat3(modelMatrix)*normal); vPos = wp.xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
        fragmentShader: `varying vec3 vNormal; varying vec3 vPos; uniform vec3 uColor; uniform float uTime; void main() { vec3 vd = normalize(cameraPosition - vPos); float f = 1.0 - abs(dot(vd, vNormal)); f = pow(f, 5.0); float pulse = 1.0 + sin(uTime*2.0)*0.15; gl_FragColor = vec4(uColor, f * 0.35 * pulse); }`,

    // ============ ПОИСК ============
    const searchInput = document.getElementById('search-input');

    const typeIcons = { star: '⭐', planet: '🪐', dwarf_planet: '🔮', moon: '🌙', exoplanet: '🌍', black_hole: '🕳️' };
    
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase().trim();
      if (q.length < 1) { searchResults.style.display = 'none'; return; }
      const results = allSpatialObjects.filter(o => o.userData.name?.toLowerCase().includes(q) && !o.userData.isAsteroid && !o.userData.isKuiper);
      searchResults.innerHTML = results.length === 0 ? '<div class="search-result-item" style="color:#888;">Ничего не найдено</div>' :
        results.slice(0, 15).map(o => `<div class="search-result-item" data-key="${o.userData.key}">${typeIcons[o.userData.type] || '📍'} <strong>${o.userData.name}</strong> ${o.userData.starType ? `<span style="font-size:10px;opacity:0.7">${o.userData.starType}</span>` : ''}</div>`).join('');
      searchResults.style.display = 'block';
    });
    
    searchResults.addEventListener('click', e => {
      const item = e.target.closest('.search-result-item');
      if (!item?.dataset.key) return;
      focusOnObject(item.dataset.key);
      searchResults.style.display = 'none'; searchInput.value = ''; searchInput.blur();
    });
    
    document.addEventListener('click', e => { if (!e.target.closest('#search-container')) searchResults.style.display = 'none'; });

    // ============ НАВИГАЦИЯ ============
    let currentTarget = 'all';
    const pnDiv = document.getElementById('current-planet');
    const distDiv = document.getElementById('distance-display');
    
    function getWorldPos(obj) { const p = new THREE.Vector3(); obj.getWorldPosition(p); return p; }
    
    function focusOnObject(key) {
      pnDiv.style.display = 'none'; distDiv.style.display = 'none';
      if (key === 'all') { controls.target.set(0, 0, 0); camera.position.set(0, 50, 120); controls.update(); currentTarget = 'all'; return; }
      
      const obj = allSpatialObjects.find(o => o.userData.key === key);
      if (!obj) return;
      
      const wp = getWorldPos(obj);
      const sz = obj.userData.size || 1;
      const cd = sz * 8 + 3;
      const newPos = wp.clone().add(new THREE.Vector3(cd * 0.6, cd * 0.4, cd * 0.7));
      
      if (isNaN(newPos.x)) return;
      
      const typeNames = { star: '⭐ Звезда', planet: '🪐 Планета', dwarf_planet: '🔮 Карликовая планета', moon: '🌙 Спутник', exoplanet: '🌍 Экзопланета', black_hole: '🕳️ Чёрная дыра' };
      pnDiv.textContent = (typeNames[obj.userData.type] || '') + ' ' + obj.userData.name;
      pnDiv.style.display = 'block';
      
      const st = controls.target.clone(), sc = camera.position.clone(), t0 = Date.now();
      function anim() {
        const p = Math.min((Date.now() - t0) / 800, 1);
        const e = 1 - Math.pow(1 - p, 3);
        controls.target.lerpVectors(st, wp, e);
        camera.position.lerpVectors(sc, newPos, e);
        controls.update();
        if (p < 1) requestAnimationFrame(anim);
      }
      anim();
      currentTarget = key;
    }
    
    // Клик
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    window.addEventListener('click', e => {
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
      if (e.target.closest('#settings-panel') || e.target.closest('#search-container') || e.target.closest('#joystick-container') || e.target.closest('#look-area')) return;
      mouse.set((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(allSpatialObjects.filter(o => !o.userData.isAsteroid && !o.userData.isKuiper), true);
      if (hits.length > 0) {
        let obj = hits[0].object;
        while (obj) { if (obj.userData?.key) { focusOnObject(obj.userData.key); return; } obj = obj.parent; }
      }
    });

    // ============ ОБНОВЛЕНИЕ НАЗВАНИЙ ============
    function updateLabels() {
      const cp = camera.position;
      allLabels.forEach(ld => {
        const wp = getWorldPos(ld.obj);
        const d = cp.distanceTo(wp);
        if (d > LABEL_SHOW || d < LABEL_HIDE) { ld.label.element.style.display = 'none'; }
        else {
          ld.label.element.style.display = 'block';
          const fr = 300;
          ld.label.element.style.opacity = d > LABEL_SHOW - fr ? Math.max(0, (LABEL_SHOW - d) / fr) : d < LABEL_HIDE + fr ? Math.max(0, (d - LABEL_HIDE) / fr) : 1;
        }
      });
      if (currentTarget !== 'all') {
        const tgt = allSpatialObjects.find(o => o.userData.key === currentTarget);
        if (tgt) { distDiv.textContent = `📏 ${Math.round(cp.distanceTo(getWorldPos(tgt)))} ед.`; distDiv.style.display = 'block'; }
      }
    }

    // ============ АНИМАЦИЯ ============
    const clock = new THREE.Clock();
    
    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const sp = isPaused ? 0 : timeSpeed;
      const time = performance.now() * 0.001;
      
      // Звёзды фона
      scene.children.forEach(c => { if (c.isPoints && c.userData.rotSpeed) c.rotation.y += c.userData.rotSpeed * sp; });
      
      // Все анимированные объекты
      allAnimatedObjects.forEach(ao => {
        if (ao.type === 'sun') { ao.obj.rotation.y += 0.002 * sp; return; }
        if (ao.type === 'planet' || ao.type === 'moon' || ao.type === 'exoplanet') {
          ao.obj.userData.angle = (ao.obj.userData.angle || 0) + (ao.obj.userData.speed || ao.speed || 0) * 0.25 * sp;
          ao.obj.position.x = (ao.obj.userData.dist || ao.dist) * Math.cos(ao.obj.userData.angle);
          ao.obj.position.z = (ao.obj.userData.dist || ao.dist) * Math.sin(ao.obj.userData.angle);
          ao.obj.rotation.y += 0.01 * sp;
        }
        if (ao.type === 'asteroid' || ao.type === 'kuiper') {
          ao.obj.userData.angle = (ao.obj.userData.angle || 0) + ao.speed * 0.25 * sp;
          ao.obj.position.x = ao.dist * Math.cos(ao.obj.userData.angle);
          ao.obj.position.z = ao.dist * Math.sin(ao.obj.userData.angle);
        }
        if (ao.type === 'star_group') {
          ao.obj.children.forEach(c => { if (c.material?.uniforms?.uTime) c.material.uniforms.uTime.value = time; });
          if (ao.coronaMat) ao.coronaMat.uniforms.uTime.value = time;
        }
        if (ao.type === 'black_hole') {
          ao.obj.children.forEach((c, i) => { if (c.geometry?.type === 'RingGeometry') c.rotation.z += (0.005 + i*0.002) * sp; });
          if (ao.glMat) ao.glMat.uniforms.uTime.value = time;
          if (ao.photonRing) ao.photonRing.rotation.z += 0.02 * sp;
        }
      });
      
      // Полёт
      if (flyMode) {
        const speed = baseFlySpeed * (keys.shift ? 3 : 1) * 0.7;
        const fwd = new THREE.Vector3(), right = new THREE.Vector3();
        camera.getWorldDirection(fwd);
        right.crossVectors(fwd, new THREE.Vector3(0, 1, 0)).normalize();
        if (keys.w || (jsActive && jsY < -10)) camera.position.addScaledVector(fwd, speed);
        if (keys.s || (jsActive && jsY > 10)) camera.position.addScaledVector(fwd, -speed);
        if (keys.a || (jsActive && jsX < -10)) camera.position.addScaledVector(right, -speed);
        if (keys.d || (jsActive && jsX > 10)) camera.position.addScaledVector(right, speed);
        if (keys.q) camera.position.y -= speed * 0.7;
        if (keys.e) camera.position.y += speed * 0.7;
        camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
      }
      
      updateLabels();
      if (!flyMode) controls.update();
      
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    console.log('🌌 ГОТОВО!');
    console.log('☀️ Солнечная система с текстурами и атмосферами');
    console.log('⭐ 4 звезды с короной и пульсирующим свечением');
    console.log('🌍 2 экзопланеты с атмосферами');
    console.log('🕳️ 2 чёрные дыры с аккреционными дисками и фотонными кольцами');
    console.log('💫 Пояса астероидов, Койпера, Облако Оорта');
  </script>
</body>
