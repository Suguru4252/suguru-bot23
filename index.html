<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chugur Space Cell Game</title>
<style>
  body { margin:0; overflow:hidden; background:#000; font-family:Arial; }
  canvas { display:block; }.ui { position:fixed; top:0; left:0; width:100%; color:white; z-index:10; }

.panel { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.5); padding:10px; border-radius:10px; }

#controls { position:fixed; bottom:20px; width:100%; display:flex; justify-content:center; gap:20px; }

.btn { width:70px; height:70px; border-radius:50%; background:rgba(255,255,255,0.2); text-align:center; line-height:70px; color:white; } </style>

</head>
<body><canvas id="game"></canvas>

<div class="ui">
  <div class="panel">
    <div>Score: <span id="score">0</span></div>
    <div>Coins: <span id="coins">0</span></div>
    <div>Mode: <span id="mode">SPACE</span></div>
    <button onclick="toggleMode()">Switch Mode</button>
    <button onclick="startGame()">Start</button>
  </div>
</div><div id="controls">
  <div class="btn" id="left">◀</div>
  <div class="btn" id="shoot">🔥</div>
  <div class="btn" id="right">▶</div>
</div><script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

// ===== MODE =====
let mode = "SPACE"; // SPACE or CELL

function toggleMode(){
  mode = mode === "SPACE" ? "CELL" : "SPACE";
  document.getElementById("mode").innerText = mode;
}

// ===== GAME STATE =====
let score = 0;
let coins = Number(localStorage.getItem("coins")||0);
let gameState = "game";

// ===== PLAYER =====
const player = {
  x: innerWidth/2,
  y: innerHeight/2,
  size: 20,
  speed: 6,
  growth: 1
};

// ===== OBJECTS =====
let bullets = [];
let enemies = [];
let food = [];

// ===== CELL MODE FOOD =====
function spawnFood(){
  food.push({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight,
    r: 3 + Math.random()*3
  });
}

// ===== INPUT =====
let touchX = player.x;
let touchY = player.y;

addEventListener("touchmove", e=>{
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
});

addEventListener("touchstart", ()=>{
  if(mode=="SPACE") shoot();
});

left.onclick = ()=> player.x -= 30;
right.onclick = ()=> player.x += 30;
shoot.onclick = ()=> shoot();

function shoot(){
  if(mode!=="SPACE") return;
  bullets.push({x:player.x,y:player.y,v:8});
}

// ===== ENEMIES =====
function spawnEnemy(){
  enemies.push({x:Math.random()*innerWidth,y:-20,v:2});
}

// ===== UPDATE =====
function update(){

  if(mode === "CELL"){
    player.x += (touchX - player.x)*0.1;
    player.y += (touchY - player.y)*0.1;

    if(Math.random()<0.2) spawnFood();

    food.forEach((f,fi)=>{
      let d = Math.hypot(player.x-f.x, player.y-f.y);
      if(d < player.size){
        food.splice(fi,1);
        player.size += 0.3;
        score += 1;
      }
    });

  } else {

    player.x += (touchX-player.x)*0.1;

    bullets.forEach(b=>b.y-=b.v);
    enemies.forEach(e=>e.y+=e.v);

    if(Math.random()<0.02) spawnEnemy();

    bullets.forEach((b,bi)=>{
      enemies.forEach((e,ei)=>{
        if(Math.hypot(b.x-e.x,b.y-e.y)<20){
          enemies.splice(ei,1);
          bullets.splice(bi,1);
          score += 10;
        }
      });
    });
  }

  document.getElementById("score").innerText = Math.floor(score);
}

// ===== DRAW =====
function draw(){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,innerWidth,innerHeight);

  if(mode === "CELL"){

    ctx.fillStyle="lime";
    food.forEach(f=>{
      ctx.beginPath();
      ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
      ctx.fill();
    });

    ctx.fillStyle="cyan";
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
    ctx.fill();

  } else {

    ctx.fillStyle="cyan";
    ctx.fillRect(player.x,player.y,20,20);

    ctx.fillStyle="yellow";
    bullets.forEach(b=>ctx.fillRect(b.x,b.y,3,8));

    ctx.fillStyle="red";
    enemies.forEach(e=>ctx.fillRect(e.x,e.y,20,20));
  }
}

// ===== LOOP =====
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script></body>
</html>
