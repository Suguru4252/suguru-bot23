
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D DILDO VIEWER - NetErrror</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.6);
            color: #ffdd99;
            padding: 10px;
            font-size: 14px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        #instruction {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: #ffccaa;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        @media (max-width: 600px) {
            #info { font-size: 10px; bottom: 10px; }
            #instruction { font-size: 10px; top: 12px; right: 12px; }
        }
    </style>
</head>
<body>
    <div id="info">🖱️ ПАЛЕЦ/МЫШЬ — ВРАЩАТЬ, ПРИБЛИЖАТЬ, ОТДАЛЯТЬ | 3D МОДЕЛЬ 🖱️</div>
    <div id="instruction">🍆 БЕЖЕВЫЙ ДИЛДО + ЯЙЦА | КАЧЕСТВЕННАЯ МОДЕЛЬ 🍆</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- СЦЕНА ---
        const scene = new THREE.Scene();
        // Красивый градиентный фон через CSS + прозрачный Three.js фон, чтобы не грузить
        scene.background = new THREE.Color(0x0a0a2a);
        
        // --- КАМЕРА ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2.2, 1.6, 3.2);
        camera.lookAt(0, 0.5, 0);

        // --- РЕНДЕРЕР ---
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- УПРАВЛЕНИЕ (вращение, приближение, отдаление) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 1.5;
        controls.zoomSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0.6, 0);

        // --- КРАСИВЫЙ ЗАДНИЙ ФОН (без звезд, просто плавный градиент через текстуру) ---
        // Создаем canvas текстуру с градиентом
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#0a0a2a');
        gradient.addColorStop(0.4, '#1a1a4a');
        gradient.addColorStop(0.7, '#2a1a3a');
        gradient.addColorStop(1, '#0a0a1a');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const backgroundTexture = new THREE.CanvasTexture(canvas);
        scene.background = backgroundTexture;
        
        // Добавляем легкий туман для глубины (не нагружает)
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.012);

        // --- ОСВЕЩЕНИЕ (объемное, но оптимизированное) ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.3);
        mainLight.position.set(2, 3, 2);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        
        const backLight = new THREE.PointLight(0xffaa66, 0.6);
        backLight.position.set(-1, 1.2, -2);
        scene.add(backLight);
        
        const fillLight = new THREE.PointLight(0x88aaff, 0.5);
        fillLight.position.set(0.5, -0.6, 0.8);
        scene.add(fillLight);
        
        const rimLight = new THREE.PointLight(0xffaa88, 0.7);
        rimLight.position.set(1.2, 1.5, -1.8);
        scene.add(rimLight);
        
        // --- ПОЛ (простой, без лишних деталей) ---
        const gridHelper = new THREE.GridHelper(5, 16, 0xccaa88, 0x886644);
        gridHelper.position.y = -0.65;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        const planeMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 0.5, metalness: 0.2, transparent: true, opacity: 0.25 });
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(4.5, 4.5), planeMat);
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.68;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // --- КАЧЕСТВЕННАЯ МОДЕЛЬ: ДИЛДО + 2 ЯЙЦА (детализированная) ---
        const modelGroup = new THREE.Group();
        
        // Материалы
        const beigeMain = new THREE.MeshStandardMaterial({ color: 0xd4b48c, roughness: 0.25, metalness: 0.08, emissive: 0x221100 });
        const beigeTip = new THREE.MeshStandardMaterial({ color: 0xe8c8a0, roughness: 0.2, metalness: 0.05 });
        const beigeDark = new THREE.MeshStandardMaterial({ color: 0xc8a878, roughness: 0.35 });
        const eggMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c, roughness: 0.28, metalness: 0.04 });
        
        // 1. Ствол дилдо (слегка изогнутый эффект за счет масштаба)
        const shaftGeo = new THREE.CylinderGeometry(0.3, 0.34, 1.25, 64);
        const shaft = new THREE.Mesh(shaftGeo, beigeMain);
        shaft.castShadow = true;
        shaft.position.y = 0;
        modelGroup.add(shaft);
        
        // Головка (детализированная сфера)
        const tipGeo = new THREE.SphereGeometry(0.38, 64, 64);
        const tip = new THREE.Mesh(tipGeo, beigeTip);
        tip.position.y = 0.72;
        tip.castShadow = true;
        modelGroup.add(tip);
        
        // Второй слой головки (блик)
        const tipInnerGeo = new THREE.SphereGeometry(0.32, 48, 48);
        const tipInnerMat = new THREE.MeshStandardMaterial({ color: 0xf0d0b0, roughness: 0.15, emissive: 0x331a00 });
        const tipInner = new THREE.Mesh(tipInnerGeo, tipInnerMat);
        tipInner.position.y = 0.73;
        tipInner.castShadow = true;
        modelGroup.add(tipInner);
        
        // Основание (присоска)
        const baseGeo = new THREE.CylinderGeometry(0.45, 0.5, 0.13, 48);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0xc0a070, roughness: 0.4 });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.y = -0.66;
        base.castShadow = true;
        modelGroup.add(base);
        
        // Желобок под головкой (деталь)
        const grooveGeo = new THREE.TorusGeometry(0.355, 0.055, 48, 96);
        const grooveMat = new THREE.MeshStandardMaterial({ color: 0xb8946a, roughness: 0.45 });
        const groove = new THREE.Mesh(grooveGeo, grooveMat);
        groove.rotation.x = Math.PI / 2;
        groove.position.y = 0.48;
        modelGroup.add(groove);
        
        // Дополнительные кольца по стволу
        const ringMatDetail = new THREE.MeshStandardMaterial({ color: 0xc8a070, roughness: 0.5 });
        for (let i = -0.35; i <= 0.25; i += 0.3) {
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.32, 0.045, 32, 64), ringMatDetail);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = i;
            modelGroup.add(ring);
        }
        
        // 2. ЯЙЦА (два, более реалистичной формы)
        const leftEggGeo = new THREE.SphereGeometry(0.36, 64, 64);
        const leftEgg = new THREE.Mesh(leftEggGeo, eggMat);
        leftEgg.scale.set(0.92, 0.82, 0.88);
        leftEgg.position.set(-0.62, -0.4, 0.22);
        leftEgg.castShadow = true;
        modelGroup.add(leftEgg);
        
        const rightEggGeo = new THREE.SphereGeometry(0.36, 64, 64);
        const rightEgg = new THREE.Mesh(rightEggGeo, eggMat);
        rightEgg.scale.set(0.92, 0.82, 0.88);
        rightEgg.position.set(0.62, -0.4, 0.22);
        rightEgg.castShadow = true;
        modelGroup.add(rightEgg);
        
        // Блики на яйцах (маленькие сферы)
        const highlightMat = new THREE.MeshStandardMaterial({ color: 0xf0d8b0, emissive: 0x442200 });
        const leftHL = new THREE.Mesh(new THREE.SphereGeometry(0.09, 24, 24), highlightMat);
        leftHL.position.set(-0.74, -0.2, 0.52);
        modelGroup.add(leftHL);
        
        const rightHL = new THREE.Mesh(new THREE.SphereGeometry(0.09, 24, 24), highlightMat);
        rightHL.position.set(0.74, -0.2, 0.52);
        modelGroup.add(rightHL);
        
        // Венозные детали на стволе (небольшие цилиндры)
        const veinMat = new THREE.MeshStandardMaterial({ color: 0xc8a070, roughness: 0.6 });
        for (let i = 0; i < 5; i++) {
            const vein = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.25, 6), veinMat);
            const angle = (i / 5) * Math.PI * 2;
            vein.position.x = Math.cos(angle) * 0.33;
            vein.position.z = Math.sin(angle) * 0.33;
            vein.position.y = -0.1 + (i * 0.2);
            vein.castShadow = true;
            modelGroup.add(vein);
        }
        
        modelGroup.position.set(0, 0.12, 0);
        scene.add(modelGroup);
        
        // --- МАЛЕНЬКИЙ СВЕТ ОТ ОБЪЕКТА ---
        const glowLight = new THREE.PointLight(0xd4a070, 0.45, 2.2);
        glowLight.position.set(0, 0.4, 0.4);
        scene.add(glowLight);
        
        // --- ПРОСТАЯ АНИМАЦИЯ (легкое покачивание) ---
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            
            // Очень плавное движение
            modelGroup.rotation.y = Math.sin(time * 0.35) * 0.025;
            modelGroup.position.y = 0.12 + Math.sin(time * 0.7) * 0.004;
            
            // Мерцание света
            glowLight.intensity = 0.45 + Math.sin(time * 2.5) * 0.1;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        // --- АДАПТАЦИЯ ПОД ЭКРАН ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log("NetErrror: 3D модель готова — детализированный дилдо + яйца, оптимизировано");
    </script>
</body>
</html>
```
