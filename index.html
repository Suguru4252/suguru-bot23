<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Space Mobile Game</title>
<style>
body { margin:0; overflow:hidden; background:black; touch-action:none; }
canvas { display:block; }
#ui {
 position:absolute; top:10px; left:10px; color:white; font-family:Arial;
}#controls { position:absolute; bottom:20px; width:100%; display:flex; justify-content:space-between; padding:0 20px; box-sizing:border-box; }

.joystick { width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.1); position:relative; }

.stick { width:50px; height:50px; border-radius:50%; background:white; position:absolute; left:35px; top:35px; }

#shootBtn { width:80px; height:80px; border-radius:50%; background:red; color:white; font-size:20px; border:none; } </style>

</head>
<body>
<canvas id="game"></canvas><div id="ui">
<div>HP: <span id="hp">100</span></div>
</div><div id="controls">
 <div class="joystick" id="joy">
   <div class="stick" id="stick"></div>
 </div>
 <button id="shootBtn">🔥</button>
</div><script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x:canvas.width/2, y:canvas.height/2, vx:0, vy:0, hp:100 };
let bullets = [];
let enemies = [];

// стрельба
document.getElementById('shootBtn').ontouchstart = ()=>{
 bullets.push({ x:player.x, y:player.y, vx:0, vy:-6 });
};

// джойстик
let joy = document.getElementById('joy');
let stick = document.getElementById('stick');
let joyActive=false;

joy.addEventListener('touchstart', ()=> joyActive=true);
joy.addEventListener('touchend', ()=>{
 joyActive=false;
 player.vx=0; player.vy=0;
 stick.style.left='35px'; stick.style.top='35px';
});

joy.addEventListener('touchmove', e=>{
 if(!joyActive) return;
 let rect = joy.getBoundingClientRect();
 let touch = e.touches[0];
 let x = touch.clientX - rect.left - 60;
 let y = touch.clientY - rect.top - 60;

 let dist = Math.min(40, Math.hypot(x,y));
 let angle = Math.atan2(y,x);

 let dx = Math.cos(angle)*dist;
 let dy = Math.sin(angle)*dist;

 stick.style.left = (dx+35)+'px';
 stick.style.top = (dy+35)+'px';

 player.vx = dx * 0.1;
 player.vy = dy * 0.1;
});

// враги
function spawnEnemy(){
 enemies.push({ x:Math.random()*canvas.width, y:-20 });
}
setInterval(spawnEnemy,1500);

function update(){
 player.x += player.vx;
 player.y += player.vy;

 bullets.forEach(b=> b.y+=b.vy);
 enemies.forEach(e=> e.y+=2);

 // столкновения
 bullets.forEach((b,bi)=>{
  enemies.forEach((e,ei)=>{
   if(Math.hypot(b.x-e.x,b.y-e.y)<15){
    enemies.splice(ei,1);
    bullets.splice(bi,1);
   }
  });
 });

 enemies.forEach((e,ei)=>{
  if(Math.hypot(player.x-e.x,player.y-e.y)<20){
    player.hp-=10;
    enemies.splice(ei,1);
  }
 });

 if(player.hp<=0){ alert('GAME OVER'); location.reload(); }
 document.getElementById('hp').innerText=player.hp;
}

function draw(){
 ctx.fillStyle='black';
 ctx.fillRect(0,0,canvas.width,canvas.height);

 ctx.fillStyle='white';
 ctx.beginPath();
 ctx.arc(player.x,player.y,10,0,Math.PI*2);
 ctx.fill();

 ctx.fillStyle='yellow';
 bullets.forEach(b=> ctx.fillRect(b.x-2,b.y-5,4,10));

 ctx.fillStyle='red';
 enemies.forEach(e=>{
  ctx.beginPath();
  ctx.arc(e.x,e.y,10,0,Math.PI*2);
  ctx.fill();
 });
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

loop();
</script></body>
</html>
