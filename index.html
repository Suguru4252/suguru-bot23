<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NetErrror - BIG Бибеджон: Боссы, Бонусы, Армия роботов</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a2f2a, #051a15);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'MS Gothic', monospace;
            overflow: hidden;
            touch-action: manipulation;
        }
        .game-container {
            background: #1e3a2f;
            border-radius: 48px;
            padding: 16px;
            box-shadow: 0 20px 40px black;
            border: 2px solid #d4b87a;
            position: relative;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 4px #2b4a3a, 0 10px 30px black;
            cursor: crosshair;
        }
        .ui-panel {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: #0c1a16cc;
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid #c4a86a;
            flex-wrap: wrap;
        }
        .stat {
            background: #1f2c1a;
            padding: 4px 16px;
            border-radius: 40px;
            color: #f7e05e;
            font-weight: bold;
            font-size: 1rem;
        }
        .lives {
            color: #ff7777;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        .combo {
            background: #3a1f2f;
            color: #ffaa88;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: bold;
        }
        .rage-bar {
            width: 150px;
            height: 14px;
            background: #2a1a1a;
            border-radius: 12px;
            overflow: hidden;
        }
        .rage-fill {
            width: 0%;
            height: 100%;
            background: #ff4444;
            transition: width 0.1s linear;
        }
        button {
            background: #6e4a2e;
            border: none;
            color: #ffefb0;
            font-weight: bold;
            padding: 4px 16px;
            border-radius: 40px;
            cursor: pointer;
        }
        button:active { transform: scale(0.94); }
        .power-bar {
            width: 100px;
            height: 10px;
            background: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
        }
        .power-fill {
            width: 0%;
            height: 100%;
            background: #ffaa44;
        }
        .start-overlay {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            bottom: 16px;
            background: rgba(0,0,0,0.85);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        .start-btn {
            background: #ffaa44;
            color: #1a2a1a;
            font-size: 1.8rem;
            padding: 12px 40px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            border: none;
        }
        .start-btn:active { transform: scale(0.95); background: #ffcc66; }
        .overlay-title {
            font-size: 2.5rem;
            color: #ffdd88;
            text-shadow: 0 0 10px #ff6600;
            margin-bottom: 20px;
        }
        .overlay-sub {
            color: #aaffaa;
            font-size: 1rem;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <canvas id="gameCanvas" width="1000" height="550"></canvas>
    <div class="ui-panel">
        <div class="stat">🐒 ОЧКИ: <span id="scoreSpan">0</span></div>
        <div class="lives" id="livesSpan">❤️❤️❤️</div>
        <div class="combo">⚡ КОМБО: <span id="comboSpan">1</span>x</div>
        <div class="rage-bar"><div class="rage-fill" id="rageFill"></div></div>
        <div class="power-bar"><div class="power-fill" id="powerFill"></div></div>
    </div>
    <div id="startOverlay" class="start-overlay">
        <div class="overlay-title">🐒 BIG БИБЕДЖОН 🍌</div>
        <div class="overlay-sub">ЗАЖМИ ЛКМ → ПРИЦЕЛ → ОТПУСТИ</div>
        <div class="overlay-sub">R или ПРОБЕЛ = ОГНЕННЫЙ ШАР</div>
        <button class="start-btn" id="startGameBtn">🍆 НАЧАТЬ ИГРУ 🍆</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startOverlay = document.getElementById('startOverlay');
    const startBtn = document.getElementById('startGameBtn');
    
    // ========== ИГРОК ==========
    let bibedjon = { x: canvas.width/2, y: canvas.height - 70, width: 70, height: 80 };
    let projectiles = [];
    let enemies = [];
    let bonuses = [];
    let boss = null;
    let particles = [];
    let screenShake = 0;
    
    // ========== СТАТИСТИКА ==========
    let score = 0;
    let lives = 3;
    let gameActive = false;  // ← false до нажатия START
    let gameOverFlag = false;
    let combo = 1;
    let comboCounter = 0;
    let lastHitFrame = 0;
    
    // ========== ШКАЛА ЯРОСТИ ==========
    let rage = 0;
    let maxRage = 100;
    
    // ========== БОНУСНЫЕ ЭФФЕКТЫ ==========
    let bananaStorm = { active: false, endTime: 0 };
    let doubleSpeed = { active: false, endTime: 0 };
    let shotgunMode = { active: false, endTime: 0 };
    
    // ========== ПРИЦЕЛ ==========
    let aiming = false;
    let aimStartX, aimStartY, aimCurrentX, aimCurrentY;
    let powerCharge = 0;
    let charging = false;
    let chargeInterval = null;
    
    // ========== UI ==========
    const scoreSpan = document.getElementById('scoreSpan');
    const livesSpan = document.getElementById('livesSpan');
    const comboSpan = document.getElementById('comboSpan');
    const rageFill = document.getElementById('rageFill');
    const powerFillDiv = document.getElementById('powerFill');
    
    let lastEnemySpawn = 0;
    let frame = 0;
    
    function updateUI() {
        scoreSpan.innerText = score;
        let hearts = "";
        for(let i=0; i<lives; i++) hearts += "❤️ ";
        for(let i=lives; i<3; i++) hearts += "🖤 ";
        livesSpan.innerText = hearts;
        comboSpan.innerText = combo;
        rageFill.style.width = (rage / maxRage * 100) + "%";
    }
    
    function updatePowerBar() { powerFillDiv.style.width = powerCharge + "%"; }
    
    // ========== ЗВУКИ ==========
    let audioCtx = null;
    function playSound(freq, vol=0.15, duration=0.2) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.value = vol;
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }
    
    // ========== КРАСИВЫЕ ТИПЫ ВРАГОВ ==========
    const enemyTypes = [
        { name: "пехотинец", color1: "#6a8eb0", color2: "#4a6e90", hp: 1, speed: 0.8, width: 44, height: 48, score: 10, icon: "🤖", eyes: "#ffffff" },
        { name: "щитовик", color1: "#5a9e6a", color2: "#3a7e4a", hp: 2, speed: 0.6, width: 48, height: 52, score: 20, icon: "🛡️", eyes: "#ffffaa" },
        { name: "ниндзя", color1: "#cc6666", color2: "#aa4444", hp: 1, speed: 1.4, width: 42, height: 46, score: 15, icon: "⚡", eyes: "#ff6666" },
        { name: "летающий", color1: "#eebb55", color2: "#cc9933", hp: 1, speed: 1.0, width: 46, height: 40, score: 12, icon: "🕊️", flying: true, eyes: "#ffeeaa" }
    ];
    
    function spawnEnemy() {
        if (!gameActive) return;
        let type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
        let x = 40 + Math.random() * (canvas.width - 80);
        let y = type.flying ? 60 + Math.random() * 100 : 40;
        enemies.push({
            x: x, y: y, type: type, hp: type.hp, maxHp: type.hp,
            width: type.width, height: type.height, speed: type.speed,
            flying: type.flying || false, wobble: 0
        });
    }
    
    // ========== БОСС С КРАСИВОЙ МОДЕЛЬКОЙ ==========
    function spawnBoss() {
        if (boss) return;
        boss = {
            x: canvas.width/2 - 60, y: 60, width: 130, height: 110, hp: 5, maxHp: 5,
            speed: 0.35, direction: 1, shootTimer: 0, name: "MEGA РОБОТ"
        };
        playSound(300, 0.3, 0.5);
    }
    
    function updateBoss(delta) {
        if (!boss || !gameActive) return;
        boss.x += boss.direction * boss.speed * delta * 60;
        if (boss.x <= 30) boss.direction = 1;
        if (boss.x >= canvas.width - boss.width - 30) boss.direction = -1;
        boss.shootTimer += delta;
        if (boss.shootTimer > 1.5) {
            boss.shootTimer = 0;
            let bomb = {
                x: boss.x + boss.width/2, y: boss.y + boss.height-10,
                vx: (Math.random() - 0.5) * 1.5, vy: 3, radius: 10, isBomb: true
            };
            projectiles.push(bomb);
            playSound(440, 0.2);
        }
    }
    
    // ========== БОНУСЫ ==========
    const bonusTypes = [
        { name: "banana", color: "#ffcc44", effect: "bananaStorm", duration: 5000, icon: "🍌", text: "БАНАНОВЫЙ ШТОРМ" },
        { name: "medkit", color: "#ff7777", effect: "medkit", icon: "💊", text: "+1 ЖИЗНЬ" },
        { name: "speed", color: "#88ffaa", effect: "doubleSpeed", duration: 6000, icon: "⚡", text: "УСКОРЕНИЕ" },
        { name: "shotgun", color: "#ffaa66", effect: "shotgun", duration: 5000, icon: "🔫", text: "ДРОБОВИК" }
    ];
    
    function spawnBonus(x, y) {
        if (!gameActive) return;
        let type = bonusTypes[Math.floor(Math.random() * bonusTypes.length)];
        bonuses.push({ x: x, y: y, type: type, radius: 14, life: true });
    }
    
    function applyBonus(bonus) {
        switch(bonus.type.effect) {
            case "bananaStorm":
                bananaStorm.active = true;
                bananaStorm.endTime = Date.now() + 5000;
                playSound(660, 0.2);
                break;
            case "medkit":
                lives = Math.min(lives + 1, 5);
                updateUI();
                playSound(880, 0.2);
                break;
            case "doubleSpeed":
                doubleSpeed.active = true;
                doubleSpeed.endTime = Date.now() + 6000;
                playSound(550, 0.2);
                break;
            case "shotgun":
                shotgunMode.active = true;
                shotgunMode.endTime = Date.now() + 5000;
                playSound(770, 0.2);
                break;
        }
    }
    
    // ========== СПЕЦСПОСОБНОСТЬ ==========
    function fireRage() {
        if (!gameActive) return;
        if (rage < maxRage) return;
        rage = 0;
        updateUI();
        playSound(300, 0.4, 0.6);
        screenShake = 15;
        let fireball = {
            x: bibedjon.x, y: bibedjon.y - 40, vx: 0, vy: -9, radius: 22, isFireball: true
        };
        projectiles.push(fireball);
        for(let i=0; i<20; i++) particles.push({ x: bibedjon.x, y: bibedjon.y-30, vx: (Math.random()-0.5)*6, vy: -Math.random()*5, life: 0.6, color: "#ff8844" });
    }
    
    // ========== БРОСОК ==========
    function shootProjectile(fromX, fromY, toX, toY, chargePower) {
        if (!gameActive) return;
        let dx = toX - fromX;
        let dy = toY - fromY;
        let len = Math.sqrt(dx*dx + dy*dy);
        if (len < 0.1) return;
        let normX = dx / len;
        let normY = dy / len;
        let speed = 6 + (chargePower / 12);
        
        if (shotgunMode.active) {
            for(let i=-1; i<=1; i++) {
                let angle = Math.atan2(normY, normX) + i * 0.25;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                projectiles.push({ x: fromX, y: fromY, vx: vx, vy: vy, radius: 10, isBomb: false, isFireball: false });
            }
        } else {
            projectiles.push({ x: fromX, y: fromY, vx: normX * speed, vy: normY * speed, radius: 12, isBomb: false, isFireball: false });
        }
        playSound(480, 0.12);
    }
    
    function addCombo() {
        comboCounter++;
        if (comboCounter >= 3) {
            combo = Math.min(combo + 1, 6);
            comboCounter = 0;
        }
        lastHitFrame = frame;
    }
    
    function resetCombo() {
        if (frame - lastHitFrame > 60) {
            combo = 1;
            comboCounter = 0;
        }
    }
    
    // ========== ПОЛНЫЙ РЕСТАРТ ==========
    function fullRestart() {
        gameActive = true;
        gameOverFlag = false;
        score = 0;
        lives = 3;
        combo = 1;
        comboCounter = 0;
        rage = 0;
        projectiles = [];
        enemies = [];
        bonuses = [];
        boss = null;
        particles = [];
        bananaStorm.active = false;
        doubleSpeed.active = false;
        shotgunMode.active = false;
        aiming = false;
        charging = false;
        if (chargeInterval) clearInterval(chargeInterval);
        powerCharge = 0;
        updatePowerBar();
        updateUI();
        lastEnemySpawn = Date.now();
        startOverlay.style.display = 'none';
    }
    
    // ========== ОБНОВЛЕНИЕ ИГРЫ ==========
    function updateGame(delta) {
        if (!gameActive) return;
        
        if (bananaStorm.active && Date.now() > bananaStorm.endTime) bananaStorm.active = false;
        if (doubleSpeed.active && Date.now() > doubleSpeed.endTime) doubleSpeed.active = false;
        if (shotgunMode.active && Date.now() > shotgunMode.endTime) shotgunMode.active = false;
        
        let now = Date.now();
        let spawnDelay = Math.max(600, 1100 - Math.floor(score/8));
        if (!boss && now - lastEnemySpawn > spawnDelay) {
            spawnEnemy();
            lastEnemySpawn = now;
        }
        
        if (score >= 20 && !boss && !gameOverFlag) spawnBoss();
        if (boss) updateBoss(delta);
        
        // враги
        for(let i=0; i<enemies.length; i++) {
            let e = enemies[i];
            let spd = e.speed * (doubleSpeed.active ? 1.5 : 1) * delta * 60;
            if (e.flying) {
                e.wobble = (e.wobble + delta*8) % (Math.PI*2);
                e.x += Math.sin(e.wobble) * 0.8;
                e.y += spd;
            } else {
                e.y += spd;
            }
            if (e.y + e.height > bibedjon.y + 15) {
                enemies.splice(i,1); i--;
                lives--;
                updateUI();
                playSound(220, 0.3);
                screenShake = 10;
                if (lives <= 0) {
                    gameActive = false;
                    gameOverFlag = true;
                    startOverlay.style.display = 'flex';
                    startOverlay.querySelector('.overlay-title').innerHTML = '💀 ТЫ ПРОИГРАЛ 💀';
                    startBtn.innerText = '🔄 ИГРАТЬ СНОВА';
                }
                continue;
            }
        }
        
        // банановый шторм
        if (bananaStorm.active) {
            for(let i=0; i<2; i++) {
                projectiles.push({ x: Math.random()*canvas.width, y: -10, vx: (Math.random()-0.5)*3, vy: 4.5, radius: 8, isBanana: true });
            }
        }
        
        // снаряды и столкновения
        for(let i=0; i<projectiles.length; i++) {
            let p = projectiles[i];
            p.x += p.vx * delta * 60;
            p.y += p.vy * delta * 60;
            if (p.x < -100 || p.x > canvas.width+100 || p.y < -100 || p.y > canvas.height+150) {
                projectiles.splice(i,1); i--; continue;
            }
            let hit = false;
            for(let j=0; j<enemies.length; j++) {
                let e = enemies[j];
                if (p.x + p.radius > e.x && p.x - p.radius < e.x + e.width &&
                    p.y + p.radius > e.y && p.y - p.radius < e.y + e.height) {
                    e.hp -= 1;
                    hit = true;
                    if (e.hp <= 0) {
                        let pts = e.type.score * combo;
                        score += pts;
                        rage = Math.min(rage + 10, maxRage);
                        addCombo();
                        spawnBonus(e.x + e.width/2, e.y + e.height/2);
                        enemies.splice(j,1);
                        playSound(680, 0.15);
                        screenShake = 4;
                        for(let k=0;k<8;k++) particles.push({ x: p.x, y: p.y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 0.5, color: "#ffaa66" });
                    } else {
                        playSound(540, 0.1);
                    }
                    break;
                }
            }
            if (!hit && boss && p.x + p.radius > boss.x && p.x - p.radius < boss.x + boss.width &&
                p.y + p.radius > boss.y && p.y - p.radius < boss.y + boss.height) {
                boss.hp -= 1;
                hit = true;
                rage = Math.min(rage + 15, maxRage);
                addCombo();
                playSound(800, 0.2);
                screenShake = 8;
                for(let k=0;k<12;k++) particles.push({ x: p.x, y: p.y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, life: 0.5, color: "#ff8844" });
                if (boss.hp <= 0) {
                    score += 100 * combo;
                    boss = null;
                    playSound(300, 0.4, 0.8);
                    for(let k=0;k<40;k++) particles.push({ x: boss ? boss.x+boss.width/2 : p.x, y: boss ? boss.y+boss.height/2 : p.y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 0.7, color: "#ffaa44" });
                }
            }
            if (hit) { projectiles.splice(i,1); i--; }
        }
        
        resetCombo();
        updateUI();
        
        for(let i=0; i<particles.length; i++) {
            let p = particles[i];
            p.x += p.vx * delta * 60;
            p.y += p.vy * delta * 60;
            p.life -= delta * 2;
            if (p.life <= 0) particles.splice(i,1), i--;
        }
        if (screenShake > 0) screenShake -= delta * 50;
    }
    
    // ========== ОБРАБОТКА КЛИКОВ ==========
    function handlePointerDown(e) {
        if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let cx, cy;
        if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; e.preventDefault(); }
        else { cx = e.clientX; cy = e.clientY; }
        let canvasX = (cx - rect.left) * scaleX;
        let canvasY = (cy - rect.top) * scaleY;
        
        for(let i=0; i<bonuses.length; i++) {
            let b = bonuses[i];
            let dx = canvasX - b.x, dy = canvasY - b.y;
            if (Math.sqrt(dx*dx+dy*dy) < b.radius) {
                applyBonus(b);
                bonuses.splice(i,1);
                return;
            }
        }
        
        aiming = true;
        aimStartX = bibedjon.x;
        aimStartY = bibedjon.y - 40;
        aimCurrentX = canvasX;
        aimCurrentY = canvasY;
        charging = true;
        powerCharge = 0;
        if (chargeInterval) clearInterval(chargeInterval);
        chargeInterval = setInterval(() => {
            if (charging && gameActive) { powerCharge = Math.min(powerCharge + 2.5, 100); updatePowerBar(); }
        }, 30);
    }
    
    function handlePointerMove(e) {
        if (!aiming || !gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let cx, cy;
        if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; e.preventDefault(); }
        else { cx = e.clientX; cy = e.clientY; }
        aimCurrentX = (cx - rect.left) * scaleX;
        aimCurrentY = (cy - rect.top) * scaleY;
    }
    
    function handlePointerUp(e) {
        if (!aiming) { charging=false; if(chargeInterval) clearInterval(chargeInterval); return; }
        aiming = false;
        charging = false;
        if (chargeInterval) clearInterval(chargeInterval);
        if (gameActive) shootProjectile(aimStartX, aimStartY, aimCurrentX, aimCurrentY, powerCharge);
        powerCharge = 0;
        updatePowerBar();
    }
    
    canvas.addEventListener('mousedown', handlePointerDown);
    window.addEventListener('mousemove', handlePointerMove);
    window.addEventListener('mouseup', handlePointerUp);
    canvas.addEventListener('touchstart', handlePointerDown);
    window.addEventListener('touchmove', handlePointerMove);
    window.addEventListener('touchend', handlePointerUp);
    
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'KeyR') { e.preventDefault(); fireRage(); }
    });
    
    startBtn.addEventListener('click', () => {
        fullRestart();
    });
    
    // ========== КРАСИВЫЙ РЕНДЕР ==========
    function drawBackground() {
        ctx.fillStyle = "#2a6b55"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#b87a4a"; ctx.fillRect(0, canvas.height-90, canvas.width, 90);
        ctx.fillStyle = "#9e5e3a"; ctx.fillRect(0, canvas.height-90, canvas.width, 12);
        for(let i=0;i<12;i++) ctx.fillRect(40+i*80, canvas.height-100, 12, 30);
    }
    
    function drawBibedjon() {
        let x = bibedjon.x - 35, y = bibedjon.y - 80;
        ctx.fillStyle = "#8b5a2b"; ctx.fillRect(x+15, y+20, 40, 50);
        ctx.fillStyle = "#c49a6c"; ctx.beginPath(); ctx.ellipse(x+35, y+15, 25, 30, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#2c2c2c"; ctx.fillRect(x+20, y+8, 8, 8); ctx.fillRect(x+42, y+8, 8, 8);
        ctx.fillStyle = "#ffcc44"; ctx.fillRect(x+22, y-8, 26, 12);
        for(let i=0;i<3;i++) ctx.fillRect(x+24+i*10, y-14, 4, 10);
        ctx.fillStyle = "#f0e68c"; ctx.font = "bold 18px monospace"; ctx.fillText("BIG", x+15, y-18);
    }
    
    function drawEnemies() {
        for(let e of enemies) {
            // градиент
            let grad = ctx.createLinearGradient(e.x, e.y, e.x, e.y+e.height);
            grad.addColorStop(0, e.type.color1);
            grad.addColorStop(1, e.type.color2);
            ctx.fillStyle = grad;
            ctx.fillRect(e.x, e.y, e.width, e.height);
            ctx.fillStyle = "#222"; ctx.fillRect(e.x+8, e.y+8, 8, 8); ctx.fillRect(e.x+e.width-16, e.y+8, 8, 8);
            ctx.fillStyle = e.type.eyes; ctx.fillRect(e.x+10, e.y+10, 4, 4); ctx.fillRect(e.x+e.width-14, e.y+10, 4, 4);
            ctx.fillStyle = "#ff6666"; ctx.fillRect(e.x+e.width/2-5, e.y+e.height-12, 10, 6);
            ctx.fillStyle = "#fff"; ctx.font = "18px monospace"; ctx.fillText(e.type.icon, e.x+12, e.y+32);
            if (e.hp > 1) { ctx.fillStyle = "#ffaa66"; ctx.fillRect(e.x, e.y-8, (e.hp/e.maxHp)*e.width, 5); }
        }
    }
    
    function drawBoss() {
        if (!boss) return;
        let grad = ctx.createLinearGradient(boss.x, boss.y, boss.x, boss.y+boss.height);
        grad.addColorStop(0, "#cc5555");
        grad.addColorStop(1, "#882222");
        ctx.fillStyle = grad;
        ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
        ctx.fillStyle = "#ffcc88"; ctx.fillRect(boss.x+15, boss.y+15, 30, 20); ctx.fillRect(boss.x+boss.width-45, boss.y+15, 30, 20);
        ctx.fillStyle = "#ff4444"; ctx.fillRect(boss.x+20, boss.y+18, 8, 8); ctx.fillRect(boss.x+boss.width-38, boss.y+18, 8, 8);
        ctx.fillStyle = "#ffffaa"; ctx.font = "bold 16px monospace"; ctx.fillText("☠️ BOSS ☠️", boss.x+25, boss.y-5);
        ctx.fillStyle = "#ffaa66"; ctx.fillRect(boss.x, boss.y-12, (boss.hp/boss.maxHp)*boss.width, 8);
        ctx.fillStyle = "#ffaa44"; ctx.font = "20px monospace"; ctx.fillText("👑", boss.x+boss.width/2-10, boss.y-18);
    }
    
    function drawBonuses() {
        for(let b of bonuses) {
            ctx.fillStyle = b.type.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000"; ctx.font = "20px monospace"; ctx.fillText(b.type.icon, b.x-10, b.y+8);
        }
    }
    
    function drawProjectilesAndEffects() {
        for(let p of projectiles) {
            if (p.isFireball) { ctx.fillStyle = "#ff6600"; ctx.beginPath(); ctx.arc(p.x, p.y, 18, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "#ffaa44"; ctx.beginPath(); ctx.arc(p.x-3, p.y-3, 6, 0, Math.PI*2); ctx.fill(); }
            else if (p.isBanana) { ctx.fillStyle = "#ffcc44"; ctx.fillRect(p.x-6, p.y-4, 12, 8); ctx.fillStyle = "#aa8833"; ctx.fillRect(p.x-2, p.y-2, 4, 4); }
            else { ctx.fillStyle = "#ffcc55"; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius-2, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "#aa8833"; ctx.beginPath(); ctx.arc(p.x-3, p.y-3, 4, 0, Math.PI*2); ctx.fill(); }
        }
        for(let p of particles) { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill(); }
    }
    
    function drawAim() {
        if (!aiming) return;
        ctx.beginPath(); ctx.moveTo(aimStartX, aimStartY); ctx.lineTo(aimCurrentX, aimCurrentY);
        ctx.strokeStyle = "#ffaa66"; ctx.lineWidth = 3; ctx.setLineDash([6,8]); ctx.stroke(); ctx.setLineDash([]);
        let rad = 15 + powerCharge/4;
        ctx.beginPath(); ctx.arc(aimCurrentX, aimCurrentY, rad, 0, Math.PI*2);
        ctx.strokeStyle = "#ff8844"; ctx.stroke(); ctx.fillStyle = `rgba(255,140,50,${powerCharge/150})`; ctx.fill();
    }
    
    function drawUI() {
        ctx.fillStyle = "#ffffcc"; ctx.font = "bold 12px monospace";
        if (bananaStorm.active) ctx.fillText("🍌 БАНАНОВЫЙ ШТОРМ", 20, 80);
        if (doubleSpeed.active) ctx.fillText("⚡ УСКОРЕНИЕ", 20, 105);
        if (shotgunMode.active) ctx.fillText("🔫 ДРОБОВИК", 20, 130);
    }
    
    let lastTime = 0;
    function gameLoop(now) {
        let delta = Math.min(0.033, (now - lastTime) / 1000);
        if (delta > 0.01) updateGame(delta);
        lastTime = now; frame++;
        
        let shakeX=0, shakeY=0;
        if(screenShake>0){ shakeX=(Math.random()-0.5)*screenShake; shakeY=(Math.random()-0.5)*screenShake; ctx.save(); ctx.translate(shakeX,shakeY); }
        
        drawBackground(); drawEnemies(); drawBoss(); drawBonuses(); drawProjectilesAndEffects();
        drawBibedjon(); drawAim(); drawUI();
        if(screenShake>0) ctx.restore();
        requestAnimationFrame(gameLoop);
    }
    
    updateUI();
    lastEnemySpawn = Date.now();
    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
