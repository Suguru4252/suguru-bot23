<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Rucoy Online - Полностью Исправлено</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0c12;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            background: #1a2a1a;
        }
        
        .corner-buttons {
            position: fixed;
            z-index: 100;
            pointer-events: auto;
        }
        .top-left { top: 12px; left: 12px; display: flex; gap: 8px; }
        .top-right { top: 12px; right: 12px; display: flex; gap: 8px; }
        .bottom-left { bottom: 12px; left: 12px; display: flex; gap: 8px; }
        .bottom-right { bottom: 12px; right: 12px; display: flex; gap: 8px; }
        
        .mini-btn {
            background: rgba(44, 47, 74, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa55;
            color: #ffcc88;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            touch-action: manipulation;
            cursor: pointer;
            font-family: monospace;
            transition: 0.05s linear;
            text-align: center;
            min-width: 60px;
        }
        .mini-btn:active { transform: translateY(2px); background: rgba(64, 67, 94, 0.95); }
        .fight-mini { background: rgba(200, 80, 60, 0.95); border-color: #ff8866; color: white; }
        .skill-mini { background: rgba(106, 78, 158, 0.95); border-color: #c88eff; }
        .class-mini { background: rgba(60, 100, 80, 0.95); border-color: #88ffaa; }
        .super-mini { background: rgba(200, 100, 50, 0.95); border-color: #ffaa66; }
        
        .nickname-display {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 6px 16px;
            border-radius: 30px;
            color: #ffcc88;
            font-size: 13px;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            font-weight: bold;
            backdrop-filter: blur(4px);
            border: 1px solid #ffaa55;
        }
        .portal-progress {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 6px 16px;
            border-radius: 30px;
            color: #88ffaa;
            font-size: 11px;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            border: 1px solid #88ffaa;
        }
        
        @media (max-width: 700px) {
            .mini-btn { font-size: 10px; padding: 5px 8px; min-width: 48px; }
            .nickname-display { font-size: 10px; top: 8px; }
            .portal-progress { font-size: 9px; bottom: 8px; white-space: nowrap; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="corner-buttons top-left">
        <button class="mini-btn" id="classBtn">🔄 КЛАСС</button>
    </div>
    
    <div class="corner-buttons top-right">
        <button class="mini-btn" id="statsBtn">📊 СТАТ</button>
        <button class="mini-btn" id="invBtn">🎒 ИНВ</button>
        <button class="mini-btn" id="mapBtn">🗺️ КАРТА</button>
    </div>
    
    <div class="corner-buttons bottom-left">
        <button class="mini-btn" id="hpBtn">❤️ HP</button>
        <button class="mini-btn" id="mpBtn">💙 MP</button>
    </div>
    
    <div class="corner-buttons bottom-right">
        <button class="mini-btn fight-mini" id="attackBtn">⚔️ АТАКА</button>
        <button class="mini-btn skill-mini" id="skillBtn">✨ СКИЛЛ</button>
        <button class="mini-btn super-mini" id="superBtn">🌟 СУПЕР</button>
    </div>
    
    <div class="corner-buttons" style="bottom: 12px; right: 100px; display: flex; gap: 6px;">
        <button class="mini-btn class-mini" id="classWarriorBtn">⚔️ МЕЧ</button>
        <button class="mini-btn class-mini" id="classArcherBtn">🏹 ЛУК</button>
        <button class="mini-btn class-mini" id="classMageBtn">🔮 МАГ</button>
    </div>
    
    <div class="nickname-display" id="nicknameDisplay"></div>
    <div class="portal-progress" id="portalProgress"></div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ========== РАЗМЕР МИРА ==========
        const TILE_SIZE = 50;
        const MAP_W = 116;
        const MAP_H = 92;
        const WORLD_WIDTH = MAP_W * TILE_SIZE;
        const WORLD_HEIGHT = MAP_H * TILE_SIZE;
        
        let cameraX = 0, cameraY = 0;
        let canvasWidth = window.innerWidth;
        let canvasHeight = window.innerHeight;
        let walkCycle = 0;
        
        // Эффекты атаки
        let attackEffects = [];
        
        function addAttackEffect(x, y, type) {
            attackEffects.push({ x, y, type, life: 10 });
        }
        
        function resizeCanvas() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            updateCamera();
        });
        resizeCanvas();
        
        // ========== ВСЯ БРОНЯ И ОРУЖИЕ ==========
        const ALL_ARMOR = [
            { id: "wooden", name: "Деревянная броня", def: 8, level: 1, price: 100, icon: "🪵", color: "#8B6914" },
            { id: "leather1", name: "Кожаная броня", def: 15, level: 3, price: 250, icon: "🧥", color: "#8B5A2B" },
            { id: "studded", name: "Шипованная броня", def: 25, level: 6, price: 500, icon: "🛡️", color: "#696969" },
            { id: "iron1", name: "Железная броня", def: 38, level: 10, price: 900, icon: "⚙️", color: "#A0A0A0" },
            { id: "steel", name: "Стальная броня", def: 55, level: 15, price: 1500, icon: "🔩", color: "#C0C0C0" },
            { id: "golden1", name: "Золотая броня", def: 75, level: 20, price: 2500, icon: "✨", color: "#FFD700" },
            { id: "mithril", name: "Мифриловая броня", def: 100, level: 30, price: 4000, icon: "🔮", color: "#66CCFF" },
            { id: "runic1", name: "Руническая броня", def: 130, level: 40, price: 6000, icon: "📜", color: "#9932CC" },
            { id: "dragon1", name: "Драконья броня", def: 165, level: 50, price: 9000, icon: "🐉", color: "#FF4500" },
            { id: "titan", name: "Титановая броня", def: 205, level: 65, price: 13000, icon: "⛰️", color: "#708090" },
            { id: "crystal", name: "Кристальная броня", def: 250, level: 80, price: 18000, icon: "💎", color: "#00FFFF" },
            { id: "shadow", name: "Теневая броня", def: 300, level: 100, price: 25000, icon: "🌑", color: "#2F2F2F" },
            { id: "holy", name: "Святая броня", def: 360, level: 120, price: 35000, icon: "✨", color: "#FFD700" },
            { id: "demonic", name: "Демоническая броня", def: 430, level: 150, price: 50000, icon: "😈", color: "#8B0000" },
            { id: "legendary1", name: "Легендарная броня", def: 520, level: 180, price: 75000, icon: "⭐", color: "#FFA500" },
            { id: "divine", name: "Божественная броня", def: 650, level: 200, price: 100000, icon: "👑", color: "#FF69B4" }
        ];
        
        const ALL_WEAPONS = [
            { id: "wooden_sword", name: "Деревянный меч", dmgMin: 12, dmgMax: 20, level: 1, price: 80, icon: "🪵", range: 60, type: "melee" },
            { id: "iron_sword", name: "Железный меч", dmgMin: 22, dmgMax: 36, level: 5, price: 200, icon: "⚔️", range: 65, type: "melee" },
            { id: "steel_sword", name: "Стальной меч", dmgMin: 34, dmgMax: 54, level: 10, price: 400, icon: "🗡️", range: 68, type: "melee" },
            { id: "golden_sword", name: "Золотой меч", dmgMin: 48, dmgMax: 76, level: 20, price: 800, icon: "✨", range: 70, type: "melee" },
            { id: "mithril_sword", name: "Мифриловый меч", dmgMin: 66, dmgMax: 102, level: 35, price: 1500, icon: "🔮", range: 72, type: "melee" },
            { id: "dragon_sword", name: "Драконий меч", dmgMin: 88, dmgMax: 135, level: 55, price: 3000, icon: "🐉", range: 74, type: "melee" },
            { id: "legendary_sword", name: "Легендарный меч", dmgMin: 120, dmgMax: 185, level: 80, price: 6000, icon: "⭐", range: 76, type: "melee" },
            { id: "wooden_bow", name: "Деревянный лук", dmgMin: 15, dmgMax: 26, level: 1, price: 90, icon: "🏹", range: 155, type: "ranged" },
            { id: "iron_bow", name: "Железный лук", dmgMin: 28, dmgMax: 46, level: 8, price: 300, icon: "🏹", range: 160, type: "ranged" },
            { id: "steel_bow", name: "Стальной лук", dmgMin: 42, dmgMax: 68, level: 18, price: 700, icon: "🏹", range: 165, type: "ranged" },
            { id: "golden_bow", name: "Золотой лук", dmgMin: 60, dmgMax: 96, level: 30, price: 1500, icon: "🏹", range: 170, type: "ranged" },
            { id: "dragon_bow", name: "Драконий лук", dmgMin: 85, dmgMax: 135, level: 50, price: 3500, icon: "🏹", range: 175, type: "ranged" },
            { id: "legendary_bow", name: "Легендарный лук", dmgMin: 120, dmgMax: 185, level: 80, price: 7000, icon: "⭐", range: 180, type: "ranged" },
            { id: "wooden_staff", name: "Деревянный посох", dmgMin: 18, dmgMax: 30, level: 1, price: 85, icon: "🔮", range: 145, type: "mage" },
            { id: "iron_staff", name: "Железный посох", dmgMin: 32, dmgMax: 52, level: 10, price: 350, icon: "🔮", range: 150, type: "mage" },
            { id: "crystal_staff", name: "Кристальный посох", dmgMin: 52, dmgMax: 82, level: 25, price: 900, icon: "🔮", range: 155, type: "mage" },
            { id: "dragon_staff", name: "Драконий посох", dmgMin: 78, dmgMax: 125, level: 45, price: 2500, icon: "🔮", range: 160, type: "mage" },
            { id: "legendary_staff", name: "Легендарный посох", dmgMin: 115, dmgMax: 180, level: 75, price: 6000, icon: "⭐", range: 165, type: "mage" }
        ];
        
        // ========== КАРТА МИРА ==========
        let showMap = false;
        let mapClickTarget = null;
        let worldMap = Array(MAP_H).fill().map(() => Array(MAP_W).fill(0));
        
        function getMapColor(tile) {
            if(tile === 0) return "#3a6c2a";
            if(tile === 1) return "#88aa66";
            if(tile === 2) return "#c9a87a";
            if(tile === 3) return "#3c9e3c";
            if(tile === 4) return "#6e6e7a";
            if(tile === 5) return "#3a8cbb";
            if(tile === 6) return "#7a6a5a";
            return "#3a6c2a";
        }
        
        // ========== МИРЫ ==========
        let currentWorld = "forest";
        let mobsKilledInWorld = 0;
        const MOBS_NEEDED_FOR_PORTAL = 300;
        let portalActive = false;
        let portalX = 0, portalY = 0;
        
        const WORLDS = {
            forest: { name: "🌲 Лес", bgColor1: "#4a8c3a", bgColor2: "#3a6c2a", mobMultiplier: 1.0, mobColors: ["#6f8c5a", "#8a7a6a", "#8b5a3a", "#b8b8cc", "#8a6a4a", "#c97a3a"] },
            desert: { name: "🏜️ Пустыня", bgColor1: "#c9ae74", bgColor2: "#e0b87a", mobMultiplier: 1.3, mobColors: ["#c9a87a", "#b87c4a", "#a86a3a", "#d8b87a", "#c89a6a", "#e8c88a"] },
            castle: { name: "🏰 Замок", bgColor1: "#4a5b6e", bgColor2: "#6c7f8f", mobMultiplier: 1.6, mobColors: ["#6a7a8a", "#8a9aaa", "#5a6a7a", "#7a8a9a", "#9aabbb", "#4a5a6a"] }
        };
        
        // ========== СИСТЕМА СОХРАНЕНИЯ ==========
        let playerNickname = null;
        
        function saveGame() {
            if(!playerNickname) return;
            const saveData = {
                nickname: playerNickname,
                x: player.x, y: player.y,
                hp: player.hp, mp: player.mp,
                level: player.level, exp: player.exp,
                classType: player.classType,
                gold: player.gold,
                potionHp: player.potionHp, potionMp: player.potionMp,
                potionBigHp: player.potionBigHp, potionBigMp: player.potionBigMp,
                armorId: player.armorId, weaponId: player.weaponId,
                currentWorld: currentWorld,
                mobsKilledInWorld: mobsKilledInWorld,
                stats: {
                    mobsKilled: stats.mobsKilled,
                    totalGold: stats.totalGold,
                    totalDamage: stats.totalDamage,
                    totalDamageTaken: stats.totalDamageTaken,
                    startTime: stats.startTime
                }
            };
            localStorage.setItem('rucoy_save_' + playerNickname, JSON.stringify(saveData));
            localStorage.setItem('rucoy_last_nickname', playerNickname);
        }
        
        function loadGame(nickname) {
            const saveData = localStorage.getItem('rucoy_save_' + nickname);
            if(saveData) {
                const data = JSON.parse(saveData);
                player.x = data.x; player.y = data.y;
                player.hp = data.hp; player.mp = data.mp;
                player.level = data.level; player.exp = data.exp;
                player.classType = data.classType;
                player.gold = data.gold;
                player.potionHp = data.potionHp; player.potionMp = data.potionMp;
                player.potionBigHp = data.potionBigHp; player.potionBigMp = data.potionBigMp;
                if(data.armorId) player.armorId = data.armorId;
                if(data.weaponId) player.weaponId = data.weaponId;
                if(data.currentWorld) currentWorld = data.currentWorld;
                if(data.mobsKilledInWorld) mobsKilledInWorld = data.mobsKilledInWorld;
                if(data.stats) {
                    stats.mobsKilled = data.stats.mobsKilled;
                    stats.totalGold = data.stats.totalGold;
                    stats.totalDamage = data.stats.totalDamage;
                    stats.totalDamageTaken = data.stats.totalDamageTaken;
                    stats.startTime = data.stats.startTime;
                }
                updateStatsFromLevel();
                addMsg(`✨ Добро пожаловать обратно, ${nickname}! Уровень ${player.level}`);
                updatePortalStatus();
                return true;
            }
            return false;
        }
        
        function updateStatsFromLevel() {
            let c = CLASSES[player.classType];
            let armor = getArmorById(player.armorId);
            let weapon = getWeaponById(player.weaponId);
            player.maxHp = c.hp + player.level * 18;
            player.maxMp = c.mp + player.level * 13;
            if(player.hp > player.maxHp) player.hp = player.maxHp;
            if(player.mp > player.maxMp) player.mp = player.maxMp;
            player.expToNext = 90 + player.level * 38;
            player.defense = (armor ? armor.def : 8) + Math.floor(player.level * 1.5);
            if(weapon) {
                player.dmgMin = weapon.dmgMin + Math.floor(player.level * 2.5);
                player.dmgMax = weapon.dmgMax + Math.floor(player.level * 3.2);
                player.attackRange = weapon.range;
            }
        }
        
        function getArmorById(id) { return ALL_ARMOR.find(a => a.id === id); }
        function getWeaponById(id) { return ALL_WEAPONS.find(w => w.id === id); }
        
        function updatePortalStatus() {
            portalActive = (mobsKilledInWorld >= MOBS_NEEDED_FOR_PORTAL);
            if(portalActive && currentWorld === "forest") {
                portalX = safeZone.x + safeZone.width - 80;
                portalY = safeZone.y + 60;
            } else { portalActive = false; }
            const progressPercent = Math.min(100, Math.floor(mobsKilledInWorld / MOBS_NEEDED_FOR_PORTAL * 100));
            document.getElementById('portalProgress').innerHTML = `🚪 Прогресс портала: ${mobsKilledInWorld}/${MOBS_NEEDED_FOR_PORTAL} (${progressPercent}%)`;
            if(portalActive) {
                document.getElementById('portalProgress').innerHTML = `✨ ПОРТАЛ ОТКРЫТ! ✨ (Нажмите на него)`;
                document.getElementById('portalProgress').style.color = "#ffaa66";
            } else {
                document.getElementById('portalProgress').style.color = "#88ffaa";
            }
        }
        
        function activatePortal() {
            if(!portalActive) return;
            if(currentWorld === "forest") {
                currentWorld = "desert";
                addMsg(`🌍 ПЕРСОНАЖ ПЕРЕШЁЛ В МИР: ${WORLDS.desert.name}! Сложность увеличена!`);
                mobsKilledInWorld = 0;
                portalActive = false;
                mobs = [];
                for(let i=0;i<15;i++) spawnMob();
                saveGame();
                updatePortalStatus();
            } else if(currentWorld === "desert") {
                currentWorld = "castle";
                addMsg(`🌍 ПЕРСОНАЖ ПЕРЕШЁЛ В МИР: ${WORLDS.castle.name}! Максимальная сложность!`);
                mobsKilledInWorld = 0;
                portalActive = false;
                mobs = [];
                for(let i=0;i<18;i++) spawnMob();
                saveGame();
                updatePortalStatus();
            }
        }
        
        function showNicknameModal() {
            return new Promise((resolve) => {
                const modal = document.createElement('div');
                modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:200;display:flex;align-items:center;justify-content:center;';
                modal.innerHTML = `
                    <div style="background:linear-gradient(135deg, #2a2e3f, #1a1e2f);padding:40px;border-radius:30px;text-align:center;border:2px solid #ffaa55;box-shadow:0 0 30px rgba(255,170,85,0.3);max-width:90%;width:350px;">
                        <h2 style="color:#ffcc88;margin-bottom:20px;font-size:28px;">⚔️ Rucoy Online ⚔️</h2>
                        <p style="color:#aa8866;margin-bottom:20px;">Введите имя героя</p>
                        <input type="text" id="nicknameInput" placeholder="Никнейм" maxlength="20" style="width:100%;padding:12px;font-size:18px;background:#0a0e1a;border:2px solid #ffaa55;color:#ffcc88;border-radius:15px;margin-bottom:20px;font-family:monospace;text-align:center;outline:none;">
                        <button id="startBtn" style="background:linear-gradient(135deg, #ffaa55, #ff8844);color:#1a1e2a;border:none;padding:12px 30px;font-size:18px;font-weight:bold;border-radius:15px;cursor:pointer;font-family:monospace;">Начать игру</button>
                    </div>
                `;
                document.body.appendChild(modal);
                const input = modal.querySelector('#nicknameInput');
                const btn = modal.querySelector('#startBtn');
                const start = () => { let nick = input.value.trim(); if(nick === "") nick = "Герой_" + Math.floor(Math.random() * 1000); modal.remove(); resolve(nick); };
                btn.onclick = start;
                input.onkeypress = (e) => { if(e.key === 'Enter') start(); };
                input.focus();
            });
        }
        
        // ========== СТАТИСТИКА ==========
        let stats = {
            mobsKilled: 0,
            totalGold: 0,
            totalDamage: 0,
            totalDamageTaken: 0,
            startTime: Date.now()
        };
        
        function getPlayTime() {
            let s = Math.floor((Date.now() - stats.startTime) / 1000);
            return { h: Math.floor(s/3600), m: Math.floor((s%3600)/60), s: s%60 };
        }
        
        // ========== БЕЗОПАСНАЯ ЗОНА ==========
        let safeZone = { x: 500, y: 420, width: 560, height: 440 };
        let shopNPC = { x: safeZone.x + safeZone.width - 80, y: safeZone.y + safeZone.height - 60, radius: 28 };
        
        let gates = [
            { x: safeZone.x + safeZone.width/2 - 50, y: safeZone.y - 30, width: 100, height: 40 },
            { x: safeZone.x + safeZone.width/2 - 50, y: safeZone.y + safeZone.height - 10, width: 100, height: 40 },
            { x: safeZone.x - 30, y: safeZone.y + safeZone.height/2 - 50, width: 40, height: 100 },
            { x: safeZone.x + safeZone.width - 10, y: safeZone.y + safeZone.height/2 - 50, width: 40, height: 100 }
        ];
        
        function isInSafeZone(x, y) { return x > safeZone.x && x < safeZone.x + safeZone.width && y > safeZone.y && y < safeZone.y + safeZone.height; }
        function isAtGate(x, y) { for(let g of gates) if(x > g.x && x < g.x+g.width && y > g.y && y < g.y+g.height) return true; return false; }
        function canCrossBoundary(fx, fy, tx, ty) {
            let was = isInSafeZone(fx, fy);
            let will = isInSafeZone(tx, ty);
            if(was === will) return true;
            let mx = (fx+tx)/2, my = (fy+ty)/2;
            return isAtGate(mx, my) || isAtGate(tx, ty) || isAtGate(fx, fy);
        }
        
        let obstacles = [];
        
        function generateWorld() {
            obstacles = [];
            for(let i=0;i<MAP_H;i++) for(let j=0;j<MAP_W;j++) worldMap[i][j] = 0;
            for(let y=12;y<24;y++) for(let x=14;x<30;x++) worldMap[y][x] = 1;
            for(let x=19;x<25;x++) { worldMap[11][x] = 2; worldMap[24][x] = 2; }
            for(let y=16;y<22;y++) { worldMap[y][13] = 2; worldMap[y][30] = 2; }
            for(let i=0;i<38;i++) {
                let fx = safeZone.x + i*28, fxTile = Math.floor(fx / TILE_SIZE), fyTile = Math.floor(safeZone.y / TILE_SIZE);

            let dx = player.targetX - player.x, dy = player.targetY - player.y, dist = Math.hypot(dx, dy);

        }

            selectedMob.hp-=dmg;
            stats.totalDamage+=dmg;
            addAttackEffect(selectedMob.x, selectedMob.y, "skill");
            addMsg(`✨ ${c.skill}! ${dmg} урона по ${selectedMob.name}!`);
            showDamage(selectedMob.x,selectedMob.y,dmg);
            if(selectedMob.hp<=0) killMob(selectedMob);
            saveGame();
        }
        
        function updateMobs() {
            for(let m of mobs) {
                if(m.hp<=0) continue;
                let dx=player.x-m.x, dy=player.y-m.y, dist=Math.hypot(dx,dy);
                if(dist<230 && !isInSafeZone(player.x,player.y)) {
                    let ang=Math.atan2(dy,dx), step=Math.min(m.speed,dist-48);
                    if(step>0) {
                        let nx=m.x+Math.cos(ang)*step, ny=m.y+Math.sin(ang)*step;
                        if(isWalkable(nx,ny,26) && !isInSafeZone(nx,ny)) { m.x=nx; m.y=ny; }
                    }
                    if(dist < m.attackRange + 15) {
                        if(m.attackTimer <= 0) {
                            let dmg=Math.max(3, m.dmg - Math.floor(player.defense/4));
                            player.hp -= dmg;
                            stats.totalDamageTaken += dmg;
                            m.attackTimer = 45;
                            addMsg(`💀 ${m.name} нанес ${dmg} урона!`, true);
                            showDamage(m.x, m.y, dmg, true);
                            if(player.hp <= 0) {
                                player.hp = player.maxHp; player.mp = player.maxMp;
                                player.x = safeZone.x + safeZone.width/2; player.y = safeZone.y + safeZone.height/2;
                                player.targetX = null; player.targetY = null;
                                addMsg(`💀 ВОСКРЕШЕНИЕ В БЕЗОПАСНОЙ ЗОНЕ 💀`, true);
                                saveGame();
                            }
                        } else m.attackTimer--;
                    } else if(m.attackTimer>0) m.attackTimer--;
                } else if(m.attackTimer>0) m.attackTimer--;
            }
        }
        
        function useHp() {
            if(player.potionHp <= 0 && player.potionBigHp <= 0) { addMsg(`❌ Нет зелий HP! Купите у торговца`, true); return; }
            if(player.potionBigHp > 0 && player.hp < player.maxHp * 0.5) {
                let heal = Math.floor(player.maxHp * 0.9); player.hp = Math.min(player.maxHp, player.hp + heal); player.potionBigHp--;
                addMsg(`❤️❤️ БОЛЬШОЕ ЗЕЛЬЕ! +${heal} HP`);
            } else if(player.potionHp > 0) {
                let heal = Math.floor(player.maxHp * 0.7); player.hp = Math.min(player.maxHp, player.hp + heal); player.potionHp--;
                addMsg(`❤️ +${heal} HP (осталось ${player.potionHp})`);
            } else addMsg(`❌ Нет малых зелий!`, true);
            saveGame();
        }
        
        function useMp() {
            if(player.potionMp <= 0 && player.potionBigMp <= 0) { addMsg(`❌ Нет зелий MP! Купите у торговца`, true); return; }
            if(player.potionBigMp > 0 && player.mp < player.maxMp * 0.5) {
                let mana = Math.floor(player.maxMp); player.mp = Math.min(player.maxMp, player.mp + mana); player.potionBigMp--;
                addMsg(`💙💙 БОЛЬШОЕ ЗЕЛЬЕ! +${mana} MP`);
            } else if(player.potionMp > 0) {
                let mana = Math.floor(player.maxMp * 0.75); player.mp = Math.min(player.maxMp, player.mp + mana); player.potionMp--;
                addMsg(`💙 +${mana} MP (осталось ${player.potionMp})`);
            } else addMsg(`❌ Нет малых зелий!`, true);
            saveGame();
        }
        
        function switchClass(className) {
            let classes = Object.keys(CLASSES);
            let newClass = className || classes[(classes.indexOf(player.classType)+1)%classes.length];
            if(player.classType===newClass) return;
            let hpPercent=player.hp/player.maxHp, mpPercent=player.mp/player.maxMp;
            player.classType=newClass;
            updateStatsFromLevel();
            player.hp=Math.max(1,Math.min(player.maxHp,Math.floor(player.maxHp*hpPercent)));
            player.mp=Math.max(1,Math.min(player.maxMp,Math.floor(player.maxMp*mpPercent)));
            addMsg(`🔄 Класс: ${CLASSES[newClass].name} ${CLASSES[newClass].icon} | Дальность: ${player.attackRange}px`);
            saveGame();
        }

            ctx.fillText("📊 СТАТИСТИКА", x+20, y+40);
            
            // Кнопка закрытия
            ctx.fillStyle = "#ffaa55";
            ctx.fillRect(x+w-45, y+15, 35, 35);
            ctx.fillStyle = "#ffcc88";
            ctx.font = "28px monospace";
            ctx.fillText("✕", x+w-35, y+43);
            
            ctx.fillStyle = "#aa8866";
            ctx.fillRect(x+15, y+60, w-30, 3);
            
            let t = getPlayTime();
            let statItems = [
                `👤 Игрок: ${playerNickname}`,
                `⭐ Уровень: ${player.level}`,
                `👾 Убито мобов: ${stats.mobsKilled}`,
                `💰 Всего золота: ${stats.totalGold}`,
                `💰 Текущее золото: ${player.gold}`,
                `⚔️ Нанесено урона: ${stats.totalDamage}`,
                `🛡️ Получено урона: ${stats.totalDamageTaken}`,
                `🌍 Текущий мир: ${WORLDS[currentWorld].name}`,
                `🚪 Прогресс портала: ${mobsKilledInWorld}/${MOBS_NEEDED_FOR_PORTAL}`,
                `⏱️ Время в игре: ${t.h}ч ${t.m}м ${t.s}с`,
                `❤️ HP: ${player.hp}/${player.maxHp}`,
                `💙 MP: ${player.mp}/${player.maxMp}`,
                `⚔️ Урон: ${player.dmgMin}-${player.dmgMax}`,
                `🛡️ Защита: ${player.defense}`
            ];
            
            ctx.save();
            ctx.beginPath();
            ctx.rect(x+10, y+75, w-20, h-105);
            ctx.clip();
            
            let startIdx = Math.floor(statsScroll / statsItemsPerPage) * statsItemsPerPage;
            let endIdx = Math.min(startIdx + statsItemsPerPage, statItems.length);
            let itemY = y + 90;
            
            for(let i = startIdx; i < endIdx; i++) {
                ctx.fillStyle = "#edbc";
                ctx.font = "13px monospace";
                ctx.fillText(statItems[i], x+25, itemY);
                itemY += 38;
            }
            ctx.restore();
            
            // Полоса прокрутки
            if(statItems.length > statsItemsPerPage) {
                let scrollBarX = x + w - 18;
                let scrollBarH = h - 105;
                let scrollBarY = y + 75;
                let maxScroll = Math.max(0, statItems.length - statsItemsPerPage);
                let scrollPercent = statsScroll / maxScroll;
                let thumbH = Math.max(40, scrollBarH * (statsItemsPerPage / statItems.length));
                let thumbY = scrollBarY + scrollPercent * (scrollBarH - thumbH);
                ctx.fillStyle = "#4a4e6a";
                ctx.fillRect(scrollBarX, scrollBarY, 8, scrollBarH);
                ctx.fillStyle = "#ffaa55";
                ctx.fillRect(scrollBarX, thumbY, 8, thumbH);
            }
        }
        
        function handleStatsClick(mx, my) {
            let w = Math.min(450, canvasWidth - 40);
            let h = Math.min(500, canvasHeight - 40);
            let x = canvasWidth/2 - w/2, y = canvasHeight/2 - h/2;
            
            if(mx > x+w-45 && mx < x+w-10 && my > y+15 && my < y+50) {
                showStatsWindow = false;
                return true;
            }
            return false;
        }
        
        // ========== КАРТА ==========
        function drawFullMap() {
            let mapWidth = Math.min(canvasWidth - 80, 800);
            let mapHeight = mapWidth * (MAP_H / MAP_W);
            let mapX = (canvasWidth - mapWidth) / 2;
            let mapY = (canvasHeight - mapHeight) / 2;
            let cellW = mapWidth / MAP_W;
            let cellH = mapHeight / MAP_H;
            
            ctx.fillStyle = "#000000dd";
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            ctx.fillStyle = "#2a2e3f";
            ctx.fillRect(mapX-10, mapY-10, mapWidth+20, mapHeight+20);
            
            for(let y=0; y<MAP_H; y++) {
                for(let x=0; x<MAP_W; x++) {
                    ctx.fillStyle = getMapColor(worldMap[y][x]);
                    ctx.fillRect(mapX + x*cellW, mapY + y*cellH, cellW+0.5, cellH+0.5);
                    
                    if(worldMap[y][x] === 3) {
                        ctx.fillStyle = "#5aac3a";
                        ctx.font = `${cellH*0.6}px monospace`;
                        ctx.fillText("🌲", mapX + x*cellW + cellW*0.25, mapY + y*cellH + cellH*0.75);
                    } else if(worldMap[y][x] === 4) {
                        ctx.fillStyle = "#8e8e9a";
                        ctx.font = `${cellH*0.6}px monospace`;
                        ctx.fillText("⛰️", mapX + x*cellW + cellW*0.25, mapY + y*cellH + cellH*0.75);
                    }
                }
            }
            
            let playerTileX = player.x / TILE_SIZE;
            let playerTileY = player.y / TILE_SIZE;
            ctx.fillStyle = "#ff4444";
            ctx.beginPath();
            ctx.arc(mapX + playerTileX*cellW, mapY + playerTileY*cellH, cellW*0.6, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(mapX + playerTileX*cellW, mapY + playerTileY*cellH, cellW*0.3, 0, Math.PI*2);
            ctx.fill();
            
            if(portalActive && currentWorld === "forest") {
                let portalTileX = portalX / TILE_SIZE;
                let portalTileY = portalY / TILE_SIZE;
                ctx.fillStyle = "#ffaa44";
                ctx.beginPath();
                ctx.arc(mapX + portalTileX*cellW, mapY + portalTileY*cellH, cellW*0.55, 0, Math.PI*2);
                ctx.fill();
            }
            
            if(mapClickTarget) {
                let targetTileX = mapClickTarget.x / TILE_SIZE;
                let targetTileY = mapClickTarget.y / TILE_SIZE;
                ctx.fillStyle = "#ffdd44";
                ctx.beginPath();
                ctx.arc(mapX + targetTileX*cellW, mapY + targetTileY*cellH, cellW*0.7, 0, Math.PI*2);
                ctx.fill();
            }
            
            ctx.fillStyle = "#ffcc88";
            ctx.font = `bold ${Math.min(18, canvasWidth/40)}px monospace`;
            ctx.fillText("🗺️ КАРТА МИРА", canvasWidth/2-80, mapY-15);
            ctx.fillStyle = "#ccaa88";
            ctx.font = "10px monospace";
            ctx.fillText("Нажмите на карту - персонаж пойдёт туда | ESC для закрытия", canvasWidth/2-220, mapY+mapHeight+25);
        }
        
        function handleMapClick(clientX, clientY) {
            let mapWidth = Math.min(canvasWidth - 80, 800);
            let mapHeight = mapWidth * (MAP_H / MAP_W);
            let mapX = (canvasWidth - mapWidth) / 2;
            let mapY = (canvasHeight - mapHeight) / 2;
            let cellW = mapWidth / MAP_W;
            let cellH = mapHeight / MAP_H;
            
            if(clientX > mapX && clientX < mapX + mapWidth && clientY > mapY && clientY < mapY + mapHeight) {
                let tileX = Math.floor((clientX - mapX) / cellW);
                let tileY = Math.floor((clientY - mapY) / cellH);
                if(tileX >= 0 && tileX < MAP_W && tileY >= 0 && tileY < MAP_H) {
                    let worldX = tileX * TILE_SIZE + TILE_SIZE/2;
                    let worldY = tileY * TILE_SIZE + TILE_SIZE/2;
                    if(isWalkable(worldX, worldY, 24)) {
                        mapClickTarget = { x: worldX, y: worldY };
                        moveTo(worldX, worldY);
                        addMsg(`📍 Перемещение к отмеченной точке на карте`);
                        showMap = false;
                    } else {
                        addMsg(`🚫 В эту точку нельзя пройти (препятствие)`, true);
                    }
                }
            }
        }
        
        // ========== ОТРИСОВКА ЭФФЕКТОВ АТАКИ ==========
        function drawAttackEffects() {
            for(let i=0; i<attackEffects.length; i++) {
                let e = attackEffects[i];
                let x = e.x - cameraX;
                let y = e.y - cameraY;
                let life = e.life / 10;
                
                if(e.type === "slash") {
                    ctx.beginPath();
                    ctx.moveTo(x-15, y-10);
                    ctx.lineTo(x, y-25);
                    ctx.lineTo(x+15, y-10);
                    ctx.lineTo(x, y+5);
                    ctx.fillStyle = `rgba(255, 200, 100, ${0.5 * life})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(x-10, y-5);
                    ctx.lineTo(x, y-18);
                    ctx.lineTo(x+10, y-5);
                    ctx.fillStyle = `rgba(255, 255, 150, ${0.7 * life})`;
                    ctx.fill();
                } else if(e.type === "arrow") {
                    ctx.beginPath();
                    ctx.moveTo(x-20, y);
                    ctx.lineTo(x, y-12);
                    ctx.lineTo(x+5, y);
                    ctx.lineTo(x, y+12);
                    ctx.fillStyle = `rgba(200, 200, 100, ${0.6 * life})`;
                    ctx.fill();
                } else if(e.type === "magic") {
                    ctx.beginPath();
                    ctx.arc(x, y, 15 * (1-life), 0, Math.PI*2);
                    ctx.fillStyle = `rgba(100, 100, 255, ${0.5 * life})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x, y, 8 * (1-life), 0, Math.PI*2);
                    ctx.fillStyle = `rgba(200, 200, 255, ${0.7 * life})`;
                    ctx.fill();
                } else if(e.type === "skill") {
                    for(let a=0; a<3; a++) {
                        let angle = (Date.now()/100 + a) * Math.PI * 2;
                        ctx.beginPath();
                        ctx.arc(x + Math.cos(angle)*12, y + Math.sin(angle)*12, 6, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(255, 100, 100, ${0.6 * life})`;
                        ctx.fill();
                    }
                } else if(e.type === "explosion") {
                    ctx.beginPath();
                    ctx.arc(x, y, 25 * (1-life), 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255, 100, 50, ${0.5 * life})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x, y, 15 * (1-life), 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255, 200, 50, ${0.7 * life})`;
                    ctx.fill();
                }
                e.life--;
                if(e.life <= 0) attackEffects.splice(i,1), i--;
            }
        }
        
        function drawWorld() {
            let w = WORLDS[currentWorld];
            for(let i=0;i<WORLD_WIDTH/52+10;i++) {
                for(let j=0;j<WORLD_HEIGHT/52+10;j++) {
                    let x=i*52-cameraX, y=j*52-cameraY;
                    if(x>-60 && x<canvasWidth+60 && y>-60 && y<canvasHeight+60) {
                        let grad = ctx.createLinearGradient(x, y, x+52, y+52);
                        grad.addColorStop(0, ((i+j)%2===0)?w.bgColor1:w.bgColor2);
                        grad.addColorStop(1, ((i+j)%2===0)?w.bgColor2:w.bgColor1);
                        ctx.fillStyle = grad;
                        ctx.fillRect(x,y,51,51);
                    }
                }
            }
            
            for(let o of obstacles) {
                let x=o.x-cameraX, y=o.y-cameraY;
                if(x>-120 && x<canvasWidth+120 && y>-120 && y<canvasHeight+120) {
                    if(o.type==='tree') {
                        ctx.fillStyle="#3c9e3c";
                        ctx.fillRect(x-18,y-32,36,58);
                        ctx.fillStyle="#8b5a2b";
                        ctx.fillRect(x-10,y-8,20,32);
                        ctx.fillStyle="#5aac3a";
                        ctx.beginPath();
                        ctx.ellipse(x,y-42,26,30,0,0,Math.PI*2);
                        ctx.fill();
                    } else if(o.type==='mountain') {
                        let grad = ctx.createLinearGradient(x-20, y-30, x+20, y+15);
                        grad.addColorStop(0, "#8e8e9a");
                        grad.addColorStop(1, "#6e6e7a");
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.moveTo(x,y-45);
                        ctx.lineTo(x-40,y+15);
                        ctx.lineTo(x+40,y+15);
                        ctx.fill();
                    } else if(o.type==='rock') {
                        ctx.fillStyle="#7a6a5a";
                        ctx.beginPath();
                        ctx.ellipse(x,y,18,14,0,0,Math.PI*2);
                        ctx.fill();
                    } else if(o.type==='fence') {
                        ctx.fillStyle="#c99e6f";
                        ctx.fillRect(x-10,y-14,20,32);
                        for(let i=0;i<3;i++) {
                            ctx.fillStyle="#a87a4a";
                            ctx.fillRect(x-6+i*6,y-22,3,14);
                        }
                    }
                }
            }
            
            let szX=safeZone.x-cameraX, szY=safeZone.y-cameraY;
            ctx.fillStyle="#88aa66aa";
            ctx.fillRect(szX,szY,safeZone.width,safeZone.height);
            ctx.strokeStyle="#ffaa55aa";
            ctx.lineWidth=2;
            ctx.strokeRect(szX,szY,safeZone.width,safeZone.height);
            
            if(portalActive && currentWorld === "forest") {
                let px = portalX - cameraX, py = portalY - cameraY;
                ctx.fillStyle = "#aa44ffaa";
                ctx.beginPath();
                ctx.arc(px, py, 30, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ff88ff";
                ctx.beginPath();
                ctx.arc(px, py, 22, 0, Math.PI*2);
                ctx.fill();
                ctx.font = "24px monospace";
                ctx.fillStyle = "#ffffff";
                ctx.fillText("🌀", px-14, py+10);
                ctx.font = "10px monospace";
                ctx.fillStyle = "#ffffaa";
                ctx.fillText("ПОРТАЛ", px-20, py-25);
            }
            
            let npcX = shopNPC.x - cameraX, npcY = shopNPC.y - cameraY;
            ctx.fillStyle = "#c99e6f";
            ctx.fillRect(npcX-18, npcY-25, 36, 45);
            ctx.fillStyle = "#e8c28a";
            ctx.fillRect(npcX-12, npcY-15, 24, 30);
            ctx.fillStyle = "#000";
            ctx.fillRect(npcX-8, npcY-10, 5, 5);
            ctx.fillRect(npcX+3, npcY-10, 5, 5);
            ctx.font = "26px monospace";
            ctx.fillStyle = "#ffdd99";
            ctx.fillText("🏪", npcX-14, npcY+8);
            ctx.font = "10px monospace";
            ctx.fillStyle = "#ffffaa";
            ctx.fillText("Торговец", npcX-22, npcY-28);
            
            for(let g of gates) {
                let gx=g.x-cameraX, gy=g.y-cameraY;
                ctx.fillStyle="#c9a87a";
                ctx.fillRect(gx,gy,g.width,g.height);
                ctx.fillStyle="#e8c28a";
                if(g.width>g.height) {
                    for(let i=0;i<3;i++) ctx.fillRect(gx+15+i*25,gy+12,12,18);
                } else {
                    for(let i=0;i<3;i++) ctx.fillRect(gx+12,gy+15+i*25,18,12);
                }
            }
        }
        
        function drawMob(m) {
            let x = m.x - cameraX, y = m.y - cameraY;
            if(x < -80 || x > canvasWidth+80) return;
            
            ctx.shadowBlur = 5;
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            m.drawFunc(x, y);
            ctx.shadowBlur = 0;
            
            let percent = m.hp / m.maxHp;
            ctx.fillStyle = "#a33";
            ctx.fillRect(x-24, y-32, 48, 6);
            ctx.fillStyle = percent > 0.6 ? "#4f6" : (percent > 0.3 ? "#fa4" : "#f44");
            ctx.fillRect(x-24, y-32, 48 * percent, 6);
            
            ctx.font = "bold 9px monospace";
            ctx.fillStyle = "#ffffaa";
            ctx.fillText(m.name, x-20, y-38);
            ctx.font = "8px monospace";
            ctx.fillStyle = "#ffaa88";
            ctx.fillText(`❤️ ${m.hp}/${m.maxHp}`, x-18, y-28);
        }
        
        function drawUI() {
            let c=CLASSES[player.classType];
            let fs=Math.max(12,Math.min(16,canvasWidth/65));
            
            ctx.fillStyle="#000000aa";
            ctx.fillRect(12,12,220,85);
            ctx.fillStyle="#c55";
            ctx.fillRect(18,18,200,18);
            ctx.fillStyle="#f75";
            ctx.fillRect(18,18,200*(player.hp/player.maxHp),18);
            ctx.fillStyle="#58f";
            ctx.fillRect(18,42,200*(player.mp/player.maxMp),16);
            
            ctx.fillStyle="#fff";
            ctx.font=`bold ${fs}px monospace`;
            ctx.fillText(`❤️ ${Math.floor(player.hp)}/${player.maxHp}`,22,34);
            ctx.fillText(`💙 ${Math.floor(player.mp)}/${player.maxMp}`,22,56);
            
            ctx.fillStyle="#fd9";
            ctx.font=`bold ${fs+2}px monospace`;
            ctx.fillText(`${c.icon} ${c.name} Lv.${player.level}`,22,88);
            
            ctx.fillStyle="#000000aa";
            ctx.fillRect(12,100,220,14);
            ctx.fillStyle="#8af";
            ctx.fillRect(12,100,220*(player.exp/player.expToNext),14);
            ctx.fillStyle="#fff";
            ctx.font=`${fs-2}px monospace`;
            ctx.fillText(`EXP: ${player.exp}/${player.expToNext}`,18,112);
            
            ctx.fillStyle="#000000aa";
            ctx.fillRect(canvasWidth-155,12,145,70);
            ctx.fillStyle="#fc8";
            ctx.font=`bold ${fs}px monospace`;
            ctx.fillText(`💰 ${player.gold}`,canvasWidth-145,35);
            ctx.font=`${fs-1}px monospace`;
            ctx.fillText(`❤️ ${player.potionHp}  💙 ${player.potionMp}`,canvasWidth-145,58);
            ctx.fillText(`❤️✨ ${player.potionBigHp}  💙✨ ${player.potionBigMp}`,canvasWidth-145,78);
            
            for(let i=0;i<Math.min(4,messages.length);i++) {
                let m=messages[i];
                ctx.fillStyle=m.isErr?"#f86c":"#edbc";
                ctx.font=`${fs-2}px monospace`;
                ctx.fillText(m.text.substring(0,38),15,canvasHeight-45-i*20);
            }
            
            if(selectedMob && selectedMob.hp>0) {
                let x=selectedMob.x-cameraX, y=selectedMob.y-cameraY;
                ctx.strokeStyle="#fa4";
                ctx.lineWidth=3;
                ctx.strokeRect(x-22,y-34,58,58);
                ctx.strokeStyle="#ff0";
                ctx.lineWidth=1.5;
                ctx.strokeRect(x-21,y-33,56,56);
            }
            
            if(player.targetX!==null && player.targetY!==null) {
                let tx=player.targetX-cameraX, ty=player.targetY-cameraY;
                ctx.fillStyle="#fc4a";
                ctx.beginPath();
                ctx.arc(tx,ty,16,0,Math.PI*2);
                ctx.fill();
                ctx.fillStyle="#fa0";
                ctx.beginPath();
                ctx.arc(tx,ty,8,0,Math.PI*2);
                ctx.fill();
            }
            
            for(let i=0;i<damageFloats.length;i++) {
                let d=damageFloats[i], x=d.x-cameraX, y=d.y-cameraY;
                if(d.isExplosion) {
                    ctx.font="bold 32px monospace";
                    ctx.fillStyle="#ff8844";
                    ctx.fillText("💥",x-15,y-20);
                } else {
                    ctx.font=`bold ${d.isPlayer?18:22}px monospace`;
                    ctx.fillStyle=d.isPlayer?"#fa6":"#f84";
                    ctx.shadowBlur=3;
                    ctx.fillText(`-${d.dmg}`,x-12,y-28);
                    ctx.shadowBlur=0;
                }
                d.life--;
                if(d.life<=0) damageFloats.splice(i,1), i--;
            }
            
            if(player.superCooldown>0) {
                let p=player.superCooldown/180;
                ctx.fillStyle="#000000aa";
                ctx.fillRect(15,canvasHeight-70,75,14);
                ctx.fillStyle="#ffaa44";
                ctx.fillRect(15,canvasHeight-70,75*(1-p),14);
                ctx.fillStyle="#ffaa88";
                ctx.font="10px monospace";
                ctx.fillText(`🌟 ${Math.ceil(player.superCooldown/10)}с`,20,canvasHeight-55);
            }
            
            if(showMap) drawFullMap();
            if(shopOpen) drawShop();
            if(showInventory) drawInventory();
            if(showStatsWindow) drawStatsWindow();
            
            drawAttackEffects();
        }
        
        // ========== ПЛАВНАЯ ПРОКРУТКА ==========
        let lastWheelTime = 0;
        
        function handleWheel(e) {
            const now = Date.now();
            if(now - lastWheelTime < 16) return;
            lastWheelTime = now;
            
            let delta = e.deltaY > 0 ? 1 : -1;
            
            if(shopOpen) {
                let items = [];
                if(shopTab === "potions") items = [1,2,3,4];
                else if(shopTab === "armor") items = ALL_ARMOR.filter(a => a.level <= player.level + 10);
                else items = ALL_WEAPONS.filter(w => w.level <= player.level + 10);
                let maxScroll = Math.max(0, items.length - shopItemsPerPage);
                shopScroll = Math.min(maxScroll, Math.max(0, shopScroll + delta));
                e.preventDefault();
            } else if(showInventory) {
                let availableArmor = ALL_ARMOR.filter(a => a.level <= player.level);
                let availableWeapons = ALL_WEAPONS.filter(w => w.level <= player.level);
                let maxScroll = Math.max(0, availableArmor.length + availableWeapons.length - invItemsPerPage);
                invScroll = Math.min(maxScroll, Math.max(0, invScroll + delta));
                e.preventDefault();
            } else if(showStatsWindow) {
                let maxScroll = Math.max(0, 14 - statsItemsPerPage);
                statsScroll = Math.min(maxScroll, Math.max(0, statsScroll + delta));
                e.preventDefault();
            }
        }
        
        canvas.addEventListener('wheel', handleWheel, { passive: false });
        
        function update() {
            updateMove();
            updateMobs();
            updateCamera();
            if(player.attackTimer > 0) player.attackTimer--;
            if(player.superCooldown > 0) player.superCooldown--;
            if(spawnTimer <= 0) {
                if(mobs.length < MAX_MOBS) {
                    for(let i=0;i<2;i++) spawnMob();
                }
                spawnTimer = 14;
            } else spawnTimer--;
            
            for(let i=0;i<messages.length;i++) if(messages[i].life) messages[i].life--;
            messages=messages.filter(m=>!m.life||m.life>0);
        }
        
        function getWorldClick(cx,cy) {
            let rect=canvas.getBoundingClientRect();
            let sx=canvasWidth/rect.width, sy=canvasHeight/rect.height;
            return { x:(cx-rect.left)*sx+cameraX, y:(cy-rect.top)*sy+cameraY };
        }
        
        canvas.addEventListener('click', (e) => { 
            let w = getWorldClick(e.clientX, e.clientY);
            
            // Проверяем клики по окнам
            if(shopOpen) {
                let handled = handleShopClick(e.clientX, e.clientY);
                if(handled) return;
            } else if(showInventory) {
                let handled = handleInventoryClick(e.clientX, e.clientY);
                if(handled) return;
            } else if(showStatsWindow) {
                let handled = handleStatsClick(e.clientX, e.clientY);
                if(handled) return;
            }
            
            handleClick(w.x, w.y); 
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            let t = e.touches[0];
            let w = getWorldClick(t.clientX, t.clientY);
            
            if(shopOpen) {
                let handled = handleShopClick(t.clientX, t.clientY);
                if(handled) return;
            } else if(showInventory) {
                let handled = handleInventoryClick(t.clientX, t.clientY);
                if(handled) return;
            } else if(showStatsWindow) {
                let handled = handleStatsClick(t.clientX, t.clientY);
                if(handled) return;
            }
            
            handleClick(w.x, w.y);
        });
        
        setInterval(()=>{ 
            if(selectedMob && selectedMob.hp>0 && Math.hypot(player.x-selectedMob.x, player.y-selectedMob.y) <= player.attackRange + 15) {
                playerAttack();
            }
        }, 1200);
        
        setInterval(() => { if(playerNickname) saveGame(); }, 30000);
        window.addEventListener('beforeunload', () => { if(playerNickname) saveGame(); });
        
        document.getElementById('attackBtn').onclick=()=>{ if(selectedMob&&selectedMob.hp>0) playerAttack(); else addMsg("🎯 Выберите цель",true); };
        document.getElementById('skillBtn').onclick=()=>useSkill();
        document.getElementById('superBtn').onclick=()=>useSuper();
        document.getElementById('hpBtn').onclick=()=>useHp();
        document.getElementById('mpBtn').onclick=()=>useMp();
        document.getElementById('statsBtn').onclick=()=>{ showStatsWindow=!showStatsWindow; showInventory=false; showMap=false; statsScroll=0; };
        document.getElementById('invBtn').onclick=()=>{ showInventory=!showInventory; showStatsWindow=false; showMap=false; invScroll=0; };
        document.getElementById('mapBtn').onclick=()=>{ showMap=!showMap; showStatsWindow=false; showInventory=false; };
        document.getElementById('classWarriorBtn').onclick=()=>switchClass('warrior');
        document.getElementById('classArcherBtn').onclick=()=>switchClass('archer');
        document.getElementById('classMageBtn').onclick=()=>switchClass('mage');
        document.getElementById('classBtn').onclick=()=>switchClass();
        
        window.addEventListener('keydown',(e)=>{
            if(e.key==='1') useSuper();
            if(e.key==='2') useHp();
            if(e.key==='3') useMp();
            if(e.key==='s') useSkill();
            if(e.key==='c') switchClass();
            if(e.key==='7' || e.key==='m' || e.key==='M') { showMap=!showMap; showStatsWindow=false; showInventory=false; }
            if(e.key==='Escape') { showMap=false; showStatsWindow=false; showInventory=false; shopOpen=false; }
        });
        
        async function startGame() {
            await (async () => {
                const lastNick = localStorage.getItem('rucoy_last_nickname');
                if(lastNick && localStorage.getItem('rucoy_save_' + lastNick)) {
                    playerNickname = lastNick;
                    loadGame(lastNick);
                    document.getElementById('nicknameDisplay').innerHTML = `👤 ${lastNick}`;
                    return;
                }
                playerNickname = await showNicknameModal();
                document.getElementById('nicknameDisplay').innerHTML = `👤 ${playerNickname}`;
                if(!loadGame(playerNickname)) { addMsg(`✨ Добро пожаловать, ${playerNickname}! Новая игра начинается!`); }
            })();
            generateWorld();
            updateStatsFromLevel();
            if(player.hp <= 0) { player.hp = player.maxHp; player.mp = player.maxMp; }
            for(let i=0;i<12;i++) spawnMob();
            updatePortalStatus();
            addMsg("✨ Добро пожаловать в Rucoy Online!");
            addMsg(`🗡️ ${CLASSES.warrior.name} - ближний бой (${player.attackRange}px)`);
            addMsg(`🏹 ${CLASSES.archer.name} - дальний бой (${player.attackRange}px)`);
            addMsg(`🔮 ${CLASSES.mage.name} - дальний бой (${player.attackRange}px)`);
            addMsg("⚔️ Атака - 1.2 секунды | Мобы атакуют раз в 3 секунды");
            addMsg("🌟 1 - СУПЕР | 2 - HP | 3 - MP | S - СКИЛЛ | C - КЛАСС");
            addMsg("🏪 Торговец в безопасной зоне (нажмите на него)");
            addMsg("🌀 Убейте 300 мобов для открытия портала в новый мир!");
            addMsg("🗺️ КАРТА: кнопка M или 7 | Листайте колесиком мыши");
            addMsg("💾 Игра автоматически сохраняется!");
        }
        
        startGame();
        
        function render() {
            drawWorld();
            for(let m of mobs) drawMob(m);
            drawRealisticPlayer(player.x - cameraX, player.y - cameraY, player.isMoving);
            drawUI();
        }
        
        function loop() {
            update();
            render();
            requestAnimationFrame(loop);
        }
        loop();
    })();
</script>
</body>
</html>
