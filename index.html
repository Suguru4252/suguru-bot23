<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Колесо Фортуны | Свой выбор | Полноэкранная рулетка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* избегаем случайного выделения при касаниях */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 30% 10%, #1e2b2c, #0a0f12);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: pan-x pan-y; /* оставляем прокрутку только для ввода, но основная область не скроллится */
        }

        /* главный контейнер на весь экран без отступов и рамок */
        .fortune-app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: transparent;
            padding: 16px 20px 20px 20px;
            gap: 12px;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
        }

        /* скрываем стандартный скролл на webkit, но оставляем функционал */
        .fortune-app::-webkit-scrollbar {
            width: 4px;
            background: transparent;
        }
        .fortune-app::-webkit-scrollbar-thumb {
            background: rgba(255,215,150,0.4);
            border-radius: 20px;
        }

        /* верхняя панель управления — компактная */
        .edit-panel {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 12px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,220,140,0.35);
            transition: all 0.2s;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 8px;
            gap: 8px;
        }

        .label-row label {
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #FFE5B4, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .small-btns {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: rgba(255,240,190,0.15);
            border: none;
            border-radius: 40px;
            padding: 6px 16px;
            color: #FFE0A3;
            font-size: 0.75rem;
            font-weight: 600;
            backdrop-filter: blur(4px);
            cursor: pointer;
            transition: 0.1s linear;
        }

        .icon-btn:active {
            background: rgba(255, 180, 70, 0.5);
            transform: scale(0.96);
            color: white;
        }

        textarea {
            width: 100%;
            background: #1e2a2cd9;
            border: 1px solid rgba(255,200,130,0.6);
            border-radius: 32px;
            padding: 12px 18px;
            font-size: 1rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #FFF2DF;
            resize: vertical;
            outline: none;
            font-weight: 500;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }

        textarea:focus {
            border-color: #FFB347;
            background: #0f1f1f;
            box-shadow: 0 0 0 2px rgba(255,180,70,0.4);
        }

        /* превью-теги */
        .preview-strip {
            background: rgba(0,0,0,0.4);
            border-radius: 60px;
            padding: 8px 18px;
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .preview-strip span:first-child {
            font-size: 0.7rem;
            font-weight: 600;
            color: #FFDEAD;
            background: #2c3e2e70;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .tags-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 1;
        }

        .chip {
            background: #2c423f;
            color: #FFF0C0;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: 0.05s linear;
            box-shadow: inset 0 0 0 1px rgba(255,210,100,0.3);
        }

        .empty-tag {
            color: #c0cfcf;
            font-style: italic;
            font-size: 0.75rem;
            opacity: 0.8;
        }

        /* центральное колесо + результат */
        .wheel-area {
            flex: 1;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 8px 0 4px;
            position: relative;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 320px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            cursor: pointer;
        }

        canvas {
            position: absolute;
            width: 100% !important;
            height: 100% !important;
            top: 0;
            left: 0;
            border-radius: 50%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), 0 0 0 8px rgba(0,0,0,0.2), inset 0 2px 5px rgba(255,255,200,0.3);
            transition: box-shadow 0.2s;
        }

        .pointer {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-top: 50px solid #FFD966;
            filter: drop-shadow(0 6px 6px rgba(0,0,0,0.4));
            z-index: 12;
        }
        .pointer:after {
            content: "▼";
            position: absolute;
            top: -52px;
            left: -12px;
            font-size: 28px;
            color: #FFA500;
            text-shadow: 0 2px 3px black;
        }

        .result-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 12px 20px;
            margin-top: 20px;
            text-align: center;
            width: 90%;
            border: 1px solid rgba(255,210,120,0.5);
        }

        .result-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #FFCF8A;
        }

        .result-value {
            font-size: 1.9rem;
            font-weight: 800;
            word-break: break-word;
            background: linear-gradient(135deg, #FFE6B0, #FFA559);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        /* большая кнопка вращения */
        .spin-btn {
            background: linear-gradient(95deg, #F7971E, #FFD200);
            border: none;
            width: 85%;
            margin: 0 auto 10px;
            padding: 16px 12px;
            border-radius: 80px;
            font-weight: 800;
            font-size: 1.6rem;
            color: #2a1f0c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            cursor: pointer;
            box-shadow: 0 8px 0 #AA5E00;
            transition: 0.07s linear;
            letter-spacing: 2px;
        }

        .spin-btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #AA5E00;
        }

        .footer-info {
            font-size: 0.6rem;
            text-align: center;
            color: #bfcfdd;
            margin-top: 6px;
            opacity: 0.7;
        }

        @media (max-width: 550px) {
            .fortune-app { padding: 12px 16px 18px; gap: 10px; }
            .result-value { font-size: 1.5rem; }
            .spin-btn { font-size: 1.3rem; padding: 12px; width: 90%; }
            .wheel-container { max-width: 270px; }
            .pointer { border-top-width: 40px; top: -18px; }
            .pointer:after { top: -44px; font-size: 22px; left: -10px; }
        }
    </style>
</head>
<body>
<div class="fortune-app">
    <!-- Панель редактирования списка -->
    <div class="edit-panel">
        <div class="label-row">
            <label>🎯 МОИ ВАРИАНТЫ (каждый с новой строки)</label>
            <div class="small-btns">
                <button class="icon-btn" id="clearAllBtn">🗑️ Очистить</button>
                <button class="icon-btn" id="exampleSimpleBtn">✨ Пример</button>
            </div>
        </div>
        <textarea id="optionsTextarea" rows="2" placeholder="Напишите свои варианты, например:&#10;Кино&#10;Прогулка&#10;Учёба&#10;Игры&#10;Чай с печеньками"></textarea>
    </div>

    <!-- Динамический предпросмотр -->
    <div class="preview-strip">
        <span>📋 Список выбора:</span>
        <div class="tags-list" id="tagsPreviewContainer">
            <span class="empty-tag">добавьте пункты в колесо</span>
        </div>
    </div>

    <!-- Колесо фортуны + указатель -->
    <div class="wheel-area">
        <div class="wheel-container" id="wheelWrapper">
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
            <div class="pointer"></div>
        </div>
        <div class="result-card">
            <div class="result-label">🍀 ПОБЕДИТЕЛЬ 🍀</div>
            <div class="result-value" id="resultText">👉 крути колесо</div>
        </div>
    </div>

    <button class="spin-btn" id="spinWheelBtn">
        🎡 КРУТИТЬ! 🎡
    </button>
    <div class="footer-info">
        ✔️ Напишите любые слова / фразы. Нажмите на колесо или кнопку — запустите вращение.
    </div>
</div>

<script>
    (function(){
        // ----- DOM элементы -----
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const textarea = document.getElementById('optionsTextarea');
        const previewDiv = document.getElementById('tagsPreviewContainer');
        const resultSpan = document.getElementById('resultText');
        const spinBtn = document.getElementById('spinWheelBtn');
        const clearBtn = document.getElementById('clearAllBtn');
        const exampleBtn = document.getElementById('exampleSimpleBtn');
        const wheelContainer = document.getElementById('wheelWrapper');

        let currentOptions = [];     // массив уникальных (сохраняем порядок как ввели)
        let segmentAngles = [];      // радианы начала и конца каждого сектора
        let spinning = false;
        let animationId = null;
        let currentRotation = 0;      // текущий угол поворота колеса в радианах
        let spinStartTime = 0;
        let spinDuration = 1800;       // миллисекунд
        let spinStartRot = 0;
        let spinTargetDelta = 0;
        let finalSegmentIndex = -1;

        // палитра для секторов (яркие, сочные)
        const colorPalette = [
            '#FF6B6B', '#4ECDC4', '#FFE66D', '#FF9F4A', '#B5EAD7', '#C7B9FF', '#FFB3BA', 
            '#A0E7E5', '#FFDAC1', '#E2F0CB', '#FF8C94', '#9B59B6', '#F1C40F', '#2ECC71', 
            '#E67E22', '#1ABC9C', '#E84393', '#3498DB', '#F39C12', '#95A5A6'
        ];

        // получаем варианты из textarea -> массив непустых строк
        function parseOptions() {
            let raw = textarea.value;
            let lines = raw.split(/\r?\n/);
            let opts = lines
                .map(l => l.trim())
                .filter(l => l !== "");
            // если нет вариантов - возвращаем пустой массив
            return opts;
        }

        // обновить предпросмотр тегов + перерисовать колесо
        function refreshUI() {
            const opts = parseOptions();
            currentOptions = [...opts];
            updatePreviewTags(opts);
            drawWheel();
            // если нет вариантов, сбросить результат текста на нейтральный
            if (opts.length === 0) {
                resultSpan.innerText = "⚡ добавьте варианты";
            } else {
                // если предыдущий результат был пустым или сообщением — не трогаем, но лучше показать что колесо готово
                if (resultSpan.innerText.includes("добавьте") || resultSpan.innerText.includes("👉 крути")) {
                    // ничего не меняем, оставляем как есть
                }
            }
        }

        // обновить теги снизу
        function updatePreviewTags(options) {
            previewDiv.innerHTML = '';
            if (!options.length) {
                const emptySpan = document.createElement('span');
                emptySpan.className = 'empty-tag';
                emptySpan.innerText = 'нет пунктов → напишите варианты';
                previewDiv.appendChild(emptySpan);
                return;
            }
            const maxShow = 14;
            options.slice(0, maxShow).forEach(opt => {
                const chip = document.createElement('span');
                chip.className = 'chip';
                let short = opt.length > 22 ? opt.slice(0,19)+'…' : opt;
                chip.innerText = short;
                previewDiv.appendChild(chip);
            });
            if (options.length > maxShow) {
                const more = document.createElement('span');
                more.className = 'chip';
                more.innerText = `+${options.length - maxShow}`;
                previewDiv.appendChild(more);
            }
        }

        // отрисовка колеса с текущим поворотом currentRotation
        function drawWheel() {
            const count = currentOptions.length;
            if (!canvas || !ctx) return;
            const w = canvas.width, h = canvas.height;
            const centerX = w/2, centerY = h/2;
            const radius = w/2 - 4;
            ctx.clearRect(0, 0, w, h);
            if (count === 0) {
                // пустое колесо — серое с текстом
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2*Math.PI);
                ctx.fillStyle = "#2c3e3f";
                ctx.fill();
                ctx.fillStyle = "#ccaa77";
                ctx.font = "bold 18px 'Segoe UI'";
                ctx.shadowBlur = 0;
                ctx.fillText("✏️", centerX-12, centerY+8);
                ctx.font = "12px system-ui";
                ctx.fillStyle = "#eedd99";
                ctx.fillText("нет данных", centerX-38, centerY+32);
                return;
            }
            const angleStep = (Math.PI * 2) / count;
            for (let i = 0; i < count; i++) {
                const start = i * angleStep + currentRotation;
                const end = (i+1) * angleStep + currentRotation;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, start, end);
                ctx.fillStyle = colorPalette[i % colorPalette.length];
                ctx.fill();
                ctx.save();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = "#FFF4E0";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, start, end);
                ctx.stroke();
                // текст
                const midAngle = start + angleStep/2;
                const textRadius = radius * 0.67;
                const x = centerX + Math.cos(midAngle) * textRadius;
                const y = centerY + Math.sin(midAngle) * textRadius;
                let label = currentOptions[i];
                if (label.length > 18) label = label.slice(0,16)+'..';
                ctx.font = `bold ${Math.max(12, Math.min(18, 28 - Math.floor(label.length/2)))}px "Segoe UI", system-ui`;
                ctx.fillStyle = "#1F2A1C";
                ctx.shadowBlur = 0;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(label, x, y);
                ctx.restore();
            }
            // центральная точка
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius*0.08, 0, 2*Math.PI);
            ctx.fillStyle = "#FFDD99";
            ctx.shadowBlur = 0;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius*0.05, 0, 2*Math.PI);
            ctx.fillStyle = "#AA7744";
            ctx.fill();
        }

        // получить индекс сектора, на который указывает стрелка (фиксированная стрелка сверху: угол -PI/2)
        // текущее вращение колеса = currentRotation. Мы вычисляем, какой сегмент находится в позиции "вверх" (угол -PI/2)
        function getCurrentSegmentIndex() {
            if (currentOptions.length === 0) return -1;
            const count = currentOptions.length;
            const angleStep = (Math.PI * 2) / count;
            // направление стрелки: угол = -PI/2 (12 часов) в мировой системе координат.
            // Нам нужно определить, какой сегмент в момент currentRotation пересекает этот угол.
            // Приведем угол стрелки к системе координат колеса (вращение колеса вычитаем)
            const pointerAngle = -Math.PI / 2;  // вверх
            // относительно независящего от вращения колеса: мы ищем i, у которого начальный угол без вращения + currentRotation попадает?
            // проще: сегмент i занимает углы от startRaw = i*angleStep до endRaw = (i+1)*angleStep в локальных координатах.
            // глобальный угол положения сектора: startGlobal = startRaw + currentRotation
            // условие: pointerAngle попадает в [startGlobal, endGlobal]
            for (let i = 0; i < count; i++) {
                let startLocal = i * angleStep;
                let endLocal = (i+1) * angleStep;
                let startGlobal = startLocal + currentRotation;
                let endGlobal = endLocal + currentRotation;
                // нормализация углов в [0, 2PI)
                let normPointer = ((pointerAngle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
                let normStart = ((startGlobal % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
                let normEnd = ((endGlobal % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
                if (normStart < normEnd) {
                    if (normPointer >= normStart && normPointer <= normEnd) return i;
                } else {
                    // переход через 0
                    if (normPointer >= normStart || normPointer <= normEnd) return i;
                }
            }
            // fallback
            return 0;
        }

        // обновить результат по текущему положению
        function updateResultBySegment() {
            if (currentOptions.length === 0) {
                resultSpan.innerText = "✏️ добавьте варианты";
                return;
            }
            const idx = getCurrentSegmentIndex();
            if (idx !== -1 && currentOptions[idx]) {
                resultSpan.innerText = currentOptions[idx];
            } else {
                resultSpan.innerText = "⚡️ поверните";
            }
        }

        // анимация вращения
        function animateSpin(now) {
            const elapsed = now - spinStartTime;
            let t = Math.min(1, elapsed / spinDuration);
            // easeOutCubic
            const easeOut = 1 - Math.pow(1 - t, 3);
            const currentDelta = spinTargetDelta * easeOut;
            currentRotation = spinStartRot + currentDelta;
            // нормализация currentRotation
            currentRotation = currentRotation % (Math.PI * 2);
            drawWheel();
            if (t < 1) {
                animationId = requestAnimationFrame(animateSpin);
            } else {
                // финальная синхронизация
                currentRotation = (spinStartRot + spinTargetDelta) % (Math.PI*2);
                drawWheel();
                spinning = false;
                animationId = null;
                // определяем финальный сегмент и выводим результат
                const finalIdx = getCurrentSegmentIndex();
                if (finalIdx !== -1 && currentOptions[finalIdx]) {
                    resultSpan.innerText = currentOptions[finalIdx];
                    // небольшая вибро-отдача
                    if (navigator.vibrate) navigator.vibrate(80);
                } else {
                    updateResultBySegment();
                }
                // активируем кнопку обратно (она и так активна, но на всякий)
                spinBtn.disabled = false;
            }
        }

        function startSpin() {
            if (spinning) return;
            const optsCount = currentOptions.length;
            if (optsCount === 0) {
                resultSpan.innerText = "❌ нет вариантов!";
                if (navigator.vibrate) navigator.vibrate(100);
                return;
            }
            // блокируем повторный запуск
            spinning = true;
            if (animationId) cancelAnimationFrame(animationId);
            spinStartRot = currentRotation;
            // генерируем случайное количество оборотов (минимум 5, максимум 12 полных + случайный доворот)
            const fullTurns = 6 + Math.floor(Math.random() * 8); // 6-13 оборотов
            const randomRad = Math.random() * Math.PI * 2;
            spinTargetDelta = (fullTurns * 2 * Math.PI) + randomRad;
            spinStartTime = performance.now();
            animationId = requestAnimationFrame(animateSpin);
            // легкая обратная связь
            if (navigator.vibrate) navigator.vibrate(30);
        }

        // обработчики событий
        function onSpinClick() {
            startSpin();
        }

        // очистка textarea и перерисовка
        function clearWheel() {
            if (spinning) return;
            textarea.value = '';
            refreshUI();
            resultSpan.innerText = "👉 крути колесо";
            currentRotation = 0;
            drawWheel();
        }

        // пример (не еда, а жизненные сценарии, но пользователь сам меняет)
        function setExample() {
            if (spinning) return;
            textarea.value = `🌄 Утром йога\n☕ Кофе с круассаном\n💻 Работа над проектом\n📖 Чтение книги\n🎧 Музыка / подкаст\n🏋️ Тренировка\n🍿 Фильм вечером\n🎲 Настолка с друзьями\n🛌 Ранний сон`;
            refreshUI();
            currentRotation = 0;
            drawWheel();
            resultSpan.innerText = "👉 крути колесо";
        }

        // событие изменения текста
        function onTextareaChange() {
            if (spinning) return;
            refreshUI();
            // сбросить результат, чтобы не вводить в заблуждение
            const opts = parseOptions();
            if (opts.length > 0) {
                // не сбрасываем, а просто показываем текущий сегмент по расположению стрелки
                updateResultBySegment();
            } else {
                resultSpan.innerText = "⚡ добавьте варианты";
            }
            currentRotation = currentRotation % (Math.PI*2);
            drawWheel();
        }

        // клик по колесу тоже запускает вращение
        function onWheelTap(e) {
            e.stopPropagation();
            startSpin();
        }

        // инициализация
        function init() {
            // установить размер canvas под контейнер (резиновый)
            function resizeCanvas() {
                const container = document.querySelector('.wheel-container');
                const size = container.clientWidth;
                canvas.width = size;
                canvas.height = size;
                canvas.style.width = `${size}px`;
                canvas.style.height = `${size}px`;
                drawWheel();
            }
            const resizeObserver = new ResizeObserver(() => {
                resizeCanvas();
            });
            if (wheelContainer) resizeObserver.observe(wheelContainer);
            resizeCanvas();

            textarea.addEventListener('input', onTextareaChange);
            spinBtn.addEventListener('click', onSpinClick);
            clearBtn.addEventListener('click', clearWheel);
            exampleBtn.addEventListener('click', setExample);
            wheelContainer.addEventListener('click', onWheelTap);

            // демо-список по умолчанию: простые действия, чтобы колесо не пустовало
            if (parseOptions().length === 0) {
                textarea.value = `🎯 Смотреть сериал\n🍣 Суши-вечер\n📱 Позвонить другу\n🎮 Поиграть в игру\n🧘 Помедитировать\n🍰 Сладкий десерт`;
                refreshUI();
                currentRotation = 0;
                drawWheel();
                updateResultBySegment();
            } else {
                refreshUI();
                updateResultBySegment();
            }
        }

        init();
    })();
</script>
</body>
    </html>
