<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-height, width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>YouTube Music Player — Ищи и слушай</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #121212;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
        }
        .card {
            background: #0f0f0f;
            border: 1px solid #2c2c2c;
        }
        .header {
            padding: 20px;
            background: #0a0a0a;
            border-bottom: 1px solid #2a2a2a;
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 500;
        }
        .header p {
            font-size: 0.75rem;
            color: #777;
            margin-top: 5px;
        }
        .search-area {
            padding: 16px 20px;
            background: #0c0c0c;
            border-bottom: 1px solid #2a2a2a;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        .search-box input {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 12px;
            font-size: 14px;
            color: white;
            font-family: inherit;
        }
        .search-box button {
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 12px 20px;
            font-size: 14px;
            color: #ddd;
            cursor: pointer;
        }
        .now-playing {
            padding: 20px;
            background: #0a0a0a;
            border-bottom: 1px solid #2a2a2a;
        }
        .now-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }
        .track-name {
            font-size: 1rem;
            font-weight: 500;
            margin: 8px 0 15px;
        }
        .controls {
            display: flex;
            gap: 12px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .controls button {
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 10px 18px;
            font-size: 14px;
            cursor: pointer;
            color: white;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #2a2a2a;
            cursor: pointer;
            margin: 10px 0 5px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #888;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #666;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #2a2a2a;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-size: 13px;
            cursor: pointer;
            background: none;
            border: none;
            color: #888;
        }
        .tab.active {
            color: white;
            border-bottom: 2px solid #888;
        }
        .panel {
            padding: 20px;
            max-height: 380px;
            overflow-y: auto;
        }
        .panel.hidden {
            display: none;
        }
        .song-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .song-item {
            background: #141414;
            border: 1px solid #252525;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .song-item:hover {
            background: #1c1c1c;
        }
        .song-info {
            flex: 1;
        }
        .song-title {
            font-size: 0.85rem;
            font-weight: 500;
            word-break: break-word;
        }
        .song-artist {
            font-size: 0.7rem;
            color: #888;
            margin-top: 4px;
        }
        .song-actions {
            display: flex;
            gap: 8px;
        }
        .fav-btn, .play-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            color: #ccc;
        }
        .fav-btn.active {
            background: #3a2a2a;
            border-color: #aa6a6a;
            color: #ffaa88;
        }
        .empty-message {
            text-align: center;
            color: #555;
            padding: 40px;
            font-size: 13px;
        }
        .footer {
            padding: 12px 20px;
            border-top: 1px solid #1f1f1f;
            font-size: 10px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>🎵 YouTube Музыка</h1>
            <p>Ищи любую песню — слушай бесплатно</p>
        </div>

        <div class="search-area">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Например: Slava Marlow ты горишь как огонь">
                <button id="searchBtn">🔍 Найти</button>
            </div>
        </div>

        <div class="now-playing">
            <div class="now-label">СЕЙЧАС ИГРАЕТ</div>
            <div class="track-name" id="currentTrackName">—</div>
            <div class="controls">
                <button id="playBtn">▶ Воспроизвести</button>
                <button id="pauseBtn">⏸ Пауза</button>
                <button id="stopBtn">⏹ Стоп</button>
            </div>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">00:00</span>
                <span id="duration">00:00</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="search">🔎 РЕЗУЛЬТАТЫ</button>
            <button class="tab" data-tab="favorites">⭐ ИЗБРАННОЕ</button>
        </div>

        <div id="searchPanel" class="panel">
            <div id="searchResults" class="song-list">
                <div class="empty-message">Введите название и нажмите "Найти"</div>
            </div>
        </div>

        <div id="favoritesPanel" class="panel hidden">
            <div id="favoritesList" class="song-list">
                <div class="empty-message">Нет избранных песен</div>
            </div>
        </div>

        <div class="footer">
            ⚡ Работает через YouTube API. Ищи любую музыку и слушай.
        </div>
    </div>
</div>

<script>
    // =============== YouTube MUSIC PLAYER — РАБОЧАЯ ВЕРСИЯ ===============
    let player = null;
    let currentVideoId = null;
    let favorites = [];
    let searchResults = [];
    let isPlayerReady = false;
    let progressInterval = null;
    let currentTitle = '';

    // Создаём скрытый YouTube плеер
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    // Контейнер для плеера
    const playerDiv = document.createElement('div');
    playerDiv.id = 'youtubeAudioPlayer';
    playerDiv.style.position = 'fixed';
    playerDiv.style.bottom = '-200px';
    playerDiv.style.left = '-200px';
    playerDiv.style.width = '1px';
    playerDiv.style.height = '1px';
    playerDiv.style.opacity = '0';
    playerDiv.style.pointerEvents = 'none';
    document.body.appendChild(playerDiv);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtubeAudioPlayer', {
            height: '1',
            width: '1',
            playerVars: {
                'autoplay': 0,
                'controls': 0,
                'disablekb': 1,
                'modestbranding': 1,
                'rel': 0,
                'playsinline': 1
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange,
                'onError': onPlayerError
            }
        });
    }

    function onPlayerReady(event) {
        isPlayerReady = true;
        console.log('YouTube плеер готов');
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.PLAYING) {
            startProgressUpdate();
        } else {
            stopProgressUpdate();
        }
    }

    function onPlayerError(event) {
        console.error('YouTube ошибка:', event.data);
        document.getElementById('currentTrackName').textContent = 'Ошибка воспроизведения';
    }

    function startProgressUpdate() {
        if (progressInterval) clearInterval(progressInterval);
        progressInterval = setInterval(() => {
            if (player && player.getCurrentTime) {
                const current = player.getCurrentTime();
                const duration = player.getDuration();
                if (duration && !isNaN(duration)) {
                    const percent = (current / duration) * 100;
                    document.getElementById('progressFill').style.width = percent + '%';
                    document.getElementById('currentTime').textContent = formatTime(current);
                    document.getElementById('duration').textContent = formatTime(duration);
                }
            }
        }, 500);
    }

    function stopProgressUpdate() {
        if (progressInterval) {
            clearInterval(progressInterval);
            progressInterval = null;
        }
    }

    function formatTime(seconds) {
        if (isNaN(seconds) || !isFinite(seconds)) return '00:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function playVideo(videoId, title) {
        if (!isPlayerReady || !player) {
            setTimeout(() => playVideo(videoId, title), 500);
            return;
        }
        currentVideoId = videoId;
        currentTitle = title;
        document.getElementById('currentTrackName').textContent = title;
        player.loadVideoById(videoId);
        player.playVideo();
    }

    // Поиск через YouTube API (с публичным ключом)
    async function searchYouTube(query) {
        if (!query.trim()) {
            alert('Введите название песни');
            return;
        }
        
        const resultsDiv = document.getElementById('searchResults');
        resultsDiv.innerHTML = '<div class="empty-message">⏳ Поиск...</div>';
        
        try {
            const encodedQuery = encodeURIComponent(query);
            // Используем публичный API без ключа через invidious
            const response = await fetch(`https://vid.puffyan.us/api/v1/search?q=${encodedQuery}&type=video&sort=relevance`);
            
            if (!response.ok) throw new Error('API error');
            
            const data = await response.json();
            
            if (data && data.length > 0) {
                searchResults = data.slice(0, 15).map(item => ({
                    id: item.videoId,
                    title: item.title,
                    artist: item.author,
                    thumbnail: item.videoThumbnails?.[0]?.url || ''
                }));
                renderSearchResults();
            } else {
                searchResults = [];
                resultsDiv.innerHTML = '<div class="empty-message">❌ Ничего не найдено. Попробуйте другие слова.</div>';
            }
        } catch (error) {
            console.error(error);
            resultsDiv.innerHTML = '<div class="empty-message">⚠️ Ошибка поиска. Проверьте интернет и попробуйте ещё раз.</div>';
        }
    }

    function renderSearchResults() {
        const container = document.getElementById('searchResults');
        if (!searchResults.length) {
            container.innerHTML = '<div class="empty-message">Ничего не найдено</div>';
            return;
        }
        
        container.innerHTML = '';
        searchResults.forEach(song => {
            const isFav = favorites.some(f => f.id === song.id);
            const div = document.createElement('div');
            div.className = 'song-item';
            div.innerHTML = `
                <div class="song-info">
                    <div class="song-title">${escapeHtml(song.title.substring(0, 60))}</div>
                    <div class="song-artist">${escapeHtml(song.artist || 'YouTube')}</div>
                </div>
                <div class="song-actions">
                    <button class="fav-btn ${isFav ? 'active' : ''}" data-id="${song.id}">${isFav ? '❤️' : '♡'}</button>
                    <button class="play-btn" data-id="${song.id}">▶</button>
                </div>
            `;
            
            const favBtn = div.querySelector('.fav-btn');
            const playBtn = div.querySelector('.play-btn');
            
            favBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFavorite(song);
                renderSearchResults();
                renderFavorites();
            });
            
            playBtn.addEventListener('click', () => {
                playVideo(song.id, song.title);
            });
            
            container.appendChild(div);
        });
    }

    function renderFavorites() {
        const container = document.getElementById('favoritesList');
        if (!favorites.length) {
            container.innerHTML = '<div class="empty-message">⭐ Нет избранных песен. Добавьте через ❤️</div>';
            return;
        }
        
        container.innerHTML = '';
        favorites.forEach(song => {
            const div = document.createElement('div');
            div.className = 'song-item';
            div.innerHTML = `
                <div class="song-info">
                    <div class="song-title">${escapeHtml(song.title.substring(0, 60))}</div>
                    <div class="song-artist">${escapeHtml(song.artist || 'YouTube')}</div>
                </div>
                <div class="song-actions">
                    <button class="fav-btn active" data-id="${song.id}">❤️</button>
                    <button class="play-btn" data-id="${song.id}">▶</button>
                </div>
            `;
            
            const favBtn = div.querySelector('.fav-btn');
            const playBtn = div.querySelector('.play-btn');
            
            favBtn.addEventListener('click', () => {
                favorites = favorites.filter(f => f.id !== song.id);
                saveFavorites();
                renderSearchResults();
                renderFavorites();
            });
            
            playBtn.addEventListener('click', () => {
                playVideo(song.id, song.title);
            });
            
            container.appendChild(div);
        });
    }

    function toggleFavorite(song) {
        const index = favorites.findIndex(f => f.id === song.id);
        if (index === -1) {
            favorites.push(song);
        } else {
            favorites.splice(index, 1);
        }
        saveFavorites();
    }

    function saveFavorites() {
        localStorage.setItem('youtube_music_favorites', JSON.stringify(favorites));
    }

    function loadFavorites() {
        const saved = localStorage.getItem('youtube_music_favorites');
        if (saved) {
            try {
                favorites = JSON.parse(saved);
            } catch(e) {}
        }
        renderFavorites();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Вкладки
    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
        
        document.getElementById('searchPanel').classList.add('hidden');
        document.getElementById('favoritesPanel').classList.add('hidden');
        
        if (tabId === 'search') {
            document.getElementById('searchPanel').classList.remove('hidden');
        } else if (tabId === 'favorites') {
            document.getElementById('favoritesPanel').classList.remove('hidden');
            renderFavorites();
        }
    }

    // Управление плеером
    document.getElementById('playBtn').addEventListener('click', () => {
        if (player && currentVideoId) player.playVideo();
    });
    
    document.getElementById('pauseBtn').addEventListener('click', () => {
        if (player) player.pauseVideo();
    });
    
    document.getElementById('stopBtn').addEventListener('click', () => {
        if (player) player.stopVideo();
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('currentTime').textContent = '00:00';
    });
    
    // Прогресс-бар
    document.getElementById('progressBar').addEventListener('click', (e) => {
        if (player && player.getDuration && player.seekTo) {
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const width = rect.width;
            const percent = x / width;
            const duration = player.getDuration();
            if (duration) {
                player.seekTo(duration * percent, true);
            }
        }
    });
    
    // Обработчики
    document.getElementById('searchBtn').addEventListener('click', () => {
        const query = document.getElementById('searchInput').value;
        if (query) searchYouTube(query);
    });
    
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('searchBtn').click();
    });
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });
    
    // Инициализация
    loadFavorites();
    
    window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
</script>
</body>
    </html>
