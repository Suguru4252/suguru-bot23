<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Камень, Ножницы, Бумага | 2 игрока</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: white;
            border-radius: 40px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #667eea;
            margin: 0 0 20px 0;
        }
        .players-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .player-card {
            flex: 1;
            background: #f8f9fa;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }
        .player-card.active {
            background: #e0e7ff;
            box-shadow: 0 0 0 3px #667eea;
        }
        .player-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .player-choice {
            font-size: 80px;
            margin: 20px 0;
            min-height: 120px;
        }
        .choice-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
        }
        .choice-btn {
            font-size: 50px;
            background: white;
            border: 3px solid #ddd;
            border-radius: 60px;
            padding: 15px;
            cursor: pointer;
            transition: 0.1s;
            width: 100px;
        }
        .choice-btn:active {
            transform: scale(0.95);
        }
        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .game-controls {
            text-align: center;
            margin-top: 30px;
        }
        .timer {
            font-size: 64px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: #764ba2;
        }
        .result {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            padding: 20px;
            border-radius: 30px;
            margin: 20px 0;
        }
        .result.win { background: #d4edda; color: #155724; }
        .result.draw { background: #fff3cd; color: #856404; }
        .result.lose { background: #f8d7da; color: #721c24; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 60px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        button:active {
            transform: scale(0.98);
        }
        .hidden {
            display: none;
        }
        .lobby {
            text-align: center;
        }
        .lobby input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 60px;
            margin: 10px 0;
        }
        .games-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .game-item {
            background: #f8f9fa;
            border-radius: 60px;
            padding: 15px 20px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (max-width: 700px) {
            .players-panel { flex-direction: column; }
            .choice-btn { font-size: 40px; width: 80px; }
            .player-choice { font-size: 60px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <h1>✊ Камень ✋ Ножницы ✌️ Бумага</h1>
    
    <!-- Лобби -->
    <div id="lobby">
        <div class="lobby">
            <input type="text" id="player1Name" placeholder="Имя игрока 1" value="Игрок 1">
            <input type="text" id="player2Name" placeholder="Имя игрока 2" value="Игрок 2">
            <button id="startGameBtn">🎮 Начать игру</button>
        </div>
    </div>

    <!-- Игровая зона -->
    <div id="gameArea" class="hidden">
        <div class="players-panel">
            <div class="player-card" id="player1Card">
                <div class="player-name" id="p1Name">Игрок 1</div>
                <div class="player-choice" id="p1Choice">❓</div>
                <div class="choice-buttons" id="p1Buttons">
                    <button class="choice-btn" data-choice="камень">🪨</button>
                    <button class="choice-btn" data-choice="ножницы">✂️</button>
                    <button class="choice-btn" data-choice="бумага">📄</button>
                </div>
            </div>
            <div class="player-card" id="player2Card">
                <div class="player-name" id="p2Name">Игрок 2</div>
                <div class="player-choice" id="p2Choice">❓</div>
                <div class="choice-buttons" id="p2Buttons">
                    <button class="choice-btn" data-choice="камень">🪨</button>
                    <button class="choice-btn" data-choice="ножницы">✂️</button>
                    <button class="choice-btn" data-choice="бумага">📄</button>
                </div>
            </div>
        </div>
        
        <div class="timer" id="timer">10</div>
        <div class="result hidden" id="result"></div>
        
        <div class="game-controls">
            <button id="rematchBtn" class="hidden">🔄 Играть снова</button>
            <button id="exitBtn">🏠 Выйти в лобби</button>
        </div>
    </div>
</div>

<script>
    // Состояние игры
    let gameActive = false;
    let currentTurn = 1; // 1 или 2
    let choices = { 1: null, 2: null };
    let timerInterval = null;
    let timeLeft = 10;
    let playerNames = { 1: '', 2: '' };
    let gameStarted = false;

    // DOM элементы
    const lobby = document.getElementById('lobby');
    const gameArea = document.getElementById('gameArea');
    const startBtn = document.getElementById('startGameBtn');
    const exitBtn = document.getElementById('exitBtn');
    const rematchBtn = document.getElementById('rematchBtn');
    const timerDiv = document.getElementById('timer');
    const resultDiv = document.getElementById('result');
    
    const p1Name = document.getElementById('p1Name');
    const p2Name = document.getElementById('p2Name');
    const p1Choice = document.getElementById('p1Choice');
    const p2Choice = document.getElementById('p2Choice');
    const p1Card = document.getElementById('player1Card');
    const p2Card = document.getElementById('player2Card');
    
    const p1Buttons = document.querySelectorAll('#p1Buttons .choice-btn');
    const p2Buttons = document.querySelectorAll('#p2Buttons .choice-btn');

    // Функции игры
    function startGame() {
        // Получаем имена
        playerNames[1] = document.getElementById('player1Name').value.trim() || 'Игрок 1';
        playerNames[2] = document.getElementById('player2Name').value.trim() || 'Игрок 2';
        
        p1Name.innerText = playerNames[1];
        p2Name.innerText = playerNames[2];
        
        // Сбрасываем состояния
        resetRound();
        
        // Показываем игровую зону
        lobby.classList.add('hidden');
        gameArea.classList.remove('hidden');
        
        gameStarted = true;
        startTurn();
    }
    
    function resetRound() {
        choices = { 1: null, 2: null };
        p1Choice.innerText = '❓';
        p2Choice.innerText = '❓';
        resultDiv.classList.add('hidden');
        rematchBtn.classList.add('hidden');
        timerDiv.classList.remove('hidden');
        
        // Активируем кнопки для обоих
        enableButtons(true);
        
        // Убираем активные подсветки
        p1Card.classList.remove('active');
        p2Card.classList.remove('active');
    }
    
    function enableButtons(enabled) {
        p1Buttons.forEach(btn => btn.disabled = !enabled);
        p2Buttons.forEach(btn => btn.disabled = !enabled);
    }
    
    function startTurn() {
        if (timerInterval) clearInterval(timerInterval);
        timeLeft = 10;
        timerDiv.innerText = timeLeft;
        
        // Переключаем активного игрока (по очереди)
        if (choices[1] === null && choices[2] === null) {
            currentTurn = 1;
        } else if (choices[1] !== null && choices[2] === null) {
            currentTurn = 2;
        } else if (choices[1] === null && choices[2] !== null) {
            currentTurn = 1;
        } else {
            // Оба выбрали - определяем победителя
            determineWinner();
            return;
        }
        
        updateActivePlayer();
        
        // Запускаем таймер
        timerInterval = setInterval(() => {
            if (!gameStarted) return;
            
            timeLeft--;
            timerDiv.innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                // Если текущий игрок не выбрал - он проиграл
                if (choices[currentTurn] === null) {
                    alert(`${playerNames[currentTurn]} не успел выбрать!`);
                    // Автоматически выбираем случайный вариант для проигравшего
                    const randomChoice = ['камень', 'ножницы', 'бумага'][Math.floor(Math.random() * 3)];
                    makeChoice(currentTurn, randomChoice);
                }
                // Если всё ещё не оба выбрали - продолжаем
                if (choices[1] === null || choices[2] === null) {
                    startTurn();
                }
            }
        }, 1000);
    }
    
    function updateActivePlayer() {
        p1Card.classList.remove('active');
        p2Card.classList.remove('active');
        
        if (currentTurn === 1) {
            p1Card.classList.add('active');
        } else {
            p2Card.classList.add('active');
        }
    }
    
    function makeChoice(player, choice) {
        if (choices[player] !== null) return;
        
        choices[player] = choice;
        
        // Отображаем выбор
        if (player === 1) {
            p1Choice.innerText = getEmoji(choice);
        } else {
            p2Choice.innerText = getEmoji(choice);
        }
        
        // Отключаем кнопки этого игрока
        if (player === 1) {
            p1Buttons.forEach(btn => btn.disabled = true);
        } else {
            p2Buttons.forEach(btn => btn.disabled = true);
        }
        
        // Проверяем, сделали ли оба выбор
        if (choices[1] !== null && choices[2] !== null) {
            clearInterval(timerInterval);
            determineWinner();
        } else {
            // Переключаем ход
            startTurn();
        }
    }
    
    function determineWinner() {
        const choice1 = choices[1];
        const choice2 = choices[2];
        
        const beats = {
            'камень': 'ножницы',
            'ножницы': 'бумага',
            'бумага': 'камень'
        };
        
        let resultText = '';
        let resultClass = '';
        
        if (choice1 === choice2) {
            resultText = `🤝 НИЧЬЯ! 🤝`;
            resultClass = 'draw';
        } else if (beats[choice1] === choice2) {
            resultText = `🏆 ${playerNames[1]} ПОБЕДИЛ! 🏆`;
            resultClass = 'win';
        } else {
            resultText = `🏆 ${playerNames[2]} ПОБЕДИЛ! 🏆`;
            resultClass = 'win';
        }
        
        resultDiv.innerText = resultText;
        resultDiv.className = `result ${resultClass}`;
        resultDiv.classList.remove('hidden');
        timerDiv.classList.add('hidden');
        
        // Показываем кнопку реванша
        rematchBtn.classList.remove('hidden');
        enableButtons(false);
        gameStarted = false;
    }
    
    function getEmoji(choice) {
        const emojis = {
            'камень': '🪨',
            'ножницы': '✂️',
            'бумага': '📄'
        };
        return emojis[choice] || '❓';
    }
    
    function rematch() {
        resetRound();
        gameStarted = true;
        startTurn();
    }
    
    function exitToLobby() {
        if (timerInterval) clearInterval(timerInterval);
        gameStarted = false;
        lobby.classList.remove('hidden');
        gameArea.classList.add('hidden');
        resetRound();
    }
    
    // Обработчики событий
    startBtn.addEventListener('click', startGame);
    exitBtn.addEventListener('click', exitToLobby);
    rematchBtn.addEventListener('click', rematch);
    
    // Обработчики для кнопок выбора
    p1Buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            if (!gameStarted) return;
            const choice = btn.getAttribute('data-choice');
            if (choices[1] === null && currentTurn === 1) {
                makeChoice(1, choice);
            } else if (choices[1] === null && currentTurn !== 1) {
                alert('Сейчас ход второго игрока!');
            }
        });
    });
    
    p2Buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            if (!gameStarted) return;
            const choice = btn.getAttribute('data-choice');
            if (choices[2] === null && currentTurn === 2) {
                makeChoice(2, choice);
            } else if (choices[2] === null && currentTurn !== 2) {
                alert('Сейчас ход первого игрока!');
            }
        });
    });
</script>
</body>
</html>
