
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D VIEWER - NetErrror</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.7);
            color: #ffdd99;
            padding: 10px;
            font-size: 14px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
        }
        #instruction {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: #ccc;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        @media (max-width: 600px) {
            #info { font-size: 11px; bottom: 10px; }
            #instruction { font-size: 10px; top: 12px; right: 12px; }
        }
    </style>
</head>
<body>
    <div id="info">🖱️ ПАЛЬЦЕМ / МЫШЬЮ — ВРАЩАТЬ, ПРИБЛИЖАТЬ, ОТДАЛЯТЬ | 3D МОДЕЛЬ 🖱️</div>
    <div id="instruction">✨ Бежевый дилдо + яйца ✨</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.008);

        // --- КАМЕРА ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 1.5, 3);
        camera.lookAt(0, 0.5, 0);

        // --- РЕНДЕРЕР ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- УПРАВЛЕНИЕ (вращение, приближение, отдаление) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;          // плавность
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.5;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.0;
        controls.target.set(0, 0.6, 0);

        // --- ОСВЕЩЕНИЕ (красивое, объемное) ---
        // Ambient
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // Главный свет спереди-сверху
        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        mainLight.position.set(2, 3, 2);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        scene.add(mainLight);
        
        // Заполняющий теплый свет сзади
        const backLight = new THREE.PointLight(0xffaa66, 0.5);
        backLight.position.set(-1, 1.2, -2);
        scene.add(backLight);
        
        // Холодный свет снизу для объема
        const fillLight = new THREE.PointLight(0x88aaff, 0.4);
        fillLight.position.set(0.5, -0.8, 0.8);
        scene.add(fillLight);
        
        // Контровой свет
        const rimLight = new THREE.PointLight(0xffaa88, 0.6);
        rimLight.position.set(1, 1.5, -1.5);
        scene.add(rimLight);
        
        // Декоративный пол (полупрозрачная платформа с отражением)
        const gridHelper = new THREE.GridHelper(6, 20, 0xccaa88, 0x886644);
        gridHelper.position.y = -0.6;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.4;
        scene.add(gridHelper);
        
        const planeMat = new THREE.MeshStandardMaterial({ color: 0x332211, roughness: 0.4, metalness: 0.7, transparent: true, opacity: 0.3 });
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(5, 5), planeMat);
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.6;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // --- СОЗДАНИЕ МОДЕЛИ: ДИЛДО БЕЖЕВЫЙ + 2 БЕЖЕВЫХ ЯЙЦА ---
        const modelGroup = new THREE.Group();
        
        // 1. Дилдо (основная часть)
        // Тело - вытянутый цилиндр с закруглением
        const shaftGeo = new THREE.CylinderGeometry(0.28, 0.32, 1.2, 48);
        const beigeMat = new THREE.MeshStandardMaterial({ color: 0xd4b48c, roughness: 0.3, metalness: 0.1, emissive: 0x221100 });
        const shaft = new THREE.Mesh(shaftGeo, beigeMat);
        shaft.castShadow = true;
        shaft.position.y = 0;
        modelGroup.add(shaft);
        
        // Головка (верхняя часть) - сфера чуть шире
        const tipGeo = new THREE.SphereGeometry(0.34, 48, 48);
        const tipMat = new THREE.MeshStandardMaterial({ color: 0xe0c0a0, roughness: 0.2, metalness: 0.05 });
        const tip = new THREE.Mesh(tipGeo, tipMat);
        tip.position.y = 0.68;
        tip.castShadow = true;
        modelGroup.add(tip);
        
        // Основание (присоска/низ)
        const baseGeo = new THREE.CylinderGeometry(0.42, 0.48, 0.12, 32);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0xc8a87c, roughness: 0.4 });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.y = -0.62;
        base.castShadow = true;
        modelGroup.add(base);
        
        // Деталька - желобок под головкой
        const grooveGeo = new THREE.TorusGeometry(0.32, 0.05, 32, 64);
        const grooveMat = new THREE.MeshStandardMaterial({ color: 0xb8946a, roughness: 0.5 });
        const groove = new THREE.Mesh(grooveGeo, grooveMat);
        groove.rotation.x = Math.PI / 2;
        groove.position.y = 0.45;
        modelGroup.add(groove);
        
        // 2. ЯЙЦА (два бежевых шара, слегка сплюснутых)
        const eggMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c, roughness: 0.25, metalness: 0.05 });
        
        // Левое яйцо
        const leftEggGeo = new THREE.SphereGeometry(0.32, 48, 48);
        const leftEgg = new THREE.Mesh(leftEggGeo, eggMat);
        leftEgg.scale.set(0.95, 0.85, 0.9);
        leftEgg.position.set(-0.55, -0.35, 0.2);
        leftEgg.castShadow = true;
        modelGroup.add(leftEgg);
        
        // Правое яйцо
        const rightEggGeo = new THREE.SphereGeometry(0.32, 48, 48);
        const rightEgg = new THREE.Mesh(rightEggGeo, eggMat);
        rightEgg.scale.set(0.95, 0.85, 0.9);
        rightEgg.position.set(0.55, -0.35, 0.2);
        rightEgg.castShadow = true;
        modelGroup.add(rightEgg);
        
        // Добавляем небольшие блики на яйца (капельки)
        const highlightMat = new THREE.MeshStandardMaterial({ color: 0xf5e5c0, emissive: 0x442200 });
        const leftHighlight = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), highlightMat);
        leftHighlight.position.set(-0.65, -0.15, 0.45);
        modelGroup.add(leftHighlight);
        
        const rightHighlight = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), highlightMat);
        rightHighlight.position.set(0.65, -0.15, 0.45);
        modelGroup.add(rightHighlight);
        
        // Добавим текстуру/полоски на дилдо для реализма (несколько колец)
        const ringMatDetail = new THREE.MeshStandardMaterial({ color: 0xc8a070, roughness: 0.6 });
        for (let i = -0.3; i <= 0.3; i += 0.3) {
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.04, 24, 48), ringMatDetail);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = i;
            modelGroup.add(ring);
        }
        
        modelGroup.position.set(0, 0.15, 0);
        scene.add(modelGroup);
        
        // --- ДЕКОРАТИВНЫЕ ЭЛЕМЕНТЫ: парящие частицы для атмосферы ---
        const particleCount = 400;
        const particlesGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 4;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 2.5 + 0.3;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 3;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xffaa88, size: 0.012, transparent: true, opacity: 0.5 });
        const particles = new THREE.Points(particlesGeometry, particleMat);
        scene.add(particles);
        
        // Звездный фон (мелкие точки)
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1200;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.06, transparent: true, opacity: 0.7 });
        const stars = new THREE.Points(starGeometry, starMat);
        scene.add(stars);
        
        // --- МАЛЕНЬКИЙ СВЕТ ОТ ОБЪЕКТА (для красоты) ---
        const glowLight = new THREE.PointLight(0xd4a070, 0.5, 2.5);
        glowLight.position.set(0, 0.4, 0.3);
        scene.add(glowLight);
        
        // --- АНИМАЦИЯ (легкое парение модели и частиц) ---
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            
            // Плавное покачивание модели (очень легкое)
            modelGroup.rotation.y = Math.sin(time * 0.4) * 0.03;
            modelGroup.position.y = 0.15 + Math.sin(time * 0.8) * 0.005;
            
            // Вращение частиц
            particles.rotation.y += 0.002;
            particles.rotation.x = Math.sin(time * 0.2) * 0.05;
            
            // Мерцание света
            glowLight.intensity = 0.5 + Math.sin(time * 3) * 0.15;
            
            // Обновление управления
            controls.update();
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // --- АДАПТАЦИЯ ПОД РАЗМЕР ЭКРАНА ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log("NetErrror: 3D модель загружена — бежевый дилдо + 2 яйца. Вращение/приближение/отдаление работает.");
    </script>
</body>
</html>
```
