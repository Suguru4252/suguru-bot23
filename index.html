<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rucoy Online</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0c12; overflow: hidden; position: fixed; width: 100%; height: 100%; font-family: monospace; touch-action: none; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; background: #1a2a1a; }
        .btn-panel { position: fixed; bottom: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .btn-group { display: flex; gap: 8px; pointer-events: auto; }
        .btn { background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); border: 1px solid #ffaa55; color: #ffcc88; font-size: 11px; padding: 6px 12px; border-radius: 25px; cursor: pointer; font-family: monospace; font-weight: bold; }
        .btn:active { transform: scale(0.95); }
        .top-panel { position: fixed; top: 10px; right: 10px; display: flex; gap: 6px; z-index: 100; pointer-events: auto; }
        .nick { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 20px; color: #ffcc88; font-size: 11px; z-index: 100; white-space: nowrap; }
        @media (max-width: 700px) { .btn { font-size: 9px; padding: 4px 8px; } .nick { font-size: 9px; } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="top-panel">
        <button class="btn" id="statsBtn">📊 СТАТ</button>
        <button class="btn" id="invBtn">🎒 ИНВ</button>
        <button class="btn" id="mapBtn">🗺️ КАРТА</button>
    </div>
    <div class="btn-panel">
        <div class="btn-group"><button class="btn" id="hpBtn">❤️ HP</button><button class="btn" id="mpBtn">💙 MP</button></div>
        <div class="btn-group"><button class="btn" id="attackBtn">⚔️ АТАКА</button><button class="btn" id="skillBtn">✨ СКИЛЛ</button><button class="btn" id="superBtn">🌟 СУПЕР</button></div>
        <div class="btn-group"><button class="btn" id="classWarrior">⚔️</button><button class="btn" id="classArcher">🏹</button><button class="btn" id="classMage">🔮</button></div>
    </div>
    <div class="nick" id="nicknameDisplay"></div>

<script>
(function(){
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let ww = window.innerWidth, wh = window.innerHeight;
    let cameraX = 0, cameraY = 0;
    let walkCycle = 0;
    function resize() { ww = window.innerWidth; wh = window.innerHeight; canvas.width = ww; canvas.height = wh; }
    window.addEventListener('resize', resize);
    resize();
    
    let nickname = localStorage.getItem('nick') || 'Герой';
    document.getElementById('nicknameDisplay').innerHTML = `👤 ${nickname}`;
    
    // КЛАССЫ
    const CLASSES = {
        warrior: { name: "Мечник", icon: "⚔️", color: "#5a7a9a", hp: 380, mp: 90, dmgMin: 38, dmgMax: 68, range: 65, skill: "Вихрь" },
        archer: { name: "Лучник", icon: "🏹", color: "#6a8a5a", hp: 310, mp: 140, dmgMin: 36, dmgMax: 66, range: 185, skill: "Тройной" },
        mage: { name: "Маг", icon: "🔮", color: "#9a6aba", hp: 260, mp: 240, dmgMin: 44, dmgMax: 78, range: 175, skill: "Взрыв" }
    };
    function getClass() { return CLASSES[player.class]; }
    
    // МОБЫ (СЛАБЫЕ)
    const MOBS = [
        { name: "Гоблин", hp: 60, dmg: 8, exp: 38, color: "#6f8c5a", skin: "#8cae6a", icon: "👺", speed: 0.7, range: 55, draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-12,y-18,24,32); ctx.fillStyle=this.color; ctx.fillRect(x-10,y-10,20,24); ctx.fillStyle="#000"; ctx.fillRect(x-6,y-12,4,4); ctx.fillRect(x+2,y-12,4,4); ctx.fillStyle="#8b5a2b"; ctx.fillRect(x-8,y+4,16,8); } },
        { name: "Волк", hp: 80, dmg: 10, exp: 55, color: "#8a7a6a", skin: "#c0a890", icon: "🐺", speed: 0.9, range: 50, draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-14,y-16,28,28); ctx.fillStyle=this.color; ctx.fillRect(x-12,y-12,24,22); ctx.fillStyle="#000"; ctx.fillRect(x-8,y-10,4,4); ctx.fillRect(x+4,y-10,4,4); ctx.fillStyle="#4a3a2a"; ctx.fillRect(x-4,y+2,8,6); } },
        { name: "Скелет", hp: 140, dmg: 16, exp: 95, color: "#b8b8cc", skin: "#d0d0e0", icon: "💀", speed: 0.75, range: 55, draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-12,y-20,24,36); ctx.fillStyle=this.color; ctx.fillRect(x-10,y-12,20,28); ctx.fillStyle="#000"; ctx.fillRect(x-6,y-14,4,4); ctx.fillRect(x+2,y-14,4,4); ctx.fillStyle="#8a8a8a"; ctx.fillRect(x-8,y+2,16,6); } },
        { name: "Дракон", hp: 240, dmg: 28, exp: 210, color: "#c97a3a", skin: "#e09a5a", icon: "🐉", speed: 0.45, range: 65, draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-16,y-22,32,40); ctx.fillStyle=this.color; ctx.fillRect(x-14,y-14,28,32); ctx.fillStyle="#000"; ctx.fillRect(x-8,y-16,5,5); ctx.fillRect(x+3,y-16,5,5); ctx.fillStyle="#d97a3a"; ctx.fillRect(x-12,y-2,24,8); } }
    ];
    
    let mobs = [], spawnTimer = 0, MAX_MOBS = 30;
    function createMob() {
        let t = MOBS[Math.floor(Math.random() * MOBS.length)];
        let lvl = Math.max(1, player.level + Math.floor(Math.random() * 3) - 1);
        let hpMult = 1 + (lvl-1)*0.12;
        return {
            name: t.name + " Lv." + lvl,
            hp: Math.floor(t.hp * hpMult), maxHp: Math.floor(t.hp * hpMult),
            dmg: t.dmg, exp: Math.floor(t.exp * (0.85 + lvl*0.1)),
            color: t.color, skin: t.skin, icon: t.icon, speed: t.speed, range: t.range,
            draw: t.draw, x: 0, y: 0, attackTimer: 0
        };
    }
    function spawnMob() {
        if(mobs.length >= MAX_MOBS) return;
        for(let i=0;i<30;i++) {
            let x = 200 + Math.random() * 5400, y = 150 + Math.random() * 4300;
            if(!isObstacle(x,y,26) && !isInSafeZone(x,y) && Math.hypot(x-player.x,y-player.y) > 200) {
                let m = createMob(); m.x = x; m.y = y; mobs.push(m); return;
            }
        }
    }
    
    // БЕЗОПАСНАЯ ЗОНА
    let safeZone = { x: 500, y: 420, w: 560, h: 440 };
    let shopNPC = { x: safeZone.x + safeZone.w - 80, y: safeZone.y + safeZone.h - 60 };
    function isInSafeZone(x,y) { return x > safeZone.x && x < safeZone.x+safeZone.w && y > safeZone.y && y < safeZone.y+safeZone.h; }
    
    // ПРЕПЯТСТВИЯ
    let obstacles = [];
    function generateObstacles() {
        obstacles = [];
        for(let i=0;i<300;i++) { let x=100+Math.random()*5500, y=80+Math.random()*4300; if(!isInSafeZone(x,y)) obstacles.push({x,y,r:22,type:'tree'}); }
        for(let i=0;i<60;i++) { let x=120+Math.random()*5400, y=100+Math.random()*4200; if(!isInSafeZone(x,y)) obstacles.push({x,y,r:32,type:'mountain'}); }
    }
    function isObstacle(x,y,r=24) { for(let o of obstacles) if(Math.hypot(x-o.x,y-o.y) < r + (o.r||20)) return true; return false; }
    function canMoveTo(x,y) { if(x<50||x>5700||y<50||y>4500) return false; if(isObstacle(x,y)) return false; return isInSafeZone(x,y) === isInSafeZone(player.x,player.y); }
    
    // ИГРОК
    let player = {
        x: safeZone.x + safeZone.w/2, y: safeZone.y + safeZone.h/2,
        targetX: null, targetY: null,
        hp: 380, maxHp: 380, mp: 90, maxMp: 90,
        level: 1, exp: 0, expNext: 90,
        class: "warrior", gold: 500,
        potionHp: 5, potionMp: 5,
        attackTimer: 0, superTimer: 0, moving: false
    };
    
    function updatePlayerStats() {
        let c = getClass();
        player.maxHp = c.hp + player.level * 18;
        player.maxMp = c.mp + player.level * 13;
        if(player.hp > player.maxHp) player.hp = player.maxHp;
        if(player.mp > player.maxMp) player.mp = player.maxMp;
        player.dmgMin = c.dmgMin + Math.floor(player.level * 2.5);
        player.dmgMax = c.dmgMax + Math.floor(player.level * 3.2);
        player.attackRange = c.range;
    }
    
    // ДВИЖЕНИЕ
    function moveTo(x,y) { player.targetX = x; player.targetY = y; }
    function updateMove() {
        if(player.targetX === null) { player.moving = false; return; }
        let dx = player.targetX - player.x, dy = player.targetY - player.y, dist = Math.hypot(dx,dy);
        if(dist < 8) { player.targetX = null; player.moving = false; return; }
        player.moving = true;
        let step = Math.min(4.8, dist), ang = Math.atan2(dy,dx);
        let nx = player.x + Math.cos(ang)*step, ny = player.y + Math.sin(ang)*step;
        if(canMoveTo(nx,ny)) { player.x = nx; player.y = ny; }
        else { player.targetX = null; player.moving = false; }
    }
    
    // АТАКА
    let selectedMob = null, messages = [], damageNumbers = [];
    let showStats = false, showInv = false, showMap = false, shopOpen = false;
    let explosionMode = false, whirlwind = false, whirlwindTimer = 0;
    
    function addMsg(t, err=false) { messages.unshift({text:t,err,life:150}); if(messages.length>4) messages.pop(); }
    function showDamage(x,y,dmg,isPlayer=false) { damageNumbers.push({x,y,dmg,life:18,isPlayer}); }
    
    function killMob(mob) {
        let expGain = mob.exp, goldGain = Math.floor(20 + Math.random() * (player.level * 10));
        player.exp += expGain; player.gold += goldGain;
        addMsg(`✨ +${expGain} опыта, +${goldGain}💰`);
        if(Math.random()<0.4) { if(Math.random()<0.6) player.potionHp++; else player.potionMp++; addMsg(`🧪 Выпало зелье!`); }
        let idx = mobs.indexOf(mob); if(idx !== -1) mobs.splice(idx,1);
        if(selectedMob === mob) selectedMob = null;
        while(player.exp >= player.expNext) {
            player.exp -= player.expNext; player.level++;
            updatePlayerStats();
            player.hp = player.maxHp; player.mp = player.maxMp;
            player.expNext = 90 + player.level * 38;
            addMsg(`⭐⭐ УРОВЕНЬ ${player.level}! ⭐⭐`);
        }
    }
    
    function playerAttack() {
        if(!selectedMob || selectedMob.hp <= 0) { selectedMob = null; return; }
        if(player.attackTimer > 0) return;
        let dist = Math.hypot(player.x - selectedMob.x, player.y - selectedMob.y);
        if(dist > player.attackRange) { addMsg(`🏃 Слишком далеко! (${player.attackRange}px)`, true); return; }
        let dmg = Math.floor(Math.random() * (player.dmgMax - player.dmgMin + 1) + player.dmgMin);
        selectedMob.hp -= dmg;
        player.attackTimer = 20;
        addMsg(`⚔️ ${getClass().name} → ${dmg} урона ${selectedMob.name}!`);
        showDamage(selectedMob.x, selectedMob.y, dmg);
        if(selectedMob.hp <= 0) killMob(selectedMob);
    }
    
    function useSkill() {
        if(!selectedMob || selectedMob.hp <= 0) { addMsg(`🎯 Выберите цель!`, true); return; }
        let c = getClass();
        let dist = Math.hypot(player.x - selectedMob.x, player.y - selectedMob.y);
        if(dist > c.range + 30) { addMsg(`🏃 Слишком далеко!`, true); return; }
        let manaCost = 25 + Math.floor(player.level/2);
        if(player.mp < manaCost) { addMsg(`💙 Не хватает маны!`, true); return; }
        player.mp -= manaCost;
        let avg = (player.dmgMin + player.dmgMax)/2;
        let dmg = Math.floor(avg * 2.3);
        selectedMob.hp -= dmg;
        addMsg(`✨ ${c.skill}! ${dmg} урона!`);
        showDamage(selectedMob.x, selectedMob.y, dmg);
        if(selectedMob.hp <= 0) killMob(selectedMob);
    }
    
    function useSuper() {
        if(player.superTimer > 0) { addMsg(`🌟 Супер: ${Math.ceil(player.superTimer/10)} сек`, true); return; }
        let c = getClass();
        if(c.name === "Мечник") {
            whirlwind = true; whirlwindTimer = 30; player.superTimer = 180;
            addMsg(`🌀 ВИХРЬ! Урон x2 по всем!`);
            for(let m of mobs) {
                if(Math.hypot(player.x-m.x,player.y-m.y) < 100 && m.hp > 0) {
                    let avg = (player.dmgMin + player.dmgMax)/2;
                    let dmg = Math.floor(avg * 2);
                    m.hp -= dmg; showDamage(m.x, m.y, dmg);
                    addMsg(`🌀 → ${dmg} урона ${m.name}!`);
                    if(m.hp <= 0) killMob(m);
                }
            }
        } else if(c.name === "Лучник") {
            let targets = mobs.filter(m => m.hp > 0 && Math.hypot(player.x-m.x,player.y-m.y) < 200);
            targets.sort((a,b)=>Math.hypot(player.x-a.x,player.y-a.y)-Math.hypot(player.x-b.x,player.y-b.y));
            let hit = 0;
            for(let m of targets.slice(0,3)) {
                let avg = (player.dmgMin + player.dmgMax)/2;
                let dmg = Math.floor(avg * 3);
                m.hp -= dmg; showDamage(m.x, m.y, dmg);
                addMsg(`🏹 Тройной → ${dmg} урона ${m.name}!`);
                if(m.hp <= 0) killMob(m);
                hit++;
            }
            if(hit > 0) player.superTimer = 180;
            else addMsg(`🏹 Нет врагов!`, true);
        } else if(c.name === "Маг") {
            addMsg(`🔥 Нажмите на место для взрыва!`);
            explosionMode = true;
            return;
        }
    }
    
    function castExplosion(wx, wy) {
        if(!explosionMode) return;
        explosionMode = false;
        let avg = (player.dmgMin + player.dmgMax)/2;
        let dmg = Math.floor(avg * 2.5);
        let hit = false;
        for(let m of mobs) {
            if(Math.hypot(wx-m.x, wy-m.y) < 90 && m.hp > 0) {
                m.hp -= dmg; showDamage(m.x, m.y, dmg);
                addMsg(`🔥 Взрыв → ${dmg} урона ${m.name}!`);
                if(m.hp <= 0) killMob(m);
                hit = true;
            }
        }
        damageNumbers.push({x:wx,y:wy,dmg:"💥",life:15,isExplosion:true});
        if(!hit) addMsg(`🔥 Взрыв не задел врагов!`, true);
        player.superTimer = 180;
    }
    
    function updateMobs() {
        for(let m of mobs) {
            if(m.hp <= 0) continue;
            let dx = player.x - m.x, dy = player.y - m.y, dist = Math.hypot(dx,dy);
            if(dist < 220 && !isInSafeZone(player.x,player.y)) {
                let ang = Math.atan2(dy,dx), step = Math.min(m.speed, dist-40);
                if(step > 0) {
                    let nx = m.x + Math.cos(ang)*step, ny = m.y + Math.sin(ang)*step;
                    if(!isObstacle(nx,ny,26) && !isInSafeZone(nx,ny)) { m.x = nx; m.y = ny; }
                }
                if(dist < m.range + 15) {
                    if(m.attackTimer <= 0) {
                        let dmg = Math.max(3, m.dmg - Math.floor(player.defense || 15));
                        player.hp -= dmg;
                        m.attackTimer = 45;
                        addMsg(`💀 ${m.name} нанес ${dmg} урона!`, true);
                        showDamage(m.x, m.y, dmg, true);
                        if(player.hp <= 0) {
                            player.hp = player.maxHp; player.mp = player.maxMp;
                            player.x = safeZone.x + safeZone.w/2; player.y = safeZone.y + safeZone.h/2;
                            addMsg(`💀 ВОСКРЕШЕНИЕ!`, true);
                        }
                    } else m.attackTimer--;
                } else if(m.attackTimer > 0) m.attackTimer--;
            } else if(m.attackTimer > 0) m.attackTimer--;
        }
    }
    
    function useHp() {
        if(player.potionHp <= 0) { addMsg(`❌ Нет зелий HP!`, true); return; }
        let heal = Math.floor(player.maxHp * 0.65);
        player.hp = Math.min(player.maxHp, player.hp + heal);
        player.potionHp--;
        addMsg(`❤️ +${heal} HP (осталось ${player.potionHp})`);
    }
    function useMp() {
        if(player.potionMp <= 0) { addMsg(`❌ Нет зелий MP!`, true); return; }
        let mana = Math.floor(player.maxMp * 0.7);
        player.mp = Math.min(player.maxMp, player.mp + mana);
        player.potionMp--;
        addMsg(`💙 +${mana} MP (осталось ${player.potionMp})`);
    }
    
    function switchClass(cls) {
        let hpPercent = player.hp / player.maxHp;
        let mpPercent = player.mp / player.maxMp;
        player.class = cls;
        updatePlayerStats();
        player.hp = Math.max(1, Math.min(player.maxHp, Math.floor(player.maxHp * hpPercent)));
        player.mp = Math.max(1, Math.min(player.maxMp, Math.floor(player.maxMp * mpPercent)));
        addMsg(`🔄 Класс: ${getClass().name} ${getClass().icon}`);
    }
    
    function selectMobAt(wx,wy) {
        for(let m of mobs) {
            if(Math.hypot(m.x-wx, m.y-wy) < 50 && m.hp > 0) {
                selectedMob = m;
                addMsg(`🎯 Цель: ${m.name} (${m.hp}/${m.maxHp} HP)`);
                return true;
            }
        }
        return false;
    }
    
    function isClickOnShop(wx,wy) {
        let dx = wx - shopNPC.x, dy = wy - shopNPC.y;
        if(Math.hypot(dx,dy) < 35) { shopOpen = !shopOpen; addMsg(shopOpen?"🏪 Магазин открыт":"🏪 Магазин закрыт"); return true; }
        return false;
    }
    
    function handleClick(wx,wy) {
        if(showStats || showInv || showMap) { showStats=false; showInv=false; showMap=false; return; }
        if(explosionMode) { castExplosion(wx,wy); return; }
        if(isClickOnShop(wx,wy)) return;
        if(selectMobAt(wx,wy)) return;
        moveTo(wx,wy);
    }
    
    function updateCamera() {
        let tx = player.x - ww/2, ty = player.y - wh/2;
        tx = Math.min(Math.max(tx, 0), 5800 - ww);
        ty = Math.min(Math.max(ty, 0), 4600 - wh);
        cameraX = cameraX * 0.9 + tx * 0.1;
        cameraY = cameraY * 0.9 + ty * 0.1;
    }
    
    // ========== ОТРИСОВКА ==========
    function drawWorld() {
        for(let i=0;i<120;i++) for(let j=0;j<100;j++) {
            let x = i*50 - cameraX, y = j*50 - cameraY;
            if(x > -60 && x < ww+60 && y > -60 && y < wh+60) {
                ctx.fillStyle = ((i+j)%2===0) ? "#4a8c3a" : "#3a6c2a";
                ctx.fillRect(x, y, 49, 49);
            }
        }
        for(let o of obstacles) {
            let x = o.x - cameraX, y = o.y - cameraY;
            if(x > -100 && x < ww+100 && y > -100 && y < wh+100) {
                if(o.type === 'tree') {
                    ctx.fillStyle = "#3c9e3c";
                    ctx.fillRect(x-15, y-28, 30, 50);
                    ctx.fillStyle = "#8b5a2b";
                    ctx.fillRect(x-8, y-6, 16, 28);
                } else if(o.type === 'mountain') {
                    ctx.fillStyle = "#6e6e7a";
                    ctx.beginPath();
                    ctx.moveTo(x, y-38);
                    ctx.lineTo(x-32, y+15);
                    ctx.lineTo(x+32, y+15);
                    ctx.fill();
                }
            }
        }
        let szX = safeZone.x - cameraX, szY = safeZone.y - cameraY;
        ctx.fillStyle = "#88aa66aa";
        ctx.fillRect(szX, szY, safeZone.w, safeZone.h);
        let npcX = shopNPC.x - cameraX, npcY = shopNPC.y - cameraY;
        ctx.fillStyle = "#c99e6f";
        ctx.fillRect(npcX-15, npcY-22, 30, 40);
        ctx.fillStyle = "#e8c28a";
        ctx.fillRect(npcX-10, npcY-14, 20, 28);
        ctx.fillStyle = "#000";
        ctx.fillRect(npcX-6, npcY-9, 4, 4);
        ctx.fillRect(npcX+2, npcY-9, 4, 4);
        ctx.font = "20px monospace";
        ctx.fillStyle = "#ffdd99";
        ctx.fillText("🏪", npcX-10, npcY+4);
    }
    
    function drawPlayer() {
        let x = player.x - cameraX, y = player.y - cameraY;
        let c = getClass();
        if(player.moving) walkCycle = (walkCycle + 0.15) % (Math.PI*2);
        else walkCycle = walkCycle * 0.95;
        let legOffset = Math.sin(walkCycle) * 5;
        let armOffset = Math.sin(walkCycle + Math.PI) * 7;
        
        ctx.fillStyle = "#e0c8a0";
        ctx.fillRect(x-14, y-22, 28, 40);
        ctx.fillStyle = c.color;
        ctx.fillRect(x-12, y-14, 24, 30);
        ctx.fillStyle = "#e0c8a0";
        ctx.fillRect(x-8, y-26, 16, 14);
        ctx.fillStyle = "#fff";
        ctx.fillRect(x-5, y-23, 4, 4);
        ctx.fillRect(x+1, y-23, 4, 4);
        ctx.fillStyle = "#000";
        ctx.fillRect(x-4, y-22, 2, 2);
        ctx.fillRect(x+2, y-22, 2, 2);
        
        ctx.fillStyle = "#2a2a2a";
        ctx.beginPath();
        ctx.moveTo(x-10, y+12);
        ctx.lineTo(x-14 + legOffset*0.5, y+24);
        ctx.lineTo(x-6, y+24);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x+10, y+12);

    function handleShopClick(mx, my) {
        let w = 400, h = 450;
        let x = ww/2 - w/2, y = wh/2 - h/2;
        if(mx > x+w-35 && mx < x+w-10 && my > y+15 && my < y+40) { shopOpen = false; return true; }
        if(mx > x+20 && mx < x+110 && my > y+60 && my < y+88) { shopTab = "potions"; shopScroll = 0; return true; }
        if(mx > x+120 && mx < x+210 && my > y+60 && my < y+88) { shopTab = "armor"; shopScroll = 0; return true; }
        if(mx > x+220 && mx < x+310 && my > y+60 && my < y+88) { shopTab = "weapons"; shopScroll = 0; return true; }
        
        let items = SHOP_ITEMS[shopTab];
        let startIdx = Math.floor(shopScroll / shopItemsPerPage) * shopItemsPerPage;
        let endIdx = Math.min(startIdx + shopItemsPerPage, items.length);
        let itemY = y + 105;
        for(let i = startIdx; i < endIdx; i++) {
            let it = items[i];
            let itemH = 75;
            if(my > itemY && my < itemY + itemH-5) {
                let buyX = x + w - 90;
                if(mx > buyX && mx < buyX + 70 && my > itemY+20 && my < itemY+50) {
                    if(player.gold >= it.price) {
                        player.gold -= it.price;
                        if(it.type === "hp") player.potionHp++;
                        else if(it.type === "mp") player.potionMp++;
                        else addMsg(`✅ Куплен ${it.name}!`);
                        addMsg(`✅ Куплен ${it.name}!`);
                    } else addMsg(`💰 Не хватает золота!`, true);
                    return true;
                }
            }
            itemY += itemH;
        }
        return false;
    }

    function update() {
        updateMove(); updateMobs(); updateCamera();
        if(player.attackTimer > 0) player.attackTimer--;
        if(player.superTimer > 0) player.superTimer--;
        if(spawnTimer <= 0) { if(mobs.length < MAX_MOBS) spawnMob(); spawnTimer = 20; }
        else spawnTimer--;
        for(let i=0;i<messages.length;i++) if(messages[i].life) messages[i].life--;
        messages = messages.filter(m => m.life > 0);
    }
    
    function getWorldClick(cx,cy) {
        let rect = canvas.getBoundingClientRect();
        let sx = ww/rect.width, sy = wh/rect.height;
        return { x: (cx-rect.left)*sx + cameraX, y: (cy-rect.top)*sy + cameraY };
    }
    
    canvas.addEventListener('click', (e) => {
        if(showMap) { showMap=false; return; }
        let w = getWorldClick(e.clientX, e.clientY);
        if(shopOpen) { if(handleShopClick(w.x, w.y)) return; shopOpen=false; return; }
        if(showStats) { if(handleStatsClick(w.x, w.y)) return; showStats=false; return; }
        if(showInv) { if(handleInventoryClick(w.x, w.y)) return; showInv=false; return; }
        handleClick(w.x, w.y);
    });
    
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(showMap) { showMap=false; return; }
        let t = e.touches[0];
        let w = getWorldClick(t.clientX, t.clientY);
        if(shopOpen) { handleShopTouchStart(e); if(handleShopClick(w.x, w.y)) return; shopOpen=false; return; }
        if(showStats) { handleStatsTouchStart(e); if(handleStatsClick(w.x, w.y)) return; showStats=false; return; }
        if(showInv) { handleInventoryTouchStart(e); if(handleInventoryClick(w.x, w.y)) return; showInv=false; return; }
        handleClick(w.x, w.y);
    });
    
    canvas.addEventListener('touchmove', (e) => {
        if(shopOpen) { handleShopTouchMove(e); e.preventDefault(); }
        if(showStats) { handleStatsTouchMove(e); e.preventDefault(); }
        if(showInv) { handleInventoryTouchMove(e); e.preventDefault(); }
    });
    
    canvas.addEventListener('touchend', () => {
        handleShopTouchEnd();
        handleStatsTouchEnd();
        handleInventoryTouchEnd();
    });
    
    setInterval(() => {
        if(selectedMob && selectedMob.hp > 0 && Math.hypot(player.x-selectedMob.x, player.y-selectedMob.y) <= player.attackRange + 15) {
            playerAttack();
        }
    }, 1200);
    
    document.getElementById('attackBtn').onclick = () => { if(selectedMob) playerAttack(); else addMsg("🎯 Выберите цель",true); };
    document.getElementById('skillBtn').onclick = () => useSkill();
    document.getElementById('superBtn').onclick = () => useSuper();
    document.getElementById('hpBtn').onclick = () => useHp();
    document.getElementById('mpBtn').onclick = () => useMp();
    document.getElementById('statsBtn').onclick = () => { showStats = !showStats; showInv=false; showMap=false; statsScroll=0; };
    document.getElementById('invBtn').onclick = () => { showInv = !showInv; showStats=false; showMap=false; invScroll=0; };
    document.getElementById('mapBtn').onclick = () => { showMap = !showMap; showStats=false; showInv=false; };
    document.getElementById('classWarrior').onclick = () => switchClass('warrior');
    document.getElementById('classArcher').onclick = () => switchClass('archer');
    document.getElementById('classMage').onclick = () => switchClass('mage');
    
    window.addEventListener('keydown', (e) => {
        if(e.key === '1') useSuper();
        if(e.key === '2') useHp();
        if(e.key === '3') useMp();
        if(e.key === 's') useSkill();
        if(e.key === 'c') switchClass(player.class === 'warrior' ? 'archer' : (player.class === 'archer' ? 'mage' : 'warrior'));
        if(e.key === 'Escape') { showMap=false; showStats=false; showInv=false; shopOpen=false; }
    });
    
    // СТАРТ
    function start() {
        generateObstacles();
        updatePlayerStats();
        for(let i=0;i<10;i++) spawnMob();
        addMsg("✨ Добро пожаловать!");
        addMsg("🗡️ Нажмите на моба → автоатака");
        addMsg("🌟 1 - СУПЕР | 2 - HP | 3 - MP");
        addMsg("🏪 Торговец в безопасной зоне");
    }
    start();
    
    function render() {
        drawWorld();
        for(let m of mobs) drawMob(m);
        drawPlayer();
        drawUI();
        if(showMap) drawFullMap();
        if(shopOpen) drawShop();
        if(showStats) drawStatsWindow();
        if(showInv) drawInventory();
    }
    function loop() { update(); render(); requestAnimationFrame(loop); }
    loop();
})();
</script>
</body>
</html>
