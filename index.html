<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МОНОПОЛИЯ ПРЕМИУМ P2P</title>
    <!-- Trystero для P2P соединения -->
    <script src="https://cdn.jsdelivr.net/npm/trystero@latest/build/trystero-torrent.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a3f0a, #1e5e1e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* Главный контейнер */
        .game-container {
            max-width: 1400px;
            width: 100%;
            background: #ecd9b4;
            background-image: radial-gradient(circle at 20% 30%, #fcf3e0 8%, transparent 30%);
            border-radius: 80px 80px 60px 60px;
            border: 10px solid #b47d4e;
            box-shadow: 0 30px 40px rgba(0,0,0,0.9), inset 0 2px 20px #fff2d0;
            padding: 30px;
        }

        /* Экраны */
        .screen {
            display: none;
        }
        .active-screen {
            display: block;
        }

        /* Главное меню */
        .main-menu {
            text-align: center;
            padding: 50px 20px;
        }
        .main-menu h1 {
            font-size: 5rem;
            color: #ffd966;
            text-shadow: 8px 8px 0 #7a4f1e, 12px 12px 0 rgba(0,0,0,0.3);
            margin-bottom: 50px;
            letter-spacing: 4px;
        }
        .menu-buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .menu-btn {
            background: gold;
            border: none;
            font-size: 2.5rem;
            padding: 20px 60px;
            border-radius: 80px;
            font-weight: 900;
            color: #1e3a1e;
            border-bottom: 10px solid #b0851f;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            min-width: 300px;
        }
        .menu-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        .menu-btn:active {
            transform: translateY(6px);
            border-bottom-width: 4px;
        }
        .menu-btn.secondary {
            background: #ecf0f1;
            border-bottom-color: #95a5a6;
            color: #2c3e50;
        }

        /* Экран создания/присоединения */
        .room-screen {
            text-align: center;
            padding: 40px;
        }
        .room-screen h2 {
            font-size: 3.5rem;
            color: white;
            text-shadow: 4px 4px 0 #2c3e50;
            margin-bottom: 30px;
        }
        .room-screen input {
            font-size: 2rem;
            padding: 20px 40px;
            border-radius: 80px;
            border: 6px solid #b88a4b;
            background: #fff9e6;
            text-align: center;
            width: 80%;
            max-width: 600px;
            margin: 20px auto;
            display: block;
            font-weight: bold;
        }
        .color-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .color-option {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 5px solid white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 15px black;
        }
        .color-option:hover {
            transform: scale(1.1);
        }
        .color-option.selected {
            border-color: gold;
            transform: scale(1.1);
            box-shadow: 0 0 30px gold;
        }
        .room-id-display {
            font-size: 2rem;
            background: #2c3e50;
            color: gold;
            padding: 20px;
            border-radius: 60px;
            margin: 20px;
            border: 4px solid #b88a4b;
            word-break: break-all;
        }

        /* Игровой экран */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2c3e50;
            border-radius: 60px;
            padding: 20px 30px;
            margin-bottom: 30px;
            border: 4px solid #b88a4b;
            color: white;
            flex-wrap: wrap;
            gap: 20px;
        }
        .players-list {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .player-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 8px 20px;
            border-radius: 50px;
            border: 2px solid;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .player-badge.current {
            border-color: gold;
            box-shadow: 0 0 15px gold;
        }
        .player-dot {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .main-game-area {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .board-container {
            flex: 3;
            min-width: 650px;
        }
        .board {
            display: grid;
            grid-template-columns: 100px repeat(9, 1fr) 100px;
            grid-template-rows: 100px repeat(9, 1fr) 100px;
            gap: 5px;
            background: #b4804b;
            padding: 20px;
            border-radius: 60px;
            border: 10px solid #684b2c;
            box-shadow: inset 0 0 0 6px #e2bc89, 0 20px 25px rgba(0,0,0,0.8);
            aspect-ratio: 1/1;
        }
        .cell {
            background: linear-gradient(145deg, #fffbf0, #eddbbd);
            border: 3px solid #996f40;
            border-radius: 16px;
            box-shadow: inset 0 -5px 0 #b48b53, 0 6px 0 #503e28;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 800;
            text-align: center;
            padding: 2px;
            position: relative;
            color: #2c1d0e;
        }
        .cell.corner {
            background: radial-gradient(circle at 30% 30%, #ffefcf, #cc9f6b);
            font-size: 0.9rem;
        }
        .property-strip {
            width: 90%;
            height: 14px;
            border-radius: 20px;
            margin-bottom: 3px;
            border: 1px solid #5d3d1c;
        }
        .player-token {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 3px solid white;
            position: absolute;
            bottom: 2px;
            box-shadow: 0 2px 5px black;
            z-index: 10;
        }

        .right-panel {
            flex: 1.2;
            min-width: 350px;
            background: rgba(63, 50, 34, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 25px;
            border: 5px solid #b49466;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .dice-section {
            background: #1e332b;
            border-radius: 50px;
            padding: 25px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 4px solid #e5c28e;
            box-shadow: 0 10px 0 #3a2e1e;
        }
        .dice {
            width: 80px;
            height: 80px;
            background: #faf0d7;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            font-weight: 900;
            color: #3d2813;
            box-shadow: inset 0 -5px 0 #c0a16e, 0 8px 0 #3e2e19;
            border: 3px solid #b48b4e;
        }
        .roll-btn {
            background: gold;
            border: none;
            font-size: 2.2rem;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 900;
            border-bottom: 8px solid #b0851f;
            cursor: pointer;
            transition: 0.08s;
        }
        .roll-btn:active {
            transform: translateY(6px);
            border-bottom-width: 2px;
        }
        .roll-btn:disabled {
            opacity: 0.5;
            transform: none;
            border-bottom-width: 8px;
            cursor: not-allowed;
        }

        .chat-container {
            background: #2d4030;
            border-radius: 40px;
            padding: 20px;
            border: 3px solid #dbb67b;
        }
        .chat-title {
            font-size: 2rem;
            color: #ffdb9d;
            margin-bottom: 15px;
        }
        .chat-messages {
            background: #efe6d2;
            height: 200px;
            overflow-y: auto;
            border-radius: 30px;
            padding: 15px;
            font-size: 1.2rem;
            border: 3px solid #a17641;
            margin-bottom: 15px;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 2;
            background: #faf2e4;
            border: 4px solid #896f44;
            border-radius: 50px;
            padding: 12px 18px;
            font-size: 1.2rem;
        }
        .chat-send {
            background: #ffbe2e;
            border: none;
            border-radius: 60px;
            padding: 0 25px;
            font-weight: 900;
            font-size: 1.5rem;
            border-bottom: 5px solid #926d23;
            cursor: pointer;
        }

        .exit-btn {
            background: #e74c3c;
            color: white;
            border: none;
            font-size: 1.8rem;
            padding: 15px;
            border-radius: 50px;
            font-weight: 900;
            border-bottom: 8px solid #962d22;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="mainMenu" class="screen active-screen main-menu">
        <h1>🎲 МОНОПОЛИЯ P2P 🎲</h1>
        <div class="menu-buttons">
            <button class="menu-btn" onclick="showScreen('createRoomScreen')">🎮 СОЗДАТЬ КОМНАТУ</button>
            <button class="menu-btn secondary" onclick="showScreen('joinRoomScreen')">🚪 ПРИСОЕДИНИТЬСЯ</button>
        </div>
    </div>

    <!-- ЭКРАН СОЗДАНИЯ КОМНАТЫ -->
    <div id="createRoomScreen" class="screen room-screen">
        <h2>ВАШ НИК И ЦВЕТ</h2>
        <input type="text" id="createName" placeholder="Ваш ник" value="Игрок">
        <div class="color-selector" id="colorSelector">
            <div class="color-option selected" style="background: #e63946;" data-color="#e63946"></div>
            <div class="color-option" style="background: #2a9d8f;" data-color="#2a9d8f"></div>
            <div class="color-option" style="background: #e9c46a;" data-color="#e9c46a"></div>
            <div class="color-option" style="background: #9c89b8;" data-color="#9c89b8"></div>
        </div>
        <button class="menu-btn" onclick="createRoom()">➕ СОЗДАТЬ</button>
        <button class="menu-btn secondary" onclick="showScreen('mainMenu')">⬅ НАЗАД</button>
    </div>

    <!-- ЭКРАН ПРИСОЕДИНЕНИЯ -->
    <div id="joinRoomScreen" class="screen room-screen">
        <h2>ВВЕДИТЕ ID КОМНАТЫ</h2>
        <input type="text" id="joinId" placeholder="ID комнаты">
        <input type="text" id="joinName" placeholder="Ваш ник" value="Игрок">
        <div class="color-selector" id="colorSelector2">
            <div class="color-option selected" style="background: #e63946;" data-color="#e63946"></div>
            <div class="color-option" style="background: #2a9d8f;" data-color="#2a9d8f"></div>
            <div class="color-option" style="background: #e9c46a;" data-color="#e9c46a"></div>
            <div class="color-option" style="background: #9c89b8;" data-color="#9c89b8"></div>
        </div>
        <button class="menu-btn" onclick="joinRoom()">🚪 ПРИСОЕДИНИТЬСЯ</button>
        <button class="menu-btn secondary" onclick="showScreen('mainMenu')">⬅ НАЗАД</button>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="gameScreen" class="screen">
        <div class="game-header">
            <div style="font-size: 2rem; color: gold;" id="roomIdDisplay">Комната</div>
            <div class="players-list" id="playersList"></div>
        </div>

        <div class="main-game-area">
            <div class="board-container">
                <div class="board" id="gameBoard"></div>
            </div>

            <div class="right-panel">
                <div class="dice-section">
                    <div class="dice" id="dice1">⚀</div>
                    <div class="dice" id="dice2">⚀</div>
                    <button class="roll-btn" id="rollDiceBtn" disabled>🎲 БРОСИТЬ</button>
                </div>

                <div class="chat-container">
                    <div class="chat-title">💬 ЧАТ</div>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-area">
                        <input type="text" class="chat-input" id="chatInput" placeholder="Написать...">
                        <button class="chat-send" id="sendChatBtn">➡️</button>
                    </div>
                </div>

                <button class="exit-btn" onclick="leaveRoom()">🚪 ПОКИНУТЬ</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ================== ИНИЦИАЛИЗАЦИЯ TRYSTERO ==================
    const { joinRoom, selfId } = Trystero;
    const config = { appId: 'monopoly-premium-2024' };
    
    let room = null;
    let currentPlayer = {
        id: null,
        name: 'Игрок',
        color: '#e63946',
        position: 0,
        money: 1500
    };
    let players = {};
    let currentTurn = null;

    // Названия клеток
    const cellNames = [
        "СТАРТ", "БАЛТИЙСКАЯ", "КАЗНА", "ВОЛКОВКА", "НАЛОГ", "РИЖСКАЯ", "МОРСКАЯ", "ШАНС", "НЕВСКИЙ", "ВАРШАВСКАЯ",
        "ТЮРЬМА", "МАЛАЯ", "ЭЛ.КОМ", "ФОНТАНКА", "ВОКЗАЛ", "ЛЕРМОНТОВ", "ШАНС", "САДОВАЯ", "КАЗНА", "ЛИГОВКА",
        "БЕСПЛАТНО", "ТЕАТР", "ШАНС", "МУЗЕЙ", "НАЛОГ", "ПАРК", "НАБЕРЕЖНАЯ", "ВОКЗАЛ", "ДВОРЦОВАЯ", "ВОДА",
        "ОТДЫХ", "ПРОСПЕКТ", "КАЗНА", "БАНК", "ШАНС", "ЗАВОД", "УНИВЕР", "ВОКЗАЛ", "КАЗНА", "РОСТОВЩИК"
    ];

    // Цвета улиц
    const propertyColors = {
        1: '#8b4513', 2: '#8b4513', 3: '#8b4513',
        5: '#add8e6', 6: '#add8e6', 8: '#add8e6',
        11: '#ffb6c1', 13: '#ffb6c1', 15: '#ffb6c1',
        17: '#ffa500', 19: '#ffa500',
        21: '#ff4444', 23: '#ff4444', 24: '#ff4444',
        26: '#ffff66', 27: '#ffff66',
        29: '#6aad6a', 31: '#6aad6a', 32: '#6aad6a',
        34: '#00008b', 35: '#00008b', 37: '#00008b'
    };

    // ================== УПРАВЛЕНИЕ ЭКРАНАМИ ==================
    window.showScreen = function(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(screenId).classList.add('active-screen');
    };

    // ================== ВЫБОР ЦВЕТА ==================
    document.querySelectorAll('#colorSelector .color-option, #colorSelector2 .color-option').forEach(opt => {
        opt.addEventListener('click', function() {
            this.parentElement.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
            this.classList.add('selected');
            if (this.parentElement.id === 'colorSelector') {
                currentPlayer.color = this.dataset.color;
            }
        });
    });

    // ================== СОЗДАНИЕ КОМНАТЫ ==================
    window.createRoom = function() {
        const name = document.getElementById('createName').value.trim() || 'Игрок';
        currentPlayer.name = name;
        currentPlayer.id = selfId;
        
        // Генерируем ID комнаты
        const roomId = 'monopoly_' + Math.random().toString(36).substr(2, 8);
        
        // Создаем комнату
        room = joinRoom(config, roomId);
        
        // Показываем ID
        document.getElementById('roomIdDisplay').innerHTML = 'КОМНАТА: ' + roomId;
        
        setupRoom(roomId);
    };

    // ================== ПРИСОЕДИНЕНИЕ К КОМНАТЕ ==================
    window.joinRoom = function() {
        const roomId = document.getElementById('joinId').value.trim();
        const name = document.getElementById('joinName').value.trim() || 'Игрок';
        
        if (!roomId) {
            alert('Введите ID комнаты!');
            return;
        }
        
        currentPlayer.name = name;
        currentPlayer.id = selfId;
        
        room = joinRoom(config, roomId);
        document.getElementById('roomIdDisplay').innerHTML = 'КОМНАТА: ' + roomId;
        
        setupRoom(roomId);
    };

    // ================== НАСТРОЙКА КОМНАТЫ ==================
    function setupRoom(roomId) {
        // Отправка и получение данных игроков
        const [sendPlayers, getPlayers] = room.makeAction('players');
        const [sendMove, getMove] = room.makeAction('move');
        const [sendChat, getChat] = room.makeAction('chat');
        const [sendTurn, getTurn] = room.makeAction('turn');

        // Инициализация игрока
        players = {};
        players[selfId] = {
            id: selfId,
            name: currentPlayer.name,
            color: currentPlayer.color,
            position: 0,
            money: 1500
        };

        // Отправляем свои данные
        sendPlayers(players);

        // Получаем данные других игроков
        getPlayers((data, peerId) => {
            players = { ...players, ...data };
            updatePlayersList();
            drawBoard();
        });

        // Получаем ходы
        getMove((data, peerId) => {
            if (players[peerId]) {
                players[peerId].position = data.position;
                players[peerId].money = data.money;
                drawBoard();
                updatePlayersList();
            }
        });

        // Получаем чат
        getChat((data, peerId) => {
            addChatMessage(data);
        });

        // Получаем информацию о ходе
        getTurn((data, peerId) => {
            currentTurn = data.playerId;
            document.getElementById('rollDiceBtn').disabled = currentTurn !== selfId;
        });

        // Сохраняем функции для использования
        window.sendMove = sendMove;
        window.sendChat = sendChat;
        window.sendTurn = sendTurn;

        // Начинаем игру, выбираем первого игрока
        setTimeout(() => {
            const playerIds = Object.keys(players);
            if (playerIds.length > 0) {
                currentTurn = playerIds[0];
                sendTurn({ playerId: currentTurn });
            }
        }, 1000);

        showScreen('gameScreen');
        drawBoard();
    }

    // ================== ОТРИСОВКА ДОСКИ ==================
    function drawBoard() {
        const boardEl = document.getElementById('gameBoard');
        boardEl.innerHTML = '';

        for (let row = 0; row < 11; row++) {
            for (let col = 0; col < 11; col++) {
                let idx = -1;
                if (row === 0) idx = 10 + col;
                else if (row === 10) idx = 9 - col;
                else if (col === 0) idx = 10 - row;
                else if (col === 10) idx = 20 + row;
                else {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'cell';
                    boardEl.appendChild(emptyCell);
                    continue;
                }

                const cell = document.createElement('div');
                cell.className = 'cell';
                if (idx === 0 || idx === 10 || idx === 20 || idx === 30) cell.classList.add('corner');

                // Цветная полоска для улиц
                if (propertyColors[idx]) {
                    const strip = document.createElement('div');
                    strip.className = 'property-strip';
                    strip.style.background = propertyColors[idx];
                    cell.appendChild(strip);
                }

                const nameSpan = document.createElement('span');
                nameSpan.className = 'name';
                nameSpan.innerText = cellNames[idx];
                cell.appendChild(nameSpan);

                // Игроки на клетке
                let offset = 0;
                Object.values(players).forEach(player => {
                    if (player.position === idx) {
                        const token = document.createElement('div');
                        token.className = 'player-token';
                        token.style.background = player.color;
                        token.style.left = (5 + offset * 25) + 'px';
                        token.style.zIndex = (100 + offset);
                        cell.appendChild(token);
                        offset++;
                    }
                });

                boardEl.appendChild(cell);
            }
        }
    }

    // ================== ОБНОВЛЕНИЕ СПИСКА ИГРОКОВ ==================
    function updatePlayersList() {
        const listEl = document.getElementById('playersList');
        listEl.innerHTML = '';

        Object.values(players).forEach(player => {
            const badge = document.createElement('div');
            badge.className = `player-badge ${player.id === selfId ? 'current' : ''}`;
            badge.innerHTML = `
                <div class="player-dot" style="background: ${player.color};"></div>
                <span>${player.name} $${player.money}</span>
            `;
            listEl.appendChild(badge);
        });
    }

    // ================== ЧАТ ==================
    function addChatMessage(msg) {
        const chatDiv = document.getElementById('chatMessages');
        const msgEl = document.createElement('div');
        msgEl.style.margin = '5px 0';
        msgEl.style.fontSize = '1.2rem';
        msgEl.innerHTML = `<span style="color: ${msg.color};">${msg.name}:</span> ${msg.text}`;
        chatDiv.appendChild(msgEl);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    document.getElementById('sendChatBtn').addEventListener('click', () => {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (text && window.sendChat) {
            const msg = {
                name: currentPlayer.name,
                text: text,
                color: currentPlayer.color
            };
            window.sendChat(msg);
            addChatMessage(msg);
            input.value = '';
        }
    });

    // ================== БРОСОК КУБИКА ==================
    document.getElementById('rollDiceBtn').addEventListener('click', () => {
        if (!window.sendMove || currentTurn !== selfId) return;

        const dice1 = Math.floor(Math.random() * 6) + 1;
        const dice2 = Math.floor(Math.random() * 6) + 1;
        const sum = dice1 + dice2;

        const diceMap = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        document.getElementById('dice1').innerText = diceMap[dice1 - 1];
        document.getElementById('dice2').innerText = diceMap[dice2 - 1];

        // Новая позиция
        let newPosition = (players[selfId].position + sum) % 40;
        let moneyChange = 0;

        // Приз за проход старта
        if (newPosition < players[selfId].position) {
            moneyChange += 200;
        }

        // Обновляем данные
        players[selfId].position = newPosition;
        players[selfId].money += moneyChange;

        // Отправляем ход
        window.sendMove({
            position: newPosition,
            money: players[selfId].money
        });

        // Передаем ход следующему
        const playerIds = Object.keys(players);
        const currentIndex = playerIds.indexOf(selfId);
        const nextIndex = (currentIndex + 1) % playerIds.length;
        const nextPlayerId = playerIds[nextIndex];
        
        currentTurn = nextPlayerId;
        window.sendTurn({ playerId: nextPlayerId });

        // Обновляем интерфейс
        drawBoard();
        updatePlayersList();
    });

    // ================== ВЫХОД ИЗ КОМНАТЫ ==================
    window.leaveRoom = function() {
        if (room) {
            room.leave();
            room = null;
        }
        players = {};
        currentTurn = null;
        showScreen('mainMenu');
    };
</script>
</body>
</html>
