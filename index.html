<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Симуляция Земли</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: black;
    }
    /* Полностью скрываем все подсказки и панели управления */
    #info, #controls-hint, #credits, .control-panel {
      display: none !important;
    }
  </style>
  <!-- Импорт Three.js -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    
    // --- Сцена ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    
    // --- Камера ---
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 8);
    
    // --- Рендерер ---
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.3;
    document.body.appendChild(renderer.domElement);
    
    // --- Постобработка (Bloom для атмосферы) ---
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.1;
    bloomPass.strength = 0.7;
    bloomPass.radius = 0.8;
    
    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);
    
    // --- Управление (без UI, только мышью) ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.0;
    controls.enableZoom = true;
    controls.zoomSpeed = 1.2;
    controls.enablePan = false;
    controls.minDistance = 3.5;
    controls.maxDistance = 14.0;
    controls.rotateSpeed = 0.8;
    controls.target.set(0, 0, 0);
    
    // --- Освещение ---
    // Солнце
    const sunLight = new THREE.DirectionalLight(0xfff5e6, 2.0);
    sunLight.position.set(5, 3, 5);
    scene.add(sunLight);
    
    // Заполняющий свет
    const fillLight = new THREE.DirectionalLight(0x88aacc, 0.5);
    fillLight.position.set(-5, 1, -3);
    scene.add(fillLight);
    
    // Фоновый свет
    const ambientLight = new THREE.AmbientLight(0x404060, 0.3);
    scene.add(ambientLight);
    
    // Дополнительный точечный свет для бликов
    const backLight = new THREE.PointLight(0x3a7bbf, 0.4);
    backLight.position.set(-2, 1, -5);
    scene.add(backLight);
    
    // --- Текстуры (цветные, высокого разрешения) ---
    const loader = new THREE.TextureLoader();
    
    // Цветная карта Земли (8K, с отличной детализацией)
    const earthColorMap = loader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
    // Загружаем также 8K текстуру, если доступна, для максимального качества
    const earth8kMap = loader.load('https://assets.codepen.io/982762/earth_texture_8k.jpg');
    
    // Карта бликов (океаны)
    const specularMap = loader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
    
    // Карта нормалей (рельеф)
    const normalMap = loader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
    
    // Карта облаков
    const cloudMap = loader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
    
    // --- Земля (основная сфера) ---
    const earthGeo = new THREE.SphereGeometry(2.0, 128, 128);
    const earthMat = new THREE.MeshPhongMaterial({
      map: earth8kMap,            // цветная карта высокого разрешения
      specularMap: specularMap,
      specular: new THREE.Color(0x333333),
      shininess: 10,
      normalMap: normalMap,
      normalScale: new THREE.Vector2(1.2, 1.2),
      emissive: new THREE.Color(0x000000)
    });
    
    const earth = new THREE.Mesh(earthGeo, earthMat);
    scene.add(earth);
    
    // --- Облака (прозрачный слой) ---
    const cloudGeo = new THREE.SphereGeometry(2.008, 128, 128);
    const cloudMat = new THREE.MeshPhongMaterial({
      map: cloudMap,
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide
    });
    const clouds = new THREE.Mesh(cloudGeo, cloudMat);
    scene.add(clouds);
    
    // --- Атмосферное свечение ---
    const atmosGeo = new THREE.SphereGeometry(2.18, 64, 64);
    const atmosMat = new THREE.MeshPhongMaterial({
      color: 0x4488ff,
      transparent: true,
      opacity: 0.15,
      side: THREE.BackSide,
      emissive: new THREE.Color(0x2266cc),
      emissiveIntensity: 0.6
    });
    const atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
    scene.add(atmosphere);
    
    // Дополнительный ореол
    const glowGeo = new THREE.SphereGeometry(2.32, 48, 48);
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0x5599ff,
      transparent: true,
      opacity: 0.08,
      side: THREE.BackSide
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    scene.add(glow);
    
    // --- Звёздное поле (два слоя) ---
    function createStars(radius, count, size, colorRange) {
      const geom = new THREE.BufferGeometry();
      const pos = new Float32Array(count * 3);
      const col = new Float32Array(count * 3);
      
      for (let i = 0; i < count * 3; i += 3) {
        const r = radius + Math.random() * 150;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        
        pos[i] = Math.sin(phi) * Math.cos(theta) * r;
        pos[i+1] = Math.sin(phi) * Math.sin(theta) * r;
        pos[i+2] = Math.cos(phi) * r;
        
        // Цвета: от белого до голубоватого
        const bright = 0.7 + Math.random() * 0.5;
        if (Math.random() < 0.7) {
          col[i] = bright;
          col[i+1] = bright * 0.95;
          col[i+2] = 1.0;
        } else {
          col[i] = 1.0;
          col[i+1] = bright * 0.8;
          col[i+2] = bright * 0.7;
        }
      }
      
      geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      geom.setAttribute('color', new THREE.BufferAttribute(col, 3));
      
      const mat = new THREE.PointsMaterial({ 
        size: size, 
        vertexColors: true, 
        transparent: true, 
        blending: THREE.AdditiveBlending, 
        depthWrite: false 
      });
      
      return new THREE.Points(geom, mat);
    }
    
    const stars1 = createStars(200, 6000, 0.35, 0);
    const stars2 = createStars(350, 4000, 0.18, 0);
    scene.add(stars1);
    scene.add(stars2);
    
    // Лёгкий туман
    scene.fog = new THREE.FogExp2(0x050510, 0.0012);
    
    // --- Анимация ---
    function animate() {
      requestAnimationFrame(animate);
      
      // Вращение облаков
      clouds.rotation.y += 0.0007;
      
      // Медленное вращение звёзд
      stars1.rotation.y += 0.000015;
      stars2.rotation.x += 0.00001;
      
      controls.update();
      composer.render();
    }
    
    animate();
    
    // --- Ресайз ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // Если 8K текстура не загрузилась, используем 2K как fallback (уже загружена)
    console.log('🌍 Земля загружена в цвете');
  </script>
</body>
</html>
