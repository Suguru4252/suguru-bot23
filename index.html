<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏹 3D Охота — Лесная стрелялка</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel-bg: rgba(10, 10, 10, 0.9);
            --gold: #ffd700;
            --accent: #ff4444;
            --green: #00ff41;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            cursor: none;
        }

        canvas {
            display: block;
        }

        /* Прицел */
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
            width: 30px;
            height: 30px;
        }
        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 6px rgba(255, 0, 0, 0.7);
        }
        .crosshair::before {
            width: 2px;
            height: 24px;
            left: 50%;
            top: 3px;
            transform: translateX(-50%);
        }
        .crosshair::after {
            width: 24px;
            height: 2px;
            top: 50%;
            left: 3px;
            transform: translateY(-50%);
        }
        .crosshair-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: #ff0000;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff0000, 0 0 20px rgba(255, 0, 0, 0.8);
        }

        /* HUD */
        .hud {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 50;
            flex-wrap: wrap;
            gap: 10px;
        }
        .hud-panel {
            background: var(--panel-bg);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 12px 18px;
            color: #fff;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            min-width: 100px;
        }
        .hud-label {
            font-size: 0.7em;
            color: #aaa;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .hud-value {
            font-size: 1.6em;
            font-weight: 900;
            letter-spacing: 1px;
        }
        .gold {
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        .red {
            color: #ff4444;
            text-shadow: 0 0 15px rgba(255, 68, 68, 0.5);
        }
        .green {
            color: #00ff41;
            text-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
        }

        /* Сообщения */
        .message-center {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateY(60px);
            pointer-events: none;
            z-index: 80;
            text-align: center;
        }
        .kill-msg {
            color: #ffd700;
            font-size: 1.2em;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            animation: killFloat 1.5s ease-out forwards;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        @keyframes killFloat {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px);
            }
        }
        .hit-marker {
            position: fixed;
            pointer-events: none;
            z-index: 90;
            color: #fff;
            font-size: 1.5em;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            animation: hitPop 0.5s ease-out forwards;
        }
        @keyframes hitPop {
            0% {
                opacity: 1;
                transform: scale(1.5);
            }
            100% {
                opacity: 0;
                transform: scale(0.5);
            }
        }

        /* Управление подсказка */
        .controls-hint {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 8px 20px;
            color: #ccc;
            font-size: 0.8em;
            letter-spacing: 1px;
            z-index: 60;
            pointer-events: none;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            transition: opacity 1s;
        }

        /* Ползунок чувствительности */
        .sensitivity-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            padding: 10px 16px;
            z-index: 70;
            pointer-events: all;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ccc;
            font-size: 0.8em;
        }
        .sensitivity-panel input[type="range"] {
            width: 100px;
            accent-color: #ffd700;
        }
        .sensitivity-value {
            color: #ffd700;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .hud {
                padding: 8px 12px;
            }
            .hud-panel {
                padding: 8px 12px;
                border-radius: 10px;
            }
            .hud-value {
                font-size: 1.1em;
            }
            .controls-hint {
                font-size: 0.65em;
                padding: 6px 12px;
            }
            .sensitivity-panel {
                top: 60px;
                right: 8px;
                padding: 6px 10px;
                font-size: 0.7em;
            }
            .sensitivity-panel input[type="range"] {
                width: 70px;
            }
        }
    </style>
</head>
<body>
    <!-- Прицел -->
    <div class="crosshair">
        <div class="crosshair-dot"></div>
    </div>

    <!-- HUD -->
    <div class="hud">
        <div class="hud-panel">
            <div class="hud-label">💰 Монеты</div>
            <div class="hud-value gold" id="hudCoins">0</div>
        </div>
        <div class="hud-panel">
            <div class="hud-label">🔫 Патроны</div>
            <div class="hud-value green" id="hudAmmo">∞</div>
        </div>
        <div class="hud-panel">
            <div class="hud-label">💀 Убито</div>
            <div class="hud-value red" id="hudKills">0</div>
        </div>
        <div class="hud-panel">
            <div class="hud-label">🎯 Оружие</div>
            <div class="hud-value" style="font-size:1em;" id="hudWeapon">🏹 Лук</div>
        </div>
    </div>

    <!-- Подсказка управления -->
    <div class="controls-hint" id="controlsHint">
        🎮 WASD — ходить | 🖱️ Мышь — смотреть | 🖱️ ЛКМ — стрелять | 🔢 1-5 — оружие | R — перезарядка
    </div>

    <!-- Ползунок чувствительности -->
    <div class="sensitivity-panel" id="sensitivityPanel">
        🖱️ Чувств:
        <input type="range" id="sensitivitySlider" min="0.1" max="2.0" step="0.1" value="0.6">
        <span class="sensitivity-value" id="sensitivityValue">0.6</span>
    </div>

    <!-- Сообщения -->
    <div class="message-center" id="messageCenter"></div>

    <!-- Импорт Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.157.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== ЧУВСТВИТЕЛЬНОСТЬ ====================
        let mouseSensitivity = 0.6;
        const sensitivitySlider = document.getElementById('sensitivitySlider');
        const sensitivityValue = document.getElementById('sensitivityValue');

        sensitivitySlider.addEventListener('input', () => {
            mouseSensitivity = parseFloat(sensitivitySlider.value);
            sensitivityValue.textContent = mouseSensitivity.toFixed(1);
        });

        // ==================== СОСТОЯНИЕ ИГРЫ ====================
        const state = {
            coins: 0,
            kills: 0,
            ammo: Infinity,
            currentWeaponIndex: 0,
            weapons: [
                { name: '🏹 Лук', damage: 25, ammo: Infinity, color: 0x8B4513, fireRate: 0.6 },
                { name: '🔫 Винтовка', damage: 55, ammo: 30, color: 0x444444, fireRate: 0.3 },
                { name: '💥 Дробовик', damage: 80, ammo: 12, color: 0x666666, fireRate: 0.8 },
                { name: '🔭 Снайперка', damage: 150, ammo: 8, color: 0x222222, fireRate: 1.2 },
                { name: '🔥 Пулемёт', damage: 35, ammo: 100, color: 0x333333, fireRate: 0.1 },
            ],
            canShoot: true,
            animals: [],
            maxAnimals: 12,
        };

        // ==================== THREE.JS ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 30, 150);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.5, 300);
        camera.position.set(0, 3.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ==================== ОСВЕЩЕНИЕ ====================
        const ambientLight = new THREE.AmbientLight(0x8899aa, 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 4.5);
        sunLight.position.set(40, 50, 20);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 200;
        sunLight.shadow.camera.left = -60;
        sunLight.shadow.camera.right = 60;
        sunLight.shadow.camera.top = 60;
        sunLight.shadow.camera.bottom = -60;
        sunLight.shadow.bias = -0.0001;
        scene.add(sunLight);

        const hemisphereLight = new THREE.HemisphereLight(0x87ceeb, 0x3d7a3d, 0.5);
        scene.add(hemisphereLight);

        // ==================== ЗЕМЛЯ ====================
        const groundGeometry = new THREE.PlaneGeometry(200, 200);
        const groundMaterial = new THREE.MeshStandardMaterial({
            color: 0x4a8c3f,
            roughness: 0.9,
            metalness: 0.05,
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Трава (много мелких плоскостей)
        const grassGroup = new THREE.Group();
        for (let i = 0; i < 800; i++) {
            const x = (Math.random() - 0.5) * 100;
            const z = (Math.random() - 0.5) * 100;
            if (Math.abs(x) < 6 && Math.abs(z) < 6) continue;
            const blade = new THREE.Mesh(
                new THREE.PlaneGeometry(0.15, 0.5 + Math.random() * 0.7),
                new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(0.25 + Math.random() * 0.15, 0.7, 0.25 + Math.random() * 0.2),
                    side: THREE.DoubleSide,
                    roughness: 0.9,
                })
            );
            blade.position.set(x, 0.2, z);
            blade.rotation.y = Math.random() * Math.PI;
            blade.rotation.x = -0.2 + Math.random() * 0.4;
            blade.castShadow = true;
            blade.receiveShadow = true;
            grassGroup.add(blade);
        }
        scene.add(grassGroup);

        // ==================== ДЕРЕВЬЯ ====================
        function createTree(x, z, scale = 1) {
            const tree = new THREE.Group();

            // Ствол
            const trunkGeo = new THREE.CylinderGeometry(0.4 * scale, 0.55 * scale, 5 * scale, 8);
            const trunkMat = new THREE.MeshStandardMaterial({
                color: 0x6b3a1f,
                roughness: 0.8,
                metalness: 0.05,
            });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 2.5 * scale;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            tree.add(trunk);

            // Крона (несколько сфер)
            const crownColors = [0x3d7a3d, 0x2d6a2d, 0x4a8c3f, 0x357535];
            for (let i = 0; i < 4; i++) {
                const crownGeo = new THREE.SphereGeometry(1.6 * scale * (0.7 + Math.random() * 0.6), 10, 8);
                const crownMat = new THREE.MeshStandardMaterial({
                    color: crownColors[Math.floor(Math.random() * crownColors.length)],
                    roughness: 0.7,
                    metalness: 0.02,
                });
                const crown = new THREE.Mesh(crownGeo, crownMat);
                crown.position.y = 5 * scale + i * 1.2 * scale;
                crown.position.x = (Math.random() - 0.5) * 1.5 * scale;
                crown.position.z = (Math.random() - 0.5) * 1.5 * scale;
                crown.scale.set(
                    0.8 + Math.random() * 0.6,
                    0.6 + Math.random() * 0.5,
                    0.8 + Math.random() * 0.6
                );
                crown.castShadow = true;
                crown.receiveShadow = true;
                tree.add(crown);
            }

            tree.position.set(x, 0, z);
            scene.add(tree);
            return tree;
        }

        // Размещаем деревья
        const trees = [];
        for (let i = 0; i < 60; i++) {
            const x = (Math.random() - 0.5) * 80;
            const z = (Math.random() - 0.5) * 80;
            if (Math.abs(x) < 7 && Math.abs(z) < 7) continue;
            const s = 0.6 + Math.random() * 1.4;
            trees.push(createTree(x, z, s));
        }

        // ==================== КАМНИ ====================
        for (let i = 0; i < 25; i++) {
            const x = (Math.random() - 0.5) * 70;
            const z = (Math.random() - 0.5) * 70;
            if (Math.abs(x) < 5 && Math.abs(z) < 5) continue;
            const rockGeo = new THREE.IcosahedronGeometry(0.4 + Math.random() * 1.2, 1);
            const rockMat = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(0.08, 0.05, 0.35 + Math.random() * 0.3),
                roughness: 0.7,
                metalness: 0.1,
            });
            const rock = new THREE.Mesh(rockGeo, rockMat);
            rock.position.set(x, 0.1, z);
            rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
        }

        // ==================== ЦВЕТЫ ====================
        for (let i = 0; i < 200; i++) {
            const x = (Math.random() - 0.5) * 60;
            const z = (Math.random() - 0.5) * 60;
            if (Math.abs(x) < 4 && Math.abs(z) < 4) continue;
            const flowerGroup = new THREE.Group();
            const stemGeo = new THREE.CylinderGeometry(0.03, 0.04, 0.5, 6);
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.8 });
            const stem = new THREE.Mesh(stemGeo, stemMat);
            stem.position.y = 0.25;
            flowerGroup.add(stem);
            const petalGeo = new THREE.SphereGeometry(0.12, 6, 4);
            const petalMat = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(Math.random() * 0.9, 0.8, 0.5 + Math.random() * 0.4),
                roughness: 0.4,
            });
            const petal = new THREE.Mesh(petalGeo, petalMat);
            petal.position.y = 0.5;
            flowerGroup.add(petal);
            flowerGroup.position.set(x, 0, z);
            scene.add(flowerGroup);
        }

        // ==================== ЖИВОТНЫЕ ====================
        const animalTypes = [
            { name: 'Заяц', color: 0xd4a574, size: 0.7, speed: 3.5, price: 20, hp: 25, bodyColor: 0xc4956a },
            { name: 'Лиса', color: 0xe87722, size: 0.9, speed: 4.5, price: 45, hp: 50, bodyColor: 0xd4651f },
            { name: 'Олень', color: 0x8b5e3c, size: 1.5, speed: 5.5, price: 100, hp: 80, bodyColor: 0x7a4e2d },
            { name: 'Кабан', color: 0x4a3728, size: 1.2, speed: 3.8, price: 160, hp: 120, bodyColor: 0x3d2b1f },
            { name: 'Медведь', color: 0x5c4033, size: 2.0, speed: 2.5, price: 350, hp: 200, bodyColor: 0x4a3528 },
            { name: 'Волк', color: 0x808080, size: 1.0, speed: 5.0, price: 130, hp: 90, bodyColor: 0x6e6e6e },
        ];

        function createAnimal(type) {
            const group = new THREE.Group();
            const s = type.size;

            // Тело
            const bodyGeo = new THREE.SphereGeometry(0.7 * s, 10, 8);
            bodyGeo.scale(1, 0.7, 1.3);
            const bodyMat = new THREE.MeshStandardMaterial({
                color: type.bodyColor,
                roughness: 0.6,
                metalness: 0.05,
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.8 * s;
            body.castShadow = true;
            group.add(body);

            // Голова
            const headGeo = new THREE.SphereGeometry(0.4 * s, 8, 8);
            const headMat = new THREE.MeshStandardMaterial({
                color: type.color,
                roughness: 0.5,
                metalness: 0.05,
            });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.set(0, 1.2 * s, 0.7 * s);
            head.castShadow = true;
            group.add(head);

            // Уши (для зайца, оленя)
            if (type.name === 'Заяц' || type.name === 'Олень') {
                for (let side = -1; side <= 1; side += 2) {
                    const earGeo = new THREE.ConeGeometry(0.12 * s, 0.6 * s, 6);
                    const ear = new THREE.Mesh(earGeo, new THREE.MeshStandardMaterial({
                        color: type.name === 'Заяц' ? 0xe8c9a0 : 0x8b5e3c,
                        roughness: 0.5,
                    }));
                    ear.position.set(side * 0.25 * s, 1.5 * s, 0.6 * s);
                    ear.rotation.x = -0.3;
                    ear.rotation.z = side * 0.2;
                    ear.castShadow = true;
                    group.add(ear);
                }
            }

            // Рога (олень)
            if (type.name === 'Олень') {
                for (let side = -1; side <= 1; side += 2) {
                    const antlerGeo = new THREE.CylinderGeometry(0.05 * s, 0.08 * s, 0.8 * s, 6);
                    const antler = new THREE.Mesh(antlerGeo, new THREE.MeshStandardMaterial({
                        color: 0x4a3520,
                        roughness: 0.7,
                    }));
                    antler.position.set(side * 0.3 * s, 1.4 * s, 0.5 * s);
                    antler.rotation.z = side * 0.4;
                    antler.rotation.x = -0.3;
                    antler.castShadow = true;
                    group.add(antler);
                }
            }

            // Ноги
            for (let front = -1; front <= 1; front += 2) {
                for (let side = -1; side <= 1; side += 2) {
                    const legGeo = new THREE.CylinderGeometry(0.12 * s, 0.14 * s, 0.7 * s, 6);
                    const leg = new THREE.Mesh(legGeo, new THREE.MeshStandardMaterial({
                        color: type.bodyColor,
                        roughness: 0.7,
                    }));
                    leg.position.set(side * 0.3 * s, 0.35 * s, front * 0.5 * s);
                    leg.castShadow = true;
                    group.add(leg);
                }
            }

            // Хвост
            const tailGeo = new THREE.SphereGeometry(0.2 * s, 6, 6);
            const tail = new THREE.Mesh(tailGeo, new THREE.MeshStandardMaterial({
                color: type.name === 'Лиса' ? 0xffffff : type.bodyColor,
                roughness: 0.5,
            }));
            tail.position.set(0, 0.9 * s, -0.8 * s);
            group.add(tail);

            // Случайная позиция
            const angle = Math.random() * Math.PI * 2;
            const distance = 15 + Math.random() * 35;
            group.position.set(
                Math.cos(angle) * distance,
                0,
                Math.sin(angle) * distance
            );
            group.rotation.y = Math.random() * Math.PI * 2;

            group.userData = {
                type: type,
                hp: type.hp,
                maxHp: type.hp,
                speed: type.speed,
                alive: true,
                wanderTimer: Math.random() * 3,
                wanderAngle: Math.random() * Math.PI * 2,
            };

            scene.add(group);
            return group;
        }

        // ==================== ЧАСТИЦЫ ====================
        const particles = [];
        function spawnParticles(position, color, count = 15) {
            for (let i = 0; i < count; i++) {
                const geo = new THREE.SphereGeometry(0.08, 4, 4);
                const mat = new THREE.MeshStandardMaterial({
                    color: color,
                    roughness: 0.3,
                    emissive: color,
                    emissiveIntensity: 0.6,
                });
                const particle = new THREE.Mesh(geo, mat);
                particle.position.copy(position);
                particle.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 5,
                        Math.random() * 6 + 2,
                        (Math.random() - 0.5) * 5
                    ),
                    life: 0.7 + Math.random() * 0.6,
                };
                scene.add(particle);
                particles.push(particle);
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.userData.life -= dt;
                if (p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                } else {
                    p.userData.velocity.y -= 9.8 * dt;
                    p.position.add(p.userData.velocity.clone().multiplyScalar(dt));
                    p.scale.setScalar(p.userData.life / 0.7);
                }
            }
        }

        // ==================== ОРУЖИЕ (визуал) ====================
        const weaponGroup = new THREE.Group();
        const weaponBarrel = new THREE.Mesh(
            new THREE.CylinderGeometry(0.06, 0.07, 0.8, 8),
            new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.3, metalness: 0.9 })
        );
        weaponBarrel.rotation.x = Math.PI / 2;
        weaponBarrel.position.set(0.3, -0.2, -0.6);
        weaponGroup.add(weaponBarrel);

        const weaponBody = new THREE.Mesh(
            new THREE.BoxGeometry(0.15, 0.2, 0.4),
            new THREE.MeshStandardMaterial({ color: 0x5c3a21, roughness: 0.5, metalness: 0.3 })
        );
        weaponBody.position.set(0.25, -0.25, -0.35);
        weaponGroup.add(weaponBody);

        weaponGroup.position.set(0.4, -0.35, -0.8);
        camera.add(weaponGroup);
        scene.add(camera);

        // Вспышка выстрела
        const muzzleFlash = new THREE.PointLight(0xffaa00, 0, 20);
        muzzleFlash.position.set(0.3, -0.2, -1.1);
        camera.add(muzzleFlash);

        function muzzleFlashEffect() {
            muzzleFlash.intensity = 15;
            setTimeout(() => { muzzleFlash.intensity = 0; }, 60);
        }

        // ==================== УПРАВЛЕНИЕ ====================
        const keys = {};
        let mouseDown = false;
        const mouse = { x: 0, y: 0 };
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let isLocked = false;

        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            // Смена оружия
            if (e.key >= '1' && e.key <= '5') {
                const index = parseInt(e.key) - 1;
                if (index < state.weapons.length) {
                    state.currentWeaponIndex = index;
                    const w = state.weapons[index];
                    state.ammo = w.ammo;
                    updateHUD();
                    updateWeaponColor();
                    showMessage(`Экипировано: ${w.name}`, '#ffd700');
                }
            }
            // Перезарядка
            if (e.key.toLowerCase() === 'r') {
                const w = state.weapons[state.currentWeaponIndex];
                state.ammo = w.ammo;
                updateHUD();
                showMessage('Перезарядка!', '#00ff41');
            }
        });
        document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        document.addEventListener('mousemove', (e) => {
            if (!isLocked) return;
            // ИСПРАВЛЕНО: Уменьшена чувствительность (было 0.002, стало с учётом слайдера)
            // ИСПРАВЛЕНО: Инверсия Y — теперь movementY ВЫЧИТАЕТСЯ (вверх = вверх)
            mouse.x += e.movementX * 0.0008 * mouseSensitivity;
            mouse.y -= e.movementY * 0.0008 * mouseSensitivity; // МИНУС — убрана инверсия!
            // Ограничение по вертикали
            mouse.y = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, mouse.y));
        });

        document.addEventListener('mousedown', (e) => {
            if (e.button === 0) mouseDown = true;
        });
        document.addEventListener('mouseup', (e) => {
            if (e.button === 0) mouseDown = false;
        });

        renderer.domElement.addEventListener('click', () => {
            if (!isLocked) {
                renderer.domElement.requestPointerLock();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === renderer.domElement;
            if (!isLocked) {
                document.getElementById('controlsHint').style.opacity = '0';
                document.getElementById('sensitivityPanel').style.opacity = '0.4';
            } else {
                document.getElementById('controlsHint').style.opacity = '1';
                document.getElementById('sensitivityPanel').style.opacity = '1';
            }
        });

        function updateWeaponColor() {
            const w = state.weapons[state.currentWeaponIndex];
            weaponBarrel.material.color.set(w.color);
            weaponBody.material.color.set(
                w.name.includes('Лук') ? 0x8B4513 :
                w.name.includes('Снайпер') ? 0x1a1a1a : 0x444444
            );
        }

        // ==================== СТРЕЛЬБА ====================
        const raycaster = new THREE.Raycaster();

        function shoot() {
            if (!state.canShoot || !isLocked) return;
            const weapon = state.weapons[state.currentWeaponIndex];

            if (state.ammo !== Infinity && state.ammo <= 0) {
                showMessage('Нет патронов! Нажми R для перезарядки.', '#ff4444');
                return;
            }

            if (state.ammo !== Infinity) state.ammo--;

            state.canShoot = false;
            setTimeout(() => { state.canShoot = true; }, weapon.fireRate * 1000);

            muzzleFlashEffect();

            // Отдача
            mouse.y += 0.01; // Отдача вверх (плюс, потому что у нас Y инвертирован)
            weaponGroup.position.z += 0.08;
            setTimeout(() => { weaponGroup.position.z -= 0.08; }, 80);

            // Raycast
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(state.animals, true);

            if (intersects.length > 0) {
                let hitAnimal = null;
                let obj = intersects[0].object;
                while (obj) {
                    if (obj.userData && obj.userData.type && obj.userData.alive) {
                        hitAnimal = obj;
                        break;
                    }
                    obj = obj.parent;
                }

                if (hitAnimal) {
                    const data = hitAnimal.userData;
                    data.hp -= weapon.damage;
                    const pos = intersects[0].point.clone();

                    spawnParticles(pos, 0xff0000, 8);
                    showHitMarker();

                    if (data.hp <= 0) {
                        data.alive = false;
                        state.kills++;
                        state.coins += data.type.price;
                        spawnParticles(pos, 0xffd700, 20);
                        spawnParticles(pos, 0xff0000, 15);
                        showMessage(`💀 ${data.type.name} убит! +${data.type.price}🪙`, '#ffd700');

                        hitAnimal.rotation.x = Math.PI / 2;
                        hitAnimal.position.y = -0.3;
                        hitAnimal.scale.setScalar(0.3);

                        setTimeout(() => {
                            scene.remove(hitAnimal);
                            const idx = state.animals.indexOf(hitAnimal);
                            if (idx > -1) state.animals.splice(idx, 1);
                        }, 2000);
                    }
                    updateHUD();
                }
            } else {
                const farPoint = raycaster.ray.at(50, new THREE.Vector3());
                spawnParticles(farPoint, 0xaa9966, 5);
            }
        }

        // ==================== HUD И СООБЩЕНИЯ ====================
        function updateHUD() {
            document.getElementById('hudCoins').textContent = state.coins;
            document.getElementById('hudKills').textContent = state.kills;
            document.getElementById('hudAmmo').textContent = state.ammo === Infinity ? '∞' : state.ammo;
            document.getElementById('hudWeapon').textContent = state.weapons[state.currentWeaponIndex].name;
        }

        function showMessage(text, color) {
            const msg = document.createElement('div');
            msg.className = 'kill-msg';
            msg.textContent = text;
            msg.style.color = color;
            document.getElementById('messageCenter').appendChild(msg);
            setTimeout(() => msg.remove(), 1500);
        }

        function showHitMarker() {
            const marker = document.createElement('div');
            marker.className = 'hit-marker';
            marker.textContent = '✕';
            marker.style.left = '50%';
            marker.style.top = '50%';
            marker.style.transform = 'translate(-50%, -50%)';
            document.body.appendChild(marker);
            setTimeout(() => marker.remove(), 500);
        }

        // ==================== ИГРОВОЙ ЦИКЛ ====================
        const clock = new THREE.Clock();
        let animalSpawnTimer = 0;

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);

            // Спавн животных
            animalSpawnTimer += dt;
            if (state.animals.length < state.maxAnimals && animalSpawnTimer > 2.5) {
                animalSpawnTimer = 0;
                const type = animalTypes[Math.floor(Math.random() * animalTypes.length)];
                const animal = createAnimal(type);
                state.animals.push(animal);
            }

            // Движение игрока
            if (isLocked) {
                euler.setFromQuaternion(camera.quaternion);
                euler.y += mouse.x;
                euler.x += mouse.y;
                euler.x = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, euler.x));
                camera.quaternion.setFromEuler(euler);
                // Затухание движения мыши
                mouse.x *= 0.85;
                mouse.y *= 0.85;

                velocity.x = 0;
                velocity.z = 0;
                direction.set(0, 0, -1).applyQuaternion(camera.quaternion);
                direction.y = 0;
                direction.normalize();

                const speed = 8;
                const forward = direction.clone();
                const right = new THREE.Vector3().crossVectors(camera.up, direction).normalize();

                if (keys['w']) velocity.add(forward);
                if (keys['s']) velocity.sub(forward);
                if (keys['a']) velocity.sub(right);
                if (keys['d']) velocity.add(right);

                if (velocity.length() > 0) {
                    velocity.normalize().multiplyScalar(speed * dt);
                    camera.position.add(velocity);
                }

                // Стрельба
                if (mouseDown) {
                    shoot();
                }
            }

            // ИИ животных
            state.animals.forEach(animal => {
                if (!animal.userData.alive) return;
                const data = animal.userData;
                const distToPlayer = animal.position.distanceTo(camera.position);

                if (distToPlayer < 12 || data.hp < data.maxHp * 0.5) {
                    const away = animal.position.clone().sub(camera.position).normalize();
                    const fleeSpeed = data.type.speed * 1.5;
                    animal.position.x += away.x * fleeSpeed * dt;
                    animal.position.z += away.z * fleeSpeed * dt;
                    animal.rotation.y = Math.atan2(away.x, away.z);
                } else {
                    data.wanderTimer -= dt;
                    if (data.wanderTimer <= 0) {
                        data.wanderTimer = 2 + Math.random() * 4;
                        data.wanderAngle += (Math.random() - 0.5) * 2;
                    }
                    animal.position.x += Math.sin(data.wanderAngle) * data.type.speed * 0.5 * dt;
                    animal.position.z += Math.cos(data.wanderAngle) * data.type.speed * 0.5 * dt;
                    animal.rotation.y += (data.wanderAngle - animal.rotation.y) * 2 * dt;
                }

                animal.position.x = Math.max(-45, Math.min(45, animal.position.x));
                animal.position.z = Math.max(-45, Math.min(45, animal.position.z));
                animal.position.y = Math.abs(Math.sin(Date.now() * 0.004 + animal.id)) * 0.2;
            });

            updateParticles(dt);
            sunLight.position.x += dt * 0.5;
            renderer.render(scene, camera);
        }

        // ==================== РЕСАЙЗ ====================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==================== СТАРТ ====================
        function init() {
            for (let i = 0; i < 8; i++) {
                const type = animalTypes[Math.floor(Math.random() * animalTypes.length)];
                const animal = createAnimal(type);
                state.animals.push(animal);
            }
            updateHUD();
            updateWeaponColor();
            showMessage('🎯 Кликни для захвата мыши | WASD — ходить | ЛКМ — стрелять', '#ffffff');
            document.getElementById('controlsHint').style.opacity = '1';
            document.getElementById('sensitivityPanel').style.opacity = '0.4';
            animate();
        }

        init();
        console.log('🏹 3D Охота готова!');
        console.log('🎮 WASD — ходить | 🖱️ Мышь — смотреть | 🖱️ ЛКМ — стрелять | 1-5 — оружие | R — перезарядка');
        console.log('🖱️ Ползунок чувствительности мыши — справа сверху');
    </script>
</body>
</html>
