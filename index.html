<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Mobile Sandbox</title>

<style>
body { margin:0; overflow:hidden; }

#joystick {
    position: absolute;
    bottom: 80px;
    left: 40px;
    width: 120px;
    height: 120px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    touch-action: none;
}

#stick {
    width: 60px;
    height: 60px;
    background: white;
    border-radius: 50%;
    position: relative;
    top: 30px;
    left: 30px;
}

button {
    position: absolute;
    right: 20px;
    padding: 10px;
}

#place { bottom: 200px; }
#view { bottom: 140px; }
#clear { bottom: 80px; }
</style>
</head>

<body>

<div id="joystick"><div id="stick"></div></div>
<button id="place">Поставить</button>
<button id="view">Сменить вид</button>
<button id="clear">Очистить мир</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// Свет
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// Пол
let plane = new THREE.Mesh(
    new THREE.PlaneGeometry(100,100),
    new THREE.MeshStandardMaterial({color:0x55aa55})
);
plane.rotation.x = -Math.PI/2;
scene.add(plane);

// Игрок
let player = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color:0x0000ff})
);
player.position.y = 1;
scene.add(player);

let blocks = [];

// ================== СОХРАНЕНИЕ ==================

function saveWorld(){
    let data = blocks.map(b => ({
        x: b.position.x,
        y: b.position.y,
        z: b.position.z
    }));
    localStorage.setItem("world", JSON.stringify(data));
}

function loadWorld(){
    let data = JSON.parse(localStorage.getItem("world") || "[]");

    data.forEach(pos => {
        let block = new THREE.Mesh(
            new THREE.BoxGeometry(1,1,1),
            new THREE.MeshStandardMaterial({color:0xaaaaaa})
        );

        block.position.set(pos.x, pos.y, pos.z);
        scene.add(block);
        blocks.push(block);
    });
}

// Загружаем мир
loadWorld();

// ================== КАМЕРА ==================

let thirdPerson = true;
let rotX = 0, rotY = 0;

// ================== ДЖОЙСТИК ==================

let joystick = document.getElementById("joystick");
let stick = document.getElementById("stick");

let moveX = 0, moveZ = 0;

joystick.addEventListener("touchmove", e => {
    let t = e.touches[0];
    let rect = joystick.getBoundingClientRect();
    let x = t.clientX - rect.left - 60;
    let y = t.clientY - rect.top - 60;

    moveX = x / 40;
    moveZ = y / 40;

    stick.style.transform = `translate(${x}px,${y}px)`;
});

joystick.addEventListener("touchend", () => {
    moveX = 0;
    moveZ = 0;
    stick.style.transform = `translate(0px,0px)`;
});

// ================== ВРАЩЕНИЕ КАМЕРЫ ==================

window.addEventListener("touchmove", e => {
    if(e.touches.length === 1){
        rotY += e.touches[0].movementX * 0.002;
        rotX += e.touches[0].movementY * 0.002;
    }
});

// ================== ЗУМ ==================

window.addEventListener("wheel", e => {
    camera.position.z += e.deltaY * 0.01;
});

// ================== ПОСТАВИТЬ БЛОК ==================

document.getElementById("place").onclick = () => {
    let block = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        new THREE.MeshStandardMaterial({color:0xaaaaaa})
    );

    block.position.set(
        Math.round(player.position.x),
        0.5,
        Math.round(player.position.z - 2)
    );

    scene.add(block);
    blocks.push(block);

    saveWorld(); // СОХРАНЕНИЕ
};

// ================== УДАЛЕНИЕ БЛОКА ==================

let holdTime = 0;

renderer.domElement.addEventListener("touchstart", () => {
    holdTime = Date.now();
});

renderer.domElement.addEventListener("touchend", () => {
    if(Date.now() - holdTime > 4000){

        let raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0,0), camera);

        let intersects = raycaster.intersectObjects(blocks);

        if(intersects.length > 0){
            let obj = intersects[0].object;

            scene.remove(obj);
            blocks = blocks.filter(b => b !== obj);

            saveWorld(); // СОХРАНЕНИЕ
        }
    }
});

// ================== СМЕНА ВИДА ==================

document.getElementById("view").onclick = () => {
    thirdPerson = !thirdPerson;
};

// ================== ОЧИСТКА МИРА ==================

document.getElementById("clear").onclick = () => {
    blocks.forEach(b => scene.remove(b));
    blocks = [];
    localStorage.removeItem("world");
};

// ================== ДВИЖЕНИЕ ==================

function updatePlayer(){
    player.position.x -= moveX * 0.1;
    player.position.z += moveZ * 0.1;
}

// ================== КАМЕРА ==================

function updateCamera(){
    if(thirdPerson){
        camera.position.x = player.position.x + Math.sin(rotY) * 5;
        camera.position.z = player.position.z + Math.cos(rotY) * 5;
        camera.position.y = player.position.y + 3;
        camera.lookAt(player.position);
    } else {
        camera.position.copy(player.position);
        camera.position.y += 1.5;
        camera.rotation.y = rotY;
    }
}

// ================== РЕНДЕР ==================

function animate(){
    requestAnimationFrame(animate);

    updatePlayer();
    updateCamera();

    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
