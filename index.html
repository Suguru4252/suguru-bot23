<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💪 СИМУЛЯТОР КАЧКА · РОБЛОКС СТИЛЬ</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
    }

    .game-container {
      background: #1e2e3b;
      border-radius: 48px;
      padding: 24px 28px 32px;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      border-bottom: 6px solid #00b8a0;
    }

    canvas {
      display: block;
      margin: 0 auto;
      width: 100%;
      max-width: 700px;
      height: auto;
      border-radius: 28px;
      background: radial-gradient(circle at 20% 20%, #3d5a73, #1f3a4b);
      box-shadow: inset 0 8px 12px rgba(0,0,0,0.5), 0 10px 18px rgba(0,0,0,0.3);
      border: 2px solid #2d4e63;
      cursor: pointer;
      transition: transform 0.05s;
    }
    canvas:active {
      transform: scale(0.99);
    }

    .stats-panel {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: #15262e;
      padding: 14px 22px;
      border-radius: 60px;
      box-shadow: inset 0 4px 6px #0b141a, 0 6px 8px #0e1a22;
      border-bottom: 3px solid #2ea88f;
    }

    .strength-box {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon {
      font-size: 34px;
      filter: drop-shadow(0 4px 4px #00000066);
    }

    .strength-value {
      background: #0b1b24;
      padding: 8px 22px;
      border-radius: 50px;
      box-shadow: inset 0 2px 5px black, 0 4px 0 #0a141c;
      color: #f5e56b;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: 1px;
      text-shadow: 0 3px 0 #7f5f00;
      border-bottom: 2px solid #c9a227;
      min-width: 110px;
      text-align: center;
    }

    .weight-display {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1f3440;
      padding: 6px 18px;
      border-radius: 40px;
      box-shadow: inset 0 1px 4px #0f1c24;
    }

    .dumbbell-label {
      font-size: 22px;
    }

    .weight-number {
      background: #1d2e38;
      color: #b1e6e0;
      font-weight: bold;
      font-size: 22px;
      padding: 5px 18px;
      border-radius: 30px;
      box-shadow: inset 0 1px 3px black;
      border-left: 2px solid #3fbcb0;
    }

    .reset-btn {
      background: #3a2c1f;
      border: none;
      color: #ffddaa;
      font-weight: bold;
      font-size: 18px;
      padding: 10px 22px;
      border-radius: 40px;
      box-shadow: 0 6px 0 #1f160e, 0 2px 8px black;
      cursor: pointer;
      transition: 0.07s;
      border-bottom: 2px solid #b77e2e;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .reset-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #1f160e, 0 2px 8px black;
    }

    .hint {
      color: #aac7db;
      font-size: 15px;
      font-weight: 500;
      margin-left: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .hint span {
      background: #2e4a5b;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <!-- Холст, где происходит вся магия -->
  <canvas id="gameCanvas" width="700" height="500"></canvas>

  <div class="stats-panel">
    <div class="strength-box">
      <span class="icon">🏋️</span>
      <div class="strength-value" id="strengthDisplay">0</div>
    </div>

    <div class="weight-display">
      <span class="dumbbell-label">🏋️‍♂️ ГАНТЕЛИ</span>
      <span class="weight-number" id="weightDisplay">5 кг</span>
    </div>

    <button class="reset-btn" id="resetButton">🔄 СБРОС</button>
  </div>

  <div class="hint">
    <span>👇 ЖМИ НА ГАНТЕЛИ · КАЧАЙ СИЛУ · РАСТИ</span>
    <span style="margin-left: auto;">⚡ROBLOX STYLE⚡</span>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ----- КАНВАС И КОНТЕКСТ -----
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ----- DOM ЭЛЕМЕНТЫ -----
    const strengthDisplay = document.getElementById('strengthDisplay');
    const weightDisplay = document.getElementById('weightDisplay');

    // ----- СОСТОЯНИЕ ИГРЫ (СИЛА / УРОВЕНЬ) -----
    let strength = 0;                // текущая сила (очки)
    let dumbbellWeight = 5;          // вес гантели (кг), растёт с силой
    
    // ----- ДЛЯ АНИМАЦИИ И КЛИКОВ -----
    let clickEffect = 0;             // 0..1 для анимации подъема
    let lastClickTime = 0;
    
    // Визуальное отображение размера персонажа (чем больше сила, тем больше)
    // Базовый размер туловища будет масштабироваться
    
    // ----- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ -----
    function calculateWeightFromStrength(str) {
      // Формула: стартовый вес 5 кг, каждые 10 силы +1 кг, но также плавное увеличение
      // Делаем чтобы вес чувствовался: вес = 5 + floor(strength / 8) + (strength % 8) * 0.125 ?
      // Сделаем наглядно: каждые 8 силы = +1 кг. + небольшой бонус от круглых значений.
      const base = 5;
      const increment = Math.floor(strength / 7);  // каждые 7 силы +1 кг (динамично)
      const extra = (strength % 7) * 0.14;         // плавное изменение
      return Math.round((base + increment + extra) * 10) / 10;
    }

    function updateWeightDisplay() {
      dumbbellWeight = calculateWeightFromStrength(strength);
      weightDisplay.textContent = dumbbellWeight.toFixed(1) + ' кг';
    }

    function updateStrengthUI() {
      strengthDisplay.textContent = Math.floor(strength);
    }

    // Сброс всего прогресса
    function resetGame() {
      strength = 0;
      clickEffect = 0;
      updateWeightDisplay();
      updateStrengthUI();
      // Перерисовываем
      drawCanvas();
    }

    // Обработка клика (кач)
    function handleLift(e) {
      // Определим, попали ли по области гантели (для реализма, но клик везде — кач)
      // Но добавим небольшой отклик: если клик далеко от персонажа — всё равно качаем,
      // но всё же проверим координаты, чтобы можно было "бить" по гантелям.
      
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;   // обычно 1 если css совпадает
      const scaleY = canvas.height / rect.height;
      
      const mouseX = (e.clientX - rect.left) * scaleX;
      const mouseY = (e.clientY - rect.top) * scaleY;
      
      // ВСЕГДА добавляем силу, но для эффекта "попадания" подсветим, если попали в гантель
      let hitDumbbell = false;
      
      // Вычислим примерные координаты гантелей (они рисуются относительно персонажа)
      // Персонаж центр: (350, 270) примерно
      const charX = 350, charY = 270;
      const bodySize = 50 + strength * 1.1;  // размер персонажа
      
      // Левая гантель (x: charX - 60 - bodySize*0.2, y: charY - 15)
      const leftDbX = charX - 60 - bodySize * 0.15;
      const leftDbY = charY - 10;
      // Правая гантель
      const rightDbX = charX + 60 + bodySize * 0.15;
      const rightDbY = charY - 10;
      
      // Радиус гантели зависит от веса
      const dbRadius = 22 + dumbbellWeight * 0.8;
      
      // Проверка попадания
      const distLeft = Math.hypot(mouseX - leftDbX, mouseY - leftDbY);
      const distRight = Math.hypot(mouseX - rightDbX, mouseY - rightDbY);
      
      if (distLeft < dbRadius + 15 || distRight < dbRadius + 15) {
        hitDumbbell = true;
      }
      
      // Всегда качаемся, но если попали — анимация ярче
      strength += 1;
      
      // Запускаем анимацию подъёма
      clickEffect = 1.0;
      lastClickTime = performance.now();
      
      // Обновляем вес и UI
      updateWeightDisplay();
      updateStrengthUI();
      
      // Доп. фича: если сила кратна 10 — маленький бонус (опционально, просто визуал)
      
      drawCanvas();
      
      // Для мобильных устройств отменяем стандартное поведение
      e.preventDefault();
    }

    // ----- ОТРИСОВКА (САМОЕ ВКУСНОЕ) -----
    function drawCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // ----- ПАРАМЕТРЫ ПЕРСОНАЖА (растёт от силы) -----
      const baseBodyWidth = 60;
      const baseBodyHeight = 80;
      
      // Масштаб силы: чем больше сила, тем массивнее качок
      const scaleFactor = 1 + strength * 0.035;  // до +350% при 100 силы
      const bodyW = baseBodyWidth * scaleFactor;
      const bodyH = baseBodyHeight * scaleFactor;
      
      // Голова тоже растёт, но чуть меньше
      const headSize = 40 * (1 + strength * 0.015);
      
      // Позиционирование: персонаж по центру
      const centerX = 350;
      const groundY = 400;        // уровень пола
      const bodyY = groundY - bodyH * 0.5 - 5;
      
      // ----- ФОН (тренажёрный зал) -----
      // Пол
      ctx.fillStyle = '#3d2e28';
      ctx.beginPath();
      ctx.rect(0, groundY - 8, canvas.width, 120);
      ctx.fill();
      // Текстура пола
      ctx.fillStyle = '#5e4538';
      for (let i=0;i<canvas.width;i+=30) {
        ctx.fillRect(i, groundY-4, 15, 8);
      }
      
      // Зеркала на стене
      ctx.fillStyle = '#aac7db22';
      ctx.fillRect(40, 30, 120, 200);
      ctx.fillStyle = '#bed9eebb';
      ctx.fillRect(45, 35, 110, 190);
      ctx.strokeStyle = '#cfb797';
      ctx.lineWidth = 4;
      ctx.strokeRect(45, 35, 110, 190);
      
      ctx.fillStyle = '#aac7db22';
      ctx.fillRect(540, 30, 120, 200);
      ctx.fillStyle = '#bed9eebb';
      ctx.fillRect(545, 35, 110, 190);
      ctx.strokeRect(545, 35, 110, 190);
      
      // Плакат "GYM"
      ctx.font = 'bold 24px "Segoe UI", system-ui';
      ctx.fillStyle = '#f5d742';
      ctx.shadowColor = '#00000080';
      ctx.shadowBlur = 10;
      ctx.fillText('💪 IRON GYM', 260, 80);
      ctx.shadowBlur = 0;
      
      // ----- АНИМАЦИЯ ПОДЪЁМА (эффект клика) -----
      let liftOffset = 0;
      if (clickEffect > 0) {
        // затухание
        const now = performance.now();
        const elapsed = now - lastClickTime;
        clickEffect = Math.max(0, 1 - elapsed / 250);  // 250 мс анимация
        
        // Поднимаем руки/гантели вверх
        liftOffset = -12 * Math.sin(clickEffect * Math.PI); 
      }
      
      // ----- РИСУЕМ ПЕРСОНАЖА (КАЧКА) -----
      // Тень под персонажем
      ctx.fillStyle = '#1e1a16aa';
      ctx.beginPath();
      ctx.ellipse(centerX, groundY+5, bodyW*0.7, 15, 0, 0, Math.PI*2);
      ctx.fill();
      
      // Ноги (тоже растут)
      ctx.fillStyle = '#2c5785';
      ctx.shadowColor = '#00000055';
      ctx.shadowBlur = 8;
      // Левая нога
      ctx.fillRect(centerX - bodyW*0.3 - 5, bodyY + bodyH*0.6, bodyW*0.25, bodyH*0.5);
      // Правая нога
      ctx.fillRect(centerX + bodyW*0.1, bodyY + bodyH*0.6, bodyW*0.25, bodyH*0.5);
      
      // Обувь
      ctx.fillStyle = '#3a281c';
      ctx.fillRect(centerX - bodyW*0.3 - 8, groundY-6, bodyW*0.3, 14);
      ctx.fillRect(centerX + bodyW*0.08, groundY-6, bodyW*0.3, 14);
      
      // Торс (майка)
      const gradient = ctx.createLinearGradient(centerX-bodyW/2, bodyY, centerX+bodyW/2, bodyY+bodyH);
      gradient.addColorStop(0, '#c93f3f');
      gradient.addColorStop(1, '#a02020');
      ctx.fillStyle = gradient;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.ellipse(centerX, bodyY + bodyH/2, bodyW/2, bodyH/2, 0, 0, Math.PI*2);
      ctx.fill();
      
      // Пресс (кубики)
      ctx.fillStyle = '#e0b07a';
      ctx.shadowBlur = 4;
      for (let i=0; i<3; i++) {
        ctx.fillRect(centerX-15, bodyY+20 + i*18, 30, 10);
      }
      
      // Голова
      ctx.fillStyle = '#f5dbb1';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.ellipse(centerX, bodyY - headSize*0.35, headSize/1.6, headSize/1.8, 0, 0, Math.PI*2);
      ctx.fill();
      
      // Кепка / волосы
      ctx.fillStyle = '#2b1e0e';
      ctx.beginPath();
      ctx.ellipse(centerX-2, bodyY - headSize*0.5, headSize/2.2, headSize/4, 0, 0, Math.PI*2);
      ctx.fill();
      
      // Лицо
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(centerX-12, bodyY - headSize*0.3, 4, 0, 2*Math.PI);
      ctx.arc(centerX+12, bodyY - headSize*0.3, 4, 0, 2*Math.PI);
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(centerX-14, bodyY - headSize*0.33, 2, 0, 2*Math.PI);
      ctx.arc(centerX+10, bodyY - headSize*0.33, 2, 0, 2*Math.PI);
      ctx.fill();
      
      // Улыбка уверенного качка
      ctx.beginPath();
      ctx.strokeStyle = '#543e2b';
      ctx.lineWidth = 4;
      ctx.moveTo(centerX-10, bodyY - headSize*0.1);
      ctx.quadraticCurveTo(centerX, bodyY - headSize*0.05, centerX+10, bodyY - headSize*0.1);
      ctx.stroke();
      
      // ----- РУКИ И ГАНТЕЛИ (САМОЕ ГЛАВНОЕ) -----
      // Плечи
      ctx.fillStyle = '#f5dbb1';
      ctx.shadowBlur = 6;
      
      // Левая рука
      const leftShoulderX = centerX - bodyW*0.45;
      const leftShoulderY = bodyY + bodyH*0.25;
      // Правая
      const rightShoulderX = centerX + bodyW*0.45;
      const rightShoulderY = bodyY + bodyH*0.25;
      
      // Длина руки зависит от силы (больше бицепс)
      const armLength = 40 + strength * 0.8;
      const armThick = 16 + strength * 0.25;
      
      // Угол подъёма для анимации (liftOffset)
      const leftHandAngle = -0.5 + (liftOffset * 0.03);
      const rightHandAngle = 0.5 - (liftOffset * 0.03);
      
      // Левая рука
      ctx.save();
      ctx.translate(leftShoulderX, leftShoulderY);
      ctx.rotate(leftHandAngle);
      ctx.fillStyle = '#f5dbb1';
      ctx.fillRect(-armThick/2, -armThick/2, armLength, armThick);
      // Кисть
      ctx.fillStyle = '#e0b07a';
      ctx.fillRect(armLength-8, -armThick/2-2, 16, armThick+4);
      
      // Гантель левая
      const leftDbXOffset = armLength + 12;
      const leftDbYOffset = -2;
      // Вращаем вместе с рукой
      ctx.restore();
      
      // Рисуем левую гантель отдельно (поверх)
      const leftGripX = leftShoulderX + Math.cos(leftHandAngle) * (armLength+6);
      const leftGripY = leftShoulderY + Math.sin(leftHandAngle) * (armLength+6) - 2;
      
      // Правая рука
      ctx.save();
      ctx.translate(rightShoulderX, rightShoulderY);
      ctx.rotate(rightHandAngle);
      ctx.fillStyle = '#f5dbb1';
      ctx.fillRect(-armThick/2, -armThick/2, armLength, armThick);
      ctx.fillStyle = '#e0b07a';
      ctx.fillRect(armLength-8, -armThick/2-2, 16, armThick+4);
      ctx.restore();
      
      const rightGripX = rightShoulderX + Math.cos(rightHandAngle) * (armLength+6);
      const rightGripY = rightShoulderY + Math.sin(rightHandAngle) * (armLength+6) - 2;
      
      // ---- ГАНТЕЛИ (вес отображается размером) ----
      const dbSize = 18 + dumbbellWeight * 1.2;
      ctx.shadowBlur = 12;
      
      // Левая гантель
      ctx.fillStyle = '#3a4045';
      ctx.beginPath();
      ctx.ellipse(leftGripX, leftGripY, dbSize, dbSize*0.9, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#6b7a8a';
      ctx.beginPath();
      ctx.ellipse(leftGripX-2, leftGripY-2, dbSize*0.7, dbSize*0.6, 0, 0, Math.PI*2);
      ctx.fill();
      // Блины
      ctx.fillStyle = '#2c353d';
      ctx.beginPath();
      ctx.ellipse(leftGripX-4, leftGripY-2, dbSize*0.5, dbSize*0.45, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#aabccc';
      ctx.font = `bold ${Math.min(18, 12+Math.floor(strength/5))}px 'Segoe UI'`;
      ctx.fillText(dumbbellWeight.toFixed(1), leftGripX-20, leftGripY-20);
      
      // Правая гантель
      ctx.fillStyle = '#3a4045';
      ctx.beginPath();
      ctx.ellipse(rightGripX, rightGripY, dbSize, dbSize*0.9, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#6b7a8a';
      ctx.beginPath();
      ctx.ellipse(rightGripX-2, rightGripY-2, dbSize*0.7, dbSize*0.6, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#2c353d';
      ctx.beginPath();
      ctx.ellipse(rightGripX-4, rightGripY-2, dbSize*0.5, dbSize*0.45, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#aabccc';
      ctx.fillText(dumbbellWeight.toFixed(1), rightGripX-20, rightGripY-20);
      
      // Подписи "ЖМИ!"
      ctx.font = 'bold 16px "Segoe UI"';
      ctx.fillStyle = '#f9e074';
      ctx.shadowBlur = 14;
      ctx.fillText('⚡ЖМИ⚡', leftGripX-35, leftGripY-45);
      ctx.fillText('⚡ЖМИ⚡', rightGripX-35, rightGripY-45);
      
      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';
      
      // Если сила большая - эффект ауры
      if (strength > 40) {
        ctx.beginPath();
        ctx.arc(centerX, bodyY, bodyW*1.2, 0, Math.PI*2);
        ctx.fillStyle = '#f5e56b20';
        ctx.fill();
      }
    }

    // Анимационный цикл (для плавного затухания клика)
    function animationLoop() {
      if (clickEffect > 0) {
        drawCanvas();
        requestAnimationFrame(animationLoop);
      }
    }
    
    // Переопределяем отрисовку с проверкой анимации
    const originalDraw = drawCanvas;
    drawCanvas = function() {
      originalDraw();
      if (clickEffect > 0) {
        requestAnimationFrame(animationLoop);
      }
    };
    
    // ----- ОБРАБОТЧИКИ СОБЫТИЙ -----
    canvas.addEventListener('click', (e) => {
      handleLift(e);
    });
    
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY, preventDefault: () => {} };
      handleLift(fakeEvent);
    }, { passive: false });
    
    // Кнопка сброса
    document.getElementById('resetButton').addEventListener('click', () => {
      resetGame();
    });
    
    // Инициализация
    updateWeightDisplay();
    updateStrengthUI();
    drawCanvas();
    
    // Чтобы анимация работала корректно
    window.addEventListener('resize', () => drawCanvas());
  })();
</script>
</body>
</html>
