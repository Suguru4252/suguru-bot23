<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Adult Game - Mobile</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.5);
            padding: 10px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            #controls-hint { font-size: 12px; bottom: 10px; }
            #info { font-size: 10px; top: 10px; left: 10px; }
        }
    </style>
</head>
<body>
    <div id="info">🔞 ADULT 3D | Тащите пальцем для вращения</div>
    <div id="controls-hint">🖐️ Один палец — вращение камеры | ✌️ Два пальца — масштаб</div>

    <!-- Подключаем Three.js и дополнения -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Инициализация сцены, камеры, рендереров ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.008); // туман для атмосферы

        // Камера для телефона (более широкий угол)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 4);
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // тени для красоты
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2D рендерер для текста поверх 3D
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- Управление пальцем (OrbitControls с поддержкой тач) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;      // плавность
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.5;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 0.8;
        controls.touchRotate = true;
        controls.touchZoom = true;
        controls.target.set(0, 1.2, 0);

        // --- Освещение (красивая графика) ---
        // Ambient light
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // Главный направленный свет (солнце)
        const mainLight = new THREE.DirectionalLight(0xffccaa, 1.2);
        mainLight.position.set(5, 10, 3);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        
        // Заполняющий свет сзади
        const backLight = new THREE.PointLight(0x4466ff, 0.4);
        backLight.position.set(-2, 2, -3);
        scene.add(backLight);
        
        // Тёплый свет снизу (эффект "сцены")
        const fillLight = new THREE.PointLight(0xffaa66, 0.5);
        fillLight.position.set(0, -1, 1);
        scene.add(fillLight);
        
        // Динамический цветной свет для настроения
        const moodLight = new THREE.PointLight(0xff66aa, 0.6);
        moodLight.position.set(1, 2, 2);
        scene.add(moodLight);
        
        // --- Пол с отражением (глянец) ---
        const planeGeometry = new THREE.CircleGeometry(5, 32);
        const planeMaterial = new THREE.MeshStandardMaterial({ color: 0x221133, roughness: 0.3, metalness: 0.7, emissive: 0x110022 });
        const ground = new THREE.Mesh(planeGeometry, planeMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Декоративная сетка для стиля
        const gridHelper = new THREE.GridHelper(12, 20, 0xff66aa, 0x8844aa);
        gridHelper.position.y = -0.4;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);
        
        // --- Создание персонажа (анимированная модель с "взрослыми" формами) ---
        const characterGroup = new THREE.Group();
        
        // Тело (женская фигура с подчёркнутыми формами)
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.25, metalness: 0.1, emissive: 0x442200 });
        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.4, 1.0, 24), bodyMat);
        torso.position.y = 0.5;
        torso.castShadow = true;
        torso.receiveShadow = true;
        characterGroup.add(torso);
        
        // Грудь (детализированно)
        const breastMat = new THREE.MeshStandardMaterial({ color: 0xffbb99, roughness: 0.2, emissive: 0x552200 });
        const leftBreast = new THREE.Mesh(new THREE.SphereGeometry(0.32, 32, 32), breastMat);
        leftBreast.position.set(-0.42, 0.9, 0.45);
        leftBreast.castShadow = true;
        const rightBreast = new THREE.Mesh(new THREE.SphereGeometry(0.32, 32, 32), breastMat);
        rightBreast.position.set(0.42, 0.9, 0.45);
        rightBreast.castShadow = true;
        characterGroup.add(leftBreast);
        characterGroup.add(rightBreast);
        
        // Бёдра и таз
        const hipMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.3 });
        const hips = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.5, 0.6, 24), hipMat);
        hips.position.y = 0.15;
        hips.castShadow = true;
        characterGroup.add(hips);
        
        // Голова
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.2 });
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 48, 48), headMat);
        head.position.y = 1.15;
        head.castShadow = true;
        characterGroup.add(head);
        
        // Волосы (длинные)
        const hairMat = new THREE.MeshStandardMaterial({ color: 0x442211, roughness: 0.5 });
        const hair = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.55, 0.25, 16), hairMat);
        hair.position.y = 1.38;
        hair.castShadow = true;
        characterGroup.add(hair);
        
        // Глаза
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.09, 32, 32), eyeMat);
        leftEye.position.set(-0.15, 1.28, 0.42);
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.09, 32, 32), eyeMat);
        rightEye.position.set(0.15, 1.28, 0.42);
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.05, 32, 32), pupilMat);
        leftPupil.position.set(-0.15, 1.27, 0.52);
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.05, 32, 32), pupilMat);
        rightPupil.position.set(0.15, 1.27, 0.52);
        characterGroup.add(leftEye, rightEye, leftPupil, rightPupil);
        
        // Губы (чуть приоткрыты)
        const lipMat = new THREE.MeshStandardMaterial({ color: 0xcc5577 });
        const lips = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.04, 16, 32), lipMat);
        lips.position.set(0, 1.08, 0.45);
        lips.rotation.x = 0.2;
        characterGroup.add(lips);
        
        // Нижняя часть тела (ягодицы)
        const buttMat = new THREE.MeshStandardMaterial({ color: 0xffbb99, roughness: 0.2 });
        const leftButt = new THREE.Mesh(new THREE.SphereGeometry(0.38, 32, 32), buttMat);
        leftButt.position.set(-0.45, 0.2, -0.55);
        const rightButt = new THREE.Mesh(new THREE.SphereGeometry(0.38, 32, 32), buttMat);
        rightButt.position.set(0.45, 0.2, -0.55);
        characterGroup.add(leftButt, rightButt);
        
        // Добавляем персонажа в сцену
        scene.add(characterGroup);
        
        // --- Вспомогательные декорации: кровать/подиум ---
        const bedMat = new THREE.MeshStandardMaterial({ color: 0xaa88aa, roughness: 0.6, metalness: 0.1 });
        const bedBase = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.3, 1.8), bedMat);
        bedBase.position.set(0, -0.35, -1.2);
        bedBase.receiveShadow = true;
        bedBase.castShadow = true;
        scene.add(bedBase);
        
        const pillowMat = new THREE.MeshStandardMaterial({ color: 0xddbbdd, roughness: 0.8 });
        const pillow = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.2, 0.6), pillowMat);
        pillow.position.set(0, -0.1, -1.8);
        pillow.castShadow = true;
        scene.add(pillow);
        
        // --- Анимация "дыхания" и лёгких покачиваний ---
        let time = 0;
        
        // --- CSS2D текст поверх персонажа (пикантная подпись) ---
        const labelDiv = document.createElement('div');
        labelDiv.textContent = '💋 Touch & Rotate 💋';
        labelDiv.style.color = '#ffaacc';
        labelDiv.style.fontSize = '18px';
        labelDiv.style.fontWeight = 'bold';
        labelDiv.style.textShadow = '0 0 10px rgba(0,0,0,0.8)';
        labelDiv.style.backgroundColor = 'rgba(0,0,0,0.5)';
        labelDiv.style.padding = '4px 12px';
        labelDiv.style.borderRadius = '30px';
        labelDiv.style.border = '1px solid #ff66aa';
        labelDiv.style.backdropFilter = 'blur(4px)';
        const labelObj = new CSS2DObject(labelDiv);
        labelObj.position.set(0, 1.8, 0);
        scene.add(labelObj);
        
        // --- Частицы для эротической атмосферы ---
        const particleCount = 300;
        const particlesGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 12;
            particlePositions[i*3+1] = Math.random() * 3;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 8 - 2;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xff88aa, size: 0.03, transparent: true, opacity: 0.6 });
        const particles = new THREE.Points(particlesGeometry, particleMat);
        scene.add(particles);
        
        // --- Адаптация под экран телефона ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // --- Анимационный цикл ---
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016; // примерно 60 FPS
            
            // Дыхание персонажа (лёгкое покачивание груди и тела)
            const breath = Math.sin(time * 2.5) * 0.012;
            leftBreast.scale.set(1 + breath, 1 + breath*0.7, 1 + breath);
            rightBreast.scale.set(1 + breath, 1 + breath*0.7, 1 + breath);
            // Лёгкое движение ягодиц
            leftButt.position.z = -0.55 + Math.sin(time * 3) * 0.008;
            rightButt.position.z = -0.55 + Math.sin(time * 3) * 0.008;
            // Мерцание света настроения
            moodLight.intensity = 0.6 + Math.sin(time * 1.8) * 0.2;
            
            // Частицы плавают
            particles.rotation.y += 0.005;
            particles.rotation.x = Math.sin(time * 0.2) * 0.1;
            
            // Обновление контроллера
            controls.update();
            
            // Рендер
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        // --- Блокировка контекстного меню (для удобства тачей) ---
        window.addEventListener('contextmenu', (e) => e.preventDefault());
        
        console.log('3D Adult Game запущена для телефонов');
    </script>
</body>
</html>
