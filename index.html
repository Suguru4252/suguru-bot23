<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Песочница — Физика частиц</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            user-select: none;
        }
        .game-wrapper {
            text-align: center;
            background: #16213e;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        canvas {
            border: 2px solid #0f3460;
            border-radius: 8px;
            cursor: crosshair;
            background: #0a0a1a;
            display: block;
            margin: 0 auto;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
            background: #0f3460;
            padding: 12px;
            border-radius: 12px;
        }
        .element-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            text-shadow: 0 1px 2px black;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }
        .element-btn.active {
            transform: scale(1.1);
            box-shadow: 0 0 20px currentColor;
            border: 2px solid white;
        }
        .info {
            color: #e0e0e0;
            margin-top: 8px;
            font-size: 14px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .clear-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <canvas id="sandCanvas"></canvas>
        <div class="toolbar" id="toolbar">
            <!-- Кнопки создаются в JS -->
        </div>
        <div class="info">
            <span>🖱️ Левая кнопка — рисовать</span>
            <span>🖱️ Правая кнопка — стереть</span>
            <span>🎨 Выбери элемент</span>
        </div>
        <button class="clear-btn" id="clearBtn">🧹 Очистить всё</button>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('sandCanvas');
            const ctx = canvas.getContext('2d');

            // Размеры поля в пикселях (каждый пиксель - частица)
            const WIDTH = 200;
            const HEIGHT = 150;
            const SCALE = 3; // Масштаб отображения

            canvas.width = WIDTH;
            canvas.height = HEIGHT;
            canvas.style.width = `${WIDTH * SCALE}px`;
            canvas.style.height = `${HEIGHT * SCALE}px`;

            // Сетка частиц (храним тип элемента или 0)
            const grid = new Uint8Array(WIDTH * HEIGHT);
            // Дополнительные данные (например, для воды - направление, для огня - жизнь)
            const extraData = new Float32Array(WIDTH * HEIGHT);

            // Типы элементов
            const ELEMENTS = {
                EMPTY: 0,
                SAND: 1,
                WATER: 2,
                STONE: 3,
                WOOD: 4,
                FIRE: 5,
                LAVA: 6,
                STEAM: 7,
                PLANT: 8,
                SMOKE: 9,
                ACID: 10,
            };

            const ELEMENT_COLORS = {
                [ELEMENTS.EMPTY]: '#0a0a1a',
                [ELEMENTS.SAND]: '#e8c170',
                [ELEMENTS.WATER]: '#3498db',
                [ELEMENTS.STONE]: '#7f8c8d',
                [ELEMENTS.WOOD]: '#b56a3c',
                [ELEMENTS.FIRE]: '#e74c3c',
                [ELEMENTS.LAVA]: '#e67e22',
                [ELEMENTS.STEAM]: '#bdc3c7',
                [ELEMENTS.PLANT]: '#2ecc71',
                [ELEMENTS.SMOKE]: '#7f8c8d',
                [ELEMENTS.ACID]: '#9b59b6',
            };

            const ELEMENT_NAMES = {
                [ELEMENTS.EMPTY]: 'Пусто',
                [ELEMENTS.SAND]: '🏖️ Песок',
                [ELEMENTS.WATER]: '💧 Вода',
                [ELEMENTS.STONE]: '🪨 Камень',
                [ELEMENTS.WOOD]: '🪵 Дерево',
                [ELEMENTS.FIRE]: '🔥 Огонь',
                [ELEMENTS.LAVA]: '🌋 Лава',
                [ELEMENTS.STEAM]: '💨 Пар',
                [ELEMENTS.PLANT]: '🌿 Растение',
                [ELEMENTS.SMOKE]: '💭 Дым',
                [ELEMENTS.ACID]: '🧪 Кислота',
            };

            let currentElement = ELEMENTS.SAND;
            let mouseDown = 0; // 0 - не нажата, 1 - левая, 2 - правая
            let brushSize = 3;
            let lastMouseX = -1, lastMouseY = -1;

            // Создаём кнопки элементов
            const toolbar = document.getElementById('toolbar');
            const elementButtons = {};

            function createToolbar() {
                const elementsToShow = [ELEMENTS.SAND, ELEMENTS.WATER, ELEMENTS.STONE, ELEMENTS.WOOD, 
                                       ELEMENTS.FIRE, ELEMENTS.LAVA, ELEMENTS.PLANT, ELEMENTS.ACID, 
                                       ELEMENTS.STEAM, ELEMENTS.SMOKE];
                elementsToShow.forEach(el => {
                    const btn = document.createElement('button');
                    btn.className = 'element-btn';
                    btn.textContent = ELEMENT_NAMES[el];
                    btn.style.backgroundColor = ELEMENT_COLORS[el];
                    btn.dataset.element = el;
                    btn.addEventListener('click', () => {
                        currentElement = parseInt(el);
                        updateActiveButton();
                    });
                    toolbar.appendChild(btn);
                    elementButtons[el] = btn;
                });
                updateActiveButton();
            }

            function updateActiveButton() {
                Object.entries(elementButtons).forEach(([el, btn]) => {
                    if (parseInt(el) === currentElement) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }

            // Индекс в массиве
            function getIndex(x, y) {
                return y * WIDTH + x;
            }

            // Проверка границ
            function inBounds(x, y) {
                return x >= 0 && x < WIDTH && y >= 0 && y < HEIGHT;
            }

            // Поменять две ячейки местами
            function swapCells(x1, y1, x2, y2) {
                const idx1 = getIndex(x1, y1);
                const idx2 = getIndex(x2, y2);
                [grid[idx1], grid[idx2]] = [grid[idx2], grid[idx1]];
                [extraData[idx1], extraData[idx2]] = [extraData[idx2], extraData[idx1]];
            }

            // Переместить частицу из (x1,y1) в (x2,y2) — ячейка назначения должна быть пустой
            function moveCell(x1, y1, x2, y2) {
                const idx1 = getIndex(x1, y1);
                const idx2 = getIndex(x2, y2);
                grid[idx2] = grid[idx1];
                extraData[idx2] = extraData[idx1];
                grid[idx1] = ELEMENTS.EMPTY;
                extraData[idx1] = 0;
            }

            // Обработка физики одного пикселя
            function updatePixel(x, y) {
                const idx = getIndex(x, y);
                const elem = grid[idx];

                if (elem === ELEMENTS.EMPTY) return;

                // ---- ПЕСОК ----
                if (elem === ELEMENTS.SAND) {
                    if (y < HEIGHT - 1) {
                        // Падает вниз
                        if (grid[getIndex(x, y + 1)] === ELEMENTS.EMPTY || 
                            grid[getIndex(x, y + 1)] === ELEMENTS.WATER) {
                            swapCells(x, y, x, y + 1);
                            return;
                        }
                        // Диагонально вниз-влево
                        if (x > 0 && (grid[getIndex(x - 1, y + 1)] === ELEMENTS.EMPTY || 
                                      grid[getIndex(x - 1, y + 1)] === ELEMENTS.WATER)) {
                            swapCells(x, y, x - 1, y + 1);
                            return;
                        }
                        // Диагонально вниз-вправо
                        if (x < WIDTH - 1 && (grid[getIndex(x + 1, y + 1)] === ELEMENTS.EMPTY || 
                                              grid[getIndex(x + 1, y + 1)] === ELEMENTS.WATER)) {
                            swapCells(x, y, x + 1, y + 1);
                            return;
                        }
                    }
                    // Взаимодействие с кислотой: песок растворяется
                    checkAcidDissolve(x, y, 0.02);
                }

                // ---- ВОДА ----
                else if (elem === ELEMENTS.WATER) {
                    if (y < HEIGHT - 1) {
                        if (grid[getIndex(x, y + 1)] === ELEMENTS.EMPTY) {
                            swapCells(x, y, x, y + 1);
                            return;
                        }
                    }
                    // Течёт в стороны
                    const dir = Math.random() < 0.5 ? -1 : 1;
                    if (x + dir >= 0 && x + dir < WIDTH && grid[getIndex(x + dir, y)] === ELEMENTS.EMPTY) {
                        swapCells(x, y, x + dir, y);
                        return;
                    }
                    if (x - dir >= 0 && x - dir < WIDTH && grid[getIndex(x - dir, y)] === ELEMENTS.EMPTY) {
                        swapCells(x, y, x - dir, y);
                        return;
                    }
                    // Вода тушит огонь/лаву при контакте
                    checkWaterExtinguish(x, y);
                }

                // ---- КАМЕНЬ (неподвижен) ----
                else if (elem === ELEMENTS.STONE) {
                    // Камень не двигается, но может растворяться кислотой
                    checkAcidDissolve(x, y, 0.005);
                }

                // ---- ДЕРЕВО ----
                else if (elem === ELEMENTS.WOOD) {
                    // Горит при контакте с огнём или лавой
                    if (checkFireSpread(x, y, 0.08)) return;
                    checkAcidDissolve(x, y, 0.03);
                }

                // ---- ОГОНЬ ----
                else if (elem === ELEMENTS.FIRE) {
                    // Огонь живёт ограниченное время
                    extraData[idx] = (extraData[idx] || 1) - 0.01;
                    if (extraData[idx] <= 0) {
                        // Превращается в дым
                        grid[idx] = ELEMENTS.SMOKE;
                        extraData[idx] = 1.0;
                        return;
                    }
                    // Поднимается вверх
                    if (y > 0 && Math.random() < 0.3) {
                        if (grid[getIndex(x, y - 1)] === ELEMENTS.EMPTY) {
                            swapCells(x, y, x, y - 1);
                            return;
                        }
                    }
                    // Случайное движение
                    const dx = Math.floor(Math.random() * 3) - 1;
                    const dy = Math.random() < 0.5 ? 0 : Math.floor(Math.random() * 3) - 1;
                    const nx = x + dx, ny = y + dy;
                    if (inBounds(nx, ny) && grid[getIndex(nx, ny)] === ELEMENTS.EMPTY && Math.random() < 0.3) {
                        swapCells(x, y, nx, ny);
                        return;
                    }
                    // Поджигает соседние горючие элементы
                    burnNeighbors(x, y);
                    // Тушится водой
                    checkWaterExtinguishFire(x, y);
                }

                // ---- ЛАВА ----
                else if (elem === ELEMENTS.LAVA) {
                    // Медленно течёт как очень вязкая жидкость
                    if (y < HEIGHT - 1 && Math.random() < 0.4) {
                        if (grid[getIndex(x, y + 1)] === ELEMENTS.EMPTY) {
                            swapCells(x, y, x, y + 1);
                            return;
                        }
                    }
                    const dir = Math.random() < 0.5 ? -1 : 1;
                    if (x + dir >= 0 && x + dir < WIDTH && grid[getIndex(x + dir, y)] === ELEMENTS.EMPTY && Math.random() < 0.2) {
                        swapCells(x, y, x + dir, y);
                        return;
                    }
                    // Поджигает соседей
                    burnNeighbors(x, y);
                    // При контакте с водой превращается в камень
                    if (checkLavaWaterContact(x, y)) return;
                    // Медленно застывает в камень
                    if (Math.random() < 0.0005) {
                        grid[idx] = ELEMENTS.STONE;
                    }
                    checkAcidDissolve(x, y, 0.002);
                }

                // ---- ПАР ----
                else if (elem === ELEMENTS.STEAM) {
                    if (y > 0) {
                        if (grid[getIndex(x, y - 1)] === ELEMENTS.EMPTY) {
                            swapCells(x, y, x, y - 1);
                            return;
                        }
                    }
                    const dx = Math.floor(Math.random() * 3) - 1;
                    if (x + dx >= 0 && x + dx < WIDTH && grid[getIndex(x + dx, y)] === ELEMENTS.EMPTY) {
                        swapCells(x, y, x + dx, y);
                        return;
                    }
                    // Конденсируется в воду
                    if (Math.random() < 0.005) {
                        grid[idx] = ELEMENTS.WATER;
                    }
                }

                // ---- РАСТЕНИЕ ----
                else if (elem === ELEMENTS.PLANT) {
                    // Растёт на соседних пустых клетках (очень медленно)
                    if (Math.random() < 0.001) {
                        const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
                        const [dx, dy] = dirs[Math.floor(Math.random() * dirs.length)];
                        const nx = x + dx, ny = y + dy;
                        if (inBounds(nx, ny) && grid[getIndex(nx, ny)] === ELEMENTS.EMPTY) {
                            grid[getIndex(nx, ny)] = ELEMENTS.PLANT;
                        }
                    }
                    // Горит
                    if (checkFireSpread(x, y, 0.15)) return;
                    checkAcidDissolve(x, y, 0.05);
                }

                // ---- ДЫМ ----
                else if (elem === ELEMENTS.SMOKE) {
                    if (y > 0 && Math.random() < 0.3) {
                        if (grid[getIndex(x, y - 1)] === ELEMENTS.EMPTY) {
                            swapCells(x, y, x, y - 1);
                            return;
                        }
                    }
                    const dx = Math.floor(Math.random() * 3) - 1;
                    if (x + dx >= 0 && x + dx < WIDTH && grid[getIndex(x + dx, y)] === ELEMENTS.EMPTY) {
                        swapCells(x, y, x + dx, y);
                        return;
                    }
                    // Исчезает
                    if (Math.random() < 0.01) {
                        grid[idx] = ELEMENTS.EMPTY;
                    }
                }

                // ---- КИСЛОТА ----
                else if (elem === ELEMENTS.ACID) {
                    if (y < HEIGHT - 1 && Math.random() < 0.4) {
                        if (grid[getIndex(x, y + 1)] === ELEMENTS.EMPTY) {
                            swapCells(x, y, x, y + 1);
                            return;
                        }
                    }
                    const dir = Math.random() < 0.5 ? -1 : 1;
                    if (x + dir >= 0 && x + dir < WIDTH && grid[getIndex(x + dir, y)] === ELEMENTS.EMPTY && Math.random() < 0.3) {
                        swapCells(x, y, x + dir, y);
                        return;
                    }
                    // Растворяет почти всё
                    dissolveNeighbors(x, y);
                    // Медленно исчезает
                    if (Math.random() < 0.001) {
                        grid[idx] = ELEMENTS.EMPTY;
                    }
                }
            }

            // Вспомогательные функции взаимодействий
            function checkFireSpread(x, y, probability) {
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = x + dx, ny = y + dy;
                        if (inBounds(nx, ny)) {
                            const nElem = grid[getIndex(nx, ny)];
                            if (nElem === ELEMENTS.FIRE || nElem === ELEMENTS.LAVA) {
                                if (Math.random() < probability) {
                                    grid[getIndex(x, y)] = ELEMENTS.FIRE;
                                    extraData[getIndex(x, y)] = 1.0;
                                    return true;
                                }
                            }
                        }
                    }
                }
                return false;
            }

            function burnNeighbors(x, y) {
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = x + dx, ny = y + dy;
                        if (inBounds(nx, ny)) {
                            const nIdx = getIndex(nx, ny);
                            const nElem = grid[nIdx];
                            if (nElem === ELEMENTS.WOOD || nElem === ELEMENTS.PLANT) {
                                if (Math.random() < 0.1) {
                                    grid[nIdx] = ELEMENTS.FIRE;
                                    extraData[nIdx] = 1.0;
                                }
                            }
                        }
                    }
                }
            }

            function checkWaterExtinguish(x, y) {
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = x + dx, ny = y + dy;
                        if (inBounds(nx, ny) && grid[getIndex(nx, ny)] === ELEMENTS.WATER) {
                            grid[getIndex(x, y)] = ELEMENTS.EMPTY;
                            return;
                        }
                    }
                }
            }

            function checkWaterExtinguishFire(x, y) {
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        const nx = x + dx, ny = y + dy;
                        if (inBounds(nx, ny) && grid[getIndex(nx, ny)] === ELEMENTS.WATER) {
                            grid[getIndex(x, y)] = ELEMENTS.STEAM;
                            extraData[getIndex(x, y)] = 1.0;
                            return true;
                        }
                    }
                }
                return false;
            }

            function checkLavaWaterContact(x, y) {
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        const nx = x + dx, ny = y + dy;
                        if (inBounds(nx, ny) && grid[getIndex(nx, ny)] === ELEMENTS.WATER) {
                            grid[getIndex(x, y)] = ELEMENTS.STONE;
                            grid[getIndex(nx, ny)] = ELEMENTS.STEAM;
                            extraData[getIndex(nx, ny)] = 1.0;
                            return true;
                        }
                    }
                }
                return false;
            }

            function dissolveNeighbors(x, y) {
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = x + dx, ny = y + dy;
                        if (inBounds(nx, ny)) {
                            const nIdx = getIndex(nx, ny);
                            const nElem = grid[nIdx];
                            if (nElem !== ELEMENTS.EMPTY && nElem !== ELEMENTS.ACID && nElem !== ELEMENTS.STONE) {
                                if (Math.random() < 0.1) {
                                    grid[nIdx] = ELEMENTS.EMPTY;
                                }
                            } else if (nElem === ELEMENTS.STONE && Math.random() < 0.02) {
                                grid[nIdx] = ELEMENTS.EMPTY;
                            }
                        }
                    }
                }
            }

            function checkAcidDissolve(x, y, prob) {
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        const nx = x + dx, ny = y + dy;
                        if (inBounds(nx, ny) && grid[getIndex(nx, ny)] === ELEMENTS.ACID) {
                            if (Math.random() < prob) {
                                grid[getIndex(x, y)] = ELEMENTS.EMPTY;
                            }
                        }
                    }
                }
            }

            // Главный цикл обновления
            function update() {
                // Обновляем снизу вверх, справа налево (для корректного падения)
                for (let y = HEIGHT - 1; y >= 0; y--) {
                    // Чередуем направление для более равномерного поведения
                    const startX = (y % 2 === 0) ? 0 : WIDTH - 1;
                    const endX = (y % 2 === 0) ? WIDTH : -1;
                    const stepX = (y % 2 === 0) ? 1 : -1;
                    
                    for (let x = startX; x !== endX; x += stepX) {
                        updatePixel(x, y);
                    }
                }
            }

            // Отрисовка
            function draw() {
                const imageData = ctx.createImageData(WIDTH, HEIGHT);
                const data = imageData.data;
                
                for (let i = 0; i < grid.length; i++) {
                    const elem = grid[i];
                    const color = ELEMENT_COLORS[elem] || '#0a0a1a';
                    // Парсим hex цвет
                    let r, g, b;
                    if (color.startsWith('#')) {
                        const hex = color.substring(1);
                        r = parseInt(hex.substring(0,2), 16);
                        g = parseInt(hex.substring(2,4), 16);
                        b = parseInt(hex.substring(4,6), 16);
                    } else {
                        r = 10; g = 10; b = 26;
                    }
                    
                    // Немного вариации для текстуры
                    const variation = elem === ELEMENTS.SAND || elem === ELEMENTS.WOOD ? (Math.random() * 20 - 10) : 0;
                    
                    const pixelIndex = i * 4;
                    data[pixelIndex] = Math.min(255, Math.max(0, r + variation));
                    data[pixelIndex + 1] = Math.min(255, Math.max(0, g + variation));
                    data[pixelIndex + 2] = Math.min(255, Math.max(0, b + variation));
                    data[pixelIndex + 3] = 255;
                }
                
                ctx.putImageData(imageData, 0, 0);
            }

            // Рисование элементов мышью
            function drawElements(mx, my, erase) {
                const px = Math.floor(mx / SCALE);
                const py = Math.floor(my / SCALE);
                
                for (let dy = -brushSize; dy <= brushSize; dy++) {
                    for (let dx = -brushSize; dx <= brushSize; dx++) {
                        if (dx*dx + dy*dy <= brushSize*brushSize) {
                            const nx = px + dx;
                            const ny = py + dy;
                            if (inBounds(nx, ny)) {
                                const idx = getIndex(nx, ny);
                                if (erase) {
                                    grid[idx] = ELEMENTS.EMPTY;
                                    extraData[idx] = 0;
                                } else {
                                    if (currentElement === ELEMENTS.FIRE || currentElement === ELEMENTS.LAVA) {
                                        grid[idx] = currentElement;
                                        extraData[idx] = 1.0;
                                    } else {
                                        grid[idx] = currentElement;
                                        extraData[idx] = 0;
                                    }
                                }
                            }
                        }
                    }
                }
                
                // Также рисуем линию между последней и текущей точкой
                if (lastMouseX >= 0 && lastMouseY >= 0) {
                    const lpx = Math.floor(lastMouseX / SCALE);
                    const lpy = Math.floor(lastMouseY / SCALE);
                    const dist = Math.sqrt((px-lpx)**2 + (py-lpy)**2);
                    const steps = Math.ceil(dist);
                    for (let i = 1; i <= steps; i++) {
                        const t = i / steps;
                        const ix = Math.round(lpx + (px - lpx) * t);
                        const iy = Math.round(lpy + (py - lpy) * t);
                        for (let dy = -brushSize; dy <= brushSize; dy++) {
                            for (let dx = -brushSize; dx <= brushSize; dx++) {
                                if (dx*dx + dy*dy <= brushSize*brushSize) {
                                    const nx = ix + dx;
                                    const ny = iy + dy;
                                    if (inBounds(nx, ny)) {
                                        const idx = getIndex(nx, ny);
                                        if (erase) {
                                            grid[idx] = ELEMENTS.EMPTY;
                                            extraData[idx] = 0;
                                        } else {
                                            if (currentElement === ELEMENTS.FIRE || currentElement === ELEMENTS.LAVA) {
                                                grid[idx] = currentElement;
                                                extraData[idx] = 1.0;
                                            } else {
                                                grid[idx] = currentElement;
                                                extraData[idx] = 0;
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
                lastMouseX = mx;
                lastMouseY = my;
            }

            // Обработчики событий мыши
            canvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                
                if (e.button === 0) { // Левая кнопка
                    mouseDown = 1;
                    lastMouseX = mx;
                    lastMouseY = my;
                    drawElements(mx, my, false);
                } else if (e.button === 2) { // Правая кнопка
                    mouseDown = 2;
                    lastMouseX = mx;
                    lastMouseY = my;
                    drawElements(mx, my, true);
                }
            });

            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                
                if (mouseDown === 1) {
                    drawElements(mx, my, false);
                } else if (mouseDown === 2) {
                    drawElements(mx, my, true);
                } else {
                    lastMouseX = mx;
                    lastMouseY = my;
                }
            });

            window.addEventListener('mouseup', () => {
                mouseDown = 0;
                lastMouseX = -1;
                lastMouseY = -1;
            });

            canvas.addEventListener('contextmenu', (e) => e.preventDefault());

            // Тач-управление для мобильных
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const mx = touch.clientX - rect.left;
                const my = touch.clientY - rect.top;
                mouseDown = 1;
                lastMouseX = mx;
                lastMouseY = my;
                drawElements(mx, my, false);
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const mx = touch.clientX - rect.left;
                const my = touch.clientY - rect.top;
                if (mouseDown === 1) {
                    drawElements(mx, my, false);
                }
            });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                mouseDown = 0;
                lastMouseX = -1;
                lastMouseY = -1;
            });

            // Кнопка очистки
            document.getElementById('clearBtn').addEventListener('click', () => {
                grid.fill(ELEMENTS.EMPTY);
                extraData.fill(0);
            });

            // Инициализация
            createToolbar();

            // Главный игровой цикл
            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            gameLoop();
        })();
    </script>
</body>
</html>
