<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NetErrror - ТРАССА СУСЛОВА: КЛИКАЙ ПО КРУГЛИШКАМ</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a1f0a, #030803);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'MS Gothic', monospace;
            overflow: hidden;
            touch-action: manipulation;
        }
        .game-container {
            background: #1a2a14;
            border-radius: 48px;
            padding: 16px;
            box-shadow: 0 20px 40px black, inset 0 1px 2px rgba(255,255,255,0.1);
            border: 2px solid #7a9f6a;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 4px #2b3b24, 0 10px 30px black;
            cursor: pointer;
        }
        .ui-panel {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: #0c140acc;
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid #8ab87a;
        }
        .stat {
            background: #1f2c1a;
            padding: 6px 18px;
            border-radius: 40px;
            color: #eaffc4;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 4px #3c8c2a;
            font-family: monospace;
        }
        button {
            background: #4a6e3a;
            border: none;
            color: #f0ffd0;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-family: monospace;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 3px 6px black;
        }
        button:active {
            transform: scale(0.94);
            background: #6e9658;
        }
        .warning {
            font-size: 0.7rem;
            background: #2a1f1a;
            padding: 4px 12px;
            border-radius: 30px;
            color: #ffb878;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="950" height="520"></canvas>
        <div class="ui-panel">
            <div class="stat">🚗 СУСЛОВ: <span id="suslovLevel">0</span></div>
            <div class="stat">🍆 МИНЕТЫ: <span id="bjTotal">0</span></div>
            <button id="resetBtn">💀 СБРОС ТРАССЫ</button>
            <div class="warning">⚠️ КЛИКАЙ ПО КРУГЛИШКАМ (+5%)</div>
        </div>
    </div>
</div>

<script>
    // ========== МИНЕТ + КЛИКАБЕЛЬНЫЕ КРУГЛИШКИ ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // ----- СУСЛОВ НА ТРАССЕ -----
    let suslov = {
        x: 180, y: 320, dir: 1, speed: 1.3,
        w: 52, h: 56, walkCycle: 0,
        isHitching: true
    };
    
    // ----- МИНИ-ИГРА -----
    let minigame = {
        active: false,
        pleasure: 0,
        maxPleasure: 100,
        headBobAngle: 0,
        mouthWide: 0,
        screenFlash: 0,
        finishFlash: 0,
        finishTextTimer: 0,
        finishResetTimer: 0,   // таймер на перезапуск после КОНЧИЛ
        fallingDrops: []       // падающие круглишки
    };
    
    let suslovLevel = 0;
    let totalBj = 0;
    
    const suslovLevelSpan = document.getElementById('suslovLevel');
    const bjTotalSpan = document.getElementById('bjTotal');
    const resetBtn = document.getElementById('resetBtn');
    
    let roadOffset = 0;
    let lastDropSpawn = 0;
    
    function updateUI() {
        suslovLevelSpan.innerText = suslovLevel;
        bjTotalSpan.innerText = totalBj;
    }
    
    let audioCtx = null;
    function playSound(freq = 660) {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        osc.frequency.value = freq;
        gain.gain.value = 0.2;
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
        osc.start();
        osc.stop(now + 0.2);
    }
    
    function startMinigame() {
        if (minigame.active) return;
        minigame.active = true;
        minigame.pleasure = 0;
        minigame.headBobAngle = 0;
        minigame.mouthWide = 0;
        minigame.screenFlash = 0;
        minigame.finishFlash = 0;
        minigame.finishTextTimer = 0;
        minigame.finishResetTimer = 0;
        minigame.fallingDrops = [];
        lastDropSpawn = 0;
        suslov.isHitching = false;
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }
    
    function completeMinigame() {
        if (!minigame.active) return;
        minigame.active = false;
        totalBj++;
        suslovLevel++;
        updateUI();
        
        // Эффект КОНЧИЛ: белый экран + чёрная надпись на 5 секунд
        minigame.finishFlash = 35;
        minigame.finishTextTimer = 150;  // ~5 секунд (30fps * 5)
        minigame.finishResetTimer = 150; // через 5 секунд перезапуск
        minigame.fallingDrops = [];
        suslov.isHitching = false; // Суслов стоит на месте
        
        playSound(880);
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
    
    // Добавление удовольствия
    function addPleasure(amount) {
        if (!minigame.active) return;
        minigame.pleasure = Math.min(minigame.pleasure + amount, minigame.maxPleasure);
        minigame.mouthWide = 16;
        minigame.screenFlash = 8;
        playSound(520);
        
        if (navigator.vibrate) navigator.vibrate(30);
        
        if (minigame.pleasure >= minigame.maxPleasure) {
            completeMinigame();
        }
    }
    
    // СПАВН КРУГЛИШКИ
    function spawnDrop() {
        if (!minigame.active) return;
        let x = 50 + Math.random() * (canvas.width - 100);
        minigame.fallingDrops.push({
            x: x,
            y: 30,
            radius: 20,
            speed: 1.0 + Math.random() * 1.8
        });
    }
    
    function updateFallingDrops(delta) {
        if (!minigame.active) return;
        let now = Date.now();
        // спавн каждые 0.7-1.2 секунды
        if (now - lastDropSpawn > 700 + Math.random() * 500) {
            spawnDrop();
            lastDropSpawn = now;
        }
        
        for(let i=0; i<minigame.fallingDrops.length; i++) {
            let d = minigame.fallingDrops[i];
            d.y += d.speed * delta * 60;
            if (d.y > canvas.height - 70) {
                minigame.fallingDrops.splice(i,1);
                i--;
            }
        }
    }
    
    // ПРОВЕРКА КЛИКА ПО КРУГЛИШКЕ
    function handleDropClick(canvasX, canvasY) {
        for(let i=0; i<minigame.fallingDrops.length; i++) {
            let d = minigame.fallingDrops[i];
            let dx = canvasX - d.x;
            let dy = canvasY - d.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < d.radius) {
                // ПОПАЛ! +5%
                addPleasure(5);
                minigame.fallingDrops.splice(i,1);
                return true;
            }
        }
        return false;
    }
    
    function isPointInSuslov(x, y) {
        return (x >= suslov.x && x <= suslov.x + suslov.w &&
                y >= suslov.y - 8 && y <= suslov.y + suslov.h);
    }
    
    function handleCanvasClick(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            e.preventDefault();
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        let canvasX = (clientX - rect.left) * scaleX;
        let canvasY = (clientY - rect.top) * scaleY;
        
        if (minigame.active) {
            // сначала проверяем попадание по круглишке
            let hit = handleDropClick(canvasX, canvasY);
            if (!hit) {
                // клик мимо - ничего не происходит
                // можно добавить звук промаха, но по задаче не нужно
            }
        } else if (isPointInSuslov(canvasX, canvasY) && minigame.finishResetTimer === 0) {
            startMinigame();
        }
    }
    
    canvas.addEventListener('click', handleCanvasClick);
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        handleCanvasClick({ clientX: touch.clientX, clientY: touch.clientY });
    });
    
    resetBtn.addEventListener('click', () => {
        minigame.active = false;
        suslov = { x: 180, y: 320, dir: 1, speed: 1.3, w: 52, h: 56, walkCycle: 0, isHitching: true };
        suslovLevel = 0;
        totalBj = 0;
        minigame.fallingDrops = [];
        minigame.finishFlash = 0;
        minigame.finishTextTimer = 0;
        minigame.finishResetTimer = 0;
        updateUI();
    });
    
    function updateSuslov(delta) {
        if (minigame.active) return;
        if (minigame.finishResetTimer > 0) return; // после КОНЧИЛ стоит
        let step = suslov.speed * delta * 60;
        suslov.x += suslov.dir * step;
        if (suslov.x <= 40) { suslov.x = 40; suslov.dir = 1; }
        if (suslov.x >= canvas.width - suslov.w - 40) { suslov.x = canvas.width - suslov.w - 40; suslov.dir = -1; }
        suslov.walkCycle = (suslov.walkCycle + delta * 14) % (Math.PI * 2);
    }
    
    function updateEffects(delta) {
        if (minigame.active) {
            minigame.mouthWide = Math.max(4, minigame.mouthWide - delta * 40);
            minigame.headBobAngle = (minigame.headBobAngle + delta * 20) % (Math.PI * 2);
            if (minigame.screenFlash > 0) minigame.screenFlash -= delta * 100;
        }
        if (minigame.finishFlash > 0) minigame.finishFlash -= delta * 70;
        if (minigame.finishTextTimer > 0) {
            minigame.finishTextTimer -= delta * 30;
            if (minigame.finishTextTimer <= 0) {
                minigame.finishFlash = 0;
            }
        }
        if (minigame.finishResetTimer > 0) {
            minigame.finishResetTimer -= delta * 30;
            if (minigame.finishResetTimer <= 0) {
                // ПЕРЕЗАПУСК ИГРЫ: Суслов снова ходит, можно начинать новый минет
                minigame.active = false;
                suslov.isHitching = true;
                minigame.finishFlash = 0;
                minigame.finishTextTimer = 0;
                minigame.fallingDrops = [];
            }
        }
    }
    
    // ========== РЕНДЕР ==========
    function drawRoad() {
        ctx.fillStyle = "#2a3824";
        ctx.fillRect(0, 280, canvas.width, 160);
        ctx.fillStyle = "#d4c47a";
        for(let i = 0; i < 14; i++) {
            let dashX = (roadOffset + i * 65) % (canvas.width + 60) - 40;
            ctx.fillRect(dashX, 352, 40, 6);
        }
        ctx.fillStyle = "#9e7e5a";
        ctx.fillRect(0, 425, canvas.width, 14);
        ctx.fillStyle = "#4a7a3a";
        ctx.fillRect(0, 258, canvas.width, 24);
        roadOffset = (roadOffset + 2.2) % 50;
    }
    
    function drawCar() {
        ctx.fillStyle = "#5a7a9a";
        ctx.fillRect(70, 338, 72, 48);
        ctx.fillStyle = "#3a4f66";
        ctx.fillRect(80, 328, 22, 12);
        ctx.fillStyle = "#1a1a2a";
        ctx.beginPath();
        ctx.arc(88, 378, 9, 0, Math.PI*2);
        ctx.arc(126, 378, 9, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "#ffcc66";
        ctx.fillRect(135, 352, 8, 6);
    }
    
    function drawFallingDrops() {
        for(let d of minigame.fallingDrops) {
            ctx.fillStyle = "#ffffaa";
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(d.x, d.y, d.radius, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#ffaa66";
            ctx.beginPath();
            ctx.arc(d.x-4, d.y-4, 6, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#000000cc";
            ctx.font = "bold 16px monospace";
            ctx.fillText("💦", d.x-10, d.y+6);
            ctx.fillStyle = "#ffffffcc";
            ctx.font = "bold 12px monospace";
            ctx.fillText("+5%", d.x-12, d.y-12);
            ctx.shadowBlur = 0;
        }
    }
    
    function drawSuslov() {
        if (minigame.active) {
            let centerX = suslov.x + suslov.w/2;
            let centerY = suslov.y + 30;
            let bobOffset = Math.sin(minigame.headBobAngle * 2.5) * 4;
            let headY = -20 + bobOffset;
            ctx.save();
            ctx.translate(centerX, centerY);
            let tilt = -0.4 + Math.sin(minigame.headBobAngle) * 0.12;
            ctx.rotate(tilt);
            ctx.fillStyle = "#dba878";
            ctx.beginPath();
            ctx.ellipse(0, 0, 19, 28, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#3d5230";
            ctx.fillRect(-18, 12, 36, 22);
            ctx.fillStyle = "#f2cfa0";
            ctx.beginPath();
            ctx.arc(0, headY, 18, 0, Math.PI*2);
            ctx.fill();
            let mouthHeight = minigame.mouthWide;
            let mouthYOffset = -12 + (mouthHeight / 2);
            ctx.fillStyle = "#441122";
            ctx.fillRect(-10, mouthYOffset - 3, 20, mouthHeight);
            if (minigame.pleasure > 30) {
                ctx.fillStyle = "#dd6688";
                let tongueOut = Math.sin(Date.now() * 0.025) * 3;
                ctx.fillRect(-5, mouthYOffset + mouthHeight - 6, 10, 8 + tongueOut);
            }
            ctx.fillStyle = "#2a2a2a";
            ctx.fillRect(-12, headY-10, 6, 5);
            ctx.fillRect(6, headY-10, 6, 5);
            ctx.restore();
            
            let barWidth = (minigame.pleasure / minigame.maxPleasure) * 100;
            ctx.fillStyle = "#ff8844";
            ctx.fillRect(suslov.x - 12, suslov.y - 32, barWidth, 10);
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 14px monospace";
            ctx.fillText(`${Math.floor(minigame.pleasure)}%`, suslov.x + 20, suslov.y - 34);
        } else {
            ctx.fillStyle = "#dcab7a";
            ctx.fillRect(suslov.x + 8, suslov.y + 20, 36, 34);
            ctx.fillStyle = "#f2cf9a";
            ctx.beginPath();
            ctx.arc(suslov.x + suslov.w/2, suslov.y + 16, 19, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#2a2a2a";
            ctx.fillRect(suslov.x + suslov.w/2 - 11, suslov.y + 10, 6, 5);
            ctx.fillRect(suslov.x + suslov.w/2 + 5, suslov.y + 10, 6, 5);
            let leg = Math.sin(suslov.walkCycle * 3.2) * 7;
            ctx.fillStyle = "#5f704a";
            ctx.fillRect(suslov.x + 12, suslov.y + 48, 9, 10 + leg);
            ctx.fillRect(suslov.x + 31, suslov.y + 48, 9, 10 - leg);
            ctx.fillStyle = "#ffffcc";
            ctx.font = "bold 14px monospace";
            ctx.fillText("🍆 ПОДВЕЗИ ЗА МИНЕТ!", suslov.x - 12, suslov.y - 16);
            ctx.fillStyle = "#dd9966";
            ctx.font = "12px monospace";
            ctx.fillText("(сын бляди)", suslov.x + 14, suslov.y - 2);
        }
    }
    
    function drawFinishEffect() {
        if (minigame.finishFlash > 0) {
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.min(1, minigame.finishFlash / 12)})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        if (minigame.finishTextTimer > 0) {
            ctx.fillStyle = "#000000";
            ctx.font = "bold 64px monospace";
            ctx.shadowBlur = 0;
            ctx.textAlign = "center";
            ctx.fillText("КОНЧИЛ", canvas.width/2, canvas.height/2);
            ctx.textAlign = "left";
        }
    }
    
    function drawFlash() {
        if (minigame.screenFlash > 0 && minigame.finishFlash <= 0) {
            ctx.fillStyle = `rgba(255, 220, 100, ${minigame.screenFlash / 12})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }
    
    function drawInstructions() {
        if (!minigame.active) return;
        ctx.fillStyle = "#000000aa";
        ctx.fillRect(0, 0, canvas.width, 42);
        ctx.fillStyle = "#ffcc99";
        ctx.font = "bold 14px monospace";
        ctx.fillText("🍆 КЛИКАЙ ПО ЖЁЛТЫМ КРУГЛИШКАМ - КАЖДАЯ ДАЁТ +5% 🍆", canvas.width/2 - 270, 28);
    }
    
    let lastTime = 0;
    function gameLoop(now) {
        let delta = Math.min(0.033, (now - lastTime) / 1000);
        if (delta > 0.01) {
            updateSuslov(delta);
            updateFallingDrops(delta);
            updateEffects(delta);
        }
        lastTime = now;
        
        drawRoad();
        drawCar();
        drawFallingDrops();
        drawSuslov();
        drawFlash();
        drawFinishEffect();
        drawInstructions();
        
        requestAnimationFrame(gameLoop);
    }
    
    updateUI();
    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
