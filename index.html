<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Rucoy Online - Миры и Свитки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0c12;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            background: #1a2a1a;
        }
        
        .corner-buttons {
            position: fixed;
            z-index: 100;
            pointer-events: auto;
        }
        .top-left { top: 12px; left: 12px; display: flex; gap: 8px; }
        .top-right { top: 12px; right: 12px; display: flex; gap: 8px; }
        .bottom-left { bottom: 12px; left: 12px; display: flex; gap: 8px; }
        .bottom-right { bottom: 12px; right: 12px; display: flex; gap: 8px; }
        
        .mini-btn {
            background: rgba(44, 47, 74, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa55;
            color: #ffcc88;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            touch-action: manipulation;
            cursor: pointer;
            font-family: monospace;
            transition: 0.05s linear;
            text-align: center;
            min-width: 60px;
        }
        .mini-btn:active { transform: translateY(2px); background: rgba(64, 67, 94, 0.95); }
        .fight-mini { background: rgba(200, 80, 60, 0.95); border-color: #ff8866; color: white; }
        .skill-mini { background: rgba(106, 78, 158, 0.95); border-color: #c88eff; }
        .class-mini { background: rgba(60, 100, 80, 0.95); border-color: #88ffaa; }
        .super-mini { background: rgba(200, 100, 50, 0.95); border-color: #ffaa66; }
        .admin-btn {
            background: rgba(200, 50, 50, 0.95);
            border-color: #ff6666;
            color: #ffaa88;
        }
        
        .nickname-display {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 6px 16px;
            border-radius: 30px;
            color: #ffcc88;
            font-size: 13px;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            font-weight: bold;
            backdrop-filter: blur(4px);
            border: 1px solid #ffaa55;
        }
        .portal-progress {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 6px 16px;
            border-radius: 30px;
            color: #88ffaa;
            font-size: 11px;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            border: 1px solid #88ffaa;
        }
        
        .achievement-btn {
            position: fixed;
            bottom: 80px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #ffaa55;
            color: #ffcc88;
            font-size: 10px;
            padding: 5px 8px;
            border-radius: 20px;
            z-index: 100;
            cursor: pointer;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }
        
        @media (max-width: 700px) {
            .mini-btn { font-size: 10px; padding: 5px 8px; min-width: 48px; }
            .nickname-display { font-size: 10px; top: 8px; }
            .portal-progress { font-size: 9px; bottom: 8px; white-space: nowrap; }
            .achievement-btn { font-size: 8px; padding: 4px 6px; bottom: 70px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="corner-buttons top-left">
    </div>
    
    <div class="corner-buttons top-right">
        <button class="mini-btn" id="statsBtn">📊 СТАТ</button>
        <button class="mini-btn" id="invBtn">🎒 ИНВ</button>
        <button class="mini-btn" id="mapBtn">🗺️ КАРТА</button>
    </div>
    
    <div class="corner-buttons bottom-left">
        <button class="mini-btn" id="hpBtn">❤️ HP</button>
        <button class="mini-btn" id="mpBtn">💙 MP</button>
    </div>
    
    <div class="corner-buttons bottom-right">
        <button class="mini-btn fight-mini" id="attackBtn">⚔️ АТАКА</button>
        <button class="mini-btn skill-mini" id="skillBtn">✨ СКИЛЛ</button>
        <button class="mini-btn super-mini" id="superBtn">🌟 СУПЕР</button>
    </div>
    
    <div class="corner-buttons" style="bottom: 12px; right: 100px; display: flex; gap: 6px;">
        <button class="mini-btn class-mini" id="classWarriorBtn">⚔️ МЕЧ</button>
        <button class="mini-btn class-mini" id="classArcherBtn">🏹 ЛУК</button>
        <button class="mini-btn class-mini" id="classMageBtn">🔮 МАГ</button>
    </div>
    
    <button class="achievement-btn" id="achievBtn">🏆 АЧИВКИ</button>
    <button class="achievement-btn admin-btn" id="adminBtn" style="bottom: 120px; display: none;">👑 АДМИН</button>
    
    <div class="nickname-display" id="nicknameDisplay"></div>
    <div class="portal-progress" id="portalProgress"></div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ========== МИРЫ ==========
        let currentWorld = "forest";
        let unlockedWorlds = { forest: true, desert: false, castle: false };
        let portalPosition = null;
        let portalCooldown = 0;
        
        // Свитки телепортации
        let scrolls = {
            desert: { name: "📜 Свиток в Пустыню", price: 1000, targetWorld: "desert", icon: "📜", color: "#aaaaaa" },
            forest: { name: "📜 Свиток в Лес", price: 10000, targetWorld: "forest", icon: "📜", color: "#88aa66" },
            castle: { name: "📜 Свиток в Замок", price: 50000, targetWorld: "castle", icon: "📜", color: "#aa88ff" }
        };
        
        let playerScrolls = { desert: 0, forest: 0, castle: 0 };
        
        const WORLDS = {
            forest: { 
                name: "🌲 Лесной Мир", 
                bgColor1: "#4a8c3a", bgColor2: "#3a6c2a", 
                groundColor: "#3a6c2a", pathColor: "#88aa66",
                mobMultiplier: 1.0, 
                mobColors: ["#6f8c5a", "#8a7a6a", "#8b5a3a"],
                trees: "#3c9e3c", rocks: "#7a6a5a",
                portalSpawn: { x: 500, y: 300 }
            },
            desert: { 
                name: "🏜️ Пустынный Мир", 
                bgColor1: "#c9ae74", bgColor2: "#e0b87a",
                groundColor: "#c9ae74", pathColor: "#e0b87a",
                mobMultiplier: 1.5, 
                mobColors: ["#c9a87a", "#b87c4a", "#a86a3a", "#d8b87a"],
                trees: "#c9a87a", rocks: "#b87c4a",
                portalSpawn: { x: 800, y: 600 }
            },
            castle: { 
                name: "🏰 Замковый Мир", 
                bgColor1: "#4a5b6e", bgColor2: "#6c7f8f",
                groundColor: "#4a5b6e", pathColor: "#6c7f8f",
                mobMultiplier: 2.0, 
                mobColors: ["#6a7a8a", "#8a9aaa", "#5a6a7a", "#7a8a9a"],
                trees: "#6a7a8a", rocks: "#5a6a7a",
                portalSpawn: { x: 1000, y: 400 }
            }
        };
        
        // ========== МОБЫ ДЛЯ РАЗНЫХ МИРОВ ==========
        const MOB_TYPES = {
            forest: [
                { name: "🌿 Лесной Гоблин", hp: 60, dmg: 8, exp: 38, skin: "#8cae6a", speed: 0.7, range: 55, icon: "👺",
                  draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-12,y-18,24,32); ctx.fillStyle="#6f8c5a"; ctx.fillRect(x-10,y-10,20,24); ctx.fillStyle="#000"; ctx.fillRect(x-6,y-12,4,4); ctx.fillRect(x+2,y-12,4,4); ctx.fillStyle="#8b5a2b"; ctx.fillRect(x-8,y+4,16,8); } },
                { name: "🐺 Лесной Волк", hp: 80, dmg: 10, exp: 55, skin: "#c0a890", speed: 0.85, range: 50, icon: "🐺",
                  draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-14,y-16,28,28); ctx.fillStyle="#8a7a6a"; ctx.fillRect(x-12,y-12,24,22); ctx.fillStyle="#000"; ctx.fillRect(x-8,y-10,4,4); ctx.fillRect(x+4,y-10,4,4); } },
                { name: "🐻 Лесной Медведь", hp: 120, dmg: 14, exp: 78, skin: "#b87a4a", speed: 0.65, range: 58, icon: "🐻",
                  draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-16,y-20,32,36); ctx.fillStyle="#8b5a3a"; ctx.fillRect(x-14,y-12,28,28); ctx.fillStyle="#000"; ctx.fillRect(x-8,y-14,5,5); ctx.fillRect(x+3,y-14,5,5); } },
                { name: "💀 Лесной Скелет", hp: 140, dmg: 16, exp: 95, skin: "#d0d0e0", speed: 0.7, range: 55, icon: "💀",
                  draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-12,y-20,24,36); ctx.fillStyle="#b8b8cc"; ctx.fillRect(x-10,y-12,20,28); ctx.fillStyle="#000"; ctx.fillRect(x-6,y-14,4,4); ctx.fillRect(x+2,y-14,4,4); } }
            ],
            desert: [
                { name: "🏜️ Пустынный Гоблин", hp: 90, dmg: 12, exp: 55, skin: "#c9a87a", speed: 0.75, range: 55, icon: "👺",
                  draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-12,y-18,24,32); ctx.fillStyle="#b87c4a"; ctx.fillRect(x-10,y-10,20,24); ctx.fillStyle="#000"; ctx.fillRect(x-6,y-12,4,4); ctx.fillRect(x+2,y-12,4,4); ctx.fillStyle="#a86a3a"; ctx.fillRect(x-8,y+4,16,8); } },
                { name: "🐫 Пустынный Крокодил", hp: 120, dmg: 15, exp: 75, skin: "#b87c4a", speed: 0.8, range: 52, icon: "🐊",
                  draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-16,y-14,32,28); ctx.fillStyle="#a86a3a"; ctx.fillRect(x-14,y-10,28,24); ctx.fillStyle="#000"; ctx.fillRect(x-8,y-8,4,4); ctx.fillRect(x+4,y-8,4,4); } },
                { name: "🦂 Гигантский Скорпион", hp: 160, dmg: 20, exp: 110, skin: "#d8b87a", speed: 0.7, range: 58, icon: "🦂",
                  draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-14,y-18,28,32); ctx.fillStyle="#c89a6a"; ctx.fillRect(x-12,y-12,24,26); ctx.fillStyle="#000"; ctx.fillRect(x-8,y-12,4,4); ctx.fillRect(x+4,y-12,4,4); ctx.fillStyle="#a86a3a"; ctx.fillRect(x-4,y+2,8,8); } },
                { name: "🐫 Верблюд-мутант", hp: 200, dmg: 24, exp: 145, skin: "#e8c88a", speed: 0.85, range: 60, icon: "🐫",
                  draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-15,y-20,30,36); ctx.fillStyle="#c9a87a"; ctx.fillRect(x-12,y-14,24,30); ctx.fillStyle="#000"; ctx.fillRect(x-8,y-12,4,4); ctx.fillRect(x+4,y-12,4,4); ctx.fillStyle="#b87c4a"; ctx.fillRect(x-6,y+2,12,8); } }
            ],
            castle: [
                { name: "⚔️ Замковый Рыцарь", hp: 150, dmg: 20, exp: 95, skin: "#8a9aaa", speed: 0.7, range: 60, icon: "⚔️",
                  draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-14,y-22,28,38); ctx.fillStyle="#6a7a8a"; ctx.fillRect(x-12,y-14,24,30); ctx.fillStyle="#000"; ctx.fillRect(x-8,y-14,4,4); ctx.fillRect(x+4,y-14,4,4); ctx.fillStyle="#5a6a7a"; ctx.fillRect(x-10,y+2,20,10); } },
                { name: "👻 Призрачный Дух", hp: 120, dmg: 18, exp: 85, skin: "#a0b0c0", speed: 0.9, range: 55, icon: "👻",
                  draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-12,y-18,24,32); ctx.fillStyle="#ffffffaa"; ctx.fillRect(x-10,y-12,20,26); ctx.fillStyle="#00000088"; ctx.fillRect(x-6,y-12,4,4); ctx.fillRect(x+2,y-12,4,4); } },
                { name: "🗡️ Тёмный Ассасин", hp: 180, dmg: 28, exp: 135, skin: "#5a6a7a", speed: 0.95, range: 58, icon: "🗡️",
                  draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-12,y-20,24,36); ctx.fillStyle="#4a5a6a"; ctx.fillRect(x-10,y-12,20,28); ctx.fillStyle="#000"; ctx.fillRect(x-6,y-14,4,4); ctx.fillRect(x+2,y-14,4,4); ctx.fillStyle="#ff0000"; ctx.fillRect(x-2,y-2,4,6); } },
                { name: "👑 Королевский Страж", hp: 250, dmg: 32, exp: 185, skin: "#9aabbb", speed: 0.65, range: 65, icon: "👑",
                  draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-16,y-24,32,42); ctx.fillStyle="#7a8a9a"; ctx.fillRect(x-14,y-16,28,34); ctx.fillStyle="#000"; ctx.fillRect(x-10,y-16,5,5); ctx.fillRect(x+5,y-16,5,5); ctx.fillStyle="#ffaa44"; ctx.fillRect(x-6,y-2,12,6); } }
            ]
        };
        
        function getCurrentMobs() {
            return MOB_TYPES[currentWorld];
        }
        
        function createMob() {
            let mobsList = getCurrentMobs();
            let t = mobsList[Math.floor(Math.random() * mobsList.length)];
            let lvl = Math.max(1, player.level + Math.floor(Math.random() * 3) - 1);
            let worldMult = WORLDS[currentWorld].mobMultiplier;
            let hpMult = 1 + (lvl-1)*0.12;
            let dmgMult = 1 + (lvl-1)*0.1;
            return {
                name: t.name + " Lv." + lvl, level: lvl,
                hp: Math.floor(t.hp * hpMult * worldMult), maxHp: Math.floor(t.hp * hpMult * worldMult),
                dmg: Math.floor(t.dmg * dmgMult * (1 + (worldMult-1)*0.2)),
                exp: Math.floor(t.exp * (0.85 + lvl*0.1) * worldMult),
                skin: t.skin, speed: t.speed, attackRange: t.range, drawFunc: t.draw, icon: t.icon,
                x: 0, y: 0, attackTimer: 0, isBoss: false
            };
        }
        
        // ========== ПОРТАЛ ==========
        const MOBS_NEEDED_FOR_PORTAL = 300;
        let mobsKilledInWorld = 0;
        let portalActive = false;
        let portalX = 0, portalY = 0;
        
        function updatePortalStatus() {
            portalActive = (mobsKilledInWorld >= MOBS_NEEDED_FOR_PORTAL);
            
            if(portalActive) {
                let worldData = WORLDS[currentWorld];
                let nextWorld = getNextWorld();
                if(nextWorld && !unlockedWorlds[nextWorld]) {
                    portalX = worldData.portalSpawn.x;
                    portalY = worldData.portalSpawn.y;
                } else {
                    portalActive = false;
                }
            }
            
            let progressPercent = Math.min(100, Math.floor(mobsKilledInWorld / MOBS_NEEDED_FOR_PORTAL * 100));
            let nextWorldName = getNextWorldName();
            
            if(portalActive) {
                document.getElementById('portalProgress').innerHTML = `✨ ПОРТАЛ В ${nextWorldName} ОТКРЫТ! ✨`;
                document.getElementById('portalProgress').style.color = "#ffaa66";
            } else {
                document.getElementById('portalProgress').innerHTML = `🚪 Прогресс до ${nextWorldName}: ${mobsKilledInWorld}/${MOBS_NEEDED_FOR_PORTAL} (${progressPercent}%)`;
                document.getElementById('portalProgress').style.color = "#88ffaa";
            }
        }
        
        function getNextWorld() {
            if(currentWorld === "forest") return "desert";
            if(currentWorld === "desert") return "castle";
            return null;
        }
        
        function getNextWorldName() {
            if(currentWorld === "forest") return "Пустыню";
            if(currentWorld === "desert") return "Замок";
            return "???";
        }
        
        function activatePortal() {
            if(!portalActive) return;
            let nextWorld = getNextWorld();
            if(nextWorld && !unlockedWorlds[nextWorld]) {
                unlockedWorlds[nextWorld] = true;
                currentWorld = nextWorld;
                mobsKilledInWorld = 0;
                portalActive = false;
                mobs = [];
                bosses = [];
                for(let i=0;i<15;i++) spawnMob();
                addMsg(`🌍 ВЫ ПЕРЕШЛИ В МИР: ${WORLDS[currentWorld].name}!`);
                addMsg(`📜 Теперь в магазине доступен свиток обратно!`);
                updatePortalStatus();
                saveGame();
            }
        }
        
        function returnToPreviousWorld(targetWorld) {
            if(unlockedWorlds[targetWorld]) {
                currentWorld = targetWorld;
                mobsKilledInWorld = 0;
                portalActive = false;
                mobs = [];
                bosses = [];
                for(let i=0;i<15;i++) spawnMob();
                addMsg(`🌍 ВЫ ВЕРНУЛИСЬ В МИР: ${WORLDS[currentWorld].name}!`);
                updatePortalStatus();
                saveGame();
            }
        }
        
        // ========== СВИТКИ ==========
        function useScroll(scrollType) {
            if(playerScrolls[scrollType] > 0 && unlockedWorlds[scrollType] && currentWorld !== scrollType) {
                playerScrolls[scrollType]--;
                currentWorld = scrollType;
                mobsKilledInWorld = 0;
                portalActive = false;
                mobs = [];
                bosses = [];
                for(let i=0;i<15;i++) spawnMob();
                addMsg(`📜 Вы использовали ${scrolls[scrollType].name}!`);
                addMsg(`🌍 Телепортация в ${WORLDS[currentWorld].name}!`);
                updatePortalStatus();
                saveGame();
                return true;
            } else if(!unlockedWorlds[scrollType]) {
                addMsg(`❌ Этот мир еще не открыт! Убейте 300 мобов для открытия портала!`, true);
            } else if(currentWorld === scrollType) {
                addMsg(`❌ Вы уже в этом мире!`, true);
            } else {
                addMsg(`❌ Нет свитка ${scrolls[scrollType].name}!`, true);
            }
            return false;
        }
        
        // ========== АДМИН ПАНЕЛЬ (сокращена для краткости) ==========
        let isAdmin = false;
        let showAdminPanel = false;
        let adminPassword = "SuguruK52";
        let adminNickname = "Suguru";
        
        function checkAdmin(nickname) { return nickname === adminNickname; }
        
        // ... (админ панель такая же как в предыдущей версии)
        
        // ========== ОСТАЛЬНАЯ ЛОГИКА ==========
        const TILE_SIZE = 50;
        const MAP_W = 116;
        const MAP_H = 92;
        const WORLD_WIDTH = MAP_W * TILE_SIZE;
        const WORLD_HEIGHT = MAP_H * TILE_SIZE;
        
        let cameraX = 0, cameraY = 0;
        let canvasWidth = window.innerWidth;
        let canvasHeight = window.innerHeight;
        let walkCycle = 0;
        let attackEffects = [];
        let showAchievements = false;
        
        function addAttackEffect(x, y, type) { attackEffects.push({ x, y, type, life: 10 }); }
        
        function resizeCanvas() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
        }
        window.addEventListener('resize', () => { resizeCanvas(); updateCamera(); });
        resizeCanvas();
        
        // ========== АЧИВКИ ==========
        let achievements = {
            killer10: { name: "🏅 Новичок", desc: "Убить 10 мобов", current: 0, target: 10, completed: false, reward: 100 },
            killer50: { name: "🏅 Охотник", desc: "Убить 50 мобов", current: 0, target: 50, completed: false, reward: 500 },
            killer100: { name: "🏅 Убийца", desc: "Убить 100 мобов", current: 0, target: 100, completed: false, reward: 1000 },
            killer500: { name: "🔥 Мастер", desc: "Убить 500 мобов", current: 0, target: 500, completed: false, reward: 5000 },
            desertExplorer: { name: "🏜️ Исследователь", desc: "Открыть Пустыню", current: 0, target: 1, completed: false, reward: 2000 },
            castleExplorer: { name: "🏰 Завоеватель", desc: "Открыть Замок", current: 0, target: 1, completed: false, reward: 5000 }
        };
        
        let playerTitle = "";
        let expBonus = 1.0;
        let goldBonus = 1.0;
        
        function checkAchievements() {
            achievements.killer10.current = stats.mobsKilled;
            achievements.killer50.current = stats.mobsKilled;
            achievements.killer100.current = stats.mobsKilled;
            achievements.killer500.current = stats.mobsKilled;
            achievements.desertExplorer.current = unlockedWorlds.desert ? 1 : 0;
            achievements.castleExplorer.current = unlockedWorlds.castle ? 1 : 0;
            
            for(let key in achievements) {
                let ach = achievements[key];
                if(!ach.completed && ach.current >= ach.target) {
                    ach.completed = true;
                    if(ach.reward) {
                        player.gold += ach.reward;
                        stats.totalGold += ach.reward;
                        addMsg(`🏆 ДОСТИЖЕНИЕ: ${ach.name}! +${ach.reward}💰`);
                    }
                    showAchievementPopup(ach.name);
                    saveGame();
                }
            }
        }
        
        let popupMessage = null;
        function showAchievementPopup(name) { popupMessage = { text: `🏆 ${name}`, life: 60 }; }
        function drawAchievementPopup() {
            if(popupMessage && popupMessage.life > 0) {
                let x = canvasWidth/2, y = canvasHeight/3, life = popupMessage.life / 60;
                ctx.fillStyle = `rgba(0,0,0,${0.8*life})`;
                ctx.fillRect(x-120, y-25, 240, 50);
                ctx.fillStyle = `rgba(255,200,100,${0.9*life})`;
                ctx.fillRect(x-118, y-23, 236, 46);
                ctx.fillStyle = `rgba(0,0,0,${0.9*life})`;

        let percent=m.hp/m.maxHp;ctx.fillStyle="#a33";ctx.fillRect(x-20,y-28,40,5);ctx.fillStyle=percent>0.6?"#4f6":(percent>0.3?"#fa4":"#f44");ctx.fillRect(x-20,y-28,40*percent,5);
        ctx.font="8px monospace";ctx.fillStyle="#ffffaa";ctx.fillText(m.name,x-18,y-35);}
        
        function drawUI(){
            let c=CLASSES[player.classType],fs=Math.max(10,Math.min(14,canvasWidth/70));
            ctx.fillStyle="#000000aa";ctx.fillRect(8,8,200,70);
            ctx.fillStyle="#c55";ctx.fillRect(14,14,180,15);ctx.fillStyle="#f75";ctx.fillRect(14,14,180*(player.hp/player.maxHp),15);
            ctx.fillStyle="#58f";ctx.fillRect(14,35,180*(player.mp/player.maxMp),13);
            ctx.fillStyle="#fff";ctx.font=`bold ${fs}px monospace`;ctx.fillText(`❤️ ${Math.floor(player.hp)}/${player.maxHp}`,18,28);ctx.fillText(`💙 ${Math.floor(player.mp)}/${player.maxMp}`,18,47);
            ctx.fillStyle="#fd9";ctx.font=`bold ${fs}px monospace`;ctx.fillText(`${c.icon} ${c.name} Lv.${player.level}`,18,78);
            ctx.fillStyle="#000000aa";ctx.fillRect(8,85,200,12);ctx.fillStyle="#8af";ctx.fillRect(8,85,200*(player.exp/player.expToNext),12);
            ctx.fillStyle="#000000aa";ctx.fillRect(canvasWidth-140,8,130,55);ctx.fillStyle="#fc8";ctx.font=`bold ${fs}px monospace`;ctx.fillText(`💰 ${player.gold}`,canvasWidth-130,28);
            ctx.font=`${fs-2}px monospace`;ctx.fillText(`📜 ${playerScrolls.forest+playerScrolls.desert+playerScrolls.castle}`,canvasWidth-130,48);
            for(let i=0;i<Math.min(3,messages.length);i++){let m=messages[i];ctx.fillStyle=m.isErr?"#f86c":"#edbc";ctx.font=`${fs-2}px monospace`;ctx.fillText(m.text.substring(0,32),12,canvasHeight-35-i*18);}
            if(selectedMob&&selectedMob.hp>0){let x=selectedMob.x-cameraX,y=selectedMob.y-cameraY;ctx.strokeStyle="#fa4";ctx.lineWidth=3;ctx.strokeRect(x-22,y-34,58,58);}
            if(player.targetX!==null&&player.targetY!==null){let tx=player.targetX-cameraX,ty=player.targetY-cameraY;ctx.fillStyle="#fc4a";ctx.beginPath();ctx.arc(tx,ty,12,0,Math.PI*2);ctx.fill();}
            for(let i=0;i<damageFloats.length;i++){let d=damageFloats[i],x=d.x-cameraX,y=d.y-cameraY;
            if(d.isExplosion){ctx.font="bold 26px monospace";ctx.fillStyle="#ff8844";ctx.fillText("💥",x-12,y-18);}
            else{ctx.font=`bold ${d.isPlayer?16:20}px monospace`;ctx.fillStyle=d.isPlayer?"#fa6":"#f84";ctx.fillText(`-${d.dmg}`,x-10,y-24);}d.life--;if(d.life<=0)damageFloats.splice(i,1),i--;}
            if(player.superCooldown>0){let p=player.superCooldown/180;ctx.fillStyle="#000000aa";ctx.fillRect(10,canvasHeight-55,65,12);ctx.fillStyle="#ffaa44";ctx.fillRect(10,canvasHeight-55,65*(1-p),12);ctx.fillStyle="#ffaa88";ctx.font="8px monospace";ctx.fillText(`🌟 ${Math.ceil(player.superCooldown/10)}с`,15,canvasHeight-43);}
            if(showMap)drawFullMap();
            if(shopOpen)drawShop();
            if(showInventory)drawInventory();
            if(showStatsWindow)drawStatsWindow();
            if(showAchievements)drawAchievementsWindow();
            drawAchievementPopup();
            drawAttackEffects();
        }
        
        function handleWheel(e){
            if(shopOpen){let items=shopTab==="potions"?[1,2,3,4]:shopTab==="armor"?ALL_ARMOR.filter(a=>a.level<=player.level+10):shopTab==="weapons"?ALL_WEAPONS.filter(w=>w.level<=player.level+10):[1];let maxScroll=Math.max(0,items.length-shopItemsPerPage);shopScroll=Math.min(maxScroll,Math.max(0,shopScroll+(e.deltaY>0?1:-1)));e.preventDefault();}
            else if(showInventory){let avA=ALL_ARMOR.filter(a=>a.level<=player.level),avW=ALL_WEAPONS.filter(w=>w.level<=player.level);let maxScroll=Math.max(0,avA.length+avW.length-invItemsPerPage);invScroll=Math.min(maxScroll,Math.max(0,invScroll+(e.deltaY>0?1:-1)));e.preventDefault();}
            else if(showStatsWindow){let maxScroll=Math.max(0,10-statsItemsPerPage);statsScroll=Math.min(maxScroll,Math.max(0,statsScroll+(e.deltaY>0?1:-1)));e.preventDefault();}
        }
        canvas.addEventListener('wheel',handleWheel,{passive:false});
        
        function update(){
            updateMove();updateMobs();updateCamera();
            if(player.attackTimer>0)player.attackTimer--;
            if(player.superCooldown>0)player.superCooldown--;
            if(spawnTimer<=0){if(mobs.length<MAX_MOBS)for(let i=0;i<2;i++)spawnMob();spawnTimer=14;}else spawnTimer--;
            if(bossSpawnTimer<=0&&bosses.length===0&&player.level>=5){bossSpawnTimer=300+Math.random()*120;spawnBoss();}else bossSpawnTimer--;
            for(let i=0;i<messages.length;i++)if(messages[i].life)messages[i].life--;
            messages=messages.filter(m=>!m.life||m.life>0);
        }
        
        function getWorldClick(cx,cy){let rect=canvas.getBoundingClientRect(),sx=canvasWidth/rect.width,sy=canvasHeight/rect.height;return{x:(cx-rect.left)*sx+cameraX,y:(cy-rect.top)*sy+cameraY};}
        
        canvas.addEventListener('click',(e)=>{let w=getWorldClick(e.clientX,e.clientY);
            if(shopOpen){if(handleShopClick(e.clientX,e.clientY))return;}
            else if(showInventory){if(handleInventoryClick(e.clientX,e.clientY))return;}
            else if(showStatsWindow){if(handleStatsClick(e.clientX,e.clientY))return;}
            else if(showAchievements){if(handleAchievementsClick(e.clientX,e.clientY))return;}
            handleClick(w.x,w.y);
        });
        
        canvas.addEventListener('touchstart',(e)=>{e.preventDefault();let t=e.touches[0],w=getWorldClick(t.clientX,t.clientY);
            if(shopOpen){if(handleShopClick(t.clientX,t.clientY))return;}
            else if(showInventory){if(handleInventoryClick(t.clientX,t.clientY))return;}
            else if(showStatsWindow){if(handleStatsClick(t.clientX,t.clientY))return;}
            else if(showAchievements){if(handleAchievementsClick(t.clientX,t.clientY))return;}
            handleClick(w.x,w.y);
        });
        
        setInterval(()=>{if(selectedMob&&selectedMob.hp>0&&Math.hypot(player.x-selectedMob.x,player.y-selectedMob.y)<=player.attackRange+15)playerAttack();},1200);
        setInterval(()=>{if(playerNickname)saveGame();},30000);
        window.addEventListener('beforeunload',()=>{if(playerNickname)saveGame();});
        
        document.getElementById('attackBtn').onclick=()=>{if(selectedMob&&selectedMob.hp>0)playerAttack();else addMsg("🎯 Выберите цель",true);};
        document.getElementById('skillBtn').onclick=()=>useSkill();
        document.getElementById('superBtn').onclick=()=>useSuper();
        document.getElementById('hpBtn').onclick=()=>useHp();
        document.getElementById('mpBtn').onclick=()=>useMp();
        document.getElementById('statsBtn').onclick=()=>{showStatsWindow=!showStatsWindow;showInventory=false;showMap=false;showAchievements=false;statsScroll=0;};
        document.getElementById('invBtn').onclick=()=>{showInventory=!showInventory;showStatsWindow=false;showMap=false;showAchievements=false;invScroll=0;};
        document.getElementById('mapBtn').onclick=()=>{showMap=!showMap;showStatsWindow=false;showInventory=false;showAchievements=false;};
        document.getElementById('achievBtn').onclick=()=>{showAchievements=!showAchievements;showStatsWindow=false;showInventory=false;showMap=false;};
        document.getElementById('classWarriorBtn').onclick=()=>switchClass('warrior');
        document.getElementById('classArcherBtn').onclick=()=>switchClass('archer');
        document.getElementById('classMageBtn').onclick=()=>switchClass('mage');
        
        window.addEventListener('keydown',(e)=>{
            if(e.key==='1')useSuper();
            if(e.key==='2')useHp();
            if(e.key==='3')useMp();
            if(e.key==='s')useSkill();
            if(e.key==='r'||e.key==='R')switchClass();
            if(e.key==='7'||e.key==='m'||e.key==='M'){showMap=!showMap;showStatsWindow=false;showInventory=false;showAchievements=false;}
            if(e.key==='Escape'){showMap=false;showStatsWindow=false;showInventory=false;shopOpen=false;showAchievements=false;}
        });
        
        async function startGame(){
            await (async()=>{
                const lastNick=localStorage.getItem('rucoy_last_nickname');
                if(lastNick&&localStorage.getItem('rucoy_save_'+lastNick)){
                    playerNickname=lastNick;
                    loadGame(lastNick);
                    document.getElementById('nicknameDisplay').innerHTML=`👤 ${lastNick}`;
                    return;
                }
                playerNickname=await showNicknameModal();
                document.getElementById('nicknameDisplay').innerHTML=`👤 ${playerNickname}`;
                if(!loadGame(playerNickname)){addMsg(`✨ Добро пожаловать, ${playerNickname}!`);}
            })();
            generateWorld();
            updateStatsFromLevel();
            if(player.hp<=0){player.hp=player.maxHp;player.mp=player.maxMp;}
            for(let i=0;i<12;i++)spawnMob();
            updatePortalStatus();
            addMsg("✨ Добро пожаловать в Rucoy Online!");
            addMsg("🏆 Убивайте мобов для открытия портала в новый мир!");
            addMsg("📜 Свитки телепортации в магазине!");
            addMsg("⚔️ R - смена класса | 1 - СУПЕР | 2 - HP | 3 - MP | S - СКИЛЛ");
        }
        
        startGame();
        
        function render(){drawWorld();for(let m of mobs)drawMob(m);for(let b of bosses)drawBoss(b);drawRealisticPlayer(player.x-cameraX,player.y-cameraY,player.isMoving);drawUI();}
        function loop(){update();render();requestAnimationFrame(loop);}
        loop();
    })();
</script>
</body>
</html>
