<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ТИМОФЕЙ: АШ 2.0 · ШКОЛЬНЫЙ КВЕСТ</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3c2c 0%, #2a5a3a 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
      padding: 12px;
    }

    .game-wrapper {
      max-width: 950px;
      width: 100%;
      background: #d4c3a3;
      background-image: linear-gradient(145deg, #e8d8b7, #c8b48c);
      border-radius: 40px 40px 30px 30px;
      box-shadow: 0 18px 0 #6b4f32, 0 25px 30px rgba(0,0,0,0.4);
      padding: 20px 20px 28px;
      border: 5px solid #b39264;
    }

    h1 {
      margin: 0 0 5px;
      font-size: 2.7rem;
      font-weight: 900;
      text-align: center;
      color: #2a1f0e;
      text-shadow: 4px 4px 0 #e0b87b;
      letter-spacing: 3px;
      filter: drop-shadow(0 6px 2px #5a422a);
      word-break: break-word;
    }

    .school-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #5f7a5a;
      margin: 8px 0 16px;
      padding: 8px 20px;
      border-radius: 50px;
      border: 4px solid #3a552f;
      box-shadow: inset 0 2px 6px #b1c6a4, 0 6px 0 #2f4423;
      color: #f9f1d2;
      font-weight: bold;
      font-size: 1.3rem;
    }

    .notes-counter {
      background: #2d2616;
      padding: 8px 22px;
      border-radius: 30px;
      box-shadow: inset 0 2px 5px #6e5e3e, 0 3px 0 #1a150a;
      color: #ffecb3;
      font-size: 1.6rem;
    }

    .map-container {
      background: #4a6741;
      padding: 16px;
      border-radius: 30px;
      border: 6px solid #2f4a2a;
      box-shadow: inset 0 0 0 4px #72956a, 0 12px 0 #1f331a;
      margin-bottom: 18px;
    }

    .school-map {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    .room {
      aspect-ratio: 1 / 1.1;
      background: #c9af8b;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px 2px;
      box-shadow: inset 0 -6px 0 #7b623e, 0 7px 0 #5a4028, 0 3px 8px black;
      border: 3px solid #a58357;
      font-weight: bold;
      font-size: 1rem;
      text-align: center;
      color: #1f1a0e;
      transition: 0.05s linear;
      cursor: pointer;
    }

    .room.timofey {
      background: #f5cd7a;
      box-shadow: inset 0 -6px 0 #b38b40, 0 7px 0 #6f4f1f, 0 3px 8px black;
      border-color: #f3b33d;
      transform: scale(1.02);
    }

    .room.galina {
      background: #b58a6c;
      box-shadow: inset 0 -6px 0 #825e48, 0 7px 0 #543e2e, 0 3px 8px black;
      border-color: #e0925b;
    }

    .room.has-note {
      background: #b0c487;
      box-shadow: inset 0 -6px 0 #6f884c, 0 7px 0 #41552c, 0 3px 8px black;
    }

    .room-emoji {
      font-size: 2.2rem;
      line-height: 1.2;
      filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.2));
    }

    .room-name {
      font-size: 0.7rem;
      background: #352d1cc9;
      padding: 3px 8px;
      border-radius: 20px;
      color: #f3eaca;
      margin-top: 2px;
    }

    .action-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 10px;
      justify-content: center;
    }

    .btn {
      background: #fbeba8;
      border: 4px solid #b67936;
      color: #2b1d0a;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 12px 16px;
      border-radius: 40px;
      box-shadow: 0 7px 0 #7b4f24, 0 4px 8px black;
      cursor: pointer;
      text-align: center;
      transition: all 0.05s;
      font-family: inherit;
      text-transform: uppercase;
      flex: 1 0 130px;
      transform: translateY(-2px);
    }

    .btn:active {
      box-shadow: 0 3px 0 #7b4f24, 0 2px 6px black;
      transform: translateY(4px);
    }

    .btn.special {
      background: #f7b05e;
      border-color: #b85f1a;
      box-shadow: 0 7px 0 #9e4a1b, 0 4px 8px black;
    }

    .log-box {
      background: #1e2a1acc;
      backdrop-filter: blur(4px);
      color: #f0eac1;
      padding: 14px 18px;
      border-radius: 30px;
      font-size: 1.2rem;
      font-weight: bold;
      min-height: 70px;
      border: 3px solid #b3924b;
      box-shadow: inset 0 0 12px #00000077, 0 6px 0 #5f4a26;
      margin: 18px 0 8px;
    }

    .reset-btn {
      background: #5d6e52;
      border-color: #2f4028;
      box-shadow: 0 6px 0 #2b3a22;
      color: #f5efd7;
    }

    .galina-zone {
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <h1>🏫 ТИМОФЕЙ: АШ 2.0</h1>
  <div class="school-header">
    <span>🏃‍♂️ ГЛУПЫЙ ТИМОФЕЙ</span>
    <span class="notes-counter">📋 <span id="noteCountDisplay">0</span>/5 ЗАПИСОК</span>
    <span>👩‍🏫 ГАЛИНА В.</span>
  </div>

  <!-- Карта школы 5x2 (10 кабинетов) -->
  <div class="map-container">
    <div class="school-map" id="schoolMap"></div>
  </div>

  <!-- Кнопки действий -->
  <div class="action-panel">
    <button class="btn" id="moveBtn">🚶 ПЕРЕМЕСТИТЬСЯ</button>
    <button class="btn special" id="takeNoteBtn">📜 ВЗЯТЬ ЗАПИСКУ</button>
    <button class="btn" id="goToGalinaBtn">👩‍🏫 К ГАЛИНЕ</button>
  </div>

  <!-- Лог событий -->
  <div class="log-box" id="logDisplay">
    🏫 Тимофей в школе. Собери 5 записок и сдай Галине Владимировне на АШ 2.0!
  </div>

  <!-- Сброс -->
  <div style="display: flex; justify-content: center; margin-top: 12px;">
    <button class="btn reset-btn" id="resetBtn">🔄 НОВАЯ ИГРА (СБРОС)</button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- КОНФИГУРАЦИЯ ШКОЛЫ ----------
    const ROOMS = [
      { name: 'Каб. Физики', emoji: '⚛️', hasNote: true },
      { name: 'Столовая', emoji: '🍕', hasNote: true },
      { name: 'Спортзал', emoji: '🏀', hasNote: true },
      { name: 'Библиотека', emoji: '📚', hasNote: true },
      { name: 'Каб. Химии', emoji: '🧪', hasNote: true },
      { name: 'Учительская', emoji: '🚪', hasNote: false },      // Галина здесь
      { name: 'Рекреация', emoji: '🪑', hasNote: false },
      { name: 'Туалет', emoji: '🚻', hasNote: false },
      { name: 'Каб. Информ.', emoji: '💻', hasNote: false },
      { name: 'Актовый зал', emoji: '🎭', hasNote: false }
    ];

    const GALINA_ROOM_INDEX = 5;   // Учительская

    // Состояние игры
    let timofeyPosition = 0;            // индекс комнаты (0-9)
    let collectedNotes = 0;            // сколько записок собрано
    let notesTaken = new Array(10).fill(false); // true если записка уже взята
    let gameCompleted = false;         // сдал ли уже на АШ 2.0
    let gameOver = false;             // флаг завершения (после сдачи)

    // DOM элементы
    const mapEl = document.getElementById('schoolMap');
    const noteSpan = document.getElementById('noteCountDisplay');
    const logEl = document.getElementById('logDisplay');

    // Инициализация массива записок (true там где ROOMS.hasNote)
    function resetNotesState() {
      for (let i = 0; i < ROOMS.length; i++) {
        notesTaken[i] = false;
      }
    }

    // Обновление UI карты
    function renderMap() {
      mapEl.innerHTML = '';
      ROOMS.forEach((room, idx) => {
        const roomDiv = document.createElement('div');
        roomDiv.className = 'room';
        
        // Особые классы
        if (idx === timofeyPosition) roomDiv.classList.add('timofey');
        if (idx === GALINA_ROOM_INDEX) roomDiv.classList.add('galina');
        
        // Записка (если ещё не взята и комната содержит записку)
        if (room.hasNote && !notesTaken[idx] && !gameCompleted) {
          roomDiv.classList.add('has-note');
        }
        
        // Эмодзи + название
        let noteIcon = '';
        if (room.hasNote && !notesTaken[idx] && !gameCompleted) noteIcon = '📋';
        
        roomDiv.innerHTML = `
          <div class="room-emoji">${room.emoji}${noteIcon}</div>
          <div class="room-name">${room.name}</div>
        `;
        
        // Клик по комнате = попытка перемещения (если игра не завершена)
        roomDiv.addEventListener('click', (e) => {
          if (gameCompleted || gameOver) {
            addLog('🎉 Игра завершена! Начни заново (кнопка сброса).');
            return;
          }
          const targetIdx = idx;
          if (targetIdx === timofeyPosition) {
            addLog(`🤨 Тимофей уже в ${ROOMS[targetIdx].name}.`);
            return;
          }
          // Перемещение
          timofeyPosition = targetIdx;
          addLog(`🚶 Тимофей перешёл в ${ROOMS[targetIdx].name}.`);
          
          // Если комната с запиской и ещё не взята, подсказка
          if (ROOMS[targetIdx].hasNote && !notesTaken[targetIdx]) {
            addLog(`📋 В ${ROOMS[targetIdx].name} лежит записка! Нажми "ВЗЯТЬ ЗАПИСКУ".`);
          }
          if (targetIdx === GALINA_ROOM_INDEX) {
            addLog(`👩‍🏫 Ты в Учительской. Галина Владимировна ждёт записки (${collectedNotes}/5).`);
          }
          renderMap();
          updateNoteCounter();
        });
        
        mapEl.appendChild(roomDiv);
      });
    }

    // Обновление счётчика записок
    function updateNoteCounter() {
      noteSpan.textContent = `${collectedNotes}/5`;
    }

    // Вывод в лог
    function addLog(msg) {
      logEl.textContent = msg;
    }

    // Взять записку
    function takeNoteAction() {
      if (gameCompleted || gameOver) {
        addLog('⛔ Игра уже завершена. Жми "НОВАЯ ИГРА".');
        return;
      }
      
      const currentRoom = ROOMS[timofeyPosition];
      
      if (!currentRoom.hasNote) {
        addLog(`❌ В ${currentRoom.name} нет записки. Ищи в других кабинетах!`);
        return;
      }
      
      if (notesTaken[timofeyPosition]) {
        addLog(`📋 Записка из ${currentRoom.name} уже взята.`);
        return;
      }
      
      // Забираем записку
      notesTaken[timofeyPosition] = true;
      collectedNotes++;
      updateNoteCounter();
      
      addLog(`✅ Тимофей взял записку из ${currentRoom.name}! Всего ${collectedNotes}/5.`);
      
      if (collectedNotes === 5) {
        addLog(`🎉 ВСЕ 5 ЗАПИСОК СОБРАНЫ! Иди к Галине Владимировне сдавать на АШ 2.0!`);
      }
      
      renderMap();
    }

    // Пойти к Галине и попытаться сдать
    function goToGalina() {
      if (gameCompleted || gameOver) {
        addLog('🏆 Тимофей уже получил АШ 2.0! Сбрось игру для нового забега.');
        return;
      }
      
      // Проверка: находится ли Тимофей в учительской
      if (timofeyPosition !== GALINA_ROOM_INDEX) {
        addLog(`🚫 Галина Владимировна в Учительской! Сначала доберись до неё (кликни по Учительской).`);
        return;
      }
      
      // Проверка записок
      if (collectedNotes < 5) {
        addLog(`👩‍🏫 Галина Владимировна: "Тимофей, у тебя только ${collectedNotes}/5 записок. Собери все 5!"`);
        return;
      }
      
      // УСПЕХ! Сдача на АШ 2.0
      gameCompleted = true;
      gameOver = true;
      
      addLog(`🏆👑 ГАЛИНА ВЛАДИМИРОВНА ПРИНИМАЕТ 5 ЗАПИСОК! ТИМОФЕЙ ПОЛУЧАЕТ "АШ 2.0" !!! ПОБЕДА! 🎓🤡`);
      
      // Спецэффект
      renderMap();
      updateNoteCounter();
    }

    // Перемещение (кнопка "ПЕРЕМЕСТИТЬСЯ" — для удобства, но перемещаться можно кликом по комнатам)
    function moveAction() {
      if (gameCompleted || gameOver) {
        addLog('Игра окончена. Сбрось для новой попытки.');
        return;
      }
      addLog('👆 Кликни по любой комнате на карте, чтобы Тимофей туда пошёл!');
    }

    // Сброс игры
    function resetGame() {
      timofeyPosition = 0;   // старт в каб. физики
      collectedNotes = 0;
      resetNotesState();
      gameCompleted = false;
      gameOver = false;
      
      addLog('🔄 Новая игра! Тимофей в школе. Собери 5 записок и иди к Галине Владимировне.');
      renderMap();
      updateNoteCounter();
    }

    // Инициализация
    function initGame() {
      resetNotesState();
      timofeyPosition = 0;
      collectedNotes = 0;
      gameCompleted = false;
      gameOver = false;
      
      renderMap();
      updateNoteCounter();
      addLog('🏫 Тимофей в школе. Собери 5 записок и сдай Галине Владимировне на АШ 2.0!');
      
      // Привязка кнопок
      document.getElementById('moveBtn').addEventListener('click', moveAction);
      document.getElementById('takeNoteBtn').addEventListener('click', takeNoteAction);
      document.getElementById('goToGalinaBtn').addEventListener('click', goToGalina);
      document.getElementById('resetBtn').addEventListener('click', resetGame);
    }

    initGame();
  })();
</script>
</body>
</html>
