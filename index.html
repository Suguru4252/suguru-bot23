<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Свадьба Ильи и Артёма | Полное издание</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #140b06 0%, #3d261b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', 'Georgia', serif;
            padding: 20px;
        }

        .game-wrapper {
            max-width: 850px;
            width: 100%;
            background: #fffef5;
            border-radius: 56px;
            box-shadow: 0 35px 60px rgba(0,0,0,0.5), 0 0 0 3px #ffdaa5 inset;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(145deg, #c13e36, #942820);
            padding: 18px 24px;
            color: #fff5e0;
            text-align: center;
            border-bottom: 5px solid #ffd27a;
        }

        .header h1 {
            font-size: 1.8rem;
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
        }

        .header h1 span {
            background: #ffefb9;
            color: #942820;
            padding: 0 14px;
            border-radius: 50px;
            display: inline-block;
            margin: 0 6px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-top: 14px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: rgba(255,235,200,0.25);
            backdrop-filter: blur(6px);
            border-radius: 50px;
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .story-pane {
            padding: 26px;
            min-height: 520px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .scene-art {
            text-align: center;
            font-size: 4.8rem;
            background: #fff3e8;
            border-radius: 55px;
            padding: 20px;
            transition: 0.2s;
        }

        .story-text {
            background: white;
            border-radius: 36px;
            padding: 24px;
            font-size: 1.05rem;
            line-height: 1.5;
            color: #352316;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            border: 1px solid #ffe2bd;
        }

        .guest-status {
            background: #f9ede0;
            border-radius: 50px;
            padding: 12px 18px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            font-size: 0.8rem;
        }

        .guest-chip {
            background: white;
            border-radius: 40px;
            padding: 4px 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .inventory-box {
            background: #e8d9cc;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.8rem;
            text-align: center;
        }

        .choices-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-item {
            background: #f3e5d8;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: 0.1s;
            color: #4a2a1a;
            border-left: 8px solid #e6a157;
            font-family: inherit;
        }

        .choice-item:hover {
            background: #fff0e2;
            transform: translateX(6px);
            border-left-color: #c2571a;
        }

        .reset-button {
            background: #b17b58;
            border: none;
            padding: 12px;
            border-radius: 44px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-top: 16px;
            font-size: 0.9rem;
        }

        .toast-message {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c1b12;
            color: #ffddb0;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            z-index: 2000;
            animation: toastPop 0.3s ease;
            box-shadow: 0 5px 20px black;
            font-size: 0.9rem;
        }

        @keyframes toastPop {
            from { opacity: 0; transform: translateX(-50%) translateY(30px);}
            to { opacity: 1; transform: translateX(-50%) translateY(0);}
        }

        .footer {
            background: #f7e5d4;
            padding: 12px;
            text-align: center;
            font-size: 0.7rem;
            color: #b87a55;
        }

        @media (max-width: 550px) {
            .story-pane { padding: 18px; }
            .story-text { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
<div class="game-wrapper" id="gameRoot">
    <div class="header">
        <h1>💒 <span>Илья</span> 🤵‍♂️❤️👰‍♂️ <span>Артём</span> 🏳️‍🌈</h1>
        <div class="stats-row">
            <div class="stat-badge">💗 Гармония: <strong id="harmonyValue">50</strong>%</div>
            <div class="stat-badge">🎭 Глава: <strong id="chapterTitle">Пролог</strong></div>
            <div class="stat-badge">🏅 Достижений: <strong id="achievCount">0</strong></div>
            <div class="stat-badge">🌤️ Погода: <strong id="weatherIcon">☀️ Солнечно</strong></div>
        </div>
    </div>
    <div class="story-pane" id="storyArea"></div>
    <div class="footer">
        🎵 Музыка любви играет фоном | Каждый выбор меняет свадьбу, гостей и судьбу молодожёнов 🎵
    </div>
</div>

<script>
    // ~~~~~~~~~~~~~~ СВАДЬБА ИЛЬИ И АРТЁМА: РАСШИРЕННАЯ ВЕРСИЯ ~~~~~~~~~~~~~~
    // --- ДОСТИЖЕНИЯ ---
    let achievements = [];

    const allAchievements = {
        trueLove: "💯 Идеальный союз (100% гармонии)",
        flowerCatch: "💐 Король букета (выиграли мини-игру)",
        weatherWizard: "🌈 Повелитель погоды (устранили непогоду)",
        guestLover: "👨‍👩‍👧‍👦 Душа компании (все гости в восторге)",
        secretEnding: "🔮 Секретный финал (нашли тайный путь)",
        memoryKeeper: "📸 Альбом воспоминаний (открыли эпилог)"
    };

    function addAchievement(id) {
        if (!achievements.includes(id)) {
            achievements.push(id);
            showToast("🏆 ДОСТИЖЕНИЕ: " + allAchievements[id]);
            updateAchievementUI();
            saveGame();
        }
    }

    function showToast(msg) {
        let toast = document.createElement("div");
        toast.className = "toast-message";
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    }

    function updateAchievementUI() {
        document.getElementById("achievCount").innerText = achievements.length;
    }

    // --- Гости с динамической репутацией ---
    let guests = {
        "Мама Ильи": { mood: 70, emoji: "👩‍🍳", bonus: "пироги" },
        "Папа Артёма": { mood: 68, emoji: "👨‍🦰", bonus: "тосты" },
        "Свидетельница Алиса": { mood: 80, emoji: "💃", bonus: "конкурсы" },
        "Свидетель Коля": { mood: 75, emoji: "🎸", bonus: "музыка" },
        "Бабушка Зина": { mood: 85, emoji: "👵🎤", bonus: "частушки" },
        "Кот Мурзик": { mood: 100, emoji: "🐱", bonus: "хаос" },
        "Тётя Галя": { mood: 60, emoji: "👒", bonus: "комплименты" }
    };

    // --- Погодная система ---
    let currentWeather = { type: "sunny", name: "☀️ Солнечно", effect: 0 };

    const weathers = {
        sunny: { name: "☀️ Солнечно", emoji: "☀️", effect: 2 },
        rainy: { name: "🌧️ Дождливо", emoji: "🌧️", effect: -5 },
        rainbow: { name: "🌈 Радуга", emoji: "🌈", effect: 10 },
        windy: { name: "💨 Ветрено", emoji: "💨", effect: -2 }
    };

    function setWeather(type) {
        if (weathers[type]) {
            currentWeather = { type: type, name: weathers[type].name, effect: weathers[type].effect };
            document.getElementById("weatherIcon").innerHTML = currentWeather.name;
        }
    }

    // --- Игровое состояние ---
    let gameState = {
        harmony: 50,
        chapter: "prologue",
        flags: {
            ringSaved: false,
            danceHit: false,
            parentsBless: false,
            cakeSaved: false,
            speechEpic: false,
            megaSurprise: false,
            secretPath: false
        },
        inventory: ["💌 Приглашение", "🍾 Шампанское"],
        flowerGamePlayed: false,
        epilogueUnlocked: false
    };

    // ~~~~~~~~~~~~~~ СЮЖЕТНЫЕ СЦЕНЫ (16+ уникальных) ~~~~~~~~~~~~~~
    const scenes = {
        prologue: {
            title: "🌅 Начало легенды",
            emoji: "🏳️‍🌈🌄",
            text: "Илья и Артём готовятся к свадьбе уже три года. Сегодня тот самый день! Но с утра происходит череда событий: кот Мурзик украл галстуки, а тётя Галя принесла огромный пирог с сюрпризом. Что делать первым делом?",
            choices: [
                { text: "🐱 Догнать кота и спасти галстуки", nextScene: "catRescue", harmonyDelta: 5, flagSet: "ringSaved", flagVal: true },
                { text: "🎁 Открыть пирог тёти Гали (может быть сюрприз)", nextScene: "pieSurprise", harmonyDelta: 3 },
                { text: "📞 Позвонить Артёму и всё обсудить", nextScene: "callArtem", harmonyDelta: 2 }
            ]
        },
        catRescue: {
            title: "🐱 Погоня за Мурзиком",
            emoji: "🐈💨",
            text: "Кот устроил хаос, но галстуки спасены! В награду Мурзик принёс... старинную монету на счастье. Илья чувствует, что день начинается удачно. Артём смеётся и говорит, что это знак.",
            choices: [
                { text: "🍀 Положить монету в карман (удача +)", nextScene: "guestGathering", harmonyDelta: 7, flagSet: "ringSaved", flagVal: true },
                { text: "💰 Отдать монету коту как игрушку", nextScene: "guestGathering", harmonyDelta: 2 }
            ]
        },
        pieSurprise: {
            title: "🥧 Секрет пирога",
            emoji: "🥧✨",
            text: "Внутри пирога — записка: «Желаю вам найти настоящую любовь. Она уже рядом». Тётя Галя растрогана. Гости начинают собираться с хорошим настроением.",
            choices: [
                { text: "📜 Прочитать записку вслух (трогательный момент)", nextScene: "guestGathering", harmonyDelta: 8 },
                { text: "🤫 Сохранить как личный талисман", nextScene: "guestGathering", harmonyDelta: 4 }
            ]
        },
        callArtem: {
            title: "📱 Сердечный разговор",
            emoji: "📞💕",
            text: "Артём говорит: «Я так волнуюсь, но с тобой я спокоен». Внезапно на фоне слышен звук разбитой вазы. Оказывается, свидетель Коля уронил декорации. Надо выручать!",
            choices: [
                { text: "🎭 Помочь Коле с декорациями", nextScene: "guestGathering", harmonyDelta: 5 },
                { text: "🎁 Послать курьера с цветами для Артёма", nextScene: "guestGathering", harmonyDelta: 6 }
            ]
        },
        guestGathering: {
            title: "👥 Гости в сборе!",
            emoji: "🎉👪",
            text: "Все гости прибыли. Мама Ильи печёт блины, папа Артёма репетирует тост, свидетельница Алиса предлагает конкурсы. Но погода начинает портиться... Вдруг капает дождь!",
            choices: [
                { text: "☂️ Организовать зонтики и продолжить веселье (творчески)", nextScene: "weatherEvent", harmonyDelta: 5 },
                { text: "🏠 Перенести всё под шатёр", nextScene: "weatherEvent", harmonyDelta: 3 },
                { text: "🎤 Устроить конкурс «Лучший тост» в помещении", nextScene: "weatherEvent", harmonyDelta: 4 }
            ]
        },
        weatherEvent: {
            title: "🌧️ Вызов стихии",
            emoji: "⛈️☔",
            text: "Начинается ливень! Гости огорчены. Но Илья и Артём не сдаются. Вдруг небо проясняется — появляется радуга! Это добрый знак. Нужно устроить что-то особенное!",
            choices: [
                { text: "🌈 Танцы под радугой (магический момент)", nextScene: "danceContest", harmonyDelta: 10, weatherSet: "rainbow", flagSet: "megaSurprise", flagVal: true, achievement: "weatherWizard" },
                { text: "🎶 Позвать музыкантов сыграть весёлую песню", nextScene: "danceContest", harmonyDelta: 7, weatherSet: "rainbow" }
            ]
        },
        danceContest: {
            title: "💃 Танцевальный баттл",
            emoji: "🕺💥💃",
            text: "Илья и Артём показывают вальс, потом переходят на дикий тверк! Бабушка Зина выходит с частушками, свидетель Коля играет на гитаре. Гости в восторге!",
            choices: [
                { text: "🎸 Добавить рок-н-ролл (взрыв эмоций)", nextScene: "flowerGame", harmonyDelta: 12, flagSet: "danceHit", flagVal: true, achievement: "guestLover" },
                { text: "💖 Закончить медленным танцем (очень романтично)", nextScene: "flowerGame", harmonyDelta: 9, flagSet: "danceHit", flagVal: true }
            ]
        },
        flowerGame: {
            title: "💐 Букет невесты — мини-игра!",
            emoji: "💐🎲",
            text: "Свидетельница Алиса предлагает кинуть букет! Но Илья и Артём хотят устроить челлендж: кто поймает букет — загадает желание. Выбери, как пройдёт игра!",
            choices: [
                { text: "🎯 Ловить букет с завязанными глазами (весело и хаотично)", nextScene: "speeches", harmonyDelta: 5, flowerSpecial: "chaos" },
                { text: "🤹‍♂️ Устроить эстафету с букетом", nextScene: "speeches", harmonyDelta: 7, flowerSpecial: "fun" },
                { text: "💝 Подарить букет бабушке Зине (трогательно)", nextScene: "speeches", harmonyDelta: 10, flowerSpecial: "touch", achievement: "flowerCatch" }
            ]
        },
        speeches: {
            title: "🎤 Клятвы и тосты",
            emoji: "🍷📜",
            text: "Папа Артёма говорит пронзительный тост, мама Ильи плачет. Теперь слово женихам! Их клятвы могут быть смешными или трогательными. Весь зал замирает.",
            choices: [
                { text: "❤️‍🔥 Пронзительная клятва в стихах (слёзы счастья)", nextScene: "cakeCalamity", harmonyDelta: 12, flagSet: "speechEpic", flagVal: true },
                { text: "😂 Смешная клятва с обещанием мыть посуду", nextScene: "cakeCalamity", harmonyDelta: 7, flagSet: "speechEpic", flagVal: false },
                { text: "🎭 Импровизация в стиле любимого фильма", nextScene: "cakeCalamity", harmonyDelta: 8 }
            ]
        },
        cakeCalamity: {
            title: "🍰 Торт в опасности!",
            emoji: "🎂🐱",
            text: "Вывозят огромный трёхъярусный торт! Но Мурзик уже целится в фигурки женихов. Нужно спасать десерт! Вдруг тётя Галя предлагает отвлечь кота сметаной.",
            choices: [
                { text: "🐟 Дать коту рыбку (успех, торт спасён!)", nextScene: "secretPathCheck", harmonyDelta: 10, flagSet: "cakeSaved", flagVal: true, achievement: "guestLover" },
                { text: "🏃‍♂️ Быстро укатить торт на безопасное место", nextScene: "secretPathCheck", harmonyDelta: 6, flagSet: "cakeSaved", flagVal: true },
                { text: "😱 Позвать всех на помощь (кот съел верхушку)", nextScene: "secretPathCheck", harmonyDelta: -3, flagSet: "cakeSaved", flagVal: false }
            ]
        },
        secretPathCheck: {
            title: "🔮 Тайная тропа",
            emoji: "🗝️🌟",
            text: "Илья вспоминает, что дедушка Артёма оставил старую карту. Если следовать ей, можно найти потайную комнату с сюрпризом. Но времени мало!",
            choices: [
                { text: "🗺️ Исследовать тайную комнату (секретный контент!)", nextScene: "secretEnding", harmonyDelta: 15, flagSet: "secretPath", flagVal: true, requiresFlag: null },
                { text: "🎆 Остаться и готовить грандиозный финал", nextScene: "grandFinale", harmonyDelta: 8 }
            ]
        },
        secretEnding: {
            title: "💎 Секретная комната",
            emoji: "✨🏆",
            text: "В комнате они находят старые фото дедушки и его возлюбленного, письма и волшебный кристалл. Оказывается, дед тоже мечтал о большой любви. Илья и Артём клянутся хранить эту память. Гости потрясены историей!",
            choices: [
                { text: "💖 Поделиться историей со всеми (всеобщее умиление)", nextScene: "grandFinale", harmonyDelta: 20, flagSet: "megaSurprise", flagVal: true, achievement: "secretEnding" },
                { text: "🤫 Сохранить тайну, но добавить кристалл в свадебный обряд", nextScene: "grandFinale", harmonyDelta: 15 }
            ]
        },
        grandFinale: {
            title: "🎆 Великий финал",
            emoji: "🎇💒",
            text: "", // динамический текст в рендере
            choices: []
        }
    };

    // Финальная логика с эпилогом
    function getFinalContent() {
        let harmony = Math.min(100, Math.max(0, gameState.harmony));
        let finalText = "";
        let finalEmoji = "🏆💖";

        if (harmony >= 90 && gameState.flags.megaSurprise && gameState.flags.speechEpic) {
            finalEmoji = "👑🌈💎";
            finalText = "🌟✨ ЛЕГЕНДАРНАЯ СВАДЬБА ТЫСЯЧЕЛЕТИЯ ✨🌟 Илья и Артём создали праздник, который войдёт в историю! Фейерверк, радуга, тайная комната, идеальные клятвы — всё это переполняет сердца любовью. Гости рыдают от счастья, кот Мурзик получил отдельный торт. Эта история станет семейной легендой!";
            addAchievement("trueLove");
        } else if (harmony >= 70) {
            finalEmoji = "🥂💕🎶";
            finalText = "Прекрасная, душевная свадьба! Были и смех, и слёзы. Родители танцуют, друзья обнимаются. Илья с Артёмом кружатся в прощальном вальсе. День, когда любовь победила всё! ❤️‍🔥";
        } else if (harmony >= 45) {
            finalEmoji = "😊🍰🎉";
            finalText = "Очень веселая и немного безумная свадьба! Кот украл галстук, торт чудом выжил, дождь превратился в радугу. Все довольны, молодожёны сияют. Главное — они вместе навсегда!";
        } else {
            finalEmoji = "🌀😂❤️";
            finalText = "Свадьба вышла непредсказуемой: потеряли кольца, нашлись в торте, диджей уснул, но Илья и Артём сбежали на крышу и там пообещали друг другу любовь под звёздами. Романтичный хаос — их стиль!";
        }

        if (!gameState.epilogueUnlocked && harmony >= 60) {
            finalText += "\n\n📸 ЭПИЛОГ: Через год Илья и Артём открывают свадебный альбом, смеются над приключениями и планируют годовщину. Кот Мурзик мирно спит на коленях. История продолжается! 📸";
            gameState.epilogueUnlocked = true;
            addAchievement("memoryKeeper");
        }

        finalText += `\n\n✨ Итоговая гармония: ${harmony}% | Достижений: ${achievements.length}/${Object.keys(allAchievements).length} ✨`;
        if (gameState.flags.cakeSaved) finalText += "\n🍰 Торт уцелел!";
        if (gameState.flags.danceHit) finalText += "\n💃 Танец покорил всех!";
        
        return { text: finalText, emoji: finalEmoji };
    }

    // --- ОСНОВНОЙ ЦИКЛ UI ---
    function renderGame() {
        if (gameState.chapter === "grandFinale") {
            let finale = getFinalContent();
            document.getElementById("harmonyValue").innerText = Math.min(100, Math.max(0, Math.floor(gameState.harmony)));
            document.getElementById("chapterTitle").innerText = "Финал 💒";
            let finalHtml = `
                <div class="scene-art">${finale.emoji}</div>
                <div class="story-text">${finale.text.replace(/\n/g, '<br>')}</div>
                <button class="reset-button" id="resetGameBtnFinal">🌟 Начать историю заново 🌟</button>
            `;
            document.getElementById("storyArea").innerHTML = finalHtml;
            document.getElementById("resetGameBtnFinal").addEventListener("click", resetGame);
            return;
        }

        let scene = scenes[gameState.chapter];
        if (!scene) { resetGame(); return; }

        document.getElementById("harmonyValue").innerText = Math.min(100, Math.max(0, Math.floor(gameState.harmony)));
        document.getElementById("chapterTitle").innerText = scene.title;

        let choicesHtml = "";
        for (let i = 0; i < scene.choices.length; i++) {
            choicesHtml += `<button class="choice-item" data-choice-idx="${i}">${scene.choices[i].text}</button>`;
        }

        let guestsHtml = '<div class="guest-status">';
        for (let [name, g] of Object.entries(guests)) {
            let moodEmoji = g.mood > 75 ? "😄" : (g.mood > 50 ? "🙂" : "😐");
            guestsHtml += `<span class="guest-chip">${g.emoji || "👤"} ${name} ${moodEmoji}</span>`;
        }
        guestsHtml += '</div>';

        let invHtml = gameState.inventory.length ? `<div class="inventory-box">🎒 Инвентарь: ${gameState.inventory.join(" • ")}</div>` : "";

        let fullHtml = `
            <div class="scene-art">${scene.emoji}</div>
            <div class="story-text"><strong>${scene.title}</strong><br><br>${scene.text}</div>
            ${guestsHtml}
            ${invHtml}
            <div class="choices-list">${choicesHtml}</div>
            <button class="reset-button" id="resetGameBtn">🔄 Переиграть свадьбу</button>
        `;

        document.getElementById("storyArea").innerHTML = fullHtml;

        for (let i = 0; i < scene.choices.length; i++) {
            let btn = document.querySelector(`.choice-item[data-choice-idx="${i}"]`);
            if (btn) btn.addEventListener("click", () => applyChoice(scene.choices[i]));
        }
        let resetBtn = document.getElementById("resetGameBtn");
        if (resetBtn) resetBtn.addEventListener("click", resetGame);
    }

    function applyChoice(choice) {
        let newHarm = gameState.harmony + (choice.harmonyDelta || 0);
        gameState.harmony = Math.min(100, Math.max(0, newHarm));
        if (choice.flagSet) gameState.flags[choice.flagSet] = (choice.flagVal !== undefined) ? choice.flagVal : true;
        if (choice.achievement) addAchievement(choice.achievement);
        if (choice.weatherSet) setWeather(choice.weatherSet);
        
        // эффект мини-игры с букетом
        if (choice.flowerSpecial === "touch") {
            gameState.inventory.push("💐 заветный букет");
            showToast("💐 Букет пойман! Желание сбудется!");
        } else if (choice.flowerSpecial === "fun") {
            gameState.inventory.push("🎉 серпантин");
        }
        
        if (choice.nextScene) gameState.chapter = choice.nextScene;
        saveGame();
        renderGame();
    }

    function saveGame() {
        let save = {
            harmony: gameState.harmony,
            chapter: gameState.chapter,
            flags: gameState.flags,
            inventory: gameState.inventory,
            achievements: achievements,
            epilogueUnlocked: gameState.epilogueUnlocked,
            weather: currentWeather.type
        };
        localStorage.setItem("weddingDeluxeSave", JSON.stringify(save));
    }

    function loadGame() {
        let saved = localStorage.getItem("weddingDeluxeSave");
        if (!saved) return false;
        try {
            let data = JSON.parse(saved);
            gameState.harmony = data.harmony ?? 50;
            gameState.chapter = data.chapter ?? "prologue";
            gameState.flags = data.flags || {};
            gameState.inventory = data.inventory || ["💌 Приглашение", "🍾 Шампанское"];
            achievements = data.achievements || [];
            gameState.epilogueUnlocked = data.epilogueUnlocked || false;
            if (data.weather) setWeather(data.weather);
            else setWeather("sunny");
            updateAchievementUI();
            return true;
        } catch(e) { return false; }
    }

    function resetGame() {
        gameState = {
            harmony: 50,
            chapter: "prologue",
            flags: { ringSaved: false, danceHit: false, parentsBless: false, cakeSaved: false, speechEpic: false, megaSurprise: false, secretPath: false },
            inventory: ["💌 Приглашение", "🍾 Шампанское"],
            flowerGamePlayed: false,
            epilogueUnlocked: false
        };
        achievements = [];
        guests = {
            "Мама Ильи": { mood: 70, emoji: "👩‍🍳", bonus: "пироги" },
            "Папа Артёма": { mood: 68, emoji: "👨‍🦰", bonus: "тосты" },
            "Свидетельница Алиса": { mood: 80, emoji: "💃", bonus: "конкурсы" },
            "Свидетель Коля": { mood: 75, emoji: "🎸", bonus: "музыка" },
            "Бабушка Зина": { mood: 85, emoji: "👵🎤", bonus: "частушки" },
            "Кот Мурзик": { mood: 100, emoji: "🐱", bonus: "хаос" },
            "Тётя Галя": { mood: 60, emoji: "👒", bonus: "комплименты" }
        };
        setWeather("sunny");
        updateAchievementUI();
        saveGame();
        renderGame();
        showToast("🌅 История началась заново! Вперёд к приключениям!");
    }

    function init() {
        let loaded = loadGame();
        if (!loaded) setWeather("sunny");
        renderGame();
    }
    init();
</script>
</body>
</html>
