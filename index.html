<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chugur — Оффлайн мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #e0e0e0;
        }

        .messenger {
            width: 400px;
            height: 650px;
            background: #12122a;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(100, 100, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .header {
            background: linear-gradient(135deg, #1a1a3e, #0d0d2b);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(100, 100, 255, 0.2);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(45deg, #6a6aff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .status {
            font-size: 12px;
            color: #6a6aff;
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #6a6aff;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: linear-gradient(180deg, #0f0f2d, #12122a);
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #2a2a5a;
            border-radius: 3px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            animation: messageIn 0.3s ease-out;
            word-wrap: break-word;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #6a6aff, #4f4fff);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: #1e1e3f;
            color: #d0d0ff;
            border-bottom-left-radius: 4px;
        }

        .message .sender {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .message .text {
            font-size: 14px;
            line-height: 1.4;
        }

        .message .time {
            font-size: 10px;
            opacity: 0.6;
            text-align: right;
            margin-top: 5px;
        }

        .typing-indicator {
            align-self: flex-start;
            background: #1e1e3f;
            padding: 12px 16px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            display: none;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #6a6aff;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-8px);
            }
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: #0d0d2b;
            border-top: 1px solid rgba(100, 100, 255, 0.2);
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: 1px solid #2a2a5a;
            background: #12122a;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .input-area input:focus {
            border-color: #6a6aff;
            box-shadow: 0 0 15px rgba(106, 106, 255, 0.2);
        }

        .input-area input::placeholder {
            color: #4a4a7a;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #6a6aff, #a855f7);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(106, 106, 255, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .controls {
            display: flex;
            gap: 8px;
            padding: 5px 15px 10px;
            justify-content: center;
        }

        .ctrl-btn {
            padding: 6px 14px;
            border-radius: 15px;
            border: 1px solid #2a2a5a;
            background: transparent;
            color: #8a8aff;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .ctrl-btn:hover {
            background: rgba(106, 106, 255, 0.1);
            border-color: #6a6aff;
        }

        .ctrl-btn.clear {
            color: #ff6a6a;
            border-color: #3a1a1a;
        }

        .ctrl-btn.clear:hover {
            background: rgba(255, 106, 106, 0.1);
            border-color: #ff6a6a;
        }

        .toggle-sender {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 15px;
            font-size: 12px;
            color: #8a8aff;
        }

        .toggle-sender label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .toggle-sender input[type="checkbox"] {
            accent-color: #6a6aff;
        }
    </style>
</head>
<body>
    <div class="messenger">
        <div class="header">
            <h1>CHUGUR</h1>
            <div class="status">
                <span class="status-dot"></span>
                Оффлайн режим
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <!-- Сообщения будут появляться здесь -->
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="toggle-sender">
            <label>
                <input type="checkbox" id="senderToggle" checked>
                Я: <strong id="senderLabel">Вы</strong>
            </label>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Напишите сообщение..."
                maxlength="500"
            >
            <button class="send-btn" id="sendBtn">➤</button>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="autoReplyBtn">🤖 Автоответ</button>
            <button class="ctrl-btn clear" id="clearBtn">🗑 Очистить</button>
        </div>
    </div>

    <script>
        (function() {
            // DOM элементы
            const chatArea = document.getElementById('chatArea');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const clearBtn = document.getElementById('clearBtn');
            const autoReplyBtn = document.getElementById('autoReplyBtn');
            const typingIndicator = document.getElementById('typingIndicator');
            const senderToggle = document.getElementById('senderToggle');
            const senderLabel = document.getElementById('senderLabel');

            // Состояние
            let isUserASender = true; // true = "Вы", false = "Собеседник"
            let autoReplyEnabled = true;
            let messageCount = 0;

            // Имена отправителей
            const USER_NAME = 'Вы';
            const OTHER_NAME = 'Chugur';

            // Заготовленные автоответы
            const autoReplies = [
                'Привет! Как дела?',
                '😊 Отличная идея!',
                'Да, я согласен!',
                'Это интересно...',
                'Можешь рассказать подробнее?',
                'Секунду, подумаю...',
                'Ха-ха, точно!',
                'Не ожидал такого поворота 😄',
                'Давай обсудим это позже',
                '👍',
                'Супер!',
                'Я как раз об этом думал',
                'Интересная мысль!',
                'Продолжай...',
                '✨ Здорово!'
            ];

            // Загрузка истории из localStorage
            function loadMessages() {
                try {
                    const stored = localStorage.getItem('chugur_messages');
                    if (stored) {
                        return JSON.parse(stored);
                    }
                } catch (e) {
                    console.warn('Не удалось загрузить историю:', e);
                }
                return [];
            }

            // Сохранение истории в localStorage
            function saveMessages(messages) {
                try {
                    // Храним только последние 100 сообщений
                    const toStore = messages.slice(-100);
                    localStorage.setItem('chugur_messages', JSON.stringify(toStore));
                } catch (e) {
                    console.warn('Не удалось сохранить историю:', e);
                }
            }

            let messages = loadMessages();

            // Форматирование времени
            function getTimeString() {
                const now = new Date();
                return now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            }

            // Создание DOM-элемента сообщения
            function createMessageElement(msg) {
                const div = document.createElement('div');
                div.className = `message ${msg.type}`;
                div.innerHTML = `
                    <div class="sender">${msg.sender}</div>
                    <div class="text">${escapeHtml(msg.text)}</div>
                    <div class="time">${msg.time}</div>
                `;
                return div;
            }

            // Экранирование HTML
            function escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, m => map[m]);
            }

            // Отрисовка всех сообщений
            function renderMessages() {
                chatArea.innerHTML = '';
                messages.forEach(msg => {
                    chatArea.appendChild(createMessageElement(msg));
                });
                scrollToBottom();
            }

            // Прокрутка вниз
            function scrollToBottom() {
                setTimeout(() => {
                    chatArea.scrollTop = chatArea.scrollHeight;
                }, 50);
            }

            // Добавление сообщения
            function addMessage(text, sender, type) {
                const msg = {
                    id: Date.now() + Math.random(),
                    text: text.trim(),
                    sender: sender,
                    type: type,
                    time: getTimeString()
                };
                messages.push(msg);
                saveMessages(messages);
                chatArea.appendChild(createMessageElement(msg));
                scrollToBottom();
                messageCount++;
                return msg;
            }

            // Показать индикатор печати
            function showTyping(duration = 1500) {
                typingIndicator.classList.add('active');
                scrollToBottom();
                return new Promise(resolve => {
                    setTimeout(() => {
                        typingIndicator.classList.remove('active');
                        resolve();
                    }, duration);
                });
            }

            // Автоответ
            async function sendAutoReply() {
                if (!autoReplyEnabled) return;
                if (messages.length === 0) return;

                const lastMsg = messages[messages.length - 1];
                // Не отвечаем на свои же сообщения
                if (lastMsg.sender === OTHER_NAME) return;

                await showTyping(1000 + Math.random() * 1500);

                const randomReply = autoReplies[Math.floor(Math.random() * autoReplies.length)];
                addMessage(randomReply, OTHER_NAME, 'received');
            }

            // Отправка сообщения пользователя
            async function sendUserMessage() {
                const text = messageInput.value.trim();
                if (!text) return;

                const senderName = isUserASender ? USER_NAME : OTHER_NAME;
                const type = isUserASender ? 'sent' : 'received';

                addMessage(text, senderName, type);
                messageInput.value = '';
                messageInput.focus();

                // Если отправитель — пользователь, запускаем автоответ
                if (isUserASender) {
                    await sendAutoReply();
                }
            }

            // Очистка чата
            function clearChat() {
                if (messages.length === 0) return;
                if (confirm('Удалить всю историю сообщений?')) {
                    messages = [];
                    saveMessages(messages);
                    chatArea.innerHTML = '';
                    messageCount = 0;
                }
            }

            // Переключение отправителя
            function updateSenderLabel() {
                isUserASender = senderToggle.checked;
                senderLabel.textContent = isUserASender ? USER_NAME : OTHER_NAME;
                messageInput.placeholder = isUserASender 
                    ? 'Напишите сообщение...' 
                    : `Пишем как ${OTHER_NAME}...`;
            }

            // Обработчики событий
            sendBtn.addEventListener('click', sendUserMessage);

            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendUserMessage();
                }
            });

            clearBtn.addEventListener('click', clearChat);

            senderToggle.addEventListener('change', updateSenderLabel);

            autoReplyBtn.addEventListener('click', () => {
                autoReplyEnabled = !autoReplyEnabled;
                autoReplyBtn.textContent = autoReplyEnabled ? '🤖 Автоответ ВКЛ' : '🤖 Автоответ ВЫКЛ';
                autoReplyBtn.style.opacity = autoReplyEnabled ? '1' : '0.5';
            });

            // Инициализация
            function init() {
                updateSenderLabel();
                renderMessages();
                messageInput.focus();

                // Если чат пуст, добавим приветственное сообщение
                if (messages.length === 0) {
                    addMessage('Добро пожаловать в Chugur! 👋 Это оффлайн-мессенджер.', 'Chugur', 'received');
                }
            }

            init();
        })();
    </script>
</body>
</html>
