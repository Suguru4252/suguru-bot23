<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Rucoy Online - Мобильная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0c12;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            background: #1a2a1a;
        }
        
        /* Кнопки для телефона - крупные и удобные */
        .corner-buttons {
            position: fixed;
            z-index: 100;
            pointer-events: auto;
        }
        .top-left { top: 10px; left: 10px; display: flex; gap: 8px; }
        .top-right { top: 10px; right: 10px; display: flex; gap: 8px; }
        .bottom-left { bottom: 10px; left: 10px; display: flex; gap: 8px; }
        .bottom-right { bottom: 10px; right: 10px; display: flex; gap: 8px; }
        
        .mini-btn {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa55;
            color: #ffcc88;
            font-size: 14px;
            font-weight: bold;
            padding: 10px 14px;
            border-radius: 30px;
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
            touch-action: manipulation;
            cursor: pointer;
            font-family: monospace;
            transition: 0.03s linear;
            text-align: center;
            min-width: 65px;
        }
        .mini-btn:active { transform: scale(0.95); background: rgba(50, 50, 70, 0.9); }
        .fight-mini { background: rgba(180, 60, 40, 0.9); border-color: #ff8866; color: white; }
        .skill-mini { background: rgba(90, 60, 140, 0.9); border-color: #c88eff; }
        .class-mini { background: rgba(50, 90, 70, 0.9); border-color: #88ffaa; }
        .super-mini { background: rgba(180, 90, 40, 0.9); border-color: #ffaa66; }
        
        .nickname-display {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 6px 16px;
            border-radius: 30px;
            color: #ffcc88;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            font-weight: bold;
            backdrop-filter: blur(4px);
            border: 1px solid #ffaa55;
            white-space: nowrap;
        }
        .portal-progress {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 6px 16px;
            border-radius: 30px;
            color: #88ffaa;
            font-size: 11px;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            border: 1px solid #88ffaa;
        }
        
        .achievement-btn {
            position: fixed;
            bottom: 80px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #ffaa55;
            color: #ffcc88;
            font-size: 11px;
            padding: 8px 12px;
            border-radius: 25px;
            z-index: 100;
            cursor: pointer;
            font-family: monospace;
            backdrop-filter: blur(4px);
            font-weight: bold;
        }
        
        @media (max-width: 700px) {
            .mini-btn { font-size: 11px; padding: 8px 10px; min-width: 55px; }
            .nickname-display { font-size: 10px; top: 8px; }
            .portal-progress { font-size: 9px; bottom: 8px; white-space: nowrap; }
            .achievement-btn { font-size: 9px; padding: 6px 10px; bottom: 70px; }
        }
        
        @media (max-width: 480px) {
            .mini-btn { font-size: 10px; padding: 6px 8px; min-width: 48px; }
            .achievement-btn { font-size: 8px; padding: 5px 8px; bottom: 65px; }
        }
    </style>
</head>

    </div>

    function getNextWorld() {
        if(currentWorld === "forest") return "desert";
        if(currentWorld === "desert") return "castle";
        return null;
    }
    
    function getPrevWorld() {
        if(currentWorld === "desert") return "forest";
        if(currentWorld === "castle") return "desert";
        return null;
    }
    
    function updatePortals() {
        let next = getNextWorld();
        if(next && killsInWorld[currentWorld] >= MOBS_NEEDED && !unlockedWorlds[next]) {
            nextPortal.active = true;
            nextPortal.targetWorld = next;
            if(currentWorld === "forest") { nextPortal.x = 80; nextPortal.y = WORLD_HEIGHT - 100; }
            else if(currentWorld === "desert") { nextPortal.x = WORLD_WIDTH - 100; nextPortal.y = WORLD_HEIGHT - 100; }
        } else { nextPortal.active = false; }
        
        let prev = getPrevWorld();
        if(prev && unlockedWorlds[prev]) {
            returnPortal.active = true;
            returnPortal.targetWorld = prev;
            if(currentWorld === "desert") { returnPortal.x = 80; returnPortal.y = WORLD_HEIGHT - 100; }
            else if(currentWorld === "castle") { returnPortal.x = WORLD_WIDTH - 100; returnPortal.y = WORLD_HEIGHT - 100; }
        } else { returnPortal.active = false; }
    }
    
    function updatePortalStatus() {
        let progress = killsInWorld[currentWorld];
        let next = getNextWorld();
        if(next && !unlockedWorlds[next]) {
            document.getElementById('portalProgress').innerHTML = `🚪 До ${getWorldName(next)}: ${progress}/${MOBS_NEEDED} (${Math.floor(progress/MOBS_NEEDED*100)}%)`;
            document.getElementById('portalProgress').style.color = "#88ffaa";
        } else {
            document.getElementById('portalProgress').innerHTML = `📍 ${getWorldName(currentWorld)} | Убито: ${progress}`;
            document.getElementById('portalProgress').style.color = "#ffaa66";
        }
    }
    
    function usePortal(targetWorld) {
        if(!unlockedWorlds[targetWorld]) unlockedWorlds[targetWorld] = true;
        currentWorld = targetWorld;
        nextPortal.active = false;
        returnPortal.active = false;
        generateWorld();
        mobs = [];
        bosses = [];
        for(let i=0;i<12;i++) spawnMob();
        updatePortals();
        updatePortalStatus();
        addMsg(`✨ Переход в ${getWorldName(currentWorld)}!`);
        saveGame();
    }
    
    function updateStatsFromLevel() {
        let c = CLASSES[player.classType];
        let armor = getArmorById(player.armorId);
        let weapon = getWeaponById(player.weaponId);
        player.maxHp = c.hp + player.level * 18;
        player.maxMp = c.mp + player.level * 13;
        if(player.hp > player.maxHp) player.hp = player.maxHp;
        if(player.mp > player.maxMp) player.mp = player.maxMp;
        player.expToNext = 90 + player.level * 38;
        player.defense = (armor ? armor.def : 8) + Math.floor(player.level * 1.5);
        if(weapon) {
            player.dmgMin = weapon.dmgMin + Math.floor(player.level * 2.5);
            player.dmgMax = weapon.dmgMax + Math.floor(player.level * 3.2);
            player.attackRange = weapon.range;
        }
    }
    
    function createMob() {
        let list = MOB_LIST[currentWorld];
        let t = list[Math.floor(Math.random() * list.length)];
        let lvl = Math.max(1, player.level + Math.floor(Math.random() * 2) - 1);
        let mult = WORLDS[currentWorld].mult;
        return {
            name: t.name + " Lv." + lvl,
            hp: Math.floor(t.hp * (1 + (lvl-1)*0.1) * mult),
            maxHp: Math.floor(t.hp * (1 + (lvl-1)*0.1) * mult),
            dmg: Math.floor(t.dmg * (1 + (lvl-1)*0.08) * mult),
            exp: Math.floor(t.exp * (0.9 + lvl*0.08) * mult),
            skin: t.skin, speed: t.speed, attackRange: t.range, drawFunc: t.draw,
            x: 0, y: 0, attackTimer: 0
        };
    }
    
    function spawnMob() {
        if(mobs.length >= MAX_MOBS) return;
        for(let a=0;a<50;a++) {
            let x=100+Math.random()*(WORLD_WIDTH-200), y=100+Math.random()*(WORLD_HEIGHT-200);
            if(isWalkable(x,y,26) && !isInSafeZone(x,y) && Math.hypot(x-player.x,y-player.y)>150) {
                let m=createMob(); m.x=x; m.y=y; mobs.push(m); return;
            }
        }
    }
    
    function spawnBoss() {
        if(bosses.length > 0) return;
        let boss = BOSS_LIST[currentWorld];
        if(!boss) return;
        let lvl = player.level + 5;
        let b = { ...boss,
            hp: Math.floor(boss.hp * (1 + (player.level-1)*0.05)),
            maxHp: Math.floor(boss.hp * (1 + (player.level-1)*0.05)),
            dmg: Math.floor(boss.dmg * (1 + (player.level-1)*0.03)),
            exp: Math.floor(boss.exp * (1 + (player.level-1)*0.1)),
            gold: Math.floor(boss.gold * (1 + (player.level-1)*0.1)),
            x: 0, y: 0, attackTimer: 0, isBoss: true, draw: boss.draw
        };
        for(let a=0;a<100;a++) {
            let x=200+Math.random()*(WORLD_WIDTH-400), y=150+Math.random()*(WORLD_HEIGHT-300);
            if(isWalkable(x,y,40) && !isInSafeZone(x,y) && Math.hypot(x-player.x,y-player.y)>200) {
                b.x=x; b.y=y; bosses.push(b);
                addMsg(`⚠️ БОСС ${b.name} появился! ⚠️`);
                return;
            }
        }
    }
    
    function killMob(mob) {
        let expGain = Math.floor(mob.exp * expBonus);
        let goldGain = Math.floor((15 + Math.random() * (player.level * 8)) * goldBonus);
        player.exp += expGain;
        player.gold += goldGain;
        stats.mobsKilled++;
        stats.totalGold += goldGain;
        killsInWorld[currentWorld]++;
        
        updatePortals();
        updatePortalStatus();
        addMsg(`✨ +${expGain} опыта, +${goldGain}💰`);
        
        if(Math.random()<0.25) {
            if(Math.random()<0.6) player.potionHp++;
            else player.potionMp++;
            addMsg(`🧪 Выпало зелье!`);
        }
        
        let idx = mobs.indexOf(mob);
        if(idx !== -1) mobs.splice(idx,1);
        if(selectedMob === mob) selectedMob = null;
        
        while(player.exp >= player.expToNext) {
            player.exp -= player.expToNext;
            player.level++;
            updateStatsFromLevel();
            player.hp = player.maxHp;
            player.mp = player.maxMp;
            player.expToNext = 90 + player.level * 38;
            addMsg(`⭐⭐ УРОВЕНЬ ${player.level}! ⭐⭐`);
            saveGame();
        }
        
        // Проверка достижений
        achievements.killer10.current = stats.mobsKilled;
        achievements.killer50.current = stats.mobsKilled;
        achievements.killer100.current = stats.mobsKilled;
        achievements.killer500.current = stats.mobsKilled;
        achievements.desertExplorer.current = unlockedWorlds.desert ? 1 : 0;
        achievements.castleExplorer.current = unlockedWorlds.castle ? 1 : 0;
        
        for(let key in achievements) {
            let ach = achievements[key];
            if(!ach.completed && ach.current >= ach.target) {
                ach.completed = true;
                player.gold += ach.reward;
                stats.totalGold += ach.reward;
                addMsg(`🏆 ДОСТИЖЕНИЕ: ${ach.name}! +${ach.reward}💰`);
                showAchievementPopup(ach.name);
            }
        }
        
        saveGame();
    }
    
    function addMsg(t, e=false) { messages.unshift({text:t,isErr:e,life:180}); if(messages.length>4) messages.pop(); }
    function showDamage(x,y,dmg,isPlayer=false) { damageFloats.push({x,y,dmg,life:20,isPlayer}); }
    function addAttackEffect(x,y,type) { attackEffects.push({x,y,type,life:10}); }
    
    let popupMessage = null;
    function showAchievementPopup(name) { popupMessage = { text: `🏆 ${name}`, life: 60 }; }
    
    // ========== ФИЗИКА ==========
    let obstacles = [];
    let worldMap = Array(MAP_H).fill().map(() => Array(MAP_W).fill(0));
    
    function generateWorld() {
        obstacles = [];
        let w = WORLDS[currentWorld];
        for(let i=0;i<MAP_H;i++) for(let j=0;j<MAP_W;j++) worldMap[i][j] = 0;
        
        for(let y=10;y<26;y++) for(let x=12;x<32;x++) worldMap[y][x] = 1;
        
        for(let i=0;i<200;i++) {
            let x=80+Math.random()*(WORLD_WIDTH-160), y=80+Math.random()*(WORLD_HEIGHT-160);
            if(x>safeZone.x-80 && x<safeZone.x+safeZone.width+80 && y>safeZone.y-80 && y<safeZone.y+safeZone.height+80) continue;
            obstacles.push({x,y,radius:24,type:'tree'});
        }
        for(let i=0;i<100;i++) {
            let x=50+Math.random()*(WORLD_WIDTH-100), y=50+Math.random()*(WORLD_HEIGHT-100);
            if(x>safeZone.x-60 && x<safeZone.x+safeZone.width+60 && y>safeZone.y-60 && y<safeZone.y+safeZone.height+60) continue;
            obstacles.push({x,y,radius:16,type:'rock'});
        }
    }
    
    function getMapColor(tile) {
        let w = WORLDS[currentWorld];
        if(tile === 0) return w.ground;
        if(tile === 1) return "#88aa66";
        return w.trees;
    }
    
    function isWalkable(x,y,r=24) {
        if(x-r<30 || x+r>WORLD_WIDTH-30 || y-r<30 || y+r>WORLD_HEIGHT-30) return false;
        for(let o of obstacles) if(Math.hypot(x-o.x,y-o.y) < r+o.radius) return false;
        return true;
    }
    
    function isInSafeZone(x,y) { return x > safeZone.x && x < safeZone.x+safeZone.width && y > safeZone.y && y < safeZone.y+safeZone.height; }
    function isAtGate(x,y) { for(let g of gates) if(x>g.x && x<g.x+g.width && y>g.y && y<g.y+g.height) return true; return false; }
    function canCrossBoundary(fx,fy,tx,ty) {
        let was = isInSafeZone(fx,fy), will = isInSafeZone(tx,ty);
        if(was === will) return true;
        let mx=(fx+tx)/2, my=(fy+ty)/2;
        return isAtGate(mx,my) || isAtGate(tx,ty) || isAtGate(fx,fy);
    }
    function canMoveTo(x,y,r=24) { return isWalkable(x,y,r) && canCrossBoundary(player.x,player.y,x,y); }
    
    function moveTo(x,y) { player.targetX = x; player.targetY = y; }
    function updateMove() {
        if(player.targetX === null || player.targetY === null) { player.isMoving = false; return; }
        let dx = player.targetX - player.x, dy = player.targetY - player.y, dist = Math.hypot(dx,dy);
        if(dist < 6) { player.targetX = null; player.targetY = null; player.isMoving = false; return; }
        player.isMoving = true;
        let step = Math.min(player.speed, dist), ang = Math.atan2(dy,dx);
        let nx = player.x + Math.cos(ang)*step, ny = player.y + Math.sin(ang)*step;
        if(canMoveTo(nx,ny,24)) { player.x = nx; player.y = ny; }
        else { player.targetX = null; player.targetY = null; player.isMoving = false; }
    }
    
    function updateCamera() {
        let tx = player.x - canvasWidth/2, ty = player.y - canvasHeight/2;
        tx = Math.min(Math.max(tx,0), WORLD_WIDTH - canvasWidth);
        ty = Math.min(Math.max(ty,0), WORLD_HEIGHT - canvasHeight);
        cameraX += (tx - cameraX)*0.1;
        cameraY += (ty - cameraY)*0.1;
    }
    
    // ========== БОЙ ==========
    function playerAttack() {
        let target = selectedMob;
        if(!target || target.hp<=0) {
            for(let b of bosses) if(b.hp>0 && Math.hypot(player.x-b.x,player.y-b.y) < player.attackRange+30) { target=b; selectedMob=b; break; }
        }
        if(!target || target.hp<=0) { if(selectedMob && selectedMob.hp<=0) selectedMob=null; addMsg("🎯 Выберите цель",true); return false; }
        if(player.attackTimer > 0) return false;
        let dist = Math.hypot(player.x-target.x, player.y-target.y);
        if(dist > player.attackRange) { addMsg(`🏃 Слишком далеко!`, true); return false; }
        let dmg = Math.floor(Math.random()*(player.dmgMax-player.dmgMin+1)+player.dmgMin);
        target.hp -= dmg;
        stats.totalDamage += dmg;
        player.attackTimer = 20;
        let c = CLASSES[player.classType];
        addAttackEffect(target.x,target.y, c.name==="Мечник"?"slash":(c.name==="Лучник"?"arrow":"magic"));
        addMsg(`⚔️ ${dmg} урона ${target.name}!`);
        showDamage(target.x,target.y,dmg);
        if(target.hp <= 0) {
            if(target.isBoss) {
                let expGain = Math.floor(target.exp * expBonus);
                let goldGain = Math.floor(target.gold * goldBonus);
                player.exp += expGain;
                player.gold += goldGain;
                stats.totalGold += goldGain;
                bossKillCount++;
                addMsg(`👑 УБИТ БОСС: ${target.name}! +${expGain} опыта, +${goldGain}💰`);
                let idx = bosses.indexOf(target);
                if(idx !== -1) bosses.splice(idx,1);
                if(selectedMob === target) selectedMob = null;
            } else {
                killMob(target);
            }
            if(selectedMob === target) selectedMob = null;
        }
        saveGame();
        return true;
    }
    
    function useSkill() {
        let target = selectedMob;
        if(!target || target.hp<=0) {
            for(let b of bosses) if(b.hp>0 && Math.hypot(player.x-b.x,player.y-b.y) < 250) { target=b; break; }
        }
        if(!target || target.hp<=0) { addMsg("🎯 Выберите цель!", true); return; }
        let c = CLASSES[player.classType];
        let dist = Math.hypot(player.x-target.x, player.y-target.y);
        if(dist > c.skillRange) { addMsg(`🏃 Слишком далеко!`, true); return; }
        let manaCost = 25 + Math.floor(player.level/3);
        if(player.mp < manaCost) { addMsg(`💙 Не хватает маны!`, true); return; }
        player.mp -= manaCost;
        let dmg = Math.floor((player.dmgMin+player.dmgMax)/2 * 2.2);
        target.hp -= dmg;
        stats.totalDamage += dmg;
        addAttackEffect(target.x,target.y,"skill");
        addMsg(`✨ ${c.skill}! ${dmg} урона!`);
        showDamage(target.x,target.y,dmg);
        if(target.hp <= 0) {
            if(target.isBoss) {
                let expGain = Math.floor(target.exp * expBonus);
                let goldGain = Math.floor(target.gold * goldBonus);
                player.exp += expGain;
                player.gold += goldGain;
                stats.totalGold += goldGain;
                bossKillCount++;
                addMsg(`👑 УБИТ БОСС: ${target.name}! +${expGain} опыта, +${goldGain}💰`);
                let idx = bosses.indexOf(target);
                if(idx !== -1) bosses.splice(idx,1);
                if(selectedMob === target) selectedMob = null;
            } else {
                killMob(target);
            }
            if(selectedMob === target) selectedMob = null;
        }
        saveGame();
    }
    
    function useSuper() {
        if(player.superCooldown > 0) { addMsg(`🌟 Супер: ${Math.ceil(player.superCooldown/10)}с`, true); return; }
        let c = CLASSES[player.classType];
        if(c.name === "Мечник") {
            for(let m of mobs) if(Math.hypot(player.x-m.x,player.y-m.y)<100 && m.hp>0) {
                let dmg = Math.floor((player.dmgMin+player.dmgMax)/2*2);
                m.hp -= dmg; stats.totalDamage+=dmg; showDamage(m.x,m.y,dmg); addAttackEffect(m.x,m.y,"slash");
                if(m.hp<=0) killMob(m);
            }
            for(let b of bosses) if(Math.hypot(player.x-b.x,player.y-b.y)<120 && b.hp>0) {
                let dmg = Math.floor((player.dmgMin+player.dmgMax)/2*1.5);
                b.hp -= dmg; stats.totalDamage+=dmg; showDamage(b.x,b.y,dmg); addAttackEffect(b.x,b.y,"slash");
            }
            addMsg(`🌀 ВИХРЬ!`);
        } else if(c.name === "Лучник") {
            let targets = [...mobs.filter(m=>m.hp>0 && Math.hypot(player.x-m.x,player.y-m.y)<220), ...bosses.filter(b=>b.hp>0 && Math.hypot(player.x-b.x,player.y-b.y)<220)];
            targets.sort((a,b)=>Math.hypot(player.x-a.x,player.y-a.y)-Math.hypot(player.x-b.x,player.y-b.y));
            for(let t of targets.slice(0,3)) {
                let dmg = Math.floor((player.dmgMin+player.dmgMax)/2*3);
                t.hp -= dmg; stats.totalDamage+=dmg; showDamage(t.x,t.y,dmg); addAttackEffect(t.x,t.y,"arrow");
                if(t.hp<=0) { if(t.isBoss) { let idx=bosses.indexOf(t); if(idx!==-1) bosses.splice(idx,1); } else killMob(t); }
            }
            addMsg(`🏹 ТРОЙНОЙ ВЫСТРЕЛ!`);
        } else if(c.name === "Маг") {
            addMsg(`🔥 Нажмите для взрыва!`);
            explosionTarget = { active: true };
            return;
        }
        player.superCooldown = 180;
    }
    
    function castExplosion(wx,wy) {
        if(!explosionTarget?.active) return;
        explosionTarget = null;
        let dmg = Math.floor((player.dmgMin+player.dmgMax)/2*2.5);
        let hit = false;
        for(let m of mobs) if(Math.hypot(wx-m.x,wy-m.y)<90 && m.hp>0) {
            m.hp -= dmg; stats.totalDamage+=dmg; showDamage(m.x,m.y,dmg); addAttackEffect(m.x,m.y,"explosion");
            if(m.hp<=0) killMob(m); hit=true;
        }
        for(let b of bosses) if(Math.hypot(wx-b.x,wy-b.y)<100 && b.hp>0) {
            b.hp -= dmg; stats.totalDamage+=dmg; showDamage(b.x,b.y,dmg); addAttackEffect(b.x,b.y,"explosion"); hit=true;
        }
        damageFloats.push({x:wx,y:wy,dmg:"💥",life:15,isExplosion:true});
        if(!hit) addMsg(`🔥 Взрыв не задел врагов!`, true);
        player.superCooldown = 180;
    }
    
    function updateMobs() {
        for(let m of mobs) {
            if(m.hp<=0) continue;
            let dx=player.x-m.x, dy=player.y-m.y, dist=Math.hypot(dx,dy);
            if(dist<200 && !isInSafeZone(player.x,player.y)) {
                let ang=Math.atan2(dy,dx), step=Math.min(m.speed,dist-40);
                if(step>0) {
                    let nx=m.x+Math.cos(ang)*step, ny=m.y+Math.sin(ang)*step;
                    if(isWalkable(nx,ny,26) && !isInSafeZone(nx,ny)) { m.x=nx; m.y=ny; }
                }
                if(dist < m.attackRange+15) {
                    if(m.attackTimer <= 0) {
                        let dmg = Math.max(3, m.dmg - Math.floor(player.defense/4));
                        player.hp -= dmg;
                        stats.totalDamageTaken += dmg;
                        m.attackTimer = 45;
                        addMsg(`💀 ${m.name} нанес ${dmg} урона!`, true);
                        showDamage(m.x,m.y,dmg,true);
                        if(player.hp <= 0) {
                            player.hp = player.maxHp;
                            player.mp = player.maxMp;
                            player.x = safeZone.x + safeZone.width/2;
                            player.y = safeZone.y + safeZone.height/2;
                            player.targetX = null;
                            player.targetY = null;
                            addMsg(`💀 ВОСКРЕШЕНИЕ!`, true);
                            saveGame();
                        }
                    } else m.attackTimer--;
                } else if(m.attackTimer>0) m.attackTimer--;
            } else if(m.attackTimer>0) m.attackTimer--;
        }
        
        for(let b of bosses) {
            if(b.hp<=0) continue;
            let dx=player.x-b.x, dy=player.y-b.y, dist=Math.hypot(dx,dy);
            if(dist<250 && !isInSafeZone(player.x,player.y)) {
                let ang=Math.atan2(dy,dx), step=Math.min(b.speed,dist-60);
                if(step>0) {
                    let nx=b.x+Math.cos(ang)*step, ny=b.y+Math.sin(ang)*step;
                    if(isWalkable(nx,ny,38) && !isInSafeZone(nx,ny)) { b.x=nx; b.y=ny; }
                }
                if(dist < b.range+20) {
                    if(b.attackTimer <= 0) {
                        let dmg = Math.max(10, b.dmg - Math.floor(player.defense/3));
                        player.hp -= dmg;
                        stats.totalDamageTaken += dmg;
                        b.attackTimer = 50;
                        addMsg(`💀 ${b.name} нанес ${dmg} урона!`, true);
                        showDamage(b.x,b.y,dmg,true);
                        if(player.hp <= 0) {
                            player.hp = player.maxHp;
                            player.mp = player.maxMp;
                            player.x = safeZone.x + safeZone.width/2;
                            player.y = safeZone.y + safeZone.height/2;
                            player.targetX = null;
                            player.targetY = null;
                            addMsg(`💀 ВОСКРЕШЕНИЕ!`, true);
                            saveGame();
                        }
                    } else b.attackTimer--;
                } else if(b.attackTimer>0) b.attackTimer--;
            } else if(b.attackTimer>0) b.attackTimer--;
        }
    }
    
    function useHp() {
        if(player.potionHp <= 0 && player.potionBigHp <= 0) { addMsg(`❌ Нет зелий HP!`, true); return; }
        if(player.potionBigHp > 0 && player.hp < player.maxHp * 0.5) {
            let heal = Math.floor(player.maxHp * 0.9);
            player.hp = Math.min(player.maxHp, player.hp + heal);
            player.potionBigHp--;
            addMsg(`❤️❤️ БОЛЬШОЕ ЗЕЛЬЕ! +${heal} HP`);
        } else if(player.potionHp > 0) {
            let heal = Math.floor(player.maxHp * 0.7);
            player.hp = Math.min(player.maxHp, player.hp + heal);
            player.potionHp--;
            addMsg(`❤️ +${heal} HP`);
        }
        saveGame();
    }
    
    function useMp() {
        if(player.potionMp <= 0 && player.potionBigMp <= 0) { addMsg(`❌ Нет зелий MP!`, true); return; }
        if(player.potionBigMp > 0 && player.mp < player.maxMp * 0.5) {
            let mana = Math.floor(player.maxMp);
            player.mp = Math.min(player.maxMp, player.mp + mana);
            player.potionBigMp--;
            addMsg(`💙💙 БОЛЬШОЕ ЗЕЛЬЕ! +${mana} MP`);
        } else if(player.potionMp > 0) {
            let mana = Math.floor(player.maxMp * 0.75);
            player.mp = Math.min(player.maxMp, player.mp + mana);
            player.potionMp--;
            addMsg(`💙 +${mana} MP`);
        }
        saveGame();
    }
    
    function switchClass(className) {
        let classes = Object.keys(CLASSES);
        let newClass = className || classes[(classes.indexOf(player.classType)+1)%classes.length];
        if(player.classType === newClass) return;
        let hpPercent = player.hp/player.maxHp, mpPercent = player.mp/player.maxMp;
        player.classType = newClass;
        updateStatsFromLevel();
        player.hp = Math.max(1, Math.min(player.maxHp, Math.floor(player.maxHp*hpPercent)));
        player.mp = Math.max(1, Math.min(player.maxMp, Math.floor(player.maxMp*mpPercent)));
        addMsg(`🔄 Класс: ${CLASSES[newClass].name}`);
        saveGame();
    }
    
    // ========== СОХРАНЕНИЕ ==========
    function saveGame() {
        if(!playerNickname) return;
        let save = {
            n: playerNickname, x: player.x, y: player.y, hp: player.hp, mp: player.mp,
            lvl: player.level, exp: player.exp, class: player.classType, gold: player.gold,
            ph: player.potionHp, pm: player.potionMp, phb: player.potionBigHp, pmb: player.potionBigMp,
            aid: player.armorId, wid: player.weaponId, world: currentWorld,
            kills: killsInWorld, unlocked: unlockedWorlds, bossKills: bossKillCount,
            stats: { mk: stats.mobsKilled, tg: stats.totalGold, td: stats.totalDamage, tdt: stats.totalDamageTaken, st: stats.startTime },
            ach: achievements
        };
        localStorage.setItem('rucoy_save_' + playerNickname, JSON.stringify(save));

    function loadGame(nick) {
        let data = localStorage.getItem('rucoy_save_' + nick);
        if(!data) return false;
        let s = JSON.parse(data);
        player.x = s.x; player.y = s.y; player.hp = s.hp; player.mp = s.mp;
        player.level = s.lvl; player.exp = s.exp; player.classType = s.class;
        player.gold = s.gold; player.potionHp = s.ph; player.potionMp = s.pm;
        player.potionBigHp = s.phb; player.potionBigMp = s.pmb;
        if(s.aid) player.armorId = s.aid;
        if(s.wid) player.weaponId = s.wid;
        if(s.world) currentWorld = s.world;
        if(s.kills) killsInWorld = s.kills;
        if(s.unlocked) unlockedWorlds = s.unlocked;
        if(s.bossKills) bossKillCount = s.bossKills;
        if(s.stats) {
            stats.mobsKilled = s.stats.mk;
            stats.totalGold = s.stats.tg;
            stats.totalDamage = s.stats.td;
            stats.totalDamageTaken = s.stats.tdt;
            stats.startTime = s.stats.st;
        }
        if(s.ach) for(let k in s.ach) if(achievements[k]) achievements[k].completed = s.ach[k].completed;
        updateStatsFromLevel();
        addMsg(`✨ С возвращением, ${nick}! Уровень ${player.level}`);
        updatePortals();
        updatePortalStatus();
        return true;
    }

    function drawRealisticPlayer(x,y,isMoving){
        let c=CLASSES[player.classType];
        let weapon=getWeaponById(player.weaponId);
        let armor=getArmorById(player.armorId);
        if(isMoving) walkCycle=(walkCycle+0.15)%(Math.PI*2);
        else walkCycle*=0.95;
        let leg=Math.sin(walkCycle)*4, arm=Math.sin(walkCycle+Math.PI)*6;
        ctx.fillStyle="#2a2a2a";
        ctx.beginPath(); ctx.moveTo(x-8,y+10); ctx.lineTo(x-12+leg*0.3,y+22); ctx.lineTo(x-4+leg*0.2,y+22); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x+8,y+10); ctx.lineTo(x+12-leg*0.3,y+22); ctx.lineTo(x+4-leg*0.2,y+22); ctx.fill();
        ctx.fillStyle=armor?armor.color:c.color;
        ctx.beginPath(); ctx.moveTo(x-12,y+2); ctx.quadraticCurveTo(x,y+10,x+12,y+2); ctx.lineTo(x+10,y-3); ctx.quadraticCurveTo(x,y,x-10,y-3); ctx.fill();
        ctx.fillStyle=c.skinColor;
        ctx.beginPath(); ctx.moveTo(x-10,y); ctx.quadraticCurveTo(x-14+arm*0.5,y+3,x-11+arm*0.7,y+8); ctx.lineTo(x-7,y+2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x+10,y); ctx.quadraticCurveTo(x+14-arm*0.5,y+3,x+11-arm*0.7,y+8); ctx.lineTo(x+7,y+2); ctx.fill();
        if(weapon){
            if(weapon.type==="melee"){ctx.fillStyle="#ccaa88"; ctx.fillRect(x+11-arm*0.2,y-2,14,5); ctx.fillStyle="#aa8866"; ctx.fillRect(x+22-arm*0.3,y-4,6,10);}
            else if(weapon.type==="ranged"){ctx.fillStyle="#c4b27a"; ctx.beginPath(); ctx.moveTo(x+12-arm*0.2,y-3); ctx.lineTo(x+25-arm*0.3,y); ctx.lineTo(x+12-arm*0.2,y+3); ctx.fill();}
            else{ctx.fillStyle="#ffaa66"; ctx.beginPath(); ctx.ellipse(x+12-arm*0.2,y,7,6,0,0,Math.PI*2); ctx.fill();}
        }
        ctx.fillStyle=c.skinColor; ctx.beginPath(); ctx.ellipse(x,y-7,9,11,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=c.hairColor; ctx.beginPath(); ctx.ellipse(x-3,y-14,7,6,0,0,Math.PI*2); ctx.ellipse(x+3,y-14,7,6,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(x-4,y-9,2.2,0,Math.PI*2); ctx.arc(x+4,y-9,2.2,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#1a2a3a"; ctx.beginPath(); ctx.arc(x-4,y-9,1.2,0,Math.PI*2); ctx.arc(x+4,y-9,1.2,0,Math.PI*2); ctx.fill();
        ctx.font="bold 9px monospace"; ctx.fillStyle="#ffcc88"; ctx.fillText(`Lv.${player.level}`, x-12, y-18);
    }

                    ctx.fillStyle=WORLDS[currentWorld].trees; ctx.fillRect(x-16,y-28,32,52);
                    ctx.fillStyle="#8b5a2b"; ctx.fillRect(x-8,y-6,16,28);
                    ctx.fillStyle=WORLDS[currentWorld].trees; ctx.beginPath(); ctx.ellipse(x,y-38,22,26,0,0,Math.PI*2); ctx.fill();
                } else if(o.type==='rock'){
                    ctx.fillStyle="#7a6a5a"; ctx.beginPath(); ctx.ellipse(x,y,16,12,0,0,Math.PI*2); ctx.fill();
                }
            }
        }
        let szX=safeZone.x-cameraX, szY=safeZone.y-cameraY;
        ctx.fillStyle="#88aa66aa"; ctx.fillRect(szX,szY,safeZone.width,safeZone.height);
        
        if(nextPortal.active){
            let px=nextPortal.x-cameraX, py=nextPortal.y-cameraY;
            ctx.fillStyle="#44ff44aa"; ctx.beginPath(); ctx.arc(px,py,25,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="#88ff88"; ctx.beginPath(); ctx.arc(px,py,18,0,Math.PI*2); ctx.fill();
            ctx.font="18px monospace"; ctx.fillStyle="#fff"; ctx.fillText("➡️", px-10, py+6);
        }
        if(returnPortal.active){
            let px=returnPortal.x-cameraX, py=returnPortal.y-cameraY;
            ctx.fillStyle="#ffaa44aa"; ctx.beginPath(); ctx.arc(px,py,25,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="#ffcc88"; ctx.beginPath(); ctx.arc(px,py,18,0,Math.PI*2); ctx.fill();
            ctx.font="18px monospace"; ctx.fillStyle="#fff"; ctx.fillText("⬅️", px-10, py+6);
        }
        
        let npcX=shopNPC.x-cameraX, npcY=shopNPC.y-cameraY;
        ctx.fillStyle="#c99e6f"; ctx.fillRect(npcX-14,npcY-20,28,36);
        ctx.fillStyle="#e8c28a"; ctx.fillRect(npcX-8,npcY-10,16,22);
        ctx.fillStyle="#000"; ctx.fillRect(npcX-5,npcY-6,3,3); ctx.fillRect(npcX+2,npcY-6,3,3);
        ctx.font="18px monospace"; ctx.fillStyle="#ffdd99"; ctx.fillText("🏪", npcX-10, npcY+2);
        
        for(let g of gates){let gx=g.x-cameraX, gy=g.y-cameraY; ctx.fillStyle="#c9a87a"; ctx.fillRect(gx,gy,g.width,g.height);}
    }
    
    function drawMob(m){
        let x=m.x-cameraX, y=m.y-cameraY;
        if(x<-80||x>canvasWidth+80) return;
        m.drawFunc(x,y);
        let percent=m.hp/m.maxHp;
        ctx.fillStyle="#a33"; ctx.fillRect(x-18,y-25,36,4);
        ctx.fillStyle=percent>0.6?"#4f6":(percent>0.3?"#fa4":"#f44"); ctx.fillRect(x-18,y-25,36*percent,4);
        ctx.font="8px monospace"; ctx.fillStyle="#ffffaa"; ctx.fillText(m.name, x-16, y-30);
    }
    
    function drawBoss(b){
        let x=b.x-cameraX, y=b.y-cameraY;
        if(x<-100||x>canvasWidth+100) return;
        b.draw(x,y);
        let percent=b.hp/b.maxHp;
        ctx.fillStyle="#a33"; ctx.fillRect(x-35,y-42,70,6);
        ctx.fillStyle=percent>0.6?"#4f6":(percent>0.3?"#fa4":"#f44"); ctx.fillRect(x-35,y-42,70*percent,6);
        ctx.font="bold 9px monospace"; ctx.fillStyle="#ffaa88"; ctx.fillText(b.name, x-30, y-48);
        ctx.font="8px monospace"; ctx.fillStyle="#ffffaa"; ctx.fillText(`❤️ ${b.hp}/${b.maxHp}`, x-25, y-36);
    }
    
    function drawUI(){
        let c=CLASSES[player.classType], fs=Math.max(10,Math.min(13,canvasWidth/70));
        ctx.fillStyle="#000000aa"; ctx.fillRect(8,8,190,65);
        ctx.fillStyle="#c55"; ctx.fillRect(14,14,170,14);
        ctx.fillStyle="#f75"; ctx.fillRect(14,14,170*(player.hp/player.maxHp),14);
        ctx.fillStyle="#58f"; ctx.fillRect(14,32,170*(player.mp/player.maxMp),12);
        ctx.fillStyle="#fff"; ctx.font=`bold ${fs}px monospace`;
        ctx.fillText(`❤️ ${Math.floor(player.hp)}/${player.maxHp}`, 18, 26);
        ctx.fillText(`💙 ${Math.floor(player.mp)}/${player.maxMp}`, 18, 43);
        ctx.fillStyle="#fd9"; ctx.font=`bold ${fs}px monospace`;
        ctx.fillText(`${c.icon} Lv.${player.level}`, 18, 68);
        
        ctx.fillStyle="#000000aa"; ctx.fillRect(canvasWidth-130,8,120,50);
        ctx.fillStyle="#fc8"; ctx.font=`bold ${fs}px monospace`; ctx.fillText(`💰 ${player.gold}`, canvasWidth-120, 28);
        ctx.font=`${fs-2}px monospace`; ctx.fillText(`❤️ ${player.potionHp}  💙 ${player.potionMp}`, canvasWidth-120, 48);
        
        for(let i=0;i<Math.min(3,messages.length);i++){
            let m=messages[i];
            ctx.fillStyle=m.isErr?"#f86c":"#edbc";
            ctx.font=`${fs-2}px monospace`;
            ctx.fillText(m.text.substring(0,30), 10, canvasHeight-40-i*18);
        }
        
        if(selectedMob && selectedMob.hp>0){
            let x=selectedMob.x-cameraX, y=selectedMob.y-cameraY;
            ctx.strokeStyle="#fa4"; ctx.lineWidth=3; ctx.strokeRect(x-20,y-30,52,52);
        }
        if(player.targetX!==null && player.targetY!==null){
            let tx=player.targetX-cameraX, ty=player.targetY-cameraY;
            ctx.fillStyle="#fc4a"; ctx.beginPath(); ctx.arc(tx,ty,10,0,Math.PI*2); ctx.fill();
        }
        
        for(let i=0;i<damageFloats.length;i++){
            let d=damageFloats[i], x=d.x-cameraX, y=d.y-cameraY;
            ctx.font=`bold ${d.isPlayer?14:18}px monospace`;
            ctx.fillStyle=d.isPlayer?"#fa6":"#f84";
            ctx.fillText(`-${d.dmg}`, x-8, y-20);
            d.life--; if(d.life<=0) damageFloats.splice(i,1), i--;
        }
        
        if(player.superCooldown>0){
            let p=player.superCooldown/180;
            ctx.fillStyle="#000000aa"; ctx.fillRect(10,canvasHeight-50,60,10);
            ctx.fillStyle="#ffaa44"; ctx.fillRect(10,canvasHeight-50,60*(1-p),10);
            ctx.fillStyle="#ffaa88"; ctx.font="8px monospace"; ctx.fillText(`🌟 ${Math.ceil(player.superCooldown/10)}с`, 12, canvasHeight-38);
        }
        
        if(popupMessage && popupMessage.life>0){
            let x=canvasWidth/2, y=canvasHeight/3, life=popupMessage.life/60;
            ctx.fillStyle=`rgba(0,0,0,${0.8*life})`; ctx.fillRect(x-110, y-22, 220, 44);
            ctx.fillStyle=`rgba(255,200,100,${0.9*life})`; ctx.fillRect(x-108, y-20, 216, 40);
            ctx.fillStyle=`rgba(0,0,0,${0.9*life})`; ctx.font=`bold 11px monospace`;
            ctx.fillText(popupMessage.text, x-95, y+4);
            popupMessage.life--;
        }
        
        for(let i=0;i<attackEffects.length;i++){
            let e=attackEffects[i], x=e.x-cameraX, y=e.y-cameraY, life=e.life/10;
            if(e.type==="slash"){
                ctx.beginPath(); ctx.moveTo(x-12,y-8); ctx.lineTo(x,y-20); ctx.lineTo(x+12,y-8); ctx.lineTo(x,y+4);
                ctx.fillStyle=`rgba(255,200,100,${0.5*life})`; ctx.fill();
            } else if(e.type==="arrow"){
                ctx.beginPath(); ctx.moveTo(x-16,y); ctx.lineTo(x,y-10); ctx.lineTo(x+4,y); ctx.lineTo(x,y+10);
                ctx.fillStyle=`rgba(200,200,100,${0.6*life})`; ctx.fill();
            } else if(e.type==="magic"){
                ctx.beginPath(); ctx.arc(x,y,12*(1-life),0,Math.PI*2);
                ctx.fillStyle=`rgba(100,100,255,${0.5*life})`; ctx.fill();
            } else if(e.type==="skill"){
                for(let a=0;a<3;a++){let ang=(Date.now()/100+a)*Math.PI*2;
                    ctx.beginPath(); ctx.arc(x+Math.cos(ang)*10,y+Math.sin(ang)*10,5,0,Math.PI*2);
                    ctx.fillStyle=`rgba(255,100,100,${0.6*life})`; ctx.fill();
                }
            } else if(e.type==="explosion"){
                ctx.beginPath(); ctx.arc(x,y,20*(1-life),0,Math.PI*2);
                ctx.fillStyle=`rgba(255,100,50,${0.5*life})`; ctx.fill();
            }
            e.life--; if(e.life<=0) attackEffects.splice(i,1), i--;
        }
        
        if(showMap) drawFullMap();
        if(shopOpen) drawShop();
        if(showInventory) drawInventory();
        if(showStatsWindow) drawStatsWindow();
        if(showAchievements) drawAchievementsWindow();
    }
    
    function handleWheel(e){
        if(shopOpen){
            let items=shopTab==="potions"?[1,2,3,4]:shopTab==="armor"?ALL_ARMOR.filter(a=>a.level<=player.level+10):ALL_WEAPONS.filter(w=>w.level<=player.level+10);
            let max=Math.max(0,items.length-shopItemsPerPage);
            shopScroll=Math.min(max,Math.max(0,shopScroll+(e.deltaY>0?1:-1))); e.preventDefault();
        } else if(showInventory){
            let avA=ALL_ARMOR.filter(a=>a.level<=player.level), avW=ALL_WEAPONS.filter(w=>w.level<=player.level);
            let max=Math.max(0,avA.length+avW.length-invItemsPerPage);
            invScroll=Math.min(max,Math.max(0,invScroll+(e.deltaY>0?1:-1))); e.preventDefault();
        } else if(showStatsWindow){
            let max=Math.max(0,9-statsItemsPerPage);
            statsScroll=Math.min(max,Math.max(0,statsScroll+(e.deltaY>0?1:-1))); e.preventDefault();
        }
    }
    
    canvas.addEventListener('wheel', handleWheel, {passive:false});
    
    function update(){
        updateMove(); updateMobs(); updateCamera();
        if(player.attackTimer>0) player.attackTimer--;
        if(player.superCooldown>0) player.superCooldown--;
        if(spawnTimer<=0){ if(mobs.length<MAX_MOBS){ for(let i=0;i<2;i++) spawnMob(); } spawnTimer=14; } else spawnTimer--;
        if(bossSpawnTimer<=0 && bosses.length===0 && player.level>=3){ bossSpawnTimer=300+Math.random()*120; spawnBoss(); } else bossSpawnTimer--;
        for(let i=0;i<messages.length;i++) if(messages[i].life) messages[i].life--;
        messages=messages.filter(m=>!m.life||m.life>0);
    }
    
    function getWorldClick(cx,cy){
        let rect=canvas.getBoundingClientRect();
        let sx=canvasWidth/rect.width, sy=canvasHeight/rect.height;
        return {x:(cx-rect.left)*sx+cameraX, y:(cy-rect.top)*sy+cameraY};
    }
    
    function handleClick(wx,wy){
        if(showStatsWindow || showInventory || shopOpen || showAchievements || showMap) return;
        if(explosionTarget?.active){ castExplosion(wx,wy); return; }
        
        if(nextPortal.active && Math.hypot(wx-nextPortal.x, wy-nextPortal.y)<40){ usePortal(nextPortal.targetWorld); return; }
        if(returnPortal.active && Math.hypot(wx-returnPortal.x, wy-returnPortal.y)<40){ usePortal(returnPortal.targetWorld); return; }
        if(Math.hypot(wx-shopNPC.x, wy-shopNPC.y)<40){ openShop(); return; }
        
        for(let m of mobs) if(Math.hypot(m.x-wx,m.y-wy)<50 && m.hp>0){ selectedMob=m; addMsg(`🎯 ${m.name} (${m.hp}/${m.maxHp} HP)`); return; }
        for(let b of bosses) if(Math.hypot(b.x-wx,b.y-wy)<60 && b.hp>0){ selectedMob=b; addMsg(`🎯 БОСС ${b.name} (${b.hp}/${b.maxHp} HP)`); return; }
        
        moveTo(wx,wy);
    }
    
    canvas.addEventListener('click', (e)=>{ let w=getWorldClick(e.clientX,e.clientY);
        if(shopOpen){ if(handleShopClick(e.clientX,e.clientY)) return; }
        else if(showInventory){ if(handleInventoryClick(e.clientX,e.clientY)) return; }
        else if(showStatsWindow){ if(handleStatsClick(e.clientX,e.clientY)) return; }
        else if(showAchievements){ if(handleAchievementsClick(e.clientX,e.clientY)) return; }
        handleClick(w.x,w.y);
    });
    
    canvas.addEventListener('touchstart', (e)=>{ e.preventDefault(); let t=e.touches[0]; let w=getWorldClick(t.clientX,t.clientY);
        if(shopOpen){ if(handleShopClick(t.clientX,t.clientY)) return; }
        else if(showInventory){ if(handleInventoryClick(t.clientX,t.clientY)) return; }
        else if(showStatsWindow){ if(handleStatsClick(t.clientX,t.clientY)) return; }
        else if(showAchievements){ if(handleAchievementsClick(t.clientX,t.clientY)) return; }
        handleClick(w.x,w.y);
    });
    
    setInterval(()=>{ if(selectedMob && selectedMob.hp>0 && Math.hypot(player.x-selectedMob.x, player.y-selectedMob.y) <= player.attackRange+15) playerAttack(); }, 1200);
    setInterval(()=>{ if(playerNickname) saveGame(); }, 30000);
    window.addEventListener('beforeunload', ()=>{ if(playerNickname) saveGame(); });
    
    document.getElementById('attackBtn').onclick=()=>{ if(selectedMob&&selectedMob.hp>0) playerAttack(); else addMsg("🎯 Выберите цель",true); };
    document.getElementById('skillBtn').onclick=()=>useSkill();
    document.getElementById('superBtn').onclick=()=>useSuper();
    document.getElementById('hpBtn').onclick=()=>useHp();
    document.getElementById('mpBtn').onclick=()=>useMp();
    document.getElementById('statsBtn').onclick=()=>{ showStatsWindow=!showStatsWindow; showInventory=false; showMap=false; showAchievements=false; statsScroll=0; };
    document.getElementById('invBtn').onclick=()=>{ showInventory=!showInventory; showStatsWindow=false; showMap=false; showAchievements=false; invScroll=0; };
    document.getElementById('mapBtn').onclick=()=>{ showMap=!showMap; showStatsWindow=false; showInventory=false; showAchievements=false; };
    document.getElementById('achievBtn').onclick=()=>{ showAchievements=!showAchievements; showStatsWindow=false; showInventory=false; showMap=false; };
    document.getElementById('classWarriorBtn').onclick=()=>switchClass('warrior');
    document.getElementById('classArcherBtn').onclick=()=>switchClass('archer');
    document.getElementById('classMageBtn').onclick=()=>switchClass('mage');
    
    window.addEventListener('keydown',(e)=>{
        if(e.key==='1') useSuper();
        if(e.key==='2') useHp();
        if(e.key==='3') useMp();
        if(e.key==='s') useSkill();
        if(e.key==='r'||e.key==='R') switchClass();
        if(e.key==='7'||e.key==='m'||e.key==='M'){ showMap=!showMap; showStatsWindow=false; showInventory=false; showAchievements=false; }
        if(e.key==='Escape'){ showMap=false; showStatsWindow=false; showInventory=false; shopOpen=false; showAchievements=false; }
    });
    
    async function startGame(){
        let lastNick = localStorage.getItem('rucoy_last');
        if(lastNick && localStorage.getItem('rucoy_save_'+lastNick)){
            playerNickname = lastNick;
            loadGame(lastNick);
            document.getElementById('nicknameDisplay').innerHTML = `👤 ${lastNick}`;
        } else {
            playerNickname = await showNicknameModal();
            document.getElementById('nicknameDisplay').innerHTML = `👤 ${playerNickname}`;
            if(!loadGame(playerNickname)){
                addMsg(`✨ Добро пожаловать, ${playerNickname}!`);
                player.gold = 500;
                player.potionHp = 5;
                player.potionMp = 5;
                saveGame();
            }
        }
        generateWorld();
        updateStatsFromLevel();
        player.hp = player.maxHp;
        player.mp = player.maxMp;
        player.x = safeZone.x + safeZone.width/2;
        player.y = safeZone.y + safeZone.height/2;
        for(let i=0;i<12;i++) spawnMob();
        updatePortals();
        updatePortalStatus();
        addMsg("✨ Добро пожаловать!");
        addMsg("⚔️ R - смена класса | 1 - СУПЕР | 2 - HP | 3 - MP | S - СКИЛЛ");
        addMsg(`🌍 Вы в ${getWorldName(currentWorld)} | Убейте ${MOBS_NEEDED - killsInWorld[currentWorld]} мобов для портала`);
    }
    
    startGame();
    
    function render(){ drawWorld(); for(let m of mobs) drawMob(m); for(let b of bosses) drawBoss(b); drawRealisticPlayer(player.x-cameraX, player.y-cameraY, player.isMoving); drawUI(); }
    function loop(){ update(); render(); requestAnimationFrame(loop); }
    loop();
})();
</script>
</body>
    </html>
