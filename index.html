<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TERRITORY WARS | Захвати территорию</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Impact', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        .game-container {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* КАНВАС + САЙДБАР */
        .game-layout {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4), 0 0 0 2px rgba(255, 255, 255, 0.05);
            cursor: crosshair;
            transition: transform 0.1s ease;
            background: #1a1f2e;
        }

        canvas:active {
            transform: scale(0.99);
        }

        /* ПАНЕЛЬ ИНФОРМАЦИИ */
        .info-panel {
            background: rgba(10, 20, 30, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 20px;
            width: 280px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .gang-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .gang-name {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 8px currentColor;
            margin-bottom: 8px;
        }

        .gang-stats {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            padding: 8px 15px;
            margin-top: 10px;
            font-weight: bold;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 800;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        .action-buttons {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background: linear-gradient(135deg, #2a2f3f, #1a1f2f);
            border: none;
            padding: 12px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #e91e63, #c2185b);
            box-shadow: 0 0 12px rgba(233, 30, 99, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.5);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ff9800, #f57c00);
        }

        .event-log {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 12px;
            height: 180px;
            overflow-y: auto;
            font-size: 12px;
            font-family: monospace;
            margin-top: 15px;
        }

        .event-log p {
            border-left: 3px solid #e91e63;
            padding-left: 8px;
            margin: 6px 0;
            color: #ddd;
        }

        .legend {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            justify-content: center;
            font-size: 11px;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            display: inline-block;
            margin-right: 5px;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 0px currentColor; }
            100% { text-shadow: 0 0 8px currentColor; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-layout">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div class="info-panel" id="infoPanel">
            <div class="gang-header" id="gangHeader">
                <div class="gang-name" id="gangName">🔥 ВЫБЕРИ БАНДУ</div>
                <div class="gang-stats">
                    <div class="stat"><div class="stat-value" id="territoryCount">0</div><div class="stat-label">КЛЕТКИ</div></div>
                    <div class="stat"><div class="stat-value" id="gangPower">0</div><div class="stat-label">СИЛА</div></div>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn" id="createGangBtn">✨ СОЗДАТЬ НОВУЮ БАНДУ</button>
                <button class="btn btn-primary" id="attackBtn">⚔️ АТАКОВАТЬ СОСЕДНЮЮ</button>
                <button class="btn btn-warning" id="resetBtn">💀 СБРОС ВСЕХ БАНД</button>
            </div>
            <div class="legend">
                <div><span class="legend-color" style="background:#e91e63;"></span> Ваша банда</div>
                <div><span class="legend-color" style="background:#3a6ea5;"></span> Враги</div>
                <div><span class="legend-color" style="background:#555;"></span> Нейтралы</div>
            </div>
            <div class="event-log" id="eventLog">
                <p>🔥 Добро пожаловать в Turf Wars!</p>
                <p>🎮 Создай банду или выбери существующую</p>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- НАСТРОЙКИ КАРТЫ ----------
    const MAP_SIZE = 30;        // 30x30 для производительности и зрелищности (можно увеличить до 50, но 30 уже эпично)
    const CELL_SIZE = 600 / MAP_SIZE; // 20px клетка
    
    let canvas = document.getElementById('gameCanvas');
    let ctx = canvas.getContext('2d');
    
    // ---------- ГЛОБАЛЬНЫЕ ДАННЫЕ ----------
    let gangs = [];          // массив банд { id, name, color, cells[] }
    let currentGangId = null;   // id банды игрока
    let mapData = [];        // 2D массив [y][x] -> gangId (null = нейтрал)
    
    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function saveToLocalStorage() {
        localStorage.setItem('turfwars_data', JSON.stringify({
            gangs: gangs,
            mapData: mapData,
            currentGangId: currentGangId
        }));
    }
    
    function loadFromLocalStorage() {
        const saved = localStorage.getItem('turfwars_data');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                gangs = data.gangs;
                mapData = data.mapData;
                currentGangId = data.currentGangId;
                return true;
            } catch(e) { console.warn(e); }
        }
        return false;
    }
    
    // Инициализация новой карты (все нейтралы)
    function initNeutralMap() {
        mapData = Array(MAP_SIZE).fill().map(() => Array(MAP_SIZE).fill(null));
    }
    
    // Подсчёт клеток для банды
    function countTerritory(gangId) {
        let count = 0;
        for(let y=0; y<MAP_SIZE; y++)
            for(let x=0; x<MAP_SIZE; x++)
                if(mapData[y][x] === gangId) count++;
        return count;
    }
    
    // Обновить статистику в интерфейсе
    function updateUI() {
        if(currentGangId !== null) {
            const gang = gangs.find(g => g.id === currentGangId);
            if(gang) {
                document.getElementById('gangName').innerHTML = `💎 ${gang.name}`;
                document.getElementById('gangName').style.color = gang.color;
                const cells = countTerritory(currentGangId);
                document.getElementById('territoryCount').innerText = cells;
                document.getElementById('gangPower').innerText = Math.floor(cells * 1.2 + 10);
                return;
            }
        }
        document.getElementById('gangName').innerHTML = `⚡ БЕЗ БАНДЫ`;
        document.getElementById('territoryCount').innerText = '0';
        document.getElementById('gangPower').innerText = '0';
    }
    
    function addLog(message, isError = false) {
        const logDiv = document.getElementById('eventLog');
        const p = document.createElement('p');
        p.innerHTML = message;
        if(isError) p.style.borderLeftColor = "#ff4444";
        else p.style.borderLeftColor = "#e91e63";
        logDiv.appendChild(p);
        p.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        if(logDiv.children.length > 25) logDiv.removeChild(logDiv.children[0]);
    }
    
    // Получить соседние клетки (включая диагонали? нет, только 4 направления для баланса)
    function getNeighbors(x, y) {
        const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
        let neigh = [];
        for(let [dx,dy] of dirs) {
            let nx = x+dx, ny = y+dy;
            if(nx>=0 && nx<MAP_SIZE && ny>=0 && ny<MAP_SIZE) neigh.push([nx,ny]);
        }
        return neigh;
    }
    
    // Атака: клетка (tx,ty) атакуется текущей бандой
    function attackCell(tx, ty) {
        if(currentGangId === null) {
            addLog("❌ Сначала создай или выбери банду!", true);
            return false;
        }
        const targetOwner = mapData[ty][tx];
        const attackerGang = gangs.find(g => g.id === currentGangId);
        if(!attackerGang) return false;
        
        // Если это уже своя клетка
        if(targetOwner === currentGangId) {
            addLog(`🏠 ${attackerGang.name}: это уже наша территория!`, true);
            return false;
        }
        
        // Проверка: можно атаковать только если есть своя клетка рядом
        let hasAdjacent = false;
        for(let [nx,ny] of getNeighbors(tx, ty)) {
            if(mapData[ny][nx] === currentGangId) { hasAdjacent = true; break; }
        }
        if(!hasAdjacent) {
            addLog(`⚠️ Нет границы с твоей территорией! Захватывай рядом.`, true);
            return false;
        }
        
        // Сила атакующего = кол-во клеток + рандом
        let attackerCells = countTerritory(currentGangId);
        let attackerPower = attackerCells + Math.random() * 30;
        
        let defenderName = "Нейтралы";
        let defenderPower = 20 + Math.random() * 25; // базовая защита нейтралов
        
        if(targetOwner !== null) {
            const defenderGang = gangs.find(g => g.id === targetOwner);
            if(defenderGang) {
                defenderName = defenderGang.name;
                let defenderCells = countTerritory(targetOwner);
                defenderPower = defenderCells + Math.random() * 30;
            }
        }
        
        addLog(`⚔️ АТАКА: ${attackerGang.name} (${Math.floor(attackerPower)}) vs ${defenderName} (${Math.floor(defenderPower)})`);
        
        if(attackerPower > defenderPower) {
            // ПОБЕДА - захват клетки
            mapData[ty][tx] = currentGangId;
            addLog(`✅ ${attackerGang.name} ЗАХВАТИЛ территорию! (${tx},${ty})`);
            renderMap();
            updateUI();
            saveToLocalStorage();
            
            // после захвата проверим - если у врага 0 клеток, банда исчезает
            if(targetOwner !== null) {
                let enemyCells = countTerritory(targetOwner);
                if(enemyCells === 0) {
                    const idx = gangs.findIndex(g => g.id === targetOwner);
                    if(idx !== -1) {
                        let deadGang = gangs[idx];
                        addLog(`💀 БАНДА ${deadGang.name} ПОЛНОСТЬЮ УНИЧТОЖЕНА! Её имя уходит в легенды.`);
                        gangs.splice(idx,1);
                        // если текущий игрок был удален? (не может быть, тк удаляем врага)
                    }
                }
            }
            return true;
        } else {
            addLog(`😭 Поражение! ${defenderName} отбил атаку.`, true);
            return false;
        }
    }
    
    // Создать новую банду
    function createGang(gangName, colorHex) {
        let newId = Date.now() + Math.floor(Math.random()*10000);
        let newGang = {
            id: newId,
            name: gangName.substring(0, 14),
            color: colorHex,
            cells: []
        };
        gangs.push(newGang);
        currentGangId = newId;
        
        // Поиск свободной нейтральной клетки для стартовой базы
        let startPlaced = false;
        for(let y=0; y<MAP_SIZE && !startPlaced; y++) {
            for(let x=0; x<MAP_SIZE && !startPlaced; x++) {
                if(mapData[y][x] === null) {
                    mapData[y][x] = newId;
                    startPlaced = true;
                    addLog(`🎉 Банда "${newGang.name}" создана! Стартовая клетка (${x},${y})`);
                }
            }
        }
        if(!startPlaced) addLog(`⚠️ Карта переполнена! Не удалось разместить базу.`, true);
        
        renderMap();
        updateUI();
        saveToLocalStorage();
    }
    
    // Выбор существующей банды (клик по клетке)
    function selectGangById(gangId) {
        if(gangs.find(g => g.id === gangId)) {
            currentGangId = gangId;
            addLog(`🎮 Теперь вы играете за банду "${gangs.find(g=>g.id===gangId).name}"`);
            updateUI();
            renderMap(); // подсветка
            saveToLocalStorage();
            return true;
        }
        return false;
    }
    
    // СБРОС ВСЕГО (админская кнопка)
    function fullReset() {
        gangs = [];
        currentGangId = null;
        initNeutralMap();
        
        // создадим 3 ИИ-банды для интереса, чтобы мир не был пустым
        const aiNames = ["❌ КРЫСЫ ТРУЩОБ", "🔫 БРИГАДА УЛЬТРА", "💀 ПРИЗРАКИ АСФАЛЬТА"];
        const aiColors = ["#3a6ea5", "#2c8c5a", "#aa6f3c"];
        for(let i=0;i<3;i++) {
            let aiId = Date.now()+i+1000;
            let aiGang = { id: aiId, name: aiNames[i], color: aiColors[i] };
            gangs.push(aiGang);
            // расставить случайные клетки для ИИ (по 3-5 клеток)
            for(let c=0;c<4+Math.floor(Math.random()*4);c++) {
                let placed=false;
                for(let attempt=0;attempt<50;attempt++) {
                    let rx = Math.floor(Math.random()*MAP_SIZE);
                    let ry = Math.floor(Math.random()*MAP_SIZE);
                    if(mapData[ry][rx] === null) {
                        mapData[ry][rx] = aiId;
                        placed=true;
                        break;
                    }
                }
                if(!placed) break;
            }
        }
        
        // оставшиеся нейтральные — всё, карта готова
        renderMap();
        updateUI();
        saveToLocalStorage();
        addLog("💥 МИР ПЕРЕЗАПУЩЕН! Три враждующие банды уже делят улицы...");
    }
    
    // Отрисовка карты (стильная, неон, свечение)
    function renderMap() {
        for(let y=0; y<MAP_SIZE; y++) {
            for(let x=0; x<MAP_SIZE; x++) {
                let gangId = mapData[y][x];
                let color = "#3a3f4e"; // нейтрал цвет серый
                let glow = false;
                if(gangId !== null) {
                    let gang = gangs.find(g => g.id === gangId);
                    if(gang) color = gang.color;
                    else color = "#7f8c8d";
                }
                if(gangId !== null && gangId === currentGangId) glow = true;
                
                ctx.fillStyle = color;
                ctx.fillRect(x*CELL_SIZE, y*CELL_SIZE, CELL_SIZE-0.5, CELL_SIZE-0.5);
                
                // Эффект "свечения" для своей банды
                if(glow) {
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = color;
                    ctx.fillStyle = color;
                    ctx.fillRect(x*CELL_SIZE, y*CELL_SIZE, CELL_SIZE-0.5, CELL_SIZE-0.5);
                    ctx.shadowBlur = 0;
                }
                
                // рамка
                ctx.strokeStyle = "rgba(0,0,0,0.3)";
                ctx.strokeRect(x*CELL_SIZE, y*CELL_SIZE, CELL_SIZE, CELL_SIZE);
            }
        }
        
        // сетка и градиентный overlay для крутости
        ctx.globalCompositeOperation = 'source-over';
        ctx.beginPath();
        for(let i=0;i<=MAP_SIZE;i++) {
            ctx.moveTo(i*CELL_SIZE,0);
            ctx.lineTo(i*CELL_SIZE,600);
            ctx.moveTo(0,i*CELL_SIZE);
            ctx.lineTo(600,i*CELL_SIZE);
        }
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.stroke();
    }
    
    // Обработка клика по канвасу (выбор/атака)
    function handleCanvasClick(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let mouseX = (e.clientX - rect.left) * scaleX;
        let mouseY = (e.clientY - rect.top) * scaleY;
        let cellX = Math.floor(mouseX / CELL_SIZE);
        let cellY = Math.floor(mouseY / CELL_SIZE);
        if(cellX<0 || cellX>=MAP_SIZE || cellY<0 || cellY>=MAP_SIZE) return;
        
        const clickedGangId = mapData[cellY][cellX];
        
        // Если нет текущей банды: пытаемся выбрать ту, по которой кликнули
        if(currentGangId === null) {
            if(clickedGangId !== null && gangs.find(g=>g.id===clickedGangId)) {
                selectGangById(clickedGangId);
                renderMap();
            } else {
                addLog("🔫 Сначала создай банду кнопкой 'СОЗДАТЬ' или выбери существующую на карте!", true);
            }
            return;
        }
        
        // Если банда есть — атакуем
        attackCell(cellX, cellY);
        renderMap();
        updateUI();
    }
    
    // Диалог создания банды
    function promptCreateGang() {
        let name = prompt("🔥 Введи название своей банды (крутое и дерзкое):", "УЛИЧНЫЕ ВОЛКИ");
        if(!name) name = "ПСЫ СВАЛКИ";
        let color = prompt("🎨 HEX цвет банды (например #e91e63 для розового):", "#e91e63");
        if(!/^#[0-9A-Fa-f]{6}$/.test(color)) color = "#e91e63";
        createGang(name, color);
        renderMap();
    }
    
    // --- ИНИЦИАЛИЗАЦИЯ ---
    function init() {
        if(!loadFromLocalStorage()) {
            initNeutralMap();
            fullReset();  // сразу создаст карту с бандами
        } else {
            // дополнительно проверим целостность
            if(!mapData || mapData.length===0) initNeutralMap();
            renderMap();
            updateUI();
            addLog("🏆 Добро пожаловать обратно! Война продолжается.");
        }
        renderMap();
        updateUI();
        
        // кнопки
        document.getElementById('createGangBtn').onclick = () => promptCreateGang();
        document.getElementById('resetBtn').onclick = () => { if(confirm("СБРОСИТЬ ВСЮ КАРТУ? Все банды исчезнут.")) fullReset(); };
        document.getElementById('attackBtn').onclick = () => {
            if(currentGangId===null) addLog("Сначала создай банду!", true);
            else addLog("💢 Нажми на вражескую клетку рядом с твоей территорией!");
        };
        canvas.addEventListener('click', handleCanvasClick);
    }
    
    init();
</script>
</body>
</html>
