<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chugur — Оффлайн мессенджер с лобби</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e0e0e0;
        }

        .app-container {
            width: 900px;
            height: 650px;
            display: flex;
            gap: 2px;
            background: #0a0a1a;
        }

        /* Панель лобби */
        .lobby-panel {
            width: 320px;
            background: #12122a;
            border-radius: 20px 0 0 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(100, 100, 255, 0.1);
        }

        .lobby-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(100, 100, 255, 0.15);
        }

        .lobby-header h1 {
            font-size: 26px;
            background: linear-gradient(45deg, #6a6aff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .lobby-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .lobby-list::-webkit-scrollbar {
            width: 4px;
        }
        .lobby-list::-webkit-scrollbar-thumb {
            background: #2a2a5a;
            border-radius: 2px;
        }

        .lobby-card {
            background: #1a1a3a;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .lobby-card:hover {
            border-color: #6a6aff;
            background: #1e1e42;
            transform: translateX(2px);
        }

        .lobby-card .lobby-name {
            font-weight: 600;
            font-size: 15px;
            color: #d0d0ff;
        }

        .lobby-card .lobby-info {
            font-size: 12px;
            color: #6a6aff;
            margin-top: 4px;
            display: flex;
            gap: 10px;
        }

        .lobby-card .lobby-id {
            font-size: 11px;
            color: #4a4a7a;
            margin-top: 2px;
        }

        .create-btn {
            margin: 10px 15px;
            padding: 12px;
            background: linear-gradient(135deg, #6a6aff, #a855f7);
            border: none;
            color: white;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .create-btn:hover {
            box-shadow: 0 5px 20px rgba(106, 106, 255, 0.3);
        }

        .refresh-btn {
            margin: 5px 15px 15px;
            padding: 8px;
            background: transparent;
            border: 1px solid #2a2a5a;
            color: #8a8aff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(106, 106, 255, 0.1);
        }

        .empty-lobbies {
            text-align: center;
            padding: 40px 20px;
            color: #4a4a7a;
        }

        /* Панель чата */
        .chat-panel {
            flex: 1;
            background: #12122a;
            border-radius: 0 20px 20px 0;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid rgba(100, 100, 255, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header .room-name {
            font-size: 18px;
            font-weight: 600;
            color: #d0d0ff;
        }

        .chat-header .room-id {
            font-size: 11px;
            color: #4a4a7a;
        }

        .leave-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid #ff6a6a;
            color: #ff6a6a;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .leave-btn:hover {
            background: rgba(255, 106, 106, 0.1);
        }

        .players-list {
            display: flex;
            gap: 6px;
            padding: 8px 20px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(100, 100, 255, 0.1);
        }

        .player-tag {
            padding: 4px 12px;
            background: #1a1a3a;
            border-radius: 12px;
            font-size: 12px;
            color: #6a6aff;
        }

        .player-tag.host {
            border: 1px solid #a855f7;
            color: #a855f7;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #2a2a5a;
            border-radius: 2px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            animation: msgIn 0.2s ease-out;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.own {
            align-self: flex-end;
            background: linear-gradient(135deg, #6a6aff, #4f4fff);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            align-self: flex-start;
            background: #1e1e3f;
            color: #d0d0ff;
            border-bottom-left-radius: 4px;
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: #4a4a7a;
            font-size: 12px;
            font-style: italic;
            padding: 4px 12px;
        }

        .message .sender-name {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 3px;
            opacity: 0.8;
        }

        .message .msg-text {
            font-size: 14px;
            line-height: 1.4;
        }

        .message .msg-time {
            font-size: 10px;
            opacity: 0.5;
            text-align: right;
            margin-top: 3px;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            gap: 10px;
            border-top: 1px solid rgba(100, 100, 255, 0.15);
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 25px;
            border: 1px solid #2a2a5a;
            background: #0d0d2b;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
        }

        .chat-input-area input:focus {
            border-color: #6a6aff;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #6a6aff, #a855f7);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .no-lobby-selected {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a4a7a;
            font-size: 16px;
        }

        /* Модальные окна */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #12122a;
            border-radius: 20px;
            padding: 30px;
            width: 380px;
            border: 1px solid rgba(100, 100, 255, 0.3);
        }

        .modal h3 {
            margin-bottom: 20px;
            color: #d0d0ff;
            text-align: center;
        }

        .modal input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #2a2a5a;
            background: #0d0d2b;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
        }

        .modal input:focus {
            border-color: #6a6aff;
        }

        .modal .btn-row {
            display: flex;
            gap: 10px;
        }

        .modal button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6a6aff, #a855f7);
            color: white;
        }

        .btn-cancel {
            background: #1e1e3f;
            color: #8a8aff;
        }

        .error-text {
            color: #ff6a6a;
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Панель лобби -->
        <div class="lobby-panel">
            <div class="lobby-header">
                <h1>CHUGUR</h1>
                <div style="font-size:11px;color:#6a6aff;margin-top:4px;">Лобби</div>
            </div>
            <button class="create-btn" onclick="showCreateModal()">+ Создать лобби</button>
            <button class="refresh-btn" onclick="requestLobbies()">🔄 Обновить список</button>
            <div class="lobby-list" id="lobbyList">
                <div class="empty-lobbies">Загрузка лобби...</div>
            </div>
        </div>

        <!-- Панель чата -->
        <div class="chat-panel" id="chatPanel">
            <div id="noLobby" class="no-lobby-selected">
                Выберите или создайте лобби
            </div>
            <div id="chatInterface" style="display:none;flex-direction:column;height:100%;">
                <div class="chat-header">
                    <div>
                        <div class="room-name" id="roomName"></div>
                        <div class="room-id" id="roomId"></div>
                    </div>
                    <button class="leave-btn" onclick="leaveLobby()">Выйти</button>
                </div>
                <div class="players-list" id="playersList"></div>
                <div class="chat-area" id="chatArea"></div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="Напишите сообщение..." maxlength="300">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно создания лобби -->
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <h3>Создать лобби</h3>
            <input type="text" id="createLobbyName" placeholder="Название лобби" maxlength="20">
            <input type="number" id="createMaxPlayers" placeholder="Макс. игроков (2-20)" min="2" max="20" value="10">
            <input type="text" id="createPassword" placeholder="Пароль (оставьте пустым для открытого)">
            <div class="btn-row">
                <button class="btn-cancel" onclick="hideCreateModal()">Отмена</button>
                <button class="btn-primary" onclick="createLobby()">Создать</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно входа в лобби -->
    <div class="modal-overlay" id="joinModal">
        <div class="modal">
            <h3>Войти в лобби</h3>
            <input type="text" id="joinPlayerName" placeholder="Ваше имя" maxlength="15">
            <input type="password" id="joinPassword" placeholder="Пароль (если есть)">
            <div class="btn-row">
                <button class="btn-cancel" onclick="hideJoinModal()">Отмена</button>
                <button class="btn-primary" id="joinConfirmBtn">Войти</button>
            </div>
            <div class="error-text" id="joinError"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentLobbyId = null;
        let myPlayerName = 'Игрок';
        let pendingJoinLobby = null;

        // Запрос списка лобби
        function requestLobbies() {
            socket.emit('request-lobbies');
        }

        // Получение списка лобби
        socket.on('lobbies-list', (lobbies) => {
            const lobbyList = document.getElementById('lobbyList');
            if (lobbies.length === 0) {
                lobbyList.innerHTML = '<div class="empty-lobbies">Нет доступных лобби</div>';
                return;
            }

            lobbyList.innerHTML = lobbies.map(lobby => `
                <div class="lobby-card" onclick="clickJoinLobby('${lobby.id}', ${lobby.hasPassword})">
                    <div class="lobby-name">${escapeHtml(lobby.name)} ${lobby.hasPassword ? '🔒' : ''}</div>
                    <div class="lobby-info">
                        <span>👥 ${lobby.playerCount}/${lobby.maxPlayers}</span>
                        ${lobby.hasPassword ? '<span>🔑 Пароль</span>' : '<span>🌐 Открытое</span>'}
                    </div>
                    <div class="lobby-id">ID: ${lobby.id}</div>
                </div>
            `).join('');
        });

        function clickJoinLobby(lobbyId, hasPassword) {
            pendingJoinLobby = lobbyId;
            document.getElementById('joinPlayerName').value = myPlayerName || '';
            document.getElementById('joinPassword').value = '';
            document.getElementById('joinError').textContent = '';
            document.getElementById('joinPassword').style.display = hasPassword ? 'block' : 'none';
            document.getElementById('joinModal').classList.add('active');
            if (!hasPassword) {
                document.getElementById('joinConfirmBtn').onclick = () => joinLobby();
            } else {
                document.getElementById('joinConfirmBtn').onclick = () => joinLobby();
            }
        }

        function joinLobby() {
            const name = document.getElementById('joinPlayerName').value.trim() || 'Игрок';
            const password = document.getElementById('joinPassword').value;
            myPlayerName = name;

            socket.emit('join-lobby', {
                lobbyId: pendingJoinLobby,
                password: password,
                name: name
            });
        }

        socket.on('join-error', (msg) => {
            document.getElementById('joinError').textContent = msg;
        });

        socket.on('join-success', (data) => {
            hideJoinModal();
            currentLobbyId = data.id;
            document.getElementById('noLobby').style.display = 'none';
            document.getElementById('chatInterface').style.display = 'flex';
            document.getElementById('roomName').textContent = data.name;
            document.getElementById('roomId').textContent = 'ID: ' + data.id;
            document.getElementById('chatArea').innerHTML = '';
            updatePlayersList(data.players);
            requestLobbies();
        });

        socket.on('message-history', (messages) => {
            const chatArea = document.getElementById('chatArea');
            messages.forEach(msg => {
                appendMessage(msg);
            });
            scrollChat();
        });

        socket.on('new-message', (msg) => {
            appendMessage(msg);
            scrollChat();
        });

        socket.on('players-update', (players) => {
            updatePlayersList(players);
        });

        socket.on('left-lobby', () => {
            currentLobbyId = null;
            document.getElementById('noLobby').style.display = 'flex';
            document.getElementById('chatInterface').style.display = 'none';
            document.getElementById('chatArea').innerHTML = '';
            requestLobbies();
        });

        function appendMessage(msg) {
            const chatArea = document.getElementById('chatArea');
            const div = document.createElement('div');
            
            if (msg.type === 'system') {
                div.className = 'message system';
                div.innerHTML = `<span>${escapeHtml(msg.text)}</span>`;
            } else {
                const isOwn = msg.sender === myPlayerName;
                div.className = `message ${isOwn ? 'own' : 'other'}`;
                div.innerHTML = `
                    <div class="sender-name">${escapeHtml(msg.sender)}</div>
                    <div class="msg-text">${escapeHtml(msg.text)}</div>
                    <div class="msg-time">${msg.time}</div>
                `;
            }
            chatArea.appendChild(div);
        }

        function updatePlayersList(players) {
            const container = document.getElementById('playersList');
            container.innerHTML = players.map(p => 
                `<span class="player-tag ${p.isHost ? 'host' : ''}">${p.isHost ? '👑 ' : ''}${escapeHtml(p.name)}</span>`
            ).join('');
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentLobbyId) return;
            socket.emit('send-message', text);
            input.value = '';
            input.focus();
        }

        function leaveLobby() {
            if (currentLobbyId) {
                socket.emit('leave-lobby');
            }
        }

        function createLobby() {
            const name = document.getElementById('createLobbyName').value.trim() || 'Лобби';
            const maxPlayers = parseInt(document.getElementById('createMaxPlayers').value) || 10;
            const password = document.getElementById('createPassword').value.trim() || null;
            
            myPlayerName = 'Хост';
            
            socket.emit('create-lobby', {
                name: name,
                maxPlayers: Math.min(20, Math.max(2, maxPlayers)),
                password: password
            });

            hideCreateModal();
        }

        socket.on('lobby-created', (data) => {
            currentLobbyId = data.id;
            document.getElementById('noLobby').style.display = 'none';
            document.getElementById('chatInterface').style.display = 'flex';
            document.getElementById('roomName').textContent = data.name;
            document.getElementById('roomId').textContent = 'ID: ' + data.id;
            document.getElementById('chatArea').innerHTML = '';
            document.getElementById('playersList').innerHTML = '<span class="player-tag host">👑 Хост</span>';
            requestLobbies();
        });

        function showCreateModal() {
            document.getElementById('createModal').classList.add('active');
            document.getElementById('createLobbyName').focus();
        }

        function hideCreateModal() {
            document.getElementById('createModal').classList.remove('active');
        }

        function hideJoinModal() {
            document.getElementById('joinModal').classList.remove('active');
            pendingJoinLobby = null;
        }

        function scrollChat() {
            const area = document.getElementById('chatArea');
            setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
        }

        function escapeHtml(text) {
            const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        // Обработка Enter
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Закрытие модалок по клику вне
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });
        });

        // Автообновление каждые 2 секунды
        setInterval(() => {
            requestLobbies();
        }, 2000);

        // Первый запрос
        requestLobbies();
    </script>
</body>
  </html>
