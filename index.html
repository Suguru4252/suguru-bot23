<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монополия Online</title>
    <!-- Firebase SDK (не требуется свой сервер) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a3a0a, #1e5a1e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            background: #ecd9b4;
            border-radius: 80px;
            padding: 30px;
            border: 10px solid #b47d4e;
            box-shadow: 0 30px 40px black;
        }
        /* Главное меню */
        .main-menu {
            text-align: center;
            padding: 40px;
        }
        .main-menu h1 {
            font-size: 5rem;
            color: #ffd966;
            text-shadow: 6px 6px 0 #7a4f1e;
            margin-bottom: 50px;
        }
        .menu-buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .menu-btn {
            background: gold;
            border: none;
            font-size: 2.5rem;
            padding: 20px 60px;
            border-radius: 80px;
            font-weight: 900;
            border-bottom: 10px solid #b0851f;
            cursor: pointer;
            transition: 0.1s;
        }
        .menu-btn:active {
            transform: translateY(8px);
            border-bottom-width: 2px;
        }
        /* Экраны */
        .screen {
            display: none;
        }
        .active-screen {
            display: block;
        }
        /* Комнаты */
        .rooms-container {
            background: #2d4030d9;
            border-radius: 60px;
            padding: 30px;
            border: 5px solid #dbb67b;
        }
        .rooms-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .rooms-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
        }
        .room-card {
            background: #f5e9d8;
            border-radius: 40px;
            padding: 20px;
            border: 5px solid #aa7c4a;
            cursor: pointer;
            transition: 0.2s;
        }
        .room-card:hover {
            transform: scale(1.02);
            background: #fff2e0;
        }
        .room-card .room-name {
            font-size: 2rem;
            font-weight: 900;
        }
        .room-card .room-players {
            font-size: 1.5rem;
            color: #2d6e2d;
        }
        /* Игровая доска (упрощенная для онлайн) */
        .game-board {
            display: grid;
            grid-template-columns: 100px repeat(9, 1fr) 100px;
            grid-template-rows: 100px repeat(9, 1fr) 100px;
            gap: 4px;
            background: #b4804b;
            padding: 15px;
            border-radius: 60px;
            margin-top: 20px;
        }
        .cell {
            background: #fbefdb;
            border: 3px solid #996f40;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 800;
            position: relative;
        }
        .corner {
            background: radial-gradient(#ffefcf, #cc9f6b);
        }
        .player-token {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            bottom: 2px;
        }
        /* Чат */
        .chat-box {
            background: #3f3222e0;
            border-radius: 40px;
            padding: 20px;
            margin-top: 20px;
        }
        .chat-messages {
            background: #efe6d2;
            height: 150px;
            overflow-y: auto;
            border-radius: 30px;
            padding: 15px;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .chat-input {
            flex: 2;
            padding: 15px;
            border-radius: 50px;
            border: 4px solid #896f44;
            font-size: 1.2rem;
        }
        .send-btn {
            background: #ffbe2e;
            border: none;
            border-radius: 60px;
            padding: 0 30px;
            font-weight: 900;
            font-size: 1.5rem;
            border-bottom: 5px solid #926d23;
            cursor: pointer;
        }
        .roll-dice {
            background: gold;
            font-size: 2rem;
            padding: 15px 40px;
            border-radius: 60px;
            border-bottom: 8px solid #b0851f;
            cursor: pointer;
            margin: 20px 0;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- Главное меню -->
    <div id="mainMenu" class="main-menu active-screen">
        <h1>🎲 МОНОПОЛИЯ ONLINE 🎲</h1>
        <div class="menu-buttons">
            <button class="menu-btn" onclick="showScreen('nicknameScreen')">🆕 ИГРАТЬ</button>
            <button class="menu-btn" onclick="showScreen('roomsScreen'); loadRooms();">🚪 КОМНАТЫ</button>
        </div>
    </div>

    <!-- Экран ввода ника -->
    <div id="nicknameScreen" class="main-menu screen">
        <h2 style="font-size: 3rem; color: white;">ВВЕДИ НИК</h2>
        <input type="text" id="nicknameInput" placeholder="Твой ник" style="font-size: 2rem; padding: 15px; border-radius: 60px; margin: 30px; text-align: center;">
        <br>
        <button class="menu-btn" onclick="createRoom()">СОЗДАТЬ КОМНАТУ</button>
        <button class="menu-btn" onclick="showScreen('roomsScreen'); loadRooms();">НАЗАД</button>
    </div>

    <!-- Экран списка комнат -->
    <div id="roomsScreen" class="screen">
        <div class="rooms-container">
            <div class="rooms-header">
                <h2 style="color: #ffd966; font-size: 3rem;">ДОСТУПНЫЕ КОМНАТЫ</h2>
                <button class="menu-btn" onclick="showScreen('nicknameScreen')" style="font-size: 1.8rem; padding: 15px 30px;">+ СОЗДАТЬ</button>
            </div>
            <div id="roomsList" class="rooms-list">
                <!-- Список комнат загружается сюда -->
            </div>
            <button class="menu-btn" onclick="showScreen('mainMenu')" style="margin-top: 20px;">⬅ ГЛАВНОЕ МЕНЮ</button>
        </div>
    </div>

    <!-- Игровой экран -->
    <div id="gameScreen" class="screen">
        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div style="flex: 3; min-width: 600px;">
                <div id="gameBoard" class="game-board"></div>
                <div style="display: flex; gap: 20px; align-items: center; margin: 20px 0;">
                    <button class="roll-dice" id="rollDiceBtn">🎲 БРОСИТЬ КУБИК</button>
                    <div style="font-size: 2rem; background: white; padding: 15px 30px; border-radius: 50px;" id="diceResult"></div>
                </div>
            </div>
            <div style="flex: 1.2;">
                <div class="chat-box">
                    <h3 style="color: #ffdb9d; font-size: 2rem;">ЧАТ</h3>
                    <div id="chatMessages" class="chat-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" class="chat-input" placeholder="Написать...">
                        <button class="send-btn" id="sendChatBtn">➡️</button>
                    </div>
                </div>
            </div>
        </div>
        <button class="menu-btn" onclick="leaveRoom()" style="margin-top: 20px;">🏠 ВЫЙТИ</button>
    </div>
</div>

<script>
    // ================== НАСТРОЙКИ FIREBASE ==================
    // ТЫ ДОЛЖЕН СОЗДАТЬ СВОЙ ПРОЕКТ И ВСТАВИТЬ ДАННЫЕ НИЖЕ
    const firebaseConfig = {
        apiKey: "AIzaSyAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA", // Замени на свои данные
        authDomain: "твой-проект.firebaseapp.com",
        databaseURL: "https://твой-проект-default-rtdb.firebaseio.com",
        projectId: "твой-проект",
        storageBucket: "твой-проект.appspot.com",
        messagingSenderId: "000000000000",
        appId: "1:000000000000:web:aaaaaaaaaaaaaaaaaaaaaa"
    };

    // Инициализация Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==================
    let currentPlayer = {
        id: null,
        nickname: '',
        color: '#e63946',
        position: 0,
        money: 1500
    };
    let currentRoomId = null;
    let roomRef = null;
    let playersRef = null;
    let gameStateRef = null;

    // ================== УПРАВЛЕНИЕ ЭКРАНАМИ ==================
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(screenId).classList.add('active-screen');
    }

    // ================== СОЗДАНИЕ КОМНАТЫ ==================
    function createRoom() {
        const nickname = document.getElementById('nicknameInput').value.trim();
        if (!nickname) {
            alert('Введите ник!');
            return;
        }
        currentPlayer.nickname = nickname;
        currentPlayer.id = generateId();
        
        // Создаем комнату в Firebase
        const newRoomRef = db.ref('rooms').push();
        const roomId = newRoomRef.key;
        
        const roomData = {
            id: roomId,
            name: `Комната ${nickname}`,
            createdAt: Date.now(),
            players: {},
            gameStarted: false,
            currentTurn: 0,
            diceResult: 0
        };
        
        // Добавляем текущего игрока
        roomData.players[currentPlayer.id] = {
            id: currentPlayer.id,
            nickname: nickname,
            color: currentPlayer.color,
            position: 0,
            money: 1500,
            properties: []
        };
        
        newRoomRef.set(roomData).then(() => {
            currentRoomId = roomId;
            joinRoom(roomId, nickname);
        });
    }

    // ================== ПРИСОЕДИНЕНИЕ К КОМНАТЕ ==================
    function joinRoom(roomId, nickname) {
        if (!currentPlayer.id) {
            currentPlayer.id = generateId();
            currentPlayer.nickname = nickname || 'Игрок';
        }
        
        currentRoomId = roomId;
        roomRef = db.ref(`rooms/${roomId}`);
        playersRef = db.ref(`rooms/${roomId}/players`);
        gameStateRef = db.ref(`rooms/${roomId}/gameState`);
        
        // Добавляем себя в список игроков
        playersRef.child(currentPlayer.id).set({
            id: currentPlayer.id,
            nickname: currentPlayer.nickname,
            color: currentPlayer.color,
            position: 0,
            money: 1500,
            properties: []
        });
        
        // Слушаем изменения в комнате
        roomRef.on('value', (snapshot) => {
            const room = snapshot.val();
            if (room) {
                updateGameBoard(room);
                updatePlayersList(room);
            }
        });
        
        // Слушаем чат
        db.ref(`rooms/${roomId}/chat`).on('child_added', (snapshot) => {
            const msg = snapshot.val();
            addChatMessage(msg);
        });
        
        showScreen('gameScreen');
    }

    // ================== ЗАГРУЗКА СПИСКА КОМНАТ ==================
    function loadRooms() {
        const roomsList = document.getElementById('roomsList');
        roomsList.innerHTML = 'Загрузка...';
        
        db.ref('rooms').orderByChild('createdAt').limitToLast(20).on('value', (snapshot) => {
            roomsList.innerHTML = '';
            snapshot.forEach((child) => {
                const room = child.val();
                if (!room.gameStarted) {
                    const roomCard = document.createElement('div');
                    roomCard.className = 'room-card';
                    roomCard.onclick = () => {
                        const nickname = prompt('Введите ваш ник:');
                        if (nickname) joinRoom(room.id, nickname);
                    };
                    const playersCount = room.players ? Object.keys(room.players).length : 0;
                    roomCard.innerHTML = `
                        <div class="room-name">${room.name}</div>
                        <div class="room-players">👥 ${playersCount}/4</div>
                    `;
                    roomsList.appendChild(roomCard);
                }
            });
        });
    }

    // ================== ИГРОВАЯ ДОСКА ==================
    const cellNames = [
        "СТАРТ", "Балтийская", "Казна", "Волковка", "Налог", "Рижская", "Морская", "Шанс", "Невский", "Варшавская",
        "ТЮРЬМА", "Малая", "Эл.ком", "Фонтанка", "Вокзал", "Лермонтов", "Шанс", "Садовая", "Казна", "Лиговка",
        "БЕСПЛАТНО", "Театр", "Шанс", "Музей", "Налог", "Парк", "Набережная", "Вокзал", "Дворцовая", "Вода",
        "ОТДЫХ", "Проспект", "Казна", "Банк", "Шанс", "Завод", "Универ", "Вокзал", "Казна", "Ростовщик"
    ];

    function updateGameBoard(room) {
        const boardEl = document.getElementById('gameBoard');
        boardEl.innerHTML = '';
        
        for (let row = 0; row < 11; row++) {
            for (let col = 0; col < 11; col++) {
                let idx = -1;
                if (row === 0) idx = 10 + col;
                else if (row === 10) idx = 9 - col;
                else if (col === 0) idx = 10 - row;
                else if (col === 10) idx = 20 + row;
                else {
                    // Пустая клетка в центре
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'cell';
                    boardEl.appendChild(emptyCell);
                    continue;
                }
                
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (idx === 0 || idx === 10 || idx === 20 || idx === 30) cell.classList.add('corner');
                
                cell.innerHTML = `<span style="font-size: 0.6rem;">${cellNames[idx]}</span>`;
                
                // Отображаем игроков на этой клетке
                if (room.players) {
                    Object.values(room.players).forEach(player => {
                        if (player.position === idx) {
                            const token = document.createElement('div');
                            token.className = 'player-token';
                            token.style.background = player.color;
                            token.style.left = Math.random() * 20 + 'px'; // Простое смещение
                            cell.appendChild(token);
                        }
                    });
                }
                
                boardEl.appendChild(cell);
            }
        }
    }

    function updatePlayersList(room) {
        // Обновляем информацию об игроках где-нибудь на экране
    }

    // ================== ЧАТ ==================
    function addChatMessage(msg) {
        const chatDiv = document.getElementById('chatMessages');
        const msgEl = document.createElement('div');
        msgEl.style.fontSize = '1.2rem';
        msgEl.style.margin = '5px 0';
        msgEl.innerHTML = `<b>${msg.nickname}:</b> ${msg.text}`;
        chatDiv.appendChild(msgEl);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    document.getElementById('sendChatBtn').addEventListener('click', () => {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (text && currentRoomId) {
            db.ref(`rooms/${currentRoomId}/chat`).push({
                nickname: currentPlayer.nickname,
                text: text,
                timestamp: Date.now()
            });
            input.value = '';
        }
    });

    // ================== БРОСОК КУБИКА ==================
    document.getElementById('rollDiceBtn').addEventListener('click', () => {
        if (!currentRoomId) return;
        
        const dice1 = Math.floor(Math.random() * 6) + 1;
        const dice2 = Math.floor(Math.random() * 6) + 1;
        const sum = dice1 + dice2;
        
        document.getElementById('diceResult').innerHTML = `🎲 ${dice1} ${dice2} = ${sum}`;
        
        // Обновляем позицию игрока
        const newPosition = (currentPlayer.position + sum) % 40;
        currentPlayer.position = newPosition;
        
        // Если прошел старт
        if (currentPlayer.position < sum) {
            currentPlayer.money += 200;
        }
        
        // Сохраняем в Firebase
        playersRef.child(currentPlayer.id).update({
            position: newPosition,
            money: currentPlayer.money
        });
        
        // Передаем ход следующему (упрощенно)
        if (roomRef) {
            roomRef.child('currentTurn').transaction((turn) => {
                return (turn + 1) % Object.keys(room.players || {}).length;
            });
        }
    });

    // ================== ВЫХОД ИЗ КОМНАТЫ ==================
    function leaveRoom() {
        if (currentRoomId && currentPlayer.id) {
            playersRef.child(currentPlayer.id).remove().then(() => {
                roomRef.off();
                currentRoomId = null;
                showScreen('mainMenu');
            });
        }
    }

    // ================== ГЕНЕРАТОР ID ==================
    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    }
</script>
</body>
</html>
