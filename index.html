<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>3D Pet Mobile</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; }

#ui {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.4);
    padding:10px;
    border-radius:10px;
    font-size:14px;
}

/* JOYSTICK */
#joystick {
    position:absolute;
    bottom:40px;
    left:40px;
    width:120px;
    height:120px;
    background:rgba(255,255,255,0.1);
    border-radius:50%;
}

#stick {
    position:absolute;
    width:50px;
    height:50px;
    background:rgba(255,255,255,0.5);
    border-radius:50%;
    left:35px;
    top:35px;
}

/* BUTTONS */
.btn {
    position:absolute;
    right:20px;
    width:90px;
    height:50px;
    background:rgba(0,0,0,0.5);
    color:white;
    text-align:center;
    line-height:50px;
    border-radius:10px;
    user-select:none;
}

#eggBtn { bottom:140px; }
#foodBtn { bottom:80px; }

</style>
</head>
<body>

<div id="ui"></div>

<div id="joystick">
    <div id="stick"></div>
</div>

<div id="eggBtn" class="btn">🥚 Egg</div>
<div id="foodBtn" class="btn">🍖 Food</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e1e1e);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,10,10);
scene.add(light);

// FLOOR
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({color:0x2d6a4f})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// PLAYER
const player = new THREE.Mesh(
    new THREE.SphereGeometry(1,16,16),
    new THREE.MeshStandardMaterial({color:"lime"})
);
scene.add(player);

// ================= DATA =================
let coins = [];
let pets = [];
let eggs = 3;
let food = 2;

let coinsCount = 0;
let level = 1;
let exp = 0;
let speed = 0.15;

// ================= SPAWN =================
function spawnCoin(){
    const c = new THREE.Mesh(
        new THREE.SphereGeometry(0.4,8,8),
        new THREE.MeshStandardMaterial({color:"gold"})
    );
    c.position.set((Math.random()-0.5)*80,0.5,(Math.random()-0.5)*80);
    scene.add(c);
    coins.push(c);
}
for(let i=0;i<25;i++) spawnCoin();

// ================= PET =================
function addPet(){
    const p = new THREE.Mesh(
        new THREE.SphereGeometry(0.5,10,10),
        new THREE.MeshStandardMaterial({color:"cyan"})
    );
    scene.add(p);
    pets.push(p);
}

// ================= JOYSTICK =================
let joyX = 0;
let joyY = 0;

const stick = document.getElementById("stick");
const joystick = document.getElementById("joystick");

let dragging = false;

joystick.addEventListener("touchstart", ()=>dragging=true);
joystick.addEventListener("touchend", ()=>{
    dragging=false;
    joyX=0; joyY=0;
    stick.style.left="35px";
    stick.style.top="35px";
});

joystick.addEventListener("touchmove", (e)=>{
    if(!dragging) return;

    let t = e.touches[0];
    let rect = joystick.getBoundingClientRect();

    let x = t.clientX - rect.left - 60;
    let y = t.clientY - rect.top - 60;

    joyX = x/40;
    joyY = y/40;

    joyX = Math.max(-1,Math.min(1,joyX));
    joyY = Math.max(-1,Math.min(1,joyY));

    stick.style.left = (60 + joyX*40 - 25)+"px";
    stick.style.top  = (60 + joyY*40 - 25)+"px";
});

// ================= BUTTONS =================
document.getElementById("eggBtn").onclick = ()=>{
    if(eggs > 0){
        eggs--;
        if(Math.random()>0.3) addPet();
    }
};

document.getElementById("foodBtn").onclick = ()=>{
    if(food > 0){
        food--;
        speed += 0.1;
        setTimeout(()=>speed-=0.1,4000);
    }
};

// ================= LOOP =================
function update(){

    // MOVE PLAYER (TOUCH)
    player.position.x += joyX * speed;
    player.position.z += joyY * speed;

    player.position.x = Math.max(-40,Math.min(40,player.position.x));
    player.position.z = Math.max(-40,Math.min(40,player.position.z));

    // COINS
    coins.forEach((c,i)=>{
        if(player.position.distanceTo(c.position)<1.2){
            scene.remove(c);
            coins.splice(i,1);

            coinsCount++;
            exp++;

            spawnCoin();

            if(exp>=level*5){
                level++;
                exp=0;
                eggs++;
                food++;
                speed+=0.02;
            }
        }
    });

    // PET FOLLOW
    let angle=0;
    pets.forEach(p=>{
        p.position.x = player.position.x + Math.cos(angle)*2;
        p.position.z = player.position.z + Math.sin(angle)*2;
        angle+=Math.PI;
    });
}

// ================= UI =================
function ui(){
document.getElementById("ui").innerHTML=
`
Coins: ${coinsCount}<br>
Level: ${level}<br>
XP: ${exp}/${level*5}<br><br>
🥚 Eggs: ${eggs}<br>
🍖 Food: ${food}<br>
🐶 Pets: ${pets.length}
`;
}

// ================= CAMERA =================
function cam(){
camera.position.x = player.position.x;
camera.position.z = player.position.z + 5;
camera.position.y = 5;
camera.lookAt(player.position);
}

// ================= LOOP =================
function animate(){
update();
ui();
cam();
renderer.render(scene,camera);
requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
