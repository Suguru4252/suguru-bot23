<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🥩 СИСЯ ДИМЫ ДАУНА · ПИТОМЕЦ ДАВИД · БОНУСЫ</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #2b1b0e 0%, #4a2e1a 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Comic Sans MS', 'Impact', sans-serif;
      padding: 12px;
    }

    .game-container {
      max-width: 580px;
      width: 100%;
      background: #fbe9c3;
      background-image: radial-gradient(circle at 20% 30%, #fff3d6, #f0d5a8);
      border-radius: 60px 60px 30px 30px;
      box-shadow: 0 20px 0 #6b3e1f, 0 30px 30px rgba(0,0,0,0.4);
      padding: 20px 18px 30px;
      border: 4px solid #ac6f3c;
      text-align: center;
      transition: 0.2s;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #3d1f09;
      text-shadow: 5px 5px 0 #e7b87b, 2px 2px 0 #a6531e;
      word-break: break-word;
      transform: rotate(-1deg);
    }

    .dima-zone {
      background: #b38b60;
      padding: 16px 10px 20px;
      border-radius: 80px 80px 40px 40px;
      box-shadow: inset 0 -6px 0 #5d3a22, 0 12px 0 #4d2f19, 0 8px 15px black;
      margin-bottom: 14px;
      border: 3px solid #eeb574;
    }

    .sisi-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sisya {
      font-size: 6.5rem;
      line-height: 1;
      filter: drop-shadow(6px 10px 0 rgba(0,0,0,0.3));
      cursor: pointer;
      transition: 0.1s ease;
      transform: scale(1);
      background: #fad6b3;
      padding: 0 10px 10px 10px;
      border-radius: 999px;
      display: inline-block;
    }

    .sisya:active {
      transform: scale(0.88);
      filter: drop-shadow(2px 4px 0 #251608);
    }

    .sisi-stats {
      background: #2c1a0b;
      padding: 12px 8px;
      border-radius: 50px;
      box-shadow: inset 0 2px 6px black, 0 6px 0 #1a0f06;
      color: #ffdead;
      font-weight: bold;
      font-size: 1.3rem;
      margin: 12px 0 5px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      border: 2px solid #bc8f4b;
    }

    .sisi-size {
      background: #51321b;
      padding: 6px 16px;
      border-radius: 40px;
      box-shadow: inset 0 2px 5px black;
      color: #ffd78a;
      text-shadow: 2px 2px 0 #1f0f03;
    }

    .crit-meter {
      background: #241407;
      border-radius: 30px;
      padding: 6px 12px;
      color: #ffb882;
      font-size: 1.1rem;
    }

    /* Полоска возбуждения */
    .arousal-bar-container {
      background: #1f1107;
      border-radius: 30px;
      padding: 4px 10px;
      margin: 10px 5px 0;
      border: 2px solid #d48f4a;
    }

    .arousal-fill {
      height: 20px;
      background: linear-gradient(90deg, #ff6a6a, #ff3b9a);
      border-radius: 20px;
      width: 0%;
      box-shadow: inset 0 2px 5px #44001a, 0 0 10px #ff8c8c;
      transition: width 0.2s;
    }

    .arousal-text {
      color: #ffe5b4;
      font-weight: bold;
      margin-top: 4px;
      font-size: 1rem;
    }

    .pet-david {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #6e4d2e;
      margin: 16px 0 14px;
      padding: 10px 18px;
      border-radius: 100px 40px 100px 40px;
      box-shadow: inset 0 1px 6px #eebb77, 0 8px 0 #3a281a, 0 5px 10px black;
      border: 2px solid #efc48c;
      color: #fff3db;
      font-weight: bold;
    }

    .pet-avatar {
      font-size: 3.2rem;
      background: #2d1c0b;
      padding: 5px 16px;
      border-radius: 60px;
      box-shadow: inset 0 0 0 3px #b47b44;
      line-height: 1.2;
    }

    .pet-status {
      text-align: right;
    }

    .pet-status div {
      font-size: 1.2rem;
      background: #1f1309;
      padding: 4px 12px;
      border-radius: 30px;
      margin: 4px 0;
      border: 1px solid #c89a5b;
    }

    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 6px 0 8px;
    }

    .btn {
      background: #d68f3c;
      border: none;
      font-weight: bold;
      font-size: 1.3rem;
      padding: 12px 18px;
      border-radius: 60px;
      box-shadow: 0 7px 0 #7a451b, 0 4px 8px black;
      color: #1f0f02;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.07s;
      border: 2px solid #feda9b;
      flex: 1 0 130px;
      letter-spacing: 1.5px;
      transform: rotate(-0.5deg);
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #7a451b, 0 4px 8px black;
    }

    .btn:disabled {
      opacity: 0.5;
      filter: grayscale(0.5);
      transform: none;
      box-shadow: 0 5px 0 #5f371a;
      pointer-events: none;
    }

    .achievements-panel {
      background: #2f1f11e0;
      border-radius: 30px;
      padding: 12px 12px;
      margin: 15px 0 5px;
      border: 2px solid #dba15a;
      backdrop-filter: blur(3px);
    }

    .ach-title {
      color: #ffd78c;
      font-weight: bold;
      font-size: 1.3rem;
      text-shadow: 2px 2px 0 #361e0c;
      margin-bottom: 8px;
    }

    .ach-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      justify-content: center;
    }

    .ach-badge {
      background: #543e28;
      padding: 5px 15px;
      border-radius: 40px;
      color: #d4b483;
      font-weight: bold;
      border: 1px solid #b47d44;
      box-shadow: inset 0 0 6px #1a0e04;
      font-size: 1rem;
    }

    .ach-badge.unlocked {
      background: #d6a04b;
      color: #1d2c00;
      box-shadow: 0 0 12px gold;
      border-color: #ffd966;
    }

    .crit-log {
      background: #0c0702d0;
      backdrop-filter: blur(2px);
      padding: 8px 12px;
      border-radius: 40px;
      margin-top: 14px;
      color: #ffe3ae;
      font-size: 1.1rem;
      font-weight: bold;
      min-height: 65px;
      border: 2px dashed #f3b35e;
      box-shadow: inset 0 0 10px #37200b;
    }

    .glow-crit {
      text-shadow: 0 0 15px rgb(255, 200, 0), 0 0 30px rgb(255, 80, 0);
      animation: shake 0.3s;
    }

    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      25%{ transform: translateX(-6px); }
      75%{ transform: translateX(6px); }
    }

    .reset-area {
      margin-top: 8px;
    }

    .small-btn {
      background: #684527;
      box-shadow: 0 4px 0 #3f2818;
      font-size: 1rem;
      padding: 8px 18px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <h1>🥩ДИМА ДАУН🥩</h1>
  <div class="dima-zone">
    <div class="sisi-container">
      <span class="sisya" id="sisiEmoji">🥩</span>
      <span style="font-size:3rem;">🤜💥</span>
    </div>
    <div class="sisi-stats">
      <span class="sisi-size">🍖 <span id="sizeValue">1.0</span> см</span>
      <span class="crit-meter">⚡КРИТ: <span id="critChanceDisplay">25</span>%</span>
    </div>
    <!-- Полоска возбуждения -->
    <div class="arousal-bar-container">
      <div class="arousal-fill" id="arousalFill"></div>
      <div class="arousal-text">💢 ВОЗБУЖДЕНИЕ: <span id="arousalPercent">0</span>%</div>
    </div>
  </div>

  <!-- ПИТОМЕЦ ДАВИД -->
  <div class="pet-david">
    <span class="pet-avatar">🐕‍🦺 ДАВИД</span>
    <div class="pet-status">
      <div>❤️ <span id="petLove">50</span>%</div>
      <div>🦴 <span id="petHunger">100</span>%</div>
    </div>
  </div>

  <div class="action-buttons">
    <button class="btn" id="hitBtn">🤜 БИТЬ</button>
    <button class="btn" id="feedDavidBtn">🍖 КОРМИТЬ</button>
  </div>
  <div class="action-buttons">
    <button class="btn" id="specialCritBtn">💦 КРИТ-ГЛОТОК</button>
    <button class="btn" id="playDavidBtn">🎾 ИГРАТЬ</button>
  </div>

  <!-- Достижения -->
  <div class="achievements-panel">
    <div class="ach-title">🏆 ДОСТИЖЕНИЯ</div>
    <div class="ach-list" id="achList">
      <span class="ach-badge" id="achSize">📏 10см</span>
      <span class="ach-badge" id="achDavid">🐕 СЫТ</span>
      <span class="ach-badge" id="achCrit5">💥 5 КРИТОВ</span>
    </div>
  </div>

  <div class="crit-log" id="logBox">
    💬 ЖМИ НА СИСЮ...
  </div>

  <div class="reset-area">
    <button class="btn small-btn" id="resetBtn">🔄 ЗАНОВО</button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- СОСТОЯНИЕ ----------
    let sisiSize = 1.0;
    let critChance = 0.25;
    let arousal = 0;            // 0-100
    const MAX_AROUSAL = 100;

    let petLove = 50;
    let petHunger = 100;

    // Достижения
    let achSizeUnlocked = false;
    let achDavidUnlocked = false;
    let achCritUnlocked = false;
    let critCounter = 0;         // для ачивки 5 критов

    let canSpecialCrit = true;

    // ЗВУКИ (создаём через Web Audio / простые осцилляторы, чтобы не зависеть от файлов)
    let audioCtx = null;
    function initAudio() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // разблокируем по первому взаимодействию
      } catch(e) { console.warn("Web Audio не поддерживается"); }
    }

    function playSlapSound() {
      if (!audioCtx) { initAudio(); return; }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = 80 + Math.random() * 40;
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now+0.08);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(now+0.08);
    }

    function playSquelchSound() {
      if (!audioCtx) { initAudio(); return; }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = 45;
      gain.gain.setValueAtTime(0.18, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now+0.15);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(now+0.15);
    }

    function playCritSound() {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = 120;
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now+0.2);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(now+0.2);
      // второй тон
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.type = 'sine';
      osc2.frequency.value = 200;
      gain2.gain.setValueAtTime(0.1, now+0.05);
      gain2.gain.exponentialRampToValueAtTime(0.01, now+0.25);
      osc2.connect(gain2).connect(audioCtx.destination);
      osc2.start();
      osc2.stop(now+0.25);
    }

    // DOM элементы
    const logBox = document.getElementById('logBox');
    const sizeSpan = document.getElementById('sizeValue');
    const critChanceSpan = document.getElementById('critChanceDisplay');
    const petLoveSpan = document.getElementById('petLove');
    const petHungerSpan = document.getElementById('petHunger');
    const sisiEmoji = document.getElementById('sisiEmoji');
    const arousalFill = document.getElementById('arousalFill');
    const arousalPercent = document.getElementById('arousalPercent');

    const achSizeEl = document.getElementById('achSize');
    const achDavidEl = document.getElementById('achDavid');
    const achCrit5El = document.getElementById('achCrit5');

    function updateUI() {
      sizeSpan.textContent = sisiSize.toFixed(2);
      critChanceSpan.textContent = Math.round(critChance * 100);
      
      if (sisiSize >= 8.0) sisiEmoji.textContent = '🍖🍖';
      else if (sisiSize >= 5.0) sisiEmoji.textContent = '🥩🥩';
      else if (sisiSize >= 2.5) sisiEmoji.textContent = '🥩';
      else sisiEmoji.textContent = '🥓';
      
      petLove = Math.min(100, Math.max(0, petLove));
      petHunger = Math.min(100, Math.max(0, petHunger));
      petLoveSpan.textContent = Math.floor(petLove);
      petHungerSpan.textContent = Math.floor(petHunger);
      
      // arousal
      arousal = Math.min(MAX_AROUSAL, Math.max(0, arousal));
      const percent = (arousal / MAX_AROUSAL) * 100;
      arousalFill.style.width = percent + '%';
      arousalPercent.textContent = Math.floor(percent);
      
      // Достижения отображение
      achSizeEl.classList.toggle('unlocked', achSizeUnlocked);
      achDavidEl.classList.toggle('unlocked', achDavidUnlocked);
      achCrit5El.classList.toggle('unlocked', achCritUnlocked);
    }

    function checkAchievements() {
      if (!achSizeUnlocked && sisiSize >= 10.0) {
        achSizeUnlocked = true;
        setLog('🏆 ДОСТИЖЕНИЕ: СИСЯ 10 СМ! ДИМА ГОРД!');
      }
      if (!achDavidUnlocked && petHunger >= 95 && petLove >= 80) {
        achDavidUnlocked = true;
        setLog('🏆 ДОСТИЖЕНИЕ: ДАВИД СЫТ И ЛЮБИМ!');
      }
      if (!achCritUnlocked && critCounter >= 5) {
        achCritUnlocked = true;
        setLog('🏆 ДОСТИЖЕНИЕ: 5 КРИТИЧЕСКИХ УДАРОВ!');
      }
    }

    function setLog(msg, isCrit=false, isSpecial=false) {
      logBox.innerHTML = msg;
      if (isCrit || isSpecial) {
        logBox.classList.add('glow-crit');
        setTimeout(() => logBox.classList.remove('glow-crit'), 400);
      }
    }

    function decayHunger(amount = 2) {
      petHunger = Math.max(0, petHunger - amount);
      if (petHunger < 15) petLove = Math.max(0, petLove - 0.5);
      updateUI();
    }

    function hungerPenalty() {
      if (petHunger < 20) {
        petLove = Math.max(0, petLove - 1.2);
        setLog('💔 ДАВИД ГОЛОДЕН!');
      }
    }

    function addLove(amt) { petLove = Math.min(100, petLove + amt); }

    // АВТОКРИТ при заполнении возбуждения
    function checkArousalOverflow() {
      if (arousal >= MAX_AROUSAL) {
        arousal = 0;
        // имитация автокрита
        let gain = 0.8 + (Math.random() * 1.0);
        sisiSize += gain;
        critChance = Math.min(0.5, critChance + 0.02);
        addLove(5);
        playCritSound();
        setLog(`💥💦 ВОЗБУЖДЕНИЕ ВЗОРВАЛОСЬ! АВТОКРИТ! +${gain.toFixed(2)}см, ДИМА КОНЧАЕТ НА СОСКИ!`, true);
        critCounter++;
        sisiEmoji.style.animation = 'shake 0.3s';
        setTimeout(()=> sisiEmoji.style.animation = '', 300);
        checkAchievements();
      }
    }

    function hitSisya() {
      initAudio();
      playSlapSound();
      decayHunger(3);
      
      let gain = 0.15 + (Math.random() * 0.2);
      if (petLove > 70) gain *= 1.25;
      else if (petLove < 25) gain *= 0.8;
      
      const effectiveCrit = critChance + (petLove > 85 ? 0.07 : 0);
      const isCrit = Math.random() < effectiveCrit;
      let message = '';
      
      if (isCrit) {
        gain *= 2.2 + (Math.random()*0.8);
        message = `💥💦 КРИТ! ДИМА БЬЁТ СЕБЯ ПО СИСЕ, КОНЧАЕТ НА СОСКИ! +${gain.toFixed(2)}см!`;
        playCritSound();
        critCounter++;
        addLove(3);
        arousal = Math.min(MAX_AROUSAL, arousal + 22);
        if (Math.random()<0.4) message += ' 👅 СЛИЗЫВАЕТ!';
      } else {
        message = `👊 УДАР ПО СИСЕ. +${gain.toFixed(2)}см.`;
        arousal = Math.min(MAX_AROUSAL, arousal + 8);
        if (Math.random()<0.2) addLove(1.2);
      }
      
      sisiSize += gain;
      critChance = Math.min(0.45, 0.25 + (sisiSize * 0.005));
      hungerPenalty();
      updateUI();
      checkArousalOverflow();
      checkAchievements();
      setLog(message, isCrit);
      sisiEmoji.style.transform = 'scale(1.2)';
      setTimeout(()=> sisiEmoji.style.transform = '', 120);
    }

    function performSpecialCrit() {
      initAudio();
      if (!canSpecialCrit) {
        setLog('⏳ СПЕЦКРИТ НЕ ГОТОВ (покорми/поиграй)');
        return;
      }
      decayHunger(8);
      const loveBonus = petLove / 200;
      const sizeBonus = Math.min(0.3, sisiSize * 0.02);
      const success = Math.random() < (0.35 + loveBonus + sizeBonus);
      
      if (success) {
        const hugeGain = 1.2 + (sisiSize * 0.18) + (Math.random() * 1.5);
        sisiSize += hugeGain;
        critChance = Math.min(0.55, critChance + 0.04);
        addLove(8);
        petHunger = Math.min(100, petHunger + 10);
        arousal = Math.min(MAX_AROUSAL, arousal + 35);
        playSquelchSound();
        playCritSound();
        const msg = `💦💦💦 СПЕЦ-КРИТ!!! ДИМА БЬЁТ, КОНЧАЕТ НА СОСКИ И ГЛОТАЕТ СПЕРМУ! +${hugeGain.toFixed(2)}см!`;
        setLog(msg, true, true);
        critCounter++;
        sisiEmoji.style.animation = 'shake 0.4s';
        setTimeout(()=> sisiEmoji.style.animation = '', 400);
        canSpecialCrit = false;
        setTimeout(()=> { canSpecialCrit = true; }, 6000);
      } else {
        sisiSize += 0.25;
        setLog('😩 ПОЧТИ... НО НЕ ХВАТИЛО ВОЗБУЖДЕНИЯ');
        petLove = Math.max(0, petLove - 2);
        playSlapSound();
      }
      checkArousalOverflow();
      checkAchievements();
      updateUI();
    }

    function feedDavid() {
      initAudio();
      if (sisiSize < 0.6) { setLog('🥓 СИСЯ СЛИШКОМ МАЛА!'); return; }
      const cost = 0.4 + Math.random()*0.3;
      sisiSize = Math.max(0.3, sisiSize - cost);
      petHunger = Math.min(100, petHunger + 25 + Math.floor(petLove/7));
      addLove(6);
      if (!canSpecialCrit && petHunger > 70) canSpecialCrit = true;
      setLog(`🍖 ДИМА ДАЛ СИСЮ ДАВИДУ. -${cost.toFixed(2)}см`);
      playSlapSound();
      checkAchievements();
      updateUI();
    }

    function playWithDavid() {
      initAudio();
      if (petHunger < 10) { setLog('🐕 ДАВИД ГОЛОДЕН!'); return; }
      decayHunger(7);
      const loveGain = 5 + Math.floor(Math.random()*8);
      addLove(loveGain);
      if (Math.random()<0.4) critChance = Math.min(0.5, critChance + 0.01);
      setLog(`🎾 ИГРА С ДАВИДОМ! любовь +${loveGain}`);
      if (!canSpecialCrit && petLove > 65) { canSpecialCrit = true; setLog('✨ СПЕЦКРИТ СНОВА ГОТОВ!'); }
      playSlapSound();
      checkAchievements();
      updateUI();
    }

    function resetGame() {
      sisiSize = 1.0; critChance = 0.25; arousal = 0;
      petLove = 50; petHunger = 100;
      canSpecialCrit = true;
      achSizeUnlocked = achDavidUnlocked = achCritUnlocked = false;
      critCounter = 0;
      updateUI();
      setLog('💬 НОВАЯ ИГРА! КОПИ ВОЗБУЖДЕНИЕ И КРИТЫ.');
      sisiEmoji.style.animation = '';
    }

    function handleSisiClick() { hitSisya(); }

    function init() {
      updateUI();
      setLog('🥩 БЕЙ, КОПИ ВОЗБУЖДЕНИЕ! ЗВУК ВКЛ.');
      document.getElementById('hitBtn').addEventListener('click', hitSisya);
      document.getElementById('specialCritBtn').addEventListener('click', performSpecialCrit);
      document.getElementById('feedDavidBtn').addEventListener('click', feedDavid);
      document.getElementById('playDavidBtn').addEventListener('click', playWithDavid);
      document.getElementById('resetBtn').addEventListener('click', resetGame);
      sisiEmoji.addEventListener('click', handleSisiClick);
      
      setInterval(() => {
        if (petHunger > 0) { petHunger = Math.max(0, petHunger - 1.0); updateUI(); }
        if (!canSpecialCrit && petLove>50 && petHunger>40 && Math.random()<0.15) canSpecialCrit = true;
      }, 10000);
      
      // разблокировка аудио при первом касании
      document.body.addEventListener('click', initAudio, { once: true });
    }

    init();
  })();
</script>
</body>
</html>
