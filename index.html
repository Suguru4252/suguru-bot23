<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Chugur — Voice Notes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #eee;
        }

        .recorder {
            max-width: 550px;
            width: 100%;
            background: #151515;
            border: 1px solid #2a2a2a;
        }

        .header {
            padding: 20px 24px 8px 24px;
            border-bottom: 1px solid #222;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .header p {
            font-size: 0.7rem;
            color: #888;
            margin-top: 6px;
        }

        .record-panel {
            padding: 24px;
            background: #111;
            border-bottom: 1px solid #222;
            text-align: center;
        }

        .timer {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 3.2rem;
            font-weight: 500;
            background: #0a0a0a;
            padding: 16px 20px;
            border: 1px solid #2c2c2c;
            color: #f5f5f5;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: #1e1e1e;
            border: 1px solid #3a3a3a;
            padding: 10px 24px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #ddd;
            cursor: pointer;
            transition: 0.1s linear;
            font-family: inherit;
        }

        button:hover {
            background: #2c2c2c;
            border-color: #5a5a5a;
            color: white;
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: default;
            transform: none;
        }

        .btn-record {
            background: #2a1814;
            border-color: #7a3a2e;
            color: #ff9a7a;
        }

        .btn-record.active {
            background: #5a2a1e;
            border-color: #c06040;
            color: white;
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 18px 24px 8px 24px;
            border-bottom: 1px solid #222;
        }

        .library-header h3 {
            font-size: 0.85rem;
            font-weight: 500;
            color: #aaa;
            letter-spacing: 0.5px;
        }

        .clear-btn {
            background: none;
            border: 1px solid #3a2a28;
            padding: 4px 12px;
            font-size: 0.7rem;
            color: #b88a7a;
        }

        .recordings-list {
            padding: 16px 20px 24px 20px;
            max-height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .record-item {
            background: #121212;
            border: 1px solid #252525;
            padding: 12px;
        }

        .record-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .record-name {
            font-size: 0.8rem;
            font-weight: 500;
            font-family: monospace;
            color: #ddd;
        }

        .record-duration {
            font-size: 0.7rem;
            font-family: monospace;
            background: #1a1a1a;
            padding: 2px 8px;
            border: 1px solid #2e2e2e;
            color: #aaa;
        }

        .record-date {
            font-size: 0.6rem;
            color: #6a6a6a;
            margin-bottom: 8px;
        }

        .record-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        audio {
            max-width: 200px;
            height: 34px;
            background: #1a1a1a;
            border: 1px solid #2f2f2f;
        }

        .delete-btn {
            background: none;
            border: 1px solid #442e2a;
            padding: 4px 12px;
            font-size: 0.7rem;
            color: #c08070;
        }

        .empty-message {
            text-align: center;
            color: #5a5a5a;
            padding: 32px 20px;
            border: 1px dashed #2a2a2a;
            font-size: 0.8rem;
        }

        .footer-note {
            padding: 14px 20px;
            border-top: 1px solid #1f1f1f;
            font-size: 0.6rem;
            color: #6f6f6f;
            text-align: center;
            background: #0c0c0c;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
        }
    </style>
</head>
<body>
<div class="recorder">
    <div class="header">
        <h1>Chugur</h1>
        <p>Voice Notes — запись и хранение</p>
    </div>

    <div class="record-panel">
        <div class="timer" id="timerDisplay">00:00:00</div>
        <div class="btn-group">
            <button id="recordBtn" class="btn-record">Запись</button>
            <button id="stopBtn" disabled>Стоп</button>
            <button id="playLastBtn">Последняя</button>
        </div>
        <div style="font-size:0.7rem; color:#6a6a6a; margin-top:16px;">
            🎙 Работает в фоне · разрешите доступ к микрофону
        </div>
    </div>

    <div class="library-header">
        <h3>Библиотека записей</h3>
        <button id="clearAllBtn" class="clear-btn">Очистить всё</button>
    </div>

    <div id="recordingsList" class="recordings-list">
        <div class="empty-message">Нет записей. Нажмите «Запись».</div>
    </div>

    <div class="footer-note">
        Chugur · все записи сохраняются в телефоне
    </div>
</div>

<script>
    // =============== CHUGUR — VOICE RECORDER ===============
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let startTime = null;
    let timerInterval = null;
    let db = null;
    let currentStream = null;

    // DOM
    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const timerDisplay = document.getElementById('timerDisplay');
    const playLastBtn = document.getElementById('playLastBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const recordingsListDiv = document.getElementById('recordingsList');

    // IndexedDB
    const DB_NAME = 'ChugurDB';
    const STORE_NAME = 'notes';

    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            request.onupgradeneeded = (event) => {
                const dbRef = event.target.result;
                if (!dbRef.objectStoreNames.contains(STORE_NAME)) {
                    dbRef.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                }
            };
        });
    }

    function saveRecording(blob, durationFormatted) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction([STORE_NAME], 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            const record = {
                timestamp: Date.now(),
                date: new Date().toLocaleString(),
                duration: durationFormatted,
                audioBlob: blob,
                name: `chugur_${new Date().toLocaleTimeString()}.webm`
            };
            const request = store.add(record);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    function getAllRecordings() {
        return new Promise((resolve, reject) => {
            const tx = db.transaction([STORE_NAME], 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result || []);
            request.onerror = () => reject(request.error);
        });
    }

    function deleteRecordingById(id) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction([STORE_NAME], 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            const request = store.delete(id);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    async function clearAllRecordings() {
        const all = await getAllRecordings();
        for (let rec of all) {
            await deleteRecordingById(rec.id);
        }
        renderRecordings();
    }

    function formatTime(seconds) {
        const hrs = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = Math.floor(seconds % 60);
        if (hrs > 0) {
            return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateTimer() {
        if (startTime && isRecording) {
            const elapsed = (Date.now() - startTime) / 1000;
            timerDisplay.textContent = formatTime(elapsed);
        }
    }

    async function startRecording() {
        if (isRecording) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            currentStream = stream;
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                if (startTime) {
                    const durationSec = (Date.now() - startTime) / 1000;
                    const formatted = formatTime(durationSec);
                    await saveRecording(audioBlob, formatted);
                    await renderRecordings();
                }
                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                    currentStream = null;
                }
                isRecording = false;
                recordBtn.disabled = false;
                stopBtn.disabled = true;
                if (timerInterval) clearInterval(timerInterval);
                timerDisplay.textContent = '00:00:00';
                startTime = null;
                recordBtn.classList.remove('active');
                recordBtn.textContent = 'Запись';
            };

            mediaRecorder.start(200);
            isRecording = true;
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 200);
            recordBtn.disabled = true;
            stopBtn.disabled = false;
            recordBtn.classList.add('active');
            recordBtn.textContent = 'Запись...';
        } catch (err) {
            alert('Ошибка: разрешите доступ к микрофону');
            console.error(err);
        }
    }

    function stopRecording() {
        if (mediaRecorder && isRecording && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
        } else {
            if (timerInterval) clearInterval(timerInterval);
            isRecording = false;
            recordBtn.disabled = false;
            stopBtn.disabled = true;
            recordBtn.classList.remove('active');
            recordBtn.textContent = 'Запись';
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }
    }

    async function playLastRecording() {
        const recordings = await getAllRecordings();
        if (recordings.length === 0) {
            alert('Нет записей');
            return;
        }
        const last = recordings.sort((a, b) => b.timestamp - a.timestamp)[0];
        const audioUrl = URL.createObjectURL(last.audioBlob);
        const audio = new Audio(audioUrl);
        audio.play().catch(e => alert('Ошибка воспроизведения'));
    }

    async function renderRecordings() {
        const records = await getAllRecordings();
        if (records.length === 0) {
            recordingsListDiv.innerHTML = '<div class="empty-message">Нет записей. Нажмите «Запись».</div>';
            return;
        }
        const sorted = records.sort((a, b) => b.timestamp - a.timestamp);
        recordingsListDiv.innerHTML = '';
        for (let rec of sorted) {
            const audioUrl = URL.createObjectURL(rec.audioBlob);
            const div = document.createElement('div');
            div.className = 'record-item';
            div.innerHTML = `
                <div class="record-meta">
                    <span class="record-name">${rec.name || 'запись'}</span>
                    <span class="record-duration">${rec.duration || '--:--'}</span>
                </div>
                <div class="record-date">${rec.date || ''}</div>
                <div class="record-controls">
                    <audio controls src="${audioUrl}" preload="metadata"></audio>
                    <button class="delete-btn" data-id="${rec.id}">Удалить</button>
                </div>
            `;
            const delBtn = div.querySelector('.delete-btn');
            delBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = Number(delBtn.dataset.id);
                await deleteRecordingById(id);
                await renderRecordings();
            });
            recordingsListDiv.appendChild(div);
        }
    }

    // Инициализация
    window.addEventListener('load', async () => {
        await initDB();
        await renderRecordings();

        recordBtn.onclick = startRecording;
        stopBtn.onclick = stopRecording;
        playLastBtn.onclick = playLastRecording;
        clearAllBtn.onclick = async () => {
            if (confirm('Удалить все записи без возможности восстановления?')) {
                await clearAllRecordings();
                await renderRecordings();
            }
        };
    });
</script>
</body>
</html>
