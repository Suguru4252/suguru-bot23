<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Земля | Реалистичная 3D модель</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 12px 25px;
            border-radius: 50px;
            pointer-events: none;
            backdrop-filter: blur(10px);
            font-weight: 500;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 10;
        }
        .instruction {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            background: rgba(0,0,0,0.55);
            padding: 8px 25px;
            border-radius: 25px;
            backdrop-filter: blur(8px);
            white-space: nowrap;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div id="info">🌍 ЗЕМЛЯ</div>
    <div class="instruction">🖱️ Вращение | 📜 Зум | 👆 Удерживайте для перемещения</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==================== СЦЕНА ====================
        const scene = new THREE.Scene();
        
        // Звёздное небо
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 3000;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            starsPositions[i] = (Math.random() - 0.5) * 800;
            starsPositions[i+1] = (Math.random() - 0.5) * 500;
            starsPositions[i+2] = (Math.random() - 0.5) * 600;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({ 
            color: 0xffffff, 
            size: 0.3, 
            blending: THREE.AdditiveBlending, 
            depthWrite: false 
        }));
        scene.add(stars);
        
        // Ещё слой звёзд
        const starsGeo2 = new THREE.BufferGeometry();
        const starsPositions2 = new Float32Array(2000 * 3);
        for (let i = 0; i < 2000 * 3; i += 3) {
            starsPositions2[i] = (Math.random() - 0.5) * 1000;
            starsPositions2[i+1] = (Math.random() - 0.5) * 600;
            starsPositions2[i+2] = (Math.random() - 0.5) * 800;
        }
        starsGeo2.setAttribute('position', new THREE.BufferAttribute(starsPositions2, 3));
        const stars2 = new THREE.Points(starsGeo2, new THREE.PointsMaterial({ 
            color: 0xaaccff, 
            size: 0.25, 
            blending: THREE.AdditiveBlending, 
            depthWrite: false 
        }));
        scene.add(stars2);

        // ==================== КАМЕРА ====================
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.5, 4.5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        document.body.appendChild(renderer.domElement);

        // ==================== УПРАВЛЕНИЕ ====================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.rotateSpeed = 0.6;
        controls.zoomSpeed = 1.2;
        controls.minDistance = 1.8;
        controls.maxDistance = 15;
        controls.target.set(0, 0, 0);
        controls.update();

        // ==================== ОСВЕЩЕНИЕ ====================
        // Солнечный свет
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);
        
        // Подсветка тёмной стороны
        const ambientLight = new THREE.AmbientLight(0x111144, 0.4);
        scene.add(ambientLight);
        
        // Рассеянный свет атмосферы
        const rimLight = new THREE.DirectionalLight(0x4488cc, 0.5);
        rimLight.position.set(-3, 0, -3);
        scene.add(rimLight);

        // ==================== СОЗДАНИЕ ТЕКСТУР ЗЕМЛИ ====================
        function createEarthTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Океан (глубокий синий)
            const oceanGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            oceanGradient.addColorStop(0, '#1a3a5c');
            oceanGradient.addColorStop(0.3, '#1e5a8a');
            oceanGradient.addColorStop(0.5, '#225588');
            oceanGradient.addColorStop(0.7, '#1e5a8a');
            oceanGradient.addColorStop(1, '#1a3a5c');
            ctx.fillStyle = oceanGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Континенты
            const continents = [
                { name: 'Северная Америка', x: 150, y: 60, w: 180, h: 150 },
                { name: 'Южная Америка', x: 200, y: 200, w: 90, h: 180 },
                { name: 'Европа', x: 480, y: 70, w: 140, h: 100 },
                { name: 'Африка', x: 470, y: 150, w: 150, h: 250 },
                { name: 'Азия', x: 600, y: 50, w: 300, h: 180 },
                { name: 'Австралия', x: 750, y: 290, w: 100, h: 80 },
                { name: 'Антарктида', x: 0, y: 430, w: 1024, h: 82 }
            ];
            
            continents.forEach(continent => {
                ctx.save();
                ctx.fillStyle = '#3a6b35';
                ctx.strokeStyle = '#2d5a28';
                ctx.lineWidth = 2;
                
                ctx.beginPath();
                const { x, y, w, h } = continent;
                
                // Создаём неровный контур
                const points = 12;
                ctx.moveTo(x + Math.random() * 20, y + Math.random() * 10);
                for (let i = 0; i < points; i++) {
                    const angle = (i / points) * Math.PI * 2;
                    const rx = w/2 + (Math.random() - 0.5) * w * 0.3;
                    const ry = h/2 + (Math.random() - 0.5) * h * 0.3;
                    ctx.lineTo(
                        x + w/2 + Math.cos(angle) * rx,
                        y + h/2 + Math.sin(angle) * ry
                    );
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                // Добавляем рельеф
                ctx.fillStyle = '#4a8a3f';
                for (let i = 0; i < 30; i++) {
                    const rx = x + Math.random() * w;
                    const ry = y + Math.random() * h;
                    ctx.beginPath();
                    ctx.arc(rx, ry, Math.random() * 15 + 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Горы
                ctx.fillStyle = '#5a7a4a';
                for (let i = 0; i < 10; i++) {
                    const mx = x + Math.random() * w;
                    const my = y + Math.random() * h;
                    ctx.beginPath();
                    ctx.arc(mx, my, Math.random() * 8 + 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Пустыни
                ctx.fillStyle = '#c4a855';
                for (let i = 0; i < 8; i++) {
                    const dx = x + Math.random() * w;
                    const dy = y + Math.random() * h;
                    ctx.beginPath();
                    ctx.arc(dx, dy, Math.random() * 12 + 4, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            });
            
            // Лёд на полюсах
            ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
            ctx.fillRect(0, 0, canvas.width, 30);
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            
            // Облака поверх
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            for (let i = 0; i < 200; i++) {
                const cx = Math.random() * canvas.width;
                const cy = Math.random() * canvas.height;
                ctx.beginPath();
                ctx.ellipse(cx, cy, Math.random() * 40 + 10, Math.random() * 15 + 5, Math.random() * Math.PI, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Острова
            ctx.fillStyle = '#4a8a3f';
            for (let i = 0; i < 50; i++) {
                const ix = Math.random() * canvas.width;
                const iy = Math.random() * canvas.height;
                ctx.beginPath();
                ctx.arc(ix, iy, Math.random() * 6 + 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            return new THREE.CanvasTexture(canvas);
        }
        
        function createCloudTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Облачные образования
            for (let i = 0; i < 500; i++) {
                const alpha = 0.1 + Math.random() * 0.4;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                const cx = Math.random() * canvas.width;
                const cy = Math.random() * canvas.height;
                const rx = Math.random() * 60 + 15;
                const ry = Math.random() * 20 + 5;
                ctx.beginPath();
                ctx.ellipse(cx, cy, rx, ry, Math.random() * Math.PI, 0, Math.PI * 2);
                ctx.fill();
                
                // Мелкие облачка рядом
                for (let j = 0; j < 3; j++) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.6})`;
                    ctx.beginPath();
                    ctx.ellipse(
                        cx + (Math.random() - 0.5) * 40,
                        cy + (Math.random() - 0.5) * 15,
                        rx * 0.6,
                        ry * 0.6,
                        Math.random() * Math.PI,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                }
            }
            
            // Полосы облаков
            for (let y = 0; y < canvas.height; y += 30) {
                const alpha = 0.05 + Math.random() * 0.15;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fillRect(0, y, canvas.width, 20 + Math.random() * 10);
            }
            
            return new THREE.CanvasTexture(canvas);
        }
        
        function createSpecularMap() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            // Океан блестит (светлый), суша матовая (тёмная)
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#111111';
            const continents = [
                { x: 75, y: 30, w: 90, h: 75 },
                { x: 100, y: 100, w: 45, h: 90 },
                { x: 240, y: 35, w: 70, h: 50 },
                { x: 235, y: 75, w: 75, h: 125 },
                { x: 300, y: 25, w: 150, h: 90 },
                { x: 375, y: 145, w: 50, h: 40 },
                { x: 0, y: 215, w: 512, h: 41 }
            ];
            
            continents.forEach(c => {
                ctx.beginPath();
                ctx.ellipse(c.x + c.w/2, c.y + c.h/2, c.w/2, c.h/2, 0, 0, Math.PI * 2);
                ctx.fill();
            });
            
            return new THREE.CanvasTexture(canvas);
        }

        // ==================== СОЗДАНИЕ ЗЕМЛИ ====================
        const earthGroup = new THREE.Group();
        
        // Основная сфера Земли
        const earthGeo = new THREE.SphereGeometry(1.5, 96, 96);
        const earthTex = createEarthTexture();
        const specularTex = createSpecularMap();
        
        const earthMat = new THREE.MeshPhongMaterial({
            map: earthTex,
            specularMap: specularTex,
            specular: new THREE.Color('grey'),
            shininess: 10,
            bumpScale: 0.05
        });
        
        const earth = new THREE.Mesh(earthGeo, earthMat);
        earth.castShadow = true;
        earth.receiveShadow = true;
        earthGroup.add(earth);
        
        // Слой облаков
        const cloudsGeo = new THREE.SphereGeometry(1.53, 96, 96);
        const cloudsTex = createCloudTexture();
        const cloudsMat = new THREE.MeshPhongMaterial({
            map: cloudsTex,
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            side: THREE.FrontSide
        });
        const clouds = new THREE.Mesh(cloudsGeo, cloudsMat);
        clouds.renderOrder = 1;
        earthGroup.add(clouds);
        
        // Атмосфера
        const atmosphereGeo = new THREE.SphereGeometry(1.65, 96, 96);
        const atmosphereMat = new THREE.ShaderMaterial({
            uniforms: {
                uColor: { value: new THREE.Color('#4488ff') }
            },
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vPosition;
                void main() {
                    vec4 worldPos = modelMatrix * vec4(position, 1.0);
                    vNormal = normalize(mat3(modelMatrix) * normal);
                    vPosition = worldPos.xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                varying vec3 vPosition;
                uniform vec3 uColor;
                void main() {
                    vec3 viewDir = normalize(cameraPosition - vPosition);
                    float fresnel = 1.0 - abs(dot(viewDir, vNormal));
                    fresnel = pow(fresnel, 3.5);
                    float alpha = fresnel * 0.5;
                    gl_FragColor = vec4(uColor, alpha);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            side: THREE.FrontSide
        });
        const atmosphere = new THREE.Mesh(atmosphereGeo, atmosphereMat);
        atmosphere.renderOrder = 2;
        earthGroup.add(atmosphere);
        
        // Внешнее свечение атмосферы
        const outerAtmoGeo = new THREE.SphereGeometry(1.78, 64, 64);
        const outerAtmoMat = new THREE.ShaderMaterial({
            uniforms: {
                uColor: { value: new THREE.Color('#88bbff') }
            },
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vPosition;
                void main() {
                    vec4 worldPos = modelMatrix * vec4(position, 1.0);
                    vNormal = normalize(mat3(modelMatrix) * normal);
                    vPosition = worldPos.xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                varying vec3 vPosition;
                uniform vec3 uColor;
                void main() {
                    vec3 viewDir = normalize(cameraPosition - vPosition);
                    float fresnel = 1.0 - abs(dot(viewDir, vNormal));
                    fresnel = pow(fresnel, 6.0);
                    float alpha = fresnel * 0.25;
                    gl_FragColor = vec4(uColor, alpha);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            side: THREE.FrontSide
        });
        const outerAtmo = new THREE.Mesh(outerAtmoGeo, outerAtmoMat);
        outerAtmo.renderOrder = 3;
        earthGroup.add(outerAtmo);
        
        scene.add(earthGroup);

        // ==================== АНИМАЦИЯ ====================
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            
            // Вращение Земли
            earth.rotation.y += 0.0008;
            // Облака вращаются чуть быстрее
            clouds.rotation.y += 0.001;
            
            // Вращение звёзд
            stars.rotation.y += 0.0001;
            stars2.rotation.y -= 0.00005;
            
            controls.update();
            
            renderer.render(scene, camera);
        }
        
        animate();

        // ==================== РЕСАЙЗ ====================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('🌍 Реалистичная Земля готова!');
        console.log('   🖱️ Вращайте мышью');
        console.log('   📜 Приближайте колёсиком');
        console.log('   👆 Зажмите правую кнопку для перемещения');
        console.log('   ☁️ Облака вращаются');
        console.log('   🌫️ Атмосфера с эффектом Френеля');
    </script>
</body>
</html>
