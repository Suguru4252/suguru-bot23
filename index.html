<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rucoy Online - Мультиплеер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0c12;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .corner-buttons {
            position: fixed;
            z-index: 100;
            pointer-events: auto;
        }
        .top-right { top: 12px; right: 12px; display: flex; gap: 8px; }
        .bottom-left { bottom: 12px; left: 12px; display: flex; gap: 8px; }
        .bottom-right { bottom: 12px; right: 12px; display: flex; gap: 8px; }
        
        .mini-btn {
            background: rgba(44, 47, 74, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa55;
            color: #ffcc88;
            font-size: 12px;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 20px;
            box-shadow: 0 2px 0 #121420;
            cursor: pointer;
            font-family: monospace;
            min-width: 55px;
        }
        .mini-btn:active { transform: translateY(2px); }
        .fight-mini { background: rgba(200, 80, 60, 0.85); border-color: #ff8866; color: white; }
        .skill-mini { background: rgba(106, 78, 158, 0.85); border-color: #c88eff; }
        .class-mini { background: rgba(60, 100, 80, 0.85); border-color: #88ffaa; }
        .super-mini { background: rgba(200, 100, 50, 0.9); border-color: #ffaa66; }
        
        .nickname-display {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 4px 12px;
            border-radius: 20px;
            color: #ffcc88;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
        .online-count {
            position: fixed;
            top: 12px;
            right: 160px;
            background: rgba(0,0,0,0.7);
            padding: 4px 12px;
            border-radius: 20px;
            color: #88ffaa;
            font-size: 11px;
            z-index: 100;
        }
        .connection-status {
            position: fixed;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            padding: 4px 8px;
            border-radius: 12px;
            color: #ffaa88;
            font-size: 10px;
            z-index: 100;
            font-family: monospace;
        }
        @media (max-width: 700px) {
            .mini-btn { font-size: 10px; padding: 4px 8px; min-width: 45px; }
            .nickname-display { font-size: 10px; top: 8px; }
            .online-count { font-size: 9px; right: 140px; top: 8px; }
            .connection-status { font-size: 8px; bottom: 8px; right: 8px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="corner-buttons top-right">
        <button class="mini-btn" id="statsBtn">📊 СТАТ</button>
        <button class="mini-btn" id="invBtn">🎒 ИНВ</button>
    </div>
    
    <div class="corner-buttons bottom-left">
        <button class="mini-btn" id="hpBtn">❤️ HP</button>
        <button class="mini-btn" id="mpBtn">💙 MP</button>
    </div>
    
    <div class="corner-buttons bottom-right">
        <button class="mini-btn fight-mini" id="attackBtn">⚔️ АТАКА</button>
        <button class="mini-btn skill-mini" id="skillBtn">✨ СКИЛЛ</button>
        <button class="mini-btn super-mini" id="superBtn">🌟 СУПЕР</button>
    </div>
    
    <div class="corner-buttons" style="bottom: 12px; right: 90px; display: flex; gap: 6px;">
        <button class="mini-btn class-mini" id="classWarriorBtn">⚔️</button>
        <button class="mini-btn class-mini" id="classArcherBtn">🏹</button>
        <button class="mini-btn class-mini" id="classMageBtn">🔮</button>
    </div>
    
    <div class="nickname-display" id="nicknameDisplay"></div>
    <div class="online-count" id="onlineCount">👥 Онлайн: 0</div>
    <div class="connection-status" id="connectionStatus">🔌 Подключение...</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ========== НАСТРОЙКИ ==========
        const TILE_SIZE = 50;
        const MAP_W = 116;
        const MAP_H = 92;
        const WORLD_WIDTH = MAP_W * TILE_SIZE;
        const WORLD_HEIGHT = MAP_H * TILE_SIZE;
        
        let cameraX = 0, cameraY = 0;
        let canvasWidth = window.innerWidth;
        let canvasHeight = window.innerHeight;
        let walkCycle = 0;
        
        function resizeCanvas() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            updateCamera();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // ========== ПОДКЛЮЧЕНИЕ К СЕРВЕРУ ==========
        let socket = null;
        let otherPlayers = new Map();
        let myId = null;
        let isConnected = false;
        
        function connectToServer() {
            try {
                socket = io();
                
                socket.on('connect', () => {
                    console.log('✅ Подключен к серверу, ID:', socket.id);
                    myId = socket.id;
                    isConnected = true;
                    document.getElementById('connectionStatus').innerHTML = '🟢 Онлайн';
                    document.getElementById('connectionStatus').style.color = '#88ffaa';
                    
                    socket.emit('newPlayer', {
                        nickname: playerNickname,
                        x: player.x,
                        y: player.y,
                        classType: player.classType,
                        level: player.level,
                        hp: player.hp,
                        maxHp: player.maxHp,
                        gold: player.gold
                    });
                });
                
                socket.on('allPlayers', (players) => {
                    otherPlayers.clear();
                    for(let id in players) {
                        if(id !== myId) {
                            otherPlayers.set(id, players[id]);
                        }
                    }
                    updateOnlineCount();
                });
                
                socket.on('newPlayer', (player) => {
                    if(player.id !== myId) {
                        otherPlayers.set(player.id, player);
                        updateOnlineCount();
                        addMsg(`✨ ${player.nickname} присоединился к игре!`);
                    }
                });
                
                socket.on('playerMoved', (data) => {
                    if(data.id !== myId && otherPlayers.has(data.id)) {
                        let p = otherPlayers.get(data.id);
                        p.x = data.x;
                        p.y = data.y;
                        p.classType = data.classType;
                    }
                });
                
                socket.on('playerStatsUpdated', (data) => {
                    if(data.id !== myId && otherPlayers.has(data.id)) {
                        let p = otherPlayers.get(data.id);
                        p.hp = data.hp;
                        p.maxHp = data.maxHp;
                        p.level = data.level;
                    }
                });
                
                socket.on('playerLeft', (id) => {
                    if(otherPlayers.has(id)) {
                        let p = otherPlayers.get(id);
                        addMsg(`👋 ${p.nickname} покинул игру`);
                        otherPlayers.delete(id);
                        updateOnlineCount();
                    }
                });
                
                socket.on('disconnect', () => {
                    isConnected = false;
                    document.getElementById('connectionStatus').innerHTML = '🔴 Офлайн';
                    document.getElementById('connectionStatus').style.color = '#ff8866';
                    addMsg('⚠️ Потеряно соединение с сервером', true);
                });
                
                socket.on('attacked', (data) => {
                    addMsg(`💥 ${data.attackerName} атакует вас! -${data.damage} HP`, true);
                    player.hp = Math.max(0, player.hp - data.damage);
                    if(player.hp <= 0) {
                        player.hp = player.maxHp;
                        player.x = safeZone.x + safeZone.width/2;
                        player.y = safeZone.y + safeZone.height/2;
                        addMsg(`💀 Вас убили! Возрождение в безопасной зоне`, true);
                        sendPosition();
                    }
                    updateUIStats();
                    sendStats();
                });
                
            } catch(e) {
                console.error('Ошибка подключения:', e);
                document.getElementById('connectionStatus').innerHTML = '❌ Ошибка';
                addMsg('⚠️ Не удалось подключиться к серверу. Запустите server.js', true);
            }
        }
        
        function sendPosition() {
            if(socket && myId && isConnected) {
                socket.emit('updatePosition', {
                    x: player.x,
                    y: player.y,
                    classType: player.classType
                });
            }
        }
        
        function sendStats() {
            if(socket && myId && isConnected) {
                socket.emit('updateStats', {
                    hp: player.hp,
                    maxHp: player.maxHp,
                    level: player.level,
                    gold: player.gold
                });
            }
        }
        
        function attackOtherPlayer(targetId, damage) {
            if(socket && targetId && isConnected) {
                socket.emit('attackPlayer', {
                    targetId: targetId,
                    damage: damage,
                    attackerName: playerNickname
                });
            }
        }
        
        function updateOnlineCount() {
            let count = otherPlayers.size + 1;
            document.getElementById('onlineCount').innerHTML = `👥 Онлайн: ${count}`;
        }
        
        // ========== ИГРОК ==========
        let playerNickname = localStorage.getItem('rucoy_nickname') || 'Герой_' + Math.floor(Math.random() * 1000);
        document.getElementById('nicknameDisplay').innerHTML = `👤 ${playerNickname}`;
        
        // Сохраняем ник
        if(!localStorage.getItem('rucoy_nickname')) {
            let newNick = prompt('Введите ваш никнейм:', playerNickname);
            if(newNick && newNick.trim()) {
                playerNickname = newNick.trim();
                localStorage.setItem('rucoy_nickname', playerNickname);
                document.getElementById('nicknameDisplay').innerHTML = `👤 ${playerNickname}`;
            }
        }
        
        // ========== КЛАССЫ ==========
        const CLASSES = {
            warrior: { name: "Мечник", icon: "⚔️", color: "#5a7a9a", armorColor: "#4a6a8a", hp: 320, mp: 75, dmgMin: 34, dmgMax: 60, skill: "Вихрь", range: 60, isMelee: true, skinColor: "#e0c8a0", hairColor: "#8b5a2b" },
            archer: { name: "Лучник", icon: "🏹", color: "#6a8a5a", armorColor: "#5a7a4a", hp: 260, mp: 120, dmgMin: 32, dmgMax: 58, skill: "Тройной выстрел", range: 180, isMelee: false, skinColor: "#e0c8a0", hairColor: "#6b4a2a" },
            mage: { name: "Маг", icon: "🔮", color: "#9a6aba", armorColor: "#8a5aaa", hp: 210, mp: 210, dmgMin: 40, dmgMax: 70, skill: "Огненный взрыв", range: 170, isMelee: false, skinColor: "#e0c8a0", hairColor: "#4a2a6a" }
        };
        
        // ========== МОБЫ ==========
        const MOB_TYPES = [
            { name: "Гоблин", hp: 70, dmg: 16, exp: 38, color: "#6f8c5a", skin: "#8cae6a", icon: "👺", speed: 1.0, range: 55, draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-12,y-18,24,32); ctx.fillStyle=this.color; ctx.fillRect(x-10,y-10,20,24); ctx.fillStyle="#000"; ctx.fillRect(x-6,y-12,4,4); ctx.fillRect(x+2,y-12,4,4); ctx.fillStyle="#8b5a2b"; ctx.fillRect(x-8,y+4,16,8); } },
            { name: "Волк", hp: 95, dmg: 24, exp: 55, color: "#8a7a6a", skin: "#c0a890", icon: "🐺", speed: 1.3, range: 50, draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-14,y-16,28,28); ctx.fillStyle=this.color; ctx.fillRect(x-12,y-12,24,22); ctx.fillStyle="#000"; ctx.fillRect(x-8,y-10,4,4); ctx.fillRect(x+4,y-10,4,4); ctx.fillStyle="#4a3a2a"; ctx.fillRect(x-4,y+2,8,6); } },
            { name: "Медведь", hp: 150, dmg: 32, exp: 78, color: "#8b5a3a", skin: "#b87a4a", icon: "🐻", speed: 0.9, range: 58, draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-16,y-20,32,36); ctx.fillStyle=this.color; ctx.fillRect(x-14,y-12,28,28); ctx.fillStyle="#000"; ctx.fillRect(x-8,y-14,5,5); ctx.fillRect(x+3,y-14,5,5); ctx.fillStyle="#5a3a2a"; ctx.fillRect(x-6,y+2,12,8); } },
            { name: "Скелет", hp: 170, dmg: 32, exp: 95, color: "#b8b8cc", skin: "#d0d0e0", icon: "💀", speed: 1.1, range: 55, draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-12,y-20,24,36); ctx.fillStyle=this.color; ctx.fillRect(x-10,y-12,20,28); ctx.fillStyle="#000"; ctx.fillRect(x-6,y-14,4,4); ctx.fillRect(x+2,y-14,4,4); ctx.fillStyle="#8a8a8a"; ctx.fillRect(x-8,y+2,16,6); } },
            { name: "Орк", hp: 240, dmg: 45, exp: 132, color: "#8a6a4a", skin: "#aa8262", icon: "👺", speed: 0.85, range: 58, draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-14,y-20,28,36); ctx.fillStyle=this.color; ctx.fillRect(x-12,y-12,24,28); ctx.fillStyle="#000"; ctx.fillRect(x-8,y-14,5,5); ctx.fillRect(x+3,y-14,5,5); ctx.fillStyle="#b87c3a"; ctx.fillRect(x-10,y+2,20,10); } },
            { name: "Дракон", hp: 310, dmg: 58, exp: 210, color: "#c97a3a", skin: "#e09a5a", icon: "🐉", speed: 0.6, range: 65, draw: function(x,y) { ctx.fillStyle=this.skin; ctx.fillRect(x-16,y-22,32,40); ctx.fillStyle=this.color; ctx.fillRect(x-14,y-14,28,32); ctx.fillStyle="#000"; ctx.fillRect(x-8,y-16,5,5); ctx.fillRect(x+3,y-16,5,5); ctx.fillStyle="#d97a3a"; ctx.fillRect(x-12,y-2,24,8); } }
        ];
        
        let mobs = [], spawnTimer = 0;
        const MAX_MOBS = 35;
        
        function createMob() {
            let t = MOB_TYPES[Math.floor(Math.random() * MOB_TYPES.length)];
            let lvl = Math.max(1, player.level + Math.floor(Math.random() * 4) - 2);
            let hpMult = 1 + (lvl-1)*0.15, dmgMult = 1 + (lvl-1)*0.13;
            return {
                name: t.name + " Lv." + lvl, level: lvl,
                hp: Math.floor(t.hp * hpMult), maxHp: Math.floor(t.hp * hpMult),
                dmg: Math.floor(t.dmg * dmgMult),
                exp: Math.floor(t.exp * (0.85 + lvl*0.12)),
                color: t.color, skin: t.skin, icon: t.icon,
                speed: t.speed, attackRange: t.range, drawFunc: t.draw,
                x: 0, y: 0, attackTimer: 0
            };
        }
        
        function spawnMob() {
            if(mobs.length >= MAX_MOBS) return;
            for(let a=0;a<50;a++) {
                let x=150+Math.random()*(WORLD_WIDTH-300), y=120+Math.random()*(WORLD_HEIGHT-240);
                if(isWalkable(x,y,26) && !isInSafeZone(x,y) && Math.hypot(x-player.x,y-player.y)>200) {
                    let m=createMob(); m.x=x; m.y=y; mobs.push(m); return;
                }
            }
        }
        
        // ========== ИГРОК ==========
        let player = {
            x: 1100, y: 900,
            targetX: null, targetY: null,
            hp: 320, maxHp: 320,
            mp: 75, maxMp: 75,
            level: 1, exp: 0, expToNext: 90,
            classType: "warrior",
            potionHp: 5, potionMp: 5,
            potionBigHp: 1, potionBigMp: 1,
            gold: 450, speed: 4.5, defense: 15,
            attackTimer: 0, superCooldown: 0,
            isMoving: false, dmgMin: 34, dmgMax: 60, attackRange: 60
        };
        
        // ========== БЕЗОПАСНАЯ ЗОНА ==========
        let safeZone = { x: 500, y: 420, width: 560, height: 440 };
        let shopNPC = { x: safeZone.x + safeZone.width - 80, y: safeZone.y + safeZone.height - 60, radius: 28 };
        
        let gates = [
            { x: safeZone.x + safeZone.width/2 - 50, y: safeZone.y - 30, width: 100, height: 40 },
            { x: safeZone.x + safeZone.width/2 - 50, y: safeZone.y + safeZone.height - 10, width: 100, height: 40 },
            { x: safeZone.x - 30, y: safeZone.y + safeZone.height/2 - 50, width: 40, height: 100 },
            { x: safeZone.x + safeZone.width - 10, y: safeZone.y + safeZone.height/2 - 50, width: 40, height: 100 }
        ];
        
        function isInSafeZone(x, y) { return x > safeZone.x && x < safeZone.x + safeZone.width && y > safeZone.y && y < safeZone.y + safeZone.height; }
        function isAtGate(x, y) { for(let g of gates) if(x > g.x && x < g.x+g.width && y > g.y && y < g.y+g.height) return true; return false; }
        function canCrossBoundary(fx, fy, tx, ty) {
            let was = isInSafeZone(fx, fy);
            let will = isInSafeZone(tx, ty);
            if(was === will) return true;
            let mx = (fx+tx)/2, my = (fy+ty)/2;
            return isAtGate(mx, my) || isAtGate(tx, ty) || isAtGate(fx, fy);
        }
        
        // ========== ПРЕПЯТСТВИЯ ==========
        let obstacles = [];
        
        function generateWorld() {
            obstacles = [];
            for(let i=0;i<38;i++) {
                let fx = safeZone.x + i*28;
                if(!(fx>gates[0].x-20 && fx<gates[0].x+gates[0].width+20)) obstacles.push({x:fx,y:safeZone.y-18,radius:14,type:'fence'});
                if(!(fx>gates[1].x-20 && fx<gates[1].x+gates[1].width+20)) obstacles.push({x:fx,y:safeZone.y+safeZone.height+8,radius:14,type:'fence'});
            }
            for(let i=0;i<30;i++) {
                let fy = safeZone.y + i*28;
                if(!(fy>gates[2].y-20 && fy<gates[2].y+gates[2].height+20)) obstacles.push({x:safeZone.x-18,y:fy,radius:14,type:'fence'});
                if(!(fy>gates[3].y-20 && fy<gates[3].y+gates[3].height+20)) obstacles.push({x:safeZone.x+safeZone.width+8,y:fy,radius:14,type:'fence'});
            }
            for(let i=0;i<350;i++) {
                let x=80+Math.random()*(WORLD_WIDTH-160), y=80+Math.random()*(WORLD_HEIGHT-160);
                if(x>safeZone.x-80 && x<safeZone.x+safeZone.width+80 && y>safeZone.y-80 && y<safeZone.y+safeZone.height+80) continue;
                obstacles.push({x,y,radius:26,type:'tree'});
            }
            for(let i=0;i<70;i++) {
                let x=100+Math.random()*(WORLD_WIDTH-200), y=100+Math.random()*(WORLD_HEIGHT-200);
                if(x>safeZone.x-100 && x<safeZone.x+safeZone.width+100 && y>safeZone.y-100 && y<safeZone.y+safeZone.height+100) continue;
                obstacles.push({x,y,radius:38,type:'mountain'});
            }
            for(let i=0;i<200;i++) {
                let x=50+Math.random()*(WORLD_WIDTH-100), y=50+Math.random()*(WORLD_HEIGHT-100);
                if(x>safeZone.x-60 && x<safeZone.x+safeZone.width+60 && y>safeZone.y-60 && y<safeZone.y+safeZone.height+60) continue;
                obstacles.push({x,y,radius:16,type:'rock'});
            }
        }
        
        function isWalkable(x,y,r=24) {
            if(x-r<25 || x+r>WORLD_WIDTH-25 || y-r<25 || y+r>WORLD_HEIGHT-25) return false;
            for(let o of obstacles) if(Math.hypot(x-o.x,y-o.y)<r+o.radius) return false;
            return true;
        }
        
        function canMoveTo(x,y,r=24) {
            if(!isWalkable(x,y,r)) return false;
            if(!canCrossBoundary(player.x,player.y,x,y)) return false;
            return true;
        }
        
        // ========== ДВИЖЕНИЕ ==========
        function moveTo(x, y) { player.targetX = x; player.targetY = y; }
        function updateMove() {
            if(player.targetX === null || player.targetY === null) { player.isMoving = false; return; }
            let dx = player.targetX - player.x, dy = player.targetY - player.y, dist = Math.hypot(dx, dy);
            if(dist < 8) { player.targetX = null; player.targetY = null; player.isMoving = false; return; }
            player.isMoving = true;
            let step = Math.min(player.speed, dist), ang = Math.atan2(dy, dx);
            let nx = player.x + Math.cos(ang) * step, ny = player.y + Math.sin(ang) * step;
            if(canMoveTo(nx, ny, 24)) { player.x = nx; player.y = ny; }
            else { player.targetX = null; player.targetY = null; player.isMoving = false; }
            sendPosition();
        }
        
        // ========== ОТРИСОВКА ==========
        function drawRealisticPlayer(x, y, isMoving, classType, nickname = null, isSelf = false) {
            const c = CLASSES[classType];
            if(isMoving) walkCycle = (walkCycle + 0.15) % (Math.PI * 2);
            else walkCycle = walkCycle * 0.95;
            const legOffset = Math.sin(walkCycle) * 6;
            const armOffset = Math.sin(walkCycle + Math.PI) * 8;
            
            ctx.fillStyle = "#2a2a2a";
            ctx.beginPath(); ctx.moveTo(x-12, y+15); ctx.lineTo(x-16 + (legOffset * 0.5), y+28); ctx.lineTo(x-10, y+28); ctx.fill();
            ctx.beginPath(); ctx.moveTo(x+12, y+15); ctx.lineTo(x+16 - (legOffset * 0.5), y+28); ctx.lineTo(x+10, y+28); ctx.fill();
            ctx.fillStyle = "#4a3a2a"; ctx.fillRect(x-18 + (legOffset * 0.3), y+27, 12, 6); ctx.fillRect(x+6 - (legOffset * 0.3), y+27, 12, 6);
            ctx.fillStyle = c.color;
            ctx.beginPath(); ctx.moveTo(x-14, y+4); ctx.quadraticCurveTo(x, y+14, x+14, y+4); ctx.lineTo(x+12, y-2); ctx.quadraticCurveTo(x, y+2, x-12, y-2); ctx.fill();
            ctx.fillStyle = c.armorColor; ctx.fillRect(x-10, y+2, 20, 12);
            ctx.fillStyle = c.skinColor;
            ctx.beginPath(); ctx.moveTo(x-12, y+2); ctx.quadraticCurveTo(x-18 + armOffset, y+6, x-14 + armOffset*0.7, y+12); ctx.lineTo(x-10, y+4); ctx.fill();
            ctx.beginPath(); ctx.moveTo(x+12, y+2); ctx.quadraticCurveTo(x+18 - armOffset, y+6, x+14 - armOffset*0.7, y+12); ctx.lineTo(x+10, y+4); ctx.fill();
            ctx.fillRect(x-16 + armOffset*0.6, y+10, 6, 5); ctx.fillRect(x+10 - armOffset*0.6, y+10, 6, 5);
            ctx.fillStyle = c.skinColor; ctx.beginPath(); ctx.ellipse(x, y-8, 10, 12, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = c.hairColor; ctx.beginPath(); ctx.ellipse(x-2, y-15, 8, 6, 0, 0, Math.PI*2); ctx.ellipse(x+2, y-15, 8, 6, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(x-5, y-11, 2.5, 0, Math.PI*2); ctx.arc(x+5, y-11, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#1a2a3a"; ctx.beginPath(); ctx.arc(x-5, y-11, 1.5, 0, Math.PI*2); ctx.arc(x+5, y-11, 1.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(x-5.8, y-12, 0.8, 0, Math.PI*2); ctx.arc(x+4.2, y-12, 0.8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.strokeStyle = "#8b5a3a"; ctx.lineWidth = 2; ctx.arc(x, y-5, 5, 0.1, Math.PI - 0.1); ctx.stroke();
            ctx.fillStyle = "#c99e6f"; ctx.beginPath(); ctx.moveTo(x-2, y-8); ctx.lineTo(x, y-6); ctx.lineTo(x+2, y-8); ctx.fill();
            
            if(c.name === "Мечник") ctx.fillRect(x+12 - armOffset*0.3, y-2, 16, 6);
            else if(c.name === "Лучник") { ctx.fillStyle = "#c4b27a"; ctx.fillRect(x+12 - armOffset*0.3, y-4, 12, 4); }
            else { ctx.fillStyle = "#ffaa66"; ctx.fillRect(x+12 - armOffset*0.3, y-6, 8, 8); }
            ctx.fillStyle = "#8b5a2b"; ctx.fillRect(x-8, y+8, 16, 3);
            
            if(nickname) {
                ctx.fillStyle = "#ffffaa";

                ctx.fillText(nickname, x-20, y-42);

                    ctx.fillStyle = "#88ffaa";
                    ctx.fillRect(x-20, y-48, 40, 4);
                    ctx.fillStyle = "#ff6644";
                    ctx.fillRect(x-20, y-48, 40 * (player.hp/player.maxHp), 4);

        }
        
        function drawOtherPlayer(x, y, classType, nickname, hp, maxHp) {
            drawRealisticPlayer(x, y, false, classType, nickname, false);
            ctx.fillStyle = "#88ffaa";
            ctx.fillRect(x-20, y-48, 40, 4);
            ctx.fillStyle = "#ff6644";
            ctx.fillRect(x-20, y-48, 40 * (hp/maxHp), 4);
        }
        
        function drawMob(m) {
            let x = m.x - cameraX, y = m.y - cameraY;
            if(x < -80 || x > canvasWidth+80) return;
            m.drawFunc(x, y);
            let percent = m.hp / m.maxHp;
            ctx.fillStyle = "#a33"; ctx.fillRect(x-24, y-32, 48, 6);
            ctx.fillStyle = "#4f6"; ctx.fillRect(x-24, y-32, 48 * percent, 6);
            ctx.font = "9px monospace"; ctx.fillStyle = "#ffffaa"; ctx.fillText(m.name, x-20, y-38);
        }
        
        function drawWorld() {
            for(let i=0;i<WORLD_WIDTH/52+10;i++) for(let j=0;j<WORLD_HEIGHT/52+10;j++) {
                let x=i*52-cameraX, y=j*52-cameraY;
                if(x>-60 && x<canvasWidth+60 && y>-60 && y<canvasHeight+60) {
                    ctx.fillStyle=((i+j)%2===0)?"#4a8c3a":"#3a6c2a";
                    ctx.fillRect(x,y,51,51);
                }
            }
            for(let o of obstacles) {
                let x=o.x-cameraX, y=o.y-cameraY;
                if(x>-120 && x<canvasWidth+120 && y>-120 && y<canvasHeight+120) {
                    if(o.type==='tree') {
                        ctx.fillStyle="#3c9e3c"; ctx.fillRect(x-18,y-32,36,58);
                        ctx.fillStyle="#8b5a2b"; ctx.fillRect(x-10,y-8,20,32);
                        ctx.fillStyle="#5aac3a"; ctx.beginPath(); ctx.ellipse(x,y-42,26,30,0,0,Math.PI*2); ctx.fill();
                    } else if(o.type==='mountain') {
                        ctx.fillStyle="#6e6e7a"; ctx.beginPath(); ctx.moveTo(x,y-45); ctx.lineTo(x-40,y+15); ctx.lineTo(x+40,y+15); ctx.fill();
                        ctx.fillStyle="#8e8e9a"; ctx.beginPath(); ctx.moveTo(x-12,y-15); ctx.lineTo(x,y-38); ctx.lineTo(x+12,y-15); ctx.fill();
                    } else if(o.type==='rock') {
                        ctx.fillStyle="#7a6a5a"; ctx.beginPath(); ctx.ellipse(x,y,18,14,0,0,Math.PI*2); ctx.fill();
                    } else if(o.type==='fence') {
                        ctx.fillStyle="#c99e6f"; ctx.fillRect(x-10,y-14,20,32);
                        for(let i=0;i<3;i++) ctx.fillRect(x-6+i*6,y-22,3,14);
                    }
                }
            }
            let szX=safeZone.x-cameraX, szY=safeZone.y-cameraY;
            ctx.fillStyle="#88aa66aa"; ctx.fillRect(szX,szY,safeZone.width,safeZone.height);
            let npcX = shopNPC.x - cameraX, npcY = shopNPC.y - cameraY;
            ctx.fillStyle = "#c99e6f"; ctx.fillRect(npcX-18, npcY-25, 36, 45);
            ctx.fillStyle = "#e8c28a"; ctx.fillRect(npcX-12, npcY-15, 24, 30);
            ctx.fillStyle = "#000"; ctx.fillRect(npcX-8, npcY-10, 5, 5); ctx.fillRect(npcX+3, npcY-10, 5, 5);
            ctx.font = "24px monospace"; ctx.fillStyle = "#ffdd99"; ctx.fillText("🏪", npcX-12, npcY+5);
            for(let g of gates) {
                let gx=g.x-cameraX, gy=g.y-cameraY;
                ctx.fillStyle="#c9a87a"; ctx.fillRect(gx,gy,g.width,g.height);
                ctx.fillStyle="#e8c28a";
                if(g.width>g.height) { for(let i=0;i<3;i++) ctx.fillRect(gx+15+i*25,gy+12,12,18); }
                else { for(let i=0;i<3;i++) ctx.fillRect(gx+12,gy+15+i*25,18,12); }
            }
        }
        
        let selectedMob = null, messages = [], damageFloats = [], showStats = false, showInventory = false, shopOpen = false;
        let explosionTarget = null, whirlwindActive = false, whirlwindTimer = 0;
        let statsData = { mobsKilled: 0, totalGold: 0, totalDamage: 0, totalDamageTaken: 0, startTime: Date.now() };
        
        function addMsg(t, e=false) { messages.unshift({text:t,isErr:e,life:180}); if(messages.length>5) messages.pop(); }
        function showDamage(x,y,dmg,isPlayer=false) { damageFloats.push({x,y,dmg,life:20,isPlayer}); }
        function getDamageRange() { let c=CLASSES[player.classType]; return { min: c.dmgMin+Math.floor(player.level*2), max: c.dmgMax+Math.floor(player.level*2.8) }; }
        
        function killMob(mob) {
            let expGain=mob.exp, goldGain=Math.floor(25+Math.random()*(player.level*13));
            player.exp+=expGain; player.gold+=goldGain;
            statsData.mobsKilled++; statsData.totalGold+=goldGain;
            addMsg(`✨ +${expGain} опыта, +${goldGain}💰`);
            if(Math.random()<0.5) { if(Math.random()<0.6) player.potionHp++; else player.potionMp++; addMsg(`🧪 Выпало зелье!`); }
            let idx=mobs.indexOf(mob); if(idx!==-1) mobs.splice(idx,1);
            if(selectedMob===mob) selectedMob=null;
            while(player.exp>=player.expToNext) {
                player.exp-=player.expToNext; player.level++;
                player.maxHp=CLASSES[player.classType].hp+player.level*15;
                player.maxMp=CLASSES[player.classType].mp+player.level*11;
                player.hp=player.maxHp; player.mp=player.maxMp;
                player.expToNext=90+player.level*38;
                addMsg(`⭐⭐ УРОВЕНЬ ${player.level}! ⭐⭐`);
                sendStats();
            }
            sendStats();
        }
        
        function playerAttack() {
            if(!selectedMob || selectedMob.hp<=0) { selectedMob=null; return false; }
            if(player.attackTimer > 0) return false;
            let c=CLASSES[player.classType];
            let dist = Math.hypot(player.x-selectedMob.x, player.y-selectedMob.y);
            if(dist > c.range) { addMsg(`🏃 Слишком далеко! (нужно ${c.range}px)`, true); return false; }
            let dmg = Math.floor(Math.random()*(player.dmgMax-player.dmgMin+1)+player.dmgMin);
            selectedMob.hp -= dmg;
            player.attackTimer = 20;
            addMsg(`⚔️ ${c.name} → ${dmg} урона ${selectedMob.name}!`);
            showDamage(selectedMob.x, selectedMob.y, dmg);
            if(selectedMob.hp <= 0) killMob(selectedMob);
            return true;
        }
        
        function updateMobs() {
            for(let m of mobs) {
                if(m.hp<=0) continue;
                let dx=player.x-m.x, dy=player.y-m.y, dist=Math.hypot(dx,dy);
                if(dist<230 && !isInSafeZone(player.x,player.y)) {
                    let ang=Math.atan2(dy,dx), step=Math.min(m.speed,dist-48);
                    if(step>0) { let nx=m.x+Math.cos(ang)*step, ny=m.y+Math.sin(ang)*step; if(isWalkable(nx,ny,26) && !isInSafeZone(nx,ny)) { m.x=nx; m.y=ny; } }
                    if(dist < m.attackRange + 15) {
                        if(m.attackTimer <= 0) {
                            let dmg=Math.max(5, m.dmg - Math.floor(player.defense/3));
                            player.hp -= dmg;
                            m.attackTimer = 30;
                            addMsg(`💀 ${m.name} нанес ${dmg} урона!`, true);
                            showDamage(m.x, m.y, dmg, true);
                            if(player.hp <= 0) {
                                player.hp = player.maxHp; player.mp = player.maxMp;
                                player.x = safeZone.x + safeZone.width/2; player.y = safeZone.y + safeZone.height/2;
                                addMsg(`💀 ВОСКРЕШЕНИЕ В БЕЗОПАСНОЙ ЗОНЕ 💀`, true);
                                sendPosition();
                            }
                        } else m.attackTimer--;
                    } else if(m.attackTimer>0) m.attackTimer--;
                } else if(m.attackTimer>0) m.attackTimer--;
            }
        }
        
        function useHp() {
            if(player.potionHp <= 0 && player.potionBigHp <= 0) { addMsg(`❌ Нет зелий HP!`, true); return; }
            if(player.potionBigHp > 0 && player.hp < player.maxHp * 0.5) {
                let heal = Math.floor(player.maxHp * 0.9); player.hp = Math.min(player.maxHp, player.hp + heal); player.potionBigHp--;
                addMsg(`❤️❤️ БОЛЬШОЕ ЗЕЛЬЕ! +${heal} HP`);
            } else if(player.potionHp > 0) {
                let heal = Math.floor(player.maxHp * 0.7); player.hp = Math.min(player.maxHp, player.hp + heal); player.potionHp--;
                addMsg(`❤️ +${heal} HP (осталось ${player.potionHp})`);
            }
            sendStats();
        }
        
        function useMp() {
            if(player.potionMp <= 0 && player.potionBigMp <= 0) { addMsg(`❌ Нет зелий MP!`, true); return; }
            if(player.potionBigMp > 0 && player.mp < player.maxMp * 0.5) {
                let mana = Math.floor(player.maxMp); player.mp = Math.min(player.maxMp, player.mp + mana); player.potionBigMp--;
                addMsg(`💙💙 БОЛЬШОЕ ЗЕЛЬЕ! +${mana} MP`);
            } else if(player.potionMp > 0) {
                let mana = Math.floor(player.maxMp * 0.75); player.mp = Math.min(player.maxMp, player.mp + mana); player.potionMp--;
                addMsg(`💙 +${mana} MP (осталось ${player.potionMp})`);
            }
        }
        
        function useSkill() {
            if(!selectedMob || selectedMob.hp<=0) { addMsg(`🎯 Выберите цель!`, true); return; }
            let c=CLASSES[player.classType];
            let dist=Math.hypot(player.x-selectedMob.x,player.y-selectedMob.y);
            if(dist>c.range+30) { addMsg(`🏃 Слишком далеко для способности!`, true); return; }
            let manaCost=30+Math.floor(player.level/2);
            if(player.mp<manaCost) { addMsg(`💙 Не хватает маны! (${manaCost} MP)`, true); return; }
            player.mp-=manaCost;
            let avg=(player.dmgMin+player.dmgMax)/2;
            let dmg=Math.floor(avg*2.4);
            selectedMob.hp-=dmg;
            addMsg(`✨ ${c.skill}! ${dmg} урона по ${selectedMob.name}!`);
            showDamage(selectedMob.x,selectedMob.y,dmg);
            if(selectedMob.hp<=0) killMob(selectedMob);
        }
        
        function useSuper() {
            if(player.superCooldown > 0) { addMsg(`🌟 Суперспособность: ${Math.ceil(player.superCooldown/10)} сек`, true); return; }
            let c = CLASSES[player.classType];
            if(c.name === "Мечник") {
                whirlwindActive = true; whirlwindTimer = 30; player.superCooldown = 180;
                addMsg(`🌀 ВИХРЬ! Урон x2 по всем врагам!`);
                for(let mob of mobs) {
                    if(Math.hypot(player.x-mob.x,player.y-mob.y)<100 && mob.hp>0) {
                        let avg=(player.dmgMin+player.dmgMax)/2, dmg=Math.floor(avg*2);
                        mob.hp-=dmg; showDamage(mob.x,mob.y,dmg);
                        addMsg(`🌀 Вихрь → ${dmg} урона ${mob.name}!`);
                        if(mob.hp<=0) killMob(mob);
                    }
                }
            } else if(c.name === "Лучник") {
                let targets = mobs.filter(m=>m.hp>0 && Math.hypot(player.x-m.x,player.y-m.y)<220);
                targets.sort((a,b)=>Math.hypot(player.x-a.x,player.y-a.y)-Math.hypot(player.x-b.x,player.y-b.y));
                for(let mob of targets.slice(0,3)) {
                    let avg=(player.dmgMin+player.dmgMax)/2, dmg=Math.floor(avg*3);
                    mob.hp-=dmg; showDamage(mob.x,mob.y,dmg);
                    addMsg(`🏹 Тройной выстрел → ${dmg} урона ${mob.name}!`);
                    if(mob.hp<=0) killMob(mob);
                }
                player.superCooldown = 180;
            } else if(c.name === "Маг") {
                addMsg(`🔥 Нажмите на любое место для взрыва!`);
                explosionTarget = { active: true };
                return;
            }
        }
        
        function castExplosion(wx, wy) {
            if(!explosionTarget?.active) return;
            explosionTarget = null;
            let avg=(player.dmgMin+player.dmgMax)/2, dmg=Math.floor(avg*2.5);
            for(let mob of mobs) {
                if(Math.hypot(wx-mob.x,wy-mob.y)<90 && mob.hp>0) {
                    mob.hp-=dmg; showDamage(mob.x,mob.y,dmg);
                    addMsg(`🔥 Взрыв → ${dmg} урона ${mob.name}!`);
                    if(mob.hp<=0) killMob(mob);
                }
            }
            damageFloats.push({x:wx,y:wy,dmg:"💥",life:15,isExplosion:true});
            player.superCooldown = 180;
        }
        
        function switchClass(className) {
            let classes = Object.keys(CLASSES);
            let newClass = className || classes[(classes.indexOf(player.classType)+1)%classes.length];
            if(player.classType===newClass) return;
            let hpPercent=player.hp/player.maxHp, mpPercent=player.mp/player.maxMp;
            player.classType=newClass;
            player.maxHp=CLASSES[newClass].hp+player.level*15;
            player.maxMp=CLASSES[newClass].mp+player.level*11;
            player.hp=Math.max(1,Math.min(player.maxHp,Math.floor(player.maxHp*hpPercent)));
            player.mp=Math.max(1,Math.min(player.maxMp,Math.floor(player.maxMp*mpPercent)));
            player.dmgMin=CLASSES[newClass].dmgMin+Math.floor(player.level*2);
            player.dmgMax=CLASSES[newClass].dmgMax+Math.floor(player.level*2.8);
            player.attackRange=CLASSES[newClass].range;
            addMsg(`🔄 Класс: ${CLASSES[newClass].name} ${CLASSES[newClass].icon} | Дальность: ${player.attackRange}px`);
            sendPosition();
            sendStats();
        }
        
        function selectMobAt(wx,wy) {
            for(let m of mobs) { if(Math.hypot(m.x-wx,m.y-wy)<55 && m.hp>0) { selectedMob=m; addMsg(`🎯 Цель: ${m.name} (${m.hp}/${m.maxHp} HP)`); return true; } }
            return false;
        }
        
        function handleClick(wx,wy) {
            if(showStats || showInventory) { showStats=false; showInventory=false; return; }
            if(shopOpen) { shopOpen=false; return; }
            if(explosionTarget?.active) { castExplosion(wx,wy); return; }
            if(selectMobAt(wx,wy)) return;
            moveTo(wx,wy);
        }
        
        function updateCamera() {
            let tx=player.x-canvasWidth/2, ty=player.y-canvasHeight/2;
            tx=Math.min(Math.max(tx,0),WORLD_WIDTH-canvasWidth);
            ty=Math.min(Math.max(ty,0),WORLD_HEIGHT-canvasHeight);
            cameraX+=(tx-cameraX)*0.1; cameraY+=(ty-cameraY)*0.1;
        }
        
        function updateUIStats() {
            let c=CLASSES[player.classType];
            document.getElementById('nicknameDisplay').innerHTML = `👤 ${playerNickname}  Lv.${player.level}`;
        }
        
        function drawUI() {
            let c=CLASSES[player.classType], fs=Math.max(12,Math.min(16,canvasWidth/65));
            ctx.fillStyle="#000000aa"; ctx.fillRect(12,12,210,75);
            ctx.fillStyle="#c55"; ctx.fillRect(18,18,190,18);
            ctx.fillStyle="#f75"; ctx.fillRect(18,18,190*(player.hp/player.maxHp),18);
            ctx.fillStyle="#58f"; ctx.fillRect(18,42,190*(player.mp/player.maxMp),16);
            ctx.fillStyle="#fff"; ctx.font=`bold ${fs}px monospace`;
            ctx.fillText(`❤️ ${Math.floor(player.hp)}/${player.maxHp}`,22,34);
            ctx.fillText(`💙 ${Math.floor(player.mp)}/${player.maxMp}`,22,56);
            ctx.fillStyle="#fd9"; ctx.font=`bold ${fs+2}px monospace`;
            ctx.fillText(`${c.name} Lv.${player.level}`,22,88);
            ctx.fillStyle="#000000aa"; ctx.fillRect(12,96,210,14);
            ctx.fillStyle="#8af"; ctx.fillRect(12,96,210*(player.exp/player.expToNext),14);
            ctx.fillStyle="#fff"; ctx.font=`${fs-2}px monospace`;
            ctx.fillText(`EXP: ${player.exp}/${player.expToNext}`,18,108);
            ctx.fillStyle="#000000aa"; ctx.fillRect(canvasWidth-145,12,133,60);
            ctx.fillStyle="#fc8"; ctx.font=`bold ${fs}px monospace`;
            ctx.fillText(`💰 ${player.gold}`,canvasWidth-135,35);
            ctx.fillText(`🧪${player.potionHp}  🔮${player.potionMp}`,canvasWidth-135,60);
            for(let i=0;i<Math.min(4,messages.length);i++) { let m=messages[i]; ctx.fillStyle=m.isErr?"#f86c":"#edbc"; ctx.font=`${fs-2}px monospace`; ctx.fillText(m.text.substring(0,32),15,canvasHeight-45-i*18); }
            if(selectedMob&&selectedMob.hp>0) { let x=selectedMob.x-cameraX, y=selectedMob.y-cameraY; ctx.strokeStyle="#fa4"; ctx.lineWidth=4; ctx.strokeRect(x-20,y-30,56,56); }
            if(player.targetX!==null && player.targetY!==null) { let tx=player.targetX-cameraX, ty=player.targetY-cameraY; ctx.fillStyle="#fc4a"; ctx.beginPath(); ctx.arc(tx,ty,16,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#fa0"; ctx.beginPath(); ctx.arc(tx,ty,8,0,Math.PI*2); ctx.fill(); }
            for(let i=0;i<damageFloats.length;i++) { let d=damageFloats[i], x=d.x-cameraX, y=d.y-cameraY; if(d.isExplosion) { ctx.font="bold 32px monospace"; ctx.fillStyle="#ff8844"; ctx.fillText("💥",x-15,y-20); } else { ctx.font=`bold ${d.isPlayer?18:22}px monospace`; ctx.fillStyle=d.isPlayer?"#fa6":"#f84"; ctx.fillText(`-${d.dmg}`,x-12,y-28); } d.life--; if(d.life<=0) damageFloats.splice(i,1), i--; }
            if(player.superCooldown>0) { let p=player.superCooldown/180; ctx.fillStyle="#000000aa"; ctx.fillRect(15,canvasHeight-70,70,12); ctx.fillStyle="#ffaa44"; ctx.fillRect(15,canvasHeight-70,70*(1-p),12); ctx.fillStyle="#ffaa88"; ctx.font="10px monospace"; ctx.fillText(`🌟 ${Math.ceil(player.superCooldown/10)}с`,20,canvasHeight-55); }
            
            for(let [id, p] of otherPlayers) {
                let otherX = p.x - cameraX;
                let otherY = p.y - cameraY;
                if(otherX > -100 && otherX < canvasWidth+100 && otherY > -100 && otherY < canvasHeight+100) {
                    drawOtherPlayer(otherX, otherY, p.classType, p.nickname, p.hp || 320, p.maxHp || 320);
                }
            }
        }
        
        function update() {
            updateMove(); updateMobs(); updateCamera();
            if(player.attackTimer > 0) player.attackTimer--;
            if(player.superCooldown > 0) player.superCooldown--;
            if(spawnTimer <= 0) { if(mobs.length < MAX_MOBS) for(let i=0;i<2;i++) spawnMob(); spawnTimer = 18; } else spawnTimer--;
            for(let i=0;i<messages.length;i++) if(messages[i].life) messages[i].life--;
            messages=messages.filter(m=>!m.life||m.life>0);
        }
        
        function getWorldClick(cx,cy) {
            let rect=canvas.getBoundingClientRect();
            let sx=canvasWidth/rect.width, sy=canvasHeight/rect.height;
            return { x:(cx-rect.left)*sx+cameraX, y:(cy-rect.top)*sy+cameraY };
        }
        
        canvas.addEventListener('click', (e) => { let w=getWorldClick(e.clientX,e.clientY); handleClick(w.x,w.y); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); let t=e.touches[0]; let w=getWorldClick(t.clientX,t.clientY); handleClick(w.x,w.y); });
        
        setInterval(()=>{ if(selectedMob && selectedMob.hp>0 && Math.hypot(player.x-selectedMob.x, player.y-selectedMob.y) <= player.attackRange + 15) playerAttack(); }, 1200);
        
        document.getElementById('attackBtn').onclick=()=>{ if(selectedMob&&selectedMob.hp>0) playerAttack(); else addMsg("🎯 Выберите цель",true); };
        document.getElementById('skillBtn').onclick=()=>useSkill();
        document.getElementById('superBtn').onclick=()=>useSuper();
        document.getElementById('hpBtn').onclick=()=>useHp();
        document.getElementById('mpBtn').onclick=()=>useMp();
        document.getElementById('statsBtn').onclick=()=>{ showStats=!showStats; showInventory=false; };
        document.getElementById('invBtn').onclick=()=>{ showInventory=!showInventory; showStats=false; };
        document.getElementById('classWarriorBtn').onclick=()=>switchClass('warrior');
        document.getElementById('classArcherBtn').onclick=()=>switchClass('archer');
        document.getElementById('classMageBtn').onclick=()=>switchClass('mage');
        
        window.addEventListener('keydown',(e)=>{
            if(e.key==='1') useSuper();
            if(e.key==='2') useHp();
            if(e.key==='3') useMp();
            if(e.key==='s') useSkill();
            if(e.key==='c') switchClass();
        });
        
        generateWorld();
        for(let i=0;i<12;i++) spawnMob();
        updateUIStats();
        
        addMsg("✨ Добро пожаловать в мультиплеерную версию!");
        addMsg(`🗡️ ${CLASSES.warrior.name} - ближний бой (${CLASSES.warrior.range}px)`);
        addMsg(`🏹 ${CLASSES.archer.name} - дальний бой (${CLASSES.archer.range}px)`);
        addMsg(`🔮 ${CLASSES.mage.name} - дальний бой (${CLASSES.mage.range}px)`);
        addMsg("🌟 1 - СУПЕРСИЛА | 2 - ЗЕЛЬЕ HP | 3 - ЗЕЛЬЕ MP");
        addMsg("👥 Другие игроки видны на карте в реальном времени!");
        
        connectToServer();
        
        function render() { drawWorld(); for(let m of mobs) drawMob(m); drawRealisticPlayer(player.x - cameraX, player.y - cameraY, player.isMoving, player.classType, playerNickname, true); drawUI(); }
        function loop() { update(); render(); requestAnimationFrame(loop); }
        loop();
    })();
</script>
</body>
</html>
